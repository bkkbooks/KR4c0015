body:
  text: 九家集注杜詩巻五宋郭知達編古詩寓秦州及同谷縣行赴蜀中作貽阮隱居昉陳留風俗衰人物世不數晉書阮籍字嗣宗陳留尉氏人也父瑀魏丞相掾子渾姪咸咸子瞻瞻弟孚咸從子脩孚族弟放放弟裕皆陳留人塞上得阮生迥繼先父祖趙云公言阮氏自晉人之後無所聞今日於秦州得阮昉也貧知静者性自益毛髮古師云語曰仁者静注無欲故静性静者多壽車馬入隣家蓬蒿翳環堵江文通詩顧念張仲蔚蓬蒿滿中園莊子庚桑楚鑿垣牆而殖蓬蒿昭十六年傳斬之蓬蒿藜藋而共處之月令藜莠蓬蒿並興儒行儒有一畝之宮環堵之室注環堵面一堵也五版為堵張景陽詩環堵自摧毀清詩近道要趙云傅咸贈崔伏詩曰人之好我贈我清詩識字用心苦劉棻嘗從楊雄學作竒字劉歆觀之泣曰空自苦心趙云字作子言阮為詩所以近道要者以其用苦也惟杜公識之尋我草逕微褰裳踏寒雨崔駰達旨辭曰與其有事則褰衣濡足冠掛不顧趙云詩褰裳涉溱更議居逺林避喧甘猛虎沈休文詩避世非避喧足明箕潁客榮貴如糞土陸士衡云徐幹少無宦情有箕潁之心晉語玉帛酒食猶糞土也愛糞土以毀五常無乃不可乎箕山名潁水名許由巢父隱處僖二十八年傳榮季曰況瓊玉乎是糞土也趙云箕潁出謝靈運擬徐幹詩序非陸士衡舊注誤遣興三首下馬古戰場四顧但茫然蘇子卿行役在戰場風悲浮雲去黄葉墜我前朽骨穴螻蟻老子曰其人已死其骨已朽陸機挽歌豐肌饗螻蟻妍骸永夷泯趙云莊子云在上為烏鳶食在下為螻蟻食又為蔓草纒江淹恨賦試望平原蔓草縈骨拱木歛魂故老行嘆息今人尚開邊嚴助傳武帝時征伐四夷開置邊郡趙云使公得志廟堂固不求邊功不賞邊臣矣漢虜互勝負封疆不常全前漢匈奴傳當孝武時雖征伐克獲而士馬物故亦略相當雖開河南之野建朔方之郡亦棄造陽之北九百餘里匈人民民每來降漢單于亦輒拘留漢使以相報復其傑鶩尚若斯安肯以愛子而為質乎韓安國漢數千里地争利則人馬罷虜以全制其弊去病云漢匈奴相紛拏殺傷大當孫子一勝一負兵家常勢安得廉恥一作頗將三軍同晏眠右一髙秋登寒一作塞山南望馬邑州前漢地理志馬邑屬鴈門郡晉太康地記云秦時建此城輒崩不成有馬周旋馳走反覆父老異之因依以築城遂名為馬邑漢王恢伏兵馬邑旁谷中是也其趙云舊注指為鴈門馬邑非是蓋公詩在秦州所作登山南望豈却望北地鴈門之馬邑乎馬邑秦州地名今於本處有石碑標榜焉其土人及曾游秦州者自能言之此所謂不行一萬里不曉杜甫詩也降虜東擊胡壯健盡不留詩囬紇助順收復京師遂進収東都前漢匈奴傳曰漢大發關東輕銳士盡力擊匈奴郡國吏三百石伉健習騎射者皆從軍穹廬莽牢落匈奴傳匈奴父子同穹廬卧師古曰穹廬旃帳也其形穹隆故曰穹廬上有行雲愁老弱哭道路願聞兵甲休前漢賈捐之傳珠崖反連年不定議大發軍捐之建議不可曰當此之時冦賊並起軍旅數發父戰死於前子鬬傷於後女子乗亭障孤兒號於道老母寡婦飲泣巷哭上從之前漢匈奴傳匈奴上漢書曰願寢兵休士以安邊民使少者得成其長老者得安其處鄴中事反覆一云何蕭條死人積如丘後漢韓遂馬馬騰曰天下反覆未可知則趙云兩京雖復矣而賊猶保相州旣圍復解士卒傷死可知矣諸將已茅土載驅誰與謀李陵與蘇武書陵為足下當享茅土之薦䇿文錫君𤣥土苴以白茅新添詩載馳載驅鄴趙云當兩京之復各論諸將之功而加官爵矣則破之戰誰復効力哉宜公之所深憂也右二豐年孰云遲甘澤不在早陸機雲賦甘澤􅗈霈孫楚雪賦膏澤液普潤中田肅肅二麥實豐年曹子建良田無晚嵗膏澤多豐年耕田秋雨足禾黍已映道春苗九月交顔色同日老勸汝衡門士衡門見上秋雨歎注勿悲尚枯槁漁父形容枯槁莊子枯槁之士趙云此篇慰貧士之詩也時來展才力先後無醜好但訝鹿皮翁忘機對芳草列仙傳鹿皮翁者菑川人也少為府小吏機巧舉手能成器械岑山上有神泉人不能至也小吏自府君請木工斧斤三十人作轉輪懸閣意思叢生數十日梯道四門成上其顛作茅舍留止其旁機趙云鹿皮翁固是神仙神仙皆遺世故然於此言忘械則以鹿皮翁本巧於機械及其避世忘去機慮結茅岑山坐對芳草矣公題是遣興見諸將以戰伐之功富貴驕矜而貧者寂寞既慰之以秋成當飽可免憔悴又期之以時來展材力亦當富貴不以先者為好而後者為醜也又終之以鹿皮翁之忘機則豈顧富貴之先後哉鹿皮翁殆公自託耳右三昔游趙云此篇名昔游蓋公紀游王屋山與東蒙山之實也王屋山有華蓋峯所謂華蓋君董先生必是實事詳味公之詩意可見矣於紀實中因使神仙事以稱之也昔謁華蓋君深求洞宮脚玉棺已上天白日亦寂寞後漢王喬為葉令後天下玉棺於堂前吏人摧排終不搖動喬曰天帝獨召我耶乃沐浴服飾寢其中蓋便立覆宿夕葬於城東土自成墳其夕縣中牛皆流汗喘乏而人無知者百姓乃為立廟號葉君祠暮升艮岑頂艮岑東北之岑也巾几猶未却趙云華蓋君所戴之巾所慿之几尚在弟子四五人入來淚俱落余時游名山發軔在逺壑離騷朝發軔於蒼梧又朝發軔於天津良覿違夙願謝靈運詩搔首訪行人引領兾良覿含凄尚寥廓林昏罷幽磬竟夜伏石閣王喬下天臺微月映皓鶴嵇康琴賦王喬披雲而下墜天台賦王喬控鶴以冲天何敬祖在昔王子喬有道發伊洛迢遞陵峻岳連翩御飛鶴喬却是周靈王太子王子晉子晉一名喬晨溪嚮虛駛歸徑行已昨豈辭青鞋胝趙云青鞋山行之具胝足病也莊子曰手足胼胝惆悵一作悵望金匕藥東蒙赴舊隱尚憶同志樂東蒙山名昔者先王以為東蒙主趙云此又叙其游東蒙山也公𤣥都壇歌寄元逸人曰故人昔隱東蒙峯又與李白同尋范十隱居曰余亦東蒙客憐君如弟兄豈所謂赴舊與冂同志樂者乎休事董先生董先生董京威也行吟常宿白社之中時乞市肆得碎繒結以自覆差趙云休事董先生則東蒙山必有董先生矣舊注便排作董京威自是已往神仙矣亦豈在東蒙山邪於今獨蕭索胡為客關塞道意久衰薄妻子亦何人丹砂負前諾晉葛洪求勾漏令以練丹砂雖悲髪變鬒章忍反一云鬢髪變謝𤣥暉詩有情知望鄉誰能鬒不變詩鬒髪如雲趙云髪之黑者曰鬒鬒髪變言變而為白也未憂筋力弱杖藜望清秋有興入廬霍謝靈運詩游當游羅浮行必息廬霍江淹擬靈運詩靈境信淹留賞心非徒設平明登雲峯杳與廬霍絶幽人易履道坦坦幽人貞吉陸士衡詩幽人在浚告孤雲亦羣游神物有所歸陶潛詠貧士詩萬族各有託孤雲獨無依趙云孤雲所以譬幽人之畸獨者也然以類相聚則終至於羣游蓋以神物有歸故爾又若志士之相遇也麟鳳在赤霄何當一來儀劉公幹詩鳳凰集南嶽徘徊孤竹根何時當來儀將顯聖明君書鳳凰來儀張協七命掛歸翮於赤霄之表漢書麟鳳在郊藪孔融曰麟鳳來頌聲作趙云以比賢人之宜來乃賈誼所謂鳳凰翔于千仭兮覽徳輝而下之也赤霄丹霄也楚辭曰載赤霄而凌太清張茂先鷦鷯賦序彼鷲鶚鵾鴻孔雀翡翠或凌赤霄之際然鳳凰云在赤霄可也而麟亦謂之下赤霄學者常疑之殊不知徐陵之生寶誌見之曰此兒天上石麒麟則麟自天而降亦宜在赤霄者矣此四句孤雲蓋公自比羣游以比同志之幽人麟鳳又以比同志之幽人所謂同志之幽人則下句惠荀輩徃與惠荀輩中年滄洲期杜補遺惠逺許詢也謝𤣥暉之宣城詩旣灌懷禄情復恊滄洲趣李善注楊雄賦云世有黄公者起於滄洲頥神養性故後人以滄洲為隱者所居或云隋圖經曰漢水逕琵琶谷至滄浪洲乃漁父悼歌處滄洲即滄浪洲也自趙云惠荀惜乎無考杜田補遺便指為惠逺許詢此是晉人今公詩云與惠荀輩則當時人其荀字是姓即非許詢蓋詢乃詢問之詢豈可彊差排邪又况公於惠逺兩謂之廬山逺未嘗摘用惠字也滄洲期言隱淪之所也詩人之言隱多用滄洲字杜田又引滄洲云即滄浪洲非是天髙無消息棄我忽若遺詩谷風將安將樂棄予如遺郭泰機詩衣工秉刀赤棄我忽若遺古詩棄我如遺跡内懼非道流幽人見瑕疵僖七年傳不汝瑕疵史道家者流洪濤隱語笑曹植汎舟越洪濤晉王凝之風賦驅東極之洪濤郭璞江賦鼓洪濤於赤岸木𤣥虛海賦洪濤瀾汗曹玭江賦洪濤突兀而横持蔡邕賦洪濤湧以沸騰晉蘇彦詩洪濤奔逸勞鼓枻蓬萊池孫楚賦舟人鼓枻而揚歌史漁父鼓枻而去崔嵬扶桑日山海經云大荒之中暘谷上有扶桑十日所浴九日居下枝一日居上枝皆載烏又山海經云日出𤾉谷浴於咸池拂於扶桑杜補遺東方朔十洲記曰扶桑在碧海中樹長數千丈一千餘圍兩兩同根更相依倚故名扶桑北史言有沙門慧深來荆州云扶桑國在大漢國二萬餘里其樹葉似桐所生如笋國人食之實似梨而赤其皮可為紙廣六尺餘照曜珊瑚枝梁元帝馬詩照曜珊瑚鞭餘見上送孔巢父注風帆倚翠蓋暮把東皇衣屈平九歌有東皇太一又孔蓋兮翠旌說苑鄂君汎舟於新陂之上張翠羽之蓋張平子東京賦翠羽之髙蓋曹植曰仰摭翠蓋陸士衡詩云翩翩翠蓋羅嚥漱元和津天台賦漱以華池之泉玉杜補遺黄庭經曰口為池太和官𠻳咽靈液災不忓注口中液水為玉津又中黄經曰但服元和除五穀必獲寥天得真籙注服元和謂咽津液所思煙霞微知名未足稱局促商山芝見上喜晴及洗兵馬注之趙云漢武帝曰局促効轉下駒所思旣在乎煙霞微則遺世絶物矣雖四皓知名猶為局促也五湖復浩蕩周禮揚州其浸五湖注太湖方五百里故曰五湖嵗暮有餘悲張景陽詩嵗暮懷百憂有志之士志未獲伸而時不我與則未嘗不以時逝為嘆也故多以嵗暮為之憂悲趙云鮑昭有古詩其題曰嵗暮悲佳人王深父云俗偷則人之無告者政不足以恤之也絶代有佳人李延年歌北方有佳人絶代而特立幽居在空谷一作山谷詩皎皎白駒在彼空谷自云良家子趙充國傳六郡良家子新添漢成帝選良家子充後宮零落依草木關中昔䘮敗兄弟遭殺戮官髙何足論不得收骨肉趙云此乃貴人之家詩人蓋不欲出其名氏耳世情惡衰歇萬事隨轉燭夫壻輕薄兒沈休文詩長安輕薄兒安趙云光武謂鄧禹曰孝孫素謹當是長輕薄兒誤之耳新人已如玉古詩燕趙多佳人美者顔如玉合昬尚知時鴛鴦不獨宿詩鴛鴦于飛鄭氏婚禮謁文讚曰鴛鴦鳥雄雌相類飛止相隨列異傳宋康王埋韓馮夫妻宿夕文木生鴛鴦雄雌各一常栖樹上晨夕交頸音聲感人莢杜補遺本草云合歡即夜合也人家多植之葉似皂槐極細而繁宻一名合昬陳藏器云其葉至暮即合故曰合昬文選陸倕刻漏銘曰合昬暮捲蓂莢晨生注合昬木名其葉夜合明舒禆雅云鴛鴦匹鳥有思者也說文稱鳳言鸛鵱鴛思是也崔豹古今注曰鴛鴦鳬類也雌雄未嘗相離人得其一一思而死故謂之匹鳥鴛性如此故先王慎於取之俗云雄鳴曰鴛雌鳴曰鴦稽聖賦曰雕鳩奚別鴛鴦奚雙獨趙云隋江揔閨怨詩曰池上鴛鴦不自帳中蘇合遽空然但見新人笑那聞舊人哭後漢竇𤣥舊妻與𤣥書別曰棄妻斥女敬白竇生卑賤鄙陋不如貴人妾日已逺彼日已親衣不厭新人不厭故悲不可忍怨不可去彼何何人而居我處𤣥以形貌絶異天子以公主妻之故云趙云此詩人之情也李白亦云新人如花雖可寵舊人似玉由來重古詩新人工織縑故人工織素在山泉水清出山泉水濁趙云此佳人怨其夫之辭晉孫綽三日蘭亭詩序曰古人以水喻性有旨哉斯談非以停之則清混之則濁耶情因所習而遷移物逐所遇而感興公句蓋言人之同處山谷幽寂之地則如泉水之在山無所撓之其清可知其夫之出山隨物流蕩遂為山下之濁泉矣侍婢賣珠迴牽蘿補茅屋東方朔傳董偃母以賣珠為事茅趙云侍婢既賣珠又使之牽蘿以補屋空谷寂矣茅屋有缺尚即補之其治家勤謹如此梁昭明太子開善寺法㑹詩牽蘿下石磴攀桂陟雲梁摘花不挿髪一作髻采柏動盈掬詩終朝采綠不盈一掬蘭趙云古詩穹谷饒芳采采不盈掬上句言不事粧飾此詩所謂自伯之東首如飛蓬豈無膏沐誰適為容之意下句以言幽閒之所為也天寒翠袖薄日暮倚修竹趙云上句則天色已寒而翠袖尚薄又似言其無衣且無心於服飾矣下句則其所思者逺矣蓋兄弟殺戮夫壻輕薄豈不感慨於懷哉赤谷西崦人家躋險不自安一作喧出郊已清目溪迴日氣暖逕轉山田熟謝靈運詩躋險築幽居枚乗七發云依絶區兮臨迴溪鳥雀依茅茨藩籬帶松菊陶淵明三徑就荒松菊猶存宋玉曰藩籬之鷃料天地之髙趙云左傳如鷹鸇之逐鳥雀堯土階三尺茅茨不剪如行武陵暮欲問桃源宿一本作桃花陶潛桃源記曰晉太康中武陵人捕魚從溪而行忽逢桃花林夾兩岸數百步無雜木芳華鮮美落英繽紛漁人異之前行窮林林盡見山有小口髣髴有光便捨舟歩入初極狹行四五十步忽然開朗邑屋連接雞犬相聞男女被髪怡然自樂見漁人大驚問所從來要還為設酒食云先世避秦難率妻子來此遂與外隔絶不知有漢無論魏晉也既出自太守太守遣人隨而尋之迷不復得路西枝村尋置草堂地夜宿贊公土室二首出郭眄細岑披榛得微路天台賦云披荒榛之䝉籠趙景真書步澤求蹊披榛覔路溪行一流水曲折方屢渡贊公湯休徒惠休上人姓湯好静心迹素昨枉霞上作盛論巖中趣後漢旌車之招相望於巖中怡然共攜手恣意同逺歩捫蘿澁先登天台賦攬樛木之長蘿謝靈運蔓弱豈可捫陟巘眩反顧要求陽岡暖顔延年陽陵團精氣陰谷或煙寒謝靈運朝旦發陽崖景落憇陰峯苦涉隂嶺沍惆悵老大藤沉吟屈蟠樹卜居意未展杖䇿迴且暮屈原卜居左太冲杖䇿招隱士趙云太公避狄杖䇿去邠曽巔一作天餘落日草蔓已多露謝靈運築觀基曽巔又云日落山照耀盧子諒凝露霑蔓草詩謂行多露右一天寒鳥已歸月出山更静山一作人更一作已陶潛衆鳥相與飛未夕復來歸趙云禮記天寒既至詩月出皎兮土室延白光松門耿疎影謝靈運攀崖照石鏡牽葉入松門躋攀倦日短語樂寄夜永謝靈運常苦夏日短天台賦恣語樂以終日趙云天寒則時在冬故用日短尚書日短星昴明燃林中薪暗汲石底一作泉井大師京國舊德業天機秉莊子其嗜欲深者其天機淺從來支許游支遁字道林講維摩經遁為法師許詢為都講遁衆謂無以歴難詢設一難以調遁不能復通趙云支遁以比贊公許詢公以自比興趣江湖迥數竒謫關塞李廣數竒孟康曰竒隻不耦也如淳曰數為匈奴所敗為竒不耦師古曰言廣命隻不耦合也孟說是杜正謬師古既以數竒為命隻不耦合則數乃命數之數非疏數之數也而音作所角反者蓋傳印之誤也宋景文公筆錄云孫宣公奭當世大儒亦以數竒為朔余後得江南漢書本乃所具反以此考之殆傳印者誤以具為角也因是詩注猶仍舊音故特辨之歎趙云李善注徐敬業古詩寄言封侯者數竒良可下注如淳曰數所具切宋景文公偶未見也道廣存箕潁太丘道廣廣則難周謝靈運徐幹詩序云幹有箕潁之心何知戎馬閒復接塵事屏幽尋豈一路逺色有諸嶺晨光稍朦朧更越西南頂陶淵明恨晨光之熹微寄贊上人一昨陪錫杖天台賦振金䇿之鈴鈴注云金䇿錫杖卜隣南山幽年侵腰脚衰未便陰崖秋趙云言初欲於贊公土室之處卜隣時為年齒所侵而腰脚衰弱則其地為陰崖而當時之秋非所便安要須擇地也晉潘岳西征賦云眺華岳之陰崖重岡北面起竟日陽光留茅屋買兼土買一作置斯焉心所求趙云四句乃可卜之地蓋山北面髙起而障日故陽光為之留陽光者則非若陰崖之多䕃濕故可結茅屋且兼其地土買之乃心所求者也近聞西枝西有谷杉黍一作漆稠亭午頗和暖石田又足收天台賦羲和亭午明杜補遺御覽載綦要云日光曰景日月之光通曰景日景曰晷日氣曰晛日初出曰旭曰昕曰晞大明曰昕晞乾也日温曰煦在午曰亭午在未曰昳日晚曰旰日將落曰薄暮日西落光返景在下曰倒景左傳云吳將伐齊子胥曰夫得志於齊猶獲石田也無所用之今云石田足收則雖無用之田猶可種而獲也子美醉時歌又有􅂒田茅屋荒蒼苔之句趙云八句則於重岡北面起處聞得西枝村之西其谷中杉漆之木稠多而和暖其石田又可種便可於此結茅屋矣當期塞雨乾宿昔齒疾瘳徘徊虎穴上新添班超云不入虎穴安得虎子面勢龍泓頭趙云考工記云審曲面勢言審其曲直面其形勢也紫荆具茶茗遙路通林丘與子成二老來徃亦風流謝靈運俶裝反柴荆孫綽風流為一時冠趙云四句則公與贊老旣為隣矣可茶茗相交徃來通好也孟子稱太公伯夷曰二老者天下之大老也太平寺泉眼招提憑髙岡見第一巻奉先寺注疎散連草莽景帝紀廣薦草莽草稠曰薦深曰莽出泉枯柳根汲引嵗月古石閒見海眼趙云成都記云石笋之下是海眼又劉崇逺作金華子又云北海郡因發地得五銖錢取之不盡得一石記云此是海眼以錢鎮之天畔縈水府新添小說潤州為中源水府杜云張纘南征賦曽潭水府廣深尺丈閒宴息敢輕侮青白二小虵幽姿可時覩如絲氣或上爛漫為雲雨公羊傳曰觸石而出膚寸而合不崇朝而徧天下者太山之雲也趙云二小虵蓋實事也其吐氣則為雨舊注非是山頭到山下鑿井不盡土趙云自山頭至山下皆石而已不能窮盡至有土處也鑿井之難如此而得此泉眼為可美矣取供十方僧香美勝牛乳趙云佛經每以牛乳供佛今云泉之香美勝之所以重言之也北風起寒文弱藻舒翠縷舒一作勝明涵客衣浄細蕩林影趣何當宅下流餘潤通藥圃三春濕黄精一食生毛羽嵇康書又聞道士遺言餌术黄精令人久壽意甚信之杜補遺神農本草黄精乆服輕身延年日華子云黄精九蒸九曝服之駐顔博物志云天姥謂黄帝曰太陽之草名黄精餌之長生太陰之草名鈎吻入口立死人信鈎吻之殺人不信黄精之益壽不亦惑乎真誥云衡山中有學道者張禮正冶明期二人禮正以漢末在山中服黄精顔色丁壯常如年四十時後乗雲升天今在方諸飈室為上仙魏文帝詩服之四五日身體生羽翼夢李白二首死别已吞聲生別常惻惻宋鮑昭行路難吞聲躑躅不敢言蘇武詩淚為生別滋歐陽建惻惻心中酸楚詞悲莫悲兮生別離謝靈運惻惻廣陵㪚江南瘴癘地逐客無消息劉孝標流離大海之南寄命瘴癘之地李斯為秦逐客趙云白坐永王璘之累長流夜郎㑹赦還潯陽坐事下獄潯陽今之江州也屬江南東路故云故人入我夢明我長相憶樂府云夢見已在旁忽覺在他鄉上有加飡食下有長相憶恐非平生魂路逺不可測魂來楓林青楚辭湛湛江水兮上有楓阮籍湛湛長江水上有楓樹林魂返關塞黑趙云白謫在南其所經歴乃楓林也在秦與公相見故其去又歴關塞也君今在羅網何以有羽翼落月滿屋梁猶疑照顔色宋玉神女賦若白日初出照屋梁若明月舒其光西清詩話云李太白歴見司馬子微謝自然賀知章或以為可與神遊八極之表或以謫謫仙人其風神超邁英爽可知後世詞人狀者多矣亦間於丹青見之俱不若少陵云落月滿屋梁猶疑照顔色熟味之百世之下想見丰采此與李太白傳神詩也水深波浪濶無使蛟龍得續齊諧記楚屈原五月五日投汨羅而死楚人哀之每至此日祭之漢建武中長沙人區回見一人自稱三閭大夫曰君嘗見祭甚善然為蛟龍所苦今若有惠可以棟葉塞之縛以五色絲此二物蛟龍所畏也趙云因借夢寄以憂之且戒之也言蛟龍則又因歴江湖而言之也與下篇舟楫恐失墜同意舊注所引非是右一浮雲終日行游子久不至古詩浮雲蔽白日游子不反顧趙云蓋言游子之拘繫不若浮雲之疎散也三夜頻夢君情親見君意趙云其身雖不至而三夜入夢斯為情親矣告歸常局促苦道來不易趙云漢景帝云局促効轅下駒江湖多風波一云秋多風舟楫恐失墜出門搔白首若負平生志冠蓋滿京華斯人獨顦顇左太冲詩濟濟京城内赫赫王侯居冠蓋陰四街朱輪竟長衢寂寂楊子宅門無卿相輿寥寥空宇内所講在𤣥虛孰云網恢恢將老身一作才反累老子天網恢恢疎而不漏趙云此公閔白之辭也千秋萬嵗名寂寞身後事張翰曰使我有身後名不如即時一杯酒阮籍詩千秋百嵗後榮名安所之趙云公以事理寄之一嘆而已漢有鼓吹鐃歌十八曲其上之回曲有云千秋萬嵗樂無極右二有懷台州鄭十八司户䖍時坐汙賊貶台州司户天台山名隔三江一云江海風浪無晨暮趙云水經載韋昭以松江浙江浦陽江為三江也而天台在其外矣鄭公縱得歸老病不識路沈休文夢中不識路何以慰相思相趙云暗使韓非子中事六國時張敏與髙惠為友每思不能得見敏便於夢中徃尋但行至半道即迷不知路遂迴如此者三昔如水上鷗今如罝中兎詩肅肅兎罝曰趙云何遜詩可憐雙白鷗朝夕水上游性命由他人悲辛但狂顧山鬼獨一脚一足曰䕫魍魎也薛云楚詞屈原九章歌句有山鬼蝮虵長如樹招魂蝮虵蓁蓁雄虺九首呼號旁孤城嵗月誰與度從來禦魑魅多為才名誤文十八年舜流四凶族渾敦窮竒檮杌饕餮投諸四裔以禦魑魅公趙云左傳曰入山不逢不若魑魅魍魎莫能逢旃而寄李白詩云魑魅喜人過亦使此事多為才名誤句法亦古詩多為藥所誤也夫子嵇阮流更被時俗惡嵇康阮籍嵇康書曰阮嗣宗為禮法之士所繩疾之如讎海隅微小吏眼暗髪垂素潘安仁秋興賦素髪颯以垂領黄㡌映一云鳩杖近青袍非供折腰具陶潛焉能折腰閭里小兒杜補遺後漢禮儀志八十九十賜玉杖長尺以鳩鳥為飾故又謂之鳩杖鳩者不噎之鳥欲老人不噎鳩趙云鳩杖字一作黄㡌非是蓋操船之人曰黄㡌耳杖老人之杖耳在朝廷以更老待之而乃映小官之青袍所以非供折腰具也平生一杯酒見我故人遇相望無所成乾坤莽迴互沈休文平生少年日分手易前期勿言一樽酒明日難重持古詩瀟湘逢故人可趙云張翰曰不如即時一杯酒暗用謝眺詩山川不夢況乃故人杯也公言徒有平生一杯酒欲見我故人與之相遇而同飲今不可見矣故有末句相望無所成而天地變移以言時事之反覆矣遣興五首蟄龍三冬卧老鸖萬里心易龍虵之蟄以存身也舞鸖賦結長悲於萬里趙云東方朔云三冬文史足用諸葛孔明卧龍以比賢俊之未遇龍卧而終起鸖雖老而終逺飛則賢俊雖未遇而終用也昔時賢俊人未遇猶視今蘭亭序後之視今猶今之視昔趙云蓋言視今之未遇者則可以推知昔時之賢俊也京房傳臣恐後之視今猶今之視前也嵇康不得死一云且不死孔明有知音江淹恨賦中散下獄神氣激揚徐庻薦孔明趙云嵇康與吕安相善二人素為鍾㑹所不喜安以家事繫獄辭相證引遂復收康棄市所為不得其死也徐庶薦孔明於劉先主先主三顧其草廬起之為國相此為有知音也公詩謂有才者遇邪以嵇康之才而不得其死謂有才者不遇邪而孔明卒有知音則在遇不遇而已又如壠厎松用舍在所尋古詩鬱鬱澗厎松大哉霜雪榦嵗久為枯林傷有才而不見用而趙云歎松有霜雪榦不用為枯木矣莊子曰孔子云天寒既至霜露既降吾是以知松柏之茂也右一昔者龎德公未曽入州府襄陽耆舊間處士節獨苦豈無濟時䇿一作術終竟畏羅罟一云終嵗畏罪罟林茂鳥有歸水深魚知聚舉家隱鹿門劉表焉得取後漢逸民傳龎德公者南郡襄陽人也未嘗入州府夫妻相敬如賓荆州刺史劉表數延請不能屈乃就候之謂曰夫保一身孰若保全天下乎龎公笑曰鳩鵠巢於髙林之上暮而得所栖黿鼉穴於深淵之下夕而得所宿夫趨舍行止亦人之巢穴也且各得其栖宿而已天下非所保也因釋耕於壠上而妻子耘於前表指而問曰先生若居畎畝而不肯官禄後世何以遺子孫乎龎公曰世人皆遺之以危今獨遺之以安雖所遺不同未為無所遺也表歎息而去後遂攜其妻子登鹿門山採藥不返侯杜補遺襄陽記云鹿門山舊名蘇嶺山建武中襄陽習郁立神祠於山刻二石鹿夾神道口俗因謂之鹿門廟遂以廟名山右二我今日夜憂諸弟各異方不知死與生何況道路長蘇武詩良友逺別離各在天一方山海隔中州相去悠且長古詩相去萬餘里各在天一涯道路阻且長㑹面安可知避冦一分散飢寒永相望豈無柴門歸欲出畏虎狼趙云陶淵明田舍詩云長吟掩柴門聊為壠畝民今公所言指其身所居之屋歸則望諸弟之歸也欲出畏虎狼則諸弟之出畏虎狼而不能也仰看雲中鴈禽鳥亦有行魏文帝仰看明月光傅休弈詩仰觀南鴈翔右三蓬生非無根漂蕩隨髙風天寒落萬里不復歸本叢客子念故宅三年門巷空曹子建轉蓬離本根飄颻隨長風何意迴飈舉吹我入雲中髙髙上無極天路安可窮類此游客子捐軀逺從戎一趙云說苑魯哀公曰秋蓬惡其本根美其枝葉秋風起根本拔矣故子建與公皆得用之悵望但烽火戎車滿關東生涯能幾何常在覉旅中匈奴傳烽火通甘泉宫詩戎車既屇右四昔在洛陽時親友相追攀送客東郊道遨遊宿南山曹子建鬭雞東郊道驅上彼南山藹趙云蓋傚張景陽詠史詩昔在西京時朝野多歡娛藹東都門羣公祖二踈也詩以遨以遊謝靈運擬曹植詩序云公子不及世事但美遨遊煙霞阻長河樹羽成臯間有瞽崇牙樹羽置羽也成臯在鞏洛間羽羽旗也趙云言鞏洛之亂成臯在鞏洛間也迴首載酒地豈無一日還前漢揚雄傳好事者載酒過之陶潛親朋好事或載酒肴而徃丈夫貴壯健慘戚非朱顔右五遣興五首朔風飄胡鴈慘澹帶砂礫鮑明逺疾風衝塞起砂礫自飛揚又胡風吹朔雪劉公幹凉風吹砂礫長林何蕭蕭秋草萋更碧古詩回風動地起秋草萋已緑謝𤣥暉春草秋更綠動趙云曹植四言云仰彼朔風王正長云朔風秋草其後謝𤣥暉朔風吹飛雨北里富薰天髙樓夜吹笛左太冲南鄰擊鍾磬北里吹笙竿楊雄燎薰皇天古詩西北有髙樓上有絃歌聲焉知南隣客九月猶絺綌精曰絺麤曰綌父杜補遺隋袁充少時黨過門方冬充尚衣葛戱充曰絺兮綌兮凄其以風充曰惟絺惟綌服之無斁南鄰之客非服絺綌而無斁也蓋貧而未有禦寒之服故耳子美遣遇詩又曰自喜遂生理花時甘緼袍暮春者奉服既成花時而緼袍豈非無春服歟當趙云以九月授衣而猶絺綌花時已暖有春服而甘緼袍則公之貧如此右一長陵銃頭兒出獵待明發秦武安君頭小而銳寐趙云詩云明發不騂弓金𤓰鏑白馬蹴微雪趙云言鏑上有金𤓰之飾非富貴人之箭不然也蹴字見上髙都䕶騘馬行注未知所馳逐但見暮光滅趙云言出獵之子馳逐未厭而日晚當歸也歸來懸兩狼門户有旌節詩並驅從兩狼兮楊國忠以劒南旌節導駕趙云言其獵有所獲乃是貴家也旌節貴人所建而羅列於門者也右二漆有用而割膏以明自煎蘭摧白露下桂拆秋風前莊子人間世山木自冦也膏火自煎也桂可食故伐之漆可用故割之兩龔死時有老父來弔哭甚哀既而曰嗟虖薰以香自燒膏以明自銷龔生竟夭天年非吾徒也阮籍詩膏火自煎燒多財為患害世說毛伯成負其才氣稱曰寧為蘭摧玉折不作蕭敷艾榮府中羅舊尹沙道尚依然故事凡拜相之後禮絶班行府縣載沙填路自私第至於城東街名沙堤赫赫蕭京兆今為時所憐前漢五行志成帝時童謠曰邪徑敗良田讒口亂善人桂樹華不實黄雀巢其顚故為人所羡今為人所憐蕭望之嘗為左馮翊後飲鴆自殺又盧諶云何武不赫赫遺愛常在人趙云東坡先生云明皇雖誅蕭至忠然常懷之侯君集云蹭蹬至此至忠亦蹭蹬者也故杜子美云赫赫蕭京兆今為時所憐因先生之言乃知此篇全為蕭至忠而言也按本傳至忠始在朝有夙望容止閑敏見推為名臣斯可比之漆膏蘭桂者矣又云外方直糾摘不法而内無守觀時輕重而去就之參太平公主逆謀主敗至忠遁入南山數日捕誅之考其平生景龍元年九月相睿宗景云元年六月貶是月復相七月罷明皇開元元年正月復相七月誅此漆之割膏之煎蘭之摧桂之折也雖已誅矣然明皇賢其為人心愛之終不忘後得源乾曜亟用之謂髙力士曰若知吾進源乾曜乎吾以其貌言似蕭至忠力士曰彼不嘗負陛下乎帝曰至忠誠國器但晚謬爾其始不謂之賢哉此可以推見當杜公時猶為人所憐也舊注便差排作蕭望之非是右三猛虎憑其威徃徃遭急縛曹操謂吕布縛虎不得不急雷吼徒咆哮枝撑已在脚忽看皮寢處無復晴閃爍左傳臣食其肉而寢處其皮矣杜補遺襄二十八年子雅子尾怒盧蒲嫳曰譬之如禽獸吾寢處之矣注言能殺而席其皮人有甚於斯足以勸元惡趙云書元惡太憝退之猛虎行亦類此右四朝逢富家葬前後皆輝光共指親戚大緦麻百夫行送者各有死不須羡其强君看束縛去亦得歸山崗吳人殺諸葛恪以籧篨褁屍束縛以篾棄之於石子崗知師云緦麻服之疎逺者尚有百夫行其富盛可右五遣興五首天用莫如龍有時繫扶桑頓㘘海徒湧神人身更長漢食貨志天用莫如龍地用莫如馬人用莫如龜郭璞六龍安可頓運流有代謝杜補遺淮南子曰日出于暘谷浴于咸池拂於扶桑是謂晨明經於隅泉是謂髙舂頓于連石是謂下舂爰止羲和爰息六螭是謂懸車薄於虞泉是謂黄昬注扶桑東方之野六螭即六龍也日乗車駕以六龍羲和馭之薄於虞泉而回也日賦云升咸池而擢秀奄六螭而息㘘又曹子建與吳季重書曰日不我與曜靈急節思抑六龍之首頓羲和之㘘注六龍日車羲和日御龍趙云繫扶桑則楚詞劉向九歎之逺逝篇有曰維六於扶桑日賦乃本朝吳淑所為說者謂神人指言羲和日經海底出入方頓㘘而經海則羲和御車同入於海海水雖湧波而羲和身自増長謂之神人不足恠也蓋如釋氏之摩茘支天佛身湧遮日之類性命茍不存英雄徒自彊吞聲勿復道新添王育徃事吞聲拊膺不復道真宰意茫茫趙云言人生浮脆性命不存日運不停則徒自為英雄耳故吞聲勿道莫測真宰之意茫茫然也鮑昭詩云吞聲躑躅不敢言莊子云若有真宰存焉師云楊子曰龍以不制為龍今言繫則彼制矣蓋譏怙勢強暴者右一地用莫如馬無良復誰記趙云易曰牝馬地類行地無疆一曰良王也言世無王良豈知記省地用之馬乎師云謝宣逺詩四逹雖平直蹇步愧無良此日千里鳴追風可君意趙云追風秦始皇七馬之一名此言若望王良而鳴矣可見無良是王良也君看渥洼見上注種態與駑駘異不離蹄齧間逍遙有能事莊子馬蹄篇趙云一曰蹄分皆相蹄齧如魏文帝齧膝之齧蹄人齧人言馬之劣又曰蹄則馬蹄可以踐霜雪齧則齕草飲水之謂已上各有義理言馬之閒暇而能事可以行千里也易天下之能事畢矣右二陶潛避俗翁未必能達道觀其著詩集頗亦恨枯槁趙云因陶潛而有所悟故作此詩非直詆陶也陶集中固有恨枯槁之語矣如怨詩楚調云夏日長抱飢寒夜無被眠嵗暮和張常侍云屢闕清酤至無以樂當年飲酒詩云顔淵稱為仁長飢至於老雖留身後名一生亦枯槁又曰意抱困窮節飢寒飽所更有㑹而作曰弱年逢家乏老至更長飢惄如亞九飯當暑厭寒衣雜詩云豈期過滿腹但願飽粳糧禦冬乏大布麤絺以應陽正爾不能得哀哉亦可傷斯不謂之頗亦恨枯槁也枯槁字楚辭漁父篇屈原形容枯槁而莊子有枯槁之士逹生豈是足黙識蓋不早易曰黙而識之馬融逹生任性不好儒者之節有子贒與愚何其掛懷抱杜補遺淵明文有命子詩曰夙興夜寐願爾斯才爾之不才亦已焉哉又責子詩曰雖有五男兒㧾不好紙筆天運茍如此且進杯中物子美謂掛懷抱者此也王立之詩話云東坡言山谷為余言杜子美困於三蜀蓋不知者詬病以為拙於生事又徃徃譏宗文宗武失學故寄之淵明以解嘲其詩名遣興可解也俗人不領便以為譏病淵明所謂癡人前不得說夢右三賀公賀知章雅吳語杜補遺世説劉真長始見王丞相時盛暑丞相以腹熨弹棊局曰何乃渹音虛觥反吳人謂冷為渹劉既出人問見王公云何劉曰未見他異唯聞作吳語爾又語林曰真長云丞相何竒止能作吳語及細唾也在位常清狂昌邑王傳清狂不惠凡狂者陰陽脉盡濁今此人不狂似狂者故言清狂也或曰色理清徐而心不惠曰清狂如今白癡也上疏乞骸骨黄冠歸故鄉薛云禮記郊特牲曰野夫黄冠草服也言知章乞為道士故云黄冠爽氣不可致王徽之字子猷桓公嘗謂徽之曰卿在府日久比當相料理徽之初不酬答直髙視以手板挂頰云西山朝來致有爽氣耳斯人今則亡顔淵今也則亡山陰一茅宇江海日淒涼知章事明皇為秘書監自號四明狂客及秘書外監晚節尤誕放天寶初病夢游帝居及寤遂請為道士歸故里以宅為千秋觀表求湖數頃為放生池有詔賜鏡湖一曲鏡湖在㑹稽山陰想知章結茅於其旁矣右四吾憐孟浩然短褐即長夜史記寒者利短褐陸士衡送子長夜臺王仲宣長夜何冥冥云趙云范曅傅曅在獄中為上題扇去白日之炤炤即長夜之悠悠賦詩何必多徃徃凌鮑謝鮑照謝眺詩趙云徃徃之義忽忽如此也應璩百一云朋等稱才學徃徃見歎譽清江空舊魚趙云是思浩然平生之事浩然嘗有詩曰試垂竹竿釣果見查頭鯿今言清江之内空有舊魚而人不見也春雨餘甘蔗趙云王士源為浩然詩集序云灌園藝圃以全髙然則春雨餘甘蔗豈浩然嘗自營蔗區乎惜無所明見每望東南雲令人幾悲吒杜補遺郭璞游仙詩臨川哀年邁撫心獨悲吒不趙云浩然襄陽人襄陽在秦州之東南末句思而見故望雲而空悲吒耳右五前出塞九首趙云此詩與後出塞皆代邊士之作也戚戚去故里悠悠赴交河陸士衡悠悠行邁逺戚戚憂思深古詩戚戚何所迫又悠悠隔山陂又囬車駕言邁悠悠涉道長繞杜補遺按唐西州交河在伊州西七百里河水分流城下因以名之漢侯應上書云車師前國王治交河城公家有程期亡命嬰禍羅程限期㑹也漢竇榮亡命山林則趙云若畏公家之期程而逃亡其命必有收捕禍所及矣君已富土境開邊一何多見上今人尚開邊注棄絶父母恩吞聲行負戈陸士衡夕息常負戈右一出門日巳逺不受徒旅欺骨肉恩豈斷蘇武詩骨肉緣枝葉趙云詩骨肉離散男兒死無時走馬脫轡頭木蘭曲云南市買轡頭手中挑青絲梁簡文帝紫騮馬詩青絲懸玉蹬又云宛轉青絲鞚捷下萬仭岡俯身試搴旗曹子建仰手接飛猱俯身散馬蹄狡捷過猴猱勇剽若豹螭左太沖振衣千仭岡史斬將搴旗右二磨刀嗚咽水嗚一作呼水赤刄傷手欲輕腸斷聲心緒亂已久鮑昭東門行離聲斷客情又行子心腸斷隴杜補遺辛氏三秦記曰隴山天水大坂也俗歌云頭流水嗚聲幽咽遙望秦川肝腸斷絶故名嗚咽水又云東人西役升此而顧莫不悲思其歌云隴頭泉水流離西下念我此行飄然曠野登髙望逺涕淚雙墮斷趙云以磨刀於水刀刄傷手則邊士之辛苦尤甚腸聲指言嗚咽水也言心緒久亂欲不愁而不可得也丈夫誓許國憤惋復何有功名圖麒麟戰骨當速朽麒麟閣宣帝圖畫功臣於此閣也宋司馬造石椁孔子曰死不如速朽趙云以功名自期為丈夫之事矣右三送徒既有長逺戍亦有身高祖以亭長為縣送徒驪山生死向前去不勞吏怒嗔路逢相識人附書與六親哀哉兩决絶不復同苦辛國忠領劍南募使戍戍瀘南餉路險乏舉無還者人人思亂此詩所以作趙云此詩題名出塞首篇曰悠悠赴交河大率皆戍西邊耳舊注豈可臆度便差排作楊國忠耶右四迢迢萬餘里領我赴三軍軍中異苦樂主將寧盡聞王仲宣從軍詩從軍有苦樂但問所從誰任趙云古詩迢迢牽牛星吳書張紘傳曰此乃偏將之非主將之宜隔河見胡騎倐忽數百羣趙云似指言吐蕃之兵也我始為奴僕幾時樹功勲漢衞青奮於奴僕右五挽弓當挽强用箭當用長晁錯云努不可以及逺與短兵同射不能中與亡矢同中不能入與亡鏃同此將不省兵之過趙云以言士卒之各矜其能射人先射馬擒賊先擒王前漢匈奴傳月氏欲殺冐頓冐頓奔歸頭曼令將萬騎冐頓乃作鳴鏑習勒其騎射令曰鳴鏑所射而不悉射者斬後冐頓以鳴鏑射單于善馬左右悉射之冐頓知其可用遂以鳴鏑射頭曼左右皆隨之遂殺頭曼而自立此趙云以言士卒之各欲致其功詩人之能道事也殺人亦有限列國自有疆茍能制侵陵豈在多殺傷趙云孟子曰定於一孰能一之不嗜殺人者能一之而喜開邊者乃好大喜功之主則公之詩豈不益於教化乎右六驅馬天雨雪軍行入高山逕危抱寒石指落曽氷間陸士衡驅馬陟陰山山陰馬不前仰憑積雪巖俯涉堅氷淵杜補遺前漢匈奴傳匈奴攻太原高帝自將兵擊之㑹冬雨雪卒之墮指者十二三已去漢月逺何時築城還浮雲暮南征可望不可攀趙云使周王褒燕歌行無復漢地關山月唯有漠北薊城雲之意蓋入胡地則逺於漢月所徃者西北則美雲之南征也宋之問詩云明河可望不可親右七單于冦我壘百里風塵昏王僧達千里黄沙昏雄劔四五動彼軍為我奔雷焕得雙劔于酆城劔有雄雌薛云吳越春秋吳王闔閭使干將造劔二枚一干將二鏌鋣鏌鋣者干將之妻干將作劔金鐡之精未肯流干將夫婦乃斷髪剪爪投之爐中金鐵乃濡遂以成劔陽曰干將而作龜文隂曰鏌鋣而作漫理雄猶陽也烈士傳作雌劔雄劔杜正謬烈士傳曰眉間尺者謂眉間濶一尺也楚人干將鏌鋣之子楚王夫人常於夏納涼而抱鐡柱心有所感遂懷孕後産一鐡楚王命鏌鋣鑄此精為雙劔三年乃成劔一雌一雄鏌鋣乃留雄而以雌進劔在匣中常有悲鳴王問羣臣羣臣對曰劔有雌雄鳴者雌憶其雄也王大怒即收鏌鋣殺之眉間尺乃為父殺楚王新添烈士傳劔有雌雄雄干將雌莫邪越絶書曰楚王作鐡劔三枚晉鄭聞而求之不得興師圍城之城三年不解楚引太阿之劔麾之三軍破敗士卒迷惑流血千里虜其名王歸繫頸授轅門曹子建求自試表昔賈誼求試屬國請繫單于之頸而制其命終軍以妙年使越欲得長纓係其王羈致北闕轅門以車為轅門也杜補遺前漢匈奴傳武帝使霍去病衞青操兵臨瀚海虜名王貴人以百數宣帝紀單于遣其名王奉獻注師古名王謂有大名以别諸小王也行趙云周禮掌舍掌王㑹同之舍設車宫轅門注謂王止宿險阻之處備非常次車以為藩則仰車以其轅表門其後行師則主將遂有轅門之制也潛身備行列一勝何足論趙云此詩士卒有功而不欲論豈當時主將之艱故邪右八從軍十年餘能無分寸功衆人貴茍得欲語羞雷同曲禮曰毋雷同注雷之發聲物無不同時應者人之言當各由已不當同然也趙云此又代士卒有功而不欲論之詩中原有鬭争況在狄與戎詩戎狄是膺西戎北狄也丈夫四方志安可辭固窮禮射義男子生以桑弧蓬矢射天地四方示男子之有事也語君子固窮趙棗彦道雜詩士生則弧有事在四方右九後出塞五首鮑云天寶十四年乙未三月壬午安禄山及契丹戰於潢水敗之故有後出塞五首為兵兵赴漁陽也男兒生世間及壯當封侯後漢班超常輟業投筆歎曰無他志畧猶當効傅介子張騫立功異域以取封侯安能久事筆硯間乎梁竦丈夫生當封侯戰伐有功業焉能守舊丘趙云言不可無所展用也鮑明逺結客少年場云去鄉三十載復得還舊丘召募赴薊門軍動不可留鮑明逺始隨張校尉召募到河源趙作占募吳志云中郎將周祗乞於鄱陽占募蓋占謂自隐度而應募也千金買馬鞍一作鞭百金裝刀頭唐刺史見觀察使皆靴足握刀頭候路左妻趙云倣木蘭歌西市買馬鞭南市買轡頭又梁范靖沈氏昭君怨云千今畫雲鬢百萬冩娥眉也舊注引唐刺史見觀察使皆握刀頭候路雖有證刀頭字非是若刀頭所先則古樂府有何當大刀頭矣閭里送我行親戚擁道周班白居上列酒酣進庶羞班白者不負戴於道路矣曹子建緩帶傾庶羞之趙云詩有杕之杜生於道周周禮庖人供䘮紀庶羞少年別有贈含笑看吳鈎鮑明逺結客少年行騘馬金絡頭錦帶佩吳鈎吳越春秋王作鈎淬以人血試之以人也薛云吳越春秋吳王允聘歐冶子作名劔五一曰純鈎二曰湛盧三曰豪曹四曰魚腸五曰巨闕秦客薛燭善相鈎視之燭曰光乎如屈陽之華沉沉如芙蓉始生於湖觀其光如水溢于塘此名純鈎吳鈎即純鈎也杜正謬按吳越春秋闔閭内傳曰闔閭既寶莫邪之劔復命於國中作金鈎令曰能為善鈎者賞之百金吳作鈎者甚衆而有人貪王之重賞也殺其二子血釁金遂成二鈎獻于闔閭而求賞王曰何以異於衆劔乎作鈎者曰吾之作鈎殺二子而釁之王鈎甚衆形體相類不知所在鈎師向鈎呼二子之名吳鴻􅂒稽我在於此王不知汝之神也聲絶於口兩鈎飛出王驚曰寡人誠負於子乃賞百金遂服而不離身薛氏以純鈎為吳鈎蓋純鈎劔名非鈎也故左太沖吳都賦云吳鈎越棘純鈎湛盧則純鈎與吳鈎自為兩物耳之趙云吳鈎刀名也刃彎今南蠻用謂之葛黨刀義或然矣右一朝進東門營夏官大司馬帥以門名疏古者軍將蓋為營治於國門魯有東門襄仲宋有桐門右師皆上卿為將軍者士趙云此言河陽府士卒東門營自是所起卒處東門之營也暮上河陽橋李陵詩攜手上河梁游子暮何之王仲宣從軍詩朝發鄴都橋暮濟白馬津落日照大旗馬鳴風蕭蕭周禮司常建九旗以待國事車攻蕭蕭馬鳴悠悠斾旌言不讙譁也荆軻歌風蕭蕭兮易水寒平沙列萬幕部伍各見招幕府見上送高三十五詩注程不識正部曲行伍營陣擊刁斗人趙云士卒之多則將各有幕故一部伍之各相招認以居其幕也中天懸明月令嚴夜寂寥子虛賦曵明月之珠旗不趙云但見月懸中天正照此夜而人囂譁則令嚴可知也東坡先生詩曰令嚴鐘鼓三更月乃用此也悲笳數聲動壯士惨不驕李陵書胡笳互動牧馬悲鳴借問大將誰恐是霍嫖姚霍去病為嫖姚校尉服䖍曰嫖姚勁疾之貌荀恱漢記作票字霍去病後為驃騎將軍尚取嫖姚之字耳今讀者音漂遙不當其義趙云句法使曹子建七哀詩借問歎者誰言是客子妻又郭景純游仙詩借問此何誰云是鬼谷子也嫖姚公作平聲字使蓋未經顔師牧音以前相承作服䖍平聲字讀耳蓋如庾信詠屏風詩有云急節迎秋韻新聲入手調寒衣須及早將寄霍嫖姚則所相承者然也前漢漢王問大將誰也右二古人重守邊今人重髙勲重守邊保其疆場而已重髙勲則邀功而生事此後世所以有窮兵黷武之君也豈知英雄主出師亘長雲詩我出我車大趙云此譏好喜功之主也今人所以重高勲者以英雄矣主出師之多連亘長雲則髙勲不可不建六合已一家四夷且孤軍髙祖曰天下同姓一家愼無反又天子以六合為家遂使貔虎士奮身勇所聞牧誓如虎如貔患趙云六合一家則内外無患矣内外無則四夷之軍孤如此則不必用兵而尚用之不已故士卒皆奮起勇徃其所聞之處矣後所謂大荒𤣥冥北是也拔劔擊大荒日收胡馬羣見三巻囬畧大荒來注髙祖紀拔劔擊柱古詩胡馬嘶北風趙云大荒西邊之地皆是矣古有大荒西經之書也誓聞𤣥冥北月令其神𤣥冥持以奉吾君獻功也則趙云𤣥冥北方之神𤣥冥北盡𤣥冥所主之北地也右三獻凱周禮注凱獻功之樂日繼踵兩蕃静無虞趙云西北已寧也漁陽豪俠地擊鼓吹笙竽漁陽北地也朱叔元書奈何以區區漁陽結怨天子左太沖南鄰擊鐘磬北里吹笙竽亦趙云漁陽吹笙竽則燕薊復而民樂也雲帆轉遼海粳稻來東吳遼海遼東郡劉晏雲帆桂楫趙云轉遼海則通遼東矣越羅與楚練照耀輿臺軀昭七年傳皂臣輿僕臣臺曹子建下逮輿臺其趙云故越羅楚練賜子建功之人雖是輿臺亦照耀身矣主將位益崇氣驕凌上都邊人不敢議議者死衢路時好邊功李林甫任蕃將也開邊喜功之弊至於卒貴而將驕如此不亦可罪乎右四我本良家子石季良詩我本良家子趙充國六郡良家子出師亦多門趙云左傳晉政多門也將驕益愁思身貴不足論躍馬二十年恐辜明主恩蔡澤曰躍馬疾驅四十三年足矣薛云按古樂府雉子班行以死報君恩誰能辜恩盻坐見幽州騎長驅河洛昬時禄山自幽州䧟河洛曹子建幽并游俠兒長驅䧟匈奴中夜間道歸故里但空村藺相如使人奉璧間道馳歸趙顔延年去國還故里幽門蔚蓬藜杜補遺漢祖紀間道走軍注間空也投空隙而行不公顯也惡名幸脫免窮老無兒孫坡云詳味此詩蓋禄山反時其將有脫身歸國而禄山盡殺其妻子者不出姓名亦可恨也右五九家集註杜詩巻五
