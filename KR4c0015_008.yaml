body:
  text: 九家集注杜詩卷八宋郭知達編古詩病橘此詩傷物失所而至於困悴舊趙云此篇直叙事紀實而感歎之詩注妄矣羣一作伊橘少生意雖多亦奚為惜哉結實小一作少酸澀如棠梨剖一作割之盡蠧蟲采掇爽其冝其一作所詩薄言采之薄言掇之紛然不適口莊子柤梨橘柚皆可於口豈只存其皮蕭蕭半死葉七發其根半死半生冬則烈風凛霰飛雪之所激未忍别故枝𤣥冬霜雪積劉公幹自夏涉𤣥冬况乃回風吹趙云柤梨橘柚其味相反而皆可於口今云不適口則以其病反言之橘皮可用於藥病亦不可用矣半死葉借七發言半死字用也宋沈約霜來悲落洞詩云宿莖抽晚幹新葉生故枝梁元帝纂要曰冬曰𤣥英亦曰𤣥冬注云劉公幹詩亦詩人承用之熟非祖出也此物蓬來殿羅列瀟湘姿瀟湘有橘柚橘洲世說江南為橘江北為柚此物嵗不稔玉食少光輝書惟辟玉食周禮共食玉少一云失杜云天子玉食言所食之珍貴如玉冦盜尚憑陵當君減膳時天子徹樂減膳汝病是天意吾愁一云諗罪有司趙云此八句是一段蓬萊殿在東內大明宫凉殿前則橘多生於湘潭間張華詩曰橘生湘水側菲陋人莫傳逢君金華宴得在玉几前古詩言庭樹云此物何足貴玉食所食之珍貴如玉注引王齊則共食玉乃真是玉屑非此之謂禮云凶年天子徹樂減膳吾愁罪有司言是天意使橘病而不供不可歸罪有司一作諗字義止訓告非也憶昔南海使奔騰獻荔枝百馬死山谷到今耆舊悲唐書貴妃嗜荔枝必欲生致之乃置騎傳送走數千里其味未變巳至京師集注漢和帝紀云舊南海獻龍眼荔枝十里一置五里一候奔騰險阻死者繼路時臨武長唐羌縣接南海乃上書陳狀帝下詔曰逺國珍羞本以薦奉宗廟茍有傷害豈愛民之本其敕太官勿復愛獻謝承漢書云唐羌字伯游辟公府補臨武長縣接交州舊貢荔枝龍眼驛馬晝夜傳送至有遭虎狼毒害頓仆死亡不絶道經臨武羌乃上書諫和帝曰臣聞上不以滋味為德下不以貢膳為功故天子食太平為尊不以果實為珍伏見交址七郡獻生龍眼等鳥驚風發南州地土惡蟲猛獸不絶於路至於觸犯死亡之害死者不可復生來者猶可救也此二物升殿未必延年益夀帝從之羌即葉官還家不應微杜云公借其事以譏楊妃舊注引唐書其說非唐所貢乃涪州荔枝由子午道而往非南海也絶趙云此用獻荔枝事比之竒矣杜所引是故公後有句云側生野岸及蒲不熟丹宫滿玉壺雲壑布衣駘背死勞人重馬翠眉須枯棕此詩傷民困於重斂也蜀門多棕一作栟櫚高者十八九其皮割剝甚雖衆亦易朽徒布如雲葉青青嵗寒後交橫集斧斤凋喪先蒲栁薛云北史韋世康與子弟書曰耄雖未及壯年已謝霜早秋梧風先蒲栁又晉書顧悅之與簡文帝同年而髮早白帝問其故對曰松柏之姿經霜猶茂蒲栁之質望秋先零說文楊栁也詩蒲栁之木二種一種皮正青一種皮紅布一作有楈趙云廣志曰棕一名栟櫚張平子南都賦云其木則丫栟櫚結根竦本垂偹嬋媛布緑禁之萋萋數華藥之哀栟音并櫚音櫚若論公所所賦指蜀中之棕則蜀都賦云其木則有棕椰楔樅矣莊子曰松柏在冬夏青青孔子曰嵗寒然後知松柏之後雕棕葉如車輪雖冬亦青故借用阮嗣宗詠懷詩有走獸交橫其蒲桞一物乃楊之别名世說顧悅之梁簡文問曰卿何以先老苓曰蒲柳之質望秋先零松柏之姿隆冬轉茂棕以多剝而雕喪故以此形容之傷時苦軍乏律乏軍興一物官盡取嗟爾江漢人生成復何有聊同枯棕木使我沉歎久死者即已休生者何自守何一作能啾啾黃雀啄側見寒蓬走念爾形影乾摧殘沒藜莠蜀人取其皮以充用惟軍興求尤急趙云家語孔子謂哀公曰一物之理亂亡之端江文通書一物之微有足悲者下六句因棕一物以興江漢之人詩曰滔滔江漢南國之紀此䕫州詩也而用江漢於䕫為近死者即巳休猶棕之既已剝多而枯死生者何自守猶棕之未剝者終復遭剝也後四句又著棕而言矣黃雀小鳥耳西京剝云翔鵾仰而不逮况青鳥與黃雀枯柟此詩傷抱材者老死丘壑而不材者見用也楩柟枯崢嶸蜀都賦楩楠幽藹於谷砥鄉黨皆莫記不知幾百嵗慘慘無生意趙云梗柟枯崢嶸則其枝之高大矣王荆公崢嶸終日對枯柟用此王仲宣登樓賦天慘慘而無色上枝摩皇天魏文帝修條摩蒼天下根蟠厚地易坤厚載物趙云古香爐詩曰請說銅爐器崔嵬象南山上枝似松柏下根據銅盤魏文帝修條摩蒼天皇天子多矣左傳云皇天后土故用對厚地其字雖出於詩謂地蓋原而前人先用則張平子東京賦云局高天蹐厚地也舊注引易坤厚載物似是而非壯子下蟠于地巨圍雷霆拆萬孔蟲蟻萃七發夏則雷霆霹靂之所感桐趙云言其枯也舊注引七發非特出處止言龍門之又不是拆之之義病柏云鴟鶚志意滿養子穿穴內古柏行云苦心不免容螻蟻相數也凍雨落流膠衝風奪佳氣趙云凍雨舊本作涷涷音東楚詞大司命云使涷雨兮灑塵爾雅暴雨謂之涷郭璞曰今江東風月暴雨為涷雨少司命曰衝風至兮水揚波衝風隧風也梁孝元帝納凉云高舂斜日下佳氣滿櫩楹白鵠遂不來天雞為愁思謝靈運天雞弄和風杜云西京賦掛白鵠舊注曰獨鵠晨號乎其上非是天雞出爾雅鳥篇注鶾雞赤羽逸書曰文鶾若彩雞成王時蜀人獻之符趙云耽化為白鵠公又云黃泥野岸天雞舞薛夢注爾雅釋蟲鶾天雞注云小蟲黑身赤頭一名莎雞非是猶含棟梁具無復霄漢志良工古昔少識者出涕淚趙云柟者珍材雖枯而可充用公自况充用之外不復更望升拔衆人之見則以枯而不採種榆水中央成長何容易截承金霑盤裊裊不自畏西都賦抗仙掌以承露西京賦立修莖之仙掌承雲表之清露趙云汜勝之書中木無期因地為時三月榆莢雨時高地強土可種則榆賴潤濕而後生故言水中央詩云宛在水中央東方朔談何容易漢書孝武作柏梁銅柱承露仙人掌之屬梁簡文帝詩曰定用方諸水持添承露盤梁元帝善覺寺碑曰全盤山竦非求承露皆參用之西都賦云金莖西京賦云修莖若非銅柱而以柟為莖則可用彼榆之脆弱鳥能勝其任哉蓋興小夫之承重任也憶昔二首趙云舊本失次於成都詩中今第二篇未句云灑血江漢身哀疾則䕫州詩也與枯棕詩嗟爾江漢人同憶昔先皇巡朔方千乘萬騎入咸陽後漢靈帝未京都童謡曰候非候王非王千乘萬騎上北邙武趙云先皇言肅宗也朔方郡今之夏州肅宗即位靈乃北地郡而朔方在靈州之鄰則車駕所巡矣既巡車駕歸長安漢高帝紀沛公西入咸陽陰山驕子汗血馬長驅東史胡走藏史胡者天之驕子大宛有汗血駒見留北門注沙苑行前漢胸奴傳候應云北邊塞至遼東外有陰山東西千餘里草木茂盛多禽獸李廣出師斥奪此地長老言胸奴失陰山之後過之未嘗不哭元趙云驕子指言回紇也至德二載廣平王俶為兵馬帥郭子義副之以朔方安西回紇南蠻大食兵討安慶緒時回紇兵最有功赤汗血見上驄馬行注東胡指言安慶緒也時廣平王之兵戰于澧水而慶緒敗走鄴城反覆不足怪關中小兒壞紀綱張后不樂上為忙至今今上猶撥亂勞心焦思補四方胡走藏祿山敗也鄴中反覆史思明未服也闢中小兒越王係欲奪嬌也張后肅宋張皇后也時𤣥宗幸蜀后侍肅宗起靈武遂立為后后能牢籠干豫政事遷太上皇譛建寧王倓賜死皆后謀也及肅宗大漸后挾越王係謀危害太子為李輔國諸上為忙以代宗畏后也絶云按關中小兒當為越王係乃是也舊注云今上代宗自為太子授天下兵馬元帥及即位內平張白越王之難外經營河朔等趙云史言時慶緒奔于河北明年乾元元年蔡希德復㑹安慶緒賊復振以相州為成安府鄴城即相州也舊注祿山敗思明未服誤矣蓋當回紇助順之時祿山巳為慶緒所殺而史思明却又殺慶緒所以東坡詩話也關中小兒謂季輔國也張后謂肅宗張皇后也為留猛是守未央謂郭子儀奪兵柄入宿衛也舊注至謂關中小兒為越王係奪嫡則自有東坡成說正其謬張后能牢籠干豫政事後與李輔國謀徙上皇又屢欲危太子皆張后之惡也今上似指肅宗舊注以代宗畏后非是今上猶亂代宗能撥亂也前漢書撥亂反正我昔近侍叨奉引往在詩云我昔忝近侍時代宗享郊廟也此詩亦言代宗時事而云我昔迎侍叨奉引然二史皆不載故不知所任官也出兵一云兵出整肅不可當趙云公於肅宗朝為拾遺掌供奉諷諫奉引則供奉之事舊注謂奉引事二史皆不載故不知所任何官是何等語諷杜補遺引唐六典補闕拾遺武后置二人以掌供奉諫子美至德二年肅宗授左拾遺明年收京扈從還長安蓋拾遺掌供奉扈從也為留猛士守未央致使岐雍防西羌犬戎直來坐御牀百官跣足隨天王吐蕃陷長安天子奔陜趙云守未央東坡以為郭子儀按史程元振以子儀有天下功醜為諙譖肅宗不納其語然猶留守京師明年吐蕃入冦陷長安未央宫名漢肅何所建高祖大風歌云安得猛士守四方子儀於肅宗時召還在乾二二年之七月既留京師次年吹蕃入冦岐雍之間防賊不暇犬戎指言吐蕃傳云本西羌屬拜必手堀地為犬號直來坐御牀則在代宗廣德元年十月陷京師時南史侯景傳齊文宣夢獼猴坐御牀僕固懷思阻兵於州州引回紇吐蕃之衆入冦河西吐蕃繼陷涇州遂逼京即而陷之天子車駕辛陜故云百官跣足隨也願見北地傳介子老儒不用尚書郎傳介子北地人持節使誅斬樓蘭王安歸首懸之北關封介子為義陽候木蘭行云欲輿木蘭賞不用尚書郎趙云公於廣德二年以嚴武再尹成都自閬中歸武用為參謀固為尚書工部員外郎矣今也止願見如傳介子者使贊贊普之首則老儒不復須尚書郎也此為䕫州詩憶昔開元全盛日趙云鮑明逺蕪城賦曰當昔全盛之時小邑猶藏萬家室稻米流脂粟米白公私倉廩俱豐實開元間承平嵗久四郊無虞居人滿野桑麻如織雞犬之音相聞趙云管子倉廩實而知禮節也九州道路無豺虎逺行不勞吉日出言道路無阻隔所至皆通逹不必擇日而後出也齊䊵魯縞車班班左傳强弩之末不能穿魯縞桓帝初京都童謡曰車班班入河間薛云前漢志齊織作氷䊵綺繡純麗之物師古曰氷謂布帛之細其色鮮潔如氷也紈素也趙云班婕妤詩新製齊紈素皎潔如霜雪婕妤所據范子曰䊵素出齊男耕女桑不相失揚子男子畝婦人桑宫中聖人奏雲門天下朋友皆膠漆百餘年間未災變叔孫禮樂蕭何律周禮大司樂歌大呂舞雲門以祀天神後漢陳重雷義為友語曰膠漆自謂堅不如雷與陳劉孝標絶交論道協膠漆叔孫通制禮儀蕭何定律令揚雄解嘲叔孫通起於袍鼓之間解甲投戈遂作君臣之儀得也聖漢權制而蕭何造律冝也比趙云雲門者黃帝之樂名叔孫蕭何以開元之大臣豈聞一絹直萬錢有田種榖今流血洛陽宫殿燒焚盡宗廟新除狐兔穴安史之亂民困于役而不得耕桑長安宫殿九廟焚燒略盡張孟陽七哀詩園寢化為墟周墉無遺堵狐兔窟其中蕪穢不復掃川趙云流血以言戰伐殺人之多揚子云谷流人之血傷心不忍問耆舊復恐初從亂離說小臣魯鈍無所能朝廷記識䝉祿秩周宣中興望我皇灑血江漢長衰疾劉公幹小臣信頑魯僶俯安能返長一作身宣王承厲王之亂復修文武之業周道復興趙云灑血江漢則公在䕫故詩曰滔滔江漢南國之記此䕫州詩冬狩行時梓州刺史章彛兼侍御史留後東川君不見東川節度兵馬雄校獵亦似觀成功杜云上林賦天子校獵李竒注云以五校兵出獵也夜發猛士三千人清晨合圍步驟同禮天子不合圍禽獸已斃十七八殺聲落日回蒼窮幕前生致九青兕馲駝􅐑峞垂𤣥熊以駝負熊東西南北百里間髣佛蹴踏寒山空羽獵賦羡漫半散蕭條數千里之外東西南北騁嗜奔欲拖蒼豨跋犀犛蹶浮麋斫巨狿摶𤣥猿南都賦排揵陷扄蹴踏咸陽蹴趙云魏文帝王粲皆有校獵賦吕安與嵇茂齊書云崑崙使西倒踏太山令東覆又維摩經云譬如龍象蹴踏非驢所堪有鳥名鸜鵒力不能高飛逐走蓬肉味不足登鼎俎鷦鷯賦毛弗施于器用肉不登于俎味左傳有鸜鵒求巢童謡曰鸜鵒鸜鵒往歌來哭鸜鵒賦恃陋體之腥臊亦何勞于鼎俎胡為見羈虞羅中春搜冬狩侯得同陳子昻豈不在逺游虞羅所見尋四時田狩諸侯得行其事趙云周禮春搜夏苖秋獮冬本天子之事也而諸侯同之故此云侯得同虞羅虞者之網羅公詩又云獸猶畏虞羅使君五馬一馬驄况今攝行大將權號令頗有前賢風章彛兼侍御史故云一馬驄故事使君五馬車以趙云漢制諸侯五馬出應邵漢官儀其云一馬驄則章留後兼侍御史也後漢亘典為侍御史有威名好騎驄馬京師語曰行行且止避驄馬御史飄然時危一老翁十年厭見旌旗紅喜君士卒甚整肅為我回轡擒西戎草中狐兔盡何益天子不在咸陽宫朝廷雖無幽王禍得不哀痛塵再䝉嗚呼得不哀痛塵再䝉時天子避狄史申候與西夷犬戎攻幽王於驪山時代宗在陜詔徴天下兵而程元振用事媒蘖大臣皆疑懼不進天下無一人應召者故此詩末章大有感激也冦趙云此篇蓋廣德二年十月已後作也八月吐蕃入十月陷邠州及奉天車駕幸陜又三日吐蕃陷京師故云不在咸陽宫塵再䝉則言明皇以祿山之禍已䝉塵于蜀矣今天子又以吐蕃之故䝉塵于外左傳藏文仲曰天子䝉塵于外漢書有下哀痛之詔韋諷録事宅觀曹將軍霸畫馬圖國初已來畫鞍馬神妙獨數江都王師名畫記江都王緒霍王元軌之子多才藝善畫畫鞍馬擅名垂拱中官至金州刺史善趙云鮑照詩鞍馬光照地明皇雜録云王維鄭䖍皆繪畫詩稱神妙將軍得名三十載人間又見真乘黃乘黃見第三卷瘦馬行注增添詩大叔于田乘乘黃馬趙云以將軍所畫其在于人間真是乘黃也乘黃乘也瑞應圖曰乘黃王者輿服有度則出山海經曰白氏之國白身被髮有乘黃其狀如狐背上有角乘之夀二千嵗注云即飛黃也淮南子曰黃帝時飛黃服皂是巳公詩此句泛言其所畫之馬而以乘黃比之繼之以曽兒先帝照夜白至輕紈細綺相追飛六句以言其為天子畫馬也㑹貌先帝照夜白馬名也明皇别傳上乘照夜白龍池十日飛霹靂師長安志龍池在南內南薰殿畫曹承詔畫馬所在此殿也薛云唐㑹要明皇在藩邱宅居興慶里宅有龍池涌出日以沒夜白者乃真龍耳故晝出照夜白而龍池所乘馬有王花驄及照夜白皆駮逸無比當照命圖寫之中趙云照夜白者乃真龍耳故畫出照夜白而龍池之飛霹靂者凡十日蓋畫者真龍在圖感動龍池中龍如此薛夢符所引意不相干內府殷紅馬腦盤師唐史裴行儉平都支遮匐獲馬腦盤廣三尺文彩燦然軍吏持之趍跌盤碎行儉色不少吝婕妤傳詔才人索唐置以婕妤才人代世婦詔趙云馬腦盤內府之物婕妤秋尊故傳人才秋卑故親往索之碗賜將軍拜舞歸輕紈細綺相追飛師言詔索內府馬腦盤賜曹將軍也今本作盤字誤越趙云蓋賜將軍蓋専賜之其從者輕紈與細綺也吳春秋采葛女之歌曰羣臣拜舞天顔舒貴戚權門得筆跡始覺屏障生光輝昔日太宗拳毛騧近時郭家師子花吐蕃潰郭子儀收復京師代宗以九花虬賜之二名師于聮今之新圖有二馬復令職者久嘆嗟此皆騎戰一敵萬縞素漠漠開風沙其餘七匹亦殊絶逈若寒空動煙雪霜蹄蹴踏長楸間曹子建名都篇走馬長楸間杜詩莊子有馬蹄可以踐霜雪維摩經龍象蹴踏非驢所堪馬官厮養森成列可憐九馬爭神駿漢武帝有九逸支遁曰憐其神駿耳顧視清高氣深穩借問苦心愛者誰後有韋諷前支遁支遁字道林韋趙云自昔日太宗至氣深穩十二句正是諷家所見之畫凡九匹也畫長安志昭陵有六駿在陵後曰拳毛騧師子花子花亦近時郭家所有之實者舊注不省云漢云有九逸而薛夢符又引西京雜記以正其僞漢文有九匹九匹混亂旁似疑惑後學莊子有馬蹄可以踐踏雪支遁養真馬韋諷藏畫馬皆苦心有愛蓋惟好之篤而用心苦也憶昔巡幸新豐宫新豐宫驪山也翠華拂天來向東南都賦望翠華之葳蕤東都賦旌旗拂天騰驤磊落三萬匹皆與此圖筋骨同明皇幸驪山王毛仲以鹿馬數萬從每色為一隊相間若錦繡趙云因見此九馬圖畫懷思先皇新豐宫則以漢髙事下句射蛟則以漢武事朝河宗則以穆天子事比先皇也髙帝沛豐邑中陽里人太上皇懷其故鄉特為造新豐邑驪山在其南先皇所常游幸翠華天子之旗也南都賦望翠華之崴蕤東都賦旗拂天也自長安而幸新豐自西而東也今比所畫正如先皇三萬匹皆駿馬也自從獻寶朝河宗無復射蛟江水中元封五年漢武自潯陽浮江親射蛟江中獲之師云蓋傷明皇不復游幸河趙云言先皇之出狩而遂上升乎穆天子傳曰河曰宗四瀆之所宗穆天子乘八駿以游幸穆天子傳又云天子西征至陽紆之山河伯馮夷都是為河中觀春山之寶玉也沈佺期詩云河宗來獻寶天子命焚表君不見金粟堆前松柏裏龍媒去盡鳥呼風漢武歌曰天馬騋龍媒金粟堆在宣宗泰陵南增添唐舊記云元宗親拜五陵至睿宗橋陵見金粟山岡有龍盤鳯翥之勢謂侍臣曰吾千秋萬歲後宜葬此暨升仙羣臣尊先㫖以葬馬趙云先皇陵寢之畔龍媒既云鳥徒呼風於松柏間耳故曰鳥呼風送韋諷上閬州録事參軍國步猶艱難詩天步艱難兵革未衰息萬方哀嗷嗷十載供軍食庶官務割剝不暇憂反側誅求何多門賢者貴為德民困於役而無訴故哀嗷嗷杜云鴻鴈詩哀鳴嗷嗷一云賢俊愧為力哀一作尚載一作年趙云此篇公憂國愛民之意切矣國步蔑斯見詩嗷嗷衆口愁也周禮云使無敢反側以聼王命後漢光武紀帝云使反側得以自安也既以軍食而須求乃以乘勢割剝寧不憂民之怨而反側乎此公之圻逺慮也賢者貴為德一作賢俊愧為力非蓋義不足也韋生富春秋髙五王傳皇帝春秋富師古曰言年幼也比之於財力未匱竭故未之富洞徹有清識操持紀綱地喜見紅絲直鮑照白頭吟直如朱絲繩當今儫奪吏大吏豪奪自此無顔色趙云録事者一州之紀綱管子曰凡輕重散斂以時節平準故大賈富家不得豪奪吾人也必苦救瘡痍先應去蝥賊詩云其蜈螣及其蝥賊爾雅釋蟲食心曰蝥揮淚臨大江髙天應悽惻行行樹佳政師曹植與吳季重書曰足下在彼自有佳政慰我深相憶此詩欲抑暴斂在趙云前漢季布傳瘡痍未瘳此詩梓州送韋臨大江梓州江也陪章留後惠義寺餞嘉州崔都督赴州中軍待上客晉以郤穀將中軍孔融謁李膏為登龍上之客令蕭事有恆趙云中軍以指章留後上客以指崔都督傳左凡言某人中軍則以言主將也六國呼蘇秦張儀為上客令肅事有恆言章留後號令嚴肅而事有定式前驅入寶地趙云詩伯也執殳為王前驅祖帳飄金繩法華經云名淨垢琉璃為地黃金為繩趙云善形容事實者南陌既留歎兹山亦深登一本作探傳趙云餞席謂之祖道祖蓋祭名也前漢踈廣故人邑子為帳祖道供帳佛寺佛居以七寶為地惠義寺在梓州之南故於南陌留為歡宴而復登此山也徐敬葉登琅邪城此江稱豁險兹山復鬱盤清聞樹杪磬逺謁雲端僧鮑照雲端楚山見回䇿匪新岸所攀仍舊藤耳激洞間颷目存寒谷冰出塵閟軌躅畢景遺炎蒸鮑明逺侵晨赴早路畢景逐前儔永願坐長夏將衰棲大乘法經華決定說大乘又佛自在大乘羇旅惜宴㑹艱難懷友朋勞生共幾何魏文帝對酒當歌人生幾何離恨兼相仍鮑照何慙宿昔意猜恨坐相仍趙云木未日杪枚乘詩美人在雲瑞天路隔無期閬州東樓筵奉送十一舅往青城縣得昏字曾城有髙樓制古丹雘存梓材既勤朴斫惟其塗丹雘注塗以漆丹以朱而後成山海經云青丘之山多有賁雘頭陀碑朝霞為丹雘山趙云曾城有髙棲則西北有髙樓之勢淮南子崑崙之上有曾城九重迢迢百餘尺西京賦狀迢迢以亭亭古詩迢迢牽牛星雙闕百餘尺陸士衡高樓一何峻迢迢竣而安豁達開四門添添舜闢四門漢髙祖豁達大度雖有車馬客而無人世喧陶淵明結廬在人境而無車馬喧有一作㑹趙云鮑明逺舞鶴賦云歸人寰之喧卑游目俯大江列筵慰别魂江淹黯然銷魂者惟别而已謝靈運得以慰别魂蘇武俯觀江漢流是時秋冬交節往顔色昏雪賦嵗將暮時既昏天寒鳥獸伏霜露在草根登樓賦步棲遲以徙倚兮白日忽其將匿風蕭瑟而並興天慘慘而無色獸狂顧以求羣鳥相鳴而舉翼沈休文樹頭鳴風颷草根積霜露今我送舅氏萬感集清樽渭陽詩我見舅氏謝靈運千念集日夜萬感盈朝昏趙云我送舅氏詩渭陽篇全語齊謝眺與江水曹詩山中上芳月故人清樽賞豈伊山川間回首盜賊繁趙云言一别之後豈只是山川間隔回首則有盜賊繁多為可憂蓋吐蕃之勢未已有吞蜀之意鮑明逺云豈白璧賜將趙黃金臺髙賢意不暇王命久崩奔謝靈運圻岸屢崩奔趙云髙賢指言十一舅所以不皇暇給者以王命所在久崩奔而遵承之臨風欲慟哭聲出已復吞趙云賈誼可為慟哭者二聲出已復吞則取江淹所謂吞聲展用而倒押為韻將適吳楚留别章使君留後兼幕府諸公得柳字我來入蜀門嵗月亦已久古詩嵗月忽已晚豈唯長兒童自覺成老醜阮籍詩朝為美少年夕暮成醜老常恐性坦率失身為杯酒古詩失意杯酒間近辭痛飲徒折節萬夫後前漢郭解年長更折節為儉以德報怨趙云喪失其身特是為憂酒耳舊注失意杯酒間非是折節者摧折其節而悔過之義前漢郭解年長更折節為儉也昔如縱壑魚王褒頌如巨魚之縱大壑今如喪家狗家語纍纍然若喪家之狗既無游方戀語游必有方行止復何有相逢半新故取别隨薄厚不意青草湖在湖南扁舟落吾手趙云可行則行可止則止自不意青草湖扁方落吾手以言將適吳楚可謂竒句矣眷眷章梓州開筵俯高桞樓前出騎馬帳下羅賔友健兒簸紅旗此樂幾難朽趙云六句紀宴㑹之實事日車隱崑崙莊子若乘日之車鳥雀噪户牖波濤未足畏三峽徒雷吼所憂賊盜多重見衣冠走中原消息斷黃屋今安否趙云此假言日巳向晚别筵之散遂有行矣然登舟而親波濤猶未足以慰沃吾欲去之心則三峽徒為雷吼之聲而已我之所憂則憂在盜賊多而衣冠奔逃至尊未知消息也此吐蕃陷京師代宗出狩而地逺所未知也終作適荆蠻王仲宣逺身適荆蠻荆蠻非我鄉安排用莊叟謝靈運居常以待終處順故安排化趙云莊子造適不及笑獻笑不及排安排而去乃入於寥天一注安其推移而忘其變化也隨雲拜東皇挂席上南斗謝靈運楊帆采石華挂席拾海月說趙云屈原九歌有東皇太一篇春秋題南斗為吳海賊云掛帆席有使即寄書無使長回首趙云玉臺新詠所載近代西曲歌有客數寄書無客心相憶棕拂子趙云此篇言物微而有用特以夏月多蠅而拂子能除之東溪云明皇不明賢人棄逐故作是詩以諷焉詩作於梓州廣德元年之夏乃是代宗時豈干明皇邪棕拂且薄陋豈知身效能不堪代白羽有足除蒼蠅諸葛嘗持白羽扇指麾又顧榮伐陳敏以白羽扇麾之詩營蒼蠅之山谷言事見新唐書適從何處來者是也注乃引營營青蠅其義安在哉余謂此說誤矣此乃元稹事在子美後子美以對白羽皆前代事信乎不行一萬里不讀萬卷書不可看老杜詩熒熒金錯刀張平子四愁詩美入贈我金錯刀集注李善文選注錯刀云續漢書曰佩刀諸候王黃金錯環謝承後漢書曰詔賜應奉金錯把刀續漢書班固與弟起書曰竇侍中遺仲叔金錯半垂刀一枚前漢食貨志曰錢新室更造契刀錯刀契刀其環如大錢身形如刀長二寸文曰契刀刀直百刀錯刀以黃金錯其文一刀直五千熒熒金錯刀乃佩刀之蜀也第三十六卷對雪詩云金錯囊徒罄乃是錢刀而以金錯之也第一十三卷虎牙行金錯旌竿蒲雲直蓋以黃金而錯鏤旌竿也大抵古人之於器物以黃金錯之皆謂之金錯如秦嘉妻以金錯碗奉其夫盛水之類是以當隨其器物而名之不可以名同不究其實焉擢擢朱絲繩鮑照直如朱絲繩非獨顔色好亦用顧眄稱趙云言棕拂之柄朴而無飾非若金錯刀之熒熒棕拂之絲散而不長非若朱絲繩之擢擢彼二物之名可稱亦非特以其金朱之好顔色耳刀用以佩弦用以彈皆係乎人之顧眄焉吾老抱疾病家貧卧炎蒸􅀈膚倦撲滅賴爾甘服膺蠅蚋咂膚顔子得一善則拳拳服膺寐趙云莊子曰蚊虻咂膚則通夕不書云若火之燎于原其猶可撲滅物微世競棄義在誰肯徴三歲清秋至未敢闕緘縢趙云末句蓋言秋至而無蠅矣仍珍藏之未敢使緘縢之滅裂也莊子緘縢扄鐍謂之固丹青引贈曹將軍霸將軍魏武之子孫於今為庶為清門左氏昭傳三十二年三后之姓於今為庶王所知也禧趙云魏武則曹公操也北史咸陽王傳有言清修之門英雄割據雖已矣文彩風流今尚存晉樂廣王衍見重於時天下言風流者推王樂趙云英雄割據文彩風流皆以言曹公公雖至其子丕即帝位然本割據阮籍云時無英雄使孺子成名陸士衡辨亡論故遂割據山川跨制荆吳司馬遷書恨文彩不表於後世而韋元成遜父賢而文彩過之也學書初學衛夫人晉李夫人名衛善書但恨無過王右軍王羲之善書為古今之冠丹青不知老將至富貴於我如浮雲語曰不知老之將至又曰不義而富且貴於我如浮雲也趙云衛夫人云有一弟子號王逸少用筆咄咄逼人吕氏童䝉訓謝無逸云老杜有自然不做底語到極至處者如丹青不知老將至冨貴於我如浮雲此自然不做底語到極至處者也如金鐘大鏞在東序氷壺王衡懸清秋此雕琢語到極至處者也開元之中常引見承恩數上南薰殿凌煙功臣少顔色唐書李靖等二人四人於凌煙閣時貞觀中太宗為序將軍下筆開生靣良相頭上進賢冠後漢志進賢冠古緇布冠儒者之服也猛將腰間大羽箭太宗常自製長弓大羽箭皆倍常制褒公鄂公毛髮動鄂公尉遲敬德褒公假志𤣥英姿颯爽來酣戰趙云南薰殿長安志未載蓋其所遺志也貞觀中太宗畫李靖等二十四人於凌煙閣至開元時顔色已暗而曹將軍為之畫故云開生面蓋因之左氏狄人歸先􅀈之元面如生也淮南子曰魯陽公與韓戰酣日暮授戈而揮之日為之反三舍已上言曹將軍之傳神先帝天馬玊花驄畫工如山貌不同是日牽來赤墀下劉孝標辨命論時在赤墀之下回立閶闔生長風詔謂將軍拂絹素意匠慘淡經營中斯須九重真龍出一洗萬古凡馬空玉花却在御榻上榻上庭前屹相向至尊含笑催賜金圉人太僕皆惆悵趙云閶闔者天門名也其風曰閶闔風吳越春秋載子胥為吳立閶門以象天門通閶闔李善注云天有紫微宫門名曰閶闔則天子之門可言閶闔師民贍本作逈立非是回立則首向殿升而尾向殿門豈非回立乎馬之立而生風以其神駿也龍馬有生風字又於閶闔為有情矣意匠字摘使文賦意司契而為匠慘淡肅然之意晉臺道人言欲雪之狀曰乃先集其慘淡古樂府云淺立經營中一洗萬古凡馬空乃古今竒句玊花驄先帝之馬也畫手精妙盡得其真至尊賞之揮涕而賜金可也乃笑而賜若圉人太僕却知感槩為之惆悵則公詩微意可推矣弟子韓幹早入室言得其真蹟也故稱入室新添語由也升堂矣未入于室也亦能畫馬窮殊相幹唯畫肉不畫骨忍使驊騮氣凋喪將軍盡善蓋有神必逢佳士亦寫真薛云右按晉書顧愷之善丹青每晝人成或數年不㸃目睛人問其故答曰四體妍蚩本無闕少於妙處傳神寫照正在問堵中即令漂泊干戈際屢貌尋常行路人途窮返遭俗眼白言識者蓋寡耳世上未有如公貧趙云繼論幹所盡以推見曹將軍之盡善則骨肉俱畫而有神也公於畫取畫骨及肉而日將軍畫善蓋有神若於書不取肥失真而曰書貴瘦硬方通神然則公蓋通書畫之妙矣梁簡文帝詠美人看畫詩云可憐俱是畫誰能辨寫真也但看古來盛名下唐房琯贊曰盛名之下為難居矣終日坎壈纒其身壇盧感反趙云王立之詩話世有注杜詩者君不見古來盛名下乃引新唐書房琯贊云盛名之下難居終日坎壈纒其身乃引孟子少坎軻真可以發觀者之一笑桃竹杖引贈章留後江心蟠石生桃竹爾雅桃枝山海古經謂桃枝竹也蒼波噴浸尺度足斬根削皮如紫玊江妃水仙惜不得江賦氷夷倚浪以傲睨江妃含顰而縹眇注氷夷水仙也梓潼使君開一束滿堂賔客皆歎息君一作者憐我老病贈兩莖出入瓜甲鏗有聲老夫復欲東南征乘濤鼓枻一作棹白帝城白帝城在魚復有公孫述像也路幽必為鬼神奪杖劒一作技劒或與蛟龍爭趙云蜀都賦云其中則有靈壽桃枝注云靈壽木名也出涪陵縣桃枝竹屬也出墊江縣二者可以為杖今此桃竹杖生於江心之盤石爾雅云桃枝四寸有節相去四寸其調直修長中杖者亦自難得故云尺度足北史楊津傳受絹依公尺度江賦云江妃含顰而縹眇舊注引列仙傳曰江妃二女出游江濵蓋鄭交甫所挑者其水仙則吕向注江賦氷夷倚浪以傲睨之下曰氷夷水仙人也重為告曰杖兮杖兮爾之生也甚正直慎勿見水踴躍學變化為龍趙云即使葛陂事神仙傳曰壺公遣費長房歸一竹之杖與之騎此當還家以投葛陂中長房騎杖忽然如眠便到家以竹投葛陂顧之乃青龍也使我不得爾之扶持滅跡於君山湖上之青峯君山在洞庭湖心也噫風塵澒洞兮豺虎咬人時盜賊害人如豺虎忽失雙杖兮吾將曷從趙云戰國策蘇秦曰多割楚以滅迹又李陵書滅迹掃塵謝靈運詩滅迹入靈峯吳華核上疏曰卒有風塵不虞之變淮南子云未有天地之時鴻濛澒洞莫知其門王粲詩曰賊盜如豺虎觀公重告之辭以正直美之以學為龍成之其所望􅀈章留後可謂忠矣寄題江外草堂梓州作寄成都故居我生性放誕賀知章晚節尤誕放難欲逃自然嗜酒愛風竹卜居必一作此林泉遭亂到蜀江卧痾遣所便沈痾病也登趙云謝靈運池上樓詩卧痾對空牀誅茅初一畒屈原卜居誅鋤草茅以力耕儒行儒有一畒之宫廣地方連延營上元始斷手寶應年趙云公以乾元之元年十二月未至成都明年即上元元年乃公建章堂之始又二年即寶應元年乃公成草堂之日詩靈臺經之營之斷手字晉魁以來之語齊民要術言種小豆初伏斷手為中時中伏斷手為下時本朝淳化法帖中載唐髙宗勑云使至𤣥堂巳成不知諸作早晚得斷手凡營造了當言斷手者矣敢謀土木麗自覺面勢堅東京賦審曲面勢考工記審察方面形勢之冝云趙云土木被文繡考工記云審曲面勢以飭五材注察五材曲直方面形勢之冝臺庭隨髙下敞豁當清川庭一作亭陸士衡清川帶華薄雖有㑹心侣薛云古樂府短歌不羡一囊錢唯重心襟㑹數能同釣船干戈未偃息安得酣歌眠趙云㑹合心意之朋侣晉簡文在華林園為左右㑹心處不必在逺修然林外便有濠濮問之趣蛟龍無定窟黃鵠摩蒼天魏文帝修條摩蒼天古來達士志一云賢達士寧受外物牽趙云譬諭以言賢達之士無常居止齷齪者則有所拘矣古烏生八九子歌曰黃鵠摩天極髙飛顧惟魯鈍姿豈識梅吝先偶携老妻去慘淡陵風煙事迹無固必語孔子毋固毋必幽貞愧雙全趙云上兩句雖曰自謙而實言君子行留當在先見慘淡肅然之意慘淡字見前注秦本紀云本原事迹幽而不貞非君子之幽也易曰蹇利幽人之貞故云貴雙全尚念四小松蔓草易抅纒霜骨不堪長永為鄰里憐趙云公有四松詩云四松初移時大坻三尺強别來忽三歲離立如人長今此懷念之易抅纒一作已抅纒不堪長一作不甚長皆非蓋易字堪字方工述古三首此詩傷賢者不得志也赤驥頓長纓列字周穆王驂赤驥右非無萬里姿悲鳴淚至地為問馭者誰鳯凰從天來何意復高飛竹花不結實念子忍朝飢劉公幹鳯凰集南嶽徘徊孤竹根於心有不厭奮翅凌紫氛豈不常勤苦羞與黃雀羣趙云王褒聖主得賢臣頌云周流八極萬里一息鳯凰來而復飛此與劉公幹詩同意莊子曰鵷雛非梧桐不栖非練實不食非體泉不飲郭象注練實竹實也其色白如練薛夢符引劉公幹魯都賦竹則翠實離離鳯鸞攸食古時君臣合可以物理推賢人識定分進退固其冝大臣以道事君可則進否則奉身以退無趙云四句以結一篇之義驥以無善馭而頓纓鳯以竹實而飛去實賢者進退之義也市人日中集易日中為市於利競錐刀江文通競錐刀之利置膏烈火上哀哀自煎嗷莊子膏火自煎也農人望歲稔相率除蓬蒿所務榖為本邪贏無乃勞莊子長梧封人曰昔豫為禾耕而鹵莾之則其實亦鹵莾而報豫藝而滅裂之其實亦滅裂而報豫豫來年變齊深其耕熟耰之其禾繁以滋豫終年厭餐之舜舉十六相身尊道何高文十八年傳昔高陽氏有才子八人天下之人謂之八愷髙辛氏有才子八人天下之人謂之八元此十六旅也堯不能舉而舜舉之天下如一同心戴舜以為天子以其舉十六相故也秦時任商鞅法令如牛毛商君名鞅相秦十六年天資刻薄少恩變秦法令宗室貴戚多怨望者後滅商君之家也元趙云市井之利以譬商鞅之任末也耕農之利以譬凱之務本也左傳昭六年云錐刀之末將盡爭之舊注引江文通云在後矣人之爭利如膏火自煎莊子云膏以明自煎農人専在務本種榖故指市人之孶孳為利為勞矣張衡西京賦去何必昏於作勞邪贏優而足恃注云昏勉也邪僞也優饒也何必當勉力作勤勞之事乎欺僞之事自餘贏豐饒足恃也當衡作賦以美市利為主故鄙農夫種田之勞令詩以務本為主故翻用衡賦邪贏無乃勞也坡說見上自比稷與契注如牛毛者言其多也治亂之本在任人故為國者貴知本商以利為業甚末爾非本也農以稼為業差似近本然以榖為本非先務故孟子陳堯舜之道以闢許行陳相蓋務榖者農之本務人者治之本得其人則治如舜之舉十六相是也非其人則亂如秦任商鞅是也明皇初用姚宋猶前終用林甫國忠猶後此其驗也詳彼所注之意分為三以商之為末不如農為本農為本不如任人之為本夫任人者君也豈可與商農為甲乙哉此詩止是以商比商鞅以農比十六相耳識者冝審之漢光得天下祚永固有開禮有開必先豈惟高祖聖功自蕭曹來經綸中興業何代無長才吾慕冦鄧勳冦恂鄧禹濟時信良哉耿賈亦忠臣羽翼共徘徊體運終四百漢祚終四百故范蔚宗獻帝贊曰終我四百永作虞賔圖畫在雲臺雲臺圖功臣像中趙云此篇大意言興者必得其人耳易云君子以經綸班固之傳蕭曹云漢之宗臣是謂相國今今耿賈所以乂謂之亦也羽翼徘徊乃髙祖云羽翼已成者也九家集注杜詩卷八
