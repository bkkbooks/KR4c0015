body:
  text: 九家集注杜詩巻二十九宋郭知達編近體詩七月一日題終明府水樓二首高棟曾軒已自凉秋風此日灑衣裳招䰟高堂䆳宇檻層軒劉公幹詩涕泣灑衣裳河趙云春秋緯書高棟深宇以避風雨何遜閨怨詩曉没高棟斜月半空城齊王儉後園餞從兄詩曰兹夕復何夕念別開曾軒張茂先答何劭詩穆如灑清風翛然欲下隂山雪不去非無漢署香隂山匈奴山名其地四時常有氷雪又尚書郎漢置四人口含雞舌香以其奏事對答欲使氣息芬芬爾而趙云隂山多雪而䕫地七月有公類於此耳荘子翛然往洞然而來也漢者省署也為尚書工部員外郎其在省自應有含香之制但以為客不能去也絶壁過雲開錦繡䕫峽路有錦綉巖踈松夾水奏笙篁於松言笙篁即天籟是已看君宜著王喬履真賜還宜出尚方終明府功曹也兼攝奏節令故有此句佇觀奏即真也已上自注後漢王喬為葉令有神術毎月朔嘗自縣詣臺朝帝怪其來數而不見車騎宻令大史望之言其臨至有雙鳬從東南來舉羅張之果得雙鳥乃詔尚方診視則四年中所賜尚方官屬履也前漢百官公卿表尚方主作禁器物師古曰尚方少府之屬官也作供御之器物右一宓子彈琴邑宰日潘正叔詩宓生化單父子奇涖東阿趙云吕氏春秋曰宓子賤治單父身不下堂弹琴而治之終軍棄繻英妙時終軍年十八選為博士初軍從濟南當詣博士步入關關吏與軍繻軍問以此何為吏曰為復傳還當以合符軍曰丈夫西游不復傳還棄繻而去後為謁者行郡國建節東出關關吏曰此使者乃前棄繻生也貼以英妙字則潘安仁西征賦云終童山東之英妙賈生洛陽之少年也承家節操尚不泯趙云以成終軍之句為政風流今在兹趙云以宓子弹琴宰邑美終明府也可憐賔客盡傾葢鄒陽傳曰古語白頭如新傾葢如故何則知與不知也文穎曰傾葢猶交葢駐車也也趙云上句言終明府之相見皆是傾葢如故之賔何處老翁來賦詩公自謂也魏文帝曰已成老翁但未頭白爾楚江巫峽半雲雨用宋玉高唐賦事時趙云乃實道其事如公詩又云楚山不斷四雨巫峽長吹千里風是也清簟疎簾看奕碁謝元暉詩云珍簟清夏室江淹賦云夏簟清兮晝不暮魏文帝書彈碁間設終以博奕右二送李八秘書赴杜相公幕青簾白舫益州來巫峽秋濤天地迴趙云蓋言秋濤之勢可以迴轉天地也石出倒聽楓葉下櫓揺皆指菊花開趙云石石言灔澦之石也商人語曰灔澦如袱瞿唐莫觸灔澦如馬瞿唐馬下灔澦如鼈瞿唐舟絶灔澦如龜瞿唐莫窺載樂史寰宇記石出則行之候也必以楓葉下菊花開時為言蓋九月之間爾貪趨相府今晨發恐失佳期後命催南極一星朝北斗五雲多處是三台晉天文志北極最尊之星也天運無窮三光曜曜而晨星不故故語曰居其所而衆星拱之人君之象也五雲五色雲也三台上台中台下台也長趙云南極一星言李秘書以其在楚而往北斗指言安蓋上直北斗而號北斗城也晉天文志云三台六星兩兩而居三公之位也在人曰三公在天曰三台指言杜相公矣秋日䕫州詠懐寄鄭監審李賔客之芳一百韻絶塞烏蠻北嶲州以西有烏白蠻孤城白帝邉公遜述更魚復縣為白帝城趙云上句指言雲安縣也白帝城而䕫州在其邉自此兩句至陶治賴詩篇十二句公鋪叙以自述飄零仍百里消渴巳三年司馬相如有消渴病間趙云公自中原入蜀往來東西蜀又自蜀南下可謂飄零矣以病乆住雲安又移居于䕫所以謂之飄零仍百里也謝惠連雪賦有曰從風飄零若在人言之則如庾信枯樹賦有云山河沮隔飄零離别雄劍鳴開匣雷煥得雙劍于酆城劍有雌雄趙云烈士傳曰楚王夫人常于夏䋑凉而抱鐵柱心有所感遂懐孕後産一鐵楚王命鏌鎁鑄此精為雙劍三年乃成劍一雌一雄詳見上注雷煥劍事並無雄雌字羣書滿繫船一云所向皆窮轍餘生且繫船漢劍向博極羣書今則書在舟中也亂離心不展詩亂離瘼矣不展謂憂心如結也趙云選云意不宣展又詩云折麻心莫展此化而用之也衰謝曰蕭然名迹消泯也周趙云周王褒與宏譲書年事道盡容髮衰謝晉書此外蕭然無辦筋力妻孥問菁華嵗月遷陶徵士誄云菁華隠汲芳流歇絶注菁華猶英華也禮記云老者不以筋力為禮登臨多物色陶冶賴詩篇登高臨逺多有景物所以象其變態者有詩以陶成之爾陶如陶者之埏埴冶如工冶之容鑄彫薛云按梁鍾榮詩評曰阮嗣宗詩其源出于小雅無蟲之工而詠懐之作可以陶性靈發幽思趙云宋玉曰登山臨水兩字合用則謝靈運有登臨海嶠詩故對陶冶其字則出顔氏家訓之言文章口陶冶性靈從容諷諫已上十二句是一段峽束滄江起巖排石樹圓拂雲霾楚氣潮海蹴吳天趙云舊本作滄江字而師民瞻本作滄江石樹作古樹是自峽束蒼江起至野店引山泉十六句所以鋪陳多物色者也拂雲霾楚氣所以成古樹圓之句言樹木拂雲而高為楚氣所昏霾之潮海蹴吳天所以成濸江起之句言江流朝宗于海其勢君蹴踏吳國之天也煮井為鹽速蜀都賦曰濵以鹽池注鹽池出巴東北新井縣水出地如湧泉可煮以為鹽新井在今閬中而䕫亦有鹽泉今大寧監是也燒畬度地偏峽土瘠確暖氣晚逹故民燒地而耕謂之火耕亦謂之畬田也趙云度音度越之度言燒畬所至度過其地之偏處也有時驚疊嶂沈休文詩山嶂逺重疊任彦升詩疊嶂易成嚮意趙云公于劍門詩曰欲剗疊嶂何處覔平川峽中絶無平川載趙云玉臺後集沈君攸采蓮詩云平川映曉霞蓮舟泛浪華溪䳵雙雙舞獮猴疊疊懸疊疊重疊貌望趙云疊疊在前人使作平字如魏文帝善哉行云還故鄉鬰何疊疊張孟陽七哀詩云北芒何疊疊高陵有四五公今用作上聲碧蘿長似帶錦石小如錢黄牛峽出錦石圓如錢上有五綵花紋青趙云下兩句體物之語公嘗以藻荇為翠帶荷葉為錢乃其義也此有錦石字尤見前句石樹為古樹爾春草何曽歇謝靈運詩芳草亦未歇寒花亦可憐張景陽詩寒花發黄彩春趙云上句雖倣詩詩而字則梁元帝藥名詩云况看草歇還見之南飛花之可憐如梁簡文帝春日詩桃含可憐紫栁發斷腸青亦可憐蓋翻用此意寒花在秋日亦為可憐也獵人吹戍火野店引山泉趙云火謂之戍火則有屯戍在白帝也也獵人至其上故爾峽民依山而居故鮮水常以竹引山泉而飲已上十六句一段喚起搔頭急西京雜記武帝過李夫人就耴玉簪搔頭自此後宫人搔頭皆用玉玉價倍貴此搔頭乃抓頭耳停趙云言寢睡之中被人喚起頭方煩癢以簪搔之不手而頗急而公自注何遜云金粟裏搔頭此自是詠婦人之詩而公引之所以表見搔頭字所出扶行幾屐穿公自注云諸阮云一生能著幾屐阮孚好屐屐客有詣孚正見自蠟屐因自嘆曰未知一生能著幾屐神色自閑暢公自注幾屐此非時露消息以其詩無兩字無來處耶兩京猶薄産四海絶隨肩公有田在韋杜語四海之内皆兄弟也絶隨肩言無故舊相隨也趙云上句則公於洛陽長安皆有物業下句則嘆無交游相隨禮記五年以長則肩隨之幕府初交辟郎官幸備員班固傳云幕府新開廣延羣後辟趙云指言節度府幕也前此嚴公為東西川節度使公為参謀漢衛青開幕府注引漢官儀云始自衛青就北幕拜大將軍因開幕府𤓰時猶旅寓𤓰時見左傳萍泛苦寅縁謝靈運詩蘋萍泛沈深藥餌虛狼藉謝靈運詩藥餌情所止衰疾忽在斯陸賈名聲藉甚注言狼藉甚盛秋風洒静便趙云楚詞嫋嫋兮秋風謝靈運拙疾相倚薄還得静者便開襟驅瘴癘王洙曰峽多嵐璋氣候蒸濕故多瘴癘憂愁鬰結者易為所困故必開襟以驅之王仲宣登樓賦向北風而開襟明目掃雲煙掃一作拂史明目張胆顔延年詩城闕生雲烟四趙云明目字借字書明目也巳上十二句一段高宴諸侯禮佳人上客前古詩主人愛上客藩趙云自高宴諸侯禮至滿座涕潺湲八句因實道赴侯之宴㑹而感傷所聞之曲唐之藩鎮乃古之諸侯其為宴也乃諸侯之禮上客則公自謂也哀箏傷老大魏文帝書哀箏順耳傷老大則摘使老大徒悲傷中字華屋艷神仙曹子建箜篌引平生華屋處謝靈運華屋渄蓬居古詩金屋羅神僊南内開元曲常時弟子傳法歌聲變轉滿座涕潺湲都督栢中丞筵聞棃園子弟李仙奴歌已上公自注明皇雜録天寳中上命宫中女子数百人為棃園弟子皆居宜春非院上素曉律度時有馬仙期李龜年流廢江南知律度安禄山自范陽入覲獻白玉簫管數百事皆陳于棃園自是音響殆不類人間其後李龜不年流廢江南每遇良辰勝景為人歌闋座上聞之者莫掩泣而罷酒有棃園法曲及霓裳曲言南内則明皇初居興慶宫謂之南内也趙云已上八句一段弔影䕫州僻言獨客䕫州旁無親舊惟與影相弔自憐而巳李令伯陳情表煢煢孑立形影相弔趙云形影相弔出于曹子建表注注引李令伯之言在後矣回膓杜曲煎宋玉高唐賦曰感心動耳回腸傷氣司馬遷書云腸一日而九回自趙云公在長安家于杜曲故懐杜曲而回腸煎熬也弔影䕫州僻至鴻鴈美周宣二十四句言身處䕫州面心思王室因喜用賢代䏜王業中興也即今龍廐水莫帶犬戎羶兩京龍廐門苑馬門也渭水流苑門内已上公自注犬戎吐蕃也謂陷京師趙云公在䕫州不知中原消息故憂疑之以今龍廐門邉之水莫也為犬羊所羶汙乎或又云莫者止之之辭耿賈扶王室後漢二十八將耿弇賈復也賛論曰耿賈之供烈又云翼扶王室蕭曹拱御筵蕭曹之功尊拱漢室乗威滅蜂蠆左傳魯公卑邾不設備而禦之臧文仲曰君其無謂邾小蜂蠆有毒况國君乎者趙云蜂蠆以壁吐蕃也乘威威則望如上句四公滅之也選云乘靈風而扇戮力效鷹鸇左傳季父子使太史克對曰先大夫臧文仲教行父事君之禮曰見無禮于其君者誅之如鷹鸇之逐鳥雀也之趙云此句又以屬大臣書聿求元聖與戮力左傳戮力一心也舊物森猶在凶徒惡未悛哀元年傳祀夏配天不失舊物左傳子家亦無悛志注悛改悟也趙云庾信云凶徒瓦解國須行戰伐人憶止戈鋋言人厭兵革也光武紀道未方古亦止戈之武焉東都賦戈鋋彗雲矛矛矟也音趙云歐陽率更作類書有戰伐門故對戈鋋字鋋時連切小矛也奴僕何知禮恩榮錯與權前漢衛青傳人奴之生得無笞罵足矣公孫洪傳賛曰衛青奮於奴僕言以思而假奴僕以權任人之生也者趙云此則當戰伐之時必有武夫悍卒立功而䝉寵然公為此句無所畏憚葢亦痛悼其弊爾云此句似專指言安禄山不合付以兵柄也胡星一彗孛前漢天文志昴曰旄頭胡星也張晏曰彗所以除舊布新也孛氣似彗也趙云此兩句又憫蒼生同受其禍矣漢天文志又曰彗孛飛流日月薄食是已黔首遂拘攣秦始皇更民名曰黔首謂首之黒也應劭曰黔黧黒也鄒陽傳以其能越攣拘之語漢曹褒傳諸寮拘攣難與圗始注拘攣猶拘束潘安仁西征賦陋吾人之拘攣哀痛兹綸切前漢西域傳贊武帝末年遂棄輪臺之地而下哀痛之詔禮緇衣子曰王言如兹其出如綸王言如綸其出如綍煩苛法令蠲漢髙祖約法三章掃除煩苛趙云兩句言代宗之美上句則言詔書切至也業成陳始王詩七月陳王業也言因時之變陳王業之艱難以警時君也也趙云以成王比代宗兆喜出于畋齊世家太公望吕尚以漁鈎于周西伯將出獵卜之曰所䕶非熊非彲非虎非羆所䕶乃霸王之輔果遇太公于渭宫禁經綸密台階翊戴全梁竦傳宫省事宻莫有知者台階事見建都詩注趙云此又神言大臣之扶王室如此易曰君子以經綸台階星也晉天文志三台六星兩兩而居又曰三台為三階也傳曰劉琨與段匹磾盟文云古先哲王貽厥後訓所以翊戴天子熊羆載吕望鴻鴈美周宣美其能勞來旋定安集也載趙云前句止云兆喜出于畋則方往求賢今云熊羆吕望則果得賢而歸矣鴻鴈美周宣則又用中興之主以美代宗鴻鴈詩篇名其序曰美宣王也側聽中興主烝民任賢使能周宣中興焉側聼諦聼也興趙云自側聼中興主至不敢墜周宣十六句言王室中本乎得賢而下句鄭與李乃所謂賢者故吟詠而思之中興主字緊結美周宣之句側聼字則陸士衡洛道中作云側聼悲風響顔延年夏夜詩側聼風薄木長吟不世賢王吉云欲治之主不世出曹子建曰不世之賢趙云長吟則選有永嘯長吟也音徽一柱數梁劉孝綽江津寄劉之遴詩經過一柱觀出入三休臺趙云一柱觀在荆州渚宫故事見前渝州詩云船經一柱觀注此言其數通音問也陸士衡擬古詩云歡友時過過迢迢匿音徽道里下牢千自注鄭在江陵李在夷陵四趙云下牢關在峽州所以言夷陵也傳曰方之貢賦道里均焉道里千相去千里也鄭李光時論文章並我先隂何尚清省沈宋欻聨翩趙云四子皆以美鄭李也隂則隂鏗何則何遜沈則沈佺期宋則宋之問隂何前代而二公比之彼尚清省未為富艶沈宋近代欻然追逐與之相聫翩也宋則文賦云浮藻聫翩若翰鳥纓繳而墜層雲之峻也律比崑崙竹前漢律厯志黄帝使伶倫大夏之西崑崙之隂取竹蠏谷㫁兩節間而吹之以為黄鍾之宫音知燥濕絃伯牙彈琴意在山子期曰巍巍乎意在水子期曰蕩蕩乎子期死伯牙遂絶絃辨杜正謬云劉孝標廣絶交論曰撫絃徽音未逹燥濕響又韓詩外傳趙王曰夫時有燥濕絃有緩急徽指推移不可記也風流俱善價王衍樂廣見重于時天下言風流者惟王樂為首見晉書善價字論語求善價而沽諸愜當乆忘筌文賦誇日者尚奢愜心者貴當王弼明象曰猶筌者所以在魚而忘筌忘筌趙云此上四句以言二公之文章置驛常如此鄭當時孝景時為太子舍人每五日洗沐常置驛馬長安諸郊請謝賔客夜以繼日至明旦常恐不徧儒行其自立有如此者登龍葢有焉李膺獨持風義以聲名自高士有被其容接者名為登龍門趙云上句以言鄭監之好客下句以言李賔客之待士左氏曰某人有焉雖云隔禮數左傳名位不同禮亦異數隔猶不同也任趙云隔禮數公自謙以為與二公位貌相隔絶也又彦昇哭范僕射詩云平生禮數絶式瞻在國楨不敢墜周旋左傳奉以周旋罔敢失墜趙云已上十六句一段高視收人表曹子建與陽徳祖書曰足下高視於上京楊徳祖荅牋云自周章于省覽何遑高視哉趙云任彦昇撰王文憲集序曰經師人表允兹實望人表者言人倫之公表也自高視收人表至佳句染華牋十二句或併言二或分言之收人表則收歛之而在巳也虛心味道𤣥老子虚其心實其腹又云𤣥之又𤣥衆妙之門好杜補遺顔延年五君詠云探道淵𤣥味若味道之腴之味馬來皆汗血鶴唳必青田汗血馬詳見上注永嘉記青田有雙白鶴年年生子長便去鮑明逺詩獨鶴方朝唳趙云以馬比二公則皆汗血以鶴比二公則必青田於馬言來字則漢樂歌曰天馬來晉書聞風聲鶴唳也羽翼商山起趙云以言李賔客蓋賔客者太子官也故用商山四皓事見張良傳蓬來漢閣連西都賦僧塗飛閣自未央而連桂宫又云瀛洲方壺蓬萊皆起乎中天趙云此句以言鄭監鄭監者秘書監也故用蓬萊字後漢書田學者稱東觀為老氏藏室遒家蓬萊山唐秘書監掌圖書秘記即漢之東觀也今言為秘書監乃在蓬萊山而其地與漢之宫閣相連皆在禁中故也公後有寄題鄭監湖上亭詩又云暫阻蓬萊閣終為江海人管寧紗㡌静見嚴中烝枉駕過詩注江令錦袍鮮陳書江縂為尚書仒能屬文其文集有山水衲袍賦外趙云二公之官一則在東宫一則在禁省而皆出于言其閑曠則如管寧之戴著紗㡌其宴游則如江之著綿袍江縂傳不載之錦袍事其文集自有山水衲袍賦其序云皇儲監國餘辰勞謙終宴有令以衲袍降賜何以奉掦恩徳因題此賦語有裁縫則萬壑縈體針鏤則千巖映日埒符彩于雕煥並芬芬於菊蘭則袍之華麗可知今公云錦袍則以其華麗如錦舷也東郡時題壁南史栁惲詩云亭臯木葉下隴首秋雲飛瑯琊王蟲見而嗟賞因題于壁南湖日扣舷舷船唇也扣擊也郭璞江賦採菱以扣舷選賦鳴根扣船説文曰根高木也以長木扣舷為聲而歌也又驚魚令入網也趙云上句似専言李賔客以成江令錦袍之句下句似専監言鄭監以成管寧紗㡌之句何以知之其後有寄題鄭湖上亭三首又有暮春陪李尚書過鄭監湖亭泛舟一首又有重泛鄭監前湖一首以是知南湖日扣舷者専言鄭監也逺遊凌絶境逺逰履名洛神賦曰踐逺逰之文履古詩云足下雙逺逰是也佳句染華牋華牋蜀郡彩牋也以趙云楚詞有逺遊賦世説孫興公作天台賦示范榮期每至佳句則曰是我軰語上十二句一段毎欲孤飛去謝惠連雪賦瞻雲雁之孤飛徒為百慮牽江淹詩撫枕懐百又云嵗暮百慮交二趙云云自毎欲孤飛去至蕭疎聼晚蟬十八句因言公之遊賞欲往從之而不得為思慮之所牽役爾江縂秋日登廣州城南樓詩不及孤飛雁獨在上林中易云一致而百慮生涯已寥落生涯言已之生計也寥落無所成也國步尚迍邅尚舊作乃師民瞻取作尚桑柔詩國步斯頻易屯如邅如難行不進之貌故可趙云莊子吾生也有涯王無功詩人世何勞隔生涯知謝元暉京路夜發詩云曉正寥落班固幽通賦迍邅與蹇連兮何艱多而智寡衾枕成蕪没池塘作棄捐平生多病卜築遣懐已上自注國步亂離故寢處宴安之地皆蕪没而棄捐也趙云詩角枕粲兮錦衾爛兮謝靈運池塘生春草別離憂怛怛怛怛傷惨不安貌趙云楚詞悲莫悲兮生別離詩憂心忡忡又勞心怛怛是也伏臘涕漣漣臘者夏曰家平殷曰清祀周曰大蜡漢改為臘伏臘人所以祭祀公所以感也史記奏徳公始為伏杜補遺厯忌釋及左傳風俗通等三百餘言却成伏與臘門類之書夏之有伏冬之有臘乃嵗時之常也禮記有烝嘗伏臘而何至支離引證之多耶詩云泣涕漣漣露菊班豐鎬西征賦徘徊豐鎬秦紀豐鎬之間帝王之都也秋蔬一作菰影澗瀍豐鎬在長安澗瀍在洛陽皆公生涯所在之鄉也趙云公前所謂兩京猶薄産也酆鎬是兩字周文王都酆武王都鎬是也澗瀍二水名禹貢云東北㑹于澗瀍洛誥云我乃卜澗水東瀍水西帷洛食共誰論昔事幾處有新阡風俗通南北曰阡又謂之冡涉趙云新阡以言墳墓前漢原名其母墓曰南陽阡是也富貴空回首言富貴外物轉頭即陳迹耳喧爭懶著鞭趙云劉琨云常恐祖生先吾著鞭也兵戈塵漠漠江漢月娟娟時天下亂離惟江漢可以避難鮑明逺翫月詩娟娟似蛾眉國趙云兵戈字前漢戾太子傳賛詩文王之道被于南美化行乎江漢之域公在䕫于江漢之水為近故可以月系之選詩有云生烟紛漠漠又云娟娟新月體今摘而用之局促看秋燕局促言不得自肆也秋燕言欲歸而未得也仲長統云人事可遣何為局促趙云漢景帝曰局促如轅下駒蕭疎聽晚蟬宋玉九辨云蝉寂寞而無聲云趙云謝惠連泛南浦至石帆蕭疎野取生逶迤白雲起雕蟲䝉記憶楊子雲曰童子雕蟲篆刻俄而曰壯夫不為也烹鯉問沈綿古詩云客從逺方來遺我雙魚呼兒烹鯉魚中有尺素書趙云言二公記憶其能詩又數遣人致書尺以問其病體也沈綿者乆疾之狀王無功乆客病歸詩云沈綿赴漳浦卜羡君平杖嚴君平卜筮于成都市以為卜筮者賤業而可以惠人冇邪惡非正之問則依蓍龜為言利害各因勢導之以善從吾言者已過半矣日閲數人得百錢足自養則閉肆下簾而授老子又阮修宣子常以百錢掛杖頭至酒店便獨酣飲偷存子敬氊趙云言被冦盗之餘所存無幾晉王獻之夜卧齋中而有偷人入室盗物都盡獻之徐曰偷兒青氊我家舊物可特置之羣盗驚走囊虛把釵釧米盡折花鈿趙云公自言貧窶之狀也把釵釧折花鈿皆言貨易之爾嚢虚即錢嚢空虛也甘子隂凉葉茅齋八九椽趙云指言瀼西茅屋也隂凉對八九此又不拘以數對數之證耳陣圖沙北岸桓温傳初諸葛亮造八陣圖於魚復平沙之上疊石為八行相去二丈温見之謂之常山虵勢市暨瀼西巔自注八陣圖市暨䕫人語也江水横通山谷處方人謂之瀼羈絆心常折江淹別賦曰心折骨驚棲遲病即痊趙云言平昔毎為事物覊絆故其心常折今得棲遲可以養病而痊愈也莊子云予病少痊紫收岷嶺芋一云紫秧岷下芋前漢貨殖傳蜀卓氏曰吾聞岷下之下沃野千里下有蹲䲭至死不飢師古曰蹲䲭謂芋也趙云蓋其種自岷嶺來爾白種陸池一作家蓮趙云陸池蓮師民瞻本取之乃陸地所開之池也色好棃勝頰穰多栗過拳蜀都賦紫棃津潤樼栗鏬發有趙云上四句皆記瀼西草堂所勅厨惟一味求飽或三鱣趙云王羲之傳有一味之甘割而分之掦震傳雀銜三鱣魚飛集講堂鱣一音善兒去看魚笱一云俗異鄰蛟室詩云敝笱在梁又云毋發我笱注云捕魚梁也故合使魚笱字人來坐馬韉一云來坐馬韉戰國策云蘇秦秦少與張儀為友秦在趙為相儀至趙使人白秦秦心激之令儀於城東門外坐以破馬韉進之鹿食儀憤乃西入秦昭王善之拜為相儀歎曰馬韉之事乃至是乎人來坐馬韉言貧無坐席也縳柴門窄窄通竹溜涓涓縳柴為門也通竹以引泉爾淵明時泉涓涓而始流塹扺公畦稜自注京師農人指田逺近多云幾稜稜岸也音去聲村依野廟壖晁錯傳鑿太上廟堧垣師古曰堧者内垣之外游地也人縁反趙云公又有自注廟壖者廟外垣餘地也按申屠嘉傳晁錯為内史門東出不便更穿一門南出者太上皇廟堧垣也缺籬將棘拒倒石賴籐纒拒猶言補塞也借問頻朝謁何如稳晝眠趙云自此已下八句又言其嬾不出任也邉孝先腹便便嬾讀書晝日眠誰云行不逮誰曰古者言之不出恥躬之不逮也自覺坐能堅馬援曰大丈夫窮當益堅老當益壯霧兩銀章澁趙云公時已朱紱銀章既不服之乆所以昏也公詩又有銀章破在腰之句馨香粉署妍趙云公時為尚書工部員外郎今不在省中徒言其官署之美謂之馨香者以其含香握蘭也一謂之蘭省亦謂之畫省以粉塗畫故言粉署紫鸞無近逺黄雀任翩翾趙云上句以譬高村之人則不論逺近而往下句則公自謙以黄雀之小徒任卑飛而巳公又有聼許十一誦詩云紫鸞自超詣可見矣梁簡文望月詩可憐無逺近光照悉徘徊又戰國䇿劇辛曰黄雀俯啄白粒仰棲茂樹鼓趐奮翼自以為與人無争不知公子王孫左挾彈右攝丸以其頭為的游茂樹夕調酸鹹爾困學違從衆明公各勉㫋上句言與俗俯仰而已孔子拜下違衆麻冕從衆又掦惲傳方當盛漢之隆願勉旃無多談言子當自勉勵以立功名不須多為我言也之趙云自困學違從衆至青簡為誰編十二句困言也局促而勉二公之為功名也掦子曰困而不學斯為下矣聲華夾宸極早晚到星躔上句言李鄭聲華足以夾輔宸極下句取郎官象列星諸侯象四七宰相法三台皆星躔早晚言非乆㧞用之也趙云謝安傳宫室體宸極懇諫留匡鼎諸儒引服䖍匡衡傳諸儒語曰無説詩匡鼎來匡説詩解人熈服䖍曰言匡且來也應劭曰鼎方也師古曰服應二説是傳載匡言曰食事甚切到後漢儒林傳服䖍少以清苦建志入太學受業善著文舉孝亷趙云以言二公也不逢輸鯁直逢一作過㑹是正陶甄趙云若留匡鼎而引服䖍則亦不過用鯁直以進當為正陶甄之化耳史云樂軟熟而憎鯁直宵旰憂虞軫黎元疾苦駢趙云前漢傳宵衣旰食傳曰舉賢良問民疾苦雲臺終日畫清簡為誰編趙云既能如上兩句解天子子之憂救黎庻之苦則功名成之矣可畫像于雲臺而書名于史冊也馬援傳顯宗圖畫建武中名將列臣于雲臺青簡者殺竹青為簡也杜補遺後漢無祐父恢為南海大守殺青簡冩書注殺青以火炙簡今汗取其青易畫劉向別録治青竹作簡書謂之青簡蓋出文選劉孝標書李善注行路難何有招尋興已専趙云自行路難何有至末句蓋叙述其將離䕫而往從二公南下厯訪佛寺尋問佛法以終老也古詩有行路難由來具飛檝木元虚海賦飛迅鼓檝暫擬控鳴弦西域傳控弦者十餘萬趙云此兩句通義言檝飛之疾如箭之往也韓退之有劈箭疾匈奴傳有控弦之士身許雙峯寺門求七祖禪杜補遺云釋氏要覽云曹溪在韶州雙峯寺下昔晉武侯曹叔良宅也又云按佛書毗婆尸佛尸棄佛毗舎浮佛拘留孫佛拘那含牟尼佛迦葉佛釋迦牟尼佛謂之天台七祖其所説七偈乃禪源也自逹磨至慧能謂之中華六祖與子美同時先後人耳趙云謂之門求則所求之法門也落㠶追宿昔衣謁向真詮趙云于彼㠶落乃是宿昔之願落㠶即收㠶也其衣褐之身専為依向真詮也天台賦被毛褐之森森孟子皆衣褐捆屨褐者布衣也真詮佛法也安石名高盡自注鄭高簡得謝太傅之文眧王客赴燕自注李宗親有燕昭之美燕周之裔趙云以安石比鄭以燕照比李言所經當與鄭李相㑹途中非阮籍阮籍時率意獨駕不由徑路車跡所窮輒痛哭而反查上似張騫因話録漢書載張騫窮河源言其奉使之逺也乘槎事見張華博物志二句公自謂也披拂雲寧在拂一作晤衛瓘見樂廣曰螢然若披雲霧而覩青天也淹留景不延劉安招隠士詩云援桂枝兮聊淹留披趙云一相見別當相別也選云步幽蘭以披拂一作晤非披拂乃兩字故對淹留離騷經云又何可以淹留風期終破浪水怪莫飛涎趙云兩句通義言我之風期必破浪而往告爾水怪毋為孽也南史宗慤曰垠願乘長風破萬里浪孔子曰水之怪龍㒺象也海賦其則有天琛水怪鮫人之室江賦掦鬐掉尾噴浪飛涎他日辭神女宋玉有神女賦廟在巫山傷春怯杜䳌蜀都賦鳥生杜䳌之冕見華陽風俗録之趙云既中言其離䕫州而于巫峽辭神女日當在暮春杜䳌鳴時也淡交隨聚㪚禮君子之交淡如水澤國遶迴旋言地多陂凙故云澤國㪚趙云此二句又申言二公交友當如水之淡可聚可不必戀著如小人之甘不忍離也江陵而往皆水凙之國矣言其別二公之後而淹留於江漢也本自依迦葉王簡栖頭陁寺碑以法師景行大迦業故以頭陁為稱首佛大弟子也何曽藉去聲偓佺列仙傳偓佺槐里采藥父也食松實形體生毛數寸能飛行逐走馬甘泉賦云雖方征僑與偓佺兮猶髣髴其若夣趙云迦葉磨竭陁國人姓婆羅門于七佛之外為天竺二十五祖之首具見傳燈録偓佺以松子遺堯不服時受服者皆三百嵗白樂天詩曰海山不是吾歸處歸即應歸兠率天亦言事佛而不學仙也鑪峰生轉盻盧山東南有香鑪山孤峯突起遊氣籠其上氛氲若香烟焉橘井尚高褰神仙蘇耽種橘鑿井以救鄉里之疫病者以井泉服一橘葉即已威趙云鑪峯在江州蓋名山也周景廬山記曰匡俗周王時生而神靈廬于此山稱廬君故山取號焉酈道元據列仙傳云耽郴州人則橘高井在郴也其井在馬嶺山上故云高褰也稽康四言曰組帳褰今此借用耳匡俗之鑪峯一水而下故云轉盼公嘗有詩曰轉盼拂宜都鑪峯在江州橘井在郴州路既不同未得見見之為尚高褰也東走窮歸鶴見卜居詩歸羡遼東鶴注南征盡跕鳶馬援傳云吾在浪泊西里虜未滅之時下潦上霧毒氣薫蒸仰視飛鴈跕跕墜水中卧念少游平生時語何可得也趙云搜神記遼東城門華表柱忽有白鶴來集歌曰有鳥有鳥丁令威去家千年今來歸南征向南而行也梁張纉有南征賦此上四句蓋公之所欲游行者晚聞多妙教卒踐塞前愆妙教釋典也釋書云能修其教足以追塞宿業也塞趙云言晚年所聞多在于妙教而畢竟欲踐履之以前日之愆過也荘子云若丘之晚聞道也天台山賦序云卒踐無人之境顧愷丹青列晉顧愷之尤善丹青圖冩特妙謝安深重之以為有蒼生以來未之也也頭拖琰琬鐫姓氏英賢録云王中字簡栖作頭拖寺碑文頭陁寺者沙門釋惠宗之所立也敢寓言于雕篆庶髣髴乎衆妙琬琰鐫碑也杜補遺釋氏要覽云梵言杜多漢言抖擻謂三毒之塵能分士汙心此人能振掉除去今頭陁稱呼之誤也趙云上句言寺之畫下句言寺中之碑愷之常畫瓦棺寺維摩詰像最有名公以佛寺之畫當求如愷之者而觀之寺中之碑求如簡栖者而作之衆香深黯黯法華經云曉燒衆名香天台賦去衆香馥以掦烟幾地肅芊芊潘兵耤田賦蟬晃頴以灼灼兮碧色肅其竿竿趙云上句又以言佛寺如衆香國之香其深黯黯維摩經曰上方界分過四十二恒河沙佛土有國名衆香佛號香積潘岳在懷縣作曰稻栽肅仟仟注云與竿竿同勇猛為心極佛書勇勇猛精進清羸任體孱陳書姚察居憂齋素日乆後主見察柴瘠為之動容勅曰卿羸瘠如此齋菲累年不宜一飯有乖將攝也趙云兩句通義言心極于聞道而不管病體之嬴弱也顧野王傳體素清羸金箆空刮眼鏡象未離銓一云平等未離銓湼槃經云如目育人為治目故造詣良醫即以金箆刮其眼膜趙云法苑珠材載一實事後周張元其祖䘮明元憂泣因讀藥師經云育者得視之言遂命僧誦經七日夣一翁以金箆療其祖目曰三日必差又維摩經云如鏡中像詩句蓋言求聼佛法之論若金箆雖可以刮眼中之膜而執鏡中之像以為實有則未離銓量之間公于此又高一著而遣行役之累也贈李八秘書別三十韻往時中補右扈蹕上元初扈扈從也蹕鳴蹕也天子之出鳴蹕以清道後漢與服志蘭台令史皆執蹕以督整車騎謂之䕶駕右趙云首兩句指言李秘書也唐制補缺拾遺左左有掌供奉諷諌扈從乘與今云往時中補右則在中為右補闕矣王立之詩話載潘子真云杜詩有往時中補右扈蹕上元初然少陵罷拾遺時是至徳後李太冲以年譜考之信然子真以為扈蹕主上之物元耳杜詩可補遺亦云天寳十五載丁酉七月肅宗即位于靈武改至徳元載是時子美自賦中竄歸鳯翔拜左拾遺而扈從乘與也乾元元年己亥移華州司功乾元二年棄官自秦入蜀上元元年辛丑二年壬寅並在蜀郡以此考之扈蹕上元初非年號也王定國謂扈蹕于上之初元乃至徳元載耳若在梓州寄題草堂云經營上元始斷手寳應年自當在年號杜乃以天寳十五載為丁酉比之編年通載差太嵗一年其下逓相差蓋編年通載天寳十五載乃丙申也然諸公云云于講上元初三字破是但不知何故却以為子美自言乎是不省悟杜公乃為左拾遺而此云中補右則言右補闕耳却豈是杜公耶又不省悟下段云不才同補衮是説與李秘書同在補衮之職也如此則非李秘書為右補缺而公為左拾遺乎謂之往詩則追言至徳初之事也反氣凌行在反氣謂冦賊之氣也天子所幸謂之行在指趙云肅宗即位靈武駐蹕于鳯翔故謂之行在反氣言安禄山也妖星下直廬陸幾詩云厭直承明廬有趙云直廬則從官所直之廬梁蕭子雲嵗暮直廬賦妖星亦指言哉其名曰慧曰孛備載晉天文志六龍瞻漢閣易時乘六龍以御天也蕭何作漢宫闕萬騎略姚墟蔡邕獨斷曰大駕備千乘萬騎帝王世紀曰􅀈瞍之妻曰握登生舜于姚墟故得姓于姚氏曰先趙云上句言乘與在鳯翔而瞻望長安之缺下句則遣騎兵畧河中府而静之矣六龍萬騎皆在天子言之謂之漢缺則漢之舊都宫缺也河中府則漢之蒲坂舜所都也𤣥朔迴天步迴一作廵詩天步艱難神都憶帝車武后以東郡為神都時天子尚在蜀故言憶又後漢與服志言北斗擕龍角角為帝卓也子趙云車駕十月還長安𤣥朔則𤣥冬之朔神都則天所居乃神明之都也憶帝車者非止憶望皇上之車而已詩兩句通義言冬之朔望迴天步者以神明之都憶望帝車故也一戎纔汗馬書一戎衣而天下大定公孫宏臣愚駑無汗馬之勞百姓免為魚左傳昭元年劉子曰美哉禹功明徳逺矣徴禹吾其為魚乎家趙使云此専言肅宗親治兵以平禍亂光武紀百萬之可為魚已上説車駕之還京通籍蟠螭印通籍注籍者為二尺竹牒記其年紀名宇物色懸之宫門案省相應乃得入蟠螭謂印鼻鈕上文也晉陽春秋曰重光照洞㣲上蟠螭文隠起薪云右按僕舊儀天子六璽皆玉螭虎鈕也差肩引鳯輿趙云此兩句方言李補闕之扈從鳯輿指言乘輿與諸侍從之臣肩相摩而羅列于其側也事殊迎代邸高祖崩吕産欲危劉氏周勃為丞相陳平朱虛侯劉章共誅諸吕遂奉天子法駕迎伐王于代邸立為孝文帝喜異賞朱虛朱虛侯劉章也趙云兩句通義肅宗以皇太子為天下兵馬元帥北收兵至靈武裴冕等奉皇太子即皇帝位與漢文帝從代王入為天子事體不同故著殊字與異字也冦盗方歸順謂歸降納欵也乾坤欲宴如言寧静也京趙云此兩句結肅宋還而禍亂削平也不才同補衮謂作拾遺也奉詔許牽裾魏辛毗文帝欲徙冀州士家十萬戸實河南毗諌帝怒不荅起入毗隨而引其裾趙云詩衮職有闕惟仲山甫補之公為左拾遺與補闕之職皆是掌供諷諌故云同補衮云許牽裾也諸公説杜詩者不知詳味詩意便以謂首句中補右為公之為拾遺不知讀至此却乃云同補衮以為何義耶鴛鷺叨雲閣古詩厠迹鴛鷺行謂侍從列也潘安仁高閣連需騏驎滯玉除一作石渠謂李秘書也趙云上句天申言其在朝與李秘書同列也下句却指李秘書如騏驎駿馬留滯于石渠而不遷擢也玉除字當以石渠為正蓋下文文押除字也漢東觀石渠正是校書之所其指言李秘書尤明文園多病後司馬相如傳相如有消渴病嘗為孝文園令中㪚舊交疎稽康為中㪚大夫趙云上句又以司馬相如自比其消渴也下句又自比為稽康與吕安向秀為交最善而今隔絶所以嘆其疏也飄泊哀相見平生意有餘風煙巫峽逺䑓榭楚宫除一作虛趙云漂泊哀相見則公自言其與李秘書昔日同侍從之班其後漂泊知再㑹聚於䕫相與道平生其意氣固有餘也故下有巫山楚宫之句楚宫虚一作隂宜以除為正蓋上已押未虛韻矣觸目非除則亦蕩除而不存也解目非論故新文尚起予趙云上句則嘆李秘書之外滿目皆非故舊不可與論故事不可與言故地舊注便引顔延年詠阮歩兵詩云物故不可論此義自説阮嗣宗口不評論否人物何千此事恐惑學者下句又言李秘書之文尚能起予也孔子曰起予者商也清秋彫碧栁別浦落紅蕖此兩句紀與李秘書相見之時消息多旗幟高祖紀張旗幟於山上為疑兵經過嘆里閭為經䘮亂里閭多彫敝也邠趙云上句為大厯二年秋九月吐蕃冦靈州又冦州又言兵所過無不殘擾公之鄉里為近可為慨嘆也戰連唇齒國僖公五年晉侯假道於虞以伐虢宮之奇諌曰虢虞之表也虢亡虞必從之此所謂輔車相依唇亡齒寒者其虞虢之謂乎軍急羽毛書魏武帝奏事曰若有急則挿于檄謂之羽檄奔趙云唇齒之國既被其害宜乎檄書之馳也幕府籌頻問自注云山劍元帥杜相公初屈幕府参籌畫相公朝謁今赴後期也山家藥正鋤自注云秘書北卧青城山中英趙云相公杜鴻漸也永奏元年嵗在乙已崔旰殺郭七西蜀大亂次嵗命鴻漸以宰相兼成都尹充山劍川副元帥劍南西川節度使以鎮撫之既而今嵗大厯二年請入覲許之問籌鋤藥之句公自有本注蓋杜相公自到任後雖頻有屈致李秘書充幕府之命而李侯方且在青城山中耡藥不起也台星入朝謁便節有吹噓趙云台星入朝正言杜相公之入覲必薦舉之也西蜀災長餌南翁憤始攄趙云上句憂吐蕃能為西蜀之患前年䧟松維州西蜀不為不被其災若能弭除西蜀之災而後可以攄南翁之憤公客于楚故以南翁自謂也前漢項籍傳南公稱曰楚雖三尺已秦必楚注南公南方之老人也今字雖用角翁此義矣對敭抗士卒益稷曰時而颺之注掦舉也畢命對揚文武之命注揚舉也詩對揚王休乾没費倉儲張湯始為小吏乾没與長安富賈田甲魚翁叔之屬交私而趙云其對敭之所抗舉必以士卒為言者為其乾没費廪食也乾没謂成敗也或者直為是陸沈兩字言乾地沈没其利爾今公所用疑出于此勢藉兵須用功無禮忽諸趙云上既云乾没費倉儲則當去兵而後食可費然兵未可去故云勢藉兵須用公之意以杜相公必有䇿以減兵而省食也下句言朝廷得杜相公必有厚禮矣左傳臯陶庭堅不祀忽諸御鞍金騕裊宫硯玉蟾蜍漢書音義曰騕䮍者神馬也赤喙黒身與飛兔同明君有徳則至西京雜記晉靈公塚甚環壯四角皆以石為􅙱大棺器無復形兆尸猶不壞孔竅中皆有金玉其他器物杇爛不可别惟有玉蟾蜍一枚大如拳腹空容五合水光潤如新玉拜舞銀鈎落銀鈎字也猶言詔書也恩波錦帕舒西京雜記言秘閣圖書皆表以牙籖覆以錦帕賜趙云四句則朝廷所以寵賜相公之物金腰䮍之以馬也武帝鑄金為馬蹄故駿馬得謂之金腰䮍玉蟾蜍賜之以硯滴也拜舞銀鈎落所以成宫硯玉蟾蜍之句既拜舞以受賜則用之揮染而字畫如銀鈎之落矣素靖論書曰腕若銀鈎漂若驚鸞恩波錦帕舒所以成御鞍金腰䮍之句蓋恩波所及併御鞍而賜焉於是又䝉覆之以錦帕也梁丘遲侍宴詩云肅穆恩波被此行非不濟良友昔相如趙云言李相繼隨杜趨朝渄不有濟如同舟共濟之義李為杜之良友宿昔最相得則必推薦之矣人所以成使節有吹嘘之句相於字出選去棹依顔色沿流相疾徐趙云以言李人舟行也沈綿疲井臼馮衍傳兒女常自操井兒倚薄似樵漁趙云公以言其卧病也病之沈綿則不能服井臼之事井沒也臼春也古列女傳載周南之妻曰親操井臼謝靈運詩云拙疾相倚薄還得静者便言留滯于䕫即是倚依止薄如樵夫漁父然也乞米煩佳客乞字公自注去聲鈔詩聽小胥小吏也之趙云自我求人謂乞自人與我謂之乞則音氣也詩云於焉佳客佳客即嘉客也周禮有小胥之官雖是官名今言乃胥史也杜陵斜晩照漢宣帝𦵏杜陵去長安南五十里潏水帶寒淤潏音决水名也上林賦豐鎬潦潏之淤杜陵潏水公之故里潏水在長安縣南十里東自萬年縣界流入莫話青溪髪蕭蕭白映梳趙云四句因李君之行趨長安遂起懷鄉之念青溪言溪水之色青爾謝莊詩云青溪如委黛寄劉峽州伯華使君四十韻峽内多雲雨秋來尚鬰蒸髙唐賦云旦為朝雲暮為行雨應璩書處凉䑓而有鬰蒸之煩三趙云上句普言三峽一帶之地與忠州峽内同義下句謂楚地之多熱也逺山朝白帝見上白帝城詩注深水謁一作出夷陵峽山有夷陵縣之趙云上句説䕫州葢公所在也下句説峽州劉使君之所在也謁或作出非蓋水至夷陵而愈深所以謂之謁用對朝字為工耳遲暮嗟為客西南喜得朋易西南得朋下趙云上句所以成在白帝城句句所以成望夷陵之句楚詞傷美人之遲暮陵士衝嘆逝賦托木契子後生余將老而為客得朋指言劉使君大扺四川皆在中州之西南文人於恰好處不放過一句説䕫一句説峽此亦雙紀格哀猿更起坐落鴈失飛騰趙云上句謂聞猿嘯之聲悲哀不覺起坐更平聲下句則以譬其身如鴈之落而困於飛翔也伏枕思瓊樹江淹古别離云願一見顔色不異瓊樹枝言思劉使君也臨軒對玉繩星名謝元暉詩玊繩低建章蘇趙云伏枕公言其病也瓊樹指言劉使君漢李陵贈武詩曰思得瓊樹枝以解長渴飢樹杜補遺世説王戎云太尉夷甫神姿高徹如瑶林瓊自是風塵外物下句則思劉君臨軒而坐直至玉繩星見爾青松寒不落莊子云松栢在冬夏青青何敬祖詩青青陵上松亭亭高山栢光色冬夏茂根柢無雕落言劉使君之嵗寒也碧海闊逾澄十洲記扶桑在碧海之中趙云東方朔十洲記東有碧海廣狹浩汗與東海等水不醎苦正作碧色此言劉使君之寛量也昔嵗文為理羣公價盡増尚文之世羣公皆馳譽得時則其價増矣趙云此追言前朝也所以引下句家聲同令聞時論以儒稱趙云此言劉使君祖宗家聲與公祖審言同休令之聞望當時壬論皆以太儒名歸之后當臨朝肅多才接迹昇趙云太后指言言則天之也翠虗捎魍魎丹極上鵾鵬趙云言多才進用如在翠虚丹極之間於是弃捎不才如捎魍魎進用賢者如鵾鵬摶扶九霄間捎字東京賦云捎魑魅注云捎殺也上字則莊子摶扶揺而上者九萬里是也宴飲春壺酒一作滿恩分夏簟氷頒氷也江淹賦夏簟清兮晝不寐趙云言太后朝所寵賜如此如此春壺酒則詩春酒百壺也一作春壺滿非是葢以酒對氷方當雕章五色筆江淹夢得五色筆由是文藻日新楊杜補遺云齊蕭慤秋夜賦詩云芙蓉露下落桞月中疎髙林以為斯文彫章間出又文選任彦升作王文憲集序曰公𫐠作不倦事該軍圖豈特彫章縟采而已哉紫殿九華燈西京雜記元日燃九華燈于南上照見百里謝元暉詩紫殿肅隂隂趙云彫鏤章句所用之筆即五色筆也而彫章之作在於紫殿夜宴之時前漢成帝紀曰神光降集紫殿葢漢殿名也學並盧敏唐文苑傳盧照鄰與揚炯王勃駱賔王以文詞齊名海内稱為王揚盧駱號為四傑書偕褚薛能褚遂良薛稷也褚遂良之書得王逸少之體稷外祖魏徵家多褚書稷鋭意摹學時無及者乎趙云詳此詩豈言刘伯華之祖與公之祖審言故謂之並與偕也記云名與功偕事與時並老兄真不墜小子獨無承言伯華所學真不墜其家世惟巳不克負荷先業也趙云劉毅與劉裕樗蒲毅旣得雉裕曰老兄試為卿答於是成盧故對小子諸曰吾黨之小子近有風流作聊從月繼一作竁徴趙云風流作言其時之風流用對月継則月月相継而徵索之月継字師民瞻本作月窟際杜田補遺月作竁引顔延年宋郊祀歌月竁來賓日奉土注竁窟也一作峽未知孰是放蹄知赤驥列子周穆王有赤驥捩翅服蒼鷹鸚鵝賦曰蒼鷹􅋧才而受紲此皆言文俊逸也如趙云皆取神駿快疾謂謁劉之詩馬行鷹飛之馳騁神速也巻軸來何晩襟懷庶可慿趙云恨其寄詩巻之遲我之懷抱欲慿詩以驅遣爾故有下句會期吟諷數益破旅愁凝趙云㑹數欲數吟詠而用破旅愁之鬰結也雕刻初誰料一作觧楊子或問雕刻衆形匪天歟曰以其不雕刻也如物刻而雕之焉得力而給諸纎毫欲自矜趙云言其詩雕刻之妙誰能輕料之此葢以造化言之也又謂其纎毫皆妙而可矜誇故公前有詩云毫髪無遺恨亦此意爾神融躡飛動戰勝洗侵凌杜補遺云列子曰心凝形釋骨肉都融不覺形之所倚足之所履隨風東西猶木業幹殻竟不知風乗我耶我乘風耶神融躡飛動葢亦取列子骨肉都融隨風東西之意用之耶又韓子云昔子夏見曽子曰何肥對曰戰勝故肥曽子曰何謂也對曰我入見先王之道義則榮之出見富貴人榮之兩者戰于胸中未知勝負故􅋯靂今先王之義勝故肥趙云公于論詩嘗曰飛動摧霹今躡飛動亦是此義洗侵凌則凡作詩者不敢與戰而侵凌之也妙取筌蹄棄得魚忘筌得兔忘蹄之義髙宜百萬層言格致高逺也言趙云上句言其詩之不拘泥下句其詩之不卑淺也史一壬止百萬之師白頭遺恨在青竹幾人登青竹青簡也猶書於青簡者能幾人以趙云所謂登青竹則専主文章而言之文賦嘗遺恨終篇豈懷盈而自足前史有文藝傳又如傳又如司馬相如揚雄王褒等班班載于史冊皆以文稱矣回首追談笑勞歌跼寢興趙云蓋以追懷劉使君之談笑故徒勞歌詠而踳起居之間也選宴語談笑又以當談笑詩載寢載興年華紛已矣世故莽相仍嵇康書曰世故煩其慮七不堪也趙云公自入仕遭安史之亂又有吐蕃之兵則世故相仍如草莽之多矣刺史諸侯貴翟方進奏曰古選諸侯賢者以為州伯今部刺史居牧伯之位秉一州之統請罷刺史也置州牧趙云今之刺史乃古之諸侯之貴郎官列宿應漢明帝館陶公主為子求郎帝不許賜錢一千萬曰夫郎官上應列宿出宰百里非其民則民受其殃潘生驂閣逺一云潘安雲閣逺是黄霸璽書増黄霸為頴川太守治為天下第一天子下詔賜闗内侯黄金百斤循吏傳云二千石有治效者輒報璽書勉勵増秩賜金趙云潘安仁秋興賦序云以太尉掾寓直于散騎之省高閣連雲陽景罕曜下句以劉使君比黄霸也乳贙號攀石飢鼯訴落籐趙云此而下則公自叙述而終之以末句之嘆傷也乳贙舊注乳虎也非是贙音畎杜時可引爾雅贙羽力注出西海大秦國似狗多力獷悪又音鉉炙轂子載贙銘曰爰有獷獸厥形似犬飢則馴服飽則反眼出于西海名之曰畎其説是然䕫州未有有之而公使此者葢亦山中之物耳前乎杜公則如沈佺期嘗云且懼威非贙寧知心是狼也乳贙號呌而攀石鼯以訴飢而落藤此皆道䕫州山居事藥囊親道士灰劫問胡僧趙云上句以其病之故求服食子道士秦皇侍毉以藥囊提荆軻下句以世故之多形乎憂懼遂有胡僧之問矣方杜補遺云漢武帝穿昆明池極深悉見墨灰以問東朔朔曰臣愚不足以知之請問西域胡人至後漢明帝時有外國人入來舉以問之云此是天地天劫將盡劫灰之餘也慿乆烏皮綻烏皮几也簪稀白帽稜管寧常著白帽故趙云上句以老嬾之烏皮者几也削杜補遺云齊謝眺有詠烏皮几詩曰蟠木生附枝刻豈無施取則龍文鼎三趾獻光儀曲躬奉㣲用聊成終宴疲下句以髪少之哉著白紗帽也管寧嘗戴之林居看蟻穴焦贛易林曰蟻封戸穴大雨將集博物志蟻知欲雨野食待魚罾魚網也待罾中所得之魚為饌爾筋力交彫喪飄零免戰競趙云筋力兩字交當作皆言皆彫喪因避難而眼中不見戰代事故得免憂懼也詩戰戰競競皆為百里宰正是六安丞皆字師民瞻本作音字而趙本又作旹字葢古時字也此所以成郎官列宿應之句蓋言身為郎官當其時自可為百里宰矣然正如桓譚之出耳後漢桓譚數以言事忤㫖出為六安丞姹女縈新裏丹砂冷舊秤杜補遺漢魏真人參同契曰河上姹女靈而最神得火則飛不染垢塵真一子注云河上姹女即是真永也漢真人大丹訣曰姹女隠在丹沙中注姹女永也是天地之至寶丹沙乃七十二石之至尊趙云此下言修煉之事以成藥囊親道士之句欲以大藥而養性爾但求椿夀永莊子上古有大椿者以八千嵗為春八千嵗為秋莫慮杞天崩列子杞國有人憂天崩墜身無所寄趙云亦求長年也鍊骨調情性養生論曰脩性以保神安心全身文字曰太上養神其次養形張兵橈棘矜徐樂傳奮棘矜師古曰棘㦸也矜者棘之把時秦鑄兵器故但有㦸之把耳養身終自惜伐叛必全懲嵇康有養生論云善養生者清虚靜泰少思寡欲又七發云伐性之斧上四句皆養生之理伐叛者言外物之害性不可不懲戒也政術甘疎誕詞塲愧服膺顔子得一善則拳拳服膺趙云公自謙其于政事疎拙誕妄不若劉使君於詞塲雖知服膺尤切自愧也展懷詩頌魯魯諸侯而有頌者以其徳之可歌頌也割愛酒如澠平生所好消渴止之巳上自注左傳齊侯投壺相者曰有酒如澠有肉如陵寡君中此興君代興亦中之咄咄寧書字世説殷浩廢在長安終日書空作咄咄怪字四字冥冥欲避矰楊子曰鴻飛冥冥戈人何慕焉又淮南子曰雁銜蘆以避矰􅌳上句言不以世俗為怪下句則又有逺引之意江淮多白鳥天地有青蝇詩云青蝇以喻讒人鮑云上句與白鷗波浩蕩同意杜田補遺白鳥有二說一説謂鷗鷺之類詩言白鳥鶴鶴是也喻賢者之潔白而弃置江湖問一説謂白鳥蚊蚋也以譬則小人言賢者居亂世欲隠而為蚊蚋所囋欲出則為青蠅所汙是無逃於天地之間矣蚊蚋謂之白鳥者按大戴禮夏小正注白鳥羞丹鳥丹鳥者丹良也白鳥者蚊蚋也羞進也凡有翼者為鳥崔豹古今注曰螢一名丹良一名丹鳥腐草為之食蚊蚋也趙云此言在江湖之間天地之内無所逃蚊蠅之害也亦寓意以言小人之多者乎王十五前閣會楚岸收新雨春臺引細風趙云上兩句言所會之地引字如江揔秋日登廣州城南樓詩秋城韻晚笛危樹引清風情人來石上鮮鱠出江中趙云情人言會中之人鮑明逺翫月城門詩廻軒駐輕葢留酌待情人鮮鱠言薦食之味枚乗七發云鮮鯉之鱠鄰舍煩書札趙云王十五者必公之鄰也肩輿强老翁司馬相如傳注云札木簡之薄小者時未多用紙故給札以書陶淵明使二子乘肩輿病身虚俊味何幸飫兒童趙云以病不能食虚其雋美之味則持之以歸燕及兒輩也俊當作雋寄韋有夏郎中省郎憂病士書信有柴胡藥名也飲子頻通汗懷君想報珠四愁詩何以報之明月珠杜田補遺仇池翁曰沈佺期迴波辭云姓名雖䝉齒録袍笏未復牙緋子美用飲子對懷君亦齒録牙緋之比也又古今詩話云古之文章自應律度末以音韻為主自沈約增崇韻之後浮巧之語體製漸多始有蹉對假對雙聲疊韻之類如自珠邪之狼狽致赤子之流離不惟朱對赤邪對子而狼狽流離乃獸名對鳥名所謂假對子美以飲子對懷君亦假對按本草柴胡為君味苦平以之為湯皆通表裏爾親知天畔少藥餌峽中無峽俗信鬼病則禱祠而不服藥故峽中藥餌纔少歸楫生衣卧春鷗洗翅呼趙云以上水更不須楫所以生衣而卧生衣謂水生衣也下句以紀其來時也猶聞上急水早作取平途趙云葢言韋君上水也萬里皇華使為僚記腐儒詩皇皇者華君遣使臣也文七年傳荀林父曰同官為僚漢髙祖罵酈食其曰腐儒幾敗吾事寄常徴君白水青山空復春徴君晚節旁風塵徴君者以其曽為朝廷禮聘而不起故謂之徴君也趙云言徴君本在白水青山之間今以其出故空復春也葢使蕙帳空兮夜鶴怨之意下句謂其晚節末路乃傍塵塵出而為官也楚妃堂上色殊衆海鶴階前鳴向人海鶴非階墀之物而今鳴向人者非本意也以言徴君晚節爾趙云兩句皆以喻徴君上句言徴君如楚妃之妍有絶衆之色下句言徴君如海鶴之高非階墀物爾萬事糾紛猶絶粒賈誼賦糾錯相紛一官覊絆實藏身趙云絶粒猶絶粮也葢言其愁病疾苦無所下有矣猶更有絶粒粮之患則其困可知一官覊絆以成旁風塵之句開州入夏猶知冷不似雲安毒熱新趙云開州必徴君官于彼矣寄岑嘉州趙云岑參也詩乃呉體故不拘詩眼不見故人十年餘不道故人無素書古詩云遺我雙鯉魚中有尺素書願逢顔色關塞逺淹淹詩願一見顔色豈意出守江城居公自注云州據蜀江外顔延年一麾乃出守外江三峽且相接斗酒新詩終自疎師云王專曰近日病肺與友人斗酒新詩稍疎故趙云江城即言嘉州下臨大冮呉水自叙歴瀘連䕫云與三峽相接史云隻雞斗酒選云示我新詩終自疎言不與岑同詩酒之樂也謝眺毎篇堪諷詠馮唐已老聴吹嘘謝眺字元暉有詩載在文選詠趙云言岑之詩如謝眺篇篇可諷也馮唐老尚為郎公以自比而聴有吹嘘之者泊船秋夜經春草伏枕青楓限玉除趙云公初至雲安是去年秋時故云泊船秋夜今又見春矣故云經春草伏枕則公病肺而卧也青楓言楚地多楓樹限玉除則公念還闕也曹子建贈丁儀云凝霜依玉除眼前所寄選何物贈子雲安雙鯉魚趙云上句使素書末句使雙鯉魚皆一意也峽中覽物曽為掾吏趨三輔憶在潼關詩興多趙云三輔者京兆馮翊扶風也長安為京兆同州為馮翊華州為扶風公曽為華州功曹故云潼關于唐則華州之華隂也華州所賦之詩即潼關之詩興矣巫峽忽如瞻華日蜀江猶是見黄河巫峽之高蜀江之長可以比華岳與黄河葢亦在峽中覽物而思華州也舟中得病移衾枕洞口經春長薜蘿謝靈運詩想見山阿人薜蘿若在眼居趙云言其初得病于雲安舟中而移衾枕于客屋舍之下洞口亦所居雲安之地也形勝有餘風土惡幾時迴首一高謌峽中雖號形勝之地而風土不類中原也時趙云張孟陽劍閣銘云形勝之地匪親不居意言幾離此三峽險惡之地而去可以首望之冩胷懷而浩歌也憶鄭南玭趙云玭音蒲眠切珠名也韻書正作蠙禹貢蠙珠是已唐栁玭作家訓者亦此玭字也或云鄭南地名玭人名居于此意者公之族人行卑故不著姓而特言其名爾師民瞻本削去玭字又首句舊云鄭南伏毒守極難解具于後鄭南伏毒寺蕭灑到江心趙云舊本伏毒守難解師民瞻作手亦無義一作寺却似有理葢寺名伏毒而在江心石影銜珠閣泉聲帶玉琹琹亦有三峽流泉操趙云石影泉聲言其處所之景物也玉琹言泉聲如玉琴之聲也江淹去故郷賦撫王琴兮何親風杉曽曙倚雲嶠憶春臨趙云倚風杉臨雲嶠此所以謂之憶也萬里滄浪水一作外龍蛇只自深趙云舊本作滄浪外師民瞻本作水字是滄浪之水清兮可以濯我纓蓋言滄浪之水徒為龍蛇深藏之窟宅不似鄭南江心之可到也懷㶚上游悵望東陵道蕭何傳邵平者故秦東陵侯種𤓰長安城東世謂東陵𤓰阮藉詩昔聞東陵𤓰近在青門外東趙云指言長安門外也平生灞上游趙云灞水在萬年縣東二十里北流入渭則東陵道乃所以往灞上也春濃停野騎夜宿敞雲樓趙云懷昔之游者也離别人誰在經過老自休趙云昔所與同游之人旣已離别復誰存在者又身已老矣經過亦自罷休也阮藉詩云西游咸陽中趙李相經過眼前今古意江漢一歸舟趙云王懷灞上而欲歸蓋言眼前有今古無窮之意特在一舟從江漢以歸也謝元暉云天際識歸舟雨萬木雲深隠連山雨未開風扉掩不定水鳥去仍囘趙云風扉舟中之門也水鳥去仍囘乃舟中所見矣蛟館如鳴抒江賦云蛟人織絹于泉室樵舟豈伐枝詩云遵彼汝濆伐其條枚樵舟以雨之故不能採樵故云豈伐枝也此又成連山雨未開之句清涼破炎毒衰意欲登臺晚晴返照斜初徹一作散浮雲薄未歸趙云纂要云日將落曰薄暮日西落光返照於東謂之返景隋康孟詠日云光泛扶桑海返照若華池師本以徹作散非是日光將收藏不可言散也語于吾如浮雲返照古叙則賈誼云庶子日斜也雲言未歸謝靈運㳺南亭詩雲歸日西馳李善引曹子建詩朝雲不歸山霖雨成川澤蓋雨則雲出晴則雲歸也今為其薄薄尚在故云未歸江虹明逺一作近飲楚詞虹霓紛其朝霞兮夕淫淫而霖雨漢燕王旦謀反大虹下于宫中飲井水竭峽雨落餘飛鳬鴈終高去喻避世之士能高舉逺引也熊羆覺自肥喻貪暴者賊民以自豐也去趙云旣晴矣故鳬鴈高飛飛而熊羆亦以晴而便于求食也秋分客尚在竹露夕㣲㣲言秋分而尚留滯于他方耳夜雨小雨夜復密迴風吹早秋爾雅云小雨謂之霖霂又云迴風曰飄趙云張協詩云密雨如散絲以言小雨也楚詞九歌之一有乗廻風兮阮詞宗詠懐回風吹四辟野涼侵閉户江滿帶維舟趙云已閉戸矣而涼氣透入此之謂侵閉户葢用孫敬閉户讀書字也江以雨而水添故謂之滿用陶潛春水滿四澤字也維舟字則如任彦升詩序云贈郭桐廬出溪口見侯余旣未至郭乃維舟乆之言江水添而有維舟在岸也通藉恨多病為郎添薄游公通籍朝省晚得渴病嘗為尚書工部郎字趙云前漢元帝紀注籍者為二尺竹牃記其年紀名物色懸之宫門按省相應乃得入公前者為左拾遺蓋嘗通禁省之籍矣張良傳良多病故未嘗持兵將司馬相如以訾為郎薄游則夏侯湛作東方朔贊序云以為濁世不可富樂也故薄游以取位又孫綽子云或問賈誼不遇漢文將退耕于野乎薄游于朝乎葢言薄薄游宦也天寒出巫峽醉别仲宣樓趙云公以冬時出峽即可到荆州又乘醉而别仲宣樓以歸長安也禮記天寒旣至霜雪旣降梁元帝出江陵縣還詩云朝出屠羊縣夕返仲宣樓更題只應踏初雪騎馬發荆州趙云此篇又想像之詩公以初雪為期離荆州而歸長安然尚在䕫州直怕巫山雨真傷白帝秋趙云乃巫山白帝之側故怕其多雨而當秋時尤為可傷也羣公蒼玉珮趙云後四句乃思帝闕之事晉公卿禮秩曰特進尚書今僕射中書監令皆珮水蒼玉韓退之峩峩進賢冠耿耿水蒼珮亦謂此也天子翠雲裘宋玉賦云主人之女為承日之華上翠雲之裘此宋玉誇誕之言今公直言天子矣同舍晨趨侍胡為淹此留言同舍皆在侍從而嘆巳之淹留也離騷經云又何足以淹留峽隘聞説江陵府今之荆州也雲沙淨眇然江鄉水國眼界空闊故雲沙之淨而眇無涯際也白魚如切玉崔豹古今注曰白魚好羣游浮水上名曰白萍如切玉言其白也朱橘不論錢以其多而賤也水有逺湖樹人今何處船趙云言江陵以水言之有逺湖邊之樹而所謂欲往江陵之人其船今在何處乃公自言也青山若在眼却望峽中天趙云舊本作各在眼師民瞻本若在眼葢言往江陵則必經巫山峽若巫峽之青山在眼却仰望峽中之天矣意謂巫峽高峻而極窄才能見天也謝靈運詩想見山阿人薜蘿君在眼存没口號二首席謙不見近彈碁席謙呉人善彈碁畢耀仍傳舊小詩畢耀善為小詩見玉臺集玉局他年無限笑薛云按道藏成都地神涌出扶一玉局今之玉局觀是也白楊今日幾人悲陶濳挽歌云蔓草何茫茫白楊亦蕭蕭杜補遺後漢梁冀傳注藝經曰彈碁兩人對局白墨碁各六枚先列碁相當更先彈也詳見酉陽雜俎云世説言彈碁起自魏室粧奩戯也典論云予于他戯弄之事少所善唯彈碁略盡其巧彈碁起于魏明帝按史稱梁冀能彈碁則後漢有之非起于于魏也之趙云末句言幾人為悲時有我而巳右一鄭公粉繪隨長夜曹霸丹青已白頭天下何曽有山水人間不解重華騮自注高士榮陽鄭䖍善畫山水曹霸善畫馬趙云此篇一存一歿也山水言鄭䖍之畫驊騮言曹霸之畫末句言無人珍重而藏其畫也或曰何曽有山水土言鄭歿更無人㑹畫山水耳於義亦通右二日暮牛羊下來夕一作乆詩云日之夕矣牛羊下來各已閉柴門風月自清夜江山非故園石泉流暗壁草露滿秋原一作滴秋根趙云舊本作滴秋根字生而秋原則與暗壁敵也頭白燈明裏何須花燼繁趙云西京雜記言陸賈云乾鵲噪而行人至蜘蛛集而百事喜目撋得酒食燈花得錢財世俗以為燈花結必有喜事今句葢言頭白矣何以喜為故不須燈燼繁結也秋日寄題鄭監湖上亭三首碧草違春意别賦云春草碧色沅湘萬里秋沅湘二水名時趙云碧草者春事也今經秋草枯故謂之違背春意江陵之下接洞庭沅湘為言萬里秋故廣言之池要山簡馬見習其禾覺風流盡注語云乆要不忘平生之言月靜庾公樓晉庾亮在武昌諸佐吏殷浩之徒乘秋夜共登南樓俄而不覺亮至諸人將起而避之亮徐曰諸君少住老子于此興復不淺便據胡床與浩等談詠竟夕簡趙云以習家池比鄭監之湖以當日府師比山下句直比鄭監之樓為庾亮樓矣磨滅餘篇翰趙云比下四句公自言也其序其餘錯亂磨滅平生一釣舟高唐寒浪減髣髴識昭丘趙云以上句一釣舟引落句唐唐峽水入冬而浪減則可以行故能髣髴望昭丘而識之王粲在荆州作登樓賦云北彌陶牧西接昭丘注引荆州圖經曰當陽東南七十里有楚昭王墓公時在䕫言水退則下荆南矣右一新作湖邊宅還聞賓客過自須開竹逕誰道避雲蘿趙云自須開竹逕承賓客過之下葢亦暗使蔣詡開逕事爾旣開竹逕則其逕顯豁豈是隠避于雲蘿之間者乎官序潘生拙潘岳閑居賦拙者絶意乎寵榮之事才名賈誼多本傳言誼年少頗通諸家之書文帝詔為博士毎詔令議下諸老先生未能言誼盡為之對趙云潘岳云嘗讀汲黯傳至司馬安四至九卿而良史書之題以巧宦之日嘆曰巧識有之拙亦宜然潘生以比鄭監葢言其材器可以趋遷而止如潘生之拙也其言官序為安仁自述其八徒官而一進階再免一除名一不拜遷職者三而已矣斯為官序也西征賦云賈生洛陽之才子也言誼才名而貼之以多則士衡患才多也捨舟應卜地鄰接意何如公之意欲往江陵故有接鄰之問右二暫阻蓬萊閣見上蓬萊漢閣閣注終為江海人鄭君為秘書監即漢之東觀後漢書曰學者稱東觀為道家蓬萊山鄭君罷退斯江海之人矣莊子曰就藪澤處閑曠釣魚閑散此江海之士避世之人也謝靈運憶山中詩曰韓巳子房奮秦帝魯連恥本自江海人忠義感君子揮金應物理拖玉豈吾身西征賦飛翠緌拖鳴玉以出入禁門者衆矣漢蘇廣為太子太傅兄子受為少傅廣謂受曰吾聞知足不辱知止不殆豈如父子相隨出閤歸老不亦善乎上疏疏乞骸骨上賜黄金二千斤皇太子贈以五千斤廣旣疎鄉里日令家設酒食請族人故舊相與娯樂或勸廣買田宅為子孫計廣曰吾豈老不念子孫哉賢而多財財損其志愚而多財則益其過此金者聖主惠老臣故樂與鄉黨宗族共之不亦可乎族人恱服張景陽詠二疏詩昔在西京詩朝野多歡娯譪譪東都門羣臣祖二疏朱軒耀金城供帳臨長衢達人知止足遺榮忽如無抽簪解朝衣散髪歸海嵎行人為溳涕賢哉此丈夫揮金樂當年嵗暮不留儲顧謂四座賓多財為累愚清風激萬代名與天壤俱咄此蝉冕客君紳宜見書羮煑秋蓴滑盃迎露梅新蓴菜也見張翰願歸呉注陶淵明詩秋菊有佳色裛露掇其英泛此忘憂物逺我遺世情一觴雖獨進盃盡複復傾賦詩分氣象佳句莫頻頻趙云公言鄭君賦詩分得我吟咏之氣象則佳句莫也頻頻有之乎此莫字與行雲莫自濕僊衣之莫同右三謁真諦寺禪師蘭若高山處若以者切蘭若寺名煙霞嶂幾重凍泉依細石晴雪落長松趙云雪以晴日所照自高松而墜下也問法看詩妄一作忘觀身向酒慵未能割妻子卜宅近前峯費長房棄妻子以從壺公趙云宋周顒長於佛理于鍾山西立隠舍終日長蔬雖有妻子獨處之此于卜宅近寺為可證舊引費公事非覆舟二首巫峽盤渦曉江賦衝巫峽以迅激又盤渦谷轉黔陽貢物秋書云各貢方物黔陽今黔州也丹砂同隕石翠羽共沈舟趙云丹砂翠羽則所貢之物也故因其物以寓沈覆之辭僖十六年隕石于來五鄒陽曰積羽沈舟葢言雖至輕之物所積旣多可以沈舟也羇使空斜景羇旅也龍居閟積流龍居寶之所聚也者趙云上句形容押網船之使舡覆無聊之意盡矣下句則罪龍之為孽篙工幸不溺俄傾逐輕鷗言其能泅爾右一竹宫時望拜前漢禮樂志正月上卒用事甘泉圜丘昏祠至明夜常有神光如流星止集于祠壇天子自竹宫而望拜百官侍祠者數百人皆肅然動心桂館或求仙前漢郊之祀志公孫之人曰仙人可見上往常遽以故不見今陛下可為綰如緱氏城置棗脯神人宜可致仙人好樓居于是長安創飛廉桂館師古曰二館名也祠趙云詳味此篇葢因祠亭而貢物也上四句言享下四句言覆舟姹女凌波日神光照夜年趙云上句以言神女之降下句則上所謂神光如流星是巳桓帝時童謡云河間姹女能數錢曹子建洛神賦凌波㣲多羅襪生塵照夜字多矣若珠壁之光照夜故用對凌波此四句言祠享而神降之也徒聞斬蛟劍荆佽飛得寶劍渡江中流兩巨蛟繞舟幾没佽飛抜劍斬蛟而濟無復爨犀船晉温嶠宿牛渚磯下爇犀以照水怪須臾見竒形異狀者兩句葢言恨無劍以斬蛟龍無犀以照水怪皆憤怒之辭耳使者隨秋色迢迢獨上天趙云舊注引張騫兩字亦是葢從江中至帝闕故暗用此字右二秋清高秋蘇肺氣白髪自能梳藥餌増加減謝靈運詩藥餌情所止衰疾忽在斯門庭悶掃除陳蕃云大丈夫當掃除天下安事一室趙云傳云門庭逺于萬里加減字醫方多有漢髙祖約注三章掃除煩竒杖藜還客拜愛竹遣兒書莊子云原憲杖藜應門王子猷愛竹也遣兒書則題字于竹上十月江平穏輕舟進所如趙云末句欲離䕫南下也哭王彭州掄趙云此詩二十韻首兩句驚嘆其死自新文生沈謝至隠几接絡朝十一韻鋪叙王彭州之平生自翠石俄雙表至令子各清標六韻叙王彭州之殁後末四句公自嘆其留滯老不得歸長安因王君之喪而感傷也執友驚淪殁斯人巳寂寥禮記交遊稱其義也執友稱其仁也趙云執友厚愛尤切于交游矣語曰斯人也而有斯疾也文選山河寂寥晨暮寂寥新文生沈謝異骨降松喬沈約謝靈運六朝之能文者赤松子王喬也王君平謂芧盈曰子有異骨可學仙趙云魏文帝芙蓉池作云壽命非松喬以松喬言之想見王君人物有僊風道骨者生若生起之生葢言王之新文可以生起沈謝于巳死之後也北部初高選東堂早見招趙云言其初官得京畿尉也故用北部事曹操年二十舉孝亷為郎除洛陽北部尉舊注漢有北部太守豈有才起身而遂為太守乎煬帝嘗謂侍臣曰天下皆謂朕承藉緒餘而有四海設令朕與士大夫高選亦當為天子矣東唐早見招言其得進見天子也晉郄詵遷雍州刺史武帝于東堂會送問詵曰卿自以為何如詵對曰臣舉賢良對䇿為天下第一猶桂林之一枝崑山之片玉可以見東堂乃帝所臨幸以延賢傑之處也本朝来敏求作河南志引山謙之丹陽記云東堂西堂亦魏制周之小寢也左太冲詠史詩云馮公豈不偉白首不見招今公翻用之公又嘗曰京兆田郎早見招言得用之早矣蛟龍纒倚劍鸞鳯夾吹簫舊注引宋玉大言賦曰長劍耿介倚天外趙云言禁從之地變化者如蛟龍纒繞所倚之劍善今君王所佩之劍謂之倚劍則在天子之旁矣秦有簫史者吹簫秦穆公以女弄玉妻焉遂教弄玉吹簫作鳳鳴而仙去豈非言王君為宗室女夫乎歴職漢廷乆中年胡馬驕職任也胡馬驕謂安史亂也也趙云方以帝戚為侍從而值禄山之亂漢書云漢庭公卿無出其右選云胡馬嘶北風兵戈闇兩觀寵榮事三朝東京賦建象魏之兩觀是趙云兩觀天子之觀闕孔子誅少正夘于兩觀之下巳言天寶十五載禄山犯京師也寵辱則老子寵辱若驚也三朝言王君事明皇肅宗與當日之代宗三朝雖實事然漢有書曰三朝記則字字不為無所出蜀路江干窄彭門地里遥彭門地名属彭州守趙云言王君之出解龜生碧草諫獵阻青霄謝靈運詩解龜在景平注云解去所珮龜印也趙云生碧草言龜之閑其上生蘚司馬長卿有上諫獵書也青霄言丹禁深逺如霄漢然此言王君巳自彭州替罷而有封事于朝雖上而不報也頃壯戎麾出叨陪幕府要趙云此言嚴武節度東西川提兵而出辟王君為幕客也武之初來以一時敕命指揮兩川都節制旣還朝而第二次來雖阻徐知道反不進然止西川節度而巳其後辟杜公為參謀時即是第三次來兼領東西川節度其戎麾可為盛壯矣公在幕府參謀謂之叨陪幕府要則王彭州亦在焉而公陪之矣將軍臨氣候猛士塞風飈趙云上句指言總戎之人下句指戰伐之士臨氣候者用兵之氣候葢風角鳥占孤虚之事風飈戰鬬謂之風飈而猛士塞之也高祖安得猛士守四方井渫趙作漏泉誰汲烽疎火不燒易井之九三井渫不食為我心惻可用汲注潔巳而不見用也兵趙云渫當作漏泉誰汲火不燒此狀風塵旣塞而用䦌暇之事凡軍旅所在必先論井衆凡有警急必頻舉烽燧井漏夜而泉不汲烽燧稀舉而火不用燒則無事矣言王君善為參謀而然前籌自多暇隠几接終朝澞張良願前箸而籌之孟子隠几而卧老子飄風不終朝而趙云接終朝公自以其叨陪王君于幕府之日多暇日日得相接也翠石俄雙表寒松竟後彫蔡伯皆樹碑表墓為趙云品官之高者其死立雙石表以言主人嚴鄭公之死也語曰嵗寒然後知松栢之後彫言王君于主人交情如寒松之不替然亦終于後彫亦所以言其死也贈詩焉敢墜染翰欲無聊趙云言不敢以其死耳廢詩篇之贈然染翰之間自痛悼而其情無聊矣再哭經過罷離䰟去住銷橋元見曹操曰天下將亂安生民者其在君乎後元死操經過元篡輒愴悽致祭感其知巳也江文通别賦黯然銷䰟去住言去者有思念之心住者有憂念之意故皆銷䰟也其趙云再哭之意言巳當哭嚴公靈櫬矣今又再哭幕中之王君也之官方玉折寄塟與萍漂蕭望之便道之官王褒云死如玉折趙云追悼其才赴任而遂如玉折萍漂者又傷念其寄殯若萍泛之未安也曠望渥洼道霏㣲河漢橋趙云漢禮樂志天馬篇云天馬徠循東道此所謂道也謂王之亡如龍馬不可復見矣烏鵲填河以度牛女謂王之䰟當在仙境也夫人老即世令子各清標趙云以寔道其事此皆於死者可嘆念也巫峽長雲雨秦城近斗杓見雲雨多雲雨注杓斗極也趙云上句公言身之在䕫下句公懐長安之逺長雲雨公挨傍神女云妾在巫山之陽高丘之阻旦為朝雲暮為行雨也秦城則長安城謂之北斗城馮唐毛髪白歸興日蕭蕭趙云此公自嘆其留滯空老不得歸長安葢因王君之喪而感傷也䕫府書懐二十韻趙云此篇謂之書懐公鋪叙以其初賜官逄亂至在䕫州仍避亂之故首尾所言惟傷時憂國爾自昔罷河西尉至戰瓦落丹墀十四韻先言肅宗至代宗時皆有兵亂自先帝嚴靈寢至荅效莫支持十韻追言肅宗上昇付受代宗事自使者分王命至蜀使下何之八韻言遣使當在寡誅求除盗賊之事自釣瀨疎墳籍至凡百慎交綏八韻言身在䕫府之事昔罷河西尉初興薊北師趙云公于天寶九載未獻三大禮臧預言明年之事明年詔試文章方參列選序受河西尉不行至十四載方得免河西尉為右尉率府兵曹是嵗十一月安禄山反于幽州則所為薊北也薊北用對門也河西葢鮑明逺詩云出自薊北不才名位晩敢恨省郎遲趙云公自中原入蜀巳五年嚴武再為東西川節度辟公參謀方為尚書工部員外郎故云敢恨其遲也扈聖崆峒日端居灔澦時趙云言初在鳯翔為拾遺與今日寓居䕫州也崆峒山岷洮秦築長城之所起處而渭州實當其名古平涼也肅宗初幸平涼又治兵靈武再過平涼公為左拾遺扈從乘輿矣灔澦石在瞿塘江中言居䕫州也萍流仍汲引樗散尚恩慈趙云言代宗永秦元年召為京兆功曹也公自中原入蜀若萍之無根任漂流矣仍為人汲引字則劉向云更相汲引不為比周萍流字晉侯湛浮萍賦曰旣澹淡以順流又曰流息則寧故用對樗散莊子曰吾有大樹人謂之樗其大本擁腫而不中䋲墨其小枝巻曲而不中規矩立之途匠者不顧言如樗之散材矣而尚䝉恩慈謂除京兆功曹乃君王之恩慈也遂阻雲臺宿常懷湛露詩趙云阻雲臺宿則公以病不得起而歸直也雲臺漢南宫之臺名顯宗畫二十八將于南宫雲臺是也宿直宿也後漢鐘離意傳樂崧家貧為郎常獨直宿臺上無釵枕也湛露周詩篇名天子燕諸侯之詩也懐湛露詩則不得預宴為懐矣翠華森逺矣白首颯淒其趙云翠華天子之旗也南都賦云望翠華之葳蕤故對白首也如左太沖詩云馮公豈不偉白首不見招逺矣如莊子君自此逺矣故對淒其詩云淒其風風又謝靈運云懐賢亦淒其拙被林泉滯生逢酒賦欺文園終寂寞漢閣自磷緇趙云司馬相如為漢文帝茂林園令故得稱文園漢閣指言楊子雲也著書于天禄閣上公以二人自沉終寂寞在相如雖無此事特言以文園而不顯用終寂寞耳磷緇字祖出論語磨而不磷湼而不緇今以磨磷為平聲則謝靈運過始寜墅詩磷緇謝清曠疲醬慙貞堅病隔君臣議慙紆徳澤私趙云公被召命以病不行不參預國論徒荷私恩也君臣議字如戰國䇿顔率謂齊王致九鼎之途曰梁之君臣謀之暉臺之下少海之上楚之君臣謀之葉庭之中乃其也意矣徳澤字如漢武帝制云徳澤洋溢施乎方外揚鑣驚主辱拔劍撥年衰趙云言乗輿不備天子騎馬而出所以為主辱矣鑣馬銜也楊鑣出選范睢云主辱臣辱主辱臣死漢書諸將拔劍擊柱葢忠義之心為之憤怒思拔劍慷慨以撥遣年衰也社稷經綸地風雲際㑹期趙云此兩句懐羡之辭論語有社稷焉經綸字出易漢書感㑹風雲血流紛在眼涕泗亂交頥趙云時以吐蕃之難用兵不息也自代宗即位之初寶應元年史思明父子滅而吐蕃冦秦渭三州是嵗臺州賊袁晁乗亂據浙東次年廣徳元年吐蕃陷隴右諸州河東天子憂皇駕幸陜而京師遂陷矣及京師旣復而車駕還十二月又陷松維州廣徳二年僕固懐恩以吐蕃回紇黨須兵入冦朝廷大震是嵗西原蠻又陷邵州次年永泰元年吐蕃又冦邊掠涇汾躪鳳翔入醴泉奉天京師大震是嵗劍南兵馬使崔旴反殺其師郭英人次年大歴元年吐蕃又陷原州今嵗九月冦靈州又冦邠州今此詩乃今嵗二年之作則血流者此也尚書血流漂杵又楊子雲川谷流人之血謝靈運詩想見山阿人薜蘿若在眼漢東方朔云呉王泣下交頥四瀆樓船汎中原鼓角悲趙云樓船大舟也所以載兵運粮漢有樓船將軍治水戰之兵而公用樓船字于大食寶刀云太常樓船聲嗷嘈送李大夫赴廣州云樓船過洞庭皆大船之義鼔角悲葢兵或戰或戍鼓角自悲矣舊注云人心悲憤故鼓角之聲亦悲耳賊濠連白翟戰瓦落丹墀左傳有長翟白翟也翟趙云白翟在西有赤有白翟宜吐蕃之連矣戰瓦落丹墀此言陷京京師時事後漢昆陽之戰屋瓦皆落丹墀者天子之軒墀以丹塗之也先帝嚴靈寢切一作虚宗臣靈受遺趙云上句指言肅宗也蕭何傳一代宗臣受遺受領遺命也公孫洪傳替云受遺則霍光金日䃅恒山猶突騎遼海競張旗趙云肅宗上昇以遺命付與代宗而史朝義未滅則桓山猶為突騎矣梪山言河北安史之巢穴也遼海者遼東亦連安史起兵之地田父嗟膠漆行人避蒺藜膠漆所以為弓言誅求之多則田父以供翰為嗟蒺藜者鐵蒺藜所以禦馬所在布蒺藜于地而行人避之總戎存大體降將餙卑詞楚貢何年絶堯風舊俗疑趙云總戎者元帥也時代宗以雍王括為天下兵馬大元帥徳宗是已孟子或從其體降將飾卑詞代宗即位之次年廣徳元年史朝義兵敗其將李懐仙斬其首降也史氏旣滅于是欲問河北山東貢賦自甚年絶至于今託言楚貢則齊威公伐楚責之曰爾貢色茅不入王祭不供也堯封舊俗疑則河北山東葢皆王土其尊君戴上之俗旣更變亂可疑其忘之也董仲舒云堯舜之俗比屋可封疑謂時無好善之民故以可封為疑長吁翻北冦一望巻西夷趙云北冦指言安史也其亂幸已滅息則傾翻思之良不易此為可吁嘆今則有面夷之禍一望欲巻掃之也不必陪元圃超然待具􅗔趙云上句言巳身以譬不必在朝列也葛仙公傳云崑崙一曰𤣥圃者非以言列仙之地乎下句莊子載黄帝將見大隗于具􅗔之山至于襄城之野七聖皆迷遇牧馬童子問塗焉今公心激怒望帝親征巻掃之所以借所以黄帝言之凶兵鑄農器凶一作休講殿闢書帷老子兵者凶器也凶趙云此兩句則公之聖太平如此以器為農器傳所謂銷烽鏑者也漢書東方朔傳文帝集上書嚢為殿為講殿若成帝時鄭寛中張禹朝夕入説尚書論語于金華殿中之新添云四句言為治去亂之道不必引求古先聖無𤣥妙之説在務徳去兵兵納諫崇儉而已廟筭高難測天憂實在兹假意以譏時無善謀者而趙云公之意以為欲望太平鑄農器闢書幃此事係于廟堂諸公之詳筭然其高論難測獨天子之憂毎在此耳此與後篇諸將詩云獨使至尊憂旰食諸君何以荅昇平同義形容真潦倒答效莫支技此公之自傷于無補也稽康書潦倒鹿疎答效猶報國也使者分王命羣公各典司趙云謂諸節度各以王命而為有司當以誅求刻薄為戒也漢有繡衣使者羽獵賦云羣公常伯揚朱墨翟之徒雲漢詩羣公先正恐乖均賦歛不似問瘡痍趙云均賦歛之義出于同官又孔子曰不患寡而患不均喪亂之際公私窘急所分之命所典之司必未至于均賦歛問瘡痍也故以乖賦斂之均為恐瘡痍以言民傷漢書瘡痍未瘳而問則所謂問民疾苦也不似言不得似有問瘡痍者萬里煩供給孤域最怨思趙云上句則率土之濱莫不貢賦下句孤域指言䕫州公雖寓居而眼前所見當為之傷矣緑林寧小患雲夢欲難追趙云上句憂嘯聚之盗賊後漢劉𤣥傳諸已命共政離鄉聚藏于緑林中緑林山今在荆州當陽縣東北下句憂藩鎮之跋扈韓信傳信初之國有告信反上患之用陳平謀偽遊雲夢信果來朝遂擒以歸公意以信可以計追而鎮藩一跋扈雖欲追而不至矣即事須嘗膽蒼生可察眉趙云上句成雲夢欲難追之句葢禄山叛河北諸將節度不朝寧不嘗膽為戒耶越句踐旣脱會稽之難思有以報呉飲食必嘗膽下句成緑林寧小患之句列子載郗雍能視盜察眉知之千無一遺者公意言蒼生為盜賊之情可得于眉睫間但當撫綏之則不為耳議堂猶集鳳正觀是元龜蜀都賦議殿爵堂公趙云議論之堂也猶集鳳又中言廟堂諸如鳳之集欲除上所陳之憲但以正觀為龜鑑也集鳳借史書鳳凰集于某所元龜則又借用無逸為元龜也處處喧飛檄家家急競錐右太沖詩邊域苦鳴鏑羽檄飛京都張景陽云常懼羽檄飛急競錐言誅求之細江淹書云競錐刀之利蕭車安不定蜀使下何之漢蕭育傳哀帝時南郡多盜賊拜育為太守上以育耆舊名臣乃以三公使車載育入殿中受䇿注云使車三公奉使之車若安車也趙云蕭育乗安車所往正是南郡今公車云安不定言使者傳之車不得如蕭育之安葢其安無定所也不定字如左納而不定莊子神色不定也蜀使如李郤善知天星知二使入蜀也又司馬相如為郎使蜀今公句云蜀使下何之以言盜賊禍亂之多使者無足住也何之字楚詞云浮雲兮客與道余兮何之陶潜歸去來詞云胡為遑邊欲何之釣瀨疎墳籍耕巖進奕棋後漢嚴陵被羊裘釣澤中後人名其釣處為嚴陵瀨焉揚子谷口鄭子真不詘其志耕于巖石之下名震于京師此公以自比也疎墳籍進奕棋言其閩曠而然地蒸餘破扇冬暖更纎絺言䕫之風土多暄也語當暑袗絺絡豺遘哀金楚麟傷泣象尼趙云王仲宣詩西京亂無象豺虎方遘患此之謂豺遘其有登樓賦乃是登荆州之樓此之謂登楚哀登楚者哀登楚之人也史記魯哀公曰狩獲麟孔子見之掩袂拭面目吾道窮矣象尼者孔子之生其父母禱之于尼丘山故名丘字仲尼而傳記又載孔子之首象其山衣冠迷適越藻繪憶遊睢越人斷髪文身以衣冠適之則迷矣漢武帝祀后土于睹水之上趙云言欲離䕫而南下且未能即然所以用適越事形容之莊子曰宋人之章甫而適諸越越人斷髪文身無所用之也睢音雖地在南都昔之宋州也效杜正謬文選陳孔璋為曹洪與魏文帝書曰過高唐者王豹之謳游睢渙者學藻繪之綵李周翰注睢渙二水名其人多文章又能織藻繢錦綺天子郊廟御服出焉尚書所為厥篚織文也公少年嘗遊宋故云憶遊睢賞月延秋桂傾陽逐露葵沈休文春光發隴首秋風生桂枝足趙云此正見公作詩之時三秋皆秋桂也非八月不當之延則延賞也曹子建表若葵藿之傾太陽葵傾陽而吾心亦逐之也大庭終反樸京觀且僵尸莊子載大庭氏與赫胥氏栗陸氏相連不著年載大率至徳之世反淳復樸也左傳宣十二年楚子曰古者明王伐不敬取其鯨鯢而封之以為大戮于是乎有京觀以懲淫慝起云公意欲席巻西夷也髙枕虚眠晝哀歌欲和誰趙云髙枕字言不得髙枕而卧邊孝先弟子嘲之曰懶讀書晝日眠左太沖哀歌和漸離謂若傍無人今乃言無和我者也又陽春白雪曲高和寡亦此意南宫載勲業凡百慎交綏後漢永平中顯宗追感前世功臣乃圖畫二十八將于南宫雲台詩凡百君子各敬爾儀魏應徳璉建章臺集詩凡百敬爾位以副飢渴懷左傳文十二年晉人秦人出戰交綏杜預注云司馬法曰逐奔不逺則難誘從綏不及則難陷然則古名退軍為綏秦晉志未能堅戰短兵未致爭而雨退故曰交綏今公意葢言欲載勲業于南官者則無使志之下堅猶戰者之交綏焉送李功曹之荆州充鄭侍御叛官重贈曽聞宋玉宅毎欲到荆州杜詩可補遺按余知古渚宫故事曰庾信因侯景之亂自建康遁歸江陵居宋玉故宅宅在城北三里哀江賦誅茅宋玉之宅穿逕臨江之府子美在䕫詠懷古跡云摇落深知宋玉悲江山故宅空文藻又移居入䕫州宅云宋玉歸州宅雲通白帝城疑歸州亦有宋玉宅非止于荆州也荆趙云今公専主荆州宅而言之爾韓愈為州法曹詩亦云宋玉亭邊不見人此地生涯晩遥悲水國秋趙云王裒與周𢎞讓書云還念生涯繁憂總集又王無功世人世何勞隔生涯故可知水國指言荆州其字則周禮云水國用龍節句意其其秋時在荆州也孤城一柱觀落日九江流趙云一柱觀渚宫中事宋臨川王義鎮江陵于羅公洲上立觀惟一柱也九江與荆州水相連矣公前有詩曰九江落日醒何處一柱觀頭眼几回亦言荆荆州也使者雖光彩青楓逺自愁趙云上句即詩所為皇皇者華君遣使臣也送之以禮樂言逺有光華之意為判官于幕府則必出使故以使者目之下句又是楚字宋玉云湛湛江水兮上有楓目極千里兮傷春心上卿翁請䀺武侯廟遺像缺落時崔卿權䕫州大賢為政即多聞趙云言多有傳聞之善政也刺史真符不必分漢制除刺史則分銅虎符竹使符師古曰謂各分其半右留京師左以與之真符不必分則言其權為州也尚有西郊諸葛廟易云自我西郊孔明有祠在䕫州臥龍無首對江濆徐庶謂先主曰諸葛孔明卧龍也易見羣龍無首孤鴈公值喪亂羇旅南土而見于詩者志嘗在于鄉井故託意于孤鴈也末章則訊不知我而譊譊者孤鴈不飲啄飛鳴聲念羣趙云一作聲聲飛念羣是飛鳴念羣則與下句鳴噪自紛紛相犯也誰憐一片影相失萬重雲趙云范元寔詩眼云嘗愛崔途孤雁詩云几行歸塞盡者八句豫章先生使余讀老杜孤雁不飲啄者然後知崔途之無竒范之説如此今全載其詩云几行歸塞盡念爾獨何之暮雨相呼失寒塘欲下遲渚雲低間渡關月泠遥隨未必逢繒繳孤飛可自疑庶學者知之也其中公用相失字而崔用相呼失葢在孤雁自當使失字梁簡文帝賦隴坻雁初飛詩亦云霧暗早相失沙明還共飛望盡似猶見哀多如更聞野鵶無意緒鳴噪自紛紛趙云末句則言野鵶之紛紛不若孤雁之獨鳴為有意也豈有不知我而譊譊之意耶遣愁養拙蓬為户茫茫何所開趙云禮記儒有蓬户甕牗貧者之居也士而至于蓬門則亦為生之拙者矣又繼之以茫然無所開其愁可知故作詩以遣之爾江通神女館見神女峯娟妙注地隔望鄉臺見者落望鄉臺注巫趙云兩句盖言䕫州也神女館在山鄉鄉臺在成都隋蜀王秀所築見成都記漸惜容顔老傷時不可再也無由弟妹來以道路阻隔故爾列子載揚朱曰弟妹之所不親兵戈與人事回首一悲哀史云棄絶人事奉寄李十五秘書二首文嶷避暑雲安縣秋風早下來暫留魚復浦同過楚王臺趙云避暑雲安縣言李秘書留身雲安度夏也秋風早下來約李秘書早自雲安來䕫也旣來矣則囑其于魚復浦而少駐公欲與之同南下也魚復乃漢縣舊名今之奉節縣也楚王臺則高唐賦所為游于雲夢之臺是巳猿鳥千崖窄江湖萬里開竹枝歌未好畫舸莫遲回竹枝歌巴渝之遺音惟峽人善唱趙云梁簡文帝經琵琶峽詩千崖共隠天末句葢速其來而出峽矣竹枝歌䕫峽人歌之末好則離出䕫峽聴好音也右一行李千金贈衣冠八尺身飛騰知有䇿意度不無神趙云左傳行李之往來千金贈則見其贐行之多衣冠八尺身實道其頎然而長也飛騰字飛聲而騰茂實也班秩兼通貴公侯出異人元成負文彩世業豈沈淪趙云唐制秘書郎從六品上所以謂之通貴左傳公侯之子孫必復其始李秘書必宗室之子矣末句又見李秘書世以經學相傳葢漢韋賢其先韋孟少子元成皆以經術名家賢常曰遺子黄金滿籯不如一經而元成少好學脩父業為相七年守正持重不及父質而文采過之右二即事天畔羣山孤草亭江中風浪雨𡨕𡨕楚辭九歌雷填填兮雨㝠㝠一雙白魚不受釣三寸黄柑猶自青史記周本紀武王渡河中流白魚躍入王舟中多病長卿無日起謝靈運云有疾象長卿窮途阮籍幾時醒趙云公以司馬長卿自况則亦病消渴也魏氏春秋曰籍時率意獨駕不由逕路車迹所窮輒痛哭而反貼之以幾時醒則籍沈醉于酒一飲六十日也未聞細栁散金甲周亞夫細栁營蔡文姫詩金甲耀朝日腸斷秦川流濁涇公有弟妹在秦川也栁趙云時京畿有兵戍戍故用細事亞夫所營之地秦川言長安潘安仁西京賦云北有清渭濁涇公懷鄉之句也詩經以渭濁九家集注杜詩巻二十九
