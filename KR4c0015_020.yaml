body:
  text: 九家集注杜詩卷二十宋郭知逹編近體詩秦州雜詩二十首滿目悲生事因人作逺遊趙云延篤與李文德書吾誦伏羲氏之易煥兮爛煥其滿目史記因人成事楚辭有遊逺賦遲回度隴怯浩蕩及一作入關愁水落魚龍夜秦有魚龍川山空鳥鼠秋禹貢所謂鳥鼠同穴者是矣鳥鼠谷名也杜補遺太平御覽載關中諸水云水經注云有一水出天水縣西山人謂小隴山其水出五色魚俗以為龍而莫敢採捕謂是水為魚龍水又爾雅釋鳥云鳥鼠同穴其鳥為其鼠為郭璞注云如人家鼠而短尾鵌似繡而小黃黑色穴入地三四尺鼠在內鳥在外今在隴西首陽縣鳥鼠同穴山中趙云按水經渭水有汧水入焉有二源一水出五色魚俗不敢捕因謂是水為魚龍水亦名魚龍川然則魚龍者魚之龍也汧水在今隴州又按唐地理志鳥鼠同穴山在州州之渭源今公詩題謂之秦州雜詩而用魚龍夜鳥鼠秋蓋舉秦隴一帶事耳西征問烽火心折此淹留别賦心折骨驚則趙云潘嶽有西征賦烽火時有吐蕃之亂也史記李牧謹烽火楚亂云又胡為淹留右一秦州城北寺勝跡隗囂宫後漢隗囂據隴西天水郡寺即囂故居苔蘚山門古丹青野殿空月明垂葉露趙云言月色明白于垂葉之露也雲逐度溪風清渭無情極愁時獨向東右二州圖領同谷驛道出流沙同谷縣名流沙地名道師云天水隴西同谷三郡通西域故曰出流沙降虜兼千帳居人有萬家趙云同谷郡在唐乃成州𨽻山南西道採訪今公所賦秦州詩乃隴右道而云州圖領同谷何也此因在秦州更欲西往而賦成州詩也公于乾元中竟寓居同谷縣馬驕珠汗落胡舞白題一作蹄斜西戎有白題蠻杜補遺傳𤣥乘輿馬賦曰揮沫成露流汗如珠一本珠作朱蓋汗血也故子美醉為馬所墜諸公薦酒相看有朱汗驂驔猶噴玉之句南史白題國王姓支名秸殺其先蓋胸奴之别種胡也漢灌嬰斬胸奴白題一人是也在滑國東裴子野傳武帝時西北逺邊有白題及滑骨遣使由岷山道入貢二二國厯代弗賔莫知所出子野曰漢穎隂侯斬胡白題將一人服䖍注云白題胡名也其趙云服䖍注云謂之白題題者額也其俗以白塗堊額故以此得名舞則頭偏頭偏則白題亦斜矣漢郊祀歌太一况天馬下霑赤汗沫流赭赤之輿赭非朱而何年少臨洮子西來亦自誇臨洮郡名也之趙云今之洮州也洮洲在秦州西故云西來亦自誇誇其年少耳右三鼓角緣邊郡川原欲夜時秋聽殷地發風散入雲悲抱葉寒蟬靜歸山獨鳥遲萬方聲一概吾道竟何之戎馬之際天下皆有鼓角聲人方以武事為急吾道何所施乎欲趙云此篇詠鼓角也抱葉寒靜歸孤獨鳥居遲當秋夜之景則聞鼓角鳴聲為可傷矣時東有案史之辭西有吐蕃之警故曰萬方聲一槩楚辭曰一概而相量孔子云吾道其非耶何之字祖雖出莊子茫乎何之忽乎何適而謝靈運初發石首城詩云苕苕萬里帆茫茫終何之而公今用竟何之也右四南使冝天馬由來萬匹強阮籍詩天馬出西北由來從東道杜補遺前漢張騫傳武帝發書易卜曰神馬當從西北來得烏孫馬好名曰天馬及得大宛汗血馬益壯更名烏孫馬曰西極馬宛馬曰天馬涯窪天馬事詳見沙苑行驄馬行元注趙云此篇專賦天馬也浮雲連陳沒秋草遍山長趙云此以形容馬之多也聞說真龍種天馬龍種也仍殘老驌驦見驌驦一骨獨當御注有趙云龍種正言天馬乃神龍之種左傳唐成公如楚兩驌驦酉陽雜爼載肅霜本俊鳥而馬形如之殘者餘也唐人語以餘為殘末句蓋言所餘之驌驦以而不用于戰故哀鳴思戰鬪也豈非公自况耶使當時用公如張鎬則廟謨神算必能破賊矣哀鳴思戰鬪逈立逈蒼蒼右五城上胡笳奏山邊漢節歸趙云胡笳胡人卷蘆葉吹之名曰胡笳李陵書云胡茄互動蘇武在胸奴中持漢節卧起胡笳奏言用兵以禦吐蕃也時吐蕃既侵陷州郡又欲請和而為之通使也防河赴滄海奉詔發金微杜補遺續唐書通典羈縻州有金微州𨽻振武軍趙云防河赴滄海則吐蕃雖旋請和而出入不常則河又不可不防矣滄海豈指青海邪考之地理洮州之北河州河州渡河則鄯州鄯州之北則青海也若杜補遣所引金微其說是蓋僕固懷思傳正觀二十年䥫勤九姓大首領率衆降分置瀚海燕然金微幽陵等九都督府别為蕃州以僕骨歌濫拔延為右武衛大將軍金微都督今云發金微則防河之士自金微而發也士苦形骸黑旌疏鳥獸稀那堪往來戍恨解鄴城圍鄴城史思明所據恨解圍者言士苦于征戍而恨賊之未平也趙云言士卒勞苦故形骸黑旌疏鳥獸稀一說謂旌旗疏零其上所畫之鳥獸稀少矣周禮曰熊虎為旗鳥隼為旟此乃鳥獸之義以暗言戰不勝而士卒勞苦旌旗雕疏然恐杜公不敢變旌旟二字為旌變熊虎鳥隼四字為鳥獸一說謂旌之羅列疏逺鳥驚獸駭而稀然旌多雕蜜則方有鳥驚獸駭之理而稀則未必然二說如此以俟博者之惟師民瞻本作林疏鳥獸稀亦于戍兵無說豈以戊兵過往殘伐林木而稀耶末句正言西邊既苦吐蕃之戰而鄴城之圍既圍復解史賊猶未平則役于戍疲往來所以為恨右六莽莽萬重山孤城山一作石谷間無風雲出塞不夜月臨關杜補遺解道康齊地記曰齊有不夜城自古者有日夜中照于東境故萊子立此城以不夜為名是詩云不夜蓋月之時如晝也不趙云風飄則雲散故云出塞以其無風月臨關所以夜神仙傳王母所居寶樹萬條瑶幹千尋無風而音韻自響江洪詠薔薇詩不搖香已亂無風花自飛不夜杜田所引是其事已載前地理志注中矣或曰今秦州有無風塞不夜城蓋亦後人因杜詩而為之名也屬國歸何晚樓蘭斬未還蘇武歸漢為典屬國𫝊介子傳先是龜兹樓蘭常殺漢使者介子持節使誅斬樓蘭王安歸首懸之北闕或趙云指言往吐蕃之使也公之意尚怒吐蕃之叛或欲和而思者也斬之也煙塵一長望哀颯正摧顔右七聞道尋源使從天此路回張騫尋河源牽牛去幾許博物志昔有人乘查泛河匆匆不知晝夜至一處多見織女有一丈夫牽牛渚次飲之歸問嚴君君君卑曰某日客犯牛女宛馬至今來見宛馬揔肥春苜蓿注張趙云時遣使與吐蕃和云尋源使則借騫以為言也博物志載乘槎事以為後漢時人而公屢使張騫作度廋肩吾奉使江州船中七夕詩曰漢使俱為客星槎共遂流亦以漢使貼星槎事使蓋因話録所謂詩家承襲也故繼曰牽牛去幾許正用乘槎者至天河違見牽牛丈夫宛馬至今來則望吐蕃既和而西域皆通貢也一望幽燕隔何時郡國開時幽燕在賊竟郡國未寧也東征健兒盡羌笛暮吹哀士多死亡哀憤之氣形兹羌笛也健趙云以幽燕未平郡國未故兒皆東征開羌笛而可哀也右八今日明人眼臨池好驛亭叢篁低地碧高栁半天青地髙栁半天是亦傷君子沈下位也公之命意多有如此者趙云業篁髙桞止道實景舊注穿鑿蓋篁之與栁何用分君子小人觀下句云稠疊多幽事正言有池有竹有栁為幽事豈有譏誚乎稠疊多幽事稠疊猶重疊也巖趙云謝靈運過始寧墅詩云峭領稠疊喧呼閲使星時亂民喜見使者故喧呼晋志流星天使也漢李指郃使星以示二使趙云指往來使吐蕃者老夫如有此不異在郊垧有此謂有此亭也右九雲氣接崑崙涔涔塞雨繁羌童看渭水使客向河源趙云崑崙山乃河源所出秦州詩而言雲氣接崑崙崑崙雖云去嵩髙五萬里而大率在西方之逺地為張大之語則雲氣可接為不足怪如夔州古柏而云月出寒通雪山白也既云雲氣接崑崙故又曰使客向河源涔字雨日涔出淮南子又倣前漢頭痛涔涔也羌童看渭水似言吐蕃之兵窺覷渭水而朝廷使客如張騫之向往河源也史記司馬遷雖云烏覩所謂河源者哉子長蓋以崑崙之逺非人跡所能即至若詩家則用其美事爾煙火軍中幕牛羊嶺上村所居秋草靜正閉小蓬門右十蕭蕭古塞冷漠漠秋風一作雲低黃鵠翅垂雨薛云文選黃鵠一逺則千里顧徘徊蒼鷹飢啄泥亦作傷也薊門誰自北鮑照有出自薊門北趙云薊門指言安史也出自薊門北樂府有之不獨鮑照耳誰自北則公問收復燕薊者誰也漢將獨征西不意書生耳臨襄厭一作見鼓鞞趙云指言往吐蕃之人漢有征西將軍右十一山頭南郭寺水號北流泉師云寰宇記秦州天水縣有水一𣲖北流入長安縣界老樹空庭得清渠一邑傳秋花危石底晚景卧鐘邊一作前俯仰悲身世溪風為颯一作肅然趙云狄花在危石之底晚景照卧鐘之邊皆道實事蓋寺有卧鐘故也鮑明逺詠史詩身世兩相棄蘭亭序云俯仰之問已為陳迹右十二傳道東柯谷深藏數十家對門蕂蓋瓦映竹水穿沙趙云公後有示姪佐詩自注云佐草堂在東柯谷則東柯谷乃秦州境中之地瘦地翻宜粟師云崔融詩瘦地秋草頭陽坡可種瓜杜補遺毛文錫茶譜云宣州宣城縣有塢如山其東為朝日所燭號曰陽坡其茶最勝太守常萹于京洛人事題曰陽坡橫紋茶是詩所謂陽坡其亦以日所燭故歟趙云此言東柯谷中之瘦地與陽坡也種粟當在肥地而瘦地翻自宜粟言東柯谷中之地無不好者陽坡向陽之坡如所謂陽崖陽岡陽陸陽林也或云秦州有陽坡瘦地豈後人因杜為名矣若元稹詩陽地自尋蕨村沼且漚菅亦地名乎種瓜正要日照阮籍詩曰昔日東陵爪今在青門外五色曜朝日子母鈎相帶可見矣船人近相報但恐失桃花桃花水也俗以三月水為桃花水趙云東柯谷雖不可考意者自秦州必乘水而往未句用花花字意以東柯谷為桃源也船人報恐失桃花則公欲往不往之際矣舊注以為桃花水誤矣蓋桃花水之侯即水尤肥肥漲河損于行船乎又篇云漠漠秋雲低秋花危石底後篇云邊秋陰昜夕地僻秋將盡皆秋時詩耳與三月桃花水尤不相干桃花言桃源也右十三萬古仇池穴潜通小有天世說仇池有地穴通小有洞天中有神魚食之者仙鮑云按唐志戍州同谷縣有仇池秦城接壤東坡云趙德麟曰仇池小有洞天之附庸也王仲至曰吾常奉使過仇池有九十九泉石萬山環之可以避世如桃源一杜補遺茅君內傳大天之內有𤣥中洞三十六所第王屋山之洞周曰萬里名曰小有清虛之天第二委羽之洞周回萬里名曰大有穴之天天故子美憶昔云北尋小有洞之句十趙云此篇賦仇池也並見送韋六評事詩注神魚人不見福地語真傳仙經有福地鎮地皆以名山或洞府為之也薛云按遺書有三十洞洞天有七十二福近接西南境長懷十九泉何時一茅屋送老白雲邊趙云公詩所謂通小有十九泉神魚事皆是紀實但不見仇池記考之耳福地則凡名山多有福地世福地地記右十四未暇泛滄海悠悠兵馬間塞門風落木一云塞風寒落木客舍雨連山阮籍多行興龎公隱不還見昔者龎公注赴趙云前篇云防河滄海則滄海専指西海也阮籍行多興按魏氏春秋曰籍時率意獨駕不由徑路道跡所窮慟哭而反今言多興則紀以初行時也龎公隱不還龎德公携妻子隱于鹿門山採藥不返隱不還正欲慕之也東柯遂疏懶休鑷鬢毛班杜補遺南史鬱林王年五嵗戲髙帝傍帝令左右鑷白髮問王我誰耶答曰太翁帝笑曰豈有為人作曽祖而拔白髮乎即擲鏡鑷趙云此句言得遂東柯谷之隱則凡事疏懶亦不暇鑷鬢毛矣右十五東柯好崖谷不與衆峯群落日邀雙鳥晴天卷片雲野人矜險絶水竹㑹平分採藥吾將老童兒未遣聞趙云野人矜險絶則東柯之人自矜其地險絶此已含蓄可避世之意將與野人分水竹之景也九辨云皇天平分兮四時右十六邊秋陰易夕不復辨晨光鮑照詩曉正寥落落晨光復決漭趙云陶淵明恨晨光之熹微鮑照詩在後簷雨亂淋幔山雲低度墻鸕鷀窺淺井蚯蚓上深堂深一作髙鸕鷀窺淺井無食也蚯蚓上深堂室空也趙云以積西久陰而然也車馬何肅索門前百草長趙云暗使張仲蔚所居蓬蒿滿門寂無車馬事右十七地僻秋將盡山髙客未歸塞雲多斷續邊日少光輝江淹恨賊遙風忽起白日西匿隴雁少飛岱雲寡色又秋日蕭索浮雲無光驚急烽常報傳聲檄屢飛鮑明逺羽檄起邊亭烽火入咸陽簡杜補遺光武紀王郎移檄注說文曰檄以木為書長尺二以徴召也魏武奏事曰若有急則插以雞羽謂之羽檄烽事見送從弟亞赴安西判官連山暗烽燧補遺趙云客未歸者公自謂也烽謂烽候甘氏天文占曰敵至則舉烽火十丈如今井桔橰火錘其頭若警備急然火其頭放之權重本低則末仰見烽火也飛檄字潘安仁關中詩云飛檄秦郊告敗上京漢髙祖曰吾以羽檄徴天下兵西戎外甥國何得近天威左傳曰天威不違顔咫尺薛云按唐書景龍四年以金城公主下嫁吐蕃乾元元年肅宗以幼女寧國公主下嫁回紇爾雅曰妻之父為外舅郭璞曰謂我舅者吾謂之甥然則亦呼壻為甥孟子曰帝館甥于二室是也唐書贊普奉表言甥舅趙云指言吐蕃為贊普尚主也近天威言其敢有窺帝都之心右十八鳯林戈未息魚海路常難師云寰宇記陕州有鳯林十道者潞州上黨縣有魚子陂按肅宗紀至德二載安慶緒陷陕郡九月陷上黨候火雲峯峻烽候之火夏雲多竒峯縣軍幕井乾縣軍謂路險阻縣之使下也鄧艾伐蜀縣軍深入幕一作暮杜補遺周禮挈壺氏掌挈壺以今軍事凡軍事縣壺以聚柝易曰井收勿幕火趙云郭子儀取魚海五城乃此魚海也候火烽候之也言烽燧在雲峯峭峻之上謝靈運詩滅迹入雲峯禮挈壺氏掌挈壺以令軍事其說是井收勿幕解者以井口曰收勿幕則勿遮幕之今公但使其字意言軍旅之衆飲井者多而所幕之井乾其縣示軍中之器以表此井也舊注縣軍字偶相犯耳風連西極動月過北庭寒趙云上句因吐蕃之亂下句因幽薊之師而有所感也故老思飛將李廣飛將軍何時議築壇漢髙祖築壇拜韓信為大將右十九唐堯真自聖野老復何知莊子所謂帝力何有于我哉趙云唐堯謂肅宗也野老公自謂也曬藥能無婦應門幸有兒李令伯表內無應門三尺之童世說荀淑使叔明應門慈明行酒耳趙云此以實事道懷藏書聞禹穴司馬遷年十嵗誦古文二十四而南逰江淮上㑹稽探禹穴窺九疑讀記憶仇池憶一作悟白杜補遺後漢西南夷傳氏居河池一名仇池注云在今成州上祿縣南仇池記曰仇池百頃壁立千仭自然樓櫓却敵之狀分起調均竦起數丈有踰人功為報鴛行舊鷦鷯在一枝見卑棲但一枝注禹趙云藏書聞禹穴言穴藏書也其地在南聞之而已未可遂往以引下句讀記憶仇池仇池在同谷郡公有欲往之意故讀記而懷之仇池隴右之福地前篇可見鴛行指言平日同禁省之人朝臣故謂之鴛鷺行也鷦鷯一枝公自謂也出莊子鷦鷯巢于深林不過一枝右二十月夜憶舍弟戍鼓斷人行戍樓鼓也邊秋一鴈聲言孤也露從今夜白月是故鄉明師云江淹别賦隔千里兮共明月子美工于用字析而倒言之故其語勢尤健如别來頭併白相見眼終青之類是也有弟皆分散一作羇旅無家問死生亂離流落故無家也露趙云此篇七月中所作也月令孟秋之月涼風至白降今云露從今夜白是已公之二弟方賊亂時一在濟州一在陽翟故言皆分散也無家問死生又指其弟之無家耳左傳鄭莊公云寡人有弟不能和協而使糊其口于四方史記馮歡彈劍鋏而歌曰長鋏歸來乎居無以為家一作有弟皆羇旅非寄書長不達况乃未休兵宿贊公房京師大雪寺主謫此安置杖錫何來此秋風已颯然雨荒深院菊霜倒半池蓮放逐寧違性性安窮達不以放逐而耳虛空不離禪釋經以禪宗為空門相逢成夜宿隴月向人圓師云古詩隴頭圓月白地趙云虛空字指言其所放逐之在空寂之處莊子徐無鬼篇曰逃虛空者聞人足音而喜是已夫有道之人豈以放逐而遂改其性况其空寂之處正亦是禪家所宜矣東樓萬里流沙道流沙地名老子西涉流沙而不返征西過此門晉漢有征西將軍官但添新戰骨不返舊征魂一作但添征戰骨不返死生魂趙云流沙則自秦州而西往也師民瞻本作西行過此門是蓋泛言西行之人出此西門耳與征魂不相犯樓角臨風迥城陰帶水昏傳聲看驛使送節向河源趙云樓角樓之邊角也臨風迥以言其髙言及城隂則樓傅於城上何遜詩城陰度塹黑末句又以言遣使與吐蕃和時吐蕃旋戰旋請和故爾又暗用張騫奉使尋河源事所以比使者如張騫也雨晴一作秋霽天水秋雲薄秦為天水郡從西萬里風趙云指言秦州之天水也陸士衡前緩聲歌云長風萬里舉今朝好晴景久雨不妨農以得時也塞栁行疏翠山梨結小紅胡笳樓上發一鴈入髙空趙云行音杭張祐詩萬人齊指處一鴈落寒空句法亦與此同蓋惟一鴈字方好寓目趙云左傳得臣與寓目焉一縣蒲萄熟秋山苜蓿多西域人好飲蒲萄酒馬食苜蓿二師伐宛將種歸中國也處杜補遺永微圖經曰葡萄生隴西五原燉煌山谷今處有之苗作藤蔓而極大盛者一二本綿被山谷間花極細而黃白色其實有紫白二色而形之圓鋭亦二種又有無核者謹按史記大宛以葡萄為酒張騫使西域得其種而還種之中國始有蓋北果之最珍者神農本草云苜蓿味苦平無毒主安中利人可久食陶隱居云長安中乃有苜蓿園北人甚重此南人不甚食之以其無味故也廣韻載史記云大宛國馬嗜苜蓿漢使所得種于離宫又玉篇云漢書罽賓國多苜蓿宛馬所嗜本作目宿趙云此篇題名寓目皆實道其事葡萄果名苜蓿草名二物本西北所有因張騫自大宛帶種歸中國故近西之地多有之苜蓿以飼馬關陕人亦食之薛令之詩曰朝日上團團照見先生槃槃中何所有苜蓿長闌干是也梁孝儀北使還與永豐侯書曰馬銜苜蓿嘶立故墟人獲葡萄歸種舊里則二物西北之産明矣關雲常帶雨塞水不成河羌女輕一作搖烽燧胡兒制一作掣駱駝自傷遲暮眼喪亂飽經過趙云關雲塞水羌女胡兒皆所寓目之事烽燧一物二名燃火曰烽舉煙曰燧楚詞云傷美人之遲暮阮籍詠懷云西逰咸陽中趙李相經過飽饜也蓋如石勒謂季陽云卿亦飽孤毒乎公詩又云老樹飽經霜山寺野寺殘僧少山園細路髙麝香眠石竹麝鹿也鸚鵡啄金桃亂石通人過懸崖置屋牢上方重閣晚百里見纎毫趙云此篇實道山寺之景物耳石竹川中繡竹花也麝香鸚鵡言僧家所養者上方言在山上之方境也一作亂水即事聞道花門破前有留花門詩和親事却非人憐漢公主生得渡河歸杜補遺按唐史回紇自肅宗即位遣使請助討賊祿山太子葉護自將四千騎來在所命周王師進收長安嚴莊挾安慶緒隨棄東京北渡河回紇遂大掠東都三日府庫窮墠葉護還京師帝遣羣臣勞之長樂帝座前殿召葉護升階席宴且勞之葉護頓首言留兵沙苑臣歸料馬以收范陽除殘盜乾元元年回紇請婚許以幼女寧國公主下嫁明年可汗死公主以無子得歸秋思拋雲鬢腰肢賸寶衣羣凶猶索戰回首意多違趙云公主以秋八月自回紇還今云愁思拋雲鬢腰肢賸寶衣則猶以無緒而不事梳沐且亦瘦癯也然首兩句云聞道花門破和親事却非則若使有犯順之作中國與戰而破之所以失和親之好然于新舊史皆無所考其後犯順自是寶應二年相去公主之歸乃四年也而又無破之之事豈公主才歸之後便為冦而中國能破敗之邪末句則意與首句尤相應蓋初為和親之因以藉其來助和親既非而索戰則所以藉之之意又違矣觀代宗即位又使劉清潭徴兵以修舊好却先為史朝義誘之而為冦斯乃意違之證但非公主才歸之後耳俟明識辨之後漢陳蕃上疏曰羣凶側目禍不旋踵魏公九錫文曰羣凶覬覦連城帶邑遣懷愁眼看霜露寒城菊自花天風隨斷栁客淚墮清笳水净樓隂直山昏塞日斜夜來歸鳥盡啼殺後棲鴉趙云此詩直道事實末句感物以為興耳天河師云揚泉物理論水之精氣上浮宛轉隨流水名曰天河也新添毛詩倬彼雲漢昭回于天箋云雲漢謂天河也天河水氣也精光轉運于天而倬然常時任顯晦秋至輒一作轉分明天河至秋則顯見人目為銀河師云庾亮詩天河秋轉明縱被浮雲掩終能一作當非永夜清賢人雖則為羣小所掩然終不害其明其也趙云師民瞻本輒字作轉極是蓋秋已前非無天河但或顯或晦非若秋時之轉為分明耳而選有云寧顯寧晦頷聮兩句雖實道其事若以為寄興亦可蓋言小人終不能掩君子也含星動雙闕伴月落邊城牛女年年渡何曾風浪生世說牽牛織女二星七夕渡河相聚則趙云天河在上所臨之處詩人皆可想含星動雙闕言長安帝闕伴月落邊城却指秦州之城雙闕祖出先聖本紀曰許由欲觀帝意曰帝坐華堂靣雙闕君之榮願亦足矣其餘古詩雙闕百餘尺鮑昭結客少年行云雙闕似雲浮史記士篇曰邊城少冦而長楊賦永無邊城之警曺子建白馬篇邊城多警急河與星謂之動昔漢武詩星辰影動搖河漢與月皆謂之落鮑明逺玩月詩云夜移冲漢落牛女渡河事出齊諧記曰武丁者事初月趙云初月者才出之月也非如鈎新月之謂與成都府古詩初月出不髙同義矣光細弦初趙作豈上影斜輪未安師云小雅如月之恆箋云月上弦而就盈李隅賦波水蕩而月輪斜此蓋譏肅宗始明而終暗也日趙云易乾鑿度曰月三日成魄八日成光在尚書三謂之朏則言其始出也齊虞義詠秋月云初生似玉鈎裁滿如團扇所謂初月者有始生之月有才出之月始生之月乃似玉鈎之月也在古人止謂之新月梁蕭綸有詠新月詩是已其成光之際則名曰弦今厯家每于八日標為上弦釋名論月曰弦半月之名也其形一傍曲一傍直若張弓弦也既為半月之名亦非止名新月矣梁何遜望初月詩云初宿長淮上破鏡出雲明狀之為破鏡亦以言月之半而題曰初月則以才出之月名初也今公所賦亦然非謂三日已後八日以前之之月也梁庾肩吾望月詩曰渡河光不濕移輪轍詎開在月言光與輪此八日以後之月今公詩首句云光細弦豈上影斜輪未安蓋亦以月八日成光光成光則名上弦矣而光之細則以其初出也豈是上弦之光乎崔豹古今注云漢明帝作太子時樂人以歌四章贊太子之德一曰日重光一曰月重輪三曰星重曜四曰海重潤則輪字専以言月不必于滿而後為輪也庾肩吾詩星流時入暈桂長欲侵輪劉孝綽詩輪光缺不滿扇影出將圓謂之欲侵謂之光缺則不必于滿而後為輪矣今公以月之初出其影尚斜將欲滿而成輪但未安而全露也微升古塞外已隱暮雲端言易落也升杜補遺是詩肅宗乾元初子美在秦州避亂時作微古塞外喻肅宗即位於靈武也已隱暮雲端喻肅宗為張后與李輔國所蔽也按唐史肅宗即位于靈武立淑妃張氏為后后善牢籠稍稍預政事與中人李輔國相助多以私謁撓權徙太上皇西內譖寧王倓賜死皆其謀也及肅宗大漸挾趙王係謀危太子卒以誅死故趙云月賦云升清質之悠悠月之初出自低而升髙曰升今公詩云微升古塞外則言才出之月明甚蓋成魄之月才出便在天半不假言升也與成都府古詩云初月出不髙同意為是秦州賦詩故著言古塞外李陵曰塞外草衰有塞外字而上貼之以古為古塞外枚乘詩曰美人在雲端有雲端而上貼之之以暮為暮雲端此又詩人之工也世傳魏道輔云意主肅宗也如韓詩煌煌東方星洪興祖謂其順宗時作乎東方謂憲宗在儲也杜田因而立論則好為穿鑿者矣蓋以月言人君已不為善取譬況自至德之逺逮乾元之元肅宗即位已三年矣豈得以月之微升比即位乎河漢不改色關山空自寒趙云言月才出時便隱惟河漢不以月之朓朒弦望而輒改其卓彼之色關山當此時亦空自寒也庭前有白露暗滿菊花團趙云白露則以著言初秋時矣蓋月令孟秋之月白露降也團字韻則詩云零露溥兮雖止溥字字而𤣥載謝𤣥暉詩猶霑餘露團又江文通云簷前露已團則用團字張景陽詩輕露栖叢掬謝惠連搗衣詩白露兹園掬歸燕此詩公託意以自喻自東樓下皆有所感而作然以前賢措意皆措一時之興故不敢妄生意思曲為穿鑿也不獨避霜雪其如儔侣稀四時無失序八月自知歸言四時迭運自得其序而以炎涼往來者乃燕之自知爾侣趙云蓋燕之歸當八月似將避霜雪而往今又為儔稀而歸則據所見之燕其去在衆燕之後矣所謂四時無失序八月自知歸此亦暗有事意周書失訓曰立秋之日涼風至後五日白露降後五日寒蜩鳴後五日𤣥鳥歸故燕之歸故失四時之序也春色豈相訪衆雛還識機故巢儻未毁會傍主人飛趙云上句乃問燕之辭言明年春色之時豈却相訪乎蓋有不相訪而往别家為巢之理衆雛還識機言别家容有害之者衆雛識機以我不致害之自再相訪也末句結之云此代燕之為言也師云禰衡鸚鵡賦憫衆雛之無知搗衣謝惠連有搗衣詩亦知戍不返秋至拭清砧砧搗衣詩也秋至拭砧作寒衣也已近苦寒月况經一作驚長别心言征伐之苦不保其死生寧辭搗衣倦一寄塞坦深師古古詩閨中有一婦搗衣寄逺人坦城墻也塞坦邉城用盡閨中力君聼空外音砧聲也促織促織甚微細秋蟲也哀音何動人草根吟不穩牀下夜相親久客得無淚故妻難及晨久客故妻皆羇苦易感者也趙云牀下夜相親則婦女及小兒子多置於牀下也小說載宮人以金籠盛之蓋有知矣沈休文宿東園詩有云樹頂鳴風飈草根積霜雪十月蟋蟀入我牀下十新添王褒傳蟋蟀俟秋吟師古注今之促織也毛詩月蟋蟀入我牀下蓋自野而宇自戶而牀淺謂著將寒有漸非卒來也若云取而置之牀下則失夜相親之意矣悲絲一作絃與急管感激異天真絲管之感人不若蟲聲之自然也趙曰暗用晉書絲不如竹竹不如肉以其漸近自然故絲管之聲不若蟲聲之天真也螢火幸因腐草出敢近太陽飛月令腐草化為螢太陽之光固非螢火之近近喻小有才而侵侮大德者西晉傳咸螢火賦云雖無補於日月兮期自竭於陋形當朝陽而戢景兮必宵昧而是征韋承慶直沖書省詩云螢光向日盡蚊力負山疲曜趙云梁蕭和螢光賦云見晨禽之曉征悲扶桑之吐梁沈旋詩云雨墮弗虧光陽升反奪照則螢火之不敢傍日飛矣未足臨書卷時能㸃客衣隨風隔幔小帶雨傍林微十月清霜重飄零何處歸趙云用車𦙍事蓋聚螢之多然後可以照字也庾信書卷滿牀頭又天寒舟坂客衣單梁朱超可念無端失林鳥此夜逆風何處歸蒹葭摧折不自守生質衰脆不能自守秋風吹若何暫時花戴雪幾處葉沈波言非嵗寒之質也體弱春風一作甲一作苗早師云沈約賦挺春甲而前生叢長夜露多江湖後搖落亦一作只恐嵗嗟跎趙云末句是費解蓋言今在秦州所見之蒹葭已落落矣尚餘時月之光景江湖之上其物在後搖落亦恐當嵗之暮有可傷之意九辨草木搖落而變襄曹子建詩白日忽嗟跑言其晚也苦竹青冥亦自守軟弱強扶持猶強自振立也也趙云楚辭據青冥而攄虹冥雲霄間之貌蓋指苦竹在髙山上者而言苦竹本野生之物宜在髙山之上其物叢生軟弱則然矣味苦夏蟲避叢卑春鳥疑軒墀曾不重剪伐欲無辭幸近幽人屋霜根結在兹質雖疲軟然得其託亦足保其生生矣趙云莊子夏蟲不可語於水周禮仲春初必以薪為之方言種人家軒墀者亦不重而剪伐之若在幽人之家方有保護結根之理除架瓜架也束薪已零落瓠葉轉蕭疏趙云西人方言直謂之除架如甜瓜謂之收園也瓜架之初必以薪為之今瓜已摘而架上之薪零落矣瓠即瓜也毛詩有瓠葉字幸結白花了寧辭青蔓除趙云瓜初花其色白結白花則為瓜實矣實既結則其蔓可除秋蟲聲不去暮雀意何如架除而蟲鳥失棲托也寒事今牢落人生亦有初言未生之初則作架以盛之才結花則有將實之望而其意稍怠矣故架壞則除去而不修也亦猶人事鋭始而怠終圔如趙云賦詩在秦州意言寒事今牢落則為客之不堪此然人生未嘗無初則公之初在太平之時文采動上聲譽坦赫本不如是之牢落也上林賦云牢落陸離左傳夫魯有初而謝靈運會吟行云會吟自有初夕烽夕烽來不近每日報平安塞上傳光小雲邉落㸃殘照秦通警急過隴自艱難問道蓬萊殿千門立馬看師云長安者蓬萊殿東內紫宸殿之北觀此則時可知矣志趙云光武紀修烽燧注甚悉烽則有一炬二炬四炬每日初夜舉一炬謂之平安火餘則隨寇多少而為差乃警急之報矣餘見秦州雜詩及寓目詩注此篇前四句言平安之報後四句言警急之報時吐蕃或侵害或請和故也警急出前漢書而曹子建白馬篇邊城多警急急胡虜數遷移過隴而艱難則安史之兵猶出沒隴上矣蓬萊殿在東內大明宫千門則所謂千門萬户也秋笛一作吹笛清啇欲盡奏奏苦血霑衣五音惟啇為最悲蓋啇主秋而有寥落之意也趙云笛一曲謂之奏方笛之吹啇聲所不堪聞而今欲盡奏以全其曲則聞者宜有霑衣之血淚盡繼之以血也庚信哀江南賦望赤岸而霑衣江文通詩零淚霑衣裳他日傷心極征人白骨歸趙云今日聞商聲而霑衣猶可也它日士有死于戰而以白骨歸時猶聞此詩尤傷心之極矣相逢恐恨過故作發聲微趙云於此相逢吹笛之人所吹每恐恨過故意作發聲微細以泄其恨恨此與平時吹笛不同矣相逢兩字主聼吹笛者言之則公自云也不見秋雲動悲風稍稍飛言笛聲哀切風雲亦為之悽慘也獨師云古詩角聲起蒼野秋雲愁不飛趙云言不人愁而已雖天亦愁故雲動而風飛也不見者言豈可見之乎古詩歌行多言君不見而此直行不見其字起于鮑明逺送逺帶甲滿天地盜賊充斥時方用兵也趙云史記蘇秦帶甲數十萬莊子原憲歌啇頌聲滿天地胡為君逺行親朋盡一哭楚辭悲莫悲於生别離鞍馬去孤城草木嵗月晚關河霜雪清别離已昨日因見古人情師云胡母潜詩只因君别我再見古人情趙云别離非獨今日已是昨日如此矣此所以見古人情也楚辭曰悲莫悲於生别離則古人之情豈不可見哉昨日字出莊子并韓詩外傳觀兵北庭送壯士燕太子送荆軻於易水上軻歌曰壯士一去不復還貔虎數尤多書如虎如貔詩杜補遺爾雅貔白狐其子縠注一名執夷虎豹之屬曰獻其貔皮陸機疏云貔似虎或曰似熊一名白狐遼東人謂之白羆炙轂子載貔銘曰書稱猛士如虎如貔亦豹屬也又曰執夷白狐之云似是而非趙云此篇自北遣兵來之詩貔虎出書蓋猛獸也精鋭舊無敵邉隅今若何精鋭猶勇敢也良趙云此詩人望其必勝而憂之之辭戰國策季謂魏王曰恃兵之精鋭而欲攻邯鄲妖氛擁白馬元帥待雕戈趙云兩句難解似言吐蕃所乘者乃賊之白馬妖孽氛氣擁逐而來元帥所以待北庭之雕戈而敵之陳徐陵移齊文有剪妖氛窮巢穴之語南史侯景為亂乘白馬青絲為轡以應䜟左傳晉謀元帥趙哀日郤縠可古鼎銘云王命尸臣官此栒邑賜爾和鸞黼黻雕戈師云國語秦穆公橫雕戈出見晉使者莫守鄴城下斬鯨遼海波言當誅魁渠也鄴趙云文明公據城圍也未下公意謂可緩鄴城之圍且於遼海斬鯨則以吐蕃為急也鯨以譬吐蕃之强暴左傳誅戮而作京觀謂之封鯨鯢一云言不獨守鄴當覆其巢穴也廢畦秋蔬擁霜露豈敢惜凋殘暮景數枝葉天風吹汝寒趙云蔬以秋時而擁霜露自然凋殘矣吾豈敢惜之也然口腹之供所以不忍其凋殘故于暮景之中數其枝葉餘幾也故又自憫夫因數菜蔬之餘幾而有天風之寒是亦豈得已哉君子之貧為可傷也緑霑泥滓盡香與嵗時闌生意春如昨悲君白玉盤趙云上兩句所以紀秋蔬之凋殘泥滓又見多雨之意末句言蔬當春時生意盛茂以供采掇猶如昨日則今之凋殘不足於食於我何足道哉其登於玉盤者遂空矣為可悲也君字蓋専言君王也應劭漢官儀曰封禪壇有白玉盤在至尊言之尤為當體如昨字選詩有昔日如昨又千年别如昨師云如李白詩少時不識月呼作白玉盤不歸河間尚征伐汝骨在空城從弟人皆有終身恨不平數金憐俊邁總角愛聰明見總角草書又神速注面上三年土春風草又生趙云此篇公之從弟有死而寄骨於其處但無所考其名字耳數金憐俊邁數應是上聲數金兩字未解以俟博聞天末懷李白趙云白於至德二載坐永王璘而謫夜郎今公在秦州懷之而遂謂之天末各天一方可云天末矣涼風起天末君子意如何月賦雲欱天末逺趙云西京賦日眇天末以期而陸士衡氶之云佳人眇天末擬古詩又云遊子眇天末逺期不可尋鴻鴈幾時到江湖秋水多趙云兩句似通句言書信耳問鴻鴈幾時可到於白之處江湖秋水既多則鴻鴈游泳其到恐遲也莊子秋水時至文章憎命逹魑魅喜人過趙云意與儒冠多誤身同蓋窮者而後工于文故文章反憎命逹也舜投四罪以禦魑魅魑魅厲鬼也喜人過則欲害之矣以譬小人害君子之意時白被罪流放故云應共寃魂語投時贈汨羅指屈原也也趙云此比白於賈誼屈原其死為寃也誼過汨羅有弔原賦劉越石四言詩永負寃魂獨立空外一鷙鳥河間雙白鷗師云張華詩漢漢江水平低飛雙白鷗飄颻搏擊便容易往來游趙云爾雅日飄颻謂之焱蓋風之狀也而後人用之則如選云落葉飄颻又云羅衣何飄颻也此言白鷗往來蓋不知鷙鳥之將搏擊此為可寒心矣公後篇寄賈六嚴八詩戒其為文為詩傳於衆而日浦鷗防碎首霜鶻不空拳則公今詩應有所憂之人乎晉孫盛騰箋桓溫曰進無鳯皇來儀之美退無鷹䴑擊搏之困公今却用搏擊字則翟方進傳搏擊豪强京師畏之草露亦多濕蛛絲仍未收天機近人事獨立萬端憂趙云此道獨立時景兩句或日露下衆草則將殺草蛛絲未收則將羅物皆有殺意此並是天機如人事之多患宜公有萬端之憂也日暮日落風亦起城頭烏尾訛杜正謬烏尾當作烏外殆傳印之誤按後漢五行志桓帝時京師童謡日城上烏尾畢逋蓋言處髙利獨食不與下共謂人主多聚斂也訛者斜也黃雲髙未動白水已揚波趙云皆言風也黃雲以髙故雖有風而未動白水以在下故得風而先揚波淮南子黃泉之埃上為黃雲而謝靈運擬阮瑀詩云河洲多沙塵風悲黃雲起江文通古别離云黃雲蔽千里遊子何時還白水言白色之水此晉文公所謂有如白水是也列女傳津吏女歌曰水揚波兮杳冥冥少司命云衝風至兮水揚波西京賦曰起洪濤而揚波羌婦語還哭胡兒行且歌將軍别換馬夜出擁雕戈趙云羌婦胡兒蓋秦州有寄處者耳與前篇羌女輕烽燧胡兒制駱駝同義將軍以敵人識其所乘舊馬所以換馬愈自慎重故夜出以雕戈擁衛雕戈字見本卷觀兵詩注李廣傳暫騰而上胡兒馬上空囊翠柏苦猶食晨霞朝可餐杜補遺云楚辭日山中人兮採杜若飲石泉兮飯松柏又列仙傳仙人偓佺食松柏之實楚辭日餐六氣而飲沆瀣潄正陽而餐朝霞注陵陽子明經云春食朝霞者日始出赤氣也秋食淪漢者日沒後赤黃氣也冬食沆瀣者北方夜半氣也夏食正陽者南方日中氣也相如火人賦云㑹食幽都吸沆瀣兮餐朝霞真誥九華真妃曰日者霞之實霞者日之精君唯聞服日實之法未知餐霞之精也夫餐霞之經甚祕致霞之道甚易此謂體生玉光霞映上清之法也趙云晨霞師民瞻作明霞是蓋不應言晨而又言朝也為新添上注不必拘晨朝之復也如宋玉髙唐賦云且朝云豈非且朝為復耶大人賦吸沆瀣兮餐朝霞嵇中散琴賦餐沆瀣兮帶朝霞顔延年五君詠云中散不偶世本自餐霞人世人共鹵莽吾道屬艱難趙云此兩句承上句之義公雖貧困而所食所飲皆神仙之物亦以自志其清如此此無它以世人共鹵莽不明而吾道適值艱難不遂也字則莊子云耕而鹵莽之其實亦鹵莽而報豫孔子云吾道其非邪詩天步艱難不㸑井晨凍晉書樵蘇不㸑清談而已無衣牀夜寒詩無衣無褐何以卒嵗囊空恐羞澀留得一錢看趙云暗用趙一云文籍雖滿腹不如一囊錢父老獻劉竉以錢而竉留一大錢也新添前漢灌夫傳平生毀程不識不直一錢病馬乘爾亦已久天寒關塞深塵中老盡力嵗晚病傷心趙云此篇暗使田子方事之意田子方出遊于野見病馬焉問之御者對曰此故公家畜也罷而不為用故出放之日少盡其力而老弃其身仁者不為也命束帛贖之出韓詩外傳琴賦云愀愴傷心毛骨豈殊衆馴良猶至今物微意不淺感動一沈吟趙云公於駿馬每言其狀之義而此云毛骨豈殊衆則詩人之言因以所見而感興不必拘系也庾亮登棲日老子於此復復不淺古詩云馳情整巾帶沈吟聊躑躅又如南史王琳傳有云沈吟不决蕃劒致此自僻逺又非珠玉裝師云曹植七啓步光之劒華藻繁縟綴以驪龍之珠錯以荆山之玉如何有竒怪每夜吐光芒師云張載劒歌奇怪兮難名李陽詩夜劒煥光芒虎氣必騰上龍身寧久藏風塵苦未息持汝奉明王趙云雷次宗豫章記曰吳未忘恆有紫氣見斗牛之間張華問雷孔章孔章曰是寶物也精在豫章豐城令至縣掘獄得二劍其夕斗牛氣不復見孔章乃留其一匣而進之劒至光曜煒燁煥若發後張華遇害此劒飛入襄城水中孔章臨亡戒其子恆以劒自隨後其子為建安從事經淺瀨劒忽於腰間躍出遂見二龍相隨焉用對虎氣按越絶書日闔閭冢在吳縣昌門外葬以磐郢魚腸之劒葬三日白虎居上號曰虎丘亦無虎氣字於虎曰氣於龍曰身豈公因事而自造語耶以俟博聞又世說王喬暮有盜發之有一劍停在空中作龍吟虎吼復飛上天銅瓶亂後碧井廢時清瑶殿深銅瓶未失水百丈有哀音趙云孟子曰掘井九仞而不及泉猶為廢井也此必銅瓶之製巧妙所以知其為宫殿中汲井之物矣方時清平瑶殿深邃而宫人出汲想像其銅瓶離水欲上時有滴水之音也側想美人意應非寒甃沈蛟龍半缺落猶得折黃金趙云四句言銅瓶乃是不用於汲而留于世者非是沈在井底所得側想美人之意可以推見然井中或得斷叉遺珥有黃金蛟龍之狀則有之矣師云蛟龍蓋瓶上刻鑄之象今雖缺落猶可準折黃金則其工巧可知觀安西兵過赴關中待命二首四鎮富精鋭言多勇鋭也晋職官志四鎮通於柔逺通典鎮東將軍漢末魏武為之鎮南後漢末劉表為之魏張魯晋杜阮凱並為之鎮西鄧艾為之鎮北南魏明帝大和中劉靖許允並為之宋時四鎮與中軍為雜號破杜正謬唐武后時右鷹揚衛將軍王孝傑擊吐蕃大其衆復取四鎮更置安西都護府於丘兹以兵鎮守又唐志四鎮都督府龜兹于闐焉耆疏勒也是詩所謂四鎮非鎮東鎮西之類故詩題云趙云戰國策季良謂魏王曰恃兵之精鋭而欲攻邯鄲摧鋒皆絶倫能摧鋒陷陳也關趙云諸葛亮與羽書曰未及髯之絶倫逸羣也還聞獻士卒足以靜風塵老馬夜知道齊柏公失道管仲使隨老馬而得出以老馬多智也蒼鷹饑著人晋載記權翼言慕容垂猶蒼鷹也饑則附人飽則髙飛言趙云老馬譬其慣熟蒼鷹譬其俊快以所獻之兵也臨危經久戰用急一作意始如神精熟戰陳用意若神趙云此以言去兵臨危又以結老馬之義用急又以結蒼鷹之義也右一竒兵不在衆史兵以正合以竒勝不在衆者用師克在和不在衆也萬馬救中原蔡琰謂曹公日明公廄有萬馬殺趙云公作此詩在秦州時乾元二年也三月史思明安慶緒九月又陷東京又陷齊汝鄭滑四州則兵之用救中原矣談笑無河北言談笑可以却敵也心肝奉至尊言至誠也西趙云思明據相州河北一帶素以陷沒今言安兵之精鋭主將於談笑之間可以蔑無河北左太冲詠史詩長嘯激清風志若無東吳東坡云巳覺談笑無西戎則又出於杜也魯仲連談笑却秦軍孤雲隨殺氣飛鳥避轅門杜補遺周禮掌舍掌王之㑹同之舍設車宫轅門注王行止宿險阻處次車以為藩則仰車以其轅表門項籍傳將入轅門飛鳥避事見上兵氣回飛鳥注蔡琰胡笳詩殺氣朝朝衡寒門竟日留歡樂一作歡樂城池未覺喧言軍令整肅不囂亂也右二送人從軍弱水應無地書弱水既西以其力不能載物故謂之弱水無地字用楚詞下崢嶸而無地陽關已近天陽關地名陽趙云無地言水多也近天言山高也弱水關蓋在西邉師云言境土皆入漢矣今君渡沙磧纍月斷人煙趙云沙磧即所往之道曹子建詩千里無人煙好武寧論命志於功名故也封侯不記年有功即封矣緣趙云言其從軍乃好武於是用命之秋故不論命有功者封侯漢制也不計年所以激發之矣新添顔駟對漢武帝日文武好文而臣好武馬寒防失道雪沒錦鞍韀趙云又所以戒之自重韓子曰柏公伐孤竹返而失道管仲曰老馬之智可用也乃放老馬而隨之遂得道馬今公詩意言馬寒雪沒亦用此也師云梁簡文帝詩寶馬錦鞍韀野望清秋望不極迢遞起曽隂趙云清秋所以望不極者以迢遞之處起曽隂也晋陸冲詩曽巒有曽陰梁江淹詩曽陰萬里生逺水兼天淨孤城隱霧深范彥龍效古詩言霧失交河城葉稀風更落山逈日初沉獨鶴歸何晚昏鴉已滿林譏小人衆多也夜趙云末句亦道實事耳舊注所言未必然蓋如來歸烏盡啼殺後栖鴉亦豈有譏乎獨鶴字謝𤣥暉敬亭山詩獨鶴方朝唳飢鼯此夜啼昏鴉字則公嘗自引何遜詩昏鴉接翅歸送靈州李判官羯胡腥四海回首一茫茫血戰乾坤赤氛迷日月黃將軍専策略幕府盛才良近賀中興主神兵動朔方示姪佐佐草堂在東柯谷多病秋風落君來慰眼前趙云左傳云風落山也自聞茅屋趣只想竹林眠趙云後漢王霸隱居止茅屋蓬户以與姪詩故對竹林因實事以寓意竹林七賢之遊阮嗣宗與阮仲容叔姪與其二故末句又及之滿谷山雲起侵籬澗水懸嗣一作阮宗諸子姪早覺仲容賢晋阮咸字仲容籍之姪也籍字嗣宗佐還山後寄三首山晚浮雲合湯休詩日暮碧雲合歸時恐路迷澗寒人欲到村黑鳥應栖野客茅茨小田家樹木低舊諳踈懶叔須汝故相携趙云末句又以嵇康自處嵇康云性復疏懶右一白露黃梁熟分張素有期已應舂得細頗覺寄來遲味豈同金菊香宜酌緑葵老人他日愛正想滑流匙趙云黃梁熟於秋初白露降之時也言粟而用到金菊取其物之同時其色之皆黃也香宜配緑葵則以葵為羹矣潘安仁間居賦有緑葵含露杯師云謝莊賦南山香黍滑流匙右二幾道泉澆圃交橫落慢城葳蕤秋菜少一作菜色相如子虛賦云錯翡翠之葳㽔隱映野雲多隔沼連香芰通林帶女蘿甚聞霜薤白重惠意何如趙云秋葉少則日夜零落矣前篇云葉稀風更落一作菜色非師云梁王均賦霸薤露葵藝滿中圃右三從人覔小胡孫許寄人說南州路山猿樹樹懸舉家聞若駭一云共愛為寄小如拳師云南越志廣夷之山多小樹玃立如拳預哂愁胡面趙云晋傅𤣥鷹賦狀如愁胡初調見馬鞭許求聰慧者童稚捧應癲師云齊王融日驅吏以鎖城猶猿猱之見馬鞭望頓而逃秋日阮隱居致薤三十束隱者柴門內畦蔬繞舍秋盈筐承露薤柴一作荆卷耳不盈頃筐挽歌亂薤上朝露何易晞不待致書求束比青芻色圓齊玉筯頭襄年關鬲冷味暖併無憂併一作復調趙云薤性暖本草載能中補不足秦州見勑一作除目薛三璩援司議郎畢四曜除監察與二子有故逺喜遷官兼述索居凡三十韻大雅何寥闊斯人尚典刑師云史記大雅言王公大人德逮黎庶詩雖無老成人尚有典型交期余潦倒才力爾精靈趙云上兩句引言雅道之久喪賢人之幸存下兩句一以自述一以言二子大雅字非謂詩之大雅蓋以雅者正也大雅正之道在人言之耳傅毅舞賦曰攄豫意以洪觀弓繹精靈之所束嵇康書曰足下舊知吾潦倒粗疏不切事情新添董允自歎不及費荐曰人才力相懸若此甚逺二子身同日諸生困一經文章開突奧遷擢潤朝廷突奧深遽貌荀子突奧之內枕簟之上賢趙云言二子由諸生而登朝廷也一經字韋云遺子黃金滿籝不如教子一經潤朝廷字如富潤屋德潤身之潤舊好何由展新詩更憶聽别來頭併白古詩相看俱白頭相見眼終青阮籍善為青白眼見佳客則為青眼見俗客即為白眼伊昔貧皆甚同憂嵗一作心不寧栖遑分半菽浩蕩逐流萍劉孝標絶交論莫肯費其半菽罕有落其一毛流萍與流落如萍之在水任其飄泊也人趙云漢史項羽曰嵗飢貧卒食半菽俗態猶猜忌妖氛忽杳冥獨慙投漢閣見子雲識字終投閣注俱議哭秦庭吳入郢申包胥求救於秦秦兵未出包胥哭於秦庭者七日勺水不入於口還蜀祗無補囚梁亦固扄司馬相如還蜀梁孝王怒鄒陽下獄陽從獄中上書王立出之老趙云自舊好何由展至此十四句雜言交好之舊今昔貧之事流落遭亂之故其後四句一句說已一句說二子也頭併白鄒陽云古語白頭如新嵗不寧左傳晋無寧嵗之義華夷相混合宇宙一羶腥言胡兵亂華也帝力收三統薛云漢書三統謂天地人即夏啇周之三正也天威揔四溟舊都俄望辛顔延年車駕幸京口詩春方動宸駕望幸傾五州清廟肅惟馨詩清廟注謂有清明之德者之宫也天有清明之德而文王象之故以名詩書云明德惟馨雜種雖一作難髙壁漢書羌胡雜種類不一也髙壁言壁壘尚髙深也長驅甚建瓴髙祖紀若髙屋之上建注同聲水言其勢順而易為力建上焚香淑景殿漲水望雲亭法駕初還日羣公若㑹星言帝初收復還官日百官之輳於朝者若聚星焉京趙云自華夷相混合至此十二句言安史之亂陷二而肅宗收復駕還長安宫殿之事郡臣之朝也莊子云帝力何加於我哉三統周得天統啇得地統夏得人統收三統言天地人皆歸之也左傳天威不違顔咫尺莊子舊國舊都望之暢然望幸則司馬相如云泰山梁父設壇埸望幸也舊都指言長安望幸言車駕還也清廟肅惟馨言再見宗廟也雜種指言安史史有髙壁深壘晋書有卷甲長驅宫臣仍㸃染宮臣謂薛受司議也屬東宮柱史正零丁畢受御史老𣆀為柱下史㸃染零丁言未盡其才也官忝趨栖鳯朝回歎一作欲聚螢車似聚螢喚人看騕裊不嫁惜娉婷張易之出塞行騕裊青緑騎娉婷紅粉粧掘劍知埋獄提刀見發硎鄷城劍事莊子庖丁解牛十九年而刀刃若新發硎趙云自宫臣仍㸃染至此八句因言群臣之下紀述二子官職且美之也司議郎東宫之官以比給事中㸃染者為文字也此以言薛璩畢除監察故以柱史言畢零丁介獨之貌監察御史知朝堂左右廂而含元殿西南有栖鳯閣閣下即朝堂則趨栖鳯者又以言畢曜也朝回歎聚螢似言薛璩仍不廢讀書蓋東宫官屬多以經教授以讀書為事爾喚人看騕裊不嫁惜娉婷以言二公初不自眩鬻以駿馬以佳人為喻掘劍知埋獄提刀見發硎以言二公稍因遷用而後見其才也侏儒應共飽東方朔云臣朔飢欲死侏儒飽欲死漁父忌偏醒屈原曰衆人皆醉惟我獨醒漁父曰何不餔其糟而啜其醨旅泊窮清渭長吟望濁涇師云言志在長安也羽書還似急以鳥羽插􅊾書上馳告四方故云羽書髙祖曰吾以羽檄徴天下兵烽火未全停烽燧也未全停尚有餘烽也師老資殘寇戎生及近坰忠臣辭憤激烈士涕飄零上將盈邉鄙元勳隘鼎銘銘功鍾鼎也仰思調玉燭誰定握一作淬青萍孟子仰而思之爾雅四時調謂之玉燭調玉燭猶燮理也青萍劒名也陳孔璋答東阿王箋君侯體髙俗之才秉青萍干將之器拂鍾無聲應機立斷隴俗輕鸚鵡鸚鵡賦命虞人於隴坻閉以雕籠剪其羽翅原情類鶺鴒趙云自侏儒應共飽至此十二句引言二子一句轉入自述又轉入傷時兵亂未已思平定而終之以人不己知且敦友誼也未句則以懷二子之情結之侏儒應共飽以言二公猶未甚顯拔與侏儒共飽耳漁父忌偏醒公自比屈原之放遂也旅泊窮清渭長吟望濁涇公在秦而憶長安故也謂之窮清渭則窮其上流所以言秦潘安仁西征賦云北有清渭濁涇戎生及近坰上將盈邉鄙則時又有吐蕃之患矣羽書烽火皆兵事史記李牧息烽火左傳師直為壯曲為老然相承而用皆以宿師為老耳老子云式馬生於郊隴俗輕鸚鵡公自况也原情類鶺領指與二公如兄弟之急難也鶺鴒鳥名首舉而尾應詩云眷令在原兄弟急難秋風動關塞髙卧想儀形趙云詩作於秦州故云關塞晋謝安傳髙嵩曰卿屢違朝㫖髙卧東山想儀形則想望其丰彩也寄彭州髙三十五使君適虢州岑二十七長史參三十韻時患瘧疾故人何寂寞今我獨凄凉老去才雖盡秋來興甚長潘安仁有秋興賦盡趙云此篇四句始叙既不見故人又身老且愁也才字有兩事鮑照文辭贍逸而文帝自謂其文人所莫及照遂為鄙言纍句時人以為才盡其實不然又江淹夢丈夫自稱郭璞曰吾有筆在卿處多年可以見還淹乃探懷中五色筆授之自是文絶無美句人謂之才盡又任昉晚好著詩用事過多屬辭不得流便於是有才盡之歎矣物情尤可見詞客未能忘詞客謂髙岑也俱以詩名世海內知名士雲端各異方彭在蜀虢在山南髙岑殊緩步沈鮑得同行沈休文鮑明逺言髙岑可與沈鮑齊驅也意愜關飛動篇終接混茫舉天悲富駱富嘉謨為文皆以經典為本時人欽慕文體為之一變駱賔王嘗作帝京篇當時以為絶喝近代惜盧王盧照鄰王勃也昭鄰為鄧王典籖王重其文勃六嵗能文與二兄才相類人謂之王氏三珠樹悲惜言各以才不容於世似爾官仍貴前賢命可傷傷上四人也諸侯非弃擲半刺已翺翔刺史古之諸侯庾亮與郭游書日别駕與刺史同流王化於萬里居刺史之半安可非其人也漢周昌傳陛下獨奈何中道而棄之諸侯乎詩好幾日見書成無信將趙云自物情尤可見至書成無信將十六句因言思二公轉入稱美之又以近代文人比以為意又言二子作官而終以懷之而欲寄書也物情言世態因物情之可見其轉薄所以未能忘詞客也海內字如武帝謂吾丘夀王曰子自謂海內寡二枚乘樂府詩云美人在雲端意愜關飛動篇終接混汒以言二子之詩其妙如此世說左太沖作三都賦初思意甚不愜謝靈運還湖中作慮淡物自輕意愜理無違篇終則答賔戲日孔終篇於西守文賦日常遺恨以終篇也飛動字沈泉期放李侍郎祭文云思合飛動才冠卿雲也混茫字出莊子古之人在混茫之中也富駱慮王皆文士而不容於世者以言髙岑作貴官則比四子為差得意者矣諸侯以言髙適半刺以言岑參則參必為今之通判漢書云别駕任居刺史之半也二人皆以詩名故曰詩好幾時見書成無信將則公在秦州欲寄書於彭與虢也男兒行處是客子鬬身強史記范睢傳穰侯謂王稽日得無與諸侯客子俱來乎羇旅推賢聖孔孟皆羇旅也沈綿抵咎殃三年猶瘧疾一鬼不銷亡南史劉損傳劉伯龍將營什一之方忽見一鬼在傍撫掌大笑伯龍歎曰貧窮固有命乃復為鬼所笑遂止隔日搜脂髓增寒抱雪霜此皆瘧之狀也徒然潛隙地有靦屢鮮粧俗言避瘧思必伏於幽隙之地不爾即易兄何太龍鍾極薛云按廣韻龍鍾竹名世言龍鍾取此義也謂其年老如竹之枝葉搖曵而不能自禁持也為新添青箱雜記云古語有二聲合為一字者如不可叵而已為耳蓋起于西域二合之首也龍鍾切為瘧潦倒切為老謂人之癊老者以龍鍾潦倒日之音義取此蘇鶚演義謂龍鍾有似反字之音而呼者當如呼頭為髑髏呼脛為檄定而世之學者殆不曉龍鍾潦倒之義二三其說雜然不一于今出處妨趙云自男兒行處是至下句洮雲片片黃二十句轉入公自述其飄泊疾病之事也羇旅推賢聖言賢聖皆如此不獨我也沈綿抵咎殃言其病也世言瘧疾有鬼故於瘧疾而言一鬼焉韓退之有遣瘧鬼詩是已世言避瘧鬼於間隙之處且塗畫面目而瘧有未效故于潜隙地言徒然於屢新粧言有靦靦者慙也論語如豈徒然哉詩有靦面目病則龍鍾而妨出入下和怨歌有云空山欷歔涕龍鍾又周王褒與周𢎞讓書云援筆攬紙龍鍾橫集則言涕淚之伏韓退之醉留東野云東野不得官白首誇龍鍾謂之誇則放縱之兒今云龍鍾則不健而蹭蹬之意也無錢居帝里盡室在邊疆劉表雖遺恨龎公至死藏心微傍魚鳥肉瘦怯豺狼豺狼類貪暴者隴草蕭蕭白洮雲片片黃趙云盡室在邊疆若非尚在秦州寄居則已在同谷寄居矣無錢庾信擬連珠云胸中無學猶手中無錢左傳盡室以行也劉表龎公事後漢龐公者南郡襄陽人也居峴山之南未嘗入城府荆州刺史劉表數延請不能屈表歎息而去後遂携妻子登鹿門山因採藥不返公蓋以龐公自比言其將隱不復仕也心微傍魚鳥以言其隱於山水間之事也嵇康逰山水觀魚鳥而心甚樂之簡文帝云每覺魚鳥自來親人可以見矣肉瘦怯豺狼言荒山窮谷中所以怯豺狼或云以比盜賊隴草洮雲則恐已在同谷洮於同谷為近也彭門劍閣外􅉑略鼎湖傍虢有湖城乃鼎湖也荆薛云史記黃帝採首山之銅鑄鼎於山下鼎成乘龍而升天號鼎湖荆玉簪頭冷巴箋染翰光烏麻蒸續曬丹橘露應嘗豈異神仙宅俱兼山水鄉竹齊燒藥竈花嶼讀書床更得新清否遙知對屬忙言吟詩也也趙云自彭門劍閣外至此以言公為官之地彭州謂之彭門漢郡國志注湔縣前有兩石對如關號曰彭門虢略言在鼎湖之傍荆玉正此荆山之玉荆山乃在虢華間也荆玉簪頭冷為岑參而言巴箋染翰光為髙適而言巴箋蜀箋也烏麻丹橘雖兩處皆有之而烏麻似言蜀地丹橘似言虢中於烏麻言蒸續蓋服胡麻之法九蒸九曝也新清否言二子之才思新清也對屬忙則詩貴對屬之工矣舊官寧改漢淳俗本歸唐濟世宜公等安貧亦士常毛遂右手招十九人㰱血曰公等碌碌所謂因人成事者也家語榮啓期曰貧者士之常蚩尤終戮辱胡羯漫猖狂史記蚩尤最暴黃帝伐之也胡羯安史㑹待妖氛靜論文暫裹糧孟子行者有裹糧言往論文也舊趙云自舊官寧改漢至末句言賊必平而反聚也官寧改漢此所謂不圖今日復見漢官威儀言安史雖亂而舊典不改矣濟世宜公等言二子安貧亦士常公自言也蚩尤且終取戮辱況胡羯敢漫浪為亂乎寄嶽州賈司馬六巴嚴八使君兩閣閣老五十韻師云按賈至至德中以中書舍人慰安蒲人不法貶嶽州司馬嚴武至德中以給事中坐房琯事貶巴州刺史衡嶽啼猿裏趙云盧照鄰巫山髙云莫辨啼猿樹徒看神女雲巴州鳥道邉趙云南中八志曰交趾郡治龍編縣自與古鳥道四百里蓋以其險絶獸猶無蹊人所莫由特上有飛鳥之道耳沈約愍塗賊依雲邉以知國極鳥道以瞻冢李白蜀道難亦云西連太白有鳥道也故人俱不利謫宦兩悠然開闢乾坤正趙云言收復二京矣榮枯雨露偏趙云言二公不得受聖恩而謫去也長沙才子逺趙云賈誼謫於長沙西征賦云賈生洛陽之才子所以比賈司馬釣瀨客星懸趙云自首句至此言二公之謫也嚴陵釣於七里瀨嘗與光武同宿而以足加帝腹太史占云客星犯帝座所以比嚴君憶昨趨行殿天子幸行所止日行殿趙云自此已下二十句皆公自言在鳯翔所見以至收復二京時事也肅宗即位靈武而駐蹕於鳯翔公自賊中竄身至鳯翔見帝也殷憂捧御筵趙云殷憂出詩殷訓多也討胡愁李廣奉使待張騫趙云時吐蕃既侵陷諸州郡而又請和故討之未捷則愁李廣使之未還則待張騫無復雲臺仗虛修水戰船趙云言行宫草創故不嚴整法仗也庾信哀江南賦云猶有雲臺之仗漢武帝作昆明池以習水戰虛修戰船則亦以吐蕃之故也蒼茫城七十酈食其馮戟下齊七十餘城流落劍三千莊子說劍昔趙文王喜劍劍士夾門而客三千餘人日夜相擊於前趙云蒼茫者不安之貌城有未復者為不安也流落則士卒苦戰有散落者矣畫角吹一作歌秦晋一作塞旄頭俯澗瀍澗瀍水也在伊門間頭趙云此言安史前漢天文志昴為旄胡星也師云時秦雍太原皆用兵小儒輕董卓有識笑符堅趙云小儒有識公自謂也董卓廢立凶暴無道以尚書韓馥等為刺史馥等到官與袁紹十餘人各與義兵同盟討卓符堅事違衆代晋遂至破敗故為有識所笑指安史也浪作禽填海山海經曰發曰之山有鳥名精衛赤帝之女往遊東海溺而死不返化為精衛常取西山木石以填東海那將血射天商本紀帝乙無道為偶人謂之天神與之博令人為行偶人不勝乃僇辱之為革囊盛血仰而射之命日射天獵於河渭之間暴雷震死趙云言安史不知量也萬方思助順一鼓氣無前言得衆助故所向無不勝也左傳曹劌曰夫戰勇氣也一鼓作氣無趙云亦曰天之所助者順也莊子舉之前運之無旁隂散陳倉北晴熏太白巔陳倉郡陳寶鳴雞在焉北近長安也太白山名趙云言將復京師也陳倉鳯翔之屬縣其北乃長安太白山在鳯翔隂散晴熏則妖氛除而佳氣生也師云皆屬鳯翔言肅宗駐蹕鳯翔也亂麻尸積衛破竹勢臨燕武五子贊秦始皇即位三十九年內平六國外攘四夷死人如亂麻暴骨長城之下衛地河北相衛間也杜預傳今兵威已振勢如破竹數節之後皆迎刃而解燕地范陽祿山巢穴也臨趙云言王師之勝賊於衛又將賊之窟穴也法駕還雙闕天子還京也西都賦乘鸞輿傋法駕王師下八川見八水散風濤注八趙云自法駕還雙闕而下十句言車駕還長安府見之事也先聖本紀曰許由欲觀帝意曰帝坐華堂面雙闕君之榮願亦得矣八川涇渭灞滻鄷鄗潦潏長安水名長安既復而車駕已還則王師又下八川以守東京也此時霑奉引佳氣拂周旋光武紀論望氣者蘇伯阿為王莽使至南陽望見舂陵郭唶曰氣佳哉鬱鬱葱葱然趙云公為拾遺唐百官志曰左拾遺六人從八品上掌供奉諷諌故云霑奉引佳氣佳哉安城而周旋不散也貔虎開金甲書牧誓如虎如貔蔡文姫詩曰金甲耀日光麒麟受玉鞭涼州記咸寧二年發張駿陵得鞭飾以珊瑚晋明帝以七寶鞭與賣食嫗即玉鞭或有之但未知所出也趙云麒麟以言御馬今按蘇梟杜陽編代宗常賜郭子儀九花虬馬并紫玉鞭轡則有玉鞭明矣又上嘗幸興慶宫於復壁間得寶匣匣中獲玉鞭鞭未有文云軟玉鞭即天寶中異國所獻光可鑑物節文端嚴雖藍田之美不能過也屈之則頭尾相就舒之則頭尾如繩雖以斧鑽煆斫終不傷缺上歎為異物遂以聫蟬繡為囊碧玉絲為鞘此玉鞭事也侍臣諳入仗廄馬解登仙杜補遺云唐六典乘黃廄注淮南子云天下有道飛黃伏早乘黃獸名龍翼馬身黃帝乘之而仙後因以名廄趙云前云無復雲臺仗則以行宫禮數未全今則法仗復備皆侍臣所舊諳入者矣晋師云杜子美為拾遺賈嚴為給舍皆為侍臣奉引也曹攄詩侍臣先入仗花動朱樓雪城凝碧樹煙江淹詩碧樹露芊芊生煙紛漠漠趙云此又以紀景物之勝馮衍顯志賦伏朱樓而四望言雪則車駕還長安乃十月叙其所見矣碧樹則江淹云碧樹先秋落凝字如顔延年云空城凝寒雲衣冠心慘愴顔延年詩衣冠終冥漠陵邑轉葱青故老淚潺湲九歌橫流涕兮潺湲也趙云此則喜極而感哭廟悲風急見及夫哭廟後注朝正霽景鮮朝正元旦朝㑹也成趙云哭廟以成故老淚潺湲之實朝正以衣冠心慘愴之實師云此言法駕還京師時月分梁漢米梁漢間所出貢米月分廪給也師云謝承後漢書章帝分梁漢儲米給民春得水衡錢趙云上句言百官廪給之足下句則又言䝉賜豫之優漢宣帝本始二年春以水衡錢為平陵徙民起第宅應邵曰水衡與少府皆天子私藏爾縣官公作當仰給司農今出水衡錢言宣帝即位為異政也內蘂繁於纈內蘂宫花也宫莎軟勝綿趙云此又以言春時之景物恩榮同􅕥手出入最隨肩入一作處書臯陶曰􅕥手稽首禮五年以長則肩隨之而趙云自此而下二十句公言其初與賈嚴同在禁掖賈嚴被遣獨留在班既叙述其身矣且有懷二子故腸斷眼穿也晚著華堂醉寒重繡被眠轡齊兼秉燭書枉滿懷箋趙云著音直略切轡齊並轡而行也書枉在禁掖時往來書尺也師云此言與賈嚴通班聫時事每覺升元輔深期列大賢趙云所以極言二公才器可為宰輔也秉鈞方咫尺詩秉國之均鎩翮再聮翩顔延年詠嵇中散云鸞翮有時鎩趙云言為宰輔不逺而乃謫去如鳥之鎩翮也史言執樞秉鈞鎩音所介切淮南子云飛鳥鎩羽注云鎩殘羽也江文通擬鮑照詩云鎩翮由時至禁掖朋從改一作換微班性命全青蒲甘受戮受一作就漢元帝疾史丹以親密侍疾侯上寢直入卧內頓首伏青蒲諌白髮競垂憐左太冲馮唐豈不韋白首不見招髮趙云公以拾遺為職常有諌諍之心故用青蒲事白字謝靈運詩青青白髮垂弟子貧原憲見難甘原憲貧注諸生老伏䖍見諸儒引伏䖍注趙云公以貧自比原憲以老比伏䖍也莊子原憲居魯子貢往見曰嘻先生何病應之曰憲聞之無財謂之貧學而不能行謂之病憲貧也非病也子貢逡巡而有愧色以其孔門之列故日弟子伏䖍事本傳雖無老文而傳云少以清若建志入太學受業有雅才公蓋自比為䖍之老者也以其入太學受業故曰諸生師資謙未逹鄉黨敬何先趙云公以它人侍之以師資然自謙為未逹老子曰善人不善人之師不善人善人之資孔子於季康子饋藥日丘未逹不嘗敢也下句言鄉黨之人將敬父兄而已乎抑先敬有道德之人也孟子載孟季子問公都子曰鄉人長于伯兄一嵗則誰敬曰敬兄酌則誰先曰先酌鄉人兩句皆參取字出以為語耳舊好腸堪斷新愁眼欲穿謝靈運楚人必昔絶越客腸今斷鮑明逺行子心腸斷也趙云公懷二公翠乾危棧竹紅膩小湖蓮湖一作池趙云自此而下二十句以言嚴賈所居之地所成之制作因戒之以防患而終之以天理難喻也危棧竹以指嚴八之巴州在棧閣之外也小湖蓮以指賈六之嶽州多陂湖有蓮也湖一作池非賈筆論孤憤韓非作孤憤屬賈司馬嚴詩賦幾篇屬嚴使君以趙云賈曰筆以能文嚴曰詩能詩南史有三筆六詩故也定知深意苦莫使衆人傳且錦無停織詩云蔞弓斐弓成是貝錦言譛人不已也朱絲有斷絃趙云貝錦以喻讒也鮑照詩直如朱絲絃鍾子期死伯牙絶絃公詩句歎二子無知音而戒之也師云言直道不行為讒人所譛浦鷗防碎首霜鶻不空拳趙云謂二子如浦鷗言官如霜鶻既不空拳期於必中則鶻當有碎首之防戒之至也地僻昏炎瘴山稠隘石泉趙云上句言嶽州近南為有瘴矣下句言巴州在亂山間也謝靈運詩巖峭嶺稠疊且將棊度日應用酒為年趙云既戒之以勿使所作詩傳播恐因掇禍而炎瘴之地亂山之間復何為哉以棊酒為事而已典郡終微眇嚴使君也治中實弃捐晋職官志州置别駕治中從事為趙云治中治從平聲二公既在禁掖而出斯微眇弃捐矣安排求傲吏比興展歸田趙云莊子安排去適乃入于寥天一莊子為漆園吏而放傲故時呼之為傲吏求傲吏則安排之理求之於是人也陶淵明作歸去來辭曰田園將蕪胡不歸言二公之比興但展舒其歸田之思則可矣皆所以成之也詩三日比四曰興顔延年詩我故非傲吏去去才難得蒼蒼理又𤣥趙云去去之語如去國之義古詩云去去復去去莊子曰天之蒼蒼其正色耶理又𤣥則前所謂天理難喻也𤣥者𤣥妙之𤣥老子曰𤣥之又𤣥古人稱逝矣吾道卜終焉終窮也吾道窮於此乎迹趙云自此而下十二句轉入公自叙述羇旅之言古人不復見則若終身於隱淪矣漢書髙祖曰吾亦從此逝矣孔子曰吾道其非邪史云有終焉之志隴外翻投迹漁陽復控弦趙云上句實紀其寓居也下句指言安慶緒再盛也胸奴傳控弦之士十萬子美言弃官居秦隴而漁陽復阻兵也笑為妻子纍甘與嵗時遷親故行稀少時亂而離散故親故稀少兵戈動接聨接迹聨屬言充斥也他鄉饒夢寐失似自迍邅多病加淹泊長吟阻靜便趙云謝靈運始寧墅詩拙疾相倚薄還得靜者便多師云張協書養病日亦愛靜便如公盡雄俊志在必騰騫趙云此言二公不久當復用也一作云公如盡憂患何事有陶甄句法費力非是然不應押兩騫乎寄張十二山人彪三十韻獨卧嵩陽一作雲客三違潁水春艱難隨老母慘淡向時人趙云此言張山人自頴水而隱嵩陽與母同在也違者離也吕氏春秋載戎夷者違齊如魯言卧于嵩陽而離頴已三年也左傳云險阻艱難備嘗之矣謝氏尋山屐謝靈運好登山常著木屐上山則去前齒下山則去後齒陶公漉酒中陶潜在家酒熟取頭上葛巾漉酒畢還復著之羣凶彌宇宙此物在風塵若使之遇時則必能自致因冦亂故在風塵趙云此言其雖屐與巾亦因艱亂而弃也此物字出選古詩言竒樹日此物何足貴但感别經時後漢陳蕃上疏曰羣凶側目禍不旋踵厯下亂姜被見醉眠秋共被注關西得孟鄰見芬􅀢孟母鄰注趙云自此至盡力潔飱晨自述其初離齊地與張相見芬關西為鄰居乃迤邐鋪陳張山人之能書能詩且以逃寇侍毋也後漢姜胘有兄弟四人居貧作一大布被而共之公之諸弟在濟州言辭姜被則别其弟之時也孟子之母為孟子擇鄰今翻言得孟鄰則公關西之居必近張山人山人有母故云孟鄰早通交契密晚接道流新靜者心多妙先生藝絶倫趙云九流有道家者流謝靈運詩拙疾相倚薄還得靜者便傅武仲舞賦云姿絶倫之妙熊草書何太古一作應甚若詩興不無神曹植休前輩張芝更後身趙云曹植以終言其詩之神張芝以終言其草書之古選有云喜謗前輩又梁張纘别離賦曰太常劉侯前輩宿逹佛書有前身今身後身之說數篇吟可老一字買堪貧將恐曽防寇深潜託所親師云鍾嶸評陸機詩云驚心動魄幾於一字千金髙趙云老子將恐歇鍾繇云張樂於洞庭之野鳥值而翔魚聞而深潜見本朝淳化法帖也寧聞倚門夕薛包事母至孝凡出入必有時未嘗違也至期母必倚門望之包必至矣來趙云戰國策齊王孫賈之母謂賈日汝朝出而晚則吾倚門而望汝舊注所引在後矣盡力潔飱晨束晢補亡南陔詩云馨爾夕膳潔爾晨飱踈懶為名誤嵇康書云性復踈懶驅馳喪我真趙云自此至亂後别離頻也又自序其流落與張相别索居猶寂寞猶一作尤禮離羣索居相遇益愁辛江淹擬嵇康詩鍾鼓或愁辛趙云漢書揚雄傳惟寂寞自投閣師民瞻本取尤寂寞是詩云邂逅相遇流轉依邊徼一作境居師云時子美秦逄迎念席珍儒行儒冇席上之珍以待聘時來故舊少亂後别離頻世祖修髙廟後漢光武立髙廟于洛陽四時祫祀髙帝為太祖一嵗五祀文公賞從臣左傳晋侯賞從亡者介之推不言祿者趙云自此至囊中藥未陳言肅宗反正張山人雖隱亦可施其術也啇山猶入楚見羽翼懷啇老注源水不離秦離一作知見欲問桃花宿注趙云啇山指言四皓隱處源水指言桃源啇山在啇州張儀說楚絶齊而交秦請獻啇於之地六百里於楚其後止云六里楚王怒使屈丐擊秦而敗啇山即啇於之地也桃源在武陵今之鼎州秦人避地之所謂如啇山可隱縱使猶或入為楚地而桃源者雖避地於此然其地終是秦地焉以譬張山人之隱淪當此肅宗之時皆唐宇宙之內耳師民瞻本作渭水不離秦天渭水長安八水之一與七水俱在秦矣獨於渭言不離秦似無意義存想青龍祕青龍道家存想之術騎行白鹿馴周義真入龍嶠山見羡門子乘白鹿而行耕巖非谷口揚子谷口鄭子真耕于嵓石之下結草即河濵河上公不知姓結草河濵讀老子漢景帝親問道以素書授帝結趙云言張山人之耕巖儻非似鄭子真之谷口則所茅屋必如河上公之在河濵矣肘後符應驗葛稚川有肘後方數卷神仙傳張道陵弟子趙升七試皆遇乃授肘後丹經囊中藥未陳後漢王和乎性好道術自以當仙孫雍少事之㑹和平病歿雍葬之有書百餘卷藥𢾗囊悉以送之後人言其尹解雍恨不取其仙藥寶書旅懷殊不愜良覿眇無因謝靈運引領冀良覿公趙云自此至餘孽尚紛綸公言旅寓與張相逺而時猶未清尚在兵戈蓋安慶緒猶在也左太冲三都賦初意思不愜雪賦傷後㑹之無因自古皆悲恨浮生有屈伸易屈伸相感而利生焉此邦今尚武今一作全何處且依仁語依於仁尚趙云古詩云土風其武鼓角凌天籟莊子云汝聞地箱而未聞天籍關山信月輪古今注有月重輪有趙云地籟則比竹是已天籟則衆竅是已古關山月之曲王褒詩云無復漢地關山月官場一作壕羅鎮磧賊火近洮岷洮岷地名屬隴右趙云官場言官之戰場也一作官壕鎮磧字未詳用對洮岷乃洮州岷州則鎮磧是兩字也蕭索論兵一作功地蒼茫鬪將辰趙云陸瑜仙人覽六箸篇避敵情畏巧論兵勢重新蒼茫荒寂之貌大軍多處所餘孽尚紛綸髙興知籠鳥潘嶽秋興賦猶池魚籠鳥而有江湖山藪之思斯文起獲麟趙云此兩句一以譬張山人之不得已一以言張山人之著書如孔子春秋起于獲麟太史公史記亦然窮秋正搖落回首望松筠趙云言相思之時正值秋之搖落而望彼松筠能保嵗寒亦因時以寓意也宋玉云草木搖落而變衰寄李十二白二十韻昔年有狂客號爾謫仙人賀知章㑹嵇人自號四明狂客見白文章乃嘆曰子謫仙人也筆落驚一作聞風雨詩成泣鬼神趙云白别傳曰白初自蜀至京師賀知章聞其名首訪之見其鳥栖曲嘆曰此詩可以泣鬼神筆落字王子敬傳溫嘗使書扇筆誤落因盡作烏駮牸牛之妙公借字用耳今云驚風雨言其如風雨之快疾為可驚也孟浩然詩刻燭限詩成聲名從此大汩沒一朝伸史記知章言白於玄宗召見金鑾殿奏頌一篇賜食帝為調羹召供奉翰林文彩承殊渥流傳必編倫帝常召白為樂章白已醉援筆成文婉麗精巧無留思帝愛其才數宴見注趙云絶倫見上龍舟移棹晚趙云范傳正李翰林新墓碑日𤣥宗泛白蓮池公不在宴明皇歡既洽召公作序白既被酒於翰苑中命髙力士扶以登舟今句蓋言停舟以待白矣獸錦奪袍新白外傳李白作樂上賜以錦袍方趙云武后時使東方虬宋之問輩賦詩東虬詩成賜以錦袍矣之問繼進而詩尤工於是奪錦袍以賜之故用此兩字言非特初賜而又加奪之者也白日來深殿青雲滿後塵師云鮑照舞鶴賦逸翮後塵注言飛之疾塵反居後此言致身享衢青雲在下也致趙云上句則易所謂晝日入宫之意下句言其貴寵身青雲也應瑗與柏𤣥書敢不策馳敬尋後塵還山優詔許白為髙力士所譛自知不為親近所容懇求還山帝賜金於還也遇我宿一作夙心親白與子美等八人為苑中八仙屢趙云公與李白平生相好於公集中有與白詩可見矣舊注云八仙者子美豈在其中邪永負幽棲志負一作遂兼全寵辱身趙云謝靈運詩資此永幽棲豈伊年嵗別老子云寵辱若驚劇談憐野逸嗜酒見天真趙云世說人問支道林曰何處來云今日與謝守劇談一出來揚雄家貧嗜酒醉舞梁園夜謝莊雪賦梁王不悅遊于兔園今汴州乃梁園故也趙云梁沈約九日四言詩曰葉浮楚水草折梁園行歌泗水春孔子行歌於泗水之上泗水今泗州是也趙云泗水梁園皆白之所曽遊也才髙心不展道屈善無鄰趙云魏應璩書有云意不宣展宋謝靈運詩折麻心莫展孔子曰德不孤必有鄰左傳日親仁善鄰善無鄰蓋言無有善之而為鄰者此道之所以屈也處士禰衡俊諸生原憲貧趙云此以比白也鸚鵡賦序云黃祖之子射賔客大㑹有獻鸚鵡者舉酒於衡前曰禰衡士今日無用娛賔願先生賦之原憲孔門弟子故謂之諸生稻粱求不足廣絶交論分鴈鶩之稻梁薏苡謗何頻趙云馬援征交趾載薏苡種還人謗之以為明珠大貝此言永王璘反而譛者以白與其謀也五嶺分蒸地三危放逐臣見雲山分五領風雨多三苗注趙云夜郎與廣南相接故用五領字書竄三苖於三危三危在西故特以比之幾年集鵩鳥賈誼作長沙王傳不得志有鵩集於舍上遂作鵩賦獨泣向麒麟王翰古蛾眉愁曰朝朝泣對麒麟樹階下蒼苔日漸班翰趙云孔子見麟而泣日出非其時吾道窮矣王與公同時人豈遂用其詩乎蘇武先還漢見握節漢臣回注白趙云此以比白之得還比武則先也傳云㑹赦還潯陽黃公豈事秦趙云黃公四皓之一者避秦隱居啇山比白之不妄從永王璘也楚筵辭醴日趙云以言白在永王璘時如穆生見楚王待之不設醴知幾而辭行也梁獄上書辰趙云以言白在永王璘時如梁孝王下鄒陽於獄而鄒陽上書也此皆永王璘本待白之薄而白豈與其謀哉已用當時法誰將此義陳趙云言白之無罪當時不省察遂以白為與謀而施之以法誰人用辭醴與獄中上書之義為之陳說也白㑹赦放還乃普天之恩也朝廷元未知白之本不汚耳故以此明之按白傳永王璘辟為府僚在璘敗兵白逃歸彭澤又赦還潘陽坐事下獄後宋若愚將兵赴河南道潯陽釋白囚辟為參謀老吟秋月下病起暮江濵莫怪恩波隔乘槎與問津趙云上兩句蓋公自言具如此未句蓋言如白之才器當䝉上知而恩波頓隔欲上天與問之也公於老吟病起之中思念白而起無怪之感無怪則本可􅬝之矣梁丘遲侍宴應詔詩曰參差别念舉肅穆恩波被乘槎事見理物志孔子使子路問津又宋之閣明河記日明河可望不可親願得乘槎一問津九家集注杜詩卷二十
