body:
  text: 九家集注杜詩卷十六宋郭知達編古詩送顧八分文學適洪吉州中郎石經後八分蓋憔悴蔡雍拜中郎將校書東觀雍以經籍去聖久逺文字多謬俗儒穿鑿疑誤後學熹平中表求正定六經文字靈帝許之雍乃自書冊於碑使工刻立於太學門外兩京記貞觀中得蔡雍石經數段雍能八分書顧候運爐錘筆力破餘地運爐錘言能煆鏢以成一家之書也論薛云莊子云皆在爐鍾之間耳趙云南史王僧䖍書云筆力騖異又云極有筆力破字見首篇注莊子遊刃恢恢然有餘地昔在開元中韓蔡同贔屭開元中韓擇木蔡有鄰善八分書作杜補遺張平子西都賦綴以二華巨靈贔屭注贔屭力之貌贔平祕切屭許備切趙云公前篇李潮八分歌尚書韓擇木騎曹蔡有鄰開元已來數八分潮也奄有二子成三人是巳𤣥宗妙其書是以數子至御札早流傳揄揚非造次明皇師擇木嘗於彩箋上八分書賜張說工杜補遺言明皇精妙於此書也書苑唐明皇好圖畫八分章草豐茂英特初張說為麗正殿學士獻詩明皇自於彩箋上八分書讚曰德重和鼎功逾濟川詞林秀發翰苑光鮮所謂御札流傳三人並入直韓蔡顧三人恩澤各不二顧於韓蔡內辨眼工小字分目示諸王鈎深法更祕顧文學八分外尤能小字趙云易鈎深致逺文學與我遊蕭疏外聲利文選鮑明逺詠史詩五都矜財雄三川養聲利追隨二十載浩蕩長安醉高歌卿相宅文翰飛省寺視我揚馬間視我如揚雄司馬相如肆趙云浩蕩長安醉醉而謂之浩蕩言醉之放也間字蓋如季孟之間伯仲之間者言當二子之中也白首不相棄驊騮入窮巷必脫黃金轡潘嶽詩白首同所歸轡趙云顧君騎馬來相訪必脫轡留之馬謂之驊騮謂之黃金侈言其富貴也一論朋友難遲暮敢失墜古來事反覆相見橫涕泗嚮者玉柯人誰是青雲器玉柯鳴珂也謂馬飾如杜補遺神農本草珂貝類大鰒皮黃黑而骨白以為馬飾生南海吳都賦致逺流離與珂珬注珬老鵰所化以裁制刻若馬勒者謂之珂珬珂之璞也珬邃戌二音廣韻曰珂珬音戌劉望曰老鵰所化出日南通典曰老鶻入海為珬可哉作勒謂之珂兩說有異未知孰是晉阮咸字仲容性任逹不拘細節顔延年五名詠仲容青雲器實禀生人秀趙云遲暮楚詞傷美人之遲暮敢失墜左傳行父奉以周旋弗敢失墜才盡傷形體一作骸淹杜云齊書江夢得五色筆由是文章日新後夢人稱郭璞取之自後為詩絶無美句時人以為才盡乂任昉字彥升以文章見稱當時無輩時人稱任筆沈詩昉聞以為病晚節最好詩欲以傾沈用事屬辭不得流便都下士子慕之轉為穿鑿於是冇才盡之訤矣又鮑照字明逺文辭贍迤文帝好文章自謂人莫能及照悟其㫖為文多鄙言纍句咸謂照才盡實不然也墮趙云傷形體傷其老病也莊子爾形體病渴汙官位司馬相如病渴李尋久汙玉堂之署趙云公適有此病故舊獨依然時危話顚躓我甘多病老子負憂出志胡為困衣食顔色少稱遂逺作苦辛行順從衆多意舟楫無根蒂蛟鼉好為崇後漢方術王喬傳吏人祈禱無不如應若有違犯亦立能為􅑂况兼水賊繁特戒風飈駛崩騰戎馬際晉史臣曰邵李郭魏諸將契闊喪亂之辰驅馳戎馬之際往往殺長吏前漢陳勝傳於是諸郡縣苦秦吏暴皆殺其長吏將以應勝子干東諸侯左傳成十六年郤隼將新軍且為公族大夫以主東諸侯勸勉防縱恣邦以民為本魚飢費香餌趙云顔色少稱遂稱音去聲稱意而通遂也衆多衆人也鄒防云衆多之口苦辛選詩坎坷長苦辛殺長吏則正言湖南兵馬使臧玠殺其團練使崔灌遂據潭州反矣乂云自子干東諸侯十四句則公贈人以言有補於時者書曰民為邦本傳曰重賞之下有勇夫香餌之下有潛魚下兩句言當厚施豫以恤民為本也請哀瘡痍深告訴皇華使使臣精所擇進德知歷試惻隱誅求情當勤恤民困固應賢愚異不可一概苛急當存賢愚之用心季趙云瘡痍者民困病之譬也前漢布傳方今創痍未瘳詩皇皇者華君遣使臣故謂之皇華使進德易君子進德修業厯試書厯試諸難言朝廷所遣使臣必擇賢者而來可以告之矣彼能惻隱誅求之情賢者固異於愚人矣烈士惡茍得禮記曲禮臨財母茍得俊傑思自致趙云烈士俊傑皆以指言顧文學所以責望之深矣贈子猛虎行出郊載酸鼻陸士衡樂府猛虎行渴不飲盜泉水熱不息惡木隂惡木豈無枝志士多苦心皆勉其自振立也上水遣懷趙云此洞庭湖上湘江往潭州也何以明之句云崷崒清湘石逆行雜林藪可見矣其上水也是春時何以明之公陪裴使君登嶽陽樓近體詩曰春泥百草生則自洞庭上湘水乃春時矣此詩四假自我衰太平時至常如中風走十四句泛叙其衰病流落之態自一紀出西蜀至逆行雜林藪十四句專叙其由蜀如楚之事自篙工密逞巧至何事獨罕有八句因言操舟之神以起經濟之譬自蒼蒼衆色晚至吞聲混瑕垢八句專言行路之難有熊虎之虞亦因以譬寇盜之充斥也我衰太平時身病戎馬後蹭蹬多拙為安得不皓首驅馳四海內童稚日糊口趙云言盡室征行諸子止食粥而已童稚字後漢鄧禹傳父老童稚重髮戴白滿其車下左傳許公曰寡人有弟而使糊其口於四方注糊粥也但遇新少年少逢舊親友低顔下色地故人知善誘後生血氣豪舉動見老醜言少年不相知但以老醜見欺而已李固曰一日朝㑹見諸侍中並皆年少更無一宿儒大人可顧問誠可嘆息也者趙云言遇新少年每低顔下色不敢介亢故人見之亦知我以善誘為心耳顔淵曰夫子循循然善誘人故人兩字申言舊親友者後生血氣豪又以言新少年如此血氣字論語血氣方剛老醜字倒用阮籍詩朝為媚少年夕暮成醜老窮迫挫曩懷常如中風走傷世熊之薄也朱叔元與彭寵書伯通獨中風狂走自捐盛時生趙云窮迫字倒用莊子迫窮禍患挫曩懷則挫其平之豪氣也如中風走則為風狂之人矣一紀出西蜀于今向南斗趙云公自乾元二年入蜀至大厯五年離蜀而在楚地乃南斗之分恰十二年矣孤舟亂春華暮齒依蒲桞暮齒暮年也顧恱曰蒲桞常質望秋先零杜補遺北史韋世康與子弟書曰耄雖未及壯年已謝霜早楸梧風先蒲桞冥冥九疑葬聖者骨亦朽蹉跎陶唐人鞭撻日月久陶唐堯氏其民無知焉山海經曰蒼梧之川其中有九疑山舜之所葬九山相似行者疑惑故名之曰九疑趙云聖者指虞舜也陶唐帝堯氏也蹉跎陶唐人則承舜葬之下言自陶唐以來時嵗蹉跎天下之人遭鞭撻之苦其為日月也久矣蓋在國有誅求期㑹之急在民有乖爭陵犯之變斯所以致鞭撻也中間屈賈輩讒毁竟自取鬱沒二悲魂蕭條猶在否趙云屈則屈原賈則賈誼屈以大夫上官靳尚之譖沉于汨羅賈以絳侯勃灌嬰之害謫于長沙皆眼前楚地之可弔者也崷崒清湘石逆行雜林藪篙工密逞巧逞巧操舟者矜其能也趙云經清湘石而逆行則公在潭而往矣氣若酣杯酒歌謳互激逺回幹明受授善知應觸類各藉穎脫手穎脫喻敏捷轉趙云回斡者曰動斡其船也字則謝惠連詠牛女詩傾河易回斡明受授則船之首尾相呼以求水脉此之謂受授下四句所以起經濟之譬也易觸類而長之頴脫字起於毛遂云使遂蚤得處囊中乃頴脫而出非時其有末見而已古來經濟才何事獨罕有趙云欲求經濟天下者如操舟之妙字何獨罕有乎蓋有才難之嘆矣經濟晉石苞傳景帝對宣帝曰苞雖細行不足而有經國才略夫貞亷之士未必能經濟世務蒼蒼衆色晚熊挂𤣥蛇􅀈黃羆在樹㒹正為羣虎守趙云栁子厚云蒼然暮色自逺而至乃此蒼蒼之義也詩義疏曰熊能攀緣上髙樹見人㒹倒投地而下也柳子厚作熊說云鹿畏貙貙畏虎虎畏羆觀公詩意以羆升樹而守虎明矣黃羆爾雅曰羆如熊黃白文為虎守為音于僞反若讀從為作之為則反是虎守羆矣子師云梁蕭若靜詩𤣥蛇吼古林蒼熊操窮嶺莊天之蒼蒼其正色邪羸骸將何適履險顔益厚庶與達者論吞聲混瑕垢趙云詩顔之厚矣江淹恨賦云莫不飲恨以吞聲也左傳國君含垢瑾瑜匿瑕遣遇磬折辭主人開帆駕洪濤趙云莊子漁父篇夫子曲要磬折言其恭磬折者折腰如磬也選詩云泛舟越洪濤春水滿南國朱崖雲日髙朱崖南海地名漢賈捐之罷擊朱崖以趙云朱崖海中之洲也賈捐之請罷擊者逺言之則承南國之下也師云寰宇記潭州仙宫記曰南嶽記注丹崖南即仙人宫子美此詩乃湘州所作朱崖即謂此地作也如歌鼓秦人盆即非莊子之鼓盆子美用事類如此舊注以罷朱崖甚非彼自在南海子美未嘗往舟子廢寢食飄風爭所操乘風而行爾雅回風為飄我行匪利涉謝爾從者勞石間采蕨女鬻萊輸官曹趙云鬻市一作鬻萊非利涉即易云利涉大川丈夫死百役暮返空村號譏役斂煩重也聞見事略同刻剝及錐刀錐刀猶刻剝也左傳錐刀之末錐趙云所聞所見皆似此應官曹之誅求也及刀非止取其大者雖錐刀瑣末猶及之貴人豈不仁視汝如莠蒿索錢多門户誅求不一喪亂紛嗷嗷奈何黠吏徒漁奪成逋逃漁如漁獵然不以法也兩趙云貴人豈不仁視汝如蕭蒿句通義言為貴人者豈是不仁而以莠蒿視汝等耶其索錢多門户者時喪亂之故所以使嗷嗷紛然之多也就此索錢之中更有黠吏者以漁奪為事而成就民之逃竄矣自喜遂生理花時甘緼袍語衣敝縕袍得趙云花時可以單衣而甘縕袍則所以遂生理勝於逋逃之民也解遣趙注一作解憂東坡先生云咸米散同舟至拳拳期勿替杜甫詩固無敵然自致逺以下句真村陋也此最其瑕謫世人雷同不復譏評過矣然亦不能掩其善也東坡之說如此然公之意亦以藉衆力而濟險猶資百慮而持危者矣故曰理可廣也减米散同舟路難思共濟向來雲濤盤衆力亦不細雲濤盤灘石極為險阻衆力言得其助乎趙云此言雲濤之間盤轉采出乃方言謂之盤灘者舊注恐只是臆度而附會其說且觀詩句首云减米散同舟則咸舟中之米而散與同舟之人乃所以謝其用力也謝其用力豈不以盤灘之故耶蔡琰關山阻修兮行路難郤鑒值永嘉喪亂鄉人共飼之公常擕二小兒往食鄉人曰各自飢困以君之賢欲共濟君爾恐不能有所存呀坑一作帆瞥眼過趙云呀坑如口之呀開者也一作呀帆則無義飛櫓本無蒂得失瞬息間致逺宜恐泥百慮視安危分明曩賢計兹理庶可廣拳拳期勿替趙云無蒂字班孟堅答賓戲云上無所蒂下無所根致逺恐泥論語全句百慮與拳拳出易百慮而一致得一善則拳拳服腐而弗失之矣勿替出詩勿替引之宿鑿石浦早宿賓從勞仲春江山麗飄風過無時舟楫敢不擊飄暴風也莊師云江逌賦賓從告勞老子曰飄風不終朝趙云子曰泛乎若不繫之舟風而不繫則流蕩矣回塘淡暮色日沒衆星嘒缺月殊未生青燈死分翳青燈言無光也彼趙云詩云嘒小星窮途多俊異亂世少恩惠以世亂故恩惠少而窮途多俊異也蒙趙云俊異之士在窮途則膏澤不少於民而亂世少其恩惠即非是亂世少恩惠以致俊異之窮舊注非鄙夫亦放蕩草草頻卒嵗斯文憂患餘聖哲垂彖繫聖人作易與民同憂患也其言象皆示於彖繫患趙云詩無衣無褐何以卒嵗易曰作易者其有憂乎斯文之中以憂患之餘而垂世者易也彖繫之間可見矣早行歌哭俱在曉行邁有期程孤舟似昨日聞見同一聲飛烏數求食潛魚亦獨驚前王作綱罟設法害生成網罟先王所以養民也而後人反以為業賦斂所以平民也而後人反以害民趙云詩行邁靡靡有期程者期日之行程也舊本潛魚亦獨驚師民瞻本作何獨驚是蓋言鳥數數出求食所以自飽魚既潛而猶驚所以求安而小民利之羅綱其鳥罟罩其魚害物之生成此公所以反傷前王之設法也易曰作結繩而為綱罟以佃以漁故公云爾此直因眼前所見而言之舊注非是碧藻非不茂髙帆終日征干戈未揖讓崩迫開其情以干戈未寧故崩迫而情僞日開趙云碧藻非不茂又是眼前所見以為可留連玩愛之物而迫於髙帆之征也梁劉孝威渡吉陽洲詩幸息榜人唱聊望髙帆開崩迫開其情則開放其情懷於終日征行之間也舊注穿鑿過津口南嶽自兹近湘流東逝深南嶽衡山也湘流湘江也水趙云酈道元注水經云湘乂北徑衡山縣東山在西南有三峯經謂之岣嶁山為南嶽也又云衡山東南二面臨映湘川自長沙至此江湘七百里中有九背故漁者歌曰帆隨湘轉望衡九回今公詩言南嶽近而繼以湘流深則此之謂矣和風引桂楫趙云梁元帝鳥栖曲云沙棠作船桂為揖夜渡江南採蓮葉春日漲零岑回首過津口而多楓樹林楓木名江趙云阮籍詠懷詩湛湛長水上有楓樹林白魚困密網黃鳥喧嘉音物微限通塞惻隱仁者心趙云白魚鯈魚也鯈音條乃莊子與惠子游於濠梁之上而莊子曰鯈魚出遊從容者也崔豹古今注曰白魚小好群逰浮水上名曰白萍惟其小而羣則蜜網之所取無遺斯所以為困也對黃鳥喧嘉音則詩所謂睍睆黃鳥載好其音者白魚以羣而小团於密網物之所以塞者也黃鳥以和風春日之際而嘉音喧然物之所以通者也物之通塞雖微不足道而仁者於物每則隱其困塞矣孟子曰惻隱之心仁之端也瓮餘不盡酒膝有無聲琴聖賢兩寂寞眇眇獨開襟傷時無君子獨開襟而已寞趙云於此有酒可飲有琴可玩而思聖與賢兩皆寂無典言者則亦獨開襟而自適耳無聲琴即陶淵明有琴而無絃也九歌曰目眇眇而愁子王仲宣登樓賦向北風而開襟無聲字蓋禮記所謂無聲之樂次空靈岸沄沄逆素浪落落展清眺幸有舟楫遲得盡所歷妙空靈霞石峻楓栝一作枯隱奔峭師云張載賦霞石駁落古詩峻嶺極奔峭趙云謝靈運七里瀨詩云晨積展遊眺又徒旅苦奔峭李善注云淮南子曰岸峭者必陀許慎曰陀落也謂楓栝之木遮隱欲奔之峭岸間耳光武謂耿弇曰前在南陽建此大䇿常以為落落難合王衍謂王登曰誠不如卿落落穆穆然也石勒曰大丈夫行事當礌礌落落揚子雲長楊賦沄沄沸渭青春猶無私白日亦偏照為山嶺障閡故偏照也可使營吾居左傳使營莵裘吾將老矣終焉託長嘯毒瘴未足憂兵戈滿邊徼嚮者留遺恨恥為逹人誚回帆覬賞延佳處領其要長嘯字文選成公子安嘯賦云邈跨俗而遺身乃慷慨而長嘯碑趙云兵戈前漢戾太子贊正息兵戈而度信周齊王序云夏官以兵戈為主野謀七德嚮者留遺恨恥為達人誚豈公前日經此而不能久住故有遺恨之留懷達者所謂之恥故今則雖水矣仍回帆以覬里賞玩之遷延而領佳處之要也司馬相如傳邊關益斥南至牂柯為徼張揖注曰徼謂以木石水為界者也師云潘尼詩回帆轉髙岸厯日得延賞宿花石戍午辭空靈本夕得花石戍空靈在歸州花石戍屬峽州鮑去唐志潭州有花石戍舊注非是陵薛云右按歸州圖經空舲峽東西四十里在峽州夷縣界十道志歸有空舲峽空靈當作空舲空趙云自上水遣懷而下古詩一一自是上水詩分明靈岸花石戍雖不可考其地要之皆上湘水耳舊注輒云空靈岸在歸州花石戍在峽州非特乖戾公經行之地而却是下水矣豈得前云沄沄逆素浪乎岸疏開闢水本雜今古樹水一作山自白狗峽至空靈山花石皆開闢之峽趙云開闢水字吳主嘗見吕岱說步隲言此欲以沙囊塞江每讀其表輒獨失笑此江自開闢以來寧可以囊塞之乎疏字則又江賦云巴東之峽夏后疏鑿之疏也一作開闢山則非持無出而於疏字無義孔稚圭詩草雜今古色巖留冬夏雲故曰木雜今古樹地蒸南風盛春熱西日暮四序本平分氣候何回互趙云上句言炎方之地蒸鬱在南風之中為盛次句言凡暑熱之日至日暮則須涼今以炎方之地故春熱在西日暮而不息也下兩句宋玉九辨云皇天平分四時兮竊獨悲此凜秋今公蓋言時方當春在他處亦豈有熱而今此地熱則於四序為回互矣海賦乖蠻隔夷回互萬里也茫茫天造間七本作地理亂豈常數繫舟盤藤輪杖䇿古樵路罷人不在村罷人言民困於征役而罷敝不在村不安居也野圃泉自注柴扉雖蕪沒農器尚牢固山東殘逆氣吳楚守王度安史之亂王命所及者吳楚蜀而巳誰能扣君門下令减征賦憫下情不上逹也前趙云易曰天造草昧人云治亂惟冥數耳今公云理亂豈恆數蓋立為新說者也意以為在政之得失而已故下有柴扉雖蕪沒農器尚牢固之句則公之意在於務農重穀矣山東今之河北杜牧云山東王不得不王霸不得不霸所以指言燕趙之地今言殘逆氣則以安史之亂雖已定而大厯三年六月兵馬使朱希彩殺其節度使李懷仙猶有逆氣存焉吳楚之間知所尊王乃當時之事惟吳楚守王度故欲扣門而與之減征賦也其中使繫舟則起於泛若不繫之舟杖䇿則太王杖䇿去邠乂魯仲連杖䇿而入海罷人音疲周禮云以嘉石平罷民也柴扉范彥龍詩曰日暮欵柴扉農器則史云鑄劔戟以為農器王度左傳云遵我王度早發有求常百慮斯文亦吾病以兹朋故多窮老驅馳併趙云易曰易一致而百慮孔子曰天之未喪斯文也公之意以為有所求人必多為思慮然吾以斯文自任衆所共知而亦為吾病何也乃下句云以兹朋故多窮老驅馳併也蓋人以吾任斯文者多是朋友故舊今則散在他處欲見之自是驅馳頻併也早行篙師怠席挂風不正席張席以為帆風不正不順也謝趙云海賦曰掛帆席蓋以席為帆故也乂靈運詩楊帆乘石華掛席拾海月昔人戒垂堂傳曰千金之子坐不垂堂今則奚奔命杜云左傳一嵗七奔命與趙云方奔命於驅馳其垂堂之戒不為異乎傳云罷於奔命也濤翻黑蛟躍日出黃霧映鮑明遠騰沙鬱黃霧翻浪揚白鷗蛟趙云張景陽詩云黑蜧躍重淵黑躍亦此之類煩促瘴豈侵頽倚睡未一作還醒趙云張茂先詩曰恬曠苦不足煩促每有餘今言於此团於煩促豈是瘴欲相侵乎故摧頽倚薄而睡未醒也僕夫問盥櫛暮顔靦青鏡暮顔衰醜冇愧於對鏡師云謝靈運詩白髮愧青鏡隨意簪葛巾隋王胄詩云庭草無人隨意緑仰慚林花盛側聞夜來冦幸喜囊中淨艱危作逺客干請傷直性謂有求於人也薇蕨餓首陽史記伯夷齊事粟馬資厯聘六國以粟馬資儀秦使之厯聘賤子欲適從疑誤此二柄二柄謂采薇及厯聘也則趙云一則鉞以為髙一聘以為榮此二柄也未知所適從故疑誤而不决矣此所以重自傷也傳曰一國三公吾誰適從韓非子有二柄篇曰明王之所𨗳制其臣者二柄而已矣雖言刑與德今公取字用耳次晚州參錯雲石稠雲石相互雜也石師云沈約詩煙林雲稠坡陀風濤壯坡陀泛濫之貌登趙云謝靈運詩臨圻阻參錯衰二世賦云坡陀之長坂顔延年詩春江壯風濤晚洲適知名秀色固異狀言其狀不一也棹經垂猿把身在度鳥上水漲而船所經者髙也於趙云張載論白猿𤣥豹藏於櫺檻何以知其接垂條千仭則猿可謂之垂也梁虞騫詩澄潭罵度鳥周庾信和浮圖詩幡搖度鳥驚看師云庾闡詩垂猿把臂飲梁蕭子暉詩仰雲度鳥擺浪散帙妨危沙折花當師言擺浪有妨于散帙危沙相過則折花相值皆紀舟行之實趙云謝靈運詩散帙問所知羇離暫愈恱嬴老反惆悵暫愈悅次晚洲也反惆悵歏行役也下趙云承折花之故暫爾愈恱也中原未解兵吾得終踈放兵未解而得踈放以不見用於世也憂趙云正傷時之擾攘吾豈得終踈放而不歡且流落乎舊注非是望嶽趙云嶽者南嶽衡山也按樂史寰宇記衡山在潭州之湘潭縣以其當翼軫度應機衡也而王存九域志湘潭縣在州南一百六十里衡山應又在外矣今云望嶽則將過湘潭而望之南嶽配朱鳥秩禮自百王書五月南巡狩至于南嶽衡山釋山又云霍山為南嶽衡之與霍皆一山有兩名而學者多以霍山不得為南嶽又云漢武帝來始名之斯不然矣衡山一名霍山言萬物霍而大也應劭曰風俗通曰嶽者稱考功德黜陟之故謂之嶽四方皆有七宿各成一形南方之宿象鳥故謂之朱鳥書望于山川注諸候境內名山大川如其秩次望祭之故五嶽牲禮視三公四瀆視諸候其餘視伯子男位趙云荆州記曰衡山者五嶽之南嶽也下踞離宫攝火鄉赤帝館其巔祝融託其陽故號曰南嶽今云配朱鳥者朱鳥南方之宿故也蓋井鬼栁星張翼軫七星在南方而井鬼為鶉首栁為尾又曰鳥帑以上七星總曰朱鳥前漢天文志曰南宫朱鳥權衡今南嶽所以配朱鳥矣秩禮自百王秩則尚書咸秩無文之秩秋者等也等秩之禮其來久矣故云自百王欻吸領地靈鴻洞半炎方地之百靈顔延年詩邑社總地靈謝趙云江文通雜擬詩欻吸鵾雞悲注云猶俄頃也又晀松風賦云養風飈之歘吸則翕忽之義故對洪洞王褒四子請德論云洪洞朗天則言天地神光洪洞相通明朗於天地又洞簫賦風洪洞而不絶地靈字祖出大戴禮有集地之靈炎方字出選邦家用祀典在德非馨香五嶽皆載祀典明趙云即書所謂黍稷非馨德惟馨也巡狩何寂寥有虞今則亡自戰國縱橫而巡守之禮亡矣虞舜五年一巡狩也趙云書舜典曰五月南巡狩至于南嶽故云語曰今則亡洎吾隘世綱行邁越瀟湘隘言世綱所拘迫也行邁猶行役也趙云公言所以行邁者以世綱隘窄故欲曠懷於江湖之上也詩云行邁靡靡渴日絶壁出漾舟清光旁趙云難逢日霽以望其峯於曰如渴也蓋如渴雨之渴盛𢎞之荆州記曰衡山有三峯極秀一莑名芙蓉峯最為竦傑自非清霽素朝不可望見又云紫蓋峯者天明輒有一隻白鶴回翔其上則望日之如渴也如此謝靈運詩曰辰䇿尋絶壁清光則日之清光也所謂清霽素朝者歟祝融五峯尊峯峯次低昻紫蓋獨不朝爭長嶫相望祝融峯名也朱陵祝融紫蓋石菌芙蓉所謂五峯也爭長言相峙而立有如爭長也趙云考衡山記其可稱者有芙容峯有紫蓋峯有石菌峯而韓退之詩曰紫蓋連延接天柱石廩騰擲堆祝融則又有天柱峯祝融峯其為五峯矣舊注輒以朱陵字補之為峯名此乃荆州記云衡山朱陵之靈臺一句非言峯也左傳滕候薛候來朝爭長恭聞魏夫人羣仙夾翺翔魏夫人神仙也主衡山真薛云按真誥南嶽夫人與弟子言東嶽上卿司命官等左二十二真人坐西起南向東行太和靈嬪上真太夫人右十五女真東坐北起南行上真司命南嶽夫人即魏夫人也杜補遺夫人諱華存字賢安晉司徒舒之女也幼純讀書喜神仙其後四仙人降車從鮮盛夫人既與仙者遊盡傳其祕術咸和八年終壽八十三舊傳以謂夫人實不死以杖代尸而升天扶桑大帝君授夫人青瓊之板冊録之文治南嶽趙云周庾信西門豹廟詩曰恭聞正直祀良識佩韋心有時五峯氣散風如飛霜牽迫限修途未暇杖崇岡言為行邁拘限未暇䇿杖而登崇岡歸來覬命駕沐浴休玉堂三歎問府主曷以贊我皇牲壁忍衰俗神其思降祥吳都賦玉堂對霤名室相距注皆仙人所居也乂云玉堂府主所居也故有三歎之問謂世辭俗薄祀典闕而不舉欲贊之於帝崇牲壁則神必降祥於此矣趙云舊注引吳都賦其說是又云玉堂府主所居自為惑亂矣既休玉堂由此往問府主自不相妨末句牲璧忍衷俗則牲與璧之費衰俗不忍具之而府主忍費於衰俗不中也湘江宴餞裴二端公赴道州白日照舟師朱旗散廣川羣公餞南伯肅肅秩初筵餞謂羣公相餞也南伯謂道州南邦也詩賔之初筵左右秩秩亦整肅貌趙云此篇鋪叙甚明白日照宇楚詞云青春受謝白日照羣公字揚雄羽獵賦羣公常伯楊朱墨翟之徒鄙人奉末眷佩服自早年末眷於裴有親也早年少年也已自佩服其德矣義均骨肉地懷抱慶所宣盛名富事業無取愧髙賢不以喪亂嬰保愛金石堅言冝以功業著盛名使無愧於髙賢也無嬰於喪亂以變名節宜保之若金石之固子美以骨肉之義故其所言及此也取趙云公自謙之辭言盛名與富貴事業兩件皆無所斯所以慙愧於髙賢矣髙賢指言裴端公也金石謂保身之意耳舊注非是計拙百寮下氣蘇君子前㑹合苦又作共不久哀樂本相纒交遊颯向盡宿昔浩茫然促觴激萬慮促觴言行觴急促也掩抑淚潺湲重別而有所感也熱雲焦曛黑缺月未生天九歌橫流涕兮潺湲謝靈運朝遊窮曛黑古詩三五明月滿四五蟾免缺師云袁山松詩熱雲沸空中不趙云馮衍答任武逹書曰敢陳露宿昔之意白團為我破師云古樂府青青林中竹可作白團扇又古詩逶迤搖白團以熱困於搖扇故曰為我破也華燭蟠長煙薛云按梁元帝燭賦長袖留賓待華燭燭燼落燭華明花抽珠漸落珠懸花更生鴰鶡催明星杜云鴰音括鶡音曷旦鳥禮記注求旦之鳥解袂從此旋上請減兵甲下請安井田永念病渴老附書遠山巔題衡山縣文宣王廟新學堂呈陸宰旄頭慧紫微無復爼豆事旄頭胡星也彗彗星紫微帝宫也胡星彗帝宫喻祿山亂中原陷長安也世亂爼豆之事不講故云無復也彗趙云按晉天文志昴七星天之耳也又為旄頭胡星紫微則言其犯帝座也又曰紫宫垣十五星其西蕃七東蕃八在北斗北一曰紫微大帝之座也天子之常居也彗字在天文志與孛俱為妖星之名雖别為一星而今云旄頭彗紫微則言胡星為妖也公詩又曰胡星一彗孛是巳此追言安史之亂也孔子曰俎豆之事則嘗聞之矣金甲相排蕩青襟一憔悴蓋民狃於戰爭不遑學校也詩云青青子襟嗚呼已十年儒服弊于地師注云庾翼詩儒服一何弊征夫不遑息學者淪素志我行洞庭野歘得文翁肆侁侁胄子行若舞風雩至文翁為蜀郡守興建學校以教蜀人故風俗大變可比齊魯侁侁整肅貌胄子謂元子以下至卿大夫子弟從學者若舞風雩而至也語曰風乎舞雩也也趙云文翁肆字則揚子所謂書肆陶淵明所謂講肆侁侁整肅貌胄子書曰命䕫典樂教胄子也論語疏云雩者祈雨之祭名使童男女舞之因謂其處為舞雩舞雩之處有壇墠樹木可以休息故云風凉於舞雩之下也今云若舞風雩至則取其義而已周室宜中興孔門未應棄是以資雅才渙然立新意周室借周以喻唐也言唐所以宜中興則孔門豈可棄乎蓋君君臣臣父父子子百姓日用而不知者皆在是也雅才陸宰也新學資之而成爾趙云詩任賢使能周室中興然雅才指言陸宰也字則王充諭衡自紀篇有云士貴雅才而慎興不用髙據以顯逹杜云前漢杜鄴子林清靜好古有雅才又見湖廣傳注後漢髙彪有雅才而納於言衡山雖小邑首唱恢大義世亂而衡山能守建學校也因見縣尹心根源舊宫閟詩閟宫頌僖公能復周公之字也之趙云毛曰閟閉也言無事而閉鄭氏箋云閟神也謂神宫今舊宫閟倒用押韻且其義大率深閟之謂講堂非曩構大屋加塗塈下可容百人墻隅亦深邃何必三千徒始壓戎馬氣學校者教化之所自也魯侯能修泮宫而淮夷攸服則其所以折暴亂者何必三千之徒言文德足以服逺也自趙云講堂字後漢鮑永傳孔子闕里無故荆棘自除講堂至于里門非曩構則一新之也塗塈字書云惟其塗墍茨三千徒指言孔子之弟子也林木在庭戶密幹疊蒼翠有井朱夏時轆轤凍階戺耳聞讀書聲殺伐災髣佛聞讀書之聲而樂也此趙云言聞讀書聲而樂彼殺伐之災在特覺其髣佛而巳蓋讀書之氣勝之故也故國延歸望衰顔减愁思南紀改波瀾言能以文德易暴亂也字趙云以聞讀書聲而遲延故國之思减衰顔自愁南紀唐天文志云東循徼嶺逹甌閩中是謂南紀所以限蠻夷也改波瀾亦以聞讀書聲而洗波瀾之氛妖西河共風味史記子夏居西河教授為魏文侯師共風味者言人樂其教也采詩倦跋涉載筆尚可記尚可記一云記竒異采詩之官雖不可違載筆而記之可也采趙云兩句言采詩之官倦於跋山涉水之勞而不來之則史官之載筆尚可記陸宰之美也高歌激宇宙凡百慎失墜趙云左傳曰奉以周旋罔敢失墜公言我今之高歌為君子者當勿失墜也詩凡百君子此亦以友于為兄弟以貽厥為子孫之比具于凡百慎交綏解入衡州趙云此篇作五假鋪叙自兵革自久逺至寬猛性所將言兵戈興起雖無害於帝王之興但將帥失律君臣含容以致天下節度各任其性之寬猛以召亂如下文也自嗟彼苦節士至明徵天莽茫指言潭帥崔灌為别將戚玠所殺灌之苦潔其身裁制其下之所致而傷福善明證之報不足憑也自銷魂避鋒謫至舂容轉林篁則叙其避難而走也自片帆在郴岸至蚊蚋馬能當叙其已得脫難入衡州而美衡帥之得人也自橘井舊地宅至鵬路觀翺翔叙其將往郴州寓居而終之以觀衡帥之擢用也兵革自久遠興衰看帝王漢儀甚照耀胡馬何猖狂言漢唐法度未墜胡馬之亂徒猖狂爾其趙云上兩句言兵革雖不息徒自嵗月之久而興起衰謝自看帝王之舉耳興衰乃興衰撥亂之謂也後漢光武為司𨽻校尉父老見之曰今日復見漢官儀今言唐之法度未改故以比之胡馬追言安史之兵也老將一失律清邊生戰場失律失法律也易曰失律凶于趙云似言哥舒翰之失潼關房琯之敗陳濤斜九節度之敗于相州者也君臣忍瑕垢河嶽空金湯言避亂出行城池不守也故空金湯左傳曰國君含垢瑾瑜匿瑕言有所容也金謂金城湯謂湯池也君趙云曰金城湯池言城如金之堅池如湯之阻今以相初含容姦逆不即誅戮故使河嶽之地雖是金城湯池失守而空自如之也重鎮如割據安史亂後天下裂為藩鎮賦不上供如割據馬輕權絶紀綱軍州體不一各自為政也寬猛性所將趙云於是天下節度稍自威重則如一方之割據茍或權輕則絶其紀綱而不振矣以時言之軍州所在不一其體以性言之為政寬猛不一其性茍昧於設施所以召亂矣嗟彼苦節士素於圓鑿方九辨云圓鑿而方枘兮吾固知其齟齬而難入中趙云苦節指言崔灌也按新史以士行修謹聞大厯為湖南觀察使時將吏習寬弛不奉法灌每以禮法繩之下多怨崔灌以苦節為政是昧圓枘不入方鑿之義而公今句則言鑿宜圓矣乃於圓鑿而方之文異而義同也易節卦上六苦節貞凶象曰其道窮也寡妻從為郡兀者安短墻凋弊惜邦本惜民之雕弊也書曰氏為邦本趙云言寡妻平日遭擾自從崔太守為郡之後如兀足者之安於堵墻之下不復驚動也文王刑于寡妻哀矜存事常趙云曾子曰如得其情則哀矜而勿喜言不妄刑罰哀矜其人存事體之大常也其為士行修謹如此旌麾非其任言北其人也府庫實過防吝財賞也恕己獨在此多憂增內傷偏禆限酒肉卒伍單衣裳厚自奉養而不恤軍旅也趙云灌之修謹既如上所云然於是委以旌麾則非其所任益為帥在寬猛適中施豫不吝豈可過防於府庫之費乎茍自恕巳則可獨在此矣而多憂其費務從减省徒增內傷而巳於是偏禆則酒肉之儉卒伍則衣裳之單遂以召亂如下文所云也三略曰良將恕己而治人曹子建表云誠可謂恕己治人推恩施惠者矣元惡迷是似聚謀泄康莊薛云右按爾雅曰五違謂之康六逹謂之莊杜補遺史記列傳曰騶與者齊諸騶子亦頗采鄒衍之術以紀文於時齊王嘉之為開第康莊之衢趙云元惡指言臧玠灌既以禮法繩裁其下故有多怨玠與判官逹奚覯忿爭覯曰今幸無事玠曰欲有事耶拂衣去是夜以兵殺覯灌皇遽走遇害玠遂據潭州還是似言凶惡之人不識崔帥所為本由禮法而迷此之是似乃聚謀而泄發於康莊也詩是以似之竟流帳下血大降湖南殃代宗時湖南兵馬使臧玠殺其帥崔灌烈火發中夜高煙燋上蒼至今分粟帛殺氣吹沅湘福善理顛倒用徵天莽茫九歌令沅湘兮無波阮籍曠野莽茫茫趙云流血降殃發烈火分粟帛皆以言其亂也書曰天道福善禍漟又曰明徵定保今以崔帥之謹潔由禮而被禍則福善之禮豈不顛倒明徵於天豈不芥茫乎銷魂避飛鏑纍足穿豺狼隱忍枳棘刺遷延胝趼瘡言避亂奔走危窘如穿豺狼間行也心痛悼喪亂如忍棘刺手足胝趼而成瘡趙云江文通别賦云黯然銷魂唯别而巳飛鏑字出選纍足行步驚恐之義漢書纍足脅息豺狼字多矣如豺狼當道隱忍漢史云隱忍以就功名枳棘如枳棘非鸞鳯所棲遷延左傳云遷延之役胝音張尼切列子云手足胼胝趼音吉典切莊子云百舍重趼胝與趼皆是足瘡之名遠歸兒侍側猶乳女在旁久客幸脫免暮年慙激昻幸於免患也蕭條向水陸汩沒隨漁商報主身已老入朝病見妨悠悠委薄俗鬱鬱回剛腸老而不可報主病而不可入朝故不免委身薄俗鬱鬱回剛腸而已趙云激昻字王章妻謂章曰今在困厄不自激昻暮年字魏武樂府云烈士暮年參錯走洲渚舂容轉林篁謝靈運遡流觸鷺急臨圻阻參錯森趙云謝靈運詩注謂圻岸之險參差交錯也參音七切學記善待問者如撞鐘待其從容然後盡其聲疏云舂謂擊也以為聲之形容言每一春而為一容然後盡其聲今言其形之悠悠如鐘聲之舂容未便盡也大曰洲小曰渚竹木皆謂之林篁叢竹也片帆左郴岸郴地名通郭前衡陽衡州也華表雲鳥埤名園花草香旗亭壯邑屋烽櫓蟠城隍杜補遺三代世表㑹旗亭下注市樓也立旗于上故名旗亭張衡西京賦廓開九市通闤帶聞旗亭五重俯察百隧注旗亭市門樓魏都賦抗旗亭之嶢嶭櫓城上守禦望樓城隍池之無水者趙云公意往郴故具片帆而言衡之左則郴岸衡在郴州之西北九域志郴州西北至本州界一百三十七里則郴在衡州之東南故云在郴岸衡陽即衡之倚郭縣故云通郭前衡陽也埤在經書音毗詩云政事一埤遺我晉語秦翳和曰松柏不生埤注云下濕也而國語音云音卑又皮靡反今公所用乃側聲之音於此難講或云恐是雲鳥陳字之誤公嘗云共說總戎雲鳥陳但於華表亦無說中有古刺史言其愛民蒞事如古之刺史盛才冠巖廊杜補遺顔延年游蒜山詩曰空食疲廊肆李善注廊嵓廊也朝廷所在也文頴漢書注曰嵓廊殿下小屋上趙云出武帝制曰舜遊嵓廊之扶㒹待柱石獨坐飛風霜趙云刺史乃柱石之臣獨坐者御史也豈公後篇所注崔侍御潠者乎風霜則御史之任崔篆御史針曰簡上霜凝筆端風起又蘇味道贈封御史詩云風連臺間起霜就簡書飛元希聲贈皇甫侍御詩云肅子風威嚴子霜質是巳昨者間瓊樹高談隨羽觴公自言得侍刺史如間瓊樹然陸士衡四坐咸同志羽觴不可算注羽觴謂其置鳥羽於觴以急飲也趙云如所謂蒹葭倚玉樹也晉書晳傳昔周公城洛邑因流水而迅酒故逸詩云羽觴隨波張平子西都賦羽觴行而無算無論再繾綣已是安蒼黃趙云左傳繾綣從公劇孟七國畏前漢游俠傳劇孟以俠顯吳楚反時條侯為太尉乘傳東討至河南得劇孟喜曰吳楚舉大事而不求劇孟吾知其無能為巳天下騷動大將軍得之若一敵國馬卿四賦良司馬相如字長卿有子虛上林賦哀二世賦大人賦並載漢史傳門䦨蘇生在蘇生侍御渙勇鋭白起强趙云劇孟馬卿皆以比刺史白起以比蘇渙劇孟以比其豪馬卿以比其能文白起善用兵事秦昭王料敵合變出竒無窮聲振天下門䦨蘇生在公自注云蘇生侍御渙則渙在崔公潩之幕而其人勇鋭用白起以比其可為將問罪富形勢凱歌縣否臧末章皆美刺史也于趙云公於末篇自注云聞崔侍御潩乞師洪府師巳至袁州北此所謂問罪凱歌者乎富形勢則以兵之形勢精强也懸否臧易曰師出以律否臧凶而懸闊則非否臧之凶矣氛埃期必掃蚊蚋焉能當趙云氛埃蚊蚋比臧玠也橘井舊地宅仙山引舟航上句見橘井尚高褰注下句見蓬萊如可到注杜田補遺桂陽列傳蘇耽種橘鑿井以救時疫病者食橘飲水即愈葉趙云橘井在彬州神仙傳蘇耽將仙謂其母以庭前橘一片水一杯使病者以水服橘葉病即愈斯可見其有宅矣仙山則指言蘇仙所仙之山按水經載耽既仙之後乘白馬而返其所鑿井處世謂馬嶺山公謀欲往郴故云引舟航也舊注引蓬萊如可到之句則遂指仙山為東海中之三山矣非是此行厭暑雨厥土聞清凉言親刺史之德而亡炎暑詩趙云此又指言彬州矣公有曰彬州頗凉冷橘井尚凄清是已舊注所言又却是猶說衡州刺史非是又無比德之意諸舅剖符近言諸舅皆作郡開緘書札光頻繁命屢及磊落字百行江總外家養陳書江總字揔持七嵗而孤依于外氏聰明有至性舅蕭勵名重時尤所鍾愛愛常謂揔曰爾操行殊異神彩英秀後之知名當出吾右謝安乘興長謝安寓居㑹稽出則魚弋山水入則言詠屬文無處世意常往臨安山中坐石室臨濬谷悠然嘆曰此亦伯夷何逺又與孫綽等汛海吟嘯自若放情邱壑每游賞必以妓女從也刺趙云公詩每以崔姓為舅剖符近則必有姓崔者為史矣豈崔侍御潩乎頻繁者重疊也江揔則公自比其為崔氏之甥謝安則公自比其遊行之興下流匪珠玉擇木羞鸞凰下流自言也言已非珍異然得所託也其趙云論語曰惡居下流而訕上者公又嫌為人特下流耳非是珠玉之珍也傳曰鳥則能擇木木豈能擇鳥史又曰窮猿投林何暇擇木公之意自謙言其不暇擇木非若鸞凰之非梧桐不棲故羞鸞凰也我師嵇叔夜恬靜寡欲含垢匿瑕也世賢張子房彼掾張勸柴荆寄樂土鵬路觀翺翔寄居樂土當日觀刺史為朝廷拔用也趙云師嵇叔夜則公自言其放曠懶散如嵇康世賢張之房公自有本注美張勸也謝靈運初去郡云促裝反柴荆樂土指郴州詩云適彼樂土鵬路則莊子所云九萬里者是也風雨看舟前落花戲為新句江上人家桃樹枝春風細雨出踈籬影遭碧水潛勾引趙云古樂府薄命篇云豔花勾引落風妬紅花却倒吹吹花困癲傍舟楫水光風力俱相怯趙云庾信畫屏風詩水光連岸動劉孝儀渡吉陽州詩曰噪鼓揚風力赤憎輕薄遮入懷趙云赤憎方言也公嘗云輕薄桃花逐水流梁武帝春歌曰階上香入懷庭中花照眼遮之為言輒也如遮莫鄰雞下五更之遮珍重分明不來接一作折趙云師本作來折蓋全篇言落一花耳豈復更言人之不折乎濕久飛遲半欲高縈沙惹草細於毛蜜蜂蝴蝶生情性偷眼蜻蜓避伯勞師云詩七月鳴鵙釋文云伯勞也蓋此詩末句與莊子蟬棲美蔭不知螳蜋在其後螳蜋捕蟬不知黃雀在其後黃雀不知挾彈者在其後同意清明著處繁花矜是又云務足日長沙千人萬人出渡頭翠桞艷明眉爭道朱蹄驕齧膝朱建平善相馬魏文將出取馬入建平曰此馬今日死矣及將乘馬惡香齧帝膝帝怒殺之本趙云簫子暉冬曉詩曰繁花無處盡還銷寒鏡中舊矜作務蔡伯世本作矜是朱蹄則以朱飾其蹄左傳衛公馬朱其尾鬛舊注齧膝事馬性偶如此若皆如此豈不傷人乎公蓋使王褒聖主得賢臣頌曰駕齧膝驂乘旦張晏曰皆良馬名應劭曰馬驣有餘氣常齧膝而行况上句云翠桞艷明眉則桞自明其眉今云朱蹄驕齧滕則馬自齧其膝矣爭道字本出左傳宋萬宋之臣也與閔公博爭道公今用之為善用字矣此都好遊湘西寺諸將亦自軍中至馬援征行在眼前葛强親近同心事伏波將軍馬援征交趾女子徵側又擊武陵五溪蠻夷趙云舊本作諸將之自軍中至師民瞻本之作亦是作實道其事耳此以比主帥金鐙下山紅粉一作日晚牙檣捩柂青樓遠杜補遺古樂府劉生詩座驚稱字孟豪雄道姓劉廣陌通朱邸大路起青樓又張正見採桑詩倡妾不勝愁結束下青樓又文選姜女篇借問女安居乃在城南端青樓臨大路高門結重關晚趙云青樓則所袚禊之處岸上有之也舊本作紅粉當作紅日晚捩柂轉船也古時喪亂皆可知人世悲歡暫相遣弟姪雖存不得書干戈未息苦離居逢迎少壯非吾道况乃今朝更祓除祓除上已束晳曰周公城洛邑因流水以泛觴後人相緣因為盛集趙云周禮女巫掌嵗時祓除釁浴鄭注如今三月三日上已往水上之類唐氣朔大厯五年三月三日清明以清明值上已則更祓除之義猶明嶽麓山道林二寺行玉泉之南麓山殊玉泉地名山足曰麓道林林壑爭盤紆杜補遺盛𢎞之荆州記曰長沙西岸有麓山其下有精舍左右林嶺環回泉澗旁有石每至嚴冬其水不停霜雪山足曰麓蓋衡山足也詩趙云謝靈運詩林壑斂暝色承道林字下使林壑此人之巧也子虛賦其山則盤紆岪鬱而用林壑盤紆則變張平子南都賦溪壑錯繆而盤紆也寺門高開洞庭野殿腳插入赤沙湖洞庭赤沙皆湖名酉趙云洞庭湖在嶽州之前赤沙湖在永州陽雜俎云勾容赤沙湖今衡山麓寺而云此廣大之語而談州之下流為洞庭上流乃永州湘水所從出亦可以言矣正猶夔州古柏行云雲來氣接巫峽長月出寒通雪山白赤沙湖對洞庭野以莊子有云黃帝張樂於洞庭之野也五月寒風冷佛骨六時天樂朝香爐香爐峯也冷趙云冷佛骨舊一作拂骨非不惟不對而骨却在人言之矣朝香爐直言佛寺香爐耳六時天樂朝之則壁間所畫之天樂也舊注云香爐峯却是廬山事矣地靈步步雪山草釋書言佛得道於雪山僧寶人人海滄珠言性圓明而無瑕也香杜正謬楞嚴經云雪山大力白牛食其山中膩肥草此牛唯飲雪山清水其糞微細可和合旃檀故趙云大戴禮有集地之靈而顔延年云邑社揔地靈對僧寶其字則佛法僧為三寶也滄海珠如閻立本稱狄仁傑曰可謂滄海遺珠矣步步如謝希逸作宣貴妃誄有龍逶遲於步步梁元帝鳥栖曲那知步步香風逐故對人人則曹子建云云人自謂握靈蛇之珠塔劫宫墻壯麗敵香厨松道清涼俱趙云塔劫則塔之層劫也香厨則禪剎中有香積厨也皆實道其事耳蓮花一作池交響共命鳥釋書有共命鳥二首一身金榜雙回三足烏三足烏言寺額金榜有回鸞反鵠之勢是杜補遺阿彌陀經極樂國常有迦陵頻伽共命之鳥諸衆鳥晝夜六時出和雅音其音演暢五根六力七菩提分八聖道分如是等法金榜神異經西方有宫白石為牆五色黃門有金榜而銀鏤題曰天地少女之宫淮南子日中有踆烏注云三足烏也雙回三足烏蓋言大字之勢如此相如大人賦亦幸有三足烏為之使此摘而用之言金榜字勢如日中之烏飛動炫耀也方丈涉海費時節𤣥圃尋河知有無天台賦涉海則方丈蓬萊張騫贊曰禹本紀言河出崑崙自張騫使大夏之後窮河源惡覩所謂崑崙者乎𤣥圃乃崑崙也趙云史記海中有三神山一曰方丈而孫興公天台賦序云涉海則方丈蓬萊也𤣥圃崑崙山之别名見葛仙翁傳而尋河事則禹本紀言河出崑崙自張騫使大夏之後窮河源烏覩所謂崑崙者乎兩句以言方丈𤣥圃逺在何處皆不可得往不若今嶽麓寺之傍近可即而居也故有下句桃源橘洲之興暮年且喜經行近春日兼䝉暄暖扶飄然班白身奚適旁此煙霞茅可誅楚詞寧誅鉏草茅以力耕乎言當暮年欲誅草茅旁此而居也桃源人家易制度桃源秦人避難之地易制度言世更變也橘洲田土仍膏腴橘洲在長沙縣杜云武陵圖經云橘洲在龍陽東北五十里吳志孫休傳注載盛𢎞之荆州記云李衡字叔平仕吳為丹陽太守每欲理産業妻習氏輒不聽從衡密遣人於武陵龍陽縣汛洲種甘橘千株臨死語其子曰汝母惡吾營家故貧如此然吾於武陵汛洲種十頭木奴不匱汝衣食後當得千匹絹亦足用耳衡亡後其子以白其母母曰此當是種甘橘也汝父嘗稱太史言江陵千林橘其人與千户侯等殆謂此矣然人患無德義不患於貧茍能守道兹何為吳水甚盛茂果獲千縑縑晉咸熙中猶有存者今此洲上居民數十家亦多有橘株故呼為橘洲又水經注龍陽縣之橘洲長二十里吳丹陽太守李衡植甘橘於其上臨死敕其子曰吾州里有木奴千頭不匱汝衣食嵗絹千匹又湘中記曰或曰昭潭無底橘洲浮橘洲有二其一在龍陽即李衡種甘橘之所其一在長沙去州十里子美言橘洲乃長沙非龍陽也湘中記所載亦長沙橘洲漢張禹買田皆高腴上價者也趙云桃源在今之州陶淵明集載晉太和中漁父得事易制度言其宫室朴略所以制度易為也舊注非橘洲在武陵正亦鼎州鼎州與潭州並一帶之地則公所欲往皆為無礙然桃源在鼎州而橘洲亦在鼎此一州中事矣則必指武陵之橘洲而巳况桃源有秦人避地事而此橘洲有李衡種橘事乎潭府邑中甚淳古太守庭內不喧呼昔遭衰世皆晦跡今幸樂國養微軀依此老宿亦未晚老宿僧之年臘高者富貴功名焉足圖久為野客尋幽慣細學何顒免興孤見何顒興未忘注云趙云潭府者曾潭之府也梁張纘南征賦曾潭水府潭州得名政以其水之潭潭耳緣有曽潭水府字故得取用潭府何顒在後漢黨錮傳乃急義名節之士與今詩句不相干或曰應是周顒而所傳之誤周顒宋人長於佛理終日長蔬雖有妻子獨處山舍若作周顒則於賦二寺詩并野客尋幽之下為有說一重一掩吾肺腑一重一掩山也有如吾肺腑然薛云按前漢書衛青曰吾幸得以肺腑待罪行間山鳥山花吾友于與之同處若兄弟也杜補遺陶淵明詩一欣侍溫顔再喜見友于南史劉湛友于素篤北史李謐事兄盡友于之誠趙云書友于兄弟而晉以來便用稱兄弟宋公放逐曽題壁物色分留與一作待老夫宋之問之貶也塗經於此有詩尚在壁間伯趙云舊本作分留與老夫與一作待當以待為正蔡世云作與字意乃淺近是舟中苦熱遣懷奉呈陽中丞通簡臺省諸公愧為湖外客看此戎馬亂中夜混黎氓脫身亦奔竄謂避臧玠之亂入衡州也於趙云指言洞庭湖之外則衡州是也老子云戎馬生郊戎馬亂指言臧玠之亂也事詳見前注平生方寸心反掌帳下難謂崔灌見殺也晉張輔傳後為天水故帳下督富整所殺徐庶母為曹公所獲庶辭先主指其心曰本欲與將軍共圖王霸之業者以此方寸之地也今已失老母方寸亂矣先主伐吳張飛臨發其帳下將張逹范疆殺飛持其首順流而奔孫權亦猶臧玠之殺崔灌也故云帳下難前詩亦云竟流帳下血嗚呼殺賢良按新史灌為治不煩苛人便安之居澧州二年增户數萬詔特進五階以寵異疆不叱白刃散趙云舊本反掌蔡伯世夲作反當其說是公自言平生有經世之心而反當帳下有難至於賊殺賢良乃不能一叱白刃使散蓋自以為愧矣帳下指臧玠賢良指崔灌也吾非丈人特沒齒埋氷炭薛云按論語管仲奪伯氏駢邑三百飯疏食沒齒無怨言韓子曰冰炭不同器恥以風病辭胡然泊湘岸趙云四句通義言能叱白刃散者非文人之特不可而吾非是此人徒沒齒埋於冰炭之中矣文人者長老之稱特字即詩云百夫之特冰炭言不相入既不能叱白刃散却以風病辭此為可此矣但以逃難而來故自問其胡然泊湘岸之岸也詩曰胡然而天也胡然而帝也入舟雖苦熱垢膩可溉灌痛彼道邊人形骸改昏旦痛彼遇亂而死者中丞連帥職詩有方伯連帥之職封內權得按身當問罪先縣實諸侯半謂陽中丞也封邑半於古諸侯師曰中丞楊琳自禮上逹長沙問罪見子美後詩注賊趙云中丞陽公也舊史云衡州刺史陽濟各出兵討玠謂連帥乃古之諸侯火有問罪之師詩元戎十乘以先啓行士卒既輯睦薛云按春秋左氏傳隨武子曰昔嵗入陳今兹入鄭民不罷勞居無怨讟而卒乘輯睦事不奸矣啓行促精悍詩爰方啓行似聞上遊兵稍逼長沙館上游江之上流也西杜補遺漢書項羽自立為楚霸王使人徙義帝曰古之帝者地方千里必據上游乃徙義帝長沙彬縣趙云即後篇公自注云楊中丞琳問罪將士皆自澧上逹長沙也鄰好彼克修天機自明斷趙云所以指言楊中丞琳矣南圖卷雲水北拱戴霄漢美名光史臣長䇿何壯觀南圖謂圖畫湖南也北拱謂誅亂鉏暴以尊王室也如此則書於史臣者光美而見於䇿略者為壯觀也杜正謬云南圖蓋莊子鵬飛九萬里而圖南事故子美送嚴公詩又云南圖廽羽翮北極捧星辰也趙云蓋言南子所圖謀欲卷盡雲水也劉孝標辨命論曰荆昭德音丹雲不卷北拱即孔子云北辰居其所而衆星拱之戴霄漢則所以尊君也驅馳數公子咸願同伐叛聲節哀有餘夫何激衰懦言願同伐叛之公子聲名節概足以振激衰懦衰懦猶軟弱也趙云數公子事按唐書澧州刺史楊子琳道州刺史裴虬衡州刺史楊濟各出兵討玠宗室李勉為廣州刺史亦以兵討玠此謂數公子也選云奉義詞以伐叛偏禆表三上鹵莽同一貫薛云按前漢馮奉世上書討羌願益兵上為發六萬人太常千秋將以助焉奉世以得其衆不須復煩脟上讓之曰大將軍出必有偏禆又何疑焉一趙云此别說有偏禆之將三人上表而敷陳不明同貫耳如莊子可不可為一貫著同字則又用同條共貫合之也始謀誰其間回首增憤惋趙云惟其所陳一貫而不明所以問誰在其間為始謀者乎徒令我回首憤惋也於是引下句美李端公宗英李端公宗室之英秀也杜補遺梁邵陵王讓丹陽尹表曰臣進非民譽退異宗英又吕溫河間王李恭贊曰堂堂可間仁勇是經遹駿有聲為唐宗英李肇國史補宰相相呼曰堂老兩省相呼為閣老尚書丞郎相呼曰曹長郎中員外御史補遺相呼為院長唯御史相呼為端公李端公蓋御史也名勉見上入衡州趙云李勉為御史中丞京兆尹大厯中出為廣州刺史亦以兵討玠守職甚昭煥變通迫脅地謀畫焉得算王室不肯微凶徒略無憚此流須卒斬神器資强幹薛云按道德經云天下神器不可為也之杜補遺班固西都賦冠蓋如雲七相五公與夫州郡豪傑五都之貨殖三選七遷充奉陵邑蓋以强幹弱枝隆上都而觀萬國也更趙云李公能變而通之於賊兵追脅之地用其謀畫得算計可行乎詩云國既卒斬今此則言終誅斬此凶徒也扣寂豁煩襟皇天照嗟嘆趙云陸士衡文賦課虛無以責有扣寂寞而求音聶耒陽以僕阻水書致酒肉療飢荒江詩得代懷興盡本韻至縣呈聶令陸路去方田驛四十里舟行一日時屬江漲泊于方田耒陽馳尺索見訪荒江眇義士烈女家風流吾賢紹尺素書也史刺客傳聶政殺韓相自死其姊榮伏尸哭極哀死政之旁晉楚齊衛聞之皆曰非獨政能也乃其姊亦烈女也師趙云古詩客從遠方來遺我尺素書舊本荒江眇民本作荒江渺是公又云江湖渺霽天昨見狄相孫許公人倫表杜補遺南史孔休源字慶緒為晉安王長史武帝敕王曰孔休原人倫儀表當每事師之又任彥升撰王文憲集序曰國學初興華夷慕義經師人表允茲實望前期翰林後屈跡縣邑小言聶政之才宜在翰宛而反屈跡伯縣邑趙云舊本前期翰林後蔡世云則本作前朝其說是豈聶之父祖嘗為翰林之職乎知我礙湍濤半旬獲浩溔趙云一本以上句為荒江眇遂於此句為半句獲浩渺師民瞻云浩溔音以沼切注云大小貌謝靈運山居賦云吐泉原之浩溔麾下殺元戎湖邊有飛旐潭州臧玠殺其帥崔灌子美避亂而往衡州故也庾公上武昌出石頭百姓看於岸上歌曰庾公上武昌翩翩如飛鳥庾公還揚州白馬引素旐乃庾尋亡也潘趙云舊注雖是而非飛旐字所出安賦云飛旐翻以啓路孤舟增鬱鬱僻路殊悄悄側驚猿猱捷仰羡鸛鶴矯禮過宰肥羊愁當置清醥張平子鬱鬱不得志詩憂心悄悄蜀都賦猿狖騰希而競捷又置酒高堂腸以清顠曹子建烹羊宰肥牛言聶以肥羊清醥乃見於禮也匹杜補遺曹子建七啓云乃有春清醥酒康狄所營醥眇切青白色揚雄酒賦云其味有宜城醪釀蒼梧醥清蜀獨賦云觴以清醥鮮以紫鱗清酒也杜詩一本作清縹故兩載之詩曰既有肥羜以速諸父禮過宰肥羊言聶令待遇厚也人非西喻蜀唐䝉通夜郎徵發巴蜀吏卒因軍興法誅其渠帥巴蜀大驚上聞之使相如作檄以責唐䝉因喻巴蜀人非上本意之事也興在北坑趙秦將白起破趙四十餘萬軍遂降秦白起悉坑之趙云兩句又公自言也方行郴岸靜未話長沙擾時臧玠殺崔灌長沙擾亂也崔師乞已至澧卒用矜少問罪消息真開顔憩亭沼聞崔侍御潩乞師于洪府師已至袁州北楊中丞琳問罪將士皆自澧上逹長沙諸趙云公自注甚明蔡伯世云公避亂竄還衡州衡州將乃嘗寓家衡陽獨至長沙還罹此變尋於江上阻暴水半旬不食耒陽聶令具舟致酒肉迎歸一夕而卒則此詩蓋公之絶筆矣舊譜乃云還襄漢卒於嶽陽尤誤矣九家集注杜詩卷十六
