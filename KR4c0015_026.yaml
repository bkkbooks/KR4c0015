body:
  text: 九家集注杜詩巻二十六宋郭知達編近體詩寄董卿喜榮十韻聞道君牙帳防秋近赤霄下臨千雪嶺却背五䋲橋海内久戎服京師今晏朝太羊曾爛熳宫闕尚蕭條猛將宜嘗膽龍泉必在腰黄圖遭汚辱月窟可焚燒謂宫殿㑹取干戈利無令斥候驕居然雙捕虜自是一嫖姚落日思輕騎秋天憶射鵰雲臺畫形像皆為掃氛妖洙曰牙帳則元帥建牙旗於帳前也鶴曰防秋近赤霄言列戍西山三城之髙也洙曰雪嶺即西山䋲橋在岷江史記起王句踐反國苦身勞思飲食嘗膽不㤀㑹稽之起龍泉楚王劒名也趙曰書有三輔黄圖言秦漢宫苑制度洙曰長楊賦西壓月窟西域傳斥候百人五分之夜擊刁斗自衛漢光武拜馬武捕虜將軍明帝復復拜武捕虜將軍霍去病為嫖姚校尉修可曰北史斛斯光工騎射嘗射一大禽形如車輪而不乃鵰也邢子髙曰此直射鵰手當時號為落鵰都督趙曰漢朋帝圖畫二十八將於南宫雲臺寄司馬山人十二韻闗内昔分天邊今轉蓬驅馳不可説談笑偶然同道術曾留意先生早擊䝉家家迎薊子處處識壺公長嘯峨嵋北潛行玉壘東有時騎猛虎虚室使仙童髪少何勞白顔衰肯更紅望雲悲轗軻畢景羡冲融䘮亂形仍役淒涼信不通懸旌要路口倚劒短亭中永作殊方客殘生一老翁相哀骨可換亦遣馭清風洙曰後漢方術傳薊子訓有神異之道既到京師公卿以下侯之者坐上常數百人費長房為市椽市中有老翁賣藥懸一壺於肆頭及市罷輒跳入壺中市人莫之見惟長房於樓上覩之異焉因徃再拜翁乃與俱入壺中趙曰史記云揺揺懸旌無所終薄莊子曰夫列子御風而行泠然善也寄李十四員外布十二韻公自注新除司議郎萬州别駕雖尚伏枕已聞理裝名參漢望苑職述景題輿巫峽將之郡荆門好附書逺行無自苦内熱比何如正是炎天闊那堪野館踈黄牛平駕浪畫鷁上凌虚戯待盤渦歇方期解䌫初悶能過小徑自為摘嘉蔬渚栁元幽僻村花不掃除宿隂繁素柰過雨亂紅蕖寂寂夏先晚泠泠風有餘江清心可瑩竹泠髪堪梳直作移巾几秋帆發弊廬洙曰漢博望苑武帝為戾太子置之使通賔客從其所好夢弼曰司議太子武官也以李布新除司議郎故用博望苑事洙曰後漢周景為䂊州刺史辟陳蕃為别駕蕃不就景題别駕輿曰陳仲舉座也洙曰内熱字出莊子黄牛峽名修可曰畫鷁者船頭畫為鷁以厭水神洙曰郭璞江賦盤渦谷轉歸來客裏有所適歸來知路難開門野鼠走散帙壁魚乾洗杓開新醖低頭著小冠憑誰給麯糵細酌老江干本作低頭拭小盤一作著小冠先生云著小冠勝洙曰謝元暉詩散帙問所知注帙書衣也沈曰郭璞注衣書中蟲今人謂之璧魚定功曰璧魚白魚也俗傳璧魚入道經函中因蠧食神仙字身有五色人得而吞之可致神仙也王録事許修草堂貲不到聊小詰為嗔王録事不寄草堂貲昨屬愁春雨能㤀欲漏時其題可備口實其詩可删寄卭州崔録事卭州崔録事聞在果園坊久待無消息終朝有底忙應愁江樹逺怯見野亭荒浩蕩風塵外誰知酒熟香洙曰果園坊在成都過故斛斯校書莊二首公自注老儒艱難時病于庸蜀歎其歿役方授一官鶴曰即斛斯六乃草堂之鄰公所謂酒伴者此老云已歿鄰人嗟未休竟無宣室召徒有茂陵求極是恨意後來作者皆不簡及齊歩驟略近妻子寄他食園林非昔遊空餘繐帷在淅淅野風秋洙曰漢文帝召賈誼於宣室司馬相如病免家居茂陵武帝使所忠往取其書至則相如已死問其妻曰長卿未死時為一巻書言有使來求書奏之於是所忠奏焉天子異之其遺書言封禪事謝元暉詩茂陵將見求燕入非傍舍鷗歸秪故池斷橋無復板卧桞自生枝又悲於他作遂有山陽作多慚鮑叔知素交零落盡白首涙雙垂洙曰向秀與嵇康為竹林之游後經山陽嵇康之居作思舊賦鮑叔與管仲交管仲曰生我者父母知我者鮑叔劉孝標絶交論素交盡利交興立秋日雨院中有作廣徳三年秋成都府幕中作山雲行絶塞大火復西流飛雨動華屋蕭蕭梁棟秋窮途愧知已暮齒借前籌已費清晨謁那成長者謀解衣開北户髙枕對南樓樹濕風涼進江喧水氣浮禮寛心有適節爽病㣲瘳主將歸調鼎吾還訪舊邱洙曰張良願借前箸以籌之趙曰公謂晚年得預嚴府參謀也趙曰禮寛心有適謂嚴武待以禮數之寛病㣲瘳公素有肺病也洙曰主將謂嚴武也公相期武還朝秉政曰吾當遂歸計矣希曰舊秋指長安故居也附軍城早秋鄭國公嚴武作昨夜秋風入漢闗借漢以言唐也朔雲邊雪滿西山西山即雪山也謂其冬夏常積雪故也更催飛將追驕虜漢匈奴常號李廣為飛將軍驕虜指吐番也莫遣沙場匹馬還此戒之之辭也春秋公羊傳匹馬隻輪無反者奉和秋風嫋嫋動髙旌嫋奴烏切長弱貌九歌嫋嫋兮秋風玉帳分弓射虜營已収滴博雲間戌滴博屯雪之地名雲間以言其髙也更奪蓬婆雪外城蓬婆城名也按編年通載廣徳二年嚴武破吐蕃于當㣘城克塩州城吐蕃傳天寳二年已前王昱兵次蓬婆嶺院中晚晴懐西郭茅舍幕府秋風日夜清澹雲疎雨過髙城葉心朱實堪時落堪者不甚也階面青苔先自生復有樓臺銜暮景不勞鐘鼓報新晴浣花溪裏花饒笑肯信吾兼吏隠名趙曰汝南先賢傳鄭欽吏隱於蟻陂之陽夢弼曰晉山濤吏非吏隠非隠到村碧澗雖多雨秋沙先少泥蛟龍引子過荷芰逐花低老去參戎幕歸來散馬蹄稲梁須就列榛草即相迷蓄積思江漢頑疎惑町畦久有意出不不曉人事分爾我殆幕中有不合故暫酬知已分還入故林棲鄭曰先先見切洙曰曹子建詩俯身散馬蹄蒼舒曰莊子彼且為無町畦亦與之為無町畦宿府清秋幕府井梧寒魏明帝詩雙梧生空井詩家用井梧自此始矣獨宿江城蠟炬殘永夜角聲悲自語中天月色好誰看風塵荏苒音書絶闗塞蕭條行路難已忍伶俜十年事伶郎丁切俜普丁切失所貌甫遭亂奔走自廣徳二年逆數至天寳十四載凡十年矣彊移棲息一枝安甫時遇嚴武募為參謀時一枝之安也莊子逍遥逰篇鷦鷯巢於深林不過一枝遣悶奉呈嚴公二十韻白水魚竿客魚竿白比太公清秋鶴髪翁胡為來幕下秪合在舟中仕宦失志不能決絶如此黄巻真如律青袍也自公老妻憂坐痺㓜女問頭風平地專欹倒分曹失異同禮甘衰力就義沗上官通疇昔論詩早光輝仗鉞雄寛容存性拙翦拂念途窮露裛思藤架烟霏想桂叢信然龜觸網直作鳥窺籠不得志之語西嶺紆村北南江繞舍東竹皮寒舊翠椒實雨新紅浪簸船應坼杯乾甕即空藩籬生野徑斤斧任樵童束縳酬知已蹉跎效小忠周防期稍稍信憂纔之態可念太簡遂匆匆曉入朱扉啓昏歸畫角終不成尋别業未敢息微躬鳥鵲愁銀漢駑駘怕錦幪㑹希全物色時放倚梧桐即據髙梧而瞑但增桐字逈異上趙曰上官指嚴武公在幕府得闗通於官矣沬曰龜觸網用史記龜策傳神龜抵網而遭魚者得之鳥窺籠用潘岳秋興賦魚池籠鳥而有江湖山數之思師曰西嶺南江述浣花里之景也沬曰束縛者言性本疎散也大觀曰别業指草堂也夢弼曰物色謂形容之老公有望於嚴武俾得遂倚桐之適也送舍弟頻赴齊州三首岷嶺南蠻北徐闗東海西此行何日到送汝萬行啼絶域惟髙枕清風獨杖藜危時暫相見衰白意都迷趙曰徐闗齊地言弟自岷蜀起發而之齊耳風塵暗不開汝去幾時來兄弟分離苦形容老病催江通一柱觀日落望鄉臺客意長東北齊州安在哉鄭曰荆州有一柱觀吐人呼為木履觀洙曰成都有望鄉臺乃隋蜀王秀所創也諸姑今海畔兩弟亦山東去傍干戈覓來看道路通短衣防戰地匹馬逐秋風莫作俱流落長瞻碣石鴻鶴曰按公作范陽太守盧氏墓誌盧氏所出有適㑹稽賀撝㑹稽瀕於海也趙曰齊州近海則是山東矣洙曰趙武靈王好胡服士該知短衣洙云劉孝標廣絶交論附騏驥之旄端軼歸鴻于碣石注海之畔山也嚴鄭公堦下小松得霑字弱質豈自負移根方爾瞻細聲聞玉帳聞一作隠疎翠近珠簾未見紫烟集虚䝉清露霑何當一百文欹蓋擁髙簷嚴鄭公宅同詠竹得香字緑竹半舍籜新梢纔出墻色侵書帙晚隂過酒罇涼雨洗涓涓净風吹細細香伹令無翦伐㑹見拂雲長孫季昭示兒編云花竹亦有無香者世所共知櫻桃初無香退之云香隨翠籠擎初重則以香言之竹與枇杷本無香子美云風吹細細香枇杷樹樹香則皆以香稱之至于太白又以栁為有香其曰白門栁花滿店香是也若夫荆公梅詩有云少陵為爾添詩興可是無心賦海棠豈謂海棠無香而不賦乎奉觀嚴鄭公㕔事岷山沲江畫圖十韻得总字沲水臨中座岷山赴此堂白波吹粉璧青嶂插雕梁直訝杉松泠兼疑菱荇香雪雲虚㸃綴沙草得㣲茫嶺雁隨毫末川蜺飲練光霏紅洲蘂亂拂黛石蘿長暗谷非闗雨丹楓不為霜秋成𤣥圃外景物洞庭傍㑹事功殊絶幽襟興激昻從來謝太傅邱壑道難㤀夢弼曰禹貢岷山導江東别為沱寰宇記沱水在成都府新繁縣誠齋詩話云老杜山水圖云沱水臨中座岷山赴此堂白波吹粉壁青嶂挿雕梁此以畫為真也曾吉父云㫁崖韋偃樹小雨郭熙山此以真為畫也洙曰秋成一作秋城太傅謝安也安雖受朝廷寄東山之志始末不渝晩秋陪嚴鄭公摩訶池泛舟公自注池在府内蕭摩訶所開因是得名湍駃風醒酒船囘霧起隄髙城秋自落雜樹晩相迷座觸鴛鴦起巢傾翡翠低莫須驚白鷺為伴宿清溪鄭曰駛苦史切疾貌也趙曰清溪公指浣花溪爾陪鄭公秋晚北池臨眺鶴曰公在嚴武幕中自遺悶有作奉呈後如詠竹泛舟觀岷圖畫至北池臨眺眺皆分韻賦詩其靖分稠宻如此而史謂嚴武中頗銜之不知何所本而云北池雲水闊華館闢秋風獨鶴先依渚衰荷且映空采菱寒刺上踏藕野泥中素檝分曹往金盤小徑通萋萋露艸碧片片晚旗紅杯酒霑津吏衣裳與釣翁異方初豔菊故里亦髙桐揺落闗山思淹留戰伐功嚴城殊未掩清宴已知終何補参軍乏歡娱到薄躬本中曰何補参軍乏一作參軍事初冬垂老戎衣窄歸休寒色深漁舟上急水獵火著髙林日有習池醉愁來梁甫吟干戈未偃息出處遂何心鶴曰按是年十月嚴武攻吐蕃塩川城克之公在幕府故亦衣戎衣也趙曰日有習池醉謂陪嚴出也愁來梁甫吟吟以諸葛亮自比也正月三日歸溪上有作簡院内諸公野外堂依竹籬邊水向城蟻浮仍臘味謂酒也南都賦醪徑寸浮蟻若萍釋名酒有沉池浮蟻在上周庾信謝賜酒詩浮蟻對春開鷗泛已春聲南越志鷗水鳥也在漲海中隨潮上下三月風至乃去藥許鄰人劚公之不吝如此按集有天寒劚茯苓之句謂以鐡錐劚地而得之也書從稚子擎言文書多任稚子也白頭趨幕府深覺負平生公自嘆老而猶參嚴鄭公故人之幕府也敝廬遣興奉寄嚴公野水平橋路春沙映竹村風輕粉蝶喜花暖蜜蜂喧把酒宜深酌題詩好細論府中曕暇日江上憶詞源邀其過我語渉進退頗自負跡沗朝廷舊情依節制尊還思長者轍恐避席為門趙曰隋文藝云筆有餘力詞無竭源鶴曰曰嚴武時尹成都節制兩川洙曰陳平家負郭窮巷以席為門然門外多長者車轍趙曰公欲枉嚴公之駕故用陳平事以激之春日江村五首農務村村急春流岸岸深乾坤萬里眼時序百年心使人無復思致故不可及茅屋還堪賦桃源自可尋艱難昧生理飄泊到如今迢遞來三蜀蹉跎又六年客身逢故舊發興自林泉過懶從衣結頻遊任履穿藩籬頗無限恣意向江天趙曰蜀郡廣漢郡揵為郡為三蜀鶴曰公以乾元二年冬入蜀至是六年矣洙曰董衣威衣百結衣夢弼曰莊子衣敝履穿負也非憊也意本一作藩籬無限景恣買江天種竹交加翠栽桃爛熳紅經心石鏡月到面雪山風赤管隨王命銀章付老翁豈知牙齒落名玷薦賢中洙曰石鏡雪山皆在蜀中注見前漢官儀尚書令僕丞郎月結赤管大筆一雙公時為檢校尚書工部郎故云鶴曰公為工部員外郎賜緋魚袋考漢表銀章青綬注銀印背紐其文曰章謂刻曰某官之章唐雖無賜印者公謂銀章時指魚袋而言耳趙曰銀章方賜來故次篇有垂朱紱之句扶病垂朱紱歸休歩紫苔郊扉存晚計幕府媿羣材燕外晴絲巻鷗邊水葉開鄰家送魚鼈問我數能來洙曰紱古蔽膝也象冕服以韋為之希曰漢韋賢傳黻衣朱紱師古注也朱紱為朱裳畫為亞文也亞古弗字故因謂之紱又作黻羣盜哀王粲中年召賈生羣盜中年皆不必事實政是作者登樓初有作前席竟為榮宅入先賢傳才髙處士名異時懐二子春日復含情洙曰漢末王粲以西京擾亂之荆州嘗思歸作登樓賦故先賢傳載荆州有王粲宅漢文帝以賈誼為長沙王太傅歳餘思誼徴至宣室因問以鬼神事帝不覺前席曰我久不見賈生自以為過之今不及也絶句六首日出籬東水雲生舍南泥竹髙鳴翡翠沙僻舞鵾鷄夢弼曰翡翠羽雀翠青羽雀上林賦注鵾鷄黄白色長頸赤啄藹藹花蘂亂飛飛蜂蝶多幽棲身嬾動客至欲如何鑿井交㯶葉開渠斷竹根扁舟輕裊䌫小逕曲通村急雨捎溪竹斜暉轉樹腰隔巢黄鳥並飜藻白魚跳舍下筍穿壁庭中藤刺簷地晴絲冉冉江白草纎纎江動月移石溪虚雲傍花鳥棲知故道帆過宿誰家絶句四首堂西長笋别開門塹北行椒却背村宛曲有趣梅熟許同朱老喫松髙擬對阮生論公自注朱阮劒外相知趙曰成椒盖成行者欲作魚梁雲覆湍因驚四月雨聲寒青溪先有蛟龍窟竹石如山不敢安洙曰覆一作復去聲趙曰魚梁乃劈竹積石横截中流以取魚而溪下有蛟龍窟故未敢安也兩箇黄鸝鳴翠桞一行白鷺上青天牎含西嶺千秋雪門泊東吴萬里船此千秋萬里是甚氣㮣非茍也鶴洙曰西嶺即西山也冬夏常積雪曰公在浣花未嘗不繫舟也趙曰公之志毎欲南下今言所泊門外之船乃欲往東吴萬里之船也漫叟詩話云詩中有拙句不失為竒作若退之逸詩云偶上城南土骨堆共傾春酒兩三杯子美詩云兩箇黄鸝鳴翠桞一行白鷺上青天是也藥條藥甲潤青青色過棕亭入草亭苗滿空山慙取譽根居隙地怯成形陪李七司馬早江上觀造竹橋即日成往來之人免冬寒入水聊題短作簡李公鶴曰此詩當是公在蜀州作詳見後篇髙使自成都回題下句也伐木為橋結搆同褰裳不渉往來通天寒白鶴歸華表日落青龍見水中顧我老非題柱客知君才是濟川功合歡却笑千年事如此下合歡字誰曉頗疑其誤驅石何時到海東夢弼曰橋前二柱曰華表故以白鶴為言也青龍為喻橋影然朝野僉載河北道趙州有石橋甚工則天時黙啜破趙州至石橋馬跪地不進但見青龍卧橋上奮迅而恕乃遁去洙曰成都有昇遷橋相如初西去題其柱曰不乗駟馬車不復過此橋書若濟巨川用汝作舟楫趙曰言與賓客落橋之成而歡飲因笑往事之勞徒驅石下海也洙曰秦始皇作石橋欲過海看石出處有神人能驅石下海石去不速神輒鞭之石皆流血觀作橋成月夜舟中有述還呈李司馬把燭橋成夜迴舟客坐時天髙雲去盡江逈月來遲衰謝多扶病招邀屢有期異方乗此興樂罷不無悲李司馬橋了承髙使君自成都囘鶴曰時髙適守蜀州而攝成都故云自成都囘按九域志成都在蜀州之東故詩中云橋東待使君又知公是詩在蜀州作也向來江上手紛紛三日成功事出羣已傳童子騎青竹揔擬橋東待使君洙曰後漢郭汲為并州牧始至行部有童兒數百騎竹馬道次迎拜江上值水如海勢聊短述為人性僻躭佳句語不驚人死不休老去詩篇渾漫與春來花鳥莫深愁新添水檻供垂釣故著浮槎替入舟焉得詩如陶謝手陶淵明謝靈運令渠述作與同遊寄杜位公自述位京中有宅近西曲江詩尾有述近聞寛法離新州想見歸懐尚百憂逐客雖皆萬里去悲君也是十年流干戈況復塵隨眼鬢髪還應雪滿頭玉壘題書心緒亂何時更得曲江遊夢弼曰新州属廣南道公之侄杜位貶新州時朝廷寛其罪移之於近郡按集有杜位宅守嵗詩當是明年位即被謫放云已是十年流也洙曰玉壘濁之坊名趙曰玉壘在濁州青城縣公時自城都過青城因寄此詩夢弼曰曲江在長安為勝遊之地杜位有宅青焉題桃樹小徑升堂舊不斜五株桃樹亦從遮髙秋總餽貧人食來歳還舒滿眼花簾户毎宜通乳鷰兒童莫信打慈鴉寡妻羣盜非今日天下車書正一家舍弟占歸草堂檢校聊示此詩久客應我道猶云我道盖是相隨獨爾來孰知江路近頻為草堂迴鵝鴨宜長數紫荆莫浪開省事語東林竹影薄臘月更須栽暮登西安寺鐘樓寄裴十迪暮倚髙樓對雪峰僧來無語自鳴鐘孤城反照紅將歛返照夕陽也近市浮烟翠且重多病獨愁常闃寂闃古臭切闃僻静也易窺其户闃其無人注闃寂也故人相見未從容從容欵曲也知君苦思縁詩瘦思去聲太白交遊萬事慵李白有戲贈甫詩借問年來何瘦生只為從前作詩苦觀李固請司馬弟三水圖三首簡易髙人意匡牀竹火爐寒天留逺客碧海掛新圖雖對連山好貪看絶島孤羣仙不愁思有味外味冉冉下蓬壺夢弼曰淮南子匡牀弱席非不寧許慎注匡安也方丈渾連水天台總映雲人間長見畫老去恨空聞自傷足力之不繼也上句亦足媿人之不能往也范蠡舟偏小王喬鶴不羣此生隨萬物何處出塵氛夢弼曰孫綽天台賦渉海則有方丈蓬萊登陸則有四明天台皆古聖之所由化神仙之所窟宅洙曰范蠡為越破吴功成名遂乃乗扁舟泛江湖變姓名適齊為鴟夷子趙曰其國必畫舟與鶴故以范蠡王喬比之王喬鶴事注見前髙浪垂飜屋崩崖欲壓牀野橋分子細沙岸繞㣲茫紅浸珊瑚短青懸薜荔長浮查並坐得仙老暫相將總是好語有夢弼曰王子年拾遺記堯時巨有查浮於西海查上光若星月查浮四海十二年一周天名曰貫月查又曰挂星查羽仙棲息棲上散愁二首久客宜懸斾興王未息戈蜀星隂見少江雨夜聞多百萬傳深入寰區望匪他司徒下燕趙収取舊山河望李光弼之深光弼為檢校司徒追収河北寳應元年進封臨淮王聞道并州鎮尚書訓士齊并州太原也乾元中李光弼徙河陽王思禮代為河東節度是是時兵部尚書其後加司空則八哀詩以稱之以司空王公是也上元二年思禮以薨幾時通薊北謂平定史之亂也當日報闗西謂長安以西也戀闕丹心破霑衣皓首啼老魂招不得歸路恐長迷屈原有招魂篇至後冬至至後日初長逺在劒南思洛陽青袍白馬有何意金谷銅駞非故鄉梅花欲開自不覺棣蕚一别永相望語極有興愁極本憑詩遣興詩成吟詠轉淒涼夢弼曰金谷園銅駝陌豈非洛陽故鄉行樂之勝境乎劉禹錫楊栁詞云金谷園中鸎亂飛銅駝陌上好風吹是也撥悶一作贈嚴二作别駕聞道雲安麴米春纔傾一盞即醺人乗舟取醉非難事下峽銷愁定幾巡長年三老遙憐汝捩柂開頭捷有神已辦青錢防顧直當令美味入吾脣夢弼曰雲安縣屬䕫州今為雲安軍東坡志林退之詩曰百年未滿不得死且可勤買抛青春國史補云酒有郢之富水烏程之若不滎陽之士窟春富平之石凍春劒南之燒春杜子美亦云聞道雲安麴米春才傾一盞酒醺人裴硎作傳竒記裴航事亦有酒名松醪春乃知唐人名酒多以春則抛青春亦必酒名也趙曰東坡詩麴米春香並舍間盖出于此長年三老川中呼舟師之名夢弼曰峽中以蒿師為長年拖工三老今俗謂之翁洙曰開頭一作鳴鐘皆行船貌初行船曰開頭鄭曰捩練結切抝捩也趙曰川人不以凖折一色見錢為青錢登髙風急天髙猿嘯哀王洙曰宋玉云天髙而氣清潘安仁勁風凄急渚清沙白鳥飛迴無邊落木蕭蕭下洙曰江賦尋之無邊楚詞洞庭波兮木葉下又風颯颯兮木蕭蕭不盡長江衮衮來洙曰謂不舍晝夜故云不盡萬里悲秋常作客洙曰宋玉悲秋百年多病獨登臺洙曰相如多病卧於茂陵艱難苦恨繁霜鬢潦到新亭濁酒盃洙曰嵇康曰酒一杯潦倒麄味九日廣徳元年秋閬州作鶴曰是鶴曰是年秋公自梓暫往閬州冬復至梓州去年登髙郪縣北今日重在涪江濱苦遭白髪不相放羞見黄花無數新世亂鬱鬰久為客路艱悠悠常傍人酒闌却憶十年事腸㫁驪山清路塵鶴曰郪縣厲梓州涪江水東南合梓州之射江孫曰驪山指舊日明皇遊幸也秋盡鶴曰是年秋公自梓州歸成都迎家冬再往梓州秋盡冬行且未迴茅齋寄在小城隈籬邊老却陶潛菊江上徒逢袁紹杯雪嶺獨看西日落劒門猶阻北人來不思萬里長為客懷抱何時獨好看鶴曰成都大城西有小城洙曰典畧云劉松袁紹在河朔於三伏之際酬飲避暑號為河朔飲野望西山白雪三城戍南浦清江萬里橋海内風塵諸弟隔天涯涕淚一身遥唯將遲暮供多病未有涓埃答聖朝跨馬出郊時極目不堪人事日蕭條洙曰按髙適傳上皇還京復分劒南為兩節度百姓弊於調度而西山三城列戍適上疏論之不納趙曰成都萬里橋公草堂在其西老病老病巫山裏稽留楚客中藥殘他日褁花發去年叢夜足霑沙雨春多逆水風合分雙賜筆猶作一飄蓬趙曰漢官儀尚書令漢丞郎月給赤管大筆一雙公嘗為尚書工部郎故云九家集注杜詩巻二十六
