body:
  text: 九家集注杜詩卷四宋郭知達編古詩瘦馬行趙云良馬有可任之德以瘦而不能自奮賢士有可用之材以困而不能自拔馬之瘦惟其養之而已士之困惟其薦之而已落句云誰家且養願終惠更試明年春草長一篇大意可見蔡伯世云公出為華州司功以事之東都有此詩或曰此詩似言房琯之斥逐又曰特公以自比皆謂不然蓋謂誰家惠養則無所指明之義若以房琯言之則惠養之者必天子也不應謂之誰家若以公言之則惠養之者必貴人也公時因謫有所望於顧拔之者則猶有可言馬其所喻不廣故直以為公因感瘦馬而託意於賢士之困惟其所薦之則其説廣東郊瘦馬使我傷骨骼音格一作骸硉力骨反兀如堵墻郭璞江賦巨石硉矻以前却禮觀者如堵墻堵趙云郭璞於江賦以言石公以言馬謂其瘦也如墻亦以言瘦絆之欲動轉欹側此豈有意仍騰驤東京賦六玄蚪之奕奕齊騰驤之沛艾西京賦仍奮趐而騰驤細看六印帶官字唐令諸掌牧馬以小官印印右膊以年辰印印右脾以監名依左右廂印印尾側至二歲起眷量強弱漸以飛字印左廂髀膊細馬俱以龍形印印項左官馬賜人者以賜字印配諸軍及充傳送驛者以出字印並印右頰衆道三軍遺路傍皮乾剝落雜泥滓雜卦剝爛也物熟則剝落也毛暗蕭條連雪霜去歲奔波逐餘冦驊騮不慣不得將趙云驊騮正以指言瘦馬蓋太平之久如驊騮輩止以遊乘非慣戰之物也既以其不慣宜有一蹶之失則有不得將之理矣士卒多騎內廄馬惆悵恐是病乘黃乘黃署後漢太僕有未央廄令魏改為乘黃廄乘黃古之神馬因以名為乘黃亦名飛黃背有角日行萬里淮南子云天下有道飛黃伏皂一云神黃獸名龍翼馬身黃帝乘而得仙趙云乘黃古之神馬魏嘗以名廄今云內廄馬故言恐是病乘黃也公以瘦馬喻賢才既以之為驊騮又以為乘黃宜矣當時歷塊誤一蹶委棄非汝能周防王褒聖主得賢臣頌過都越國蹶如歷塊見人慘淡若哀訴失主錯莫無晶光天寒逺放鴈為伴一作侣日暮不一作未收一作衣烏啄瘡誰家且養願終惠顔延年赭白馬賦願終惠養蔭本枝兮更試明年春草長送率府程録事還鄉程携酒饌相就取别鄙夫行衰謝鄙賤也自稱故曰鄙夫趙云論語鄙夫問於我抱病昏妄集常時往還人記一不識十程侯晚相遇與語才傑立徐稚角立傑出薰然耳目開趙云莊子薰然慈仁謂之君子頗覺聰明入千載得鮑叔末契有所及管仲與鮑叔為友意鍾一作中老柏青義動修蛇蟄易能蛇之墊若人可數見謝靈運平生疑若人通蔽互相妨新添語君子哉若人尚德哉若人慰我垂白泣謝靈運戚戚感物態星星白髮垂哀趙云杜欽傳紀陽侯與欽子業書曰誠老姊垂白注師古曰垂白者言白髮下垂也生别無淹晷百憂復相襲見第一卷登慈恩寺塔注內愧突不黔文子曰墨子無黔突孔子無暖席揚雄曰孔席不暖墨突不黔臣炎切庶羞一云明似以賙給素絲潔長魚碧酒隨玉粒薛云右按歷城北有使君林魏正始中鄭公慤三伏之際率賔僚避暑於此取大蓮葉盛酒以簪刺葉令與大柄通屈莖輪囷如象鼻傳吸之名碧筒酒以蓮莖得名此言碧酒乃酒之色非碧筒也酒譜曰安期先生與神女會於圜邱酣玄碧之酒途窮見交態阮籍詩途窮能無慟鄭當時一貧一富乃知交態世梗悲路澀潘正叔詩世故尚未夷崤函方險澀東風吹春水泱莽后土濕謝玄暉晨光復泱莽月令東風解凍魚上冰宋玉九辨皇天淫溢而秋霖兮后土何時乎得乾泱漭淡濘也念君惜羽翮既飽更思戢莫作翻雲鶻聞呼向禽急趙云昔人言鷹曰飢則附人飽則飛去今云惜羽翮則飽而不復飛往也末句則又戒之以莫聞人之所呼而急於向禽又以終其惜羽翮之義晦日尋崔戢李封趙云此篇初假蓋敘事耳下假因物感懷而終付之於酒以自遣也當春有事乎田疇之際而甲兵不休憂國念君不能無慨乎中矣朝光入甕牖梁王臺卿詩朝光正晃朗過秦論甕牖繩樞之子孟康曰以瓦甕為窗趙云禮記孔子曰儒有蓬户甕牖尸一作方寢驚弊裘論語鄉黨曰寢不尸包曰偃卧四體布展手足似死人起行視天宇陶淵時昭昭天宇濶春氣漸和柔興來一云得興不暇懶今晨梳我頭出門無所待徒一作徙步覺自由杖藜復恣意趙云莊子載原憲杖藜應門免值公與侯晚定崔李交會心真罕儔薛夢符云世説晉簡文幸華林園謂左右曰會心處不在逺翛然林水便有濠梁之趣杜補遺蓋言與崔李定交相會以心不以迹也古樂府後周徐謙短歌云意氣青雲裏爽朗煙霞外不重一囊錢唯重心襟會此乃會心之處每過得酒傾一作喫二宅可淹留喜結仁里歡語里仁為美仁趙云楚詞云其何可以淹留張平子思玄賦云匪里其焉宅魏文帝燕歌行何為淹留寄他方况因令節求李生園欲荒舊一作有竹頗修修引客看掃除隨時成獻酬崔候初筵色詩賔之初筵己畏空樽愁孔融曰坐上客常滿樽中酒不空未知天下士至性有此不一至作志草芽既青出蜂聲亦暖遊思見農器陳農器耒耜之類何當甲兵休上古葛天氏不貽黃屋憂屋一作綺上林賦聽葛天氏之歌范蔚宗黃屋非堯心師古曰黃屋車上之蓋也皆天子之儀至令阮籍等熟醉為身謀顔延年詠阮步兵詩阮公雖淪迹識密鑒亦洞沈醉似醒然寓辭類託諷籍本有濟世志屬魏晉之際天下多故名士少有全者籍由是不與世事遂酣飲為常文帝求婚於籍醉六十日不得言而止鍾會數以時事問之因其可否而致之罪以酣醉獲免葛趙云葛天氏氏一作民不貽黃屋憂一作綺言自古天氏則當繼之以不貽黃綺憂言不貽黃屋憂則當引之以自古葛天民不貽黃屋憂為正蓋言葛天氏之民相忘其君而弗念所以阮籍輩自藏於酒亦特為身謀而忘其君耳言此者公方以憂國念君之心而無可奈何則亦姑遣之耳威鳯髙其翔一云自髙翔時天下大亂賢者退處若威鳯然髙其翔而不下全身逺害也宣帝紀威鳯為寶服虔曰威鳯謂鳥名也晉灼曰鳯之有威儀者也與尚書鳯凰來儀宋玉九辨鳯愈翺翔而髙舉楚詞云獨不見夫鸞鳯之髙翔長鯨吞九舟謂盜賊縱橫如長鯨之吞并九航州也長鯨鯨魚也文選長鯨吞地軸為之翻海賦又似地軸拔而爭回百川皆亂流當歌欲一放淚下恐莫收濁醪有妙理庶用慰沉浮橫趙云賢者逺引巨盜興天下遙動紀綱不振如此雖有憂國念君之心其將孰救哉故雖痛哭流涕猶為無補則亦一付之於酒以自遣可也當危亂之世一沉一浮實所未知非付之於酒豈能慰乎雨過蘇端端置酒雞明風雨交鄭國風風雨凄凄難鳴喈喈也趙云言天欲明而有風雨交會久旱雨亦好杖藜見前篇注入春泥無食起我早趙云莊子吾無糧我無食諸家憶所歷一飰一作飽迹便掃言交態之薄也蘇侯得數過歡喜每傾倒也復可憐人呼兒具梨棗濁醪必在眼盡醉攄懷抱紅稠屋角花碧委墻隅草親賔絶談謔喧閙慰衰老况蒙霈澤垂糧粒或自保妻孥隔軍壘撥棄不擬道趙云天雨霈澤必成豐年可保糧粒矣阮籍詠懷云一身不自保何况戀妻子今於糧粒或自保之下言妻子隔軍壘亦使此矣撥棄不擬道亦自淵明撥置且莫念之變也魏文帝雜詩云棄置勿復陳曹子建詩去去莫復道喜晴一云喜雨皇天久不雨春秋書不雨既雨晴亦佳出郭眺四郊肅肅春增華青熒陵陂麥西都賦琳野青熒校獵賦眩曜青熒莊子外物篇青青之麥生於陵陂窈窕桃李一作杏花曹子建容華若桃李詩窈窕淑女幽間也桃之夭夭灼灼其華何彼穠矣華如桃李阮籍夭夭桃李花春夏各有實我飢豈無涯趙云言飢豈浩蕩無涯際乎蓋有不飢之時矣干戈雖橫放慘淡鬬龍蛇甘澤不猶愈且耕今未賖丈夫則帶甲婦女終在家力難及黍稷得種菜與麻千載啇山芝前漢王貢兩龔傳漢興周公綺里季夏黃公甪里先生此四人者當秦之世避而入商雒深山以侍天下之定也迤杜補遺皇甫謐髙士傳四皓歌曰莫莫髙髙深谷逶山有紫芝可以療飢唐虞世逺吾將何歸駟馬髙蓋其憂甚大冨貴之畏人兮不如貧賤之肆志乃共之商洛隱地肺山秦滅漢髙帝徴之不至深入終南山不能屈也往者東門瓜蕭何傳邵平者乃故秦東陵候秦破為布衣貧種瓜長安城東瓜美故世謂東陵瓜從邵平始也阮籍詩昔聞東陵瓜近在青門外其人骨已朽朽一作滅史記曰老子曰子所言者其人與骨皆朽也此道誰疵瑕左傳不汝疵瑕英賢遇轗軻古詩坎軻長苦辛楚詞轗軻不遇坎與轗同逺引蟠泥沙賈誼傳鳯漂漂而髙逝固自引而逺去揚子龍蟠於泥顧慙昧所適回首白日斜賈誼庚子日斜漢隂有鹿門後漢逸人傳漢陰老父桓帝幸竟陵過雲夢臨沔水百姓莫不觀者老父獨耕不輟又龎公襄陽人也居峴山之南未嘗入城府後携其妻子登鹿門因採藥不反襄陽記鹿門山舊名蘇嶺山滄海有靈查因話録漢書載張騫窮河源言其奉使之逺實無天河之説雅張茂先博物志説近世有人居海上每年八月見槎來不違時齎一年糧乘之到天河見婦人織丈夫飲牛遣問嚴君平云某年某月日客星犯斗牛即此人也後人相傳云得織女支機石持以問君平都是虛慿河之説今成都嚴真觀有一石呼為支機石云當時君平留之寶歷中余下第還家於京師途中逄官差遞夫舁張騫槎先在東都禁中今準詔索有司取進不知是何物也前輩詩往往有云用張君槎者相襲訛謬矣縱出雜詩亦不足據也趙既云千載商山芝往者東門瓜又漢陰有鹿門滄海有靈查語迹似重疊而意不同前兩句以為比擬之事後兩句實欲效之也蓋方甲兵危亂之世英賢當逺引以避如商山之四皓則以採芝為事如東門之邵平則以種瓜為事是皆避秦之亂其道為不可貶也顧慙昧所適回首白日斜則公於此欲逺引以昧所適為慙將畏其遲暮矣然所適有二柄漢陰之鹿門可以居山而隱滄海之靈查可以浮海而去不特咄嗟惋憤而已焉能學衆口咄咄空一作同咨嗟世説殷浩被廢在長安終日常書空作字揚州吏人尋議之竊視唯作咄咄怪事范雲至殿門不得入但云咄咄而巳蘇端薛復筵簡薛華醉歌文章有神交有道有神見首篇下筆如有神注孟子曰交鄰國有道乎端復得之名譽早愛客滿堂盡豪傑趙云謝靈運擬王粲詩曰愛客不告疲開筵上日一作月思芳草趙云書曰正月上日孔安國注曰上日朔日也故玉燭寶典以正月一日為上日安得健步移逺梅亂插繁花向青昊千里猶殘舊氷雪百壺且試開懷抱趙云詩清酒百壺莊子云肌膚若氷雪選有歡娛寫懷抱垂老惡聞戰鼓悲急觴為緩憂心搗小辨我心憂傷惄焉如搗心疾也趙云謝靈運擬王粲詩云急觴蕩幽默少年努力縱談笑樂府少年不努力老大徒傷悲趙云吳越春秋越人之歌曰行行且努力看我形容已枯稿漁父篇顔色憔悴形容枯稿近來薛華善醉歌歌辭自作風格老元趙云世説李禮風格秀整近來海內為長句汝與山東李白好何劉沈謝力未工梁書何遜八歲能賦詩一文一詠范雲輒嗟賞沈約亦愛其文遜文章與劉孝綽並見重於世世謂之何劉世祖著篇論之云詩多而能者沈約少而能者謝眺何遜又劉孝綽七歲能屬文每作一篇朝成暮遍好事咸誦諷傳寫流聞絶域又沈約傳謝玄暉善為詩任彥升工於文章約兼而有之然不過也才兼鮑昭愁絶倒鮑昭字明逺隱杜補遺宋景公筆録曰今人多誤鮑照為鮑昭李商詩有肥烹鮑照葵之句昔金陵人後地中石刻作鮑照蓋武后名照唐人讀照為昭爾衛玠談道平子絶倒諸生頗盡新知樂萬事終傷不自保少司命云樂莫樂兮新相知空趙云梁栁惲江南曲云不道新知樂言行路難又沈約秋夜詩云新知樂如是久要詎相聞也阮籍詠懷詩云一身不自保何况戀妻子嘗論此篇含蓄意思尤在兩句蓋自座中薛華善醉歌至才兼鮑昭愁絶之可倒言文章有神也此兩句言交有道也世人不知惟舊求而樂乎新知然臨利害處患難則也我亦不能自保其可託矣此為可傷氣酣日落西風來願吹野水添金杯如澠之酒常快意左傳有酒如澠亦知窮愁安在哉忽憶雨時秋井塌古人白骨生青苔如何不飲令心哀詠趙云虞卿因窮愁而著書阮籍哉懷詩云簫管有遺音梁王安在病後遇王倚飲贈歌麟角鳯觜世莫識煎膠續絃竒自見薛云古按東方朔十洲記仙家煮鳯喙麟角合煎作膠名之續絃膠一名連金泥此物能連屬弓弩斷絃及斷折之金以膠連使力折擊他處乃斷續處不復斷也矣趙云公美王生之有用於世當然而公自以老故已而無羡也杜牧之杜詩韓筆愁來讀似倩麻姑癢處抓天外鳯凰誰得髓無人解合續絃膠此以言杜詩韓文不可斷也尚看王生抱此懷在於甫也何由羡且遇王生慰疇昔素知賤子甘貧賤酷見凍餒不足恥論語在陳絶糧孟子無凍餒之老者多病沉年苦無健王生怪我顔色惡答云伏枕艱難遍瘧癘三秋孰可忍寒熱百日相交戰頭白眼暗坐有胝肉黃皮皺命如線賤趙云此敘問答之本意蓋王既素知我之甘貧則深見我之無食雖如在陳絶糧為不足恥不恥於無食則在貧賤而容貌不枯矣然以多病淹久之故而經年不健則王生疑怪而問其顔色惡矣禹手胼足胝惟生哀我未平復為我力致美肴膳遣人向市賖香粳喚婦出房親自饌長安冬葅酸且緑金城土酥靜如練兼求富豪富豪一本作畜豕且割鮮西都賦割鮮野食蜜沽斗酒諧終宴分趙云前漢地理志云秦地於天官東井輿鬼之西有金城武威蓋今蘭州也秦有駝金城自能為酥其名土酥為不足怪今南中傳杜陵句解者李歜之所為也以土酥為來服但不引所出且曰老杜方旅貧中豈有真酥而食其所食者來服耳故以對前句冬葅其説非是嘗聞小説載胡人入吾地者見萵苣云此狼芽菜也安可食後却見來服乃曰怪其食狼牙菜元有地酥而解如此則來服名地蘇耳而歜誤為土酥乎然歜不詳味上句乃王倚為致美肴饌也身在秦州而長安之冬葅金城之土酥且求畜豕割鮮焉非肴饌之美而何故人情味晚無似令我手腳輕欲漩辭變切老馬為駒揔不虛詩角弓老馬反為駒不顧其後注己老矣而孩童慢之箋云此喻幽王見人反悔慢之遇之如幼稚不自顧念役至年老人之遇己亦將然也當時得意况深眷但使殘年飽喫飯只顧無事長相見趙云列子載智叟所云有殘年餘力之語奉先劉少府新畫山水障歌趙云此詩篇中使字云不合云怪底云得非云無乃云似聞云乃是皆以形容其所畫景物之逼真也云玄圃云瀟湘云天姥乃取仙山及人間竒境稱比之也堂上不合生楓樹怪底江山起煙霧聞君掃却赤縣圖乘興遣畫滄洲趣史記孟子傳中國名曰赤縣神州謝玄暉既歡懷祿情復協滄州趣趙云史記中國名曰赤縣神州言比幽逺之地明顯靈異也後世京邑屬縣有赤有畿其浩穰者為赤奉先乃今之蒲城縣也縣東有蒲城西魏亦以為名劉少府善畫為奉先之景物猶未曠逺故杜云聞其掃赤縣圖乘興遣劉公更作滄州之幽趣矣何以知其初為奉先景物圖以公橋陵詩云居然赤縣立此篇下文有云乃是蒲城鬼神入則所謂赤縣正指奉先明矣畫師亦無數好手不可遇對此融心神知君重毫素滄趙云蓋公之意言既遇劉公遣畫州趣矣劉公對此圖而心神融釋無他劉公之心亦自重其毫素而樂為之也融乃列子骨肉都融之義左太沖招隱詩前有寒泉井聊可融心神文賦云為毫素之所擬注毫筆也書縑曰素而吾君詠有曰向秀甘淡薄深心託毫素豈但祁嶽與鄭虔祁嶽鄭虔當時善畫者筆迹逺過楊契丹得非縣圃裂離騷朝發軔于蒼梧夕來至乎縣圃圃在崑崙山所以圃有仙人居焉山海經曰閬風之山上倍之是謂縣無乃瀟湘翻王徴君詩窈藹瀟湘空悄然坐我瀟湘下耳邊已似聞清猿天姥山名也謝靈運登海嶠詩哀猿響南蠻又暝投剡中宿明登天姥岑杜補遺吳越郡國志天姥山與括蒼山相連石壁上有字髙不可識春月則聞簫鼓善笳吹之聲也趙云祁嶽鄭虔楊契丹三人皆士人之畫山水者契音結姥音莫五切皆言所畫山水者此趣也葛仙公傳云崑崙一曰縣圃一曰積石瑶房一曰間風臺一曰華蓋天柱皆仙人所居也反思前夜風雨急乃是蒲城鬼神入元氣淋漓障猶濕真宰上訴天應泣趙云可謂佳句之雄拔者本朝錢希白洞微志云無雲而雨謂之天泣野亭春還雜花逺􅉌希範書雜花生樹漁翁暝踏孤舟立滄浪水深青溟濶欹岸側島秋毫末孟子云明足以察秋毫之末不見湘妃鼓瑟時至今斑竹臨江活帝之二女啼以涕揮竹畫班薛云楚詞逺遊使湘靈鼓瑟兮令海若舞馮夷趙云以狀所畫之竹言湘妃逺矣不親見其鼓瑟時但餘斑竹在耳張華博物志舜之二妃淚下染竹即斑妃死為湘水神故曰湘妃竹劉侯天機精莊子嗜欲深者其天機淺愛畫入骨髓自有兩兒郎揮灑亦莫比大兒聰明到能添老樹巔崖裏小兒心孔開貌得山僧及童子孔趙云禰衡有大兒文舉小兒楊德祖若耶溪雲門寺吾獨胡為在泥滓青鞋布襪從此始居杜補遺南史何胤字子季隱不仕會稽山多靈異往遊焉居若耶山雲門寺初胤二兄求點並棲遁逮胤又隱焉世號點為小山胤為大山亦曰步山兄弟又云大隱小隱湖城東遇孟雲卿復歸劉皓宅宿宴飲散因為醉歌疾風吹塵暗河縣楊給事誄軼我河縣俘我洛畿自趙云長門賦天漂而疾風鮑照出薊北門行有曰庭風衝塞起沙礫自飄揚湖城濵河故為河縣行子隔手不相見湖城城南一開眼駐馬偶失雲卿面趙云管子道塗揚塵十步不相見識面字與李雍求識面出處同後漢應奉傳注造車匠於門內出半面視奉後奉於路見車匠識而呼之北齊張耀守門云領火至識面方開况非劉皓為地主懶回鞭轡成髙宴趙云越女越王以會稽三百里為范蠡地曰皇天后土四鄰地主正之言地之鬼神也左傳地主致餼言人為地之主也吳書孫敻傳為江夏稱太守有施主之劉侯歎我携客來置守張燈促華饌且將欵曲終今夕休語艱難尚酣戰魯趙云淮南子曰陽公與韓戰戰酣日暮援戈而麾之日為之反三舍照室紅爐促曙光熒窗素月埀文練天開地裂長安陌寒盡春生洛陽殿時盜賊充斥而肅宗理兵議收復也連趙云上句言其事下句言其時句法使謝惠與栁惲相答云日映昆明水春生鳷鵲棲豈知驅車復同軌書同文車同軌可惜刻漏隨更箭陸佐公新漏刻銘云銅史司刻金徒抱箭趙云言孟雲卿同在湖城時借用車同軌字人生會合不可常庭樹雞鳴淚如線趙云古詩云雞鳴髙樹顛曹子建詩庭樹微銷落淚如線言不絶也蓋欲斷復續之貌張正見逺期詩空聞淚如霰江文通雜體詩握手淚如霰閺鄉薑七少府設鱠戲贈長歌閺音文薑侯設鱠當嚴冬昨日今日皆天風云趙云韓詩外傳昨日何生今日何成漢髙皇后八年太尉入未央宫擊吕産走天風大起河凍來魚不易得一作黃河美漁鑿氷恐侵河伯宫饔人受魚鮫人手周禮天官內饔饔和也熟食曰饔割烹煎和之稱潘安仁西征賦饔人縷切鑾刀若飛人趙云左傳公膳日雙雞饔人竊更之以鶩海上有鮫泣則成珠居於水中今公言河凍而漁人未可以漁則饔人之所受者乃鮫人授之所以深言魚之難得而珍重之也洗魚磨刀魚眼紅無聲細下飛碎一作素雪有骨已刴觜春蔥七啓云纍如疊榖離若𣪚雪輕隨風飛創不轉切又鱠西海之飛鱗七命云范公之鱗出自九溪頳尾丹腮紫翼青鬐命支離飛霜鍔紅肌綺散素膚雪落觜平聲偏勸腹膄愧年少軟炊香飰一作􅀈緣老翁薛云按禮記冬右腴鄭氏曰腴腹下也前漢書九州膏腴顔師古曰腹之下肥曰腴腹杜補遺少儀曰羞濡魚者進尾冬右腴夏右鰭注腴下也廣韻曰腴腹下肥維摩經曰維摩詰從香積如來所取滿鉢香飯普薰毗耶城梁劉少威謝東宮賜聖僧餘饌啓曰齊桓柏寢之器周穆軒宮之寶乳麋香飯素捺糗漿莫不氣馥上天薰流下界落砧何曽白紙濕放筋未覺金盤空新歡便飽薑侯德詩既醉以酒既飽以德清觴異味情屢極東歸貪路一作貧路自覺難欲别上馬身無力可憐為人好心事於我見子真顔色不恨我衰子貴時悵望且為今相憶觴趙云陳周𢎞讓答王褒書有云南風雅操清妙曲在傳云必嘗異味好心事如言好心腸也戲贈閺鄉秦少翁短歌鮑云唐志閺鄉屬陜郡去年行宫當太白鮑云謂肅宗駐鳯翔也唐志鳯翔郿縣有太白山朝回君是同舍客直不疑為同舍郎疑盜金同心易曰同心之言不減骨肉親每語見許文章伯唐文三變王揚為之伯魏趙云王充論衡超竒篇有云文辭之伯而陳琳與吳張宏書云此間率少於文章易為雄伯今日時清兩京道相逢苦覺人情好昨夜邀歡樂更無多才依舊能潦倒稽康書知吾潦倒粗踈不切事情趙云北史崔贍傳云自天保以後重吏事謂容止藴籍者為潦倒而贍終不改焉故公詩於潦倒謂之能也李鄠縣丈人胡馬行丈人駿馬名胡騮前年避胡過金牛金牛地名回鞭却走見天子朝飲漢水暮靈州漢水漢江水也在楚地方城靈州靈武郡唐理回紇縣秦始皇屬北地郡子趙云肅宗即位靈武故回鞭見天則自漢氷而來靈州自矜胡騮竒絶代乘出千人萬人愛一聞説盡急難材劉趙云急難材如備之的顱一躍三丈過檀溪以免劉表之追劉牢之馬跳五丈澗以脫慕容垂之逼也轉益愁向駑駘輩頭上鋭耳批秋竹腳下髙蹄削寒玉黃伯仁龍馬頌曰耳如剡筒目象明星始知神龍别有種不比俗馬空多肉洛陽大道時再清復趙云巳收東京矣纍日喜得俱東行鳯臆龍鬐一作麟未易識側身注目長風生曰趙云皆馬之竒相如劉琬馬賦吾有駿馬名曰騏雄龍頭鳥目麟腹虎胸送長孫九侍御赴武威判官駿馬新鑿蹄銀鞍被來好徐敬業汗馬躍銀鞍明趙云漢桓典為御史號嚴人畏憚之每乘􅍡馬當時為之語曰行行且止避􅍡馬御史今送長孫侍御故得以驄馬為言銀鞍字多矣如辛延年羽林郎詩曰銀鞍何焴爚翠蓋空癡蹰江文通别賦龍馬銀鞍朱軒繡軸繡衣黃白郎漢侍御史有繡衣直指持斧捕盜史趙云王禁字翁儒武帝時為繡衣侍御逐捕羣盜騎向交河道漢侯應上書車師前國王治交河城河水分流繞城下故號交河唐安西去交河郡七百里問君適萬里取别何草草天子憂涼州嚴程須到早去秋羣胡反不得無電掃風激電掃此行救遺氓風俗方再造唐書王室再造族父領元戎元戎帥也名聲國中老奪我同官良飄颻按城堡使我不能餐令我惡懷抱公趙云羣胡反指吐蕃也前詩多以胡言安慶緒史思明今此接於涼州之下則非言安史也後漢閻忠説皇甫嵩曰旬月之間神兵電掃范曄於吳漢贊云電掃羣孽蔡琰詩云飢當食兮不能飱若人才思濶若人美長孫侍御也見上送程録事還鄉注溟漲浸絶島樽前失詩流塞上得一作多國寶云趙云班固賦者古詩之流史云有臣如此國之寶也皇天悲送逺雲雨白浩浩九辨皇天平分四時兮竊獨悲此凜秋悲秋若在逺行登山臨水兮送將歸白趙云言上天亦悲人之逺去所以雲雨愁態浩浩然也東郊尚烽火朝野色枯稿東趙云東郊指言史思明蓋京雖復而洛陽之東猶用兵也楚辭漁父篇屈原顔色枯稿西極柱亦傾如何正穹昊列子湯問篇折天柱又云帝怒流於西極梁趙云西極傾指言吐畨侵廓岷霸等州其勢方熾也園帝阿育王像碑曰璇璣玉衡穹昊所以紀物送樊二十三侍御赴漢中判官威弧不能弦自爾無寧歲易弦木為弧剡木為矢弧矢之利以威天下蓋取諸暌鮑明逺寧歲猶亡奔國語薑氏告于公子曰自子之行晉無寧歲趙云揚雄河東賦曰玃天狼之畏弧其後張平子思玄賦又云彎威弧之拔刺蓋因矢有弧星而用易弧矢之利以威天下威字貼之川谷血橫流揚子川谷流人之血豺狼沸相噬天子從北來長驅振凋敝頓兵岐梁下肅宗理兵鳯翔却跨沙漠裔趙云此一段言安氏父子為亂而乘輿播遷肅宗駐蹕鳯翔也自鳯翔而其裔極西則沙沙漠矣故言跨二京陷未收四極我得制杜補遺爾雅釋地東至於泰逺西至於邠國南至于濮沿北至于祝栗謂之四極注此四方逺極之國名列子斷鼇之足以立四極蕭索一作瑟漢水清緬通淮湖稅使者紛星散王綱尚旒綴古詩星使日夜馳詩為下國綴旒公羊傳君若贅旒然趙云此二假言二京雖陷而邊鄙不可不安故遣使為多也漢中今之興元府漢水在焉與淮湖通征稅之物樊之往漢中正以四極不可不制故遣使為多星散所以言其不止一處庾信寒園即日詩云寒園星𣪚居乃其義也非是李郃二使星入蜀事南伯從事賢君行立談際揚雄或立談間而封侯趙云南伯指言漢中主將也從事指言樊為判官也言南咱與從事俱賢相投在立談間耳詩北山我從事獨賢生知七曜厯月令命太史司天厯候日月星辰七曜為經二十八宿為紀杜補遺云漢志注日月五星謂之七曜北史劉焯以博學洽聞如九章算術周髀七曜書莫不復其本根窮其祕要手畫三軍勢馬援於帝前聚米為山谷指畫形勢聞示衆軍所從道徑往來曲折昭然可曉帝曰虜在吾目中矣杜補遺云前張安世子千秋與霍光子禹俱隨度遼將軍范明友擊烏桓還謁大將軍光問千秋鬬戰方略山川形勢千秋口對兵事畫地成圖無所忘失光復問禹禹不能紀日皆有文書光歎曰霍氏世衰張氏興矣氷雪淨聰明雷霆走精鋭雷趙云聰明如氷雪之淨精鋭如霆之走所以美之也戰國䇿季良謂魏王曰恃兵之精鋭而欲攻邯鄲射雉賦云欣吾志之精鋭幕府輟諌官朝廷無此一作比例至尊方旰食左傳伍奢曰楚君大夫其旰食乎旰晏也仗爾布嘉惠賈誼弔屈原賦恭承嘉惠兮俟罪長沙補闕暮徴入柱史晨征憩老子為柱下史為趙云以義推之樊判官其初必先為補闕而召之既補闕又為侍御而自侍御往漢中也晨征憩者以晨征行而因執别則暫憩息也正當艱難時天步艱難實藉長久一作大計回風吹獨樹白日照執袂信趙云此言别時之景也庾和趙王塗中詩云回風即送師周王褒送葬詩平原著獨樹臯亭望列村楚詞青春受謝白曰照其後張季鷹雜詩白日照園林慟哭蒼煙根山門萬重閉居人莽牢落遊子方迢遰徘徊悲生離局促老一世九章悲莫悲兮生别離古詩云局促轅下駒薜云前漢書灌夫傳上怒內史曰公平生數言魏其武安長短今日廷論局促效轅下駒趙云上林賦牢落陸離注猶遼落也陶唐歌遺民後漢更列一作别帝恨無匡復姿一作資聊欲從此逝左傳吳季札聞唐之歌曰思深哉其有陶唐氏之遺民乎漢髙祖曰吾亦從此逝矣趙云兩句言民復而中興其兩句又自言無能而當引去也陶唐歌遺民普言生民尚皆是陶唐之遺者以明其非作亂之人後漢更列帝則以漢光武中也興而後復有十二帝以比肅宗中興送從弟亞赴安西判官一云河西鮑云亞字次公肅宗在靈武上書論當世事擢校書郎杜鴻漸節度河西奏署幕府故詩云令弟草中來蒼然請論事南風作秋聲殺氣薄炎熾南風作秋聲言當生育而有肅殺趙云南風夏日之風也而作秋聲故肅殺之氣倚薄炎熾也盛夏鷹隼擊時危異人至月趙云令又云立秋之日鷹隼擊今節候當盛夏而鷹隼擊則有所搏取不得不急避之時危亂則須異人故異人自然未至也異人正指其弟並矣後漢王朗還許下人稱其才進或曰不遇異人當得異書問之果得王充論衡之益令弟草中來蒼然請論事靈趙云古詩濟濟令弟而謝運酬從弟惠連曰末路值令弟詔書引上殿奮舌動天意言君意為之回動也解嘲云伸其舌而奮其筆兵法五十家爾腹為篋笥兵法見前漢藝文志邊韶腹便便五經笥趙云前漢藝文志有兵權謀十三家兵形勢十一家隂陽十六家兵技巧十三家揔曰凡兵書五十三家七百九十篇圖四十三卷也應對如轉圜漢祖從諌若轉圜議杜補遺開元遺事張九齡每與賔客論滔滔不竭如下坂走丸時人服其俊辨踈通略文字經綸皆新語足以正神器易君子以經論陸賈造新語老子天下神器宗廟尚為灰君臣俱一作皆下淚九廟為賊所焚也九趙云安慶緒盡焚廟也崆洞地無軸清海天軒輊崆洞見自京赴奉先縣詩注言天地未安也人杜補遺詩戎車既安如輊如軒馬援傳居前不能令輊居後不能令人軒注軒輊輕重也軒輊則或輕或重低昂而不安矣西極最瘡痍連山暗烽燧漢制有冦則舉烽燧相如諭蜀文曰烽舉燧燔杜補遺唐六典日唐鎮戍烽倐所至大率相去三十里其逼邊者築城以置之其放煙有一炬至三炬者每日初夜舉一炬謂之平安火餘則隨其多少而為差光武修熢燧注前書音義曰邊方備警急作土臺臺上作桔橰頂上有兜零以薪草置其中常低之有寇即燃火舉之以相告曰烽又多積薪寇至即燔之望其煙曰燧晝則燔燧夜則舉烽廣雅言兜零籠也趙云季布傳瘡痍未瘳帝曰大布衣布衣韋帶之士新添在傳衛文公大布之衣大帛之冠籍卿佐元帥謂杜鴻漸坐看清流沙所以子奉使書曰西被於流沙疏流沙西沙境最逺者也而地理志以流為張掖居延澤是也計三危在居延之西太逺矣志言非也趙云流沙亦西邊地名書曰西被於流沙則在西之逺處皆因吐蕃之亂而言之歸當再前席文帝前席賈生注漸促近聼説適逺非歷試舜歷試諸艱須存武威郡為畫長久利孤峰石戴驛快馬金纒轡黃羊飫不羶蘆酒多還醉踴躍常人情慘淡苦士志安邊敵何有反正計始遂髙祖撥亂世而反之正趙云此一假又期以安邊敵何有正言吐蕃何足平哉當念天子反正車駕歸長安方為計遂也吾聞駕鼓車不合用騏驥杜補遺後漢循吏傳曰建武十三年異國有獻名馬者日行千里又進寶劍價兼百金詔以馬駕鼓車劍賜騎士建武乃光武年號龍吟回其頭夾輔待所致左傳夾輔周室故趙云公意言以亞為安西判官特使騏驥驥駕鼓車耳馬回頭所望在夾輔天子也龍吟指言騏送韋十六評事充同谷郡防禦判官安祿山大亂甫與韋宙同陷賊後皆遁歸行在所鮑云注以為韋宙乃丹之子仕宣宗時非此所送人也昔沒賊中時潛與子同遊今歸行在所王事有去留天子行幸所在曰行在詩王事靡盬逼側逼側見上注兵馬間主憂急良儔史范睢主憂臣辱主辱臣死子雖軀幹小老志作氣橫九州曰趙云趙書劉曜討陳安於壠城安死人謡曰壠城建兒有陳安軀幹雖小腹中寬愛養將士同心肝挺身艱難際張目視寇讎朝廷壯其節奉詔令參謀鑾輿駐鳯翔同谷為咽喉西都賦乘鑾輿鳯翔府扶風郡隋置鳯栖尋改為麟逰郡同谷郡今成州晉仇池郡漢下辨縣舊名武街城中趙云魏都賦正位居體者以夏為喉舌西扼弱水道禹貢弱水既西集注十州記云鳯麟洲在西海之中四面有弱水繞之鳩毛不浮不可越也南鎮枹罕陬一作氐羌陬唐安鄉郡河洲理枹罕縣枹罕故羌侯邑枹音孚本枹鼓字也此邦承平日剽劫吏所羞前漢地理志椎剽掘冡師古曰椎殺人而剽劫之剽急也况乃胡未滅控帶莽悠悠府中韋使君道足示懷柔詩懷柔百神令姪才俊茂二美又何求受辭太白腳太白山名山杜補遺辛氏三秦記曰大白在武功縣南去長安五百里不知髙幾許俗云武功太白去天三百周地圖記曰太白山甚髙上常積雪無草木半山有雲如瀑布則澍雨人常候驗如離畢焉故語曰南山瀑布不朝則暮録異記曰金星之精墮於終南圭峯之西田號為太白其精化為白石狀如美玉常有紫氣覆之玄宗立玄元廟於太寧里臨淄舊邸取其石琢為像焉走馬仇池頭成州上祿縣有仇池也晉永嘉末為氐羌文茂所據杜補遺三秦記曰仇池山上廣百頃地平如砥其南北有山路東西縣絶百仭一夫守道萬夫莫向山勢自然有樓櫓却敵之狀上有岡阜泉源史記謂秦得百二之固也南史武興國本仇池楊難當自立為秦王本朝同州河池乃故地後漢西南夷傳曰馬氐居河地一名仇池山在今成州上祿縣南三秦記曰間仇池山本名仇維州上有池故曰仇池在滄洛二谷之常為水所衝激故下石而上土形如覆壺仇池記曰仇池百頃周回九千四十步天形四方壁立千仞自然樓櫓却敵之狀分置調均竦起數文有踰人功凡二十七道可攀援而上東西二門盤道自下至上凡有七里上則岡阜低昂泉流交灌酈元水經注曰羊腸盤道三十六回開天圖謂之仇夷所謂積嵳峩嶔岑隱阿者也古色一作邑沙土裂前書音義曰沙土曰漢即今磧也趙云西邊近沙漠之地故沙土裂積陰雪雲稠一作積雪陰雲稠羌父豪豬靴羌兒青兕裘云趙上林賦有拖豪豬宋王招魂曰君王親發兮怦青兕説文曰兕如野牛青皮堅厚可以為鎧吹角向月窟顔延年歌月毳來賔毳窟也月窟西極長楊賦西壓月窟杜補遺月録曰蚩尤率罔兩與黃帝戰於涿鹿帝乃命吹角為龍鳴以禦之至魏武北征烏丸度沙漠而軍士思歸於是減為中鳴而聲更悲矣胡角者本以應胡笳之聲後漸用之蒼山旌斾愁鳥驚出死樹句趙云吳平為章州門前忽生一株青桐樹上有歌謡之聲惡而斫之平隨軍北虜首尾三年死樹歘自還立於故根上樹巔空中歌曰死樹今更青吳平尋當歸故公詩又曰君不見前者摧折桐百年死樹中琴瑟也龍怒拔老湫郊祀志湫淵祠朝那湫水在涇州界興雨土俗亢旱每於此求之相傳云龍之所居也天下山川隈曲有之湫音子由切古來無人境今代橫戈矛賦趙云孫興功遊天台山序云踐入無人之境傷哉文儒士憤激馳林邱中原正格鬬相抱而殺之曰格趙云格鬬字祖出前漢而陳琳飲馬長城窟行云男兒也寧當格鬬死何能怫鬱長城道禮記傷哉貧後會何緣由百年賦命定豈料沉與浮且復戀良友握手步道周謝玄暉桑榆隂道周文趙云詩有枤之杜生於道周釋周曲也論兵逺壑淨亦可縱冥搜天台賦序題詩得秀句札翰特相投覽趙云陸瑜仙人六著篇云避敵情思巧論兵勢重新送李校書二十六韻鮑云李舟也國史補言舟好事與妹書曰釋迦生中國設教如周孔生西方設教孔周加釋迦天堂無則巳有則君子生地獄無則巳有則小人入則其人可知公故極稱道代北有豪鷹生子毛盡赤鐘代二山出鷹舟趙云以物之竒俊者譬李也晉孫楚鷹賦曰有金剛之俊鳥生井陘之巖阻隋魏言深鷹賦曰惟兹禽之化育實鍾山之所生而今公言代北末見所出也渥窪騏驥兒尤異是龍脊元趙云前漢書曰武帝鼎四年馬出渥窪水中東方朔曰騏驥騄耳天下之良馬也爾雅曰騮馬黃脊騝音乾李舟名父子名趙云父之子也前漢蕭育傳王鳯以育名父之子除為功曹王導為述名父之子不可無祿清俊流輩伯漢趙云流輩之伯也伯者長之義晉有八伯以比八逹官儀曰侍御史周官也為柱下史官法冠一名柱後以鐵為柱言其審固不撓常清峻也人間好妙年不必須白晳在傳東門之晳實興我役冉趙云左傳昭公二十六年豎曰有君子白晳十五富文史十八足賔客十九授校書二十聲輝一作輝赫衆中每一見使我潛動魄自恐二男兒辛勤養無益兒趙云淵明云雖有五男俱不好紙茟二男兒亦倣此矣乾元元一作二年春萬姓始安宅乾元肅宗時耳號始收復京師民始安居舟也衣綵衣列女傳曰老萊子孝養二親行年七十嬰兒自娛著五色綵衣嘗因取漿水上堂跌仆因卧地為小兒啼或弄烏鳥於親側告我欲逺適倚門固有望斂衽就行役詩父曰嗟豫子行役而趙云戰國䇿齊王孫賈之母謂賈曰汝朝出晚來則吾倚門而望汝暮出而不還則吾倚閭而望汝陶淵明勸農四言云取不斂祍南登吟白華已見楚山碧白華孝子之潔白王趙云吟白華而見楚山碧則舟必以事南往于漢上矣藹藹咸陽都冠蓋日雲積藹藹言其氣象也咸陽古雍郡也冠蓋士大夫也雲積言多也西都賦云冠蓋如雲何時太夫人堂上會親戚文帝紀列侯妻稱夫人列侯死子復為列侯乃得稱太夫人子不為列侯亦不得稱潘安仁間居賦太夫人在堂又云席長筵列孫子陶淵明恱親戚之情話汝翁草明光漢武帝太初四年秋起明光宫師古曰三輔黃圖在城中元后傳云成都侯商避暑借明光宫凡掌制誥文子謂之視草也膳趙云後漢尚書郎含香握蘭直宿於建禮門太官供奏事明光殿下筆為詔誥出語為誥令其在唐則中書舍人也凡掌制誥草樞密院謂之底三司謂之必有草故謂之起草春明退朝緑載凡公文中書謂之檢又可以見中書舍人所行曰草也武后臨朝天授元年壽春王成器兄弟五人初出閣同日受册有司撰儀注忘載册文及百僚在列方知闕禮宰臣相顧失色中書舍人王勮立召書吏五人執茟口草五王册一時俱畢則起草者中書舍人之職天子立前席見前詩注歸期豈爛漫别意終感激趙云豈爛漫言必不至於過期也而别意終感激乃人情離别之常也莊子道德不同而性命熳熳子子趙岐章指曰千載聞之猶有感激顧我蓬屋姿謬通金閨籍曹子建顧念蓬屋士貧賤誠足憐謝玄暉出尚書省詩既通金閨籍小來習性懶晚節一作歲慵轉劇嵇叔夜絶交書少加孤露性復踈慵又懶與慢相成每愁悔吝作如覺天地窄羡君齒髮新行已能夕愓語行已有恥易乾卦夕惕若厲臨岐意頗切對酒不能喫趙云李陵詩對酒不能酬回身視緑野慘淡如荒澤老鴈春忍飢哀號待枯麥時哉髙飛燕絢練新羽翮老鴈甫自喻也時燕喻李校書賦趙云漢時謡大麥青小麥枯赭白馬云别輩超羣絢練敻絶注絢練疾也長雲濕褒斜西都賦右界褒斜隴首之險見第一卷子午谷注谷杜補遺後漢順帝紀罷子午道通褒斜路褒斜漢中名南谷名褒北谷名斜首尾七百里鄭子真所耕在此谷口斜音余遮切俗讀作橫斜之斜非也漢水饒巨石趙云言漢上景物之愁寂以勸其歸也江文通雜體詩云海濵饒竒石無令軒車遲襄疾悲宿昔古詩思君令人老軒車來何遲洗兵馬收京後作中興諸將收山東趙云山東者今之河北也蓋謂之山東山西以太行山分之也今所謂山東乃昔言齊地則以泰山言之矣安祿山反先陷河北諸郡至二京已復慶緒奔于河北之後史思明降嚴莊降熊元皓降而河北諸郡漸復矣故曰中興諸將收山東捷書日趙作夕報清晝同趙云夕者日之晚也詩曰日之夕矣牛羊下來晝者日之中也莊子曰正晝為盜日中穴壞夕晚之報與日晝同言其好消息之真也舊本誤作日報清晝同所以起學者之疑河廣傳聞一葦過胡危命在破竹中衛詩誰謂河廣一葦杭之晉杜預傳今兵威已振譬如破竹數節之後迎刃而解無復著手處也秪殘鄴城不日得獨任朔方無限功趙云鄴城相州也乃賊所窟穴四月以相州為安成府可見矣至九月方能圍相州十一月方能敗之故公於作是詩時云殘者言餘也只殘字是唐人語出朔方指言郭子儀也子儀素為朔方節度使後又加河西隴右時專任子儀故云獨任京師皆騎汗血馬回紇餧肉蒲萄宫汗血事見一卷髙都護驄馬行注張耳傳如以肉餧虎何益三輔黃圖曰漢有葡萄宮趙云蒲萄宮考之長安志載有東西葡萄園景龍文館記云中宗召近臣騎馬入櫻桃園馬上口摘櫻桃遂宴東蒲萄園奏以宮樂則所謂葡萄宫者雖不指其東西而謂此園耳舊注作漢有葡萄宫考之漢宫室名别無此名也視回紇為虎以言其強保為患也舊唐史載初收西京回紇欲入城劫掠廣平王固止之及收東京回紇遂入府庫取財帛於市井村坊剽掠三日而止財物不可勝計廣平王又賚之以錦罽寶貝葉護大嘉則回紇之為虎可知蒲萄宮漢丐奴傳元夀之年單于來朝舍之上林苑蒲萄宮趙豈未之見耶已喜皇威清海岱常思仙仗過崆洞禹貢海岱惟青州王元長崆洞山黃帝順下風膝行進而問道趙云青徐諸郡皆復天下無事則可以問道此所以常思其如此三年笛裏關山月趙云祿山以天寶十四載反歲在乙未安慶緒以至德二載弒其父歲在丁酉是歲復二京則為三年復關山月古樂府曲名梁元帝府詩周王褒燕歌行云無漢地關山月唯有漢北薊城雲萬國兵前草木風成王功大心轉小文王小心翼翼時成王為元帥鮑云乾元元年徙封叔為成王郭相謀深古來少郭子儀也司徒清鑒懸明鏡李光弼徒趙云本傳至德二載光弼加檢校司新書光弼自司徒遷司空猶稱司徒則新史誤矣尚書氣與秋天杳僕固懷恩趙云尚舊指言王思禮本傳長安思禮先入清宫收東京戰數有功遷兵部尚書以為房琯非是按至德元載十月琯用車戰以敗二載琯罷相貶邠州刺史舊注云作懷恩亦非是據本傳復兩京懷恩雖有功止詔加鴻臚卿其後乾元二年方入為工部尚書今公詩是收復兩京後豈却是懷恩耶二三豪俊為時出整頓乾坤濟時了東走無復憶鱸魚張翰見秋風起乃思吳中蓴羹鱸魚遂命駕東歸吳益託意避亂今不必如此也南飛覺有安巢鳥古詩越鳥巢南枝曹子建詩願隨越鳥翻南翔趙云曹孟德詩烏鵲南飛大率兵亂則非特人不安鳥亦不安時平則鳥獸亦安矣青春復隨冠冕入紫禁正耐煙花繞謝希逸收華紫禁國趙云乾元元年正月授皇帝以傳璽此時衣冠并入而定矣故云青春復隨冠冕入紫禁紫宫之禁也蓋以紫微帝座得名鶴駕通霄鳯輦備雞鳴問寢龍樓曉薛夢符云按漢宫闕疏白鸖宫太子之所居凡人不得輒入隨太子左右監率門唐龍朔中改為左右崇掖衛垂拱中改為鸖禁衛杜補遺劉向列仙傳曰王子喬周靈王太子晉也好吹笙作鳯鳴遊伊洛間道士浮􅉌公接上嵩山三十餘年後復於此山上告桓梁曰告我家七月七日待我緱氏山頭果乘白鸖駐山顚望之不得到舉手謝時人而去故後世稱太子之駕曰鸖駕宫曰白鸖禁曰鸖禁又文選王融字元長曲水詩序曰儲后睿哲在躬出龍樓而問豎入虎關而齒胄注龍樓漢太子門名也文王為太子雞初鳴而衣服至寢門外閣內豎之御者曰今日安否何如沈休文齊故安陸昭王碑文曰式掌諸命允膺嘉選博望之苑載暉龍樓之門以峻趙云按漢書成帝為太子上嘗急召太子出龍門樓不敢絶馳道張晏曰門樓上有銅龍若白鶴飛廉之為名也此龍樓本出若王元長所用則出於此耳蓋王元長文合禮記與漢書兩事為句而杜公則又出於王元長而變之也攀龍附鳯勢莫當天下盡化為侯王揚子攀龍鱗附鳯翼時攀附而立功者皆有恩趙云班固韓彭等敘傳曰雲起龍驤化為侯王崔羣送符載歸蜀序亦云不習爼豆化為侯王汝等指化侯王之人也唐舊史載肅宗至德二載四月帝在鳯翔是時府庫無蓄積專以官爵賞功諸將出征皆給空名告身自開府特進列卿大將軍下至中郎郎將聼臨事注名其後又聽以信牒授人官爵有至異姓王者諸有官者但以職任相統攝不復計官爵髙下大將軍告身一通才易一醉凡應募入軍者一切衣金紫至有朝士僮僕衣金紫而身亦賤役者名器之濫至是而極焉今所謂盡化為侯王蓋言此輩也汝等豈知蒙帝力莊子曰帝力於我何有哉時來不得誇身強關中既留蕭丞相蕭何餉饋不絶糧道趙云謂郭子儀也幕下復有張子房髙祖曰運籌帷幄之中吾不如子房謝宣逺張子房詩婉婉幕中畫張公一生江海客身長九尺鬚眉蒼杜補遺仇池翁云久困江湖不見偉人昨在金山滕元發以扁舟破巨浪出船巍然使人神聳好箇沒興底張鎬相公杜子美云張公一生江海客身長九尺鬚眉蒼謂張鎬也唐舊史云蕭昕與鎬友善表薦之曰如鎬者用之則為王者師不用則幽谷之叟爾明皇擢鎬為拾遺不數年出入將相徴起適遇風雲會扶顚始知籌䇿長二十八將論成能感會風雲語趙云陸士衝樂府云藹藹風雲會顛而不扶青袍白馬更何有趙云公自謂也庾信哀江南賦曰青袍如草白馬如練於鴈門公碑銘言其祖父之功曰白馬如練玄旗如墨亦以形容其旗馬侯景之亂先有童謡云青絲白馬夀陽來而景以朝廷所給青布皆用為袍采色尚青景乘白馬青絲為轡欲以應讖今公詩取字用耳非言安史及吐蕃也何有者言在我者何所有哉殊無所利也唯知喜再昌而已後漢今周喜再昌趙云後漢則東京之漢今周則宇文之周庾信於齊王碑序云昔東京既稱炎漢再受今周歷即是酆都中興此乃喜再昌之義若以為卜年卜世之周則於今周字無出寸地尺天皆入貢竒祥異瑞爭來送不知何國致白環丘希範書白環西獻楛矢東來顔延年歌亘地稱皇罄天作主月毳來賔日際奉土世本曰舜時西王母獻白環及佩復道諸山得銀甕禮運山出器車注器謂若銀甕丹甑隱士休歌紫芝曲集注皇甫謐髙士傳秦世道滅德消坑黜儒術四皓於是退而作歌曰莫莫髙山深谷逶迤煜煜紫芝可以療飢唐虞世逺吾將何歸駟馬髙蓋其憂甚大富貴之畏人兮不如貧賤之肆志乃共入啇洛隱地肺山詞人解撰河清頌新添鮑照字明逺元嘉中河濟俱清當時以為美瑞照為河清頌關趙云公詩言此者是歲既收京而於七月嵐州合河黃河三十里清如水蓋收京之祥實事也田家望望惜雨乾布榖處處催春種布榖鳴鳩也作趙云楊惲云田家苦故對布榖催耕之鳥東坡在黃州作五禽言自注曰土人謂布榖為脫却布袴淇上健兒歸莫懶城南思婦愁多夢東山詩五章言室家之望女也婦歎於室趙云淇上衛地也衛詩云泉原在左淇水在右今衛州與相州相鄰則指言圍相之兵矣健兒見上哀王孫詩注安得壯士挽天河淨洗甲兵長不用梁沈約詩安得壯士馳奔曦前漢李左車歌安得壯士翻日車武王伐紂大兩洗兵趙云六韜有洗濯甲兵早秋苦熱堆案相仍時任華州司功七月六日苦炎蒸對食暫餐還不能趙云蔡琰詩飢當食兮不能餐每愁一作常恐夜中一作來自足一作皆是蠍趙云蠍者螫蟲中原有之南中無有韓退之謫南方及其歸也有詩云照壁喜見蠍則每以得歸為念雖蠍之螫而見之反喜也今公苦熱固宜以足蠍為愁况乃秋後轉多蠅趙云退之詩有曰朝蠅不須驅莫蚊不須拍蠅蚊滿八區可以盡力格秋風九月至掃不見蹤迹今公詩却以秋後多蠅為苦則韓言其理杜怪其事束帶發狂欲大呌簿書何急來相仍唐書切於簿書期會不趙云論語束帶立於朝陶淵明肯束帶見督郵南望青松架短一作絶壑安得赤腳踏層氷趙云江文通擬謝光祿郊逰詩風散松架險松枝可以為架故因謂之架焉層氷見上髙都護驄馬行注立秋後題日月不相饒節敘昨夜隔玄蟬無停號秋燕已如客古詩秋蟬鳴樹間玄鳥逝將適宋玉燕翩翩而辭歸蟬寂寞而無聲平生獨往願惆悵年半百淮南王莊子略要曰江海之士山谷之人輕天下細萬物而獨往司馬彪注曰獨往自然不復顧世也罷官亦由人何事拘形役歸去來詞既自以心為形役奚惆悵而獨悲陶淵明詩誰謂形迹拘九家集注杜詩卷四
