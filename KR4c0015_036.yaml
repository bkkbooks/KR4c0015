body:
  text: 九家集注杜詩卷三十六宋郭知達編近體詩重送劉十弟判官分源豕韋𣲖韋賢傳詩曰肅肅我祖國自豕韋應邵曰在啇為豕韋氏趙云言劉與杜同出也别浦鴈賓秋月令鴻鴈來賓年事推兄忝張釋之兄事袁盎孝趙云公自言也劉標答郭峙書云頃年事道盡容髮衰謝蓋言年嵗之事也人才覺弟優經過辦鄷劒雷次宗豫章記意氣逐吳鉤吳鉤見弟五卷後出塞詩含笑看吳鉤注垂翅徒衰老馮異傳始雖垂翅回溪終能奮翼澠池可謂失之東隅收之桑榆先鞭不滯留劉􅀈曰常恐祖生先吾著鞭耳謂祖逖也本枝凌嵗晚高義豁窮愁他日臨江待長沙舊驛樓趙云劉與杜同出是為本枝莊子載孔子曰聞將軍高義越語越王於九月問范蠡曰今嵗晚矣子將奈何虞卿因窮愁而著書奉贈盧五丈參謀琚時丈人使自江陵在長沙待恩旨先支率錢米恭惟同自出妙選異髙標趙云恭惟者恭恪而忍惟之也如杜佑郊天說有曰恭惟國章並行二禮成十三年晉吕相絶秦有曰康公我之自出注晉外甥也盧與公蓋同舅氏矣戰國䇿曰舉標甚高而左太沖蜀都賦云陽鳥回翼乎高標雖以言山而實起於戰國䇿入幕知孫楚披襟得鄭僑孫楚字子荆石苞都督揚州事孫楚為參軍鄭僑子産也孔子與為友趙云上句言盧丈之為參謀也貼以入幕字則謝安謂郤超曰卿可謂入幕之賓矣下句言江凌莭度與之為友如季札也左傳襄公二十九年云季禮聘於鄭見子産如舊相識與之縞帶子産獻紵衣焉舊注云禮子與為友是何夢語貼以披襟字則宋玉風賦云乃披襟而當之丈人藉才地門閥冠雲霄杜補遺前漢朱博傳齎伐閲詣府師古注曰伐功勞也閲所經歷也車千秋傳曰千秋無伐閲勞注伐積功也閲所經也營造法式曰唐六品以上通用烏頭大門又曰表揭又曰閥閲義訓云表揭閥閲是也俗呼為櫺星門是詩所謂門閥冠雲霄者蓋言盧氏積日纍功而致表揚高於雲霄趙云傳云明其等曰閥如後漢有云聲榮無暉於門閥又有史自序門閥也南史王僧逹傳云僧逹自負才地又王勱傳云王生才地豈可遊外府乎老矣逢迎拙相於契託饒趙云公自謂也言雖衰老拙於逢迎而與盧又相於所以契託饒縱也相於字出選賜錢傾府待爭米駐船遙趙云題注所謂支率錢米也鄰好艱難薄氓心杼軸焦薛云揚雄方言土作謂之杼木作謂之柚大東小東杼軸其空軸當作柚又後漢劉駒駼書曰杼柚空於私之求江趙云上句言言鄰國之好以艱難而薄則盧文使自陵所持之好也下句又以成好薄之句蓋當艱難之際杼軸空而民心焦熬則不可多斂以為鄰好之奉矣客星空伴使寒水不成潮趙云客心則公自謂也伴使以言其伴盧之為使星也舊注引嚴陵事雖是客星兩字而惑亂其義矣況博物志載嚴君平曰客星犯牽牛亦豈無客星字耶下句言相伴之時如此素髮乾垂銀章破在腰秋興賦素髮颯以垂領下句見見霧雨銀章濕注也趙云素髮公自言其老下句又自言其不達時為尚書工部員外郎賜緋魚袋而流落故也說詩能纍夜醉酒或連朝中山有酒一醉千日詩趙云說詩醉酒皆公自言耳孟子云說者不以文害辭匡衡傳匡說詩解人頤藻翰惟牽率湖山合動搖左傳牽率老夫盧趙云此方言及丈蓋謂華藻詞翰其所牽率者惟盧丈耳可以動搖湖山則文章之妙也漢志星影動搖也時清非造次興盡却蕭條趙云言􅑮時之清為難得故曰非造次當是時相見而興盡自却蕭條也天子多恩澤蒼生轉寂寥趙云皆言當時如此公題下注云待恩旨先支率錢米此豈亦恩澤之謂耶休傳鹿是馬莫信鵩為梟趙高指鹿為馬鵩鳥事見上留别杜員外注不趙云當是時魚朝恩用事與元載協則鹿是馬者公有激而云矣未解依依袂還斟泛泛飄流年疲蟋蟀詩蟋蟀在堂嵗聿云暮古詩四時更變化嵗暮一何速晨風懷苦心蟋蟀傷局促之趙云所以志時流年疲勞蟋蟀轉徙則嘆晚也體物幸鷦鷯莊子鷦鷯巢林不過一枝文賦云賦體物而瀏湸張茂先作鷦鷯賦辜負滄州願誰云晚見招謝元暉詩復叶滄州趣世趙云此末句感激之言􅉼蓄深逺蓋揚雄檄靈賦曰有黃公者起於滄洲精神飬性與道漂逰故謝云暉之宣城詩云既歡懷祿情復協滄洲趣公今詩以為離去朝庭夲以為滄洲之願而徒然流落既孤負矣而又非晚得見招者此其所以感也在太沖詠史詩曰馮公豈不偉白首不見招則見招者朝庭也李陵云陵雖孤思漢亦負德孤負字本只是孤獨之孤字而俗作辜負舊本乃流傳之誤矣登舟將適漢陽春宅棄汝去秋帆催客歸趙云公二月到潭州因居焉則自春所有之宅名之曰春宅催客歸公將歸秦也庭蔬尚在眼浦浪已吹衣趙云庭蔬則時所寓居之庭前蔬也謝靈運詩薛蘿若在眼陶淵明風飄飄而吹衣生理飄蕩拙有心遲暮違薛云南華真經莊子之楚見髑髏髐然有形因而問之曰夫子貪失理而為此乎趙云楚詞云傷美人之遲暮詩中心有違左傳王心不違張茂茂先鷦鷯序云生生之理足矣中原戎馬盛逺道素書稀趙云老子云戎馬生於郊古詩云呼兒烹鯉魚中有尺素書塞鴈與時集檣烏終嵗飛趙云自塞飛來之鴈也盛𢎞之荆州記曰鴈塞北接梁州汶陽郡其間東西嶺屬天無際雲飛風翥望崖回翼唯一處為下朔鴈違塞矯翮裁度故名鴈塞同於鴈門也故公今云塞鴈其對檣烏則帆檣之上刻為烏荆取其占風猶相風之上為烏也鹿門自此往永息漢隂機趙云公或欲歸或欲往滄洲或欲隱鹿門然則不得志而流落者行止其茫然哉暮秋將歸秦留别湖南幕府親友趙云前篇登舟將適漢陽云春宅棄汝去秋帆催客歸則秋初時也今是次萹却云暮秋將歸秦則九月時也謂之湖南暮府則是潭州也由是觀之則公雖欲往漢陽而元未定今又有欲歸秦之興然相續其下等篇皆只在潭州亦言之而不行也水闊蒼梧野謝𤣥暉云雪去蒼梧野水還江漢流天高白帝秋趙云廣言湖南上下之景也白帝城在䕫州公自䕫而來故言及之途窮那免哭顔延年途窮能無慟身老不禁愁大府才能㑹諸公德業優北歸衝南雪誰憫弊貂裘見前季子貂裘弊注趙云公以蘇秦自此也送盧十四弟侍御護韋尚書靈櫬歸上都二十韻趙云此詩三假自素幕渡江逺至臺迎獬豸威言韋尚書靈櫬至上都而送之者盧侍御也自深裏見士則至風流代後希言盧侍御之對登所論事也自對揚期特逹至故就别時飛則轉入以言巳身與盧為别也素幕渡江逺朱幡登陸微漢二千石朱幡兩輪云趙云朱幡則丹旐也舊注漢二千石朱兩幡誤矣幡字從車自是車轓幡字從巾自是幡斾也登陸微則以其登陸故微見之也悲鳴駟馬顧失涕萬人揮陸士衡詩揮淚廣川隂文趙云駟馬顧則有戀主之意士伯死其母謂衆妾曰無揮淚參佐哭辭畢門闌誰送歸見上門闌多喜色注趙云門闌貴人之家也後漢明帝紀勞賜元氏門闌走卒注引績漢志云五伯鈴下侍閣門闌部署街里走卒皆有程品多少隨所典領則門闌之貴貴家方有之從公伏事久之子俊才稀長路更執紼此心猶倒衣詩自公召之顚倒裳衣公趙云禮助葬者執紼也下句言若之猶在蚤起而趨之也詩之子于歸感恩義不小懷舊禮無違潘安仁有懷舊賦張平子南都賦云獻酬既交率禮無違墓待龍驤詔臺迎獬豸威漢獻加魏武九錫曰龍驤虎視旁眺八方召杜正謬唐史遺事武后幸洛陽至閿鄉縣半騎不進巫問之巫曰晉龍驤將軍王濬云臣暮在首南每為樵採所苦聞大駕至故來哀求后遂詔云墓百步不得樵採子美八哀詩贈鄭國公嚴武曰虛無馬融笛悵望龍驤塋元注謂玉濬卒以龍驤名莫未傳止云濬龍驤將軍卒葬柏谷中大營塋域葬垣周四十五里不載詔龍驤名墓事趙云言言盧尚書之墓大營塋城如王濬者當俟詔也獬豸威言韋侍御史還朝則還從其班序也獬豸者冠名胡廣漢官儀曰侍御史四人持書皆法冠一名社後一名獬豸乃獸名一角知人曲直而觸不直者故執法者冠之此自無成字蓋見上句詔字出公自云耳深衷見士則雅論在兵機趙云世說鄧艾年十二至穎川讀陳太兵碑文曰言為世範行為士則遂自名範字士則後宗族有同者乃改令名戎狄乘妖氣塵沙落禁聞趙云禁闈天子之內也此言吐蕃陷京師也往年朝謁斷他曰掃除非趙云上句言去上都之名而斷朝謁也下句言除掃吐蕃不得上策所以為非也但促一作整銅壺箭渴期銘金箭方圓之制注金謂壺又云銅史司刻金徒抱箭早趙云欲上之未明求衣而朝也休添玉帳旗見上空留玉帳旗注趙云言不必添兵也玉帳將軍之帳也動詢黃閣老見上扈聖登黃閣注肯慮白登圍漢髙帝伐丐奴至平城冒頓以兵三十餘萬圍白登者趙云言天子雖屢詢大臣而莫知以白登之圍為慮此豈勸親征之徒歟黃閣老言三公也宋忠曰三公黃閣前史無有此義按禮記士鞸與天子同公侯大夫則異鄭𤣥云士賤與君同不嫌夫朱門洞唘當陽之正色三公之與天子禮秩相亞故黃其閣以示謙不敢斥天子宜是漢舊制也萬姓瘡痍合羣凶嗜欲肥趙云上句言其困於誅求役使也下句言將帥乘此為驕也刺規多諫諍端拱自光輝趙云上句所以望於盧侍御也下句言天子聞其諫議自可以垂衣拱手而治也孟子充實而有輝光孝經諌諍章儉約前王體風流後代希趙云此巳上言盧侍御之對對所論事如此詩前王不忘對敡期特逹衰朽再芳菲趙云對敡期特逹用結上所云言對剔哭子之前當在特逹而勿委靡則衰朽之人再獲芳菲言同受其榮也書敢對楊天子休命空裏愁書字山中疾採薇上句見咄咄正書空注下句伯夷傳登彼首陽采其薇矣趙云既有再芳菲之望亦嫌疾采薇之太清也撥杯要忽罷抱被宿何衣趙云撥杯者揮杯也既別矣撥杯之相要忽罷平昔抱被就宿今又何依也顧愷之魚鳥將何依眼冷看征蓋兒扶立釣磯清霜洞庭葉故就别時飛楚辭湘夫人洞庭波兮木葉下謝莊月賦洞庭始波木葉􅀈脫哭李常侍嶧二首一代風流盡修文地下深下句見聞髙常侍亡注融趙云南史張緒死其從弟齎酒於緒靈前酌飲慟哭曰何兄風流頓盡斯人不重見將老失知音伯牙以鍾期為知音期死而牙絶絃斯趙云斯人字起於孔子言伯牛之疾也斯人也而有疾也蓋嗟其人之賢也陸機云吾將老而為客指李常侍如鐘于期也曹丕與季質曰昔伯牙絶絃於鐘期仲尼覆醢於子路痛知音之難遇傷門人之莫逮也左傳吾將老焉短日行梅嶺寒山一作江落桂林趙云李常侍之觀應自廣南來也大庾嶺上多梅故又謂之梅嶺山海經曰桂木八樹而桂林兩字則郤詵曰林言其大也賁禺在廣州又廣志曰桂住於髙山之嶺其類自為林間無雜樹而桂林兩字則郤詵曰桂林一枝也長安若箇畔猶想映貂金侍中冠貂蟬阮修以貂蟬換酒趙云末句必歸長安貂金字則侍中事漢官儀曰侍中冠武辨文冠亦曰惠文冠力金璫附蟬為文貂尾為飾謂之貂蟬侍中服之則左貂常侍服之則右貂董巳輿服志云金取堅剛百録不耗蟬取居髙飲清貂取內徑悍外溫潤本趙武靈三朝服之制秦始皇破趙得其冠賜侍中右一青瑣陪雙入銅梁阻一辭見通籍踰青瑣生左蜀有銅梁縣趙云此篇追言李之平生與悼其既死皆是實事青瑣漢殿門名陪雙入則公昔為左拾遺時與常侍同通藉而入也阻一辭則追恨不得一别也風塵逢我地江漢哭君時趙云言當風塵之際相逢於江漢而今又在江漢聞其喪而哭也晉華核上疏曰辛有風塵不虞之變詩滔滔江漢次弟尋書札呼兒檢贈詩故詩遺弟一書札又呼兒烹鯉魚文選有贈答詩發揮王子表不愧史臣詞趙云常侍者宗室之子也故周王子表字前漢書有王子侯表右二哭韋大夫之晉悽愴郇瑕邑左傳晉謀去故緯諸大夫曰必居郇瑕氏之地差池弱冠年曲禮二十曰弱冠大人叨禮數文律早周旋左傳與君周旋臺閣黃圖裏簮裾紫蓋邊三輔黃圖又漢宫圖詔沈休文碑陪龍駕於伊洛侍紫蓋於咸陽尊榮真不忝端雅獨翛然貢喜音容間見竊效貢公喜注馮招病疾纒左太沖馮公豈不偉白首不見招南過駭蒼卒北思悄聯綿洞簫賦吟氣遺響聨綿飄撇鵬鳥長沙諱見賈誼傳犀牛蜀郡憐見石犀牛行注素車猶慟哭寶劔欲髙懸上句後漢范式字巨卿與汝南張元伯為友元伯尋卒夢范式曰吾卿吾以某日死以某時葬子不我忘豈能相反式馳往赴之喪也發引將窆而柩不肯進其母撫之曰元伯豈有望邪停柩移時乃見有素車白馬號哭而來其母曰必范巨卿也下句見把劔覔徐君注漢道中興盛韋經亞相傳建武永年末盡中興之美韋賢不如教子一經沖融標世業磊落映時賢城府深朱夏江湖􅀈霽天倚樓關樹頂古詩西北有髙樓交疏結綺忩飛旋泛堂前寡婦賦飛旋翩以啓路帟幕欵風燕帟幕霄懸謝𤣥暉詩風簾入雙燕笳簫急暮蟬興殘虛白室莊子虛室白生跡斷孝亷船世說張憑舉孝亷負其才自謂必參時彥初欲詣劉真長鄉里及同舉者共笑之張遂往詣真長延之上全清言彌日因留宿至曉張退劉曰卿且前去當取卿共詣撫軍張還般同旅問何處宿張笑而不答須臾真長遣傳教覔張孝亷船同旅宛愕即同載詣撫軍至門劉進日下官今日與公得一太常博士撫軍與之言咨嗟稱善即用為太常博士童孺交遊盡喧卑俗事牽老來多涕淚情在强詩篇誰繼方隅理朝難將帥權春秋褒貶例名器重雙全舟中夜雪有懷盧十四侍衛弟朔風吹桂水大雪夜紛紛暗瘦南樓月寒深北渚雲謝惠連詩茗亭南樓期云趙云尚樓北渚潭州實有之屈原帝子降兮北渚燭斜初近見舟重竟無聞不識山隂道聽雞更憶君趙云吾林曰王子猷居山隂大夜間室命酌四望皎然因詠招隱詩忽憶戴安道戴時在剡乘興梓舟造門而返今句則又反言之言身不能去止思意而已對雪北雪把長沙朝雲冷萬家隨風且開一作間葉趙云當作開言雪隨風灑於葉上而開之也帶雨不成花趙云為雨所融混而六出花之狀不明也今世有鄭獬者詩云雨作雪花開不成蓋本知此也金錯囊徒罄張平子美人贈我金錯力趙詩曰文錯徒滿腹不如一裳錢錢趙云專措言錢也非金錯佩刀者漢書曰玉莽鑄大又造錯刀以金錯其文此錢形之如刀而金錯之之證續漢書曰詔賜應奉金錯把刀此鐶謝後漢書曰詔賜應奉金錯把刀此所用之刀以金錯為飾之證張平子四愁請曰美人之贈我金錯刀則主所用刀而言銀壺酒易賒無人竭浮蟻趙云浮蟻酒也祖出釋名曰酒有泛池浮蟻在上而張衡南都賦云浮蟻若萍有待至昏鴉公自注何遜詩云城隂度塹黑皆鴉接翅歸遜趙云玉立之詩話云頗嘗怪昏鴉常語何必引句耶甫後作絶句却云昏鴉接翅稀立之之說如此對雪詩前王之既失前後之次又不言公之心於第二次用皆鴉方獨引注蓋公時露消息要見其詩所謂無兩字無來處冬晚送長孫漸舍人歸州參卿休坐幄蕩子不還鄉古詩蕩子行不歸摘趙云坐幄則坐籌帷幄之文此兩句公自言也賓公為劒南節度府參謀是謂參卿度屬官者入幕之也公前為之而今罷所謂休坐幄列子曰人有去鄉土遊鄉四方而不歸者世謂為狂蕩之人也還鄉字則一舉還故鄉之摘文南客瀟湘外西戎鄠杜傍宣帝尤樂杜雩之問杜屬京兆鄠屬扶風音扈趙云公北人也而在湘潭是為南客西戎鄠杜傍則吐蕃之兵未息去嵗大厯三年八月冦靈州又冦邠州今嵗四年十一月又冦靈州故也衰年傾蓋晚費日繫舟長鄒陽傾蓋如故相趙云上句則初與長孫見耳傾蓋字孔子與程子傾蓋而語也舊注引鄒陽傾蓋如故在後矣下句則公又言其舟留滯而未行也㑹面思來札銷魂逐去檣古詩㑹面安可知别賦黯然銷魂趙云上句言欲㑹面則每思來札所以預囑其寄書下句則長孫之舟上水而往也雲晴鷗更舞風逆鴈無行趙云鷗更舞鴈無行兩句言别時景也鷗言舞則列子云鷗鳥舞而不下鴈言行則詩云兩驂鴈行也匣裏雌雄劒吹毛任選將見第五卷前出塞詩墓冬送蘇四郎徯兵曹適桂州飄飄蘇季子六印佩何遲蘇季子言吾若有雒陽負郭二頃田安能佩六國相印乎漢武帝讀大人賦飄飄然有凌雲之氣早作諸候客兼工古體詩上句見諸候老賓客注陸士衡有擬古詩爾賢埋照久吾病長年悲阮涉兵詩沈醉似埋照趙云淮南子云木葉落長年悲盧綰須征曰盧綰傳上使使召綰綰稱病不行上怒曰綰果反使樊澮擊之樓蘭要斬時見上十九卷樓蘭斬未還注趙云此指言吐蕃之贊普矣嵗陽初盛動王化久磷緇見十十七卷此道未磷緇注則趙云上句言十二月二陽生矣下句傷時之切矣為入卷梧廟看雲哭九疑趙云因送蘇徯適桂州而思舜舜南巡狩崩于蒼梧之野而葬子九疑之山故託蘇傒入其廟而逺望其墓以哭則公欲堯舜其君民之懷也風疾舟中伏枕書懷三十六韻奉呈湖南親友軒轅休製律甫自注云伏羲造瑟神農作琴舜彈五弦琴歌南風之篇有矣史記黃帝名曰軒轅前漢律厯志黃帝使伶倫自大夏之西崑崙之隂取竹之懈谷生其寂厚圴者斷爾節問而吹之以為黃鍾之宮制十二筒以聽鳯之鳴其雄鳴其雌鳴亦六此黃鍾之宫而皆可以生之是為律生虞舜罷彈琴樂記舜作五絃之琴以歌南賦尚錯雄鳴管見上注猶傷半死心枚來七發云龍門之桐髙百天而無枚其根半死半生冬則風雪之所激聖賢名古邈羇旅病年侵范蔚宗門道雖已積年力互頽侵陸士衡前路既已多欲塗隨年年趙云上句言造琴律之聖賢其名已古逺矣下句言其身之病隨年而相侵也此已上六句言風疾矣其下則鋪叙其流落之迹也舟泊常依震湖平早見參震東方也有震澤早一作半參曉星也鮑照曉星正參落趙云舟泊常依震則泊處在東邊也舊注更引震澤惑學者矣參星曉見或為山所障或為樹木所蔽則未必見之湖平早見參則視天逺宣其早見矣舊早一作半非如聞馬融笛若何仲宣襟馬融好吹笛有長笛賦序以性好音律能鼓琴吹笛王粲仲宣登樓賦云憑軒轅以遙望向北風而開襟趙云言風來舟中如吹笛之所召倚樓之所進也故國悲寒望顔延年故國多喬木空城凝寒雲趙云故國長安也悲當寒望之中羣雲慘嵗隂趙云嵗隂嵗晚也神農本草云秋冬為隂陸士衡猛虎行云時往嵗載隂是已時寒雲重所以為慘水鄉霾白屋楓岸疊青岑趙云白屋白板屋也字雖出周公以下白屋之士而楚俗多板扇矣楚詞曰江水湛湛兮上有楓楚岸多楓故曰楓岸鬱楚冬炎瘴濛濛雨滯淫張平子鬱鬱不得志魏文帝鬱鬱多愁思詩云零雨其濛趙云冬炎瘴實紀其事楚詞曰霧雨淫淫雨滯淫之義蓋出于此也鼓迎非祭鬼彈落似梟禽語非其鬼而祭之諂也漢賈誼鵩賦云鵩似梟鮑云莊子曰見彈而求梟炙趙云楚俗好巫祀故云非祭鬼似梟禽此長沙實事興盡才無悶愁來遽不禁王子猷興盡而返易遁世而無悶生涯相汩沒時物自蕭森自一作正張景陽溪壑無人跡荒林鬱蕭森疑惑尊中弩杜補遺鮑朴子曰子祖郡為為汲令以夏日請主簿杜宣飲酒北壁上有懸赤弩照于杯中如蛇宣惡之及飲得疾後郴知之延宣于舊處置于其見如初因謂曰此弩影耳宣疾遂廖此與與樂廣傳蛇影事大相類特弓與弩異耳淹留冠上簮北山移文云昔聞投簮逸海岸沈休文待此未抽簮簮趙云冠者者卿大夫之禮也欲致仕間散者謂之投沈休文詩聊欲投吾簮今云淹留冠上簮則公以猶末能遂棄冠晚也牽裾驚魏帝投閣為劉歆帝毗諫帝帝怒起毗引帝裾下句見上子雲識字終投閣注狂走終奚適微才謝所欽吾舍魯奚適陸士衡寤寐靡安豫願言思所欽朱浮與彭寵書云獨中風狂走自損盛時吾安藜不糝汝貴玉為琛孔子藤羮不糝為趙云上句以孔子自處也汝指胡南觀友也貴玉琛琛者寶也詩云來獻其琛是已言其所以為寶者貴用玉而充之也烏几重重縛鶉衣寸寸針趙云烏几烏皮几也齊謝毗有烏皮几詩鶉衣即衣如懸鶉之謂也哀傷同庾信述作異陳琳庾信作哀南江賦陳琳為袁紹徼務州曹公陳趙云庾信有哀江南賦哀傷同之則皆所以憂國也琳為袁紹作檄謗詈曹公父祖及曹公公得之愛而不咎今公同自言與無為人作謗詈所以為要也或云陳琳建于章表曹公嘗見其檄而頭風愈今公自謙以為其述作不能似之于義亦通十暑岷山葛三霜楚户砧葛弱布也十暑不易言其貧也三霜居楚三易星霜趙云書云岷山尊江有此岷山兩字而用對楚户則史記云楚雖三户亡秦必楚也岷山言葛則蜀中出布故也楚户言砧則楚俗多搗寒衣故也葛以御夏故云暑論語曰當署紾絺綌莊子云冬裘夏葛是已搗衣在孟秋故云霜庾信夜聰搗衣詩云秋夜搗衣聲飛度長門城淮南子云七月百蟲蟄伏青女乃出以降霜露此霜之所以言孟秋也此兩句句法正與荆南述懷云九鑽巴選火之蟄楚祠雷同各于一司中言年辰言處所言時候又並相契無差以清明而言故巴選火曰九鑽則自庚子敏至戌申在西東蜀在䕫九年見清明也以署服而言故岷山布曰十暑其于上在西東蜀在䕫者九年同而大厯二年有閏六月又何以當一暑矣蓋言九署可也著十字以著見共閏焉月詩云二十四回明兼潤六月望方敷其數亦以著見其也若𫐠懷下句以八月而言故楚詞雷曰三蟄今詩下句以七月而言故楚户砧曰三霜豈不相契無差乎叨陪錦長坐久放白頭吟郎官有錦帳見漢百官志司馬相如將聘茂陵人為妄文君賦曰頭吟反朴時難遇忘機陸易沈老子還淳返朴屑杜補遺莊子載孔子之言曰方且與世違而心不與之俱是陸沈者也其市南宜僚耶文選詩道勝貴陸沈注無水是沈謂之陸沈史記武帝時齊人東方朔坐席中酒酣據地歌曰陸沈于俗僻世金馬見趙云上句傷俗之澆薄矣下句忘機字禾見祖出止唐人詩曰我為忘機方到此寄言鷗鳥不須驚以俟博聞應過數粒食得近四知金鷦鷯賦巢林不過一枝每食不過數粒後漢王密懷金遺楊震曰夜無知者震曰天地地知子知我知是四知遂不受密慙而退趙云令云應過得近則以口腹之纍不比鷦鷯數粒而巳如是則須金已拯客窮所以近金而無嫌也春草封歸恨源花費獨尋劉安招隱王孫遊兮不歸春草生兮萋萋下句見上欲問桃源宿注趙云上句言其故園之草有懷恨以待公之歸也武陵桃源在今鼎州公既南征矣有尋源花之便也轉蓬夏悄悄行樂病涔涔見生涯獨轉蓬注柏舟詩憂心悄悄鮑明遠有行藥至城東橋詩注謂照有病服藥行以宣導之漢霍光夫人顯謀毒許后后免身取附子并合太醫大九飲之有頃頭涔涔也趙云上句公自傷其流落也下句自閔傷其疾病也但許后傳岑岑字無水滂瘞矢追潘嶽潘嶽有悼亡詩懷舊寡婦二賦辰杜正謬潘嶽傷弱子序曰三月壬寅弱子生五月之安壬寅次于新安之千秋亭甲辰而弱子天乙已瘞于亭東故嶽西征賦云天赤子于新安攻路側而瘞之是也持危覔鄧林山海經云夸父死棄其杖而為鄧林列子云夸父不量力欲返日影逐之于嵎谷之際渴欲得飲赴飲河渭不足將走此飲大澤未至道渴而死棄其杖尸膏同所漫生鄧林彌廣數千里焉趙云貼之以持危則語云危而不持也蹉跎翻學步阮籍娛樂末終極白曰忽蹉跎夀陵餘子學步于亦鄲失其故步匍匐而反趙云父自傷其隨流俗也感激在知音趙云公自傷其無識之者也子期死伯牙破琴絶絃終身不復鼓却假蘇張舌髙誇周宋􅲱蘇秦張儀莊子說劒王曰天子之劒何如曰天子之劒以燕溪石城為鋒齊岱為鍔晉魏為春周宋為鐔韓魏為扶趙云所謂掉三寸之舌者也兩句通義言雖欲為說客則所談者王道也納流迷浩汗峻址得嶔崟趙云以比所求見之人其人如海之納流而我迷其勢之浩汗海賦云㶀䔽浩汗也其人如山之峻北而我得其嶔崟選詩三南山鬱嶔崟城府開清旭松筠起碧潯趙云上句則言諸公在幕府一句也清旭字舊本以其諱字改作清日便無義理若作清曰猶可也此義在衆官之入府矣下句則公自言其舟之所在潯韻書云旁深也如楚詞弭節乎江孝是忌披顔爭倩倩逸足競駸駸詩載驟駸駸趙云上句則言往披承諸公之顔爭為倩倩以相待詩云巧笑倩兮主在手言笑也下句則又以駿焉比諸公也朗鑒存愚直皇天實照臨左傳皇太后土實聞此言之趙云愚直公自謂也朗鑒存則所以望諸公也皇天實照臨則公又自言愚直可以合天心也論語公古之愚也直詩云曰居月諸德照臨御公孫仍恃險候景末生擒蜀都賊長城豁隱吞若巨防一人守隘萬夫莫向公孫躍馬而稱帝劉宗下輦而自王左傳不恃險與馬便景陷台城者趙云是時郭奏之中有恃險如公孫述之在䕫者有攻犯城邑如侯景陷城者公欲攻其險而擒之其人此公之愚直矣髙歡與宇文泰相持於渭曲泰命將士皆傴戈於葦中歡曰縱火焚之如何侯景曰當生擒黑獺以示百姓若衆中燒死誰復信之書信中原闊于戈北斗深趙云長安之城號北斗以其上當之也此句又見長安之旁近猶有兵馬所以北斗在乎干戈之外為深矣畏人千里井薛云按西山十二真君傳許真君弟子施岑揮蜃中其股遂奔入豫章城西門外投泉井中真君尋井脉追之直至長沙趙云薛蒼舒引非是出處初無千里井三字也竊考千里井有兩事詭云千里井不瀉銼以其有汲飲之曰也唐有蘇氏演義小說者載金陵記云日南計吏止于傳舍間及將就路以馮殘草瀉於井中而去謂無再過之期不久復由此飲於此井遂為昔時銼節刺喉而死故後人戒之曰千里井不瀉銼或又云千里井不堪唾亦是古語故陳徐陵作玉臺新詠載劉勳妻王氏雜詩云千里不唾井況乃昔所奉為客於外所逢者皆千里之井也然謂之畏人則銼節刺㗋於義為近古詩客子常畏人問俗九州針楊雄傳贊針莫善於虞針作州針晉灼曰謂九州之針俗趙云針載在藝文類聚中記云入國而問問九州針則公之俯仰隨世可知矣戰血流依舊軍聲動至今葛洪户定解後漢方術傳注尸解者言將登仙假記為尸以解化也葛洪傳卒年八十一視其顔色如生體赤柔軟舉尸入棺甚輕如空衣以為尸解後得仙許靖方還任蜀志曰許靖字文休少年從弟邵俱知名並有人倫臧否之稱而私情不協排靖不得齒叙也趙云上句所以重傷其遭危難而不得不流落矣又引下句之所思若能如葛洪則尸定解今公云此以言欲南往以求丹砂必享此也王朗嘗與許靖書曰足下周游江湖以暨南海厯觀夷俗可謂遍矣如靖之力還可勝任又以言南往而避難也家事丹砂訣無成涕作霖葛洪為句漏今求丹砂趙云家事丹砂訣是兩件事言處辦家事及營求燒丹之訣而無所成所以涕如霖也涕如霖則涕泣如雨之霖也奉贈蕭二十使君昔在嚴公幕俱為蜀使臣艱危參大府前後間清塵自注嚴冉領成都余復參幕府門趙云廣德二年正月合劒南東西川為一道再以黃侍郎嚴武為節度使公春晚自閬擕家歸蜀再依武武奏為節度參謀今贈蕭詩而云間清塵則蕭是嚴公初鎮時入幕而公在其再來時所以為間也公自注之義亦明司馬相如諫獵疏曰犯屬車之清塵起草鳴先路乘槎動要津乘槎見上虛乘八月槎注要津見古詩先據要路津注趙云上句則蕭使君初自嚴幕而往必為舍人之職矣唐制舍人六人正五品上掌侍進奏參議表章凡詔旨制敕璽書冊命皆起草進畫既下則署行鳴先路以駿馬比而貼之也下句所以言其貴也王鳬聊暫出蕭雉只相馴見逺愧尚方曽賜履注蕭望之為郎有雉隨車魯恭為中牟令翟雉馴於桑下趙云蕭廣濟孝子傳蕭芝至孝除尚書郎有雉數十頭飲啄宿止當上直送至岐路下直入門飛鳴車前今云蕭雉只相馴則蕭使君其官應是尚書郎也舊注既誤以為蕭望之又引魯恭為中牟令雉馴桑下惑後學矣終始任安義前漢任安字少卿為益州刺史司馬遷書責以古賢臣之義也杜正謬謹按前漢書衛清為大將軍霍去病為驃騎將軍定令令祿秩與大將軍等自是青日衰而去病日益貴故人門下多去事去病輒得官爵惟獨任安不肯去子美是詩首句云昔在嚴公幕俱為蜀使臣及有塤箎金石食恩之語元注云嚴公殁後老母在堂使君溫凊之問甘脆之禮名數若已之庭闈焉太夫人傾逝又撫孤之情不减骨肉以是考之足以見蕭使君如任安之事衛清有終始之義舊注所引非是荒蕪孟母鄰趙云孟母事見列女傳字則何平叔景福殿賦嘉班妾之辭輦偉孟母之擇鄰今句云荒蕪孟母鄰則譬嚴母如孟母既死則所擇鄰以居止之處荒也聯翩匍匐禮意氣死生親自注嚴公殁後老母在堂使君溫凊之間甘脆之禮名數若巳之庭關焉大夫人傾逝襄事又首諸孫主典撫孤不滅骨肉則膠􅃮之契可知矣唐舊史秦王世民謂尉遲敬德曰丈夫意氣相期趙云非公自注如此分明則誰能知之所以一部中凡有小注不可不謂之公自注而削去之也詩云凡民有喪匍匐救之史云一死一生乃見交情也張老存家事嵇康有故人左傳晉侯以張老為中軍司馬嵇康臨死謂子曰山公在汝不孤矣趙云上句檀弓曰晉獻文子成室晉大夫發焉張老曰美哉輪焉美哉奐焉歌於斯哭於斯聚國族於斯文子曰武也得歌於斯哭於斯聚國族於斯是全要領以從先丈夫於九京北面再拜嵇首君子謂之善頌善禱今句云張存家事則則以張老比蕭使君言能存嚴公之家事得得令諸孫奉太夫人襄事哭於斯聚族於斯不失其家也舊注殊不相干也嵇康以比嚴公故人則指言蕭使君也食恩慙鹵莾鏤骨抱酸辛趙云兩句重言蕭之報嚴如此蓋以蕭使君之心舊食嚴公之恩尚慙報之鹵莾莊子曰耕而鹵莽之則其實亦鹵莽而報子蕭使君銜嚴公之恩銘鏤肌骨常抱酸辛故敬其母營其家非報恩之謂乎阮嗣宗詠懷有云對酒不能言悽愴懷酸辛巢許山林志䕫龍廊廟珍巢父許由夔與龍也趙云上句則公自比也下句則以言蕭使君也言如二人之材當在廟堂之上也鵬圖仍矯翼熊軾且移輪見泊嶽陽樓詩變化有鵾鵬注其趙云兩句通義言蕭使君如大鵬之圖南仍矯奮翼國當遂晉擢矣而且為太守故憑態軾以移輪也熊軾郡刺史之製白樂天作類書亦云隼􅀈熊軾也磊落衣冠地蒼茫土木身嵇康土木形骸形趙云兩句則公又自言也嵇康土木骸公言其身如之而亦在衣冠之列也塤箎鳴自合金石瑩逾新詩天之牖民如塤如箎絶交論道協膠漆志婉孌於塤箎文賦被金石而德廣流管絃而日新趙云言再與蕭相見如塤箎之合而金石不移所以瑩逾新也重憶羅江外同遊錦水濱趙云羅江屬綿州錦水則成都也成都在羅江之外所以紀實也結歡隨過隙懷舊益霑巾陸賈傳君何不交歡太尉深相結潘安仁懷舊賦涕泣流而霑巾君趙云傳曰楚子使椒舉如晉曰寡君願結歡於二三過隙言日月之疾也莊子曰人生一世如白駒之過隙曠絶含香舍稽留伏枕辰張茂先詩伏枕終遙昔寤言莫豫應也趙云公為工部員外郎而不得坐省所以為曠絶其舍下句則公言其病也詩云寤寐無伏枕轉伏驂雙闕早回鴈五湖春謝𤣥暉停驂我悵望沈休文旋鴈每回翔趙云上句則又言其不得朝謁而思入朝之士下句則言其在湘潭之間時侯也周禮揚州其浸五湖張勃吳録五湖者太湖之别名以其周行五百里故名之或說太湖射貴湖上湖洮湖滆湖按國語吳越戰於五湖直上笠澤一湖中戰耳則知或說非也蓋太湖一名震澤一名笠澤一名洞庭也古稱鴈不過南嶽故衡山有回鴈峯不逹長卿病從來原憲貧見上長卿多病注弟一篇難甘原憲貧注趙云上句長卿有消渴之疾而公亦同之故自怪其不省解如此公每以原憲自比其貧監河受貸粟一起轍中鱗見莊子轍魚事貧趙云句則有求於蕭使君矣莊子曰莊周家故往貸粟於監河侯監河侯曰我將得邑金貸子三百金周忿然作色曰周昨來有中道而呼者顧視車轍有鮒魚焉問之曰子何為者耶對曰我東海波臣也君豈有斗升之水而活我哉周曰諾我將南逰吳越之王激西江之水而迎子可乎鮒魚忿然作色曰吾得升斗之水然活爾君乃言此曾不如早索我枯奂之肆奉送二十三舅録事之欇郴州崔偉賢良歸盛族吾舅盡知名趙云周禮友行以尊賢良賢則行之傑良則才之美故漢以為科目之名徐庶高交友劉牢出外甥徐庶謂先主曰諸葛孔明乃卧龍也將軍豈欲見之乎先主遂詣見柏𤣥曰何無忌劉牢之外甥酷似其舅今舉大事孰謂無成趙云上言言崔舅下句則公以何無忌自待也泥塗豈珠玉環堵但柴荆趙云曰上句又以言崔舅謂明珠白玉之質豈宜辱在泥塗乎下句則又公自言耳謝靈運初去郡云促裝反柴荆衰老悲人世驅馳厭甲兵趙云公又自言年之衰老在人世為可悲公之所以驅馳流寓豈不厭當時冇甲兵之亂乎氣春江上别淚血渭陽情謝𤣥暉江上徒離憂詩我送舅氏曰至渭陽趙云上句道其别之時與别之處淚血則所謂淚盡繼之以血晉書世無渭陽情舟鷁排風影林烏反哺聲趙云上句言崔舅之船下句則崔舅應侍太夫人以行也晉成公綏烏賦序曰烏之為瑞久矣以其反哺識養故為吉鳥李善注文選有曰純黑而反哺者烏也束晢補亡詩云嗽嗷林烏受哺子子永嘉多北至句漏且南征永嘉之亂元帝渡江衣冠多自北至葛洪求為句漏令以有丹砂也楚詞泊吾南征舅趙云上句言崔舅自北而來也下句言崔往郴州也必見公侯復終聞盜賊平趙云在傳公侯之子孫必復其始今句以見崔舅貴人孫也郴州頗涼冷橘井尚凄清趙云蓋以南方多熱而此郡獨凉矣橘井在郴州神仙蘇耽於山下鑿井種橘救鄉里之疾病者以井泉服一橘葉即已從役何蠻貃居官志在行趙云子曰言忠信行篤敬雖蠻貃之邦行矣又左傳曰當官而行何强之有今參用之矣送魏二十四司直充嶺南掌選崔郎中判官兼寄韋韶州趙云韋韶州者即前所所謂員外名迢者也選曹分五嶺使者厯三湘上句見雲山山兼五嶺注顔延年三湘謂洞庭七澤藹荆牧注江湘沅水皆㑹巴陵洞庭陂號為三湘蓋謂三江趙云上句言崔郎中之充嶺南掌選也下句則崔郎中出為使經厯三湘而往也三湘之名按樂史寰宇記云湘潭鄉湘源源也才美膺推薦君行佐紀綱詔周公之才之美左傳紀綱之僕趙云上句又以言魏為人所薦而為判官也下句則言魏君之行佐崔君之紀綱也書亂其絶綱禮云以為紀綱是已舊至引紀綱之僕何其下也佳聲期一作斯共逺雅節在周防趙云上句則魏崔皆著佳聲而共逺矣次句則戒魏之佐選事如下句也明白山濤鑒山濤前後選舉周編內外而並得其才所甄拔人物各為題目時稱山公啓事選趙云戒魏君之佐事當以公也嫌疑陸賈裝陸賈說南越尉他他賜賈槖中裝直千金趙云此又戒之以亷也今魏若往嶺南充掌選判官茍有千金之裝如陸賈則為嫌疑矣故人湖外少春日嶺南長趙云故又湖外客此是韋迢詩全句公改一字而精神健矣慿報韶州牧新詩昨寄將送趙十七明府之縣連城為寶重盧子諒連城既僞往荆玉得真還惠趙云連城事言和氏之璧也史記曰趙王得和氏壁秦昭王聞之使人遺趙王書願以十五城易壁今句云所以美趙十七也茂宰得才新杜補遺謝𤣥暉和伏武昌登孫權故城詩云雄圖悵若兹茂宰深遐眷故李太白贈義興宰詩亦云天子思茂宰天枝得英材趙云舊注指為卓茂誤矣山雉迎舟楫江花報邑人語曰山梁雌雉趙云上句則禽鳥知所馴下句則草木知所喜皆美言之蓋言江花時節報君之到也論交翻恨晚臥病却愁春趙云上句言公與趙君晚方論交也謝𤣥暉有在郡臥病呈沈尚書詩惠愛南翁悅餘波及老身趙云蓋言施惠愛而南人喜悅公自謂老身亦霑其餘波也漢項籍傳云南公禹貢云餘波及于流沙而義則左傳云其波及晉國者君之餘也燕子來舟中作湖南為客動經春燕子銜泥兩度新見第二卷銜泥附炎熱注趙云燕子出家語延陵季子適晉曰異哉夫子之在此猶燕子巢于幕也兩度新則大厯四年五年之春四年在潭州城中今歲在舟中欲儘南往湖南也舊入故園常識主如今社日逺看人可憐處處巢居室古詩思為雙飛燕銜泥巢君室何異飄飄託此身暫語船檣還起去穿花落水益霑巾趙云至於霑巾則以飄飄託此身而有感也同豆盧峯貽主客李員外賢子裴知字韻鍊金歐冶子噴玉大宛兒張景陽七命楚之陽劒歐冶所營杜補遺云穆天子東遊黃澤宿于西洛謡曰黃之澤其馬噴玉皇人夀榖又賈復顧兒謂弟曰此吾宗大宛兒也一日千里亦可噴與噴同之趙云兩句以美李員外之子上句比之以劒下句比以馬歐冶事吳越春秋及絶書皆載載越王允常聘吳之歐冶子作名劒五枚引之以鍊金字在夲出雖無而道書有鍊金之術主言鍊以服食今借其字用耳大宛事前漢禮樂志馬生渥注水中詩云霑赤汙沫流赭應劭曰大宛馬汗血霑濡也符彩高無敵聰明達所為薛夢符補遺云按禮記君子比德於玉焉孚尹旁達信也注孚尹讀為浮􅀢謂玉采色也彩杜正謬曹子建七啓曰佩則結緑懸黎寶之微妙符照爛流景揚揮注結緑懸黎梁宋之寶符光景輝皆彩也左太沖蜀都賦金沙銀礫符彩彪炳魏文帝車渠碗賦苞華文之光麗發符彩而揚榮夢蘭他日應折桂早年知左傳鄭文公賤妾燕姑夢天使與已蘭曰以是為而子以蘭有國香人服媚之既而文公與之蘭而御之辭曰妾辛而有子將不信敢微蘭乎穆公名曰蘭也下句見禮新折桂注爛熳通經術光芒刷羽儀沈休文湖中鴈詩刷羽同搖漾易鴻漸于陸其羽可用為儀漸趙云班固幽通賦皇十紀而鴻兮有羽儀於上京謝庭瞻不逺潘省㑹於斯晉史謝太傳諸子若芝蘭玉樹生於庭階潘安仁寓直于散騎之省趙云今公乃工部員外郎李乃主客員外郎虛亦必官是省郎三人相㑹故云潘省㑹於斯記云歌於斯哭於斯唱和將雛曲田翁號鹿皮上句見五卷病柏詩注下句見五卷遣與詩注趙云樂府有鳯將雛之曲以鳯比李棐也鹿皮翁公自渭也歸鴈二首萬里衡陽鴈今年又北歸應德璉詩朝鴈鳴雲中音響一何哀問子遊何鄉戰翼正排徊言我塞門來將就衡陽樓往春翔北土今冬客南淮雙雙瞻客上一一背人飛雲裏相呼疾沙邊自宿稀繫書元浪語見雖無南過鴈注愁寂故山薇再吟欲雪違胡地謝靈運詩季秋邊朔苦旅鴈違霜處又嗷嗷雪中鴈鳴舉自委羽求凉弱水眉違寒長沙渚溫趙云列子曰鴈違寒就此違字祖出也先花别楚雲月令鴈北鄉管子曰鴈秋北春南言其避寒也楚南也故曰先花别楚雲却過清渭影高起洞庭羣塞北春隂暮江南日色曛謝靈運朝忌曛日馳又朝遊窮曛黑趙云春秋說題云厲之南北以陽動也故方欲雪而違背胡地以麥花欲開而乃先花以去言别楚雲亦據所詠鴈虎言之若又言清渭洞庭塞北江南則皆鴈往來之地矣傷弓流落羽行斷不堪聞更盈引虛弓而鴈落人問之曰此鴈傷弓也鮑明逺詩傷禽惡弦駕倦客惡離聲趙云傷弓字出處不専是鴈有曰傷弓之鳥驚曲木又曰傷弓之鳥必為期而於鴈言之則亦可矣舊注引更盈引虛弓而鴈落人問之曰此鴈傷弓也按此事出戰國䇿載魏如封春申君之言止云更羸謂魏王曰臣為王引弓虛發而下鳥有鴈從東方來更羸以虛發而下之魏王曰然則射可至此乎史亷曰此孽也即無傷弓字蓋意雖是而字非亦為模棱矣羸音力追反又非盈字小寒食舟中作佳辰强飲食猶寒隱几蕭條帶鶡冠漢輿服志虎賁武騎皆鶡冠南郭子綦隱几見莊子之趙云辰雖疆飲而其食猶是寒物此為小寒食言也鶡冠者隱人之冠也𡊮淑真隱傳鶡冠子或曰楚人隱居幽山衣敝履穿以弱為冠莫測其名因服成號著耆言道家馮諼常師事之俊顯於趙鶡冠子或其薦已也乃與諼絶舊注誤矣春水船如天上坐老年花似霧中看趙云有上夫傳黃魯直云前人詩有水靣船如天上坐村公改一春字而精神炯然可謂㸃鐵成金魯直之言如此但學者未見前人何人詩也次公獨見沈佺期釣竿篇亦曰人如天上坐魚似鏡中懸豈正是此句而傳者不審邪娟娟戲蝶過間幔片片輕鷗下急湍趙云世有王立之詩話載老杜衆諱間而詩中有云翩翩戲蝶過間幔或云恐傳之謬又有燕王使君宅詩云汛愛憐霜鬢留歡卜夜間一云上夜門余以謂皆當以開字為正臨文恐不自以為避也立之之說如此若次公以上夜夜閵於義方活具本詩解令則當以間字為正乃臨文不諱之說雲白山青萬餘里看雲直北至長安鮑明逺灞陵望長安徐敬業回首見長安王粲四首望長安一本作愁看直北是長安清明二首趙云此詩在潭州作蓋本歲大厯四年之清明也潭州舊曰湘州隋改為潭取昭潭名之今公詩使定王城賈誼井事所以知在潭州作公於今年春發嶽陽泛洞庭至潭州遂留終歲而次年春發長沙入衡陽則在湘潭見清明也朝來新火起新煙湖色春光浮客船周禮司烜氏仲春以木鐸修火禁於國中注謂季春將出火也故子美引新火而月也榆趙云按唐制清明日賜百官新火楊巨源清明詩曰栁芳辰火梧桐今日花賈島詩曰晴風吹栁絮新火起厨煙皆新火之證也以其繫舟在湘岸故云湖色春光繡羽銜花他自得紅顔騎竹我無緣射雉賦有綺翼繡頸郭伋傳小兒騎竹焉唐趙云繡羽者眼前所見父禽也銜花亦走禽之實事人詩有云鳥銜花落碧巖前若其宇則於佛書又有鹿銜花之類繡羽銜花紅顔騎竹此清明之景而妙處在他自得我無緣六字蓋島銜花而自得人之弗如也稚子騎竹之戲我不復然則老者之弗如也胡童結束還難有楚女腰支亦可憐趙云胡童結束似指言陜西之事蓋彼中有明商居焉則宜有之矣今於荆湖既難有矣而可憐者楚女腰支而已楚王有細腰宫故云不見定王城舊處長懷賈傅井依然定王則長沙定王也今長沙賈誼廟中有井存焉退之井詩亦云賈誼宅中今始見杜補遺盛𢎞之荆州記曰湘州南寺之東賈誼宅有井小而深上斂下大狀似壺即誼所穿井誼宅今為陶侃廟種柑猶有存者庾穆之湘州記同此虛霑焦舉為寒食事見柏談新論及汝南先賢傳也後漢焦舉博學迂并州刺史太原一郡舊俗以介子稚焚骸有龍忌之禁至其亡月咸言神靈禁舉大由是士民每冬中徹火一月寒食莫敢煙爨老小不堪歲多死者舉既到州乃作弔書以置子推之廟言盛冬去火非賢者意以宣示愚民使還溫食由是衆惑稍解風俗頗革新序曰晋文公反國子推無爵遂去之綿上文公求之不得焚其山推推不出而死事具耿恭傳龍星木之位也春見東方心為大火之盛故謂之焚火俗傳子推此日被焚而禁火也為趙云公詩意亦是用此似言寒食舉火而得溫食甚所宜然當客寄不足於饌為虛霑耳故有下句百錢之須然漢周舉事謂之焦舉豈其一時之誤或傳寫之錯或别有姓焦名舉事出處乎又今時寒食非在二月則在三月而謂之盛冬去火殘損民命又所不解實藉嚴君賣卜錢見上憑將百錢卜注鍾鼎山林各天性濁醪粗飯任吾年薛云按酒經曰醪汁滓酒也世本曰儀狄始作酒醪變五味也趙云擊鍾而食列鼎而亨此鍾鼎之義富貴人之事山林則隱逸之人雖處貧賤而甘之則與好富貴者皆天性耳既無盛饌姑為粗飯而已濁醪則以終百錢為飲之義右一此身飄泊苦西東右臂偏枯半耳聾趙云素問黃帝之言風曰或為偏枯莊子云浸假化豫右臂以為彈寂寂繫舟雙下淚賈誼傳不繫之舟悠悠伏枕左書空見上咄已書空注以右右臂偏枯故書空用左也十年蹴踘將雛逺劉向别録蹴踘黃帝所造本兵勢也或云起於戰國按踘與毬同古人蹴踘以為戲趙云太平揔類寒食門載劉向别録曰寒食蹴踘黃帝所造云今言攜妻子子在外見清明者十年矣古樂府冇鳯將雛之曲成公綏嘯賦又云似鴻鴈之將雛萬里鞦韆習俗同古今藝術圖曰鞦韆北方戲以習輕趫趙云言其去鄉之逺也旅鴈上雲歸紫塞蕪城賦紫塞鴈門杜門杜補遺云崔豹古今注秦所築長城土皆紫色漢塞亦然故稱紫塞子美官池春鴈詩又有青春欲盡急還鄉紫塞寧論尚有霜之句家人鑽火用青楓鑽燧改火春取榆柳之火以順陽行火氣趙云楊巨源清明詩云榆桞芳辰火秦城樓閣煙一作鶯花裏漢主山河綿繡中荆州劉備所自起故言漢主山河風水春來洞庭闊白蘋愁殺白頭翁趙云四句則懷長安而嘆其在湘潭也梁栁惲江南曲曰汀洲採白蘋壺三老上書曰夢白頭翁教之而魏文帝書曰已成老翁但未頭白耳右二贈韋七贊善鄉里衣冠不乏賢杜陵韋曲未央前未央殿基在長安杜陵韋曲地名也有杜補遺云袁粲字景倩幼孤祖哀之曰愍孫少好學清才叔父淑雅重之語子弟曰我門不乏賢愍孫必當復三公爾家最近魁三象公自注云斗魁下兩兩相比為三台趙云言其祖為三公也時論同歸一作因侵尺五天公自注俚語曰城南韋杜去天尺五北走關山開雨雪南遊花桞塞雲煙洞庭春色悲公子蝦菜忘歸范蠡船趙云言韋戀南地之蝦菜而忘歸如范蠡之遊五湖也奉酬冠十侍御錫見寄四韻復寄冠往别郇瑕地左傳郇瑕晉地于今四十年來簪御府筆魏略曰殿中侍御史簪白筆側階而立上問曰此何官也辛毗對曰此謂御史簪筆書過以奏不法故泊洞庭船詩憶傷心處楚詞目極千里兮傷春心趙云選云愀愴傷心春深把臂前廣絶交論自昔把臂之英金蘭之友趙云兩句言在郇瑕相見作别之時東觀漢記朱暉與張堪相見接以友道堪至把暉臂曰欲以妻子託朱生南曕按百一作有越黃帽待君偏趙云前漢鄧通蜀郡南安人也以濯船為黃頭郎顔師古注曰濯船能插濯行船也土勝水其色黃故刺船之郎皆著黃帽因號曰黃帽郎濯讀曰擢音直孝切寇君既按百越則所在處常艤舟以待故其帽偏也杜員外兄垂示詩因作此寄上郭太受傳新詩海內流傳遍舊德朝中屬望勞趙云傅𤣥厯九秋篇云奏新詩兮夫君易云食舊德也郡邑地卑饒霧雨見爽携卑濕地注江湖天闊足風濤顔延年春江壯風濤醪酒熟旁看醉趙云松醪酒在唐有之所謂松醪春蓮葉舟輕自學操列子顔回問仲伲曰吾常濟乎觴深之淵操人操舟若神吾問曰操可學乎曰可善游者數習而後能小說太一真人乘蓮葉舟郭借用云春興不知凡幾首衡陽紙價頓能高自衡陽出武家紙又云出五里紙都邢子才茍一文出京師為之紙貴庾闡造揚賦成偉麗時人相傳爭寫為之紙貴洛新添左思三都賦成豪貴之家競相傳寫陽為之紙貴酬郭十五判官郭受才微歲老尚虛名臥病江湖春復生趙云曹操言襧衡曰顧此人素有虛名也莊子曰身在江湖之上藥裏關心詩揔廢花枝照眼句還成趙云彭祖云服藥千裏不如獨卧劉孝威擬古應教云誰家妖冶折花枝鮑照堂上歌行去萬曲不關心梁武帝春歌云階上香入懷庭中花眼照只同燕石能星隕左傳隕石于宋五隕星也又星隕如雨荀子曰宋之愚人得燕石於梧臺之東以杜補遺闞子曰宋之愚人得燕石于梧臺之側藏之為大寶周客聞而觀焉主人齊七日端冕元服以發寶革匱十重中十襲客見俯而掩口盧胡而笑曰此燕石也其與瓦甓不殊主人大怒曰育瞽之言醫匠之心藏之愈固守之愈謹自得隋珠覺夜明隋侯之珠夜光之璧喬口橘洲風浪促繫帆何惜片時程橘洲見上十六卷橘洲田土仍膏腴在趙云喬口潭州衡州送李大夫赴廣州斧鉞下青冥樓船過洞庭漢武征南越作樓船征趙云禮記云賜斧鉞然後故漢魏以來為將者多言仗斧鉞今廣州節度主兵得使斧鉞字矣樓船者應劭云大船上施焉也漢武帝大修昆明池治樓船高十餘丈帝秋風辭云泛樓船兮濟汾河而官有樓船將軍焉北風隨爽氣南斗避文星登樓賦向北風而開襟王子猷西山朝來致有爽氣趙云北風以言其時詩云北風其涼南斗以言廣南按晉天天志自南斗十二度至須女七度為星紀為吳越之分野也晉天文志東璧二星主文章明則國多君子是謂文星也大中九年日官李景亮奏云於上象文星暗科場當有事沈詢為禮部侍郎聞而憂焉至是三科盡覆試北風之下故言爽氣南斗之下故言文星乃詩人之巧矣日月籠中鳥乾坤水上萍潘安仁池魚籠鳥趙云學者多不曉而妄為之說鶡冠子曰籠中之鳥空籠不出而左大沖詠史云習習籠中鳥舉翮蠲四隅劉伶曰俯觀萬物擾擾焉若江海之載浮萍而江文通擬王粲詩曰朝露竟幾何忽如水上萍於前人詩中有此籠中鳥水上萍六字故兩處取用混成為對其句蓋言我身於日月之下如籠中之鳥局而不伸於天地之中如水上之浮泛而無定非謂言以日月為籠而我為鳥以天地為水而我為萍也而學者率徇巳意過為穿鑿之遂以為渾合排偶之誤也長歌丈人行垂老見飄零過洞庭湖新添鮫室為青草龍堆隱一作擁白沙護隄一作江盤古木迎棹舞神沙破浪南風正回檣一作歸舟畏日斜湖光與天逺直欲泛仙槎一作雲山千萬疊底處上星槎聞惠子過東溪新添惠子白驢瘦歸溪唯病身皇天無老眼空谷滯斯人崖一作巖密松花熟一作古山杯一作村醪竹葉春杜田云陳隂鏗竹詩葉醖宜城酒柴門了生事黃一作園綺未稱臣九家集注杜詩卷三十六
