body:
  text: 九家集注杜詩卷十八宋郭知逹編近體詩奉寄河南韋尹丈人甫故廬在偃師承韋公頻有訪問故有下句有客傳河尹逢人問孔融孔融公自比也李趙云言見問者何南尹也膺問河南尹而孔融造門為上客青囊仍隱逸章甫尚西東郭璞受業於鄭公以青囊書與之孔子生於魯嘗冠章甫之冠長於宋故衣逢掖之衣章甫儒冠趙云孔子嘗曰丘也東西南北之人也謂其身挾青囊而隱逸冠章甫而西南其著仍與尚字則公言河南尹問人之辭也鼎食為門户詞場繼國風列鼎而食門户閥閲也詩列國之風能趙云上句言河南尹之貴下句言河尹詩尊榮瞻地絶疏放憶途窮言地望崇重也阮籍詩途窮能無慟趙云任彥升作竟陵王行狀有曰地尊禮絶疏放公自謂也憶途窮則又言河尹憶問之濁酒尋陶令丹砂訪葛洪王𢎞九月九日送酒與陶潛潛得之便飲而歸謝混濁酒聊自適晉葛洪字稚川欲祈遐夀聞交趾出丹砂求為勾漏令年趙云放意於杯酒故尋陶令祈心于遐故訪葛洪江湖漂短褐霜雪滿飛蓬短一作裋淮南子霜雪亟集短褐不完褐毛布詩首如飛蓬趙云短褐並見上北征詩注飛蓬言髮飄亂如之久在江湖之間故云漂短褐髮如飛蓬而霜雪滿言其白也竊又謂霜雪非以言髮之白乃真所謂霜雪者蓋公詩作于潭州適當冬時兩句述其羇旅流漾江湖故短褐為江湖所漂犯冒霜雪故飛蓬之髮為霜雪所滿此又可考作詩時節為冬時甚明二説以俟明識牢落乾坤大周流道術空趙云上林賦牢落陸離易繫辭云周流六虗言天地廣大而我獨牢落雖挾道術竟於周流之際成空而無用莊子云古之道術有在於是謬慙知薊子真怯笑揚雄後漢方術傳薊子訓有神異之道公卿以下侯之者常數百人解嘲曰子乃以鴟梟而笑鳳凰子徒笑我玄之尚白吾亦笑子之病不遭扁鵲悲夫周趙云揚雄注太玄人皆笑之至以為可覆醬瓿惟其流道術空故繼之以今兩句盤錯神明懼謳歌德義豐虞詡曰不遇盤根錯節何以知利器趙云此言韋尹為政之能謳歌如鄭歌子産漢歌岑君是也尸鄉餘土室難説呪雞翁一作誰話後漢地里志偃師有尸鄉列仙傳呪雞翁居尸鄉下養雞百餘各有名字呼名則種别而至趙云舊本又云一作誰話鬪雞翁公題下注云故廬在偃師云云以義詳之難説字當以誰話為正鬪雞翁無義當以呪雞翁為正蓋言誰人話及呪雞翁乎惟我韋丈人而已或云難説謂難説得到也衆人難得説到而韋丈人獨念之亦有義然講解費力對雨書懷走邀許主簿東嶽雲峯起溶溶滿太虗趙云楚詞云雲容容兮雨𡨕𡨕字異而義同震雷翻幕燕襄二十九年傳公子朝曰夫子在此猶燕巢于幕上驟雨落河魚河一作溪趙云舊本一作溪魚非蓋幕燕字出左傳不應以溪魚無出處為對河魚固言河中之魚亦以左傳有河魚腹疾雨中魚落今亦有之座對賢人酒門聼長者車魏志徐客傳鮮于輔云醉謂酒清為聖人酒濁為賢人陳平家貧居陋巷以席為門然門外多長者車轍趙云座對賢人酒則徒有酒而已故聼長者車之相訪也既未有過之者於是相邀許簿矣相邀愧泥濘騎馬到階除趙云魏都賦中逵泥濘山簡傳云時時能騎馬登樓賦循階除而下降已上人茅齋已公茅屋下可以賦新詩趙云潘安仁秋興賦序云偃息不過茅屋茂林之下蘇子卿云可以慰嘉賔阮嗣宗云可以慰我心劉公幹云可以薦嘉賔下四句乃可賦者也嵇叔夜琴賦云臨清流賦新詩衡門之下可以棲遲枕簟入林僻茶瓜留客遲趙云枕簟字禮記斂枕簟江蓮搖白羽白羽扇也天棘蔓舊本作夢青絲杜正謬夢當作蔓天門冬荆湘間謂之天棘抱朴子及博物志皆云天門冬一名巔棘以其刺故也然不載天棘之名豈非方言歟本草圖經云天門冬生奉髙山谷今處處有之春生藤蔓大如叉股髙至丈餘葉如茴香極尖細而疏滑有逆刺亦有澀而無棘者其葉如絲而細散皆名天門冬以此考之則天棘為天門冬明矣一本作天棘然本草及爾雅諸書並無此名必有博物者能辨之冷齋夜話云王仲至言天棘非煙非霧自是一種物曾見一小説今忘之矣髙秀實云天棘天門冬也見本草其枝蔓延疑蔓字非夢也然本草天門冬一名巔棘王元之詩水芝卧玉腕天棘蔓金絲則天棘蓋栁也學林新編云天棘蔓青絲今改蔓為夢蓋天門冬亦名天棘其苗蔓生好纒竹木上葉細如青絲寺院庭檻中多植之可觀後人既改蔓為夢又釋天棘為栁皆非也胡仔曰按本草載抱朴子云天門冬或名巔棘冷齋學林二説遂以為天門冬何也其引王元之天棘蔓金絲又以為桞亦何所據蔡伯世云此句最疑學者或曰梵語名桞為天棘又近傳東坡杜記事實一編更以王逸少詩云湖上春風舞天棘為證因悟夢字乃由舞字之訛缺况以上句考之正應用草木為對偶非有奧義也趙云天棘蔓青絲其蔓字是歐陽文忠家善本未見善本已前惑於夢字之義羣説紛紛如洪駒父云嘗問於山谷山谷云不解又問王仲至仲至云出異書洪覺範作泠齋夜話又引髙秀實之言蔡伯世又以近傳東坡事實所引王逸少詩為證其説不一然東坡事實乃輕薄子所撰豈有王羲之詩既不見不集而不載别書乎且既使真是王詩亦何所據而謂之桞乎此因王元之詩句而添撰也又有所謂杜陵句解者南中李歜所為也且云聞於東坡云是天棘弄青絲此求夢字之説不得遂取夢字同韻之字補之然弄字於青絲為無交涉矣髙秀實之説頗為是明矣杜田亦知引此余竊謂王元之詩天棘舞金絲正是用杜詩若指言天門冬亦自有金絲之實本草注又云葉細似蕰而微黃是也洪覺範安知王元之不見詩山善本知蔓青絲之義而用之乃遂強解之為桞乎若谷仲至皆大儒博雅以不見善本為夢字所迷而仲至不為無可譏也且其題自是已上人茅齋亦一幽居之僧耳茅齋前有何非煙非霧之異物乎其言江蓮搖白羽亦不過種之盆甕中而花如白羽之搖以明其雖種於茅齋之前而蓮乃江蓮也則對天棘蔓青絲乃是種天門冬枝枝條延蔓如青絲之長自足以形容幽居之景物何逺求他物以當天棘邪江之蓮天之棘抑亦公自造耳孟子曰猶白羽之白蕭子範之言馬曰韁以紫縷繫以青絲空沗許詢輩難酬支遁詞支遁字道林講維摩經遁謂衆議無以厯言許詢設一難遁不能復通遁趙云蓋言我空沗為許詢之流而難酬對支所以美已上人也房兵曹胡馬詩胡馬大宛名鋒稜瘦骨成漢伐大宛獲汗血馬作西極天馬之歌趙云古詩胡馬嘶北風李陵書云舉刃指麾胡馬奔走陸士衡漢髙祖功臣頌曰韓王窘執胡馬洞開蓋凡西北之馬皆謂之胡馬漢天子初發易卜曰神馬當從西北來得烏孫馬好名之曰天馬及得大宛國汗血馬益壯遂更名烏孫馬曰西極馬而以天馬名大宛之馬如是則胡馬得大宛名者豈不貴乎竹批雙耳峻風入四蹄輕劉孝標詩四蹄不起塵削趙云後魏賈思協載相馬經耳欲鋭而小如筒則所謂竹批矣故公李丈人故馬行又曰頭上鋭耳批秋竹魯國黃伯仁為龍馬頌云雙耳如􅗄筒相馬法不取三羸五駑其一羸是大蹄其一駑是緩耳而劉義恭白馬賦有竦身輕足故公詩於耳言峻於蹄言輕也所向無空闊真堪託死生如髙歡之的盧是可託死生也鄭之小駟則異於此趙云兩句是一義如世説載劉備之初奔劉表屯於樊城表左右欲因會取備備覺如厠便出所乘馬的顱曰今曰厄可不努力的顱逹備意一踴三丈得過又如劉牢之為慕容垂所逼策馬跳五丈澗而脫此其事也驍騰有如此萬里可橫行顔延年赭白馬賦藝品驍騰畫鷹素練風一作如霜起蒼鷹畫作殊趙云素練絹也因其畫鷹故風霜起若作如霜則止言綀之白而已又起字無分付非是悚身思狡兔悚身猶竦身也孫楚鷹賦擒狡兔於平原史記狡兔死良犬烹側目似愁胡隋魏彥深鷹賦立如植木望似愁胡趙云悚音竦義亦同鷹事中有竦翮而升之語鷹常傾側其目故傅玄賦曰左看若側右視如傾晉孫椘鷹賦深目蛾媚狀如愁胡故公於王兵馬使二角鷹詩亦云目如愁故視天地絛鏇光堪擲軒楹勢可呼絛鏇所以縶鷹句趙句上句則所畫絆鷹之絛鏇也光而堪擲取焉下則置畫於軒楹之間其勢如真可呼也孫楚賦云麾則應機招則易呼魏彥深鷹賦姦而難有往不可呼何當擊凡鳥毛血灑平蕪師云凡鳥以况小人班固西都賦風毛雨血灑野蔽天趙云陳孔璋為曹洪與魏文帝書有園囿凡鳥之語而吕安見嵇喜題門作鳯字􅏺其凡鳥則又出于此毛血灑字亦暗使鷹事有獻鷹於楚文王者王時獵雲夢鷹聳翮而升須臾毛墮若雪血灑如雨有大鳥墜地博物君子曰此大鵬雛也言其畫之真有翻韝掣臂摶噬之志可見矣公於楚薑公畫角鷹落句乃云梁間燕雀休驚怕未必博風上九天則以􅏺徒有形而無其實者一曰何當一曰未必諸人變化之妙如此與李十二白同尋范十隱居李侯有佳句往往似隂鏗陳書隂鏗字子鏗五嵗能誦詩賦及長博涉史傳亢善五言詩為當時所重無趙云鏗詩雖見藝文類聚恨全集可考余亦東蒙客憐君如弟兄師云子美居齋兖故云東蒙客也故趙云東夢山名乃詩所謂龜蒙之一也以其在東謂之東蒙公在兖州故曰東蒙客此兩句却不對不知此格何以謂之近體也醉眠秋共被薑肱兄弟同被而寢携手日同行師云詩衛北風惠而好我携手同行使趙云前句憐君如弟兄故於共被中暗薑肱事又晉祖逖劉琨情好綢繆共被而寢更想幽期處還尋北郭生列子與北郭生連牆而不相通子趙云北郭生指言范十隱居也舊注引列所載乃南郭生耳入門髙興發侍立小童清趙云殷仲文詩云猶有清秋日能使髙興盡鮑照園中秋散詩云臨歌不知調發興誰與歡黃帝曰異哉小童落景聞寒杵屯雲對古城趙云梁元帝纂要曰晚照謂之落井列之望之若雲屯焉謝靈運詩巖髙白雲屯向來吟橘頌張華有橘詩郭璞有贊謝惠連有賦誰欲討蓴羔陸機傳機嘗詣侍中王濟濟指羊酪謂機曰卿吳中何以敵此答曰千里蓴羹未下鹽豉時人稱為名對主杜正謬楚詞自有橘頌非橘詩贊賦也趙云橘頌意言其受命之不遷耳蓴事即是張翰在齊王冏府冏時執權翰憂禍及因見秋風起乃思吳中菰菜蓴羹鱸魚曰人生貴得適志何能羈宦數千里以要名爵乎遂命駕而歸俄而冏敗人以為見機今詩意作謂其身與李白范隱居並吟誦屈原之橘頌守已之有素又誰肯待倦遊睹秋風而後思蓴羹乎舊注皆非不願論簮笏悠悠滄海情趙云惟其前句如此故無復簮笏之願而欲寄情滄海也臨邑舍弟書至苦雨黃河泛溢隄防之患簿領所憂因寄此詩用寬其意二儀積風雨百谷漏波濤老子江海為百谷王聞道黃河坼遙連滄海髙趙云易有太極是生兩儀言天地也廣雅云天地曰二儀以人參之曰三才薛道衡祭江文帷蓋靜於波濤西都賦帶以洪河涇渭之川選東燭滄海又東臨滄海職司憂悄悄謂當職司水之官司師云詩職其憂郡國訴嗷嗷趙云詩憂心悄悄後漢有郡國志選詩衆人何嗷嗷職司指上位之人也郡國則水所及者非一州舍弟卑棲邑趙覽為主簿人謂之棲鸞於枳棘言位卑下防川領簿曹尺書前日至版築不時操以版築夾土而築也書説築傳巖之野也趙云此言書中云水遽至不得即時操版築以防之古詩客從逺方來遺我尺素書顔師古注云今俗言尺書或言尺牘乃其遺語耳難假黿鼉力江淹方駕龜鼉以為梁空瞻烏鵲毛淮南子云烏鵲填河七趙云言無是物為橋梁也紀年曰周穆王三十年東至于九江比黿鼉以為梁古傳七夕鵲為橋以波纎女也燕南吹畎畝趙云孟子畎畝之中濟上沒蓬蒿泛濫至於燕南濟上皆漂沒也莊子蓬蒿之間螺蚌滿近郭趙云為螺為蚌蛟螭乘九臯濫濫故螺蚌在陸蛟螭在霄漢也趙云選或藏蛟螭詩鶴鳴于九臯徐關深水府碣石小秋毫徐關碣石皆地名書碣石入于河送趙云燕南濟上徐關碣石皆齊州近璄後有舍弟頻赴齊詩三首有曰徐關東海西有曰長瞻碣石鴻可以椎見白屋留孤樹青天失萬艘趙云上句言屋已漂矣惟孤樹存下句言萬艘乘漲速去青天長逺之間頃刻之中望之若失矣吳志趙咨傳魏文帝曰吳王頗知書否咨曰吳王浮江萬艘帶甲百萬吾衰同泛梗利涉想蟠桃山海經曰東海有山名度索山有大桃屈蟠三千里名曰蟠桃趙云論語甚矣吾衰也周易利涉大川齊地接東海而蟠桃在東海故因水漲而觀萬艘去之之速可以利涉想望之也賴倚天涯釣猶能掣巨鼇賴一作却列子言龍伯國天人一釣連六鼇趙云釣鼇亦東海中事過宋員外之問舊莊員外季弟執金吾見知於代故有下句宋公舊池館零落守陽阿守一作首阿山阿也山趙云伯夷叔齊隱於首陽史記注云在河東蒲坂華山之北河曲之中之問乃汾州人去河中皆晉地則宜為首陽矣舊作守陽則無義况詩有首陽之巔首陽之下而潘嶽詩有首陽岑則首陽阿依倣為熟或云公方在齊地而此便驀大河在晉地為可疑然隔此一篇是送蔡希魯還隴右則已在長安矣枉道秪從入吟詩許更過趙云凡枉道而遊者猶任其入况能吟詩者而不許其過乎則公自負可知矣蓋以宋公平生好詩故也淹留問耆老寂寞向山河趙云淹留駐之義欲問耆老員外平日事員外亡矣其莊空存對此山河徒寂寞耳楚詞胡為乎淹留莊子恬淡寂寞禮記秋食耆老劉越石云如彼山河孟子乃屬其耆老而告之更識將軍樹悲風日暮多馮異每所止舍諸將並坐論功異常獨屏樹下軍中呼為大樹將軍之趙云公題下自注云云則以馮異比員外之弟也考唐史之問有二弟曰之悌者史載其以驍勇聞又曰長八尺開元中厯劒南節度使既事流竄復為擊蠻㧾管但止附之問傳尾而無正傳不載其為金吾將軍今因公自注見之之悌既為金吾將軍則公題莊舍指其大樹宜矣夜宴左氏莊風林纎月落衣露淨琴張師云張綽詩雲哀挂纎月庾信詩獨識淨琴意趙云纎月初生月也古兩頭纎纎詩曰兩頭纎纎月初生衣露淨琴張此句亦似艱閟蓋言當月落之際衣上有露而拂于琴以張之則淨莊子之名人名率用用義理寓言為之有子琴張用張琴為名也此琴張因可使矣東坡詩云新琴空髙張絲聲不附木亦有琴張字暗水流花徑師云孫登詩暗水度潛溪春星帶草堂趙云吳都賦云帶朝夕之濬池佩長洲之茂苑注云帶佩猶近也又魏都賦曰列宿分其野荒裔帶其隅則帶字又可單用不必以襟帶佩帶為類也檢書燒燭短看劒引杯長看一作説一作煎茗酣師云古詩看書怯燭殘因話録徐世長看劒飲酒酒舞劒狂不知止趙云謂之檢書則必尋討事出之類檢或未獲宜乎燒燭至於短此理之常然因看劒而豪氣生於此快飲亦宜引杯長矣東坡有云引杯看劒話偏長正使此句一作煎茗無義又作説劒亦未必因之而長引杯又説劒犯莊子不應只用檢書為對詩罷聞吳詠扁舟意不忘吳詠作吳人詠詩聲也趙云惟其聞吳詠故動扁舟之興送蔡希魯都尉還隴右寄髙三十五書記時哥舒入奏勒蔡子先歸蔡子勇成癖癖好著也如王濟馬癖和嶠錢癖杜預左傳癖之義彎弓西射胡曹子建白馬篇宿昔秉良弓楛矢何參差控弦破左的右發自摧月支趙云前漢書士不敢彎力而報怨西射胡義分明舊注却引曺子建詩控弦破左的右發摧月支左的自是射的月支自是射貼名假使錯認月支是胡名亦何干也健一作男兒寧鬪死世説桓車騎使健兒鼓行劫鈔壯士恥為儒酈食其傳沛公不喜儒諸客冠儒冠來者沛公輒溺其中引趙云健兒強健之兒非今日黥面者故對壯士舊注世説却是項羽目樊噲曰壯士也恥為儒此乃治天下當用長槍大劒何用毛錐子之類舊注非公嘗有句云健兒勝腐儒官是先鋒得材緣挑戰須先鋒謂先師衆而行也鋒取鋒鋭之義挑戰挑之使戰如左傳云致師漢髙祖紀項羽謂曹咎曰謹守成臯即漢欲挑戰勿與戰李竒曰挑徒了切臣瓉曰挑戰擲嬈敵求戰也皆趙云國志蜀馬謖傳云魏延吳一論者言宜令為先鋒身輕一鳥過槍急萬人呼輕健如飛鳥李廣趫健人目為飛將軍呼驚呼也趙云前敘其得官之因今方以美之也廬陵嘗云陳公從易初得杜集至身輕一鳥其下脫一字因與數官各補之或云疾或云落或云起或云下莫能定及得善本乃過字陳公歎服雖一字不能到也雖然過字蓋使家語見飛鳥過及莊子猶鳥雀蚊虻之過乎前又張景陽雜詩人生瀛海內忽如鳥過目而公亦屢使鳥過字如愁窺髙鳥過諸君猶不至是亦未之思耳然兩句好處尤在槍急字非身輕而槍急何以致萬人之呼雲幕隨開府幕府以幕為府也西京雜記成帝設雲幕於甘帛春城赴上都赴一作入也趙云此言哥舒入奏唐史天寶十一載翰加開府儀同三司冬入朝今公云春城豈由冬末而涉春乎凡大將則有幕府見李廣傳注古樂府春城起風色開府字晉宋以來官號亦用矣班固賦云隆上都而觀萬國也馬頭金匼匝古詩白馬黃金羈驄馬金絡頭駝背錦模糊以駝負錦也狀趙云金匼匝言金絡頭其密而匼匝鮑照白紵歌云雕屏匼匝祖帳舒駝背負物而以錦帕蒙之此之謂模糊公詩有云子璋髑髏血模糊亦遮蓋之義匼匝模糊皆方言咫尺雪山路郭義恭志廣曰西域有白山通嵗有雪亦名雪山班固贊曰定逺慷慨専功西遐坦步䓤雪咫尺龍沙注言不以為逺也歸飛西一作青海隅言歸隴右也趙云此謂希魯先勒還隴右視雪山咫尺不以為逺故歸飛西海隅也上公猶寵鍚上公哥舒翰寵錫希魯突將且前驅師云曹植賦突將猛快未趙云上公言哥舒翰猶有錫命已固當少住則蔡子突將當往為前驅以先歸舊注以為錫賚希魯非是詩為王前驅石季倫王明君辭前驅已抗旌漢使黃河逺漢使張騫窮河源涼州白麥枯漢桓帝時童謡曰小麥青青大麥枯誰當穫者婦與姑丈夫何在西擊胡足杜正謬唐陳藏器本草云小麥秋種夏熟受四時氣兼有寒溫麵熱麩泠宜其然也河渭以西白麥麵涼以其春種闕二時之氣故也以地理志考之涼州正在河渭之西其出白麥蓋土地所宜下趙云翰為河西節度使故言黃河逺暗用張騫比之句言其地其時也公詩送髙書記亦云崆洞小麥熟且願休王師亦言麥以志時矣因君問消息問髙消息也好在阮元瑜王粲傳陳留阮瑀字元瑜少受學於蔡雍建安中都護曹洪欲使管記室瑀不為屈趙云此題所謂因寄髙書記也記室乃書記之任春日憶李白白也詩無敵敵一作數飄然思不羣趙云此詩破頭兩句已對呼人名為某也起於左傳而回也賜也之類在類語尤多今所謂白也却犯檀弓孔白之母死而不喪子思曰為伋也妻者是為白也母不為伋也妻者是不為白也母有此兩字故對飄然爾雅曰回風為飄白是人名飄是風名方是可對晉成公綏嘯賦有云心條蕩而無纍志離俗而飄然舊正作詩無敵雖有仁者無敵用真儒無敵於天下用對不羣字則史有爽邁不羣逸志不羣獨立不羣也小注又作無數則如食力無數修爵無數其無敵不若無數蓋下言不羣則已是無敵矣不應更疊意也今此亦松公寄言於為戲露出消息以示太白以為對屬須字有出處然後為公之意乎其云細論文亦在是也清新庾開府蕭揚州薦士表辭賦清親陸雲别傳雲亦善為文清新不及機俊逸鮑參軍鮑照字明逺為臨海王參軍鍾嶸曰鮑參軍詩如野鶴鄱雲良馬走隄俊逸奔放説趙云世説注有云文翰清新自有摯虞之妙俊逸世載謝安目支道林如九方臯相馬略其玄黃取其俊逸庾鮑所以比白庾信在周為開府鮑照在宋為參軍二人本傳及其文集序與夫諸人議論如鍾嶸詩品初無清新俊逸之目則自杜公品之也今讀其詩信然渭北春天樹江東日暮雲事見昔遊詩江淹詩曰日暮碧雲合行趙云此以引末句之意公於凡寄逺及送或居此念彼則於兩句內分言地之所在渭北指言咸陽咸陽在終南山之南渭水之北故得名時白在會稽越州也斯江東矣何時一樽酒重與細論文沈休文勿言一樽酒明日難重持趙云蘇子卿云我有一樽酒欲以贈逺人魏文帝著典論有論文而至於廋信詩云論文報潘嶽詠史答應璩今云論文而至於細則臻其妙矣非李杜莫造也若兩句之勢亦孟浩然何時一杯酒重與李膺傾者矣贈陳二補闕世儒多汩沒汩沒不振之貌夫子獨聲名趙云夫子指陳補闕禮記聲名洋溢乎中國獻納開東觀謝朓詩獻納云臺表後漢和帝幸陳觀覽書林閲篇籍博選術藝之士以充其官序趙云兩都賦日月獻納君王問長卿司馬相如字長卿上讀字虗賦而善之曰朕獨不得與此人同時哉狗監楊得意侍上曰臣邑人司馬相如自言為此賦上驚乃召問相如左傳曰與君王哉髙紀韓信曰項羽背約而王君王於南鄭禮記西方有九國焉君王其終撫諸范增曰君王為人不忍又曰天下事大定矣君王自為之皂雕寒始急天馬老能行所謂窮而益堅老而益壯也自到青冥裏休看白髮生言自可致於青霄之上無以老自怠也趙云大宛國汗血馬謂之天馬以其先乃天馬之種也楚詞載青冥而攄虹寄髙三十五書記適歎息髙生老新詩日又多美名人不及佳句法如何按新唐書適五十始為詩即工以氣質自髙每一篇已好事者輒傳之趙云漢蔡雍師賦曰詠新詩以悲歌句法本是佛書有法句經而詩句之有法亦然故公於詩句問其法如何主將收才子崆洞足凱歌聞君已朱紱且得慰蹉跪趙云主將哥舒翰也翰為河西節度使以適為掌書記崆洞隴右山名足凱歌言其必勝也軍捷而還則奏凱歌出周禮朱紱雖出易乃芾字而曹子建用則是朱紱字江淹雜體詩用敝字義皆同朱紱則賜緋之謂送裴二虬作尉永嘉孤嶼亭何處天涯水氣中嶼島嶼也故人官就此絶境興誰同趙云永嘉乃唐之溫州倚郭縣屬江南道故曰水氣中孤嶼亭想是永嘉縣尉司景物故人則指裴二就此同境則指孤嶼亭矣隱吏逢梅福漢梅福九江人補南昌尉家居常讀書養性為事至元始中王莽専政梅福一朝棄妻子去九江人補南昌尉家其後見福於會嵇者更名姓為吳市門卒所謂隱於吏矣裴趙云指言二也遊山憶謝公謝安石寓居會嵇與羲之遊處出則漁弋山水常往臨安山中坐石室臨濬谷雖放情丘壑然每遊賞必以妓女從也趙公謝公謂謝靈運為永嘉守好遊山水當時號之謝公今積穀山南有謝公巖焉郡又有東山公登東山望海詩云開春獻初嵗白日出悠悠可以見其遊山之實矣舊注非扁舟吾已就一作具把釣待秋風張翰見秋風起乃思吳中蓴羹鱸魚鱠遂命駕東歸也郡趙云待秋風而把釣是時鱸魚可鱠也張翰吳人正是吳中事城西陂泛舟趙云北渼陂也在鄠縣西五里後篇有與源大少府遊陂詩應為西陂好可知也青蛾晧齒在樓船見大人食刀詩注杜補遺宋玉笛賦曰嚴春使午子延長頸奮玉手摛朱唇耀皓齒吟清商起流徴朱買臣傳詔買臣到郡治樓船趙云宋南平王白紵舞曲曰佳人舉袖曜青蛾相如賦皓齒粲爛橫笛短簫悲天逺趙云隋江總梅花落詩橫梅短簫悽復咽春風自信牙檣動庾信賦鐵軸牙檣絲趙云古歌辭象牙作帆檣緑何威蕤遲日徐看錦纜牽吳甘寧以錦纜牽船隋煬帝錦纜龍舟魚吹細浪搖歌扇燕蹴飛花落舞筵以扇自障而歌故謂之歌扇搖則言浪之影也師云劉孝標詩屢將歌罷扇回拂影中塵不有小舟能蕩漿百壷那送酒如泉師云古詩舟子蕩漿遊韓奕詩清酒百壺兩趙云漿所以隱楫之處古詩艇子打槳灑如泉放左傳酒如澠之語也贈田九判官梁丘崆洞使節上青霄河隴降王欵聖朝欵納欵也舒趙云此詩乃哥翰獻捷之事崆洞隴右之山名也翰於天寶八載為隴右節度使與吐蕃戰于石堡城號神武軍軍上青霄言入朝見天子也蓋領吐蕃降王以朝矣宛馬總肥春苜蓿大宛國漢時通人嗜蒲萄酒馬嗜苜蓿後二師至宛取善馬遂採蒲萄苜蓿種而歸將軍祗數漢嫖姚漢一作霍霍去病為嫖姚校尉注嫖音頻妙姚音羊召反皆徑疾之貌今讀音摽搖者非趙云上句則得吐蕃之馬矣大宛最出善馬而吐蕃亦連彼一帶馬無不善者苜蓿所以飼馬肥春苜蓿則其人朝在春時也下句指言翰也嫖姚字在漢書音去聲而公作平聲使又常曰借問大將誰恐是霍嫖姚沈存中筆談亦嘗論矣豈杜公傳受為平聲邪無害於義蓋周庾信畫屏風詩押飄字韻末句云寒衣須及早將寄霍嫖姚又梁簫子顯日出東南隅行云押霄字韻而云漢馬三萬匹夫壻仕嫖姚陳留阮瑀誰爭長王粲傳始文帝為五官將及平原侯植皆好文學粲與北海徐幹字偉長廣陵陳琳字孔璋陳留阮瑀字元瑜汝南應㻛字德璉東平劉楨字公幹並相友善祖趙云以比田九也誰爭長則瑀在七子之中為勝太辟之為寧謀祭酒也左傳滕候薛侯來朝爭長京兆田郎早見招田奉為郎入奏事靈帝目送之曰堂堂乎張京兆田郎鳯字秀宗趙云又以比田九取其同姓見招字翻使左太沖詩馮公豈不偉白首不見招麾下賴君才並入獨能無意向漁樵麾下謂軍中旌麾之下漁樵杜公自謂也趙云言主將麾下賴田君之才與諸俊並入可獨能無意而甘心向于漁樵乎舊注以公自謂公時是布衣亦豈有便千人提挈入大將幕之理邪贈獻納使起居田舍人獻納司存雨露邊武后初置改以受四方之書謂之理使玄宗為獻納使趙云唐制獻納使掌受封事以獻天子蓋取兩都賦序日月獻納也論語籩豆之事則有司存雨露邊則言天子施恩澤之地地分清切任才賢劉公韓詩拘限清切禁起趙云此言田君之為起居舍人居舍人從六品上𨽻中書省斯為禁近矣舍人退食收封事唐以舍人給事中知匭事宫女開函近御筵函為匭函也宫女開函以所投封事奏御也趙云詩退食自公舊注引武后置理匭使玄宗改為獻納使其説是在天寶皆載帝以匭聲近鬼故也舊注又引唐以舍人給事中知匭事非是蓋至德元年方復理匭使之舊名至寶應元年命中書門下擇正直清白官一人知匭以給事中中書舍人為理匭使今舊注乃以中書舍人當起居舍人以理匭使為知匭以寶應事當天寶皆非田公以起居舍人為獻納使故公詩有舍人字矣曉漏追趨青瑣闥青瑣門也范彥龍詩攝官青瑣闥遙望鳯凰池晴窗點檢白雲篇薛云右按漢武帝秋鳯詩曰秋風起兮白雲飛淮南王安傳武帝每為報書及賜常召司馬相如等視草乃遣檢趙云漢宮室有青瑣門刻為連瑣之狀而青塗之點白雲篇蓋言天子親昵田君如此揚雄更有河東賦唯待吹噓送上天揚雄成帝時客有薦號文似相如還上河東賦此子美自比雄也故有待吹噓之句趙云漢成帝追觀先代遺蹤亦思欲齊其德號揚雄以為臨淵羡魚不如退而結網上自西嶽還雄上河東賦以勸令公自比於雄欲有所諷誎而上河東賦以田君為獻納使有吹噓之理舊注引有薦雄者考雄傅薦雄時止是甘泉賦乃附舊其説送韋書記赴安西夫子歘通貴雲泥相望縣雲泥猶貴賤之逺如雲之與泥趙云歘音許勿切有所吹起貌忽然而貴也詳公詩意則韋君亦貧困矣忽然通貴遂有雲泥之隔揚雄解嘲當塗者入青雲失路者委溝渠吳蒼與矯慎書遂有乘雲行泥之語晉丁彬書雲泥異途邈矣懸絶白頭無籍在無籍在朝列也籍如通籍之籍朱紱有哀憐曹子建俯愧朱紱有一作即趙云上句公自言也謂無所倚藉故用對哀憐字或一作籍為通籍之籍非惟不對又不連接上句又不指言誰人蓋以言韋君則既為官矣以言公身則作此詩時未曽有官也蓋後篇重過何氏云何路霑微祿歸山買薄田豈不明甚下句言韋為書記則服緋矣有哀憐則言朱紱之人有哀憐於我書記赴三捷采薇豈敢定居一月三捷注捷勝也三勝謂侵伐戰也公車留二年東方朔待詔公車師古曰公車令屬衛尉上書者所詣欲浮江海去此别意茫然公以道不偶時欲放迹於江海論語道不行乘桴浮于海車趙云三赴戰勝之地指安西主將也又以言韋君公留二年則公自謂公自負其才既見韋之通貴而身留公車故欲去而之江海矣公三十九嵗之冬上三大禮賦四十嵗之春後方召試得官此三十九嵗已前未有官詩蓋嘗有詣公車之事矣應是三大禮賦已前屢進賦而無報所以云留于公車矣陪鄭廣文遊何將軍山林十首東方朔傳竇太主曰回輿枉路臨妾山林應劭曰公主園中有山謙不敢稱第故託言山林也不識南塘路今知第五橋師云南塘第五橋皆秦川地名趙云此兩句是對南塘第五橋之名於志在萬年縣郭外之西南後有鄭十八虔貶台州司户而題其居云第五橋邉流恨水皇陂岸北結愁亭則第五橋與皇陂當是目前相近之處長安皇子陂在萬年縣西南二十五里以秦葬皇子起冢陂北原上得名以皇子陂推之第五橋可見如是則何將軍山林所過之地矣故於首句言之名園依緑水謝玄暉逶迤帶緑水野竹上青霄北山移文干青霄而真上新添庾杲之泛緑水依芙蕖雖其義不同而必謂以有出處對屬則摘字當本諸此谷口舊相得前漢王貢傳鄭子真修身白保成帝時大將軍王鳯以禮聘子真子真不詘而終揚雄曰谷口鄭子真不詘其志耕于嵒石之下名震京師文趙云指言廣也濠梁同見招莊子與惠子同遊濠梁之上趙云相親為莊惠也平生為幽興未惜馬蹄遙右一百頃風潭上千章夏木清師云謝靈運詩風潭寒皎潔趙云此篇真道景物舊本作千重非是師民瞻本作章漢食貨志注大木曰章夏木則言其功用在夏而清也卑枝低結子趙云魏文帝芙蓉池作云卑枝拂羽蓋師師云古詩卑枝成屋椽接葉暗巢鶯師云庾亮賦接葉巢春語之鶯鮮鯽銀絲鱠香芹碧澗羮謝靈運銅陵映碧澗趙云言所煮之羮乃碧澗之香芹也薛補遺碧澗地名唐長卿有碧澗别墅詩翻疑柂樓底晚飯越中行趙云公往時在越州今言何將軍山林之景似之也右二萬里戎王子何年别月支張騫傳胸奴破月氏王師古月氏西域胡國也氏音支異花開絶域滋蔓匝清池趙云戎王子説者以為花名義固然也下句云異花自分明矣言萬里則其來遠言月支是必月支之物漢使徒空到如張騫李廣利之類神農竟不知神農嘗百草之滋味而竟不知言多異卉也胡師云漢使如博望侯之得石榴二則師之得蓿桃種於絶城而無此異花故曰空到本草亦不載故曰不知露翻兼雨打開坼漸離披揚雄賦配藜四施注配藜披離也露趙云雨打雖常語而涅經有風雨所打宋玉云白下衆草兮奄梧楸以離披舊注所引非祖出右三旁舍連髙竹趙云漢髙祖紀髙祖適從旁舍來疏籬帶晚花碾渦深沒馬碾渦碾磑問水渦漩也藤蔓曲藏蛇詞賦工無益山林迹未賖盡捻書籍賣來問爾東家趙云時公方為布衣故曰詞賦功無益又言我之蹤迹亦不逺在山林也王粲雍蔡雍見而竒之曰吾家書籍文章當與之魯有東家丘問舍蓋問舍之問右四賸水滄江破殘山碣石開師云謝琨詩小江流剩水趙云任彥升詩滄江路窮此故對碣石禹貢地名碣石以其碣起之石矣所謂碑碣蓋取此滄江破而為賸水碣石開而為殘山賸水殘山杜公之新語宋子京得之於唐書中有殘膏賸馥之句賸俗作剩緑垂風折笋紅綻雨肥梅趙云上句義言風折笋茵緑下言雨肥梅綻紅句法以例言為老健銀甲彈筝用古詩十五學彈筝銀甲不曽卸以銀作指甲取其有聲金魚換酒來阮孚為常侍以金貂換酒帝宥之興移無灑掃隨意坐莓苔趙云此尤見其野逸之興右五風磴吹隂雪磴石道也師云鮑照詩既類風磴復象天井趙云石梯之道也雲門吼瀑泉師云謝光逺山近雲門斷酒醒思卧簟衣冷得一作欲裝綿趙云得字似問辭言衣之冷矣得裝綿乎宜裝綿也野老來看客河魚不取錢秪疑淳朴處自有一山川趙云丘希範詩野老時一望左傳河魚腹疾淳朴者太古之世也以其山野乃淳朴處矣右六棘樹寒雲色茵陳春藕香師云本草經冬茵陳經不死因舊茵而生故曰茵陳雲脆添生菜美隂益食單涼趙云四句連義脆添生菜美言生菜非一矣而茵陳春藕之香脆又添其美也隂益食單涼言鋪食單於棘樹之下隂益其涼也謂之則山中已涼而又涼也蓋野鶴清晨出一作至山精白日藏石林蟠水府百里獨蒼蒼山精鬼魅為趙云嵇紹昻昻然如野鶴之在雞羣蜀帝得山精以妻庾信詩山精鏤寶刀水府則積水之府庾信溫泉碑云貝闕龍宫沈淪於水府右七憶過楊柳渚渚洲渚也荆州有渚宫走馬定昆池唐安樂公主作定昆池言勝昆明池也山趙云皆何將軍林所經醉把青荷葉狂遺白接㒿世説白接㒿衫也山簡為襄陽守嘗醉習家髙陽池襄陽小貌歌曰山公時一醉逍遙髙陽池日暮倒載歸酩酊無所知復乘驄馬去倒著白接㒿舉手問葛強何如并州兒田趙云陳柤孫登詩有青荷葉日暉及古詩有荷葉何田故合而用之刺船思郢客郢客善操舟中趙云宋玉對問云客有歌於郢者可化用郢客矣解水乞吳兒吳兒善泅兒趙云南人謂北人為傖父北人謂南人為吳皆常謂也暗使晉書夏仲御能隨水為戲操柂正櫓折旋中流繼而賈充以鹵簿妓女繞其船統若無所聞充曰此吳貌是木人石心也又可證其解水之字坐對秦山晚江湖興頗隨趙云言雖在秦地而其山清幽有江湖之興也右八床上書連屋階前樹拂雲趙云公於竹詩亦云會見拂雲長郭景純遊仙詩有逸翮思拂霄將軍不好武稚子揔能文趙云魏武帝令曰往嵗造百辟刀五枝先以一與五官將其餘四吾諸子中有不好武而好文學將以次與之醒酒微風入嵇康四言微風動桂聽詩靜夜分沈休文月華臨靜夜絺衣挂蘿薜師云潘尼賦絺衣獨桂於青蘿涼月白紛紛趙云月白謂之紛紛言其影在薜蘿之間如此蘿薜者藤蘿與薜荔也詩人每使薜蘿謂是雨物故得倒用東坡亦嘗摘此為句云九衢人散月紛紛右九幽意忽不愜古詩幽意無斷絶歸期無奈何趙云幽意所以不愜者以須有歸期故也世説云左太沖作三都賦初思意甚不愜摘而用之出門流水住回首白雲多一作雜花多非之趙云雜花多非流水住則又見其處所當水平慢不流處為平地矣師云張潛詩山近白雲多自笑燈前舞誰憐醉後歌秪應與朋好風雨亦來過趙云朋好朋之相好也顔延年作陶徴士誄詢諸友好此詩十篇蓋春末夏初之作有曰千章夏木清有曰茵陳春藕香有曰醉把青荷葉有曰巢鶯曰肥梅有言芹言笋也右十重過何氏五首問訊東橋竹師云褚炫詩問訊南巷士將軍有報書趙云言欲重過主人所以託為問訊其竹而報許之也故有下句速往之義倒衣還命駕倒衣為聞報而欲遽往急命駕也如詩顛倒衣裳髙枕乃吾廬主人無間故客至則安之若吾廬也陶潛吾亦愛吾廬趙云命駕字起於每一相思千里命駕言往之速也史云不得髙枕而我又解嘲有庸夫髙枕而有餘花妥鶯捎蝶溪喧獺趁魚重來休沐地師云漢律吏五日休下沐言休息以洗沐也真作野人居趙云上句言見聞之景物也而句法則花枝安妥之際有鶯捎掠於蝶溪聲喧沸之中是獺趁魚也漢制有官者賜休沐張安世傳休沐未嘗出今何氏山林本休休之地而真作野人居則幽靜可知矣右一山雨樽仍在沙沈榻未移犬迎曽宿客鴉護落巢兒趙云此言重來所見之事樽榻皆前日之所設與樽在而榻未移又見將軍之好客也護字公嘗使饐隼護巢歸皆道實事之句雲薄翠微寺天清皇子陂皇子陂陂名也微趙云長安志載翠宫在萬年縣外終南山上之又云長安縣南六十里元和中改為翠微寺時在公死三十餘年之後而今詩云寺為疑然二縣皆倚郭雖分縣名其實相連可亘不足疑矣翠微既在終南之上其山之長逺又屬萬年或屬長安只以地界言之又不足疑惟宫寺之名本出臨時而宫可謂之寺寺可謂之宫於義無害故公使字偶爾犯邪當俟博聞者辨之若志所載止有北原陂在萬年縣西南二十五年以秦葬皇子趙冢陂北原上得名别無黃子之稱舊本作黃字誤矣公前篇云今知第五橋字而題鄭十八著作虔詩云第五橋邉流恨水皇陂岸北結愁亭正相近之地則黃子當為皇子矣向來幽興極步屣過東籬陶潛采菊東籬下趙云言幽興之極已自前明今重來步屣過東籬言其熟也屣無根之屣音所爾切右二落日平臺上梁孝王傳孝王築東苑廣睢陽城大治宫室為復道自宫連屬於平臺三十餘里師云臺非長安景杜因臺以用字耳其趙云此平直言景物耳平臺應是有平穩之臺而紀實舊注非是春風啜茗時石欄斜點筆趙云置硯於石欄之上也桐葉坐題詩翡翠鳴衣桁蜻蜓立釣絲自今幽興熟一作自逄今日興來往亦無期師云顧况坐於流水上得桐葉題詩云一入深宫裏年年不見春聊題一片葉寄與有情人明日况於上流復題泛於陂中後十日復得詩意答況者沈約詩日色下衣桁右三頗怪朝參懶樂於安間故懶於入朝參謁應耽野趣長雨拋金鎖甲苔卧緑沈槍槍甲皆器之犀利者不以功名為務故雨霑苔卧也薛云右按車頴秦書曰苻堅使熊邈造金銀細鎧金為綖以縲之緑沈精鐵也北史隋文帝賜張奫緑沈槍甲獸文具裝武庫賦曰緑沈之槍飾杜補遺嘗博考緑沈之義或以為漆或以為用緑為羲之筆經云有人以緑沈漆竹及鏤管見遺藏之多年有愛玩詎必金寶雕琢然後為乎此以緑責沈為漆也又廣志曰緑沈古弓名劉劭趙都賦曰其器用則六弓四弩緑沈黃間堂溪魚腸丁令角端古樂府結客少年埸行云緑沈明月弦金絡浮雲轡此言緑沈皆謂弓也弩名黃間以飾之也弓謂之緑沈其亦以緑以為飾乎緑沈槍疑亦以緑而為飾趙云甲言金鎖以金線連鎖之也苻堅所造乃其類也槍言緑沈色以色之物沈抹其柄也苻饐創所引是至引北史隋文帝所賜張奫妄意解為精鐵非也杜田所引則可以見弓也甲也筆也槍也或緑漆之或緑塗之皆謂之緑沈師云梁簡文帝詩吳戈夏服箭冀馬緑沈弓手自移蒲柳家才足稻粱趙云上句以言野趣之真蒲桞一物耳即所謂楊也是本有楊有桞爾雅曰旄澤柳是也下句言其野趣楊蒲柳之安稻梁九穀之二物詩云不能蓻稻粱看君用幽意白日到羲皇陶潛云羲皇上人趙云言到羲皇則身到其世即同其人到字最為著力韓退之送僧澄觀言僧伽塔云僧伽後出淮泗上勢到衆佛尤瑰竒乃此到字矣言白日字有雍容間暇不盡之意如落花遊絲白日靜也右四到此應嘗宿相留可判年蹉跎差跌也暮容色衰暮也悵望好林泉何路霑微祿歸山買薄田斯遊恐不遂把酒意茫然賈誼鵬賦斯遊遂成卒被五刑斯遊此遊也謂霑祿買田之事也以為李斯則非趙云時公方為布衣當在三十九嵗冬之前蓋次篇趙云時遊詩曰四十明朝過而公三十九嵗之冬方獻三賦次年方召試得官授河西尉不行為右率府胄曹也斯遊恐不遂言此遊恐不遂其意耳右五冬日有懷李白寂寞書齋裏終朝獨爾思更尋嘉樹傳不忘角弓詩昭二年傳晉使韓宣子來聘公享之賦角弓賦角弓既享宴于季氏有嘉樹焉宣子譽之武子曰敢不封殖此樹以無忘角弓遂賦甘棠宣子曰起不堪也無以及召公之趙云晉韓宣子聘魯公享之宣子賦角弓蓋言兄弟國宣相親也公前有詩于白云余亦東蒙客憐君如弟兄故今詩云更尋嘉樹傳不忘角弓詩此與醉眠秋共被暗使薑肱兄弟事合矣以事出昭二年傳故云嘉樹傳以在書齋裏而思白故於讀書之中更尋此傳傳因尋此傳故不忘角弓言兄弟相親之意東坡送宋希元詩云它時莫忘角弓篇又題萬松詩云殷勤記取角弓詩皆由杜公發之也裋褐風霜入貢禹䄈褐不完還丹日月遲道經言還丹能使人長生不死道師云言自授籙成功之晚蓋白嘗從北海髙天師授籙於齊州紫極宫趙云䄈褐當以短為正又杜公詠懷云賜浴皆長纓與宴非短褐以長對短其義尤明短褐言白之貧還丹言白有仙風道骨其所燒還丹可以遲延日月賀知章號曰謫仙人白與道士司馬子微遊則還丹在白為當體未因乘興去王子猷乘興載安道空有鹿門期漢隂有鹿門山龐德公所隱之地趙云公自言無因乘興如子猷訪戴而去徙與白有效龐德公隱鹿門山之期約也杜位宅守嵗守嵗阿戎家王戎字濬仲少院籍二十嵗而籍與之交籍素與戎父渾為友戎年十五隨父渾在郎舍籍每適渾俄頃輒去過視戎良久然後出謂渾曰共卿語不如與阿戎談趙云東坡詩云頭上春幡笑阿咸又云欲喚阿咸來守嵗林烏櫪馬鬪喧譁則杜詩善本當是阿咸字衆本皆作阿戎而舊注引王戎事大誤意者杜位小字阿咸也椒盤已頌花周庾信正旦詩椒花逐頌來趙云晉劉臻妻元日獻椒花頌舊注非事祖矣盍簮喧櫪馬陳隂鏗詩云亭嘶皆櫪馬易勿疑朋盍簮列炬散林鴉四十明朝過飛騰暮景斜誰能更拘束爛醉是生涯趙云過踰過也公所以感歎頗有深意蓋記曰四十曰強而仕公於天寶九載三十九嵗之冬預獻明年三大禮賦表云甫行四十載矣沈埋盛則則亦急於仕矣天寶十載方召試授官得河西尉不行則所當強仕之年官猶未定宜其感嘆之切矣故下云飛騰暮景斜而撲句付之醉也選有羽爵飛騰以四十對飛騰不必以數對數此公之妙處景斜字沈約傳景斜乃出與鄠縣源大少府宴渼陂得寒字應為西陂好金錢罄一餐上林賦日出東沼入乎西陂前漢曹丘生招權顧金錢吳越春秋伍子胥至瀨水之上謂女子曰夫人可得一餐乎孔融傳一餐之惠必報飯抄雲子白雲子雨也荀子雲賦曰託地而遊宇友風而子雨瓜嚼水精寒薛云漢武帝內傳王母謂帝曰太上之藥有風實雲子趙師云漢武帝煉丹成以成者為桃實白者為雲子云雲子指言菰菜飯也西陂中則有菰矣宋玉云主人女炊香菰子飯為菰米之香滑潔白然後足以當雲子之譬或曰菰米本黑不白也然公詩有云秒菰為黑穟精鑿成白粲則舂之精乃白矣雲子出漢武帝內傳薛蒼舒所引是舊注非無計回船下空愁避酒難主人情爛熳持答翠琅玕四愁詩美人贈我翠琅玕何以報之雙玉盤什趙云情爛熳蓋情多之意持答翠琅玕意以篇當之也矣崔駙馬山亭宴集蕭史幽棲地簫史弄玉夫也好吹簫教弄玉作鳯鳴而作鳯臺一旦夫妻皆隨鳯去趙云簫史秦女弄玉之壻故得以言駙馬林間踏鳥毛洑流何處入洄洑之水也亂石閉門髙趙云皆言其幽棲客醉揮金碗詩成得繡袍李白外傳云白對明皇撰樂府新詞得宫錦袍趙云醉揮金碗詩得繡袍皆富貴家事揮者棄也既醉而遂以金碗與之史有揮橐金者又戴􅀢詩云揮金留客坐乃此詩揮金碗之義武后使東方虬宋之問賦詩先成者得錦袍亦此得繡袍之謂舊注所引非是蓋詩意不在此秋秋多宴會終日困香醪九月楊奉先會白水崔明府今日潘懷縣潘嶽自河陽轉懷令同時陸浚儀陸雲出補浚儀令縣居都會之要為難理雲到官肅坐開桑落酒世説桑落河多美酒來把菊花枝晉陽秋曰陶潛九月九日無酒宅邊樀菊盈把望見白衣人至乃王𢎞送酒便飲醉而歸趙云上句指言兩令之相會也劉隨喜造酒熟於桑落之辰故酒得名焉水經載之詳矣庾信從蒲使君乞酒蒲城桑落熟灞岸菊花花秋又謝衛王賜桑落酒詩曰停杯待菊花蓋桑葉落則菊花開之時當桑葉落而酒熟乃飲酒之候矣舊注非天宇清霜淨言氣宇清徹也公堂宿霧披衛瓘見樂廣曰若披雲霧而覩青天趙云公自言其得見二令公堂則楊奉先之公堂也晚酣留客舞鳬舄共參差王喬為鄴令事參差亦包兩令言之贈翰林張四學士翰林逼華蓋蔡雍傳擁華蓋兩奉皇極逼言密而帝座鯨力破滄溟杜補遺晉天文志曰大帝上九星曰華蓋所以覆大帝之座也天子之華蓋象之古今注曰華蓋皇帝所作也與蚩尤戰于涿鹿之野常有五色雲氣金枝玉葉覆之而作華蓋唐百官志玄宗初置翰林待詔以張説張九齡等為之掌四方表疏批答應和文章既而又以中書務劇乃選文學之士號翰林供奉分掌制誥書勑又改供奉為學士専掌內命其後選用益重而禮遇益親至號為內相又以為天子私人內宴則居宰相之下一品之上韋執誼翰林舊事曰翰林院在右銀臺門內麟德殿西學士院在翰林院之南後又置東院於金鸞殿西隨上所在而遷取其近便也故事中書黃麻為綸命重輕之辨近者所出獨得用黃麻有用白麻者皆在此院矧此院之置尤為切近左接寢殿北瞻彤樓晨趨璝闥夕宿嚴衛密之至也備待顧問辨疑釋非持縑牘授遣羣務職之重也草趙云又職林云自至德後天子召集賢學士于禁中詔因在翰林待進止遂以名而置院每在禁中天子所在皆有待詔之所斯為逼華蓋矣滄溟又以遊泳寬縱之地鯨力破之則如宗慤云願乘風吹萬里浪之破天上張公子公子公侯之子孫美張翰林稱天上言非人間趙云凡詩人於姓張者得曰張公子蓋以前漢趙皇后傳有張公子時相見如杜牧贈張祐亦曰誰人得似張公子是也其在禁中故故言天上也舊注非也宫中漢客星漢光武引嚴光入論道太史奏客星犯御座甚急趙云博物志載後漢人乘槎至天河之側見飲牛者使問嚴君曰客星星犯斗牛而公詩每作張騫為使尋河事蓋承用然也如庾肩吾奉使江州船中七夕詩曰漢使俱為客星槎共逐流亦以漢使貼星槎使矣今詩與張學士故得用張騫事舊注非賦詩拾翠殿佐酒望雲亭賦詩佐酒言侍從宴嘗也趙云拾翠在東內大福殿東南望雲在西內景福臺西以其應和文章且禮遇內宴紫誥仍兼綰黃麻似六經翰林學士掌制誥紫誥謂以紫泥封誥也黃麻謂寫詞於黃紙上似六經言訓辭深厚如六經也杜補遺隴右記曰武都紫水有泥其色紫而粘貢之用封璽書故詔誥有紫泥之美後漢輿服志注漢書儀曰天子信璽六皆以武都紫泥封青囊白素褁兩端無縫元注紫泥封誥是以王子言拾遺元封元年浮圻國貢蘭金之泥此金出陽淵水常沸湧金狀混混若泥如紫磨之色以此封詔函及諸宫門鬼魅不敢于漢世上將出征及諸使絶國多以此泥為印封衛眚張騫傳介子蘇武之使皆受金泥之璽以封也馮鑑續事始貞觀十年太宗詔用黃麻紙寫詔敕文又髙宗上元三年詔曰勑制施行既為永式比用白紙多為蟲蠹自今以後尚書省頒下諸司諸州縣並用黃紙白趙云李肇翰林志云凡賜與徵召宣索處分曰詔用麻紙慰撫軍旅曰書用黃麻紙又云南召及清平官書用黃麻紙內分金帶赤恩與荔枝青翰林拜命日賜金荔枝帶節趙云楊文公談苑載腰帶凡金玉犀銀之品自樞宰度使賜二十五兩金帶舊用荔枝松花御仙三品雖是本朝名式然成舊用則亦循唐故事矣三品以荔枝為首本以賜樞宰節度今詩句則言出於殊恩非常例故也謂之荔枝青言金色之青熒也公詩又曰君看銀印青無復隨髙鳯髙鳯後漢逸民也言張翰林已在顯貴不復與髙鳯為偶矣空餘泣聚螢車􅏷家貧無燈火以絹囊盛螢火以照書讀之矣杜正謬髙鳯者鳯之飛鳴必在於髙如詩云鳴鳯鳴于彼髙罔之類顔延年秋胡詩云椅梧傾髙鳯寒谷待鳴律元注非是豈趙云此公自謂也髙鳯指言張翰林舊注非待無義可以人名對聚集之螢乎詩意蓋云我不能更隨張翰林之髙騫而止餘泣於聚螢耳此生任春草垂老獨漂萍春草言不實流落漂泛如萍之在水也之趙云此言任春時之草生幾度更不管年華去耳此憾慨之言舊注非是儻憶山陽會悲歌在一聽山陽嵇康所居乃竹林之會也向秀經康山陽舊居作聞笛賦謂趙云向秀思舊賦序云與嵇吕安居止接近公今所會字蓋嵇嵇向吕也它日向秀不見嵇康作思舊賦公今言儻憶者正預指它日隔闊之事意謂若以山陽之會為可意則今日悲歌宜在一聽而勿忽之也送張二十參軍赴蜀州因呈揚五侍御好去張公子見前注通家别恨添兩家相通來往言至契孰此别恨所以添耳趙云通家字使孔融語兩行秦樹直萬點蜀山尖趙云張二十由秦而趨蜀其所厯者秦樹與蜀山也樹直山尖語可謂新竒矣直蓋直木無曲影之直御史新驄馬謂呈持侍御也恆典拜侍御史常乘驄馬京師畏憚為語曰行行且止避驄馬御史參軍舊紫髯為張赴參軍也郤超髯府中語曰髯參軍可趙云舊注是但紫髯子却因孫權傳號紫髯將軍得取而合用之皇華吾善處於汝定無嫌皇華遣使臣之詩也言張有使才趙云詩皇皇者華兩句正以言揚侍御為皇華之使乃吾所厚善之人則於張二十亦必無嫌所以薦之也舊注非是陪諸貴公子丈八溝攜妓納涼晚際遇雨落日放船好輕風生浪遲竹深留客處荷淨納涼時趙云自梁簡文帝來皆有納涼詩而陳徐陵詩句有曰納涼髙樹下簡文帝晚景納涼詩曰鳥棲星欲見荷淨月應求公子調氷水佳人雪藕絲謝玄暉詩秋藕折輕絲薛蒼舒杜補遺皆言如家語以黍雪桃之雪且引其注云雪拭也亦趙云貴家有以蜜或乳糖伴雪而食者氷水言調豈用香美之物調和之乎不然觸氷為水為戲耳雪藕絲蓋雪斷之雪此是方言如家語則後人所謂洗雪之雪者矣非此之謂片雲頭上黑應是雨催詩趙云此蓋以為戲也雨甚當速歸而詩不了則黑雲將欲為雨以催之笑東坡嘗使纎纎入麥黃花亂颯颯催詩白雨來右一雨來霑席上風急打船頭急一作惡亦趙云示涅經云風雨所打是方言言蓋江南有謂之打頭風者也越女紅裙濕燕姬翠黛愁越多美女西施越女也古詩燕趙多佳人後趙云越女燕姫蓋收乘七發云越女侍側齊姬奉而鮑明逺舞鶴云燕姫色沮巴童心恥也纜侵堤栁繫幔卷浪花浮浪起如花也故趙云急雨當避進舟於岸傍侵隄栁而繫纜也下句慢卷如浪花浮之間蓋雨景中看之也卷字與梁間文帝納涼詩珠連影空卷及王勃珠簾暮卷西山雨之卷同歸路翻蕭颯陂塘五月秋趙云必著稱月者以當五月炎天而遂成秋為可記録范元實詩眼嘗論其類此者右二白水明府舅宅喜雨得過字吾舅政如此喜雨之應禱故美其政也古人誰復過碧山晴又濕白水雨偏多精禱既不昧歡娛將謂何湯年旱頗甚今日醉弦歌湯有七年之旱此詩先禱精禱不昧即禱而得雨也故有醉絃歌之句論語聞絃歌之聲陪李金吾花下飲勝地初相引徐行得自娛見輕吹鳥毳隨意數花鬚趙云徐行所以對勝地其作余行非吹鳥毳數花鬚所以自娛細草稱偏坐香醪懶再沽趙云稱字去聲如公嘗自偏歡腹腴愧年少漁父忌偏醒驥病思偏秣之義此飲酒闌珊而歇於細草之上惟其偏可於此坐則不思起矣雖酒盡亦懶再沽也醉歸應犯夜可怕李金吾漢制金吾將軍主徼逃京師傳杜補遺桉韋述西都新記曰京城街衢有金吾曉暝呼以禁夜行唯正月十五日夜勑許金吾弛禁前後各一日故中書侍郎蘇味道上元詩有金吾不禁夜玉漏莫相催之句趙云此戲李金吾也王褒洞簫賦云頌有醉歸之歌犯夜亦有所載世説云王安期作東海吏録犯夜人至王問何處來云從師受書還不覺夜王曰鞭撻寧越以立為名恐非致化之本使吏送歸其家薛夢符所引李廣霸陵事非言可怕則不怕之也與可憚可但可能之可同贈髙式顔趙云髙式之族姪也見適集昔别是何處相逢皆老夫趙云是字可以對皆字一作人非是故人還寂寞削迹共艱虞莊子孔子削迹於衛削趙云削迹莊子又曰削迹捐勢則自藏也削迹於衛則人拂削其迹今此言共難虞則遭人棄逐矣此所為寂寞也自失論文友空如賣酒壚平生飛動意見爾不能無趙云魏文帝典論有論文一篇論文最為難事公與李白詩云何時一樽酒重與細論文則李白與公敵體方能當之今指髙為論文之友則必能文者友既相失空知酒壚所在不復何人可與共飲也相如傳注云壚者賣酒之處無人共飲則亦沈滯塊處而已忽一見髙式顔則平生飛揚轉動之意不能自已也沈佺期於李侍郎祭文云思含飛動才冠卿雲贈比部蕭郎中十兄甫徒姑之子有美生人傑詩有美一人漢高祖云三者皆人傑吾能用之由來積德門書汝方積德漢叔孫通禮樂百年之積而後可興漢朝丞相系謂蕭相國何梁日帝王孫梁武帝姓蕭是趙云此篇是正格破題便對詩有美一人生人傑應生民傑唐太宗名世民故每改世為代改名為人孟子云自生民以來未有如孔子者易其所由來者漸矣詩人多用積德字德裕齊王銘曰胄其積德必有君臨也此以引下句藴藉為郎久以藴藉而為郎也東觀漢記桓榮溫恭有藴藉文穎曰寬博有餘也魁梧秉哲尊周悖傳魁梧竒偉一音悟魁言丘墟壯大之意也悟者言其可驚悟也魁趙云張良贊聞張良之智勇以為其貌魁梧奇偉注大兒梧言其可驚悟雖音去聲而公作平聲蓋當時皆讀為吾馬顔師古自言之矣司馬相如以資為郎不式不願為郎書經德秉哲詞華傾後輩風雅靄孤鶱趙云一字從鳥虛言切飛舉之貌也此屬元字韻中若其下從馬而為一字起是起虔切注云馬腹縶又虧也乃屬先字韻學者多誤故為明之宅相榮姻戚晉魏舒少孤為外家寧氏所養寧氏起宅相宅者云當出貴甥舒曰當為外氏成此宅舒後果為公杜補遺北史李靈傳邢晏稱其甥李繪曰如對珠玉宅相之竒良在此甥又文苑傳王褒字子深七嵗能作文外祖梁司空愛之謂賓客曰此兒當成吾宅相此趙云蕭兄杜家之外孫故之魏舒兒童惠討論言方兒童時得蕭兄會以討論之益矣自此而下公轉入自述之事也書序討論墳典見知真自幼潘安仁懷舊賦序云余十二而獲見知於父有東越戴侯楊君遂申之以婚姻謀拙愧諸昆子美與蕭為姑舅之昆仲也趙云言見知於蕭兄已自幼時而自後謀拙則每愧諸兄書盤庚子亦拙謀作乃逸漂蕩雲天濶沈埋日月奔雲天闊言漂蕩而去遼逺也又日月奔謂沈埋而嵗月易失也致君時已晚懷古意空存趙云其謀拙者漂蕩於外而不能仕進以致君也魏應璩與從弟君胄書曰思致君於有虞濟蒸民於塗炭懷古賦選曰盼山川而懷古又曰慨長思而懷古其漂蕩於外乃在齊魯下句使山陽愚谷事乃是齊魯相近之地地理志山陽漢屬兖州愚公谷在青州臨淄考之地圖青州在兖州東而臨淄縣在州西北至十里則山陽與愚谷相近審矣在齊魯則為雲天闊既漂蕩之久則為日月奔日月既奔則致君遂晚而徒餘懷古之意存耳中散山陽煆嵇康為中散大夫性絶巧好煆王戎自言與康居山陽二十年未嘗見喜愠之色向秀傳嵇康善煆秀為之佐相對欣然旁若無人趙云嵇康居在山陽初康貧與向秀煆於大樹之下自贍給潁川鍾會貴公子也精練有才辨故往造焉康不為之禮而煆不輟良久會去康謂曰何所聞而來何所見而去會以此恨之譛康於帝則有東市之刑公在山陽之間因懷古感慨愚公野谷村列子愚公移山而山北之叟笑之是趙云韓子齊相公逐鹿入谷見一老問為何谷對曰為愚公谷以臣名之桓公曰視公儀狀非愚人何為以愚公名之對曰臣故畜牸牛生子大賣之而買駒少年曰牛不能生馬遂持駒去傍鄰以臣為愚故名愚公管仲再拜曰此夷吾之過也使堯在上咎繇為理安有取駒者乎舊注所引豈可謂之野谷村哉公在愚谷之間因懷古感慨然懷愚公之村則有強者凌轢之思矣魚杜云江淹兔園賦坐帳無鶴支床有龜一寸二寸之三竿兩竿之竹名為野人之家是謂愚公之谷寧紆長者轍歸老任乾坤陳平以席為門多長者車轍陶潛王公紆軫趙云公在山陽愚谷之間自以其地僻矣而蕭兄臨之故有此句言不煩蕭兄之枉顧姑任乾坤而歸老則蕭兄必是向西北人自此歸矣感動蕭兄我亦將自飄蕩亡所歸矣蓋孤憤之辭也九日曲江綴席茱茰好風土記俗於九月九日折茱茰房以插頭言辟邪惡趙云西京雜記九月九日佩茱茰食餌飲菊花酒云令人長夀蓋傳自古莫知其由今學者但知費長房教桓景避災厄令舉家縫茱茰囊繫臂事而又風土記所云是不知本始也浮舟菡蓞衰蓮莖為茄葉為荷花為菡蓞根為藕季秋時欲半一作百年秋已半義趙云一作之句無九日意兼悲江水清源曲西京雜記以水源屈曲故謂之曲江荆門此路疑桓溫以九日宴從事於龍山孟嘉落帽龍山在荆州門外也唐趙云按劇談録曲江本秦時隑州隑即崎字巨依切開元中疏鑿為勝景南即紫雲樓芙蓉苑西即杏園慈恩寺花卉環列煙水明媚都人逰賞盛于中和上已節九域志載江陵府古迹有落帽臺乃龍山矣今言在曲江作重九而疑是龍山故曰荆門此路疑晚來髙興盡搖蕩菊花期陶潛九日無酒折菊盈把至晚王𢎞送酒遂醉而返期趙云此言日晚興盡則菊花期約又在明年今日焉為搖蕩矣殷仲文九日作詩獨有清秋日能使髙興盡官定後戲贈時免河西尉為右衛率府兵曹趙云此公自贈耳故云戲也不作河西尉淒涼為折腰陶潛為彭澤令郡遣督郵至縣吏白應束帶見之潛歎曰吾不能為五斗米折腰老夫怕趨走率府且逍遙老夫自言也謂州縣有趨走之勞故怕率府間曹也得自肆而已耽酒須微祿狂歌託聖朝故山歸興盡回首向風飈趙云天寶九載冬公預獻三大禮賦明年十載乃召試文章初授河西尉辭不行更授衛率府兵曹故得以老夫為稱謂須微祿故無復歸山之興但臨風回首而已興盡王子猷興盡之義選詩有樹頭鳴風飈承沈八丈東美除膳部員外阻雨未遂馳賀奉寄此詩今日西京掾多除南省郎府掾四人同日拜郎通家惟沈氏謁帝似馮唐趙云孔融謁李膺曰我乃李君通家子弟也選詩云謁帝承明廬馮唐則公以自比蓋唐以白首而見文帝公四十歲始緣獻賦召試見明皇也詩律羣公問儒門舊史長趙云上句公自言其能詩下句以言沈東美謂之舊史則東美者史官沈既濟之胄也清秋便寓直寓寄也晉潘嶽兼虎賁郎將寄直于散騎省故云寓直列宿頓輝光謂郎官上應列宿趙云上以言沈受命之時更平聲下以言沈為膳部蓋郎官應哀烏之星未暇申宴慰含情空激揚司存何所比比屬也言司之所在何屬膳部默悽傷甫大門昔任此官趙云論語籩豆之事則有司存言沈丈之司何所比擬因乎公直以此其大父也蓋公之大父審言嘗為此官故沈丈而追感矣公自注云大門則大父之新稱師民瞻本直改作大父以俟博聞者訂丁貧賤人事略經過霖潦妨禮同諸父長恩豈布衣忘父長猶父兄之行也相尊爾天子謂同姓諸侯諸侯謂同姓大夫皆曰父布趙云以尊沈丈之年布衣則公新召試入官前此蓋衣耳天路牽騏驥雲臺引棟梁趙云枚乘古樂府云美人在雲端天路隔無期而袁彥伯三國名臣贊曰整轡髙衢驤首雲路此牽騏驥之謂也淮南子云雲臺之髙髙誘注髙際於雲故曰雲臺袁彥伯三國名臣贊其言魯肅曰荷簷把梓乃構雲臺此引棟梁之謂也即非漢之臺名傳云驊騮騏驥天下之良馬也陸玩祝曰莫傾人棟梁以比沈丈得位而引末句之意徒懷貢公喜颯颯鬢毛蒼見竊效貢公喜柱王陽在位貢禹彈冠云趙云貢公喜字杜田於首篇止引劉孝標絶交論王陽登則貢公喜罕生逝而國子悲為補舊注之遺此豈獨出於劉孝標邪陸機鞠歌行雲王陽登貢公歡罕生既沒國子歎孰謂前人不相依傍歟此亦注文選所不到矣九家集注杜詩卷十八
