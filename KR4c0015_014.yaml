body:
  text: 九家集注杜詩卷十四宋郭知逹編古詩八哀詩并序傷時盜賊未息興起王公李公歎舊懷賢終于張相國八公前後存沒遂不詮次焉王仲宣張景陽皆作七哀詩黃鳥哀三良亦其義也止趙云選有七哀詩名曹子建王仲宣張景陽皆作焉一首而名七哀詩特取其義耳注謂痛而哀義而哀感而哀怨而哀耳目聞見而哀口歎而哀鼻酸而哀子建之詩為漢末征役别離婦人哀歎仲宣之詩專哀漢亂景陽之詩雖再賦前則哀人事遷化後則哀帝室漸衰今公八篇以哀八公而名八哀詩挨傍選詩題耳目八人皆故矣舊本四篇作故字四篇作贈字誤也蓋傳本惑公所謂八公前後存沒之語乎公特言八公存沒或前或後如某甲歿時某乙猶存而詩不能詮次其歿之前後耳記曰我欲作九原又曰死而可作吾誰與歸王公思禮李公光弼皆良將公傷盜賊欲作其死以為用故主二公為首興起首者作之謂矣至歎舊懷則通言下六公贈司空王公思禮思禮加守司空上元二年薨贈太尉諡武烈司空出東夷童稚刷徑翮趙云思禮上元元年加司空次年薨雖贈太尉以薨時官稱之按史高麗人故云東夷後漢鄧禹傳父老童稚此所先見者元魏成淹曰羔裘玄冠不以弔此童稚所知也隋煬帝言薛道衡我少時與之行役輕我童稚陳孔璋為曹洪與魏文帝書揮徑翮張景陽七命落徑翮刷字沈休文和謝宣城請將隨渤海去刷羽泛清源追隨燕薊兒潁鋭一云脫物不隔思禮營州城傍高麗人也少習我旅隨節度使王忠嗣至河西與哥舒翰對為押衙趙云按史思禮父為朔方軍將思禮習戰鬬所謂追隨燕薊兒追隨字曹植詩飛蓋相追隨燕薊兒猶山簡傳所謂坐井兒平原君傳毛遂曰使遂早得處囊中乃潁脫而出服事哥舒翰意無流沙磧趙云按哥舒翰為隴右節度使思禮與中郎將周祕事翰授右衛將軍關西兵馬使從討九曲九曲按西戎地流沙在其外意無流沙磧言輕視西戎不以為意無字則左太沖詩志若無東吳未甚拔行間犬戎大充斥短小精悍姿屹然強冦敵左傳盜賊充斥杜田補遺前漢嚴延年為人短小精悍敏捷于事赴趙云按史加金城太守安祿山反翰為元師奏思禮軍玄宗曰河隴精鋭悉在潼關吐蕃有釁惟倚思禮耳犬戎指吐蕃悍師云史記郭解傳解為人短小精貫穿百萬衆出入由咫尺馬鞍懸將守甲外控鳴鏑薛云前漢書頓冒作鳴鏑習勒其騎射應劭曰驍箭洗劒青海水刻銘天山石思禮以拔石堡城功除右金吾衛將軍充關西兵馬使蔡琰詩馬鞍懸虜頭鳴鏑丐奴以射頭曼者班固為竇憲刻燕然銘九曲非外蕃其王轉深壁薛云唐會要景隴四年贊普請昏以左衛大將軍楊矩為送金城公主使後矩為節州都督吐蕃厚賂之因請河西九曲地為公主湯沐邑矩奏與之吐蕃既得九曲尤與唐地近自是後叛傳以功授右衛將軍關西兵馬使從討九曲銘趙云舊本出入由字應是猶字方有義洗劍青海刻天山皆言戰勝深入青海天山皆西戎地思禮既從討九曲則非外蕃矣轉深壁言吐蕃主逃逺地為壁壘飛兔不近駕杜田補遺飛兔古之神馬兔善走躍而復能飛以名馬其駁快可知淮南子夫待騕裊飛兔而駕之則世莫乘車矣言其難得也陳孔璋答東阿箋飛兔流星超越山海龍驥所不敢追駑馬可得齊足哉魏志吕布有馬名赤兔能馳城飛塹故語曰人中有吕布馬中有赤免鷙鳥資逺擊十二嵗翰征九曲思禮後期欲引斬之續命使釋之思禮傳言曰斬則斬却喚作何物諸將皆以是壯之曉達兵家流飽聞春秋癖胸襟日沈靜肅肅自有適趙云鷙鳥鷹隼之屬傳鷙鳥之擊月令鷹隼早擊兵家流漢藝文志兵家者流凡百八十二家春秋癖晉杜預雖為將軍有左傳癖裴楷目夏侯玄云肅肅如入宗朝中但見禮樂器潼關初潰散萬乘猶辟易偏禆無所施元帥見手格祿山反思禮從翰守潼關密語翰誅國忠又欲以三千騎劫之翰不從遂敗思禮為偏禆而謀不見從翰遂被擒元師翰也萬乘天子辟易播遷趙云辟讀從闢易音周易之易項籍傳楊喜騎追羽羽還吒之喜人馬俱驚辟易數里師古曰辟易謂開張而易其本處今言明皇乘輿播遷也蓋至德十五年六月辛卯吐蕃將火拔歸仁執哥舒翰叛降于賊遂陷潼關京師大駭甲午詔親征遂幸蜀元師指翰見手格為敬手所格而去太子入朔方至尊狩梁益胡馬纒伊洛中原氣甚逆趙云太子肅宗七月丁卯以皇太子為天下兵馬元師北收兵至靈武裴冕等奉皇太子甲午即皇帝位至尊狩梁益又申言明皇纒伊洛言祿山兵在東京中原氣則長安一帶肅宗登寶位塞望勢敦迫翰既敗潼關不守玄宗幸蜀太子入靈武圖興復而羣臣勸進遂即位以從人望思禮奔行在天趙云易係辭聖人之大寶曰位塞望勢敦迫言塞下之望其勢出于裴冕等所迫也公時徒步至請罪將厚責際會清河公間道傳玉册天王拜跪畢讜議果氷釋思禮至行在上責其不堅守坐纛將斬之會房琯之在蜀奉太上皇册命至諌上以為可收後效遂釋之收趙云言跪受房公玉册肅宗初欲誅思禮以房公可後效讜直之語故氷釋其所欲誅之意莊子渙水將釋左傳序渙然若氷釋翠華卷飛雪熊虎亘阡陌屯兵鳯凰山師云理兵鳳翔帳殿涇渭闢天子所在以帳為殿象宫闕臺殿師云言乘輿還南言趙云翠華天子之旗上林賦建翠華之萎㽔卷飛雪其時之在冬一作雪中飛非周禮熊虎為旗亘阡陌言兵旗之多舊注却是摘字言兵旅非矣屯兵鳯凰山方是言兵旅也悵殿曲水聫句庾肩吾回川入帳殿列俎間芳洲劉孝綽曲水宴詩皇心眷樂飲帳殿臨春渠帳殿闢于涇渭則在平涼乃渭州金城賊咽喉詔鎮雄所扼思禮既釋尋副房琯戰便橋不利更為關內行營節度河西隴右伊西行營兵馬使守武功以控賊及廣平王收復思禮入清宫師云史馬援擊五溪蠻夷進壺頭扼其咽喉年趙云金城唐蘭州郡名今武功也前漢昭帝始元六置金城郡臣瓉曰稱取其堅固也乃墨子金城湯池之義師古曰一云以郡在京師之西故謂金城金西方之行也咽喉字史中夏為咽喉扼字音乙華切婁敬夫與人鬬不扼其亢抗其背未能全勝今升下入關而都按秦之故此亦扼天下之亢而拊其背也杜田補遺楊子雲解嘲蔡澤山東之匹夫也西揖強秦之相扼其咽亢其氣新史思禮守武功此扼金城之咽喉禁暴晴無雙爽氣春浙瀝巷有從公歌詩無小無大從公于邁野多青青麥傳趙云左傳武有七德而禁暴居其首事則本言其持法嚴整士不敢犯也爽氣借用晉王徽之西山朝來致有爽氣今言山川之氣清爽如雪霰之浙瀝字出雪賦巷字詩巷無居人歌則歌此也莊子青青之麥生于陵陂及夫哭廟後復領太原役郭子儀收復兩京時太廟為賊所焚權移神主於大內長安殿上皇謁廟請罪及光弼鎮河陽制以思禮為太原尹北京留守河東節度使趙云於思禮詩用哭廟字由思禮先入清宫故也新史長安平思禮先入清宫乾元二年代李光弼為河東節度副大使然謂之復領太原役則已前亦嘗在太原矣而史不載無可考恐懼祿位高悵望王土窄不得見清時上元二年思禮薨廣德元年史朝義滅痛其不見時清也嗚呼就窀穸左傳唯是窀穸之事永擊五湖舟傷其不得功成身退悲甚田橫客田橫死賔客聞之從死者五百人言思禮賔客尤甚于橫千秋汾晉間事與雲水白趙云汾晉言河東前句復領太原役必兩次在太原宜有顯績厯千年如雲水之白昔觀文苑傳豈述廉藺績廉頗藺相如古名將嗟嗟鄧大夫士卒終倒戟趙云形容思禮文不足而武有餘廉藺名將豈必書其文采于文苑傳乎漢史有文苑傳鄧景山曹州人以文吏為太原尹北京留守太原一偏將罪當死諸將各請贖其罪景山不許其弟請以身代又不許其弟請納馬一匹以贖兄罪景山許其咸死衆怒曰我等人命輕如一馬乎遂殺景山左傳晉靈輒報趙宣子一飯之恩倒戟于公徒故司徒李公光弼司徒天寶末北收晉陽甲唐李光弼傳光弼營州人善騎射能讀班氏漢書少從戎嚴毅有大略天寶十三年郭子儀薦之堪當閫寄祿山亂玄宗幸蜀肅宗聖兵靈武授光弼户部尚書兼太原尹晉陽太原司趙云光弼加檢校司徒至德二載尋遷司空今據為徒以前事稱其官耳按史祿山反郭子儀薦其能持節河東節度副大使知節度事晉陽河東太原比收晉陽甲言用河東太原兵矣傳雖不著可以意逆之晉陽甲字公羊定十三年晉趙鞅取晉陽之甲討君側之惡胡騎攻吾城愁寂意不愜人安若泰山薊北斷右脅朔方氣乃蘇黎首見帝業賊將史思明等四偽帥來攻城光弼麾下衆不滿萬皆烏合人賊以太原屈指可取光弼伺其怠出擊大破之斬首十餘萬級乂破思明于嘉山河北歸順者十餘郡朔方河北趙云胡騎攻吾城傳言史思明李立節蔡希德攻饒陽者矣晉劉琨長嘯而胡騎退却世説左太沖作三都賦初意思甚不愜傳其安若泰山危如纍卵右脅佛書有左脅卧右脅卧之語而斷右脅挨傍斷丐奴右臂言也觀公為華州郭使君進滅殘冦形勢圖狀云平盧兵馬在賊左脅今所謂右脅正此義也前漢高祖五載而成帝業光弼屢戰勝所以斷薊北之脅蘇朔方之氣使萬民得見帝業二宫泣西郊九廟起頽壓至德二載郭子儀收復兩京權移神主于大內長安殿上皇謁請罪令云云二宫蓋并肅宗言之西郊則上皇自蜀歸京師之郊九廟往在詩注未散河陽卒思明偽臣妾復自碣石來火焚乾坤獵高視笑祿山公又大獻捷乾元二年為天下兵馬元帥與九節度兵圍安慶緒于相州拔有日矣史思明自范陽來救屢絶糧道光弼身先士卒苦戰勝之思明因殺慶緒即偽位縱兵河南賊勢甚熾光弼議洛不足抗賊遂檄官吏令避冦引兵入三城賊憚光弼頓兵白馬祠不敢西犯宫闕遂戰于中灘西大破逆黨賊走保懷州謂趙云唐史史思明乘勝西嚮光弼敦陳徐行趨東京留守韋陟曰賦新勝難與爭鋒欲屈之以計然洛無見桹危逼難守公計安出屈曰益屈陜兵公保關關可以持久光弼曰兩軍相敵尺寸地必爭今委五百里而守關賊得地勢益張不如移軍河陽北阻澤潞勝則出敗則守表裏相應賊不得西此猿臂勢也遂悉軍趨河陽賊帥周摯與安太清攻北城光弼禽周摯及徐璜玉李秦授矣惟大清挺身走思明未知猶攻南城光弼驅所俘示之思明大懼築壘以拒官軍太清襲懷州守之光弼義降賊二將高暉李日越決丹水灌懷州王師乘城擒太清楊希仲送之京師獻俘太廟今云未散河陽卒則方悉軍河陽時也偽臣妾則思明必嘗偽降自碣石來與大獵皆不載于傳而固有此事也碣石海畔山在冀州之域則兵仍自北來也笑祿山言思明笑祿山而自矜也獻大捷傳所未獻俘異王册崇勳小敵信所怯擁兵鎮河汴千里初妥帖異王以非劉氏而王者杜田正謬光弼以功封臨淮王非謂非劉氏而王小敵信所怯謂北邙之敗也光武與王鳳等戰自將步騎千餘前去諸部喜曰劉將軍平生見小敵怯今見大敵勇甚可怪也應趙云異王異姓之王光弼封臨淮郡王按新史在寶元年封王後書收許州破走史朝義不見怯小敵鎮河汴事若相州北邙之敗則魚朝恩為之又非可言小敵也又乃在封王之前當俟博聞妥帖字文賦或妥帖而易施青蠅紛營營風雨秋一葉內省未入朝死淚終映睫趙云唐史相州北邙之敗朝恩羞其䇿謬故深忌光弼切骨程元振尤嫉之二人用事日謀有以中傷者及來瑱為元拫讒死光弼愈恐吐蕃冦京師代宗詔入援光弼畏禍遷延不敢行及帝幸陜猶倚以為重數存問其母以解嫌疑帝還長安因拜東都留守察其去就光弼以久須詔書不至歸徐州收租賦為解帝令郭子儀自河中輦其母還京二年光弼疾篤奉𡊮上前後所賜實封詔不許薨年五十七詔百官送葬延平門外青蠅紛營營指魚程也風雨秋一葉言其危也內省未入朝則光弼既當入援京師而不行又拜東都留守若遂就之當由長安朝而後往正復以內自省過未敢就也青蠅詩篇名以刺讒也言讒如青蠅之汗物論語內省不疚睫字韻孟嘗君涕淚承睫大屋去高棟長珹掃遺堞平生白羽扇裴啓語林曰諸葛武侯自羽扇指麾三軍也零落蛟龍匣趙云高棟言為國之棟幹長安如李績之賢長城平生白羽扇以諸葛亮比之零落蛟龍匣言扇羽零落也蛟龍匣應是劍匣言劍之蛟龍在匣而扇羽零落于其問雅望與英婆二十八將論至使英婆茂績委而不用惻愴槐里接命京兆尹弟五琦監護喪事葬三原詔宰臣百官祖送延平門外前漢槐里屬右扶風國趙云世説魏武將見丐奴使自以形陋不足以雄逺使崔季圭代已自捉刀立牀頭既畢令間諜問曰魏王如何丐奴使曰魏王雅望非常然牀頭捉刀人乃英雄也槐里葬地屬右扶風今之鳳翔府正在長安之西三軍晦光彩烈士痛稠疊直筆在史臣將來洗箱篋趙云其代子儀朔方也營壘士卒麾幟無所更光弼一號令之氣色乃益精明則其死三軍光彩為晦暗矣又云光弼用兵謀定後戰能以少覆衆治師訓整天下服其威名軍中指顧諸將不敢仰視則其死英烈之士思其威重痛感不一而止矣選時巖峭嶺稠疊下言史以直筆書光弼功業不幸遭讒致公恐懼之事將來洗淨箱篋汙辱此必當時猶有以相州北邙之敗歸罪光弼者矣載記慕容盛時無直筆之史漢書箱篋刀筆之任吾思哭孤冡南紀阻歸楫甫避亂荆衡故云南紀趙云南紀楚分若南下則厯南紀往歸長安可以哭光弼之冢今冢而不能故云扶顛永蕭條未濟失秋涉疲薾竟何人灑涕巴東峽巴東峽在荆州都趙云語顛而不扶西賦原野蕭條未濟易之卦名利涉大川或曰扶顛言大厦之顛意若用棟梁比之書若涉大川用汝作舟楫利涉以舟楫比之然前句已有大屋去高棟指為公句意重疊不知公正用論語扶顛字豈止指為扶大厦之顛乎左傳本必先顛則木之顛也又曰自下射之顛杜回躓而顛則人之顛也漢史興國救顛選暴興疾顛則顛亦不在屋言矣疲薾莊子薾然疲役巴東峽指夔州古詩巴東之峽巫山長雲安夔州屬縣去州不百五十里可以言巴東峽舊注為在荆州非贈左僕射鄭國公嚴公武趙云舊本作贈字非新舊史載武厯職互有同異武初以蔭調太原府參軍事隴右節度使哥舒翰奏充判官纍遷殿中侍御史玄宗入蜀擢諫議大夫至德初赴肅宗行在房琯薦為給事中已收長安拜京兆少尹兼御史中丞坐琯事貶巴州刺史舊史郤云綿州久之遷東川節度使上皇合劍南為一道擢武成都尹劍南節度使舊史郤又云遷御史大夫入為太子賔客遷京兆尹為為一道擢道使新史于此封鄭國公遷黃門侍郎舊史未言其封國郤云罷兼御史大夫改兼吏部侍郎尋遷黃門侍郎耳復出尹成都節度劍南既破吐蕃兵加檢校吏部尚書舊史于此方云封鄭國公永泰初卒贈尚書左僕射新舊史所載互有異同知此竊觀巴州嚴武賦光福寺楠木歌碑題下云衛尉火卿兼御史嚴武夫武在巴州既有碑證則新史為是舊史言綿州者非官衛謂之衛尉少卿兼御史而已舊史御史中丞降御史也又通鑑上元二年五月載西川節度使崔光逺與東川節度使李奐共攻綿州斬假子璋而杜公有嚴中丞枉駕見過詩題下注云嚴自東川除西川敕令西川都節制乃是寶應元年二月間詩則五月之後李奐去東川而後嚴公為東川節度使崔光逺去西川嚴公卻自東川除西川敕命一時令兩川都節制耳未是專以兩川合為一道也寶應代宗年號如此則史云上皇合劍南為一道擢武成都尹劍南節度使非也武寶應元年初來成都既而四月師朝則在成都才四月而已又按通鑑當年六月壬戌載以兵部侍郎為西川節度使七月癸已劍南兵馬使徐知道反推武不得進此武第二次來成都雖不得進其官是兵部侍郎其任只是西川節度使尤可推見前日止時敕命一時指揮合兩川都節度也中間公有寄嚴大夫詩題是九日所寄則在六月以兵部侍郎為西川節度使不得不進之後為御史大夫矣又按通鑑廣德二年春癸卯載劍南東西川為一道以黃門侍郎嚴武為節度使舊史于此稱武破吐蕃加檢校吏部尚書封鄭國公此第三次來成都方專是合兩川為一道也次年永泰元年四月薨公詩有主恩前後三持節今哀之詩云三掌華陽兵豈不是寶應元年春初為兩川都節制次以兵部侍郎來雖不得進而専節度西川廣德二年代宗方以東西川為一道而武以黃門侍郎來斯為三持節與三掌華陽兵乎嚴之謫巴州非綿州以碑刻證之嚴公之節度東西川或兼或専以通鑑及公詩證之見新舊史不足憑如此鄭公瑚璉器華嶽金天晶趙云子謂子貢曰汝器也曰何器也曰瑚璉也禮記有虞氏之兩敦夏后氏之四璉殷之六瑚周之八簋蓋宗廟之器也武封鄭國公故以鄭公稱之瑚言器言為宗廟之器武挺之之子華州華隂人爾程曰華山為西嶽言其降為武故云金天而武乃其晶也古帝王之號曰金天氏晶音精字書精光也漢史天陽之晶選晶茹金晶昔在童子日已聞老成名趙云本傳武字季鷹母不為挺之所答獨厚其妾英武八嵗怪問其母母語之武以鐵鎚就英寢碎其首左右驚白挺之曰郎君戲殺英武曰安有大臣厚妾而薄妻者兒故殺之非戲也父竒之曰真嚴挺之之子此在童子曰已聞老成名矣雖無老成人尚有典刑嶷然大賢後復見秀骨清大賢謂嚴子陵質趙云大賢指嚴挺之舊注非是按新史嚴挺之傳資軒秀舊史武傳神氣􅀢爽則見其父又見其子也如是大賢挺之明矣開口取將相小心事友生甫與武世英嘗醉登武床呼斥其父名而武不忤取趙云莊子開口而笑詩小心翼翼詩不如友生開口將相傳遷黃門侍郎與元載厚相結求宰相而事不遂是已小心事友生蓋普言其實舊注拘矣況史云最厚杜甫然欲殺甫者數矣乎閲書百紙一云氏盡落筆四座驚趙云後漢王充家貧無書嘗遊洛陽市肆閲所賣書一見輒能誦憶百紙盡猶五行俱下之義一作百氏盡非六經諸史何獨百氏乎王子敬傳桓溫嘗使書扇筆誤因畫作鳥駮牸牛甚妙雖畫事而借字用耳公寄李白筆落驚風雨又古詩自言云觀我落筆中書堂厯職匪父任嫉雅常力爭武弱冠以門蔭䇿名哥舒翰奏充判官至德初肅宗初靖難大收才傑武伏節赴行在宰相房琯首薦才略纍遷給事中其趙云史武初調太原府參軍事纍遷殿中侍御史言初雖補蔭而其後致身自得為侍御史也按殿中侍御史魏置也二人居殿中伺察非法所謂嫉邪者御史之職舊注引武為給事中乃在肅宗時與力爭嫉邪有何相干父任漢書父任為郎漢儀尚整肅武為侍御史胡騎忽縱橫趙云以武為御史所以肅清官儀下句武方為侍御直祿山亂從玄宗入蜀也光武為司𨽻校尉時三輔東迎更始見諸將過皆冦幘而服婦人衣莫不笑之或有畏而走者及見司𨽻僚屬皆歡喜不自勝老吏或垂涕曰不圖今日見復漢官威儀劉琨傳清嘯而胡騎退郤飛傳自河隴傳張戀反逢人問公卿趙云史玄宗入蜀擢誎議大夫則天寶末武任蜀中矣飛傳即傳遞之報也河隴則會蘭熙河洮岷入階文州西來蜀中之道蓋肅宗即位靈武前路梗澀多由此路來蜀中有飛傳自河隴來武必問公卿為誰或問某人在亡不知萬乘出雪涕風悲鳴受詞劍閣道謁帝蕭關城河隴劍閣蕭關城事新舊史皆不載趙云上兩句言肅宗七月丁卯即位靈武又十月癸未次彭原郡在蜀之逺亦不知萬乘所出之的所以雪涕悲鳴于是請于玄宗乞往行在蕭關在原州謂平涼郡即今原州舊注非寂寞雲臺仗庾信哀江南非無北闕之兵猶有雲臺之仗飄飄沙塞旌趙云言行宫儀衛草創也沙塞指河隴行在之地江山少使者笳鼓凝皇情顔延年窮逺凝聖情又笳鼓震溟洲壯士血相視忠臣氣不平密論正觀體揮發岐陽征肅宗理兵鳳翔感激動四極聨翩收二宗二宗長安東都二史皆不載武收復功鳳趙云正觀體言太宗朝事岐陽征固指朔而道實事然亦左傳成王有岐陽之搜也史至德初赴肅宗行在房琯薦為給事中已收長安拜京兆少尹則中間建議收復密論揮發之事矣西郊牛酒再沈休文碑牛酒日至壺漿塞陌西郊謂文王牛酒謂擊牛釃酒饗士原廟丹青明叔孫通為原廟注原重日至以有廟今更立之修張良廟教云可改構棟宇而修丹青也月趙云西郊長安西郊二駕還復之所經至德二年九癸卯復京師十月丁卯車駕入長安則已具牛酒矣十二月丙午上皇至自蜀郡則又具牛酒謂之再歟舊注謂文王大非原廟丹青明則賊陷京師焚毁九廟車駕既入首營建之丹青宫室之飾匡汲俄寵辱匡衡汲黯衡霍竟哀榮衛青霍去病少趙云匡衡汲黯言鄭公諫諍如之既拜京兆尹坐房琯事貶巴州刺史此寵之所辱也衡青霍去病言鄭公能用兵如之為東川節度使遷謫中可哀而復榮也哀榮則自其生也榮其死也哀而摘用之四登會府地三掌華陽兵既收長安以武為京兆少尹兼御史中丞時年三十二後又遷京兆尹兼御史大夫華陽成都武以史思明阻兵不之官優遊京師頗自矜大出為綿州刺史遷劍南東川節度使登發上皇誥以劍南兩川合為一道拜武成都尹充劍南節度使入復求為方面拜成都尹在蜀纍年恣行猛震威震一方趙云會府指京兆府成都府鄭公京兆少尹又為京兆尹為成都尹劍南節度又復節度劍南此為四登會府也三掌華陽兵其事實具于題下注中書曰華陽黑水惟梁州則東西川皆華陽京兆空栁色色一云市張敞為京兆尹走馬章臺街唐詩有章臺栁尚書無履聲漢哀帝擢鄭公為尚書僕射數求見諫諍上初納用每見曵革履上笑曰我識鄭尚書履聲注生曰華已趙云上句又申言兩為京兆之舊迹桞色章臺栁是若作栁市非下句言其在外加檢校吏部尚書而未嘗以尚書之識見上羣鳥自朝夕白馬休橫行成帝時御史府中列柏株常有野鳥朝趙云上句言為殿中侍御史而遷為别官故鳥但自夕也下句言為諫議大夫漢制諫議大夫無常員皆名儒宿德為之𨽻光祿張湛為光祿大夫數陳正議常乘白馬武每有異政輒曰白馬生生且復諫矣休橫行言其常乘白馬矣今為别官則休止馬之橫行也或曰侯景為亂乘白馬以青絲為鞚而應讖公詩屢使白馬以言賊則此方只説嚴公耳諸葛蜀人愛文翁儒化成陳壽言蜀人愛亮雖甘棠之詠召公鄭人之歌子産未足為過西漢文翁守蜀召下縣子弟以為學官弟子為除更繇高者補郡吏以為孝弟力田由是大化蜀之學于京師比齊魯公來雪山重公去雪山輕雪山西山趙山四句言鎮成都諸葛文翁皆取其在蜀比之雪山在松維州外今威茂州也積雪雖夏不消故號雪山及緊與吐蕃為界公來雪山重言安而不搖故吐蕃畏公不敢動搖而輒犯順所以為重也輕重亦如鹽鐵論言賢者所在國重所去國輕記室得何遜韜鈐延子荆梁書何遜為建安王記室王愛文學之士日與逰宴又為廬陵王記室復隨府于江州晉孫楚字子荆參石苞驃騎軍事四郊失壁壘虛館開逢迎堂上指圖畫軍中吹玉笙趙云上兩句言鄭公所辟幕客皆美材也禮記四郊多壘卿大夫之辱也虛館開逢迎言開閣以禮士公孫洪至宰相封侯起客館開東閣以延賢人與參謀議下兩句則政治優遊可見豈無成都酒憂國只細傾時觀錦水釣問俗終相并意待犬戎滅人藏紅粟盈前兩句言其車騎之出非專為問遊終以問俗為事以兹報主願庶或一作獲裨世程趙云犬戎吐蕃鄭公再節度劍南日破吐蕃七萬衆于當狗城遂克盬川城西然其意終待盡滅而人免誅求家給人足也庶獲一作庶或非炯炯一心在見此心炯炯君應識注沉沉二竪嬰晉侯求醫于秦伯使醫緩為之未至公夢疾為二竪子曰彼良醫也懼傷我焉逃之其一曰居肓之上居膏之下若我何醫曰疾不可為也在肓之上膏之下攻之不可達之不及藥不至焉不可為也公曰良醫也顔回竟短折顔回二十九蚤死武終時年四十洪範注短未六十折未三十賈誼徒忠貞褚淵碑忠貞允亮飛旐出江漢潘安賦飛旐翩以啓路孤舟轉荆衡荆衡楚地舟趙云鄭公死于蜀靈襯舟行而歸陶淵明或棹孤虛無馬融笛悵望龍驂塋空餘老賔客身上愧簮纓杜田補遺晉征吳童謡曰阿童復阿童銜刀飛渡江不畏岸上獸但畏水中龍阿童王濬小字武帝因以謡言拜濬為龍驤將軍太康六年卒葬柏谷山大營塋域葬垣周四十五里面别開一門松柏茂盛本傳所載止此非以龍驤名墓也趙云後漢馬融性好音樂作長笛賦今云虛無馬融笛則鄭公好笛可知矣老賔客公自言也愧簮纓公蓋感歎其因武之辟為參謀而官為工部員外郎賜緋者也贈太子太師汝陽郡王璡舊本作贈字非汝陽讓帝子眉宇真天人虬鬚似太宗色映塞外春讓皇帝憲本名成器睿宗長子立為皇太子以玄宗有討平韋氏之功懇讓儲位封寧王薨諡讓皇帝長子汝陽郡王璡也書生相太宗龍鳳之姿天日之表又有虬鬚射趙云舊史無所考證若新史璡眉宇秀整性謹潔善帝愛之則出于公詩讓皇帝睿宗子玄宗以其有高世行故追諡讓皇帝有子十九人其聞者璡莊琳瑀枚乘七發陽氣見于眉宇之間天人以曹植比之邯鄲淳見曹植曰天人也植于魏為陳留王以比汝陽王公嘗贈二十韻詩特進羣公表天人夙德升亦此之謂真天人字鄧禹傳注衆皆竊言劉公真天人虬鬚似太宗蓋實道其事塞外未知指何地或曰其就封汝陽為塞外按後漢郡國志汝南郡高帝置雒陽東南六百五十里有上蔡則蔡州也唐地理志蔡州汝南郡管縣十其一曰汝陽然以汝陽為塞外所未安或别有所主未見以俟博聞往者開元中主恩視遇頻出入獨非時禮異見羣臣愛其謹潔極新史採此語倍此骨肉親從容聽朝後或在風雪晨忽思格猛獸江都王力格猛獸苑囿騰清塵司馬相如諫獵書今陛下好陵阻險卒然遇逸材之獸駭不測之地犯屬車之清塵豈不殆哉羽旗動若一萬馬肅侁侁三禮圖全羽為旞析羽為旗皆五采繫之于旞旗之上謂注旄于竿首也詩侁侁征夫注衆多貌詔王來射鴈拜命已挺身箭出飛鞚內上又回翠麟又一作入翻然紫塞翮下拂明月輪趙云上言箭直上翠麟所騎馬箭出馬勒外且既上矣方未射落鴈下之間又急回轉馬言其能之捷也一作上入無義紫塞翮言鴈紫塞北塞崔豹古今注秦所築長城土皆紫色漢亦言塞者所以擁夷狄也鴈從北方來謂之紫塞翮或引鴈塞事非蓋鴈塞乃荆州事盛𢎞之荆州記鴈塞北接梁州汶陽郡其間東西嶺屬天無際雲飛風翥望崖回翼唯一處為下朔雁達塞矯翮裁度故名鴈塞同于鴈門也下拂明月輪言鴈下而拂弓胡人雖獲多天笑不為新長楊賦上將大誇胡人以多禽獸令胡人手摶之自取其獲上親臨觀焉天笑天子之笑薛云仙傳拾遺木公與一玉女投壺設有不入者天為之􅦍噓注􅦍噓開口而笑也􅦍呼監切王每中一物手自與金銀趙云京師常有胡人在馬天子射獵必命之獵袖中諫獵書扣馬久上陳漢武帝自擊熊逐獸相如因上書誎之伯夷叔齊叩武王馬而誎竟無銜橛虞相如書且夫湆通而後行中路而馳猶時有銜橛之變聖聰矧多仁官免供給費水有在藻鱗匪唯帝老大皆是王忠勤趙云言王雖隨射獵而有書諫獵在藻字詩魚在在藻水有在藻鱗非特止獵且不魚也子虛上林賦前既敘獵其後又言魚矣晚年務置醴門引申白賔璡厯大僕卿與賀知章褚廷誨為詩酒交天寶又加特進􅗛楚元王交好書多材藝少與魯穆生白生申公俱受詩于浮邱伯元王既至楚以穆生白生申公為中大夫初元王敬禮申公穆生不嗜酒元王每置酒嘗為穆生設醴師古曰醴甘灑也少麵多米不宿而熟不齊之也道大容無能永懷侍芳茵趙云言王好賔客家語道大無不容莊子無能者無所求公言王以道大而容其無能每禮待之所以未懷侍王之芳茵也好學尚貞烈義行必露巾揮翰綺繡揚篇什若有神趙云論語有顔回者好學傳義形于色孔融薦禰衡表思若有神川廣不可泝墓久狐兔鄰張孟陽七哀詩借問誰家墳皆云漢世主狐兔窟其中蕪穢不復掃川趙云言别後流落于蜀欲泝而上見王則廣不可泝倣詩漢之廣矣不可泳思宛彼漢中郡王弟瑀早有才望偉儀表天寶十五載從玄宗幸蜀封漢中王文雅見天倫見天倫恨莫俱注何以開我悲泛舟俱逺津溫溫昔風味少壯已書紳舊遊易磨滅衰謝多酸辛趙云言王弟之美劉公幹贈五官中郎將詩君侯多壯思文雅縱橫飛榖梁甲乙天倫以言兄弟泛舟俱逺津公泛舟往漢中王瑀泛舟來夔皆阻于逺津不能開此悲懷也詩溫溫恭人世説載支道林喪其同學法度之後神氣霣喪風味轉墜古詩少壯不努力周王褒與周𢎞讓書年事道盡容髮衰謝贈祕書監江夏李公雍趙云舊本作贈字非李自北海守罪死在天寶中至代宗時贈祕書監今以所贈官為題又曰江夏李公所未論也後漢郡國志江夏郡高帝置唐地理志鄂州曰江夏郡有江夏縣馬李揚州江都人而去江夏以俟博聞史云杜甫以雍負謗死作八哀詩傷之此詩六假自長嘯宇宙間至竟掩宣尼袂先論人才雕喪有李公文章人求其文奉以金帛李復以振施而終嘆其窮也自往者武后朝至魂斷蒼梧帝言雍敢言而以枉貶遵化尉事也自榮枯走不暇至易力何深嚌言雍再起再徙至于罪死也自伊昔臨淄亭至鯤鯨噴迢遰公敘與雍論文而傷雍以文見嫉且稱美其詩曰自坡陀青州血至舊客舟凝滯則申言憂雍死而不得往弔也末句重懷雍詩可以解長嘯宇宙間高才日陵替趙云長嘯嘆嘯之長不必其若孫登阮籍之聲左傳上陵下替古人不可見前輩復誰繼憶昔李公存詞林有根柢唐文苑傳雍廣陵江都人父善注文選雍少知名在長安李嶠張廷圭並薦詞高行直堪為誎官聲華當健筆灑落富清製趙云庾信作宇文順文集序章表促筆一付陳琳風流散金石追琢山嶽鋭雍甲擅才名尤長碑頌中朝衣觀天下寺觀多出其手情窮造化理學貫天人際董仲舒言天人相與之際趙云文選見天人際干謁走其門碑版照四裔各滿深望還森然起凡例杜云左氏傳序發凡以言例雍雖貶黜在外人多齎金帛往求其文於趙云碑版謝靈運詩圗牒復磨滅碑版誰傳人杜預春秋分凡例若凡例凡土功之屬森然起凡例以雍文冇春秋體輕重適當蕭蕭白楊路徹寶寶珠惠龍宫塔廟湧浩劫浮雲衛杜田補遺釋氏要覽梵言塔婆唐言高顯今裕稱為塔梵言蘇偷婆唐言寶塔梵言崒堵波唐言墳梵言浮圖唐言聚相西域記建塔者謂立表且見塔有三義一表人勝二令他生住三為報恩皆有等級若初果一級二果二級三果三級四果四級表超三界也辟支佛十一級表未超無明一支故佛塔十三級表超十二因緣也度人經唯有元始浩劫之家部制我界統乘玄都法華經如人以力磨三千大千國土復盡抹為塵一塵為一劫廣異記丁約謂韋子威曰郎君終當棄俗尚隔兩塵儒謂之世釋謂之劫道謂之塵竊詳浩劫雖出道經子美所稱恐非也蓋俗謂塔之一級二級為一劫二劫故子美嶽麓道林二寺行亦曰塔劫宫牆壯麗敵也若以為世劫之劫則玉臺觀詩亦使浩劫字乃滕王於調露中任閬州刺史日所造去子美未百年豈可言浩劫因王造乎薛云南史阿育王佛滅度後一日一夜造八萬四千塔梵言塔華言廟也王簡樓頭陀寺碑功濟塵劫唐書辛替否曰窮金三修塔廟仙傳拾遺昆明池龍宫有仙方三十六首惠趙云墓間多種白楊得雍之文如寶珠洞徹所以為龍宫塔廟言道觀佛宇乃神龍宫中所湧之宇或塔或廟也浩劫無窮之劫龍宫之塔廟得雍之文亘厯浩劫而浮雲衛護之也宗儒俎豆事故吏去思計李玄盛為酒泉太守百姓思之請勒銘許之羊祐為荆州刺史立碑峴山百姓見而悲感號墮淚碑之趙云上句言作修學校記文宣王廟記之屬語俎豆事下句言使者太守縣令替罷而作頌政碑頌功德碑之屬前漢何武其所居亦無赫赫名去後常見思謝安為吳興守在宮無當時與去後為人所思眄睞已皆虛跋涉曾不泥趙云眄睞皆虛則其文字便應副之於一經目間來人已去而虛於前矣跋涉不泥又言來人無滯留也向來映當時豈猶勸後世沈休文論辭人才子並標能擅美獨映當世是以一時之士各相慕習也豐屋珊瑚鈎騏驎織成罽紫騮隨劍几漢高帝紀賈人毋得衣罽師古曰罽織毛若令􅀈及氍毹之類簾趙云豐屋大屋易曰豐其屋蔀其家珊瑚鈎屋中之鈎或帷帳之鈎以為雍之饋餉三字神仙傳王毋以珊瑚鈎擊玉壺而歌罽音居例切西胡毳衣也罽上所織者麒麟也義取無虛嵗傳言自古鬻文獲財者未如雍之盛憑趙云既有馬又隨之以寶劍與凡也分宅脫驂間感激懷未濟吳志周榆推道南大宅以舍孫䇿升堂拜母有無通共史記越石父賢在縲絏中晏子出遭之途解左參贖之延為上客趙云雍雖以文受財而氣義好與思古人分宅脫驂之事其所感激常以未有所濟為懷趙岐孟子章指雖千載之間猶為感激衆歸賙給美擺落多藏穢雍素負美名頻被貶斥皆以能文養士而賈生信陵之流執事忌勝剝落在外趙云衆人歸其能賙給在雍身則雖多藏而能擺落其穢也陶淵明飲酒詩擺落悠悠談請從余所之獨步四十年風聽九皋唳雍知名長安中死天寶初四十年間可謂獨步纍獻詞賦甚稱玄宗旨後因上計中使臨索其新文以文章徹天聽故有九皋唳云太趙云九皋唳比之以鶴詩鶴鳴于九皋傳言帝封山還汴州詔獻詞賦帝悅嗚呼江夏姿江夏黃香竟掩宣尼袂孔子獲麟反袂拭靣稱吾道窮或云江夏姿比以黃香之無雙漢人語天下無雙江夏黃香然出處無姿以俟博聞往者武后朝引用多寵嬖否臧太常議雍有批韋巨源諡議靣折二張勢初雍為左拾遺御史中丞宋璟奏侍臣張昌宗兄弟有不順之言請付法斷雍進曰璟言事關社稷望可其奏則天始允璟出謂雍曰子名位尚卑若不稱言禍將不測何為造次如是雍曰不顛不狂其名不彰衰俗凜生風排蕩秋旻霽忠貞負怨恨宫闕深旒綴放逐早聨翩低垂困炎厲雍始與張東之善貶富州司户又貶舍城丞召還為姚崇所嫉貶括州司馬徴為陳州玄宗東封回雍於汴獻詞賦頗自矜衒為張説斫惡發陳州贓事抵死許人孔璋疏救之會赦免貶遵化尉後於嶺南從中官楊思勗討賊有功轉栝滑淄三州刺史上計京師雍少有名纍被貶逐後進不識京洛聚觀以為古人或傳眉目有異衣冠望風尋訪門巷又中使臨問索其新文復為人陰中竟不進用日斜鵬鳥日魂斷蒼梧帝趙云雍以忠貞負寃而貶天子深居九重不加省察所謂宫闕深旒綴也旒冕之垂旒唐地理志嶺南道欽州管縣五遵化其一此放逐在早年已聨翩矣炎厲言遵化日斜鵬言其愁寂如賈誼蒼梧今梧州帝舜之狩至蒼梧而死魂斷蒼捂帝則雍魂斷於思帝舜之君梁吳筠酬鮑畿詩依依望九疑欲謁蒼梧帝公詩又云縹眇蒼梧帝榮一作䇿枯走不暇星駕無安稅李斯未知稅駕趙云言一榮一枮不常故走不暇所以無安穩稅駕之地榮枯一作䇿枯意謂扶䇿栝杖非是既言䇿杖豈更言星駕邪稅駕者止息其駕詩星言夙駕也幾分漢庭竹杜田補遺漢文帝三年初與郡守為銅虎符竹使符注應劭曰銅虎符第一至第五國家當發兵遣使者至郡合符乃聽受之竹使符以竹箭五枚五寸鐫刻篆書第一至第五張晏曰符以代古之圭璋從簡易也師古曰與郡守為符者為各分其半右留京師左以與之使音所吏切淄趙云雍從揚思勗討嶺南有功徒灃州司馬起為括滑州刺史上計京師以讒出為汲郡北海太守是也夙擁文侯彗魏文侯擁篲以迎朋友終悲洛陽獄事近小臣敝禍階初負謗易力何深嚌雍與栁績馬一匹及績下獄吉溫令績引雍議及休咎事遂誅趙云洛陽獄息夫躬傳躬用賈惠之流祝盜有人上書言躬懷怨恨非笑朝廷所進用侯星宿視天子吉凶與巫同祝誼上遣侍御廷尉逮躬繫洛陽詔獄欲掠問躬仰天大呼因僵仆死又蔡雍與其叔父質以中常侍程璜飛章言雍質以私事請託於劉郃雍上書不省於是下雍質於洛陽獄劾以大不敬以吕強伸請減死一等髠鉗然公於李公雍詩用洛陽獄字應以蔡雍比之耳小臣敝事晉獻公寵姬曰驪姬置毒於胙肉中以誣太子申生以其胙於犬犬斃與小臣亦斃雍之竟坐栁績之纍杖死北海郡新史云雍以讒娟不得留出為汲郡太守天寶中左驍衛兵曹參軍栁績有罪下獄雍嘗遺績馬故吉溫使引遺嘗以休咎相語隂遺賂宰相李林甫素忌雍因傅以罪詔遣祁順之羅希奭就郡杖殺之故如蔡雍以飛章而下洛陽獄如申生胙肉之事為可悲也禍階字易言語以為階詩惟厲之階其禍之階端起於負謗而在孤危之中易為力以排之夫以易為力可排之身而排之者何至於深嚌之乎此公之所為傷也嚌音才詣切注嘗至齒也書所謂太保受祭嚌禮所謂君執鸞刀羞嚌今云深嚌則直盡之矣伊昔臨淄亭酒酣託未契甫陪李北海宴厯下亭詩是後趙云臨淄亭在齊州末契陸機歎逝賦託末契於生余將老而為客重敘東都别朝陰改軒砌論文到崔蘇崔信明蘇源明皆以文章擅世趙云潘安仁楊仲武誄日昃景西望子朝陰論文到崔蘇公雖無顯注崔豈崔尚者乎指盡流水逝近伏盈川雄唐文苑傳楊炯為盈川令卒張子曰楊盈川文思如縣河注水酌之不竭既優於盧昭鄰亦不減王勃未甘特進麗特進李嶠良趙云張説曰李嶠之文如金美玉無施不可公壯逰詩往者十四五出逰翰墨場斯文崔魏徒以我似班揚自注云崔鄭州尚魏豫州啓心蘇豈蘇頲乎頲與李又對掌書命帝曰前世李嶠蘇味道文擅當時號蘇李今朕得頲又何愧前人哉又景龍後與張説以文章顯稱望略等故時號燕許大手筆按頲從封泰山還卒年五十八考玄宗封泰山之年在開元十三年時杜公亦近二十嵗則亦前此得逰於蘇頲矣與於十四五而見崔尚為不相戾是非張相國相扼一危脆玄宗東封回雍於汴纍獻詞賦稱旨頗自矜自云當居相位又素輕張説時説為中書令甚惡之趙云相國張説新史雍素輕張説與相惡會稽人告雍贓貣枉法下獄當死竟減死貶遵化尉公詩蓋言是亦非張説以相國勢力所能勝特雍身危脆易於一扼耳爭名古豈然魏文帝典論文人相輕自古而然鍵捷欻不閉老子善閉者不用關鍵趙云鍵巨健切牡鑰也欻許勿切有所吹起貌古語爭名於朝爭利於市公今云爭名古豈然鍵捷欻不閉言爭名之説自古如此亦當牢閉關鍵勿誇捷急勿令開露方是全身之道而雍於關鍵則捷急而欻然不閉所以召禍深悲之也例及吾家詩曠懷掃氛翳慷慨嗣真作和李大夫咨嗟玉山桂郤詵崑山片玉桂林一枝鍾律儼高懸鯤鯨噴迢遰趙云公以詩自負如此言例及則雍與公比肩以詩為常例也氛翳言讒謗之人玉山桂鐘律鯤鯨皆比其詩玉山之桂取其秀拔鍾律取其聲之和雅鯤鯨取其勢之強壯坡陀青州血蕪沒汶陽瘞雍葬所書趙云青州總言山東禹貢海岱惟青州周禮正東曰青州坡陀青州血傷言杖死也汶水之陽在魯今之鄆州閔子騫吾在汶上矣下句言雍權葬之處哀贈竟蕭條恩波延揭厲代宗時國恩例得贈祕書監趙云雍以讒死至代宗時例得贈祕監此為恩波延揭厲也邱遲侍宴詩肅穆恩波被詩深則厲淺則揭延揭厲所延及淺及深普及之也子孫在如線舊客舟凝滯史不絶如線江淹别賦舟凝滯於水濱趙云上句傷其無後下句公自傷其流落在雲安未能扁舟以走君臣尚論兵將帥接燕薊朗􅀈六公篇雍有張桓等五王洎狄相公六公詩憂來豁蒙蔽盧藏用嘗謂雍如干將莫耶難與爭鋒但虞傷缺耳後卒如其言六趙云上兩句時多艱當復如雍者慷慨陳説故􅀈其公篇可以解憂也公自注張桓等五王則桓彥範敬暉崔玄暉張東之袁恕已與狄仁傑為六也豁字殷浩謂諸子勿謂吾任方州豁平音意又王獻之使人惋悲政常隨事豁之耳見本朝淳化法帖公於過郭代公故宅斷章云髙􅀈寶劔篇神交付冥漠句法同此後漢張衡七辨豫雖蒙蔽不敏旨趣敬授教命故祕書少監武功蘇公源明武功少也孤徒步客徐兖趙云源明京兆武功人擅名鄉邑故得直以武功名之如榮陽言鄭虔也新書少孤寓居徐兖蓋出杜詩言之耳讀書東嶽中十載考墳典新史源明初名預字弱夫少孤寓居徐兖工文辭時下萊蕪郭忍飢浮雲巘負米晚為身每食臉必泫子路為親百里負米源明養不及親負米自為而已故每食必泫正趙云東嶽泰山也萊蕪兖州縣名下萊蕪郭言其自東嶽而下也泫則泫然流涕之謂夜字照爇薪薛公文士傳侯瑾字子瑜家貧傭賃暮燒柴薪讀書趙云照爇薪暗用晉中興書范旺家貧好學燃薪寫書既畢誦讀亦竟垢衣生碧蘚庶以勤苦志報兹劬勞願趙云詩曰哀哀父母生我劬勞源明既喪父母則勤苦為學所以圖報劬勞也學蔚醇儒姿賈山涉獵書記不能為醇儒文包舊史善左傳序仲尼因魯史䇿書成文其餘皆即用舊史灑落辭幽人歸來潛京輦射䇿君東堂宗匠集精選制可題未乾乙科已大闡文章日自負吏祿亦纍踐晨趨閶闔內足踏宿昔趼杜田補遺蔡雍獨斷稱漢制天子之書四一䇿書二制書三詔書有三品其文告某官如故事是為詔書羣臣有所奏請尚書令奏下之有制詔天子答曰可以為詔書羣臣有所表必請無尚書令奏制曰之字則答曰已奏如書亦曰詔書四曰戒敕自魏晉已後背因循以册書詔敕總名曰詔唐因隋不改趙云辭友人離去東嶽也本傳源明天寶間及進士第更試集賢院故云射䇿謂量其小大署為甲乙之科列而置之不使彰顯冇欲射者隨其所取得而釋之以知優劣吏祿亦纍賤晨趨閶闔內則史之所謂纍遷太子諭德纍遷則纍賤之義太子宫在禁內則趨闔閣內之義宿昔研言由貧賤中來也足胝曰趼莊子曰舍重趼一麾出守還源明纍遷太子諭德出為東平太守故召為國子司業薛云文選屢薦不入官一乃出守麾黃屋朔風卷不暇陪八駿虜庭悲所遣平生滿樽酒斷此朋知展憂憤病二秋有恨石可轉安祿山陷京師源明以病不受偽官守趙云詩我心匪石不可轉也言麾去之遂出為守出還史謂出為東平守召為司業也天子之車其蓋之裏飭之以黃是為黃屋選詩黃屋非堯心黃屋朔風卷明皇乘輿以祿山反而出狩祿山自幽燕反是為朔風卷源明既由東平還京適值天子出狩不得扈從而留虜庭每悲恨以遣懷耳八駿周穆王乘八駿以出逰祿山陷京師故為虜庭又云源明雅善杜甫鄭虔方源明在賊則平生滿樽酒斷此朋知展可知矣肅宗復社稷得無逆順辨肅宗復兩京權考功郎中知制誥趙云汚賊為逆不汚賊為順范煜顧其兒沈休文宋書范煜為高祖相國掾稍遷太子詹事坐謀反誅范泰之子醉趙云若范煜李斯徒有顧憶耳范煜坐謀反誅臨刑其子藹亦醉取地土及果皮以擲煜呼謂别駕數十聲曰父子同死不能不悲此謂顧其兒也李斯憶黃犬李斯傳二世二年七月具斯五刑論腰斬咸陽市顧謂其中子曰吾欲與若復牽黃犬俱出上蔡東門逐狡豈可得言汙賊受誅者惟祕書異乎是矣祕書茂松意源明後以祕書少監卒茂松意以不變節於艱危如松柏不為風霜所奪再扈祠壇墠前後百卷文枕籍皆禁臠篆刻揚雄流溟漲本末淺言其文美也禁臠事晉元帝始鎮建業公私窘罄每得一豚以為珍膳項上一臠尤美輒以薦帝羣下未嘗敢食呼為禁臠揚雄謂賦為童子雕蟲篆刻壯夫不為然雄竟為河東長揚羽獵賦傳於後故曰揚雄流溟漲本末淺則謂其文之波瀾浩汗雖溟海之漲比之猶為淺師云書曰為三壇同墠謝靈運海賦溟漲無端倪青熒芙蓉劒犀兕豈獨剸吳越王允常取純鈎劒示薛燭曰光乎如屈陽之華沉沉如芙蓉始生於湖王褒頌巧冶鑄干將之朴水斷蛟龍陸剸犀兕反為後輩褻豫實苦懷緬師云張雄詩𬗟懷古哲人趙云上句比源明諫諍能斷割於事緬彌兖切注逺也此事不見史傳當以公詩為正煌煌齊房芝事絶萬手搴漢武大興祠祭齊房生芝而作歌肅宗時宰相王嶼以祈禬進勸上興祠禱事禁中稍崇淫祀源明數進時政得失趙云宰相王嶼勸興祠禱事源明日王者之於天地神祇享之以牲幣而已平日不祈方士被淫巫愚祝妄有關説甚為不可事絶萬手搴則當時佐為淫祀指望搴取房芝者非一手也垂之俟來者正使貞勸勉不要縣黃金胡為投乳贙獸名似犬杜田正謬爾雅贙有力注出西海名秦國似狗多力獷惡音畎又音鉉炙轂子載贙銘曰爰有獷獸厥形似犬飢則馴服飽則反眼出于西海名之曰贙言趙云下兩句且危之也乳贙言贙之乳者猶乳虎也佞媚則黃金可縣而切直則犯上之怒不啻投乳贙也贙字沈佺期且懼威非贙寧知心似狼結交三十載任彥升哭范雲僕射結歡三十載生死一交情吾與誰遊衍新史一言源明雅善杜甫鄭虔榮陽復冥寞罪罟已橫罥嗚呼子逝日始泰則終蹇長安米萬錢凋喪盡餘喘戰伐何當解歸帆阻清沔趙云言源明死公不得一弔酹之逰衍詩及爾遊衍榮陽指鄭虔公自有本注橫罥橫去聲言源明未死間猶及見肅宗反正之後時已向泰矣源明死後時復屯蹇舊注引是時乘大盜之餘國用覂屈史思明陷洛陽有韶幸東京源明以方旱飢陳十不可以遂罷東幸却是源明生前事豈不與今詩相反乎下句公言其在雲安不得泝汚歸鄉覂音捧尚纒漳水疾劉公幹余嬰沉癎疾竄身清漳濵永負蒿里餞蒿里送士大夫庶人挽歌故著作郎貶台州司戶榮陽鄭公虔文藝傳虔鄭州榮陽人天寶初為協律郎鶢鶋至魯門不識鍾鼓響莊子至樂篇昔者海鳥止於魯郊魯侯御而觴之于廟奏九韶以為樂具太牢以為善鳥乃眩視憂悲不敢食一臠不敢飲一杯三日而死此己巳養養鳥也非以養鳥養鳥也海鳥鶢鶋也孔子謂臧文仲不智者三祀鶢鶋一也注鶢鶋止於魯東門文仲使國人祀之孔翠望赤霄愁思雕籠養孔翠孔雀翡翠其志丹霄霄然終不免籠樊之愁者以其質異於衆禽也故鷦鷯賦彼鷲鶚鵾鴻孔雀翡翠或陵赤霄之際或託絶垠之外翰羽足以沖天觜距足以自謂然皆負繒嬰繳羽入貢何者用於人者然也也鶋趙云禰衡鸚鵡賦閉以雕籠剪其羽翼言鄭公如鶢如孔翠翡鍾鼓所能樂之雕籠所能拘之滎陽冠衆儒早聞名公賞地崇士大夫况乃氣清爽往者公在疾蘇許公頲位尊望董素未相識早愛才名公自哀問天然生知姿學立遊夏上神農或闕漏黃石愧師長苦石古詩也薛云漢張良傳老父出一編書曰讀是則為王者師後十三年孺子見我濟北榖城山下黃石即我矣遂去不見世所謂三略者即其書也此言黃石愧師長名其人耳非書也公著薈蕞等諸書之外又撰胡本草七卷趙云生知論語生而知之者上也學立遊夏上則以四科文學子遊子夏故也本傳虔長於地里山川險易方隅物産兵戌衆寡無不詳乂云初虔追紬故書可志者得四十餘篇國子司業蘇源明名其書為薈稡今公自注作薈蕞按字書稡子骨切䄶稡也而䄶蒲骨切䄶稡禾秀不成聚向上貌會稡之義意言聚會稡細之物若公所用薈蕞是詩薈兮蔚兮左傳蕞爾薈薈烏外切草多貌蕞徂外切小貌薈蕞之義意言蕞小之物二名字不同而義相近當以公詩為正公下又注云虔著書之外又撰胡本草七卷故今所云神農或闕漏以言其於藥石名什乃神農本草之不載者也黃石世有黃石公兵書三略藥纂西極名兵流指諸掌趙云西極名則胡本草之謂藝文志兵家者流論語指諸掌貫穿無遺恨薈蕞何技癢趙云文賦常遺恨以終篇公言詩亦曰毫髮無遺恨顔氏家訓載應劭風俗通太史公記高漸離變名易姓為人傭保匿作於宋子久之作苦聞其家堂有擊築技癢不能無出言伎癢者懷其技而腸癢潘嶽射雉賦亦心徒心煩而伎癢今史記並作徘徊或作倣徨不能無出言是為俗寫傳誤圭臬星經奧蟲篆丹青廣新史虔集撰當世事著書八十餘篇有窺其藁者告虔私傳撰國史虔蒼黃焚之坐謫十年名其書為薈稡孔子作春秋遊夏不能贊虔私撰國史是出其上也神農黃石藥纂兵流皆古書也言虔無不貫穿復通遊藝星經丹青之類以趙云圭臬言其善地理選言陳圭置臬圭者土圭所測日景臬者表臬所以度廣狡王粲海賦吐星出日天與水􅕉其深不測其廣無臬星經又言能天文二者必欲精敵所以言其奧蟲篆言其書字雖出楊子雲賦童子雕蟲篆刻而此言蟲篆必謂其篆字耳丹青又言能畫續晉陽春秋戴逵善圖畫窮巧丹青二者其事博所以言廣子雲窺未遍揚雄字子雲少好學博覽無所不見方朔詣太枉東方朔上書臣年十三學三冬文史足用十五學擊劒十六學詩書誦二十二萬言十九學孫吳兵法戰陳之具鉦鼓之教亦誦二十二萬言凡臣朔已誦四十四萬餘言趙云上句言竒宇與方言下句虔能知荒逺之所在東方朔每言其所諧皆神仙之處故云詣枉猶太迃枉王粲海賦章亥所不極盧敖所不屆與今句之勢相似神翰顧不一體變鍾兼兩杜補遺書苑田虔善草𨽻吕揔云虔書如風送雲收霞催月上鍾兼兩鍾繇鍾會也繇魏人字元常善𨽻書行草亦盡其妙精思學書卧畫被穿如厠忘歸袁昻云鍾書有十二種意外巧妙實亦多竒會字士季繇之子也亦善書羊欣云繇行書二王之亞子會書勗骨謹密頗有父風或曰兼兩車按後漢吳恢為南海太守欲殺青寫書子祐諫曰此書若成則載之兼兩昔馬援以薏苡被謗王陽以衣裳徼名嫌疑之間先賢所慎是詩美鄭虔書翰體變非言車也當以兼兩鍾為正趙云鍾兼兩杜時可引書苑云云是詩美鄭虔書翰體變非言車也田意謂兼二鍾為是然田何必惑兼兩之字謂有出邪車謂一兩乃去聲其兼兩亦去聲矣於鍾字有何説邪則字變態如鍾而兼其父子謂之鍾兼兩方可解説雖然未敢必也以俟明識文傳天下口大字猶在榜昔獻書畫圖新詩亦俱往滄洲動玉陛宣一作寡鶴誤一響三絶自御題四方尤所仰虔自寫其詩并畫以獻帝大署其尾曰鄭虔三絶趙云滄洲動玉陛言滄洲隱淪之客而動天子子玉陛之上舊本誤一響或云繕本是悟字言感悟君王在乎一響詩鶴鳴于九皋聲聞于天是也今從悟字寡鶴獨鶴之謂舊本正作宣鶴師民瞻本又作宫鶴皆無義嗜酒益疏放虔嗜酒疏放故杜甫贈詩賴得蘇司業時時與酒錢蘇司業源明趙云嗜酒字出揚雄傳彈琴視天壤嵇康自送歸鴻手揮丘絃趙云莊子示之以天壤形骸實土木親近唯几杖趙云嵇康傳土木形骸親近言親之近之如淳于長以外親親近蓋言親近天子今言几杖則未嘗暫離之意未曽寄官曹突兀倚書幌虔初坐謫還京師上愛其材欲置左右以不事事更為置廣文館以為博士聞命不知廣文曹司何在宰相曰上贈國學置廣文館以居賢者今後世言廣文博士自君始不亦美乎晚就藝香閣遷著作郎魚豢典略藝香辟紙魚蠧故藏書臺稱藝臺趙云虔由廣文博士遷遷著作郎而著作郎即典文簿故云胡塵昏塊莽反覆歸聖朝點染無滌蕩值祿反遣張通儒劫百官官置東都偽授虔水部郎中因稱風緩求市令潛以密章逹靈武故云言無一點所染不煩澆蕩之也老蒙台州掾輕泛浙江槳祿山平免死貶台州司戶參軍趙云賊平與張通叔王維並囚宣陽里三人皆善畫崔圓使繪齋壁虔方悸死即極思祈解於圓卒免死貶台州思戶參軍事故云履穿四明雪東郭先生久待詔公車貧困其唐史潛以汚上足迹踐也飢拾楢溪橡四明楢溪皆浙江地名言虔貧困拾橡而食之杜田補遺唐史虔以汚祿山偽官貶台州司户四名楢溪皆屬台州孫綽天台賦登陸則有天台四名台二山相接台州齋楢溪而直進食趙云暗使列子冬日橡栗空間紫芝歌見上隱士休歌紫芝曲注不見杏壇丈莊子漁父篇莊子逰乎緇帷之林坐乎杏壇之上弟子讀書孔子絃歌鼓琴奏曲未必有漁父者下船而來趙云兩句則以四皓與漁父比之天長眺東南秋色餘魍魎天台賦始魑魅之塗卒踐無人之境之趙云左傳入山不逢不若魑魅魍魎莫能逢魑魅山中之物别離慘至今班白徒懷曩春山秦山秀葉墜清渭朗劇談王侯門野稅林下鞅鮑明逺無由稅歸鞅侯趙云公懷思長安時有劇談者在王之門而我稅鞅於林野不得去也操紙終夕酣時物集遐想詞場竟疏濶平昔濫推奬慮諶濫吹乖名實舊趙云推奬推舉奬借之公憶鄭之推奬已也注詩即是齊宣王使人吹竿東郭處士雜其間至文王即位一一聼之處士乃逃方知其濫事如此非徒於今句無義又成甚句法耶百年見成無牢落吾安放一云倣蕭條阮顔在世處同世網阮咸阮熙子任逹不拘雖處世不交人事他日放江樓含棲述飄蕩著作與今祕書監鄭君審篇幹齊價謫江陵故有阮咸江樓之句趙云吾安倣孔子將死曵杖而歌曰泰山其頽乎梁木其壞乎子貢曰泰山其頽吾將安仰梁木其壞吾將安放阮籍與其姪咸共為竹林之逰今以阮咸比鄭審故云空餘阮咸在也舊注非出處同世網審謫江陵公客夔之云斯為同出世處江樓指江陵之樓故右僕射相國張公九齡相國生南紀金璞無留礦張九齡父為韶州别駕因家始興今為曲江人九齡幼敏善屬文十三以書干廣州刺史王方慶大嗟賞之曰此子必能致逺玉玉未成器曰礦言九齡成器早故不能礦漢杜田補遺詩滔滔江漢南國之紀説者援是詩以江為南紀非也蓋南紀乃非野名唐天文志云東循嶺徼達甌閩中是謂南紀所以恨蠻夷也張相國曲江人曲江𨽻詔州正嶺徼平越之地大抵自江漢以南皆謂之南紀非特江漢而已圓覺經曰譬如銷金礦金非銷故有雖復本來金皆以銷成就一成真金體無復仍為礦仙鶴下人間獨立霜毛整矯然江海思復與永路永趙云以仙鶴之譬言之義又以通貫鶴本仙物既人間整刷翰固矯然有優逰江海海之思而復思奮飛與雲路齊永寂寞想土階未遑箕𨽻等堯土階三尺想土階有致君堯舜之心也有致君之心故未遑遑于箕𨽻𨽻山水巢父許由隱地上君白玉堂倚君金華省九齡登進士第應拔萃登乙科拜校書郎玄宗在東宫舉文藻之士親加策問九齡對策髙第遷右拾遺白玉堂金華省言直登金華之地為趙云張公為校書郎為左拾遺左補闕為中書舍人祕書少監集賢院學士皆此上白玉堂而俯金華省也任昉為王思逺辭侍郎表敷奏于金華省之上進揖于玉堂下碣石嵗崢嶸天地自蛙黽趙云碣石海畔山于常夾行其右書曰夾右碣石是也碣石嵗峥嶸似以比九齡之孤髙鮑明逺舞鶴嵗崢嶸而愁暮注廣雅曰峥嶸髙貌嵗之將盡猶物之髙今云碣石嵗峥嶸言碣石之嵗嵗孤髙也下句言聲之喧雜時李林甫周事故耳牛仙客為尚書九齡執不可帝以林甫之言決用之國語蛙黽之與同渚齡師云碣石在朔方斥祿山野蛙黽以羣小在位九言祿山反帝荒淫不聽遂去相位退食吟大庭何心記榛梗大庭古致治之國言九齡雖退食之間未嘗忘致治趙云大庭古致治之主九齡思反淳復朴如大庭之世每退食自公嘗吟詠之不復記其有猜嫌榛梗之事骨驚畏曩哲鬒變負人境鬒黑髮變而為白以負人事而巳謝玄暉誰能鬒不變趙云畏不逮於前人下句則憂其髮白將老傷功名之不立江淹别賦心折骨驚雖蒙換蟬冠右地恧多幸侍中冠加貂蟬九齡為相以文雅為相知右相李林甫惡之引牛仙客以傾之遂罷趙云上句乃侍中事豈九齡亦加侍中而史不載邪漢官儀侍中冠武辨大冠亦曰惠文官加金璫附蟬為文貂尾為飾謂之貂蟬下句以尚書右丞相丞相罷政事言九齡在右地以慙恧為多幸何者有林甫之嫉仙客之憾則得此為幸矣敢忘二疏歸疏廣為太子太傳謂兄子受日吾聞知足不辱知止不始豈如父子相隨出關歸老不亦善乎遂上疏乞骸骨公卿設祖道供帳東都門上痛迫蘇耽井趙云神仙傳蘇仙翁耽郴縣人養老至孝言語虛無時謂之癡忽辭母云受性應仙當違供養涕泗欲别母曰汝去之後使我如何存活曰明年天下疫疾庭中井水簷邉橘樹可以代養井水一升橘葉一校可療一人縣東北有山仙翁有栖遊處因而得仙九齡為工部侍郎知制誥乞歸養詔不許而致於母死所痛者迫切于蘇耽之留井橘以代養也九齡詔州人詔西北言與郴接才一百八十里故得以為紫綬映暮年荆州謝所領初九齡為相薦長安尉周子諒為監察御史至是子諒以妄事休咎上親加詰問今于朝堂上決之九齡坐引非其人左遷荆州大都督府長史庾公興不淺庾亮鎮武昌諸府吏殷浩之徒乘月登南樓我而不覺亮至將起避之亮徐曰諸君少住老子于此興不淺便據胡牀與浩等談詠其坦率如此黃霸鎮每靜賔客引調同謝靈運異代可同調諷詠在務屏趙云循吏傳黃霸獨用寬和為至擢為揚州刺史穎川太守治為天下第一自漢興言治民吏以霸為首調同倒用故對務屏其字則屏去裕物也詩罷地有餘篇終語清省一言發陰管淑氣含公鼎乃知君子心用才文章境九齡善屬文有集二十卷趙云言九齡能詩文有名稱也一陽發陰管黃鍾之律也言其詩和而可聽于耳淑氣含公鼎大亨之和也言其詩美而可味於口下兩句則以其文有用之文故也此詩前押鬒髮負人境今又才用押文章境蓋所未解豈人境字乃人景乎散帙起翠螭倚薄巫廬並謝靈運散秩無所知巫廬二山名趙云言開散曲江文帙种物欻起其髙至並巫廬之山也翠螭字揚解難翠蚪綘螭之將登乎天廣雅龍有角曰曰螭既皆龍屬則翠螭可互用也倚薄相附著也謝靈運拙疾相倚薄巫廬郭景純江賦巫廬嵬崫而比嶠巫則巫山在夔州廬則廬山在江州綺麗玄暉擁箋誄任昉騁謝眺字玄揮少有美名為文綺麗任昉字彥升長於箋誄之趙云綺麗陸機文賦或藻思綺合清麗芊岷摘而用擁則言其多騁則言其放皆集中文字如此也自我一家則未闕隻字警史記序勒成一家傳序隻字之褒千秋滄海南名繫朱鳥影韶州即滄海之南朱鳥南方之宿當時謂九齡為滄海遺珠其有名稱矣歸老守故林戀闕悄延頸波濤良史筆蕪絶大庾嶺恨賦絶蕪絶於異城九齡自荆州請歸拜墓因遇疾卒年六十八諡文憲至得初上皇在蜀思九齡先覺祿山靣有反相乃下詔褒贈司徒仍遣使救韶州致尊趙云守故林其在荆州久之封始典伯伯請還展墓也向時禮數隔制作難上請再讀徐儒碑猶思理煙艇後漢徐雅字儒子為南州髙士趙云上兩句言帝眷巳衰難以所字作上請于朝也此豈九齡有為史之書邪後漢徐孺子曲江為之墓碣其銘所謂靈芝無根醴泉無源者是也公之句意蓋言昔嘗讀之而起煙艇之興今再讀之而巳思理煙艇則以慕徐孺之髙風故江漢之念不忘也小舟曰艇師云九齡嘗督淇州作徐孺子碑載舟舟中醉為馬所墜諸公携酒相看甫也諸侯老賔客罷酒如歌拓金戟騎馬忽憶少年時散啼迸落瞿唐石白帝城門水雲外低身直下八千尺粉堞電轉紫遊韁粉堞城堞也以堊土塗之故曰粉堞韁以紫絲為之故曰紫韁師云庾信時醉來拓金戟散趙云阮籍詩憶昔少年時曹子建身低身馬蹄古詩白馬紫逰韁東得平岡出天壁江村野堂爭入眼垂鞭嚲鞚凌紫陌向來皓首驚萬人自倚紅顔能騎射安知決臆追風足朱汗驂驔猶噴玉朱汗血汗驂驔猶步驟也噴玉噴沫如玉杜田補遺古樂府驄馬行驄馬鏤金鞍拓彈落金九意欲驂驔走先作野遊盤穆天子傳歌曰黃之澤其馬噴玉皇人夀穀師云王褒詩萬里決臆駒崔豹古今注始皇七馬一名追風疾趙云決臆度度於胸臆追風太宗十驥之一名俊俊之義驂驔崔液正月十五夜遊詩驂驔始散東城曲倐忽還逢南陌頭不虞一蹶終損傷人生快意多所辱趙云一蹶王褒過都越國蹶如厯塊雖無一字而意是快意魏文帝芙池作遨遊遊快心意職當憂戚伏衾枕况乃遲加煩煩促朋知來腆腆我顔杖藜強起依僮僕語盡還成開口笑提携别掃清溪曲酒肉如山又一時初筵哀絲動豪竹共指西日不相貸喧呼且覆杯中渌趙云衾字起于初詩角枕粲兮錦衾爛兮而摘用之遲暮煩促杖藜開口笑初筵字蓋皆有出楚辭傷美人之遲暮張茂先恬矌苦不足煩促每有餘莊子原憲杖黎應門又載盜跖云開口而笑一月之中不過四五日詩賔之初筵是巳酒肉如山又倣左傳有酒如澠有肉如陵何必走馬來為問君不見嵇康養生被殺戮嵇康著養生論後以事誅言何必以我走馬輕生為問正若嵇康養生而不免誅戮則事豈可料乎李潮八法小篆歌蒼頡鳥迹既茫昧字體變化如浮雲蒼頡黃帝臣觀鳥迹而為文字自蒼頡之後字體變易如浮雲無定體趙云孔子不義而富且貴于我如浮雲陳倉石鼓又已訛大小二篆生八分周太史籀始創大篆唐蘇載記石鼓文謂之周宣王獵碣共十鼓其文則始籀大篆漢蔡雍字伯喈為中郎將正六經于太學石壁天下摹學雍大篆入妙品小篆者秦丞相李斯刪古文椱篆及史籀之書也初諸侯力正文字異形秦始皇帝初兼天下丞相李斯乃奏同之罷其不與秦文合者斯作蒼頡篇胡母敬作博學皆取史籀大篆或頗改所謂小篆杜田補遺書苑云八分書秦羽人上谷王次仲飭𨽻書為之鍾繇謂之章程書王愔曰王次仲始以告書方廣少減勢建中初以𨽻書作楷法割李斯分始皇得次仲文簡略赴急疾之用甚善之蔡文姬别傳臣父雍言八分書割程邈𨽻字去八法割李斯小篆去二分取八分故曰八分書蔡希總曰王次仲以楷法局促更引而伸之為八分故號曰八分書懷瓘云八法本謂楷書楷者法也漸若八字分散故名八分趙云陳倉屬鳯翔石鼓事其略見韓退之詩周綱陵遲四海沸宣王憤起揮天戈又云鐫詩勒成告萬世鑿石作鼓隳嵯峨則周宣之物也其上所篆字見東坡詩注云我車既攻我馬既同又云其魚惟何惟鱮惟鯉何以貫之惟楊與栁此在東坡所見時云惟此六句可讀餘多不可通不知杜公時所見如何也秦有李斯漢蔡雍中間作者寂不聞嶧山之碑野火焚棗木傳刻肥失真嶧山碑李斯書也為野火所焚人惜其文故以棗木傳刻史記始皇二十八年東行郡國上鄒嶧山刻石頌秦德苦縣光和尚骨立書一作畫貴瘦硬方通神杜詩補遺後漢桓帝紀延熹八年春正月遣中常侍左悺之苦縣祠老子注老子苦縣厲鄉人屬陳國故城在今亳州續漢書桓帝夢老子令中常侍左悺於賴鄉祠之詔陳相邉韶立祠謙刻石即蔡雍伯喈八分書也又靈帝紀光和五年始置鴻都門生注于鴻都門內置學其中諸生皆敕州郡三公舉召能為尺牘辭賦及工書鳥篆者書苑云靈帝好書詔天下尚書于鴻都門至者數百人時南陽人師宜官稱八分為最大則一字徑丈小則方寸千言甚矝其能以是考之疑苦縣蔡雍書光和師宜官書也及詳觀此歌嶧山之碑野火焚謂李斯書也苦縣光和尚骨立謂蔡雍書也故初言秦有李斯漢蔡雍次言惜哉李蔡不復得卒言丞相中郎丈人行而未嘗一言師宜官然苦縣之祠立于桓帝之延熹而光和靈帝之年號豈非祠立于延熹而碑刻于光和乎延熹至光和才十年之近爾或謂光和為伯喈書華碑碑苦縣老子朱龜碑未知孰是趙云李斯蔡雍蓋善八分之有名稱者苦縣光和事杜時可引後漢云云次公推公尚骨立之語則以苦縣于前時巳有蔡雍碑刻至光和再刻之幸未失真而尚有骨立為可責蓋公之所以瘦硬為神故于嶧山之碑則傷棗木之時真于苦縣之碑則熹光和之尚骨立也下句李蔡不復得重結上文豈容光和碑更是師宜官書邪書貴瘦硬一作畫字非惜哉李蔡不復得李斯蔡雍吾甥李潮下筆親尚書韓擇木騎曹蔡有鄰開元已來數八分潮也奄有二子成三人韓擇木昌黎人官工部尚書散騎常侍工八分師蔡雍法風流間媚號伯喈中興蔡有鄰濟陽人官胄人曹軍善軍分始拙弱至天寶中遂精妙相衛間多其筆迹况潮小篆逼秦相快劍長戟森相向八分一字直百一作千金蛟龍盤拏肉屈強吳郡張顛誇草書草書非古空雄壯張旭吳郡人官左率府長史善草書言吾見公主擔夫爭路而得其意後又觀公孫氏舞劍器而得其神醉取草書揮筆大呌以頭濡墨水中天下呼為張顛醒後自視以為神人謂之草聖豈知吾生不流宕丞相中郎丈人行丞相斯中郎雍丈人行尊老之稱巴一作江東逢李潮逾月求我歌我今衰老才力薄潮乎潮乎奈如何趙云末句倣頃羽歌虞兮虞兮奈若何之勢韓退之石鼓歌少陵無人謫仙死才薄將奈何鼓何蓋又倣此句益見公為退之所服如此巴東巴一作江非巴東言夔州别蔡十四著作賈生慟哭後塞落無其人安知蔡夫子髙義邁等倫獻書謁皇帝志巳清風塵流涕灑丹極萬乘為酸辛天地則創痍朝廷當一作多正臣異才復間出周道日惟新趙云當正臣言當須正直之臣舊本作直臣非劉向向正臣進者治之表賈生賈誼陳治安之策有慟哭者一莊子載孔子聞將軍髙義列子説符篇為等倫皆許諾前漢季布傳今創痍未瘳詩周雖舊邦其命惟新使蜀見知巳别顔始一伸主人薨城府扶櫬歸咸秦巴道此相逢巴道蜀道相如諭蜀文巴蜀之士會我病江濵趙云使蜀見知巳則郭英乂為蜀節杜使蔡為使往見之也史記士伸于之已主人言郭英乂英乂永秦元年閠十月為崔旰所殺所以言薨而蔡著作扶護靈櫬由舟行以歸秦也巴道指夔州船泊夔州與公相逢也憶念鳯翔都聚散俄十春我衰不足道但願子意陳稍令社稷安自契魚水親蜀先主得孔明猶魚之得水也我雖消渴甚敢忘帝力勤尚思未朽骨復覩耕桑民積水駕三峽浮龍倚長津揚舲洪濤間仗子濟物身趙云古歌帝力何加於我哉老子云其人與骨俱朽文子積水成海魏都賦回淵漼積水深也駕字郭景純逰仙詩髙浪駕蓬萊劉協彌勒石像碑似揚舲遊水馳錫登山王粲海賦洪濤奮蕩西京賦云起洪濤而揚波鞍馬下秦塞王城通北辰北辰北極象于帝居趙云下秦塞則出陸矣北辰孔子譬如北辰玄甲聚不散兵久食恐貧杜田補遺竇憲傳班固燕然山銘玄甲曜日朱旗降甲天注玄甲鐡甲也前書玄甲國之玄窮谷無粟帛使者來相因若馮南轅使書札到天垠趙云馮讀為慿窮谷指夔州來相因者來不斷借使漢書太倉之粟陳陳相因之字自長安望夔在北而望南也故來夔之使為南轅南轅字出左傳書札古詩客從逺方遺我一書札天垠指夔州以逺故云天垠也别李義神武十八子十七王其門道國洎舒國實惟親弟昆唐髙祖二十二子止此云十七王其門未詳也趙王名元慶第十六子舒玉元名第十八子鮑云髙祖二十二子道王元慶舒王元名衛懷王玄霸楚哀王智雲皆先薨太子建成巢王元吉以事誅詔除籍故止言十八太宗冇天下故有十七子封王八趙云神堯唐高祖史髙祖二十二子今詩云神堯十子豈以竇皇后所生建成太宗玄霸元吉而建成元吉誅太宗為皇帝玄霸在隋時已死于四子之外乃有十八子耶學者尚疑之然謂十七王其門則又可疑也又豈以萬妃所生智雲亦終被害于隋末耶其所在髙祖為唐皇帝而得封者元景王荆元昌王漢元亨王酆元方王周元禮王徐王嘉王韓元則王彭元懿王鄭元軌王霍元鳯王虢王慶王道元裕王鄧元名王舒靈夔王魯元祥王江安元曉王密元嬰王滕凡十七子為得王而各為一門者耶鄒陽與梁孝王書何王之門而不可曵長裾耶道國道王也名元慶乃第十六子舒國舒王名元名乃第十八子也而曰實惟親弟昆若言同一母所生而史載元慶則劉婕妤所生元名則小楊嬪所生其母同者乃字文昭儀生元嘉及第十九子靈夔所謂實惟親弟昆者又與史不合然則公當失親所傳聞與親不合必有能辨之者中外貴賤殊余亦添諸孫趙云詳味詩意則李義者道國之裔孫而公則舒國後裔之外孫故也舊注不省解却云公自言杜與李同出于陶唐氏是何夢語蓋前篇與唐十八使君詩云與君陶唐後自是杜與唐何得輒差排為杜與李乎丈人嗣王業唐制諸子襲封者謂之嗣王之子白玉溫道國繼德業請從丈人論丈人領宗卿肅穆古制敦先朝納諌諍直氣橫乾坤子建文章壯河間經術存曹子建能文漢河間明王經術獻禮樂三雍之教趙云丈人言李義之父嗣王業則繼嗣前王之業舊注云云才有字相犯便妄引用非是之子指李義也白玉溫使溫其如玉也下句道國繼德業請從丈人論又以申言丈人乃道國之論其能繼道國之德業者請從李義之父言之也宗卿宗正卿也唐制宗正寺卿一人從天子掌天子族親屬籍以别昭穆領陵臺崇玄二署肅穆字邱遲詩肅穆恩波被先朝納諫諍考其時當時玄宗然未敢必也溫克富詩禮骨清慮不喧洗然遇知己談論淮湖奔憶昔初見時小𥜗繡芳蓀文選芳蓀紫綺為上櫺袴也師云謝靈運詩浥露馥芳蓀廣趙云襦短衣也史記載賈誼過秦論寒者利短褐徐注曰一作短小襦音竪舊注妄添選五言詩為七字何輒附會如此長成忽會靣慰我久疾魂三峽春冬交江山雲霧昏正宜且聚集恨此當離樽莫怪執杯遲我衰涕唾煩王仲宣但訴杯行遲解嘲涕唾流珠沫趙云莫怪執遲遲以語衆人也舊注引仲宣詩却是訴主人行杯之遲耳師云孫楚詩離樽悲當席重問子何之西上岷江源願子少千謁蜀都足戎軒誤失將帥意不如親故恩甫幾不能脫嚴武之暴又為郭英乂所不容有是句少年早歸來梅花已飛翻趙云王粲四言詩茍非鴻雕孰能飛翻公于言江亦曰滄浪鬱飛翻努力慎風水豈惟數盤飱古詩所謂加飱食猛虎卧在岸蛟螭出無痕王子自愛惜老夫困石根趙云數角反努力字出吳越越春秋舊注于慎風水注云言世若風波穿鑿非是猛虎卧在岸蛟螭出無痕却有所興寄矣生别古所嗟發聲為爾吞趙云楚辭悲莫悲于生别離吞字韻倒押吞聲字恨賦莫不飲恨而吞聲送髙司直尋封閬州丹雀銜書來文王之時赤雀銜書集于周社暮樓何鄉樹驊騮事天子辛苦在道路司直非冗官荒山甚無趣借問泛舟人胡為入雲霧與子姻婭間既親亦有故詩瑣瑣姻婭萬里長江邉邂逅一相遇趙云丹雀驊騮以比髙司直尚書中侯曰赤雀銜丹書入豐止于昌前昌拜稽首受之舊注非驊騮事列子周穆王肆意逺逰駕八駿之乘有曰右服驊騮謂之事天子則以穆王稱穆天子有傳也司直通籍事主故以丹雀之于文王驊騮之于穆王比之長卿消渴再公幹沈綿屢長卿相如病渴劉公幹詩余嬰沈痼疾故竄身清漳濵趙云王無功病後醮宅云公幹苦沉綿居山畏不延清談慰老夫開卷得佳句時見文章士欣然淡情素伏枕問别離疇能忍漂寓良會苦短促溪行水奔注熊羆咆空林遊子慎馳騖西謁巴中侯閬為侯中難險如跬步趙云巴中侯封閬州也主人不世才先帝常特顧拔為天軍佐崇大王法度淮海生清風南翁尚思慕公宫造廣厦木石乃無數初聞伐松柏猶卧天一柱趙云拔為天軍佐則必嘗佐禁旅之任淮海生清風則必嘗為揚州等處官南度南方老人也頃籍傳南公曰楚雖三户亡秦必楚公宫左傳溝其公宫又曰楚其公宫凡官府貴處謂之公宫矣天一柱言廊廟之神具異經崑崙有銅柱焉其髙入天所謂天柱列子昔共工與顓帝爭怒而觸不周之山天柱折其一柱字則緣􅍮南有一柱觀止用一柱則得合言天一柱此門閬州之為廊廟氣不足當之舊注惑于公宫事却注云幕府方須材意以使髙言之言之非是我病一作瘦書不成成字亦多誤為我問故人勞心練征戍此時觀末章則閬州是房琯也以趙云前十句總言封閬州方貫此下句蓋故人字所指閬州也我疾所以成長卿消渴再公幹沈綿屢之句一作我瘦非書不成豈干瘦事遣懷昔我逰宋中惟梁孝王都宋古大梁名今陳留亞陳留屬汴州劇則貝魏俱貝魏州名在河北劇大邑中九萬家髙棟照通衢舟車半天下主客多歡娛趙云孝王都今之京師汴都是巳陳留在今雖為京師屬縣在唐則今之東京唐陳留郡也貝魏在河北方靣最繁劇主客者何主則本處人客則逰寄者選時朝野多歡娛白刃讎不義黃金傾有無殺人紅塵裏報答在斯須言多豪俠趙云鮑明逺詩失意杯酒間白刃起相讎憶與髙李輩髙適李白論交入酒壚兩公壯藻思得我色敷腴世説王濬仲為尚書令著公服乘軺經黃公酒壚中過顧謂後車客曰吾昔與嵇叔夜阮嗣宗共酣飲此壚竹林之逰亦預其未自嵇康阮籍云亡便為時所羈紲今日視此雖近還若山河榮師云鮑照行路難意氣敷腴在盛時薛云爾雅蕍也郭璞曰蕍猶敷蕍亦草之榮也氣酣登吹一作文臺懷古視平蕪吹臺梁王歌臺今謂繁臺左太沖詩酒酣氣益振慨趙云西清詩話唐史稱杜甫與李白髙適同登吹臺然莫測也質之少陵昔遊昔者與髙李晚登單父臺則知非吹臺三人皆詞宗果登吹臺豈無雄詞傑倡著後世邪杜田云豫謂蔡氏蓋謂曽熟讀杜詩爾遣懷詩不云乎昔我逰宋中惟梁孝王都名今陳留亞劇則貝魏俱憶與髙李輩論交入酒壚氣酣登吹臺懷古視平蕪此豈非甫與李白髙適同登吹臺邪其説是吹臺在今宋門外謂之天清寺繁臺是巳于梁孝王時曰吹臺蓋歌吹之臺也一作文臺非芒碭雲一去鴈騖空相呼前漢髙祖隱于芒碭山澤間吕后與人俱求常得之髙祖怪問后后曰季所居上常有雲氣故從往常得季雲去乃人亡也不欲指言之耳人亡鴈騖相呼先帝正好武寰海未凋枯猛將收西域長戟破林胡玄宗拓開拓境土如安祿山王君㲋張守圭王宗嗣輩皆以邉功為巳任故張説獻鬪羊以針之而上不之改百萬攻一城獻捷不云輸組練棄如泥國語吾人大破楚軍楚之危者維組練三百而已組甲被練也尺土負一作勝百夫拓境功未已元和辭大爐趙云鴈騖相呼以興其相寂如麋鹿逰姑蘇黍離麥秀之類玄宗盛時以百萬兵攻一城豈無勝負但獻捷而巳未嘗言輸組練棄如泥則不憚物之費爭一尺之土以百夫為償則不惜人之命莊子以天也為大爐末句言政失其和于天地間矣亂離朋友盡合沓嵗月徂吾衰將焉託存沒再嗚呼蕭條益堪愧獨在天一隅一云蕭條疾益堪愧獨天一隅友趙云詩亂離莫矣洞簫賦薄索合沓注云重沓也朋指言髙李孔子甚矣吾衰也天一隅字古詩各在天一隅乘黃已去矣凡馬徒區區不復見顔鮑顔延年鮑明逺鮑嘗作荆州參軍作蕪城賦以諷宋臨海王趙云乘黃神馬言髙適李白顔鮑又以申比二公公嘗與白詩云俊逸鮑參軍則顔乃以比髙適乎繫舟卧荆巫荆州巫峽臨飱吐更食常恐違撫孤趙云蓋恐違戾撫養髙李二公之孤也此其為朋友之義君不見簡蘇徯君不見道邉廢棄池君不見前者摧折桐百年死樹中琴瑟蔡邑取㸑下桐為琴一斛舊水藏蛟龍積水成淵蛟龍生焉趙云異苑吳平在勾章州門外忽生一株桐上有謡歌之聲平惡而斫之其後桐自還立于故根上又聞歌聲曰死樹今更青吳平尋當歸桐材所以為琴瑟言今死樹猶可為之以譬士終有用也庾信擬連珠曰日南枯蚌猶含明月之珠龍門死樹尚抱咸池之曲舊注非是言蛟龍終非池中物則蛟龍固在水而池中之水亦有蛟龍矣雖一斛舊水猶可藏之亦以譬士當守所養也丈夫蓋棺事始定古詩蓋棺事乃也君今幸未成老翁何恨憔悴在山中深山窮谷不可處霹靂魍魎兼狂風趙云君幸老成老翁選魏文帝帝與吳質書時有所慮乃至通夜不暝志意何時復類昔日巳成老翁但未白頭耳末句以不知有何所恨而甘心憔悴於山中乎乃陳山中不可住招之使出矣此亦宋王招魂之意贈蘇四徯異縣昔同逰各云厭轉蓬古詩為客若轉蓬植趙云古詩它鄉各異縣曹雜詩傳蓬離本根飄颻隨長風袁陽源郊古詩勤役未云巳壯年徒為空乃之古時人所以悲轉蓬離别已五年尚在行李中左傳晉秦圍鄭燭之武夜見秦伯曰行李之往來注行李使人戎馬日衰息乘輿安九重天子之門九重乘輿天子所乘輿時京師初復有才何棲棲將老委所窮為郎未為賤甫為宣義郎檢校工部員外郎非以階官後篇云雖為尚書郎可以證矣其奈疾病攻子何靣黧黑焉得豁心胸巴蜀倦剽劫下愚成土風崔旰之亂幽薊已削平祿山節鎮荒徼尚彎弓時思明未平斯人脫身來豈非吾道東儒林傳初梁頃生從田何受意丁寬為頃生從者讀易精敏材過頃生遂事何學從寬東歸何謂門人易已東矣師古曰言寬丁得其法術矣去巴趙云上兩句方指言蘇徯靣黧黑字列子靣目黧黑蜀倦剽劫則段子璋之亂又崔旰之亂燕薊尚彎弓則安之亂雖已削平而猶有盜賊彎弓字史士不敢彎弓而報怨斯人又指蘇徯在危難之間脫身來此蓋亦以道合行于巴中猶古人所謂吾道東也乾坤雖寬大所適裝囊空肉食哂菜色少壯斯老翁况乃主客間古來逼側同趙云在傳肉食者鄙菜色傳云民無菜色下兩句言時之寬舒則寬舒同時之逼側則逼側同也西京賦駢羅逼仄公傳有詩逼側行者亦用此耳君今下荆揚獨帆如飛鴻二州豪俠埸人馬皆自雄一請甘飢寒再請甘養蒙趙云欲其晦迹以自全耳寄薛三郎中人生無賢愚飄飄若埃塵自非得神仙誰免危其身與子俱白頭役役一云沒沒常苦辛雖為尚書郎不及村野人憶昔村野人其樂難具陳藹藹桑麻交公侯為等倫天末厭戎馬我輩本常貧趙云雖為尚書郎固是實道為尚書工部員郎郎之事而木蘭歌云木蘭不用尚書郎有此三字也具陳見首篇注等倫字列子全語説符篇載俠客相與言必滅虞氏之家為等倫皆許諾天末選賦有玄雲斂天末詩有云佳人眇天末戎馬老子云戎馬生于效子尚客荆州我亦滯江濵峽中一卧病瘧癘終冬春春復加肺氣此病蓋有因早嵗與蘇鄭蘇源明鄭虔是也痛飲情相親二公化為土嗜酒不失真蘇鄭亦皆嗜酒也趙云言其酒以死余今委修短豈得恨命屯聞子心甚壯所過信席珍上馬不用扶每扶必怒嗔趙云記儒有席上之珍以待聘每扶一作忽非非蓋每字與必字相應也賦詩賔客間揮灑動八垠乃知蓋代手可蓋覆當代也漢書功業蓋當才力老益神青草洞庭湖東浮滄海漘君山可避暑况足采白蘋杜補益嶽州圖經洞庭湖在縣西南一里荆州記云巴陵南有青草湖與洞庭湖相連接周回數百里日月出沒其中湖之南有青草山因以為名博物志曰君山洞庭之山也庾穆之山記云昔秦始皇皇欲入湘觀衡山而遇風浪機敗溺至此山而免因號為君山又荆州圖經云湘君所逰故曰君山有神祈之則利涉韓退之黃陵廟碑載山海經曰洞庭之山帝之二女居之則君山者因湘君得名非始皇也韓碑辨湘君夫人事甚詳不不復祿子豈無扁舟往復江漢津我未下瞿唐空念禹功勤聽説松門峽吐藥攬衣巾髙秋却束帶鼓枻視清旻趙云十二句蓋公有意于扁舟儘南而下陳其所厯所遊之處欲借薛郎中所往復江漢之舟而往然未下瞿唐外空念禹功則劉子所為美禹功微禹禹吾其魚乎也聞松門峽之好則方喫藥而吐之遽攬衣巾思去也松門峽無所考亦亦如巴峽中有瞿唐灘當時遂名為瞿唐峽者乎以俟博聞髙秋束帶而鼓枻則方言是往時矣論語束帶立于朝潘安仁西征賦鼓枻迥輪注郭僕方言曰今江東人呼枻為軸鳯池日澄既濟濟多士新余病不能起健者勿逡巡上有明哲君下有行化臣趙云鳯池指禁省之地晉荀勗守中書監事中專管機事及遷尚書令中有賀者曰奪我鳯凰池諸公何賀焉濟濟多士四字詩之全語健者指言薛劇蓋有所望之也健者兩字後漢袁紹傳董卓欲廢立紹勃然曰天下健者豈為董公大覺髙僧蘭若巫山不見廬山逺松林蘭若秋風晚杜正謬云釋氏要覽曰蘭若者梵言阿蘭若唐言無諍四分律云空靜處薩婆論云云間靜處智度論云逺離大悲經阿蘭若注云云離諸惡務故數説不同其實無諍也而趙云廬山逺廬山逺惠也大覺和尚雖是巫山之僧比為逺公往謁之而不遇故云巫山不離廬山逺蘭若宫宫名蓋梵語耳一老猶鳴日暮鐘諸僧尚乞齋時飯趙云漢初入曜隱于淮陽山中有四皓俱徴曜獨不至時人語曰南山四皓不如淮揚一老又管寧書惟陛下聽野人山藪之類使一老者得盡微命若本出則魯哀公指孔子為一老香爐峰色隱晴湖香爐峰廬山勝境如香爐上有飛泉種杏仙家近白榆神仙董奉居廬山治病重者種杏五株輕者一株號董仙杏林廬趙云公題下注云和尚去冬往湖南今此乃言廬山山事即隱晴海是江南彭蠡湖恐湖南字誤香爐峯事逺法廬山山記東南有香廬山孤峯秀望籠氣逰其上氛氲若煙野近白榆言其所居之髙近乎一辰古詩曰天上何所有厯厯種白玉飛錫去年啼邑子髙僧有飛錫而赴齊者見三十四卷太陽沙門詩注杜補遺昔髙有峯逰五臺出淮西擲錫飛空空而往西天比丘持錫有威二十五義凡至十中不得著地必挂於壁牙故逰子稱逰行僧為飛錫安住僧為挂錫孫綽天台賦云王喬空鶴以沖天應真飛錫以躡虛注應真得道人獻花何日許門徒髙僧傳戒行言潔天女來獻花人趙云言去年往湖南也天台山賦飛錫注云得真道人執杖而行于虛空故云飛錫也邑子同邑于子也朱買臣傳會邑子嚴助貴幸薦買臣獻花事後分經載釋迦初為淨惠仙人時獻五蓮花於燃燈佛此獻花之祖也其後獻花於羅漢者如法記注龍神捧鉢而曲躬天女獻花而胡跪門徒者一門之徒屬如七十二子為孔門之徒又漢漢李固傳表舉薦達例皆門徒此皆一門徒屬之義佛書所外載之道之黨類亦謂之門徒其在佛傮則謂諸弟子來從者為徒門矣九家集注杜詩卷十四
