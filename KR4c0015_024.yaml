body:
  text: 九家集注杜詩卷二十四宋郭知達編近體詩戲作寄上漢中王二首王新誕明珠雲裏不聞雙鴈過掌中貪見一珠新趙云㑹稽典録曰虞同少有孝行為日南太守常有雙鴈宿止㕔上幽明録張華言入九館之人所見癡龍初一珠食之天地等壽鴈言雲裏則魏應璩曰詩朝鴈鳴雲中珠言掌中則佛書有云如掌中珠新添詩謂久無音問以王新得子故也漢使謂單于曰天子於上林射得鴈鴈足有蘇武擊書三輔決録孔融見韋元將與其父書曰不意雙珠生於老蚌秋風嫋嫋吹江漢只在他鄉何處人趙云屈原湘夫人篇云嫋嫋兮秋風吹江漢則公作此詩時在䕫州也公故於䕫州每用江漢則二水所經㑹于荆渚之下秋風嫋嫋吹江漢之際是何處人在此他鄉所以自述也其二謝安舟楫風還起梁苑池臺雲欲飛趙云謝安以比漢中王安嘗與孫綽等汛海風起浪涌諸人並懼安吟嘯自若人咸服其雅量西京雜記曰梁孝王好宫室苑囿之樂築兔園謝靈運雪賦歲將暮時既昏寒風積愁雲繁梁王不悅游於兔園俄而微霰零密雪下杳杳東山携漢妓泠泠一作陰陰修竹待王歸杜補遺續漢書梁孝王兔園多植竹即所謂修竹園地志云孝王東苑方三百里園苑中有鴈池修竹園杳趙云上句戲漢中王方在舟中其擕妓東山之興尚杳然又所以成謝安舟楫之句修竹待王歸又所以成梁苑池臺之句投簡梓州幕府簡韋十郎官新添幕下郎君安隱無趙云隱讀從穩佛書問訊世尊安隱否從來不奉一行書固知貧病人須棄能使韋郎跡也疏孟浩然詩不才明主棄多病故人疏亦此意答揚梓州悶到房公池水頭坐逢揚子鎮東州却向青溪不相見回船因載阿戎遊趙云青溪應地名偶同不然指水之青碧為青溪若緑水白水之義古詩云青溪如委黛載阿戎遊必是紀其載兒以遊也阮籍謂王渾曰共卿言不如與阿戎談阿戎王戎也渾之子贈韋贊善别扶病送君發自憐猶不歸詩式微式微胡不歸秖應盡客浪復作掩荆扉趙云客淚言為客之淚也雖宋人之際其身亦察胡爾沈休文宿東園詩云荆扉新且故江漢故人少音書從此稀往還二十載歲晚寸心違趙云寸心字本於列子載龍叔謂文摯曰吾見子之心矣方寸之地虛矣左傳云王必不違又文選庾信愁賦云且將一寸心能容萬斛愁又稽叔夜幽憤詩事與願違遘兹淹留又張季鷹秋日北園詩旅途驚歲晚歸興與心違送李卿煜王子思歸日長安已亂兵趙云王子指李煜也時有吐蕃之亂霑衣問行在趙云十月代宗出幸陜也走馬向承明趙云漢承明殿在未央宫霍光傳太后幸未央承明殿是巳此兩句併言李煜所以去之事漢武帝詔嚴助居承明之廬暮景巴蜀僻春風江漢清趙云歲暮之時僻在巴蜀公每有意為荆楚之遊預言其當春時在江漢間矣故云晉山雖自棄魏闕尚含情趙云按宣室志載唐故尚書李公銑鎮北門時有道士尹君者隱晉山不食粟嘗餌柏葉與今公在蜀詩全不相干按新唐書地理志閬州晉安縣下注云本晉城避隱太子諱更名此所謂晉山乎以俟博聞魏闕天子之闕也魏者大也所謂象魏是已莊子云身在江湖之上而心馳魏闕之下江文通詩云臨風默含情此兩句公自言其身在外而心常在朝廷也絶句江邊踏青罷回首見旌旗趙云或云江邊踏青乃成都事每以三月三日出郊言踐踏青草故謂之踏青是不知處處皆然孟浩然大隄行云歲歲春草生踏青三兩日又豈特川中邪新添注唐李綽輦下歲時記上已賜宴羣臣於曲江傾城人物於江頭禊飲踏青風起春城暮高樓鼓角悲趙云古樂府春城起風色九日登梓州城伊昔黃花酒如今白髮翁月令云菊有黃華費長房謂桓景曰九月九日可登高飲菊花酒以除災追歡筋力異望逺歲時同禮記老者不以筋力為禮弟妹悲歌裏朝廷醉眼中兵戈與關塞此日意無窮趙云兵戈以言格戰關塞以言屯戍時吐蕃之亂既與之戰且有防守也九日奉寄嚴大夫九日應愁思經時冒險艱左傳曰險阻艱難備嘗之矣不眠持漢節何路出巴山蘇武傳胸奴徙武北海上枚漢節牧羊卧起操持節旄盡落趙云武為明皇肅宗山陵橋道使故云不眠持漢節也下句則公自言蓋公時方在梓久客而欲出耳蜀都賦云東則左綿巴中百濮所充蓋自綿而東乃巴也小驛香醪嫩重巖細菊斑遙知簇鞍馬回首白雲間趙云此言九日所遇之景物也於此遙想其簇鞍馬而回首白雲以望之此嚴武所謂杜二見憶者也巴嶺答杜二見憶嚴武卧向巴山落月時兩鄉千里夢相思趙云嚴杜相去千里各在一涯而夢想也蓋亦千里共明月之意可但步兵偏愛酒阮籍聞步兵厨多美酒營人善釀求為校尉也知光祿最能詩謝光祿名莊字希逸七歲能屬文所著文字四百餘首行於世仕至光祿大夫江頭赤葉楓愁客楚詞湛湛江水兮上有楓籬外黃花菊對誰張季鷹黃花如散金跋馬望君非一度冷猿秋鴈不勝悲薛云此詩洪覺範謂之骨含蘇李體懷舊趙云此篇與下所思不見二篇蓋同時作何者公於三人平生之所善蘇源明巳死而追悼之題則曰懷舊鄭䖍貶台州而聞其消息題則曰所思李白久不見而近不得其音信故題曰不見懷舊晉潘安仁追悼楊肇父子嘗作懷舊賦故公倚以為題地下蘇司業情親獨有君趙云司業即源明也公於下自注地下字云王隱晉書載蘇韶見其弟節云卜商顔淵今為地下修文郎天寶間源明自東平太守召為司業其後以祕書少監卒今云司業則其當時聲稱之著也那因喪一作衰亂後便有一云作死生分趙云喪亂一作衰亂便有一云便作皆非蓋時雖亂而非衰便作不若便有之快老罷知明鏡悲來望白雲趙云南史蔡興宗傳太尉沈慶之曰加老罷私門兵刀頓闕知明鏡則因明鏡而知其老罷之狀也李陵與蘇武詩仰視浮雲馳又蘇武别弟詩曰仰視浮雲翔自從失詞伯不復更論文趙云王充論衡有云文詞之伯論文見魏文典論所思得台州鄭司戶䖍消息鄭老身仍竄台州信所一作始傳趙云古樂府有云有所思而古詩云所思在逺道䖍遷著作郎以安祿山之汙免死貶台州司戶參軍為農山澗曲卧病海雲邊趙云前漢楊惲云願為農夫沒此生矣謝𤣥暉有在郡卧病呈沈尚書詩卧病對為農公古詩亦云卧病識山鬼為農知地形世已疏儒素人猶乞酒錢趙云䖍好飲而貧乏公嘗與詩云賴有蘇司業時時與酒錢故今言人猶乞酒錢所以拈出舊語也徒勞望牛斗無計斸龍泉晉書張華寶劍事蓋以劍比鄭公之在台州如埋埋土中雖逺望其有衝牛斗之氣而無由掘顯之也台州鄷城皆在江南故得用之龍泉劍名水經注晉太康地理志曰縣有龍泉可以砥礪刀劍特堅利是以龍泉之劍為楚寶也又越絶詩曰楚王令人之吳越見鷗冶子干將使為鐡劍三枚一日龍泉二曰太阿三曰工市不見近無李白消息趙云漢文帝紀云吾久不見賈生公倚以為題不見李生久佯狂真可哀趙云箕子避紂而被髮佯狂唐新史載白以永王璘之纍長流夜郎㑹赦還潯陽坐事下獄世人皆欲殺吾意獨憐才趙云潯陽之役蓋亦衆人欲殺之證乎敏捷詩千首飄零酒一杯趙云漢書嚴延年為人短小精悍敏捷於事齊陸厥與沈約書云揚修敏捷謝惠連雪賦云憑雲升降從風飄雲王僧孺致仕表云堇蕣朝采飄零已及酒一杯素問云飲以美酒一杯杯新添張翰曰使我有身後名不如生前一酒匡山讀書處頭白好歸來白始隱岷山後客任居徂徠山山而並不載匡山杜補范傳正李白新新暮碑云白厥先避仇客居蜀之彰明太白生焉彰明有大小匡山白讀詩於大匡山有讀詩臺尚存其宅在清亷鄉後廢為僧坊號隴西院蓋以太白得名院有太白像唐綿州刺史高忱及崔令欽記所謂匡山乃彰明之大匡山非匡廬也書趙云詩意則公既在蜀而白舊有讀處欲招其歸來也題𤣥武禪師屋壁今梓州中江縣古𤣥武縣何年顧虎頭滿壁畫瀛洲虎頭僧相也顧杜正謬云厯代名畫記曰愷之字長康小字虎頭多才氣尤工丹青傳寫形勢莫不絶妙曽於瓦棺寺北殿畫維摩詰像畫訖光照月餘日趙云洪駒父嘗云顧愷之小字虎頭維摩詰是過去金粟如來故乞瓦棺寺北殿摩詰之詩卒章云虎頭金粟影神妙極難忘乃注云虎頭僧相金粟金地此殊可笑也洪之說如此以虎頭為愷之小字蓋本古今畫録所云耳然歐陽率更作類書于甘蔗門載世說曰顧愷之為虎頭將軍世說即即宋劉義慶之書其去晉為未逺而歐陽率所據全書中引用但更不見晉人别作虎頭將軍者一稱小字一是官號當俟博物者辨之瀛洲神仙十洲中之一名也赤石山林氣青天江水流此皆言所畫之景物也水一作海鍚飛常近鶴天台賦振金䇿之鈴鈴飛錫杖也又云髙真飛錫以躡虛注云得真道之人執錫杖而行於虛空故云飛也與杜補遺圖經載舒州潜山最竒絶而山麓尤勝志公白鶴道人欲之同請於梁武帝帝以二人悉具靈通俾各以物識其地得者居之道人云某以鶴止處為記志公云某以卓錫處為記巳而鶴先飛去至麓將止忽聞空中錫飛聲遂卓於山麓道人不懌然以前言不可食乃各於所識之地築室焉今之山祖寺靈仙觀即其故地也杯渡不驚鷗髙僧傳杯渡者不知其名姓常乘木杯渡河因名焉佛圖澄變化詭異圖澄在石勒時以為海鷗木杜正謬云傳燈録云劉宋時杯渡者不知姓名常乘杯渡水止宿一家有金像求之弗得因竊以去主人追之至孟津浮木杯渡河無假風棹輕疾如飛趙云錫飛杯渡則必畫僧之登山渡水者以不驚鷗宇貼之取列子狎鷗之意似得廬山路真隨惠逺逰趙云言所畫之趣似是廬山路可以尋惠逺大師也聞官軍收河南河北趙云史朝義巳滅漸復河南河北矣故公逺聞而賦詩也劔外忽傳收薊北初聞涕泣滿衣裳漢高祖徙燕將臧荼為燕王都薊薊即幽州薊縣唐分十道薊為漁陽屬河北道東師云唐寶應元年諸將擊史朝義朝義走河北遂克都十一月朝義幽州守將李懷光斬其首表獻河北平却看妻子愁何在漫卷詩書喜欲狂趙云公每憂喪亂而妻子流離既聞收薊北則天下有平定之理所以却看妻子而不知其愁之所在下句謂讀書之際聞巳收薊北得與妻子有長聚慶慶所以漫卷之而喜欲狂也白日放歌須縱酒青春作伴好還鄉放歌縱酒即喜欲狂之意即從巴峽穿巫峽便下襄陽向洛陽公自注云余田園在東京矣趙云此公之意欲離蜀還鄉涪江泛舟送韋班歸京得山字追餞同舟日傷心一水間趙云同舟而濟古詩云相望一水間心一作春飄零為客久衰老羡君還吳韋曜自陳衰老求去侍史二官花雜一作逺重重樹雲輕處處山梁元帝春日詩春情處處多何遜詩客子行行倦年光處處華天涯故人少更益鬢毛斑韋班歸京公猶在蜀則天涯故人鮮少矣憂思朋舊而鬢斑也春日梓州登樓二首行路難如此登樓望欲迷古樂府有行路難篇身無却少壯跡有但羇栖江水流城郭春風入鼓鞞趙云正月史朝義雖滅而三月党項羌寇同州郭子儀敗之于黃堆山兵戈猶未可巳所以有鼓鞞樂記聼鼓鞞之聲則思將帥之臣雙雙新燕子依舊巳銜泥古詩思為雙飛燕銜泥巢君堂右一天畔登樓眼隨春一作風入故園公前篇自注云余田園在東京戰場今始定移栁更一作豈能存趙雲故園之下雲戰場則又指東京而言是時史朝義巳滅戰場雖定而故園經盜賊所移之栁豈更能存乎更字乃疑辭也厭蜀交游冷思吳勝事繁公久居蜀交游少前詩有天涯故人少之句意欲逰兩浙也張翰在洛因秋風起而思矣應須理舟楫長嘯下荆門杜補遺云袁嵩宜都山川記曰南崖有山名荆門北崖有山名虎牙二山相對有象門也右二遣憤聞道花門將論功未盡歸趙云花門回紇也壬寅寶應元年回紇請助國討賊次歲癸卯廣德元年史朝義自縊死自從收帝里誰復總戎機趙云言既復帝里誰人總兵柄乎恐回紇恃功難制而作逆也蜂蠆終懷毒雷霆可震威左傳曰君無謂邾小蜂蠆有毒况國乎詩趙云蜂蠆言回紇也公於此疑回紇其比之為蜂蠆人眇之之辭也雷霆以言人君之威賈山傳云人主之威非特雷霆也震之以威豈有不摧折者哉言欲制回訖必須以威震之莫令鞭血地師云任昉書鞭血四海流離無所再濕漢臣衣送九歸成都文章亦不盡竇子才縱橫非爾更苦節何人符大名晉王獻之年七八歲學書羲之密從後掣其筆不得嘆曰此兒後當有大名易節卦苦節不可貞讀書雲閣觀問絹錦官城文選東京賦起甘泉結雲閣觀南山注云二世起雲閣欲與南山齊又起觀於南山㒹我有浣花竹題詩須一行贈裴南部聞袁判官自來欲有按問塵滿萊蕪甑堂橫單父吟范丹字史雲為萊蕪令清貧人歌曰釜中生魚范萊蕪甑中生塵范史雲宓子賤為單父宰彈琴不下堂而治人皆知飲水公輩不偷金鄧攸為吳郡載米之官惟飲吳水而巳直不疑為郎同舍郎告歸誤持同舍郎金去金主意不疑不疑買金償之後知非金主大慚稱為長者梁獄書應作去聲秦臺鏡欲臨師云鄭陽獄中上書梁孝王出之西京雜記秦始皇有方鏡照見心膽女子有邪心者照之即膽張心動始皇輒殺之獨醒時所嫉羣小謗能深即出黃沙在何須白髮侵使君傳舊德已見直繩心古詩清如玉壺冰直若朱絲繩奉送崔都水翁下峽無數涪江筏鳴橈揔發時筏海中舟編竹木為之大曰筏小曰桴橈楫也别離終不久宗族忍相遺白狗黃牛峽朝雲暮雨祠白狗黃牛皆峽名言崔都水所經從之地雨宋玉高唐賦序夢巫山之經曰妾旦為朝雲暮為行旦朝視之如言故為立廟號曰朝雲所過憑問訊到日自題詩郪城西原送李判官兄武判官弟赴成都憑高送所親久坐惜芳辰逺水非無浪他山自有春趙云逺水非無浪以言其行路之苦辛他山自有春言去當春時觸處皆可行樂故有下句野花隨處發官一作妖桞著行新江揔侍宴瑶泉殿詩云野花不識采旅竹木無行陶侃傳侃性敏察嘗課諸營種栁都尉夏施盜官栁植之於已門侃後見尉車問曰此是武昌西門前栁何因盜來此種施謝罪天際傷愁别離筵何太頻題郪縣郭三十二明府茅屋壁江頭且繫船為爾獨相憐雲散灌壇雨春青彭澤田師云博物志云太公為灌壇令武王夢婦人當道夜哭問之曰吾是東海神女嫁於西海神童我行必有大風疾雨今為灌壇令當道廢我行武王覺召太公問之果有疾風暴雨從太公邑外而過又吳叙雨賦云紆灌壇之神馭為高唐之麗質陶潜為彭澤令郭明府乃郪縣令灌壇彭澤皆令事故子美見之於詩以贈行也頻驚適小國孟子膝小國也一擬問髙天别後巴東路逢人問幾賢客夜客夜何曽著秋天不肯明魏文帝行旅詩曰漫漫秋夜長烈烈北風凉展轉不能寐披衣起倣徨其趙云睡著天明通中國之常語實道事而句可謂詣理矣入一作捲簾殘月影高枕逺江聲計拙無衣食途窮仗友生管子曰衣食足而知榮辱顔延年詠阮籍詩云云詩雖有兄弟不如友生老妻書數紙應悉未歸情陪王侍御宴通泉東山野亭江水東流去清樽日復斜趙云文選長歌行百川東赴海何時復西歸齊謝眺與江水曹詩山中上芳日故人清樽賞又梁劉苞望夕雨詩清樽久不薦淹留遂待君賈誼鵬賦云唐子日斜也異方同宴賞何處是京華趙云史曰秀異産於異方又云進各異方庾信烏夜啼御史府中何處宿文選昔余遊京華注云京華帝都也亭影臨山水村煙對浦沙狂歌過於勝得醉即為家趙云遇於字如過乎恭過乎儉之義豈言踰過於勝絶者乎客亭秋忩猶曙色落木更天一作高風日出寒山外江流宿霧中聖朝無棄物老病已成一作衰翁趙云老子長善救物故無棄物陳徐陵别毛永嘉詩嗟余今老病此别恐長離此蓋公不怨天不尤人之意與孟離然不才明主棄多病故人疏之語有間矣以謂聖世才無大小皆量能適用無棄擲者而公亦自嘆其老矣不能用也王粲傳魏太子與吳質書云行年長大所懷萬端巳成老翁但未白頭耳多少殘生事飄零已轉蓬趙云曹植雜詩曰轉蓬離本根飄颻隨長風類此客遊子捐軀逺從戎而袁陽源效古詩云乃知古時人所以悲轉蓬按淮南子曰聖人觀轉蓬而為車此借用其字以言人之飄零如蓬之轉也行次鹽亭縣聊題四韻奉簡嚴遂州蓬州兩使君咨議諸昆季馬首見鹽亭高山擁縣青雲溪花淡淡春郭水泠泠趙云花淡淡以其在雲溪故也陸士衡文賦音泠泠而盈耳又宋玉風賦云清清泠泠愈病析醒全蜀多名士蜀都賦近則江漢炳靈世載其英鬱若相如皭若君平王褒暐煜而秀發揚雄含章而挺生禮云聘名士嚴家聚德星陳仲弓從諸子造荀季和太史奏賢人聚故人號為德星聚長歌意無極好為老夫聽趙云三嚴或以為嚴震之昆季按唐史震梓州鹽亭人西川節度使嚴武署押衙武卒罷歸今公聞嚴武再鎮蜀自閬歸成都過此而見嚴氏則非嚴震家矣更俟博聞倚杖鹽亭縣作鮑照詩倚杖牧雞豚看花雖郭內倚杖即溪邊山縣早休市江橋春聚船趙云山縣早休市道事的當蓋如小市當爭米矣狎一作野鷗輕白日一作浪列子有狎鷗翁言忘機故物亦不懼光趙云言可狎之鷗遊泳乎白日之中而不知景之可重也勝一作逺矣歸鴈喜青天物色兼生意凄凉憶去年泛江送魏十八倉曹還京因寄岑中允參范郎中季明遲日深江水輕舟送别筵詩春日遲遲帝鄉愁緒外春色淚痕邊公詩無一日而忘朝廷故望帝鄉每生愁緒對春色妍媚而下淚則其憂國之心可見矣見酒須相憶將詩莫浪傳趙云見酒須相憶言别後他日事也下句公蓋自負其詩如此郭受與公詩云新詩海內流傳困豈能遏其傳哉若逢岑與范為報各衰年送路六侍御入朝童稚情親四十年中間消息兩茫然趙云鄧禹傳父老童稚垂髦戴白滿其車下言與路相得於總角時也更為後㑹知何地忽漫相逢是别筵不分桃花紅勝錦生憎栁絮白於綿趙云天厨禁臠者洪覺範之書也以分桃花紅勝錦生憎栁絮白於綿謂之比興興格且曰錦綿色紅白而適用朝廷用真材天下福也惟真材者忠正小人諂諛似忠詐訐似正故為子美所不分而憎之不知於桃花栁絮何所據而便比諂諛詐訐之小人乎杜公造為新語其云不分生憎乃所以深言其紅白也劍南春色還無賴觸忤愁人到酒邊趙云桃花之深紅栁絮之釅白正是春色放蕩無所藉賴者翻是觸忤愁人斷送令到於酒邊以散其愁然所以愁者以别筵故也據新添無賴字見異聞集織女斜河亦復無賴泛江送客二月頻送客東津江欲平煙花山際重舟楫浪前輕淚逐勸杯落愁連吹笛生新添以送客之故而勸之酒淚所以下吹笛以為樂今吹笛而愁生亦是别情感動爾馬融去京踰年有洛客逆旅吹笛暫聞之甚悲感又文選向子期思舊賦云鄰人有吹笛者發聲寥亮追想曩昔遊宴之好感音而歎離筵不隔日難得易為情離筵祖餞之筵也頻日送客亦難乎其為情哉上牛頭寺師云寰宇記山在梓州郪縣西南二里髙一里形如牛頭四岸孤絶俯臨州郭上有長樂寺樓閣煙花為一方勝景青山意不盡衮衮上牛頭趙云王濟云張華說史衮衮可聽蓋言已遊青山多矣其意不盡乃相續而上牛頭也無復能拘礙真成浪出遊花濃春寺靜竹細野池幽何處鶯啼切移時獨未休望牛頭寺牛頭見鶴林梯徑繞幽林一作秀麗一何深梯徑一何深陸士衡赴洛詩離思一何深春色浮一作流山外天河宿一作沒殿隂趙云言殿之高若與天河相接此與慈恩寺塔云七星在北戶同意宿一作沒蓋不若宿字之自然公詠江閣有云白雲巖際宿與此同義傳燈無白日布地有黃金釋書以燈喻法謂能破暗也六祖相傳一法故云傳燈釋書有傳燈録皆言傳法事故趙云謂長明燈也止借釋書傳燈字用白日亦有燈云無白日又佛書祗陀太子以黃金側布給孤長者園中而延佛居住故凡言佛宇謂之金地又江寧縣寺有晉長明燈嵗久不滅火色變青而不熱隋文帝平陳訝其逺至今猶在休作狂歌老回看不住心佛書有不住相常住相取趙云公止摘不住兩字為不住心義於無所住而生其心也上兜率寺兜率知名寺真如㑹法堂佛書有兜率天宫故取以名寺真如禪理也趙云真如佛書云真際也故每題佛寺紀佛僧多用佛書中字江山有巴蜀棟宇自齊梁趙云江山自有巴蜀時便有之此乃使羊叔子所謂自有宇宙來便有此山之義齊梁好佛佛宙當時齊梁時所建庾信哀離久庾信作哀江南賦身趙云其所以哀者以金陵瓦解而竄荒谷公自喻也何顒好不忘何顒後漢人尚氣節感友人之義而為之復父讎與李膺善後為宦官所陷亡匿汝南問所至皆親其豪傑好趙云公蓋言已身流離於外有庾信之哀而不忘交如何顒者有救之之心也然學者多疑其上佛寺詩而及此斯亦有所感乎白牛車逺近且欲上慈航薛云清涼禪師般若經序曰般若者若海之慈航昏衢之巨燭也體杜補遺云法華經譬喻品曰有大白牛肥壯多力形殊好以駕寶車蓋喻大乘也望兜率寺樹密當山徑江深隔寺門霏霏雲氣重閃閃浪花翻楚辭九章曰霰雪紛其無垠兮雲霏霏而承宇海賦蝄像暫曉而閃尸不復知天大空餘見佛尊老子云天大地大也佛言天上天下惟我獨尊時應清盥罷隨喜給孤園釋書給孤園又給孤長者止趙云前便引祇陀太子求給孤獨長者園以延佛居故今佛宇亦稱給孤園甘園春日清江岸千甘二頃園襄陽記李衡於武陵龍陽洲上種甘千樹臨死敕兒曰吾州里有千頭木奴史記蘇秦傳使我有雒陽負郭仁頃田安能佩六國相印青雲羞葉密白雪避花繁郭朴柑贊花染繁霜葉鮮翠藍乃趙云本言密葉如雲白花如雪而變其語云雲羞雪避此公新竒之句結子隨邊使開筒近至尊蜀柑向時歲入貢後於桃李熟終得獻金門公自託意於末句也數陪章梓州泛江有女樂在諸舫戲為艷曲二首趙云一本作李梓州非是蓋後有陪章留後也上客回空騎趙云客既登船遣騎空回也史記平原君傳毛先生至楚而使趙重於九鼎遂以為上客佳人滿近船選詩燕趙多佳人美者顔如玉江清歌扇底以扇自障而歌故謂之歌扇光新添庾肩吾詩願以重曲承君歌扇塵野曠舞衣前玉袖凌風並趙云凌風並立想女樂不一其之句人矣所以成佳人滿近船金壺隱浪偏競將明媚色偷眼艷陽年一作天千趙云鮑明逺學劉公幹體詩朔風吹朔雪里度龍山集君瑶臺裏飛舞兩楹前兹辰自為美當避艷陽年艷陽桃李節皎潔不成妍今公意蓋謂佳人自衒其美色偷眼視春光以爭相勝之意其二白日移歌袖青霄近笛牀師云蔡琰詩笛牀近栁隂翠眉縈度曲古詩度曲翠眉低雲鬢儼分行立馬千山暮回舟一水香使君自有婦莫學野鴛鴦師云古樂府陌上桑羅敷行使君自有婦羅敷自有夫李梓州有女樂故公以此戲之又文選曹子建詩中有孤鴛鴦哀鳴求匹偶登牛頭山亭子路出雙林外亭窺萬井中趙云佛書云佛說法於雙林樹下故公題佛宇每用雙樹雙林字下句言亭之高可以窺井邑舊家也江城孤照日山一作春谷逺含風揚子雲羽獵賦云山谷謂之風猋兵革身將老關河信不通趙云時吐蕃猶盛猶殘數行淚忍對百花叢對花垂淚亦傷時之意也項羽傳歌數闋泣數行下陪李梓州王閬州蘇遂州李果州四使君登惠義寺趙云師民瞻本作章梓州是春日無人境虛空不住天蓋取佛書不住相謂天運無常以成四時師云庾信賦心遊不住之天牧趙云孫綽天台賦序踐無人之境杜之傳若涉無人之地鶯花隨世界樓閣寄一作倚山巔趙云言當春時處處有鶯花世界字又取佛書中語也爾雅釋名山頂曰巔遲暮身何得登臨意惘然言身老而未有所得也誰能解金印蕭鼓共安禪一云三軍將五馬若箇合安禪印趙云此二句蓋諷四刺史誰能解所佩之金而相與安禪聖按陶潜解綬去職又溫遜嘗為邑宰解印綬而去送何侍御歸朝章梓州泛舟筵上作舟楫諸侯餞車輿使者歸趙云上句指言章梓州作泛舟之筵也下句言何侍御歸朝也山花相映發水鳥自孤飛趙云簡文帝云山川相映發義雖不同而以字語之熟用之也春日垂霜鬢天隅把繡衣趙云前漢暴勝之衣繡衣持斧為直指使者又漢侍御史繡衣持斧言與何侍御把衣為别也故人從此去一作逺寥落寸心違選文賦云吐滂沛乎寸心詩中心有逹江亭送眉州辛别駕升之得蕪字栁影含雲幕一作重江波近酒壺趙云雲幕言幕之如雲也字則漢成帝設雲幕於甘泉宫異方驚㑹面終宴惜征途趙云李少卿書云異方方樂祇令人悲又史云秀異産於異方終宴字則曹子建詩公子敬愛客終宴不知疲也沙晚低風蝶天晴喜浴鳬别離傷老大意緒日荒蕪文選長歌行云少壯不努力老大徒傷悲涪城縣香積寺官閣寺下春江深不流山腰官閣逈添愁含風翠壁孤雲細背日丹楓萬木稠小院回廊春一作清寂寂浴鳬飛鷺晚悠悠諸天合在藤蘿外昏黑應須到上頭釋書有諸天字皆言勝樂事公之未章因以見志也趙云蓋言其高而近天爾戲題寄上漢中王三首時王在梓州初至斷酒不飲篇有戲述趙云漢中王名瑀讓皇帝之子汝陽王璡之弟始封隴西郡公從明皇幸蜀至河池封漢中王西漢親王子成都老客星高祖起漢中今王封漢中王故云西漢親王子也後漢嚴陵與光武同宿而史占云客星犯帝座公蓋自言身在成都為客也百年雙白鬢一别五秋一作飛螢趙云公自言其老久與漢中王别而方再得相見五秋螢蓋是别後五見螢火矣忍斷杯中物秪看座右銘陶潜云天運茍如此且進杯中物崔子玉作座右銘此蓋公言不必斷酒却只拘守坐右銘為誡也不能隨皂蓋自醉逐浮萍皂蓋指漢中王之為梓州也言王既斷酒故不能隨其車蓋而自醉如浮萍之飄泊也右一䇿杖時能出王門異昔遊房𤣥齡䇿杖謁太宗于河北下句謂其斷酒也趙云吳越春秋云太王避狄杖䇿去邠史記云魯連子却秦君平原君欲封之遂䇿杖而去鄒陽曰何王之門而不可曳長裾乎王門異昔遊言王之斷酒爾已知嗟不起未許醉相留趙云已知漢中王嗟我來見時不肯起去意在求飲而緣王斷酒未許留醉也蜀酒濃無敵江魚美可求蜀都賦觴以醥清一醉纍月又云嘉魚出于丙穴終思一酩酊淨掃鴈池頭廣漢郡有金鴈池古老相傳云有金鴈一雙隱於此池日暖則見其影趙云天后時高嶠詩云駕言尋鳯侣乘歡俯鴈池則往時素有此名於池可以泛指為鴈池矣又兒童歌山簡曰日夕倒載歸酩酊無所知右二羣盜無歸路衰顔㑹逺方趙云上句指言僕固懷恩以吐蕃回紇党項之兵入寇也尚憐詩警䇿猶憶酒顛狂文賦立片言以居要在一篇之警䇿杜補遺警驅動貌䇿可以擊馬謂片言光益一篇亦猶以䇿擊馬得其警動又曹子建應詔詩僕夫警䇿平路是由蓋言以䇿而驅其馬使之疾行也其後梁鍾嶸詩品曰陳思贈弟仲宣七哀公幹思友阮籍詠懷謝靈運鄴中士衡擬古陶公詠貧之製惠連搗衣之作斯五言之警䇿者也自趙云尚憐猶憶蓋主漢中王言之詩警䇿酒顛狂公主其身而言也魯衛彌尊重徐陳略喪亡漢中王兄弟俱領重鎮魏文帝與王粲書陳應劉一時俱逝何數年之間零落殆盡徐幹陳琳應瑒劉楨趙云上句公引魯衛之政兄弟之語下句言王之賓客多喪也空餘枚叟在應念早升堂枚叟公自喻也鄒趙云賦云召生延枚叟語由矣升堂矣右三陪章留後侍御宴南樓絶域長夏晚兹樓清宴同趙云李陵書出征絶域今公借而用之沈佺期古樂府坐看長夏曉亦此意也朝廷燒棧北謂在大散之北也張良說高祖燒絶棧道趙云因宴南樓而望長安也張良燒絶棧道今摘其字用之言地理耳鼓角滿一作漏天東趙云漏天在黎州蜀之西蕃地多雨故名漏天則梓州當在其東所以形容其地也蔡伯世正異漏天乃地名在雅州以其地多雨也居梓州之西正文訛作滿屢食將軍第趙云公自言其食于章留後之宅以留後同主兵故云將軍第字霍去病為驃騎將軍辭第也仍騎御史驄見上御史舊乘驄注趙云留後之官亦御史也本無丹竈術那免白頭翁言無丹竈之術以延年也杜補遺江文通别賦華陰上士服食還仙術既妙而猶學道以寂而未傳守丹竈而不顧鍊金鼎而方堅駕鶴上漢驂鸞騰天暫遊萬里少别千年壺趙云魏文帝云已成一老翁但未頭白耳字如關三老云夢白頭翁教臣也冦盜狂歌外形骸痛飲中言以酒而自隱爾莊子索我形骸之內蘭亭記有放浪形骸之外野雲低渡水簷雨細隨風出號江城黑題詩蠟炬紅趙云夜傳號令此節度府之事也當出號之時宴中方明燭而題詩又是紀實也此身醒復醉不擬哭途窮阮籍以酒自隱故得免當世之難常出不由徑遇途窮則慟哭而返公自言取籍之自隱於酒不效其哭途窮也顔延年詠之云窮途能無慟臺上得涼字改席臺能逈留門月復光趙云改席則自南樓移於臺上也留門且未閉城門也詩月出之光雲霄遺暑濕山谷進風涼月令云土潤溽暑溽濕也以臺高而在雲霄之間不知暑氣之失去也揚子雲射獵賦山谷為之風猋老去一杯足誰憐屢舞長張翰云不如生前一杯酒詩云屢舞傞傞善蜀都賦紓長䄂而屢舞吕氏春秋韓子曰長䄂舞何須把官燭似惱鬢毛蒼後漢巴祗為揚州刺史不然官燭以章留後之宴故云官燭也送王十五判官扶侍還黔中得開字大家東征逐子回後漢扶風曹世叔妻班彪之女名昭字惠姬和帝數召入宫令皇后貴人師事焉號曰大家其子瑴為陳留長大家隨至官作東征賦述所經厯趙云大家指言王判官毋以班氏比之也風生洲渚錦帆開隋焬帝以錦為帆青青竹筍迎船出白白一云日日一云旦旦江魚入饌來杜補遺楚國先賢傳孟宗母好食筍冬月無之宗入林中哀號筍為之生後漢姜詩并妻龎氏並至孝母好飲江水嗜魚鱠又不能獨食夫婦常力作鱠呼鄰母共之舍側忽有湧泉味如江水每旦輒出雙鯉以供母膳王判官侍母還黔中故有此句離别不堪無限意艱危深仗濟時才黔陽信使應稀少萬怪頻頻一作頻煩勸酒杯隨章留後新亭㑹送諸君新亭有高㑹行子得良時高祖本紀云漢王入彭城置酒高㑹謝靈運詩良時不見遺日動映江幕風鳴排檻旗絶葷終不改勸酒欲無詞已墮峴山淚因題零雨詩晉羊祐傳襄陽百姓於峴山祐平生遊憩之所建碑望其碑者莫不流涕杜預因名為墮淚碑詩云零雨其䝉倦夜竹涼侵卧內野月滿庭隅趙云漢書引入卧內又王敦謂石崇曰誤入卿內古詩云秋涼野月白重露成涓滴稀星乍有無師云崔融詩秋天零重露曹孟德云月明星稀有無者星明滅之狀也暗飛螢自照水宿鳥相呼晉傅咸螢火賦序余曽獨處顧見螢火熱以自照蜀都賦雲飛水宿鳴杜補遺師曠禽經陸鳥曰棲水鳥曰宿又云凡鳥朝曰嘲夜鳴曰㖡林鳥以朝嘲水鳥以夜㖡今林棲之鳥多朝鳴水宿之鳥多夜呌㖡音夜字見龍龕手鏡萬事干戈裏空悲清夜徂有感時之志而不見用於時故徒悲清夜之徂往也趙云時吐蕃之兵方熾也悲秋涼風動萬里羣盜尚縱橫家逺傳一作待書日秋來為客情此二事皆情意之極者愁窺高鳥過老逐衆人行言鳥東西南北尚有所適老者尚為衆人行亦悲時之不遇也趙云家語見飛鳥過詩有鳥高飛始欲投三峽何由見兩京師云此公謀下峽也對雨莽莽天涯雨江邊獨立時趙云於雨言莽莽可謂新竒矣蓋猶於日言野日荒荒白江邊獨立其所思者逺矣意見下句不愁巴道路恐濕漢旌旗趙云巴道路自綿而東也時治兵禦吐蕃公之意謁雖往來巴山之道路而不以為愁惟恐濕漢之旌旗矣雪嶺防秋急繩橋戰勝遲趙云雪嶺在松維州之外即西山也繩橋以岷江湍急不可為梁乃以竹繩而為之駕虛以渡故號繩橋西戎甥舅禮未敢背恩私言父尚公主則子為甥中國為舅氏也甥趙云孟子帝館甥於二室爾雅曰謂我舅者吾謂之初中宗景龍三年以雍王守禮女為金城公主以妻贊普其後𤣥宗開元間遣使入朝奉表言甥言先帝舅云云今公言望其敦甥舅之禮而勿背焉師云時吐蕃陷松州今言不背恩私蓋識失在中國也警急時高公適領西川節度書趙云警急者言可警之急也字祖出漢而魏植白馬篇梁劉孝威結客少年場皆曰邊城多警急才名舊楚將妙略擁兵機以美高適也除趙云考適傳自諌議大夫揚州大都督長史淮南節度使此所謂楚將也玉壘雖傳檄松州㑹解圍傳檄言吐蕃入寇檄書相聞也松州正控吐蕃也趙云蜀都賦包玉壘而為宇傳曰三秦可傳檄而定言高公為節度可以傳羽檄而解松州之圍也廣德元年吐蕃取隴右十二月遂亡松維保三州公詩在未亡松州之前和親知計拙公主漫無歸趙云唐史永泰元年乙巳吐蕃方請和繼而又叛時議必再有請嫁公主為和親計者故公云爾餘見留花門公主歌黃鵠注青海今誰得西戎實飽飛上句見贈哥舒翰開府詩注飽飛見送高適詩注為趙云新史景龍時吐蕃厚餉使者楊矩請河西九曲公主湯沐短表請與其地九曲者水甘草良宜畜牧近與唐接自是益張雄易入冦則青海亦為其所有矣公既以吐蕃既有青海宜其勢如鷹之飽而飛揚不就縶紲也王命漢北豺狼滿巴西道路難趙云漢與巴相連蓋吐蕃入冦之地吳都賦云矜巴漢之阻則以為襲險之右可以見巴漢之連矣漢之北則褒斜也巴之西則綿漢成都也血埋諸將甲骨斷使臣鞍趙云廣德元年使李之芳崔倫往聘吐蕃留不遣虜破邠州入奉天天子幸陜使臣指李之芳崔倫曰骨斷則憂懼而骨欲斷折之義也牢落新燒棧蒼茫舊築壇燒棧事見上注漢王齊戒設壇拜韓信為大將軍之趙云時雍王適為兵馬元帥郭子儀副之而禦奉天冦委之子儀則舊築壇指郭令公也深懷喻蜀道慟哭望王官時段子璋反於東川適與崔光逺逆戰斬之光逺不戢兵遂大掠至有斷士女腕取金者故民怨而望王官之至也趙云司馬相如有喻蜀檄公止取喻蜀字以言蜀父老望王官之至也舊注作段子璋反事自是上元二年高適為蜀州刺史時况今篇又不關涉高適征夫十室幾人在千山空自多論語十室之邑路衢唯見哭城市不聞歌民征戍故多悲哭哭豈復有笑歌之事漂梗無安地用民如榛梗爾漂泊不遑寧處也公趙云此句自言爾銜枚有荷戈漢紀章邯夜銜枚擊項梁定陶顔師古曰銜枚者止言語歡嚻欲令敵人不知其來也周官有銜枚氏其狀如箸橫銜之官軍未通蜀吾道竟如何送元二適江左亂後今相見秋深復逺行風塵為客日江海送君情趙云公自言其遭戰之時而飄泊於外也下句又以言送元之適江左也晉室丹陽尹公孫白帝城溫嶠為丹陽尹二趙云丹陽潤州也丹陽置尹在晉室為然今元必是往潤州為守則舟行必經白帝城而下也城乃公孫述所築經過自愛惜取次莫論兵元嘗應孫吳科舉論兵字出古樂府章梓州水亭時漢中王兼道士席謙在㑹同用荷字韻城晚通雲霧亭深到芰荷吏人橋外少秋水席邊多近屬淮王至高門薊子過趙云前漢淮南王劉安於近屬中最賢而有學者故以比漢中王後漢薊子訓有神異之道流名京師士大夫皆承風嚮慕之此言席道士又以尊章梓州能致異人也荆州愛山簡吾醉亦長歌趙云荆州以比梓州山簡都督荆湘交廣西州諸軍事荆土豪族有佳園池簡出嬉遊多之池上置酒輒醉兒童歌之曰山公出何許往至高陽池日夕倒載歸酩酊無所知時時能騎馬倒著白接籬舉鞭向葛强何如并州兒葛强家在并州簡愛將也吾醉亦長歌則欲效兒童之為歌爾送陵州路使君赴任王室比多難髙官皆武臣時方急於賞功故武臣任髙位趙云自安史之亂通九年亦可謂多難矣幽燕通使者嶽牧用詞人趙云乾元二年祿山父子借號凡三年而滅廣德元年史思明父子僣號兄四年而滅安史既平幽燕路通矣使命可以往來也書覲四嶽羣牧是也詞人者文辭之人指言路使君也國待賢良急君當拔擢新佩刀成氣象行蓋出風塵上句見左相吕虞刀注皂蓋行春史趙云時方吐蕃之亂道路風塵而刺之蓋出風塵以往也戰伐乾坤破瘡痍府庫貧乾坤破所在殘弊也箭漢季布傳瘡痍未瘳衆寮宜潔白萬役但平均師蓋蓋譏當時在位者貪暴取於民有偏也趙云此四句以誡其公為政可謂䁬人以言矣霄漢瞻佳士泥塗任此身秋天正搖落回首大江濵趙云佳士又以指路君泥塗則公自言也薄暮江水最深地山雲薄暮時寒花隱亂草宿鳥擇一作探深枝趙云史云鳥則擇木木豈能擇鳥舊國見何日髙秋心苦悲莊子云舊國舊邦望之暢然漠書云秋髙馬肥梁簡一文帝九日詩是節協陽數髙秋氣清人生不再好鬢髮白一作自成絲東津送韋諷攝閬州録事聞說江山好憐君吏隱兼晉孫綽嘗鄙山濤而謂人曰山濤吾所不解吏非吏隱非隱寵行舟逺客惜别酒頻添推薦非承乏操持必去嫌他時如按縣不得慢陶潜陶潜為彭澤縣令惠義寺送王少尹赴成都分得峯字苒苒谷中寺娟娟林表峯欄干上處逺結構坐來重騎馬行春徑衣冠起暮鍾雲門青寂寞此别惜相從西山三首夷界荒山頂蕃州積雪邊成都記西山冬夏積雪不消趙云唐松維二州維今之威州一帶皆號西山與吐蕃分界其山最髙故云夷界荒山頂築城依一作連白帝轉粟上青天公孫述號白帝城在䕫州李白蜀道難難於上青天言其轉粟之難也趙云髙山之上築城所以轉粟之難如如上青天秦州記曰金城郡漢元六年置應劭曰初築城得金故名鄒陽上吳王書曰轉粟流輸千里不絶晉史披雲霧而覩青天依則依如之也蜀將分旗鼓羌兵助鎧鋋一作井泉禦趙云以吐蕃陷松維保三州其勢迫蜀故分旗鼓以之下句蓋言僕固懷恩與之為冦也按唐史唐德二年七月僕固懷恩以吐蕃回紇党項等兵數十萬人入冦井泉字無義西戎背和好殺氣日相纒時吐蕃陷隴右不趙云以蕃蕃背先帝時盟好而為寇巳殺氣日相纒結矣右一辛苦三城戍長防萬里秋明皇還蜀後分東西兩川為雨節度西山列防秋三戍民罷于役高適論之不聽煙城侵火井蜀有火井縣雨雪閉松州趙云松州巳陷閉於雨雪之中按唐地理志松州以地産甘松故名風動將軍幕一云蓋天寒使者裘趙云廣德元年吐蕃沒松州是時既遣將以禦敵又遣使以和親故有是句幕謂戍幕一作蓋非是漫平聲山賊營疊回首得無憂言賊壘之多也右二子弟猶深入關城未解圍趙云子弟言充兵之久也漢書解平城之圍蠶崖鐵馬瘦灌口米船稀蠶崖關灌口地名雪趙云蠶崖則西山之關隘處也多草枯故焉不足充戰而瘦灌口在於永康軍亦近西川以漕運之多而不繼故船稀辨士安邊策元戎決勝威元戎元帥也史決勝千里之外此趙云莊子曰子之談類辨士前漢車千秋贊乃所以安邊境今朝烏鵲喜欲報凱歌歸西京雜記乾鵲噪而行人至趙云周禮奏凱歌也傳曰王師大凱奏雅歌右三薄遊趙云夏侯湛作東方朔畫讚序云以為濁世不可以富樂也故薄逰以取位又謝靈運初去郡詩薄逰似邴生公自秦入西蜀自蜀而來東川浮逰不定故以此為題淅淅風生砌團團日一作月隱墻謝靈運淅淅振條風班婕妤扇詩團團似明月晚趙云梁何遜詩曰的的帆向浦團團日隱洲惟其日晚則低而隱墻舊注輒改日作月殊不知下句有秋鴈滅暮雲長則日晚之景也遙空秋鴈滅半嶺暮雲長病葉多先墜寒花只暫香秋興賦槁葉多殞秋趙云上句意義在病字與先字舊注引興賦槁葉多殞非是巴城添淚眠一作月今夕復清光趙云公於鄜州月詩云何時倚虛幌雙照淚痕乾則以還家而淚乾今以薄逰無定見月而添淚也此句方是言月然不必有月字而義自明以今夕清光字見之矣九家集注杜詩卷二十四
