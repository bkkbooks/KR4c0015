body:
  text: 九家集注杜詩卷三十宋郭知達編近體詩灧澦趙云按麗道元注水經云魚復水門之西江中有㧓石為淫預石冬出水三十餘丈夏則沒亦有裁出矣今公句云灔澦既沒孤根深為之既沒至夏時而言語曰灧如如洑瞿唐不獨灧澦如馬瞿唐不下灧澦如樊瞿唐舟絶如龜瞿唐莫窺見本朝樂史寰史寰宇記灧澦既沒孤根深此峽西人以灧澦如為水後既尤漲不可下也薛云古樂府灧如作淫澦其詞曰淫澦大如袱瞿唐不可觸金沙浮轉多桂浦忌經過西來水多愁太陰言陰氣太盛也湖趙云太陰字出不一若在水言之則吳楊賦曰太陰之所祕玄靈之所遊也江天漠漠鳥雙去雙一作飛風兩時時龍一吟舟人漁子歌回首古客胡商淚滿襟趙云龍吟未必可聞而水之深積想其如此矣庾信泛江云春江夏白帝畫舸向黃牛日落江楓靜龍吟洄上遊宋謝茌侍宴蒜山詩霧罷江天分舟人漁子歌回首言其習水而輕之也句出海賦估客胡商淚滿襟以水之泛張不行則滯流行則憂有傾沈之患所以泣也古樂府詩有估客樂之曲寄語舟航惡年少休翻鹽井橫黃金趙云此蓋言敗鹽之惡年少者不顧言亡而欲行舟必沈溺辨鹽于水入橫費黃金也梁元帝古意詩中有惡少年伎能專自得公于摘倉耳詩又曰奇語惡少年黃豈且休擲介惟惡少年而後多黃金矣翻鹽井者翻出其物而他往也舊居引蜀都賦家有言引之泉用證鹽字則可若此句之義却成煎鹽井家橫金也恐後學未誤更為詳之白帝白帝城頭雲若屯趙云乃句乃師民瞻本舊作白帝城中雲出門非蓋用對雨翻盆而字出列子言化人之羽曰望之若雲屯焉謝廷詠詩巖髙白雲屯使此屯事也白帝城下雨翻盆雲行而雨施汝翻盆言其勢之孟暴髙江急峽雷霆鬬江為峽所未哉波聲若雷霆也翠木蒼藤日月昏戎一作去馬不如歸馬逸千家今有百家存言殘敝也哀哀寡婦誅求盡慟哭秋原何處村民死于沒故多寡婦暴賦橫險故多誅求此言軍旅之際民不聊生也如此趙去老子天下有道則戎馬生于交載記慕容實傳陸邃曰宜令郡縣遂千家為一堡管子度地篇百家為一里十里術黃草黃草峽西船不歸赤甲山下人行稀秦中驛使無消息蜀道兵戈有是非鮑云催寧之亂郭英乂犯寧家至寧逐之是也以大義則之則寧以偏裨逐大將非也皆趙云黃草峽在陪州峽之西赤甲山下人行稀諸本作行人稀蔡伯世木作本蔡伯行稀以為公律詩四詠盡對凡十篇以此其一焉水行之船不歸陸行之人稀少此所以致宜道之更塞也故望秦之中之澤使則無消間蜀道之兵戈或謂或非乃未敢必料也蔡伯世謂是謂蜀中多故冬日池詩公自注傳蜀官軍自圍普遂可見也萬里秋風錦江水都記濯錦江秦相張張儀所以作笮橋東下水舊錦里城基址猶在此水濯錦即鮮明故號錦水誰家别淚濕羅衣古詩被服羅衣裳莫愁劍閣終堪據張孟陽釗閣銘興實在德險以難恃聞道松州已被圍松州在西山吐畨南之鄙橋趙云上兩句承蜀道嶽戈之下而起思秋風圍萬里之秋風驚水正在其下誰家别淚則行嶽出息與夫避難逃禍者為有别離矣末句蓋謂勿謂閣必之嶮可恃而難割據雖松州在劔閣之內已有圍之者矣其戒守土之臣勿生異意乎若是大厯三詩則三年年漢州刺史楊子彬反于于成都可以講劔閣堪據之義更事博聞者辨之吹笛吹笛風山秋月清誰家巧作斷腸聲鮑明逺離斷客客情又行子心腸斷風飄律吕相和􅋀馬融笛賦律吕既和切聲互降月傍關山幾處明向秀月夜聞笛作舊賦胡騎中宵堪北走言笛聲怨恐切能動鄉思胡人聞之皆走北矣杜云晉劉琨并州刺史嘗為胡騎所為琨乘月登樓之清蕭賊聞之皆棲然嘆長中夜吹胡笳則人流涕噓希有懷土之意遂并圍而去胡騎指史朝義之嶽未息朱家云季布不北走胡南走越也武陵一曲想南征王微之間桓伊善笛一曰相逢于江次未然相識謂伊曰聞君善笛請為我一弄尹已貴顯素聞微之名更為據胡床三㺯而去之已賔主竟不言武陵事未切故考之故園楊柳今搖落何得愁中却盡生趙云一本曲盡生無義緣笛有折楊栁之故曲思感也元注折楊栁落梅花曲名垂白一作白首垂白馮唐老師云梁誨云馮唐垂白老冀晚達餘見三十三卷元日示武宗詩注清秋宋玉悲江喧長少睡樓逈獨移時趙云師民晚本云白首馮唐老今公以自比白首為郎也宋玉九辨悲哉秋之為氣也樓逈獨移時句法可謂奇矣蓋不必言登字倚字此萹全對多難身何浦無家病不辭甘從千日醉未賦七哀詩趙云公入蜀擕妻拏而來今句云無家病不辭豈専以故卿為家者乎非若馮歡曰無以為也末句千醉舊句云注云山中有酒飲者一醉千日劉玄石飲之千日乃醒七哀詩舊注云曺子建王仲宣張孟陽皆有此作也師云選有向注曹子建等七哀謂痛而哀義而哀感而哀恐而哀耳目間見而哀口嘆而哀罪酸而哀曹子建為漢末征沒别離婦人哀嘆故賦此詩仲宣則哀漢室之亂孟陽則前哀人事之變遷之哀王仲宣哀故其題皆曰曰七哀草閣草閣臨無地柴扉永不關頭他寺碑飛閣逶迤下臨無地范彥龍云有客欵柴扉趙云及下峥嶸而無無地上寥廓而無天魚龍回夜水星月動秋山杜甫遺按酈元水經魚龍以秋日為夜龍秋分而蟄降寢于淵故以秋日為夜也且并舉魚龍寂寞秋江冷之句云此二詩皆秋時是以子美言魚龍回夜水魚龍寂寞秋江冷也漢武帝故事曰東方朔云星辰動庶民勞之應漢武元光中天星大動上以謂星搖民勞之妖問董仲舒對曰是夕露清初濕夕一作久清一作晴髙雲薄未還泛舟慙小婦飄泊損紅顔趙云言將欲南下斯泛舟飄泊矣恐其小兒之婦以我飄泊之故愁損紅顔此我所以慙愧之乎古樂府有大婦中婦小婦之句觀今句則前詩所謂無家病不辭者直念故卿之無家者矣江月江月光於水髙樓思殺人庾肩吾詩樓上徘徊月空中愁思人趙云古詩蕭蕭愁殺人梁施榮秦詩娥媚誤殺人天邉長作客老去一霑巾長一作秋玉露團清影謝惠運圖團滿葉露謝元暉猶霑餘露團銀河沒半輪誰家挑錦字滅燭翠眉顰一作燭滅别賦織錦曲兮泣已盡回文詩兮影獨傷趙云古有織錦回文詩其序曰竇韜秦州被徒沙漠其妻蘇氏方韜臨去别蘇誓不更取至沙漠便娶其婦蘇氏織錦端中作回文詩贈之洞房趙云此而下曰宿昔曰能畫曰鬬雞曰厯厯曰洛陽曰麗山曰提封通八篇蓋一時所作定為秋七月者以今篇云玉殿起秋風則公在奕感秋風之起追念往昔所作乃七月也洞房環珮冷玉殿起秋風趙云此萹思長安而懷帝闕也言洞房之所以環珮冷者以玉殿起秋風之時也楚辭姱容修能亘洞房而上林賦纍臺生成岩窔洞房玉殿字未見所出李白亦云玉殿長愁不記春秦地應新月龍池滿舊宫興慶宮明皇潛龍之地也有龍池在焉趙云長安志龍池在興慶宮躍龍門南本是平地自垂供載初後因雨水流潦成小池後又引龍首渠支分溉之曰滋以廣平神龍景龍中彌亘數頃澄淡皎潔淑至數大常有雲氣或見黃龍出其中令云舊宫指興慶宫也繫舟今夜逺清漏往同時趙公此公將下南下已入舟矣所繫舟之處今夜去秦地為逺而想象清漏與往時無異特不得聞之也蓋欲言宫漏矣萬里黃山北團陵白露中東方朔傳微行始出北至池陽西至黃山武趙云尤見懷長安之心切矣舊注脫誤按傳云帝微行在至黃山而灼曰黃山宫名在愧里蓋右扶風槐里縣有黃山宫孝惠二年所起二雄羽獵賦序旁南山而西至長安五柞此繞黃山瀕渭而東則黃山在南山之下矣今公句則實道困陵在此地之北也宿昔詠天寶中事宿昔青門裏蓬萊仗數移花嬌迎雜樹龍喜出平池落日留王母微風倚少兒宫中行樂祕少有外人知栁芳傳信記天寶中興慶宫小龍逰于宫坦溝水中中門趙云青門長安之東門漢書􅀈霸城門民間所謂青也蓬萊殿名在大內大明殿宫紫宸殿之北仗數移所以引下龍池之句花嬌迎雜樹之花則桃杏梨杏之屬杏之屬沈約登髙望春詩春風搖雜樹葳㽔緑且丹舊注引木芍藥不可謂之雜樹龍喜出平池應是言大液池耳按東內蓬萊殿後含涼殿後有太液池景龍文龍文館記中宗登極暉閣遇雪令學士賦詩宗楚客曰太液天為水蓬萊雪作山推此可見矣落日留王母微風依少兒王母以言楊貴妃少兒以言妃之諸姨漢武帝內傳西王母與上元夫人降帝少兒則衛夫人也衛青傳衛媪長女君儒少兒次女則子夫子夫者衛皇后也矣薛云前漢書周仁為人陰重以是得幸入卧內于後宫祕戲仁常侍帝旁終無所言後漢梁疏傳宫省事祕莫有知者能畫能畫毛延壽投壺郭舍人每蒙天一笑復似物皆春切化平如水皇恩斷若神時時從抵戲亦未雜風塵西京雜記杜陵畫工毛延夀善為人形醜好老少必得其真又云武帝時郭舍人則激食壺以作為矢不用棘也古之投取其中而不求其還故中實小豆中惡其矢躍而出也郭舍人則激令又還一矢百餘反謂之為驍言如博之竪舍于輩中為驍傑也每為武帝投壺輒賜金帛為杜補遺仙傳拾遺曰木公與玉女投壺有不入者天之嚂噓注云開口而笑也嚂呼監切又太平御覽載神異傳東王公與玉女投壺投而不接天為之笑問口流光今電是也趙云物皆春則莊子與物為春之語也未句抵戲則角抵之戲也兩兩相當角力鬪伎在漢有之矣亦未雜風塵言至用抵戲而止不甚雜民俗之風塵事也豈美其不微行者乎鬬雞鬬雞初賜錦趙云陳翰異聞集載玄宗好鬬雞人以弄雞為事貧者至弄假雞有要昌者以善養雞蒙寵尚時為之歌云生兒不用識文字鬬雞走大勝讀書賈家小兒年十三富貴榮華代不如能令金巨期勝負白羅秀衫隨軟輿推此則賜錦可知矣舊注楊國忠始以鬬雞供奉傳中初無此語也舞馬既登牀既一作解明皇嘗令教舞馬四百蹄目之為某家驕其曲謂之傾杯奮樂首鼓尾無不應節又施三層木牀乘馬于上抃轉如飛安祿山亂馬散落人間象鮑云東城父老傳明皇以乙酉生而喜鬬雞兆亂之也簾下宫人出樓前御曲長鄭處誨明皇雜録云上每賜宴脯則御勤政樓金吾及四軍兵士盛列旗幟披黃金甲或衣或服錦繡太常陳樂教坊大陳尋撞走索金劔劍角抵鬬雞又令宫人百飾以珠翠衣以錦繡自幃中犖雷鼓為樂又引大象犀牛入場或拜或無動中音律正月望夜又御動政樓觀燈作樂貴臣戚里官設看樓夜闌令宫女于前樓歌舞以娛之仙逰終一閟女樂久無香寂寞驪山道清秋草木黃言不復行幸也趙云舊本樓前御栁長一作御曲長當以為是蓋方貫上下句也仙言及明皇逰升矣宜女樂之久無香也秋風辭草木黃洛兮雁南飛鸚鵡鸚鵡含愁思聰明憶别離翠襟渾短盡紅嘴漫多知未有開籠日空殘宿舊枝世人憐復損何用羽毛奇趙云此篇多使禰衡賦中字意聰明字則才聰明以識機也憶别則眷西路而長懷望故鄉而延貯又曰痛母子之永隔哀伉儷之生辭也翠矜紅觜字則紺趾丹觜緣衣翠襟也渾欲短則顧則六之殘毁雖奮性其焉如也漫多知則豈言語以階亂將不密以致危也未有開籠口則間以雕籠剪其翅羽也空殘宿枝則想昆山之髙峻思鄧林之符疏而轉入離鳥悲舊林之意也末句意羽毛則雖同族于羽毛故殊智而異心也舊注雖引而不全厯厯厯厯開元事分明在目前無端盜賊起勿已嵗時遷巫峽西江外秦城北斗邊為郎從白首卧病數衣天趙云古詩天上何所有厯厯種白榆巫峽西江外自言其所在之處蜀江至荆楚處人名之曰西江莊子激西江之水疏云蜀江從西東謂之西江巫峽在西江上遊故曰外秦城北斗邊乃句乃懷長安也長安城謂之北斗城末句秦用馮唐白首為郎遘薛云後漢張衡思玄賦尉龎眉而郎潛兮逮三某而武注漢武故事曰上至郎署見一老郎鬢皓白問何時為郎何其老也對曰臣性顔名駟以文帝時為郎文帝好文而臣好武景帝好美而臣貌醜陛下好少臣已老是以三葉不遇也上感其言擢為會稽都尉江上江上日多雨蕭蕭荆楚秋髙風下木葉楚辭宋玉九辨洞庭波兮木葉下永夜攬貂裘勳業頻看鏡惜功名未遂而身老行藏獨倚樓時危思報主衰謝不能休趙云上四句言景物下四句乃公之懷抱勳業頻看鏡所以惜老之衰行藏獨倚樓則其所念深矣三國志張昭得以成勳業方安成西征賦孔隨時以行藏與信詠愜匣中取明鏡披圖自照看周王褒與周公讓書年事蕳盡客髮衰謝漁隱叢石序昔一詩客嘗以神聖公巧四品分類古今詩句為説獻半山老人得之老人得之未及觀遽問客曰如老杜勳業頻看鏡行獨倚樓之句當入何品客無以對遂以其説還之曰嘗鼎以變他可知矣則知討之不可分門纂集蓋此出意也中夜中夜江山靜危樓望北辰顔延年起觀辰漢中長為萬里客有醜百年身鮑明逺爭先萬里途各事百年身故國風雲氣史記風雲天地之客氣也髙堂戰伐塵胡雛負思澤嗟爾太平人胡雛祿山也晉戰記石勒倚嘯東門王衍見其異之顧謂左右曰向者胡雛吾觀其聲視有奇恐將為天下患馳遣收之會勒已去趙云北北居其所衆星拱之望北辰則望君王之意胡雛當是史朝義之亂未除而興感感亂皆自祿山也曹植詩云有萬里客問君何鄉人髙堂戰伐言言其所居髙堂之上亦染戰伐之塵也蓋公念其流落萬里首因安祿山之亂所致萬里思而傷之凡為太平之人皆被此禍也江漢趙云書制及衡淮荆州江漢朝宗于海注云江水漢水經此而入海江漢思歸客乾坤一腐儒片雲天共逺永夜月同孤落日心猶壯秋風病欲蘇古來存老馬不必取長途趙云劉貢父云楊大年不喜杜公詩謂之村夫子詩嘗有鄉人以杜詩強大年大年不服鄉人因曰公試為我續杜句舉江漢思歸客大年以為屬對鄉人徐舉乾坤一腐儒大年默然似少屈也然則杜詩之全者讀之未覺其起絶至闕一字少一句而補之仍爾天冠地屢矣老馬事韓子曰管仲隰朋從桓公伐孤竹春往而冬反迷惑失道管仲曰老馬之智可用也乃放老馬而隨之遂得道馬公之意蓋此比于老馬雖不能取長途而猶可以知道解惑也又嘗曰老馬夜知道亦此之謂洛陽洛陽昔陷沒胡馬犯潼關天子初愁思都人慘别顔清笳去宫闕翠蓋出關山故老仍流涕龍髯幸再攀趙云天寶十四載嵗在癸丑十一月安祿山反陷河北諸郡十二月陷東京所謂洛陽昔陷沒也次年沒月遂陷潼關京師文超所謂胡馬犯潼關也是年甲午詔親遂幸蜀所謂天子初愁思都人慘别顔也清笳去宫闕翠􅔜出關山則顔車駕之出如此也明年九月復京師又復東京丁卯入長安長之安十二月丙上宮之自蜀郡此所謂故老人流涕龍顔幸再攀也龍髯是黃帝采首山之銅鑄鼎于荆山之上鼎既成龍髯胡髯下迎黃帝帝上騎羣臣後宫從七十人龍乃上天餘小臣不得土上乃悉持龍髯拔隨黃帝之弓百姓仰望帝既上天抱其弓與龍髯而號故循代因名其處曰項胡其弓曰鳥號驪山驪山絶望幸花蕚罷登臨趙云此云專言上皇山陵事也驪山華清宫所在也本太宗之湯泉宫在陵潼縣西去長安五十里長安嵗幸馬花蕚者樓名取詩人棠棣之義帝時登樓聞諸王音樂咸召升樓同康宴謔相如對彈文太山梁父設壇場望幸帥古曰幸臨見謝靈運有登臨海嶠詩地下無朝燭人間有賜金趙云朝音朝覲之朝凡朝在早則秉燭而朝今地下幽閣無朝人見之燭舊外既誤以朝夕之朝字而引陶潛詩幽室一已閉千年不復朝則不復見晨朝之義何千燭事又引劉向傳秦始皇帝葬于驪山之阿人膏為登燭水銀為江海黃金為島厯却拆朝與燭為二字大非今人間賜金則生時賜子留在人間空有此金耳鼎湖龍去逺銀海雁飛深趙云此却正言其上升何深行經孫氏陵詩銀海終無浪金島金不飛萬嵗蓬萊曰長懸舊羽林蓬萊殿名羽林星名漢有羽林軍中趙云句又似難解蓋言天子如日之明平時蓬萊殿之日懸于殿中今則懸在舊羽林中舊日充宿衛之兵令則守護陵寢也提封提封漢天下前漢地理志秦分天下作三十六郡漢興復開置提封田一萬萬四千五百一十三萬六十四百五頃東方傳提封頃畝師之古曰亦謂提舉四方之內總計其數也萬國尚同心借問懸車守何如儉德臨懸車束馬言至嶮也言以嶮守為莫若守之以險德也吳起對未文在德不在險以此時徴峻乂入草竊一作草慮犬羊侵願戢兵猶火恩加四海深趙云此篇公崇德息兵之作使公居廟堂得行其志天下不亦受其賜乎懸車入所謂束馬懸車言必欲得形勝之地使敵人束馬懸車而後得入如此而後可如守則莫草臨之以檢德也書真乃儉德舊木正作草竊犬羊侵一作若慮犬羊侵當以莫慮為正義方通貫犬中國之所若亂者蓋白取之也詩小雅蓋廢則四夷交侵中國微矣故召亂者嘗起于人君之奢衆則廢國事而竭民財廢國事則無備竭民財則多怨如是而不有外侮乎左傳兵猶火也不職將士焚孟子曰故推恩足以保四海白露白露團甘子清晨散馬蹄圃開連石樹船渡入江溪憑几看魚樂回鞭急鳥栖漸如秋實美幽徑恐多蹊趙云月令白雲降曹子建名都篇清晨復來還又付身散馬蹄圖開運俯石則圃之所開當運石樹船渡入江深溪則船之所渡在入江之溪莊子從容是魚樂也黃石公兵書樹杌者鳥不棲回邊急鳥栖則自清晨至晚而歸矣多蹊字暗使桃李不言下字成蹊孟氏孟氏好兄弟養親惟小園承顔胝手足坐客強盤飱負米力葵外讀書秋樹根趙云好兄弟如唐人詩有蕭氏賢夫婦也家好兄弟亦此也承顔眠手足則勤勞于小國之事以養也乃孟子謂竭力耕田以供子職之意莊子禹手胼足胝左傳有盤飱填壁貼以強字則若強之負米字之米事之祿也力葵者力于治葵也所以成惟小團之句或云力葵一作夕葵此惑于以夕對秋矣卜鄰慙近舍訓子學先門趙云題是孟氏故使家家本事烈女傳孟軻母其合近墓孟子之少也嬉戲為墓間之事踴躍築埋孟母曰此非所以居子也乃去舍市傍其子嬉戲為賈街之事母又曰此非所以居子也復頭舍學宫之旁其子嬉逰乃設爼喜挕讓進退母曰此可以居吾子矣遂居左傳非宅是卜唯鄰是卜公自謙言子之卜鄰我才為近舍蓋以子之母能教訓其子效學先門也吾宗衛倉曹崇間吾宗老孫子質朴古人風魏志毛玠傳君有古人之風故賜君古人之服耕鑿安時論衣冠與世同在家常早起憂國願年豐語及君臣祭經書滿腹中趙一傳文藉雖滿腹不如一囊錢孟趙云莊子鑿井而飲耕田而食而浩然曽使故對衣冠未句蓋言几論語之間及于君臣尊卑之祭必用其腹中之書而證明之也腹中書暗用郝隆膔腹中之語又邊孝先腹之便吾經第五弟豐獨在江左近三四載寂無消息覓使寄此二首亂後嗟吾在羇州見汝難草黃騏驥病沙晚鶺鴒寒楚設關城險吳吞水府寬十年朝夕淚衣袖不曽乾史冬楚世家肅王四年蜀伐楚取兹方于是楚為干關以距之注李熊説公孫述曰東守巴郡距扞關之口趙云草黃騏驥病公自謂也成亂後嗟吾在之句沙晚鶺鴒寒憫其弟之寒也詩鶺鴒在原以成羇栖見汝難之句楚設關城顯公功其身之所在吳吞水府見言五帝豐之際在楚則夔州為楚之地關險則白帝城地夔之險矣吳則江左至吳而積水之多故云水府寬劉徑趙都賦其東則有天浪水府百川是理木玄虗海賦云爾其水府之內極深之庭鮑明逺與內書曰曽潭水府右一聞汝依山寺杭州定越州風塵淹别日江漢失清秋趙云豐在左左傳聞而未審故今云聞汝依山寺其杭州邪豈定是越州邪兵戈謂之風塵蓋言風動塵起故也齊顔之推古意詩風塵暗天起江漢二水名失清秋則言我秋時在此而不見其弟為相失也舊本一作共清秋非影著啼猿樹魂飄結蜃樓杜補遺陳藏器云車螯是大哈一名蜃能吐氣為樓臺海中春夏問依約島淑中常有此氣埤雅云蜃噓氣成樓臺髙鳥卷飛就之以息氣輒吸之俗謂之蜃樓趙云啼猿自樹公言其所在之處故云影著盧照鄰生山髙云莫辨啼猿樹看成女雲吉蜃樓止言豐之所在之處故思之魂飄前漢天文志海房蜃氣象樓臺公詩有每一曰言已一句言彼者前箭云楚設關城險以言己之在楚吳吞水府寬以言弟之在吳又如憶李白云渭北春天樹則言己在咸陽江東日暮雲則言白在會稽似此體格非一明年下春水東盡白雲求趙云東盡白雲求又所以成杭州定越州之句右二巫峽弊盧奉贈侍御四舅别之灃朗江城秋日落山鬼閉門中行李淹吾舅誅茅問老翁趙云屈原九歌有山鬼一篇乃楚事之事巫峽巳屬楚地矣左傳行李之往來又曰一箇行李淹吾舅言盧侍御之注留也屈原決于鄭瞻尹曰寧誅鋤草茅以力耕乎老翁則公自謂也字則魏文帝曰皆成老翁但未頭白耳赤眉猶世亂青眼只途窮趙云光武平眉赤之亂阮籍善為青白眼待眼待佳客曰眼待谷途窮赤輒慟哭亦阮籍事也傳與桃源客人今出處同趙云桃源在朗州即今之鼎周也四舅之封朗故因以問桃源客也人則公自謂桃源事見陶淵明集石李倫王明君詩傳語後世人逺嫁難為情溪上峽內淹留客溪邊四五家古苕生迮一作濕地秋竹隱疏花塞俗人無井峽俗多引泉或水以自給也山田飯有沙西江使船至時復問京華心未嘗忘王室也又趙云淹留客公自謂也事則離騷經何足以淹留舊本古苔師民瞻本作古苕是蓋葦苕溪上之一作濕地不工郭僕逰仙詩作華逰峽窟謝靈運齊中讀書詩昔余遊京華以今人承用之熟遂不考按故為出之樹間岑寂雙柑樹鮑明達舞鶴賦去帝卿之岑寂婆娑一院香交柯低几杖垂寶礙衣裳滿嵗如松碧時同待菊黃幾回霑葉露乘月坐胡床前漢趙廣漢傳滿嵗為真戶翁歸傳亦云晉書庾亮在武昌佐吏殷浩之徒乘秋夜共登南樓俄而亮至諸人將避之亮曰諸君少住老子于此處興復不淺便處胡床談誅竟坐晉劉琨傳琨乃乘月登樓清嘯松趙云滿嵗如松碧周滿一嵗冬夏青青如也橘熟于九月則為待菊黃矣八月十五夜月二首滿目飛明鏡歸心折大刀轉逢行地逺攀桂仰天髙水路疑霜雪林棲見羽毛此時瞻白兔直欲數秋毫月中有白兔以其明輝無所不照故可數秋毫其趙云延篤與李文德書吾誦伏羲氏之易煥兮爛兮滿目歸心則與選詩邊馬有歸心公詩首句多便對明鏡以言月之圓也庾信磨鏡詩明鏡如曉月古詩稿貼今何在山上復棊貼何當大刀頭破鏡非上天無兢樂府古題要解曰棊貼今何在某貼跌也冏夫何處也山上復有山上山為出字言天出不在也何當大刀頭有鐶問夫有時常時當還也破鏡非上天言月半鈌當還也今乃八月十五夜子故稱之為明鏡則月圓矣轉逢行地逺地以蓬驚身也曺植雜詩轉蓬雜本恨飄飄隨長風類此客逰子揖軀從由而表陽源效古詩勤役未云已壯年徒為空乃到古時人所以悲轉蓬劉安招隱士云桂樹縱生兮山之陰奮桂枝兮長淹留右一稍下巫山峽猶銜白帝城氣沈全浦暗輪仄半樓明刁斗皆催曉蟾蜍且自頃後漢張衡靈憲云月陰精之忠積而成獸象蟾兔陰之類有憑故焉者羿請不死之藥于王母其妻妲娥竊之託身于月故名蜍蟾趙云稍下猶銜言月也如上萹月詩併點巫山出新規楚州清也氣沈全甫暗以成稍下巫山峽之句峽水中有水也輪仄半樓明以成猶銜下帝城之句城上有樓也刁斗則兵戍處皆有之事出李廣傳張弓倚殘魄不獨漢家營軍營有偃月明醜趙云時方有吐畨交兵則張弓于夜皆倚曉月之殘不獨漢宫為然雖慮營亦然倚字宋玉長劍倚天外之倚右二十六夜玩月舊挹金波爽皆傳玉露秋關山隨地闊河漢近人流谷口樵歸唱孤城笛起愁巴童渾不寢半夜有行舟趙云前漢樂志月穆穆以金波沈約謝賜甘露啓玉聚珠聨隨盧思道合甘露表玉散珠簾連而相丞云金風玉六如密詩金風蕩佳莭玉露凋晚林古有關山月之曲河漢近人流舊注引會文帝仰看明月光天漢回西流可證流字也沈約秋葉詩巴童暗理瑟魏文帝善哉行曰悠悠川流不息行舟十七夜月秋月仍圓夜江村獨老身捲兼還照客倚伏更隨人光射潛斗動明方宿鳥頻茅齋依橘柚清切露華新趙云鮑明逺詩倚依牧雞豚蜀都賦下髙鵠出潛斗舊注引謝靈運詩潛斗媚幽姿在後矣宿鳥字出文選謂之鳥則無定名舊注引魏文帝樂府月明星稀烏鵲南飛繞樹三匝何枝可依全不相干傷秋林辟來人少山長去鳥嶶髙秋收畫扇一云藏扇羽班姫詠扇詩常恐秋風至涼飈奪熱炎辨捐遮思中思中情道絶久客掩柴扉懶慢來時櫛稽康書懶與慢成祖艱難帶減圍謝靈運搖帶淮疇昔不知今是非沈約與徐勉書老病百日數圍革常帶應移孔以手握臂攣計月少半分將軍猶汗馬趙云世畨之禍未息也公孫共云臣愚魯無汗馬之勞天子尚戎衣書一戎衣天下大定白將風飈脆檄柳晚夜稀白蔣茭草殷柳柳栁何年減豺虎似有故園歸王仲宣詩豺虎方講患張孟討詩李葉尚亂起賊盜如豺虎秋峽江濤萬古峽肺氣久衰翁不寐防巴虎全生狎楚童衣裳埀素髮秋興賦素髮颯以埀顧門巷落丹楓謝靈運曉霜楓葉丹常在商山老兼存翊贊功趙云全生狎楚童言為客于外年老而不敢恃雖童稚亦狎熟免其猜忌為害乃所以全生也商山老四皓也四皓雖隱乃出而從侍太子髙祖一見太子遂定既隱而出此為可怪此亦孟皓然頗嫌四皓曽多事出為儲王定是非之意公棲遲峽中老矣蕭索如隱者而實非隱也以四老人避秦漢不仕真隱矣卒能一出子漢有翊贊之功公自歎已流落不為世用然不能忘有為之志此忠臣畎畝不忘君也秋興八首其一玉露凋傷楓樹林李密詩金風蕩佳節玉露凋晚林巫山巫峽氣蕭森張景陽荒楚鬱森森江間波浪兼天湧塞上風雲接地陰叢菊兩一作重開他日淚孤舟一繫故園心寒衣處處催刀尺白帝城髙急暮砧郭泰機詩皎皎白素絲織為寒女衣良工秉刀尺棄我忽若遺趙云阮籍詩湛湛長江水上有楓樹林巫山以言山巫峽以言水夔以白帝城為塞故云塞上叢菊兩開他日淚此句涵蓄蓋公于夔州見菊者二年矣方叢菊之兩開皆是他日感傷之淚也其二夔府孤城落日一作月斜每依南斗望京華聽猿實下三聲淚奉使虛隨八月查畫省香爐違伏枕山樓粉堞隱悲笳堞城堞也粉謂飾以堊土胡人卷蘆葉吹之為笳請看石上藤蘿月已映洲前蘆荻花趙云南斗師民瞻作北斗蓋長安上直北斗宜都山川記峽中猿鳴至清諸山谷傳其響行者歌曰巴中三峽猿鳴悲猿鳴三聲淚霑衣八月查事載慱物志世亦慱張騫奉使尋河事而不見為傳記公屢使為張騫蓋承用之熟也庾肩吾奉使江州船中七夕詩漢使俱為客星槎共逐流今公雖有理州之役若奉使然而不到天上為虛隨矣省署以粉畫之謂之畫省亦謂粉署初學記載應卲漢官儀尚書郎入直臺廨中給女侍史二人皆選端正指使從直女侍史執香爐燒薰以從入臺中給使護衣服奏事明光殿省中為服枕則違去畫省香爐者以伏枕之故也山樓粉堞指白帝城末句想像扁舟之往如此北山移丈秋桂遺風春蘿罷月其三千家山郭靜朝暉日日一作一日江流坐翠微信宿漁人還泛泛清秋燕子故飛飛詩泛泛揚舟也趙云江樓坐翠微樓在山間爾雅未及上曰翠微以其氣然也梁張率長相思云望雲去去逺望鳥飛飛滅江揔别袁昌州黃皓飛飛逺青山去去愁杜補遺左太沖蜀都賦觸石吐雲鬱葐蒀以翠微注翠微山氣之輕縹者陸倕石關銘上連翠微天邊氣也匡衡抗疏功名薄劉向傳經心事違趙云功名薄公自言其為左拾遺時雖有諫諍如匡衡而緣此帝不加省以出比之則功名薄也劉向講論五經于石渠公言其心事欲如劉向之傳經于朝而乃違背不偶也心事違出左傳王心不違又史云事與願違同學少年多不賤五陵衣馬自輕肥薛云丈選范彥龍贈張徐州詩田家採樵去薄暮方來歸還聞稚子説有客欵柴扉儐從皆珠玳裘馬悉輕肥軒蓋照墟落傳瑞生光輝又劔騎何翩翩長安五陵間趙云五陵衣馬言貴公子也西都賦北眺五陵言長陵安陵荗陵荗陵平陵皆髙貴豪傑之家所居語乘肥馬衣輕裘其四聞道長安似奕碁奕碁互勝負也左傳襄二十五年今寧子視君不如奕棋百年世事不勝一作堪悲王侯第宅皆新主以喪亂而易主也左太沖濟濟王城內赫赫五侯居古詩長衢羅夾巷王侯多第宅文武衣冠異昔時直北關山金鼓振河北尚用兵征西車馬羽書遲魚龍寂寞秋江泠故國平居有所思秦有魚龍川杜云草閣秋興詩乃夔州所作豈可言秦之魚龍川乎趙云直北關山金鼓振言夔州之北用兵乃隴右關輔間也舊注便云時河北尚用兵考之大歷二年豈有此事乎征西車馬羽書馳此所云西專指吐蕃征西者將軍之號晉書征西起于漢代舊本元作羽書遲師民瞻本作羽書馳是或曰言羽書遲則望其秦克捷之功也雖有義伹費力耳羽書者羽檄也漢髙祖曰吾以羽檄召天下兵注檄尺有二寸之木插羽于其上取其疾也有所思字古樂府詩題也末句言魚龍直以夔峽積水之府有魚龍焉其五蓬萊宮闕對南山承露金莖霄漢間漢武帝置金露盤西都賦抗仙掌以承露擢雙立之金莖軼埃壒之混濁鮮皓氣之清英武趙云蓬萊殿名在東內大明宫正對南山金莖注孝帝作柏梁銅柱承露仙人掌之屬所謂金莖即銅柱也西望瑶池降王母漢武帝內傳七月七日西王母降武武帝夜忽見天西南如有白雲起俄頃王母至東來紫氣滿函關老子傳注列仙傳曰關令尹喜周大夫也老子西逰喜先見其氣知真人當過物色而迹之果得老子亦知其竒為著書與老子俱之流沙之西服巨勝實莫知其所終閬趙云瑤池則神仙傳載王母所居宫關在崑崙山圃風之苑玉樓十二瓊華之闕左帶瑤池右環翠水又周穆王觴王母於瑤池之上望瑤池則望其自瑤池而降也又有載尹喜所占見紫氣滿于關上瑤池在西極故云西望老子自洛陽而入函谷故云東來雲移雉尾開宮扇日繞龍鱗識聖顔一卧滄江驚歲晚幾回青鎖點朝班趙云言君王御朝而諸公入朝也崔豹古今注商髙宗有雊雉之祥服章多用翟羽故有雉尾扇韓非云夫龍之為蟲也柔可狎而騎也然其侯下有逆鱗徑尺若人有嬰之則必殺人人主亦有逆鱗説者能無嬰人主之逆鱗則幾矣雲移雉羽則皇望帝御朝初以扇慞之而聞扇則如雲日之移帝堯本紀之如雲就之如日天子之相曰雲日之表雲移雉見日故云識望顔一卧滄江者公自謂也幾回青瑣照朝班則想望省中諸公之朝也青瑣者漢未央宮中門名應邵曰黃門郎每曰暮向青瑣門拜謂之夕郎散騎常侍范雲與王中書詩攝官青瑣闥遙望鳯凰池大抵皆禁從事也左傳朝以正班爵之序其六瞿唐峽口曲江頭萬里風煙接素秋瞿唐曲江雖南北萬里相逺而秋止一色也長趙云瞿唐峽口則公今所在之處曲江頭則公故鄉安之景梁元帝纂要秋亦曰素秋曲江在升道坊有流水屈曲謂之曲江司馬相如賦臨曲江之隑洲蓋其所也花蕚夾城通御氣見白日雷霆夾城仗注芙蓉小苑入邊愁見青春波浪芙蓉園注花蕚樓芙蓉園皆長安宫禁故事在趙云花蕚樓在南內興慶宫夾城在修德坊芙蓉苑敦化坊與立政坊相接本隨氏離宫大抵興慶宫夾城芙蓉苑皆接曲江通御氣則以南內為主耳本遊幸之地今乃有邊愁入于其間以紀吐蕃之亂嘗陷京師故也珠簾繡柱圍黃鶴昭陽殿織珠為簾風至則鳴如珩珮之聲錦纜牙檣起白鷗趙云上句蓋言繡窠作雙鶴圓狀而用黃線繡為鶴也乃所謂鞠豹盤鳯之類舊注引黃鶴樓在漢陽軍非是下句則芙蓉苑中有水可以泛舟故也公嘗曰青春波浪芙蓉園回首可憐歌舞地秦中自右帝王州謝元暉鼓吹曲江南佳麗地金陵帝王州其七昆明池水漢時功初武帝欲征昆明夷為有滇河乃作池以習水戰因而得名武帝旌旗在眼中織女機絲虛月夜石鯨鱗甲動秋風西京雜記昆明池刻玉石為鯨每至雷雨鯨常鳴吼鬢尾皆動漢世祭之以祈雨往往有驗西都賦集乎豫章之宇臨乎昆明之池左牽牛右織女似雲漢之無涯杜云西都賦注武帝鑿昆明池于左右作牽牛織女以象天河趙云漢武帝元狩三年鑿昆明池象之以習水戰傳越巂昆明國有滇池方三百里漢使求身毒國而為昆明所閉今欲伐之故作昆明池象之以習水戰在常安西南周回四十里則所謂昆明池水漢時功也食貨志又曰時粵欲與漢用船戰遂乃大修昆明池樓船髙髙十餘丈旗幟加其上下句則泛言池中之景物矣波漂菰米沈雲黑露冷蓮房墜粉紅趙云上句言菰之多其望之長逺黯黯如雲之黑也菰米事在周禮曰魚宜菰鄭玄云菰雕胡也賈公彥云今南方見有菰米宋玉諷楚王曰主人之女為臣炊雕胡之飯烹露葵之羹宋玉楚人也蓋以雕胡為珍則菰米本南方之物而移種于是池矣沈雲黑字杜田引唐本草圖經菰又謂之茭白歲久者中心生白臺如小兒臂謂之菰手其臺中有黑者謂之茭鬱至後結實乃雕胡米也沈雲黑其茭鬱乎故子美行官張望補稻畦水歸詩有秋菰成黑米之句穿鑿非是蓋中有黑則黑在實之中間豈望而可見乎若秋菰成黑米自是已為米則可見其黑也蓮房墜粉紅正謬謂蓮實上花葉墜也爾雅荷芙渠其華菡蓋其實蓮其中的郭璞注蓮謂房也的房中子也關塞極天唯鳥道江湖滿地一漁翁趙云關塞指白帝城之塞鳥道則一帶皆髙山故得稱鳥道一漁翁公自謂也其八昆吾御宿自逶迤紫閣峯陰入漾陂杜補遺楊雄校獵賦序武帝廣開上林南至立春鼎湖御宿昆吾晉灼曰昆吾地名有亭師古曰御宿在樊川西趙云此篇紀其舊遊渼波之事師古曰御宿在樊川西以今長安志考之在萬年縣西南四十里孟康注漢書曰為離宫别觀禁御不得使人往來遊觀止宿其中故曰御宿自逶迤想今上如此而引下句渼陂大率皆終南山一帶之下耳紫閣峯終南山之峯名終南山以鄠縣言之在東南二十里渼陂在縣西五里香稻啄餘鸚鵡粒碧梧棲老鳯凰枝趙云其昔日所見如此秦記初長安安謡云鳯皇止阿房苻堅遂於阿房城植桐數萬株可見種桐之事貼以鳯皇枝則莊子鳯皇非梧桐不栖也因言梧桐而以鳯事飾之沈存中紅稻啄餘鸚鵡粒碧棲老鳯凰枝此蓋語反而意寬韓退之之雪詩舞鏡鸞窺沼行天馬渡橋亦效此體然稍牽強不若前人之語渾也沈之説如此蓋以杜公詩句本是鸚鵡啄餘紅稻粒鳯凰棲老碧梧枝而語反焉韓公詩句本是窺沼鸞舞鏡渡橋馬行天而語反焉韓公詩從其不反之語義雖分明而不可誦矣却是何聲律也若杜公詩則不然時紀其舊遊渼陂之所見尚餘紅稻在地乃宫中所供鸚鵡之餘粒又觀所種之梧年深即老却鳯皇所栖之枝既以紅稻碧梧為主則句法不得不然也佳人拾翠春相問仙侶同舟晚更移綵筆昔遊干氣象白頭吟望苦低埀趙云言其昔日之實事拾翠起于曹子建洛神賦而用拾翠字則玉臺前集載費昶春郊望美人詩芳郊拾翠人回袖掩芳春後集載虞荗衡陽王齋閣奏妓詩拾翠天津上回鸞鳥路中也春相問方春時遊賞佳人更相問勞也仙侶同舟用郭李事末句公蓋言其昔日曽携綵筆題詩干歷其氣象今則老矣正白頭中吟詠而望之其頭苦于低埀公有渼陂行又有渼陂西南臺詩又與源太少府宴渼陂詩云飯抄雲子白瓜嚼水精寒則為綵筆昔遊矣卓文君有白頭吟社日兩篇九農成德業少皥氏以九扈為九農正百祀發光輝共工氏有子曰勾龍能平水平故祀以為社左傳盛德者必百世祀也趙云成德業則七月之詩皆農田事而謂之陳王業勾農以農事而成王者之德業則百世祀之于是乎發光輝矣報效神如在語祭神如神在馨香舊不違左傳所謂馨香無讒慝也南翁巴曲醉北鴈塞聲微趙云南翁巴曲醉公自言其在夔州得稱南翁世言巴曲渝舞又曰巴渝之音者以漢髙祖所嘗貴之也應邵風俗通巴有賨人剽勇漢髙祖為漢王時募取賨人定三秦閬中有渝水賨人左右居鋭氣喜舞髙祖樂其猛鋭數觀其舞後令樂府習之可見矣北鴈塞聲微則秋時鴈北鄉矣尚想東方朔詼諧割肉歸趙云東方朔事伏日詔賜從肉太官丞日晏不來朔獨拔劔割肉謂謂其同官曰伏日當早歸請受賜即懷肉去詼諧字方朔傳贊朔之詼諧也王立之詩話老杜杜日詩尚想東方朔詼諧割肉歸然漢書所載朔乃伏日也立之之意遂指杜公以伏日事為杜日微言其誤矣是不知杜公子語以為若使東方朔當此日而分肉想見其亦詼諧而先割肉以歸不亦善使事乎狗鮑云桉十二諸侯年表秦德公二年初作伏時社磔四門則祠社用伏日矣此詩用伏日事何疑右一陳平亦分肉太史竟論功今日江南老他時渭北童歡娛看絶塞涕淚落秋風鴛鷺回金闕誰憐病峽中趙亡陳平事里中杜平為宰分肉其均里父老曰善陳孺子之為宰乎平曰嗟乎使平得宰天下亦如此肉矣太史竟論功則吏氏竟論列其所宰天下建立之功也公以為陳平之不如故起此漢以引下句江南則大江之南岸也渭北則咸陽也咸陽在終南之南渭水之北公皆有家焉春日憶李白詩云渭北春天樹江東日暮雲正在咸陽所作也句云它時渭北童則言其為童時社日在咸陽也絶塞指夔以白帝城為塞澤其士之人歡娛我所看者在此絶塞而我方流落於此故涕淚在秋風之中落也鴛鷺言侍從貴人也金闕天子之闕言貴人之自金闕回者誰念我乎公嘗為拾遺蓋侍從之列矣晉嵇含社賦序曰社之在世尚矣自天子至于庶人莫不含用則是日羣臣集于金闕為社而句所以言鴛鷺回金闕也右二秋野五首秋野日蔬蕪謝玄暉邑里向蕪蔬寒江動碧虛繫舟蠻井絡蜀都賦岷山之精上為井絡卜宅楚村墟夔古楚附庸也棗熟從一作行人打葵荒欲自一作且鋤盤飱老夫食分減及溪魚趙云左太沖蜀都賦注為東井星之維絡著蠻字則凡全蜀皆井絡而公今居夔則為蠻井絡其下云楚村墟是已夔者楚之附庸而楚在春秋為蠻夷也棗熟從人打則又前所題桃樹云今秋揔餧貧人實呈吳郎云堂前撲棗任西鄰見愛人及物矣末句亦實道其事右一易識浮生理難交一物違水深魚極樂林荗鳥知歸見公詩林荗鳥有歸水深魚知聚注吾老甘貧病榮華有是非秋風吹几杖不厭此舊本此作北山薇夷齋隱於首陽山採薇而食之蓋趙亡上兩句通義所以引下句言浮生之理不難識也以一物不可違其性言之則浮生之理得矣一物不可違者何也水深魚深魚極樂則魚不樂矣林荗鳥知歸林淺則鳥不歸矣以是推之吾衰老矣自安於貧病而無它念正以榮華非不美也而有是與非焉吾老字師民瞻本作衰老是蓋兩字方對榮華未句又結一篇之義不厭綵薇而食此其所以安貧病與右二禮樂攻吾短山林引興長嵇康書儕類見寬不攻其過又云至為禮法之士所繩疾之如讎又云有入山林而不及之論遊山澤觀魚鳥心甚樂之也掉頭紗帽側莊子在宥篇爵躍掉頭紗帽見管寧紗帽淨注曝背竹書光竹書古簡册值趙云晉書桓溫詣謝安其理髮安性遲緩久而方罷使取情溫曰今司馬著帽進觀此則帽為間散之服矣列子宋國有田夫東作自曝於日顧謂其妻曰負日之暄奠有知者以獻吾君將有重賞此曝背之義也貼以竹書則所讀竹簡之書暗用郝隆七月七日曬服中書事風落收松子天寒割蜜房稀踈小紅翠駐屐近微香趙云班固終南頌蜜房溜其顚左太沖蜀都賦蜜房郁育被其阜杜時可引禆雅言蜂有兩衛應潮其王所在衆蜂環繞如衛採取萬芳釀蜜其房如脾故曰蜂房又謂之蜜脾末句蓋言秋花故小紅翠謂之稀踈也右三逺岸秋沙白連山晚照紅海賦波如連山潛鱗輸駭浪海賦駭浪暴灑驚波飛薄歸翼會髙風趙云三易之名商日連山潛鱗輸駭浪蓋言潛魚以深為樂而峽水之深則輸寫駭浪淮南子云河水九折注海而流不絶者有崑崙之輸也則此輸之謂矣歸翼會髙風乃翼乎如鴻毛遇順風之義而會拆所謂風雲之會舊注引魏文帝文適與飄風會却成吹散之矣砧響家家發謝惠連櫩髙砧響祭楹長杵聲哀樵聲箇箇同峽山樵人常唱大昌歌以弔柳青每聲闕即呼柳青然不知所為也飛霜任青女賜被隔南宮淮南子霜神青女注云青女天神主霜雪後漢樂嵩嘗直南宫家貧無被帝聞而嘉之詔天官賜尚書郎已下食并給帷被公雖為郎而在外故亡隔爾右四身許麒麟畫見今代麒麟閣注年衰鴛鷺羣公晚方登朝籍名趙云麒麟漢閣在未央宫漢宫殿疏曰天祿閣麒麟閣蕭何造以藏祕書蘇武傳甘露三年單于始入朝上思股肱之美乃圖畫其人於麒麟閣唯霍光不名至蘇武凡十一人古詩厠迹鴛鷺大江秋易盛空峽夜多聞徑隱千重石帆留一片雲趙云帆留一片雲公欲南下已理舟凖備帆席而未行也兒童解蠻語不必作參軍世説郝隆為南蠻參軍上已日作詩日娵偶濯清池桓溫問何物答曰蠻名魚為娵隅溫日何為作蠻語隆曰千里投公始得一蠻府參軍那得不蠻語也右五詠懷古迹五首支離東北風塵際莊子人間世支離疏注亡形體支離不全貌漂泊西南天地間漂泊無定止也趙云上句追言安祿山之亂時在賊中或往河陽或趨行在或居秦或居同谷是為東北風塵際也下句言其入蜀往來東西川且在夔也三峽樓臺淹日月三峽瞿唐巫山黃牛也趙云三峽所載名不同日月峽在渝州所謂西峽其二則巴峽巫峽詳見忠州詩解今專言其在夔蓋夔上遊則月峽下遊則巴峽巫峽故言三峽若言樓臺則指白帝城之屬不必恭州之月峽令三峽中亦有明月峽蓋石壁有一竅圎透見天其明如月故以名峽也五溪衣服共雲山五溪蠻夷所居馬援所征之地衣服言異服也共雲山言與之雜居薛亡接後漢武威將軍劉尚擊武陵五溪蠻夷注酈元注水經云武陵有五溪蠻皆槃瓠之子孫也五溪謂雄溪樠溪酉溪潕溪辰溪土俗作熊樠作朗潕作武在今辰州界羯胡事主終無賴祿山負恩無所倚賴詞客哀時且未還公自言傷時也庾信平生最蕭瑟暮年詩賦動江關周書庾信字子山雖位望通顯常有鄉關之思乃作哀江南賦以致其意其辭略亡壯士不還寒風蕭瑟趙云末句公方更欲南下文文章必遍於江南則以信自比宜矣右一搖落深知宋玉悲九辨亡悲哉秋之為氣也蕭瑟兮草木搖落而變衰又曰竊獨悲此凛秋風流儒雅亦吾師趙云風流儒雅字合兩處所出晉書天下言風流以樂廣王洐為首漢書儒雅則公孫洪董仲舒此與丹青引合用文采風流同格吾師字傳鄭子産不毁鄉枝曰是我師也而著人人名以言吾師則羊祜日蘇廣是我師也公又嘗甪亡李陵蘇武是我師帳望千秋一灑淚謝靈運灑淚眺連閣蕭條異代不同時漢武帝見相如上林賦恨不與之同時江山故宅空文藻哀江賦誅南芧宋玉之宅雲雨荒臺豈夢思為玉曾賦陽臺事朝雲行雨是也余趙云上句專言歸州之宅玉歸州有宅荆州人有宅知古渚宫故事曰庾信因候景之亂自建康遁歸江陵居宋玉故宅宅在城北三里故其賦云誅芧宋玉之宅穿徑臨江之府此荆州宅之證也公移居夔州入宅詩宋玉歸州宅雲通白帝城此歸州宅之證也今公尚在夔所賦詩則江山故宅者言其歸州宅耳荒臺則髙唐賦昔者楚襄王與宋玉遊於雲夢之臺望髙唐之觀注雲夢楚藪也在南郡華容縣其中有臺館今謂之雲雨荒臺則賦下文亡王夢見一婦人曰妾巫山之女也為髙唐之客妾在巫山之陽髙丘之阻旦為朝雲暮為行雨朝朝暮暮陽臺下旦朝視之如言故為立廟號曰朝雲陽臺即雲夢臺也玉所言朝雲行雨託興以言夢中事公詩句則言荒臺之雲雨蓋誠有之豈是夢思乎最是楚宫俱泯滅舟人指點到今疑疑神女之事也右二羣山萬壑赴荆門生長明妃尚有村一去紫臺連朔漢獨留青冡向黃昏薛云圖經昭君臺在興山山南二里漢掖庭待詔王嬙字昭君南郡秭歸人舊經云邑人憫昭君不回立臺以祭焉今有昭君村人琴操昭君伏毒而死單于葬之胡中多白草而比冡獨青趙云桉歸州圖經王昭君南郡秭歸人興山縣有昭君村有香溪止云昭君所遊耳謂因昭君草木皆香蓋未必然江淹恨賦若夫明妃去時仰天太息紫臺稍逺關山無極淫風忽起白日西匿隴鴈少飛岱雲寡色望君王兮何期終蕪絶兮異域李善注紫臺猶紫宫也蓋言天子之居矣獨留青塜則言昭君之暮也太白詩生乏黃金枉圖畫死留青塜使人嗟畫圖省識春風面環珮空歸月夜魂趙云公言在畫圖中得識昭君之美態如春風之面杜時可引詩京雜記漢元帝後宮頗多不得常見乃使畫工圖其形案圖召幸宫人皆胳畫工昭君自恃其兒獨不與乃惡圖之及後胸奴入朝選美人配之昭君之圖當行及入辭光彩射人悚動左右天子方重失信外國悔恨不及畫工毛延壽等皆同日棄市却是當時毛延壽所畫事延壽以不得金之故畫美為惡豈于今所言春風面者乎環珮空歸月夜魂又狀言魂在月中往來而歸也環珮者美人所服也陸機日出東南行金省埀藻翹瓊珮結瑶璠是已千歲琵琶作胡語分明怨恨曲中論薛云釋名推手向前日琵却手向後曰琶因以為名趙云舊注昭君適胸奴在路愁怨遂於馬上彈琵琶以寄其恨至今傳之名昭君怨不知何所據此蓋牽於世俗所傳昭君自能彈琵琶者若魯交詩一曲琵琶馬上彈恨聲飛入彈于國是已所謂昭君怨者自是時人賦樂府曲以之為名季倫王明君詞序曰王君明者本王昭君以觸文帝諱改焉胸奴盛請婚於漢元帝以後宮良家子昭君配焉昔公主嫁烏孫令琵琶馬上作樂以慰其道路之其送明君亦必爾也其造新曲多哀怨之聲故敘之於紙云爾詳味此序則馬上彈琵琶者乃所送昭君之人也豈昭君自彈邪故唐史官吳兢作樂府古題要解亦取之以為據若於琵琶謂之胡語則琵琶本胡中之樂胡一名胡琴也右三蜀主窺吳幸三峽崩年亦在永安宫劉先主以孫權襲關羽之故東征三吳為吳將陸議所破於秭歸少歸魚復改為永安遂卒於永安本傳云孫權聞先主住白帝甚懼遣使請和此窺吳幸三峽之意也又云章武三年夏四月癸已先主殂于永安宫翠華想像空山裏翠華車蓋想像猶髣佛建趙云翠華㽔天子之旗上林賦翠華之萎玉殿虛無野寺中山有卧龍寺先主祠在焉曹趙云班固楚辭序多稱虛無之語而子建詣虛無求列仙古廟杉松巢水鶴歲時伏臘走村翁前漢揚輝傳田家作苦歲時伏臘烹豚炮羔武侯祠屋長鄰近一體君臣祭祀同自注殿今為寺廟在宫東首趙云王褒講德論君為元臣為股肱明其一體相待而成右四諸葛大名埀宇宙宗臣遺像肅清髙漢以蕭何為宗臣以官業為時所宗尚也言孔明勳烈見於後世者亦可擬蕭何趙云晉書胡威曰大人清髙何得此絹三分割據􅀈籌䇿當時孔明多籌䇿陸士衡辨亡論故遂割據山川萬古雲霄一羽毛言聲名飛揚獨步萬古伯仲之間見伊呂指揮若定失蕭曹謂功埀成而亮薨論趙云言孔明在二公之間也伯仲之間字魏文帝典傳毅之於班固伯仲之間耳指揮若定字前漢陳平之言楚漢曰誠能去兩短集兩長天下指麾即定矣其後用之於大臣則庾庾信周齊王碑一朝指麾六合大定失蕭曹則亮有吞魏之志功未成而薨其指揮初未定也使其事定則一掃中原坐通江右天下混一雖蕭何曹參之功亦隱失矣見伊呂其見字則桓彛一見王導云向見管夷吾之見失蕭曹其失字則鮑明逺詩露失交何城之失此兩詩句之腰最為難著福移漢祚難恢復志決身殱軍務勞趙云舊本福移師民瞻所運移是本傳注載魏氏春秋亮使至問其寢食及其事之煩簡使對曰諸葛公夙興夜寢罰二十以上皆親攬所噉食不至數升宣王曰亮將死矣右五送田四弟將軍將夔州柏中丞命起居江陵節度陽城郡王衛公幕一作夔州府送田將軍赴江陵離筵罷多酒起地發寒塘回首中丞座見周行獨座榮注馳箋異姓王見八哀詩臨王詩注淮燕辭楓樹日鴈度麥城霜趙云起地發寒塘言田將軍所起發之地在夔州寒塘回首中丞座辭中丞而行猶回首顧戀也中丞言座則御史中丞謂之獨座也異姓王則漢有異姓諸候王也田之行在秋八月故曰燕辭楓樹日言燕之去鴈度麥城霜言鴈之來言楓樹則楚地多楓宋玉云江水湛湛兮上有楓而院籍云湛湛長江水上有楓樹林麥城未見所出應是楚地之名窮新添麥城出三國志呂蒙傳蒙取關羽荆州自知孤乃走麥城欲入蜀而潘璋斷其路則知杜公送客往江陵其陸路當經由麥城也空醉山翁酒遙憐似葛強趙云句以山簡比柏中丞以葛強比田將軍晉書山簡鎮襄陽郡民有佳園池簡每出嬉遊多之池上置酒輒醉名之曰髙陽池時有童兒歌曰山公出何許往至髙陽池日夕倒戴歸酩酊無所知時時能騎馬倒著白接㒿舉邊向葛疆何如并州兒強家在并州簡愛將也九月一日過孟十二倉曹十四主簿藜杖侵寒露蓬門啓曙煙力稀經樹歇老困撥書眠秋覺追隨盡來因孝友偏清談見滋味爾輩可忘年為志年之契也趙云藜杖即倒使杖藜字莊子原憲杖藜應門秋覺追隨盡自言其所追隨之處已盡不能再往即今所來孟氏之家因重其兄弟孝友偏篤也未句清談謂之滋味亦漢書所謂篤公之論將帥有味哉故韓退之送窮文語言無味亦出於此禰衡始弱冠孔融年四十為忘年交過客相尋窮老真無事江山已定居地幽忘盥櫛客至罷琴書挂壁移筐趙作留果呼兒問煮魚文選樂府呼兒烹鯉魚時聞繫舟楫及此問吾廬陶潛吾亦愛吾廬雷趙云挂壁字摘使晉書陶促少時漁於澤嘗網得一織梭以挂干壁移留果則壁問轉所儲留之果也末句公自言凡有舟楫過往必來見之也此篇有兩問字問煮魚應錯然不可妄填改也孟倉曹步趾領新酒醬二物滿器見遺老夫趙云晉夏候湛愍桐賦詰朝之暇步趾前廡楚岸通秋屐胡床面夕畦藉糟分汁滓劉伶酒德頌桄麴藉糟漢樊鯈傳歲獻甘醪髙注醪醇酒汁滓相將也甕醬落提携飯糲添香味朋來有醉泥論語有朋自逺方來理生那免俗方法報山妻趙云上句言孟倉曹之步趾此句公自言其當孟倉曹相訪之時如此也鄭康成注周禮酒正二日醴齋云醴猶體也成而汁滓相將如今恬酒矣舊注引樊倏傳注已在其後周禮醬用百有二十甕故倒用甕醬飯糲添香味以言其醬朋來有醉泥以言其酒阮咸語曰未能免俗課小竪鉏斫舍北果林枝蔓荒穢淨訖移牀三首一云秋日間居病枕依茅棟荒鉏淨果林背堂資僻逺在野興清深山雉防求敵詩雉鳴求其牡江猿應獨吟泄雲髙不去見泄雲蒙清塞注隱几亦無心莊子南郭子綦隱几嗒焉似喪其耦注心形兩忘也趙云沈休文詩茅棟嘯愁鴟背堂資僻逺言果林在堂之後也果林枝蔓荒穢則藏雉而有鬪敵之處雉性強而善鬪潘安仁射雉賦晚羣之俊擅場挾兩言不但欲專一場而已又挾兩雌乃所謂雉之求敵也舊注引詩却是求偶豈求敵之義邪江猿應獨吟應字平聲亦以鉏斫果林則逺來者少應有獨吟者而已末句泄雲字泄私烈反官韻作泄魏都賦窮岫泄雲日月常翳謝玄暉敬亭山詩泄雲已漫漫多雨亦凄凄而公詩又曰泄雲無定姿却仍用泄字也陶無心矣而吾之出岫雲之不去為無心矣而吾之隱几亦無心矣右一衆壑生寒早長林卷霧齊青蟲懸就日朱果落封一作成泥以泥封其接枝也薄俗防人面全身學馬蹄吟詩坐回首隨意葛巾低趙亡朱果落封泥園家愛惜好果以泥封之言朱果熟而色赤落封泥所封之泥久而自落之薄俗防人面使人面獸心之義蓋言薄俗之可防也舊注引左傳人心不同如其面馬止是靣之不同耳於防字無義全身學馬蹄取莊子馬蹄篇所謂馬蹄可以踐霜雪毛可以禦風寒齕草飲水翹足而陸此馬之真性也右二籬弱門何向沙虛岸只一作自摧日斜魚更食客散鳥還來寒水光難定秋山響易哀天涯稍曛黑謝靈運詩朝遊窮矄黑倚杖更徘徊右三峽口二首峽口大江間一作濶西南控百蠻施黔連五溪之蠻也城欹連粉堞岸斷更青山開闢多天險天設之險也言險因開闢而設通爾防隅一水關亂離聞鼓角秋氣動衰顔趙云城欹連粉堞言山上白帝城也防隅一水關言峽口有鐵鎖為關防也防隅字當是防虞鼓角蓋城上防戍所擊吹者以身當亂離之際聞之所以感動襄顔也右一時清關失險世亂戟如林去矣英雄事荒哉割據心當公孫述劉備之際夔為要衝蘆花留客晚楓樹坐猿深疲黹煩親故諸侯數賜金趙云阮籍臨廣武而嘆曰時無英雄使堅子成名末句一本公自注云主人柏中丞頻分月俸蓋節度郡守古諸侯也故所謂之金得稱賜金右二村雨雨聲傳兩夜寒事颯髙秋挈帶看朱紱開箱覩黑裘蘇季子不得用貂裘弊黑世情只益睡盜賊敢忘憂松菊新霑洗茅齋慰逺逰趙云公時服緋故用朱紱字挈帶看朱紱開箱覩黑裘以雨之故恐其浥醭故也朱紱在易用朱黻字在傳用朱芾字雖通於紱而用朱紱字則韋賢諫詩黼衣朱紱也世情只益睡亦以雨悶思及世情惟睡而已然時方盜賊敢忘禍亂之憂乎寒雨朝行視園樹柴門雜樹向千株丹橘黃甘此地無江上今朝寒雨歇籬中秀一作邉新色畫屏紆桃蹊李徑年雖故李廣贊諺曰桃李不言下自成蹊師古曰蹊徑道也梔子紅椒豔復一作色殊鎖石藤梢元自落倚天松骨見來枯林香出實垂將盡萊蒂辭枝不重蘇冬日恩光蒙借貸左傳云冬日可愛清霜殺氣得憂虞釋名云霜者喪也其氣慘毒物皆喪也衰顔動覔藜牀坐管林家貧坐藜壯欲穿為學不倦緩步仍須竹杖扶費長房投竹杖於葛陂化龍而去散騎未知雲閣處啼猿僻在楚山隅潘安云秋興賦序寓直于散騎之省髙閣連雲趙云江南種橘江北成枳則日橘自是楚地之所有耳故曰北地無舊本籬中秀色又云籬邉新色師民瞻作籬邉秀色是元自見來之語皆言其久逺如此矣東坡詩面骨向人元自白眉毛覆眼見來鳥蓋出如此耳謝玄暉詩桃李成蹊徑舊注止有蹊字是不知捨祖而取孫矣梁孔翁歸班媫好詩恩光隨妙舞月令仲秋之月殺氣浸盛末句公以流落在外州别無官署之意潘安仁為虎賁中郎將其秋興賦序云云今公以别無官署故言未知雲閣處上在蹄猿之地耳文選江淹上書曰大王惠以恩光顧以顔色偶題趙云此篇二十二韻首論文章而終之以流落懷念故國文章千古事得失寸心知趙云言文章垂不朽之事其得其失蓋吾心自知之禪家嘗云如人飲水冷暖自知亦此之謂文選吐滂沛乎寸心失自寸心而出豈不自知哉作者皆殊列名聲豈浪垂言以文章名必有所長也與趙云孔子曰作者七人矣故凡有所作得相承謂之作者作者列别若曰某人能詩某人能賦某人能文是之謂殊列亦豈有無其實而有其名哉騷人嗟不見漢道盛於斯漢文章深厚有古人之風祖趙云上句指屈原宋玉文章之起於騷嗟不見則屈宋逺矣下句則漢漢先有司馬遷相如後有劉向揚子雲王貶之屬後漢有班固父子張平子之屬也嗟不見字如愛而不見搔首踟躇盛如斯則倒用如斯為盛也亦以言惟漢為盛傷今不如也前漢公孫洪等贊曰漢之得人於兹為盛文選范彥龍效古漢道日休明前輩飛騰入餘波綺麗為趙云選喜謗前輩則楚漢已來載在典册皆前輩也飛騰字使飛英聲騰茂實也書餘波及于流沙文賦或藻思綺合清麗芊眠亦摘字用文章至于綺麗乃騷雅之未流故謂之餘波舊句綺麗騷人之作非是後賢兼舊制或作利作列後之作者兼騷之體也歷代各清規趙云此言後輩兼取前輩之所利以為規範乃公所謂遞相祖述也已上普言之耳法自儒家有心從弱歲疲趙云公自謂也言文章之法自是吾儒家者流所有而吾之用心已自弱冠時疲苦至今也如公之家則又纍世儒矣蓋其祖審言已有文稱也永懷江左逸多病鄴中奇趙云公蓋以謝靈運鮑明逺為懷又以劉公幹自恃也江左則稽阮鮑謝之徒文選多取焉故公永懷之舊本注云鄴魏所都文帝好文故作者多尚奇江文通云關西鄴下既已罕同河外江南頗為異法按江文通雜擬詩序固有此語舊注因其有鄴下兩字引用却便云文帝好文故作者多尚奇以附會為鄴中奇非是按魏文帝好文其在鄴也有七子皆能文乃王粲徐幹陳琳阮瑀劉楨孔融應瑒而劉楨者多病所謂余嬰沈痼疾竄身清漳濵謝靈運擬其詩序云劉楨卓犖偏人而文最有氣所得頗經竒則病者指劉楨為鄴之之奇也公亦多病故専以自比騄驥皆良馬騏驎帶好兒車輪徒已斫堂構惜仍虧趙云言文士必有佳子而自嘆其子之文不逮於已也騄耳騏驎是二馬而皆良馬騏驎之子仍是是騏驎故云帶好兒如輪扁者妙如斫輪而不能傳其子事見莊子臣不能以喻臣之子臣之子亦不能以受之於臣是以行年七十而老斫輪堂構之虧則書若考作室既底法厥子乃弗肯堂矧肯構然則題為偶題豈公有所感而作此詩耶謾作潛夫論虛傳幼婦碑趙云此又嘆其文章如此而自流傳也後漢王府字節信隱居著書三十餘篇以譏當時失得不欲章顯其名故號曰潛夫論曹操與楊修講曹俄碑陰有八字曰黃絹幼婦外孫韲臼修即解得操行三十里乃悟亡黃絹色絲絶字也幼婦少女妙字也外孫女子之子好字也韲臼受辛之器辭字也言絶妙好辭與楊合操曰有智無智校三十里緣情慰漂蕩文賦詩緣情而綺靡抱疾屢遷移經濟慙長䇿飛棲假一枝莊子鷦鷯巢於深林不過一枝左太沖巢林栖一枝可為達士模唐李義府始召見太宗遂令詠烏其末句上林多許樹不過一枝栖帝曰吾將全樹借汝豈惟一枝塵沙傍蜂蠆江峽繞蛟螭蜂蠆蛟螭皆毒物也言避患難不暇爾趙云言其製作緣情而生以慰漂湯耳抱疾屢遷移又申言漂蕩之實曹子建離思賦余抱疾以賔從扶衡軫而不移經濟慚長䇿雖為自謙蓋亦自傷於不用也晉石苞傳景帝言苞曰雖細行不足而有經國才略夫貞亷之士未必能經濟世務飛棲一枝以鳥為喻又以成屢遷移之句賈誼云振長䇿而馭宇內蜂蠆蛟螭言其所棲一於夔州之地如此也蕭瑟唐虞逺聫翩楚漢危聖朝兼盜賊胡虜為中原之亂也異俗更喧卑公北人而在南故呼楚人為異俗喧卑囂雜貌於趙云歎治古之不復見傷戰爭之不能安治古莫過唐虞故以唐虞為言戰爭莫切於項羽與漢髙祖故以楚漢為言舊注於唐虞下注沈林文論虞夏以來遺文不能覩于楚漢下注江文通雜體詩夫楚謡漢風既非一骨已隔漂蕩遷移居峽之後豈却尚言文章邪又與下假不接蓋公已自緣情慰漂蕩而下轉入悼已傷時之事矣唐虞既逺而楚漢可傷其在今日則聖朝雖聖乃兼有盜賊蓋前有安史今有吐蕃也周禮本俗六有曰除盜賊鮑明逺舞鶴賦陋人寰之喧卑鬱鬱星辰劔蒼蒼雲雨池趙云上句又以嘆其埋鏟下句又以言其潛隱善言如劔之埋而未呈如蛟龍之在池而未出也雷次宗豫章託載豐城劔事或曰劔上有七星之狀公於暝詩云正枕當星劔是已理固有之而未見所出唯辭燭觀純鉤之劔曰觀其文則列星之行然亦不分明有星辰字周瑜言劉備曰蛟龍得雲雨終非池中物兩都開幕府萬宇插軍麾趙云上句則前此吐蕃陷東京又陷京師又掠涇邠躪鳯翔入醴泉奉天時京師大震則兩都曷嘗不置軍營而開幕府邪下句則天下皆用兵矣南海殘銅柱東風避月支胸奴傳東胡強而月氏盛陷趙云在南亦有侵犯者如廣德二年西原蠻邵州大厯二年桂州山獠及是已銅柱則馬援征南時立銅柱而勒功於其上也殘則幸餘此物耳月支胡在漢為梗今以比吐蕃冦自西而來犯順於東胡東風避之詩人行語如李大夫自長安赴廣州而云南斗避文星也音書恨鳥鵲西京雜記乾鵲噪而行人至文選魏武帝短歌行月明星晞烏鵲南飛號怒怪熊羆苦寒行熊羆對我蹲不趙云禍亂之際道路阻塞家信不通故恨烏鵲之信也下句言在夔山居之所有也稼穡分詩興役于營生不暇吟詩柴荆學土宜習其風俗去趙云謝靈運郡詩促裝反柴荆周禮有土宜之法故山迷白閣秋水憶黃陂白閣黃陂關中山水趙云黃陂作黃陂其字非是舊注云皆關中山水雖是而莫稜白閣則終南山相附之山名公羡陂西南臺詩又云顛倒白閣影是已皇陂則星于陂也公於重過何氏詩云雲薄翠微寺天清皇于陂又贈鄭十八虔詩第五橋東流恨水皇陂岸北結愁亭是已舊本二詩於過何氏詩中皇亦作黃誤當作皇今以白對皇此厨人其雞黍稚子摘楊梅之格不敢要佳句愁來賦别離趙云賦别離則言去鄉國之逺也楚辭悲莫悲於生别離世説載孫興公作天台賦成以示范榮期每至佳句輒云應是我輩語公詩嘗曰為人性癖耽佳句語不驚人死不休而今却曰不敢要佳句則詩人變化各有所主豈可拘哉雨晴雨時一作晴山不改晴罷峽如新言陰晴在雨而不在山也天路看殊俗殊江思殺人有猿揮淚盡荆州記巴山之􅀈巫山長猿鳴三聲淚霑裳無犬附一作送書頻故國愁眉外長歌欲損神趙云言或雨或晴山不變改而晴之既罷則峽又如新也天路看殊俗言身在長安乃天路之人而却來此看殊俗也枚乘詩美人在雲端天路杳無期庾信廣化公墓銘化被殊俗威行鄰境非詩大序國異政家殊俗中字也古詞有愁殺人陸士衡赴洛新親友贈豫邁揮淚廣州陰陸機有犬曰黃耳在洛中使書歸江左晚晴吳郎見過北舍圃畦新雨潤愧子廢鉏來竹杖交頭拄柴扉掃徑開欲栖羣鳥亂未去小童催明日重陽酒相迎自撥醅趙云費長房投竹杖於葛陂化龍而去未去小童催此亦道實事耳新雨一作佳雨非蓋不必如是方為奇也解悶十二首草閣柴扉星散居浪翻江黑雨飛初鮑照泿翻揚白鷗山擒引子哺紅果溪友一作女得錢留白魚趙云庾信寒園即目詩寒園星散居搖落小村墟溪女一作友當以女為正蓋公嘗使溪女字如亡員鹽出井此溪女豈亦用神仙張道陵降十二溪女有此有字者乎右一商胡離别下揚州憶上西一作蘭陵故驛樓為問淮南來貴賤老夫乘興欲東遊趙云此篇亦道實事恪有一胡商下揚州而來别其人曽公公同上蘭陵驛樓乃追言之也末句則因其行而問淮南價公欲南下也舊本東逰作東流西陵又作蘭陵師民瞻本作東逰是并取西陵字亦是然蘭陵在楚州荀卿曽為蘭陵令西陵則在鄴曹操云望吾西陵取次是曽相見處耳右二一辭故國十經秋每見秋瓜憶故丘今日南湖采薇蕨何人為覔鄭瓜州自注今鄭祕監審實趙云何人為覔鄭瓜州則鄭監必有瓜州之命或舊曽守瓜州尚有此稱緣主鄭作詩故首句言每見秋瓜意故丘以引瓜州為疊二瓜字乃詩人之老句也瓜州一作袁州非蓋不著此瓜字則與上句不相干也憶故丘事公長安人長安之東門曰青門故侯邵平種瓜於此時號邵平瓜一作憶故侯於義亦通大抵公懷鄉之語耳右三沈范早知何水部沈范謂沈約范雲曹劉不待薛郎中水部郎中薛據獨當省署開文苑兼泛滄浪學釣翁趙云何遜與薛據俱是水部之官而何遜能詩早為沈約范雲所知若薛據者恨不與曹子建劉楨同時而言二人不得之也末句言薛在省部時已擅文章而開文苑後漢有文苑傳公在荆南有江湖之樂斯為學釣翁乎漁父所謂滄浪之水也右四李陵蘇武是吾師世之言五言詩始于蘇武李陵孟子論文更不疑一飯未曽留俗客數篇今見古人詩校書郎孟雲鄉李趙云五言詩起於陵蘇武今文選所載良時不再至又骨肉緣枝葉等篇是也蓋實公之所服膺豈不曰是吾師乎孟子論文更不指指孟雲卿之能文魏文帝典論有論文一篇末句又専言孟矣右五復憶襄陽孟浩然清詩句句盡堪傳即今耆舊無新語謾釣槎頭縮項編浩然開元時人詩云梅花殘臘月栁色半春天鳥泊隨陽鴈魚藏縮項鯿又云試垂竹竿釣果得查頭鯿鯿魚也楚云云長腰粳米縮頭鯿魚為美味也皮日休詩殷勤莫笑襄陽住為愛南陽縮項編捕趙云習鑿齒襄陽耆舊傳漢水中鯿魚甚美常禁人以槎斷水因謂之槎頭鯿宋張敬兒為刺史齊髙帝求此魚敬兒作六槽船置魚而獻曰奉槎頭縮項編一千八百頭而浩然詩兩用之言浩然巳死今耆舊乏間不能復造新語以言鯿魚但謾釣之而已右六陶冶性靈存底物顔氏之推家訓論文章曰陶冶性靈從容諷諫新詩改罷自長吟孰知二謝將能事玄暉靈運頗學陰何苦用心趙云孰知者稔孰之孰古用此字非孰何之孰也公自言其稔孰知謝靈運謝惠連將此作詩為能事而我亦以為能事也易天下下之能事畢矣陰則陰鑑何則何遜苦用心則不苟且為之矣莊子曰天王之用心古詩晨風懷苦心陸士衡云志士多苦心右七不見髙人王右丞藍田丘壑漫寒藤最傳秀句寰區滿未絶風流相國能趙云王右亟王維也有别墅在藍田所謂輞川也右丞能詩見有集行于世其弟相國縉亦能詩時見數篇于摩詰集中縉本傳亦云少好學與兄維俱以名間右八先帝貴妃今寂寞荔枝還復入長安炎方每續朱櫻獻玉座應悲白露團謝玄暉玉座猶寂寞况乃妾身輕杜補遺唐史遺史云乾元初明皇幸蜀回適嶺南進荔枝上感念楊妃不覺悲動逮絶髙力士于御座旁設位享之上稍蘇息趙云此篇専憶明皇時進荔枝事東坡云天寶歲貢取之涪以共由子午道進所以知其為涪也當時貢荔枝雖是涪州特以涪州比廣南路尤可生致而廣南之獻則在唐為歲獻之常矣今末句云炎方每續朱櫻獻則併及廣南言之左太沖蜀都賦云朱櫻春熟素奈夏成禮記月令仲夏之月天子嘗黍羞以含桃先薦寢廟漢惠帝常出離宫叔孫通曰古者有春嘗果方今櫻桃可獻願陛下出因取櫻桃獻宗廟上許之諸果獻由此興今云朱櫻獻則亦南方之所貢也玉座應悲自楊妃死今明皇見荔枝入貢追念而悲矣右九憶過瀘戎摘荔枝青楓隱映石逶迤京中舊見君顔色紅顆酸甜只自知杜補遺云扶風記云此木以荔枝為名者以其結實時枝弱而帶牢不可摘取以刀斧劙取其枝故以為名閩中四郡所出肌肉甚厚甘香瑩白廣蜀荔枝小酸而肉薄其精好者僅比閩之下品劙音利指趙云荔枝蜀中有之而瀘戎為多舊見君顔色君字言荔枝也其亦王子猷君竹之義呼公于它物則爾汝之矣紅顆酸甜只自知却言今所嘗食冇酸冇甜自知之也右十翠瓜碧李沈玉甃玉甃井也魏文帝書浮甘瓜於清泉沈李李於寒水赤梨葡萄寒露成可憐先不異枝蔓此物姢姢長逺生趙云此物字祖出左傳而選詩之言庭樹曰此物何足貴但感別經時則凡所主之物曰此物今應言荔枝也瓜李梨葡萄借言一歲之果言同是果實可憐先與荔枝不異枝蔓他處所有而此物長於逺地姢姢然生所以嘆異荔枝之為物也此篇與後篇皆不犯荔枝字而意義自明右十一側生野岸及江蒲不熟丹宫滿玉壺雲壑布衣鮐背死勞一生讀作人字重馬翠眉須杜補遺云歐本勞作勞人重馬作害馬眉疏作眉疏左思蜀都賦曰巧竹緣嶺菌桂臨崖旁挺龍目側生荔枝布緣萋之萋萋結朱實之離離桉楊貴妃嗜荔枝必欲生致之乃置騎曉夜傳送至京師色味猶未變當是時布衣賢士不能搜訪馹召至于老死山谷之間以貴妃須荔枝之故反勞人害馬力求於數千里之外子美所以作是詩也武后所撰字一生為人當作勞人趙云江蒲則自戎𤏡而下以畝為蒲今官私契約皆然因以押韻師民瞻本作江浦非是不熟丹宫滿玉壺所所以求之安故耳丹宫神仙之宫以比禁宛之地玉壺者珍貴之器以言至尊之奉惟其不熟丹宫而滿玉壺所以求之于逺也魯直云善本是勞人重馬翠眉須蓋言勞苦人力重疊馳馬只為翠眉之人所須乃指言貴妃矣况須字與壺字同韻而疏字為失韻則重直之説信而有證也勞人雖祖于詩云勞人草草其後如梁大同二年地生白毛長二尺孫盛以為勞人之異重馬史記始有紀有曰河魚大上輕車重馬東就食司馬貞謂言時之災異魚大上於河岸故人駭異而去就食于東則重馬者重疊馬而行也雲壑則孔德璋北山移文云誘我松桂欺我雲壑鮐背則曰老者之狀詩曰黃髮鮐背又貽背兒齒右十二復愁十二首趙云前題曰解悶而此題曰復愁悶既解之以詩矣而又有可愁之事也人煙生處僻一云逺處里趙云曹子建詩千無人煙虎􅀈過新蹄野鶻翻窺草村船逆上溪右一釣艇收緡盡昏鴉接翅稀月生初學扇雲細不成衣初學扇謂未甚圓也不成衣言細也歸趙云公於有待至昏鴉之下自注河遜云昏鴉接翅然今改一稀字意義遂與遜詩不同矣於月言扇于雲言衣如劉希夷佳人春遊云池月憐歌扉山雲愛舞衣又李義府堂堂詞云鏤月成歌扇裁雲作舞衣今公所用又為新矣右二萬國尚防寇故園今若何昔歸相識少早已戰場多趙云故園指言長安也昔歸相識少言往時自外而歸巳自相識少矣今又可知也早巳戰場多又言京都之地早時已自為戰場至于今也豈不以安史亂於前而吐蕃亂於後邪右三身覺省邪在家須農事歸年深荒草徑老恐失柴扉趙云上句言覺得省郎之身在也此牛僧儒所謂見在身矣公為尚書工部員外郎故云次句指言長安之家公在瀼西已親稼穡矣則得歸長安本家亦須以農事往也末句蓋言離去故國多年其所居必荒蔓草而老身又恐失柴扉而不得返也右四金絲鏤一作縷箭鏃皂尾製一作掣旗竿一自風塵起猶嗟行路難金絲箭皂尾旗皆胡服也起趙云首兩句蓋將之物平時所用至風塵而未息則亦厭之矣所以有行路難之嗟也隋顔之推古意詩歌舞未終曲風塵暗天起行路難古樂府有此名右五正觀銅牙弩開元錦獸張花門小前一作箭好此物棄沙場趙云詳此詩末句則銅牙弩錦獸張乃正觀開元所以賜蠻夷者花門回紇恃其有助順討安賊之功輕小箭好而同牙弩錦獸張者棄之於沙場也師民瞻本却取一作小箭好則無義矣杜補遺唐六典注釋名曰弩怒也有怒勢也其柄日臂似人臂也鈎𢎞曰牙似牙齒也牙外曰郭為牙之規郭也合名之曰機如門户樞機開闔有節也書曰若虞機張則所謂錦獸張者亦弩之物耳又南越志云龍川唐時常有銅弩牙流出水皆銀黃雕鏤取之製弩父老云其地蓋越王弩營也右六今日翔麟馬先宜駕鼓車無勞問河北諸將角榮華趙云薛蒼舒云按唐志翔麟廄名先宜駕鼓車則公欲息兵休戰矣漢文帝朝冇獻千里馬者帝命以駕鼓車末句問者餽問之問言此馬不勞問遺河北徒使諸將角勝于勞華而巳此公恨諸將不勤王之甚角字舊正作覺非右七任轉江淮粟休添苑囿兵由來貌虎士不滿鳯皇城趙云休添苑囿兵則代宗嘗自治兵於苑中長安城中必添兵矣公意在息兵以不添兵為上而任轉粟則但欲長安足食也書云如虎如貔鳯皇城則秦穆公女吹簫鳯降其城因號丹鳯城其後言京都之城曰鳯城李嶠單題城詩云獨下仙人鳯羣驚御史烏亦用此鳯事也右八江上亦秋色火雲終不移巫山猶錦樹南國且黃鸝趙云休添苑囿兵則代宗嘗自治兵於苑中長安城中必添兵矣公意在息兵以不添兵為上而任轉粟則但欲長見巫山之樹猶是錦樹及儘南下則在春時且却聽黃鸝也樹變青而丹謂之錦樹公詩又言今朝碧樹行錦樹也右九每恨陶彭澤無錢對菊花如今九日至自覺酒須賖趙云檀道鸞續晉陽秋曰陶潛九月九日無酒於宅邊摘菊盈把久望見白衣人乃王𢎞送酒即便就酌而歸末句酒須賒則公亦無錢沽之矣庾信云胸中無學猶手中無錢右十病減詩仍拙吟多意有餘莫看江揔老猶被賞時魚趙云此篇惟末句難解謂之被魚則破服之被魚應是魚袋之魚唐有賞緋魚袋有賜緋魚袋然公官衡則賜緋魚袋者安得謂之賞時魚乎按江揔傳揔尤工五言七言則公詩首句為言作詩而末及江揔蓋公亦喜其詩矣右十一胡虜何曽盛干戈不肯休閭閻聼小子談話覔封侯趙云此篇公蓋憤生事邀公濫冒榮寵者矣苟能盡命致死則可以一戰而滅之惟其延歲月以用兵反以為胡虜之盛蓋在意在於己身之富貴所以雖閭閻小子亦説取封侯耳師民瞻本談話作談笑亦通右十二諸將五首趙云按編年通載今歲二月吐蕃雖遣使來朝而九月又陷原州公詩蓋責諸將之不力戰追言前事以諷之第五篇獨美嚴公蓋公第三次來成都時先破吐蕃于當狗城鹽川城西此所以深望諸將如之也漢朝陵墓對南山張孟陽七哀詩北邙何疊疊髙陵有四五借問誰家墳皆云漢世主恭文遙相望原陵鬱膴膴胡虜千秋尚入關昨日玉魚蒙葬地西京雜記長安大明宫宣政殿每夜見數十騎衣鮮麗遊往其間髙宗使巫劉明奴王湛然問其所由鬼曰我是漢楚王戊戊太子死葬於此明奴等曰按漢書戊與七國反誅死無後焉得有子葬於此鬼曰我當時入朝以路逺不從坐後病死天子於此葬死漢書戊有遺誤耳明奴因宣詔與改葬鬼喜曰我昔日亦是近屬豪貴今在天子宫內出入不安改卜極幸甚我死時天子斂我玉魚一雙今猶未朽必以此相送勿見奪也明奴以事奏聞及發掘玉魚宛然自是其事遂絶早時金碗出人間孔氏志怪曰盧充家西有崔少府墓充一日見一府舍入門進見少府少府欲充與小女為婚女生男三月三日山陰水戲忽見崔氏抱兒還充又與碗并贈詩一首充取兒碗及詩女忽不見充詣市賣碗崔女姨曰我妹之女嫁而亡贈以金碗著棺中云社田補遺云沈炯字初明為魏所虜嘗獨行經漢通通天臺為表奏之陳已思鄉之意其略曰甲帳珠簾一朝零落茂陵玉碗遂出人間竊詳是詩首句云漢朝陵墓對南山即碗出人間乃茂陵事也但金王字異耳元注引盧充金碗事恐不類姑兩存之必有能辨者之趙云此四句所以激怒諸將也漢朝天子之陵大臣墓多對南山千秋萬嵗以為固矣而胡虜尚能入關不無侵掘也題是諸將止言將臣之貴者常蒙玉魚之賜且有金碗在墓而出皆人臣事耳止用出人間三字全出已見有發墓之意不必泥金碗止是女人之事也師民瞻夲作出人寰蓋為後句改北斗間為北斗間而然也見愁汙馬西戎逼曽閃朱旗北斗間子美父名間集中兩處用間字皆非是謂吐蕃踐河隴陷京師也趙云前四句言既有胡虜之禍發掘冢墓矣今繼有吐蕃之難而諸將不知憤激速來長安禦戎也東京賦云髙祖伏朱旗而建大號北斗言長安長安號北斗城也諸將所以汗馬者以西戎之逼也然閃朱旗於北斗城中而翻間暇焉則以不措意於勤王及犬戎之既去為不及事也蔡伯世夲改作北斗殷師民瞻夲改作北斗間蓋皆牽于杜公父名間必不使間字而以意改耳左傳曰左輪朱殷以血染之而後殷也朱旗之閃何至殷北斗乎若北斗間則間字語弱别無含蓄之意又乃指其所之辭亦與逼字不敵矣兼自間字公亦嘗使曰翩翩戲蝶過間慢不可改間字作别字今所云北斗間皆臨文不諱如韓退之之父名卿而退之豈不使卿字邪多少材官守涇渭漢材官蹶張皆武臣也將軍且莫破愁顔趙云上六句皆是已往之事已責之矣今此言費材官以守涇渭之水則深防寇賊之禍為將軍者且莫破愁顔而為樂也髙適嘗言於明皇曰監軍諸將不恤軍務以倡優蒲塞相娛樂則公今有且莫破愁顔之戒宜矣右一韓公夲意築三城擬絶天驕拔漢旌丐奴傳天之驕子薛云唐吕溫三受降城碑默啜強暴朔方大總管韓國公張仁願請築三城奪據其地中宗詔許於是六旬雷動三城嶽立豈謂盡煩回紇馬翻然逺救朔方兵言築城以備蕃寇而蕃反為唐平難也杜甫遺云韓國公張仁願于河北築三受降城自是突厥不敢踰山牧馬趙云回紇者胸奴之種也故亦得稱天驕公于留花門詩亦曰花門天驕子飽食氣勇決是已拔漢旌拔字使韓信傳拔趙幟立漢幟之拔擬絶天驕拔漢旌蓋言三城之築所以止胸奴搴拔漢家之旗矣彼回紇者豈謂國家煩其兵馬救朔方兵之困敗以助討賊邪蓋至德元載閏八月廣平王俶為天下兵馬元帥郭子儀副之以朔方安西回紇南蠻大食兵討安慶緒其後回紇恃功侵擾中國此公之所以嘆也胡來不覺潼關隘謂祿山陷關也龍起猶聞晉水清謂肅宗起于靈武也獨使至尊憂社稷諸君何以答升平趙云潼關非不隘也而胡來不覺其隘蓋以失守也此以譏哥舒翰之敗當時諸將不能盡忠竭節獨貽天子之憂乃有煩回紇兵之事其後賊既已平諸軍有何功效而報答哉此責其徒享髙爵厚祿者矣必言回紇馬則其戰每在騎戰也故公嘗云渡河不用船千騎常撇烈又云京師皆騎汗血馬也言晉水清則河北者晉地也乃安賊所起之地肅宗龍飛而晉水復清矣右二洛陽宫殿化為烽曹子建詩洛陽何寂寞宫殿盡燒焚休道秦關不二重張孟陽劒閣銘秦得百二併吞山河注言百二謂以二萬之衆足以當百萬得形勢也趙云謂舉烽燧於殿上也前漢田背賀髙祖曰陛下治秦中秦形滕之國帶河阻山縣隔千里持戟百萬秦得百二焉今云百二重則既百二而又得百二也舊注引張孟陽劒閣銘是為無祖滄海未全歸禹貢薊門何處盡堯封言為盜賊所奄有也云趙云滄海指言山東薊門指言河北古詩自薊北門禹貢則尚書篇董仲舒云堯舜在上比屋可封今言何處是堯可封之民亦以為吐蕃所陷也朝廷衮職誰爭補天下軍儲不自供趙云上句舊夲作雖多預師民瞻夲作誰爭補是詩曰衮職有闕仲山甫補之今不能然公是以罪之也下句則公亦嘆其無如之何之辭言郡國不修貢賦須上求索而後供非以其職而自供者也稍喜臨邊王相國王縉也文中子曰何必臨邊趙云若以公此句為指王縉則縉自廣德二年同平章事之後於大厯二年前豈嘗出而臨邊手新書既脫略則無所考也肯銷金甲事春農蔡文姬詩金甲耀日光右三回首扶桑銅柱標冥冥氛祲未全銷越裳翡翠無消息前漢西域傳贊孝武之世覩犀布玳瑁則建朱崖七郡自是之後明珠文甲通犀翡翠羽之珍盈於後宫師古注云昔周公相成王越裳氏重九譯而獻白雉譯日吾受命之日久矣天之無烈風淫雨意中國有聖人乎盍往朝之南趙云扶桑以言王國之東銅柱以言王國之南馬援征建桐柱標以勤功伐晉阮孚云氛䙞既澄日月自朗領聨兩句所以結氛祲未銷之所致也翡翠蓋取白雉之類耳南海明珠久寂寥賈琮傳交趾土多珍異産明璣翠羽犀象玳瑁異香美木之屬莫不自出耳趙云明珠多出于南海如交趾産明璣合浦出大珠也殊錫曽為大司馬東晉石勒侵阜陵詔加王導大司馬假以黃鉞總戎皆插侍中貂漢侍中冠武辨大冠亦曰惠文冠加璫附蟬為文貂尾為飾也炎風朔雪天王地只在忠臣翊聖朝言天子冒風雪於外所賴者忠臣而已趙云此深責諸君徒享髙爵厚恩而不能輸忠者也以殊錫言之則有為大司馬者矣以總戎言之則有為侍中者矣此借前代之事以比之也炎風言南方之地朔雪言北方之地詩曰普天之下莫非王土故曰天王地公詩句之意蓋以莫非王土當修職貢必欲其來在忠臣翊贊天子耳右四錦江春色逐人來巫峽清秋萬壑哀殷仲文詩獨有清秋日能使髙興盡又爽籟驚幽律哀壑叩虛牝顧愷之云千嵓競秀萬壑爭流正憶往時嚴僕射嚴武共迎中使望鄉臺望鄉臺在成都之北主恩前後三持節按武傳兩鎮蜀一刺綿州軍令分明數舉杯西蜀地形天下險安危須伏出羣材劒閣銘曰形勝之地匪親勿居長趙云嚴武鎮蜀辟公為參謀望鄉臺在成都之北安使來所經之地公隨嚴僕射共登此臺以迎中使故曰正憶往時嚴僕射共迎中使望鄉臺此又以人名對處所之格三持節則言嚴公第一次寶應元年正月來敕命權令兩川都節制四月召還第二次於六月却専以節度西川來阻徐知道反不得進第三次廣德二年朝廷方正以兩川合一節度而武以黃門侍郎來至永泰元年四月盡日薨其詳具于八哀詩題下所解也舊注云兩鎮蜀一刺綿非是軍令分明數舉杯言其治軍整肅所以不妨舉杯之頻數也後句深美嚴公甚明安危則安其危也公於八哀之言武云公來雪山重公去雪山輕正此意矣右五九日五首趙云舊夲題下注云闕一首非也其一在成都詩中今選補之重陽獨酌一作少飲杯中酒抱病豈一作起登江上臺竹葉於人既無分張景陽七命乃有荆南烏程豫北竹葉浮蟻星沸飛華萍接竹葉酒名也菊花從此不須開荆楚嵗時記九日登髙飲菊花酒竹趙云舊夲作豈登師民瞻夲取起登字是葉者酒名也張華輕薄篇曰蒼梧竹葉清宜城九醖酒首句云獨酌杯中酒又却云竹葉于人既無分則公以病肺斷酒雖酌而竟不飲也故公别篇又云潦倒新停濁酒杯殊方日落玄猿哭後語宋玉曰子獨不見其玄猿乎舊國霜前白鴈來漢武太子婚得白鴈于上林以為贄弟妹蕭條各何往干戈衰謝兩相催干戈與衰老相逼也玄趙云文子云殊方偏國猿哭則峽中多猿古歌云巴山之峽巫山長猿啼三聲淚霑裳也上林賦曰玄猿素雌而晉書五行志射妖云蜀車騎將軍鄧芝征涪陵射玄猿猿自拔矢卷木葉塞射瘡芝歎曰物之性吾其死矣斯乃玄猿之事實用對白鴈則沈存中云北方有白鴈似鴈而小色白秋深則來來則霜降河北人謂之霜信杜甫詩曰故國霜前白鴈來即此也舊注云漢武太子婚得白鴈於上林以為贄不知據何書而言然此自是唐髙宗咸亨中事止云會苑中獲白鴈耳若新語曰梁君出獵見白鴈欲自射之道上有驚鴈駭者梁王怒命射此人其御諫之而止斯乃白鴈之事實右一舊與蘇司業源明兼隨鄭廣文虔採花香泛泛坐客醉紛紛野樹欹還倚秋砧醒却聞歡娛兩冥漠言蘇鄭俱亡而又流落也顔延年衣冠終冥漠西北有孤雲魏文帝西北有浮雲二趙云前四句言當時之事後句則公述其今日在夔之况末句歡娛則以二人死而冥漠今日在夔之歡娛則以流落寄寓而冥寞故云兩也西北有孤雲則懷望長安也漠一作寞右二舊日重陽日傳杯不放杯即今蓬鬢改但愧菊花開愁見節物也北闕心長戀北闕帝都也西江首獨回茱茰賜朝士難得一枝來唐制九日賜宴及茱茰書趙云北闕在前漢未央宫殿雖南嚮而上奏事謁見之徒皆詣北闕又關中記曰未央宫東有蒼龍北闕有玄武闕所謂北闕也西江首獨回則意欲下荆渚也莊子云激西江之水疏云蜀江謂之西江以其從西來此在楚人指之為西江矣末句所以成戀北闕之句右三故里樊川菊樊川在杜曲登髙素滻源滻水也他時一笑後今日幾人存言節物依然而人事更變也安趙云樊川素滻皆指言長安也樊川在長萬年縣南三十五里十道志曰其地即杜陵之樊鄉漢髙祖至櫟陽以將軍樊噲灌廢丘之功為最賜噲食邑于此故曰樊川滻水在長安萬年縣東北流四十里入渭其謂之素滻潘安仁西征賦云南有玄灞素滻北有清渭濁涇巫峽蟠江路終南對國門繫舟身萬里伏枕浪雙痕巫峽終南相去萬里於流落之際而又伏枕則爵苦可知矣為客裁烏帽從兒具緑樽沈休文賔至下塵榻憂來命緑樽佳辰對一作帶羣盜愁絶更堪論當盜賊充斥道路阻絶於異鄉逢此佳節固多愁蹙也之趙云上句言其在夔之地次句又言長安乃其懷憶情也為客裁烏帽為音去聲平時疏散往往不巾其裁烏帽以為客而已烏帽未見所出公又曰烏帽拂塵青螺粟惟管寧傳云常著皂帽耳東坡云時見烏帽出復時見烏帽出復應却出于杜也右四風急天髙猿嘯哀渚濤沙白鳥飛回無邊落木蕭蕭下不盡長江衮衮來萬里悲秋常作客百年多病獨登臺艱難苦恨繁霜鬢潦倒新停濁酒杯趙云潘安仁云徑風凄急宋玉云天髙而氣清四字兩出合使方工楚詞有風颯颯兮木蕭蕭其下字使楚辭洞庭波兮木葉下潦倒字濁酒杯字並出嵇康蓋云潦倒粗疏又曰濁酒一杯也若潦倒義則北史崔瞻傳云自天保以後重吏事謂容止醖藉者為潦倒贍終不改焉如此則潦倒亦非不佳之語故公又曰多材依舊能潦倒右五九日諸人集于林九日明朝是相要舊俗非非昔日遊賞之地老翁難早出賢客幸知歸舊采黃花賸新梳白髮微謾看年少樂忍淚已霑衣趙云九日明朝是則八日詩也舊夲反在九日詩下非世説日過江諸人每暇日輒相要出新亭藉草飲宴賢客幸知歸言知所歸往以言其集于林之謂也賸字俗非剩非九家集注杜詩卷三十
