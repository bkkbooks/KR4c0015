body:
  text: 九家集注杜詩卷十九宋郭知逹編近體詩奉留贈集院崔于二學士國學休烈昭代將垂白昭明也昭代猶明時謝靈運星星白髮垂途窮乃呌閽公因不第乃獻賦阮籍哭途窮思玄賦呌帝閽氣衝星象表趙云揚雄甘泉賦選巫咸兮呌帝閽氣衝星象暗以劍為喻文選上呌星象詞感帝王尊公嘗有詩云往年文彩動人主趙云此四句言獻三大禮賦也當天寶九載時方隆盛詩年三十九歲雖窮困自負其才獻賦而上悅之故云舊注引公詩非是蓋此方敘述其獻賦之意而莫相疑行舊注所云則言獻賦之後聲聞輝赫召試中書堂而文彩動上也昭代本是昭世字鮑明逺云浮生旅昭世唐太宗諱世民故改世為代蓋世改為蓋代民民傑改為人傑杜欽傳紀陽侯與欽子業書曰誠衰老姊垂白天老書題目春官驗討論春官宗伯公常不第于春官我趙云此却是方言試文章所謂集賢學士如堵墻觀落筆中書堂時也舊注所言又非是蓋有詞感帝王尊己言召試之文子却接言初赴舉時乎公于進封西嶽賦表云幸得奏賦待制于集賢委學官試文章則出題目者宰相而審驗之者禮部矣三公謂之卿老又謂之元老天老蓋天子之老也而黃帝之臣有天老焉倚風遺鷁路左傳六鶂退飛過宋都風也公自言不第若鷁之遇風遺路耳隨水到龍門三秦記龍門魚登者化為龍公不第故曰到也竟與蛟螭雜寧一作空無燕雀喧言不能自致霄漢故雜蛟螭也燕雀喻小人也青冥猶契濶陵厲不飛翻趙云此六句蓋公以文彩動人主矣意其遂騰踏進用止授河西尉不行改右尉率府兵曹而巳此公所以嘆也與上韋左丞古詩云主上頃見徵欻然欲求伸青冥却垂翅蹭蹬無縱鱗同意而舊注乃以自言其不第其誤以春官為赴舉時故爾倚風遺鷁路言倚賴風而往矣反遭回風而遺失其所往之程路此乃曲折之句也龍門在河中府其水湍險魚登者化為龍隨水到則隨水到之而已不能過也到龍門而不過則猶雜蛟螭遺鷁路而不進則不免羣燕雀而愛其喧也寧無作空無非也青冥雲也祖出楚詞而任彥升為王儉文集序朂以丹霄之價𢎞以青冥之期詩死生契濶凌厲者頸上跨越之義劉歆遂初賦曰登句注以凌厲而嵇叔夜承之云凌厲中原飛翻則王粲詩曰茍非鴻雕孰能飛翻儒術誠難起家聲庶已存見炬赫舊家聲注故山多藥物勝槩憶桃源見欲問桃花宿注乃趙云儒術誠難起儒冠多誤身之意故山則襄陽也甫本襄陽人徙河南鞏縣其在長安則居于杜陵今在長安作詩而思故山乃言襄陽矣桃源在今鼎州襄陽之于鼎雖隔江而頗近蓋以地志考之自襄州至鼎界總無三百耳耳荀子儒術行則天下富司馬司馬曰李陵頽其家聲欲整還鄉斾長懷禁掖垣劉楨詩誰謂相去逺隔此西掖垣謬稱三賦在難述二公恩甫獻三大禮賦出身二公常稱述懷趙云整斾字如劉公幹整駕之整長懷則崔于二學士也蓋集賢院在禁中矣故武衛將軍挽歌三首嚴警當寒夜前軍落大星晉陽春秋曰有星赤而芒角自東北西南流投于諸葛亮營三投再還往大還小而亮薨警趙云軍事以嚴終軍中謂之嚴壯夫思感決哀詔惜精靈趙云感決疑是敢決蓋思其敢決邁往之氣也或是感決欲隨之以死王者今無戰鍾士季檄蜀文王者之師有征無戰書生巳勒銘班孟堅為竇憲作勒燕然山銘趙云無戰勒銘言已收將軍之功而享此矣不得蒙寵加秩而死封侯意疏濶編簡為誰青李廣不封侯餘見青簡為誰編注于趙云謂朝廷封侯之意已疏濶矣則將軍無傳以書信史雖有編簡為誰而青乎古者以竹簡寫書几欲書則先殺其青故謂之青簡右一舞劍過人絶高祖紀項莊請以劍舞因擊沛公鳴弓射獸能曹子建詩攬弓捷鳴鏑驅上彼南山左挽因右發一縱兩禽連銛鋒行愜順猛噬失蹻騰赤羽千夫膳黃河十月氷趙公銛鋒言舞劍之絶也猛噬言射獸之能也蹻本音巨虐切而在唐韻又音巨嬌切注云驕也家語赤羽若日白羽若月千夫膳言所膳者千兵也橫行沙漠外所向無前也神速至今稱岑彭兵至蜀公孫述以杖擊地曰是何神也趙云前漢季布傳樊噲願得十萬橫行胸奴中公詩意武衛將軍止止提赤羽之千兵渡十月之氷河能橫行而神速矣兵機以速為神右二哀挽青門去新阡綘水遙哀挽哀歌也漢書霸城門民間所謂青門也趙云邵平種瓜青門外其門在東河以知之蕭何傳云平種瓜長安城東也武衛將軍蓋綘州人其柩歸綘則由城東而去矣綘水出絳山智伯曰絳水可以浸安邑是已路人分雨泣諸葛亮亡人皆野泣天意颯風飄杜補遺曹子建作王仲宣誄曰延首歎息雨泣交頸注雨泣言泣下如雨趙云杜田所引是然曹子建本用説苑所云鮑叔死管仲舉上袵而哭之泣下如雨部曲精仍鋭見二十七卷部曲異平生注胸奴氣不驕無由覩雄略大樹日蕭蕭見十八卷更識將軍樹注右三九日藍田崔氏莊老去悲秋強自寬宋玉曰悲哉秋之為氣也興來今日盡君歡趙云列子載孔子歎榮啓期曰善乎能自寬者也宋鮑照詩云酌酒小自寬王維詩亦云酌酒與君君自寬也羞將短髮還吹帽孟嘉九日為風落帽笑倩傍人為正冠趙云借用李下不正冠也藍水逺從千澗落三秦記日藍田有州方三十里其水北流出玉銅鐡石玉山高並兩峯寒前漢地理志藍田山出美玉灞趙云藍水玉山乃藍田之山水秀之水經水古滋水也亦名藍谷水有白馬谷水勾牛谷水圍谷水輞谷水傾谷水蓼子澗水等合入之故曰逺從千澗藍藍田山出玉亦名玉山述征記曰山形如覆車之象故又名覆車山明年此會知誰健醉把茱萸子細看健一作在醉一作再崔氏東山草堂愛汝玉山草堂靜高秋爽氣相鮮新有時自發鍾磬響落日更見漁樵人盤剝白鴉谷口粟飯煮青泥坊底芹白鴉谷青泥坊皆地名何為西莊王給事柴門空閉鎖松筠王維時被張通儒禁在山東北寺有所歎息故云泥趙云考藍田地理魏置青泥軍于栁城內俗謂之青城此所謂青泥坊也志雖不載白鴉谷應是相近地名落句及王摩詰者蓋輞谷在藍田縣謂之西莊則在雀氏草堂之西也唐書鄭虔傳安祿山反遣通儒劫百官置東都都云云後賊平與張通儒王維並囚宣陽里而王維傳止云賊皆下下獄則今公詩注所謂禁在山東北寺者初劫置時也至囚宣陽里者下獄時也此詩追言天寶十四載十二月安祿山陷東京事對雪戰哭一作國多新鬼見新鬼煩寃舊鬼哭注趙云借左氏新鬼大也愁吟獨老翁亂雲低薄暮急雪舞回風洛神賦若流風之舞回雪楚趙云爾雅回風謂之飄而辭有悲回風之篇瓢棄樽無緑爐存似火紅趙云酒謂之醽醁亦曰緑酒故沈休文云憂來命緑樽數州消息斷愁坐正書空時方亂雜故數州斷消息也趙云前歲十一月安祿山反首陷河北諸郡今歲十二月又陷東京此之謂也殷浩書空作咄咄怪事四字也月夜今夜鄜州月閨中只獨看時祿山之亂公奔走走難家寄鄜州趙云天寶十五載夏五月挺身越朝廷獨轉陷賊中而懷鄜州耳遙憐小兒女未解憶長安趙云蓋言兒女在鄜州不能念長安之如何與公之在賊中消息也此暗使晉明帝事帝幼而聰哲為元帝所寵異年數嵗嘗坐置膝前屬長安使來因問帝曰汝謂日與長安孰逺對曰長安近不聞人從日邊來居然可知也元帝異之明日宴羣僚又問之對曰日近元帝失色曰何乃問間者之言乎對曰舉目則見日不見長安今公于月夜詩而使日事之意以寓其兒女不解憶長安可不謂之竒乎又以小兒女對憶長安非老手莫能也香霧雲鬟濕清輝玉臂寒師云樂府詞小兒雲鬟側王獻之詩玉臂薄香殘趙雲兩句或閨中獨看之語香霧所浥則雲鬟濕以其上承之故也清輝所照則王臂寒蓋必倚闌慿軒而看故也何時倚虛幌雙照淚痕乾乾云江文通擬王徽詩練藥矚虛幌雙照字以言月照其夫婦相會之時也或者謂止是言兩目之淚既得還家則不復有淚故月照其雙乾耳夫淚言雙固是常語公詩有云封書兩行淚又云亂後故人雙别淚又云故慿錦水將雙淚寂寂繫舟雙下淚此則皆言兩目之淚而今詩句法乃云雙照淚痕則主言照二人淚痕乾矣遣興驥子好男兒驥子宗武公之子也見宗武生日詩注前年學語時問知人客姓誦得老夫詩公自謂也左傳老夫耄矣世亂憐渠小家貧仰母慈嵇叔夜母兄鞠育有慈無威鹿門攜不遂龎德公擕妻子入鹿門山隱公襄陽人故云鴈足繫難期蘇武傳鴈足繫書一云鹿門携有處鳥道去無期趙云此蓋公獨轉陷賊中而書信不通矣若用一云鹿門携有處鳥道去無期之句對鳥道則公尚未脫身歸鄜州也鳥道言其嶮窄離長安而趨鄜乃由鳥道矣天地軍麾滿山河戰角悲儻歸免相失見日一作爾敢辭遲元日寄韋氏妹趙云此至德二載之元日時公四十六年春猶在賊近聞韋氏妹迎在漢鍾離濠州鍾離縣郎伯殊方鎮京華舊國移趙云鍾離在漢乃九江郡之縣也在唐為濠州郎伯殊方鎮言作牧于鍾離也京華舊國言長安也移則以祿山之亂而奔移也莊子云殊方偏國又云舊國舊都望之暢然春城回北斗郢樹發南枝見宿鳥戀本枝注不見朝正使啼痕滿面垂趙云長安城如斗故曰北斗城而九江郡古屬揚州為楚地也方春回于北斗城之時乃樹木發南枝于郢地之日以紀元日且見公在長安而妹在鍾離也越鳥巢南枝非專指梅蓋魁仙詠紅梅詩云南枝向暖北枝寒自是近事耳吳邁逺樂府詩云春城起風色郢者楚郢之郢不見朝正使以重紀亂離四方之使隔絶也春望國破山河在劉越石云家國破亡親友凋殘城春草木深感時花濺淚恨别鳥驚心司馬溫公曰牂羊墳首三星在罾言不可久古人為詩貴于意在言外使人思而得之故言之者無罪聞之者足以戒也近世詩人惟杜子美最得詩人之體如此詩句言山河在明無餘物矣草木深明無人矣花鳥平時可娛之物見之而泣聞之而悲則時可知矣趙云謝靈運有感時賦或者謂花名感時花鳥名恨所鳥不亦穿鑿乎烽火連三月家書抵萬金趙云考此詩作于天寶十五載之正月蓋祿山反于十四載之十一月至是則烽火連三月惟其烽火連三月所以家書抵萬金此詩人之語為有法也今學者每見家書遂以此句為辭非也白頭搔更短渾欲不勝簮趙云公時四十五歲故得以白頭為言如鮑照行路難云白髮零落不勝冠憶幼子字驥子時隔絶在鄜州驥子春猶隔鶯歌暖正繁趙云鶯歌應以其能歌俚詩遂名之曰鶯歌也别離驚節換聰惠與誰論趙云公凡言此三如世事與誰論妙絶與誰論澗水空山道柴門老樹村趙云指言鄜州寄家之地公押村字有愚公野谷村月挂客愁村與此老樹村皆匠立村名之語憶渠愁只睡炙背俯晴軒炙背者負暄之義也一百五日夜對月無家對寒食世説寒食去冬至一百五日有淚如金波漢樂志月穆穆以金波趙云史記馮歡彈劍鋏而歌曰長鋏歸來兮胡為乎無家如載記慕客熙傳使有司按驗哭者有淚以為忠孝無則罪之時公寄家鄜州而身陷賊中此所以嘆其無家金波月也斫却月中桂清光應更多言月之清光為桂所掩也極杜補遺世説或謂徐孺子曰若令月中無物當明耳與此同意趙云上句暗使吳剛事語意又暗使徐孺子之意酉陽雜爼載傳云月桂高五百丈有一人常斫之姓吳名剛學仙道有過謫令代樹隨創隨合雖是杜公之後段成式所撰而傳者舊矣徐孺子年九歲嘗月下戲人語以月中無物當極明徐曰不然譬如人眼中有瞳子無此必不明或明此句以興姦邪蔽人主之時當時楊國忠已死明皇左右别無姦邪而杜鴻漸崔冕之徒乃至勸太子即位尊為太上皇則姦邪者其崔杜之謂乎雖未必然而無害于義仳離放紅蘂想像嚬青蛾謝靈運詩想像崑山姿趙云中谷有蓷篇有女仳離仳亦離也音匹婢切言夫婦之失道而離公因其夫婦離隔遂借用耳謝惠連謝謂謝靈運亦曰哲兄感仳别相送越林垌屈原逺遊賦思故舊以想像紅蘂言寒食時花也簡文帝列燈賦云競紅蘂之晨舒今公詩作于無家之際言女方值仳離而花發則亦愁寂而巳可想見其嚬也舊作青蛾當為青蛾翠眉之謂也公詩有云青蛾皓齒在樓船宋南平王白紵舞曲曰佳人舉袖曜青蛾李賀夜坐吟有云鉛革笑妾顰青蛾却使杜公字也牛女漫愁思秋期猶渡河趙云公因月夜所感故起二星相聚之興言二星離而終聚其在我未知其何如耳漫則以不必愁思蓋猶有渡河之期事出齊諧記日桂陽城武丁者有仙道常在人間忽謂其弟曰七月七日織女渡河諸仙悉還宫吾向已被召不得停與爾别矣弟問織女何事渡河兄何當還答曰織女暫詣牽牛吾去後年三千年當還耳明日失武丁所在詩將子無怒秋以為期大雲寺贊公房二首本四首二首在前卷心在水精域清淨境土也衣霑春雨時趙云江總大莊嚴寺碑云俯看驚電影徹琉璃之道遙拖宛虹光遍水精之域蓋佛宇莊嚴皆以金寶故也下句言一心所在初欲往之時乃當春雨雷衣之際洞門盡徐步深院果幽期謝靈運平生協幽期盡趙云上句敘所趨詣其徐步也董賢傳重殿洞同注門門相當也言賢僣天子之制公後有題省中院壁詩云洞門對雪常隂隂則言其幽邃耳徐步如曹植云動霜縠以徐步到扉開復閉撞鍾齊及兹趙云此書實事也齊讀從齋古用此字周禮王齊日三舉醍醐長發性釋經云聞正法如食醍醐然飲食過扶衰杜補遺陶隱居云佛經稱乳成酪酪成酥酥成醍醐醍醐乃酥酪之精液也世説載張世錫之言日桑椹甘香鴟雞革響淳酪養性人無妬心則醍醐之發性抑可知矣此釋經所以喻正法也蓋有醍醐之味能開發真性過分得此飲食以扶襄也把臂有多日絶交論把臂之英開懷無愧辭趙云開懷如云茍莫開懷左氏祝史愧辭辭黃鶯度結構見新亭結構罷注紫鴿下芳菲趙云靈光賦云觀其結構而左太沖招隱詩有嵓冗無結構楚辭云佩江離之芳菲愚意會所適花邊行自遲湯休起我病微笑索題詩沙門惠休姓湯氏善屬文世趙云湯休與鮑照同時善詩文以比贊公新添尊舉花伽葉微笑見傳燈録右一細軟青絲履光明白㲲巾深藏供老宿取用及吾身杜補遺南史髙昌國多草木有草實如繭中絲如細纑名為白㲲國人取織以為布仇池翁贈清涼和尚云會須一洗黃茆瘴未用深藏自㲲巾蓋使子美故事以白㲲布為巾也老宿僧之年老而有宿德者以供老宿之物而奉吾身言其敬也情趙云所以言贊公待之厚乃交之不贊也自顧轉無趣交情何尚新道林才不世晉桑門支遁字道林有才辨惠逺德過人廬山逺大師有夙德前漢鄭當時傳一死一生乃知交情雨㵼暮簷竹風吹青一作春井芹天隂對圖畫最覺潤龍鱗趙云青井當作春井蓋言春時之水井耳末句則必挂畫龍圖矣公詩元四篇其二在古詩三川觀水漲之下蓋作於至德二載之春何以知之古詩有春院此詩有春雨春井芹則可知其為春三川觀水漲公自注云天寶十五年七月中避冦時作是年是月肅宗即位改元至德可以知次年之春為至德二載也右二喜聞官軍巳臨賊寇二十韻胡虜潛京縣趙云至德二載子儀以朔方兵敗安慶緒于澧水復京師慶緒奔于陜郡此之謂潛京縣京師之縣也鮑明逺云河陽視京縣官軍擁賊濠城濠也鼎魚猶假息後漢方術謝夷吾傳遊魂假息也穴蟻欲何逃鼎魚穴蟻言雖假息終不能逃死也杜補遺南史邱遲與陳伯之書云酋豪猜二部落攜離方當繫頭蠻邸懸首藁街而將軍魚遊沸鼎之中燕巢飛幕之上不亦惑乎悉趙云蟻穴事異苑日桓謙太元中忽有人皆長寸餘被鎧持槊乘具裝馬從塪中出緣機登竈尋飲食之所或有輒肉輒來叢聚力所能勝者以槊刺取徑入穴蔣山道士令以沸湯澆所入處寂不復出因掘之有斛許大蟻死在穴中帳殿羅玄冕以帳為殿羅玄冕言君臣聚謀轅門照白袍周禮以車轅為門照白袍士皆思用命不止于營內也趙云帳殿者行在之所以帳為殿也庾肩吾曲水聨句日回川入帳殿列俎間芳洲梁孝綽曲水宴詩曰帳殿臨春渠羅玄冕言羣臣侍也周禮辨師掌王之五冕皆玄冕朱裏雖王者之制而三禮圗載應劭溪官儀以為卿大夫玄冕曹子建責躬詩曰冠我玄冕陸士衡詩云玄冕無醜士則公侯之服羅者不一其人也如鮑明逺扶宫羅將相之羅轅門出周禮雖亦王者之制而將亦有之見項羽傳白袍則以朝廷之兵如梁陳慶之所統之兵梁與魏戰慶之麾下悉著白袍所向披靡先是洛中謠曰名軍大將莫自牢千兵萬馬避白袍言白袍之可畏也公詩又曰未使吳兵著白袍亦同此矣秦山當警蹕主出入警蹕漢苑入旌旄言內地漸復也趙云上句言肅宗在鳯翔也警蹕出前漢出稱警入稱蹕止行人也旌旄者析羽為之九旗之一也旄則幢也詩孑孑干旌孑孑干旄言兵往長安為入漢苑矣漢苑者上林苑也路失一云濕羊腸險羊腸坂也在太行天下之險也光武贊金湯失險雲橫雉尾髙崔豹古今注髙宗有雉雊服章多用翟羽故有雉尾扇趙云安慶緒弒父之年二月李光弼敗其衆于太原郡隋煬帝嘗問崔績羊腸坂賾對有兩處一在上黨壺關一在太原北九十里則今杜公所謂羊腸者指太原也失險者無復有其險也彼既失太原羊腸之險而我勝矣雲橫則天子所在雲橫其上如黃帝與蚩尤戰于涿鹿之野常有雲氣止于帝上雉尾髙舊注所引是羊腸却引太行非五原空壁壘五丈原地名近長安時賊退敗故壁壘空八水散風濤關內八水一涇二渭三滻四灞五澤六浩七澧八潏散風濤言寇亂漸平趙云上句言賊退而壘空也壁壘字出選考長安志長安萬年二縣之外有畢原白鹿原少陵原髙陽原細柳原正得原之名者恰有五若樂遊原則日樂陽廟而亦曰原耳然則五原者殆指正名之五原乎公古詩中崆洞五原亦無事亦此五原舊注便作五丈原非是惟其收復長安故得言五原八水散風濤則言風波止息之意顔延年詩春江壯風濤今日看天意遊魂貸爾曹左傳今日之事我為政晉元帝云石勒逋誅遊魂縱逸亦祖易之遊魂為變也乞降那更得尚詐莫徒勞趙云賊窘則乞降黠則尚詐今安賊既為官軍所臨欲望如是不可也巳上言賊被臨之狀巳下鋪敘所臨之人元帥歸龍種司空握豹韜時代宗為元帥故曰龍種豹韜兵書也太公六韜有豹韜第五篇鮑云元帥謂廣平王也司空謂郭子儀也帥趙云時至德二載七月以廣平王俶為天下兵馬元往收長安後更名豫是為代宗也司空郭子儀副之故有此句天子之子孫謂之龍種如隋文帝子勇勇子儼雲昭訓所生乃云定興女帝帝嘗曰皇太孫何謂生不得其地定興奏曰天生龍種所以因雲而出前軍一作旌蘇武節蘇武至海上仗漢節而毛盡落言前軍皆守節之士左將吕虔刀晉書吕虔為刺史有佩刀相者曰三公可佩虔乃贈别駕王祥曰苟非其人刀或為害以卿有公輔之量故相與也言左將皆輔相之才趙云又似言李嗣業史載嗣業善用陌刀髙仙芝討勃律時嘗署嗣業為左陌刀將故得稱左將李歸仁之師果因嗣業以長刀突出斬賊則公詩雖作于聞官軍臨冠之時而嗣業善刀之名巳著故得用吕虔刀也兵氣回飛鳥羽獵賊鳥不及飛獸不得過言其疾也威聲沒巨鼇威聲雄重王杜補遺北史鼓城協征征沔北除中軍大將開府于是親勒大衆須臾有二大鳥從南來一向行宫一向幕府各為人所獲協言于帝曰始有一鳥望旗顛什臣謂大吉帝戲之曰鳥之畏威豈獨中軍之略也吾亦分其一耳飛鳥避轅門兵氣回飛鳥豈畏威而然乎其事類此威趙云舊注非是杜時可補遺所引又穿鑿蓋公用對聲沒巨鼇本亦無出處必取巨鼇者何以巨鼇屭贔之物威聲所加乃至沒之此狂賊懾服之意若用回鳥畏威之儀又犯此句況既云鳥一向行宫一向幕府乃是來集與回義相反戈鋋開雪色東郊賊戈鋋彗雲注矛矟也鋋音時連切弓矢向秋毫言雖微必中也睹趙云戈鋋爾物列子目將眇者先秋毫弓矢向之言能中微也天步艱方盡詩天步艱難時和運更遭趙云所謂時和嵗豐文選有云時之未遭又遭遇嘉運則時與運之下可押遭字韻矣誰云遺毒螫西京賦蕩亡秦之毒螫四子講德論曰秦之時處位任政者並施毒螫説文螫行毒也巳是沃腥臊如以湯沃去腥臊也漢書蠻夷腥臊之趙云螫音施隻切腥臊字則國語舅犯對晉侯曰偃肉腥臊將焉用之而衡鸚鵡賦忖陋體之腥臊毒螫腥臊皆以蟲鳥眇之耳睿想丹墀近言將收復復坐朝也丹墀以丹漆塗之神行羽衛牢趙云蓋言車駕有可還之勢書云思曰睿睿作聖睿想天子之念慮也丹墀者天子之殿上以丹塗其墀神行天子之行也羽衛葆羽之衛牢則安而無警矣花門騰絶漢燕山銘經磧鹵絶大漢拓羯渡臨洮臨洮郡名大趙云時用朔方安西回紇南奕食之兵今言花門曰紇是也拓羯安西是也臨洮即洮州謂之臨洮郡騰絶漠渡臨洮言其喜來助順也此輩感恩至羸俘何至操言回紇感恩而助順其勇鋭所向無前也趙云至勝賊時果得回紇以奇兵繚賊背夾攻之晉書此輩當束之髙閣羸俘尫羸之俘也操者執俘之謂鋒先衣染血太宗平劉武周躬臨矢石血衊兩袖騎突劍吹毛吹毛言其利也古有吹毛之劍師云曹植曰如劍首之吹一毛亦何足恃武趙云此對為最工先鋒突騎皆倒使衣染血南史梁帝謂張稷有衣染天血之語佛書如吹毛劍喜覺都城動悲連子女號家家賣叉釧只待獻春醪董卓傳吕布殺卓馳齎赦書以令宫殿內外士卒皆稱萬嵗百姓歌舞于道長安中士女賣其珠玉衣裝市酒肉相慶者填滿街肆月趙云蓋舉皆望京師收復其喜如此九癸邱果復京師也喜達行在所三首更始立光武為蕭王悉令罷兵詣行在所蔡雍獨斷曰天子以四海為家謂所居為行在所時子美自京竄至鳯翔西憶岐陽信岐陽在鳯翔西左傳成王有岐陽之搜無人遂却回眼穿當落日心死著寒灰庚桑楚曰心若死灰别賦骨肉悲而心死趙云岐陽乃鳯翔也名巳見於周左傳成王有岐陽之搜是也公在賊中引首西望欲知鳯翔行在消息無人遂却自鳯翔回得以問之也惟其無人可問則徒眼穿心死而巳莊子哀莫大于心死霧樹行相引霧一作茂蓮峰望或開華山有蓮華峰一作連山所親驚老瘦辛苦賊中來奔走憔悴故所親驚其老瘦漢書師古曰所親素所親任也非趙云茂樹連山言自出長安眼中之所見一作蓮峰也蓋蓮峰乃華山蓮花峰也豈有却倒過長安之東經同華之境而來乎當以茂樹連山字為正也鮑照詩連山眇雲霧前漢張良傳所封皆蕭曹故人所親愛師古注云云雖不指言親戚而公之意則言親戚也其二愁思胡笳夕言陷賊久厭胡笳也李陵書曰胡笳互動物馬悲鳴蔡琰詩胡笳動兮邊馬鳴淒涼漢苑春漢儀注養鳥獸者通名為苑雖春而淒涼言殘敝也生還今日事後漢班超妹同郡曹夀妻昭上書請超日丐超餘年一得生還復見闕庭間道暫時人間道伺間隙之道而行班超從間道到疏勒懷趙云藺相如使其從者自秦間道璧以歸趙司𨽻章初覩更始以光武行司𨽻校尉入落陽人司司𨽻僚屬皆觀喜不自勝老吏或垂泣日不圖今日復見漢官威儀由是識者皆屬心焉南陽氣已新後漢光武紀日望氣者蘇伯阿為王莽使至南陽遙望見舂陵郭唶日氣佳哉鬱鬱蔥蔥也杜補遺謝玄暉始出尚書省詩既通金閨籍復酌瓊筵醴還覩司𨽻章復見東都禮趙云庾信哀江南賦曰反舊章于司𨽻喜心翻倒極嗚咽淚沾巾趙云張平子四愁詩曰側身北望涕沾巾也公使沾巾字屢矣其三死去慿誰報歸來始自憐楚辭私自憐兮何極猶瞻太白雪喜遇武功天太白山也武功縣名屬鳯翔之杜補遺録異記曰金星之精墜于終南圭峯西因號為太白其精化為白石狀如美玉常有紫氣覆之玄宗立玄元廟于太寧里臨淄舊邸取其石琢為像焉餘見送韋十六評事受詞大白腳不趙云太白山在郿縣郿則鳯翔之屬縣也武功在唐屬鳯翔但近耳公詩兩句所以顯行歸行在也于太白言雪則太白之雪冬夏不消必曰武功天者古語有之武功太白去天三百言最高處也亦以寓親近行在之意乎布增添地圖記太白山甚高上常積雪半山有雲如瀑則澍雨人常侯驗如離畢焉故語曰南山瀑布不朝則暮影靜千官裏心蘇七校前公入朝鮮當途之交故言影靜心蘇言憂釋而心蘇也前漢刑法志京師有南北軍屯武帝內增七校注中壘屯騎步兵越騎長水胡騎射聲虎賁凡八校尉胡騎不常置故此言七也今朝漢社稷新數中興年凡王室中否而再興謂之中興如周興漢光武是巳時唐有安史之亂故云趙云中興于漢書中音去聲今公詩律平側不差所以見去聲明矣得家書去慿遊客寄一云休汝騎來為附家書今日知消息他鄉且舊居趙云一云休汝騎非言出遊彼處客寄之人去時馮仗之日來則為我附家書也且舊居指言寄家在鄜已是他鄉但恐亂離更有遷徙故知消息而喜雲耳熊兒幸無恙後漢蘇竟傳云君執事無恙爾雅曰恙憂也公孫𢎞傳何恙不已驥子最憐渠驥子公之子宗武也臨老羇孤極謂流離孤苦也傷時會合疏以時無交舊也二毛趨帳殿二毛言鬢毛二色謂班白也帳殿謂行在所以帳為殿也左傳宋襄公日不禽二毛黃巢之屯八角帳幄皆象宫殿一命侍鸞輿公至行在授左拾遺毛趙云宗武小字驥子然則熊兒者豈宗文耶二字出左傳而潘安仁云始見二毛庾肩吾劉孝綽詩曽使帳殿字西都賦乘鸞輿備法駕此詩蓋至德二載七月所作按公是歲竄歸鳯翔授左拾遺故曰一命侍鸞輿也左傳云一命而傴北闕妖氛滿北闕帝闕也奴氛滿謂未收復也西郊白露初謂肅殺之威漸生也言趙云上句指言安慶緒方熾西郊指長安西郊也蓋賊兵之所在以白露初言之則是年七月明矣涼風新過鴈秋雨欲生魚農事空山裏眷言終荷鋤一云終篇言荷鋤陶淵明雜詩種豆南山下草盛豆苗稀晨興理荒穢帶下荷鋤歸鴈趙云上句又以紀秋新之新而起末句之興月令鴻來在八月而此云新過雁則按白露為近也公既遭亂無績乃欲歸耕而已一云終篇言荷鋤非是奉贈嚴八閣老鮑云嚴武也至德初房琯薦為給事中收長拜京兆兆尹稱閣老時為給事中扈聖登一云今日登黃閣扈扈從也宋忠日三公黃閣禮記鄭玄注云朱門洞啓當陽兆正色三公之與天子禮秩相亞故黃其閣黃師云唐郭承嘏為給事中文宗謂宰相曰承嘏久在扉是也趙云徐堅于三公事載沈約宋書云三公黃閣前史無義臣按禮記云士􅔖與天子同公侯大夫即異鄭玄注云云疑是漢末制也本朝揚侃撰職林作宋忠所云未知孰是明公獨妙年明公相尊美之稱也蔡文姫謂曹公日明公廄有萬焉妙年少年也蛟龍得雲雨吳志周瑜上疏孫權日劉備以梟雄之姿而有關羽張飛熊虎之將猥割土地以資業之恐蛟龍得雲雨終非池中池也雕鶚在秋天秋天鷙鳥擊摶之時也雕鶚在秋天得其時矣出趙云上句周瑜言劉備全語下句應有全客禮容疏放官曹可一作許接聨新詩句句好應任老夫傳趙云閣老尊矣惟其以客禮待公而容其疏放故雖為官曹而卑可接聨之應任老夫傳則欲傳則公之好詩句自非知音何以至此留别賈嚴二閣老兩院補闕得聞字嚴武賈至按新書公家寓鄜彌年難窶詔許公自往視者趙云唐新史楊綰傳故事舍人年久為閣老田園須暫往陶淵明歸去來田園將蕪胡不歸戎馬惜離羣老子戎馬生于郊禮記離羣索居去逺留詩别愁多任酒醺一秋常苦雨今日始無雲山路時一作晴吹角那堪處處聞處處聞言所在有兵也趙云舊本山路時吹角然既云處處聞當言晴吹角蓋言方山路之晴稍可喜矣却值吹角既吹角矣又處處聞不亦可為别愁乎晚行口號三川不可到時三川在賊境左傳周之亡也其三川震注涇渭洛水也歸路晚山稠落鴈浮寒水飢烏集戍樓戍樓防戍之樓也戍人欲望逺故作樓市朝今日異喪亂幾時休逺愧梁江總還家尚黑頭江總在陳掌東宫管記與太子為長夜飲後主即位授尚書令京城陷入隋為上開府復歸老江南趙云三川鄜州縣名地理志注云華池水黑水洛水所會舊注乃引周三川震却成説長安矣蓋國語云西周三川皆震注云西周鎬京也而三川則謂涇渭洛如此則舊注非漉州三川所以不可到者以山稠故也山稠而不可到者時當喪亂憂盜賊也公北征詩云坡陀望陀畤巖谷互出沒夜深經戰傷寒月照白骨則舊經殘破矣落鴈浮寒水與飛鴻滿野同意飢烏集成樓與楚幕有烏同意蓋言地經喪亂寂乎無人而然也江總得歸老江南故日逺愧也晉王珣為桓溫掾溫曰王掾當作黑頭公獨酌成詩燈花何太喜西京雜記云樊噲問陸賈日自古人君皆云受命于天有瑞應豈有之乎賈應之曰有之夫目瞤得酒食燈花得錢財乾鵲噪而行人至蜘蛛集而百事喜小既有徵大亦宜然酒緑正相親緑一作色醉裏從為客詩成覺有神如有神助也公嘗有詩云讀書破萬卷下筆如有神醉趙云今公得酒獨酌而用燈花事大抵取喜事而已裏從為客者任從為客而不辭也有神字多在詩言之則孔文舉言禰衡之能章章日思若有神公詩又篇篇什若有神而謝靈運亦云此語神助兵戈猶在眼儒術豈謀身共被微官縛低頭愧野人低頭言愧而不能仰視也云趙云前漢戾太子贊止息兵戈而廋信周齊王碑序夏官以兵戈為主專謀七德選詩薛蘿君子眼荀子云儒術行而天下富左傳有野人與之塊收京三首仙杖離丹極謂大駕出幸也妖星照玉除晉天文志妖星一日慧星二日孛星凡二十一星曹子建日凝霜依玉除説文日除殿階也西都賦曰玉除彤庭趙云西都賦玉階彤庭改階字為除誤矣須為下殿走世説螢惑入斗天子下殿走謂避亂也不可好樓居史記公孫卿日仙人好樓居于是上令長安作􅀢亷桂觀甘泉作延夀觀焉趙云好樓居出史記封禪書今公以仙人比天子也一作得非羣盜起難作九重居語白不取暫居汾陽駕莊子堯往見四子貌姑射之山汾水之陽釋音云案汾水出太原今莊生寓言也謝靈運從遊京口扎固詩昔聞汾水避今見塵外鑣聊飛燕將書史記魯仲連乃為書約之矢以射城中之燕燕將懼誅因保守聊城不敢歸齊田單攻聊城歲餘不下仲連乃為書約之矢以射城中遺燕將將見仲連乃自殺也趙云言京城不勞兵戰而駕可復止若魯仲連飛書而聊城也自下耳所以見收復之易依然七廟略更與萬方初天子七廟素趙云兵謀為之廟略蓋謀之于廟也言廟略定更與萬方一新更平聲蓋更始之義右一生意甘衰白天涯正寂寥忽聞哀痛詔又下聖明朝漢武帝末年下哀痛之詔羽翼懷商老漢高祖時戚夫人以寵將移動太子吕后用張良計召四皓入侍太子朝上指視戚夫人曰彼羽翼已成難動矣商老四皓隱于商山也文思憶帝堯堯典放勛欽命文思息詞反又如字帝趙云商老似言郭子儀副廣平王以成功也文思憶堯指言肅宗蓋公既被詔歸鄜州乃聞收京既懷郭公又憶主皆跂望之心也不以文害辭不以辭害意然後可解叨逢罪已日罪已詔也左傳臧文仲日禹湯罪已其興也勃焉霑灑一作灑涕望青霄趙云感而上天也右二汗馬妝宫闕漢蕭何傳未有汗馬之勞春城鏟賊壕趙云古樂府詩春城起風色收復京師在九月而公詩云春城鏟賊壕未詳豈自九月至正月而定乎蓋賊在京師不無殘破更易為之鏟則盡削平其迹之義也賞應歌杖杜詩杖杜勞還役也歸及薦櫻桃歸一則福禮月令仲夏之月羞以含桃先薦寢廟即櫻桃今之所謂朱桃者是也前漢叔孫通傳古者有春嘗果方今櫻桃熟可獻願陛下出因取櫻桃獻宗廟上許之諸果獻由此興也雜虜橫戈數功臣甲第高武帝為霍去病治第宅也甲第猶言甲乙之次第謂第一之第也田蚡治宅甲諸第趙云戰國第衛行人燭過免胄橫戈而進萬方頻送喜無乃聖躬勞班超傳西域平定薦勳祖廟布大喜于天下言聖躬受喜報之頻而勞也右三月天上秋期近人間月影清入河蟾不沒庾肩吾望月詩渡河光不濕搗藥兔長生傅玄擬天問日月中何有白兔搗藥玉經曰月中有兔與蟾何也月隂也蟾陽也而與兔並明隂係陽也獸薛云按後漢張衡靈憲序曰月者隂宗之精積而成象兔隂之類其數偶其後有憑焉羿請無罪之藥于西王母姮娥竊之以奔月是為蟾蜍趙云公于河係之以蟾居水之物古詩有云採取神藥高山端白兔搗蝦蟇丸而李白亦云白兔搗藥秋復春只益丹心苦能添白髮明干戈知滿道休照國西營時官軍營于國西休照為征夫見月而有感也趙云蓋是年閏八月方以廣平王為元帥收復長安則閏八月前已長安以西不能無兵屯處矣哭長孫侍御道為詩書重名因賦頌雄子雲賦頌名重漢朝禮闈曽擢桂禮闈禮部所設以取士也卻喜對武帝曰臣舉賢良對䇿為天下第猶林林林一枝憲府舊乘驄御史所居之署漢謂之御史府亦謂之憲臺唐龍朔中改司經局為桂坊署為東宫之憲府後漢桓典拜侍御史執法無所回避常乘驄馬京師畏憚為之語曰行行且止避驄馬御史流水生涯盡浮雲世事空趙云子在川上曰逝者如斯夫不捨晝夜浮雲易散之物孔子嘗以比不義之富貴今以世事比之所以悼之也唯餘舊臺柏蕭瑟九原中時御史府中列柏樹檀弓獻文子曰從先大夫于九京也注晉卿大夫之墓地在九原原作京字也千趙云漢朱博為御史大夫其府列柏樹常有野鳥數栖宿其上晨去暮來號曰朝夕鳥檀弓趙文子與叔舉觀乎九原注雖云晉地之名而用于葬處皆可矣故沈休文云誰當九原上鬱鬱望佳城也今詩句云往日御史府所列之柏樹今則在墓地種之而蕭也也新添潘嶽述哀殯宫已肅青松柏轉蕭瑟奉送郭中丞兼太僕卿充隴右節度使三十韻英乂詔發西山將辛慶忌贊日秦漢以來山東出相山西出將秋屯隴右兵唐書郭英乂傳英乂知運之季子至德初肅宗興師朔野英乂以將門子特見任用遷隴右節度使趙云英乂先為秦州都督乃加隴右節度使故云西山正言秦州不干山西出將事舊注非是淒涼餘部曲燀一作烜赫舊家聲謂知運先朝亦為隴右節度使也宋鮑照東武吟將軍既下世部曲亦恐存漢光武紀注大將軍營有五部部有三校尉部下有曲曲有軍侯一人李廣行無部曲行伍司馬子長部任少卿書曰李陵既生降頽其家聲督趙云餘部曲餘秦州部曲也祿山亂英乂拜秦州都隴右採訪使知運在先朝先為隴右節度使屯西方戎夷畏憚故言舊家聲燀音充善切史記威燀音達雕鶚乘時去見雕鶚在秋天住驊騮顧主鳴艱難須上䇿容易即前程言其䇿略足以自取富貴無難也卓趙云雕鶚驊騮所以美英乂也公多以此譬人材之傑今此言乘時顧主則又勸之以趨功名之會而不忘君也故又有下句當艱難須上䇿之際更無難色而容以往之焉詩天步艱難史周得上䇿東方朔云談何容易前程字出選斜日當軒蓋高一作歸風卷斾旌趙云言行色也梁簡文帝雨詩曰儻令斜日照併欲似浮絲又梁任昉苦熱詩斜日照西垣説范翟璜謂田子方曰吾祿厚得此軒蓋而范彥龍貽張徐州詩曰軒蓋照墟落詩云悠悠斾旌兩句之勢蓋用夏侯湛褉賦微雲承軒清風卷旌松悲天水冷天水郡漢武元鼎三年置秦州地記云郡前湖水冬夏無增涸因以名焉沙亂雪山清後漢明帝紀祈連山名即天山也一名雪山在伊州北趙云秦州有天水縣又謂之天水郡樂史寰宇記天水縣有井四時湛然昔人避難于比敵人欲漏其水左右穿鑿不得水脈故云天水松悲言英乂去而松為之悲沙亂似言人馬踐踏有亂之理和虜猶懷惠和和好也惠恩惠也防邊不敢驚趙云和虜指言吐蕃也至德二載使使來請討賊且修好既而侵廓岷霸等州又請和也語小人懷惠古來於異域鎮靜示專征專征謂受命鉞之賜得專征討侵趙云言待之以靜不時撓之以以有必征其叛之理已上敘英乂行色至隴右者如此燕薊奔封豕薊縣燕之所都前志云秦舉兵減燕薊左傳昭王在隨甲包胥如秦乞師曰吳為封豕長蛇薦食上國言吳貪害如蛇豕封大也豕之性善突故取以喻祿山周秦觸駭驚史祿山之亂賊將高嵩擁兵入汧隴英乂偽勞之既而伏兵發盡虜其衆駭鯨言若鯨魚之駭難禦也陳琳檄云若駭鯨觸細網趙云天寶十四載十一月祿山反于幽州陷河北十二月陷東京十五載六月陷京師此所謂奔突幽州薊而觸周秦也中原何慘黷餘孽尚縱橫文選上慘下黷注慘不登貌衰江南賦茫茫慘黷殘孽餘冠也尚趙云祿山既弒慶緒復為冠此所謂縱橫也選云駱驛縱橫箭入昭陽殿檄書箭也笳吟細栁營笳者胡人卷蘆葉吹之以作樂也故曰胡笳張博望入西域傳其法于西京李延平更造新聲二十八解以為武樂有出塞入塞抑揚等十曲新枊營周亞夫軍營也趙云此一假陷京師時事昭陽殿漢成帝趙皇帝所居而箭入言禍亂及于官中也細栁營周亞夫所營在長安言胡人之笳乃在漢營也內人紅袖泣王子白衣行趙云言雖是王子以避亂之故隱迹為白衣而行宸極妖星動妖星見本卷收京注劉越石表宸極失御園陵一作林殺氣平趙云宸極者紫微之宮也妖星見晉天文志殺氣與園陵平也空餘金碗一作碗出光武紀赤眉焚西京宫室發掘園林金碗出見早時金碗出人間注無復繐帷輕魏武帝遺令吾媫妤數人著于銅雀臺堂上施六尺床張繐帷謝玄暉詩繐帳飄井幹此言賊凌暴園陵也趙云金碗寢廟及園陵中物公詩又曰早時金碗出人間漢武崩後有特金碗賣于市之事繐悵繐帳皆靈帳之稱毁廟天飛雨焚宫火徹明項羽入咸陽殺奉降王子嬰燒其宫室火三月不滅罘罳朝共落棆桷夜同傾言賊毁宗廟及宫室漢書注師古曰罘罳謂連闕曲閣也以覆重刻垣墉之處其形罘罳一曰屏也東觀元夀二年盜賊並起燔燒茂陵都邑火見未央宫薛云又按詩方斫是虔注椹謂之虔升景山棆林取松柏易直者斫而虔之之正于椹上以為桷也趙云罘罳祖出漢文帝紀七年六月未央東闕罘罳災如淳日東闕與其兩旁罘罳皆災也罘音浮棆桷字未見全出字書棆止云木名也豈桷以棆木為之邪雖師民瞻善本亦作棆桷薛蒼舒引詩陟彼景山注以為棆桷乃掄擇之掄其説迃謬棆桷二字甚可疑若以為欀桷則夜徹明之火無所不聞吹之傾則欀桷又非止傾而已以俟博聞青箱雜記云漢書文帝紀云罘罳災崔豹古今注云罘罳屏也罘者復也罳者思也臣朝君至屏外復思所奏之事于其下顔師古注云云又禮記云疏屏天子廟飾也鄭注云屏謂之樹今今浮思也刻之為雲氣蟲獸如今闕上為之矣余按唐蘇鶚演義稱罘罳織絲為之輕疏浮虛象羅網交文之狀蓋宫殿簷户之間也乃引文宗實録云太和中甘露之禍羣臣奉上出殿北門裂斷罘罳而去又杜甫天寶末詩云罘罳朝共落棆桷夜杖傾又非溫庭筠補陳武帝與王僧辨書云罘罳晝卷閭闔晨開為證皆非曲閣屏障之意反以崔豹顔師古之徒為大誤又案段成式酉陽雜爼稱士林間多呼殿榱桷護雀網為罘罳其淺誤如此乃引張揖廣雅曰復思謂之屏又王莾性好時日小數遣使壞渭陵延陵園門罘罳曰使民無復思漢也又引魚豢魏略曰黃初三年築諸門闕外罘罳為證反以絲網之説為大謬余謂二説皆通以罘罳為網則結繩為之施于宫殿簷楹之間如蘇鶚之説是也以罘罳為屏則刻木為之施于城隅門闕之上如成式之言是也然就二説之中擇馬唯段氏之説為長案五行志注云罘罳闕之屏也玉篇云罘罳屏樹門外也又云罘罳罟也但屏上雕刻為之其形如網罟之狀故謂之罘罳音浮思則取其復思之義耳漢西京罘罳合版為之亦築土為之每門闕殿舍前皆有焉于今郡國廳前亦樹之故宋子京詩云秋色淨罘罳皆其義也三月師逾整羣胡勢就烹趙云三月三易月也公詩又云烽火連三月亦是此閏八月初以廣月王為天下兵馬元帥今詩所謂元帥調新律是已逆數閏八月以前通為三易月則當是郭子儀五月及安守忠戰于清渠敗績之後别訓練士卒至此師逾整肅可以擒賊矣以上十六句敘安氏父子為寇而廣平王往收復京師者如此瘡痍親接戰李廣傳大將軍與單于接戰單于遁走勇決冠垂成此言英乂躬胃矢石功冠垂成垂成猶欲成也趙云此微言英乂之敗而激其再立功也是年二月李光弼敗安慶緒于太原而是時英乂戰于武功敗績故有蒼荑之譬且言其垂成也也妙譽期元宰殊恩且列卿趙云上句美其可以為相則列卿則今兼太僕也幾時回節鉞戮力掃欃槍成十三年傳戮力同心欃槍妖星也前漢天文志石氏見欃雲如牛甘氏不出三月乃生天槍石氏見槍雲如馬甘氏不出三月乃生天欃謝宣逺子房詩鴻門銷薄蝕􅀈下隕欃槍馬新添書聿求元聖與之戮力爾雅曰慧星為欃槍司相如大人賦檻欃槍以為旌兮靡屈虹而為綢圭竇三千士儒行儒有篳門圭竇注門旁穿墻為竇如圭右傳筆門圭竇之人僖二十四年秦伯送衛于晉三千人實紀綱之僕雲梯七十城雲梯攻城具高長上與雲齊可依而立公輸作雲梯以攻宋墨子設守宋之備九攻而黑子九却之趙云公詩有云蒼茫城七十流流劍三千今云三千士者使莊子劍士夾門而客三千餘人也七十城使燕樂毅下齊七十餘城耻非齊説客酈生嘗為説客馳使諸侯漢王使説齊王田廣一罷歷下兵首與漢通和淮隂侯乃夜謀度兵襲齊齊以酈生賣己遂烹之甘似魯諸生漢叔孫通傳臣願徵魯諸生與臣弟子共起朝儀有趙云益謂以圭竇之貧士尚有三十而下七十城亦為雲梯之具者如我曽無説客之談特為諸生之事而已蓋自責其無補于戰也通籍微班忝此公自言得為拾遺通朝籍也微班言位下也通籍見前漢元帝紀注周行獨坐榮詩置彼周行箋云周之列位也後漢宣秉拜御史中丞光武特詔御史中丞與司隸校尉尚書令會同並專席而坐故京師號曰三獨坐時英又為中丞趙云周行古注謂周之列位而公意却是周遍之行列也隨肩趨漏刻短髮寄簪纓寄一作愧趙云上句言同入朝也倒使五年以長則肩隨之漏刻出左後漢功在漏刻下句以言其在有位之列也短髮倒使傳髮甚短而心甚長徑欲依劉表魏志王粲傳粲以西京擾亂皆不就辟乃之荆州依劉表還疑厭禰衡還疑一云能無後漢文苑傳禰衡字正平孔融愛禰衡材數稱述于曹操操欲見之而衡素相輕疾不肯往操懷忿而以其才名不欲殺之送與劉表及荆士大夫先服其才名甚賓禮之後復侮慢表表耻不能容以江夏太守黃祖性急躁故送衡與之卒為祖所殺趙云依劉表以王粲自比却疑諸公如曹操劉表黃祖輩厭禰衡也漸衰那此别忍淚獨含情廢邑狐狸語襄十四年傳南鄙之田狐狸所居豺狼所嗥空村虎豹爭村言無人虎豹爭盜賊縱橫故也趙云公曰狐狸虎豹以比盜賊後漢張綱奉使埋輪不行曰􅀈貇當路安問狐狸晉張孟陽七哀詩曰季世喪亂起盜賊如豺虎人頻墜塗炭仲虺之誥有夏昏德民墜塗炭言民之危險若陷泥墜火公豈忘精誠趙云禮記不精不誠未有能動人也元帥調新律前軍壓舊京鮑云謂廣平王將復京師也業趙云元帥指言廣平王俶是為代宗前軍指言李嗣之軍時代宗為元帥郭子儀副之而李嗣業為前軍新律是師律之律舊京指言長安後云仍扈從則望長安收復而車駕復還也安邊仍扈從莫作後功名莫作一云無使時代宗為元帥期于收復公勉郭令立功名無後衆人也史安邊在良將送楊六判官使西蕃送逺秋風落西征海氣寒帝京氛祲滿氛祲不祥之氣言胡塵汚染帝室人世别離難趙云此篇是至德二年九月前詩蓋京師猶未復所謂帝京氛祲滿宜在收京師前送逺公曽云皇天悲送逺但未見本出潘安仁有西征賦往吐蕃渡青海而去祲音干鴆切精氣感祥也阮孚嘗云氛祲既澄日月自朗楚辭云憂莫憂于生别離句意倣此絶域遙懷怒和親願結歡勑書憐贊善贊並吐蕃主名兵甲望長安望長安言欲入冦也宣命前程急惟良待士寬趙云絶域指言吐蕃李陵書云奉使絶域和親字起于漢左傳楚子使椒舉如晉日寡君願結歡于二三君贊普其俗謂疆雄日贊丈夫日普故以號君長按唐新史吐蕃傳云至德初取巂州及威武等諸城入屯石堡其明年使使來請討賊且修好肅宗遣給事中南巨川報聘然嵗內侵取廓霸岷等州及河源莫門軍數來請和帝雖審其譎姑務紓患乃詔宰相郭子儀蕭華裴遵慶等與盟史之所載如是而已以公詩考之中國以其懷怒侵叛而與之和親所以敕書憐其君長欲窺長安之意而急遣使與和也詳味惟良待士寬一句為楊判官而言判官者必以事間廢今欲選良材以為使則待之以濶略而用之故下句有起為官有正羽翰之語東坡詩有云試草尺書招贊普依倣勑書憐贊普也子雲清自守今日起為官揚子雲任宦不達寂寞自守起為官以子雲比楊判官也趙云以子雲比之取其同姓清自守則微言其間廢者矣干新添自守字子雲本傳言附離丁董者或起家至二石時雄方草大玄有以自守泊如也為官字子雲解嘲日意者玄得毋尚白乎何為官之拓落也埀淚方投筆言以戎事為憂故垂淚投筆如班超投筆而起志在功名傷時即據鞍劉尚深入五溪軍沒馬援因復請行時年六十二帝愍其老未許之援自請曰臣尚能披甲上馬帝令試之援據鞍顧眄以示可用趙云言其恰欲投筆以起而聞宣命之急則又亟據鞍而往也儒衣山鳥怪漢節野童看邊酒排金盞一作碗夷歌捧玉盤揚子孝至篇有假儒衣書蘇武在胸奴中伏漢節牧羊排金盞一作碗為正蓋吐蕃嘗獻奉者曰金碗一碼瑙杯一耳見舊唐書草肥蕃一作輕馬健胡人至秋則草肥馬健思入冦雪重拂廬乾拂廬蕃帳名孟趙云上兩句蓋浩然草枯鷹眼疾雪盡馬蹄輕之勢也杜補遺唐吐蕃傳吐藩居邏娑川其城廓廬舍不昔處聮毳帳以居號拂廬慎爾參籌畫從兹正羽翰歸來權可取九萬一朝摶言當以功名自致逺大也之趙云正羽翰所以引末句九萬一朝摶也莊子言鵬飛也摶扶搖而上者九萬里扶搖風名羽翰從兹而正則前此為不正既正羽翰而摶風九萬里特在于一朝則楊君起于間廢尤明憶弟二首喪亂聞吾弟詩喪亂既平飢寒傍濟州人稀吾不到以道路榛梗人稀少而難行也兵在見何由孟子何由知吾可也憶昨狂催走無時病去憂即今千種恨惟共水東流狂催走謂避亂出奔如狂也趙云公自言出奔且往行在所如狂圖催走公素多病則又無時而病去所以憂也右一且喜河南定安慶緒棄東都走也不問鄴城圍鄴城史思明所據百戰今誰在三年望汝歸東山周公東征也三年而歸三章言其室家之望汝也故園花自發丘希範春暮春三月江南草長雜花生園羣燕亂飛見故園之旗鼓感生平于疇昔也春日鳥還飛言草木禽鳥尚得其所而人遭亂離不得相保耳斷絶人煙久東西消息稀趙云至德二載十得復東京所謂河南定也鄴城史思明所據相州是也東京既復安慶緒奔于河北次年四月賊復振以相州為成安府則公作詩時官兵當圍相州也故曰不問鄴圍圍今河南已定鄴城方圍之時而日花自發鳥還飛則言方春之至草木禽鳥各得其所而不預人事耳右二得舍弟消息亂後誰歸得他鄉勝故鄉若一作直為心厄苦久念一作得與存亡趙云休明之際則他鄉雖樂不如還家為遭亂離則他鄉安處自足居也直為當以若為正蓋言何為而我心厄若久以與弟存亡在念故也與字如主在與在主亡與亡之與故作重字用對心字也汝書猶在壁汝妾已辭房李陵書生妻去室也舊犬知愁恨垂頭旁我床使陸機黃耳事公又曰舊犬喜我歸低入衣裾鄭駙馬池臺喜遇鄭廣文同飲不謂生戎馬老子戎馬生于郊何知共酒杯燃臍郿䲧敗董卓傳吕布殺卓使皇甫嵩攻卓弟旻于郿䲧盡滅其族乃尸卓于市天時始熟卓素充肥脂流于地守尸吏燃火置卓臍中光明達旦握節漢臣回蘇武仗漢節牧羊起卧操時節毛盡花積十九年還歸趙云然臍郿䲧郿塢敗言慶緒奔敗如董卓也握節漢臣回言虔自陷賊中回其後謫台州詩公又云蘇武看羊陷賊庭蓋比之如蘇武也而新添左傳司馬握節死白髮千莖雪丹心一寸灰言為憂患所困而心已無物矣故云一寸灰莊子心若死灰别離經死地披寫忽登臺重對秦簫發見二十五卷始知秦女善吹簫注以駙馬臺故云俱過阮宅來見二十七卷自須留阮舍注文師云阮籍謂之大阮阮咸謂之小阮廣與駙馬同姓故云留連一作醉留春夜舞淚落強徘徊一云醉連春苑夜舞淚落徘徊心趙云緑有寸心字灰心字故云丹一寸灰李啇隱云一寸相思一寸灰用杜公之語也阮宅字或曰晉阮咸與叔藉居道南諸阮居道北公于叔遇姪多用此如曰守嵗阿咸家是也則阮舍阮宅皆以阮咸言之二鄭同姓必有少長尊卑則阮宅者乃指言駙馬字乎臘日新添稗雅曰夏曰清祀殷曰嘉平周曰大蠟亦曰臘黃衣黃冠而祭祀息田夫也案史記始皇本紀三十一年十二月更始臘月嘉平蓋因謡歌曰神仙得者茅初成帝若學之臘嘉平而改從殷號也臘日常年暖尚遙今年臘日涷全消侵淩雲色還萱草漏泄春光有一作是栁條縱酒欲謀良一作長夜醉還家初散紫宸朝紫宸殿也口脂靣藥隨恩澤翠管銀罌下九霄唐制臘日宣賜口脂靣藥及賜宴頭杜補遺太平御覽載盧公家範曰凡臘曰上藻豆及膏靣脂口脂趙云紫宸殿名在東內大明宫之中乃內衙之正殿也舊注是杜田所引却是人家下者上其物不以干國家恩賜事詩云則恩澤乖矣紫宸殿退朝口號户外昭容紫袖垂唐制昭容正二品係九嬪雙瞻御座引朝儀師云酉陽雜俎曰今閣門有官人引百僚或云自則天或言因後魏據開元禮疏曰晉康獻褚后臨朝不坐則宫人傳百寮拜年杜補遺按唐制天子坐朝宫人引至殿上至天祐二十二月詔曰宫嬪女職本備內任今後每遇延英坐日只令小黃門祗侯引從宫人不得出內唐趙云天祐昭宗年號朱全忠所立者杜田所引可見之元制矣雙瞻御坐則應用昭容二人為引謂之瞻則曰瞻也新添紀瞻與王導等勸進帝猶不許猶許使韓績徹去御座瞻叱績日帝座上應星宿敢有動者斬香飄合殿春風轉花覆千官淑景一作日移趙云宋有合殿之名荀子云天子干官博物志海上有風山春風所出鮑照悲哉行有羇人感淑景之句花師云謝宣城日淑景近多晝漏稀一作聲聞高閣報天顏有喜近臣知言近臣密邇清光宫中每出歸東省師云按唐六典左拾遺門下右拾遺中書此言東省蓋門下也傳言子美拜右捨遺史氏之誤會送夔龍集一作到鳯池夔龍舜之良臣夔典樂龍納言鳯池荀最為中書令及罷云奪我鳯凰也趙云上句言晝漏之所以希聞以閣之高而傳之逺也吳越春秋載采葛婦詩曰羣臣拜舞天顔舒近臣則言左右親近之臣蓋指貂璫者耳東省事唐制左拾遺𨽻門下省而門下省在東故曰東省唐之初門下省在左延明門東南中書省在右言門門西南此在西內者耳至高宗居大明宫兩省曹僚隨便安置故宣政殿前東廊曰日華門其東有門下省西曰月華門其西有中書省焉今公所謂歸東省則曰華門東之門下省也故後篇答岑補闕有曰我往日華東也題是紫宸殿退朝而紫宸殿在東內大明宫之中故云曲江二首一片花飛減卻春風飄萬點正愁人且看欲盡花經眼莫厭傷多酒入唇范元實詩眼嘗云或問余東坡有言詩至于杜子美天下之能事畢矣考之前人固未有如老杜後世安知無過老杜者余曰如一片花飛減却春雖使聖人復詠落花決然更無好語萬趙云元實之言是也秦少遊號稱善辭曲嘗云落紅點愁如海以為佳句乃使風飄萬點正愁人者也江上小堂巢翡翠花一作花邊高冡卧麒麟細推物理須行樂何用浮名絆此身西京雜記五柞宫西青梧觀柏樹下有石麒麟二枚是秦始皇驪山墓上物之趙云兩句皆記眼前所見也冢前有石麒麟蓋富貴家卧則冢之荒廢矣故公落句有感焉舊本花邊師民瞻本取苑邊髙冡是蓋芙蓉苑之邊也前漢楊惲報孫會宗書曰人生行樂耳須富貴何時右一朝回日日典春衣每日江頭盡醉歸陳遵日出醉歸傳趙云宋元凶劭日月自出行軍王長元古意思淚點春衣酒債尋常行處有人生七十古來稀古詩人生不滿百常懷千嵗憂晝短苦夜長何不秉燭遊穿花蛺蝶深深見點水蜻蜓欵欵飛趙云老杜不拘以數對數如四十明朝過飛騰暮景斜亦是此格沈存中乃以入尺日尋倍尋日常謂亦是數目故對七十何迃鑿如此深深字莊子其息深深欵欵字司馬遷云效其欵欵之愚傳語風光共流轉暫時相賞莫相違趙云張若虛春江月云請語風光催後騎併將歌舞向前溪馮小憐春日詩傳語春光道先歸何處邊今公所謂傳語正參用此語以風光在我輩當共其流轉相與賞玩莫相違戾此豈語同舍之省師乎謝玄暉云日華川上動風光草際浮南齊王儉詩風光承露照霧色點蘭暉城師云按杜子美祖審言詩春日京中有懷云寄語洛風日道明年春色倍還人以此見子美詩有祖風也右二曲江對酒苑外江頭坐不歸水精春一作宫殿轉霏微趙云苑外者芙蓉苑之外也曲江在苑扎文宗嘗誦公詩曰江頭宫殿鎖千門思復升平事而修紫雲樓綵霞亭日復增創以此觀之則天寶至德時所謂春殿轉霏微雖不可考知其名而意可推矣月宫謂之水精宫今以言春殿蓋以狀其清幽也或云即殿名桃花細逐楊花落黃鳥時兼白鳥飛趙云黃魯直詩云野水漸添田水滿晴鳩卻喚雨鳩歸用此格也縱飲久判人共棄懶朝真與世相違吏一云舍情更覺滄州逺老大悲傷未拂衣謝玄暉復叶滄洲處古樂府老大徒悲傷清趙云揚雄檄靈賦日世有黃公者起于滄洲神養性與道逍遙曲江對雨城上春雲復苑牆江庭晚色靜年一作天芳沈休文二月三日詩年芳俱在斯林花著雨燕脂落水荇牽風翠帶長荇水草也相連而生故如翠帶義趙云苑牆又言芙蓉苑之牆也風師云杜審言過陽公主山池詩綰雲青條弱牽紫蔓長龍武新軍深駐輦芙蓉别殿漫焚香開元二十六年析左右羽林軍置左右龍武軍以左右萬騎營𨽻焉芙蓉城連曲江城師民瞻云舊史官志左右龍武軍注大宗選飛騎之尤驍健者别署百騎以為翊衛之備武后加置千騎中宗加置萬騎分為左右營自開元以來與左右羽林軍名曰北門四軍開元二十七年改為左右龍武軍唐始祖諱虎故唐太宗修晉史李延夀修南北史舊書皆易虎為武以避之如稱琥珀為武珀白虎為白武之類是矣龍武軍本龍虎軍亦避唐諱也趙云兩句意言車駕唯深駐曲江不復幸芙蓉苑則别殿焚香為漫耳初玄宗以萬騎軍平韋氏改為左右龍武軍皆用唐之功臣子弟制若宿衛平是時良家子避征戍者亦皆納資𨽻軍分日更上如羽林此在新唐史兵志最為易考可時詔一作重此金錢會暫一作爛醉佳人錦瑟旁杜補遺開元天寶遺書云內庭嬪妃每至春時各于禁中結絆擲金錢為戲又酉陽雜俎梁時荆州掾為雙陸賭金錢趙云似言錫錢為宴劇談録載開元中都人遊賞曲江盛于中和上已節即錫宴臣僚會于山亭賜太常教坊樂推此則謂賜金錢為宴也金錢字止是言錢如前漢曹丘生數招權顧金錢不必真是黃金為錢者公宴漢陂云應為西陂好金錢罄一餐亦此金錢之謂也杜補遺所引却是黃金為錢者矣醉佳人傍者賜太常教坊樂也錦瑟字崔灝渭城少年行日渭城橋頭酒新熟金鞍白馬誰家宿可憐錦瑟筝琵琶玉堂清酒就君家則錦瑟者寶瑟瑶瑟之謂也或曰是佳人名如青琴瑟玉絳樹緑珠之類李啇隱作錦瑟詩其詞曰錦瑟無端五十絃一絃一柱思華年説者云令狐綯之妾名如青琴瑟玉綘樹緑珠之類亦不明據又況是後來事不可引若言教坊樂器則自有錦瑟矣早朝大明宫呈省寮友新賀賈至銀燭朝天紫陌長禁城春色曉蒼蒼千條弱栁垂青鎖百囀流鶯滿建章劒佩聲隨玉墀步衣冠身染御爐香共沐恩波鳯池裏朝朝染翰侍君王奉和賈至舍人早朝大明宫舍人先世掌絲綸五夜漏聲催曉箭顔氏家訓云或問一夜何故五更更何所訓答曰魏漢已來謂為甲乙丙丁戊五夜又云一二三四五皆以五為節更厯也經也鼓凡五更爾九重一作天春色醉仙桃天子之門九重漢武故事西王母齋其桃七枚獻帝帝欲留核種之王母笑曰此桃一千年生一千年結實人夀幾何遂止西王母指東方朔曰此桃三熟此己三偷也趙云春色著桃如酣醉然旌旗日暖龍蛇動宫殿風微燕雀髙朝罷香煙攜滿袖詩成珠玉在揮毫東坡曰杜甫也七言偉麗者此句是也師趙云余竊謂夏文莊硯中旌旗影動龍蛇川旌旗不動御爐香皆剽杜也然工掘可見矣硯水之中可見旌旗之影動如龍蛇而御爐香豈干旌旗動不動乎或者穿鑿以燕雀高比小人得位則龍蛇動何所比乎後學妄論杜詩有如此者香煙雖是香之煙而爾字是實故可對珠玉欲知世掌絲綸美池上于今有一作得鳯毛禮記王言如絲其出如綸從杜甫遺世説王敬倫風􅐾似父作侍中加授桓公服大門入桓公望之曰大奴固有鳯毛大奴王劭也梁鍾嶸詩品曰何晏孫楚張翰潘尼等並得虬龍片甲鳯凰一毛山海經曰丹穴之山有鳥焉五彩而文其名鳯中趙云賈至曽之子曽于于睿宗末年及開元初再為書舍人後與蘇晉同掌制誥皆以文辭稱時號蘇賈焉玄宗幸蜀時至拜起居舍人帝曰昔先天誥命乃父為之辭今兹命册又爾為之兩朝盛典出卿家父子可謂繼美矣故云鳯毛有兩事南史載謝超宗者謝鳯之子作殷叔儀誄帝大嗟賞謂謝莊曰超宗殊有鳯毛而池上字又使荀朂奪我鳯凰池事同前新添王維綘幘雞人送曉籌尚衣方進翠雲裘九天閶闔開宫殿萬國衣冠拜冕旒日色才臨仙掌動香煙欲傍衮龍浮朝罷須裁五色詔佩聲歸到鳯池頭同前新添岑參雞鳴紫陌曙光寒鶯轉皇州春色闌金鎖曉鐘開萬户玉階仙仗擁千官花迎劔佩星初落栁拂旌旗露未乾獨有鳯凰池上客陽春一曲和皆難宣政殿退朝晚出左掖天門日射黃金榜崔融詩金榜照晨光銅鈎起夕涼春殿晴曛赤羽旗以赤烏羽為旗也宫趙云前漢禮樂志曰天門開詄蕩神異經云西方有金榜而銀鏤題日天地少女之宫赤羽旗如周官析羽為旗家語赤羽若日白羽若月詄音跌宫草微微一云霏霏承委珮曲禮主佩埀則臣佩委爐煙細細駐遊絲遊絲蛛絲之遊散者香煙似之雲近蓬萊常好一作五色雪殘鳷鵲亦多時蓬萊殿名鳷鵲樓名趙云蓬萊殿在紫宸殿之後皆大明宫中也鳷鵲漢官名在甘泉宫謝玄暉詩云金波麗鳷鵲王繩低建章則借漢官觀名以比當時之禁掖侍臣緩步歸青瑣責瑣門也以青畫户邊鏤中天子制也退食從容出每遲趙云青鎖漢名名在未央宫今以借用如范彥龍攝官青瑣闔詩退食自公題省中院壁掖垣竹埤梧十尋師云西掖垣在中書省劉公幹贈徐幹詩誰謂相逺去隔此西掖垣埤音婢百畝為埤又增也厚也洞門對雪常陰陰洞門猶洞户也杜正謬對雲當作對霤左太沖吳都賦云增岡重阻列真之宇玉堂對霤石室相距注欄霤相接也蓋是時有鳴鳩乳燕落花遊絲之語乃春深時非可言對雪殆傳寫之誤爾董賢傳重殿洞門注洞門謂門門相當也趙云掖垣者禁掖之垣牆也字在字書手避移反附也助也補也增也引詩云政事一埤益我云埤厚也今公竹埤則側聲矣惟晉論秦醫和曰松柏不生埤注埤下濕也而國語音卑又皮靡反方是側聲卑而有所當生之義所謂對雪常隂陰蓋為大明宫直終南山每清天霽景視終南山如指掌云此對終南之雪也正謬云對雪當作對霤非是蓋對霤自此玉堂凡是堂殿前有天井乃為對霤鄭玄禮記注曰堂前有承霤是已若在洞門言之則第一重門豈對霤耶又對承霤則明快矣豈陰陽耶杜云落花乳燕乃春深時非可言雪蓋終南崇山雖春深而有積雪未稍爾落花遊絲白日靜鳴鳩乳燕青春深梁簡文帝春日詩花花隨燕入遊絲帶螮驚乳燕雛燕也慤趙云兩句如東坡先主之説豈不謂之偉麗耶隋蕭春賦云落花無限數飛鳥排花渡庾信燕歌行云洛陽遊絲百丈連又云數尺遊絲即橫路遊絲于春時空中有有之蓋野鳥之類天地之氣也即非蛛絲學者多誤指之矣月令季春之月鳴鳩拂其羽疏云案釋鳥云鶌鳩鶻鵃郭景純云鶌音九物反鵃音嘲鶻鵃似山鵲而小青黑色短尾多聲孫炎云鶻鵃一名鳴鳩月令所云是也如此則止是鶻鵃乃季春之鳥矣即非喚雨之勃鳩學者復多誤指雖黃魯直亦誤用云欲雨鳴鳩日永若以喚雨之鳩為鳴鳩則四時皆鳴何乃言青春深乎乳燕字承用之熟在杜公前則鮑照詠採桑詩乳燕逐草蟲巢蜂拾花蘂也腐儒衰晚謬通籍黥有傳上置酒對衆折隨何曰腐儒為天下安用腐儒哉即古云腐者爛敗言無所堪在通籍見上注退食遲回違寸心趙云漢書高祖云腐儒幾敗乃公事詩云退食自公寸心起于列子文摯謂叔龍曰吾見子之心矣方寸之地虛矣而促用寸心則陸士衡文賦有吐滂沛乎寸心方生出寸心字也若使違字則詩云中心有違左傳云王心不違也衮職曽無一字補詩衮則有闕仲山甫補之注衮君之上服補之善補過也許身愧比雙南金古詩美人贈我緑綺琴何以報之雙南京言所報重也甫趙云公前為拾遺故用補衮事不必泥出處是仲山而為宰相事也一字補蓋挨傍春秋序云衮之一字若華衮之贈故對雙南金三字出文選美人贈我雙南金春宿左省花隱掖垣暮啾啾棲鳥過星臨萬户動月傍九霄多趙云隱者隱蔽之也字起于揚雄蜀都賦曰蒼山隱天漢宫千門萬户潘嶽書曰長自絶乎塵埃迢遊身乎九霄而沈休文遊沈道士館云鋭意三山上託慕九霄中今言九霄之間月色明遍為多也或曰以九霄比禁掖為其在左省作詩故所云如此不寢聽金鑰因風想玉珂玉珂馬鳴珂也趙云兩句主下句有封事而欲上故聽開門且想朝馬之鳴珂也玉珂者以玉為珂富貴事也明朝有封事言事也欲其密故封之以達數問夜如何趙云唐制左拾遺六人從八品上掌供奉諷諫大則廷議小則上封事故曰有封事也詩夜如何其夜未央夜未艾夜向晨者也送翰林張司馬南海勒碑相國製文冠冕通南極通猶通西南夷也文章落上台謂相國製文也張趙云冠冕指言司馬南極指言南海之地詔從三殿去唐有三殿學士碑到百蠻開趙云大明宫中有麟德殿在仙居殿之西北此殿三靣亦以三殿為名李肇翰林志曰翰林院在麟德殿西廂重廊之下門東向故曰詔從三殿去者自翰林壁經三殿而出也舊注非野館濃花發春帆細兩來趙云既云往南海則用帆矣本玄虛賦曰維長綃挂帆席是已以春時往故曰春帆公又曰𡨕𡨕細雨來者不知滄海上天遣幾時回趙云此句暗用博物志有人乘槎至海犯牛斗事杜公每用却多指為張騫云晚出左掖晝刻傳呼淺趙云衛宏著漢儀使夜漏起宫衛傳呼以為備陸倕以其所載為未詳謂傳呼淺則在畫不若夜之逺也春旗簇仗齊春旗言羽衛也退朝花底散歸院栁邊迷樓雪融城濕宫雲去殿低避人焚諫草騎馬欲雞棲趙云如魏陳羣之削草又高士亷奏議未嘗不焚藁也詩云雞栖于塒舊注引文選雞登栖而飲翼非是曲江陪鄭八丈南史飲趙云應是鄭虔虔為著作所謂南史以左氏齊南史稱之雀啄江頭黃栁花鵁鶄溪鶒滿晴沙自知白髮非春事歸去來農人告豫以暮春將有事乎西疇且盡芳樽戀物華趙云春事嬉遊賞玩皆年少之所宜故白髮非春事矣舊注非是近侍即今難浪迹此身那得更無家趙云上句所以自戒下句所以自喜蓋公性真率平昔放浪今為近侍故難浪迹前此一身轉徙賊中寄家鄜州嘗有詩曰無家對寒食今既復聚故喜而曰那得更無家也丈人文力猶強健豈傍青門學種瓜邵平種瓜青門號邵平瓜青趙云阮籍詠懷冇云昔門東陵瓜近在門外注引使記邵平者故秦東陵侯秦破為布衣貧種瓜於長安城東故俗謂之東陵瓜又注云漢書曰霸城門民間所謂青門則長安城東門也送賈閣老出汝州趙云此送賈至也前篇有嚴賈二閣老兩院補闕公自注云嚴武賈至也至為汝州唐史不載西掖梧桐樹空留一院陰喻賈之德猶足庇覆一院舍趙云至于至德中厯中書人而中書舍人𨽻中書省在月華門西故曰西掖艱難歸故里去住損春心趙云至河南洛陽人唐以河南府汝州𨽻都幾採訪使故云宫殿青門隔青門長安東城門也隔青門謂賈出汝州也雲山紫邏深邏塞也取巡邏之義杜補遺子邏山名也謹按九域志汝州梁縣有三山一霍陽二崆洞三紫邏非以巡邏為義人生五馬貴見二十五卷五馬有光輝注莫受二毛侵潘嶽秋興賦豫三十有二始見二毛二毛者斑白也趙云五馬太守事本出漢官儀太守五馬蓋天子六馬而諸侯則五馬故也漫叟詩話云古樂府陌上桑云五馬立踟蹰用五馬作太守事自西漢時始然古乘駟馬車至漢時太守出則增一馬事見漢官儀潘子真詩話云禮天子六馬左右驂三公九卿駟馬右騑漢制九卿則中二千石亦右驂太守則駟馬而已其有功德加秩中二千石如王成者乃有右騑故以五馬為太守美稱金師云古今風俗王逸少出出守永嘉庭列五馬繡鞍勒出即控之故永嘉有五馬坊送鄭十八虔貶台州司户傷其臨老陷賊之故闕為靣情見於詩趙云按唐史虔遷著作作郎祿山反遣張通儒劫百百官置東都偽授虔水部郎中因稱風緩求攝市令潛以密章達靈武賊平與張通王維並囚宣陽里三人皆善畫崔圖使繪齋壁虔等方悸死即極意祈解于圓卒免死貶台州司户參軍事莊子曰闕然數日不見闕為為靣别若言闕然為靣别也鄭公樗散鬢成絲莊子有樗散之材言不合世用也酒後常稱老畫師虔善畫常獻詩畫及書于明皇御批號為三絶句趙云莊子謂樗曰散末也故相承用樗散焉畫師之亦猶王維詩云夙世謬詞客前身老畫師萬里傷心嚴譴日百年埀死中興時時初復京師虔以汙賊貶倉惶已就長途往邂逅無端出餞遲便與先生應永訣九重泉路盡交期言交契之期死生不替者也江淹别賦寫永訣之情題鄭十八著作文台州地濶海冥冥雲水長和島嶼青台州鄭貶所郡趙云台州臨海本海州也亂後故人雙别淚春深逐客一浮萍以虔貶故稱逐客秦李斯在逐客中上書酒酣懶舞誰相拽詩罷能吟不復聽第五橋東流恨水皇陂岸北結愁亭第五橋皇陂皆長安廓外送别之地趙云皇子陂在萬年縣西南二十五里第五橋未詳公過何將軍山林詩云今知第五橋蓋于此與鄭送别之地水謂之恨水亭謂之愁亭乃一時傷心之言賈生對鵬傷王傅蘇武看羊陷賊庭趙云上句以言虔遷謫也下句以言虔為賊所劫而不防賊也可念此翁懷直道也霑新國用輕刑周禮秋官大司寇之職一曰刑新國用輕刑趙云惟其直道而不附賊故得免死而從貶也禰衡實恐遭江夏見本卷送郭子丞詩方朔虛傳是嵗星夏侯孝若東方朔畫贊云神變造化靈為星辰注俗謂方朔為太白星精趙云上句以言虔素才俊嘗憂有欲殺之者矣觀其初集掇當世事著書八十餘篇有窺其藁者上書告虔私撰國史虔倉黃焚之由協律郎坐謫十年其于賊平被囚也幾死而貶則虔嘗以死為憂矣下句以言虔多技能如方朔而不得親用博物志載神仙傳曰傳説上據辰尾為箕宿嵗星降為東方朔傳説死後有此宿東方生無嵗星今公云方朔是嵗星蓋用此説而夏侯孝若為畫畫贊序乃云云却成成方朔死而為星矣舊注止知引此非是窮巷悄然車馬絶案頭乾死讀書螢車胤聚螢讀書者趙云虔既謫去矣則平昔過從車音絶而所居讀書之處空餘死螢也端午日賜衣師云按唐會要開元二十五年上以端午日賜宰臣丞相尚書兩省官衣服各一襲宫衣亦有名端午被恩榮細葛含風軟香羅疊雪輕自天題處濕當暑著來清意內稱長短終身荷聖情一作明趙云自天出詩書當暑出論語其他甚明末句語法稍深蓋言天子之意內又稱量羣臣身材長短而賜之使有實用而非止虛賜此所以終身荷聖情也贈畢四曜玉臺後集載曜詩二首才大今詩伯家貧苦宦卑晉有八伯以擬八雋伯如侯伯之伯趙云伯宗師之稱也字起于論衡有云周長生文辭之伯文人之所共宗而變化用之耳新唐書云王楊為之伯燕許擅其宗亦用此字也飢寒奴僕賤顔狀老翁為同調嗟誰惜論文笑自知謝靈運詩誰謂古今殊異代可同調自趙云魏文帝典論有論文篇為無同調故論文亦知而已公詩文章千古事得失寸心知亦此之謂也流傳江鮑體江文通鮑明逺相顧兔無兒伯道無貌兔無兒者言各有子也止趙云言既無同調以共論文則所能江鮑體之文章流傳于其子耳江謂江淹鮑謂鮑照二人最能文唐宗嘗曰蘇環有子李嶠無兒相顧兔無兒意言各有子以傳世業即非伯道無兒事師民瞻本江鮑體作江左體亦是言江左則不止指二人也酬孟雲卿樂極傷頭白更長愛燭紅相逢難衮衮告别莫匆匆衮衮見上醉時歌注云趙云相逢既難得相繼故不可匆匆為别也晉王濟張漢説漢史衮衮可聽張芝云匆匆不暇草書也訓新添史記龜策傳有云陰陽相錯匆匆疾疾顔氏家云世中書翰多稱匆匆相承如此不知所由案許慎説文云匆者州里所建之旗也象其柄有三斿雜帛幅半異所以趣民故匆遽者稱為匆匆但恐天河落鮑明逺夜移河漢落寧辭酒盞空孔融樽中酒不空如趙云天河謂之落鮑照詩酒盞謂之空飲盡而空也舊注所引正與此空字不同明朝牽世務揮淚各西東趙云前漢儒者通世務揮淚字起于家語公文伯卒敬妻曰二三子無揮涕而蘇子卿曰淚下不可揮公蓋參使奉贈王中允維中允聲名久如今契濶深共傳收庾信周書庾信字子山先與徐陵並為梁抄撰學士後仕周聘于東魏文帝辭令盛為鄴下所稱信雖位望通顯常有鄉關之思不比得陳琳琳避難冀州袁紹使典文章作檄以告劉備言曹公失德不堪依附反曹公父子後紹敗曹公得琳愛其才而不之責宫趙云庾信為梁東宫學士侯景之亂梁簡文帝使率中文武千餘人營于朱雀航及景至信以衆先退奔于江陵梁元帝承制除信御史中丞共傳收庾信以言肅宗憐維失其死罪止下遷太子中允此所謂收也陳琳作檄謗詈曹公得之得之愛之而不咎維在賊中祿山大宴凝碧池悉召梨園諸公合樂工皆泣維聞悲甚賦詩痛悼則異乎陳孔璋在袁紹時詈及曹父祖矣故曰不比得陳琳也一病緣明主三年獨此心窮愁應有作試誦白頭吟虞卿窮愁著書白頭吟以人情樂心而壓故也殺趙云祿山以天寶十四載反十五載陷京師安慶緒其父自立至至德二載而後京師復焉方維在賊時以藥下利陽瘖維既以不欲汚賊而病其心三年唯在明主故云白頭吟文君所賦今公所用止言當老而吟賦爾奉陪鄭駙馬韋曲二首韋曲花無賴師云丁廙詩羣花正無賴家家惱殺人緑樽雖盡日白髮好禁一作傷春趙云古詩白楊多悲風蕭蕭愁殺人公用愁殺人矣此外更變曰秋江思殺人又曰髙樓思殺人今云惱殺人亦其變也渌樽雖盡日一本又作須盡日白髮好禁春一本又作不禁春皆有義須盡日當對以好禁春言既老矣好禁奈春而行樂也不禁春則對以雖盡日言雖有盡日之酒而老人却不禁春思也沈休文和謝宣城詩云憂來命渌樽石角鈎衣破藤枝一作蘿刺眼新何時占叢竹頭戴小烏巾其二野寺垂楊裏春蛙亂水間美花多映竹好鳥不歸山城廓終何事風塵豈駐顔誰能共公子薄暮欲俱還趙云言城中多風塵徒催人老耳所以誰肯與公子以迫于暮色便欲俱還也蓋上欲留連之意寄左省杜拾遺岑參聮步趨丹陛分曹限紫微曉隨天仗入暮惹御香歸白髮悲花落青雲羡鳥飛聖朝無闕事自覺諌書稀奉答岑參補闕見贈窈窕清禁闥罷朝歸不同君隨丞相後我往一作住日華東補闕官有左右左屬門下省右屬中書省在趙云補闕拾遺在百官志皆𨽻門下省而門下省日華門之東杜公為左拾遺則所謂我往日華東矣于參言君隨丞相後則當往尚書省豈參為補闕闕而兼為諸部中官邪不然紀當時參不坐省而隨丞相實事耳舊注所引據楊侃職林所載蓋按唐史門下省有左補闕六人從七品上左拾遺六人從八品上掌供奉諷諫大事廷議小則上封事其注云武后時埀拱元年置補闕拾遺左右各二員新史所載如此則左屬門下省右屬中書省豈武后時耶然因解隨丞相後而言之則丞相又却是尚書省矣恐或後學不得不辨參于史無傳其詩集杜確序之止云自補闕遷起居郎起居郎又却𨽻中書省也俟博者辨之冉冉栁枝碧娟娟花蘂紅故人得佳句獨贈白頭翁古詩冉冉孤生竹玉景玄玩月城西門詩云娟娟似娥眉五臣注日娟娟明媚兒送許八拾遺歸江寧覲省甫昔時嘗客遊此縣於許生處乞瓦棺寺維摩圖樣志諸篇末詔許辭中禁慈顔赴北堂詩焉得諼草言樹之背背北堂也北堂母氏也一云天詔辭中禁家榮赴北堂聖朝新孝理祖席倍輝光祖席飲餞也漢祖二疏一云行子倍恩光天趙云行子倍恩光為正蓋孝理者以孝治下也恩光則恩之光也輝光則不對內帛擎偏重宫衣著更香淮陰清衣驛京口渡江航趙云淮陰楚州京口潤州蓋往江寧經厯之地春隔雞人晝雞人宫中司曉者言許方歸寧尚隔雞人報曉爾秋期燕子涼賜書誇父老壽酒樂城隍一云竹引趨庭曙山添扇枕涼十年過父老幾日賽城隍以趙云方春而歸隔聞宫中報曉也周官雞人夜呼旦呌百官秋期燕子涼其返以秋為期也一作竹引趨庭曙山添扇枕涼趨庭則論語孔子嘗獨立鯉趨而過庭扇枕則黃香事也然于趨庭而言竹引似乎無義豈其庭下實有竹耶又下句一作賜書誇父老壽酒樂城隍却不上十年過父老幾日賽城隍辭語老當有含蓄之意蓋謂十年不見父老而過之又必謁廟以為榮也看畫曽飢渴追蹤限渺茫虎頭金粟影神妙獨難忘虎頭維摩相也金粟釋有金粟地杜正謬厯代名畫記日顧愷之字長康小字虎頭昔陵無錫人曽于瓦棺寺北殿畫維摩詰畫訖光耀月餘發迹經云淨名大士是往古金粟如來世説注僧肇注維摩經曰維摩經者秦言淨名蓋名身之大士今觀子美元題所云則虎頭金粟影乃顧愷之所畫維摩圖也元注則謬矣趙云歐陽率更于藝文類聚則載世説愷之為虎頭將軍在甘蔗門中而洪駒父云顧愷之小字虎頭維摩詰是過去金粟如來蓋據厯代名畫記耳世説是劉義慶之書宋于晉未逺當可考信而厯代名畫記則後人為之也以俟博聞杜田所引與駒父同因許八奉寄江寧旻上人不見旻公三十年封書寄與淚潺湲舊來好事今能否老去新詩誰與傳趙云此至德二載詩公年四十六嵗逆數三十年則公十六七嵗耳揚雄傳時有好事者載酒肴從遊學故對新詩其字蔡雍瞽師賦詠新詩以悲歌碁局動隨幽澗竹袈裟憶上泛湖船聞君話我為官在頭白昏昏只醉眠杜補遺釋氏要覽云袈袈者從色彰稱也梵言迦邏沙曵華言不正色四分律云一切上色衣不得蓄當壞作迦沙葛洪撰字苑方添衣字言道服也大業經迦沙名離染服如幻三昧經云無垢衣又名忍辱鎧又名蓮花衣謂不為欲泥所染至德二載甫自京金光門出道歸鳯翔乾元初從左拾遺移華州掾與親故别因出此門有悲往事此道昔歸順西郊胡正煩公昔自賊中間道歸行在也至今殘破膽猶有未招魂言履艱危瞻破魂飛也宋玉有招魂文順趙云上句言其逃賊欲之行在是為歸在金光門道出故曰此道昔歸順也西郊胡正煩則言當歸順時正值胡在西郊之煩多也殘者餘也漢書云谷永破膽宋玉有招魂一篇以屈原之魂也近得歸京邑移官豈至尊言移外官非出天子意也無才日衰老駐馬望千門趙云上兩句言既得返長安以拾遺為官而移華州掾本非至尊之意特以自貽伊戚耳蓋公以論房琯有才不宜廢免坐此而貶耳駐馬望千門則倣徨不忍去凝望于宫禁也謂之千門使千門萬户之語寄髙三十五詹事適安隱髙詹事兵戈久索居子夏離羣索居時來如一云知宦達嵗晚莫情疏言無隨世態也天上多鴻鴈池中足鯉魚相看過半百不寄一行書蘇武繫書鴈足古詩呼童烹鯉魚中有尺素書古人言音信多以此二咸或謂之鱗羽太趙云安隱安穩字也出佛書世尊安隱否兵戈出戾子傳贊鴻雁則常惠事公子乾元初從左拾遺移華州掾方未移時豈不與高詹事相見乎及其既移華州旋于二年秋七月半棄官居秦有寄彭州三十五詩三十韻則此詩在秦州寄髙尚為詹事時詩也路逢襄陽少府入城戲呈楊員外綰甫赴華州日許寄員外茯苓寄語楊員外山寒少茯苓杜補遺史記龜策傳云茯苓所謂茯靈者在兔絲之下狀如飛鳥之形新雨已天清淨無風以夜捎兔絲去之即以篝燭此地篝籠也謂燃火而籠罩其上火滅記其處明日乃掘取入地四尺至七尺得矣伏靈者干嵗松脂也餘見補遺嚴氏其放歌行知子松根長茯苓歸來稍暄一云侯和暖當為斸青𡨕茯苓松脂所化斸之乃得翻動神仙窟世言華山多茯苓神仙所居之地封題鳥獸形茯苓似鳥獸形者為上兼將老藤杖扶汝醉初醒題鄭縣亭子鄭縣亭子澗之濱戶牖平髙發興新言臨亭多發新興也雲斷嶽蓮臨大路見蓮峰望忽開注路一作道天晴宫栁暗長春趙云澗之濱澗水濱也鮑照詩發興誰與歡兵蓮脂言蓮花峯也大路蓋言官道耳詩云遵大路是也一作大道古詩有青樓臨大道然不成詩之聲律蔡興宗引晉書檀道濟從劉俗代姚泓至潼關姚鸞屯大路以絶道濟糧道遂指大路為陜華地名穿鑿矣夫嶽峯所臨豈專是地名之大路乎若長春則指言長春宫也在同州朝邑縣去此雖百里皆華山所臨故廣言之也巢邊野雀羣欺燕花底山蜂逺趂人更欲題詩滿青竹晚來幽獨恐傷神野雀欺燕山蜂趰人皆感時而作故幽獨而傷神也偶趙云上兩句舊注云皆感時而作非也此道實事而似譏耳蓋公以論房琯有才不宜廢乃天子怒之而出當時無嫉之者望嶽西嶽崚嶒一云稜危竦處尊華嶽也諸峯羅列一作列如兒孫言序列而不敢與嶽爭長也也趙云沈休文詩崚峭起清障張景陽七命瓊巘崚嶒竦則如宋武帝登竹樂山詩曰竦石頓飛轅范雲登三山詩日叢嵓竦復垂庾肅之山贊曰岷閬天竦也後漢張昶華山碑云山莫尊于嶽澤莫盛于瀆安得仙人九節杖拄倒玉女洗頭盆仙人有九節杖笻杖亦九節玉女洗頭盆因山形而名天杜正謬集神録明皇玉女者居華山服玉漿白日升今山中頂石龜其廣數畝高三仭其側有梯磴達背建玉女祠祠前有白石白號曰玉女洗頭盆其中水色碧緑澄徹雨不加溢旱不加耗張平子思玄賦云戴太華之玉女兮召洛浦之宓妃即明皇玉女也趙云此篇皆使華嶽上之名稱有仙人九節杖有玉女洗頭盆有車相谷有箭栝峯皆處所也正謬所引載太平廣記車箱入谷無歸路師云寰宇記華陰縣車箱谷在西南二十五里深不可測祈雨者以石投其中有一鳥飛出應時獲雨箭栝通天有一門稍待秋風涼冷後髙尋白帝問真源白帝西方之帝也天趙云箭栝峯則華山記云箭栝峯上有穴才見攀緣自穴而上有至絶處者又按記云山頂上有靈泉二所一名蒲地一名太上泉池此豈所謂真源乎劉孝儀和昭明太子鍾山講解詩云降道訪真源至日遣興奉寄兩院遺補二首去嵗兹辰捧御床五更三點入鵷行晉王沈詩幸參鵷鷺行欲知趨走傷心地此言為華掾趨走參謁郡將也正想氛氲滿眼香御爐香煙也無路從容陪語笑有時顛倒著衣裳何人錯憶窮愁日愁日愁隨一線長一云白日愁隨一線長嵗時記云宫中以紅線量入影至日日影添一線坡云唐雜録謂宫中以女工揆日之長短冬至後日晷漸長此當日增一線之功黃魯直云此説為是師云今考輦下嵗時記荆楚嵗時記及徐諧嵗時廣記並不載此説子美小至詩刺繡五文添弱線即非以線量日影也蓋以刺繡之工添線為日晷之準則耳人楚云詩東方未明顛倒衣裳何人如言别人蓋謂别錯思憶我窮愁之日殊不知我愁日之愁則隨一線長正在此東至日也一作白日愁隨一線長其句不貫于上其二憶昨逍遙供奉班去年今日侍龍顔漢髙祖隆準而龍顔趙云拾遺掌供奉諷諫故曰供奉班按楊侃職林載補闕拾遺武太后垂拱中置二人以掌供奉諷諌自開元以來尤為清選左右補闕各二人供奉者各一人左右拾遺亦然夫謂之清選可以言逍遙矣麒麟不動爐煙上孔雀徐開扇影還趙云麒麟者香爐狀也孔雀者為扇之物也玉几由來天北極周禮王左右玉几朱衣只在殿中間趙云言至日受賀之儀謂之由來只在所以懷想至尊也周禮司几筵日左右玉几論語曰北辰居其所而衆星拱之北極即北辰也玉几設於左右從來在宸扆之前今以在外則不能瞻覩之矣唐禮樂志元正受賀皇帝服衮冕冬至則服通天冠綘紗袍而在禮記內則韠君朱之下注云天子諸侯玄端朱裳則綘紗袍可以言朱衣矣只在殿中間亦言居其所也孤城此日堪腸斷愁對寒雲雪滿山舞鶴賦水塞長河雲滿羣山趙云但以在外不預朝賀而懷之耳故有腸斷之嘆得弟消息二首近有平陰信遙憐舍弟存師云鄭州平陰縣本漢肥城縣隋大業二年改為平陰縣屬濟州鄆趙云平陰于唐舊屬濟州州廢于天寶十三載乃屬州公前憶弟詩曰喪亂聞吾弟飢寒傍濟州雖是十四載祿山反後詩蓋猶追逺道故名耳側身千里道言避難不得正行也寄食一家村烽舉新酣戰啼垂舊血痕烽燧也有冠則舉公趙云淮南子載魯陽與韓戰戰酣日暮援戈而麾之曰為之反三舍血痕蓋使淚盡繼之以血也不知臨老日招得幾人魂其二汝懦歸無計吾衰往未期浪傳烏鵲喜西京雜記乾鵲噪而行人至深負鶺鴒詩見鴒原驚陌草注生理何顔靣憂端且嵗時兩京三十口雖在命如絲趙云浪傳烏鵲雖噪而人不歸也詩云鶺鴒在原兄弟急難公詩文曰待汝嗔烏鵲拋書示鶺鴒亦此義矣謝靈運發石首戌詩寸心若不亮微命察如絲寄髙適新添楚隔乾坤逺難招病客魂詩名惟我共世事與誰論北闕更新主南星落故園定知相見日爛熳倒芳樽九家集注杜詩卷十九
