body:
  text: 九家集注杜詩卷十三宋郭知逹編古詩秋行官張望督促東渚耗一作刈稻向畢清晨遣女奴阿稽竪子阿段往問文十年王在渚宫注小洲曰渚趙云舊本耗稻一作刈非蓋此秋詩未是收刈時耗稻於稻中消耗蒲稗免相奪取或云耗稻是方言東注雨今足佇聞粳稻香謝靈運詩滮池溉粳稻說文粳稻屬稻稌上天無偏頗蒲稗各自長前漢胸奴傳朕聞天不頗覆地不偏載謝靈運湖中作芰荷迭映蔚蒲稗相因依類趙云劉公幹詩物無偏頗人情見非類前漢朱虛侯章請為吕太后言耕田高后兒子畜之笑曰顧乃父知田耳若生而為王子安知田乎章曰臣知之太后曰試為我言田章曰深耕溉種立苖欲疏非其種者鉏而去之太后默然師古曰以斥諸吕也穊稠也穊種者言多生子孫田家戒其荒前漢武帝紀野荒治苛也注曰荒田畝不闢功夫競搰搰除草置岸傍食貨志藝除草也莊子天地篇搰搰然用力甚多蒲稗皆水草上天以無偏頗不擇稻與蒲稗皆生長之然人情見非類則非類如蒲稗雖可亂真人情終見之也此亦劉章非其種者鋤而去之之意故力田之家戒田荒穢為蒲稗奪之也荒則田萊多荒之荒何至引漢武野荒治苛乎除草乃蒲稗矣榖者命之本客居安可忘命之一云今土范子計然曰五穀者萬民之命國之重寶晉書黎元以穀為命青春具所務勤墾免亂常吳牛力容易並驅動莫當動莫當一云紛遊埸世說滿奮云吳牛見月而喘詩並驅從兩牡兮潘安仁籍田賦云游埸染屨又世說云今之水牛生江淮故謂吳牛畏熱見月疑日所以喘也務趙云上兩句追言其當春時已備具其所務矣所務農墾墾田勤於墾田免亂務農之常蓋以命之本雖客居而不忘也力容易言其力之多不以為難也東方朔談何容易並驅雙駕之也埸者埸埸之場紛游場則所用並驅之牛非止一雙而已亦四鄰耒耜出所以紛然也舊本正作動莫當非蓋言耕而已無動莫可當之義豐苖亦已穊見上注雲水照方塘劉公幹雜詩方塘含白水有生固蔓延靜一資隄防趙云豐苖亦已穊則劉章所謂也蔓延選軒檻蔓延今言滋蔓連延亦同義前漢韋孟諷諌四言詩矜矜元王恭儉靜一注靜守一道也隄防史如水之有隄防有生固蔓延言均為有生如蒲稗固蔓延於稻中矣然靜守一道則專在稻苖焉欲靜一則在除之資隄防亦防其惰農而不致力也督令不無人提携頗在綱携一作挈書盤庚若網在綱有條而不紊督趙云督領指行官張望除去蒲稗必有所役之人領者提携之如舉綱張目耳荆揚風土暖周官揚州荆州冝稻江淹南中氣侯暖朱華陵白雪肅肅候微霜尚恐主守踈用心未甚臧清朝遣奴僕寄語踰崇岡趙云尚恐主守踈又指行官張望公前篇行官張望補稻畦水歸詩主守問家臣分朋見溪畔主守亦言張望家臣者豈婢僕之謂乎故今題遣女奴阿稽竪子阿段往問而云清朝遣婢僕寄語踰崇岡西戎聚必散書平秩西成不獨陵我倉詩我倉既盈又曽孫之廋如坻如京潘安仁籍田賦我倉如陵我庾如坻豈要仁里譽感此亂世忙非欲賙施要仁里之譽蓋亂世不可不畜積以為給趙云言既除去蒲稗而稻成可收則當如此段之事也公前篇有曰遺穗及衆多我倉戒滋蔓而今詩曰西成聚必散不獨陵我倉則公及物之胸懹如此張平子思𤣥賦匪仁里其焉宅分匪義跡其焉追北風吹蒹葭蟋蟀近中堂詩十月蟋蟀入我床下故近中堂荏苒百工休鬱䊸遲暮傷禮月令霜降百工休謝宣逺詩履運傷荏苒陸士衡䊸鬱游子情謝琨遲暮獨如何趙云四句又言冬候詩蒹葭蒼蒼白露為霜故風吹言蒹葭遲暮字楚辭傷美人之遲暮蒲稗除矣稻既成而收且散之矣逮此冬時百工且休矣然余有遲暮之傷則詩人之情也此詩反覆曲折語多深隱不作尋常紆餘之詩近乎著書覽柏中允兼子侄數人除官制詞因述父子兄弟四美載承絲綸唐書柏氏無顯人惟柏耆傳云將軍良器之子元和中人不顯州郡甫又有詩寄相學士林君體趙云舊本中允師民瞻本作中丞是蓋近詩有題云陪柏中丞觀宴將士然民瞻便指為柏正節非詩句有戮力自元昆意其方是柏正節也然竊有疑焉公又有柏學士林居柏大兄弟柏二别駕詩皆是文人豈可指言柏正節之家乎俟明識辨之絲綸言制詞紛然喪亂際見此忠孝門晉卞壺傳翟湯歎曰父死於君子死於父忠孝之道萃於一門蜀中寇亦甚柏氏功彌存深誠補王室戮力自元昆魏書重以王室多故爾雅先生為昆漢高紀戮力注并力趙云柏氏立功於蜀其為名字於史無所考以意逆之必柏正節也今所謂柏中丞意是正節之弟而子姪數人則姪者正節子矣此無他以詩云戮力自元昆則言柏中丞之兄豈乃柏正節乎其父子兄弟有功于行陳則詩人宜以忠孝稱之矣書聿求元聖與之戮力舊注引高祖紀在後矣三止錦江沸獨清玉壘昏左太冲蜀都賦郭靈關而為門包玊壘而為宇注玉壘山名華陽國志錦江言蜀人織錦濯其中則鮮明濯他江必不好故曰錦江成都記玉壘山導江縣西北三十里趙云沸字上著止傳以湯止沸錦江據寰宇記濯錦江係之華陽縣公入蜀見成都亂蓋寶應元年嵗壬寅七月劍南西川兵馬使徐知道反拒嚴武之來不得永泰元年嵗乙已崔旴反襲殺郭英乂次年楊子琳以瀘州牙將同卭州牙將柏正節討旴杜鴻漸表子琳為瀘州刺史正節為卭州刺使西蜀大亂各遣罷兵於大厯二年嵗戊申七月子琳以瀘州刺史反陷成都蜀中又亂此錦江三沸也然寶應元年徐知道反公有草堂詩布衣數十人亦擁專城居下注云即柏正節楊子琳之徒則正節乃預寶應亂之數永泰二年既稱討崔旴而西蜀大亂又云各遣罷兵則正節乃所以亂蜀者大厯陷成都雖是楊子琳而正節本其同類不見有正節預討楊子琳事若指柏氏為正節實未安也李善注云玉壘山名湔水出焉在成都西北岷山界以今考之永康軍是也錦江沸自指成都府今又云玉壘昏則永康軍當時亦有亂矣或又云永康軍緊靠威茂今威州即唐維州吐蕃嘗寇松維豈所謂玉壘昏乎高人入竹帛鄧禹垂功名於竹帛新渥照乾坤子弟先卒伍芝蘭疊璵璠謝𤣥與從兄朗為叔父安所器重曰譬如芝蘭玉樹生於階庭同心注師律易師出以律灑血在戎軒後漢贊二十八將有來羣后捷我戎軒梁吳均䄂間血灑地絲綸實具載禮緇衣子曰王言如絲其出如綸王言如綸其出如綍紱冕已殊恩班固西都賦紱冕所興秀趙云芝蘭比其子弟有香之美璵璠比其子弟如良玉之珍亦晉書所謂佳子弟如芝蘭玉樹常使生於庭側也語孔子言禹曰惡衣服而致美乎紱冕奉公舉骨肉誅叛經寒溫金甲雪猶凍朱旗塵不翻陸左公石闕銘朱旗萬里每聞戰場說歘激懦氣奔趙云奉公舉骨肉言柏公內舉不避親併帥子弟赴難誅叛經寒溫則誅叛者前年之事至今作詩時已經一寒一溫金甲雪猶凍則效力之時在冬至今雪猶疑於甲而凍朱旗塵不翻則䝉犯戰塵重而不翻聖主國多盜賢臣官則尊方當節鉞用必絶祲沴根趙云多盜言國多盜賊有能伐叛之賢臣朝廷不惜爵賞故官則尊也節鉞用以其有功必使膺節鉞之用言為節度使也為節度使不可虛受爵賞必絶祲沴根以報朝廷吾病日回首雲臺誰再論後漢馬武等傳二十八將論永平中顯宗追感前世功臣乃畫圖二十八將於南宫雲臺作歌挹盛事推轂期孤鶱前漢鄭當時推轂士及官屬丞史誠有味其言也注言薦舉人如車轂之輪轉馮唐傳王者遣將跪而推轂此詩注柏中允為柏耆按新舊二史所載耆止入鎮江說王承宗諭承宗移鎮及使李同捷以擅殺同捷流放至賜死而詩中乃言效力於成都又云三止錦江沸即非耆矣切疑為柏貞節崔旴之殺郭英乂也貞節與瀘洲楊子琳帥師以討之杜鴻漸至蜀表授卭州刺史二史於傳無所考信故未能修去闕之以俟有聞趙云上句公自言其絶望於富貴無復論畫像之事下句公自負其詩所稱美可以推柏公而使之孤鶱推轂舊注引馮唐傳又别一義聽楊氏歌佳人絶代歌獨立發皓齒前漢外戚傳李延年侍上起舞歌曰北方有佳人絶代而獨立前漢枚乘七發皓齒娥眉命曰伐性之斧名薛云楚詞朱唇皓齒嫭以姱又古樂府雜曲從來著推趙子復有丹唇發皓齒北杜云阮籍詠懷詩南國有佳人榮華若桃李朝游江岸夕宿瀟湘沚時俗薄朱顔誰為發皓齒蒲堂慘不樂前漢刑法志古人有言滿堂飲酒有一人向隅而悲泣則一堂皆為之不樂響下青虛裏一作浮雲裏江城帶素月謝希逸月賦素月流天趙云濵江州縣謂之江城公詩有江城今夜客獨宿江城蠟炬殘鼓角動江城言成都也呈漢中王江月滿江城送卿二翁白馬出江城與今所云江城帶素月言夔州也況乃清夜起曹子建中夜起長歎老夫悲暮年壯士淚如水魏武帝樂府烈士暮年壯心不已荆軻歌於易水之上士皆淚垂杜云荆軻歌云壯士一去兮不復還曹子建詩清夜游西園舊引却是中夜老夫悲暮年壯士淚如水其所感如此左傳牽帥老夫淚如水淚下如流泉同義玉杯久寂寞山海經曰犬戎國有一女子跪進玉杯食韓子曰紂為象箸而箕子怖以為象箸必不加於土鉶必將犀玉之杯象箸玉杯必不羹菽藿則必薦豹胎金管迷宫徴趙云玉杯金管皆為聲曲者也玉杯今之所擊水盞金管今之吹笛以金玉言之取其貴也如箕子諫紂以為象著則必為玉杯王逸顔淵之簞瓢勝慶封之玉杯玉杯之寂寞言其不敢為聲金管迷宫徵言其聲之不逮於歌皆以形容歌聲之妙勿云聽者疲愚智心盡死韓娥過宋人辱之娥曼聲而哭長幼皆泣下宋人謝之娥乃曼聲而歌老幼皆喜躍師云江淹别賦骨肉悲而心死古來傑出士豈待一知己孟子曰豪傑之士雖無文王猶興趙云傳云士伸於知已屈於不知已故于傑出士下使知已字一本作傑出事不取吾聞昔秦青傾側天下耳一云傾倒之杜田補遺列子曰昔薛談學謳於秦青未窮靑技自謂盡之遂辭歸青弗止餞於郊衢撫節悲歌聲振林木響遏行雲談乃謝求反終身不敢言歸趙云秦青一本作秦音非杜說是蓋傾天下之耳則非特一知已而已荆南兵馬使太常卿趙公大食刀歌趙云此篇蓋柏梁體分為兩段上段十七句平聲於中又分六段下段十五句仄聲於中又分三段句云𤣥冬示我胡國刀則十二月師云按唐史大食刀本波斯地帶佩銀刀太常樓船聲嗷嘈漢武鑿昆明池始制樓船上建櫓櫓官有樓船將軍師云沈約賦聲嗷嘈而逺邁問兵刮寇趨下牢下牢楚地牧出令奔飛百艘牧州令令縣令牧出令奔同赴軍事艘船也劉備遣關羽乘船數百艘皆㑹於江陵猛蛟突獸紛騰逃趙云四句言趙太常以軍事為使乘大舟則可用樓船字矣公送李大夫赴廣州亦曰斧鉞下青冥樓船過洞庭聲嗷嘈則鳴鑼擊鼓枻之聲上牢下牢䕫已鼓下水關之名趨下牢以羌蠻之亂也所謂寇者止此矣羌連白蠻飛百艘應軍須之船船經山過故水蛟山獸猛突者亦驚逃矣白帝寒城駐錦袍華陽國志先主役吳於夷道還屯於巴東巴東治魚復縣公孫𫐠更名白帝章武中改日永安𤣥冬示我胡國刀壯士短衣頭虎毛莊子說劍庶人之劍蓬頭突鬢垂曼胡之纓短後之衣憑軒拔鞘天為高趙云白帝城公孫述所築述號白帝故謂白帝城在夔州東壯士短衣頭虎毛則拔鞘之人以虎頭為飾王仲宣登樓賦憑軒檻以遙望師云西京雜記漢高祖斬白蛇劒在室中光影猶照於外開匣拔鞘輒有風氣光彩射人翻風轉日木怒號氷翼雪淡傷哀猱趙云翻風轉日刀揮霍之勢張纘南征賦平湖夷暢翻光轉彩氷翼雪淡刀瑩薄嚴冷之狀莊子大塊噫氣其名為風是惟無作作則萬竅怒號風怒號風鼓之故也傷哀猱駭利刃之傷言及哀猱則因木而及之詩毋教猱升木鐫錯碧罌鸊鵜膏方言野鳬甚小好沒水中南楚人謂之鸊鵜爾雅注鸊鵜似鳬而小膏中瑩刀劍鋩鍔一云銛鋒已瑩虛秋濤王褒頌巧冶鑄干將將之朴水淬其鋒越砥斂其鍔注鋒刃芒端秋濤言色澄徹鵜趙云戴皓渡關山詩馬銜苜蓿葉劎瑩鸊膏鬼物撇捩辭坑壕蒼水使者捫赤絛搜神記秦時有人夜渡河見一人丈餘手橫刀而立叱之乃曰吾蒼水使者龍伯國人罷釣鼇趙云鬼物本隱藏於坑壕見刀乃撇捩而辭遁焉坑壕城下之所蒼水使者是刀之事今以比呈刀之人乃蒼水使者矣又吳越春秋載禹登衡嶽血白馬以祭夢見赤繡衣男子稱𤣥夷蒼水使者曰聞帝使文命于斯故來候之此又於楚地為切釣鼇列子湯問篇龍伯之國有大人一釣而連六鼇合負而趨歸其國焉以蒼水使者提刀而呈龍伯國人見之乃罷釣鼇而去又言刀之神也芮公回首顔色勞芮公荆南節度使分閫救世用賢豪趙云回首顔色勞望趙太常之來也傳閫外之事將軍制之芮公分天子之閫以救於世賢豪指趙也公後有王兵馬二角鷹詩又云荆南芮公得將軍亦如角鷹下翔雲可見芮公之欲得賢豪者矣趙公玉立高歌起攬環結佩相終始萬嵗持之護天子得君亂絲與君理隱四年傳衆仲曰以德和民不聞以亂以亂猶治絲而棼之漢龔遂曰治亂民猶治亂繩桓溫表抗節玉立誓不降辱豪趙云攬環結佩則莊嚴其服相終始則成就芮公用傑之意萬嵗持之奉天子則持此刀以奉天子乃相終始之事理亂絲有二事謝承後漢書方儲為郎中章帝使文郎居左武郎居右儲正住中曰臣文武兼備在所使用上嘉其材以繁亂絲付儲使理儲拔刀三斷之曰反經任勢臨時宜然北齊文宣帝神武第二子神武使諸子理亂絲帝抽刀軒之曰亂者必斬此刀事也舊注引左傳與刀事不相干蜀江如線針如水蜀水至瞿塘為峽所束如線荆岑彈丸心未已言有以一丸泥封大散關賊臣惡子休干紀史記亂臣賊子陸士衡誅鋤干紀魑魅魍魎徒為耳宣三年傳王孫滿曰昔夏之方有德也逺方圖物貢金九牧鑄鼎象物百物而為之備使民知神姦故民入川澤山林不逢不若魑魅魍魎莫能逢之注魑山神獸形魅怪物魍魎水神妖腰亂領敢欣喜用之不高亦不庳不似長劒須天倚師云此言趙公玉立高歌視蜀江如針線荆岑如彈丸其豪氣如此賊臣魑魅安所容哉杜田補遺余知荆楚故事曰襄王與唐勒景景差宋玉等游雲陽臺王曰能為大言者乎勒曰壯士怒兮絶天柱北斗戻兮泰山夷差曰狡士猛毅撼搖覆載鋸牙鋸雲聲其大吐舌萬里唾一世玉曰方地為輿圖天為蓋彎弓挂扶桑長劍倚天外王曰善趙云蜀江之小才如線而水才如針荆岑之地才如彈丸而不軌之心殊未休已故戒之休干紀也况此刀一用可以斬除之乎江如線針如水錯以成文高適云爭一彈丸之地魑魅魍魎比賊臣惡子腰領言所斬之處痺者卑也不高不庳則用之適宜吁嗟光祿英雄弭大食寶刀聊可比丹青宛轉麒麟裏光芒六合無泥滓趙云卿有九太常光祿為九列之首二職常兼領魏志常林徙光祿勳太常梁陸倕有為王光祿轉太常謝表則光祿又指趙兵馬使英雄弭言英雄弭止未振猶寶刀未用也丹青宛轉麒麟裏使建功圖畫於麒麟閣如趙充國之屬如是則光芒生於六合永滅妖氛斯為無泥滓矣王兵馬使二角鷹悲臺蕭瑟石巃嵩潘嶽西征賦巃嵸逼迫注巃嵩高大兒師云古詩人生百年內杳默歸悲臺哀壑杈丫浩呼洶師云古詩哀壑叩虛牝中有萬里之長江回風滔日孤光動師云薛道衡詩日照孤光蕩趙云荆南枕大江之上故爾角鷹翻倒壯士臂將軍玉帳軒翠氣師云潘嶽詩軍門挂玉帳乘杜田補遺楊子雲甘泉賦雲開而上下兮紛䝉籠以混曵紅彩之流離兮成揚翠氣之宛延師古曰宫室曠大自然有紅紫氣一本作軒昂氣理或然也武趙云玉帳將軍之帳李白亦使世有書曰玉帳經言事也帳之深邃含藴翠氣而壯士臂膺於前膺翻倒而軒開之二鷹猛腦絛徐墜師云張綽詩霜鶻猛目轉腦狡兔避空谷如愁胡視天地師云晉孫楚鷹賦深目娥眉壯似愁胡趙云舊本二鷹猛腦徐侯穟猛腦固言鷹之頭腦猛厲而徐候穟字殊無義理王介甫善本作絛徐墜於理或然徐墜晉潘尼苦雨賦始䝉瀎而徐墜終滂霈而難禁杉雞竹兔不自惜師云異物志杉雞黃冠青縷常在杉樹下又竹兔小如野兔常食竹葉溪虎野羊俱辟易唐書斐旻善射虎一日疊三十六頭見一老人曰此彪也前有真虎將軍遇之殆矣旻怒馬赴之果一小虎伏地而吼旻馬辟易弓矢墜地師云宜都山多虎穴在深溪同谷中南海志野羊成羣觸人里趙云項羽傳揚喜追羽羽叱之喜人馬俱驚辟易數師古曰辟易謂開張而易其本處辟頻亦反溪虎野羊俱辟易正自言虎羊見鷹畏懼而退縮韝上鋒稜十二翮鮑明逺昔如韝上鷹師云傳𤣥鷹賦徑翮二六機連體輕將軍勇鋭與之敵將軍樹勳起安西崑崙虞泉入馬蹄薛云楚詞回靈光於虞淵注虞淵日所入也虞泉乃虞淵唐高祖諱淵故云白羽曽肉三狻㹸白羽箭㹸師子敢决豈不與之齊師云應場詩戰士志敢决不趙云與之齊字禮記信婦德也一與之齊終身改魏文帝與吳質書吾德不及年與之齊荆南芮公得將軍亦如鷹角下翔雲云朔雲惡鳥飛飛啄金屋安得爾輩開其羣驅出六合梟鸞分趙云惡鳥飛飛啄金屋言可憎之惡鳥啄富貴家之屋當得角鷹之輩開破之故有梟鸞分之句江揔黃鵠飛飛逺又曰黃鳥飛飛有時度梁張辛望鳥飛飛滅金屋漢武帝曰阿嬌當以黃金屋貯之甘林捨舟越西岡謝靈運舍舟朓逈渚入林解我衣趙云史惟恐入山之不深入林之不密青芻適馬性好鳥知人歸晨光映逺岫陶替晨光熹微謝𤣥暉窗中列逺岫夕露見日晞趙云晞乾也選朝露待日晞詩見睍聿消遲暮少寢食趙云楚詞傷美人之遲暮語吾嘗終日不食終夜不寢清矌喜荆扉選詩豈徒暫清曠沈休文詩荆扉新且故言晚言不以寢食為嗜而喜所居之荆扉也經過倦俗態在野無所違試問甘藜藿莊子藜羹不糝游趙云阮籍詠懷詩趙李相經過謝叔源西池詩願言屢經過詩君子在野選豫甘藜藿未暇此食也舊注却改莊子藜羹字為藜藿誤矣未肯羡輕肥子路乘肥馬衣輕裘喧靜不同科出處各天機不同科三字語為力不同科莊子其嗜欲深者其天機淺師云古詩喧靜本性習注趙云天機雖三出莊子今所用則蚿曰豫動吾天機自然也即非所謂嗜欲深者天機淺之類矣勿矜朱門是郭景純朱門何足榮未若托蓬萊陋此白屋非明朝步鄰里長老可以依時危賦斂數脫粟為爾揮公孫𢎞食一肉脫粟飯師古曰才脫粟而已不精鑿也言民雖困賦斂猶能致意於賔客故曰可依相携行豆田秋花藹菲菲子實不得喫貨市送王畿盡添軍旅用迫此公家威主人長跪辭戎馬何時希我襄易悲傷屈指數賦圍勸其死王命慎莫逺奮飛趙曰子實不得喫言豆子雖結實長老者不得喫也主人又指長老詩不能奮飛雨行雲遞崇高易雲行雨明飛雨藹而至潺潺石間溜汩汩松上駛亢陽乘秋熱百榖皆已棄皇天德澤降燋卷有生意前雨傷卒暴今雨喜容易不可無雷霆間作鼓增氣趙云應璩與岑瑜書項者炎旱日更甚砂礫銷礫草木燋卷史勇夫增氣佳聲逹中宵所望時一至清霜九月天髣佛見滯穗郊扉及我私一云栽耕詩遂及我私我圃日蒼翠恨無抱甕力庶減臨江費子貢過漢隂見一丈夫方為圃畦鑿隧而入井抱甕而出灌田趙云顔延之贈王太常詩郊扉常晝閉及我私言公不必惑下句有我圃字而云一作栽耕也二我字不同義況七月豈栽耘時乎末句公自注分明義則恨不能抱甕如漢隂丈人以汲水乃買水於人斯為臨江之費矣鄭典設自施州歸趙云此篇兩段自上句至森踈之樂焉下則公言典設往謁裴施州意氣相投情分欵密且言其有簡册之樂焉下則公言嘗得裴之惠書又美裴能寫字自倒屣喜旋歸至庶脫蹉跌厄是一段言喜鄭典設之歸語行厯事喜聞太守之賢而公動往謁之懷當在孟冬乘轎而往吾憐滎陽秀冒暑初有適名賢慎出處不肯妄行役旅茲殊俗逺竟以屢空迫顔淵屢空南謁裴施州氣合無險僻攀援懸根木師云張華詩攀援得山行江揔賦岸山懸根登頓入天石師云謝莊詩疲人登頓怯又施州有連天石青山自一川城郭洗憂戚聽子話此邦令我心悅懌其俗則純朴不知有主客溫溫諸侯門禮亦如古昔勑厨倍常羞師云劉公幹詩供膳勑中厨謂省厨杯盤頗狼籍史滑稽傳舄舄交錯杯盤狼籍時雖屬喪亂事貴賞一作當匹敵師云曹祖詩萬里無匹敵中宵愜良㑹師云古詩今日宴良㑹裴鄭非逺戚師云張載詩與君未逺戚俗趙云殊俗字非詩序家殊瘦信云偏方殊俗公自中原來故指夔為殊俗攀援選何可攀援登頓選疲於登頓謝靈運過始寧墅詩山行窮登頓城郭洗憂戚下句言遂如至戚非特逺戚而已此親戚與憂戚字不同舊本正作賞匹敵非當音去聲言待匹敵之當也羣書一萬卷博涉供務隙他日辱銀鈎森疏見矛㦸薛夢符云北史李義深有當才而用心險峭時人語曰矛㦸森森李義深師云李隅詩筆落字有力矛㦸空縱橫詳杜田補遺世說裴令見鍾士季如觀武庫但見矛㦸觀是詩所謂矛㦸非心之險峭蓋言書之快利森森如矛㦸羣趙云言裴施州之藏書好學能書也劉向傳云博㦸書銀鈎索靖叙草書云婉若銀銀漂若驚鸞矛㦸字薛非是書苑歐陽詢尤工行書出於大令森然如武庫之矛㦸大令王羲之倒屣喜旋歸蔡雍倒屣迎王粲畫地求所厯乃聞風土質又重田疇闢刺史似寇恂列郡宜競惜見權宜借寇恂注畫趙云倒屣不上鞋踵地路溫舒畫地為獄議不入寇恂為潁川守百姓遮道日願從陛下復借寇君一年北風吹瘴癘羸老思散䇿師云王粲詩散䇿高堂上渚拂蒹葭塞一作寒嶠穿蘿蔦羃此身仗兒僕髙興潜有激孟冬方首路顔延年改服飾頭首路局險難強飯取崖壁歎爾疲駑駘汗溝血不赤師云崔駰賦顧駑駘而疲瘁兮何以堪其載馳古詩老馬難汗血終然傋外飾駕馭何所益我有平肩輿前途猶準的翩翩入鳥道師云江逌詩孤烟迷鳥道庶脫蹉跌厄師云古善哉行世路幾蹉跌秋趙云北風吹瘴癘至行世路幾蹉跌鄭典設歸在時公時散䇿遨遊拂渚穿嶠皆散䇿之地蒹葭塞舊本作寒非興有激亦思往謁裴施州故以孟冬為往期既以駑駘不可馭則乘轎而往肩輿轎也汗溝馬援銅馬相法曰汗溝欲深長漢書大宛國别邑七十餘城多善馬馬汗血言其先天馬子也鳥道南中八志曰交趾郡治龍編縣自興古鳥道四百里蓋以其險絶獸猶無蹊人所莫由特上有飛鳥之道耳梁沈約愍塗賦依人邉以知國極鳥道以瞻家庶脫蹉跌厄乘肩輿而不騎駑駘自免蹉跎困跌之厄種萵苣并序既雨已秋堂下理小畦隔種一兩席許萵苣向二旬矣而苣不甲坼伊人見青青趙云别本伊人作獨野是傷時君子或晚得微祿轗軻不進因作此詩趙云舊本萵苣作萎苣必誤蓋詩中言藝其子豈却言萎苣耳隂陽一錯亂驕蹇不復理師云蔡雍詩苦熱氣矯蹇枯旱於其中師云晉江統枯旱之思雨露炎方慘如燬師云王室如燬鄭注如燬謂醋烈也植物半蹉跎嘉生將已矣趙曰漢書嘉生之類注専指為禾曹植書民失嘉生雲雷歘奔命師伯集所使趙云雲雷易雲雷屯史雨師灑道風伯掃塵指麾赤白日澒洞青光起趙云指麾赤白日言赤日或言白日足矣而曰赤白日蓋云赤然之白日也淮南子未有天地之時濛鴻澒動莫知其門則澒洞者氣昏兒青光起則白日赤色變為青光斯雨候矣雨聲先已風散足盡西靡趙云謝眺詩森森散雨足風從東南來所以西靡也皇覽東平思王冢在無鹽人傳言王在國思歸京師後葬其冢上松柏皆西靡言盡者亦皆義矣或者引選望成陽而西靡語意不盡山泉落滄江霹靂猶在耳終朝紆颯沓信宿罷蕭灑堂下可以畦呼童對經始苣兮蔬之常隨事蓻其子破塊數席間增添鹽鐡論周公之時風不鳴條雨不破塊荷鋤功易止兩旬不甲坼空惜埋泥滓趙云言初無畦而始經營之詩經始勿亟蓻者種也隨所有事而種之蓋其有事於蔬茹故也易百榖草木皆甲坼選奮迅泥滓野莧迷汝來宗生實於此師云張平子南都賦宗生高岡豐杜田補遺楊子雲蜀都賦其竹則宗生族攢俊茂美左思吳都賦楠榴之木相思之樹宗生髙岡族茂幽阜而趙云迷漫於苣也苣有兩種有苦苣甜苣苦苣易生甜苣比之難生公於前篇園公送菜詩以苦苣掩乎嘉蔬而罪之云乃知苦苣輩傾奪蕙草根今於甜苣此下四句則罪野莧之掩乎苣此輩豈無秋亦䝉寒露委翻然出地速滋蔓户庭毁師云左傳無使滋蔓蔓難圖也因知邪干正掩抑至沒齒趙云此輩指野莧論語飯蔬食飲水沒齒無怨言賢良雖得祿守道不封已趙云言賢良之人得位不似邪侫得位而封已亦猶嘉蔬之苣出地不滋非似野莧得地滋蔓也封己國語叔向曰引黨以封已韋昭注曰封厚也李蕭逺運命論孔子之孫子思希聖備體而未之至封巳養高勢動人主擁塞敗芝蘭衆多盛荆杞中園陷蕭艾老圃永為耻趙云中園字選詩蓬蒿滿中園老圃字語吾不如老圃登于白玉盤漢官儀封禪壇有白玉盤藉以如霞綺趙云如霞綺言藉之之綺如霞也古人每言綺饌蓋貴家以綿綺藉食謝𤣥暉詩餘霞散成綺惟珍貴苣之故則所登者玉盤所藉者霞綺矣莧也無所施胡顔入筐篚趙云曹子建表犯詩人胡顔之戒李善注胡何也即詩胡不遄死之義毛萇曰何顔而不速死殷仲文表亦胡顔之厚詩筐篚幣帛以將其厚意采采卷耳不盈頃筐秋風二首秋風淅淅吹巫山上牢下牢修水關上牢下牢峽內地名水關關津吳檣楚柂牽百丈暖向神都寒未還趙云謝惠連詩淅淅振條風公嘗曰淅淅風生砌江至吳楚用帆矣在夔州則吳船之檣楚船之柂猶用百丈牽以上水也神都神明之都言吳楚也吳都賦伊兹都之函洪傾神州而韞櫝要路何日罷長㦸戰自青羌連百蠻中巴不曽消息好瞑傳戍鼓長雲間趙云要路言往吳楚之要路其荆渚之間有羌蠻之戰則要路長㦸滿矣舊本連百蠻師民瞻作白蠻是蓋雋州西有烏蠻白蠻公夔府詠懷云絶塞烏蠻北右一秋風淅淅吹我衣東流之外西日微天清小城搗練急師云鮑照詩寒城搗素練石古細路行人稀趙云前篇言䕫人征戍戰伐之苦今篇自叙其旅泊不歸之懷東流之外西日微寫眼前之景宛轉含蓄道不盡凄感之意不知明月為誰好早晚孤帆他夜歸㑹將白髮倚庭樹故園池臺今是非趙云倚庭樹倚長安故居庭樹既是隔絶池臺有變易之理又問其今是與非右二久雨期王將軍不至趙云此篇自上句至人生㑹面難再得言久雨王將軍不至叙眼前之景自憶爾腰下鐡絲箭至十月荆南風怒號紀贈王將軍英勇天一作山雨蕭蕭滯一作帶茅屋空山無以慰幽獨鋭頭將軍來何遲白起頭小而鋭令我心中苦不足數看黃霧亂𤣥雲時聽嚴風折喬木泉源泠泠雜猿狖泥濘漠漠飢鴻鵠嵗暮窮隂耿未已人生㑹面難再得趙云幽獨楚辭幽獨處乎山中謝靈運晚出西射堂詩安排徒空言幽獨賴鳴琴鋭頭將軍以白起比王君王豈亦頭小而鋭耶史汝來何遲遲古詩有㑹靣安可知李延年歌佳人難再得憶爾腰下鐡絲箭師云阮瑀詩箭紐鐡絲剛刀插銀刀白射殺林中雪色鹿師云陸雲詩仁鹿幾千年皮毛如霜雪前者坐皮因問毛知子厯險人馬勞異獸如飛星宿落應弦不礙蒼山高師云顔延年賦野鴈應弦而墮落安得突騎只五千崒然睂骨皆爾曹走平亂世相催促一豁明主正鬱陶憶一作恨昔范增碎玊斗鴻門之會漢王使張良獻玉斗於范增增碎之未使吾兵著白袍師云侯景命東吳兵盡著白袍自為營陳昏昏閶闔閉氛䘲時賊據京師十月荆南雷怒號趙云白袍南史梁人陳慶之麾下悉著白袍所向披靡先是洛中謡曰名軍大將莫自勞千兵萬馬避白袍蓋江左事也豈吳楚之間有戰伐事乎公詩前篇自青青羌連白蠻而編年通載大厯二年九月桂州山獠反皆南方事惜不可詳考閶闔吳閶闔門時京師晏然十月雷實記其變别李祕書始興寺所居不見祕書心若失及見祕書失心疾安為動主理信然師云與老子靜為躁君同義我獨覺子神充實師云相法曰目精晃朗形神充實者主壽不死所趙云詩未見君子既見君子之義心若失者心若有遺失是謂心疾藝文類聚載俗說阮光祿大兒喪哀過遂得失心病此心若失之失列子若亡若失左傳昭二十二年楚王有心疾謝眺怨情故人心尚爾故心人不見安為動主義以祕書之能安以主動故其人充實豈亦通佛法之妙而然乎重聞西方正觀經佛西方之教其法有大觀大覺老自古寺風冷冷妻兒待來且歸去他日杖藜來細聽杜田補遺西方無量壽西方韋提希及未來世一切衆生觀於西方極樂世界以佛力故當得見彼清淨國土如執明鏡自見靣像凡十六觀日想為初觀水想為第二觀地想為第三觀樹想為第四觀八功德水想為第五觀揔觀想為第六觀花座想為第七觀像想為第八觀遍觀一切色想為第九觀觀世音菩薩真實色聲想為第十觀大勢至菩薩色身想為第十一觀音觀想為第十二觀雜觀想為第十三觀上品生想為第十四觀中品生想為第十五觀下品生想為第十六觀作是觀者名為正觀若他觀者名為邪觀縳雞行小奴縳雞向市賣雞被縳急相喧爭家中厭雞食蟲蟻師云陶侃詩山雞啄蟲蟻不知雞賣還遭烹蟲雞於人何厚薄師云此孟子見牛未見羊同意吾叱奴人解其縳師云許子靣縳銜壁以見楚王楚王命解其縳雞蟲得失無了時注目寒江倚山閣師云古詩千里勞注目趙云縳急字吕布既降曹操曰今日已往天下定矣顧劉備曰元德卿為坐上客我為降虜繩縳我急獨不可一言邪操笑曰縳虎不得不急一篇之妙在乎落句蓋雞之所以得者蟲之所以失人之所以得者雞之所以失人之得失如雞蟲又且相仍何時而已乎注目寒江倚山閣則所思深矣黃魯直深達詩㫖其書酺池寺書堂云小黠大癡螳捕蟬有餘不足䕫憐蚿退食歸來北忩夢一江風月趂漁船可與言詩者常自解也步里客談云古人作詩斷句輒傍入他意最為驚䇿如老杜云雞蟲得失無了時注目寒江倚山閣是也黃魯直作水仙花詩亦用此體云坐對真成被花惱出門一笑大江橫至陳無已云李杜齊名吾豈敢晚風無樹不鳴蟬則直不類矣負薪行峽民男為商女當門户坐肆於市㕓擔負於道路者皆婦人也䕫州處女髮半華四十五十無夫家更遭喪亂嫁不售一生抱恨堪咨嗟土風坐男使女立應當門戶女出入十有八九負薪歸賣薪得錢當供給至老雙環只垂頸野花山葉銀叉並筋力登危集市門師云史記刺繡文不如倚市門趙云孫子曰去如處女敵人開戶語四十五十而無聞焉陸機詩土風清且嘉晉傳𤣥豫章行男兒當門戶墮地自生神海賦狐􅙱登危而雍容今公詩怪巫山之女粗醜而昭君獨美似後篇士無英俊而屈原獨竒也死生射利兼鹽井䕫有鹽井師云班彪乘時射利商人之功面粧首飾雜啼㾗地褊衣寒困石根師云仲炯詩蒼烟逺石根若道巫山女粗醜何得此一作北有昭君村昭君村在神女廟下薛云歸州圖經王嬙字昭君漢紀注云南康秭歸人待詔掖庭元帝竟寧元年胸奴呼韓邪單于來朝帝賜單于王嬙為胸奴閼氏按樂府解題云帝後宫多使畫工圖形按圖召幸宫人皆賄畫工昭君持貌獨不與乃惡圖之後胸奴入朝選美人配之昭君當行入辭光彩射人悚動左右天子重失信外國恨不及朝窮按其事畫工杜陵毛延壽等皆棄市琴操載昭君王穰女端正間麗年十七獻之元帝以地逺不幸備後宫積五年年帝每遊後宫昭君常怨不幸後單于朝賀帝晏之盡召後宫昭君乃盛飾而至帝問欲以一女賜單于誰能行者昭君越席請往時單于使在旁帝驚恨不及昭君至單于大恱遣使報送白玉一雙駿馬一十匹胡地至寶之物昭君恨帝始不見遇乃作怨思之歌曰梨葉萋萋其葉黃有鳥處此集于芭桑父兮母兮道路修長鳴呼哀哉憂心惻傷單于既死子達立昭君謂達曰將為漢將為胡曰將為胡於是昭君伏毒而死單于葬之胡中多白草而冢獨青辭人為歌弔之鄉人思之為之立廟廟有大柏圍六丈五尺枝葉蓊鬱出故臺之上及有搗練石在廟側溪中今香溪也廟屬巫山縣樂府與琴操不同故並載之最能行峽中丈夫絶輕死少在公門多在水富豪有錢駕大舸貧窮取給行艓子杜田補遺博雅曰舸舟也揚雄方言南楚江湖湘凡船大者謂之舸艓小舟名音葉言輕如小葉切韻玉篇並不載牒字小兒學問止論語大兒結束隨商旅欹帆側柂入波濤撇漩捎濆無險阻撇漩捎濆皆操舟者所能朝發白帝暮江陵頃來目擊信有徴瞿塘漫天虎鬚一作眼怒歸州長年行最能峽人以操舟人為長年此鄉之人氣量窄誤競南風疏北客左傳南風不競若道士無英俊才何得山有屈原宅屈原有宅歸州縣杜田補遺後漢郡國志秭歸注荆州記秭歸北百里有屈原故宅方七頃纍石為屈基今其地名樂平乘趙云撇字使王褒四子講德論膺騰撇波而濟不如舟之逸也甘泉賦乘輿之出曰捎夔魖而扶獝狂孔子見溫伯雪子目擊道存蓋事觸我目謂之目擊左傳君子之言信而有徴行最能言行瞿塘峽與虎鬚灘甚易也北客公自言屈原宅杜田引郡國志注謂地方七頃豈并以其左右之田言之乎舊注云峽人富則為商旅貧則為人操舟以地居山水之間瘠惡無耕也也寄裴施州廊廟之具裴施州潘安仁器非廊廟姿宿昔一逢無此流金鍾大鏞在東序薛云詩鼖鼓維鏞大鏞曰鏞書曰天球河圖在東序鍾鏞以言至和所自出東陽位也氷壺玉鑑懸清秋薛云鮑照詩清如玉壺氷書在璇璣玉衡以齊七政玉衡正天文之器以比裴君具趙云廊廟之具字公再使矣前云當今廊廟具謂之若所謂猶含揀梁具今使金鍾大鏞在東序則亦取國家大器比裴君之重氷壺玉衡二物清瑩比裴君之清懸清秋又當氣象之爽時其清尤甚自從相遇感多病三嵗為客寬邉愁堯有四嶽明至理漢二千石真分憂漢宣帝與我共理者惟良二千石乎趙云公言其在邉地為客以裴君為政三年於施可寬吾之愁也四嶽書四嶽九官十二牧至理字列子均天下之至理張湛注事物皆均則理無不至郭象莊子注至理盡於自得王康琚反招隱詩矯性識至理二千石漢百官公卿表郡守秦官掌治其郡秩二千石幾度寄書白鹽北苦寒贈我青羔一作絲裘師云小說劉向作彈碁以獻成帝帝說賜青羔裘霜雪回光避錦袖龍蛇動篋蟠銀鈎趙云白鹽䕫中州山公居白鹽之北裴君寄書與公也霜回光言其裘龍蛇銀鈎言其書銀鈎字索靖言書曰婉若銀鈎青羔裘舊本一作青絲裘非蓋以青羔之皮為身而以錦為䄂記羔裘𤣥冠不以弔夫羔裘貴矣青羔裘尤異也霜雪回光而避之言寒不能侵紫衣使者辭復命再拜故人謝佳政將老已失子孫憂後來況接才華盛趙云紫衣使者所差來之人辭復命舊本作辟復命無義師民瞻作辭方有義也才華盛應言裴君諸子蓋云雖雖將老而免憂子孫以後人相接有裴君諸子才華盛美也奉酬薛十二丈判官見贈趙云此篇極難解姑以意逆之似是公泊船處一美士文采風流有司馬相如挑卓氏之作公見其人又見有搜求其人而去者佳士豈薛文子弟親戚乎故及丈人安坐之語且言國家輕刑以寬之又言此士俊乂以勉之嘗觀太平廣記載嚴武一事云武少時任俠于京城與一軍使鄰居軍使有室女容色艷絶武窺見乃誘至宅月餘遂竊以逃東出關將匿於淮泗間軍使覺窮其跡亦訊其家人乃暴於官亦以上聞有詔遣萬年縣官捕捉乘遞驛行數日隨路已得其踪武自鞏縣方雇船下聞制使至懼不免乃以酒飲女中夜乘其醉解琵琶絃縊殺之沈于河明日使至搜武之船無踪乃已公詩意有類於此當俟博聞忽忽峽中睡悲風方一醉西來有好鳥為我下青冥羽毛淨白雪慘淡飛雲汀既䝉主人顧舉翮唳孤亭持以比佳士及此慰楊舲趙云後漢忽忽不樂曹子建公宴詩好鳥鳴高枝楚辭據青𡨕而攄虹晉道一道人之言雪曰先集其慘淡也主人顧在好鳥言之主人者公也若以比佳士言之則主人者豈郡刺史之徒邪及此慰揚舲則逢佳士見好鳥可以比之為能慰公欲揚舟而下者矣劉協彌勒石像碑似揚舲遊水馳錫登山清文動哀玉見道發新硎莊子庖丁之刀刃若新發於硎趙云上言佳士文清如玉聲之哀蓋環佩之類下句言佳士之才敏欲學鴟夷子貨殖傳范蠡浮江湖改姓適齊為鴟夷子注顔師古曰自號鴟夷者言若盛酒之鴟夷多所容受可卷懷於時張弛陳遵傳曰自用如此不如鴟夷待勒燕山銘竇憲勒功燕然山班固為之銘趙云范蠡號鴟夷子小說載其以西子而去李賀昌谷詩刺促成幾人好學鴟夷子用杜公今句四字也蓋問佳士者以擬欲學范蠡載西子游五湖乎莫待如竇固立功勒銘乎誰重斷蛇劒一云口重斬蛇劒漢高祖有斬蛇劒致君君未聼志在麒麟閣見今代麒麟閣注無心雲毋屏後漢鄭𢎞為太尉時舉將第倫倫為司空班次在下正朔朝見𢎞曲躬自卑上遂聼置雲母屏風分隔其間由此為故事趙云兩句皆是建功立名事舊本正作斬蛇劒乃漢高祖事不可在常人言之卓氏近新寡豪家朱門扄相如才調逸銀漢會雙星司馬相如初遊臨卭富人卓氏女文君新寡善琴相如因以琴心挑之遂為夫婦客來洗粉黛日暮拾流雲不是無膏火勸郎勤六經老夫自汲澗野水日泠泠我嘆黑頭白君看銀印青見上露雨銀章澀注卧病識山鬼九章有山鬼為農知地形誰矜坐錦帳漢百官志郎官給錦帳苦厭食魚腥趙云公又述其瀼西山居之事黑頭白公之自傷銀印青則佳士也銀印言青蓋金銀之色晃耀望之有青熒之光公於是言其卧病為農錦帳何足矜乎給錦帳公為工部貟外郎故云謝𤣥暉在床卧病呈沈黨詩前漢楊惲與孫㑹宗書曰長為農夫沒此身矣以在䕫楚故用山鬼字孫子有地形篇食魚腥又在䕫之事東南兩岸圻積水注滄溟碧色忽一云苦惆悵風雷搜百靈見滋山朝百靈注空中石一云有白虎赤節引娉婷自云帝里一云季女文選我天帝之季女噀雨鳯凰翎玊帝女乘鳯凰飛去襄王薄行跡莫學泠如丁丁令威也去家一千年始一歸千秋一拭淚夢覺有微馨見宋玉高唐賦并神女賦人生相感動金石兩青熒李廣射石虎沒羽楊子雲至誠則金石為開選賦琳珉青熒兩趙云十四句忽有搜求其如卓氏之人而去者東南岸折橫水注滄溟必佳士者之在舟中而公有揚舲之行泊船江邉故道岸坼水注之景緣風雷搜百靈故水之碧色亦為之惆悵娉婷指如卓氏之人曰虎赤節以狀來搜求者帝里女必京師人家之女一作帝季女則是王家之女矣噀雨字取暮為行雨欒巴噀酒為雨字言之鳯凰翎弄玉與蕭史騎鳯而仙事以巫山神女及秦公主弄玉比如卓氏之人可以意逆之為貴家女矣張景陽雜詩房櫳無行迹江文通擬張華詩蘭徑少行迹泠如丁字俗語泠丁丁字地蓋匠者之丁其初出火頃刻之熱巳則沉泠矣或者謂言丁令威歸家為沉泠又齊諧記載桂陽城武丁者有仙道忽謂其弟曰七日渡河織女諸仙悉還宫吾已已被召弟問何當還日吾更後三千年當還耳明日失丁所在兩事皆久去而後歸為沉泠者如此又託為卓氏之人之怨辭襄王行跡薄又囑之以莫如丁之沈泠也以襄王語所謂佳士者又自比神女以成噀雨之義丈人但安坐休辨渭與涇龍蛇尚格鬪灑血暗郊垧吾聞聰明主治國用輕刑銷兵鑄農器今古嵗方寧文王日儉德俊乂始盈庭詩濟濟多士文王以寧榮華貴少壯豈食楚江萍楚昭王渡江得一物大如斗色赤以問孔子曰此萍實也趙云丈人指薛丈但安生古相逢行丈人且坐坐調弦未選央江萍事楚王渡江有物觸船問之孔子云萍實也以孺子之歌告王曰楚王渡江得萍實大如斗赤如玉割而食之甜如蜜今言豈食楚江萍則佳士者豈非留滯於䕫而公言其因此脫去者乎輕刑周禮刑新國用輕典公題鄭十八著作虔詩亦云也霑新國用輕刑可見慰唁佳公子之於刑亦輕而已嵗方寧翻使國語晉無寧嵗言今古嵗方寧如言遭遇寧嵗前無古後無今以甚幸之也詩發言盈庭暇日小園散病將種秋菜督勒耕牛兼書觸目不愛入州府畏人嫌我真襄陽耆舊記龎德公在沔水上不入襄陽城及乎歸茅宇一云及歸在茅屋旁舍未曾嗔老病忌拘束應接喪精神江村意自放林木心所欣趙云真則真率之謂平時應接以禮文蓋僞耳漢書高祖適從旁舍來前漢以老病乞骸骨世說使人應接不暇秋耕腴地濕山雨近甚勻冬菁飯之半牛力晚來新杜田補遺張平子南都賦酸甜滋味百種千名春邜夏筍秋韭冬菁蘇蔱紫薑拂撤羶腥注菁蔓菁深耕種數畝未甚後四鄰嘉蔬既不一名數頗具陳荆巫非苦寒採擷接青春趙云飯之半以冬菁飯牛是其芻之半也史記寧戚飯牛於車下力言新黃石公三略士力日新飛來兩白鶴暮啄泥中芹雄者左翮垂損傷巳露一云及筋一步再血流尚經一作驚矰繳勤三步六號呌志屈悲哀頻鸞皇不相待側頸訴高旻杖藜俯沙渚為汝鼻酸辛趙云十二句序所謂書觸目也然因以興焉飛來兩白靍古樂府有篇篇公三使矣舊本正作尚經矰繳勤經一作驚當以驚為正言既傷而流血矣尚於矰繳恐之勤勞也鸞皇不相待鸞皇超擢高翔之人訴高名靍豈不能冲天哉而困於此阮嗣宗詠懷對酒不能言悽愴懷酸辛宋玉賦寒心酸鼻寫懷二首趙云前篇不管世態之曲直次篇願終契於真如傷世悼俗甚矣勞生共乾坤何處異風俗冉冉自趨競行行見羈束趙云古樂府陌上桑盈盈公府步冉冉幕中趨古詩行行重行行無貴賤不悲無富貧亦足萬古一骸骨鄰家遞歌哭鄙夫到巫峽三嵗如轉燭趙云賤之所悲以貴形之無貴則賤者不悲貧之所不足以富形之無富則貧者亦足巫峽在䕫州下公以永泰元年嵗乙巳到雲安蓋屬䕫州次年來䕫今年又在䕫此之謂三嵗轉轉燭全命甘留滯忘情任榮辱朝班及暮齒日給還脫粟編蓬石城東采藥山北谷許徵君詢詩採藥白雲隈聊以肆所養編蓬茅屋也公後篇瞿塘石城草蕭瑟用心霜雪間不必條蔓緑趙云公嘗為左拾遺今為尚書工部貟外郎乃通籍於朝班者時年五十六所謂暮齒二者當奉養之原而日給還脫粟飯而已編蓬言結茅屋於瀼西兩以成成採藥之意言冬採之不必待春也非關故安排謝靈運詩居常以待終處順故安排曽是順幽獨謝靈運詩安排徒空言幽獨賴鳴琴達士如弦直小人似鈎曲曲直吾不知負喧候樵牧趙云莊子安排去化乃入於寥天一後漢童謡直如弦死道邉曲如鈎封公候公變用之負喧列子朱揚萹宋國有田夫常衣緼以過冬暨春冬作自曝於日不知天下之有廣厦隩室綿纊狐狢謂其妻曰負日之暄人莫知者又一夜深坐南軒明月照我膝驚風翻河漢梁棟巳出日洛神賦若白日之照屋梁羣生各一宿飛動自儔匹吾亦驅其兒營營為私實趙云實一作室非天寒行旅稀嵗暮日月疾榮名何一作或中人楚辭云薄寒中人世亂如蟣蝨趙云世之紛亂如蟣蝨之營營也或字非古者三皇前滿腹志願畢胡為有結繩陷此膠與漆禍首燧人氏厲階董狐筆燧人火化而爭欲之心生董狐直筆而是非之端起故以燧人為禍首以董狐為厲階詩婦有長舌為厲之階君看燈燭張轉使飛蛾密放神八極外俯仰俱蕭瑟終契如往還一云終然契真如得匪合一云金仙術趙云莊子鼹鼠飲河不過滿腹三皇之前民未有知結繩之政後民僞日起其相附離若膠漆然莊子曰待繩約膠漆而固者是侵其德也又曰又奚連連如膝漆纒索而游乎道德之間哉今將與之結繩則巳相結約而為膠漆矣君看燈燭張轉使飛蛾密又傷法令之苛明而投死之多也此段蓋莊子駢拇及馬蹄萹之義以撓天下又曰屈折禮樂以正天下之形此亦聖人之過也傷世如此於是放神八極之外而一俯一仰仰莫不氣象蕭瑟則淳澆朴散無處不然也然則如何而可亦曰終然矣真如者西方佛教而已舊本正作終契如往還於義不明術師云北齊邢子才游仙詩安得金仙兩腋生羽翼可歎天上浮雲如白衣斯須改變如蒼狗古往今來共一時人生萬事無不有近者抉眼去其夫一作眯河東女兒身姓桞丈夫正色動引經鄷城客子王季友羣書萬卷常暗誦孝經一通看在手貧窮老瘐家賣履好事就之為携酒趙云浮變態不常然初白衣而變為蒼狗事之無無定如此譬古今一時而萬事之變不可名狀也雲如狗北史元諧傳雲如蹲狗去鹿古往今來傳曰四方上下曰宇古往今來曰宙萬事無不有應詹與陶侃書其間事故何所不有事變無所不有何哉夫婦之際貴有始終在兒女言之有姓桞者不喜見其夫如抉眼中之物而去之東北人方言不喜見者每日抉眼一作抉眯非是人之動作貴乎有義在丈夫言之有王季友者能正色引經兩事一是一非此萬事無不有也王季友唐文粹唯載其詩觀前萹所云則王佐之才者劉向博極羣書梁孝元帝敗焚圈書十四萬卷日讀書萬卷猶有今日一通一本之謂後漢賈逵傳帝令逵自選髙才者教以左氏與簡紙經傳各一通在手字詩六㘘在手許靖傳五侯九伯制御在手携酒暗使揚雄傳好事者載酒肴從游學豫章太守髙帝孫引為賔客敬頗久聞道三年未曾語小心恐懼閉其口太守得之更不疑人生反覆看亦醜趙云紀述季友且言其逢主人李太守二人皆王佐才下句言人生相得氣合則勿疑若更反覆旁人看之亦醜矣北史盧賁傳帝言劉昉之徒皆反覆子明月無瑕豈容易師云淮南子明子之珠不能無類紫氣鬱鬱猶衝斗見三十六卷劉十判官詩張華事璧與劒皆以比季友時危可伏真豪俊二人得置君側否趙云珠璧皆有明月之稱在玉謂之無暇在珠謂之無類舊注非豈容易言難得之東方朔談何容易紫氣鄷城劒也太守頃者領山南邦人思之比父母王生早曽拜顔色高山之外皆培塿左太冲魏都賦培塿之與方壺培塿小堆阜杜田補遺左氏傳部婁無杜柏杜預注部婁小阜說文培塿小土山方言曰冡秦晉間謂之培塿俗趙云王生之拜太守顔今齊魯間山之小高者名培塿仰趙云王生之拜太守顔色如高山餘人真培塿也用為羲和天為成用為水土地為厚王也論道阻江湖李也丞疑曠前後死為星辰終不滅見方朔為嵗星注致君堯舜焉肯朽杜田補遺夏侯注東方朔畫贊序談者又以先生棄俗登仙神變造化靈為星辰此又是竒怪恍愡不可偹論者也莊子曰傳說得之以相武丁乘東維騎箕尾而比於列星天趙云堯典分命羲叔和叔羲仲和仲以主四時故曰為成書地平天成堯典又曰伯禹作司空汝平水土故曰地為厚此并言二公蓋論道言其可為三公書三公論道經邦考工記坐而論道謂之王公丞疑言其可為宰相傳左輔右弼前疑後丞阻江湖留滯江湖而阻隔於致身曠前後天子前後曠闕斯人也死為星辰事杜時可論亦是一端矣素問黃帝謂岐伯願夫子溢志盡言其事令終不滅致君堯舜見首萹注吾輩碌碌飽飯行風后力牧長回首風后力牧黃帝臣言杜田補遺陶淵明集聖賢羣輔録風后受金法金法能决理是非力牧受準與天老五星知命窺紀地典為黃帝七輔州選舉翼佐帝德見論語摘輔象又帝王世紀黃帝夢大風吹天下塵垢皆去復夢人執千鈞之弩驅羊數萬羣帝嘆曰風大號令垢去土后在也豈有姓風名后者哉千鈞之弩異力能逺驅羊萬羣牧民為善豈有姓力名牧者哉乃得風后于海隅力牧於大澤趙云自謂其不逮二公徒飽飯而巳風后力牧黃帝七輔之二人名長回首則有笑吾輩飽飯之意以形容二公可為宰輔當如風后力牧觀公孫大娘弟子舞劒器行并序大厯二年十月十九日夔府别駕元持宅見臨穎李十二娘舞劒器壯其蔚跋問其所師曰余公孫大娘弟子也開元三載余尚童稚記於郾城觀公孫氏舞劒器渾脫瀏灕頓挫獨出冠時自高頭宜春黎園二伎坊內人洎外供奉曉是舞者聖文神武皇帝初公孫一人而巳玊貌錦衣況余白首今茲弟子亦匪盛顔既辨其由來知波瀾莫二撫事慷慨聊為劔器往行者吳人張旭善草書帖數嘗於鄴縣見公孫大娘舞西河劔器自此草書常進豪蕩感激即公孫可知矣趙云郾城潁州屬縣時乙卯開元三年公方四嵗吕汲公疑其誤次公有說具紀年編次昔有佳人公孫氏一舞劒器動四方觀者如山色沮喪天地為之久低昂趙云觀者如山倣禮記矍相之射觀者如堵天地為之低昂效李陵書天地為陵震動􅀈如羿射九日落堯時十日並出堯令羿射中九日日烏皆死墮其羽翼矯如羣帝驂龍翔師云夏候𤣥賦又如東方羣帝兮騰龍駕而翺翔來如雷霆將震怒罷如江海凝清光趙云四句狀舞劒器之妙勢如成都尹鄭公堂狀騎士揚旗之作回回偃飛蓋習習迸流星來纆風颷急去擘山嶽傾驂龍晉劉琬神龍賦惟天神龍上帝之馬詩如震如怒選詩秋月懸清光綘脣珠袖兩寂寞蕪城賦玉兒經脣趙云序使玉兒詩使綘脣鮑照蕪城賦有蕙心紈質玉貌綘屑珠䄂序所謂玉貌錦衣亦是矣兩寂寞言公孫大娘巳死晚有弟子傳芬芳臨潁美人在白帝李十二娘妙舞此曲神揚揚與余問答既有以感時撫事增惋傷先帝侍女八千人公孫劔器初第一五十年間似反掌風塵傾動昏王室趙云指言祿山之亂也梨園弟子散如煙薛云唐書志元知既知音律又酷愛法曲選坐部伎子弟三百教於梨園號皇帝梨園子弟宫女數百亦為梨園弟子居宜春北苑趙云祿山亂梨園弟子皆流散晉陸機隴西行我靜如鏡民動如煙或謂録異記載哉王夫差女曰玉私悅韓重許為之妻事不諧而死後冥與重命王欲致重之罪玉見身於王夫人出而抱之正如煙焉遂公用此事其說迃梨園弟子如李龜年輩豈止女人乎女樂餘姿映寒日趙云指言李十二娘又冬月見之也金粟堆南木巳拱江淹恨賦拱木斂魂趙云金粟堆在長安明皇泰陵北唐舊紀𤣥宗親拜五陵至睿宗橋陵見金粟山岡有龍盤鳯翥之勢謂侍臣曰吾千秋萬嵗後宜葬此暨升遐羣臣遵先㫖焉今云金粟堆南懷想泰陵也公觀曹將軍畫馬圖詩又曰金粟堆南松柏裏龍媒去盡嗚呼風亦言泰陵木拱左傳晉公謂蹇叔曰爾墓之木拱矣瞿塘石城草蕭瑟趙云歎與李十二娘俱在䕫也玳筵急管曲復終薛云按古樂府今日樂相樂行綺殿文雅遒玳筵歡趣密又曰歌朱脣變動神舉洛陽少童邯鄲女古稱渌水今白紵催絃急管為君舞樂急哀來月東出老夫不知其所往足繭荒山轉愁疾趙云言其去留未定徒足繭荒山耳足㫝如繭所謂重趼纍璽是巳師云淮南子楚欲攻宋墨子聞之自魯而趨十日十夜足重繭而不休息至於郢虎牙行虎牙灘名嶮絶蕭銑僣江陵屯兵於此鮑云虎牙山名盛引之荆州記郡西泝江六十里南岸有山名荆名北岸有山名虎牙二山相對楚西塞也秋風歘吸吹南國天地慘慘無顔色趙云秋風師民瞻本作北風是蓋下皆冬意江文通雜擬歘吸鵾雞悲注猶俄頃也今公用於風則謝眺和蕭子良高松賦卷風飇之歘吸積霰雪之巖皚慘慘無顔色展用登樓賦天慘慘而無色洞庭揚波江漢回師云楚詞洞庭波兮木葉下虎牙銅柱皆傾側虎牙銅柱並灘名巫峽陰岑朔漠風峰巒窈窕溪谷黑杜田補遺是詩以秋風吹南國而洞庭揚波以回江漢故銅柱及虎牙山皆傾側虎牙乃山非灘郭璞江賦虎牙嵥𥪡以屹崒荆門鬪竦而盤薄注虎牙荆門二山夾岸相對江流其中後漢光武紀田戎任滿據荆門在在南上合下開其狀似門虎牙山在北石壁色紅間有白文類牙二山楚西塞在峽州夷陵縣東南地趙云洞庭江漢虎牙銅柱巫峽雖相去逺皆南國之詩溜滔江漢南國之紀今冬矣以風吹之故其流回轉舊注以為二灘名不知虎牙乃山又不知銅柱山之所在杜田謂銅柱虎山皆山矣按銅柱灘名虎牙山名酈道元注水經江水又東徑漢平二百餘里左自涪陵東出百餘里而屇於橫石東為銅柱灘在今涪陵之下水經正經曰江水又東厯荆門虎牙之門虎牙山又在銅柱灘下今以風吹故山與灘勢皆傾倒巫峽雖在南方以風寒故成陰岑而如朔漠之氣杜鵑不來猿狖寒山鬼幽憂雪霜逼楚九歌有山鬼詩深趙云冬時近春杜鵑亦可以來以風寒故藏而不來杜鵑猿狖山鬼皆南國之物楚老長嗟憶炎瘴三尺角弓兩斛力壁立石城橫塞起金錯旌竿滿雲直趙云南方炎瘴今以風寒故楚之老人翻長嗟而憶炎瘴與韓退之簞詩皇何何時反炎燠之意同三尺角弓斗力未多以風寒故監徑難開如兩斛之力弓言斛力南史齊魚復侯子響勇力絶人開弓四斛力壁立石城言白帝城乃山石自然之城字則史石城湯池金錯旌旗如金銀纒竿搶之類漁陽突騎獵青丘祿山反皆漁陽突騎漁陽青丘屬洛陽趙云子虛賦秋田乎青田注青丘國在海東三百里齊地也自亂離至此十年盜賊未息征戍未散誅求未巳宜寡妻之哭逺客之悲舊注青丘屬洛陽不知何所據而言犬戎鎖甲聞丹極犬戎吐蕃時陷京師八荒千里防盜賊征戍誅求寡妻哭逺客中宵淚霑臆趙云師民瞻作丹極是蓋漁陽突騎言安史犬戎鎖甲言吐蕃公作詩在䕫乃今嵗大厯二年史朝義滅於廣德元年正月吐蕃是年陷京師於八月去今四年而詩及之蓋追言之引下十年防盜賊之句也漁陽突騎公凡三使其三言幽燕之兵曰漁陽突騎猶精鋭赫赫雍王都莭至又漁陽突騎邯鄲兒酒甜並轡金鞭垂今言安史者蓋安史亦用幽燕兵後漢光武克邯鄲置酒髙㑹謂馬武曰吾得漁陽上谷突騎欲令將軍將之唐六典注引蔡雍冀州强弩幽州突騎天下之精也錦樹行今日苦短昨日休嵗云暮矣增離憂趙云今日昨日字韓詩外傳昨日何生今日何成或用莊子山木萹為證不知莊子昨日山中之木以不材生今主人鴈以不材死無今日字連上昨日字也嵗云暮矣詩嵗月云暮霜凋碧樹行錦樹萬壑東逝無停留趙云上句木葉經霜而紅若錦下句逝者如斯夫之意也碧樹列子吳楚之國有大木焉其名為柚碧樹而冬生萬壑顧凱之言㑹稽千巖競秀萬壑爭流荒戍之城石色古東郭老人住青丘飛書白帝營斗粟琴瑟几杖柴門幽趙云荒城石色謂石城東郭指夔州之郭前萹云停立東城隅老人公自言青丘則瀼西之居在東郭亦名青丘乎與齊地青丘偶同名耳青草萋萋盡枯死天馬跂足隨氂牛莊子作氂牛音離趙云草枯則無以充天馬之飼與氂牛無異公嘗曰草枯騏驥病又曰試看明春草長皆此意也漢書禮樂志天馬來來從西極氂牛則蠻中牛自古聖賢皆薄命伯夷餓死孔子栖栖顔回之夭孟軻之坎軻皆薄命聖賢也姦雄惡少皆封侯漢祖之起取侯者皆屠狗刁筆之人故國三年一消息終南渭水寒悠悠五陵豪貴反顛倒鄉里小兒狐白裘五陵漢帝五陵薛云史記秦囚孟嘗君君求救於幸姫姫曰願得君狐白裘已獻昭王有客能為狗盜入秦宫藏盜得狐白裘獻之遂得歸齊又禮士不衣狐白又王褒講德曰千金之裘非一狐之邑趙云五陵豪貴漢徒貴人與豪俠之家於陵寢地以壯大之也五陵見上哀王孫注用豪貴之事若韋賢徒平陵車千秋徙長陵黃霸平當魏相陡平陵張湯徙杜陵杜周陡荗陵蕭望之馮奉世史丹徙杜陵所謂五陵之貴者又若郭解傳及陡豪茂陵也解貧不中訾吏恐不敢不徙衛將軍為言解家貧不中徙上曰解布衣權至使將軍此其家不貧解徙諸公送者出千餘萬此謂五陵之豪者反顛倒言其子孫也鄉里小兒四字挨傍陶洲明我不能為五斗粟折腰拳拳鄉里小人生男墮地要膂力一生富貴傾家國莫愁父母少黃金天下風塵兒亦得趙云此四句亦閭閻聼小子談笑覔封候之意佛書朝生王子一日墮地便勝凡人晉傳𤣥豫章行男兒當門戶墮地自生神生男有膂力之故可以用武致功取富貴傾動家國與美人容兒一顧傾人城再顧傾人國之傾不同赤霄行孔雀未知牛有角渴飲寒泉逢抵觸赤霄𤣥圃須往來翠尾金花不辭辱杜田補遺稗博物志孔雀尾多變色色或紅或黃有如雲霞無定人採其尾有金翠五年而後成始生三年金翠尚少初春乃生四月後凋與花蘂俱衰雌者不冠尾短無金翠人採其尾以飾翠拂生翠則金翠之色不減南人取其尾者握刀蔽於叢竹潜隱之處伺過急剪之若不急斷回首一顧無復光彩矣角趙云孔雀赤霄𤣥圃往來之物渴而飲泉不知牛有而逢抵觸值非其類也赤霄楚詞載赤霄而凌太清在孔雀言之張茂先鷦鷯賦序彼鷲鶚鵾鴻孔雀翡翠或凌赤霄之際或托絶垠之外𤣥圃在崑崙山上之别名見葛仙公傳抵觸文子兕牛之動以抵觸而抵字嵇叔夜琴賦觸巖抵隈翠尾金花孔雀之羽毛晉左九嬪孤雀賦戴絲碧之秀毛擢翠尾之修莖鍾㑹賦丹口金輔𤣥目素規江中淘河嚇飛燕銜泥却落羞華屋杜田補遺爾雅釋鳥鵜鴮鸅郭璞注今之鵜鴣也沈水食魚故名汙澤俗呼為淘河曹風維鵜在梁陸機疏鵜水鳥如鶚而極大喙長尺餘直而廣口中正赤領下胡大如數升囊若小澤中有魚便羣其貯水滿其胡而棄之令水竭盡魚在陸地乃共食之故曰淘河本草鵜鴣大如蒼鵝頥有皮袋容二升物展縮由袋中盛水以養魚一名淘河身是水沫唯胸前有兩塊肉如拳云昔為人竊肉入河化為此鳥今猶有肉固名淘河莊子魚不畏網而畏鵜鴣以其竭澤而取本草引竊肉逃河事名異而義不當以爾雅注釋為正也趙云嚇字莊子鴟得腐鼠鵷雛過之仰而視之曰嚇燕從江上來為淘河所疑意謂燕爭其魚而嚇之歸華堂之上負此羞恥銜泥却落焉屋字韻上使銜泥古詩思為雙飛燕銜泥巢君屋史記平原君傳㰱血於華屋之下孔雀與燕皆自譬牛與淘河譬見辱之子華屋主人之屋豈言䕫州所依主人如柏中丞者乎皇孫猶曽蓮勺困孝宣帝紀帝初為皇孫高材好學然亦喜游俠鬪雞走馬具諳知閭里姦邪吏治得失數上下諸侯常困於蓮勺鹵中如淳曰為人所困辱也蓮勺縣有鹽池縱廣十餘里鄉人名為鹵中蓮音輦勺音灼衛莊見貶傷其足成十七年傳則鮑牽而遂髙無咎齊人來招牽之弟鮑國而立之仲尼曰鮑莊子之知不如葵葵猶能衛其足注傾葉向日以蔽其根言鮑牽居亂不能危行言孫足趙云言衛莊之所以所以見貶於孔子者以自傷其也皇孫遭困所以自寬衛莊見貶又以自責老翁慎莫怪少年葛亮貴和書有篇趙云老翁自言少年所見辱之子貴和蜀志諸葛亮傳陳壽所上諸葛亮集目録凡二十四篇而貴和第十一惜其書不傳以亮貴和自責蓋惟不能和必召辱矣丈夫垂名動萬年記憶細故非髙賢趙云此句見公胸懷廓落無宿恨矣乃顔淵犯而不校者乎前漢胸奴傳孝文遺胸奴書朕與單于皆捐細故師古曰細故小事與師云公不以細故芥蒂於胸次則必報睚眦之怨者異矣前苦寒二首漢時長安雪一丈牛馬毛寒縮如蝟楚江巫峽氷入懷虎豹哀號又堪記杜田正謬西京雜記漢元封二年大雪深數尺野中鳥獸皆化牛馬踡蹜如蝟鮑明逺出自薊北行疾風衝塞起沙樂自飄揚牛馬縮如蝟角弓不可張秦城老翁荆揚客師云杜陵秦地公自謂也慣習炎蒸嵗絺綌𤣥冥祝融氣或交手持白羽未敢釋漢時雪五尺令一文加言之也馬牛寒縮為異況虎豹哀號又堪記矣白羽言扇右一去年白帝雪在山今年白帝雪在地凍埋蛟龍南浦縮寒刮肌膚北風利楚人四時皆麻衣楚天萬里無晶輝三足之烏足恐斷羲和送將安所歸趙云雪在山尚少在地則多南浦縮水涸少也楚地多熱四時麻衣以雪為訝也無晶輝則雪下之天知此也淮南子日中有踆烏注踆趾也謂三足烏羲和日御以雪寒足斷則羲和馭日車失其所歸矣師云樂杜云南浦蟄龍凍右二後苦寒二首南紀巫廬瘴不絶太古以來無尺雪蠻夷長老怨苦寒崑崙天關凍應折師云古詩崑崙香雲際天關煙氣昏杜田補遺詩㴞㴞江漢南國之紀說者以江漢為南紀非南紀乃分野名廣天文志東循嶺徼逹甌閩中是謂南紀所以限蠻夷趙云自江漢以南皆謂南紀非特江漢巫廬二山名蓋䕫州巫山江州廬山皆在南紀郭景純江賦巫廬嵬崫而比嶠南國謂炎方故瘴不絶前漢藝文志有太古以來年紀二篇神異經崑崙有銅柱焉其髙入天所謂天柱圍三千里周圍如削銅柱下有回屋辟方百丈所謂天關豈天柱乎列子共工氏與顓頊爭為帝怒觸不周之山天柱折也𤣥猿口禁不能嘯白鵠翅垂眼流血安得春泥補地裂趙云司馬相如上林賦𤣥猿素雌陸機苦寒行𤣥猿臨岸嘆張平子西京賦挂白鵠聨飛龍若實有𤣥猿白鵠之事酈道元水經注鄧芝射𤣥猿𤣥猿自拔矢卷木葉塞射瘡芝嘆曰傷物之性吾其死矣鄧德明南康記盧耽仕州為治中少學仙術善解飛騰每夕輒凌虛歸家曉則還州嘗元㑹至曉不及朝列化為白鵠至閣前翺翔欲下威儀以帚掃之得一隻履耽驚還就列內外左右莫不駭異史記日者傳噤口不能言古樂府飛烏行吾欲銜汝去口噤不能開後漢馮異傳始垂翅回溪然奮冀澠池老子地無以寧將恐裂右一晚來江門失大木猛風中夜吹白屋天兵斷斬青海戎殺氣南行動坤軸師云春秋括地圖地有四柱三千六百軸也不爾苦寒何太酷巴東之峽生凌澌彼蒼回幹人得知戎趙云青海言吐蕃木𤣥虛海賦又似地軸挺拔而爭回言告寒之故以天兵斬盡吐蕃殺氣所致也荆州人歌已東之峽巫山長猿鳴三聲淚霑裳詩彼蒼者天言寒氣酷甚天亦為之回轉幹旋右二晚晴髙唐暮冬雪壯哉舊瘴無復似塵埃峽中每嵐瘴起如塵埃翳天崖沉谷沒白皚皚江右缺裂青楓摧南天三旬若霧開舞鶴賦嚴嚴若霧赤日照耀從西來六龍寒急光徘徊六龍日御也照我衰顔忽落地口雖吟詠心中哀未怪及時少年子揚眉結義黃金臺燕昭築黃金臺以禮郭隗鮑照豈伊白璧賜特起黃金臺泊乎吾生何飄零支離委絶同死灰支離言不為時所用也莊子支離疏又心固可使如死灰宜趙云師民瞻本改舊本髙堂作髙唐是蓋䕫州所作使巫山之髙唐也日從西來天晚而後見日故也六龍所以駕日車淮南子謂之六螭復陰方冬合沓𤣥陰塞昨日晚晴今日黑萬里飛蓬映天過孤城樹羽楊風直江濤簸岸黃沙走雲雪埋山蒼兕吼師云鮑照詩蒼兕號空林君不見夔子之國杜陵翁牙齒半落左耳聾䕫州古䕫子國杜陵子美故里韓趙云合沓洞蕭賦薄索合沓注重沓也昨日今日詩外傳昨日何生今日何成孤城樹羽則白帝城上屯戍之旗太公誓師曰蒼兕云云夜歸夜來歸來衝虎過山黑家中巳眠卧傍見北斗向江低仰看明星當空大庭前把燭嗔兩炬峽口驚猿聞一箇白頭老罷舞復歌杖藜不睡誰能那趙云此萹雄壯渾成涅槃經行止眠卧公又使睡眠字亦涅槃經有如人喜眠睡眠滋多也前漢書王莽時夏侯勝那漢以老病罷韋賢以老病罷歸豈摘字用乎南使蔡興宗傳太尉沈慶之日加老罷私門兵刀頓關方是兩字全出莊子原憲杖藜應門寄柏學士林居自胡之反持干戈天下學士亦奔波避亂奔散如波之奔歎彼幽栖載典籍蕭然暴露依山阿言年所休庇也漢書衣冠暴露青山萬里靜散地白羽一洗空垂蘿亂代飄零余到此古人成敗子何如荆揚春冬異風土風土記荆揚間春寒冬暖所以為異巫峽日夜多雲雨神女朝為雲暮為雨赤葉楓林百舌鳴黃泥一作花野岸天雞舞天雞鳥名謝靈運海鷗戲春岸天雞弄和風盜賊縱橫甚密邇形神寂寞甘辛苦幾時髙議排金門各使蒼生有環堵趙云宋謝靈運秋胡四言念彼奔波意慮回惑謝靈運南山詩疑此永幽栖晉嵇康采薇山阿王弼投戈散地既居散地則眼不見干戈此所以白羽一洗也家語子貢言軍旅赤羽如日白羽如月空垂蘿則不見白羽但見垂蘿耳此大厯二年之冬春則去年十二月周智光反據華州正月同華將吏殺智光傳首闕下九月吐蕃冦靈州又冦邠州同月桂州山獠反斯為盜賊縱橫或云别有盜賊去䕫為近史所不載有因公詩而見者鵾雞舞於蘭渚而公亦六絶句首萹云竹髙鳴翡翠沙僻舞鵾雞今取舞字變云天雞舞寄從孫崇簡嵯峨白帝城東西南有龍湫北虎溪吾孫騎曹不記馬業學尸鄉多養雞杜田補遺世說王子獻為桓冲騎曹參軍桓問曰卿何署曰不知何署時見牽馬來似是馬曹又所管有幾馬曰何由知其數又問馬死多少曰未知生焉知死趙云尸鄉事列仙傳祝雞翁洛陽人居尸鄉北山下養雞皆有名字暮栖樹畫放散食欲取呼名即至販雞及子得千萬錢輒置錢去龎公隱時盡室去武陵春樹他人迷趙云龎公襄陽人居峴山劉表就候之太息而去後携妻子登鹿門山採藥不反武陵在今鼎州即桃源也陶淵明集載晋太元中武陵人補魚緣溪行忌路逺近忽逢桃花林得一山山有小口髣佛若有光捨船從口入行數十步豁然開朗土地平曠屋舍儼然黃髮垂髫並怡然相樂見漁人乃驚問所從來便要還家既出及郡詣太守說即遣人隨往遂迷不復得路盡室俗所謂挈家也左傳盡室以行詩豈無他人蓋言從簡既如龎公携妻子以隱他日人有誤入其境則如武陵之迷也與汝林居未相失近身藥裏酒長携牧叟樵童亦無賴莫令斬斷青雲梯文選注仙者以雲而升謂之雲梯趙云謝靈運登石門最髙頂惜無同懷客共登青雲梯西閣曝日凛烈倦𤣥冬負暄嗜飛閣趙云梁元帝纂要冬日𤣥英𤣥冬負暄見寫懷上萹注羲和流德澤顓頊愧倚薄曹子建悲風鳴我側羲和逝不留重陰潤萬物何懼嵗不周倚薄見前注毛髮且自私肌膚潛沃若太陽信深仁襄氣歘有託歌傾煩注眼容易收病腳趙云帝曰顓頊見禮記月令謝靈運詩拙疾相倚薄猶得靜者便倚薄附著之謂舊本具自和師民曕本作且自私是欹傾煩注眼則光采注眼之煩眩而欹傾也流離杪木猿翩仙山顛鶴敬祖連翩御飛鶴謝靈運仰看條上猿朋知苦聚散哀樂日已作即事㑹賦詩人生忽如昨古來遭喪亂賢聖盡蕭索胡為將暮年憂世心力弱趙云鳥獸之寒見日則喜公曝日西閣非徒取暖快且有所思念焉用是知人之情聚則樂散則哀朋友知舊若聚而復散也惟其既聚復散此哀樂於一日之間已自作也舊本作用知非水閣朝霽奉簡嚴雲安東城抱春岑江閣鄰石靣崔嵬神雲白朝旭射芳甸謝𤣥暉有雜英滿芳甸雨檻卧花叢風牀展書卷鈎簾宿鷺起丸藥流鶯轉呼婢取酒壺續兒誦文選晚交嚴明府矧此數相見趙云去秋有贈鄭十八賁云異味煩縣尹鄭十八者雲安知縣也今此詩題云簡嚴雲安又是新知縣邪公詩兩字每使文選嘗示宗武曰熟精文選理今又曰續兒誦文選則於文選為精矣轉或作囀晚登瀼上堂故隮瀼岸髙頗免崖石擁開襟野堂豁繫馬林花動趙云選賦向北風而開襟莊子似繫馬而止雉堞粉似雲薛云公羊傳五板而堵五堵而雉百雉而城堞城嬙馬靣也山田麥無隴春氣晚更生江流靜猶湧四序嬰我懷羣盜久相踵黎民困逆節天子渴垂拱趙云胡戎盜賊犯順為逆莭天子皇皇不得垂衣拱手所思注東北深峽轉修聳趙云東北言長安由峽中轉視髙山而往斯為深峽襄老自成病郎官未為冗凄其望吕葛不復夢周孔濟世數嚮時斯人各枯冢老子其人與骨皆朽矣趙云公為尚書工部貟外郎而郎官上應列宿未為冗矣謝靈運發石首城詩欽聖若旦暮懷賢亦凄其不復夢周孔以不復得用周孔之道以經濟矣孔子曰甚矣吾衰也久矣吾不復夢見周公吕葛太公武侯言前時濟世非無其人人與骨皆朽為枯冢楚星南天黑蜀月西霧重安得隨鳥翎迫此懼將恐詩云將恐將懼敬寄族弟唐十八史君與君陶唐後盛族多其人聖賢冠史籍枝𣲖羅源津甫自撰萬年縣君京兆杜氏墓銘曰其先係統于伊祁分姓子唐社春秋傳云穆叔謂之世祿其兹在乎漢髙紀贊曰范宣子亦曰祖自虞以上為陶唐氏在夏為御龍氏在商為豕韋氏在周為唐杜氏注唐杜二國名在今氣磊落巧僞莫敢親介立實吾弟濟時肯殺身逺巧僞而介立者史君也物白諱受玷行高無汚真得罪永泰末放之五溪濱漢黃瓊皎皎者易為汚嶢嶢者易為缺四子講德青蠅不能穢垂棘詩白圭之玷尚可磨也語殺身以成仁馬援傳擊武陵五漢蠻夷注雄樠酉潕辰所謂五溪趙云上兩句明其得罪之由以不受汚玷而致然也與皓皓者易汚之義不同五溪蠻夷皆盤瓠子孫今在辰州界鸞鳯有鎩翮先儒曽抱麟顔延年詠嵇中散詩鸞翮有時鎩鎩所拜切殘也劉越石詩誰云聖達莭知命故不憂宣尼悲獲麟西狩涕孔丘注孔子亦抱麟而泣哀趙云鎩者殘羽淮南子飛鳥鎩羽先儒孔子公羊傳公十四年春西狩獲麟何以書記異也孔子曰孰為來哉孰為來哉反袂拭西涕泣沾袍今云抱麟羽前書所紀或有載抱麟而泣也雷霆霹長松骨大却生筋一失不足傷念子孰自珍趙云松骨大而生筋則霹不能盡破喻唐雖得罪未能傷以其熟于自珍也泊舟楚宫岸戀闕浩酸辛除名配清江清江屬施州厥土巫峽鄰登陸將首途筆扎枉所申趙云楚宫指䕫州蓋襄王所游宫樂史寰宇記於巫山縣載楚宫之名施州竒江縣在䕫州南九域志此至本州界一百里自界首至䕫一百二十五里巫山縣則在䕫東七十五里故云厥土巫峽鄰前云得罪永泰末放之五溪濵永泰末則嵗在乙已五溪濵則辰州今公出峽乃戊申大厯三年寄此詩而云除名配清江則再貶責矣歸朝局病肺叙舊思重陳春風洪濤壯顔延年春江壯風濤劉越石棄置勿動陳言趙云詩謂天蓋髙不敢不局此局為不申之義公其歸朝不得則思叙舊以往春時得一見也王粲海賦洪濤奮蕩又西京賦起洪濤而揚波谷轉頗彌旬我能泛中流搪哭鼉獺瞋趙云谷轉郭景純江賦盤渦谷轉漢武帝秋風辭橫中流兮揚素波孔融汝南優劣論頗有蕪菁唐突人參周伯仁謂庾元規曰何乃刻畫無盬以唐突西施任彥升謝記室箋惟此魚目唐突璠璵長年已省拖省視也拖乃正船木長年則川人謂操舟者慰此貞良臣指言唐史君也釋悶趙云詩六韻謂之古詩而中四韻盡對謂之近體而字眼不順句之平仄不拘蓋所謂吳體者乎四海十年不解兵犬戎也復臨咸京祿山思明之亂方已而吐蕃復陷京城嵗趙云自天寶十四載嵗乙未安祿山反至廣德元年癸邜吐蕃復陷京師此詩二年嵗在甲辰春半已聞車駕歸京師之作吐蕃之兵未已祿山於天寶十五載嘗陷京師而今吐蕃再陷焉故云失道非關出襄野揚鞭忽是過湖城杜補遺莊子黃帝見見大隗乎具茨之山至於襄城七聖皆迷無所問塗適遇牧馬童子而問焉晝晉王敦作逆明帝騎馬齎七寶鞭至湖陰察軍形軍寢夢曰繞城忽驚覺曰營中有黃鬚鮮卑奴來何不縳取命騎追之不及趙云犬戎犯京師代宗車駕幸陕湖城之句皆以黃帝言之則城則黃帝鼎湖所在今幸陕所經過之地豺狼塞路人斷絶烽火照夜尸縱橫天子亦應厭奔走羣公固合思外平但恐誅求不改轍聞道嬖孽能全身指程元振時元振用事媒孽大臣故吐蕃入冦以至功臣不肯用命歸趙云豺狼以譬盜賊張孟陽詩賊盜如豺虎車駕雖長安而有乞遷洛巡海之說故云天子亦應厭奔走羣公固合思外平嬖孽指程元振此猶未知其死也江邉老翁錯料事眼暗不見風塵清九家集注杜詩卷十三
