body:
  text: 九家集注杜詩卷二十一宋郭知逹編近體詩蜀相趙云孔明在蜀志固云丞相亮矣而蜀相兩字如吳志嚴峻傳云峻嘗使至蜀蜀相諸葛亮深善之故以蜀相為題丞相祠堂何處尋錦官城外柏森森蜀諸葛亮傳先生建安二十六年即帝位册亮為丞相録尚書事祠堂孔明廟也成都府城亦呼為錦官城以江山明麗錯雜如錦也廟有古柏武侯手植之然趙云或以其有錦官如銅官鹽官之類其説亦是不止取錦而已何以更有官字乎亮祠堂前有古柏世傳亮手植既無所據亦未必然若夔州絶句云武侯祠堂不可忘中有松柏參天長豈亦手是植乎廋子嵩目和嶠森森如千文松雖磊砢有節目施之大厦有棟梁之用今於柏言森森亦可矣映階碧草自春色隔葉黃鸝空一作多好音江文通别賦春草碧色詩泮水懷我好音王僧逹詩楊園流好音言趙云兩句見公來此祠廟時乃春也故即春之景物之謂其人已忘而物空自春耳空與自兩字句法起於何遜行經孫氏陸詩山鶯空曙響壟月自秋暉其後丁仙芝霍國公主舊宅云林間花自落門閉水空流也若春色字則選詩云春色滿皇州三顧頻煩天下計本傳云時先主屯新野徐庶謂先主曰諸葛孔明卧龍也將軍豈願見之乎先主曰君與俱來庶曰此人可就見不可屈致也將軍宜枉駕顧之由是先主遂詣亮凡三往乃見又亮上疏曰先主不以臣卑鄙猥自枉屈三顧于草廬之中言先主之自見亮亮為先主而仕皆為天下大計也頻趙云頻煩數數之義字則如晉庾亮辭中書令表曰煩者逹出總六軍又如元魏彭城王協曰臣猥何人頻煩寵授其見于詩則如亮信奉和法筵應詔詩云羈臣從散木無以預頻煩又潘泥贈張仲冶詩張生拔幽華頻煩登二宫兩朝開濟老臣心先主于永安病篤召亮屬以後事謂亮曰君才十倍曹丕必能安國立定大事若嗣子可輔輔之如其不才君可自取亮泣曰臣敢竭股肱之力效貞信之節繼之以死又亮表云興漢室還如舊都此臣所以報先帝而忠陛下之職分也兩朝謂先主及禪也其趙云張華遊俠篇云信陵西反魏秦人開濟疆開豁謀濟謀濟謂濟遂其事兩朝開濟以言孔明之事主其開濟者乃孔明所以為老臣之心也趙左師觸龍曰老臣賤息舒祺最少晉書柏宣傳稱宣開濟篤素出師未捷一云未用又未戰身先死長使英雄淚滿襟䦌其志不遂也本傳云十二年春亮悉大衆由斜谷出據武功五丈原與司馬宣王對於渭南相持百餘日其年八月亮疾卒于軍滿趙云悼之深矣亮有出師表選有云淚淚沾襟而襟則盈襟之變也卜居屈原作卜居一首原往太卜鄭詹伊家卜已宜何所居因述其詞成都記草堂寺府西七里浣花亮三里寺極宏嚴有名僧履空居其中杜員外居處逼近常恣遊焉鮑云上元元年嵗次庚子公年四十九在成都劒南節度使裴冕為成卜都西郭浣花溪作草堂居焉所謂主人為卜林塘幽是也前注為嚴武非是浣花流一作之水水西頭浣花溪名主人為卜林塘幽主人嚴武也趙云世傳崔寧妻任國夫人逢一異僧濯其袈裟於是溪鮮花滿水因得名浣花溪學者以為然殊不知崔寧者崔旴也公于永泰元年離成都正聞喪亂而公之卜居先在今春已有浣花之名舊矣公之居在水之東岸江流曲處公詩所謂由舍清江曲是也其址既蕪沒本朝吕汲公鎮成都日想像典型於西岸佛舍曰𣑽安寺之旁為草堂焉又詩所謂主人學者多為為嚴武大非也嚴武鎮蜀之嵗月矣且西郊篇注又主人之云豈可便指府尹邪或地主或所館置之人皆可乎矣列子云逆旅之主人莊子云主人之鴈史載太公就齊封而行遲主人曰客何懶也觀此則主人之義明矣已知出郭少塵事更有澄江銷客愁梁張纘啓常願卜居幽僻屏避誼塵謝玄暉詩澄江淨如練曹子建詩云誰與銷愁趙云為才卜居所以有已知之語孟浩然平田出郭少盤坂入雲長陶淵明云間居三十載遂與塵事𡨕客愁字黃魯直嘗云客愁非一種厯亂如蜂房意其止出於杜公而祖出未見以俟博聞無數蜻蜓齊上下一雙溪鷘對沉浮趙云雖無數一雙字至易至熟若無所出而無數字如禮云哭踊無數及云修爵無數也一雙字如賜虞卿白璧一雙也蜻蜓上下今水面多然乃二月已有之矣梁簡文帝晚春詩曰花留蛺蝶粉竹翳蜻蜓珠此蜻蜓之見于前人也吳都賦云溪鷘鷛􅖥泛濫其上此溪鷘之見于前人也彼溪字加鳥鷘字以勑在鳥傍出乎俗字耳按雜談録唐河南伊闕縣前大溪每僚佐有入臺者即水中先有小灘漲出石礫金沙澄徹可受丞相牛僧儒為尉一旦報灘出翌日邑宰與同僚列筵于亭上觀之有老吏云此必分司御史非西臺之命若是西臺溪上當有溪鷘雙立僧孺自負因舉酒曰既能有灘何惜一雙溪鷘宴未終俄而有溪鷘雙下不旬日拜西臺監察又若齊上下沉沉浮其上下字神農時雨師至崑崙山隨風而上下沉浮字雖祖出詩云泛泛揚州載沉載浮而字則吳都賦之言魚云葦鱗鏤甲噞喁沉浮亦使使學者知公無雨字無來處矣東行萬里堪乘興須向山隂上一作入小舟蜀有萬里橋在浣花之東昔孔明送吳使至此曰萬里之行從此始矣因是得名乘興欲倣王子猷月夜泛舟謁載安道也故有下句山隂王子猷所居之地猷趙云公言或乘興之間則徑須要向往山隂倣王子乘舟矣向字與上向草堂之向義同公身在成都便欲往吳地之山隂似乎大逺蓋以因萬里之名而起興故耳一室一室他鄉逺空林暮景懸遠一作老後漢陳蕃曰大丈夫處世當掃除天下安事其一室乎文通詩秋日懸清光鄉趙云張景陽雜詩鳴鶴聒空林古詩他各異縣也正愁聞塞笛獨立見江船趙云塞笛指言白帝城上笛也巴蜀來多病荆蠻去幾年年一作千成都記其西即隴之南首故曰隴蜀以與巴接復曰巴蜀荆蠻荆楚也詩謂之蠻荆太史公余讀春秋古文乃知中國之虞與荆蠻句吳兄弟也蜀趙云公自同谷入蜀之梓之閬又自蜀來夔故云巴而樂史寰宇記載山自裂以表巴蜀分界事則巴與蜀相連之州地也公雖在秦每欲適楚今至夔自問其自此將適荆在幾何年也王粲詩云終適荆與蠻指言荆南也應同王粲宅留井峴山前峴山荆楚也全屬襄陽有井在焉人呼為仲宣井云王粲故宅也趙云公本襄陽人又從荆南欲歸襄州矣梅雨杜補遺周處風土記云夏至前雨名黃梅雨沾衣服皆敗點又埤雅云今江湘二浙四五月間梅欲黃落則水潤土溽柱礎皆汗蒸鬱成雨其霖如霧謂之梅雨沾衣服皆敗汗故自江以南三月雨謂之迎梅五月雨謂之送梅趙云川中雖亦有此雨而土人未識其名今公因見有此梅雨而著之南京西浦道玄宗幸蜀改成都置尹視二京號為南京杜正謬肅宗至德二年以蜀郡為南京鳯翔為西京西京為中京非玄宗置可趙云公詩不妄作多記實以詔天下後世庶乎傳而傳且南京西浦道之句本是言成都西浦道公欲著見成都改為南京用在詩句中如進艇首句云南京久客耕南畝也説文云浦水濵也西浦蓋江水西邉之浦溆如望云云南浦清江萬里橋是已蓋謂之浦上則公所居正在此矣豈非所謂西浦乎一本作犀浦蓋惑於今日成都屬縣之郫有犀浦鋪殊不思下有長江之句則犀浦道無江又有茅茨易濕之句則指言所居又有髙龍喜盤溫之句則言終日所見之江如此豈是犀浦乎四月熟黃梅湛湛長江去𡨕𡨕細雨來阮籍詩湛湛長江水上有楓樹林隨煬帝江都夏詩梅黃雨細麥秋橫楓樹蕭蕭江水平玉趙云句有長江字乃所以見西浦者長江之浦也宋九辨云江水湛湛兮上有楓細雨乃所謂梅雨也楚詞云容容兮雨𡨕𡨕陳張正見詩云細雨濯梅林茅茨疏易濕雲霧密難開茅茨以茅覆屋也庾信小園賦穿漏兮茨茨趙云上句乃所以指言其所居茅茨字起干堯土階三尺茅茨不剪其在常人言之則如羅舍别傳云桓宣武以為别駕以官廨寺喧擾非靜默所處乃子城西池小州上立茅茨之屋見已疏字濕字則上漏下濕之義列子曰虹霓也雲霧也皆天之積氣也而于隂重言之則衛瓘言樂廣云每見此人瑩然若開雲霧而覩青天易云密雲不雨茅茨以疏而易濕已為可傷而雲霧尚密則雨意未已其為况如何也竟日蛟龍喜盤渦與岸回匏子歌曰蛟龍騁兮方逺遊郭璞江賦盤渦谷轉波濤山頺趙云人以雨而憂屋漏蛟龍得雨而喜則為異於人矣公所居之上有百花潭則宜有蛟龍矣髙唐賦云盤岸巑岏則岸亦盤矣故言與岸回也公於夔州有詩云盤渦鷺浴底心性蓋龍之藏鷺之浴以盤渦為樂也為農趙云揚惲云長為農夫沒此生矣故為農名詩非管仲農之子為農也錦里煙塵外華陽國志錦江織錦濯其中則鮮明故命曰錦里公居在近郊無氛埃故云煙塵外江村八九家圓荷浮小葉細麥落輕花卜宅從兹老為農去國賒顔筵平詩去國還故里幽門樹蓬藜曲禮大夫士去國趙云左傳晏子云非宅是卜維鄰是卜摘用之耳故對為農任昉泛長溪詩絶物甘離羣長懷忽去國去王國也本於王粲詩復棄中國去遠身適荆蠻逺慚句漏令不得問丹砂晉葛洪傳字字稚州從祖玄吳時學道得仙號曰葛仙公其鍊丹祕術悉得真法以年老欲鍊丹砂以期遐夀聞交址出丹求為句漏令帝以洪資髙不許洪曰非欲為榮以有丹砂帝從之有客趙云詩有客有客白白其馬故取兩字為題幽棲地僻經過少幽棲所居之地也經過往還也以所居之地幽棲少往還也謝淑源遊西池詩逍遙越城外願言履經過往還也詩資此永幽棲豈伊年嵗别趙云阮籍詠懷詩曰趙李相經過舊注引謝叔源在後矣老病人扶再拜難趙云前漢書有以老病罷豈有文章驚海內謾勞車馬駐江干詩置之河之干兮注干涯也梁范雲詩江干逺樹浮趙云車言駐則如北齊劉逖秋朝野望詩云駐車憑險岸飛蓋立平湖馬言駐則魏文帝駐馬書鞭作臨渦之賦也漢武帝云海內寡二梁元帝烏栖曲云共泛江干瞻月華竟日淹留佳客坐百年粗糲腐儒餐劉安招隱詩云攀援桂枝兮聊淹留又詩于焉佳客又我有嘉客楚辭云又何足以淹留粗糲粗衣糲食也腐儒見題省中璧詩注粗趙云戰國䇿嚴仲子進百金于聶政曰以為夫人糲之費莫嫌野外無供給乘興還來看藥欄趙云蓋公告客之辭言客若不以野外荒涼無可供給為嫌但乘興來看藥欄也左傳云敢不供給王子猷云乘興而來狂夫趙云左傳狂夫阻之題意主詩末句之義萬里橋西一一作新草堂公粲居浣花里在萬里橋之西萬里橋事見下居詩注百花潭水即滄浪成都記杜員外别業在百花潭臺猶在趙云按樂史寰宇記云萬里橋亦名篤泉橋乃星橋之一也以諸葛亮故名其後明皇至蜀過此橋問名于左右對曰萬里橋上歎曰一行嘗謂朕更二十年因有難巡遊至萬萬里之外此是也橋今在城南門外西即浣花溪公之草堂在焉百花潭浣花之上遊公言此潭即是孔子所聞孺子歌云滄浪之水也草堂之側有比萬里橋百花潭可以為詩對故公又云萬里橋西宅百花潭北莊所謂恰好處不放過矣風含翠篠娟娟靜謝靈運詩緑娟娟清連雨裛紅蕖冉冉香趙云翠篠竹也紅蕖荷花也娟娟好妙之兒古詩云娟娟新月體冉冉漸多之兒選詩云柔條紛冉冉又云冉冉孤生竹原祿故人書斷絶恆飢稚子色凄涼上言交態薄也古趙云史云無使素餐之人久尸厚祿詩云羽書時斷絶欲填溝壑唯疏放自笑狂夫老更狂公以狂自隱耳舊史言公於成都浣花里結廬枕江與田畯野老相狎蕩嚴過之有時不冠其其傲誕如此趙云上句言將欲填溝壑而死矣却唯只是疏放而不管此所以為狂也下句所以成不憂填溝壑而但疏放之句舊注却云與田畯野老相狂相狎非矣賔至趙云左傳云賔至如歸患氣經時久臨江卜宅新舊史所謂結廬枕江也江趙云庾信夜聼搗衣云臨愁思歌卜宅見左傳喧卑方避俗疏快頗宜人趙云鮑照舞鶴賦云歸人寰之喧卑詩云宜民宜人詩師云古詩喧卑避俗居江總山路目疏快有客過茅宇呼兒正葛巾諸葛亮葛巾羽肩指揮三軍趙云古詩曰呼兒烹鯉魚自鋤稀菜甲小摘為情親趙云蓋言手自鋤治者稀疏之菜甲因有客而小摘其嫩者為情意親密也師云謝靈運永嘉記百卉正發時聊以小摘供日王十五司馬弟出郭相訪兼遺營牙堂資客裏何遷次江邉正寂寥趙云玉臺後集載楊令公令陳後主妹樂昌公主作詩其詩云今日何遷次新官對舊官昔來尋一老愁破是今朝杜補遺漢初應曜隱於淮陽山中與四皓俱徴曜獨不至時人語曰南山四皓不如淮陽一老曜即應劭八代祖也又管寧書曰唯陛下聼野人山藪之願使一老者得盡微命不趙云一老公自謂也祖出右傳魯哀公誅孔子曰天愸遺一老松田所引是又謂無祖也俾新添以今考之詩十月之交曰不愸遺一老守我王趙豈不見乎憂我營茅棟携錢過野橋趙云沉休文詩茅棟嘯愁鴟崔豹詩野橋行路斷他鄉唯表弟還往莫辭遙趙云古詩他鄉各異縣堂成趙云魏中山恭王衮疾病令官屬曰男子不死於婦人之手亟以時成東堂堂成疾往居之背郭堂成蔭白茅以白茅覆屋也緣江路熟俯青郊趙云易藉用白茅而今所言則莊子築特室席白茅為近謝玄暉和徐都曹詩結軫青郊路青郊者春麥蓋地青青然也非謂東郊為青郊榿林礙日吟風葉籠竹和煙滴露梢榿木名也不材可充薪而已惟蜀地最宜種竹有籠筀名居趙云榿林籠竹正川中之物二物必于公卜處先有之矣暫止一作下飛烏將藪子頻來語燕定新巢趙云暫下一作暫止止字不如下字之穩列子云鷗鳥舞而不下賈誼于鳯皇亦曰覽德輝而下之飛鳥將藪子將字起于鳯皇將九子也定字大則王者有定都凡居者有定居方可敵將字燕巢起於左傳燕巢于幕旁人錯比楊雄宅懶墯無心作解嘲揚雄傳有田一頃有宅一區世世以農桑為葉哀帝時丁傳董賢用事雄方草太玄或嘲雄以玄尚白而雄解之號曰解嘲左太沖詠史詩寂寂揚子宅門無卿相輿寥寥空宇內所講是玄虗田舍趙云陶淵明有田舍二首田舍清江曲亦作上柴門古道傍趙云孟浩然云悠悠清江水水落沙嶼出蓋公之草堂在水東岸之曲處今成都土人謂胡蘆灘者乃其處也西岸𣑽安寺之草堂特本朝吕汲公為師日想像典刑為之耳本非在西岸也柴門古道傍則舊趨溫江之路杜元凱注左傳篳門圭竇之人云篳門柴門也草深迷市井地僻懶衣裳趙云有禪師儼云法堂前草深一丈迷市井則其傍有市矣楊子云市井相與言櫸柳枝枝弱枇杷樹樹香櫸栁木名枇杷果也趙云孟浩然燕子家家人楊花處處飛之勢也櫸栁枇杷川中多有之蜀都賦云其園則林林擒枇杷古詩枝枝自相對庾信樹樹秋聲鸕鷀西日照曬趐滿魚梁鸕鷀水鳥也蜀人以之捕魚趙云杜臺卿淮賦云鸕鷀吐雛于八九鵁鶄御翼而低昂陶侃毋賣其為魚梁吏而寄鮓進艇趙云孔叢子之書有小爾雅一篇其中廣器有云小船謂之艇故公詩中言小艇而以進艇名篇南京久客耕南畝北望傷神卧北忩明皇幸蜀號成都為南京置尹北兩都同趙云與上篇南京西浦道之用南京意北望望中原也此其所以傷神也晝引老妻乘小艇晴看稚子浴清江俱飛蛺蝶元相逐並蒂芙蓉本自雙趙云元相逐夲自雙因道實事而為新語也茗飲蔗漿携所有瓷罌無謝玊為缸趙云羊衒之洛陽伽藍記曰彭城王協戲謂王肅曰明日顧我為君設邾莒之餐亦有酩奴因此復號茗飲為酩奴宋玉招魂云鱉鱉炮羔有蔗漿瓷罌無謝玉為缸言以瓷罌盛之而已不須謝讓富貴家之玉缸也范曅官者傳論有云或稱伊霍之勳無謝于往載而鮑照喜雨奉勑作云無謝堯為君何用知柏皇西郊趙云易密雲不雨自我西郊時出碧雞坊西郊向草堂漠郊祀志宣帝時或言益州有金馬碧雞之神可隰祭而致遺王褒持節而求之故成都有碧雞坊成都記草堂去府西七里趙云益州在漢以王陽叱馭過九折坂言之則黎雅之側益州刺史之治在焉成都本曰蜀郡𨽻益州其後曰益州蜀郡又改名成都意其貪碧雞之美名故成都有碧雞坊今在城北公草堂在浣花溪之上而浣花溪在府西七里則所謂西郊也草堂固是公野居之名其在秦州亦嘗於西枝村尋草堂地矣北山移文云鍾山之英草堂之靈其先梁簡文帝草堂傳曰汝南周顒昔經在蜀以蜀草堂寺林壑可懷乃於鍾嶺雷次宗學館立寺因名草堂亦號山茨市橋官栁細江路野梅香成都記市橋水中有石犀蓋吳漢為賊將延岑所破之處趙云江路循江之路矣孟浩然早發魚流潭云日出氣象分始知江路闊乂云愁隨江路盡又云江路若回晉陶侃傳侃見栁曰此武昌官栁也梅在官曰曰官梅臨江則曰江海在野則曰野梅柳言細則漢有細栁營也梅言香則梁簡文帝梅花賦云香隨風而逺度梁元帝詩梅氣入風香傍架齊書帙看題檢一作減藥囊趙云庾信詠懷詩榖皮兩書帙戰國䇿侍醫夏無且以藥囊提荆軻檢藥囊一本作減藥囊非是無人競一作與一作覺來往疏懶意何長趙云舊本作競來往又競一作與俱非是荆公本作覺來往且曰下得覺字好也載在鍾山語録梁徐婦題甘蕉示人曰夕泣已非踈夢啼真太數唯當夜枕知過此無人覺又梁簡文帝冬曉詩之言婦人亦云會是無人覺何用早紅粧庾信奉和言志詩來往金張館嵇康云性復疏懶古詩云仙人騎白鹿髮短耳何長所思趙云張平子四愁詩每曰我所思兮又古詩有云所思在逺道苦憶荆州醉司馬崔吏部漪謪官一作居樽爼一作酒定常開趙云崔公蓋自吏部而謪為荆州司馬也其人必好飲者故以醉司馬戲名之九江日落醒何處一柱觀頭眠幾回禹貢九江孔殷地理志九江在今廬江潯陽縣南皆東合為九道潯陽記有九江之一曰烏江二曰蜂江三曰烏白江四曰嘉靡江五曰畎江六曰源江七曰廪江八曰隄江九曰􅌲江荆州路畔有一枉觀在山上土人呼為木履觀梁劉孝綽江津寄劉之遴詩經過一柱觀出入三休臺杜補遺渚宫故事宋臨川王義慶代江夏王鎮江陵於羅公州上立觀甚大而唯一柱又於城東北陵清署臺元注一柱觀而在荆州路郡山上以故事考之非在山上也陽趙云九江在潯陽郡今之江州也樂史寰宇記云潯古之苖國禹貢荆掦二州之境蓋彭蠡以東為掦州之域九江以西為荆州之域以此言之九江看落日處則在荆州也可憐懷抱向人盡欲問平安無使來故憑錦水將雙淚好過瞿塘灧澦堆瞿塘峽曰名灧澦石名也在水中荆州託灧澦如馬瞿塘莫下灧澦如象瞿塘莫上蓋舟人以為水則也杜補遺古樂府淫預大如洑瞿塘不可觸唐子輿父域出守巴西而卒子輿奉喪歸巴東有淫澦名髙二十許丈及秋至則才如馬傍有瞿塘大灘行旅忌之部伍至此石猶不見子輿撫心長呌其夜五更水忽退減安流而行人為之語曰淫預如幞本不通瞿塘水退緣唐公灧澦古樂府作淫預錦趙云謝靈運詩歡娛寫懷抱公所居浣花溪亦曰濯江志言濯錦以此水則色鮮明此錦水之義也江村趙云孟浩然永嘉浦館送張子容云江村日暮時清江一曲抱村流長夏江村事事幽趙云清江是眼前江水之清也舊注引却是施州清江縣矣沈佺期樂府有所思云坐看長夏曉秋月坐羅帷吳志張承言吕岱曰何其事事快也而陶淵明詩云晨夕看山川事事悉如昔自去自來一作歸堂上燕相親相近水中鷗老妻畫紙為棋局稚子敲針作釣鈎趙云公於間居詩每道實事耳燕之自去來鷗之相親近禽鳥幽而自適也妻為碁局以奕兒作釣鈎以釣妻子幽而間逸也此之謂事事幽多病所須唯藥物微軀此外更何求何一作無多趙云張良病王充論衡有云道家以服食藥物輕身益氣陸士衡詩不惜微軀退但懼蒼蠅前詩云亦又何求而更何求字如梁簡文帝水月詩云萬里若消蕩一相更何求盛𢎞之荆州記載夷道縣乞人謂女子曰為何所須女子曰所須之物願此山下有水晉書此外蕭然無辦江漲江漲柴門外兒童報急流趙云柴門前田舍詩注下牀髙數尺倚杖沒中洲趙云鮑明逺東武吟倚杖牧雞豚細動迎風燕輕搖逐浪鷗漁人縈小楫客易拔船頭趙云拔船頭川中舟人之語也拔有兩音其音蒲撥切義則回也乃回船頭耳野老趙云字出丘希範詩材童忽相聚野老時一望又梁簡文帝曲水詩序都人野老雲集霧散野老籬前江岸回柴門不正逐江開漁人網集澄潭下賈客船隨返照來趙云澄潭則所謂百花潭矣返照落日也纂要云日西落光返照于東謂之返景也長路關心悲劒閣劒門也閣棧道也片雲何意傍琴臺見琴臺詩注歌趙云上句回念其初來蜀時道路之難也鮑照堂上行云萬曲不關心一曲動情多琴堂則司馬相如琴臺也蓋公自比其如片雲之飄蕩何事來蜀中新近相如舊所居乎何事一作何意不如何事之快王師未報收東郡城闕秋生畫角哀公自注南京同兩都得云城闕也趙云去嵗乾元二年之秋史思明陷東京及齊汝鄭滑四州乃今之東郡今復秋矣而王師未報收復所以悲也唯國都而後有城闕詩云在城闕兮陸士衡擬古詩云名都一何綺城闕鬱盤桓成都既改為南京故公自注以為得稱城闕雲山京洛雲山外音書靜不來神交作賦客力盡望雲臺賦客謂宋玉也山濤阮籍為神矣喻不涉形迹以神交也成都記望鄉臺蜀王秀所築趙云京洛言長安與洛陽也字則陸士衡詩云京洛多風塵長安則班固所謂西都張平子所謂西京洛陽則班固所謂東都張平子所謂東京望長安洛陽之音書而不來故神交作賦客而巳作賦客指言班固與張平子也舊注差排作宋玉悮矣望雲臺亦所以望京洛也楚工之言弓曰臣之精力盡如此矣衰疾江邉卧親朋日暮回白鷗元水宿何事有餘哀趙云親朋日暮回則來相看者日暮必歸為可傷矣故末句托之白鷗以見興蓋言我之卧病於江邉如白鷗本自自水宿何苦而哀也古詩慷慨有餘哀曹子建七哀詩悲歎有餘哀公詩凡使者通此三焉遣興干戈猶未定弟妹各何之言避亂奔散不知其所適也趙云公有諸弟一妹以干戈之際各避亂而他之古詩中所謂有弟有弟在逺方又云有妹有妹在鍾離是也列子載楊朱云弟妹之所不親莊子茫乎何之忽乎何適謝靈運初發石首城諸茗茗萬里帆茫茫終何之陶潛胡為皇皇欲何之拭淚沾巾血梳頭滿面絲趙云上句言以思憶而痛悼也拭淚字劉孝威春宵詩回叉桂反鐶拭淚繩春線下句言自嘆其老也故末句有難得相見之句地卑荒野大天遠暮江遲哀疾那能久應無見汝期一作時北鄰趙云潘尼應令詩聖朝命方嶽瓜牙司北鄰明府豈辭滿藏身方告勞後漢張湛傳明府注郡所居曰府明府者尊髙之稱韓延夀為東郡太守門卒謂之明府亦其義也詩不敢告勞趙云明府所以指言北鄰之人也蓋有言之人不太守則縣令也謝靈運還舊園詩云辭滿豈多秩謝病不侍年辭滿者辭去盈滿也蓋知足之義兩句則言北鄰之人豈是辭滿故藏身而告勞乎青錢買野竹白幘岸江臯劉隗岸幘大言意氣自若巾趙作青錢蜀人謂見錢也幘謂之白幘則白編白􅀈白帽之義楚辭云朝馳騁乎江臯愛酒晉山簡能詩何水曺山簡本傳云簡優遊卒嵗唯酒是耽郡民則土豪族有佳園池簡每出嬉遊多之池上輒醉名之曰髙陽池也梁何遜字仲言八嵗能詩賦沈約愛其文嘗謂遜曰吾每讀卿詩一日三復猶不能已其為名流所稱如此為安武王參軍兼水部即初遜文章與劉綽並見重于世世謂之之何劉時來訪老病步屧到蓬蒿三輔決録注曰張仲蔚隱身不仕所居蓬蒿沒人趙云宋書曰袁粲為丹陽尹嘗步屧白楊郊野間南鄰趙云左太沖詠史詩云南鄰擊鐘鼓北里吹笙竽錦里先生烏角巾巾之有角者郭林宗遇雨而角折人皆折角以效之薛云右按晉史羊祐與從弟琇書曰既定邉事當角巾東路為容棺之墟園收芋粟一作栗不全貧史記卓氏曰吾聞汶山之下沃野下有蹲鴟注大芋也成都風俗記曰大飢不飢蜀有蹲鴟趙云舊本作芋栗非是芋與粟所收之多可謂之園收若栗于園中不過一兩􅀈耳慣看賔客兒童喜趙云魏野詩云兒童不慣見車馬走入蘆花深處藏則今慣看而喜矣賔客字如漢書賔客滿門得食階除鳥雀馴言忘機也類狎翁以趙云緣置食在階除間而得雀得之以食所馴擾舊注所言為賸義登樓賦有循階除而下降也左傳有如鷹鸇之逐鳥雀也秋水才一作雖深四五尺野航一作艇恰受兩三人師云庾肩吾詩野航渡溪渚東趙云世多惑于釋名云自關而方舟或謂之船豈有恰受兩三人乎一本作艇艇乃去聲公進艇云晝引老妻乘小艇沈存中又云當作艇艇小舟也此甚費力詩云誰謂河廣一葦杭之如今言一葉舟也枕即航也一葦猶謂之杭則野杭者不必言其大也宋鮑令暉詩有曰桂吐兩三抹蘭開四五葉白沙翠竹江村暮相送一作對柴門一作離南月色新趙云皆道其實曽子曰白沙在泥與之皆黑陳張正見詩曰翠竹梢雲自結叢杜預左傳門圭寶注云今之柴門也相送當作相對别本柴門一作離南非是赴青城縣出成都寄陶王二少尹老被樊籠役一云老恥妻孥笑貧嗟出入勞客情投異縣詩態憶吾曺一作君曺以趙云異縣指言青城也古詩他鄉各異縣公旅貧之故不免有所投矣吾曺指言二少尹也首句一作老被樊籠役不若老恥妻孥笑之為快吾曺一作君曺尢為費力東郭滄江一作滄浪合蜀城之東一水合流西山白雪髙西山近接維松上有積雪經夏不消趙云上句言成都之境舊注云蜀城之東二水合流而南下土人謂之合水是蓋今有合江亭取此以為名矣公必用此以言成都則公居浣花江上其水十餘里遂合城北江矣此滄江指浣花江言之也任彥升詩滄江易成響西山則松維州之外山也滄江方對白雪一作滄浪非文章差底病趙云差去聲差病校也蓋公尚投異縣以千求自悼雖有文章可差得何病乎如蘇東坡謂一字不堪煮之類回首興滔滔趙云回首望家興滔滔而散漫矣論語云滔滔者天下皆是也因崔五侍御寄髙彭州適百年已過半秋至轉飢寒為問彭州牧何時救急難趙云哉君子之貧也易則思過半矣書外有州牧侯伯詩兄弟急難野望因過常山仙趙云北齊劉逖有秋朝野望詩則野望兩字亦前人語矣故公屢有野望之目少仙應是言縣尉也縣尉謂之少府而梅黃為尉有神仙之稱野橋齊度馬秋望轉悠哉趙云上句言齊度馬非是當作齊馬齊蓋言下馬而與馬齊度橋也晉謡云五馬齊度江一馬化為龍乃言人與馬齊度江水今公詩句則言人與馬齊度橋上特挨傍馬齊渡而取字用耳詩悠哉悠哉而單使則如謝玄暉詩云耳目暫無擾懷古信悠哉竹覆青城合江從灌口來青城山名灌口地名昔秦守李氷疏鑿離堆以灌蜀土因而得名入村樵徑引嘗果栗皴開趙云栗皴如蝟刺之包者栗新出而嘗之所以開其皴而取之此亦七月末八月初時矣落盡髙天日幽人未遣回趙云南天則秋時之天方可言髙幽人指言常少仙也出郭趙云孟浩然詩平田出郭少盤坂入雲長則公之前有此出郭兩字故云詩又曰已知出郭少塵市又曰出郭盻細岑此篇與野望因過常少仙詩相連學者遂指為出青城之郭以詩考之領聫有不合者况下篇是過南鄰朱山人水亭乃是陳都浣花溪居之南鄰豈不可專為成都詩乎成都諸城門唯二東門曰大東郭小東郭則此詩公既來城中却自城中出東郭門繞城歸浣花溪上矣頷聨可以推見所望之處斷章可以見歸宿于所居也霜露晚凄凄髙天逐望低逺煙鹽井上蜀都賦家有鹽井泉斜景雪峯西趙云學者執此詩接青城詩下遂謂鹽井雪峯指青城所接蕃地景物如此云西山之後有土鹽一種則有鹽井矣殊不知西山土鹽乃取于崖縫之間非煮井所為者雖雪山在青城望之為近然浣花溪上詩公每言西山則成都何處而不見邪以其四時雪不消故曰雪峯今以逺煙鹽井上言之則成都唯出大東郭則東望簡州一帶可以逺見鹽井之煙西望西山落日乃在其上且謂之逺煙尤見其義矣故國猶兵馬公長安人他鄉亦一作正鼓鼙趙云上句言史朝義下句言假子璋是年五月中戌史朝義殺其父思明而襲偽位尚在公之故鄉不無兵馬也四月壬午劒南東川節度兵馬使假子璋反西川節度使崔光逺遣牙將花驚定平之斬其首者定既勝乃大掠東州至天子聞之而怒則至八九月間驚定之兵方息公在成都可謂之他鄉聞有此鼓鼙也公欲歸鄉則有思明之兵今在蜀中則新有假子璋及花驚定之辭是以歎耳孟子所謂故國者非謂有喬木之謂也吳大帝授孫慮大將軍詔有云寵以兵馬之勢也古詩他鄉各異縣禮記鼓鼙之聲江城今夜客還與舊烏啼師云鮑照詩認得舊烏栖子美言無得不悲也宿趙云江城指言成都公詩有曰鼓角動江城又曰獨江城臘炬殘皆指成都大抵江濵州郡可謂之江城公詩言之不一矣謂今夜客則自此歸浣花溪上之客也平詩逐夜所聞之烏今夜復聞之于夜則古樂府有烏夜啼也以烏屬之江城則前漢書有城上烏尾畢逋也啼字在人言之號也泣也蓋泣而有聲者公感亂而與烏俱啼其傷至矣過南鄰朱山人水亭趙云此篇公歸草堂時所作也所謂南鄰豈仍是前者錦里先生乎相近竹參差相過人不知幽花歌滿樹小水細通池歸客村非逺殘樽席更移看君多道氣從此數追隨趙云竹琴差之句用陳賀修夾池修竹詩云緑竹影參差也歸客公自言也曺子建公宴詩飛蓋相追隨恨别洛城一别一作去三千里胡騎長驅五六年因避亂入蜀趙云安祿山于天寶十四年乙未十一月反慶緒殺祿山史思明殺慶緒陷東京維亂中原至庚子上元元年為六年矣公有田園在洛陽故指洛為家草木變衰行劒外兵戈阻絶老江邉言道路險阻不可歸也木趙云上言時已秋爽而行于劒外也宋玉九辦曰草搖落而變衰兵戈字祖出戻太子贊思家步月清宵立憶弟看雲白日眠聞道河陽近乘勝司徒急為破幽燕趙云司徒李光弼也乾元二年嵗在乙亥十月李光弼及史思明戰于洛陽敗之若以此所謂河陽近乘勝不應至次年七八月而後言矣上元元年六月李光弼及思明戰于懷州敗之於七八月為近亦恐傳聞之悮而公言之與傷春時注巴蜀避遠今已收京而尚賦傷春耳幽燕史思明窟穴蓋其於是年四月更國號大燕改元順天自稱應天皇帝寄賀蘭銛朝野歡娛後張景陽詩昔在西京時朝野多歡娛乾坤震蕩中趙云朝野歡娛指安祿山未反前也黃魯直過睢陽廟云乾坤震蕩風雲晦愁絶宗臣陷賦時用公下句四字相隨萬里日總作白頭翁曹丕書已成老翁但未白頭耳曰趙云上句言與賀蘭同來萬里橋之也若作道里之萬里則自長安來蜀不當著此字也又以言萬里推之則自新津歸成都府矣嵗晚仍分袂江邉更轉蓬見前注轉趙云謝惠連詩分袂澄湖隂曺植詩蓬離本根飄飄隨長風袁陽源效古詩乃云乃知古時人所以悲轉蓬勿云俱異域古詩與君俱異域飲啄幾回同趙云俱異域尢見賀蘭之别在他處矣飲啄則又以烏為譬矣莊子云澤雉十步一啄百步一飲言身雖各異域至于須飲須啄則皆同之寄楊五桂州談因州參軍假子之任五嶺皆炎熱五嶺有桂故以桂得名見野望詩注宜人獨桂林枉田補遺山海經云桂林八樹在賁禺東注八樹成林言其大也賁禺即今之南海畨禹陳藏器云桂林嶺因桂得名從嶺以南際海盡有桂樹唯栁象州最多都趙云廣南之地皆在五嶺外五嶺則大庾嶺騎田嶺龎萌渚嶺越城嶺也又詩宜民宜人梅花萬里外雪片一冬深趙云廣東多梅萬里外或云自成都言之實在一萬里之外或云以萬里橋言之又况明皇言一行謂朕行萬里之外廣南難有雪既有梅花可玩矣又有雪深所以有下句之寬懷也聞此寬相憶為邦復好音趙云古詩下言長相憶顔淵問為邦詩云懷我好音江邊送孫楚遠付白頭吟趙云孫楚指言假子也往為桂林之參軍而孫楚常為驃騎將軍石苞之參軍故以此之附白頭吟則公自以其詩為白頭吟也白頭吟祖事出西京雜記雖是司馬相如將聘妾文君作白頭吟相如乃止然其後遂入樂府為題如鮑照所作直如朱絲繩清如玉壺氷何慚宿昔意猜恨坐相仍則意在責交好之有始終者也逢唐興劉主簿弟分手開元末開元二十九年改天寶至十四載祿山反連年絶尺書趙云分手字起於沈約一云平生少年日分手易前期一云分手桃林崖望别峴山嶺古詩云呼兒烹鯉魚中有尺素書江山且相見戎馬未安居戎馬之際奔走遜亂未安所止也趙云未安居則安慶緒既死而史思明復熾戎馬字出老子劒外官人冷關中繹騎疏趙云上句言主簿之為冷官也唐人以祠部無事謂之氷廳趙璘云言其清且冷也此亦冷官之義矣下句又言諸相見無書信也何以知驛騎之為寄書信陸凱寄苑曅詩折梅逢驛使寄與隴頭人輕舟下吳會謂當下吳都會之地主簿意何如趙云上句則公自言其欲往兩浙也故下句問劉君之意以為何如吳會言會計之會指會稽也和裴迪登新津寺寄王侍郎王時收蜀何限一作恨倚山木吟詩秋葉黃蟬聲集古寺烏影度寒塘趙云謂之集則非一蟬矣下一集字方可與度字敵風物悲遊子登樓憶侍郎趙云上句以言其遊寄下句則公題下句云王時收蜀也老夫貪佛日隨意宿僧房杜田補遺金光明經云佛日大悲滅一切門又云無上佛日大光普照又云佛日清淨滿足莊嚴佛日暉暉放千光明别本佛作費作賞皆非師趙云大低公所佛寺詩或贈僧詩必用佛書中字也云古詩貪佛不貪僧敬簡王明府葉縣郎官宰後漢王喬為葉令有神術則帝云郎官上應列宿出宰百里周南太史公顔延平詩周南悲昔老留滯感遺氓宗趙云上句指王喬為縣令以比王明府也王喬顯世為葉令時謂即古仙人王子喬也下句取太史公留滯周南以自比也神仙才有數流落意無窮趙云上句以終葉縣郎官宰之句下句以終周南太史公之句凡詩一句説此一句説彼或一句詩人一句已已謂之雙紀格驥病思偏秣師云張協賦老馬偏其芻􅐕鷹愁怕苦籠趙云此兩句則又以驥自比而望君之偏秣以鷹自比而不願局促於籠中也看君用髙義一云看歸恥與萬人同趙云言王明府之髙義其待公也髙出萬人之上矣字出吳越春秋伍子胥謂要離曰吳王聞子髙義唯一臨之曺子建美女篇佳人慕髙義重簡王明府甲子西南異言西南寒暑有異中土也冬來只薄寒江雲何夜靜一作盡蜀雨幾時乾楚詞泥汗后土兮何時乾以趙云此四句蓋實道其事言雖天道六甲運行而西南寒暑有異中原故冬來只薄寒而多雨又可厭矣故公詩又曰蜀星隂見少江雨夜來多是已行李須相問盧諶詩簡才偹行李説趙云左傳燭之武謂秦伯曰行李之往來者以李為古之使字行李言行人也公望王明府遣人來問窮愁豈自一竹有寬趙云所以須遣人來問無他以我之窮愁日甚無自寬時也家語孔子之言榮棨期明能自寬者也一本作有寬非望王明府之來問則豈在新津而王明府乃縣令乎史記虞卿以窮愁而著書也君聼鴻鴈響恐致稻梁難見一卷各有稻梁謀注正師云二詩末語皆有求於王也趙云以鴻雁自况有望于稻梁所以終其不相問之意廣絶交論云分雁鶩之稻梁建都十二韻趙云此扁今嵗上元元年九月已後之作句言窮冬則十二月也按新史肅宗至德二載以蜀都為南京鳯翔為西京西京為中京上元元年九月以京兆府為上都河南為東都都鳯翔府為西都江陵府為南都太原府為北都又按舊史肅宗紀上元元年九月以荆州為南都州曰江陵府官吏制置同京兆所以知公之詩作於九月已後所聞已審之時矣舊注以蜀都為南都非是如杜田正謬雖知引上之所云然其意專在正舊注以蜀都為南都之謬遂用此建都篇止言荆州為南都而作又北矣觀全篇正包籠東南西北皆皆在焉具解于後蒼生未蘇息胡馬半乾坤半天下議在雲臺上後漢議功于雲臺誰扶黃屋尊言誰為安王室也黃屋天子車蓋云趙云廟堂之求求所以尊玉之術也書海隅蒼生罔不率俾古注言蒼然而生則謂草木之屬而晉書高松戲謝安曰安石不出將如蒼生何則以蒼生為百姓矣胡馬於東則言史思明之兵於西則言吐蕃及西原蠻之兵是嵗吐畨陷郭州西京蠻冦邉也故曰半乾坤雲臺後漢臺名今公所云議則廟謨之説也黃屋天子車之飾以引下句建都之義為尊王者也建都分魏闕下詔闢荆門恐失東人望其如西極存東人謂關中父老也時明皇在蜀故云西極存西趙云門門以言南都東人望以言東都西極存以言都而篇末之句以言北都也建都分魏闕凡謂之都則有王者之制焉斯為分魏闕矣其建都也下詔荆門所以為南都除京兆府為上都之外河南府為東都自漢已然矣而又置南都西都北都實為異事恐失東人望指言河南府之人不服而有觖望之心也其如西極存却言以鳯翔為西都則所以為西極之重斯能保其存時危當雪恥恥國恥也梁惠王曰寡人恥之願比死者一灑之計大豈輕論趙云雪者洗雪之雪魯公享孔子以黍雪桃是下句則公亦議建都之議為無益輕輕發耳雖倚三階正終愁萬國翻漢書應劭注泰階天之三階也上階為天子中階為諸侯為公卿大夫下階為士庶人三階正則是謂太平反覆也已趙云東方朔傳云願陳泰階六符注云時肅宗即位五年三階不為不正矣而尚未平所以愁萬國之牽裾恨不死漏網荷殊恩前漢志網漏吞舟之魚趙云此以下六句公自謂也公嘗為拾遺其職諌諍故有牽裾之語魏文帝欲遷兾州事以實河南辛毗諫帝不而起遂引帝裾公既以言房琯有才不宜廢免肅宗恐欲終罪甫以張鎬之救止放歸許於鄜州看其妻孥由是亦疏之矣故公云然永負漢庭哭遙憐湘水魂賈誼傳可為痛哭屈原沈湘趙云兩句通義公以賈誼自比也誼建治安之䇿有痛哭者一使漢庭字貼之則本傳云漢庭公卿無出其右也魂指言屈原也誼謫長沙過泪羅之水有賦吊屈原窮冬客江劍隨事有田園師云陳琳詩二年江劍外劍趙云唐録載太平公主田園偏于近甸貨殖流於江見本朝太平御覽此杜公巳前事也又未知復有祖出否耳陶淵明田園將燕胡不歸風斷青蒲節霜埋翠竹根師云以况節士不得伸其志有趙云兩句成田園之義言其田園景物如是也衣冠空穰穰言衣冠雖多而不濟危難貨殖傳天下穰穰皆為利往關轉久一作逺昏昏趙云兩句則公之難深矣衣冠穰穰雖多亦奚以為關輔昏昏風塵厯年不解也庾信云昏昏如生霧久一作逺非願枉一作唯駐長安日光輝照北原趙云長安日正用晉明帝所言曰近長安逺日逺長安近故有此三字也照北原之義蓋以太原府為北都而陷於史思明帝日之光所宜照之矣枉一作駐非嵗暮嵗暮逺為客邉隅還用兵煙塵犯雪嶺鼓角動江城趙云此篇專言吐蕃之亂也今嵗上元元年嵗在庚子吐蕃陷郭州則其兵熾於西山一帶西山近接松維上有積雪人謂之雪山鼓角動江城言其震驚成都江城言成都也天地日流血謂多戰鬪也朝廷誰請纓趙云楊子川谷流人之血請纓字終軍願請長纓以係虜濟時敢受死寂莫壯心驚趙云公自悼其有濟時之志而壯心已銷故也和裴迪登蜀州東亭送客逢早梅相憶見寄東閣官梅動詩興還如何遜在揚州梁書何遜傳不見揚州事趙云題云東亭而詩云東閣但皆蜀州之東耳何以謂之亭可以謂之閣特一臨眺之所也梅屬於官故曰官梅與官栁之義同動詩興指言裴迪後人多用作杜公動詩興誤矣何遜在梁書卒於廣陵王記室舊注所云固然矣而以公詩逆之用比裴君則何遜遊于楊裴君寄於蜀其詠早梅詩同也蓋古人詠早梅唯傳何遜一篇而其梅是官梅耳見於毆陽率更藝文類聚及徐堅初學記中其題止曰梁何遜咏早梅詩詩曰兔園標物序驚時最是梅銜霜當路發映雪擬寒開枝橫却月觀花繞凌風臺知應早飄落故逐上春來詩首云兔園則以梁孝王之園比之必在揚州太守園中也又云却月觀凌風臺應是園中之臺觀名按樂史寰宇記載揚州事有風亭月觀吹臺乃宋徐湛之所營而何遜梁人在徐湛之後豈在後更有此名乎此時對雪遙相憶送客逢春一作花可自由趙云上句言裴迪登東亭之際憶我所以有見寄之作下下句又言裴迪之見梅也謂之送客逄花則東亭應在蜀州城東必矣一作逄春非是蓋後句有亂春愁也幸不折來傷嵗暮若為看去亂鄉一作春愁趙云言裴君幸不折梅以相寄若折來則使我傷嵗暮矣曹子建幽思賦感嵗暮而傷心也若何更欲往看乎茍欲往看之則起春思撩亂矣此皆遭時艱難流離於外雖見花而感亦詩人之情也春愁一作鄉愁非蓋梅非專是長安有之無見梅思鄉之義江邉一樹垂青發朝夕催人自白頭趙云言我草堂江邉亦有一樹將發又將傷嵗暮而亂春愁則頭白可知寄贈王十將軍承俊趙云詩言錦城中則指成都城內題謂之寄贈莫可考何地寄之豈在浣花溪上馳往地內便可謂之寄乎觀後卷嚴武與公詩云寄題杜二錦江野亭則自府中馳詩於浣花溪可謂之寄矣將軍膽氣雄臂懸兩角弓趙云孫子荆書曰并敵一向奪其膽氣師云謝承俊漢書邴丹膽氣過人纒結青驄馬出入錦城中時危未受鉞勢屈難為功趙云賜斧鉞然後征受鉞則為大將矣賔客滿堂上何人髙義同趙云言玉將軍之賔客皆武人耳豈有膽氣期於為如如王君之髙誼者乎此微言之耳賔客滿堂四字出漢書於王莽傳陳遵傳皆有之髙義字祖出莊子盜跖篇而曹子建美女篇云佳人慕髙義遊修覺寺前逰野寺江天豁山扉花竹幽詩應有神助補補遺南史謝惠連族兄靈運每有篇章對惠連輒得佳句嘗於永嘉西堂思詩終日不就忽夢見惠連即得池塘生春草之句大以為工常云此語有神助非吾語也吾得及春遊徑石相一作深縈帶師云吳筠賦山川縈帶勝概亦多川雲自一作晚去留樿枝宿衆鳥師云盧諶過山寺詩棲鴿繞禪枝漂轉暮歸愁趙云禪枝庾信周新州安昌寺寺碑云禪枝四靜慧窟三明而孟浩然東寺詩亦云禪枝悕鴿栖公於佛寺詩或贈僧詩多須用佛家書字斯為當體後遊寺憶新遊處橋憐再渡時江山如有待花栁更無私趙云言遊者皆得見之無所私也野闊煙光薄沙暄日色遲客愁全為減捨此復何之題新津北橋樓得郊字望極春城上開筵近鳥巢趙云古樂府云春城起風色白花簷外朵青栁檻前梢池水觀為政澄清而不撓也厨煙覺逺庖逺庖言其仁也政趙云公眼前所見而寓意也漢書云書稱水日潤下令順時則水得其性比之謂潤下今唯見池水則於是可貼以為政字矣其意則又顧子與子華遊東池子華曰水有四德池為一焉沐浴羣生澤水萬世仁也揚清激濁滌蕩塵穢義也弱而難勝勇也導江疏河變盈流謙智也顧子曰我得汝于池上矣孟子曰見其生不忍見其死聞其聲不忍食其肉是以君子逺庖厨也西川供客眼唯有此江郊奉酬李都督表丈早春作力疾坐清曉來詩悲早春趙云力疾租出越語范蠡曰𡨕為人客剛而力疾其後見於史則晉卞壺拒蘇峻力疾帥左右若戰又戰記姚戈仲求見石虎虎力疾見之又南齊世祖力疾召樂府奏正聲伎盧照鄰詩序中亦曽使矣來詩一本作來時非身既疾矣而所得之詩多悲早春故添愁覺老也轉添愁伴客更覺老隨人紅入桃花嫩青歸栁葉新望鄉應未已四海尚風塵趙云以海風塵切于望鄉也時東則有史思明西則有吐蕃故云成都有望鄉臺此望鄉字所祖登樓趙云此在閬中已聞代宗車駕還長安之作又言吐蕃陷松維保州事舊本在成都往新津詩中遂指為登新津樓而妄説紛紛正如古柏行乃夔州詩實言其氣接巫峽長而有廣大之語以為説者矣花近髙樓傷客心萬方多難此登臨趙云古詩西北有髙樓謝靈運詩客心非外奬又有登臨海嶠詩錦江春色來一作水流天地玉壘浮雲變古今師云言錦江春色自天地以來常如此而玉壘浮雲則變態古今不同趙云兩句可謂雄麗含蓄之句乃傷時多難而景物不移也成都江曰錦江謂以其水灑錦則錦色愈明也蜀都賦曰包玉壘而為宇句云玉壘山名也湔水出焉在成都西北一作錦江春水流天地此或於登新津樓見成都江之來也便不如錦江春色來天地之含蓄而蔡伯世取之非矣公又曰錦江春色逐人來於義則春色之來在天地中一氣浩大不可名狀時無古無今皆有變態如浮雲選詩云春色滿皇州論語云於我如浮雲北極朝廷終不改西山冦盜莫相侵時崔旴起西山北趙云北極者北辰也語曰譬如辰而衆星拱之則朝廷之尊安如此冦盜指言吐蕃蓋去年十月吐蕃陷京師十五日聞郭子儀軍至衆驚潰子儀復長安則朝廷似乎改矣而車駕已還此其終不改也而十二月吐蕃陷松維保三州成大震則來相侵矣故公告之以朝廷如北極終不改移爾吐蕃特盜盜耳無用相侵此犯也以此相應頷聫兩句見登樓時望全蜀氣象如舊注崔旴起兵於西山非是崔旴反在永泰元年嵗在乙巳相去三年不相干矣或云既在閬中作詩而詩及錦江玉壘何也蓋公初未聞已收宫闕遂有傷春五首于城上之作今此已聞車駕之復矣登樓逺望感去年吐蕃又陷松維保州故故詩主言蜀中之大疆界也可憐後主還祠廟日暮聊為梁甫吟趙云按資治通鑑廣德元年十二月丁亥車駕發陜州左丞顔真卿請先謁陵廟然後還宫元載不從真卿怒曰朝廷豈堪相公再壞耶載由是銜之所載如此而已代宗竟謁陵廟與否無所考也以意逆之公於二年春作傷春詩時尚未與車駕當年十二月已還京師矣故傷之而有作後聞有承宏之事所以言朝廷終不改又聞顔真卿之請所以有還祠廟之句今以為閬中所作自謂灼然矣公托言後言之還祠廟又自謂諸葛可以為之輔也考後主傳及諸葛亮傳並無祠廟之文唯後主傳注載禪謂亮曰政由葛氏祭即寡人斯以祠廟為事矣諸葛作梁甫吟意在􅏺罪晏子之為相今公以諸葛自處而為其吟所以罪元載乎梁甫吟之詞曰步出齊城門遙望蕩隂里里中有三墳纍纍正相似問是誰家冢田強古冶子力能拂南山文能約地理一朝被讒言二桃殺三士誰能為此謀國相齊晏子春歸趙云此言歸時當春也非謂春色之歸至又非謂春色之歸往也苔徑臨江竹茅簷覆地花趙云言竹生苔徑而臨江花倚茅簷而覆地耳古燕歌行云楊栁覆地亦千條又云桃抽覆地春花舒非花落而在地也題云春歸蓋言久出當時而歸非言春色歸往往若誤認題意遂有落花之義下句云歸到忽春華可見矣别來頻甲子見甲子混泥塗注歸到忽春華忽輕忽也四趙云别來者别上句之竹與花也公於松古詩曰别來忽三嵗離立如人長與此義同公初自成都遊梓閬踰三嵗焉故於甲子得謂之頻歸到則言歸成都也忽春華言倐忽之間是春公於四松詩又云避賊今始歸春草滿堂堂乃此忽春華之義矣左傳襄三十年綘縣人云臣生之嵗正月甲子朔四百有四十五甲子矣春華字如樆藻絶春華倚杖看孤石傾壺就淺沙逺鷗浮水靜輕燕受風斜世路雖多梗師云曺毗賦念世路之多梗吾生亦有涯莊子曰吾生也有涯雞趙云鮑明逺詩倚杖收豚此身一作且應醒復醉乘興即為家歸雁趙云陳徐陵答尹義言曰歸曰蘆此歸雁字所出春一作東來萬里客亂定幾年歸腸斷江城雁髙髙正一作向北飛趙云萬里言萬里橋也自西川來東川所以為東來之客今嵗廣德元年史朝義死思明父子僣號凡四年滅公喜之為亂定矣然尚留於梓江城指言梓州雁以春而北歸公之歸亦向北而不能宜有斷腸之興矣三絶此三絶皆愍交道凋敝風俗衰薄也初章言新合之情不能久則莫若不見之也次章言疏藪之無常也三章言莫若以嵗寒自守也公當亂離之際奔走流落而無上下之交故也於詩寺率皆如此此趙云世有天厨禁臠者洪覺範之書也謂為遺音句法且曰子美詩言山間野外意在􅏺刺風俗如三絶句詩是也余謂不然且解于后楸樹馨香倚釣磯斬新花蘂未應飛師云劉孝標賦斬新鼎物不如醉裡風吹盡可忍醒時雨打稀趙云斬新字通方言也雨打字即常語涅經云風雨所打洪覺範云上兩句言後進暴貴可榮觀也後兩句言其恩重才薄眼見其零落不若未受恩眷之時雨比天恩以雨多故致花易壞也又云小人之愚弄朝廷賢人君子不見其成敗則已如眼見其敗亦不能不為之歎息耳故曰可忍醒時雨打稀如此則又自為兩説矣蓋楸者梓木也與梗楠豫章同義真材不可比之後進也若必欲比興則公以自况矣如楸梓之馨香倚釣磯間曠之地其花方新未便飛落既不收收用且于醉裏兖過而落盡不忍在醒時為雨所打打而稀少則雨乃所以譬患難豈得却謂之天恩乎觀其謂之雨打則非佳意矣右一門外鸕鷀久不來沙頭忽見眼相猜自今已後知人意一日須來一百回趙云洪覺範云上兩句言貪利小人畏君子之􅏺其短也後兩句言君子以蒙飬正瑜瑾匿瑕山藪藏疾不發其惡而小人來革面諂諛不能愧恥也余謂此篇正有狎鷗之意彼以鸕鷀為小人亦何所取義乎一曰來一百回亦豈有諂諛之意乎右二無數春笋滿林生柴門密掩斷人行會須上畨看成竹客至從嗔不出迎趙云蜀人於竹言上畨則成竹又曰上筤筍下畨則不成竹亦曰下筤筍覺範斷此全篇云言惟守道嵗寒也看筍成竹謂之觀其成材則可豈有守道之意乎右三客至喜崔明府見過舍南舍北皆春水但見一作有羣鷗日日來花徑不曽緣客掃蓬門今始為君開言尋常惟為鷗鳥往來未常有客至今也方除剪蓬蒿以待君子也盤餐市遠無兼味樽酒家貧只舊醅師云前漢陳遵食不兼味陶侃詩新釀接舊醅夏趙云左傳盤餐置璧易樽酒簋二潘嶽作侯湛誄有云重珍兼味昔與鄰翁相對飲隔籬呼取盡餘杯遣意二首囀枝黃鳥近泛渚白鷗輕一徑野花落孤村春水生衰年催釀黍細雨更移橙漸喜交遊絶幽居不用名陶淵明歸去歸兮請息交以絶遊右一簷影微微落津流脈脈斜野船明細火宿雁聚圎一作寒沙雲掩初弦月香傳小樹花鄰人有美酒稚子夜一作也能賖趙云野船一本作野松非是蓋此夜景矣初弦字庾肩吾江州七夕詩初弦值早秋香謂之傳梁注訓咏舞云衣香十里傳也小樹字法華經有云小樹枝夜能賖一作也能賖蓋由北人稱也為夜是以悮改耳右二九家集注杜詩卷二十一
