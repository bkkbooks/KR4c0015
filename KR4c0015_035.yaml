body:
  text: 九家集注杜詩卷三十五宋郭知達編近體詩曉發公安數月憩自此縣趙云此篇盖吴體矣北城撃柝復欲罷易重門撃柝子子抱闗擊柝哀七年傳魯擊柝聞於邾東方明星亦不遲晉傳云時東方大明星光影射千里詩云東有啟門趙云不遲者者遲暮之遲言未失晚也鄰雞野哭如昨日物色生態能㡬時延延年日暮行樂歸物色桑榆未趙云庾肩吾詩云鄰鷄已傳愁人竟不眠野哭哭字見張景陳雜詩曰下車如晚昨日江丈通古别離曰君如昨日檀弓曰孔子惡野哭者舟楫眇然自此去江湖逺適無前期趙云無前期謂不知所止泊無向前之期程也此門􅀈眄已陳迹王羲之云俛仰之間已為陳迹藥餌扶吾隨所之謝靈運游南亭藥耳情所止哀􅔂忽在斯趙云此門之義未曉豈指石門者乎泊岳陽城下江國踰千里山城僅百層顔延年賦臨廣望生百層岸風翻夕浪舟雪灑寒燈謝惠連遇風詩落雪灑林丘趙云選賦云幹幹疊而百層留滯才雖盡史太史公留滯周南難危氣益増漢馬援曰大丈夫窮當益𥪡老當益状趙云才雖盡使才盡字為意也才盡有三事鮑照為鄙言累句時人以為才盡其實不然又江淹夢丈夫自稱郭璞曰吾有筆在卿處多年可以見還淹乃探懐中五色筆授之自是為詩絶無羙句人謂之盡又任昉晚節著詩欲傾沈約約用事過多辭不淂流便於是有才盡之嘆也史云懦夫増氣又云勇夫增氣舊注於才雖用之下引管輅云酒不可極才不可盡吾欲持酒以禮持才以愚何患之有也此乃字同義異於氣益增之下引馬援語又為旁似矣圖南未可料變化有鯤鵬荘子北溟有魚其名為鯤化而為鳥其名為鵬又云背負青天而莫之天閼焉而後乃今将圖南也趙云公方儘南而徃所以及圖南之義矣纜船苦風戯題四韻奉簡鄭十三判官泛楚岸朔風疾天寒鶬鴰呼西都賦鳥則鶬鴰沈浮徃來漲沙霾草樹丘希範柝析寒沙漲舞雪渡江湖古詩扁舟載風雪半夜渡江湖趙云爾雅云鶬䴢鴰注今呼鶬鴰雲言舞字則鮑照斆劉公幹體云胡風吹朔雪千里度龍山集君瑶臺下飛舞兩楹間吹帽時時落孟嘉為桓温參軍九日温遊龍山參僚畢集風吹嘉帽落維舟日日孤詩云汎汎楊舟紼纚維之爾雅諸侯維舟其趙云吹帽雖非九日而取事也因聲置驛外為覔酒家壚師古曰賣酒之䖏累土為壚以居酒甕四邉隆起其一靣髙形如鍛爐故名壚耳趙題題是簡鄭十三判官使鄭荘置驛也登岳陽樓范元實詩眼云望岳詩云齊魯青未了洞庭詩云吴楚東南圻乾坤日夜浮語既髙妙有力而言東岳與洞庭之大無過於此後來文士極力道之終有限量益知其其不可及孟浩然岳陽樓詩詩氣蒸雲夢澤波動岳陽樓然氣蒸者雲夢澤而已杜云吴楚東南坼則子虛賦所謂呑若雲夢者八九而不芥蒂也且學者之所指為佳句者以吴楚東南坼乾坤日夜浮而已殊不知親朋無一字老病有孤舟兩句尤是含蓄有意之對邵溥澤民侍郎云晁以道以此為俯仰格次公探其説盖若桔橰之勢相引也其義以既在洞庭之際親朋相去之逺雖無一字見及然於老病中尚頼有孤舟可以浮泛而生涯自如也昔聞洞庭水今上岳陽楼趙云戰國䇿吴起對魏武候曰昔者三苗之居左彭蠡之波右洞庭水水而周庾信有詠雁詩云南思庭庭水北想雁門闗故對岳陽楼三字乃真實呼稱之名也其言昔聞洞庭水則以吴起有昔者三苗之居之言此所以為昔聞歟若兩句之勢則又以庾信矣吴楚東南坼乾坤日夜浮趙云吴與楚地境想接吴楚東南坼實道洞庭闊逺之状乾坤日夜浮句法盖言在乾坤之内其水日夜浮也與乾坤一腐儒乾坤水上萍之勢或者便用宋何承天論渾天象體之説有曰天形正圓而水居其半地中髙外卑水周其下乃謂水浮乾坤而公之詩句似云乾坤於日夜之間在洞庭水中浮謬矣何承天之説自是渾天其言天地之外都是水則用言四海可也豈於洞庭而言言乎蘇東坡云乾坤浮水水浮空則乃杜公之義又如東南與日夜字若論出處則周禮職方氏東南曰揚州吕氏春秋云水泉東流日夜不休而謝𤣥暉詩有云東江流日夜也又若東南坼日夜浮之語亦自有所依傍秦始皇十年年地坼東西百三十歩故曰又可挨傍東南坼也其日夜浮則如親友日夜踈左太沖緑業日夜黄之勢此頷聨兩句非止雄健而字字典實如此親朋無一字老病有孤舟趙云宋謝瞻謂弟晦日交遊不過親朋而汝遂勢傾朝野豈門户之福邪前漢有云以老病罷以老病乞骸骨一字出處則如褒之一字貶之一字也孤舟出處則陶潜云或棹孤舟也不謂乏無兩字無來處乎戎馬闗山北慿軒涕泗流趙云闗山北則言在長安一帶也而闗山字則古樂府有闗山月篇矣老子云戎馬生於郊王仲宣登樓賦慿軒檻以逺望向北風而聞襟張孟陽云登崖逺望涕泗流陪裴使君登岳陽樓湖闊兼雲霧樓孤屬晩晴趙云上句盖言非特水濶而雲霧與之俱闊也下句盖言恰當晚晴則樓上所見之逺也禮加徐孺子徐穉字孺子豫章南昌人時陳蕃為太守以禮請署功曹穉不免之郡既謁而退蕃在郡不接賔客唯穉來特設一榻去則懸之後舉有道趙云公自比也詩接謝宣城謝朓字𤣥暉為宣城郡太守有云江路西南永歸流東北鶩天際識舟舟雲中變江樹雪岸叢梅發春泥百草生趙云實道眼前景物也叢梅發則新春盛發之梅荘子云春氣至而百草生敢違漁父問從此更南征史記屈原傳令尹子蘭怒屈原使上官大夫短原於頃襄王怒而遷之原至於江賔被髪行吟澤畔顔色憔悴形容枯槁漁父見而問之曰非三閭大夫歟何故至此原曰舉世混濁而我獨清衆人皆醉而我獨醒是以見放宋玉作招䰟辭曰獻嵗發春兮汩吾南征些漁趙云今云敢違漁父問則不欲效屈原之死所以遵父之語且混事而南征矣南徃者徃徃南方也屈原云濟流湘以南征梁張績有南征賦過南嶽入洞庭湖趙云南嶽衡山也在潭州之西南今題盖言欲過徃南嶽而入洞庭湖以去也洪波怱争道岸轉異江湖趙云吴王濞之子與太子𫝊争道僕嘗愛此争道字却用於洪波之下可謂竒矣鄂渚分雲樹衡山引舳艫屈原九章乗鄂渚而返顧漢武紀舳艫千里李斐曰舳船後持拖處也艫船頭刺櫂處也言其船多前漢相銜千里不絶趙云郭璞江則曰舳艫相接萬里連檣説文曰舳舟尾也艫船頭也以對雲樹則謝朓云雲中辨江樹也洞庭在岳州以順流言之則由岳而至􅀈以沂流言之則由潭而至衡山故今句所以云然翠牙穿裛蔣碧節上寒蒲趙云舊本作裛槳槳字在韻書音奬云所以隱船曰槳今詳其義乃菰蒋之蒋耳盖蒲有節而蒋有牙也病渴身何去春生力更無趙云病渴公實道其身而字則司馬相如有消渴病其對春生則如文子云若春氣而生盖夏秋冬則未嘗言生也謝惠連與柳惲相贈荅云日映昆明水春生鳷鵲樓先使此春生字也壤童犂雨雪漁屋架泥塗趙云犂字架字可謂竒矣此以實字為虚字使也欹側風㠶滿微明水驛孤悠悠廻赤壁浩浩畧蒼梧帝子留遺恨曹公屈壮圖屈平九歌湘君云帝子降兮北渚目眇眇兮愁予史記舜南廵狩崩於蒼梧之野𦵏於江南九疑是為零陵禮記曰舜𦵏蒼梧二妃不從後漢獻帝紀建安十三年曹操自為丞相南征劉表表卒少子琮立以荆州降曹以舟師伐孫權權將周瑜敗之於烏林赤壁州趙云赤壁在夏口之東武昌之西東坡先生謫居黄有赤壁賦所謂西望夏口東望武昌也蒼梧則在洞庭西南之地乃永州也謹按桑欽水經湘水出零陵始安縣陽海山而酈道元注其經歴有名營水其水下流注於湘而營水上流經九疑山下蒼梧之野大舜葬九疑之陽自洞庭而過徃南嶽則泝湘水之上故得逺言蒼梧聖朝光御極殘孽駐艱虞才淑随厮養名賢隠鍜鑪前漢蒯通傳随厮養之役者失萬乗之權守擔石之禄逺闕卿相之位張耳傳厮養卒蘇林曰厮取薪者晉嵇康鍛於大樹之下鍾㑹造康鍜不輟輟安趙云此所以言當時事而及其身也盖時上雖復長已七八年矣而吐蕃之孽未息是為駐留艱虞於此才叔之人有隨厮養者名士之賢有隠鍜鑪者邵平元入漢前漢蕭何傳邵平者故秦東陵侯秦破為布衣種𤓰長安城木𤓰美故世為東陵𤓰趙云邵平則公自嘆其不如也張翰後歸吳晉書文苑傳張翰字李鷹吴郡吴人晋齊王囧辟為大司馬東曹掾翰因見秋風起乃思吴中菰菜􅐜羮鱸魚鱠曰人貴貴得適志何得羈宦數十里以安名爵乎遂命駕而歸趙云公以其南下之遲無張翰知㡬之明此所以此其歸晚也莫怪啼痕數危檣逐夜烏檣掛帆木也郭璞賦萬里連檣趙云夜烏言檣上上之烏夜宿也謂之逐則相逐同行之船矣檣上為刻烏以占風乃天子駕前相風之義隂鏗廣陵岸送北使詩亭斯背櫪馬檣轉向風烏長沙送李十一銜與子避地西康州洞庭相逄十二秋趙云初同避地於西康州凡十二年秋而復相逄於洞庭也西康州成州同谷縣也唐地理志武徳元年以同谷縣置西康州貞觀元年州廢來屬成州其後懿宗咸通十三年復置公所用者指武徳之名言之也逺媿尚方曽賜履見上真賜還宜出尚方注境非吾土倦登樓王粲登樓賦雖信美而非吾土兮曾何足以少留師云潘安仁信美非吾土柢懐歸志乆存膠漆應難並見上天下明友皆膠注注趙云言雖有膠漆之好而才器相逺為難比並盖公自謙也一辱泥塗遂晚秋見上甲子混泥塗注李杜齊名真忝竊後漢杜密傳黨事既起宻免歸本郡與李膺俱坐而名行相次故時人亦稱李杜焉前有李固杜喬故言亦也范滂傳滂詣獄與母訣母曰汝今得與李杜齊名死亦何恨謂李膺與杜宻朔雲寒菊倍離憂宿青草湖洞庭猶在目青草續為名杜補遺云見第十四卷寄薛三郎中宿槳依農事郵籖報水程趙云上言楚人於湖中種田故船槳所宿之處依之也下言舟中所用以知時者也漏籌謂之郵籖古詩云雞人司漏傳更籖是已寒水争倚薄雲月遞㣲明趙云倚薄言依倚著泊也謝運詩詩拙疾相倚薄老子云是為徵明湖雁雙雙起人來故北征九歌云駕飛龍兮北征遺吾道兮洞庭皮趙云盖有念鄉之意雁乃北征人之不如也班叔有北征賦宿白沙驛初過湖南五里水宿仍餘照謝靈運入彭蠡湖口作云客游倦水宿風難難具論随波無限亭趙云曹子建詩千里無人煙驛邉沙舊白湖外草新青萬象皆春氣孤槎自客星博物志仙查犯斗牛客星於蜀郡問嚴君平釋語有森羅萬象隨波無限月的的近南溟的的者月色之明的也梁簡文帝傷離新體詩朧朧月色的的的夜螢飛湘夫人祠屈原九歌有湘夫人翰愈黄陵之碑云湘旁有廟曰黄陵自前古立以祠堯之二女舜之二妃者庭有石碑斷裂分散地其文剥缺考圖記言漢荆州牧劉表兄字景升立題碑曰湘夫人碑今騐其文乃晉太康九年又題其額虞帝二妃之碑非景升之立者秦博士對始皇帝云湘君者堯之二女舜妃也劉向鄭𤣥亦皆以二妃為湘君離騷九歌既有湘君又有湘大人王逸之解以為湘君者自為水神而謂湘夫人乃二妃也從舜南征三苗不返道死沅湘之間山海經曰洞庭之山帝之二女居之郭璞疑二女者帝舜之后不當降小君為其夫人因以二女為天帝之女以子考之璞與王逸俱失也之之長女娥皇為舜正妃故曰君其二女女英自宜降曰夫人也故歌辭謂謂娥皇為君謂女英為帝子各以其盛者推言之也禮有小君君母名其正自得稱君也肅肅湘妃廟詩思齋肅肅在廟空牆碧水春蟲書玉佩蘚燕舞翠帷塵晚泊登汀樹㣲馨借渚蘋蒼梧恨不淺染淚在叢筠趙云張華博物志云舜死二妃淚下染竹即斑祠南夕望百丈牽江色海賦揭百丈以牽船連竹為之孤舟泛日斜興來猶杖履目斷更雲沙山鬼迷春竹屈平九歌有山鬼辭湘娥倚暮花湘娥屈平所謂湘君也楚詞湘君云援薜荔兮中搴搴芙蓉兮木末趙云雖所湘湘夫人則郭璞江賦協靈爽於湘娥也鬼迷竹而娥倚花亦是詩家當然舊注所引非是湖南清絶地萬古一長嗟豋白馬潭水生春纜沒吴志孫權傳注權為牋與曹公説春水方生公宜速去又諸葛瑾傳注吴録曰曹真圉朱然於江陵瑾以大兵救之及春水生潘璋等作水城於上流瑾進攻浮橋真等退走瑾乃全師日出野船開宿鳥行猶去花叢笑不來人人傷白首處處接金杯莫道新知要南征且未回宋玉招魂曰汩吾南征屈平離騷曰濟沅湘以南征就重華而陳辭南趙云楚辭云樂莫樂於新相知南征且未曰則公遂征不得為新知所要而留耳歸鴈聞道今春雁南歸自應州見花辭漲海趙云言其去時也漲海是海名按南海大海之别有漲海謝承後漢書交阯七郡貢獻皆從漲海入避雪到羅浮趙云此這本其所以來時也記曰本一羅山浮山自蓬萊之峯浮來而合焉二山隐天惟石樓一路可登有洞通勾曲有璇房瑶臺七十二所是物闗兵氣何時免客愁年年霜露隔不過五湖秋趙云五湖霜雪之多鴈之不宜故隔而秋不過也野望納納乾坤大行行郡國遥古樂府行行重行行裳趙云楚辭劉向九歎有曰䄡䄡西合風兮衣納納而掩露雖言納身於衣之中所以掩蔽霜露而公今取以對行行則公之意以納身於天地之内猶納身於衣中之義耳雲山兼五嶺陸機贈顧交趾詩伐鼔五嶺表張耳傳南有五嶺之戍師古曰嶺者西者衡山之南東窮於海一山之限耳而標名有五焉薛云按秦始皇畧定揚越謫戍王方南守五嶺塞上嶺一也騎歸嶺二也都龐嶺三也畧緒嶺四也越城嶺五也自北徂南入越之道必由嶺焉杜補遺裴氏廣州記曰大庾始安臨賀桂陽揭陽是為五嶺鄧徳明南康記曰大庾嶺一也桂陽甲騎嶺二也九真都龐嶺三也臨賀萌渚嶺四也始安越城嶺五也風壤帶三苖舜典竄三苗三三危注三苗國名縉雲雲之後左洞庭右彭蠡正是潭州一帶之地野樹侵江閣春蒲長雪消趙公言樹之江江閣之旁蒲長於雪消之後扁舟空老去無補聖明朝入喬口長沙北界漠漠舊京逺陸機樂府街巷紛紛漠盧諶詩南望舊京路遲遲歸路賖孟子曰孔子去魯遲遲也陶淵明歸去來問征夫以前路殘年傍水國周禮水國用龍節顔延年詩水國周地險落日對春華文選云摛藻掞春華樹蜜早蜂亂杜補遺樹蜜椇也或作枸髙大似白楊多枝自飛鳥喜巢其上所謂止椇來巢是也有花有實其實作枅栱古今注梖一名樹蜜一名木錫實形拳曲核在實外荆湘多此木子美以記土地之所有也趙云説者謂蜜作宻非是若望兠率寺詩樹宻當此徑自當作宻次公謂豈有樹宻對江泥邪江泥輕燕斜賈生骨已朽悽惻近長沙賈誼傳天子議以誼任公卿之位絳灌東陽候馮敬之屬盡害之以誼為長沙令傳後梁王勝堕馬死誼自傷為傅亡状常哭泣後嵗餘亦死老子曰其人與骨皆已朽銅官渚守風趙云潭州長沙縣有銅官山云楚鑄錢處則此渚乃以是得名乎不夜楚帆落趙云言未至侵夜而落帆避風湘渚間水耕先浸草春火更燒山漢武帝詔火耕水耨應劭曰燒草下水種稲益生髙七八尺因悉芟去復下水灌之草死獨稲長所謂水耕早泊雲物晦逆行波浪慳飛來雙白鶴過去杳難攀杜補遺吴兢樂府古題要解曰艶歌阿嘗行亦曰飛鶴行古詞云飛來雙白鶴乃從西南來又古樂府載飛來雙白鶴二篇梁元帝云時從洛浦渡飛向遼東城吴邁逺云可憐雙白鶴雙雙絶塵氛虞世南飛來雙白鶴奮翼凌煙俱棲集此地一舉背青田皆皆過去難攀之意也趙云過去杳難攀則以阻風而羡其飛矣北風新康江口信宿方行春生南國瘴氣待北風蘇向晩霾殘日詩終風且霾釋文云風而雨土為霾初宵鼔大鑪荘子大宗大以天地為大鑪王粲賦鼓洪鑪以燎毛髪趙云兩句言日晚之後蒸鬱也所以成春生南國上之句霾實言昏曀之状也如大鑪之火則蒸熱甚矣爽携卑濕地前漢長沙定王發以其母唐兒㣲無寵故卑卑濕貧國賈誼傳誼既以適居長沙卑濕誼自傷悼乃為賦也聲抜洞庭湖趙云兩句言之清爽雄大如此也也携者若提携之而去拔者若木木之㧞句勢雖如孟浩然言洞庭湖云氣蒸雲夢澤波動岳陽城而句法雄健用言潭州之風范元實所謂雖聖人生不可改矣萬里魚龍伏三更鳥獸呼滌除貪破浪愁絶付摧枯趙云皆以言風魚龍懼而藏伏鳥獸驚而呼鳴則風之勢可知矣南史宗慤云願乗長風破萬里浪史云若摧枯拉朽喜於滌除煩鬱則貪其破浪然其所可愁絶但付之權枯耳無害於事也執熱沈沈在凌寒徃徃須桑柔詩誰能執熱逝不以濯趙云又尚苦熱反須凌寒也且知寛疾肺不敢恨危塗再宿煩舟子荘子年傳再宿為信郭璞江賦舟子於是榒棹渉人於是艤榜招趙云詩招舟子衰容問僕夫今晨非盛怒便道即長驅薛云左傳楚子以馹至於羅汭吴子使其弟犒師楚子執之将以釁鼔對曰今君奮馬震電慿怒注杜預曰慿盛也趙云宋玉風賦盛怒於土囊之口詩召彼僕夫史云便道之官漢書擁篲長驅隠几看帆席海賦挂帆席荘子南郭子綦隠几而坐隠慿也雲山湧坐隅言浪若雲山也賈誼賦止於坐隅發潭州夜醉長沙酒謝惠連雪賦酌湘吴之醇酎曉行湘水春岸花飛送客檣燕語留人賈傅才未有禇公書絶倫自注禇永微末放此州賈傅賈誼為長沙令太傅唐禇遂良博渉文史尢工𨽻書父友歐陽詢甚重之太宗嘗謂侍中魏徵曰虞世南死後無人可論書徵曰禇遂良下筆遒勁甚得王逸少體太宗即日召令侍書桓潭以揚雄為絶倫髙髙前後事回首一傷神雙楓浦輟棹青楓浦雙楓舊已推招䰟云湛湛江水兮上有楓阮籍詩云湛湛長江水上有楓樹林自驚衰謝力不道棟梁材趙云兩句言楓也盖直以楓為人而自比以為言矣樹老而摧如自驚駭其力衰謝却不道材可充棟梁也劉孝棟荅郭峙書頃年事遒盡容髪衰謝棟梁如粢梲之材不荷東梁之任浪足浮紗㡌皮須截錦苔趙云上句以言浦水之浪下句以言楓樹之兩句引用末句之意盖雙雙楓雖推而在浦旁今欲乗此楓泛江而上天於此載紗帽而浮其上則浦水之浪自足浮之楓皮上有苔蘚不能不滑故須截去錦苔而後可乗也江邉地有主暫借天天廻趙云地主見吴書孫奂傳下句又用乗槎事回棹趙云此公厭衡州之熱懐峴山之凉欲曰棹而徃公襄陽人也宿昔世安命自私猶畏天趙云此公言徃者也世安命言自徃世已然自私猶畏天則又言雖欲私己自便而終不若小人之不畏天也馮衍任武達書曰敢不陳露宿昔之意其後承用如曹子建白馬篇云宿昔秉良弓荘子云知其不可奈何而安之若命又云小智自私論語云君子畏天命勞生繋一物為客費多年趙云既知安命畏天則一任其所適盖人之勞生不免繫著一物若利若名若行若止皆是一物耳如南史王睎謂盧思道云卿輩亦是留連之一物而况其他乎惟不免繫著一物故為客費多年之久也荘子勞我以生衡岳江湖大蒸池疫癘偏趙云衡岳指言衡山按環宇記山係之潭州湘潭縣蒸池按衡州衡陽縣云吴之臨蒸以蒸水名蒸水者其氣如蒸也散才嬰薄俗有跡負前賢趙云散才者閒散之才嬰薄俗則為薄俗所嬰繞此同乎流俗之意賢者毎以跡為累故以絶跡為貴今有留滯之跡所以負媿於前賢矣巾拂那闗眼瓶罍易滿船趙云巾拂所以荘肅形容之物那闗眼則舟中放曠而不用矣瓶罍滿船則飲之多故也火雲滋垢膩凍雨裛沈一作塵綿淮南子曰旱雲煙火思𤣥賦凍雨霈其洒注暴雨也賦趙云火雲字雖出淮南子而用字則隋盧思道納涼云火雲赫而四舉凍雨字楚詞云凍雨兮灑塵強飯蓴添滑蓴見張翰後歸吴注端居茗續煎薛云按茶録潭邵之間渠江中所出鐵趙云漢書行矣強飯勊之孟不過十五六斤其色如芳芬異常煎之無脚彼人所餉渠江者乃東平所出詩趙云漢書行矣強飯勉之孟然岳陽樓欲濟無舟檝端居耻聖明明清思漢水上凉憶峴山嶺漢水峴山皆襄陽也處趙云此在湘潭之詩最為卑濕蒸鬱之故清思漢水而凉憶峴山也順浪翻堪倚廻帆又省牽江賦水夷倚浪以傲睨吾家碑不昧王氏井依然杜預沈碑峴山之下王粲宅有井几杖将衰齒茅茨寄椽椽趙云几杖以将扶衰暮之年齒結茅茨之廬而寄身短椽之下皆欲徃漢上之事灌園曾取適遊寺可終焉趙云謂之曽則徃嘗如此矣自此而至彼以遊寺為終焉之記也遂性同漁父成名異曽連屈原荘子皆有篇父篇史記田單屠聊城歸而言魯連欲爵之魯連逃隐於海上曰吾與富貴而詘於人寕貧賦而輕世志志焉趙云於此遂其如滄浪之漁父又不求名聞翻異魯仲連盖仲連能却秦軍下燕城雖不受封猶為取名也篙師煩爾送朱夏及寒泉趙云云此句盖以語篙師云煩爾送我一去猶於朱夏之際趂及寒泉之為可挹也梁元帝纂要夏曰朱明又曰朱夏此乃公一時之興自是且徃耒陽矣豈却仍徃峴也奉送王信州崟北歸趙云信州今之䕫州也見樂史寰宇記亦見唐志朝廷防盜賊供給愍誅求下詔選郎署傳聲典信州趙云此篇王信州替罷而罷歸去四句言其初來作守時也蒼生今日困天子嚮時憂井屋有煙起瘡痍無血流趙云上兩日進言天子前時以蒼生之困而選王君為守其效至於井邑有煙則逃亡復業已瘡痍無血則誅求不再夭壤歌唯海甸畫角自山樓趙云壤歌則擊壤之歌也唯海甸則時淮海獨無虞也畫角自山楼則專指䕫州郡楼之畫角以時時而鳴盖亦無事之所致也白髪􅀢常早荒榛農復秋趙云上句公自言也下句言荒年之後又復有秋亦見王守之政矣解龜喻臥轍謝靈運初去永嘉牽絲及元興解龜在景平侯覇為臨淮太守被徵百姓攀轅臥轍不許去之趙云此言王守之替罷臥轍侯覇事踰臥轍則踰越而過也遣騎覔扁舟劉真長遣騎覔張孝簾船見晋書比趙云公言王之覔其船船以張慿自也徐榻不知倦潁川何以酬陳蕃為徐孺子下榻去則懸之趙趙云公以徐穉自比而指王崟為蕃也也言崟相待如陳蕃之見徐穉其解榻懸榻未嘗厭倦則穉之於潁川将何以酬之乎潁川則陳氏之郡號也塵生彤管筆寒膩黒貂裘詩貽我彤管蘇秦有黑貂裘言弊裘以垢膩而寒髙義終焉在斯文去矣休趙云髙義斯文皆指言王信州也言王君待我之髙義終在乃却以文章之身而别去故云去矣休荘子載孔子曰聞將軍髙義論語天之末喪斯文史云有終焉志去别離同雨散行止各雲浮曹子建風流雲散一别如雨劉孝標煙飛雨散劉越石詩功業未及建斜陽忽西流時哉不我與去矣若雲浮楚詞悲莫悲兮生别離孟子行止非人之所能為也林熱鳥開口江渾魚掉頭趙云止道離時之景尉佗雖北拜陸賈傳時中國初定尉佗魋髻箕倨見賈賈因説佗君王宜郊迎北靣稱臣於是佗迺壓然起坐謝賈辛拜佗南越王趙云以言叛者之既服豈吐蕃之消息乎盖大歴元年二月遣使來朝雖九月復䧟原州然不得如前日之熾也太史尚南留趙云公自比也太史公自叙曰留滯周南軍旅應都息寰區要收九重思諫諍八極念懐柔徙倚曕王室從容仰廟謀趙云正言息干戈而思治安之策矣潘安仁詩徒步歩踟蹰故人持雅論絶塞豁窮愁趙公故人指王信州也言聞王信州之論則可以豁其旅㝢指愁也絶塞指言䕫州白帝城復見陶唐理甘為汗漫遊神仙傳盧敖見一士曰與與汗漫期於九垓之外杜補張景陽七七命曰尔乃踰天垠越地隔過汗漫之不遊躡張亥之未跡注汗漫能遊天者也李善曰淮南子云若士曰吾汗漫逰於九垓之下若士舉臂竦身而遂入雲中趙云盖言既見復帝堯之化則無心從官而甘為方外之士也江閣臥病走筆寄呈崔盧兩侍御客子庖厨薄江樓枕席清衰年病祗痩長夏想為情滑憶一作喜彫胡飯沈休之彫胡方自炊西京雜記太液池邉皆是彫胡緑節之類菰之有采者長安人謂彫胡菰之無未者謂之緑節又㑹稽人顧翺少失父母母至孝母好食彫胡飯常躬自採擷家近太湖湖後自生彫胡無復餘草香聞錦帶羮薛云荆湘間有花名錦帶春末方閒紅白如錦其苖脆嫩可食王彦輔云錦帶吐綬鷄也其肉脆美堪作臛亦名錦鷄溜匙兼暖腹誰欲致杯甖趙云宋玉云主人之女為臣炊彫胡之飯溜匙以言彫胡之滑暖以言錦帶之美美可以理推也潭州送韋貟外牧韶州迢或云韋適炎海韶州牧風流漢署郎分符先令望同舍有輝光鮑明逺将以分符竹外趙云公亦是員外郎胡放韋貟可謂之同舍矣白首多年疾秋天昨夜涼洞庭無過鴈書疏莫相忘趙云言自洞庭而徃彼雖無過鴈以寄書去而彼中音却却不可忘也潭州留别杜貟外院長韋追江畔長沙驛相逄纜客船大名詩獨歩小郡海西偏趙云言子美獨歩曹子建與楊徳祖書曰仲宣獨歩於漢南小郡則韋君自謂韶州也地濕愁西鵩賈誼為長沙王太傅以長沙卑濕但自傷悼見鵩鳥入室廼為鵩賦天炎畏跕鳶馬援曰吾在浪泊西里閒虜未滅時上潦下霧毒氣薫蒸仰視飛鳶跕跕水水中趙云廣雅云南方曰炙天故例用之曰天炙以對地濕去留俱失意把臂共澘然趙云此詩韶州刺史韋迢作其詩頻杜公宜編在集中矣江閣對雨有懐行營裴端公公趙云裴端公應在廣南觀詩中使南紀并銅柱可見矣南紀風濤状隂晴屢不分杜田云詩曰滔滔江漢南國之紀說者援是詩以江漢為南紀非也盖南紀乃命野名廣天文志云東循領徼逹甌閩中是謂南紀所以限蠻夷也顔延年詩春江状風濤野流行地日江入度山雲趙云行地日度山雲可謂新語矣層閣憑雷殷長空靣水文趙云層閣雷殷殷言當雷殷之際在層閣慿欄之時也合對長空靣水文矣舊正作水靣文非雨來銅柱北應洗伏波軍趙云銅柱在驩州之南南極角處馬援所建今有雨之地宜尚在其北也昔武王代紂大雨太公謂之洗岳雨故魏武兵援要曰大将将行雨濡衣冠是謂洗兵今因雨自銅柱而來引起馬援則遂有洗伏波軍之句早發湘潭寄杜貟外院長韋迢北風昨夜雨江上早來凉楚岫千峯翠湘潭一葉黄故人湖外客白首尚為郎相憶無南雁何時有報章趙云此篇格律渾似杜公但不使事亦不使字所出白首尚為郎言杜公晚為貟外郎也馮唐顔駟事古云鴈不過衡陽衡陽有回鴈峯故言無南鴈也報章雖出詩終日七襄不成報章義止説織女雖從旦至暮七辰一移不不如人織相反報成文章而此報章字則顔延年和謝靈運詩云盡言非報章聊用擴所懐學者請觀之篇氣格有類杜公宜公愛而載於集也酬韋韶州見寄養拙江湖外朝廷記憶時深慙長者轍長者轍見陳平傳趙云言見過之無人也重得故人書趙云言書閣之不至也白髪絲難理新詩錦不如雖無南過鴈二十五卷書成無過雁注看取北來魚詩詩呼童烹鯉魚中有尺素書故趙云今公荅韋迢無南雁之語以北來魚復戲之也千秋節有感二首自罷千秋節頻傷八月來唐𤣥宗紀上以誕日日讌百僚於花蕚樓下百僚表請以毎年八月五日為千秋節三公以下獻鏡及承露囊先朝常宴㑹壮觀已塵埃鳳紀編生日龍池塹劫灰武帝穿昆明池悉是灰墨有外國胡道人云此是天地劫灭之餘𤣥杜補遺鳳紀見鳳歴軒轅紀注六典注興慶宫池即宗龍澘舊宅初居此宅東有舊井忽湧為小池常有雲氣或黄龍見其中至景龍中其池浸廣遂澒洞為龍池焉盖符命之先也湘州新涕涙秦樹逺樓臺二妃涕涙灑竹成斑謝𤣥暉銅雀臺詩繐帷飄升幹樽酒若平生鬱鬱西陵樹詎聞歌吹聲井幹樓也自起云上句公自言其身之所在而感注者也下句公言去長安之逺遙望其樹與樓臺俱不見也寳鏡羣臣得金吾萬國回趙云舊唐書千秋節羣臣皆獻寳鏡今公千秋節有感之句而云寶鏡羣臣得追憶寳毎毎至此節於羣臣得之也唐百官志十六衛謂金吾職廵警今公詩云金吾國國回盖以萬國入京獻夀而金吾實司察之自元宗升遐唐百秋節而金吾所伺獻夀之萬國各回而不來盖傷之也衢樽不重飲白首獨餘哀淮南子聖人之道其猶中衢而致樽也趙云當時賜宴之酒羣臣皆得霑飲正如衢樽也右一御氣雲樓敞含風綵仗髙仙人張内樂王母獻宫桃宫桃見上九重春色醉仙桃注杜正謬宣室志云唐𤣥宗夢仙子十餘輩御卿雲而下列於廷各執樂器而奏之其度曲清越殆非人世及樂闋有一仙子前曰陛下知此樂乎此神仙之雲曲今傳陛下為唐正始音𤣥宗甚喜即傳授焉又鄭棨開天傳信紀𤣥宗謂髙力士曰吾昨夜夢逰月宫月宫禇仙娱予以上清之樂寥亮清越之音非人間所聞也酣飲久之合奏諸樂以送吾歸其曲悽楚動人杳杳在耳吾遂以玉笛尋之盡得其聲力士請曲名上曰紫雲曲遂載扵樂篇今太常刻石存之二説大同小異故并載之漢武帝故事曰西王母賫仙桃七枚獻帝帝欲留核㮔之王母笑曰此桃一千年生花一千結實人夀㡬何遂指東方朔曰仙仙桃三熟此兒已三偷矣羅襪紅蕖艶洛神賦凌波微歩羅襪生塵又廹而察之若芙蕖出緑波趙云言宫人也紅蕖艶比其襪之如蓮金羈白雪毛曹子建白馬飾金羈連翩西北馳趙云以言馬也比其毛之鮮㓗舞階銜夀酒舜舞于羽于雨階劉伶銜杯潄醪詩云為春酒以介眉夀夀趙云舊唐書初上皇毎輔宴先設太常雅樂斷以鼓吹胡樂教坊府縣散樂雜戯云云又教舞馬百匹銜杯上夀走索背秋毫西京賦跳九劍之揮霍走止索而相違明皇雜録載上毎賜宴酺大陳尋犝走索九劍為角觗戲聖主他年貴邉心此日勞趙云上句追言明皇之昔日下句公自言其令日在邉逺之地而感望也桂江流向北滿眼送波濤趙云末句桂江即是潭州之水所從來也流向北又見北望長安之切矣右二晚秋長沙蔡五侍御飲筵送殷六參軍歸澧州覲省佳士欣相識慈顔望逺遊潘安仁夀觴舉慈顔和論語父母在不逺遊趙云佳士指六殷六也慈顔則殷之母也言望其逺遊而歸也甘從投轄飲陳遵嗜酒毎大飲賔客滿座輒闗門取客車轄投井中雖有急終不得得去趙云言甘從蔡五之飲也不作置一作致書郵殷羡字洪喬為豫章太守都下士人因羡致書百餘餘函行次石皆棄水中曰沈者自沈浮者自浮浮殷洪喬不為致書缷殷趙云言殷不茍為人携書也此姓事於殷六尤切矣髙鳥黄雲暮寒蟬碧樹秋趙云韓信云髙鳥盡良弓藏禮記月令孟秋之月寒蝉鳴淮南子云黄泉之埃上為黄雲碧樹字祖出列子而江淹兩使一云碧樹先秋落一云碧雲芊芊芊湖南冬不雪吾病得淹留趙云言荆渚尚雪而可以留也湖中送敬十使君適廣陵趙云舊本作湖中師氏瞻作湖南是盖此潭州詩潭州在湖之南也前後篇皆是長沙可見矣相見各頭白其如離别何㡬年一㑹靣今日復悲歌趙云古詩云㑹靣安可知故對悲歌其字則撫節悲歌也少壮樂難得嵗寒心匪他趙云古詩云少壮不努力故對嵗寒其字即論論嵗寒然後知松柏之後彫也氣纒霜匣滿氷置玉壺多樂府清如玉壺氷句趙云上句言在匣中而氣騰矣下言心之清也遭亂實漂泊濟時曽琢磨形容吾校老膽力爾誰過秋晚岳増翠風髙湖湧波趙云魏文帝浮淮賦云驚風泛湧波鶱騰訪知己淮海莫蹉跎趙云言敬君之徃廣陵者訪求知己也應謂揚州節度矣書曰淮海惟揚州故用淮海字九家集注杜詩卷三十五
