body:
  text: 九家集注杜詩巻二宋郭知逹編古詩送孔巢父謝病歸遊江東兼呈李白按唐書孔巢父冀州人字弱翁早勤文史少與韓凖李白張叔明陶沔隠於徂萊山時號竹溪六逸永王璘赴江淮聞其賢以從事辟之巢父察其必敗側身潜遁由是知名後為潭州刺史湖南觀察使未行會德宗幸奉天遷給事中御史大夫興元元年使李懐光於河中巢父遇害巢父掉頭不肯住東將入海隨煙霧不肯住謂謝病歸江東也荘子在宥篇鴻濛拊髀爵躍掉頭曰吾弗知也煙趙云江文通擬詩畫作秦王女乗鸞入霧詩巻長留天地間釣竿欲拂珊瑚樹一云三珠樹西都雜記積草池中有珊瑚樹高一丈二尺一本三柯上有四百六十二條是南越王趙佗所献號為烽火樹至夜光景常欲然世説王愷常以一珊瑚高二尺許枝柯扶踈以示石崇崇以鐵如意撃碎乃令取珊瑚樹高三尺條榦絶世者六七示愷南州志曰珊瑚出大秦國海中生海底石上天趙云晉書樂志有釣竿篇曰釣竿何冉冉古詩人生地間珊瑚樹一作三株樹非是葢三海經云三株樹生赤水上其樹如栢葉皆為珠雖亦貴物而非海底為釣竿所拂者深山大澤龍虵逺春寒野隂風景暮一云花繁草青春日暮叔向之母妒叔虎母美而不使有子謂其子曰深山大澤實生龍蛇彼美吾懼其生龍虵以禍女趙云上句葢言巢父經行之地下句葢言其去之時候如此也左傳曰入山不逢不若魑魅魍魎莫能逢旃下既云巢父有仙骨則其行也雖經深山大澤而龍虵亦自逺遁可以經行無疑况當春時其物尚蟄亦為逺矣梁庾肩吾詩早花餘花雪春寒極晚秋顔延年贈王太常詩云庭昏見野隂而疊春寒野隂四字如素問天寒日隂之勢也世説曰過江諸人每暇輒相要出新亭藉卉飲宴周侯中坐而歎曰風景不殊舉目有江河之異蓬萊織女囘雲車指㸃虚無是歸路一作引歸路陸士衡牽牛西北囘織女東南顧趙云作仙人玉女囘雲車指㸃虚無引歸路葢蓬萊海中三山之一織女係之無義又是字𦂳重下自是仙人玉女四字古詩仙人王子喬難可與等期魯靈光殿賦玉女窺窻而下視曹植云虚無求列仙王母嘗乘五雲之車謝靈運初發都詩始得傍歸路自是君身有仙骨世人那得知其故趙云以與李白嘗隠於徂萊山則有仙風道骨矣神仙傳有神謂墨翟曰子有仙骨詩云慘不知其故世説謝公問王子敬君書何如君家尊答曰當不同公曰外論殊不知爾王曰外人那得知惜君只欲苦死留富貴何如草頭露古詩薤上朝露何易晞詩湛湛露斯在彼豐草趙云巢父既謝病而歸則為輕富矣孰能留之惜之者雖苦死欲相留豈知富貴如草露之易滅哉蔡侯靜者意有餘清夜置酒臨前除陸士衡擬古詩閑夜命懽友置酒迎風館江文通詩置酒坐飛閣逍遥臨華池曹子建詩清夜遊西園除階除也趙云謝靈運詩還得靜者便罷琴惆悵月照席幾嵗寄我空中書趙云與孔為别時是蔡侯者作主人而蔡又善琴矣既别去而望其寄書也謂之空中書則以巢父有仙骨寄書乃在空中來也南尋禹穴見李白道甫問信今何如一作深山大澤龍虵逺華繁草青風景暮仙人玉女囘雲車指㸃虚無引歸路若逢李白騎鯨魚道甫問信今何如太史公自序司馬遷年二十南遊江淮上會稽探禹穴張晏曰禹巡狩至會稽而崩因葬焉上有孔穴或曰禹入此穴江淹詩幸遊建德鄉觀竒經禹穴杜補遺御覽載栝畧曰會稽山有一石穴委曲黄帝藏書於此禹得之又呉越春秋禹藏之所謂之禹穴也趙云若逢李白騎鯨魚葢賀知章以白為謫仙人其與巢父皆有學仙之質則可以騎鯨矣揚雄羽獵賦乘鉅鱗騎鯨魚注鯨大魚也飲中八仙歌蔡元度云此歌分八篇人人各異雖重押韻無異亦周詩分章之意也一趙云此篇謂之歌其歌八疊每一疊各就公事實以其好飲美之且戲之謂之八仙則已有意矣為其各言一公之事故得重用韻所重用者舩字二眠字二天字二前字三也古詩葢有重押韻之格如阮籍秋懷日如何當路手罄折志所歸又云鴻鵠遊四海中路将安歸謝靈運述祖徳詩曰段生藩魏國展季救魯人又曰恵物辭所賞勵志絶故人陸機行行重行行云此思亦何思思君徽與音又曰驚颷褰友信歸雲難寄音似此之類不一説者謂為八首葢不知有此格也况詩又乃八疊乎又緣道書之論丹有八仙歌雖是八箇仙人歌為有八仙歌三字因併以為題知章騎馬似乘船眼花落井水底眠唐書賀知章少以文詞知名性放曠善調笑當時賢逹皆傾慕之晚年尤加縱誕無復規矩白號四明狂客遨逰里巷又善草𨽻書每紙不過數十字共傳寶之又師浙人不善騎馬而喜乘舟杜葢嘲戲之耳東坡詩云平生賀老慣乘舟騎馬風前怕打頭吳越國王初入朝上賜寶馬出禁門馬行却退王謂左右曰豈遇打頭風耶趙云知章吳人唯知乗船其馬上傲元如人眼花落井别言醉而眼生昏花落井而眠於水底又言其安於水也山簡傳時時能騎馬前漢有乘船危吳均雜絶句有云夢中難言見終成亂眼花水底眠又暗用事抱朴子曰時有葛仙公者每飲酒醉嘗入人家門前陂水中卧竟日乃出汝陽三斗始朝天道逢麴車口流涎恨不移封向酒泉本集八哀詩有贈太子太師汝陽郡王璡詩又贈時進汝陽王詩神異經西北荒中有酒泉孔融書天垂酒旗之曜地列酒泉之郡陸機百年歌目若濁鏡口垂涎應劭漢官儀曰酒泉城下有金泉味如酒故曰酒泉酒趙云汝陽王李璡也以其宗室既受封汝陽矣猶以泉城下有泉味如酒欲移封也又使姚馥渴羌事晉有羌人姚馥但言渴於酒人呼為渴羌武帝授以朝歌守馥願且為馬圉時賜美酒以樂餘年帝曰朝歌紂之舊都地有酒池使老羌不復呼渴遂遷酒泉太守麴所以造酒才見麴車而便流涎戲其好飲之急也曹操對其叔父詐作中風狀口流涎沫逄麴車而流涎冇用對過屠門而大嚼人以為的對甘師魏文帝曰蒲萄釀以為酒於麴米逢之已流涎咽唾左相日興費萬錢飲如長鯨吸百川銜杯樂聖稱世賢唐書李適之傳一名昌常山王承乾之孫也適之雅好賔友飲酒數斗不亂夜則宴賞晝决公務庭無留事天寶元年代牛仙客為左丞相累封清河縣公後為李林甫隂中罷知政事賦詩曰避賢初罷相樂聖且銜杯為問門前客今朝幾箇來晉何曾性奢豪日食萬錢猶曰無下筯處劉伯倫酒訟先生於是方捧甖承糟銜杯潄醪木𤣥虚海賦嘘噏百川吳都賦云長鯨呑航脩鯤吐浪務趙云謂之日興言每日興起便如此也如陸遜云世日興異物志去鯨魚長者有數千里故也亦以戯之宗之蕭灑美少年舉觴白眼望青天皎如玉樹臨風前李白傳侍御史崔宗之謫官金陵與白詩酒唱和嘗月夜乘舟自採石達金陵白衣宫錦袍于舟中顧瞻笑飲旁若無人晉阮籍傳籍能為青白眼阮籍詩朝為美少年謝𤣥答叔父安曰譬如芝蘭玉樹欲使其生於庭階耳世説庾亮亡何揚州臨葬云埋玉樹於土中使人情何能巳毛曾與夏侯𤣥共坐時人謂之蒹葭倚玉樹然師晉書王戎有人倫鑒識常目王衍如瑶林瓊樹自是風塵表物也趙云劉琨云舉觴對膝白眼望天言其飲之傲亦所以戲之也蘇晉長齋繡佛前醉中往往愛逃禪蘇晉蘇珦之子𤣥宗監國所下制命多晉藁定同趙云逃禪言逃去而禪坐耳此蘇東坡所謂蒲褐禪夜禪者也以晉好佛故戲之云耳李白一斗詩百篇長安市上酒家眠天子呼來不上船自稱臣是酒中仙唐李白傳待詔翰林日𤣥宗度曲欲造樂府新詞亟召白白於酒肆醉矣召入宫人以水洒面即令秉筆頃之成十餘章帝頗嘉之薛云按闗中呼衣襟為舩詩曰何以舟之舟亦舩也其來逺矣天鮑云劉偉明云蜀人呼衣襟為舩有以見白醉甚雖子披襟自若其真率之至也大杜補遺余雲叟嘗以薛注為是謂方言雖有此夢符似穿鑿雲叟以舩字何為有兩韻余曰一篇之中重疊用韻至于再三亦别有義耶按唐范傳正李翰林斷墓碑曰𤣥宗泛白蓮池公不在宴明皇歡既洽召公作序公已被酒於翰苑中命高力士扶以登舟也趙云詩百篇言其能詩也酒家眠言其真率也樂布為酒家保酒家眠亦暗用事阮籍鄰家少婦當壚酤酒籍嘗詣婦飲醉便卧其側也不上舩此乃長安方言襟謂之船也薛蒼舒補遺更引詩曰何以舟之乃自觧云舟亦船也其來逺矣葢舟自訓服耳所以服之字從舟也杜田又引范傳正李翰林新墓碑曰用為舟船之船亦又非是葢在翰苑被酒則自長安市中來而扶以登舟則竟上船矣非不上船也張旭三杯草聖傳脱㡌露頂王公前揮毫落紙如雲烟唐賀知章傳吳都張旭與知章相善旭善草書而好酒每飲後號呼狂走索筆變化無窮若有神助時人號為㒹後漢張敻傳敻長子芝伯英善草王愔文志曰芝少時高操以名臣子勤學尤好草書學崔杜之法家之衣帛必書而練臨也學書水之為黑為世所寳寸紙不遺韋仲將謂之草聖胡母輔之與謝鯤阮放曅卓羊曼桓彛阮孚散髪祼祖閉室酣飲已累日光逸排戸入守者不聼逸便於户外脱衣露頭於狗竇中窺之大叫輔之驚曰他人决不能耳必我孟祖也遽呼入遂與飲不捨晝夜時人謂之八逹避趙云後漢班超傳單于脱㡌徒跌又有云單于脱㡌帳詣梁王謝罪旭為人酒秃㡌㡌則露頂矣乃所以戲之也潘安仁作揚荆州誄云動翰若飛落紙如雲後漢高義方清誡曰抗志凌雲烟焦遂五斗方卓然高談雄辯驚四筵按新唐書白自知不為親近所容益驁放不脩與焦遂等為酒八仙子趙云世説載王敦晝寢卓然驚寤又云諸名賢論莊逍遥遊支道林卓然標新理於三家之表又江淹擬張廷尉詩云卓然凌風矯又僧惠逺製涅經疏呪其筆曰如合聖意此筆不墜乃擲於空中卓然新唐書云李白自知不為親近所容益驁放不脩與集遂等為酒八仙則遂亦平昔驁放之流耳飲至五斗而方特卓乃所以戯之末句又以美之劉孝標廣絶交論云騁黄馬之劇談縱碧雞之雄辯選詩有高談一何綺疊用四字有兩出而後工也謝宣逺九日詩曰四筵霑芳醴驚字則前漢陳驚坐之驚也曲江三章章五句元和中中書舍人李肇撰國史譜其畧曰進士既捷大讌於曲江亭子謂之曲江大會在闗試後亦謂之闗宴天寳元年勅以太子太師蕭嵩私廟逼近曲江因上表請移他處敇令將士為嵩營造趙云此詩葢逰曲江感事之作按劇談録曲江本秦時隑州隑即碕字巨依切唐開元中疏鑿為勝景南即紫雲樓芙蓉苑西即杏園慈恩寺花卉環列烟水明媚都人遊賞盛于中和上巳節今公高秋而往草木變衰觸事感懐一章嘆齒發之遲暮二章判富貴之無心三章喜生計之可樂也舊注引元和中曲江闗宴事去此自五十餘年在公死三十餘年之後與此詩並無相干曲江蕭條秋氣高謝𤣥暉觀朝雨詩朔風吹飛雨蕭條江上來宋王曰悲哉秋之為氣蕭瑟兮草木摇落而變衰蕭趙云宋玉衆芳蕭條班固原野條之義菱荷枯折隨風濤游子空嗟垂二毛潘安仁秋興賦晉十有四年余春秋三十有二始見二毛僖二十二年傳宋公曰君子不禽二毛頭白有二毛漢高祖㳺子思故鄉白石素沙亦相蕩哀鴻獨呌求其曹禰衝賦哀鴻感類曹子建激鳴索鴻羣劉安招隠士禽獸駭兮亡其曹趙云方高秋之時非特菱荷枯折而巳水既瘦涸石與沙亦蕩潔而出鴻鵠失羣哀鳴而相求皆可感之事也哀鴻字出選詩舊注引禰衡賦云哀鴻感類輒改哀鳴字非是盖哀鳴不可為哀鴻况義止謂鸚鵡之哀鳴乎失古人措詞之意矣即事非今亦非古長歌激越梢林莾宋玉風賦蹷石伐木梢殺林莽蘇武詩長歌正激烈撫杜補遺列子云薛譚學謳於秦青辭歸青餞於郊衢節悲歌聲振林木響遏行雲趙云列子曰周之尹氏有老役夫晝則呻吟即事陶淵明云即事多所欣謝靈運云即事怨睽携蘇武詩長歌正激烈梢林莽言歌之聲其義州列子云秦青撫節悲歌聲振林木比屋豪華固難數吾人甘作心似灰弟姪何傷淚如雨莊子南郭子綦形固可如槁木而心固可如死灰當公遊此之時曲江方盛無可嘆者此即事之非今古也而至於長歌激烈何哉特以豪華者多而我獨寂寞也然灰心乆矣弟姪不必用此傷之而下淚也曲江在長安南昇道坊葢其左右前後相近之地甲第為多乎公因感之可以意逆也漢溝洫志武帝歌曰泛濫不止兮愁吾人又西都賦云實列仙之故館非吾人之所寧而潘岳西征賦云陋吾人之拘攣今吾人葢自謂也論語何傷乎詩涕泣如雨自斷此生休問天杜曲幸有桑麻田故將移住南山邉杜曲在長安俗云城南韋杜去天尺五言近京楊憚傳曰彼南山陸韓卿詩云屏居南山下竇嬰傳屏居藍田南山下何趙云楚辭有天問篇其序曰天問者屈原之所作也不言問天天尊不可問故曰天問也管子云行山澤觀桑麻有桑麻田亦顔洲云囘有郭外之田短衣匹馬隨李廣看射猛虎終殘年漢李廣為虜所生得當斬贖為庶人人屏居藍田南山中射獵見草石中以為虎而射之中石没羽視之石也他日射之終不能入矣廣所居郡聞有虎常自射之乃居北平射虎騰廣廣亦射殺之也趙云欲移住南山邉則南山之景致足樂也匹馬射虎使李廣事正在南山藍田中此詩人因意使事也列子曰汝以殘年餘力梁武帝云短衣妾不傷汝孫通迺變其服短衣楚製麗人行曹子建洛神賦云覩一麗人于巖之畔劉向别録有麗人歌賦梁簡文帝箏賦命麗人於玉席三月三日天氣新續齊諧記曰晉武帝問尚書郎虞摯曰三日曲水其義何指答曰漢章帝時平原徐肇以三月初生三女至三日俱亡一村以為怪乃招携之水濵盥洗遂因以泛觴曲水之義起於此帝曰若如所談便非佳事尚書郎束晳曰仲治小生不足以知此臣請説其始昔周公城洛邑因流水以泛酒故逸詩云羽觴隨波又秦昭王三日置酒河曲見有金人出捧水心劒曰令君制有西夏及秦霸諸侯乃因此處立為曲水祠二漢相沿皆為盛集帝曰善賜金二十斤左遷仲治為陽城令趙云晉宋諸人侍宴曲水皆以三月三日為題唐開元中都人逰賞於曲江莫盛乎中和上已節此三月三日所以水邉多麗人也舊注徒引三月三日事為泛矣王右軍蘭亭曲水序曰天朗氣清恵風和暢此亦天氣新之為禮記天氣下降陸機曰遲遲暮春日天氣柔且和梁孝元帝詠霧詩有曰時如佳氣新長安水邉多麗人態濃意逺淑且真肌理細膩骨肉勻羅敷艷歌曰高臺多妖麗宋玉九辯有靡顔膩理相如大人賦有弱骨豐肌謝靈運江妃賦有靡容膩理皆此之謂也則東京賦有擘肌分理繡繡一作畫羅衣裳照暮春晉張華三月三日後園㑹詩曰暮春元日王羲之蘭亭詩序暮春之初㑹稽山隂之蘭亭古詩被服羅衣裳南都賦暮春禊日上巳之辰男女姣服絡繹繽紛論語暮春者春服既成則照暮春字於衣服使之尤稳蹙金孔雀玉麒麟頭上何所有翠微㔩葉垂鬢脣微一作為㔩一作匌背後何所見珠壓腰衱稳稱身杜補遺廣韻曰㔩彩婦人髻飾花也㔩音罨爾雅曰衱謂之裾郭璞曰衣後裾也一本㔩作匌衱作被非是趙云蹙金實事唐人常語故杜牧自謂其詩云蹙金結綉而無痕迹頭上背後之句此亦曹子建矣美女篇頭上雀釵腰珮翠琅玕之勢也盖舉頭與腰之飾而一身之服備矣翠微一作翠為㔩一作匌㔩音烏合切㔩絲婦人頭花髻飾也匌音洽與萄字連曰匒匌而匒音荅重疊皃海賦云磊匒匌而相逐翠微㔩葉則翡翠微布於㔩絲之葉翠為匌葉則以翠為匌匝之葉也衱音居葉切爾雅曰衱謂之裾郭璞曰衣後裾也謂之腰衱則羣腰耳以珠綴之故言珠壓腰衱此篇公所舖叙至此詳味語句葢特見麗人之後耳故東坡先生題背面美人名之曰續麗人行而其詩云杜陵饑客眼長寒蹇馿破㡌隨雕鞍隔花臨水時一見只許腰支背後看就中雲幕椒房親班固西都賦云後宫則掖庭椒房后妃之室漢官儀曰皇后稱椒房取其蕃實之義也詩云椒聊之實蕃衍盈升又以椒塗宫室亦取其温煖辟除惡氣猶天子朱泥殿上曰丹墀也師古曰椒房在未央宫吳樹謂梁冀曰將軍以椒房之重西都記成帝設雲幄雲幕於甘泉紫殿世謂三雲殿第五倫傳竇憲椒房之親曹子建美女篇頭上金雀釵腰佩翠琅玕此指言貴妃兄弟驕盛趙云言玉真妃也成帝設雲幕於甘泉紫殿椒房則皇后所居殿名秦虢乃玉真之姊妹故曰雲幕椒房親也賜名大國虢與秦唐后妃傳𤣥宗楊貴妃有姉三人皆有才貌𤣥宗並封國夫人之號長曰大姨封虢國八姨封秦國並承恩出入宫掖勢傾天下虢趙云大姨封虢國八姨封秦國非是以長安志考之國八姨也則秦國乃大姨也紫駞之峯出翠釡水精之盤行素鱗峯一作珍漢書大月氏本西域國出一封橐駞注脊上有一封高也如封土然今俗呼為幇匈奴傳師古注橐駞言能負橐囊而晉物晉王廙笙賦舞靈蛟之素鱗其杜補遺酉陽雜爼将軍曲良翰作駞峯炙趙云言食之奢也曹子建詩豐膳出中厨師宋鄭鮮之經子房廟詩紫烟翼丹虬靈媪悲素鱗觀此即知素鱗乃蛟龍也杜意亦謂攀龍酉陽雜爼明皇恩寵禄山所賜之物有金平脱犀頭匙筯犀筯厭飫乆未下鑾刀縷切空一作坐紛綸晉何曽日食萬錢猶云無下筯處詩信南山執其鸞刀以啓其毛注鸞刀刀有鸞者言割中節也潘安仁西征賦饔人縷切鸞刀若飛應刃落爼靃靃霏霏杜補遺正義曰鸞即鈴也公羊宣十二年鄭伯右執鸞刀注鸞刀宗廟割切之刀鐶有和鋒有鸞其制二鸞在鋒聲中宫商三和在鐶聲中角徵羽故先儒釋禮器謂宗廟必有鸞刀者取其鸞鈴之聲宫商調而後斷割也趙云方筯未下之間又復有縷切之多此所以言其食之奢黄門飛鞚不動塵前漢西域傳蒲梢龍文魚目汗血之馬充於黄門凡號黄門以其給事於黄闈之内秦漢皆有黄門侍郎按外傳虢國出入皆乘驄馬使小黄門為御趙云不動塵因以狀其善騎詩家造句法也鞚薛云鮑明逺擬古詩獸肥春草短飛越平陸御厨絲絡送八珍絲絡一作絡繹周禮膳夫珍用八物注珍用淳熬淳毋炮豚炮牂檮珍漬熬肝膋也又食醫掌八珍之齊鮑明逺詩八珍盈雕爼子薛云尚膳貴嚴故以絲絡䕶䕶之絲絡如琦䟽也杜美稱此以見寵予之隆絡繹為不足道往在詩云赤墀櫻桃枝隠映銀絲籠送趙云絡繹相續不㫁之義後漢袁術與呂布書曰今米二十萬斛非唯止此當絡驛復致舊本正字作絲絡而薛蒼舒為之説元無絲絡字本出若絡繹以言寵予之隆義自分明若絲絡亦天子御物常事耳却何足道也簫鼓哀吟感鬼神鼓一作管漢武秋風辭簫鼓鳴兮發棹歌詩序動天地感鬼神賔從雜遝實要津魏文帝與吳質書曰輿輪徐動賔從無聲劉向傳雜遝衆賢師古曰雜遝聚積之皃要津見上韋左丞注趙云此言作樂以宴賔且微言以譏其男女之糅雜大人賦雜遝膠轕以方馳甘泉賦駢羅列布鱗以雜沓兮洛神賦衆靈雜遝後來鞍馬何逡巡當軒一作道下馬入錦茵鞍馬字見送高適注趙云言其氣勢洋洋旁若無人徐悱贈内詩忽有當軒樹兼含映日花史秦人開關延敵六國之師逡巡不敢進楊花雪落覆白蘋青鳥飛去銜紅巾山海經曰三危之山有青鳥居之注青鳥主為西王母取食者栖息於此山也紀年曰穆王十三年西征于青鳥之所憇漢武故事曰七月七日上于氷華殿齊坐中忽有一鳥從西方來集於殿上上問東方朔曰此西王母欲來也有頃王母至有二鳥鳥如鳥夾侍王母旁江淹詩青鳥海上遊沈約銜書必青鳥鵡趙云鞍馬之多必至觸楊花而覆白蘋青鳥應如鸚之數豢飬馴熟飛銜紅中此正借西王母以青鳥為使名之且以託言昵戲之事矣紅巾蓋婦人之飾如王渤落花篇羅袂紅巾往復還炙手可熱勢一作世絶倫慎莫近一作向前丞相嗔元載時委左右人四人用事權傾中外人為之語曰炙手可熱卓李鄭薛言勢熖燻灼可以炙手也帝題之御屏以示時相按新唐書楊貴妃智算警潁迎意輒悟帝大悦遂専房兄銛錡國忠最見寵遇三姉皆美劭封韓虢秦三國恩寵聲熖震天下毎命婦入班雖公主亦不敢就位臺省州縣奉請託奔走勘㑹過詔敕四方献餉結納門若市然第舍聮亘謂之五家分賜珍竒使者不絶於道時國忠代李林甫為相領四十餘使帷疎侻捷給硜硜處决樞務自任不疑盛氣驕愎百寮莫敢相可否杜補遺唐史遺事安縣公主𤣥宗之李妺附袁韋氏熱可炙手人咸畏之在趙云炙手可熱言勢熖之薰灼也舊注引代宗時事杜公之後非是杜田之説當時素有此言矣傅毅舞賦姿絶倫之妙態丞相嗔以指言國忠而詩句則後漢桓帝時童謡云梁下有懸鼓我欲撃之丞相怒之勢也觀新書國忠傳言國忠盛氣驕愎百寮莫敢相可否而公詩直鋪叙二國衣服飲食之盛聲樂賔從之多中間著寵予之意又譏其糅雜昵狎之事而終之以直指丞相之薰灼則公之不畏強禦可見矣古樂府當時近前面發紅樂遊園歌晦日賀蘭楊長史筵醉中作在趙云樂遊園之地在秦為宜春苑漢為樂逰苑謂之古園樂遊古園崒森爽西京記日樂遊園漢宣帝所立唐長安中太平公主于原上置亭遊賞其地四望寛厰每三月上巳九月重陽士女咸就此祓褉登高幄幕雲布車馬填塞紅絲映曰馨香滿路朝士詞人賦詩翼日傳於京師崒趙云崒音才律切字書注云峯頭巉嵒也句腰單用字亦猶宋玉高唐賦之單用崒用也其言蓄水之狀曰崒中怒而特高峯字却音柞骨切煙綿碧草萋萋長謝靈運詩萋萋春草繁江淹賦春草碧色劉安招隠士春草生兮萋萋公子華筵勢最高秦川對酒平如掌文選王粲家本秦川周王褒闗山篇逍遥秦川水千里長如帶沈佺期長安路詩秦地平如掌層城出漢雲紛趙云張率白紵歌列坐華筵羽爵長生木瓢示真率更調鞍馬狂歡賞青春波浪芙蓉園魏文帝有芙蓉池作鄴都西園在城南曲池坊臨水亭進芳門外即樂遊園也𤣥宗紀開元二十年廣花蕚樓築夾城至芙蓉園王莾傳乃西波水之北郎池皆在石城南上林中生趙云芙蓉園有水言青春波浪袁淑真隠傳載鬼先言河邉之樹曰波浪盪其根白日雷霆甲城仗甲當作夾於趙云夾城當作甲非芙蓉園夾城曲江地皆相近按長安志載樂遊與芙蓉園曲江並出京城東延興門閶闔晴開映趙作詄蕩蕩曹植平陸東行曰閶闔天衢通前漢禮樂志遊閶闔觀玉䑓天門開詄蕩蕩注閶闔天門蕩蕩天體堅清之狀相如大人賦徘閶闔而入帝居鄮后夢捫天蕩蕩色正青遊趙云詄字元本作映又作映應是詄字前漢禮樂志閶闔視玉臺天門開詄蕩蕩公葢取此語意以比城門也曲江翠幕排銀牓潘安仁籍田賦曰翠幕黤以雲布陳張正見詩即此神山内銀牓映仙宫陳沈炯林屋館記崑山平圃銀牓相暉蓬閬仙宫金臺幄起神異經曰東方青宫門有銀牓晉潘尼洛水詩翠幕映洛湄拂水低佪舞袖翻縁雲清切歌聲上曹植云華閣縁雲上征列薛云曹植言華閣緣雲此稱歌聲清切耳子云薛譚學謳於秦青辭歸秦餞於郊衢撫節悲歌聲振林木響遏行雲西京雜記高帝令戚夫人歌出塞望歸之曲後宫齊唱聲入雲霄薛趙云後漢王延夀魯靈光殿賦飛陛揭孽縁雲上征符刋誤乃引列子子載秦青之歌響遏行雲又西京雜記戚夫人歌聲入雲霄其意以為兩事皆有雲字遂用證之殊不知遏雲則往之且非杜公縁雲本意唯入雲霄方有緣雲之義大人賦低佪隂山翔以紆曲兮却憶年年人醉時只今未醉巳先悲數莖白髪那抛得百罰深杯亦不辭罰一作刻説文曰漏以銅盛水刻節晝夜百刻歌趙云百罰一作百刻是盖飲酒雖有罰而方觀舞聼何至罰酒之百也百刻者漏中之刻畫也説文曰漏以銅盛水刻節晝夜百刻或云杯中像漏中立箭為刻以記淺深之度斟酒則浮出而可見雖傳記無所載而今世固為有浮花浮花之狀十而分之以斟酒者則百刻之狀乃細分之者矣如此而義方可講葢盡百刻舉深泛之杯無所辭拒正以白髪之不可抛而飲酒以遣其悲也聖朝亦知賤士醜一物自荷皇天慈楊子秦之士也賤陸機𤣥冕無醜士江淹上書云一物之微有足悲者人趙云江淹思北歸賦云况北州之賤士為炎土之流家語孔子謂哀公曰一物失理亂亡之端此身飲罷無歸處獨立蒼茫自詠詩庾信乞酒詩蕭瑟風聲慘蒼茫雲貌愁梁朱异田秋引值寒夜之蒼茫梁元帝詩秋氣蒼茫結孟津潘安仁哀永逝文曰視天日兮蒼茫荒趙云皆在景物寂言之也渼陂行趙云渼陂行其字從水從美士大夫非西人者多讀為于亮切乃蕩漾其字自是從水從羕遂使鬻書者有一本直雕作漾陂行豈不誤學者乎按長安志渼陂在鄠縣西五里出終南山諸谷朝公泉為陂朝公水一作胡公水説文曰渼陂周一十四里北流入澇水十道志云陂魚甚美因名之曰陂廣大氣象雄深故公詩於初至之際以天地變色則有鼉鯨風浪之憂既而開霽可遊則如與龍鬼仙靈相接既而又憂雷雨此盖陂之廣大雄深詩人因事起意以為詩謂其有可異則不得不憂有可喜則不能不樂有可防則不得不戒而詩篇之終有安不忘危樂不忘哀之意岑參兄弟皆好竒携我遠來遊渼陂趙云岑參於唐書無傳莫知兄弟之名也揚雄云子長之好好竒也渼陂在鄠縣按地里志郭去府南六十里豈不謂之逺來乎天地黤慘忽異色波濤萬頃堆琉璃王粲登樓賦天慘慘而無色西域傳罰賔圑出琉璃孟康曰琉璃青色如玉師古曰魏畧云大秦國出赤白黒黄青緑縹紺紅紫十種琉璃孟言青色不博通也此葢自然之物梁簡文池水净琉璃言趙云百畆曰頃後漢黄叔度汪如萬頃陂堆琉璃指其色色之青瑩耳琉璃漫汗泛舟入事殊興極憂思集張平子南都賦布濩漫汗趙云天地黤慘則為可異水如琉璃則為可愛以其可愛而便欲泛舟以入則為可憂矣漫汗言廣大也事殊興極葢言其初逺來之興豈不欲晴朗以為遊乎而初來之際忽逢天地黤慘則事殊矣事之既殊則興亦極盡興既極盡則寧不憂思乎憂思謂之集王筠行路難云百憂俱集斷人腸鼉作鯨吞不復知惡風白浪何嗟及詩中谷有推啜其泣矣何嗟及矣張季鷹詩謳吟何嗟及趙云此乃所以憂也謝惠連長門怨云向夕千愁起自悔何嗟及又梁費昶長門怨曰向日千悲起百恨何嗟及主人錦帆相為開舟子喜甚無氛埃隋煬帝以錦為帆詩招招舟子郭璞江賦舟子於是搦掉渉人於是檥傍帆趙云主人指言岑參也陳隂鏗渡青草湖詩平湖錦張楚辭闢氛埃而清凉沈休文詩夜靜滅氛埃其言無氛埃又倣魏都賦風無纎埃也前者以天地黤慘而遊者憂今也以無氛埃而舟子喜不亦宜乎鳬鷖散亂棹謳發絲管啁啾空翠來西都賦鳥則鳬鷖雉雁雲集霧散又櫂女謳鼓吹震漢武秋風辭簫鼓鳴兮發棹歌趙云啁竹包切玉篇引説文啁嘐也楚辭曰鶡鷄啁􅑜而悲鳴棹歌發則喧矣故鳬鷖驚而散亂空翠來則晴矣故絲管乾而啁啾沈竿續蔓深莫測菱葉荷花靜如拭杜補遺永徽本草圖經云菱實也葉浮水上花黄白色花落而實生漸向水中乃熟紫色者謂之浮菱食之為美暴其實為末可以當糧鷄頭名雁啄一名芡生水澤中葉大如荷皺而有刺俗謂之鷄頭盤花下結實其形類鷄頭故以名之經傳謂其子為芡酉陽雜爼云芟今人伹言菱芰諸解草木書亦不分别唯安真武陵記言四角三角曰芟兩角曰菱芰一名水栗漢武昆明池中有浮根菱根出水上葉没波下亦曰青水菱𤣥都觀有菱碧色狀則如鷄飛名翻鷄芰又圖經云藕實莖葉名荷爾雅及陸機疏謂荷為芙蕖江東呼荷其莖茄其葉蕸其本蔤莖下白蒻在泥中者其花未發為菡萏巳發為芙蓉其實蓮為房其根藕其中的蓮子的中薏中心青而苦者芙蕖則其總名也趙云菱葉荷花淨如拭則水之幽深可見矣妙處是淨如拭三字盖如王僧儒至牛渚憶魏少英詩有沙岸净如掃宛在中流渤澥清下歸無極終南黒詩蒹葭宛在水中央楊子渤澥之島趙云上句以形容其深下句以言其逺上句譬喻下句實指葢渤澥者海也既如渤澥之深廣而又清此所以為譬終南山山在陂之上流去之逺則視之黒也此所以為實指詩在在水中央説文東海之别有渤澥故東海共稱渤海列子無極之中復為無極而後人用之如魏文帝詩曰高高殊無極半陂已南純浸山動影裊窕冲融間木𤣥虚海賦冲融滉瀁裊趙云鮑照與妺書半山以下純為黛色窕冲融皆言水之深疊使四字之勢亦左太冲招隠詩云峭奪青葱間竹栢得其真舩舷暝戛雲際寺水面月出藍田闗宋謝靈運石門巖上宿詩暝還雲際宿孫綽山銘飛字雲際郭璞江賦詠採菱以叩舩舷尉也藍趙云雲際者山名在鄠縣東南六十里上有大定寺田闗在藍田縣東南九十八里舩舷之戛可聞於雲際之寺月出之所可想其當於藍田闗皆以陂之廣大然此時驪龍睡吐珠莊子河上有家貧者其子没於淵得千金之珠其父謂曰取石來鍛之夫千金之珠出在九重之淵驪龍頷下子能得珠者必遭其睡也馮夷擊鼓羣龍趣謝惠連雪賦馮夷剖蚌列明珠注馮夷河伯也曹子建洛神賦馮夷鳴鼓女媧清歌大人賦靈媧鼓琴而舞馮夷莊子太宗師馮夷得之以游大川釋文司馬云清冷傳曰馮夷華隂潼郷隄首人也服八石得水仙是為河伯又一云以八月庚子浴於河而溺死一云渡河溺死新添龍馬河圖曰河伯姓吕名公子馮夷即河伯夫人餘見二十五巻玉臺觀詩趙云小説載有人入仙室見一羊吐珠他日問張華云此􅌐龍也馮神賦馮神鳴鼓湘妃漢女出歌舞金支翠旗光有無曹子建神女賦從南湘之二妃携漢濵之游女前漢禮樂志金支秀華庶旄翠旌張晏曰金支百二十支秀華中主有華艷也文潁曰析羽為旌翠羽為之也臣瓚曰樂上衆飾有流翅羽葆以金為支其首敷散若草木之秀華也師古曰瓚説是司馬相如曰建翠華之旗梁元帝檄文建翠鳯之旗北齊祖孝徵翠旗臨塞道咫尺但愁雷雨至蒼茫不曉神靈意易雷雨作解漢郊祀歌靈之車結𤣥雲靈之來先以雨九歌云雲客容兮在下又東風飄兮神靈雨少壯幾時奈老何向來哀樂何其多漢武秋風辭歡樂極少哀情多少壯幾時兮奈老何趙云左傳天威不違顔咫尺此一口之間初至而天地黤慘乃向來所哀之多也既而晴無氛埃可以縱遊乃向來所樂之多也此一句以結一篇之事渼陂西南臺高臺面蒼陂六月風日冷趙云此兩句而下皆對當六月炎天而在渼陂清深之地故風日自冷所以著言月以美之也蒹葭離披去天水相與永謝靈運云雲日相輝映空水共澄鮮違趙云蒹葭蒼蒼離披出昭明文選易有天水行訟長笛賦相與集乎其庭懷新目似撃接要一作接惡心已領謝靈運詩懐新道轉逈尋異景不延荘子田子方篇仲尼見温伯雪子目撃而道存陶潜詩醉醒還相笑發言各不領仿像識鮫人空濛辯魚艇搜神記南海之外有鮫人水居如魚不廢緝績其人能泣珠海賦仿像其色又其根則有天琛水怪鮫人之室郭璞鮫人搆館乎懸流曹植弄珠蚌戯鮫人廣雅曰舡二百斛以下曰艇其形徑艇一人二人所乘行也趙云言其深廣若鮫人在其中也謝𤣥暉有朝雨詩云空濛如薄霧言若無而空若有而濛也錯磨終南翠顛倒白閣影終南白閣並山名五經要義云終南山長安南山也一名太一漢書曰太一山古文以為終南山藩岳間中記曰其山一名中南言在天之中都之南故曰中南趙云兩句以言其于清臺之上俯湖而見山矣崷崒増光輝一作隂乗陵惜俄頃西都賦嵓峻崷崒謝靈運詩常充俄頃用上趙云其山之崷崒能増湖之光輝又思乘陵于山之然惜其時光只有俄頃不能乆也此盖家家馳騁之意崷音疾由切崒音才律切崷崒兩字宋書有之云山高皃也廣雅云陵乘也而宋玉風賦曰乘陵高城入於深宫勞生愧嚴鄭外物慕張邴嚴陵鄭子真也嵇叔夜憂憤詩仰慕嚴鄭樂道閑居張良邴原謝靈運詩偶與張邴合乆欲還東山杜正謬按前漢王貢兩龔傳序谷口有鄭子真屬有嚴君平皆修身自保揚雄著書言當世士稱此兩人云谷口鄭子真不屈其志耕于巖石之下名震京師蜀嚴湛冥不作苟見不治茍得乆幽而不改其操雖隋和何以加諸嵇康幽憤詩仰慕嚴鄭樂道閑居亦謂嚴君平鄭子真也謝靈運還舊園詩辭滿豈多秩謝病不待年偶與張邴合乆欲還東山注張良貴極願弃人事邴曼容免官飬志自修嚴趙云於此嘆勞生之可媿思物表之可慕公所媿者君平鄭子真也所慕者張良邴曼容也世復輕驊騮吾敢雜鼃黽趙云重嘆世不我知而輕驊騮之駿則欲隠居于陂上馬驊騮見上天育驃騎歌注國語范蠡曰吾先君魚鼈之與處而鼃黽之與同者知歸俗可忽取適一云足事莫並趙云此等句皆外枯而古腴葢言知所歸宿則世俗可忽取適於巳則凡事不可得而並夫世俗之事可勝言哉此不盡之意也選有委篋知歸身退豈待官老來苦便靜謝靈運辭滿豈多秩謝病不待年之趙云老子功成名遂身退者也詩句意是公未献賦得官時葢言身欲求退豈必待於為官之後乎舊注引謝病不待年混亂之矣謝靈運云拙倚相倚薄還得静者便便音平聲况資菱芡足庶結茅茨逈從此具扁舟彌年逐清景菱芡見前一詩注漢趙云周禮籩人菱芡栗脯堯茅茨不剪高祖云吾亦從此逝矣范蠡扁舟游五湖曹子建詩有明月澄清景言澄湛其清景耳戯簡鄭廣文䖍兼呈蘇司業源明廣文到官舍繫馬一作置堂階下廣文見上醉時歌注醉則騎馬歸趙云劉琨繫馬長松下山簡傳日暮載歸酩酊無所知時時能騎馬倒著白接䍦頗遭官長罵才名三十年趙云後漢檷衡傳曹操以其才名不欲殺之周禮天官其屬六十大事則從其長世説徳第一篇為官長當清當慎當勤坐客寒無氊晉吳隠之其為太常時坐無氊席頼有蘇司業時時與一作乞酒錢夏日李公見訪一云李家令見訪逺林暑氣薄公子過我游趙云沈約詩逺林響咆獸近樹聒嗚蟲貧居類村塢僻近城南樓馬融在陽塢中杜趙云此所謂城南韋也傍舍頗淳朴所願亦易求趙云前漢高祖紀云適祖適從傍舍求所願古本作所須極是盖語方快也隔屋喚西家借問有酒不墻頭過濁醪展席俯長流江淹恨濁醪夕引川趙云嵇康與山濤書曰濁酒一杯杜陵之樊鄉有樊而潏水則自樊川西北流經下杜城然則詩句有展席俯長流者豈其居當此地耶清風左右至客意已驚秋江淹晨飈自逺至左右芙蓉披巢多衆鳥闘葉密鳴蟬稠苦遭此物聒孰謂吾廬幽古詩蟬噪林逾靜鳥鳴山更幽陶淵明詩衆鳥欣自託吾亦爱吾廬趙云古詩言庭樹曰此物何足貴水花晩色靜庶足充淹留預恐樽中盡更起為君謀孔融曰坐上客常滿鐏中酒不空古今注蓮花一名水旦一名水芝一名水花奉同郭給事湯東靈湫作東山氣濛鴻宫殿居上頭趙云東山驪山也接長安志述征記曰長安東則驪山西則白鹿原北望雲陽悉見山阜之形而常若雲霧之中其上殿則有飛霜九龍玉女七聖長生四聖明珠闘雞之目又有重明閣觀風樓朝元閣按歌臺羯鼓樓等也帝系譜曰天地初起溟涬濛混君來必十月樹羽臨九州言温湯也長安志開元後𤣥宗每歲十月幸温湯歲盡而歸立羽葆葢也趙云詩崇牙樹羽江淹詩君王澹以思樹羽望楚城隂火煮玉泉噴薄張巖幽温泉也海賦陽水不治隂火潜然注杜補遺本草玉泉生藍田陶隠居云是玉之精華又曰玉泉者玉之泉液也以仙室玉池中者為上今仙經三十六水法中化玉為玉漿稱為玉泉服之可以長年然功劣於自然泉液也一名玉液一名瓊漿詳觀是詩盖言湯泉之色如玉非玉之泉液也趙云博物志凡水源有硫黄其泉則温水經云麗山温水俗云始皇與神女戯不以禮神女唾之生瘡始皇謝之神女為出温水而洗除今公以其水温故假隂火煮之以為美有時浴赤日光抱空中樓山海經大荒之中暘谷上有扶桑十日所浴又曰有七子名曰羲和浴日於甘泉又曰日拂于扶桑出于賜谷于咸池趙云此盖言日色出光照樓閣此泉正是咸池耳閬風入轍跡曠原一作野延冥搜杜補遺神異經曰崑崙三角其一角正北千星辰名曰閬風巔其一角正西曰𤣥圃臺其一角正東曰崑崙宫趙云以言乘輿逺詣而㝠搜也自驪山而出若将訪崑崙而遊廣原此所以言其欲𡨕搜也老子善行無轍迹而義則周穆王欲車轍馬跡遍天下之意顔延年云用御窮轍迹此所以謂之延宴搜也天台賦逺寄冥搜公詩意必言閬風者以周穆王嘗西征至崑崙墟見西王母也沸一作拂天萬乗動觀水百丈湫前漢郊祀志湫淵祀朝那注水清澈可愛不容穢濁龍之所居趙云鮑明逺蕪城賦歌吹沸天言其聲之多也萬乗動則所動之聲然矣縣百丈湫傳記無所明載特長安志有冷水一條稱在東三十五里亦曰百丈水乃與戯水相近且引水經注曰冷水出浮胏山戯水驪山鴻谷揩浮胏山乃驪山之麓而有異名耳則冷水戯水皆出驪山之下又水經注云冷水厯隂盤新豐兩原之間戯水北厯戯亭而長安志載戯亭隂盤城處有湯泉水之名且云正觀中乗輿將自東門入湯泉水岸深數丈時水瀑漲平岸又見物狀如猪當土門卧命有司致祭其物起向北而失時有詩乃直指為龍所在惜乎地志不載百丈湫字及至尊游幸事無所考證今故詳載其近似者以竢博雅君子訂之幽靈斯一作靈湫詩可佳王命官屬休趙云言乘輿既至湫傍遂休官屬休乃百工休之休初聞龍用壯擘石摧林邱大壯九三小人用壯郭絲生述征記巨靈擘開華山詩恵連詩落雪洒林邱中夜掘宅改移因風雨秋趙云龍川壯而擘石此原為湫之始也窟穴改而移又言龍所居非一處然則湫之廣大可知矣郭璞江賦瑰竒之所窟穴又天台山賦序靈仙之所窟宅倒懸瑶池影屈注滄江流漢郊祀志谷永云登遐倒景覽觀縣圃浮㳺蓬萊如淳曰在日月之上反從下照故其景倒大人賦貫列缺之倒景孫綽天台賦或倒景於重溟張協七命云倒景而開軒海賦瑰竒之所窟宅廣雅日景在下曰倒景趙云言湫之深廣險激公詩又於過驪山之下曰瑶池氣鬰律者如此舊注引倒景以證倒懸非是謝聎詩結軫青郊路迴瞰滄江流舊本作蒼江非是味如甘露漿揮弄滑且柔江賦揮弄灑珠周禮欲其柔而滑却參倣選詩齊瑟和且柔也翠旗淡偃蹇雲車紛少留九歌蠻旗蹇兮姣服又蹇將幨兮壽宫枚乘七發旌旗偃蹇相如建翠華之旗注以翠羽為旗上葆也大人賦掉指橋以偃蹇又云蜩蟉偃蹇薛云楚辭東皇太一曰靈偃蹇兮姣服又大司命曰乘囘風兮載雲旗二章屈原之所作也趙云淡偃蹇則在高逺間自下觀之茨如也神仙有五雲之車也紛少留則嬪嬙侍女之多矣北征賦曽不得乎少留登樓賦曽何足以少留簫鼓蕩四溟異杳泱莽浮漢武帝簫鼓鳴兮發棹謳顔延年笳鼓震溟州未𤣥虚海賦泱莽淡泞七啟入乎泱莽之野謝𤣥暉晨光復映莽張平子泱莽無疆劉伶泱莽望舒隠泱趙云選詩雨足灑四溟泱莽字舊注所之引皆是泱莽音烏朗切莽音模朗切或注云無疆限貌或注云不明之貌漭雖與莽同音而終非泱莽正出其字在上林賦言八川之流曰過乎泱莽之野注云大貌山海經所謂大荒之野也以言水流之長逺異香泱莽浮則香之所浮如此其荒逺也蛟人獻微一作徵綃曽祝沉豪牛吳都賦泉室潜織而巻綃注云鮫人織輕綃于泉室以賣之趙云献微綃則以湫之深廣宜有之矣下句所以祭其湫也詩曽祝致告百祥奔盛明古先莫能儔書作善降之百祥揚雄觧嘲遭盛明之世吳都賦古先聖代坡陀金蝦蟆出見盖有由相如子虚賦罷池坡陀下属江河又哀二世賦登坡陀之長坂匡俗正謬坡陀者猶言靡迤埤雅蝦蟆一名蟾蜍或作詹諸張衡靈憲羿竊不死之藥於西王母嫦娥得之奔月是謂蟾蜍陸倕漏刻銘靈虬承注隂蟲吐李翰日隂蟲蝦蟆也潘鴻日按五行志神龍中渭水有蝦蟆大如鼎里人聚觀數日而失此韋后時事坡陀金蝦蟆盖其類也禄山濁亂宫闈故有此應可與翟泉鵝出同類並觀故曰出見盖有由又載蝦蟆色如金或云驪山上有古碑載之至尊顧之笑王母不遣一作肯收復歸虚無底化作長黄一作龍與虬趙云按禄山事跡帝嘗夜宴禄山醉卧化為一猪而龍頭左右遽言之帝曰渠猪龍耳無能為也詩盖暗指此事飄飄一作颻青瑣郎文采珊瑚鈎浩歌渌水曲清絶聼者愁末賛郭詩結出相和之意夜聼許十一誦詩愛而有作王云按詩當是天寶十四載長安作許十一當是居五臺學佛許生五臺賓業白出石壁水經注五臺山五巒巍然故謂之五臺此山名為紫府仙人居之其北臺之山即文殊師利常鎮毒龍之所實積經若純黑業得純黒報若純白業得純白報又云凡五戒十善四禪四定為無量白净之業佛經以善業為白業惡業為黒業趙云言許生客居五臺行業精白而岀也逹磨嘗曰當勤白業䕶持三寶也列子載趙襄子狩于中山籍芿燔林熻赫百里有一人從石壁中出隨烟上下也五槖山阿羅漢所在謂許生為五臺賓因其隠迹五臺而名之遂云出石壁乃所以神異之也黄魯直却變用入石壁事自賛其畫云前世寒山子後身黄魯直頗遭俗人惱恐欲入石壁夫石壁之可出可入非神異者能之乎余亦師粲可身猶縳禪寂師粲善詩祖杜正謬璨可乃六僧璨及慧可禪師璨傳法偈云華種雖因地從地種花生若無人下種花地盡無生可傳法偈云本來縁有地因地種花生本來無有種花亦不能生璨可二禪師乃禪中祖師故子羙云師璨可縛禪寂非師璨善詩也又補遺維摩經所生無縛能為衆僧説法解如佛所説縛若自有縛能解彼縛無有是處若自無縛能解彼縛斯有是處是故菩薩不應起縳何謂縛何謂解貪著禪味是菩薩縛以方便生是菩薩解又云以大精進攝諸懈慢一心禪寂攝諸亂意有趙云此两句髣髴似對大手叚多如此故蘇東坡亦之粲可二人之名禪寂是两字也粲則僧粲可則慧可按傳燈録正與逹摩世次相接公方言與許生共學性空事故詩語用此許生已業白而出吾猶縛禪空而未脱亦自慊之辭縛字出佛書葢以對解其語曰貪著禪味是菩薩縛縛禪則不能解矣何階子方便謬引為匹敵魏文侯師田子方也因趙云此两句又對盖言有何階得子垂方便之行而以之為匹也洪駒父引佛經稱善巧方便是舊注以為田子方非又玉臺新詠載桃葉荅王献之團扇歌云動摇郎玉手因風託方便應得璉詩云伸眉路何階梁張纉離别賦顧龍門而掩涕瞻郢路而何階離索晚相逢包䝉欣有擊離羣索居易九二包蒙上九擊蒙誦詩渾遊衍四座皆辟易項羽傳項羽嗔目叱赤泉侯人馬俱驚辟易數里趙云國語云工誦詩詩云及爾遊衍古詩詠香爐云四座莫不歡應手看捶鈎清心聽鳴鏑莊子知北遊大馬之捶鈎者年八十矣而不失毫芒注玷捶鈎之輕重而無毫芒之差都無懐則物來皆應前漢匈奴傳冒頓作鳴鏑出獵左右皆隨鳴鏑而射殺頭曼應劭曰曉箭也左思詩邊城若鳴鏑陸機鳴鏑自相知趙云上句言其詩之熟也下句言其詩之清也此亦古人所謂好詩清熟如彈丸之意邇時黄魯直詩云新詩如鳴弦盖世於此也莊子輪扁斵輪有曰得之於心而應之於手晉書有曰願陛下清心寡欲約已便民精微穿溟涬飛動摧霹靂莊子在宥篇大同乎涬溟注與特無際釋文涬戸頂反又音幸溟亡頂反自然氣也公羊注曰雷疾而甚者為震震與霆謂皆霹靂也趙云溟涬者天地初起之氣而可穿之言其意思深逺也霹靂者所以震物之聲而反摧之言其句法神妙也帝系譜曰天地初起溟涬濛鴻素問云雲物飛動北史神武歎薛孤延之勇決曰延乃能與霹靂闘陶謝不枝梧風騷共推激陶潜謝𤣥暉靈運惠連之徒也前漢項籍傳籍即帳中斬宋義頭諸將讋服莫敢支梧如淳曰枝猶枝柱也臣瓉曰小柱為枝邪柱為梧今屋邪柱是也陶謝二人之性陶潜謝靈運也風騷是两字國風與離騷也上句言其詩凌燦之也下句言其相逐追也紫鷰一作鸞自超詣翠駮誰剪剔爾雅駮如馬倨牙食虎豹管子曰桓公乘馬虎望見而伏公問管仲意者君乘駮馬曰然管仲曰駮馬食虎豹故疑馬莊子曰治馬者燒之剔之之杜補遺西京雜記漢文帝自代還有良馬九皆天下駿一名浮雲二名赤靈三名絶羣四名逸騾五名紫鷰騮六名經螭騘七名師子八名麟駒九名絕塵號為九逸趙云者紫鸞者是鸞鳯之鸞杜田以為紫鷰誤矣盖公此篇雖云古詩自首两句而下毎每用對而句眼平側相連若作紫鷰非止義錯而失句眼矣何則鸞鳯之名雖曰色多丹者曰鳯故每言丹鳯色多青者曰鸞故每言青鸞如鳯五色而多紫者曰鸑鷟但前人未嘗言紫鸑鷟而杜公於北征詩曰天吳及紫鳯顛倒在短褐則在鳯言紫矣今曰紫鸞自超詣圔亦如紫鳯之稱杜田正誤於巻首云見毆陽家善本作鷰遂引漢文帝九馬之一日紫鷰騮而蔡伯世正異亦作紫鷰如此則平側不相連又两句皆言馬不出拙乎紫鷰用對翠駮以两物比之紫鷰自超詣言其才之逺到如鸞鳥之超騰詣至楚辭云鸞鳯翔于蒼雲則其超詣可知公䕫府詠懹詩有云紫鸞無近逺亦超詣之意君意人莫知人間夜寂閴趙云寥閴者寂静之義梁蕭子範直坊賦曰何坊禁之寥閴對長夜之蕪永橋陵詩三十韻因呈縣内諸官鮑云開元三年六月睿宗崩十月葬橋陵公故有是詩新添上郡陽周縣橋山南有黄帝塚開元三年葬睿宗同州奉先縣因名橋陵初趙云陵在蒲城縣西北二十里之豊山唐本屬同州以建橋陵改為奉先縣仍𨽻京兆府先帝昔晏駕兹山朝百靈前漢志宫車晏駕注天子當晨起早作而方崩殞故稱晏駕者凡臣子之心猶謂宫車晚出也海賦竭盤石栖百天文雲趙云史記王稽謂范雎曰宫車一日晏駕舊注引漢志在後矣海賦有栖百靈陸機作吳大帝誄有云幽驅百靈崇岡擁象設沃野開天庭嵇叔夜琴賦託峻岳之崇岡蘭亭序崇岡峻嶺張平子西京賦廣衍沃野厥田上上杜補遺宋玉招魂像設居室静安間些注言為君於此造設室宇結像舊居清静寛間甚可安焉師謝晀冊文陳象設於園寢言趙云自此而下凡十五韻言山之氣象陵之幽寂且王之孝思又言地之連固也前漢書云秦地沃野千里舊注引西京賦在後矣蜀都賦摛藻掞天庭即事壯重險論功超五丁易習坎重險也天台賦履重險而逾坂沈林文即事既多矣蜀王本紀曰天為蜀生五丁力士能徙山秦王献羙女與蜀王蜀王遺五丁迎女見一大虵入山穴中五丁共引蛇山崩五丁皆化為石矣趙云羙其有事於此陵功力之多也即事祖出列子葢言即就其事也謝靈運用此两字于詩云即事怨暌携漢史云諸將論功坡陁因厚地却略羅峻屏相如二世賦登坡陁之長坂拜趙云古歌辭隴西行云却略再跪然後持一杯此義雖言健婦對客㳟敬謹節之貌却畧乃退身之義也山之退而在後其勢亦然雲闕虗冉冉風松肅冷冷天台賦雙闕雲竦以夾路顔延年詩松風遵路急離騷七諌下冷冷而來風蘇武詩冷冷一何悲石門霜露白玉殿莓苔青孫綽踐莓苔之滑石異苑曰天台山石有莓苔之險夀杜補遺予嘗讀唐舊史鄭絪傳其子顥尚宣宗女萬公主因夀昌節上夀囘昏然晝寢夢至一處宫殿䆳嚴治非人世與十數人納凉聨句既悟惟省十字云石門霧露白玉殿莓苔青私怪語不祥不數日宣宗弓劍上仙方悟其事乃續其詩為十韻予觀顥所夢十字與子羙橋陵詩中二句大同唯以霜為霧小異又橋陵詩首句云先帝昔晏駕則亦與上仙之意合使顥知杜詩有此句而夢之乎則既悟決知其為不祥之證而必不續之也葢不知子羙有此句而夢之是神之所為亦不過如是也顥所續詩律切典雅無媿作者今録于此間歲流虹節歸軒出禁扃奔波逃畏景蕭洒夢殊庭境象非曽到崇嚴昔未經日斜烏歛翼風動鶴飄翎異苑人争集凉臺筆不停石門霧露白玉殿莓苔青若匪灾先兆何縁思入冥丹墀虗仗馬華葢負云亭白日成千古金滕閟九齡小臣哀絶筆湖上泣青萍趙云禮記霜露既濡霜露既降宫女曉趙作晚知曙祠官朝見星趙云上以其無事晚而後知曉也下以其勤恪而䖍于從事也空梁簇畫㦸隂井􅒱銅瓶趙云薛道衡云空梁落燕泥中使日夜繼趙作日繼夜蔡作日相繼盖耴其對惟王心不寧趙云唐書載裴度之討淮西先是諸道兵皆有中使監軍進退不由主將度至行營並奏去之則中使之名自度已前有矣周禮惟王建國詩王心載寧王心則寧豈徒卹備享尚謂求無形趙云禮記備物之享禮云視於無形孝理敦國政神凝推道經莊子曰用志不分乃凝於神句趙云上句以言後王之孝思下以言先王之如在孝理字本是孝治高宗諱治字故改治為理瑞芝産廟柱好鳥鳴一作巢巖扄肅宗延英殿御座梁上生王芝一莖三花上製靈芝詩趙云自是橋陵廟中柱耳舊注引肅宗延英殿非是曹子建詩好鳥鳴高枝高岳前嵂崒洪河左瀅濴西都賦又界褒斜隴首之險帶以洪河涇渭之川橋趙云高岳指嵩高山也字起於崧高惟岳洪河指言陵之左是洪河所過也頭趙云嵂崒崷崒則用崒字崒音才律切韻書注云峯巉嵒也若山在左而卒在右則音祚骨切乃連崪屼云矣瀅濴两字韻書不載惟玉篇有瀅字以同滎字音胡坰切有濴字音烏營切則滎字也縈字在大清字韻中惟滎字在小青字韻中如此則豈洪河左瀅濴可讀作縈熒而傳冩之誤耶金城蓄峻趾沙苑交迴汀班固賦建金城之萬雉乃鑿墉之峻趾以益其高也杜正謬金城地名也前漢地理志秦地與天宫東并與鬼之分野西有金城武威唐金城為蘭州郡名是詩以金城對沙苑則其為地名可知非特如金城湯池耴其堅固也矣金城土酥净如練金城賊咽喉其義同此漢金城郡注曰金城郡昭帝始元六年置應劭曰初築城得金故曰金城瓉曰稱金取其堅師古曰一云以郡在京師之西故謂之金城金西方之行也沙苑𨽻左馮翊見下沙苑行橋趙云沙苑於橋陵同是一州之地為相近而金城在陵之西北相去之逺乃言及之豈所謂蓄峻址者其山聨亘自金城來邪盖地理家謂之來岡者乎左太冲魏都賦曰藐藐標危亭亭峻址永與奥區固川原紛𦕈冥西都賦防禦之阻則天地之奥區焉張平子賦實為地之奥區神臯居然赤縣立臺榭争岧亭張衡慮圖曰崑崙東有赤縣之州風雨有時寒署有節茍非此土南則多署北則多寒東則多隂故聖王不處焉史記鄒衍著書云中國於天下八十一分居其一分耳史國名赤縣内自有九州禹之叙九州是也不得為州數中國外亦如赤縣州者有九乃謂九州也江淹詩岧亭南樓期西京賦干雲霧而上逹狀亭亭以迢迢趙云尹文子曰形之與名居然别矣今蒲城縣在魏本屬同州唐開元四年以縣之豊山建睿宗橋陵改為奉先縣乃𨽻京兆府十七年昇為赤舊注引非是世説王丞相見魏洗馬曰居然有驘形晋人用居然字甚多姑舉其一官屬果稱是聲華真可聽謂縣内諸官也周禮一曰天官其屬六十劉寛以誠長者待屬官王劉羙竹潤裴李春蘭馨爾雅東南之羙者有㑹稽之竹箭焉晉江􅓉竹賦有嘉生之羙竹翕幽液以潤本夜趙云説文蘭香草也嵇叔琴賦春蘭波其東鄭氏才振古啖侯筆不停詩振古如兹注振自王劉裴李鄭啖皆當時之赤縣官也趙云振古者若言其才須從古中求也襧正平鸚鵡賦序衡因為賦筆不停綴遣辭必中律利物常發硎陸士衡文賦放言遣辭良多變矣莊子鳴而中律又庖丁為文惠君解牛曰今臣之刀十九年而所解數千牛矣而刀刃若新發於硎綺繡相展轉琳琅愈一作逾青熒西都賦琳琅青熒校獵賦玉石嶜崟眩耀青熒側聞魯恭化秉德崔瑗銘後漢魯恭為中牟令専以徳化為理不任刑罰後漢崔瑗高於文辭尤善為書記箴銘所著賦碑箴頌今座右銘傳於世趙云又言六君子之中為知縣者太史候鳬影王喬隨鶴翎趙云後漢王喬者河東人也顯宗世為葉令喬有神術每月朔望常自縣詣臺朝帝怪其來數而不見車騎密令太史伺望之言其臨至輒有雙鳬從東南飛來於是候鳬至舉羅張之但得一雙舄焉乃詔尚方診視則四年中所賜尚書官屬履此載在後漢王喬傳然無鶴事今却云王喬隨鶴翎因更用周靈王太子王子喬事貼之也周太子王子晉亦曰王子喬列仙傳王子見桓良曰告我家七月七日待我於緱氏山頭至時乘白鶴在山頭望之不得舉手謝時人數日而去今公以六君子之中為知縣者比之後漢王喬而太史侯其履鳬之影又就後漢王喬身中比之為真是周太子王喬又乘鶴而往朝也朝儀限霄漢客思迴林坰謝靈運照灼爛霄漢又結念屬霄漢又孤景莫與謾謝惠連相送越坰林縣趙云爾雅林外謂之坰自此至篇終公自述也知入朝而公不得預此所以自嘆也轗軻辭下杜飄颻陵濁涇孝宣紀尤樂杜鄠之間率常在下杜孟康曰在長安南師古曰下杜即今之杜城詩涇以渭濁諸生舊短褐旅泛一浮萍婁敬曰臣衣帛衣帛見衣褐衣褐見古詩泛泛江漢萍漂蕩水無根劉靈曰俯觀萬物擾擾焉如水之載浮萍王逸日自比如萍隨水浮遊短趙云短褐使貧者衣褐也舊注非是荒歲兒女瘦暮途涕泗零史記伍子胥曰吾日暮途逺吾故倒行而逆施之詩涕零如雨主人念老馬廨宇容秋螢諱詩外傳昔田子方出見老馬於野喟然有志問於御者曰故公家畜也罷而不為用故放出田子方曰少盡其力而老弃其身仁者不為也束帛贖之寒士聞之知所歸心趙云公多以老馬自况又以况人之羙材耴管仲言老馬之智可用而已秋螢乃車𦙍聚螢事豈言客於縣宇而容其讀書乎流寓理豈愜窮愁醉未醒何當擺俗累浩蕩乘滄溟史虞卿傳賛虞卿非窮愁亦不能著書以自見於後世流趙云謝靈擬王粲詩序有云家本秦川貴公子遭亂寓自傷情多也篇終乃白鷗浩蕩從此辭之意不必用言水之浩蕩也沙苑行𨽻左馮翊在長安之西君不見左輔白沙如白水繚以周墻百餘里前漢京兆尹左馮翊右扶風謂之三輔潘岳闗中記曰三輔舊治長安城中長吏在其縣治民光武東都之後扶風出治槐里馮翊出治髙陵班固西都賦西郊有上囿禁苑繚以周墻四百餘里其中乃有大宛之馬百官公卿表注馮輔也翊左也三輔故事曰上林連綿四百餘里繚力鳥切張平子西京賦繚垣綿聨四百餘里矣趙云沙苑在同州於昔為馮翊郡州有白水縣以其白水名之沙苑之沙白正如水之白耴本處事以譬之也龍媒昔是渥洼生汗血今稱獻於此前漢禮樂志天馬騋龍之媒元狩三年馬生渥洼水中作天馬歌本紀不載惟元鼎四年秋馬生渥洼水中作寶鼎天馬之歌西域傳宛别邑七十餘城多善馬馬汗血言其先天馬子也苑中騋牝三千匹定之方中騋牝三千毛氏馬七尺四騋騋馬牝馬也唐貞觀初僅有牧牝三千匹從赤岸澤徙之隴右風俗通曰馬一匹俗說相馬及君子與人相匹或曰馬夜行目明照前四丈故曰一匹或曰度馬縱横適得一匹或説馬死賣得一匹帛或云春秋左氏説諸侯相贈乘馬束帛帛為匹與馬之相匹耳韓詩外傳呉門馬如一匹練豊草青青寒不死湛湛露斯在彼豊草古詩青青河畔草漢童謠千里草何青青食之豪健西域無西域大宛國馬嗜茴蓿用王褒謝馬啓邉城無草死趙云葢言寒時草當死而沙苑之地宜雖寒時而不也以之食馬馬則豪健焉雖西域出馬之地亦無此豪健也舊注引非是每歲攻一作牧駒冠邉鄙周禮夏官庾人掌十有二閑之政教以阜馬伏持教駣攻駒注攻駒乘其蹄齧者閑之又校人春執駒鄭司農云執駒無令近毋猶攻駒也二歲曰駒三歲曰駣𤣥謂熱猶拘也月令仲夏頌馬政注教駣攻駒之類也王有虎臣司苑門入門天廐皆雲屯矯虎臣西都賦披飛亷入苑門西域傳蒲梢龍文魚目汗血之馬盈於黄門漢有閑駒槖泉駒駼丞華五監各有長丞文又有未央承華駒駼龍馬輅軫大廐皆有令漢荒三十六所在邉劉表傳雲屯冀馬虞子陽雲屯七萃陸機胡馬如雲屯驌驦一骨獨當御左傳定三年唐成公如楚有两驌驦馬子常欲之不與三年止之唐人竊馬而獻子常子常歸唐侯馬融曰驌驦烏也馬似之選張景陽七命云驂唐公之驌驦杜補遺酉陽雜俎云驌驦狀如燕稍大足趾似䑕未常見下地常止林中及飛舉則上凌青霄出凉州馬名驌驦者言其驌驦之飛舉也又禽經曰似白鳯曰驌驦見第九威遲白鳳態補遺春秋二時歸至尊魯莊公新作延廐凡馬日中出入注中分也春分出之秋分内之充趙云虎臣所掌之馬雖多而其中唯驌驦一種之骨御故一年之中春秋両次進之舊注引非是至尊内外馬盈億伏攊在坰空大存関元初牧馬二十四萬匹十三年加至四十五萬匹魏武老驥伏櫪魯頌在坰之野趙云言櫪中坰外空大存之而不如驌驦之貴也逸羣絶足信殊傑顔延年賦伊逸倫之妙足又别軰越羣蜀志闗羽傳馬超未及髯之絶倫逸羣也魏文帝書曰中國雖饒馬其知名絶足亦少曹毗馳射賦何逸羣之竒駿也倜儻權竒難具論禮樂志倜儻精權竒顔延年賦雄志倜儻精權竒趙云謝靈運入彭蠡湖口詩風潮難具論纍纍塠阜藏奔突往往坡陁縱超越列仙傳蘇躭騎鹿遇隂絶處能超越語人曰龍也謝靈運詩虗州有超越峻趙云葢言沙苑之地髙者塠阜則馬之奔突可藏稍處坡陁則馬乃能超越之以馬適惟且材健也角壯翻同麋鹿遊浮深簸蕩黿鼉窟顔延年賦分馳逈埸角壯永埓韓子曰如耳説衛嗣君公曰夫馬似鹿者價千金然世有百金之馬而無一金之鹿何也馬為人用而鹿不為人用孟子曰與鹿豕遊伍員曰見麋鹿遊姑蘇臺龎公傳黿鼉穴於深淵之下木𤣥虚海賦或屑沒於黿鼉之穴走趙云言馬之角鬪其壯可與麋鹿並其能以麋鹿善險故也言馬俗時浮於深處直至摇動黿鼉穴又因以見其多也舊注引非是泉出巨魚長比人丹砂作尾黄金鱗豈知異物同精氣雖未成龍亦有神夏官馬質禁原蠶者注原再也天文辰為馬蠶書蠶為龍精月直大火則俗其種是蠶與馬同氣物莫能兩大禁再蠶者為傷馬歟顔延年賦禀靈月駟祖雲螭也故趙云書不貴異物易精氣為物龍或魚所化或馬所為異物同精氣也句接浮深之下則沙苑之側有水正馬之浴處而水中有是魚也舊注乃引禁原蠶是非是惜乎國志不載幸於公詩見之騘馬行太常梁卿敕賜馬也李鄧公愛而有之命甫製詩趙云竊嘗論此一篇之大意馬乃太常梁卿所受賜於君者也君賜之物不可以耴亦不可以予李鄧公者乃愛而有之則其耴之非是故公詩首託之以鄧公馬癖而已且曰夙昔傳聞思一見則其欲之也舊矣又曰卿家舊賜公能耴則見鄧公以勢位耴之而梁卿不能保君賜之舊物矣又曰豈有四蹄疾於鳥至肯使麒麟地上行六句其意以言馬之神駿如此亦非人臣得而有之當為至尊之御且以言卿受賜於君公能耴之而不能拒公既奪賜於卿家宜必為君王之詔復耴之矣鳴呼耴非其有謂之盗公之詩微文婉義而寓箴規之意彼為鄧公者能不知恥乎鄧公馬癖人共知初得花騘大宛種晉時王濟解相馬又甚愛之而和嶠頗聚歛預常稱濟有馬癖嶠有錢癖西域傳大宛國多善馬嶠山上有馬不可得因耴五色牝馬置其下與集生駒號天馬子夙昔傳聞思一見牽來左右神皆竦新添南子蕭摩訶千聞不如一見雄姿逸態何崷崪顧影驕嘶自矜寵顔延年賦弭雄姿以奉引西都嵓峻崷崒傳𤣥鷹賦雄姿邈出逸氣横生故趙云雄姿逸態昔之言鷹與馬者皆用此字惟其雄逸可使矣崒音祚骨切在人有顧影自憐者矣在馬亦宜然故於自矜寵使顧影字也隅目青熒夾鏡懸肉駿碨礧連錢動顔延年賦徒觀其附筋樹骨埀梭植髪雙瞳夾鏡两椎協月又睨影高鳴將超中折西都賦琳珉青熒爾雅青驪驎驒今連錢騘也梁元帝紫騮馬詩金絡餙連錢杜補遺張平子西京賦云青駮摯於韝下韓盧噬於緤末猛毅髤髵隅目高威攝兕虎莫之敢亢注隅目謂目有角也肉駿當作肉駿東坡有説云余在岐下見秦州進一馬駿如牛項埀胡側立㒹倒毛生肉端蕃人云此肉駿馬也乃知鄧公騘馬行肉駿碨礧連錢動作肉駿是也然唐開元二十九年三月滑州刺史李邕献馬肉駿麟臆已載於唐史矣先生豈偶不憶邪連錢正是騘馬之文爾雅青驪驎驒而郭璞注曰色有深淺班駮隠鄰今之連錢騘也傳緯天馬引云驄馬表連錢朝來久試華軒下未覺千金滿高價韓子馬似鹿者值千金又漢使壯士值千金請宛善馬潘岳珥筆華軒王景𤣥長想馮華軒江淹詩史乘華軒赤汗微生白雪毛銀鞍却覆香羅帕漢書霑赤汗東觀漢記曰漢武帝歌天馬霑赤汗今親見其然血従前髆上小孔中出陳孫登詩落淚洒銀鞍徐敬業汗馬躍銀鞍周𢎞正詩銀鞍耀紫韁卿家舊賜公能取一作有之天廐真龍此其亞周禮凡馬八尺以上為龍禮記孟春之月天子乘蒼龍天趙云天廐真龍則天子所御之馬也真龍之亞自非子所賜人臣豈亦得而有之哉唯天子之賜而後太常梁卿得之今云卿家舊賜公能取盖非以勢廹之則以利誘之以百計中之矣此其所以謂能取乎晝洗須騰涇渭深朝趨可刷幽并夜顔延年賦簡偉塞門献狀綘闕旦刷幽燕晝秣荆越趙云大率言其行之疾也吾聞良驥老始成此馬數年人更驚豈有四蹄疾於鳥不與八駿俱先鳴晉曹毗馬射逸羽不能企其足顔延年云天馬狀水軼驚鳬七命曰駕紅陽之飛燕驂唐公之驌驦注鳥也穆天子之傳曰天子之八駿以趙云馬得齒歳而後驄故曰數年人更驚言八駿所引下句將下詔取之為天子之御矣時俗造次那得致雲霧晦冥方降精春秋考異記曰地生月精為馬月數十二月而生精趙云馬既神龍之種雲霧晦冥為不足怪於馬言降瑞應圖曰龍馬者河水之精近聞下詔喧都邑肯使騏驎地上行去矣行鮑云天寶十四年公在率府數上賦頌不䝉采欲辭職遂作去矣行趙云鳥乃去矣此詩有高舉逺引之意故取去矣為名君不見韝上鷹一飽則飛掣鮑明逺昔如韝上鷹今似檻中猿晉孫楚鷹賦韝青骹戯田疇史滑稽傳注韝臂捍也餘見上送高適詩注隋煬帝鷹詩雖蒙韝上榮無復凌雲志焉能作堂上燕銜泥附炎熱古詩翩翩堂前燕冬藏夏來見古詩思為㕠飛燕唧泥巢君屋傅𤣥陽春賦云燕唧泥於廣庭湛方生懷春賦云燕唧泥而來往趙云如鷹之飽而飛不若燕之戀而附此乃賢人義士不阿附於權貴之門也野人曠蕩無靦顔豈可乆在王侯間論語曰野人也書趙云左氏野人予之塊西京賦云上平衍而曠蕩漢云曠蕩之恩今公言其懷抱之閑曠也沈休文奏彈王原云明目賟顔曽無愧畏詩云有靦面目有靦顔則能忍慙者能忍慙則局促佞媚無所不至如是而可曳裾王侯之間葢必如谷子雲筆扎樓君卿脣舌而並游五侯者矣野人曠蕩而不能忍慙宜其舎王侯而去矣未試囊中飡玉法明朝且入藍田山周禮天官玉府王齊則供食玉注玉陽精之純者食之以禦水氣鄭司農云王齊當食玉屑列仙傳赤松子者神農時雨師服水玉以教神農能入火自燒前漢地理志藍田山出美田在長安木𤣥虚海賦神仙縹緲餐玉清崖北齊李預居長安羡古人餐玉之法乃採訪藍田躬往攻掘得環璧雜氣百餘枚日服食之自京赴奉先縣詠懷五百字天寳十四載十一月初作奉先屬京兆郡縁皇家陵寢武后分置醴泉縣杜陵有布衣老大意轉拙杜陵見上醉時歌注老大見送髙適詩注許身一何愚竊比稷與契孔子竊比於我老彭坡嘗云子美自許稷與契人未必許也然其詩云舜舉十六相身尊道何高秦時用啇鞅法令如牛毛此是稷契輩口中語也趙云古樂府羅敷行云使君一何愚嘗謂東坡議論至此而後能見古人之心見古人之心而後能説詩也今杜公此篇自杜陵有布衣至浩歌彌激烈六韻則以雖抱濟世之才而無稷契之位故不免於浩歎也居然成濩落白首甘契濶莊子狐落無所客釋文戸郭反猶廓落也擊鼓詩死生契濶與子成説毛氏曰契濶勤苦也陸機契濶踰三年與趙云文子云形之名居然别矣葢棺事則已此志常覬豁新添劉毅云丈夫兒蹤跡不可尋常便混羣小中葢棺事方定矣之趙云變韓詩外傳所載孔子云學而不已闔棺乃止語也窮年憂黎元嘆息腸一作腹内熱荀子窮年卒嵗賈誼曰百姓黎元輯於下孟子不得於君則熱中謝靈運詩窮年迫憂患趙云莊子我其内熱歟取笑同學翁浩歌彌激烈蘇武長謌正激烈中心愴以摧非無江海志蕭灑送日月沈休文纓珮空為累江海事多違莊子身居江海之上江淹江海從邅迴趙云莊子曰就藪澤處閑曠釣魚間處無為而已矣此江海之士避世之人間暇者之所好也可以見江海志之義矣梁吳圴詠鶴詩云懷思未忍去非無江海心生逢堯舜一作為君不忍便永訣江淹賦誰能冩永訣之情者乎堯舜君事見孟子當今廊廟志構厦豈云缺叔孫通賛廊廟之材非一木之枝潘安仁宛非廊廟姿構趙云潘尼詩廣厦衆材葵藿傾太陽物性固莫一作難奪曹植求通親親表若葵藿之傾太陽雖不為囘光然向之者誠也臣竊自比葵藿若垂三光之明寔在陛下陸機園葵詩朝榮東北傾夕頻西南睎梁劉孝綽詠日詩園葵一何幸傾葉奉離光顧惟螻蟻輩但自求其穴胡為慕大鯨輒擬偃溟渤木𤣥虚海賦其魚則横海之鯨突兀孤遊戛巖㟼偃高濤言趙云韓非子曰千丈之堤以螻蟻之穴潰螻蟻輩以不安分之人此指言藩鎮㪚自強大之徒公直眇之如螻蟻謂其當自止各求穴以安耳而彼何為必欲慕學大鯨之處大海乎博物志云鯨魚大者數千里小者猶數十丈博物志曰東海之别有渤澥故東海共稱渤海十洲記曰東海之别又有溟海而合用溟海兩字則鮑明逺詩有云穿池類溟渤以兹悟生理獨恥事干謁兀兀遂至今忍為塵埃没終愧巢與由未能昜其節沉飲聊自遣放謌頗愁絶顔延年詠劉叅軍詩韜精日沈飲誰知非荒宴趙云干謁貴人不過有所利爾既惡如螻蟻輩之止求穴以安而敢欲慕學大鯨之處大海則恥事干謁矣既不干謁以自顯則甘心於塵土之汩没矣巢巢父由許由也嵇康作高士傳曰巢父堯時隠人年老以樹為巢而寢其上故人號為巢父堯之讓許由也由以告巢父父曰汝何不隠汝形非吾友也許由悵然不自得乃遇清冷之水洗其耳拭其目曰向者聞言負吾友遂去終身不相見公之意以為在塵土之間空自汩没既愧巢與由矣然未能變易其節脱然引去於是沉飲放歌而已嵗暮百草零疾風高岡裂張平子賦孟冬作隂寒風肅殺氷霜慘裂百卉具零長門賦天飄飄而疾風李陵詩邊土慘裂阮籍詩寒風振山岡趙云阮嗣宗詠懷云凝霜被野草嵗暮亦云已顔延年詩嵗暮臨空房天衢隂峥嶸客子中夜發易何天之衢亨鮑明逺舞鶴賦嵗峥嶸而催暮江淹詩客子淚已零王粲詩客子多悲傷淚下不可収魏文帝詩客子常畏人霜嚴衣帶斷指直不得結凌晨過驪山御榻在嵽嵲西凉賦託喬基於山岡直嵽霓以高居驪山温湯秦始皇漢武帝故事載博物志云趙云指言明皇御幸之榻也嵽嵲小而不安貌蚩尤塞寒空蹴踏崖骨滑黄帝殺蚩尤於涿鹿又星名也趙云蚩尤前導之旗也塞寒空而蹴踏崖谷言其多維摩詰經譬如龍象蹴踏非驢所堪瑶池氣鬱律羽林相摩戛瑶池事見上登慈恩寺塔詩漢宣帝紀羽林孤兒注天有羽林大将軍之星林喻若林木之盛羽若羽翼鷙撃之意以名武焉張平于西京賦隠林鬱律江賦氣翁勃以霧杳時鬱律其如煙沈約詩鬱律構丹如趙云瑶池以比温湯也羽林扈駕之軍也其所樹之林故言相摩戛君臣一云聖君留懽娛樂動殷樛一作膠葛嶱晉張景陽詩昔在西京時朝野多歡娛沈休文詩秦皇御宇宙漢帝恢武功歡娛人事盡情性猶未充謝靈運副君命飲讌歡娛寫懷抱江淹太平多歡娛注杜補遺云當作膠葛相如子虚賦張樂乎膠葛之寓曠逺深貌則膠葛誤為樛嶱明矣山趙云殷讀從殷其雷之殷樂聲之喧殿聞於温湯與嶱也嶱音苦葛切釋者曰山也言温湯與山嶱於義甚明且接下句賜浴為貫也賜浴皆長纓與宴一作讌非短褐江淹詩朱紱咸髦士長纓皆俊人陸機詩輕劍排擊厲長纓麗且鮮趙云班彪辯命論思有短褐之襲注麄衣也彤庭所分帛本自寒女出謝𤣥暉直中書省詩彤庭赫引敞謂禁中庭多赤色郭㤗機詩皎皎白素絲織為寒女衣寒女雖妙巧不得東杼機趙皇后傳庭中彤朱而殿上漆西都賦玉階彤庭西京賦彤庭輝輝庭趙云彤庭者天子之以丹飾之也鞭撻一作箠其夫家聚斂貢城闕聖人筐篚思實一作願欲邦國活語求也為之聚斂而附益之鹿鳴又實幣帛筐篚以将其厚意南史王廣之子珍國字德重為南淮太守郡境苦飢乃發粟散財以振窮乏高帝手敕云卿爱人活國甚副吾意活杜補遺云孫楚與孫皓書曰爱民國道家所尚臣如忽至理君豈棄此物多士盈朝廷仁者宜戰慄詩濟濟多士又發言盈庭語使民戰栗趙云又以申戒之當思君王賜子之幣帛出於寒女之夫鞭韃所貢宜戰栗而求活國之事然後為仁也况聞内金盤盡在衛霍室内金盤上方器用也衛霍室勲臣家也郭况后弟賞賜金錢縑帛豐盛無比京師號况家為金穴后趙云内金盤猶今言内家合子耳衛青霍光病皆以戚而貴以比楊國忠輩矣中堂舞神仙煙霧散玉質江淹願作秦王女乘鸞向煙霧舞鸖賦烟交霧凝若無毛質謝趙云西京賦促中堂之密坐其後宣逺去中堂起絲桐煖客一云煖䝉貂鼠裘悲管逐清瑟説文貂鼠也而文黄出丁零國魏書曰鮮卑有貂鼠子皮毛柔軟故天下為裘廣志曰貂出扶餘挹婁也勸客駞蹄羮霜橙壓香橘杜補遺魏王花木志曰蜀土有給客橙似橘而非若柚而香冬夏華寔相繼通嵗食之亦名蘆橘舊説小者為橘大者為柚又云柚似橙而實酸大於橘孔安國注尚書郭景純注爾雅皆如此事趙云舞神仙貂鼠裘駞蹄霜橙香橘皆富貴家中也朱門酒肉臭路有凍死骨孟子庖有肥肉廐有肥馬民有飢色野有餓殍又曰狗彘食人食而不知檢塗有餓殍而不知發世説劉尹問竺法深曰道人何得遊朱門趙云朱門祖出東方朔傳而郭璞遊仙詩朱門何足榮未若託蓬萊榮枯咫尺異惆悵難再述趙云公言其與上富貴者一榮一枯才咫尺之間耳此所以惆悵也或云如上言朱門者是之謂榮言凍死者是之謂枯公閔其咫尺之間有異故惆悵之焉然謂之難再述則在其身自言方有意義北轅就涇渭官渡又改轍官渡地名曹操袁紹相持之處涇渭見首篇注言趙云今公自京赴奉先縣必自東而折北故於此北轅矣官渡則涇渭二河官所置渡也羣氷從西下極目高崪兀疑是崆峒來恐觸天柱折列子湯問共工氏與顓頊争為帝怒而觸不周之山折天柱絶地維故天傾西北日月星辰就焉地不滿東南故百川水潦歸焉史記黄帝西至乎崆峒韋昭曰在隴右趙云言羣水之下其高崪兀於此為雄拔之句直北為崆峒山之流來將觸折天柱重言積水之多也樂史寰宇記云禹跡之内名崆峒者三其一在臨洮其一在安定而莊子述黄帝問道崆峒今此主安定崆峒言之按唐志涇州安定郡而於保定縣之下載有崆峒山北轅就涇渭則因經度涇渭見水之峥嶸其狀如崆峒山之流來崆峒固不能來而山葢有飛走移徙則有來之理矣既以水為崆峒山之來則又可寓言其觸天柱矣此詩人張大之意也河梁幸未拆枝撑聲窸窣行旅相攀援川廣不一作且可越趙云古詩携手上河梁詩漢之廣矣不可泳思老妻既異縣十口隔風雪古樂賦他鄉各異縣展轉不相見誰能乆不顧庶往共飢渴入門聞號咷㓜子飢已卒易同人先號咷而後笑吾寧捨一哀里巷亦嗚咽所愧為人父無食致夭折豈知秋未一作禾登貧寠有倉卒詩終寠且貧故趙云此六韻葢叙還家所遭之念生理之艱也生常免租税名不𨽻征伐撫迹猶一作獨酸辛平人固騷屑劉越石備辛酸之苦阮籍感慨懷辛酸黙思失業途一作徒因念逺戍卒趙云此三韻推已念物之懐也憂端齊一作際終南澒洞不可掇魏武帝明月明月何時可掇趙云此與詩人憂心如惔何以異終南者山名憂與之齊則憂之積而高大如此澒音胡孔切出淮南子曰未有天地之時􅟾濛澒洞莫知其門白水縣崔少府十九翁高齋三十韻天寳十五載五日作白水属馮翊郡同州秦文公分清水為白水即此漢彭衙縣又名栗鮑云公在奉先以舅崔公為白水縣尉故適白水有是詩荅趙云謝𤣥暉在宣城日有郡内高齋閑坐吕法曹詩一首則高齋兩字起於此故公取以名題客從南縣來浩蕩無與適古詩客從逺方來貌趙云浩蕩悠遠不定止之如浩簜乗滄溟之義旅食白日長况當朱炎赫唐書朱克融輩皆旅食長安趙云魏文帝與吳質書有旅食南館梁元帝纂要夏曰朱夏炎夏高齋坐林杪信宿遊衍閴再宿曰信左傳矣趙云信宿逰衍閴言於高齋巳再宿而未嘗得遊厯也清晨陪躋攀傲睨俯峭壁海賦氷夹倚浪以傲睨晨趙云曹子建贈白馬王彪云清發皇邑崇岡相枕帶曠野懷一作回咫尺嵇康賦託峻岳之崇岡而趙云詩率彼曠野言野雖曠逺懐之若咫尺也始知賢主人贈此遣愁寂危階根青冥曽氷生淅瀝招魂増氷峩峩飛雪千里謝惠連雪賦霰淅瀝而先集雪紛糅而遂多上有無心雲下有欲落石陶潜歸去來雲無心而出就泉聲聞復息動静隨所激鳥呼藏其身有似懼彈射隋長孫晟善彈射吏隠適一作通情性兹焉其窟宅王喬梅福皆吏隠也海賦瑰竒之所窟宅天台賦靈仙之所窟宅趙云汝南先賢傳鄭欽吏隠于蟻陂之陽白水見舅氏諸公乃仙伯左傳晉文公謂子犯曰所不與舅氏同心者有如白水字薛云子羙近體詩有白水明府舅氏宅喜雨詩得過即白水地名非晉文公所謂白水明矣皆趙云詩我見舅氏既見舅氏又相遇諸公仙伯也此因上句吏隠引起此語杖藜長松隠作尉窮谷僻天台賦䕃落落之長松梅福作尉人謂之仙尉趙云劉琨詩繫馬長松下為我炊彫胡逍遥展良覿西京雜記太液池邊皆彫胡紫籜緑節之類菰之有米者長安人謂為雕胡謝靈運搔首訪行人引領冀良覿為趙云雕胡菰米也為飯極滑宋玉諷賦曰主人之女臣炊雕胡之飯露葵之羮求勸臣食也坐乆風頗愁晚來山更碧相對十丈蛟歘翻盤渦拆海賦盤渦谷轉何得空裏雷殷殷尋地脈詩殷其雷長門賦雷隠隠而響起隠趙云忽聞雷聲不知起於何處故怪之於此辨其隠之聲而尋地脈所在此亦詩人在南山之陽南山之側南山之下之理蒙恬傳城塹萬餘里此其中不能無絶地脈哉煙氛一作氣藹崷一作審崒魍魎森慘戚趙云烟氛山之氣崷崒山之狀魍魎山中之物左傳云入山不逢不若魎魅魍魎莫能逢旃藹崷崒以烟氛之氣所冐藹藹然也森慘戚以在烟氛之間聞雷聲而然也森以言其多矣崒音才律切崑崙崆峒㒹迴首如不隔崑崙崆峒二山並見上注前軒頽反照巉絶華岳赤趙云爾雅曰落光反照於東謂之反景劔閣銘云太行𤣥門豈云巉絶兵氣漲林巒川光雜鋒鏑知是相公軍鐵馬雲霧一作烟積趙云相公指言哥舒翰題下本注云天寶十五載五月作乃哥舒翰守潼闗時按翰傳天寳十四載禄山灰帝召翰拜太子先鋒兵馬元帥守潼闗明年進拜尚書左僕射同中書門下平章事故云相公軍也玉觴淡無味胡羯豈强敵長歌激屋梁淚下流袵席蘇武詩長歌正激烈經趙云黄香天子頌曰献萬年之玉觴黄庭内景淡然無味言至尊旰食雖御酒而無味然有相公之軍胡羯亦不足敵詩人屋梁念王之憂而寛之之語也宋玉神女賦曰朝出照人生半哀樂天地有順逆慨彼萬國夫休明備征狄一作敵猛將紛填委廟謀畜長策後漢光武賛顯明廟謨前漢匈奴傳制百蠻之長䇿李陵書猛將如雲劉公幹職事相填矣備趙云言禄山之禍起於不測方天下休明之際而乃征狄也左傳王孫滿云德之休明賈誼振長䇿而馭宇内舊注引匈奴傳在後矣東郊何時開帶甲且未釋書周公既没命君陳分正東郊成周作君陳曰命汝尹兹東郊又命畢公保釐東郊又徐夷並興東郊不開史帶甲百萬長趙云東郊指言潼闗以其在安之東故曰東郊欲告清宴罷難拒幽明迫易繫知幽明之故極師晉天文志曰晝夜以昏明為限言樂亦不可終晝夜相推何由相却也趙云幽明迫所未深觧豈言夜已盡而曉逼之耶此亦東坡所謂未必全好者矣三嘆酒食傍何由似平昔古樂府一彈再三嘆閻新添左傳魏獻子將受梗陽人賂饋入召没女寛比置三嘆魏子曰唯食忘憂三嘆何也曰或賜二小人酒不夕食饋之始至恐其不足是以嘆中置自咎曰豈將軍食之而有不足是以再嘆及饋之畢願以小人之腹為君子之心屬饜而已獻子辭梗陽人趙云借用閻没女寛當饋而三嘆今公所嘆嘆其不若往日太平之時也三川觀水漲二十韻天寳十五年七月中避寇時作師云寰宇記三川謂華池黒浪洛水同會為三川又三川縣本漢雀道縣後魏改為三川縣取古三川郡為名者趙云此篇即事體物之詩句法雄渾讀之見漲川之足駁矣作當辟宼時故有反懼江海覆與何時通舟車之句又憂及中林士也我經華原來不復見平陸北上唯土山連天走窮谷趙云選詩夕隂曖平陸又飛鞍越平陸左傳云深山窮谷也火雲無時出飛電常在目一云出無時自多窮岫雨行潦相豗蹙海賦磊匒匌而相豗趙云夏雲謂之火雲出隋盧思道納凉賦云陽風其長扇火雲赫而四舉蓊匌川氣黄羣流會空曲清晨望高浪忽謂隂崖踣郭璞詩高浪駕蓬萊匝趙云蓊匌則氣之蓊鬱匌之貌鮑照芙蓉賦繞金渠之空曲大抵空虚曲折處耳曹子建贈白馬王彪云清晨發皇邑郭璞詩高浪駕蓬萊馬季良長笛賦云惟籦籠之竒生兮于終南之隂崖恐泥竄蛟龍登危聚麋鹿枯查巻拔樹礧磈共充塞聲吹鬼神下勢閲人代速趙云恐泥出論語江賦狐玃登危而雍容查音鋤加切水中浮木也字書礧磈石也吹鬼神下言其聲之吼勢閲人代速言其流之疾不有萬穴歸何以尊四瀆海賦江河既道萬穴俱流薛云爾雅江河淮濟是為四瀆者發源而注海者也尊趙云公之詩作於亂離之中意在衆所歸往以王也及觀泉源漲反懼江海覆漂沙圻岸去潄壑松栢秃海賦飄沙礐石蕩飃島濵又潄壑生浦選沈液潄陳根乗凌破山門迴斡裂地軸春秋括地象云地有三千六百軸海賦狀如天輪膠戾而激轉又似地軸挺抜而争迴杜補遺博物志云地示之位起形於崑崙高萬一千里神物之所生聖人仙人之所集崑崙之東北地轉下三千六百里有八𤣥幽都方二十餘萬里下有四柱廣十萬里地有三千六百軸互相牽制也抱朴子云地有三千六百軸名山大川孔穴相通趙云圻岸去謝靈運圻岸屢崩奔謝惠連詠牛女詩傾河易囘斡而梁簡文帝晚春賦云嗟時序之囘斡交洛赴洪河及闗豈信宿應沉數州没如聴萬室哭穢濁殊未清風濤怒猶蓄江賦滈汗六州之域海賦於是鼓怒溢浪楊浮江賦乃鼓怒而作濤何時通舟車隂氣不黪黷浮生有蕩汩吾道正覊束趙云以川漲泛濫故舟車不通今句之義問何時得水落而舟車可通耳隂氣開朗而不黲黷以為雨也鮑照云浮生旅昭代孔子云吾道其非邪蕩汩汩有兩音一音古忽切治也又汩没也一音越律切水流也選有瀄汩又有淢汩今言水之蕩汩當從越律之音人寰難容身石壁滑側足雲雷此不已艱險路更跼普天無川梁欲濟願水縮魏文帝雜詩欲濟河無梁謝𤣥暉江漢限無梁陸機詩怨彼河無梁引領望大川趙云普天無梁欲濟願水縮此使魏文帝欲濟河無梁一句中字也也師云言譏執政因悲中林士未脱衆魚腹詩肅肅兎罝施于中林王康琚反招隠今雖盛明世能無中林士屈原荅漁父云寧赴湘流𦵏于江漁腹中舉頭向蒼天安得騎鴻鵠趙云亦如陸士衡疑西北有高樓云思鴐歸鴻羽大雲寺贊公房四首二首在别巻懷趙云長安大雲經寺在逺坊之東南隅本名光明寺武后時以沙門宣政進大雲經經中有玉女之符因改名焉且令天下各州置一大雲經寺今此大雲寺贊公房葢長安也何以知之後别有宿贊公房詩本注京師大雲寺主謫此安置也公家雖在麟州而公身轉䧟賊中往來長安則過大雲見贊公矣燈影照無睡心清聞妙香杜補遺維摩經曰有國名衆香佛號香積其界皆以香作樓閣其國如來無文字説但以衆香令諸天人得入律行菩薩各坐香樹下聞斯妙香即獲得藏三昧夜深殿突兀風動金琅璫趙云言夜深則殿勢突兀風動則所懸之金其聲琅璫後人因以金琅璫可以當物之名洪駒父嘗有詩云琅璫嚴佛界薜茘上僧垣山谷改云琅璫鳴佛屋則正以琅璫為所鳴之物於義固亦無害王立之曽話此云山谷以為薜荔一聲須要一聲者對琅璫一聲也而立之以為不必然今觀杜云以突兀對琅璫則山谷之意得矣天黒閉春院地清棲暗芳玉繩迴斷絶鐵鳯森翺翔玉繩星名増添文選玉䋲低建章金波麗鳷鵲師春秋元命包曰玉衡北南星為玉䋲可趙云迴斷絶則夜飲向晨也魏武帝云憂從中來不斷絶鐵鳯舊注引陸倕石闗銘蒼龍𤣥武之刺銅雀鐵鳯之工其説是葢施雀鳯於屋脊上者薛綜西京賦注云圓闕上作鐵鳯令兩翼舉頭敷毛故謂之森翺翔森則不一其物矣葢如謝靈運松栢森成行之森也𣑽放時出寺鍾殘仍殷牀趙云僕愛此最為匠句葢佛事至𣑽音必唱而誦之其聲高放故寺外可聞也殷上聲而殷其雷之殷矣單用𣑽字梁元帝梁安寺刹下銘曰宵長𣑽響風逺鍾傳周庾信送炅法師𦵏云尚聞香閣𣑽猶聴竹林鍾明朝在沃野沃野千里苦見塵沙黄時西郊逆賊拒官軍未巳其二童兒汲井華慣捷瓶上手杜補遺神農本草井華水令人好顔色與諸水有異其功極廣此水井中平旦第一汲者如趙云井華以見童兒之早起慣捷以見其朝朝此且敏為也霑洒不濡地掃除似無箒周禮官人凡寢中之事掃除地趙云此兩句可為掃地經灑濡則沮餘掃有箒則塵痕也明一作晨霞爛複閣霽霧搴高牖薛云廣韻複重也又古詩交疏結綺窻阿閣三重階爛趙云陸士衡今日良宴會詩高談一何綺對若朝霞梁元帝謂能令雲霧搴側塞被徑花飄颻委墀一作階柳楚辭九辨臯蘭被徑兮斯路漸非阮籍臯蘭被徑路艱難世事迫隠遁佳期後郭璞遊仙詩山川隠遁捷趙云言可以及隠遁之期矣以艱難世事迫故其期為後時也晤語契深心那能總鉗口史鉗口結舌趙云詩可與晤語言師言方道契故未能忘也奉辭還杖策暫别終囘首曹操奉辭出征房𤣥齡杖䇿謁唐太宗軍門囘首見首篇注泱泱泥汚人听听國多狗宋玉九辯猛犬狺狺而迎吠兮梁閉而不通懷趙云上句以辭别而去猶囘首而懐戀所以囘首而戀者何哉以泥汚人國多狗之可惡也既未免覊一作寓絆時來憩奔走晉慕容垂猶鷹也宜急其覊絆近公如白雪執熱煩何有趙云孟子有白雪之白宋玉有白雪之歌詩云誰能執熱逝不以濯哀江頭少陵野老吞聲哭野老甫自稱少陵杜陵也春日潛行曲江曲江頭宫殿鎻千門細柳新蒲為誰緑康駢劇譚録曰曲江池本秦隑州開元中流鑿為妙境花卉周環烟水明媚都人逰玩盛於中和節江側菰蒲葱翠柳隂四合碧波紅蕖湛然可愛唐書鄭注傳大和九年注言秦中有災宜興力役以禳之文宗因吟杜甫詩云江頭宫殿鎻千門細柳新蒲為誰緑始知天寶四年曲江四面多樓臺行宫乃敕宫卿之家住於曲江昆明二池起造亭觀詔神䇿兩京造紫雲樓緑霞亭内出牌以賜之西京雜記云朱雀街東第五街皇城之東第三街昇道坊龍華尼寺内有流水屈曲謂之曲江司馬相如弔秦二世文云臨曲江之隑州葢其所也闗中記云宣帝立廟曲江之北名曰樂遊廟因苑為名即今昇平坊内餘地是也此地在秦為宜春苑也在漢為樂遊苑也趙云公方春日潜行當禄山之亂宜其有細柳新蒲為誰緑之哀矣前漢有細柳營選詩有新蒲含紫茸又新蒲節轉促憶昔霓旌下南苑苑中萬物生顔色宋王高唐賦霓為旌唐曲池坊南有南宫趙云曲江南即芙蓉苑今云南苑是也昭陽殿裏第一人同輦隨君侍君側李白詩漢宫誰第一飛燕在照陽飛燕有女弟絶幸為昭儀作昭陽殿于寳注周禮云對轝曰輦趙云漢成帝常欲與班姬同輦載以託言貴妃也詩人類皆取古事之似者以為譬故李太白亦言可憐飛燕倚新粧而高力士媒孽之竟以此不得用悲夫輦前才一作詞人帶弓箭白馬嚼一作噍齧黄金勒唐制内官才人七人正四品名趙云按明皇雜録載上幸華清宫貴妃姊妹各購馬以黄金為銜勒組繡為障泥同入禁中觀者如堵飜身向天仰射雲一箭一作笑正墜雙飛翼西都賦招白鷴下雙鵠矢不單殺中必疊雙感趙云曹子建云一縱兩禽連之義而字則張九齡寓詩袖中一札書欲寄雙飛翼明眸皓齒今何惜一作在血汚烏故切遊魂歸不得曹植洛神賦丹唇外朗皓齒内鮮明眸善睐靨輔承權吳均詩血汚秦王衣趙云按唐后妃傳安禄山反以誅國忠為名及西幸過馬嵬陳元禮等以天下討誅國忠巳死軍不觧帝遣力士問故曰禍本尚在帝不得已與妃訣引而去縊路祠下清渭東流劍閣深西都賦北有清渭濁涇山海經注渭水出隴西首陽縣鳥鼠同穴山左思蜀都賦縁以劍閣注云劍閣谷名自蜀通漢中道去住彼此無消息蔡琰笳曲去住両情兮難具陳虞羲詩君去無消息人生有情淚沾臆江草一作水江花豈終極陶潛詩人生似幻化謝朓詩有情知望鄉樂府拾得楊花淚沾臆薛云言江頭花草豈終極乎盖望長安之興復也花趙云杜公䧟賊身在長安不知蜀道消息見江草江覩景傷情猶唐風隰有萇椘篇嘆其不如草木無知之意黄昏胡騎去聲塵滿城欲往城南望城一作忘城一作忘南北鮑云甫家居城南欲往城南忘南北者言迷惑避死不能記其南北也北趙云古樂府戰城南死北郭曹植吁嗟篇當南而更謂東而反西按北人謂向為望欲往城南乃向北亦不能記南北之意哀王孫天寳十五載明皇西狩肅宗即位改元至徳在七月甲子是月丁夘䘵山使人殺霍國長公主及王妃駙馬等己已又殺王孫及郡縣主詩此時作史記漂母飯韓信信曰吾必重報母怒曰吾哀王孫而進食豈望報乎王孫如言公子也王深父云安禄山驚潼闗𤣥宗倉卒西幸諸嗣王及公主之在外者皆不及從其後多為禄山所屠鮮有脱者此詩記而哀之鳴呼以四海之廣人帝之尊念罔終則辱其子孫如此豈孟子所謂以其所不愛及其所愛者歟長安城頭頭白烏夜飛延秋門上呼又向人家啄大屋屋底逹官走唐書木生稼逹官怕避胡趙云頭白烏號不祥也天寳十五載六月辛未禄山䧟潼闗京師大駭甲午詔親征明皇幸蜀從延秋門出門在禁苑之西面左邉而禁苑在宫城之北烏飛號于延秋門上暗言乘輿既出矣公卿寧不逃避耶故烏又啄大屋屋底逹官走避胡也或謂頭舊作頸盖烏無頭白者金鞭斷折九馬死骨肉不待同馳驅腰下寳玦青珊瑚左傳晉侯佩太子以金玦可憐王孫泣路隅問之不肯道姓名但道困苦乞為奴趙云齊建安王子真被誅入床下叩頭乞為奴贖死不従河東王鉉闈收欣然曰死生命也終不效建安乞為奴而不得仰藥而死已經百日竄荆棘身上無有完肌膚高帝子孫盡隆凖龍種自與常人殊漢高祖為人隆凖而龍顔李斐曰凖鼻也帝趙云隋文帝子勇勇子儼雲昭訓所生乃雲定興女文嘗曰皇太孫何謂生不得其地定興奏曰天生龍種所以因雲而出豺狼在邑龍在野王孫善保千金軀易龍戰于野䜟四夷雲集龍闘野前漢袁盎傳曰千金之子坐不垂堂祖出莊子趙云陸士衡云願保金石軀也而千金軀字又用沈約雜詩云坐喪千金軀不敢長語臨交衢且為王孫立斯須周禮疏云舞交衢文選蘇武别李陵詩長當從此别且復立斯須昨夜東一作春風吹血腥東來橐駞滿舊都師古曰槖駞言能負囊橐而䭾物也史思明傳禄山陷兩京以駞運御府珍寳於范陽不知紀極云鮑云東來橐駞謂賦東東都進也舊都謂長安趙東風應是東方之風風非言春也朔方健兒好身手昔何勇鋭今何愚世説桓車騎過江時公私隂薄自使健兒鼓行刼鈔使趙云曹元首六代論有身手不能相竊聞太子已傳位聖德北服南單于明皇傳位于肅宗以師漢宣帝時單于南北各為號號花門𠢐面請雪恥慎勿出口他人徂時囘紇助順後漢耿秉卒匈奴聞之舉國號哭或至犂面流血犂即剺字剺割也古通用人趙云是時囘紇有助順之心故戒王孫勿出口於他而徂往也按廣平王俶為天下兵馬元帥郭子儀副之以朔方安西囘紇大食兵討安慶緒在至德二載之閏八月則公作此詩時囘紇初有助順之請而剺面者力剺割其面皮蠻夷感恩而或喜或悲者多然哀哉王孫慎勿疎五陵佳氣無時無漢書曰高帝葬長陵惠帝葬安陵景帝葬陽陵武帝葬茂陵昭帝葬平陵謂之五陵選北眺五陵以増添班固西都賦南望杜霸北眺五陵趙云戒之當更相收拾而勿遂疎外王孫盖皆前朝諸帝子子孫故使五陵以見之後漢王伯阿望舂陵城曰氣佳哉鬱鬱葱葱公之望本朝掃除妖氛復與盛也如此佳氣連兩字張正見芳樹詩春浮佳氣裏䈎映彩雲前悲陳陶唐書房琯傳琯奉使靈武立肅宗因請將兵誅冦孽收復京都琯分為三軍遣裼希文將南軍自宜夀入劉悊將中軍自武功入李光進將北軍自奉天入琯自將中軍為前鋒戰鮑云天寳十五年十月辛丑房琯及䘵山于陳陶斜敗績癸卯琯又以南軍戰敗績公故有是詩孟冬十郡良家子血作陳陶澤中水野曠一作廣天清一作晴無戰聲四萬義軍同日死漢趙充國始為騎士以六郡良家子房琯傳十月庚子師次便橋辛丑琯軍先遇賊於咸陽縣之陳陶斜接戰琯軍敗績時琯用春秋車戰之法以車二千乗馬步夾之既戰賊順風揚塵皷譟牛皆驚駭因縛蒭縱火焚之人畜燒敗乃中使邢延等督戰倉皇失據遂及於敗為賊所傷殺者四萬餘人存者數千而已房趙云東坡先生嘗言悲陳陶云四萬義軍同日死此琯之敗也唐書作陳濤斜未知孰是時琯既敗猶欲持重有所伺而中人邢延恩促戰遂大敗故次篇悲青坂云焉得附書無我軍忍待明年莫倉卒先生之説如此按至徳元載十月辛丑房琯遇賊將安守忠於盛陽之陳陶斜琯用車戰官軍死者四萬餘人則先生之説明矣四萬義軍同日死語用庾信哀江南賦百萬義軍一朝巻甲羣胡歸來血洗箭血一作雪仍唱一作撚箭胡歌飲都市都人迴面向北啼日夜更望官軍至一云前後官軍苦如此句趙云羣胡歸來血洗箭法好處正在血洗箭三字葢言箭鏃上之血也如東坡韓幹馬詩云最後一馬馬中龍不嘶不動尾摇風又薄酒篇云五更待漏靴滿霜皆此格也蔡伯世却取一作云雪洗箭非是四句言朔方安西囘紇大食兵相助討賊然夷狄之性不無殘擾故房琯雖䘮軍矣而都人之心不願胡兵討賊只望官軍至也此一句其字語葢用項伯為漢王語項羽曰日夜望将軍至何敢反邪此亦模倣依倚之勢一云前後官軍苦如此此句難觧豈若正句之又有據邪悲青坂王深父序云孔子三軍軍好謀而成謀之未全而敢戰或至速敗趙云前篇悲陳陶則辛丑之敗也此篇悲青坂則乃癸卯之敗矣青坂應與陳陶斜之地不相逺也我軍青坂在東門天寒飲馬太白窟黄頭奚兒日向西數騎彎弓敢馳突陸士衡有飲馬長城窟行匈奴傳力士能彎弓盡為甲騎趙云太白山名飲馬太白窟五字亦做飲馬長城窟飲馬韓山窟之勢也以兩敗後各散而歸所以言日向西其餘數騎猶敢馳突以言其暴掠不改也山雪河氷野蕭飋青是風烟白人骨舞鶴賦氷塞長河雪滿翠山焉得附書與我軍忍待明年莫倉卒趙云房琯戰于陳陶斜不利猶欲持重而牽於邢延恩所促戰故敗而公詩有忍待明年之戒所以重傷之也九家集注杜詩巻二
