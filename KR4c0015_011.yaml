body:
  text: 九家集注杜詩巻十一宋郭知達編古詩杜鵑華陽風俗録見上杜鵑行注識者謂此詩上四句非詩乃題下甫自注爾後人誤寫一説謂上皇幸蜀還肅宗用李輔國謀遷之西内上皇悒悒而崩此詩感是而作西川有杜鵑東川無杜鵑涪萬無杜鵑雲安有杜鵑趙云世有杜鵑辨仙井李新元應之作鬻書者編入東坡外集詩話非矣其説曰南都王誼伯書江濱驛垣謂子美詩歴正季兵火舛缺離異雖經其祖父所理尚有疑闕者誼伯謂西川有杜鵑東川無杜鵑涪萬無鵑鵑雲安有杜鵑葢是題下注斷目我昔遊錦城為首句誼伯誤矣且子美詩備諸家體必非牽合程度者也是篇句落處凡五杜鵑豈可以文害辭辭害意耶原子美之意類有所感託物以發亦六義之比興離騷之法歟按博物志杜鵑生子寄之他巢百鳥為飼之胡江東所謂杜宇曽為蜀帝王化禽飛去舊城荒且禽鳥至微知有所尊故子美云重是古帝魂又云禮若奉至尊盖譏當時刺史有不禽鳥若也唐自明皇後天歩多棘刺史能造次不忘君者可一二数嚴武在蜀雖横歛刻薄而實資中原是西川有杜鵑其不䖍王命負固以自抗檀軍旅絶貢賦如杜克遜在梓州為朝廷西顧憂是東川無杜鵑耳至於涪萬雲安刺史微不可考凡其尊君者為有懐貳者為無不在夫杜鵑之真有無也誼伯以為來東川聞杜鵑聲繁而急乃始歎子羙詩跋㚄紙上語又云子羙不應疊用韻何耶子羙自我作古疊用韻無害于為詩僕所見如此誼伯博學强辯殆必有折𠂻之元應之說如此次公謂元應言杜詩備衆體是矣於三絶句有前年渝州殺刺史今年開州殺刺史已有兩刺史矣於草堂詩舊犬喜我歸隣舍喜我歸大官喜我來城郭喜我來巳有四喜我矣亦豈拘尋常程度邪今詩四句有四杜鵑亦詩所謂有酒醑我無酒酤我坎坎鼓我蹲蹲舞我之勢謂觀其言有杜鵑無杜鵑無杜鵑有杜鵑錯綜其語豈直是題下注耶王立之知其彷彿其說云公杜鵑詩與古詩之謠語無異豈復以韻為限立之之說非不是然亦不悟錯文之語與夫雅詩四我之勢也後又有一杜鵑則亦八仙歌用阮籍秋懐重押歸字識靈運述祖德重押人字一篇之中有兩船兩眠兩天兩前字者也次公所見此四句真以言杜鵑之有無也其下云我昔遊錦城結廬錦水邊杜鵑暮春至哀哀呌其間則以成西川有杜鵑之句下又云君㸔禽鳥情猶解事杜鵑今忽暮春間值我病經年身病不能拜淚下如迸泉則以成雲安有杜鵑之句詩之引結甚明若其言尊君之義則自在中間鋪叙不必泥首四句使為美刺况此詩作于雲安乃大歴元年春嚴武已死于去年夏時郭英又為崔旰所殺繼而杜鴻漸來豈可指為嚴武之有君耶又雲安在唐是䕫州之屬縣非有刺史豈可此西東之列乎元應之說又為穿鑿我昔游錦城結廬錦水邊趙云陶淵明結廬在人境有竹一頃餘喬木上㕘天趙云曹子建荆棘上㕘天杜鵑暮春至哀哀叫其間我見常再拜重是古帝魂生子百鳥巢百鳥不敢嗔一作喧仍為餧其子世說杜鵑養子于百鳥巢百鳥共養其子而不敢犯餧趙云以物飼人之謂張耳傳以肉餧虎禮若奉至尊成都記見上杜鵑行化作杜鵑似老鳥注在趙云公所以賦杜鵑之意舊注不得其說乃或用公雲安詩兩邊山木合終日子規啼証雲安有杜鵑之實不知此乃言其鳴云不如歸去之子規與𤣥都壇詩子規夜啼山竹裂者同非今所謂杜鵑也又謂上皇幸蜀還肅宗用李輔國謀遷之西内上皇悒悒而崩此詩感是而作亦非盖遷上皇豈獨百鳥鉰杜鵑之子不若哉况上皇之遷西内在辛丑上元二年明年遂崩至今歳丙午大歴元年公在雲安賦詩已六年矣既隔肅宗又隔當日代宗而却方説遷徙事以為刺哉若杜鵑事則成都記所云自昔至今所傳如此然鵑與子規兩種形聲不同以杜宇化為鵑所以公言重是古帝魂也鮑照行路難之七云愁思忽而至跨馬出北門舉頭四顧望但見松柏荆棘三蹲蹲中有一鳥名杜鵑言是古詩蜀帝魂聲音哀苦鳴不息羽毛憔悴似人髠今公所謂喬木上㕘天又謂哀哀呌其間又云重是古帝魂盖出於此至若常再拜而重之不能拜而淚下則尊君親上之意鴻雁及羔羊有禮太古前行飛與跪乳識序與知恩晉羊祜雁賦鳴則相和行則接武前不絶貫後不越序巻秋繁露曰凡贄卿用羔羊有角而不用如好仁者執之不鳴殺之不謗類死義者羔飲其母必跪類知禮者故羊之為言猶祥故以為贄聖賢古法則付與後世傳君㸔禽鳥情猶解事杜鵑今忽暮春間值我病經年身病不能拜淚下如迸泉此詩譏世亂不能明臣之義者禽鳥之不若也杜曰補遺劉越石扶風歌據鞍長歎息淚下如流泉引水䕫俗無井皆以竹到山泉而飲蟠屈山腹間有至數百丈月峽瞿唐雲作頂庾仲雍荆州記巴楚有明月峽峽趙云荆州記巴楚有明月峽廣德東突峽今謂之巫峽歸秭峽歸郷峽桑欽水經與酈道元所注又有多名本朝樂史寰宇記於渝州載有明月峽以石穴圓似之故以名至䕫州載三峽則曰西峽巴峽巫峽意者西峽即明月峽也今去月峽瞿唐雲作頂言自明月峽至瞿唐皆是連山所以雲作頂亂石峥嶸俗無井楚俗山居負水而食故高者引水雲安無泉尤難得水雲安沽水僕奴悲魚復移居心力省後漢地里志魚復屬巴郡古庸國左傳文十年魚人逐楚師是也師云此自雲安徙夔趙云魚復即夔州今倚郭奉節縣乃漢魚復縣白帝城萬竹蟠接筒引水喉不乾人生留滯生理難斗水何直百憂寛莊子期斗升水之活骸趙云盧照隣喜秋風至詩形歳枯槁生理日摧殘還思不動行賴此百憂寛青絲青絲白馬誰家子梁呉均白馬黄金羈梁元帝宛轉青絲鞚趙云青絲所以言鞚梁元帝詩是已白馬馬中驕貴者游俠少年多騎白馬古樂府有白馬字南史侯景傳初大同中童謠曰青絲白馬壽陽來及景叛乗白馬青絲為轡欲以應䜟而崔顥輕薄少年詩青絲白馬冶游園能使行人駐馬㸔則矜誇馳騁者然矣必當時有良家子之惡少者為賊盜也麤豪且逐風塵起風塵喻亂離鮑云豈懐恩之反有從亂者戰趙云麤豪字吳志孫權言甘寜是已風塵多以言征盜賊逐風塵起則乗此為盜者矣不聞漢主放妃嬪誅貴妃師云乾元元年正月出宫女三千人近静潼闗掃蜂蟻師云收東西京子趙云此公戒約麤豪之辭殿前兵馬破汝時十月即為虀粉期趙云告以必破亡之証荘子宋王之猛非直驪龍也子能得珠者必遭其睡也使宋王而寤子為虀粉夫虀之為言若以菜為虀粉之為言散全物為屑未如又作知面縳歸金闕庄傳克許許子面縛銜璧萬一皇恩下玉墀時降者皆授莭鎮河北之患自此起矣趙云此篇蔡伯喈以為五谷盜賊事其説是按通鑑於廣德二年正月載吐蕃入長安也諸軍亡卒及鄉曲無賴子弟相聚為盜吐蕃既去猶竄伏南山子午䓁五谷所在為患下巳以太子賓客薛景仙為南山五谷防禦使討之按正月已亥朔至丁已則十九日也此詩盖公於春初聞盜賊之事未間薛景仙討之之命所作所以有殿前兵馬破汝時之句莊子之北游萬分未得處一焉近聞近聞犬戎逺遁逃説文解字曰赤狄本犬種故字從犬匈奴聞漢兵大出老弱奔走毆畜産逺遁逃蕭望之曰狄遁逃竄伏牧馬不敢侵臨洮臨洮郡名賈誼過泰論胡人不敢南下而牧馬渭水逶迤白日浄隴山蕭瑟秋雲高崆峒五原亦無事北庭數有闗中使言突厥和似聞贊普更求親舅甥和好應難棄賛普吐蕃也薛云唐吐蕃傳其俗謂强雄曰賛丈夫曰普故號君長賛普今西域有籛逋者即賛普之聲訛而為籛逋讀趙云大戎指吐蕃本西𦍑属拜必手据地為犬號今普從逋音而公所用止從本字耳求親事新書不載但云永泰大歴間再遣使來聘今因公詩見之臨洮郡今洮州逶迤字選䊸餘逶迤蕭瑟字選蓊茸蕭瑟白日浄秋雲高形容其無事也臨洮今在九域志為熙州渭水則秦隴一帶所經皆是隴山今之隴州地志隴山天水大坂也其坂九囘不知高幾許空峒山名樂史寰宇記禹迹之内崆峒者三其一在臨洮秦築長城之所起則洮岷一帶皆是也今專以言渭川五原則今之鹽州西南拶邊北庭數有闗中使則又有突厥通好也或云回紇等國皆在北之地既不附吐蕃故亦遣使於國中其說亦是爾雅曰妻之父為外舅又曰謂我舅者吾謂之甥則妻父者舅婿者甥也孟子言堯之於舜帝館甥于貳室師正觀十五年妻文成公主中宗景龍二年妻金城公主開元二年自言舅甥乞和親見吐蕃傳今言肅代時漁陽時禄山平以雍王遙領范陽盧龍莭制而不出閤漁陽突騎猶精銳杜云漢光武謂馬武曰吾得漁陽上谷突騎欲令将軍將之又唐六興注蔡邕曰冀州强弩幽州突騎天下之精兵也赫赫雍王都節一作前制猛將飄然恐後時本朝不入非高計禄山已破朝廷不能革其積弊復以盧龍授藩鎮故李懐仙朱滔之屬得以跋扈竟不為朝廷所有适趙云漁陽突騎指雍王所統兵編年通載十月雍王討史朝義甲戌大敗之于横水克河陽東郡其將張獻誠以汴州降十一月薛嵩以相衛洺邢降張志忠以趙定深常易降時公在梓聞雍王之勝尚聞河北猶有未入朝者乃諭諸將茍飄然而來已自後時而不入本朝豈高計乎舊注模稜其說以雍王适領范陽盧龍莭制而不出閤又云禄山已破云云皆非禄山死在至德元載繼有子慶緒又繼之以史思明思明子朝義自禄山天寳十四載反至廣德元年正月安史併滅今於雍王為兵馬元帥時謂之安史併滅可也豈得止為禄山平守朱滔反又是德宗建中三年時事李懐光反又是德宗興元元年時事豈所謂不入本朝耶至以雍王适為遥李懐光為懐仙雕本之誤漁陽突騎幽州素有此兵號突騎杜曰說是戰國策季良謂魏王曰恃呉之精銳而欲攻邯鄲荀子湯武之仁義桓文之節制成公綏嘯賦志離俗而飄然史云不後時以縮蕭望之志在本朝禄山北築雄武城舊防敗走歸其營禄山逆謀日熾築壘范陽北號雄武繫書請問燕耆舊今日何須十萬兵趙云舉徃事以懲警不朝之將魯仲連繫書約矢以射聊城中名之曰燕耆舊則本吾民之父老又託之問耆舊以警諸将耳黄河二首鮑云黄河北岸海西軍胡人高鼻動成羣謂吐蕃入冦舊注謂禄山非黄河西岸是吾蜀謂鄭公軍當狗之戰舊注謂明皇肅宋非趙云前章罪海西軍不能禦冦黄河之北大海之西則河北一帶之州郡也後章憫蜀人困于供給終之以願君王無奢移云黄河北岸海西軍椎鼓鳴鐘天下聞趙云言其飲食宴樂之雄侈鐵馬長鳴不知數胡人高鼻動成羣禄山之反皆漁陽突騎及所養同羅降奚契丹曳落河并誘致諸蕃皆胡騎也胡趙云傳有虞坂之馬望伯樂而長鳴李陵報蘇武書笳互動牧馬悲鳴吟嘯成羣右一黄河西岸趙作南岸是吾蜀欲須供給家無粟願驅衆庶戴君王混一車書弃金玉時明皇在蜀肅宗起靈武師云庾信江南賦并吞六合混一車書趙云上之人須蜀人之供給乃至於家無粟其字依傍陶潜瓶無儲粟公所願與衆庶同心禦難伐叛以尊戴君王使天下車同軌書同文棄金玉而尚敦朴用意深矣書衆非元后何戴黄河南岸一作西岸師民瞻所傳任昌叔本取之非是盖河自西注東正定是南北岸其曲處而後有東西岸也成都路雖在中國西南以河言之雖逺而實南耳時史思明未滅車書猶未混一車書混一前人全語棄金玉傳不寳金玉右二自平自平中宫一作官吕太一吕太一代宗時為廣南市舶使東坡詩話自平宫中吕太一世莫曉其義妄者以唐有自平宫偶讀𤣥宗實録有中官吕太一叛于廣南詩盖云自平中官吕太一故下文有南海收珠之句見書不廣輕改文字鮮不為笑使杜正謬云以自平為宫名非盖巾中吕太一為市舶逐張休作亂以兵平之故云自平中宫吕太一宫中乃中宫傳印者誤按舊史代宗紀廣德元年十二月甲辰宦官市舶使吕太一逐廣南節度使張休縱兵大掠廣州中官誤為宫中明矣趙云杜田因東坡而為之說而事乃代宗時為異也今按資治通鑑亦載如此詩話豈誤以代為𤣥乎中官字蔚宗宦者論于是中宫始盛收珠南海千餘日近供生犀翡翠稀太一反賦不上供復恐征戍干戈密趙云以中官既平國家于南海收珠又千餘日千餘日二年十箇月也自廣德元年歴二年永泰元年兩全年至今歳大厯元年十月已後是為千餘日二年十箇月之後近復生犀翡翠之不供無乃煩國家征伐之干戈乎公憂國如此蠻溪豪族小動搖世封刺史非時朝蓬萊殿裏諸主將才如伏波不得驕師云杜言洞豪世襲刺史雖不奉朝請但羈縻而而今若盡取則生邊患世趙云此又戒約溪洞蠻也謂其小有動搖便受吾唐封為刺史非是從時朝之禮者不知殿前主兵之将才如伏波可辨征南之事汝不得自驕悍也與殿前兵馬破汝時十月即為虀粉期同意除草去䕭草䕭徐鹽反或音潛蘇東坡云䕭草蜀中謂之毛䕭毛芒可畏觸之如蜂蠆治風疹以此㸃之一身失去業背紫者入藥䕭山韭草有害於人曽何生阻脩言草之毒者不必生阻脩之處雖平夷之地亦有之趙云此主除惡之義以惡䕭草之為害也言其直生平近處詩道阻且脩脩舊注非其毒甚蜂蠆左傳蜂蠆有毒其多彌道周周道兩榜清晨歩前林江色未散憂芒刺在我眼霍光驂乗上内嚴憚之若有芒刺在背焉得待高秋霜雪一霑凝一作衣蕙葉亦難留趙云蜂蠆䕭上皆芒刺觸之能螫人彌道周䕭最蔓生字則詩生于道周在眼字謝靈運詩想見山中人薜蘿若在眼又欲先秋降去之若待秋則霜雪一霑蕙與䕭草同一衰落亦美惡俱盡矣謝靈運詩崖傾光難留霑疑自在草上一作霑衣非荷鋤先童稚陶徴君荷鋤雖有倦後趙云陶潛詩帶月荷鋤歸舊注在後漢鄧禹傳父老童稚滿其車下日入仍討求趙云荘子日入而息轉致水中央豈無雙釣舟頑根易滋蔓在傳無使滋蔓敢使依舊丘鮑明逺復得還舊丘州趙云水中央詩宛在水中央舊丘自閬歸成都指草堂之居草堂斷手寳應年是夏送嚴武至綿遂徃梓閬至今年廣德二年春未又歸故得指為舊丘自兹藩籬曠更覺松竹幽芟夷不可闕疾惡信如讐左傳周任言為國家者見惡如農夫之務去草焉蒦夷藴崇之絶其本根勿使能殖則善者信矣師云後漢張儉清潔中正疾惡若讐無趙云藩籬字賈誼有藩籬之限客居趙云此雲安詩客居所居堂前江後山根下塹萬尋岸蒼濤鬱飛翻趙云王餐詩茍非鴻鵰孰能飛翻本言禽鳥今轉閈於蒼濤愈奇矣葱青衆木稍沈林文林簿杳葱青邪竪雜石痕増添沈休文許哨璧思邪竪絶嶺復孤圓子規晝夜啼壮士斂精魂趙云江文通恨賦拱木歛魂晉阮籍詠懐容色改平常精魂自漂淪峽開四千異水合數百源人虎相半㞐相傷終兩存蜀麻久不來吳鹽擁荆門蜀人以麻布貨易吳鹽西南失大将商旅自星奔時崔寧殺郭英又杜云劉孝標廣絶交論靡不望影星奔今又降元戎已間動行軒時除杜鴻漸為成都尹舟子候利涉亦憑節制尊趙云峽聞四千里千字可疑豈自渝州明月峽至䕫州西陵峽而下有水路四千里乎相傷終兩存由老子言人神兩不相傷而變用之蜀麻久不來呉鹽擁荆門以商旅不行之故舊注亦是按編年通載永泰元年閏十月劔南兵馬使崔旰反殺其帥郭英又又按資治通鑑大歴元年二月壬子以杜鴻漸為山南西道劒南東西川副元帥劔南西川節度使以平蜀亂今云西南失大将則崔旰殺郭英乂今又降元戎則時除杜鴻漸鎮蜀英乂以定襄郡王領節度故云大将鴻漸以宰相充尹山西劔南副元帥故云元戎舟子候利渉亦憑節制尊所以結商旅星奔而麻鹽不通之句詩招招舟子易涉大川節制元戎之節制字見上漁陽詩注言用兵舟子為商賈亦以節制然後免攘奪之憂我在路中央生理不得論甫依嚴武武死英乂粗暴不能容旋有崔寜之亂甫所以進退不能卧愁病脚廢徐步視小園短畦帶碧草悵望思王孫思嚴武増添劉安招隐辭王孫游兮不歸春草生兮萋萋鳳隨其凰去鮑云豈鄭公之夫人繼亡籬雀暮喧繁言賢者亡小人喧競也時崔寧楊子琳柏正節更來成都覽物想故國十年别荒村趙云欲南下歸長安到處留滯今尚在半路舊注非盖武永泰元年四月盡日死公五月下戎州九月在雲安有客居之堂至今歳二月巳後聞子規賦此豈曽見郭英又之來邪自徐步而下四句因步小園見草見雀感于物而興焉故見短畦之碧草則思王孫司馬相如琴歌鳳兮歸故鄉遨游四海兮求其凰故見暮雀之喧繁而懐鳳凰之游徃舊注以王孫作思嚴武暮雀作崔寧等甚無謂也荒村故國之居十年不歸為荒村日暮歸幾翼北林空自昏安得覆八溟為君洗乾坤時厭亂久故甫前有洗兵馬此有洗乾坤之說稷契易為力言得人天下不足治犬戎何足呑儒生老無成臣子憂四藩篋中有舊筆情至時復援趙云幾翼譬能歸鄉者幾人自昏譬故居昏暗無有歸栖之翼道路梗澁之故繼之以覆八溟洗乾坤公又曰遙拱北辰纒冦盜欲傾東海洗乾坤安得壮士挽天河盡洗甲兵長不用皆此意援字曹子建援筆從此辭客堂趙云詩中客堂叙節改故取兩字名篇憶昨離少城成都内城曰少城少趙云蜀都賦亞以少城接乎其西注小也在大城西而今異楚蜀捨舟復深山窅窕一林麓栖泊雲安縣雲安屬䕫州謂趙云捨舟字謝靈運捨舟眺回渚棲泊義出謝惠連維舟止宿初欲捨舟矣乃是窈窕之一林麓所以姑維舟棲泊也至云客堂叙節改方冇屋山中居耳消中内相毒師云消中消渇也胡彦伯與庾肩書昔長卿病消中余今亦然舊疾甘載來衰年得無足趙云言此疾相嬰至衰年未痊疾亦得無足乎此深自傷之辭死為殊方鬼李陵死為異域之鬼頭白免短促老馬終望雲南雁意在北馬望雲雁意在北以所居非故國自喻别家長兒女欲起慚筋力趙云殊方文子殊方偏國西都賦殊方異類東都賦殊方别區免短促自寛之辭望雲在北懐鄉之譬此倣胡馬嘶北風越鳥巢南枝之意變文耳慚筋力以老病為慚禮老者不以筋力為禮客堂叙節改具物對羈束石暄蕨牙紫謝靈運野蕨漸紫苞渚秀蘆笋緑蘆竹笋越人謂之蕨牙巴鶯一作稼紛未稀徼麥早向熟悠悠日動江漠漠春辭木日華川上動謝元暉生煙紛漠漠趙云巴稼舊本作巴鶯非劉章云深耕穊種立苖欲疏紛未稀則苖猶多耳稼與麥一體之物若作鶯字句不相聨臺郎選才俊自顧亦已極甫先授右拾遺部趙云臺郎謂省部公為尚書工員外郎自稱臺郎漢官儀尚書郎初從三署郎選詣尚書臺試毎一郎缺則試五人先試牋奏初入臺稱郎中滿歳稱侍郎故郎中侍郎之名猶因三署本號也此臺郎之稱矣舊注模稜前輩聲名人埋没何所得居然綰章紱受性本幽獨前輩聲名人不可專指如黄香羣書無不涉獵京師號曰天下無雙江夏黄香京師貴戚慕其聲名更饋衣物拜尚書郎章紱謂緋魚居然字尹文子形之與名居然别矣平生憩息地必種數竿竹王子猷所居必種竹云不可一日無此君事業尺濁醪杜云李善注恨賦濁醪夕飲之下引嵇康與山巨源書濁醪一盃彈琴一曲營葺但草屋上公有記者累奏資薄禄嚴武奏甫受劔南㕘謀趙云必有如柏中丞者薦之但無可考舊注受劔南㕘謀亦前日一端之事主憂豈濟時師云史記主憂臣辱而趙云主憂言當至之憂不能効力以濟時事身逺彌曠職師云魏文帝詔官吏不䖍曠職廢事成趙云盖由身逺愈閑曠職業循文廟筭正循文守文廟廟堂筭籌筭獻可天衢直左傳獻可替否易何天之衢享尚想趙朝廷毫髪禆社稷形骸今若是進退委行色傷不得行其志爾師云栁下季車馬有行色石硯平侍御者平公今詩伯秀發吾所羨奉使三峽中長嘯得石硯巨璞禹鑿餘禹開鑿以疏江河又趙云王充論衡文詞之伯今云詩伯如公用詞伯文章伯也秀發見上四松詩注禹疏言石郭景純江賦巴東之峽夏禹舊注不切異状君獨見其滑乃波濤趙云薛道衡祭江文帷盖静于波濤其光或雷電聨拗各盡墨多水遞隠見揮灑容數人十手可對面比公頭上冠正質未為賤當公賦佳句况得終清宴曹子建公子愛敬客終宴不知疲公含起草姿不逺明光殿致于丹青地知汝隨顧眄明光殿霍去病借以避暑杜云漢殿名秦記曰明光殿以金為戺玉為階元后傳曰成都侯商病欲避暑從上借明光殿趙云平公為侍御頭上冠則獬豸冦獬豸一角獸而能觸邪所以為正質以硯比冠取其正直之質因硯以美平公起草者中書舍人事翰墨之職于硯為親丹青地公卿之地也鹽鐵論公卿者神化之丹青三韻三篇高馬勿唾面唾一作棰趙云當以捶為有義長魚無損鱗辱馬馬毛焦困魚魚有神君㸔磊落士不肯易其身馬魚尚不可輕士有被楊懐玉者而可輕乎蕩蕩萬斛船影若揚白虹起檣必椎牛師云非椎牛饗士不足以起立帆檣釋名船二百斛曰舠三百斛曰艇趙王石虎造萬斛之舟今取其大者以比興椎牛所以饗衆功張遼戰孫權夜募敢從之士得八百人椎牛犒饗韓退之征蜀聨句椎肥牛呼牟亦用此椎字挂席集衆功自非風動天莫置大水中趙云得大風後可飽其帆也鮑照舞鶴賦箕風動天列士惡多門晉政多門小人自同調名利茍可取殺身傍權要何當官曹清爾輩堪一笑趙云列士如列女之列言就列之士進身者欲恩出一門耳謝靈運誰謂古今殊異代可同調梁張纘别離賦在百代而奚殊雖千年而同調名利茍可取殺身傍權要此戒之之辭如孔子富而可求也雖執鞭之士吾亦為之今欲名利依人則将許人以死唯權要之是託論語殺身以成仁詳味句當時盖有依非其人而為好官者梁簡文帝與蕭臨川書列棘外府且息官曹之務柴門趙云杜元凱注左傳蓽門圭竇之人蓽門柴門泛舟登瀼西楚俗以山谷間水可涉為瀼其涉也謂之踏瀼秦俗以堰水為瀼皆謂之瀼趙云䕫州惟有東瀼溪見水經注瀼東瀼西水兩傍之名舊注元不引出處今云登瀼西則舟已泊而登岸恐學者惑踏瀼之語以登字當之故為之解迴首望兩崖東城乾旱天其氣如焚柴長影没窈窕餘光散唅呀趙云焚柴則燔柴也爾雅祭天曰燔柴積薪槱而焚之舊本餘光散唅呀在韻書唅音憾哺也呀虚加切張口也固有唅呀字公今所用無乃􅚱砑字乎盖􅚱砑注谷中也用此字然後有義陶淵明既窈窕以尋壑謝靈運長磴入窈窕言乾旱之氣亘滿于丘壑窈窕􅚱砑之間若言唅呀無義矣大江蟠嵌根歸海成一家禹貢入于海字趙云嵌巖之根出荘子賢者伏於大山嵌巖之下盖江水至此傍峽而行雖蟠曲嵌根終朝宗于海矣下衝割坤軸海賦又以地軸挺拔而争回竦壁攅鏌鎁蕭瑟灑秋色氣一作氛昬霾日車趙云鏌鎁劍名巫峽之竦盖如劔矣栁子厚詩海畔尖山似劔鋩日車事淮南子爰止義和爱息六螭是謂懸車注日乗車駕以六龍義和馭之字則荘子乗日之車舊本氣昬一作氛昬當以為正盖上巳有氣如焚柴而氛昬字又寫風土之昬也峽門自此始䕫州為峽門最穿容浮查禹功翊造化疏鑿就欹斜江賦巴東之峽夏后疏鑿巨渠決太古衆水為長虵風煙𣺌呉蜀舟檝通鹽麻趙云峽門方入峽之門舊注䕫州為峽門非衆水為長虵其比亦新矣我今逺游子飄轉混泥沙師云易需于泥需于沙謂遇難也萬物附本性約身不願奢茅棟盖一牀清池有餘花濁醪與脫粟濁醪嵇康脱粟公孫宏在眼無咨嗟山荒人民少地僻日夕佳陶淵明山氣日夕佳貧病一作賤固其常富貴任生涯老於干戈際宅幸蓬蓽遮石亂上雲氣杉清延月華賞愜又分外理妍夫何誇漢書理得則不怨足了垂白年師云畢卓左手持蟹螯右手持酒杯拍浮酒船中便足了一生敢居高士差趙云泥沙江賦或混淪乎泥沙不願孟子不願人之文繡不願人之膏梁茅楝沈休文詩茅棟嘯蹲鴟在眼謝靈運薜蘿若在眼選莫不咨嗟又云所以咨嗟垂白後漢班超妹書今超年已垂白敢居髙士羞言不敢過差居其上書此豁平昔迴首猶暮霞趙云紀其詩篇之成時猶未晚也世說殷仲堪每謂子弟云勿以我受任方州云我豁平昔時意然前云囘首望兩崖今云回首猶暮霞豈偶重耶貽華陽栁少府繫馬喬木間趙云劉琨詩繫馬長松下詩南有喬木問人野寺門栁侯披衣笑見我顔色温並坐石堂下一云堂下石俛視大江犇火雲洗月露盧思道火雲赫而四舉絶壁上朝暾謝靈運早聞夕䬃急晚見朝日暾趙云世說桓公入峽絶壁天懸驚波電激謝靈運晨䇿尋絶壁自非曉相訪觸熱生病根觸冒也襶趙云晉程曉詩可憐褦子觸熱向人家南方六七月出入異中原老少多暍死汗踰水漿翻趙云熱病謂之暍武王下車而扇暍荘子暍者反冬乎冷風者是已世說鍾㑹鍾毓俱見魏文毓面有汗帝問何以汗曰兢兢皇皇汗出如漿俊才得之子筋力不辭煩指揮當世事語及戎馬存涕淚濺我裳悲氣排帝閽思𤣥賦呌帝閽使闕扉兮覩天皇于瓊宫府趙云老者不以筋力為禮因俊才得栁少不辭筋力而徃謁也帝閽楚辭吾令帝閽開關兮揚雄甘泉賦遣巫咸兮呌帝閽舊注引張平子思𤣥賦在後矣排謂排闥鬱陶抱長䇿書鬱陶乎予心長䇿良策也有良策而不見用故鬱陶耳趙云鬱陶孟子載象謂舜曰陶思君爾賈誼振長䇿而馭宇内義仗知者論吾衰卧江漢但愧識璵璠潘正叔寸晷惟寶豈無璵璠言已之所識止璵璠而已以美栁侯趙云璠璵比栁少府璵璠逸論語璠璵魯之寳玉孔子曰美哉璠璵逺而望之煥若也近而視之瑟若也一則理勝一則字勝倒用璵璠字元注潘正叔詩是文章一小伎於道未為尊起予幸班白因是託子孫趙云言取少府道德之美非止文章後漢揚賜傳造作賦說以蟲篆小伎見寵于時北史李渾謂魏収雕蟲小技我不如卿國論典章卿不如我於道言尊老子道尊德貴起予論語起予者商也言栁少府有道可尊起發予於班白衰老之間因比相見而有子孫可託之幸託字論語可以託六尺之孤託子孫曹撡少時見橋元謂曰天下方亂羣英虎争能安之者其在君乎然君實亂世之英雄治世之奸賊恨吾老不見君富貴當以子孫相託俱客古信州䕫古信州結廬依毀垣相去四五里徑微山葉繁時危挹佳士况免軍旅喧醉從趙女舞歌鼓秦人盆揚惲書家本秦地能為秦聲婦趙女也雅善鼓瑟酒後耳熱仰天撫缶而呼鳴鳴李斯書隨俗雅化佳冶窈窕趙女不立于側也夫擊甕叩缶彈筝摶髀而歌鳴鳴快耳者真秦之聲也莊子鼓盆増添成公綏琵琶賦飛龍列舞趙女馸羅進如驚鸛轉似回波趙云陶淵明結廬在人境時危普言中原之亂免軍旅䕫州幸免爾趙女古稱燕歌趙舞盆甕缶之變稱子壯顧我傷我驩兼淚痕餘生如過烏師云李白詩生猶鳥過目胡乃自結束景公一何愚牛山淚相續趙云家語見飛鳥過荘子如雀蚊虻之過乎前張景陽詩忽如鳥過目故里今空村同元使君舂陵行并序覽道州元使君舂陵行兼賊退後示官吏作二首志之曰當天子分憂之地效漢官良吏之目今盜賊未息知民疾苦得結輩十數公落落然㕘錯天下為邦伯萬物吐氣天下少安可待矣不意復見比興體制微婉頓挫之詞感而有詩増諸巻軸簡知我者不必寄元趙云元字次次山其舂陵行序云癸夘歳授道州刺史道州舊四萬餘户經賊已來不滿四千太半不勝賦稅到官未五十日承諸使徴求符牒二百餘封皆曰失期限者罪至貶削於戯若悉應其命則州縣破亂刺史焉欲逃罪若不應命又即獲罪戾必不免也吾将守官静以安人待罪而已此州舂陵故地故作舂陵行以達下情其賊退示官吏詩序云癸夘歳西原賊入道州焚掠幾盡而去明年賊又攻永州破邵不犯此州邊鄙而退豈力能制敵盖蒙其傷憐而已諸使何為忍苦徴歛故作詩一篇以示官吏詩更不能載觀序意則詩可見矣遭亂髪盡一作遽白轉衰病相嬰沉緜盜賊際狼狽江漢行歎時藥力薄為客羸瘵成趙云言非不進藥以歎時之故憂思奪之病雖痊而藥力減半吾人詩家秀博採世上名前漢溝洫志上作歌云泛濫不止兮愁吾人粲粲元道州前聖畏後生粲粲美之盛也史三女為粲孔子後生可畏趙云後生對前人之辭非直謂年少為後生也如周公為先則孔子為後生孔子為先則孟子為後生今言前聖畏後生則道州雖晚生唐世乃為前代聖哲所畏矣君詩三百六十篇其中周公召康公家父穆父之所作皆有益于其君非前聖之謂乎觀乎舂陵作欻見俊哲情復覽賊退篇結也實國楨趙云棹幹所以支屋也題曰楨旁曰幹史以譬賢材曰國之楨幹賈誼昔流慟賈誼可為慟哭慟趙云慟如子哭之匡衡常引經衡上疏陳便宜及朝廷有政議引經以對道州憂黎庶詞氣浩縱横道州元結也劉公幹君侯多壮思文雅縱横飛兩章對秋月一作水一字偕一作皆華星趙云上句言如月之皎潔下句言無一字而不若華星之燦爛也魏文章詩畢星出雲間致君唐虞際純朴憶大庭大庭氏趙云既致君於堯舜之間又憶大庭氏之純朴則道州事君豈蹇淺者哉魏應璩與從弟君胄書思致君於有虞濟蒸民於塗炭大庭氏上古帝王之號事見荘子何時降璽書前漢循吏傳二千石有治效輙以璽書勉勵焉用爾為丹青趙云為丹青則藻縟王猷粉飾治具之義鹽鐵論公卿者神化之丹青用爾則尚書用汝作舟楫作霖雨也獄訟久衰息漢禮樂志百姓素樸獄訟衰息豈唯偃甲兵悽惻念誅求薄歛近休明乃知正人意不茍飛長纓陸壬衡長纓麗旦光茍趙云左傳王孫滿德之休明以歎其不且在冠冕之中也涼飈振南岳南岳衡山之子寵若驚老子寵辱若驚下趙云道州在南故以諒飈言之句言道州為刺史其寵辱若驚故如下句所云也色阻金印大刺史印綬帥云晉王敦舉兵周顗曰今年殺賊奴取金印如斗大興含滄溟清溟一作浪兮趙云孺子歌曰滄浪之水清可以濯我纓滄浪之水濁兮可以濯我足孔子曰弟子志之清斯濯纓濁斯濯足興含滄溟清非有洗濯昬穢之意舊本改作滄溟清非滄溟大海不可言清金印刺史之印我多長卿病長卿司馬相如病渇日夕思朝廷肺枯渇太甚漂泊公孫城趙云公孫述自號白帝而城在䕫之東曰白帝城呼兒具紙筆隠几臨軒楹作詩呻吟内墨淡字欹傾感彼危苦詞師云庾信哀江南賦序曰不見危苦之辭惟以悲哀為主庶幾知者聽趙云此一叚因以自言其心懐存憂國而已狄明府博濟梁公曾孫我姨弟狄仁傑封梁國公母之姊妹之子曰姨弟不見十年官濟濟大賢之後竟陵遲語子張曰我之大賢與浩蕩古今同一體比㸔伯叔四十人有才無命百寮底今者兄弟一百人幾人卓絶秉周禮元年齊仲孫湫來省難及還公問魯可取乎對曰魯秉周禮未可動也言猶守先王之法度也此言兄弟雖多能守梁公之法幾人耳在汝更用文章為長兄白眉復天啟馬良兄弟五人並有才名鄉里諺曰馬氏五常白眉最良眉中有白毛因以為稱左氏天将啟之汝門請從曽公說梁公也太后當朝多巧詆狄公執政在末年濁河中不汚清濟言獨立于朝不移于衆邪趙云謝元暉詩紛虹亂朝日濁河汚清濟國嗣初將付諸武公獨廷諍守丹陛武后當朝革唐為周欲以武三思為儲貳以問宰相皆莫敢對仁傑獨曰臣觀天下未厭唐德禁中決册請房陵房陵中宗所在前一作滿朝長老皆流涕狄仁傑傳中宗在房陵言瑱李昭德皆有康復言言則天無復避意唯仁傑毎從容奏事無不以子母恩情為言則天漸省悟召還中宗太宗社稷一朝正漢官威儀重昭洗后常夢雙陸不勝仁傑曰雙陸不勝無子也因進說文皇帝身䧟鋒鏑而有天下以傳子孫陛下因監國掩而有之又欲以三思為後且子母與姑姪孰親若立三思廟不祔姑后感悟即日迎中宗復唐社稷光武紀人見司𨽻僚屬皆歎喜不自勝老吏或垂泣曰不圖今日復見漢官威儀時危始識不世才誰謂荼苦甘如薺謝詩防口猶寛政食荼更如薺師云詩誰謂荼苦其甘如薺汝曹又宜列鼎食身使門户多旌棨列鼎一作裂土賢者之後宜有土杜云唐制節度使就第賜旌節三品以上門立㦸後漢匈奴傳注有衣之㦸曰棨胡為飄泊岷漢間千謁王侯頗歴詆詆評也息夫躬歴詆漢朝公卿况乃山高水有波秋風蕭蕭露泥泥謝詩凝露方泥泥虎之飢下巉嵒蛟之横出清泚早歸來黄土汚衣眼易眯師云晉王導嘗遇西風起舉扇自蔽曰元規塵汚人荘子播糠眯目趙云家語云子路游楚列鼎而食歴詆當作抵詩零露泥泥韓諫議注趙云舊本止云寄韓諫議無傳記可考其人時應在岳州是好道者不然人物必清爽有仙風道骨如李白故甫用神仙言之玉京羣帝宴集言君臣際會以張良比韓歎其滯留不在朝今我不樂思岳陽岳陽巴陵属湖南身欲奮飛病在牀詩静言思之不能奮飛日趙云今我不樂出詩全語下云月其除詩或偃息在牀美人娟娟隔秋水詩人以美人比君子故詩有彼美人兮西方之人兮濯足洞庭望八荒左太沖濯足萬里流趙云美人指韓如李白所謂美人不來空斷腸美人在時花滿堂之謂娟娟美人兒隔秋水言其時荘子秋水時至公在䕫韓在岳為隔秋水濯足字雖孺子歌有滄浪之水兮可以濯我足而單言濯足則左太沖詩濯足萬里流淮南子登太山履石封以望八荒揚雄幸河東賦陟西岳以望八荒鴻飛㝠㝠日月白青楓葉赤天雨霜趙云鴻飛㝠㝠楊子全語鮑照詩窮秋九月荷葉黄北風驅雁天雨霜雨去聲玉京羣帝集北斗玉京帝居言五方各有帝惟北極為至尊薛云晉天文志北極五星北辰最尊者也北斗七星在太微北七政之樞機隂陽之元本故運乎天中臨制四方以建四時而均五行人君之象號令之主注以斗為極誤矣五星經云上白玉京黄金闕杜補遺靈樞金景内經曰下離塵境上界玉京元君注云玉京者無為之天也東西南北各有八天凡三十二天盖三十二帝之都也玉京之下乃崑崙北都羅峯北帝乃三十六洞之所居處儒趙云玉京史記云天上白玉京五城十二樓羣帝據書亦有五方之帝道書三十三天各有帝云集北帝則㑹集于北斗薛說是羣帝言諸貴人如諸王三公之類北斗言天子五方之帝三十三天之帝雖稱帝而於大帝為卑故止稱羣帝字也或騎麒麟翳鳳凰芙蓉旌旗煙霧樂楚詞搴芙蓉兮木末影動倒景搖瀟湘郊祀志登遐倒景注在日月之上反照故其影倒人趙云騎麟翳鳳建芙蓉之旗言羣帝然也集仙傳天降王妙想家乗麟麟鳯凰龍鶴犬馬是巳旌旗在煙霧之間而影上動倒景以形容羣帝神仙之事為韓在岳陽所以專言其上動倒景下則搖瀟湘以引下句星宫之君醉瓊漿楚詞瑤漿密勺實羽觴辛酌既陳有瓊漿羽人稀少不在傍似聞昨夜赤松子恐是漢代韓張良昔隨劉氏定長安惟幄未改神慘傷張良其先韓人高祖立蕭相國良乃稱家世相韓及韓滅不愛萬金之資為韓報仇强秦天下震動今以三寸舌為帝者師封萬户位列侯此布衣之極于良足矣願棄人間事欲從赤松子游耳乃學道欲轉舉高祖曰運籌帷幄之中決勝千里之外吾不如子房趙云星宫之君則降於羣帝者以况禁從之人羽衣則又降于星宫之君者以况諸通籍朝見之人楚辭仰羽人于丹丘謝靈運入麻源第三谷詩羽人絶髣髴丹丘徒空筌如韓諫議之流皆得預宴集然至者稀少乃有不在傍者焉以指言韓矣陸士衡漢高祖功臣頌序太子傳留文成侯韓張良故公以羽人待之為其姓韓挨傍張良楚韓國人從赤松子游比之神慘傷未能獻運籌于上又引下句國家成敗吾豈敢也國家成敗吾豈敢色難腥腐食風香師云梁元帝時梅氣入風香趙云以韓之才不得㕘預惟幄託韓自謙之言吾豈敢也為吾之事者不肯甘厭腐腥所食者風香而已神仙傳壺公留費長房于羣虎中皆張口攫地交手前來撃之長房不恐明日又内長房石室中頭上有大石方數丈茅繩懸之諸虵並徃嚙繩欲斷長房不移公曰子可教矣乃命噉溷臭惡非常中有蟲長寸許長房難之公因而歎謝遣之曰子不得仙也今以子為地上主者可壽百餘年鮑明逺升天行何時與汝曹啄腐共吞腥言既升天矣無復此事也今云色難腥腐亦是其意風香未見所出意神仙所食之物如王母所謂風實雲子乎周南留滯古所惜太史公留滯周南南極老人應壽昌春秋元命苞老人星治平則見見則主壽文趙云又以太史公比之南極老人言韓在岳陽晉天志老人星見主壽昌舊注引春秋元命苞雖是而遺壽昌兩字全語美人胡為隔秋水焉得置之貢玉堂師云傷韓斥在外不見用望其歸帝傍也課伐木并序課𨽻人伯夷幸秀信行等入谷斬陰木冬官輪人為輪斬三材必以時注材在陽仲冬斬之在隂仲夏斬之人日四根止維條伊枚詩終南何有有條有枚正直侹然晨征暮返委積庭内我有藩籬是缺是補載伐篠簜禹貢揚州篠簜既敷注篠竹箭簜大竹伊仗枝持旅次于小安山有虎知禁若恃爪牙之利必昬黑摚突夔人屋壁列一作洌樹白菊鏝為牆實以竹示式遏為與虎近混淪乎無良賓客憂一作齒害馬之徒荘子黄帝于襄城下見牧馬童子而問天下童子曰為天下何異乎牧馬去其害馬者茍活為幸可嘿息巳作詩付宗武誦趙云舊本列樹白菊師民瞻本作白菊是盖荻屬也廬陵嘗謂杜甫無韻者不可讀今此可見長夏無所為客居課奴僕清晨飯其腹持斧入白谷師云周禮白谷地名趙云伐木為枝持今之籬橛也苦竹為籬叙所謂載伐篠簜也跨小籬跨越所居而遮䕶之曹子建贈白馬王彪詩清晨發皇邑持斧借用漢書繡衣持斧青冥曾顛後十里斬隂木杜云周禮山虞仲冬斬陽木仲夏斬隂木鄭司農云陽木春夏生者隂木秋冬生者鄭元云陽木生南山隂木生北山趙云楚辭據青㝠而攄虹張平子南都賦言木有攅立叢駢青冥盰瞑曽巔謝靈運詩葺字臨回谿築觀基曽巔人肩四根已亭午下山麓趙云梁元帝纂要日在午曰亭午尚聞丁丁聲天台賦義和亭午詩伐木丁丁功課日各足蒼皮成積委素節相照燭藉汝跨小籬當仗苦虛竹空荒咆熊羆乳獸待人肉趙云叙止言防虎詩又及熊罷山居所防豈獨虎耶後言虎穴連里閭以防虎為多不示知禁情豈唯干戈哭城中賢府主處貴如白屋蕭蕭理體情蜂蠆不敢毒左氏蜂蠆有毒白趙云周公下白屋之士漢史謂以茅覆屋也理體浄亦老子治道貴清浄之意唐人避治字諱多作理虎穴連里閭隄防舊風俗泊舟蒼江岸乆客慎所觸舍西崖嶠壯雷雨蔚含蓄牆宇資屢脩衰年怯幽獨爾曹輕執熱為我忍煩促師云張華詩煩促每冇餘逝趙云詩誰能執熱不以濯秋光近青岑季月當泛菊報之以微寒共給酒一斛趙云以字做詩報之以瓊瑤瓊玖園人送𤓰江間雖炎瘴𤓰熟亦不早柏公鎮夔國滯務兹一掃食新先戰士成十年傳桑田巫言晉侯不食新矣注言公不得及食新麥共少及溪老傾筐蒲鴿青滿眼顔色好竹竿接嵌竇引注來鳥道沈浮亂水玉魏文帝浮甘𤓰于清泉赤松子服水玉愛惜如芝草師云晉嵇喜𤓰賦世云三芝𤓰處一焉謂之草芝落刄嚼冰霜開懐慰枯槁許以秋蔕除謝元暉殘翩似秋蔕仍㸔小童抱一作飽東陵跡蕪絶楚漢休征討東陵邵平種𤓰之地園人非故侯種此何草草趙云此太守遣送官園中𤓰詩除乃除園之除秋蔕選四言詩翩若秋蔕特泛言覃木今借字用縁𤓰有蔕也史記邵平故秦東陵侯秦破為布衣貧種𤓰于長安城東𤓰美俗謂之東陵𤓰當楚漢争戰之時今云蕪絶楚漢征討休息矣草草勉其勤于治園此篇兩押草字豈東坡所云兩耳義不同故重用邪舊本止作小童抱一作飽與全篇押韻方同上聲當取飽字信行逺脩水筒引泉筒汝性不茹葷清浄僕夫内秉心識本一作根源於事少滯礙雲端水筒坼林表山石碎鮑明逺雲端楚山見林表吳岫微觸熱藉子脩通流與厨㑹徃來四十里荒險崖谷大日曛驚未飡曛黑貌赤媿相對浮𤓰供老病裂餅常所愛晉何曽傳蒸餅一不坼作十字不食於斯答恭謹足以殊殿最文賦考殿最于錙銖注下功曰殿上功曰最詎要方士符神仙傳葛元以符投水中即逆流十丈何假将軍葢行諸直如筆用意﨑嶇外宋玉文章高出崎嶇之外不杜田補遺直如筆言其有用而邪曲也北齊古弼太武嘉其直而有用賜名曰筆以其頭尖又名之尖頭奴時呼為筆公後改名弼趙云公食餅則裂而與常所私愛信行故繼以於斯答恭謹足以殊殿最裂餅暗使王羆與客食餅客裂餅縁羆曰只是不飢方士符将軍葢是求水二事方士意類夷道縣事但無符字耳夷道縣句将山下有三泉傳云本無泉居人苦逺汲傭人多賣水與之一女子弧貧繿縷無貨易有一乞人衣粗貌醜瘡痍竟體人見穢惡唯女子割飯飼之乞人食畢曰我感嫗行善欲思相報為何所須女曰正願此山下冇水可汲乞人乃取腰中書刀刺山下三處即飛泉湧出將軍盖意是貳師事但無葢字耳東觀漢記耿恭為校尉居疎勒匈奴來攻城中穿井十五丈恭曰聞貳師將軍拔佩刀刺山飛泉出今漢德神靈豈有窮乎向井請禱井泉濆出行諸論語子路聞斯行諸言信行修水筒但使之直如筆以來其水槐葉冷淘青青高槐葉果掇付中厨曹子建豐膳出中厨掇趙云詩薄言采之薄言之新麫來近市趙云晏子宅近市汁滓宛相俱趙云鄭元注周禮盎齊言汁滓俱也入鼎資過熟加飡愁欲無趙云古詩上言加飡飢碧鮮俱照筋香飯兼苞蘆趙云香飯見上閿鄉姜少府設鱠戯贈長歌詩注苞蘆則蘆笋之嫩者或曰夔州土人謂之苞蘆經齒冷於雪勸人投比珠趙云明月之珠以暗投人摘字用耳願隨金騕裊金騕裊馬也走置錦屠蘇蜀人元日入香藥漬酒而飲謂之屠蘇杜田補遺屠蘇屋名或作廜㢝玉篇廜㢝庵也通俗文屋下曰廜㢝廣韻廜㢝草庵又廜㢝酒元日飲之可除温氣則廜㢝有一義是詩走置錦廜㢝乃屋也非酒古樂府劉孝咸結客少年場行挿腰銅匕首障日錦廜㢝趙云騕䮍神馬名漢武帝鑄金作䮍蹄麟趾之狀言馬曰金騕䮍珍稱之也盧照鄰詩漢朝金騕䮍秦代玉氛氲舊本作屠蘇字誤意錦廜㢝指御前帳屋馳貢此冷淘先置之帳屋憇泊以俟進也故下句云路逺故恐泥馬路逺思恐泥興深終不渝獻芹則小小野人有美芹而獻于君者薦藻明區區左傳頻蘩蕰藻之菜可羞於王公薦於鬼神師云嵇康絶交書雖有區區之意亦已䔫矣萬里露寒殿上林賦過鳷鵲望露寒露寒漢殿名開水清玉壺鮑照詩清如玉壺冰君王納涼晚此味亦時須行官張望補稻畦水歸東屯大江北一作枕大江趙云一作非盖東屯在大江北一句中有東北字詩家之工百頃平若按六月青稻多千畝碧泉亂趙云公之田想能幾何而云千畝則并東屯之田言之挿秧適云已引溜加溉灌更僕徃方塘更僕以畨次更代使之劉公幹方塘含白水趙云儒行更僕未可終也決渠當斷岸西都賦決渠降雨荷揷成雲謝趙云鮑明逺蕪城賦崪若斷岸矗以長雲爕闗山月云咽流喧斷岸游沬聚飛梁公私各地著前漢食貨志理民之道地著為本師古曰謂安土也趙云謂有官田在其間矣浸潤無天旱主守問家臣陸韓云庶子及家臣分明一作朋見溪伴芊芊炯翠羽剡剡生銀漢鷗鳥鏡裏來闗山雲邊㸔趙云主守指行官張望家臣其下所臣之人左傳公臣不足取之家臣又曰輿臣皂皂臣𨽻乃臣屬之臣不必惑君臣而後為臣也何以知主守為行官張望也後有行官張望刈稻向畢遣女奴阿稽竪子阿叚徃問而曰尚恐主守疎用心未甚臧清朝遣婢僕寄語踰崇岡可見為行官張望矣然則家臣豈婢僕之謂乎舊本分明見溪伴師作分明是盖如此方成字對此篇皆對矣翠羽曹子建洛神賦或拾翠羽銀漢廣雅天河謂之天漢亦曰銀漢鏡裏雲邊皆状畦水明潔秋菰成黑米菰米彫胡精鑿一作穀傅白粲薛云鄭氏釋詩俾疏斯粺云米之率糲十粺九鑿八侍御七左杜田補遺菰米見第三十秋興詩波漂菰米沈雲黒氏傳粢食不鑿音作昭其儉也注鑿謂治米使白字本作糳唐韻糳精細米也說文糯米一斛舂九斗曰糳漢役流法有鬼薪白粲之辟鬼薪謂採薪給祭祀之用白粲謂擇米使正白亦以供祭祀玉粒足晨炊紅鮮任霞散趙云成黒米事唐本草圖經菰謂之茭茭白歳久中心生白臺如小兒臂謂之菰手其䑓中有黒者謂之茭鬱至後結實乃彫胡米也梁庾肩吾納涼詩黑米生菰葑青花出稻苗玉粒蘇秦所謂米貴如玉止言米粒之珍貴下云紅鮮方是言飯紅潤之色韓信傳晨炊蓐食謝元暉詩餘霞散成綺終然添旅食作苦期壯觀揚惲田家作苦遺穗及衆多我食戒滋漫遺秉滯穗也趙云又公自喜之辭詩終然允臧魏文帝旅食南館史此天下之壯觀也謂遺秉及衆多之人其可謂壯觀乎公濟物之心異乎田翁之慳鄙矣催宗文樹雞柵吾衰怯行邁旅次展崩迫趙云言不欲他適且旅泊于此舒展其崩摧逼迫也孔子甚矣吾衰也詩行邁靡靡易旅即次又旅焚其次任彦昇辭奪禮啟不任崩迫之情愈風傳烏雞本草烏䳄雞治風秋卵方漫喫趙云秋卵方漫喫以春卵可抱育秋卵充飽而已故接以自春生成者明之自春生成者隨母向百翮驅趂制不禁喧呼山腰宅課奴殺青竹楚人以火炙竹去其汗謂之殺青趙云為簡册者謂之汗青終日憎赤幘赤幘雞之有冠夜趙云赤幘指雄雞小說空宅有怪或居之中有赤幘來者問其怪類答曰老雄雞也今雄雞之頂雞是赤幘兩字亦有出矣踏籍盤按翻塞蹊使之隔牆東有隙地可以樹高栅避熱時來歸問兒所為跡織籠曹其内令入不得擲趙云言所柵之雞以避熱故徃徃歸來宅内所以問兒更合如何有為而遏止之稀間可突過觜𤓰還汚席我寛螻蟻遭彼免狐貉厄應宜各長幼自此均勍敵籠柵念有脩近身見一作知損益言非特制雞而巳于迫身之事亦可知損益也趙云兩句戒兒之辭使之密不可踰也舊本䝖貉厄狐貉之厚以居貉善睡之獸其皮與狐皆可為裘未嘗聞其食雞豈狐狸字而誤耶自勍敵則平時無柵與籠必相鬭矣近身見損盖於籠柵之間巳有損益之義凡近身之事可推而見舊一作知義亦同見字如復其見天地之心乎之見明明領處分一一當剖析不昧風雨晨亂離減憂感雞鳴之詩序詩者以為亂世則思君子子美之減憂感可見趙云上兩句兒領㫖命雞鳴篇風雨如晦雞鳴不巳雞鳴不以風雨而廢譬君子亂世不改其度在亂離之除憂戚必有失節之事故因雞鳴而減憂戚則不妄其所為矣其流則凡鳥其氣心匪石趙云世說吕安詣嵇康不在其凡喜出見之安題門作鳳字而去鳳言凡鳥也心匪石以申言雞鳴之不改詩我心匪石不可轉也倚賴窮歳晏撥煩去一作及冰釋未似尸鄉翁拘留葢阡陌祝雞翁居尸鄉山下養雞百餘輩皆有名字呼名則種别而至販雞及賣子見列仙傳趙云上兩自川人近歳除以雞為饋送則歳晏撥去眼前百翮之煩多如氷釋矣荘子涣若冰将釋雞去而便押冰釋字以不泥于拘留如尸鄉翁之多養至于填葢阡陌也園官送菜園官送菜把本數日闕矧苦苣馬齒掩乎嘉蔬傷小人妬害君子菜不足道也比而作詩義趙云比者三曰比之也清晨䝉菜把常荷地主恩趙云自叙甚明詩亦相貫國語越王以會稽三百里為范蠡地曰後世有敢侵蠡之地者皇天后土四郷地主正之其後有土如州縣者皆謂地主守者愆實數略有其名存苦苣刺如針馬齒葉亦繁青青蔬嘉色埋没在中園園吏未足怪世事因堪論趙云園官送者多苦苣馬齒莧所謂嘉蔬者但没于中園不以相遺也張載登成都白莬䅹原隰植嘉蔬郭景純江賦挺自然之嘉蔬公苦雨詩又云嘉蔬没溷濁時菊碎榛叢亦以賢者之見掩也鳴呼戰伐久荆棘暗長原乃知苦苣輩傾奪蕙草根蕙草薰草小人塞道路為態何喧喧又如馬齒盛氣擁葵荏昏葵荏嘉蔬通趙云八句雖分兩段而義叙雖㥎云苦苣馬齒掩乎嘉蔬詩則奪蕙草者歸之苦苣擁葵荏者歸之馬齒於馬齒譬小人則前所謂苦苣者盖如小人可知葵荏正以言嘉蔬蕙草踓不可為蔬要之君子之比皆不以文害辭辭害意㸃染不易虞絲麻雜羅紈一經器一作氣物内永挂麤刺痕志士採紫芝放歌避戎軒畦丁負籠至感動百慮端趙云别引借譬之刺音一此公所傷甚矣苦苣馬齒在器物内所盛以為饋餉既出其物則器空矣亦何害事哉而一經器物所盛便永逺挂其麤刺之㾗尚有可惡之意然則君子固宜傷所染矣此志士所以歌紫芝而不顧也紫芝曲見上洗兵馬行注上後園山脚朱夏熱所嬰清旦趙作旭步北林趙云梁元帝纂要夏謂朱明亦曰朱夏清旭字江賦視雰祲於清旭小園背高岡挽葛上崎崟曠望延駐目飄颻散疏襟潛鱗恨水壮去翼依雲深趙云譬隠淪之士須幽曠深逺而後可盖魚潛以淵為安水壮則非淵矣鳥栖以深山為安雲深則山深矣壯字顔延年春江壯風濤勿謂地無疆坤厚載物德合旡疆劣於山有隂山北曰隂時喪亂九州分裂孰若山隂之可以避亂石榞遍天下師云曹毗詩周馳困石榞實杜田補遺唐韻曰榞音原木名皮可食如甘蔗謂之石榞未究其㫖曰趙云杜田云未究其㫖或云善本止是名原盖平地原承上句山有隂之下言山隂石平處雖遍天下有之而涉水行陸以徃兼有浮沈而難到又引下句登隴首而經碧岑已十年矣亦自喜遂其所欲也水陸兼浮沈自我登隴首十年經碧岑劔門來巫峽薄倚浩至今自鳯翔赴同谷由同谷入蜀沿流下峽皆山水鄉師云孫綽薄倚我林下趙云顔延年詩隴首秋雲飛劔門來巫峽薄倚浩至今所以成十年之語薄倚即倒用謝靈運相倚薄也故園暗戎馬骨肉失追尋時危無消息老去多歸心志士惜白日荀子君子愛日久客藉黄金古詩徒有萬里志欲行囊無金杜田補遺文選傳休奕雜詩志士惜日短愁人知夜長注趙云惜白日歎功名之不立藉黄金歎客况之貧簿引古詩雖亦是金事而公詩正言久客本無行意也敢為蘇門嘯庶作梁父吟阮藉常登蘇門山遇孫登與商畧終古登不應藉長嘯而退至半嶺有聲若鸞鳳之音乃登之嘯也諸葛亮為梁父吟趙云言在山隂之居猶藉黄金為生非直若孫登遺世離物故取嘯事以見意庶作梁父吟則希諸葛亮雖高卧猶懐經世之意也驅豎子摘蒼耳江上秋已分林中瘴猶劇畦丁告勞苦無以供日夕蓬莠猶不焦野蔬暗泉石巷耳況療風本草葉耳或曰苓耳形似䑕耳詩云卷耳主風溼周痺童兒且時摘一云童僕先時摘侵星驅之去爛漫任逺適放筐亭午際洗剥相䝉羃趙云蒼耳今羊負來詩謂之巻耳云采采巻耳不盈傾筐古人巳食之野蔬暗泉石指巻耳生于濕地洗剥相䝉羃洗其土剥其毛登牀半生熟下筯還小益加㸃爪薤間依稀橘奴跡趙云登牀登食牀也半生熟或作熟菜何曾日食萬錢猶謂無下筯處小益療風故也𤓰薤橘皆巻耳同時之物襄陽記李衡種橘於龍陽州謂其子吾有千頭木奴歳可收絹數千疋亂世誅求急黎民糠籺窄杜田補遺陳平家貧與兄伯居常耕田縱平使游學嫂疾平不親家生産曰亦食糠覈耳孟康曰覈參糠中不破者也晉灼日覈音紇京師人謂鹿屑為覈頭飽食復何心荒哉膏梁客薛云唐栁芳氏族論三世有三公者曰膏梁有今僕者曰華腴腥杜田補遺庖人用禽獸春膳膏香夏膳膏臊秋膳膏冬膳膏羶公食大夫禮以稻梁為加膳則膏粱膳之至珍者趙云孟子不願人之膏粱富家厨肉臭戰地骸骨白寄語惡少年黄金且休擲燕太子得荆軻與之臨池軻以瓦抵鼃太子命捧金以進軻用抵之又進軻曰非為太子愛金乃臂痛耳趙云梁元帝古意詩中有惡少年伎能専自得昔游趙云魏文帝與吳重書念昔日南皮之游又一書恐永不得為昔日游故摘昔游字為韻昔者與高李高適李白晚登單父臺宓子賤嘗為單父宰鮑云唐志單父屬宋州寒蕪際碣石萬里風雲來桑柘葉如雨飛藿共徘徊清霜大澤凍禽獸有餘哀杜正謬蔡氏西清詩話唐史稱杜甫與李白高適同登吹臺慨然莫測也質之少陵昔游詩昔者與高李晚登單父臺則知非吹臺三人詞宗果登吹臺豈無雄詞傑唱耶子謂蔡氏未曽熟讀杜詩爾遣懐詩云昔我游宋中惟梁孝王都名令陳留亞劇則貝魏俱憶與高李輩論交入酒壚氣酣登吹臺懐古視平蕪豈非與李白髙適同登吹臺耶趙云公追言其少年日正冬日晚與高李登單父臺句日寒蕪曰飛藿曰清霜最後曰景晏楚山深又見作詩之時亦冬也西清詩話云云正謬是單父臺名偃月臺見李白詩碣石在海邊臺上可視望飛藿共徘徊言與桑柘之業俱落而飛相與徘徊豆謂之藿阮籍詠懐秋風吹飛藿零落從此始師民瞻本作楓藿非益桑柘與豆皆田中物楓木與豆藿不可相連也清霜降而大澤凍禽獸寒而哀是時倉廪實洞達寰區一作瀛開開元之際天下富庶民俗殷草山入河隍之賦稅府之積不可勝計猛士思滅胡將帥望三台時邊帥有帶平章者禄山求宰相不得遂反君王無所惜駕馭英雄材幽燕盛用武時禄山撃契丹無寧歳供給不勞哉吳門轉粟帛泛海陵蓬萊時韋堅于望春樓下鑿潭以通漕大置南海珍貨船尾相銜數千里不絶上御樓觀之趙云公游山東在未獻賦之前盖開元之末天寳之初倉廪實可知矣猛士思滅胡将將務邊功將帥望三台舊注是然此普說諸邊士與將也至幽燕盛用武下方說朔方矣盖時有事于契丹于究騎于突厥又安禄山撃契丹無寜歳也轉粟帛正以供給幽燕之勞舊注韋堅鑿潭非肉食三十萬左傳肉食者鄙未能逺謀獵射起黄埃隔河憶長眺青歳已摧頽肅宗渡河入靈武不及少年日無復故人杯趙云言幽燕屯兵之多憶其長朓之事傷其今日之老也舊注非少年日見第一第注故人杯齊謝眺離夜詩山川不可夢况乃故人杯賦詩獨流涕亂世想賢才有能一作君能市駿骨莫恨少龍媒古有市駿馬骨而得駿馬者喻尊士之似賢者則必得真賢君趙云公傷流落不偶戰國策郭隗謂燕昭王曰古之有以千金求千里馬者不年不能得涓人言于君曰請求之君遣之三月得千里馬馬巳死買其首五百金反以報君大怒所求者生馬安事死馬而捐五百金乎曰死馬且買五百金况生馬乎天下必以王為能市馬馬今至矣不期年千金之馬至者三今王誠欲致士先從隗始隗且見事况賢于隗者豈逺千里哉於是昭王為隗築官而師之樂毅自魏徃鄒衍自齊徃劇辛自趙徃士皆奏燕言已死之骨尚能市之何况恨無龍媒者耶茍求之則至龍媒漢禮樂志天馬來龍之媒商山議得失四皓也謂安漢太子蜀主脫嫌猜蜀主劉備為曹操嫌精趙云先主既用孔明闗張之徒不平日毀之先主曰孤之有孔明猶魚之得水此之謂脫嫌猜舊注非吕尚封國邑封于營丘號齊封趙云文王用太公而終至出于齊為諸侯傅說已鹽梅趙云言高宗用傅說若作和羹爾為鹽梅已則用之之謂四皓隠于啇山孔明卧于南陽吕尚釣于渭濱傅說築于傅巖皆出以應用有以召之故也公不忘君忘世且言高李皆賢才可用景晏楚山深水鶴去低回龎公任本性攜子卧蒼苔後漢龎德公與妻子隠鹿門山孟子窮則獨善其身逹則兼善天下上數公皆能乗時以有為者甫自悲不得其時莫若傚龎公之潔已耳趙云此詩是冬言在䕫也陶淵明詩景晏步脩廊水鶴去低徊以興其閑曠既不如上七人者信用而出但若龎公任其隠淪本性耳九家集注杜詩巻十一
