body:
  text: 九家集注杜詩巻二十二宋郭知達編近體詩琴臺成都記琴臺院以司馬相如琴臺得名而非相如舊臺舊臺在浣花溪正路金花寺北廂號海安寺梁蕭藻鎮蜀増建樓臺以備逰觀元魏伐蜀下營於此掘為塹得大甕二十餘口葢所以響琴也隋蜀王秀更增五臺并舊為六茂陵多病後尚愛卓文君相如居茂陵常病渇文君臨卭卓文女少寡好音相如以琴心挑之文君夜奔相如相如與歸成都酒肆人間世相如既歸成都家居徒四壁立乃之臨卭賣車騎酤酒文君當壚生自滌器於市也世趙云言以酒肆為營生之具爾莊子有人間篇琴臺日暮雲趙云江文通擬休上人詩云日暮碧雲合野花留寳靨蔓草見羅裙趙云沈佺期梨園亭侍宴詩云野花飄御座河栁拂天杯以花譬寳靨花鈿也覩野花如文君所留之鈿蔓草則詩云野有蔓草草之色緑如見其裙或以白樂天裙腰細草言之其義亦通歸鳯求皇意寥寥不復聞杜補遺徐陵玉臺新詠載相如琴歌曰鳯兮鳯兮歸故鄉逰遨四海求其皇時未通遇無所將何悟今日升斯堂有艶淑女在此房室邇人遐愁我腸何縁交頸為鴛鴦又曰凰兮凰兮從我栖得託字尾永為妃交情通體心和怡中夜相從知者誰雙與俱起飜高飛無感我心使予悲趙云夫相如以文章冠世固美矣而此段終非美事寥寥不復聞言行媒婚姻乃所聞者而挑之使奔自相如之死如此者未之聞矣為賢者諱春秋之義今句其微言責之者乎漫成二首野日一作月荒荒白春流泯泯清趙云周王褒送葬詩云寒近邉雲黒塵昏野日黄渚蒲隨地有村徑逐門成趙云梁簡文帝晩春詩渚蒲變新節公詩又曰渚蒲芽白水荇青只作披衣慣常從漉酒生陶潜以中漉酒必趙云言有酒之家從之求酒飲也眼前無俗物多病也身輕杜補遺世説云嵇阮山劉在竹林酣飲王戎後往阮步兵曰俗物已復來敗人意則子美眼邉無俗物宜其雖病而身輕也右一江臯已仲春謝靈運詩曰日麗江臯又詩仲春喜逰遨花下復清晨仰面貪看鳥迴頭錯應人讀書難字過對酒滿壺頻近識峨眉老知余懶是真東山隐者暉趙云楚詞朝馳騁兮江臯其後謝𤣥使幽客滯江臯清晨出子建詩右二春水三月桃花浪江人以三月水為桃花水江流復舊痕言復漲也句趙云韓詩章於溱與洧方渙渙兮注云謂三月桃花水下時也朝來沒沙尾碧色動柴門古詩春水似挼藍接縷垂芳餌連筒灌小園巳添無數鳥争浴故相喧趙云古詩曰寄語故林無數鳥㑹入羣裏比毛衣崔植苦寒行云但聞寒鳥喧江亭坦腹江亭暖王羲之東牀坦腹長吟野望時水流心不競雲在意俱遲寂寂春将晚趙云桓温云為爾寂寂文景笑人欣欣物自私陶淵明賦木欣欣以向榮故林歸未得趙云王仲宣七哀詩飛鳥翔故林排悶强裁詩排去也書趙云周𢎞讓荅王褒云排愁破涕村夜風色蕭蕭暮江頭人不行趙云一本作蕭蕭風色暮則錯字眼矣又一本作蕭蕭風色暮却無義矣師民瞻本作風色蕭蕭暮是上官儀初春詩風色翻露文雪花上空碧村舂雨外急鄰火夜深明趙云可謂善道事矣孟浩然鄰杵夜聲急亦詩人偶合葢物理當然李商隠云渠濁村舂急則分明是使杜公之句胡羯何多難樵漁寄此生趙云胡羯指言史朝義也是年三月史朝義弑其父思明而襲位改元顯聖中原有兄弟萬里正含情趙云王仲宣公讌詩曰今日不極歡含情欲待誰而江文通登廬山香爐峯詩臨風黙含情早起趙云孟子早起施從良人之所之春來常早起幽事頗相闗趙云頗相闗出於梁元帝别罷花枝不共攀别後書信不相闗也蕭綜悲落葉詩悲落葉何時還宿昔并根本無復一相闗陳後主云風流豈云盡嬌態强相闗帖石防隤岸開林出逺山一丘藏曲折緩步有躋攀趙云一丘對緩步此不拘以數對數詩之老成者也漢書班固書曰夫嚴子者棲遲於一丘天下不易其樂故其後謝鯤云一丘一壑自謂過之緩步字如傳云緩步而拯溺童僕來城市缾中得酒還畏人趙云選詩曰客子常畏人故公得以為題早花隨處發春鳥異方啼萬里清江上三年一作峯落日低趙云公所居在萬里橋西畏人成小築褊性合幽棲趙云謝靈運詩資此永幽棲門逕一作逕沒從榛草無心待一作走馬蹄可惜花飛有底急老去願春遲趙云有底唐人語其甚底事也韓退之詩云有底忙時不肯來可惜歡娯地都非少壯時趙云孟子霸者之民驩虞如也而詩人用之如朝野多歡娯古詩少壯不努力寛心應是酒遣興莫過詩此意陶潜解吾生後汝期趙云以酒對詩詩人皆然陶淵明所以高世者此二物而已公恨不與之同時故曰後期也落日落日在簾鈎溪邊春事幽芳菲縁岸圃樵爨倚灘舟趙云芳菲之圃縁岸而為樵㸑之舟倚灘而泊此於義本是縁岸芳菲圃倚灘樵㸑舟而句法藏巧故云啅崔争枝墜飛蟲滿院遊趙云葢道實事與夏夜歎所謂虛明見纎毫羽蟲亦飛揚同濁醪誰造汝一酌一作酌罷散千憂東方朔曰夫積憂者得酒而解杜補遺東方朔别傳武帝幸甘泉長平坂道中有虫赤如肝頭目口齒悉具朔曰此謂怪氣是必秦獄處也夫積憂者得酒而解乃取虫置酒中立消可趙云魏都賦云清酤如濟濁醪如河一酌散千憂一以敵千乃詩語之工也一作酌罷非獨酌步屧深林晚開樽獨酌遲趙云宋書袁粲為丹陽尹嘗步屧白楊郊野間道遇一士人便呼與酣飲仰蜂粘落蘂行音杭蟻上枯梨趙云蜂粘花蘂是也一作落絮非行蟻成行之蟻薄劣慙真隠幽偏得自怡趙云薄劣謝靈運詩彼美丘園道喟焉傷薄劣本無軒冕意不是傲當時薛云莊子曰今之所謂得志者軒冕之謂也逺遊趙云楚詞有逺遊篇賤子何人記迷方著處家趙云記曰所逰必有方迷方則漫行而不知所定止也鮑照擬古云南國有儒生迷方獨淪誤此之謂著處家矣或作迷芳非是竹風連野色江沫擁春沙種藥扶衰病吟詩解嘆嗟似聞胡騎走失喜問京華失喜言出於不自覺稍趙云胡騎走謂史朝義之兵衰者也徐歩整履一作屐步青蕪荒庭日欲晡晡向午也趙云晡日晚也淮南子日至于悲谷是謂晡時芹泥隨燕觜花蘂上蜂鬚趙云公此數篇詩皆道景為新句前篇云仰蜂粘落蘂行蟻上枯梨今云芹泥隨燕觜花蘂上蜂鬚真冠絶古今矣把酒從衣濕吟詩信杖扶敢論才見忌賈誼以才見忌實有醉如愚潜徳於酒也寒食寒食江村路一作落風花高下飛汀煙輕冉冉竹日净暉暉田父一作舍要皆去趙云要音平聲言有招要則皆去也鄰家閑一作問不違趙云言鄰家之問贈亦不違而受之如左傳衛出公以弓問子貢之問舊本作閑非地偏相識盡雞犬亦忘歸一作機地趙云陶潜心逺自偏高柟趙云此應是下篇古詩風雨所拔之柟矣柟樹色㝠㝠江邊一蓋青劉先主所居籬角一樹逺望若車蓋近根開藥圃接葉製茅亭落景隂猶合趙云凡木日景晚照不全照頂止照其旁故隂少今柟以高大則其旁枝葉濃茂故云微風韻可聴尋常絶醉困臥此片時醒惡獨遶虚齋徑常持小斧柯趙云六韜云兩葉不去将成斧柯幽隂成頗雜惡木翦還多趙云管子云士懐耿介之心不䕃惡木之枝惡木尚能恥之况與惡人同處陸士衡猛虎行云熱不䕃惡木隂惡木豈無隂志士多苦心即用管子矣翦字則甘棠云勿翦勿拜枸杞因吾有雞棲奈如何汝一作爾因趙云以惡木蔽障而枸把不生公翦去雜隂而有也翦去木枝似妨雞棲故云奈汝何方知不材者生長漫婆娑莊子言櫟杜之詩匠伯不顧弟子問之匠伯曰彼散木也無所可用故能若是之夀也趙云莊子云昨日山中之木以不才生也石鏡成都記武都山精化為女子蜀王開明納為妃無幾物故王哀之取武都山土築為之塜蓋地數畝以石鏡表其門蜀王將此鏡送死置空山𡨕寞憐香骨趙丁蜀王於㝠寞之中憐此女子之香骨也𡨕寞亦取謝惠連祭古塜文號之為㝠寞君也提携近玉顔選美者顔如玉趙云提携此鏡以近女子之玉顔也衆妃無復嘆千騎亦虚還趙云上句言昔目專寵衆妃皆有嗟嘆今既死矣則無復嘆下句言人已葬矣送葬之千騎虚還而已獨有傷心石埋輪月宇間見石筍行注似趙云埋輪借張綱埋輪為熟字也月宇言容月之宇如藥珠宫廣寒宫之義以比埋鏡月處然非深解以俟明識聞斛斯六官未歸趙云此豈前篇所謂斛斯融者乎絶句云南隣愛酒伴而自注云斛斯融吾酒徒又自閬中再歸成都則有過故斛斯校書莊以弔矣故人南郡去去索作碑錢趙云南郡今䕫巫之間酈道元注水經云秦兼天下置立南郡自巫而上皆其域也夫為人作碑而至逺去索錢為可傷矣其求碑之人又可鄙矣此公詩句之竒也本賣文為活翻令室倒懸唐書以文獲財未有如李邕者左傳室如懸罄孟子猶解倒懸秋師云管輅射覆云室家倒懸門戸衆多藏精育毒得乃化此蜂窠也工部用史中字非用事也他倣此飢趙云為活蜀人方言倒懸言其室中餓不啻倒懸急於飲食之為解也荆扉深蔓草土銼冷疎煙蜀人呼釡為銼詩趙云沈休文詩云荆扉新且故云野有蔓蔓老罷休無賴歸來省醉眠趙云蔡興宗傳太尉沈慶之曰加老罷私鬥兵刀頓闕則言老而罷也應是常語故公又云老罷知明鏡悲來望白雲絶句漫興九首趙云題名漫興蓋書眼前之景而漫成耳别無譏誚眼見一作前客愁愁不醒無賴春色到江亭趙云言所見之客愁如睡如醉而不醒也下句言春色既無所倚賴而到江亭矣時三月春暮故有下句之可愁也即遣花飛一作開深造次便覺一作教鶯語太丁寧趙云即便遣花飛去此所以為春之造次也一本作遣花開非是造次率爾之義鶯亦惜花之飛而其語丁寧稠疊也師民瞻本作第九首右一手種桃李非無主野老墻低還是家趙云野老公自稱也言親手種桃李之人固自有主因墻低可盡見他家之桃李即還是我家無異矣此足見公之不泥意於分彼此也恰似春風相欺得夜來吹折數枝花趙云方藉見鄰家桃李以為翫而春風相欺吹折數枝矣右二熟一作耐知茅齋絶低小江上燕子故來頻銜泥㸃汚琴書内更接飛蟲打著人趙云此篇專言燕也只道實事無所譏銜字俗旁著口非右三二月已破三月來漸老逢春能幾回趙云破字下得竒沈佺期度安海入龍編詩云别離頻破月容鬢驟催年亦此破之義莫思身外無窮事且盡生前有限杯張翰詩使我有身後名不如即時一杯酒趙云以張翰句翻起新意新語也右四腸斷春江欲盡頭杖藜徐步立芳洲趙云上句王維所謂行到水窮處也顛狂栁絮隨風去輕薄桃花逐水流栁絮桃花非乆固之物故隨風逐水無有定止亦譏以勢利相交也趙云作為狂怪之語别無所譏右五懶慢無堪不出村呼兒日在掩柴門趙云懶漫而無所堪任所以不出村乃嵇康性疎懶而有七不堪是也柴門杜元凱注左傳篳門柴門也陶淵明歸去來云門雖設而常闗蒼苔濁酒林中静碧水春風野外昏趙云此句法大似落花游絲白日静鳴鳩乳燕青春深而驟然誦之初不覺也右六糝逕楊花鋪白氊㸃溪荷葉疊一作纍青錢筍根稚子無人見沙際鳬雛傍母眠洪覺範冷齋夜話云筍根稚子無人見世人不解何等語唐人食筍詩曰稚子脱錦絣駢頭玉香滑則稚子為筍明矣寧雜誌曰竹根有鼠大如貓其色類竹名竹豚亦名稚子用趙云筍根稚子則雉雞之子出古樂府有雉子班固對鳬雛西京雜記太液池其間鳬雛鶴子布滿充積雉性好伏况其子之身小在筍之傍難見亦可知縁世間本有作稚子故起紛紛之説予問韓子蒼子蒼曰筍名稚子老杜不用食筍詩亦可覺範之説如此夫既謂之筍根稚子則稚子别是一物豈仍舊却是筍邪諸説皆非而賛寜穿鑿尤甚蜀中竹間有鼠大如貓成都人豈不皆知之且識之邪右七舍西柔桑葉可拈江畔細麥復纎纎趙云葉可拈則三月時葉繁茂可引手而拈之也人生幾何春已夏魏武短歌行對酒當歌人生幾何不放香醪如蜜甛趙云如密酣則家語載童兒之歌萍實曰甜如蜜也不放者不放脱之謂右八隔户楊栁弱嫋嫋恰似十五女兒腰趙云宋鮑明逺詩翾翾燕弄風嫋嫋栁垂道又陳徐陵折楊栁云嫋嫋河隄栁依依魏主營琅琊王歌云新置五尺刀懸著中梁柱一日三摩挲劇於十五女誰謂朝來不作意狂風挽斷最長條趙云師民瞻本作第一首右九戲為六絶趙云此六篇皆言文章之難事公雖謂之戲而中有刀尺矣庾信文章老更成凌雲健筆意縱横周書庾信字子山有盛才文采綺艶為世人所尚謂之庾體宿學後生競相模範作哀江南賦猶為麗絶至今行於世趙云詩云雖無老成人尚有典刑老成者以年則老以徳則成也文章而老更成則練歴之多為無敵矣故公詩又曰波瀾獨老成也司馬相如作大人賦武帝讀之飄然有凌雲之氣庾信作字文順文集序曰章表健筆一付陳琳今人嗤㸃流傳賦不覺前賢畏後生趙云嗤㸃嗤笑㸃檢之也干寳晋紀揔論有云葢共嗤㸃以為灰塵而相詬病矣陸機豪士賦云巍巍之盛仰邈前賢洋洋之風俯冠來籍後生則孔子曰後生可畏焉知來者之不如今也後生言在後時所生不必以年少為後生也今人嗤㸃其賦則亦公自謂矣庾信生於前故謂之前賢公生於後故謂之後生此又反其本傳中語也其二楊王盧駱當時體輕薄為文哂未休楊炯王勃盧照鄰駱賔王以文辭馳名號為四傑當杜補遺唐史李敬𤣥重楊炯盧照鄰駱賔王王勃必顯貴裴行儉曰士之致逺先器識後文藝勃等雖有文才而浮躁淺露豈享爵禄之器哉居趙云楊炯不伏王勃而畏盧照鄰嘗曰媿在盧前恥王後炯意欲云盧楊王駱而公今云楊王盧駱則公語中已見品第矣四子之文大率浮麗故公之以為輕薄為文而哂之未休也孔子曰是故哂之下一哂字而許與見矣唐人玉泉子之書載王楊盧駱有文名人議其疵曰楊好用古人姓名謂之㸃鬼簿駱好用數對謂之算博士然則公以之為當時體豈過為抵排之説哉爾曹身與名俱滅不廢江河萬古流趙云鮑明逺升天行云何時與爾曹啄腐共吞腥老子曰名與身孰親列子云仁義使我先身而後名者也與名俱滅字則宋之問云南史之筆漏而不書東嶽之魂與名俱滅其三縱使盧王操翰墨劣於漢魏近風騷謂漢魏文雖近風騷未識其大全爾終趙云此篇又再舉盧王二人言漢魏之文去古未逺有風騷之氣而照鄰與勃轉為輕薄之文以文比之為劣龍文虎脊皆君馭歴塊過都見爾曹信君皆得逸才也杜田補遺前漢西域傳孝武之世蒲梢龍文魚目汗血之馬充於黄門注四駿馬名也又禮樂志天馬歌天馬徠出泉水虎脊兩化若神注馬毛色如虎脊者有兩也然趙云文章之妙如龍文虎脊之馬皆可充君王之馭或過都而蹶則猶不為良馬爾曹指盧王也王褒聖主得賢臣頌過都越國蹶若歴塊其四才力應難跨數公凡今誰是出羣雄趙云數公指庾信楊王盧駱與夫漢魏諸人也自衆人觀之才力未易超跨之出羣字世説殷中軍道韓太常曰康伯少自摽置居然是出羣器羣字亦指數公而出羣雄則蓋自負矣或看翡翠蘭苕上薛云郭景純翡翠戲蘭苕容色更相鮮言珍禽在芳草間交相輝映以比文章苕者華也未掣鯨魚碧海中言今之為文者止得小巧而已自趙云此兩句言數公者不過文采華麗而已而公所負其出羣雄者如掣鯨魚於碧海非釣手之善氣力之雄安能然哉蘭苕事郭景純遊仙詩云云具見薛注郭止言珍禽芳草交相輝映而公取用言文章也鯨魚有力最難得者木𤣥虚海賦云魚則横海之鯨潘岳西征賦曰貫鰓屬毛掣三牽比此無一字無字處矣東方朔十洲記曰東有碧海廣狹浩汗與東海等水不鹹苦正作碧色其五不薄今人愛古人清詞麗句必為鄰趙云此公之志也古人則指言屈宋也論語必有鄰為鄰字如天與地為鄰也竊攀屈宋宜方駕恐與齊梁作後塵屈原宋玉文才足以方駕並驅齊梁詩體格輕麗文之失始於齊梁也趙云言公竊自追攀屈原宋玉宜與之並駕矣恐與字如孔子謂子貢曰汝與回也孰愈之與言恐共齊梁之人皆作屈宋後塵爾一云公所以必追逐屈宋者唯恐不超過齊梁而翻與之作後塵蓋齊梁詩體格輕麗公所不取也亦皆有義劉孝標絶交論云方駕曹王謂曹植王粲方言並也後塵應瑗與桓𤣥書曰敢不䇿馳敬尋後塵其六未及前賢更勿疑遞相祖述復先誰趙云陸機豪士賦序云巍巍之盛仰邈前賢此兩句功用可敵陸機文賦云必所擬之不殊乃闇合乎曩篇雖杼軸於予懐怵他人之我先則公之意矣唐乾封郊祀詔曰其後遞相祖述禮儀紛雜而在文章言之則沈休文作謝靈運傳論曰異軌同奔遞相師祖李善注文選亦曰諸引文證皆舉先以明後以示作者必有所祖述也然則祖述者文人烏能輒巳邪故雖孔子亦曰祖述堯舜豈專自已出哉别裁偽體親風雅轉益多師是汝師薛云南史徐陵多變舊體有新意又北史庾信父肩吾與徐陵並為東宫學士文詞綺麗世號徐庾體趙云裁字即孔子不知所以裁之謝靈運傳論文曰延年之體裁明密凡文章皆有體文賦曰其為體也屢遷嵇康曰才士並為之賦頌其體製風流莫不相襲公今指言浮華者謂之偽體欲裁約之以近風雅亦無常師多求之前人以取其所長乃為師耳汝師者自謂之辭江漲江發蠻夷漲蜀水之源皆出夷地山添雨雪流大聲吹地轉海賦又以地軸挺拔而争迴聲趙云揚子雲或問大高浪蹴天浮海賦浮天無岸㳺仙詩高浪駕蓬萊魚鱉為人得蛟龍不自謀七發横暴之極魚鱉失勢龍趙云公於溪漲詩亦曰蛟亦狼狽而况鱉與魚輕帆好去便吾道付滄洲公以道之不行故有乗桴之意晩晴村晚驚風度庭幽過雨霑夕陽薫細草趙云江淹别賦陌上草薰江色映疎簾書亂誰能帙杯乾可自添時聞有餘論未怪老夫潜趙云縁王符著潜夫論故云然朝雨涼氣曉蕭蕭江雲亂眼飄趙云周庾信詩曰細塵障路起驚花亂眼飄風鴛藏近渚雨鷰集深條黄綺終辭漢巢由不見堯趙云黄公綺公者乃四皓中二人既避秦矣以漢高祖欲易太子之故出而定太子又且入山是為辭漢晋庾闡閒居賦曰黄綺結其雲樓漁父欣其濯足故公逸詩又云黄綺未稱臣也巢由巢父許由也嵇康高士傳曰巢父堯時隠人年老以樹為巢而寢其上故人號為巢父堯之讓許由由以告巢父巢父曰汝何不隠汝形藏汝光非吾友也乃撃其膺而下之許由悵然不自得乃遇清冷之水洗其耳拭其目曰響者聞言負吾友遂去終身不相見豈非皆不見堯耶題是朝雨而言此者蓋引下句草堂之興草堂樽酒在幸得過清朝趙云言不必黄綺之入山巢由之深隠草堂幸有樽酒酒可以過此雨朝乃詩人之高興不必泥雨與晴也謝惠連翫月詩悟言不知罷從夕至清朝送韓十四江東省覲趙云此在蜀州作兵戈不見老萊衣見休覓綵衣輕注歎息人間萬事非趙云兵戈字祖出戾太子傳賛列女傳老萊子行年七十著五色采於親側干戈阻隔父母妻子離散故未嘗見之也以此一端言之則萬事皆非有如是也我已無家尋弟妹君今何處訪庭闈趙云韓君東省豈不足喜而公難之則艱亂之故在所疑也束晳補亡詩云眷戀庭闈注言親之所居也黄牛峽静灘聲轉白馬江寒樹影稀江陵縣有白馬洲趙云黄牛峽韓所經之地白馬江蜀州江名今所稱亦然乃韓與公為别之處盛𢎞之荆州記曰宜都西陵峽中有黄牛山江湍迂回塗經信宿猶望見之行者語曰朝發黄牛暮宿黄牛三日三暮黄牛如故此則取其經歴艱苦之處言之公詩凡寄逺及送行或居此念彼必兩句分言地之所在今将經峽而往乃自蜀州為别故有黄牛白馬之句焉舊注引為江陵非是此别還須各努力故鄉猶恐未同一作堪歸趙云此以别而流落為懐矣呉越春秋載越人之歌曰行行各努力古詩逰子悲故鄉今指言長安意者韓亦長安人同歸一作堪歸非蓋同字與各字相應也贈杜二拾遺蜀州刺史高適傳道招提客招提見上登龍門奉先寺注詩書自討論趙云論語世叔討論之佛香時入院杜補遺云維摩經曰如人入薝蔔林唯齅薝蔔不齅餘香若入此室但聞佛功徳之香不樂聞辟支佛功徳香也僧飯屢過門趙云言燒佛香之際杜公時入於院中當僧之齋飯杜公屢過其門此所謂招提客矣聴法還應難支遁與許詢同講維摩經互為設難尋經剰欲飜飜譯也莊子曰飜十二經以趙云舊注所引非是莊子言孔子繙十二經説老子其云繙者委曲敷衍之謂非飜譯之義也十二經解者以為六經六緯非佛十二部經草𤣥今已畢此後更何言揚子雲作太𤣥經解嘲序詩方草𤣥酬高思君相贈高適古寺僧牢落空房客寓居趙云牢落上林賦牢落陸離注猶遼落也故人供禄米禄米俸廪鄰舍與園蔬趙云此實道其事爾故人豈正是高使君邪雙樹容聴法釋書云佛説法於祗園樹下三車肯載書趙云法華經有牛車有鹿車有羊車以比三乗也草𤣥吾豈敢賦或似相如趙云此荅高君來詩之意揚雄傳孝成帝時客有薦雄文似相如者今公詩姑以著書則不敢為賦則能之耳草堂即事趙云孔徳璋北山移文云鍾山之英草堂之靈李善引梁簡文帝草堂傳曰汝南周顒昔經在蜀以蜀草堂寺林壑可懐乃於鍾嶺雷次宗學館立寺因名草堂亦號山茨今公所建茅屋取此草堂兩字名之蓋有所據也荒村建子月獨樹老夫家肅宗上元中大赦去年號止稱元年以十一月為嵗首月以斗所建辰為名故有建子月著趙云此詩正以紀著事始既著朝廷改月號之始又其所居之處止有獨樹豈不可謂之詩史乎周王褒送葬詩平原看獨樹高亭望列村雪裏江船渡風前逕竹斜寒魚依密藻宿鷺起圓沙蜀酒禁愁得無錢何處賒趙云六句皆實道景與事矣圓沙者禽鳥宿於沙上其有隠沙之跡必圓如魚沒痕圓之義無錢字庾信擬連珠曰胷中無學如手中無錢廣州段功曹到得楊五長史書功曹却歸聊寄此詩衛青開幕府見上送高三十五書記注楊僕将樓船漢征南越以楊僕為樓船将軍者趙云上句指言廣州節度使之幕而楊五長史幕中之人也下句指楊長史也以楊僕比之漢節梅花外春城海水邉趙云上句又指言楊也漢遣使者必持節大庾嶺古云多梅花廣州在嶺外故言梅花外下句指言廣州也古樂府云春城起風色廣州東南至海四十里故云海水邉銅梁書逺及珠浦使将旋銅梁玉壘皆成都地名廣州合浦出珠使将旋言段功曹将還廣州也東趙云上句指言楊自廣有書來成都也蜀都賦云於則負銅梁下句指言段功曹之還也珠浦乃合浦今之廉州廣州乃廣南東路廉州乃西路相去之逺楊長史豈在廉州乎故云珠浦使也杜補遺云合浦廉州郡名方輿記曰合浦水去浦八十里有漍洲其地産珠郡國志云合浦海曲出珠號曰珠池嶺表録異云廉州邉海中有島島上有大池謂之珠池毎嵗刺史親監珠户入池採老蚌割取蛛以充貢貧病他鄉老煩君萬里傳趙云公自言也公本家長安而蜀居於蜀則他鄉老矣得廣州張判官叔卿書使還以詩代意鄉闗胡騎逺宇宙蜀城偏蜀城因隨龜行而築故勢斜紆不正趙云鄉闗指言長安也胡騎指言史朝義之兵也言鄉闗以胡騎之阻故去之逺也下句言其寓居於宇宙内在蜀城之偏僻也舊注非是當如陶淵明心逺地自偏耳忽得炎州信廣在南故謂之炎州趙云楚詞云嘉南州之炎徳遥從月峽傳夷陵有明月峽云趙云樂史寰宇記於渝州之巴縣有明月峽以山壁有圓穴如月明之舊注引非是蓋夷陵峽州也地理志無之雲深驃騎幕霍去病為驃騎将軍夜隔孝廉船劉惔為丹陽尹張憑詣惔惔留宿明日乃還船須㬰惔出傳教求張孝廉船召同載之人載云上句言廣南節度使之幕而張判官者幕中之也雲深則自成都望之然矣下句言張判官用張憑比之夜隔則阻隔之隔蓋不見張而空望之之意却寄雙愁眼相思淚㸃懸送段功曹歸廉州趙云此詩當是今嵗建寅月之詩葢其句南海春天外故也南海春天外功曹幾月程峽雲籠樹小湖日落一作蕩船明趙云峽與湖皆歸廣南所歴之地也故言峽雲湖日之景一作蕩船明是蓋妙在蕩字乃日在湖中而倒射船中蕩漾也交趾丹砂重韶州白葛輕白葛葛布葛趙云交州出丹砂稚川求為岣嶁令以丹砂之故也幸君因估客時寄錦官城魏十四侍御就弊廬相别有客騎驄馬江邊問草堂公所築也之趙云桓典為御史京師畏常乗驄馬人為之語曰行行且止避驄馬御史故以言魏侍御也逺尋留藥價惜别到文場趙云上句言逺逺見尋因留買藥之資後漢韓伯休賣藥口無二價摘字用耳下句公自以其居為文場杜預賛云元凱文場稱為武庫入幕旌旗動入王儉幕為蓮花池歸軒錦繡香時應念老疾書跡及滄浪趙云四句魏君必為幕客但不見在何處謝安謂郗超曰卿可謂入幕之賔矣末句則公自以其居為漁父之滄浪也徐九少君見過晩景孤村僻行軍數騎來交新徒有喜禮厚媿無才趙云唐以少尹為行軍長史若有節度使即謂之行軍司馬交新固是實事而新字於交言之則白頭如新也賞静憐雲竹忘歸步月臺趙云此言徐少尹賞翫幽静而又忘歸之實葢公所居有臺焉何當看花蘂欲發照江梅趙云徐君之好尋幽如此何當再來看梅之欲發而其花照江者乎杜公本言照江之梅而後人一例使以到處梅花為江梅余所不省也范二員外邈呉十侍御郁特枉駕闕展待聊寄此作暫往比鄰去比近也空聞二妙歸衛瓘與尚書郎索靖俱善草書時人號為一臺二妙言趙云比鄰字前漢孫實傳祭竈請比鄰二妙以范二呉十耳空聞其歸則序所云是也幽棲誠簡略衰白巳光輝謝靈運詩資此永幽棲范彦龍贈張徐州詩軒蓋照墟落傳瑞生光輝野外貧家逺村中好客稀論文或不媿肯重欵柴扉范彦龍詩有客欵柴扉魏文帝典論有論文篇王十七侍御掄許携酒至草堂奉寄此詩便請邀高三十五使君同到老夫臥穏朝慵起白屋寒多煖始開趙云禮記大夫自稱曰老夫左傳牽率老夫江鸛一作鶴巧當幽徑浴鄰雞還過短墻來趙云一作江鶴非是葢川中則多有鸛爾庾肩吾東曉詩鄰雞聲已傳愁人竟不眠繡衣屢許携家醖皂蓋能忘折野梅趙云上句指言王侍御許携酒也漢侍御有繡衣直指劉惔毎云見何次道飲令人欲傾家釀下句指高使君後漢書二千石皂盖朱兩幡也能忘折野梅此有邀之之意字則陸凱詩云折梅逢驛使寄與隴頭人戲假霜威促山簡須成一醉習池回趙云霜威御史風霜之任也元希聲贈皇甫侍御赴都四言詩肅子風威嚴子霜質也習池所以成山簡之語襄陽記曰峴山南習郁大池依范蠡飬魚法種楸芙蓉菱茨山季倫毎臨此池輒大醉而歸常曰此我高陽池也城中小兒歌之曰山公何所往來至高陽池日夕倒載歸酩酊無所知王竟携酒高亦同過用寒字臥疾荒郊逺通行小逕難故人能領客携酒重相看自愧無鮭菜趙云一作畦菜非是鮭音户皆切晋人以魚為鮭菜也南史庾杲之清貧自業食唯有韮葅㵸韮生韮雜菜任昉戲之曰誰謂庾郎貧食鮭嘗有二十七種謂三種韮空煩卸馬鞍移罇勸山簡頭白恐風寒少年行二首莫笑田家老瓦盆自從盛酒長兒孫趙云楊惲傳田家作苦老瓦盆蓋川人以多年之物曰老東坡云老櫛隨我乆亦倚杜公老瓦盆之例矣揚雄之言鴟夷曰盡日盛酒人復借酤傾銀注瓦趙作玉驚人眼共醉終同臥竹根杜田補遺酒譜云老杜共醉終同臥竹根蓋以竹根為飲器事見江淹集然徧閲江集並無竹根事唯庾信報趙王賜酒詩曰如聞傳上命定是賜中樽野爐然樹葉山杯捧竹根此以竹根為飲器也趙云銀玉皆盛酒之器公詩有云指㸃銀缾索酒甞又云甆罌無謝玉為缸銀玉貴富家之物所以指言少年也舊本作注瓦非特疊字而與銀字豈相類乎此詩乃少年携酒器過田家而田家語少年之所云故言或輕之於銀或注之於玉非不驚人眼也其與田家自瓦盆中喫酒而共於一醉終同卧在竹根之傍耳竹根字古詩云徘徊孤竹根杜田之説以竹根為飲器夫竹根固是酒杯矣酒杯既空豈可謂之臥乎又别是一物與傾銀注玉不相接雖傾銀注瓦亦不接矣右一巢燕養雛渾去盡江花結子已無多趙云此句蓋八月時也黄衫年少來宜數不見堂前東游波言行樂當及時也富趙云黄衫應是唐人貴家之物觀明皇雜録載貴妃姊虢國夫人恩傾一時大治第宅棟宇之盛世無與比其所居本韋嗣立舊宅韋氏諸子亭午方偃息於堂廡間忽見一婦人衣黄披衫降自步輦有侍婢數十笑語自若謂韋氏諸子曰聞此宅欲其價幾何韋氏降階言曰先人舊廬所未忍捨語未畢有工人數百登西廂撤其瓦木以此推之公所謂黄衫其黄披衫乎若今或單或裌葢上之服矣右二野人送朱櫻西蜀櫻桃也自紅野人相贈滿筠籠數回細寫愁仍破萬顆匀圓訝許同趙云且以見櫻桃之爛熟矣憶昨賜霑門下省退朝擎出大明宫金盤玉筯無消息此日甞新任轉蓬唐制賜近臣櫻桃有宴轉蓬自言流落如風之隨風任其轉徙也杜田補遺唐李綽嵗時記云四月一日内園進櫻桃寢廟薦訖頒賜各有差門趙云公嘗為拾遺通籍於朝故霑櫻桃之賜也初在下省有宴故享金盤玉筯之甞矣其餘仍許携去故云擎出也轉蓬則公傷其流落字則曹植雜詩曰轉蓬離本根而袁陽源効古詩乃知古人詩所以悲轉蓬也即事百寳裝腰帶真珠絡臂韝馬后傳蒼頭衣緑韝注韝臂衣也以縛左右手於事便也昭新添東方朔傳董君緑幘傅韝韋注韝形如射韝餘如上所引注笑時花近眼舞罷錦纒頭錦纒頭以賞歌舞者開元時富人王元寳常㑹賔客元寳富於財而無文采親友問曰昨日高㑹有何佳談元寳視屋角良乆曰但費錦纒頭耳趙云此篇贈女人之舞者直道其事耳贈花卿錦城絲管日紛紛半入江風半入雲趙云曹子建四言長袖隨風悲歌入雲此曲秪應天上有人間能得幾迴聞薛云白樂天詩注霓裳曲開元中西涼府節度使楊敬述造又鄭愚津陽門詩注葉法善嘗引上入月宫聞仙樂及歸但記其半遂於笛中寫之㑹楊敬述進婆羅門曲與其聲調相符遂以月中所聞為散序以敬述所進為腔宣室志元宗夢仙子十輩御卿雲而下列於庭各執樂器而奏之其度曲清越殆非人世也及樂闋有一仙子前曰陛下知樂乎此神仙紫雲之曲也趙云此曲祗應天上有亦詩人夸張之語若以薛所引證天上有亦無害於義然四句古歌辭所載林鍾宫水調入破第二云錦庭絲管曉紛紛半入靈山半入雲此曲多應天上去人間那得幾回聞莫能考所以當俟博聞少年行馬上誰家白面郎一作騎馬誰家薄媚郎臨階下馬坐人牀趙云白面郎蓋言其富貴少年者耳李白亦云白玉雖家郎或作薄媚郎非是夫薄媚施之娘可也不通姓字麤豪甚指㸃銀缾索酒甞趙云呉志孫權言甘寜曰此人雖麤豪有不如人意時然其計略大丈夫也索酒字暗用顔延之好騎馬逰里巷據鞍索酒也蕭八明府實處覓桃栽奉乞桃栽一百根春前為送浣花村河陽縣裏雖無數潘岳為河陽令種桃李花人號曰河陽一縣花都趙云河陽蓋以比蕭八所治之縣也非華陽則成矣濯錦江邊未滿園從韋二明府續處覓錦竹華軒藹藹他年到錦竹亭亭出縣高趙云華軒軒檻之軒選云珥筆華軒他年則一二年前也今公所覓非華陽縣廨則成都縣廨題云韋二明府則指言知縣明矣江上舍前無此物幸分蒼翠拂波濤趙云古詩之言竒樹曰此物何足貴但感别經時拂波濤三字恐其為釣絲竹矣憑河十一少府邕覓榿木栽草堂塹西無樹林非子誰復見幽心飽聞榿木三年大與致溪邊十畝隂趙云蜀人以榿為薪則三年可燒憑韋少府班覓松樹子栽落落出羣非櫸栁杜篤首陽山賦長松落落青青不朽豈楊梅莊子云受命於地惟松柏獨正在冬夏青青發杜田補遺本草楊梅味酸乾作屑止吐酒多食令人熱生青熟紅肉在核上無皮殻其樹如荔枝而葉細生江南嶺南四五月熟唐孟詵云楊梅和五藏滌腸胃上林賦楊梅櫻桃羅乎後宫列于北園康趙云兩句皆指言松也世説載殷中軍謂韓太常曰伯少自摽置居然是出羣器左傳云死且不朽櫸栁則蜀中所謂櫸木也公嘗云櫸栁枝枝弱則櫸不若松之落落矣楊梅其載易蛀故不若松之不朽欲存老蓋千年意為覓霜根數寸栽趙云抱朴子有天陵偃葢之松與天齊其乆與地等其長故云老葢千年意又於韋處乞大邑瓷盌大邑燒瓷輕且堅扣如哀玉一作寒錦城傳君家白盌勝霜雪急送茅齋也可憐趙云大邑卭州屬縣出瓷器今猶然也哀玉一作寒玉非詣徐卿覓菓栽草堂少花今欲栽不問緑李與黄梅西京雜記初修上林苑羣臣逺方各獻名果制為美名以標竒麗李十五種内有緑李石筍街中却歸去見本詩注果園坊裏為求來趙云石筍街在今府城之西則往公草堂之路果園坊難考公詩又云卭州崔録事聞在果園坊公自注云坊名在成都贈别何邕生死論交地何由見一人鄭當時傳一死一生乃見交情悲君隨燕雀公孫𢎞傳鴻漸之翼困於燕雀薄宦走風塵陸士龍飄飄冒風塵竇融傳拔起風塵之中綿谷元通漢綿谷縣屬利州通漢水沱江不向春沱江在蜀城北三十里水不入秦趙云此上句説何邕之去必是去利州而邕必是漢上之人也下句公自言其在成都也沱江在蜀城北自是可以向秦不向秦尚留蜀中勢不能去則公有懐故鄉之念矣五陵花滿眼傳語故鄉春趙云惟其有不向秦之感故末句又重言之五陵見上哀王孫注馮少鄰春日詩傳語春光道先歸何處邉贈别鄭錬赴襄陽戎馬交馳際柴門老病身趙云老子戎馬生於郊選云羽檄交馳漢書毎云以老病罷把君詩過日念此别驚神别賦使人意奪神駭心折骨驚地濶峩眉晚天高峴首春趙云上句公自言其在蜀也峩眉山在成都之西南下句言鄭鍊之赴襄陽也峴首山在襄州羊叔子墮淚碑所在也為於耆舊内試覓姓龎人龎徳公隠於鹿門屬襄陽也重贈鄭鍊鄭子将行罷使臣囊無一物獻尊親趙云言罷使臣則鄭君必在幕中而去也其親必在襄陽故稱其貧而無一物以獻也江山路逺羇離日裘馬誰為感激人言雖清潔不為人所知也貧趙云言乗肥衣輕之人有誰感激而憐鄭之也感激見上注九家集注杜詩巻二十二
