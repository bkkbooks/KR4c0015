body:
  text: 九家集注杜詩巻二十八宋郭知達編近體詩陪諸公上白帝城頭宴越公堂之作越公楊素也有堂在城上畫像尚存此堂存古製城上俯江郊落構垂雲雨荒郊蔓草茅趙云雲頺而下而落于空皆有垂之義黄魯直詩云太史鏁忩雲南垂葢出於此柱穿蜂溜蜜棧缺燕添巢趙云柱穿字宋劉秀之傳丹陽聼事上柱有一穿坐接春盃氣心傷艶蘂梢英靈如過隙宴術願投膠古詩以膠投漆中孫趙云英靈指言公述楊素如過隙則歎其已逝莊子云人生如白駒之過隙言一時英靈如過隙之駒而逝亡則今日宴衎當願如投膠于漆結綢繆之好也莫問東流水生涯未即抛趙云言不湏問東流水而使欲順流南下我此地生涯亦未即抛棄而去也傷春五首時避冦在蜀作天下兵雖滿春光一作青春日自濃趙云上句謂廣徳元年吐蕃䧟京師車駕幸陜西京疲百戰北闕任羣凶趙云吐蕃留京師聞郭子儀軍至驚潰子儀遂復長安下句謂程元振魚朝恩之徒按史載桞伉疏吐蕃犯順罪由元振請斬之以謝天下以元振等弄權故呼為羣凶闗塞三千里煙花一萬重趙云公在蜀望乗輿所在隔三千里関塞之逺以春時故言煙花萬重也䝉塵清路急左傳䝉塵于外御宿且一作有誰供趙云御宿乃帝御所宿也漠以為地名見揚雄校獵賦殷復前王道商之中宗髙宗能恢復前王之道周遷舊國容趙云成王營洛平王東遷此所以為周遷舊國容也蓬萊足雲氣應合總從龍易雲從龍雲以比羣臣龍以比天子言羣臣合從駕出幸也趙云蓬萊殿也公正憂羣臣有徇身而辭亂者故言合從龍也右一鸎入新年語花開滿故枝天清一作青風巻幔草碧水通池牢落官軍速蕭條萬事危言國家遭難事勢蕭條危殆故公毎憂之鬢毛元自白涙㸃向來垂元字與向來皆言前時搃如此非止令日也不是無兄弟其如有别離言雖有兄弟而為䘮亂阻隔不得相保耳詩雖有兄弟語君子何患乎無兄弟也巴山春色静北望轉逶迤巴山言蜀之山長安在蜀之北故北望逶迤也右二日月還相鬪星辰屢合一云亦屡圍韋昭曰星相撃為闘趙云晋天文志云元帝太興四年二月癸亥日鬬漢髙祖七年月暈圍參畢七重此則日月星辰有争鬬凌犯之義也如此皆主兵革不成誅執法焉得變危機趙云執法雖出於晋天文志南宫南四星名執法應在下如御史之官而非今句之謂李善於辨命論宋公一言法星三徙之下注引廣雅曰熒惑謂之罰星或謂之執法今此指熒惑而言也葢公之意以􅏺程元振之徒熒惑人主時桞疏上書吐蕃犯順罪由程元振用事請斬之以謝天下庾信賦頻來險轍亟極危机大角纒兵氣鉤陳出帝畿天文志大角者天上之帝座庭其両旁曰攝提葢京師兵又滿故曰纒兵氣魏都賦云兵纒紫㣲趙云鉤陳亦星名西都賦云周以鉤陳之位衛以嚴更之署注鉤陳王者法之主行宫也今随車駕出狩故曰出帝畿煙塵昏御道黄道也耆舊把天衣一本作固無牵白馬幾至著青衣趙云天子從御道經行而出為煙塵所昏下句言父老不欲車駕之出皆牽挽帝衣也煙塵字孫子荆書煙塵俱起震天駭地三國志注多引襄陽耆舊傳天衣字借小説郭翰傳云天衣本非針線為耳行在諸軍闕言軍士稀少來朝大將稀言藩鎮不朝吐蕃䧟京師天子幸陜諸鎮畏程元振魚朝㤙讒構莫肯奔命朝廷所恃者郭子儀一人而已賢多隐屠釣王載同歸言賢避地地隐於屠釣王能為文王載吕望事乎任彦升為蕭揚州薦士表隐鱗卜祝藏器屠保趙云公亦㣲自見意矣吕望釣于渭川文王載之以歸而舉伐紂之兵若屠事則如朱亥殺晋鄙而奪兵符者大意言屠釣中有人亦不必泥事實也右三再有朝廷亂難知消息真近聞一作傳王在洛復道使歸一作通秦謂傳者不一也趙云詳此篇尤見車駕出幸東都傳之未審也奪馬悲公主登車泣貴嬪蕭関迷北上漢武北北出蕭關滄海欲東巡秦始皇帝東廵海上銘石勒功敢料安危體猶多老大臣趙云上兩句亦所傳臣以為車駕或議北上蕭闕或欲東巡滄海兩皆迷惑而不定也如此則敢料安危體乎朝廷尚有老臣可與議也豈一作得無嵇紹血霑洒属車塵晉書忠義傳嵇紹以天子䝉塵承詔詣行在所值王師敗績于蕩隂百官及侍衛莫不㪚潰唯紹儼然端冕以身捍衛兵交御輦飛箭雨集紹遂被害於帝側血洒御服天子深哀歎之及事定左右欲浣衣帝曰此嵇侍中血不可去也司馬相如諫獵書犯属車之清塵右四聞説初東幸孤兒却走多宣帝紀注取從軍死事者之子養羽林宫教以五兵號曰羽林孤兒少壯者令從軍退趙云此篇聞官軍逃亡之詩却走則却而走也難分太倉粟漢太倉之粟紅腐而不可食競棄魯陽戈魯陽公與韓戰酣日暮援戈麾之日為之反三舍趙云言其既走則雖有太倉之粟難與之也戈以麾戰而反棄之為可痛矣胡虜登前殿吐蕃䧟京師也王公出御河出奔也得無一作忍為中夜舞宜憶大風歌趙云晉祖逖與司空劉琨雄豪著名同辟司州主簿情好綢繆共被而寝中夜聞雞起舞曰此非惡聲毎語世事或中宵起坐相謂曰若四海鼎沸豪傑並起吾與足下相避中原爾漢髙祖大風歌曰大風起兮雲飛揚安得猛士兮守四方言誰復憶省大風歌中有思猛士之語乎春色生烽燧見悲青坂詩注幽人泣薜蘿言賢者泣于草野爾此趙云幽人公自謂也方春之時而唯有烽燧薛蘿之中幽人無如之何所以但泣而已君臣重修徳猶足見時和巴閬僻逺傷春罷始知春前已收宫闕公趙云末句尤見之經濟矣右五暮春題瀼西新賃草屋五首乆嗟三峽客再與暮春期趙云樂史寰宇記渝州有三峽之名曰西峽巴峽巫峽明月峽在䕫州之西即西峽矣公客于䕫故云百舌欲無語繁花能幾時趙云反舌無聲在茫種後十日今謂之欲無語則暮春之時也谷虗雲氣薄波亂日華遲戰伐何由定哀傷不在兹趙云戰伐未定乃公之深所哀傷者其為時當暮春而在僻遠之草屋乎兹者指言草屋語文不在兹乎右一此邦千樹橘不見比封君趙云千株之橘不見從來道可以比封君乎前漢食貨志云蜀漢江凌千樹橘其人皆與千户封等言䕫之多橘也李衡種甘橘千樹號千頭木奴養拙干戈際全生麋鹿羣畏人江北草旅食瀼西雲言其客路萍跡無定計也於趙云古詩常畏人魏文帝云旅食南館南館畏人在江北之草間旅食在於瀼西之雲𠂻此公之自歎也萬里巴渝曲三年實飽聞前漢禮樂志巴渝鼓貟三千六人注云巴渝之樂因此始也之趙云巴即今之巴州渝即今之恭州漢髙祖得巴渝人與之定三秦其後有巴渝之樂公自永㤗元年八月至雲安縣今大厯二年為三年也右二綵雲隂復白錦樹曉來青趙云錦樹曉來青言前日因花發如錦今此春暮宻葉已穠故青也身世雙蓬鬢乾坤一草亭趙云上句言身已老雙鬢如蓬矣下句言天地之間有此瀼西一草亭也非以為喻哀歌時自短醉舞為誰醒趙云言歌不終其曼聲而忽然短住縁古詩有長歌行短歌行故也細雨荷鋤立陶潜詩曰晨興理荒穢帯月荷鋤歸江猿吟翠屏天台山賦横壁立之翠屏長門賦𤣥猿嘯而長吟右三壯年學書劒項籍少時學書不成去學劒他日委泥沙公自嘆其流落言不用于時爾事主非無禄浮生即有涯荘子吾生也有涯髙齋依藥餌絶域改春華謝𤣥暉有髙齋詩李陵奉使絶域春華春之光華也喪亂丹心破丹心赤心也王臣未一家詩率土之濵莫非王臣未一家言未混一也禮記聖人以天下為一家也右四欲陳濟世䇿已老尚書郎趙云晋石苞傳宣帝曰頁簾之士未必能經濟世務公官是尚書工部員外郎故云已老尚書郎木蘭歌云木蘭不用尚書郎不息豺虎鬬空慚鴛鷺行趙云豺虎以言盗賊王粲詩云盗賊如豺虎公曽任左拾遺籍占朝列故云鴛鷺行古詩云厠迹鴛鷺行時危人事急風逆羽毛傷趙云時危人事急又暗結不息豺虎鬪之句風逆羽毛傷又暗結鴛鷺行之句上句言理下句比興也落日悲江漢中宵淚滿牀趙云或曰禹首荆及衡陽為荆州江漢朝宗扵海孔氏云二水經此州而入海公詩扵䕫州毎言江漢則亦以其切近荆楚矣右五承聞河北諸道節度入朝歡喜口號絶句十二首趙云自程元振用事來瑱李懐讓以上將誅斤裴冕李光弼以元勲被譛方帥由是㩗解吐蕃入冦詔集天下兵無一士奔命者今聞諸道節度入朝歡喜可知也禄山作逆降天誅更有思明亦已無洶洶人寰猶不定時時戰鬬欲何湏趙云禄山思明葢追言之也安禄山父子僣位凡三年而滅在乾元二年也史思明父子僣位四年而滅在廣徳元年也是嵗七月吐蕃入冦故有下句右一社稷蒼生計必安蠻夷雜種錯相干漢書羗胡雜種種類不一也周宣漢武今王是言除去暴亂如孝武恢復帝業如周宣也孝子忠臣後代看趙云此篇望諸節度之忠孝也錯相干字衛玠云非意相干可以理遣右二喧喧道路多謌一作好童謡河北將軍盡入朝始是乾坤王室正却交江漢客魂銷趙云公因喜諸節度入朝而傷其流落未有還闕朝王之期魂銷則所以重歎也舊注云望朝廷㣲用豈公本意哉右三不一作北道諸公無表來茫然庻事遣人猜擁兵相學干戈鋭使者徒勞百萬迴吐蕃之亂諸道節度無一救援者朝廷遣使敦諭竟不至趙云諸節度雖亦通表于朝然不肯入覲此為可猜也公為詩探其心意且為寛法以待之春秋之義也右四鳴玉鏘金盡正臣西征賦飛翠緌拖鳴玉以出入禁門者衆矣修文偃武不無人書乃偃武修文興王㑹静妖氛氣聖夀宜過一萬春趙云鳴玉銷金言諸節度使貴稱為正臣則公待之以忠義喜其入朝也劉向云正臣進者治之表國語與王賞諌臣陳徐陵移齊文有剪妖氛空巢穴之語右五英雄見事若通神聖哲為心小一身言不役天下以奉一人也燕趙休矜出佳麗古詩燕趙多佳人美者顔如玉宫闈不擬選才人趙云喜河北諸節度入朝却防其媚悦而獻其佳故預為才人宫中之爵號唐制才人正二右六抱病江天白首郎馮唐白首尚為郎謂趙云公晚年為尚書員外郎所白首郎也空山樓閣暮春光趙云空山樓閣指白帝城城上有白帝楼也衣冠是日朝天子草奏何人入帝鄉趙云草奏之語公有所激爾右七澶漫山東一百州趙云山東今日之河北也唐謂之山東古云山東出相山西出将則以太行山為言耳削成如按抱青丘削平也顔延年充使詩入河起陽峽踐華因削成又西山經曰太華之山削成而四方相如子虗賦秋田乎青丘苞茅重入歸闗内王祭還供盡海頭趙云左傳齊威公問罪楚國曰汝貢苞茅不入王祭不供無以縮酒言諸道皆入貢也右八東逾遼水北滹沱趙云遼水在今平平長城之外在漢曰𤣥莵郡按後漢郡國志𤣥莵郡高句驪遼山遼水所出注外山海經曰遼水出白平山以地圖觀之是為中國之極東逾遼水則又自營平而徃矣後漢光武紀至滹沱河無船遇氷合得過注山海經云大戲之山滹沱之水出焉今在代州繁畤縣是為河北之北今云北滹沱則極燕趙之地廣而言之也舊本作呼沱師民瞻本作滹沱是星象風雨喜共和紫氣闗臨天地濶趙云指言函谷関也周時尹喜為関吏望其上有紫氣云當有聖人入随而老子來今公借言紫氣臨関而天地濶逺以見天地混一也黄金臺貯俊賢多燕昭王置千金於臺上以延天下之士故稱為黄金臺趙云臺在燕地昭王所築以禮郭隗而繼得樂毅也幽燕既平盡属王化其黄金臺上賢俊復集也右九漁陽突騎邯鄲兒見十一巻漁陽詩注漁陽突騎邯鄲遊俠其豪俊勇决古有名稱趙云漁陽燕州也漁陽突騎回字則漢光武克邯鄲置酒髙㑹從容謂馬武曰吾得漁陽上谷突騎欲令将軍将之蔡邕曰兾州强弩幽州突騎天下之精也邯鄲趙州也邯鄲兒見如幽並兒之類爾酒酣並轡金鞭垂髙祖過沛留置酒酒酣意氣即歸雙闕舞雙闕即帝闕也雄豪復遣五陵知五陵漢之五陵亦豪俠所聚之地之趙云西都賦南望杜覇北眺五陵注漢所𦵏七陵據賦分作兩句言陵之在北者曰五陵謂燕趙雄豪所以歸向帝闕之意皆為王臣也右十李相将軍擁薊門趙云李相則節度使之稱相公者将軍則節度使之稱将軍者擁薊門乃河北諸道節度矣白頭惟有赤心存舊本作白頭雖老赤心在師民瞻本作白頭惟有赤心存公自謂也竟能盡説諸侯入知有從來天子尊趙云畢竟能盡喜悦諸侯之入朝者葢天子從來有至尊之勢也右十一十二年來多戰塲趙云天寳十四載安禄山反接之以史思明又接之以吐蕃至今嵗大厯二年春凡十二年矣至今春兵息天威已息陣堂堂左傳天威不達顔咫尺孫子云堂堂之陣神靈漢代中興主功業汾陽異姓王右十二得舍弟觀書自中都已逹江陵今兹暮春月末行李合到䕫州悲喜相兼圍圓可待賦詩即事情見乎辭爾到江陵府何時到峽州亂離生有别聚集病應瘳趙云生有别則楚辭云悲莫悲于生别離書若藥不瞑眩厥疾弗瘳颯颯開帝眼朝朝上水樓老身雖付託白骨更何憂喜觀即到復題短篇二首巫峽千山暗終南萬里春終南山名在長安言去家萬里也病中吾見弟書到汝為人始為亂離所隔莫知其生死及書方方知弟生存也意答兒童問來經戰伐新或云戰伐塵謂其自戰伐風塵中來兒童之必喜而勞問也泊船悲喜後欵欵話一作議歸秦右一待爾嗔烏鵲抛書示鶺鴒趙云西京雜記曰乾鵲噪而行人至言待其弟來怒烏鵲之不實也詩云鶺令在原兄弟急難枝間喜不去原上急曽經趙云上句以成嗔烏鵲之句嗔之者何以其喜不去恐徒成妄也下句以成抛書示弟之句示之者何以其急難之曽經也江閣嫌津栁嫌其隔望眼也風帆數驛亭數其期程也應論十年事撚絶始星星趙云舊本然絶一作撚絶當以撚絶為正星星言鬚之白南史韻語詩鈆膏染鬚鬢欲以媚側室青青不改乆星星行復出右二喜聞賊盗蕃冦總退口號五首蕭闗隴水入官軍趙云蕭闗在靈州之傍隴水則隴州之水入官軍則吐蕃退而官軍盡入其居矣青海黄河巻塞雲青海在西吐噃之地黄河則自積石而徃巻塞雲則無復戰陣而邉塞之雲巻㪚矣餘見君不見青海頭注北極轉愁龍虎氣西戎休縱犬羊羣上句漢髙祖紀范増説項羽曰吾使人望漢王氣其上皆為龍虎五色趙云北極者指帝座而言也右一賛普多教使入秦賛普吐蕃主師數通合好止煙塵按新史傳至徳三載吐蕃使使來請討賊且修好肅宗遣使報䀻朝廷忽用哥舒将殺伐虗悲公主親趙云此篇四句通一叚事開元二十八年吐蕃金城公主薨遣使來告因請和而明皇不許後二年帝以哥舒翰節度隴右翰政㧞石堡吏號神武軍又擒其相又破洪濟翰雖有功而結吐蕃之怨深矣其後禄山之亂邉侯空虗故吐蕃得乗隙暴掠則公之意不美朝廷之用翰以招殺伐矣是則國家虗悲公主之死而已右二崆峒西極過崐崘趙云崆峒在西郡之西而崑崙又在崆峒西極之西今公此句詩人廣大其言謂其從化之地逺也駝馬由來擁國門逆氣數年吹路㫁蕃人聞道漸星奔趙云劉越石荅盧諶四言詩云表粮㩗弱匍匐星奔又劉孝標廣絶交論云靡不望影奔右三勃律天西采玉河堅昆碧盌最來多趙云勃律堅昆皆西羌國名勃律天之西乃采玉河所在應是于闐國也碧盌出堅昆國云杜補遺云晉平居誨為張鄴使于闐國官作行程記玉河在于闐城其源出崑山西流千餘里主于闐界乃流為三河白玉河緑玉河烏玉河五六月大水暴漲則玉随流而至秋水退乃可采薛夢符引唐書于闐國距京師九千七百里有玉河國人夜視月光盛處必得美玉堅昆國在唐為㸃戞斯匈奴西鄙也地當伊吾之西馬耆北山之旁舊隨漢使千堆寶少荅胡王萬匹羅趙云舊日以千堆寶随漢使入貢而中國所荅者持萬匹羅爾夫以蠻夷入貢之多而中國賜遺之不費自非服化從義而然乎右四今春喜氣滿乾坤南北東西拱至尊太厯二年調玉燭𤣥元皇帝聖雲孫爾雅四氣和謂之玉燭疏云四時和氣温潤明照故曰玉燭李廵云人君徳美如玉而明若燭是知人君徳輝動于内和氣應于外統而言之謂之玉燭爾雅親孫之子為曽孫曽孫之子為𤣥孫𤣥孫之子為來孫來孫之子為晜孫晜孫之子為仍孫仍孫之子為雲孫注言輕逺如浮雲七世孫也唐以老子為聖祖封𤣥元皇帝故曰聖雲孫右五即事暮春三月巫峽長語云暮春者春服既成盛𢎞之荆州古歌云巴東三峽巫峽長猨鳴三聲淚沾裳皛皛行雲浮一作無日光陶淵明詩皛皛川上平雷聲忽送千峰雨花氣渾如百和香趙云莊子淵嘿而雷聲梁孝元帝經巴陵詩栁條常拂岸花氣薫舟神仙傳曰淮南王為八公張錦繡之帳燔百和之香又古詩博山爐中百和香鬱金蘇合與都梁黄鶯過水翻廻去燕子銜泥濕不妨飛閣巻簾圖畫裏虗無只少對瀟湘趙云雖眼前之山水如畫圖而虗無空濶只欠瀟湘相對也上林賦乗虗無與神俱見螢火巫山秋夜螢火飛簾疎巧入坐人衣趙云簾之疎濶螢火入于坐客之衣也公詩又有時能㸃客衣之句忽驚屋裏琴書冷復亂簷邉星宿稀却繞井欄添箇箇偶經花蘂弄輝輝滄江白髮愁㸔汝來嵗如今歸未歸送十五弟侍御使蜀喜弟文章進添余别興牽趙云南史丘靈鞠在沈深坐見王儉詩深曰王令文章大進曰何如我未進時數盃巫峽酒百丈内江船水自渝上合者謂之内江自渝由戎瀘上蜀者謂之外江豈趙云上水乃使百丈然今云内江船非使東蜀乎未息豺狼鬭言戰争也空催犬馬年以自稱其年故從卑賤晉陶侃臨終上表曰臣猶謂犬馬之齒尚可少延歸朝多便道摶撃望秋天便道間道也前漢趙充國傳曰将軍引兵便道西並進使虜聞東北方兵並進杜田云舊唐史桓彦範為中亟舉楊嶠為御史嶠不樂摶撃之任彦範曰為官擇人豈待情願遂引為右臺御史是詩送待御弟使蜀故云暮春卧病擁塞在峽中瀟湘洞虗映空趙云言瀟湘洞庭之景虗映空而我病卧峽中不得徃觀也梁簡文詩春色映空來楚天不㫁四時雨古詩地近漏天經細雨巫峽長吹千里風巫峽多風一趙云陳隂鑑晚泊五洲詩遥然柱觀欲輕千里風沙上草閣桞新闇城邉野池蓮欲紅暮春鴛鷺立洲渚挾子飜飛還一叢趙云韻書曰叢聚也一叢則鴛鷺與子為一􅀢爾晴二首乆雨巫山暗新晴錦繡紋江山晴明風物鮮麗若錦繡也碧知湖外草趙云洞湖之外遂連青草湖也選云春草碧色春水緑波紅見海東雲趙云言自出之處紅雲也兩句以言峽中之晴不亦開廣乎竟日鶯相和摩霄鶴数羣淮南子曰鳴鵠背負蒼天膺摩赤霄此摘用之也野花乾更落風處急紛紛右一啼烏争引子鳴鶴不歸林趙云有烏夜啼曲易曰鳴鶴在隂下食遭泥去髙飛恨乆隂趙云上句言烏下句言鶴漢髙祖紀鴻鵠髙飛一舉千里雨聲衝塞盡日氣射紅深回首周南客馳驅魏闕心趙云太史公曰余留滯周南不得從郊祀之事公自言留滯于太史公之在周南也荘子身在江湖之上心馳魏闕之下盖天子之門而闕謂之象魏齊薛云文選謝靈運詩仲連輕組子牟脊魏闕右二雨始賀天休雨還嗟地出雷易曰雷出地奮豫驟看浮一作巫峽過宻作渡江來趙云浮峽對渡江作巫峽字非牛馬行無色蛟龍鬭不開莊子秋水時至不辨牛馬干戈盛隂氣未必自陽臺月令隂氣太盛戎兵乃來葢言因隂氣盛而多雨非自陽臺而來也之趙云惟是峽中詩用陽臺為當體神女曰妾在巫山陽髙丘之阻旦為行雲暮為行雨朝朝暮暮陽臺之下又稽神異苑載述征記曰蕭搃遇洛神女後逢雨認得香氣曰此雲雨從巫山來月三首㫁續巫山雨天河此夜新天河銀漢也廣雅云天河謂之天漢若無青嶂月愁殺白頭人趙云古樂府有愁殺人之句魍魉移深樹月明則魍魉遁逃也左傳入山不逢不若魉魅魍魉蝦䗫動半輪趙云蝦䗫白兎皆月中之物故園當圮斗直指照西秦北斗辰極也一趙云一説長安城有南斗北斗之像云長安上直北斗廣雅云北斗樞為雍州故公又有詩曰北斗故臨秦右一併照巫山出新窺楚水清趙云併照字當作併㸃舊本照字淺近著一㸃字可謂新竒也羇栖愁裏見二十四迴明趙云此又公不拘数對数之格羇栖之愁對二十有四其勢暗敵指見在䕫厯望夜凡二十四迴也必騐升沉體如知進退情謂不逺弦望也趙云月初出曰升既落曰曰沉升則進之道沉則退之理也不違銀漢落亦伴玉䋲横鮑明逺夜移衡漢落謝靈運玉䋲低連章玉趙云河漢落則月将落矣玉䋲星名凡夜深則䋲低也月月随銀漢而落伴玉䋲而低乃望夜之月也河杜補遺云河圖括地象曰河精上為天漢抱朴子曰漢者天之水也随天而轉入地下過故公言落右二萬里瞿唐峽一作月州趙云指言䕫也春來六上弦時時開暗室君子不欺暗室故故滿青天若披雲霧而覩青天爽合風襟静髙當涙臉懸趙云公以羈旅在外傷時感舊也宋玉風賦披襟當之南飛有烏鵲曹孟徳詩月明星稀烏鵲南飛遶樹三匝何枝可依夜乆落江邉右三園仲夏流多水清晨向小園碧溪揺艇濶朱果爛枝繁趙云碧溪揺艇濶以成仲夏流多水之句朱果爛枝蘩以成清晨向小園之句始為江山静終防市井喧畦蔬繞茅屋自足媚盤飱趙云媚者宜也詩媚于天子又梁沈約悲哉行曰旅逰媚年春年春媚遊人左傳盤飡寘璧歸束帯還騎馬東西却渡船林中才有地峽外絶無天䕫州居山水間在峽中故號為稍平然狹隘多石盧仝詩低頭雖有地仰靣輒無天虗白髙人静喧卑俗累牽荘子云虗室生白注人人能虗心遊世則純白備于内鮑明逺舞鶴賦歸人寰之喧卑他鄉悦遲暮不敢廢詩篇諸葛廟乆遊巴子國今䕫州古巴子國屢入武侯祠竹日斜虗寢溪風滿薄帷阮嗣宗詠懐云薄帷鑒明月君臣當共濟賢聖亦同時翊戴歸先主并吞更出師亮出師表云有并吞中國之志蟲蛇穿畫壁巫覡醉蛛絲薛云國語楚觀射父曰民之精爽不貳齊肅𠂻正則神或降之在男曰覡在女曰巫比言廟弊醉于蛛絲中也趙云合用巫覡字則張衡東京賦云巫覡操茢也欵一作欻憶吟梁父躬耕也未遲亮耕南陽作梁父吟也未遲一作起未遲耕趙云末句公感孔明梁父吟事方切思歸而起耳舊本作也未遲非葢却成方欲躬耕也豎子至樝梨纔一作且綴碧梅杏半傳黄趙云言幽園之果一則纔綴碧一則半傳黄未可摘也小子幽園至輕籠熟㮈香山風猶滿把野露及新嘗記天子嘗新欲寄江湖客提㩗日月長趙云言豎子所摘來之熟㮈正欲寄逺而恨道路之長費時日也古詩云渉江采芙蓉蘭澤多芳草采之欲遺誰所思在逺道公葢取其此意也舍弟觀歸藍田迎新婦示兩篇汝去迎妻子髙秋念却迴即今螢已亂好與鴈同來趙云螢已亂當是三四月聞鴈同來所以結髙秋念却回之語東望西江永舊本作西江水師本作西江永葢永字方與下句開字相對西江者楚人指蜀江之名荘子激西江之水疏云蜀江從西來故謂之西江公欲泛舟南下今在䕫為楚之上游則西江之盡處在其東故東望其永詩云江之永矣不可方思南遊北户開趙云既成南遊則北户之開矣呉都賦云開北户以向日卜居期静處㑹有故人杯趙云既至彼則卜居必期幽静之處當有故人相訪共飲也屈原有卜居篇南史有云性好静處謝眺離夜詩山川不可夢况乃故人杯右一楚塞難為别一作路藍田莫滯留趙云客寓楚塞塞兄弟之情難乎其為别也舊本作難為路無意義既知離别之難故祝以無留滯而即廻耳衣裳判協平聲白露鞍馬信清秋趙云白露降則秋時矣滿峽重江水開帆八月舟此時同一醉應在仲宣樓趙云王粲字重宣劉表時在荆州因登楼而作賦其後因指荆州樓為仲宣樓則梁元帝詩夕返仲宣樓葢約其弟迴時相㑹荆州也右二季夏送鄉弟韶陪黄門從叔朝謁令弟尚為蒼水使名家莫出杜陵人杜陵有南北杜最為名家趙云呉越春秋禹登衡岳血白馬以祭夢見赤繡衣男子稱𤣥夷蒼水使者曰聞帝使文命于斯故來侯之一本自注云韶比兼開江使通成都外江水峽舟檝比來相國兼安蜀歸赴朝廷已入秦杜鴻漸以相國入蜀平崔旴之亂尋表旴為節度使還朝捨舟䇿馬論兵地拖玉腰金報主身潘安仁西征賦拖鳴玉以出入禁門者衆矣腰金横金帯趙云上句言二人同行可以論兵矣下句專言叔父黄門也莫度清秋吟蟋蟀早聞黄閣一作閣畫麒麟潘安仁為黄門作秋興賦云蟋蟀鳴乎軒屏下句見扈聖登黄閣又見今代麒麟閤注趙云蟋蟀字見毛詩而阮籍詠懐詩云開秋兆凉氣蟋蟀鳴牀帷感物懐殷憂悄悄令心悲此為吟蟋蟀也按鄭𤣥注禮記三公之與天子禮秩相亞故黄其閣以示謙不敢斥天子宜是漢舊制也漢武帝畫功臣於麒麟閣上熱三首雷霆空霹靂雲雨竟虗無趙云雷霆霹靂字如榖梁傳云隂陽相薄感而為雷激而為霆又何休公羊注云雷疾甚為震而五經通義云震與霆皆霹靂也虗無字上林賦乗虗無與神俱其後文賦云課虗無以責有也炎赫衣流汗低垂氣不蘇乞為寒水玉願作冷秋菰趙云寒水玉冷秋菰非有定名也葢言寒水中之玉冷秋時之菰耳句法葢庾信和樂儀同苦熱云思為鸞翼扇願借明光宫也何似兒童嵗風涼出舞雩趙云魏志賈逵自為兒童戲弄常設部伍舞雩事則論語云冠者五六人童子六七人浴乎沂風乎舞雩詠而歸右一瘴雲終不滅瀘水復西來瀘水在䕫之上流諸葛亮云五月渡瀘葢大渡河水從南荒炎瘴中流出故也閉户人髙卧孫敬閉門讀書諸葛亮髙卧南陽歸林鳥却迴趙云人閉户而髙卧鳥不安而又飛其熱又甚矣峽中都似火江上只空雷想見隂宫雪風門颯踏開孟子齊宣王見孟子于雪宫故使隂宫雪也右二朱李沈不冷雕胡炊屢新魏文帝書浮甘𤓰于清泉浸來李于寒水沈休文長袂屢以拂彫胡方自炊将衰骨盡痛被暍一作褐味空頻趙云暍音於歇切傷暑也故禹扇暍武王亦扇暍今方被暍而有泥水之朱李新炊之彫胡其味空頻不能食也舊本作被褐無義欻許律切翕炎蒸景飄颻征戍人趙云欻翕義即欻吸也字則江文通擬王維詩云欻吸鵾鷄悲又謝朓髙松賦云巻風飈之欻吸十年可觧甲為爾一霑巾右三返照楚王宫北正黄昏白帝城西過雨痕返照入江飜石壁歸雲擁樹失山村趙云返照字梁元帝繤要云光返照于東謂之返景公詩又曰孤城返照紅将歛歸雲字則如陸士衡歸雲難寄音失字鮑照詩霧失交河城也衰年肺病唯髙枕絶塞愁時早閉門不可乆留豺虎亂南方實有未招魂宋玉作招魂篇云魂兮歸來南方不可以上些趙云公自言也客于南楚魂魄飛越實為未招也示獠奴阿叚山木蒼蒼落日曛竹竿裊裊細泉分以竹引裊也郡人入夜争餘瀝豎子尋源獨不聞趙云詳味此詩意水源在逺以筒引水而使郡人分取之其水咽塞或渗漏而不通快故郡人止争餘瀝耳惟阿叚者獨能尋源修筒水而至焉病渴三更迴白首趙云公病渴頼此水為多也傳聲一注濕青雲趙云修筒之後水來之聲自傳聞矣濕青雲言水筒之源流髙逺也曽驚陶侃胡奴異怪爾常穿虎豹羣此詩全篇皆引泉事薛夢符云晉書陶侃傳媵妾數十家僮千餘世説王修齡曰修齡若飢自當問謝仁祖索食不湏陶胡奴米船注胡奴陶範小字侃别傳曰範侃第十子也師云陶侃有十七子見本傳書止九人唯袁宏傳載胡奴於宻室抽刀逼宏以宏作東征賦皆載過江諸公名徳而不及侃宏窘急遂口占六句答之胡奴乃止亦不見穿虎豹羣事胡奴名惟見于此趙云薛夢符既引胡奴陶範小字可以見胡奴乃侃之子也而于阿叚似無相干余逆其意陶侃奴僕之多其子胡奴必有所稱異之者如今日阿叚能穿虎豹羣以尋水源其在陶侃家僮之中亦必有可異者矣意似如此而事未顯見以俟傳聞簡呉郎司法有客乗船自忠州遣騎安置瀼西頭前詩注所謂瀼東瀼西者古堂本買藉疎豁借汝遷居停宴遊趙云借吴司法自舟中遷來以居而我甘心停止宴遊也雲石熒熒髙葉曙風江颯颯亂帆秋趙云腹聨兩句以言瀼西古堂所見之景物也却為姻婭過逄地詩𤨏𤨏姻婭按爾雅婦之父母婿之父母相為姻婭許坐曽軒數㪚愁趙云呉郎與公為姻婭之家既借古堂與之居乃為我相過從之北耳應仍許我坐于層軒數數㪚其愁也又呈呉郎堂前撲棗任西鄰無食無兒一婦人前漢王吉傳東家枣樹垂吉庭中其妻取枣啖吉吉如之乃去婦東家欲伐樹言乃還婦里語曰東家枣完夫婦復還趙云公之樂易則告呉郎以一任西家之婦取枣也不為困窮寧有此祇縁恐懼轉湏親趙云言探斯婦之情葢困窮所致又告吳郎當念其恐惧宜更親之此两句其上句有遺東滯穗資寡婦之利之意下句則有見竊荀而又擲與之同科可見公之用心使其在廟堂澤及天下可知矣即防一作知逺客雖多事使一作便挿疏籬却甚真趙云言雖任鄰婦取枣然呉郎以逺方而來謂多事之不可測亦湏謹藩籬以防冦盗不害為真爾已訢徴求貧到骨正思戎馬涙盈巾趙云末句言取枣之鄰婦已告訢為徴求所困而貧到骨下句乃公聞其徴求之語正思因戎馬所致而涙霑巾也九家集注杜詩巻二十八
