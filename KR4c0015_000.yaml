body:
  text: 御製題郭知達集九家注杜詩平生結習最於詩老杜真堪作我師書出曽鋟實郭集本仍寶慶及淳熙九家正注宜存耳是編為宋郭知達集九家注乃王文公宋景文豫章先生王源叔薛夢符杜時可鮑文虎師民瞻趙彥材見於知達序其言王文公即王安石宋景文即宋祁王源叔名洙杜時可名田師民瞻名尹趙彥材名次公薛夢符鮑文虎即其名豫章先生蓋黃庭堅也版刻於廣東詳見曽噩序卷後署云寶慶乙酉廣東漕司鋟版馬端臨文獻通考載此版亦稱為善本餘氏支辭概去之適以遺編搜四庫乃斯古刻見漕司此書舊藏武英殿僅為庫貯陳編無有知其為宋槧者兹以校勘四庫全書向武英殿移取書籍始鑒及之而前此竟未列入天祿琳琅豈書策之遇合遲早亦有數耶希珍際遇殊驚晚尤物暗章固有時重以琳琅續天祿天祿琳琅惜早已成書此本當為續入上等幾閒萬遍讀何辭再題宋版九家注杜詩兌氏之戈和氏弓續增天祿吉光中浣花眉列新全帙金粟身存舊卷筒世以藏經紙之未作經冊者為卷筒紙最為難得此書面頁用之尤物寧論顯與晦逢時亦有塞兮通武英棄置今方出是書􅍥塵武英殿庫架不知幾許年兹以校勘四庫全書始物色及之且辨其為宋槧善本即此不可以悟人材之或有沈淪耶潔矩人材默惕衷欽定四庫全書集部二九家集注杜詩别集類一唐提要臣等謹案九家集注杜詩三十六卷宋郭知達編知達蜀人前有自序作於淳熙八年又有曾噩重刻序作於寶慶元年噩據書録解題作字子肅閩清人凌知迪萬姓統譜則作字噩甫閩縣人慶元中尉上髙復遷廣東漕使與陳振孫所記小異振孫與噩同時迪知所叙又與序中結銜合未詳孰是也宋人喜言杜詩而注杜詩者無善本此書集王洙宋祁王安石黃庭堅薛夢符杜田鮑彪師尹趙彥材九家之注頗為簡要知達序稱屬二三士友隨是非而去取之如假託名氏撰造事實皆刪削不載陳振孫書録解題亦曰世有稱東坡故事者案當作老杜事實隨事造文一一牽合而皆不言其所自出且其詞氣首末出一口蓋妄人僞託以欺亂流俗者書坊輒鈔入集注中殊敗人意此本獨削去之云云與序相合知其别裁有法矣振孫稱噩刋板五羊漕司字大宜老案宜老謂宜乎老眼刻本或作可考非最為善本此本即噩家所初印字畫端徑而清楷宋板中之絶佳者振孫所言固不為虛云乾隆四十九年十一月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
