body:
  text: 九家集注杜詩卷十七宋郭知達編近體詩冬日洛城北謁𤣥元皇帝廟唐書天寶元年陳王府參軍田周秀上言𤣥元皇帝降于丹鳯門之通衢告錫靈符在尹喜之故宅上遣使就尹喜宅遂發得之乃置太𤣥元廟于大寧坊親享于新廟是秋敬改為上𤣥元皇帝宫二年追尊太聖祖𤣥元皇帝仍於天下諸郡為紫極宮秋改譙郡紫微宫為太清宮趙云𤣥元皇帝李老君也配極𤣥都閟配皇等極老子曰是謂配天極𤣥都觀也閟閳也神也詩閟宮有侐杜正謬𤣥都老子觀名天寶二年追尊老子為聖祖𤣥元皇帝仍於天下諸郡建紫極宫趙云此首兩句也對詩家第二字側入謂之正格如今篇兩句是也第二句平入謂之偏格如後篇諫官非不逹詩義早知名是也唐名賢輩詩多用正格如公律詩用偏格者十無二三沈居中筆談嘗論之矣配極之義杜補遺以為配紫極是蓋紫極北極也晉謝安建宮室體合辰極乃其義矣舊注引老子是謂配天古之極輒裁其語云是謂配天極以傳㑹其說殊不知是謂配天乃是句絶而古之極次之也以廟在城之北故曰配極憑髙禁籞長前漢宣紀詔池籞未御幸者假與貧民注籞者禁苑前漢書音義曰折竹以縣繩連之使人不得往來謂之籞趙云范靖妻沈氏登樓曲憑髙川路近則人憑其髙而杜公以義行語則言處所憑附於髙故公詩又云户牖憑髙發興新又云招提憑髙岡也𤣥都丹臺仙真之所也故用𤣥都言廟舊注云𤣥都觀非是守祧嚴具禮周禮春官守祧注逺廟曰祧遷主之所藏也掌節鎮非常地官掌節注節猶信也行者所執之信掌節掌守邦節而辨其用祧趙云周禮守祧既尊𤣥元為聖祖故監廟者得謂之守必有御賜之信以為鎮故得借掌節以為言此詩人之功用也漢景帝詔曰禮官具禮儀碧瓦初寒外金莖一氣旁劉駼騊詩曰縹碧以為瓦班固西都賦抗仙掌以承露擢雙立之金莖郊祀志漢武作柏梁銅柱承露仙人掌之屬也碧趙云葛洪神仙傳載蔡少霞夢人託書新宫銘有云瓦鱗差瑶階眆截初寒是十月題云冬日來謁也字則風土記曰九月九日折茱萸房以插頭言辟除惡氣而禦初寒金莖廟中未必有詩人言之以壯宮殿之形勢耳潘安仁西征賦化一氣而甄三才山河扶繡户謂户上繪畫若繡也梁沈約春風詠鳴珠簾於繡户日月近雕梁雕刻梁棟也山趙云吳起言魏有河之固詩瞻彼日月檀約陽春歌曰白日映雕梁碧瓦在初寒之外金莖在一氣之旁而繡户為山河所扶雕梁相近日月皆言廟之髙大也與日月低秦樹乾坤繞漢官同法今四句皆言廟之據髙而句法雄大耳仙李蟠根大徛蘭奕葉光神仙傳老子姓李名耳字伯陽盤根大故枝葉繁盛謂唐室以李為聖祖梁杜補遺老子生指李樹為姓而唐以為聖祖也故云仕昉述異記曰中山有縹李大如拳呼仙李故陸士衡賦曰仙李縹而神李紅武帝生於猗蘭殿又趙云此以紀𤣥元之盛美言自老子盤根而來至唐如蘭之猗猗為纍世有光也仙李對猗蘭蓋起於猗蘭操孔子所作也舊注及杜田引漢殿名為證非杜公以李氏之世譬之猗蘭蓋亦孔子所謂蘭為王者香也虞詡云盤根錯節晉潘安仁作楊仲武誅云伊子之先奕葉熙隆世家遺舊史道德付今王史記有老傳子而無世家老子道德經明皇御注趙云本傳曰老子著書上下篇言道德之意西京賦曰學乎舊史氏顔延年赭白馬賦云訪國美人舊史孟子云今王發政施仁今王田獵鼓樂於此畫手看前輩吳生逺擅場廟有吳道子畫張平子東京賦奏政利嘴長距終得擅場誼鮑云山答道人簡王立之曰凡作詩賦要以宋玉賈相如子雲為師略依放其步驟乃有古風杜詩云畫手看前輩吳生逺擅場蓋古人於能事不獨求誇時輩要須前輩中擅場耳選趙云梁張纘别離賦曰太常劉侯前輩宿逹又有喜謗輩前擅場蓋取鬪雞之勝者言之森羅移地軸河圖括象曰地有三百六十軸妙絶動宫牆言筆跡巧妙冠絶也趙云肇論曰萬象森羅魏文帝與吳質書曰公幹五言詩之善者妙絶時人海賦云又似地軸挺拔而爭回宫牆則論語有譬之宫牆五聖聯龍衮千官列雁行唐書天寶八年上謁太清宮上聖祖𤣥元皇帝尊號為聖祖大道𤣥元皇帝髙祖太宗高宗中宗睿宗五帝皆加大聖皇帝之字禮記天子龍衮丘遲畫功臣名將雁行有序謂繪五帝侍從也典趙云荀卿曰天子千官詩兩驂雁行應劭漢官儀載職楊喬紏羊柔曰桑知丞郡雁行威儀有序冕旒俱秀發禮器天子之冕十有二旒諸侯九上大夫七下大夫五士三制趙云今句正言五聖之像舊注更引諸侯大夫士之惑後學矣左思蜀都賦王褎暐曄而秀發旌斾盡飛揚儀仗也誰趙云旌斾旌之有斾也陸士衡詩長旌為斾飛揚於旌斾之義則選賦云霓旌飄以飛揚翠柏深留景紅梨逈得霜風筝吹玉柱風筝謂製筝挂之風際風至則鳴也江淹詩玉柱揚清曲露井凍銀床古詩後圜鑿井銀作床金瓶素綆汲寒漿趙云四句寫所見之景物也翠柏在冬其實與葉皆陵翠左九嬪松柏賦云列翠實之離離魏收庭柏詩云寒翠不奪是矣紅梨言梨葉得霜而紅也梁庾肩吾尋周處士詩云梨紅大谷晚桂白小山秋逈逺也深與逈則柏梨皆非一株矣風筝今內地有之玉柱字使栁惲七夕詩秋風吹玉柱又參使袁淑正情賦曰陳玉柱之鳴筝露井露地之井也湯僧濟詩昔日倡家女插花露井邊銀床字舊注引古雖是而非銀床兩字所出蓋如庾肩吾侍宴九日詩銀床落井棡庾丹秋誾云空汲銀床井身退卑周室史老子周守藏室之史也修道德其學以自隱無名為務居周久之見周之衰乃去經傳拱漢皇漢文景崇黃老教谷神如不死老子谷禆不死養拙更何鄉趙云兩句又以紀𤣥元之事實乃杜公因落句自言其身而起此句謂老子之引退為周室日以卑削之故卑字是句之腰便用作幹旋之字矣其經所傳之人可用之以拱翼漢皇指言文景之間崇黃老之教也如此則老子之道不亦大乎故杜公以為吾之谷神如不死則養拙更何鄉而可乎惟以老子之道而巳潘安仁閒居賦云仰衆妙而絶恩終優游以養拙鄉如所謂道德之鄉與出入無時莫知其鄉之鄉同義不必指洛城也一作方亦此義耳而字不若鄉之典行次昭陵唐太宗文皇帝之陵也舊俗疲庸主舊俗謂隋民舊染汙俗庸主焬帝疲困也羣雄問獨夫獨夫以失道而無助書獨夫紂羣雄如李密之流隋趙云自此而下至賢路不﨑嶇是一假庸主獨夫指焬帝也舊俗謂隋民疲困於庸昏之主賈誼過秦論曰向使子嬰有庸主之材僅得中佐秦猶未亡也詩懷其舊俗晉陸機辨亡論有曰羣雄鋒駭䜟歸龍鳳質䜟書也唐太宗龍鳳之姿天日之表威定虎狼都蘇秦傳奉虎狼之國也表趙云太宗方四嵗有書生見之曰龍鳳之姿天日之其年幾冠必能濟世安民髙祖以為神採其語名之曰世民故曰䜟歸龍鳳質蘇秦傳秦虎狼之國也太宗之取天下先定關中故曰威定虎狼都改姿字為質改國字為都詩句如是停等而後可若歸字取劉琨言厯數有所歸之歸定字取尚書一戎衣而天下定又穀梁取威定霸之定豈不謂之句之頜耶天屬尊堯典父子天屬也尊堯典謂循其興法也太宗髙祖次子神功協禹謨謂親定九州也之趙云尊堯典謂循髙祖法度豈亦以髙祖為神堯皇帝故得用堯典字耶神功協禹謨詩人意取帝王之成功韻自押到蓋所謂禹成厥功而書有禹謨也舊注謂親定九州若如此却成協禹貢矣必謂之神功則禹謂之神禹也神功字宋謝靈運得句云此語有神功見鍾嶸詩品所載風雲隨絶足風雲㑹合隨馬足而起也日月繼髙衢日月謂相繼而明髙祖禪也字趙云上句言風雲之㑹下句言繼髙祖之明風雲多矣如感㑹風雲絶足字魏文帝與孫權送馬書曰中國雖饒馬其知名絶足亦時有之耳登樓賦假髙衢而騁力文物多師古文物典章左傳文物以紀之師古謂以古為師也猶稽古趙云尚書事不師古朝廷半老儒太宗之時朝廷多老儒稍趙云老儒如房杜之屬太宗為天䇿上將軍冦亂平乃鄉儒官作文學館收聘賢才如杜如晦等十八人分番宿閣下悉給珍膳每暇訪以政事討論墳籍在選中者謂之登瀛洲及其即位儒臣之老如房杜輩大半在朝為卿相直詞寧戮辱賢路不崎嶇太宗納諫容直言如魏徵之切直無所不至而能容之孫伏伽諫論元律罪不當賜死以蘭陵公主園直百萬其用如人馬周咸能盡其才楚趙云四句實録也賢路不崎嶇則不艱於進用說苑令尹虞丘子謂莊王曰臣為令尹處士不升妨羣賢路潘安仁詩在疚妨賢路于寶云師尹無具瞻之貴而顛墜戮辱之禍日有南都賦下䝉籠而崎嶇白鸚鵡賦云崎嶇重阻往者灾猶降蒼生喘未蘇指麾安率土蕩滌撫洪爐謂成天下如洪爐爾壯士悲陵邑幽人拜鼎湖云趙此六句言太宗末年有日食太白晝見之灾興翠微玉華之役髙麗龜兹之戰相繼用師則太宗之意猶欲好大喜功勤兵於逺立思方如此遽爾升遐故繼之以壯士悲陵邑也論語往者不可諫書海隅蒼生謝安其如蒼生何灾降字始皇天降灾蘇字使后來其蘇也劉向新序曰先王之所以指麾而四海賔服者誠德之至也樂緯云啇湯改制蕩滌故俗而東都賦云因造化之蕩滌蕩音他浪切亦上聲音徒浪切詩率土之濵用對洪爐如禪家洪爐上下㸃雪荆軻云壯士一去不復還易幽人貞吉西都賦三選七遷充奉陵邑鼎湖事黃帝鑄鼎鼎成而仙去後世名其地為鼎湖出前漢郊祀志玉衣晨自舉上賜霍光玉衣耿秉死亦賜玉衣玉衣御服也鐡馬汗常趨陸位公鐡馬千羣趙云玉衣貴人死者珍異之衣漢儀注以玉為衣如鎧狀連綴之以黃金為縷太宗雖死矣玉食如鎧晨則自舉此亦意度鬼神之事鐡馬非戰莫用所像鐡之鐡馬猶汗以趨則太宗勤兵之意瞑目而未終矣松柏瞻虛一作靈殿師云古詩虛殿自生風塵沙立瞑途師云張協詩塵沙蔽瞑途寂寥開國日謂太宗躬親戎馬平一天下開國建社易開國承家流恨滿山隅趙云此公自紀其過陵之實也仲長子昌言曰古之葬松柏梧桐以識其墳也故咏曹植墓詩曰髙墳鬱兮巍巍松柏森兮成行謝靈運經盧陵王墓下詩曰徂謝易永久松柏森已行可見矣繁欽述行賦曰茫茫河濵實多沙塵謝靈運擬阮瑀詩曰河洲多沙塵風悲黃雲起然則沙塵兩物可倒用乎末句重弔其平生開國之勤勞今死則寂寥而流恨也選有列萬騎于山隅贈韋左丞文濟首卷有贈韋左丞文二十二韻杜補遺按唐史韋思謙髙宗之時為尚書左丞振明綱轄朝廷肅然武后時同鳳閣鸞臺三品子承慶嗣立武后時嗣立代承慶為鳳閣舍人黃門侍郎承慶亦代為天官侍郎及知政事父子並為宰相世罕其比嗣立二子曰恆曰濟恆終陳留太守濟天寶中授尚書左丞凡三世居之濟文雅頗能修飾政事所至有治稱左轄頻虛位晉天文志轄星傳珍兩旁主王侯左轄為王者同姓右轄為異姓杜正謬云唐六典云左右丞掌管轄省事紏舉憲章舊史劉泊上疏曰尚書萬機實為政本是以二丞方於管轄八座比於文昌故左丞謂之左轄來趙云自此至接亨衢八句皆以紀韋左丞也魏晉以左丞得彈奏八座故傅咸云斯乃皇朝之司直天臺之管轄後人用左轄字義起于此非是取左轄星之名今年得舊儒相門韋氏在經術漢臣須漢韋賢及子𤣥成父子皆以經術為相趙云濟乃嗣立之子承慶之侄嗣立承慶並為宰相故得引漢韋氏為言相門字魏志陳思王傳載諺云相門有相經術字如史云不務經術時議歸前列天倫恨莫俱天倫兄弟也穀梁兄弟天倫也趙云嗣立有二子恆濟知名故有是句禮記龜為前列鴒原荒宿草鳳沼接亨衢常棣眷令在原兄弟急難注脊令雍梁也飛則鳴行則搖不能自舍耳箋云雍渠水鳥而今在原失其常處則鳴求其類天性也猶兄弟之急難檀弓曽子曰朋友之墓有宿草而不哭注宿草謂陳根也晉荀朂守尚書令最久在中書專管機事及失之甚罔然悵恨或有賀之者曰奪我鳳凰池諸君賀我耶趙云易何天之衢亨言濟兄弟是前輩為時議所歸惜其一亡至于宿草已荒然濟由左丞可以接鳳池亨衢又美其可為中書之貴也有客雖安命莊子知其無可奈何而安之者命衰容豈壯夫謂以窮逹而肥癯非壯夫也趙云公自謂也詩有客有客壯夫字出揚子家人憂几杖几老者所憑杖老者所扶持也家人憂其老也故借言几杖禮大夫致仕則必賜之几杖之趙云禮七十者杖於家以年老須几故為家人憂甲子混泥塗襄三十年傳晉悼夫人食輿人之城把者綘縣人或年長矣無子而往與於食有輿疑年使之年曰臣小人也不知紀年臣生之嵗正月甲子朔四百有四十五甲子美其季於今三之一也趙孟曰武不才任君之大事以晉國之多虞不能用吾子使吾子辱在泥塗久矣武之罪也不謂矜餘力還來謁大巫陳琳答張紘書小巫見大巫神氣盡矣亦為言文章趙論語行有餘力則以學文正謂矜誇餘力之文也嵗寒仍顧遇以顧遇之禮不改故云嵗寒論語嵗寒然後知松柏之後凋也日暮且踟蹰日暮謂暮齒也漢書日暮途逺趙云以公顧遇故雖日暮猶踟蹰而不欲行也詩搔首踟蹰老驥思千里魏武樂府云老驥伏櫪志在千里飢鷹得一呼魏志陳登謂吕布曰曹公言待將軍譬如養鷹然飢則為用飽則揚去趙云權翼之言慕容垂曰猶鷹也飢則附人飽則髙飛鮑照蕪城賦有云飢鷹厲吻劉表有呼鷹臺也雖飢矣猶待呼則不茍就食也一呼字亦借使振膺一呼又仰天一呼不必泥漢書注音去聲君能微感激亦足慰榛蕪一云折骨效區區有趙云此又不能無所求之情也一云折骨效區區又以報其施矣感激字祖出趙岐孟子章指曰千載聞之猶有感激選云伊洛榛蕪然一云之語非報其施亦何至言折骨也投贈哥舒開府翰二十韻今代麒麟閣何人第一功漢武帝獲麟作麒麟閣以畫功臣像也當漢宣帝甘露三年上思股肱之美乃詔圖畫大將軍霍光等十一人於麒麟閣漢髙祖論功行封以蕭何功為第一趙云諸本多誤乃竟以麒麟作騏驎惟此萹方不誤蕭何第一功所謂謂麒麟閣第一功各是一端實事故可為實封矣君王自神武駕馭必英雄尚書帝德廣運乃聖乃神乃武之乃文前漢刑法志髙祖躬神武才總攬英雄吳張昭曰人君能駕馭英雄見趙云英雄所以指翰也君王字左傳曰與君王哉餘上君王問長卿注易神武而不殺開府當朝傑論兵邁古風齊職儀曰開府儀同三司秦漢無文唐制從一品寶趙云此至和戎通四韻以言翰為開府之事翰於天十一載加開府儀同三司故也陸瑜仙人覽六箸篇避敵情思巧論兵勢重新先鋒百勝在略地兩隅空勝一作戰劉牢之為前鋒百戰百勝號為北府兵敵人畏之漢書鄂秋曰曹參雖有野戰略地之功趙云如馬謖傳有魏延吳臺論者皆言宜令為先鋒漢髙祖紀陳涉遣武臣等略地翰嘗攻吐蕃石堡城遂以赤嶺為西塞豈略地之事實耶謂兩隅意其在西北也青海無傳箭天山早挂弓翰嘗築城於龍駒島而吐蕃不敢近青海類趙云胡人每起兵則傳箭為號如今雲南蠻刻牌之薛仁貴傳將軍三箭定天山將士長歌入漢關天山即祁連山胸奴謂天為祁連早挂弓則不復用亷頗仍走敵見上亷頗出將頻注魏絳已和戎魏絳勸晉侯和戎以為有五利公從之趙云亷頗為趙將破齊勝魏功為多後免歸趙復使伐魏之繁陽拔之今公詩以此兩句繼早挂弓之後此必中閒議不用兵故言亷頗仍可以走敵而魏絳和戎之䇿已行也惜乎無以考之每惜河隍棄新兼節制通趙云此而下至歸來御席同通五韻以言翰加節度之事翰十一載冬入朝十二載春進封凉國公兼河西節度使蓋以河隍之久棄欲得翰收復之故使之節度河西也荀子秦之鋭士不足以當威文之節制智謀垂睿想出入冠諸公王忠嗣被罪詔翰入朝帝虛心待之系趙云惟其方往謀復河隍而為帝所想則入而歸朝出而建節其榮耀為諸公之冠矣明年遂復河隍事載編年可考矣舊注引王忠嗣事在復河隍之前非是智謀如智者順時而謀智者不為愚者謀日月低秦樹乾坤繞漢宫趙云此言其收復之效也按傳云攻破吐蕃洪濟大漠門等城收黃河九曲以其地置洮陽郡築神䇿宛秀二軍此所謂日月所臨特低秦樹乾坤所包獨繞漢官樹則日月低而親之宫則乾宫匝而之蓋宇宙在乎手及揭天地以趨新之類乃所謂開廣之句矣胡人愁逐北宛馬又從東言吐蕃嘗盜積石軍麥為翰所破隻馬無還者漢書注曰師敗曰北髙紀當是時秦兵彊常乘勝逐北漢伐大宛得天馬乃作歌曰天馬歷來無草徑千里循東道言翰能以威武故蠻夷畏服宛馬復來也薛云文選阮籍詩天馬出西北由來從東道攻趙云賈誼云追奔逐北此言翰之威武胡人既愁其逐而北敗矣又得宛馬而從東來舊注引吐蕃盜麥事乃在節度河西前非是受命邊沙逺歸來御席同邊沙一作麾翰屢鎮邊郡翰嘗來朝帝命髙力士賜宴詔尚食生擊鹿取血㵸腸以賜之趙云邊沙逺指言河西為逺御席同言復河隍而歸寵宴之盛此並終節制河西後來事舊注皆在河西節度已前非是軒墀曽寵鶴畋獵舊非熊左傳懿公好鶴鶴有乘軒者文王將出獵卜之曰所獲非熊非羆非虎非貔乃霸王之輔也之趙云言翰之貴寵也如乘軒之鶴明皇得之如文王得吕望杜預注云大夫乘軒而公今云軒墀何也以待博雅辨之茅土加名數禹貢徐州厥貢惟土五色王者封五色土為社建諸侯則各割其方色土與之使立社燾以黃土苴以白茅茅取其潔黃土取王者覆四方名數謂等其爵位輕重而為之名數故名位不同禮亦異數數趙云此言翰進封西平郡王也王莾傳先賜茅土名禮物有名有數也舊注云名位不同禮亦異數名位自是在人言之不可合也山河誓始終沛公封功臣誓曰使黃河如帶太山若礪國以永存爰友苖裔於是申以丹功書之信重以白馬之盟趙云陸士衡云武功侔河䇿行遺戰伐契合動照融趙云此言翰之謀䇿已行可以遺落戰代其所合如契而動於顯煥也詩昭明有融勳業青冥上交親氣概中須賈謂范睢曰不意君能自致於青雲之上靈運詩託身青雲上下句言以氣義結人也趙云此四句而下通十二句乃公作詩針線暗以言自已也今四句言翰勳業之髙在青冥之上而其待交親以氣概結之勳業出吳志張昭謂孫榷曰為人後者貴能負荷先軌以成勳業又潘安仁作誄文有曰勳業未能青冥猶言青雲也交親起於句云非禮不交不親而曹植贈丁儀有云親交義不薄贈徐幹云親交義在敦今兩字豈倒用耶未為珠履客已見一作是白頭翁春申君客三千餘人其上客皆躡珠履公自言未為翰上客已白頭也趙云白頭翁雖常語然漢書壺丘三老上書曰白頭翁教我又文䖍之禱霽夜夢見白頭翁曰云云明日乃霽句意則使魏文帝與吳質書曰已成老翁但未白頭耳江表傳曽有白鳥集殿前孫權曰此何鳥也諸葛恪曰白頭翁張昭自以坐中最老疑恪以鳥戲之壯節初題柱公自言壯節有題柱志也成都記升仙橋司馬相如初西去題其柱曰不乘赤車駟馬不過此橋果以傳車至其處生涯獨轉蓬言晚節流離如蓬之轉風也曹子建詩轉蓬離本根飄颻隨長風何意回颷舉吹我入雲中趙云莊子吾生也有涯兩字所合則王績先用也幾年春草歇今日暮途窮主父偃云日暮途逺嵇康書曰若道盡途窮則已耳謝趙云梁元帝既看春草歇還見雁南飛靈運芳草亦未歇軍士留孫楚晉書孫楚字子荆才藻卓絶爽邁不羣多所陵傲闕鄉曲之譽年四十餘始參鎮東軍事後遷左著作郎又參石苞驃騎軍事楚既負其材氣頗侮易於苞初至長揖曰天子命我參軍事因此而嫌隙遂搆劾參軍之不敬府主行間識呂䝉吳志吕䝉字子明年十六幼隨姊夫鄧當擊賊時當􅕄吏以䝉年幼輕之曰彼竪子何能為此以肉餧虎耳他日與䝉㑹又蚩辱之䝉大怒拔刀殺吏出俄而孫䇿召置左右魏文帝問趙咨吳王何等主也咨曰拔呂䝉於行陳防身一長劍將欲倚崆峒一作防身有長劍聊欲倚崆峒宋玉賦長劍耿介倚天外趙云公欲有所兾於翰故先引以為言曰以軍事則能留孫楚異乎石苞之不容以行間則識吕䝉如孫䇿者如此則我所防身之長劔亦欲倚之於崆峒也崆峒取隴右髙山翰所臨之地以比翰也上韋左相二十韻鮑云韋見素襲父爵彭城郡公十三載拜武部尚書從帝入蜀詔兼左相鳳厯軒轅紀本注云見素相公之先人遺風餘烈至今稱之故云丹青憶老臣公時為兵部尚書故云聽履上星辰昭十七年傳秋郯子來朝公與之宴昭子問焉曰少皥氏鳥名官何也郯子曰吾祖也我知之我髙祖少皥摯之立也鳳鳥適至故紀於鳥為鳥師而鳥名鳳鳥氏厯正也注少皥金天氏黃帝之子鳳鳥知天時故以名厯正之官史記曰黃帝名軒轅公趙云或曰鳳厯則少皥之紀耳而曰軒轅紀何耶豈誤指為黃帝也次公以為不然此自是一事而公所用則應是黃帝使伶倫截嶰谷竹聽鳳凰之聲以為十二律而吹十二律以推十二月十二月定而厯成矣不亦謂之鳳律乎紀則言歷之紀也更俟博雅者推之龍飛四十春自𤣥宗即位至天寶十二載四十年也十三載韋見素為武部尚書同中書門下平章事龍飛𤣥宗即位也明趙云登極謂之龍飛取易卦九五飛龍在天之義自皇即位至天寶十三載四十三年而此言四十春蓋詩家舉其大目耳鳳厯對龍飛軒轅紀對四十春用人名對數尤老手之妙八荒開夀域一氣轉洪鈞荒大也八才也張茂先答何邵詩洪鈎陶萬類趙云言時之治平也莊子云逺在八荒之外潘安仁西征賦云化一氣而甄三才漢䇿驅民於仁夀之域其下開轉字可謂妙矣霖雨思賢佐丹青憶老臣髙宗命傳說曰若嵗大旱用汝作霖雨趙充國傳充國以功德與霍光等列畫未央宫成帝時西羌嘗有警上䇿將帥之臣追美充國乃召揚雄即充國圖像而頌之後漢胡廣傳靈帝思感舊臣乃圖畫廣及太尉黃瓊于省內詔議郎蔡雍為其頌云趙云上句指言用見素為相也下句非甫題下自注見素之先人則後學無由而見言丹青則應見于圖畫之間也前漢書曰上天佑之為生賢佐老臣宇多矣如疏廣曰此金者聖主所以惠養老臣也趙充國亡踰於老臣者矣應圖求駿馬梅福傳欲以三代之法取當世之士猶以伯樂之圖求麒麟於市而不可得亦已明矣趙云魏曹植獻文帝馬表曰臣於先帝世得大宛紫騂馬一匹形法應圖舊注引梅福傳却是不可按圖求馬事矣非干此也驚代得騏驎張揖注相如賦雄曰騏雌曰驎其狀麋身牛首狼蹄一角趙云此是通句一對言見素以材而見用也沙汰江河濁言為吏部日也北史辛雄為尚書郎㑹汰沙郎官雄與羊琛等八人俱見留魏舒傳時欲沙汰郎官非其才者罷之舒曰吾即其人也襆被而出孫綽傳沙之汰之瓦礫石後事祖並在北史辛雄之前調和鼎鼐新說命若作和羮爾惟鹽梅釋器云鼎絶大者曰鼐趙云此句言見素為文部侍郎時也文部即吏部而當時更名耳沙汰乃吏部事沙汰其濁則清仕流矣江河譬也下句言為相時謂之新則由文部侍郎拜武帝尚書同平章事韋賢初相漢范叔已歸秦韋賢字長孺授昭帝詩宣帝即位以先帝師甚見尊重焉本始三年伐蔡義為丞相封扶陽侯史記范睢字叔更名姓曰張祿王稽載入秦昭王大悅即拜睢為客卿封應侯以相秦趙云此兩句言美其為相也盛業今如此傳經固絶倫韋賢兼通禮尚書少子𤣥成復以明經仕至丞相故鄒魯諺曰遺子黃金滿嬴不如一經二趙云下句兩言如韋范之盛業也傳經固絶倫則於相之中又如韋賢之能傳經豫樟深出地滄海濶無津豫樟木良材也蒼海百谷之所歸其淵不可津涯趙云上句以言其材也豫樟珍材最難長嵇康曰生七年然後可覺深出地則拔而起矣下句以言其量也滄海說文云東海通謂之滄海其見於文人則甘泉賦東臨滄海西都賦覽滄海之湯湯出地如易雷出地奮豫明出地上晉無津涯起於書若涉大水其無津涯而選詩有清濟固無津北斗司喉舌東方領搢紳李固傳陛下之有尚書猶天之有北斗也北斗天喉舌尚書亦為陛下喉舌斗斟酌元氣還于四時尚書出納王命郊祀志搢紳者弗道李竒曰搢紳插笏於紳紳大帶也臣瓚曰縉赤白也紳大帶也左氏傳有縉雲氏師古曰李云搢紳是也字本作搢插笏於大帶之間與革之間非插於大帶也或作薦紳者亦謂薦笏於紳帶之間其義同相如曰搢紳先生之徒聽杜補遺見素天寶中為兵部尚書故曰北斗司喉舌履上星辰康王之誥曰太保率西方諸侯入應門左畢公率東方諸侯入應門右時見素為相率百官故云東方方領搢紳者趙云周禮云左九棘孤卿大夫位焉羣士在其後左東方之仕為左相其秩則孤矣位在東方之九棘而領卿大夫羣士不亦謂之領搢紳乎持衡留藻鑒聽履上星辰公時兼兵部尚書鄭崇哀帝時為尚書僕射數求諌爭上納用之每見曵華履上笑曰我識鄭尚書履聲趙云見素為吏部侍郎平判皆誦於口銓選平允人多德之藻鑒是兩字如晉太康制云藻鑒銓衡又李重言銓管九流品藻清濁也持衡銓衡之義也上星辰以言其親帝之旁猶言上雲霄也獨步才超古任昉曰勳遂超古餘波德照鄰一云餘波照平鄰仲趙云此重美其才德也曹子建云宜獨步於漢南禹貢餘波入于流沙其義則左傳若波及晉國者皆君之餘也故顔延年除徴士詩有云泛餘波矣戰國䇿魯仲仲連遺燕將書有云名髙天下光照鄰國以其超大故言獨步照燭傍鄰故言餘波此又句法也語德不孤必有蹸又王擔之傳江東獨步王文廣聰明過管輅魏志方伎傳管輅喜仰視星辰常云家雞野鵠猶尚知時况子人乎能明天文人號之神童天寶十五載是年八月肅宗立改元至德十月丙申有星犯昴見素言於肅宗曰昴者胡也祿山將死矣帝曰日月可知乎見素曰福應在德禍應在刑昴金忌火行當火位昴之昏中乃其時也既死其月又死其日明年正月甲寅祿山其殪乎及祿山死日月皆不差管輅善天文地理今見素所言如此之驗所謂聰明過管輅也尺牘倒陳遵前漢游俠傳遵字孟公略涉傳記贍於文辭惟善書與人尺牘主者藏去以為榮倒猶傾服也趙云見素必善書矣惜乎史所不載因公詩見之豈是池中物由來席上珍吳志周瑜傳晉書劉元海傳並云蛟龍得雲雨非復池中物也禮儒行儒有席上之珍以待聘者趙云豈是出詩豈是不思由來易其所由來漸矣廟堂知至理風俗盡還淳趙云此言其宰相之能事畢矣吕氏春秋載述孔子曰修之朝廟之上折衝千里之外至理即至治也以髙宗諱治故當曉避改耳鍾㑹欲害稽康曰幸因釁除之以淳風俗而還淳則選有允還化淳乃倒用摘用也才傑俱登用愚蒙伹隱淪趙云自此而下公自謂也晉文宛傳序吉父太沖江左之才傑孔氏注若時登庸云順是事者將登用之隱淪見首篇注長卿多病久子夏索居頻司馬長卿常有消渴病索居蕭索也子夏離羣索居出禮記趙云公以二人自比也回首驅流俗生涯似衆人趙云此言欲回首而驅出流俗然為生之涯終似衆人也孟子同乎流俗揚子賢人則異於衆人矣生涯見上投贈哥舒翰注巫咸不可問鄒魯莫容身列子有神巫自齊來命曰李咸知人生死存亡禍福夀夭期以嵗月卒為壺丘子所困莊子盜跖篇孔子再逐於魯削跡於衛窮於齊圍於陳蔡不客身於天下豈足貴耶感激時將晚蒼茫興有神為公歌此曲涕淚在衣巾趙云孟子章指曰千載聞之猶有感激時將晚則日暮途逺之義蒼茫荒寂之見潘安仁哀永逝文有云視天日兮蒼茫何遜集載何置詩有云蒼茫曙月苦荒寂之間而興有神也則感激所致不自覺如神也古詩誰能為此曲宋子侯歌曰吾欲竟此曲此曲愁人腸劉越石詩曰我欲竟此曲此曲悲且長安仁楊荆州誄有云涕淚霑襟又楊仲武誄云涕霑子巾沈休文詩有寧假濯衣巾則參用之矣巾說文曰佩巾也奉贈太常張卿均二十韻按唐書均張說之長子也九載為大理卿後出為建安太守嵗中召還再遷太常卿祿山亂受僞命特免死長流合浦方丈三韓外前漢郊祀志自齊威宣燕昭使人入海求蓬萊方丈瀛州此三神山者其地在渤海中魏志韓在帶方之南東西以海為限有三種一曰馬韓二曰辨韓三曰辰韓崑崙萬國西禹貢注崑崙在荒服之外流沙之內羌髳之屬皆西戎也在趙云三韓今日之髙麗也方丈在其外水經云崑崙西北去嵩髙五萬里列子言三山根不相連著博物志言崑崙從廣萬一千里建標天地濶天台賦赤城霞起以建標詣絶古今迷氣得神仙迥恩承雨露低按唐書均弟垍以主壻𤣥宗時深恩寵許於禁中置內宅侍為文章當賜珍珖不可勝數時均亦供奉翰林垍嘗以所賜示均均戲謂垍曰此婦翁與女壻非是天子與學士也相門清議衆儒術大名齊均垍俱䏸文說在中書兄弟皆掌綸翰之職之趙云竊為之說曰方丈則弱水之所隔崑崙則芙山所環是皆仙聖居集之地齊威宣燕昭王求方丈而不得張騫尋河源而惡暗所謂崑崙四句以譬禁掖之清切乃神仙之地惟有仙風道骨始能逰且承恩寵也故下云氣得神仙逈恩承雨露低此指言張均父子舊史載均兄弟方其父說在中書時已掌綸翰之任今以公詩參之可謂詩史矣均相國之子故曰相門清議衆舊史言均垍俱能文故曰儒術大名齊曹子建云相門出相荀子云儒術行而天下富劉頌云今清議不肅人不立德穀梁云臣不專大名軒冕羅天闕琳琅識介圭莊子古之所謂得志者非軒冕之謂也禹貢厥貢球琳琅玕注球琳玉名琅玕石而似珠釋地云西北之美有崑崙墟之球琳琅玕焉詩嵩髙錫爾介圭以作爾寶琅趙云言乘軒衣冕之人森羅於帝闕而就其中如琳則識張卿之為介圭爾介圭大圭也詩云以其介圭入覲于王伶官詩必誦夔樂典猶稽邶詩簡兮序衛之賢者仕於伶官皆可以承事王者注伶官樂官也書后夔典樂太趙云此正言其為太常卿也舊史載均坐垍貶建安守還遷太常卿而公詩亦云贈太常張卿詩復用樂事新書止云均為刑部尚書坐垍貶建安還授大理卿乃誤以垍自盧溪司馬還為太常令所取信者杜公耳古者採詩而伶官誦之以諫王焉太常卿掌樂者也張卿以誦詠所採之詩夔樂之所典張卿猶更稽考之健筆凌鸚鵡後漢禰衡有才辨在黃祖坐上為鸚鵡賦筆不停綴文不加㸃凌過也銛鋒瑩鸊鵜鸊鵜水鳥也膏中瑩刀趙云上句美其能文庾信作宇文順文集序云章表健筆一付陳琳下句美其才器如劍之利王充論衡云足不彊則跡不逺鋒不銛則割不深戴皓度闕山詩劔瑩鸊鵜膏揚雄方言云野鳬也友于皆挺拔公望各端倪友于言兄弟也語友于兄弟公望各有所歸也勳趙云此而下至嘉謨及逺黎言均兄弟之貴且有業也友于見上裴道州詩注海賦云又似地軸挺拔而爭回下句言其兄弟負公輔之望各有端倪非過當也王導嘗謂虞􅔎曰孔愈有公才而無公望丁談有公望而無公才兼之者其在卿乎莊子載孔子曰終始反覆不知端倪鄭處誨明皇雜録載上幸張垍宅曰中外大臣才堪宰輔者與我悉數吾當舉而用之垍逡巡不言上曰固無如愛壻既逾月不拜垍怏怏意為李林甫所排上嘗曰吾命宰輔當遍舉子弟耳其後因緣他故不致大用此詩所以云各有端倪也通籍踰青瑣元帝紀令從官給事官司馬中者得為大父母父母兄弟通籍應邵曰籍者為二尺竹牒記其年紀名字物色縣之宫門案省相應乃得人也謝𤣥暉詩既通金閵籍漢給事中暮入對青瑣門拜謂之夕郎青鎖刻為連瑣而青塗之亨衢照紫泥亨衢亨途也後漢志注漢舊儀曰天子信璽六璽皆以武都紫泥封青囊白素裏兩端無縫尺一扳中約署皇帝趙云通籍通朝見之籍漢元帝紀禁中有青瑣門亨衢祖出易何天之衢亨靈虬傳夕箭歸馬散霜蹄梁陸倕新漏刻銘云靈虬承龍言漏刻之體以龍承之也趙云此言晝夜之接晚始歸也靈虬刻漏之體以龍承之箭是刻漏浮水之物選云金徒抱箭是也書歸馬華山之陽此李善所謂文雖出彼而意殊不以文害意也莊子馬蹄可以踐霜雪曹子建白馬篇俯身散馬蹄西羌用兵有傳箭守城之令亦有夜傳箭傳夕箭散霜蹄皆合成之能事聞重譯前漢平帝紀越裳重譯獻雉師古曰譯謂傳言也道路絶逺風俗殊隔故纍譯而後乃通相如重譯納貢嘉謨及逺黎趙云此又以美其為太常卿也上句言其所能之事聞播於重譯之蠻夷矣太常卿古之宗伯兼掌禮樂朝㑹之際蠻夷在焉下句言其典禮之謨又為天下所觀斯乃及逺方之黎庶矣陳沈炯為周洪辭太常表云儻九賔闕相封禪失儀責以有司云誰之咎則所能之事豈不係望於蠻夷乎書曰宗伯掌邦禮神治人和上下則所陳之謨豈不及黎庶乎易曰天下之能事畢矣揚子謨合臯陶謂之嘉弼諧方一展班序更何躋臯陶謨曰謨明弼諧莊二十年傳朝以正班爵之義帥長幼之序弼趙云自此至未句公自叙盧諶答劉琨四言詩有曰諧靡成良謨莫陳公云方一展展則其陳字之義即是翻用盧諶詩不用臯陶謨豈不捨祖而用孫乎班序字出選班序海內舊注非是適越空顛躓游梁竟慘悽莊子逍遙宋人資章甫而適越越人斷髮文身無所用之顛躓危困也鄒陽齊人知吳王不可說是時梁孝王待士於是陽與枚乘巖忌等皆去之梁從孝王游是趙云公初落魄嘗適越矣本傳所謂客吳越齊趙簡也公又嘗遊梁矣古詩贈李白篇所謂亦有梁宋遊是也今公雖為右率府胄曹然欲展弼諧於張卿而班列次序又不可攀則復有去而之他之意將適越乎空如前日之顛躓將遊梁乎竟如前日之慘悽此詩人之意也若句中用字莊子云是今日適越而昔至也其欲往越故取有出處兩字言之司馬相如傳相如因病免客游梁困其欲往梁又取有出處兩字言之舊注雖亦是而字隔并倒為非本出矣躓音致與跋㚄之㚄同顛躓起左傳杜回躓而顛慘悽選有􅉃懷慘悽􅉃音七念切謬知終畫虎馬援傳初兄之子嚴敦並喜譏議戒之曰龍伯髙敦厚周慎口無擇言謙約節儉亷公有威吾愛之重之願汝曹效之杜季良豪狹好義憂人之憂樂人之樂父喪致客數郡畢至愛之重之不欲汝曹效也效伯高不得猶為謹飭之士所謂刻鵠不成尚類鶩也效季良不得陷為天下輕薄子所謂畫虎不成反類狗也不趙云公自言其謬誤所知而事之成也微分是醯雞莊子田子方篇孔子見老𣆀孔子出曰丘之道也其猶醯雞歟微夫子之發吾覆也吾不知天地之大全也注醯雞者瓮中之蠛蠓也司馬云酒上蠛蠓如趙云公自言其受分細微而局促此萍泛無休曰桃隂想舊蹊萍無根隨流而已謝靈運蘋萍泛沈深李廣贊曰李將軍恂恂如鄙人口不能出辭及死之日天下知與不知皆為流涕彼其中心誠信於士大夫也諺曰桃李不言下自成蹊趙云萍泛公自譬其無定想舊蹊乃懷念舊日見知之人也吹噓人所羡騰躍事仍暌趙云舊見知之人也噓之而為人所羡矣然至於騰躍之便則仍乖暌如此碧海真難涉十洲記扶桑在碧海之中也青雲不可梯郭璞游仙詩靈溪可潛盤安事登雲梯趙云登雲梯如涉碧海梯青雲之難也顧深慚煆錬韋彪傳鍛錬之吏言深文之吏入人之罪猶工冶陶鑄煆錬使之成熟也前漢路溫舒曰鍛錬而月納之豈趙云舊注非是或曰前人以注意作詩為嵗鍛月錬公自謙言其為詩慚於煆錬乎公每以詩自負豈有此理又於顧深慚之下無義以次公觀之造刀劒者錣錬而後成張景陽七命曰楚之陽劔歐冶所營銷踰羊頭漢越煆成乃錬乃鑠萬辟千灌注云錬鑠辟灌並銷鑄煆錬之名則煆錬者豈刻苦成材之義乎言張卿恩顧我雖深而巳却自慚煆錬之未至也亦未敢專定以俟博雅者明之才小辱提攜提攜猶挈維之也煆趙云言才之小辱張卿之提擕此則分明與錬成材而可提攜之其義相應禮記長者與之提携檻束哀猿呌呌一作巧淮南子置猿檻中巧捷無所肆其能鮑明逺詩今作檻中猿鱗趙云言其有所窘束而不得逞與蹭蹬無縱同意謝靈運云哀猿響南巒枝驚夜鵲棲魏武帝樂府云月明星稀鳥鵲南飛繞樹三匝何枝可依趙云言其驚悸于棲止之間矣東坡云月明驚鵲未安枝用此驚字幾時陪羽獵應指釣璜溪注揚雄傳雄十二月從羽獵瑾玉也吕望釣於蟠溪得璜焉刻曰姬受命吕佐之報在齊趙云孝成帝時羽獵而揚雄從焉有羡慕其得近清光之意末句則言不免歸釣耳謂之釣璜溪公使事為新語敬贈鄭諫議十韻趙云唐史有鄭雲逵為諫議大夫乃德宗時今此與公同時但無所考其名耳諫官非不達詩義早知名鄭諫議雖不得名必善於詩者下皆詩事趙云論語欲速則不逹詩大序曰詩有六義焉韓退之云試將詩義授如以肉貫串亦用此也知名史多云某人最知名言為天子諫諍之官非不謂之顯達而於作詩之義又卑嵗已有名此専美之也下句正言其詩可以知名不達如主父偃宦不逹早知名如潘嶽夏候諶誄序云少知名破的由來事先鋒孰敢爭言詩句中理如射破的庾翼謂謝尚曰卿若破的當以鼓吹相賞尚應聲中之即以副鼓吹給之趙云破的如射之中先鋒如戰之勇曹子建詩控弦破左的而王濟與王愷射一發破的先鋒見上投贈哥舒翰注由來易其所由來者漸矣孰敢如論語孰敢不正思飄雲物外律中鬼神驚外一作動言意思逺到相如奏大人賦飄飄有凌雲之氣如律吕和諧足以驚鬼神趙云此如文賦言神遊萬仭精騖八極舊注非是律中鬼神驚如李白烏夜啼詩可泣鬼神舊注又非是左氏太史登觀臺以望必書雲物詩序云動天地感鬼神毫髮無遺恨波瀾獨老成曲盡物理故無遺恨才思浩瀚故如波瀾兼詞意壯健故又言老成也中趙云學者如悟此兩句便會作好詩矣一篇既好其才有一字一句不佳雖如毫髮小之則心自慊慊有恨矣舊注所云却是模稜波瀾言詞源之浩汗既有波瀾而又老成則不徒為泛濫矣蓋波瀾則俊者客有之而老成難得也鮑照白頭吟毫髮言為瑕丘山不可勝文賦云常遺恨以終篇謝靈運登池上樓云傾耳聽波瀾詩云雖無老成人野人寧得所天意薄浮生趙云自此而下皆公自叙也野人公自稱耳其字如左氏野人與之塊得所字起於各得其所浮生字雖起莊子而鮑昭云浮生旅昭代多病休儒服莊子哀公曰舉魯國而儒服趙云前漢張良傳良多病未嘗持矢休儒服則以多病而欲休罷之冥搜信客旌天台賦云逺寄冥搜趙云似言欲搜討幽冥之地信客旌所指耳周禮公卿大夫各有所建而後世通謂之旌如言使旌是已築居仙縹眇木𤣥虛海賦神仙縹眇食玉清涯師云神仙髙縹眇趙云上句言所居之髙逺蓋接上所謂冥搜而至其地也縹眇在宫室言之則王文考魯靈光殿賦忽縹眇以響像旅食嵗峥嶸鮑明逺舞鶴賦嵗崢嶸而催暮文趙云言為旅之時日危而易過魏帝云旅食南館使者求顔闔莊子讓王篇魯君聞顔闔得道之人也使人以幣先焉顔闔守陋閭苴布之衣而自飯牛終逃魯君之使趙云以築居而在仙縹眇之地故使者求之如求顔闔諸公厭禰衡後漢禰衡有才辨氣剛傲好矯時慢物曹操怒之送與劉表後侮表恥不能容以江夏大守黃之祖性急故送衡與之後竟為祖所殺趙云以旅食久故諸公厭之如禰衡初托曹公又託劉表又托黃祖故云將期一諾重辨士曹丘生謂季布曰楚人諺曰得黃金百斤不如得布一諾欻使寸心傾謝𤣥暉詩孰謂勞寸心趙云列子謂叔龍曰吾見子之心矣方寸之地虛矣陸士衡賦有吐滂沛乎寸心君見途窮哭宜憂阮步兵阮籍也顔延年詠阮步兵詩物故不可論途窮能無慟奉贈鮮于京兆二十韻鮑云鮮于仲通也唐紀十年書劔南節度使鮮于仲通及雲蠻戰于西埤河敗績不見其為京兆豈先為京兆耶豈以節度為京兆耶開元以來在位無鮮于姓者詩有鮮于萬州乃其子也王國稱多士賢良復幾人文王詩思皇多士生此王國趙云言王者之國號稱多士而賢良無幾也賢良如周禮以親賢良之義非指科目異才應間出爽氣必殊倫氣宇清爽有殊於衆人寤趙云以言鮮于京兆魏鋋叙志賦無匡時之異才每寐以歎息選有自前代之開出又曰山川間出王徽之云西山朝來致有爽氣始見張京兆宜居漢近臣張敞傳敞守京兆君其治京兆略循趙廣漢之迹為久任職漢制出為二千石有治狀者入為公卿故曰近臣趙云以張敞比之張守京兆之有稱者當時語曰前有趙張孟子云觀近臣以其所為圭驊騮開道路鵰鶚離風塵猶俊異得路也趙云以比其俊言言其得路公每使馬與鷹况人材侯伯知何算一作等文章實致身趙云此言侯伯多矣而鮮子之致身則實以文章此微言而含不盡之意算字雖是論語何足算也而此則顔延年作陶徴士誄序有云貴賤何算論語事君能致其身奮飛超等級容易失沈淪趙云詩云不能奮飛月令貴賤之等級潘安仁征西賦有云無等級以寄言東方朔云談何容易惟其奮飛而超邁於官之等級故其雜去沈淪也易而不難故有下句脫略磻溪釣操持郢匠斤吕望釣於磻溪莊于郢人堊墁其鼻端若蟬翼之匠石斫之匠石運斤成風聽而斫之盡聖而鼻不傷郢人立不失容趙云脫略其釣則乃起而操郢斤也江淹恨賦脫略公卿雲霄今已逼台衮更誰親趙云密雲曰雲薄雲曰霄上公應天上三台三公一命衮故得稱衮更誰親言惟我也鳳穴雛皆好龍門客又新此言鮮于諸子也陸靈幼時閲鴻見而竒之此兒若非龍駒即是鳳雛趙云下句言其門下客來者一番又新矣李膺有重名而接士登其門者號登龍門已暗引入公之自謂矣義聲紛感激敗績自逡巡感激見上贈左丞詩左傳凡敵大崩曰敗績師徒撓敗之義逡巡退貌趙云言鮮于之義聲雖紛然感激之多而我之敗績則自逡巡而不進也選有雖欲逡巡途逺欲何向逺一作永主父偃曰日暮途逺天髙難重陳曹植天髙聽卑劉越石弃置勿重陳學詩猶孺子一作子夏語曰小子何莫學夫詩又孔子謂子夏始可與言詩鄉賦忝嘉賔趙云朝錯以臣錯充賦鄉賦猶鄉舉詩鹿鳴燕嘉賔不得同朝錯吁嗟後郤詵趙云朝錯對䇿髙第郤詵對䇿為天下第一自曰猶桂林一枝崑山片玉此公本傳謂其舉進士不中也計疏疑翰墨公有詩云儒冠多誤身乃疑之矣時過憶松筠謂有嵗寒命趙云上句乃憤歎之語與文章憎達儒術誠難起同義下句言時已過矣則思隱於山林舊注謂嵗寒非是禮記時過而後學歸田賦曰揮翰墨以奮藻獻納紆皇眷中間謁紫宸殿名士趙云唐書李林甫傳載帝詔天下有一藝者得詣闕就選林甫恐士對詔斥已即建言士皆革茅未知禁忌徒以狂言亂聖聽請悉付尚書試問而無一中程者林甫因賀上以為野無留才今兩句鋪叙其赴闕就選之語西都賦序朝夕獻納紆者縈繫也紫宸殿在東內大明宮即內衙之正殿中間謁紫宸則未對詔間豈亦見帝乎且隨諸彥集江淹别賦金閨諸諺方覬薄才伸公獻三賦召試集賢院破膽遭前政隂謀獨秉鈞劉陶傳關東破膽詩秉國之均陳平曰我多隂謀道家所忌微生霑忌刻萬事益酸辛趙云謝靈運二三諸彥列子云薄於才而原於命言公之對詔意本望髙選而為林甫所沮故言破膽遭前政觀其言多士狂惑聖聽則為破膽矣後漢申屠剛傳衆賢破膽以隂謀秉鈞非林甫而何阮嗣宗詠懷云對酒不能言悲愴懷酸辛忌刻言林甫忌賢而慘刻也交合丹青地恩傾雨露辰有儒愁餓死早晚報平津交契在華顯之地又當沛澤下流之辰而愁餓死者以時有所不容也平津侯公孫𢎞開閣延賢人故其賔客抑衣食以喻鮮于趙云丹青地指言為公卿之地也鹽鐡論云公卿者神化之丹青此言交遊合聚於丹青之地而獨以餓死為愁所賴者在鮮于京兆如公孫洪爾贈特進汝陽王二十二韻趙云八哀詩太子太師汝陽王璡曰汝陽讓帝子而舊注又以此為棟三秩之子何自眩惑也此詩在八哀詩所贈之先蓋其特進時耳特進正二品而太子太師從一品也特進羣公表漢官儀曰諸侯功德優盛朝廷所敬異者錫位特進也天人夙德升邯戰淳見曹植才辨歸對其所知歎植之才謂之天人夙早也趙云詩羣公先正舜元德升聞霜蹄千里駿武帝謂劉德為千里駒師古曰言若駿馬可致千里風翮九霄鵬莊子鵬怒而飛其翼若垂天之雲摶扶搖而上者九萬里趙云莊子馬蹄可以踐霜雪服禮求毫髮左傳服於有禮社禝之衛推忠忘寢興趙云言其於禮無纎毫違背鮑照白頭吟毫髮一為瑕丘山不可勝詩載寢載興聖情常有眷朝退若無憑不挾貴也趙云而言聖情獨眷遇之王謙抑焉於朝退而若無憑恃其責也仙醴求浮蟻竒毛或賜鷹師古曰醴甘酒楚元王敬禮申公等穆生不嗜酒王每置酒常為穆生設醴曹子建浮蟻鼎沸酷烈馨香趙云以聖情之眷故神仙之醴則有浮蟻竒異之毛則有鷹皆賜之也釋名曰酒則泛齊浮蟻若萍前人集中有謝賜鷹表清關塵不雜中使日相乘會稽典録丁覽門無雜賔劉孝標論不雜風塵吳志朱然傳中使日食之物相望於道面趙云既有殊賜所以中官日相乘矣乘者一使已到又有一使乘駕其上也清關塵不雜則形容其門牆之深嚴國語云人神不雜易云剛柔相乘晚節嬉遊簡不以嬉遊為務也平居孝義稱自多親棣蕚友愛兄弟也云趙云鄒陽云晚節末路詩常棣之華蕚不韡韡哀今之人不如兄弟誰敢問山陵後漢東平王蒼傳帝欲為原陵蒼上疏諫帝從而止大趙云似言王之謙抑表陳其父憲宿素退讓不敢當號之意蓋明皇既追諡憲為讓皇帝乃號其墓為惠陵璡既辭其大號况敢望山陵之名乎舊注所引不相干學業醇儒富賈山涉獵書記不能為醇儒辭華哲匠能殷仲文詩哲匠感蕭辰筆飛鸞聳立章罷鳯鶱騰美其書翰也杜甫遺吳質答太子箋云發言抗論窮字理盡微摛藻下筆龍鸞之文奮矣趙云上句言其有回鸞之勢者下句言其文有鳯藻之華舊注皆指為書翰非也精理通談笑雖談笑皆精于理道張仲景有精理而無髙韻忘形向友朋不驕也寸長揕繾綣一作寸腸一諾豈驕矜趙云於人之寸長堪繾綣則待之以一諾豈更驕矜乎一作寸腸無義選宴語談笑左傳云慰我友朋莊子云寸有所長前漢不如得季布一諾左氏臧昭伯云繾綣從公而傳長虞贈何劭詩序有云願其繾綣而從之未由驕矜此起書云驕淫矜誇而潘嶽河陽縣作云害盈猶矜驕此倒用也已忝歸曹植何知對李膺趙云曹植為陳思王故以比汝陽王此公自言其身蓋曹植府中有七才子曰徐幹曰劉楨曰王粲之屬也對李膺則又以李膺比王而不敢以杜密自比蓋密與膺名各相次其前有李固杜喬號李杜是時人稱之亦曰李杜今蓋言已叨忝歸附於曹王又何敢謂己身姓杜欲配對姓李之汝陽王乎招要恩屢至崇重力難勝公自言雖蒙招要之恩而禮意崇重非力所能勝坐趙云選詩並相招要披霧初歡夕髙秋爽氣澄衛瓘見樂廣曰見此人瑩然若披霧而覩青天也子趙云梁簡文帝九日詩是節協陽數髙秋氣已清王猷云西山朝來致有爽氣樽罍臨極浦鳬雁宿張燈趙云設樽疊於浦溆之傍故鳬雁棲宿於張燈之內樽疊周禮尊皆有罍鳬詩弋鳬與雁皆摘文極浦選詩湘君歌云望涔湯兮極浦南史韋睿傳三更起張燈達曙師云謝宣威詩孤舟泊極浦花月窮遊宴炎天避鬱蒸猶河朔避暑之㑹趙云此義繼是春之花月與夏之避暑也劉希夷吳中少遊云芳洲花月夜選有不遑遊宴吳子夜四時歌鬱䒱仲暑月長嘯北湖邊淮南子云南方曰炎天顔延年夏夜云炎天方埃鬱硯寒金井水荆州記益陽有金井𢾗百古老傳金人以杖撞地輒便成井簷動玉壺氷鮑明逺清如玉壺氷趙云惟其避鬱䒱必置清涼之物於前故硯則寒金井之水而玉壺之氷輝動簷端也金并非一出處西征記太極殿上有金井又異物志廬陵城中井亦名金井其義則是金井水寒硯玉壺氷動簷句而法深穩當如此倒用也瓢飲惟三徑顔回一瓢飲蔣詡三徑巖栖在百層謝靈運詩栖巖挹飛泉杜補遺嵇叔夜絶交書曰堯舜之君世許由之巖栖張开友論曰黃綺引身巖栖南嶽晉堪方生也歡曰巖栖先生學道養生離親絶俗漱清泉䕃茂木慕赤松之清塵乃餐霞而絶穀趙云此公自言也舊注倒矣選賦云井幹疉而百層且持蠡測海况挹酒如澠東方朔曰以蠡測海左傳曰有酒如澠趙云挹字不可以挹酒漿之挹公自謙損言其窮約僻陋之人而得從王游如持一蠡測大海又况享有酒如澠水之多乎鴻寶寧全祕劉向傳上復興神仙方術之事而淮南王有枕中鴻寶苑祕書丹梯庶可陵謝𤣥暉敬亭山詩要欲逮竒趣即此陵丹梯淮王門下客終不愧孫登淮南王善屬之天下方術之士多往歸焉其趙云淮南王有枕中有鴻寶祕書今公以王既不祕書矣則可陵丹梯而遊仙府矣謝𤣥暉詩有游宦陵丹梯淮南王以比汝陽王孫登見嵇康而不許之曰君性烈而才巂其能免手其後康作幽憤詩曰昔慚栁下今愧孫登言以汝陽無鴻寶之祕由是得遂其養生不以嵇康之戮辱而有愧孫登也重經昭陵草昧英雄起屯難之時也謳歌厯數歸孟子謳歌者不謳歌堯之子而謳歌舜語天之厯數在汝躬隋趙云易屯卦天造草昧前漢英雄並劉琨厯𢾗有歸焬失德而李密蕭銑竇建德王世世充各據一方獨唐合命則厯類之歸謂也風塵三尺劔社漢髙紀上曰吾布衣提三尺以天下師古曰三尺劒也社禝一戎衣武城一戎衣而天下大定高趙云以漢髙祖周武王言祖也曹元首三代論漢祖奮三尺之劔庾信獻于皇祖文皇帝歌辭雖有曰終封三尺劔長卷一戎衣至公風塵社稷之語可謂開廣矣翼亮貞文德丕成戢武威書丕顯哉文王謨丕承哉武王烈使趙云此言太宗偃武用文也魏志髙堂隆上疏云可諸王君國典兵鎮撫皇畿翼亮帝室又晉卞壺委質三朝盡規翼亮任彥升作竟陵王行狀翼亮孝治緝熙中教書伊尹肆嗣王丕承基緒孔子云修文德以來之班固云威武者文德之輔助秦始王本紀刻石之辭有曰武威旁暢振動四極貞則易云天下之動貞夫一戢則左傳兵猶火也不戢將自焚此又無一字無來處矣聖圖天廣大無不覆燾也宗祀日光輝奕葉隆盛也曰趙云此却言後王之孝祀也宋徐爰言邦位今聖圖重造舊章畢新孝經曰宗祀文王於明堂易曰廣大配天地其上貼天字又宜矣淮南子曰光輝萬物而古有含英光揚輝上貼日字則前漢李尋傳日陽之長輝光所燭萬里同晷又於建都詩末句云願駐長安日光輝照北原陵寢盤空曲熊羆守翠微陵山陵寢陵廟古詩陵寢墓煙青趙云鮑照芙蓉賦繞金渠之空曲下句言兵衛之人如熊如羆屯守於翠微之際書有熊羆之士翠微祖爾雅山頂之名葱翠杳微之際取其至髙也再窺松柏路還見五雲飛天子有孝感則五雲見見往在詩注趙云曹植寡婦詩曰髙墳鬱兮巍巍松柏森兮成行謝靈運經廬陵王墓詩曰徂謝易永久松柏森已行可見陵寢矣孝經援神契曰王者德至山陵則慶雲出五雲者乃五色之慶雲也沈約宋書云慶雲五色是已鄭駙馬宅宴洞中主家隂洞細煙霧公主家幽洞也留客夏菌清琅玕江淹賦夏簟清兮晝不寐琅玕竹也杜補遺陶隱居云青琅玕蜀都賦所稱青珠是也乃崑山玉樹名又九真經中太丹名也唐本草琅玕有數種是琉璃之類火齊寶也且琅玕有五色青者為勝出嶲州以西蠻中及于闐國爾雅曰西北之美貴者有崑崙之山璆琳琅玕焉注狀如珠山海經曰崑崙山有琅玕樹其子似珠以珠為簟如琅玕色故云趙云琅琅玕寶樹名美物也故詩家多以比竹今言竹簟之美耳舊注作竹者既非是而杜由所引又竹青琅玕附㑹青者為勝之說今詩句義直是主家隂洞煙霧細留客夏簟琅玕清而句法深穩當言細煙霧清玕琅此又如硯寒金井水簷動玉壺氷春酒杯濃琥泊薄本草琥珀是千年茯苓所化言酒色如之杜補遺李肇國史補曰松脂入地千年所化今燒之亦作松氣開元時陳藏器注本草宋髙祖世寧州貢琥珀枕捶碎以賜兵士傳金瘡又云琥珀出罽賔國初如桃膠凝乃成焉趙云本言琥珀杯舊注以為酒色非是氷漿碗碧碼瑙寒陸機苦寒行渴飲堅氷漿杜補遺魏文帝碼瑙勒賦序碼瑙玉屬也出自西域文理交錯有似馬腦故其方人因以名之博雅曰水精謂之石英琉璃珊瑚玫瑰夜光隋侯琥珀金精璣珠也蜀石硬􅀈硨礫碼瑙碔砄瑰珸琘石瑊玏珂石次玉也神農本草云碼瑙紅色亦美石之類重寶也生西國玉石間來中國者皆以為器誤疑茅堂過江麓堂一作屋巳入風磴霾雲端陸士衡飛升躡雲端故趙云兩句言在富貴之家都城之地而有幽逸之興誤疑其人自已所結之茅屋過越江麓已深入風磴霾藏雲端之處也天師云鮑照銅山掘地精詩既類風磴復象井自是秦樓壓鄭谷時聞雜佩聲珊珊孔子入見衛靈公夫人南子自絺帷中再拜環珮之聲璆然真趙云此言主家本是秦女之樓而氣象幽邃壓鄭子之谷口矣雖其幽趣壓鄭谷而終自富貴故時聞佩聲也雜詩佩以贈之徑有拂墀聲之珊珊李監宅趙云按靈怪録李令問開元中為祕書監左遷集州長史令問好服玩飲饌以奢聞於天下其炙驢罌鵝之屬慘毒取味天下言飲饌者莫不祖述李監以為美談今公詩題李監宅而有異味重之句豈李監者乃李令問乎開元中左遷集州今豈自集州歸賦詩者尚從故稱乎尚覺王孫貴豪家意頗濃王孫王者之後亦相尊敬之稱韓信傳哀王孫趙云宋書恩幸傳論曰都縣椽吏並出毫家今李監蓋大富之家其姓李又是宗室之富者首句似言人之所貴重者莫過於王孫然尚覺王孫所貴慕豪家之意為最濃盛屏開金孔雀隋長孫晟貴盛常畫二孔雀於屏間以擇壻褥隱繡芙蓉趙云此言其富貴於屏畫孔雀亦富貴家常事舊注所引在隋書并北史並無之屏言開則崔融新體云屏幃幾處開又徐彥伯芳樹詩云金縷畫屏開吳均述夢詩云以親芙蓉褥而繡芙蓉出崔皓盧姫篇云魏王縷綺十二重水精簾箔繡芙蓉隱者蔽也如王維暮省隱花枝之隱且食雙魚美誰看異味重何敬祖食必四方珍異知趙云此微誚之也言我但食雙魚之美耳誰復顧其異味之多也古詩客從逺方來遺我雙鯉魚左傳云吾食指動必嘗異味門闌多喜色女壻近乘龍後漢明帝紀勞賜元氏門闌走卒薛云楚國先賢傳孫雋與李元禮俱娶太尉桓馬之女時人謂桓叔元兩女俱乘龍言得壻如龍也趙云今云近乘龍則公詩下字輕重可見舊注引門闌事是蓋明帝紀注引續漢志云五伯鈴下侍閣門闌部署街里走卒皆有程品多少隨所典領則門闌之品貴家方有之重題鄭氏東亭在新安界鮑云即駙馬鄭潛曜華亭入翠微爾雅釋山疏未及頂上在旁坡陀之處名之曰翠微也趙云左太冲蜀都賦云鬱葐蒀以以翠微注山氣之青縹者陸倕石闕銘上連翠微皆言其氣之狀入則亭勢欲入其閒秋日亂清輝謝靈運山水含清輝字趙云秋日之光亂山之輝也入字亂乃詩句之好處崩石欹山樹清漣曵水衣薛詩河水清且漣漪水成文曰漣趙云水水衣水上之青苔出說文而張景陽霖雨詩曰堂上水衣生選詩風斷隂山樹又云山中有桂樹紫鱗衝岸躍蒼隼護巢歸向晚尋征路殘雲傍馬飛趙云蜀都賦有鮮以紫鱗又云鏤甲紫鱗又有華魴躍鱗參用之也題張氏隱居二首春山無伴獨相求伐木丁丁山更幽師云宋王藉入若耶溪詩蟬㗚林逾靜鳥鳴山更幽丁趙云劉越石四言詩云獨坐無伴也詩伐木丁公今此句亦喧中有靜矣澗道餘寒厯氷雪石門斜日到林丘陸機苦寒行凝氷結重澗積雪被長巒謝惠連又有詩云落雪灑林丘趙云此在春時言之故首句言春山莊子肌膚若氷雪舊注合字非是也不貪夜識金銀氣史天官書敗軍破國之墟下積金寶上皆有氣不可不察以隱居不貪故夜識其氣象也逺害朝看麋鹿遊伍被諫淮南王曰昔子胥誎吳王吳王不用乃曰臣今見麋鹿遊姑蘇之臺也趙云古人有地鏡圖之書以觀地下之物曰黃金之氣赤黃銀之氣夜正白流散在地今言性雖不貪而能夜識金銀之氣舊注云不以貪故識非是相如子虛賦有錫碧金銀而郭純遊仙詩神仙排雲出但見金銀臺左傳傳我以不貪為寶傳云全身逺害麋鹿之遊本在山中人在山中則為逺市朝之害矣故得朝看麋鹿遊也乘興杳然迷出處言不以出處介意也對君疑是泛虛舟莊子山木篇方虛已濟於河有虛船來觸舟雖有褊心之人不怒人能以遊世孰能害之趙云公言其乘興而來欲出欲留杳然以迷蓋對張君如泛虛舟耳舊注却似指張隱居非是右一之子時相見邀人晚興留霽潭鱣發發詩碩人鱣鮪發發釋文鱣大魚口在頷下長二三丈江南呼為黃魚與鯉全異發發盛兒春草鹿呦呦呦呦鹿鳴食野之蘋注鹿得草呦呦然鳴而相呼也趙云之子出詩言此子也杜酒偏勞勸魏武帝樂府何以解我憂唯有杜康酒康造酒者張梨不外求潘安仁閒居賦張公大各之梨前村山路險歸醉每無愁趙云不外求言不必求之大谷也杜酒張梨以人著物言之此亦使字之一格須是當體穩貼又時復用之耳北齊幼主為無愁之曲自謂無愁天子右二天寶初南曹小司寇舅於我太夫人堂下纍土為山一簣盈尺以代彼朽木承諸焚香瓷甌亦甚安矣旁植慈竹蓋兹數峯嶔岑嬋娟宛有塵外格致乃不知興之所至而作是詩趙云周禮秋官司寇掌邦刑小司寇者刑官之二也今公小司冦舅則必為刑部侍郎土山上裁慈竹故云嶔岑嬋娟嶔岑言山前漢劉安招隱士詩嶔岑崎礒後漢仇池注引開山圖云積石嵯峨嶔岑隱阿嬋娟言竹楚辭䕃修竹之嬋娟一簣功盈尺論語譬如為山未成一簣注簣土籠也三峯意出羣猶華嶽之三峯也趙云今句實道土山之三峯而華山記有云其非三峯直上晴霽可覩則却有出處故對一簣舊注盈尺取盈尺之璧世說載殷中軍道韓太常曰伯少自標置居然是出羣器望中疑在野幽處欲生雲趙云詩君子在野又禮記在野則曰草莽之臣選河海生雲慈竹春隂覆香爐曉勢分廬山有香爐峯杜補遺陸機草木疏云竹漢南方生子母竹今慈竹是也又謂之孝章帝三年子母竹生白虎殿前謂之孝竹羣臣作孝竹頌此詩序云纍土為山代彼朽木承諸焚香瓷甌非謂廬山香爐峯也瓷趙云兩句並指實事下句言土山上承香甌其曉煙勢與春隂分也惟南將獻夀詩如南山之夀佳氣日氛氲趙云以土山之南便可當南山以獻太夫人之夀也字取詩惟南有箕宋顔延之七繹有云昵賔獻夀中人奉膳張正見芳樹詩春浮佳氣裏氛氲字祖出楚辭王逸注云氛氲盛兒而雪賦云氛氲蕭索也沈約芳樹詩云氛氲非一香龍門在洛陽之南逺望雙闕對峙如門然對趙云韋述東都記云龍門號雙闕與大內峙若天闕焉東都乃今之西京地志曰河南縣闕塞山一名伊闕而俗名龍門耳龍門橫野斷驛樹出城來趙云言驛樹則相近必有驛故下云相閲征人上宜乎有驛矣氣色皇居近東都也金銀佛寺開山有佛寺金碧照耀最為勝概趙云謝惠連西陵詩曰氣色久諧和孟浩然上張吏部詩神仙對氣色和又夕次蔡陽館詩章陵氣色微皇居近則言其大內也禰衡表曰帝室皇居佛寺則公古詩所謂遊龍門奉先寺也佛家謂其所居之莊嚴多言金銀七寶相如子虛賦有錫碧金銀郭璞詩但見金銀臺往還時屢改川水日悠哉相閲征塗上生涯盡幾回趙云列子有云入火往還選有趣走往還陸機云川閲水以成川選積水成川詩云悠哉悠哉末句蓋言在龍門閲視征行之人盡此生涯能幾回也生涯見莊子贈李白秋來相顧尚飄蓬潘安仁詩譬如野里蓬轉流隨風飄趙云庾信燕歌行千里飄蓬無復根舊注雖是而非字出未就丹砂愧葛洪趙云葛洪以交趾出丹砂求出為勾漏令時公有胄曹之命白以賀知章薦而特詔然公意以無益於身不若稚川為句漏令之能養生也痛飲狂歌空度日飛掦跋扈為誰雄跋扈强梁也質帝目梁冀曰此跋扈將軍也趙云北史齊髙歡謂其子曰侯景專制河南十四年常有跋扈飛揚之心飛揚之義如鷙鳥不受絆紲而飛去跋扈之義扈竹籬也每海水潮海上人於水潮至時先作竹籬以使魚之入潮水既退小魚獨留其大者跳跋籬扈而出飛揚跋扈皆強狼不臣之謂公意謂如吾輩痛飲狂歌亦空度日而巳如强狼之輩跋扈飛揚亦何所為而自雄皆不若句漏令之能養生為有益於身也與任城許主簿遊南池任城屬濟州秋水通溝洫城隅集小船晚凉看洗馬森木亂鳴蟬語卑宫室而盡力乎溝洫月趙云詩俟我乎城隅古有太子洗馬全有寒蟬鳴菱熟經時雨蒲荒八月天趙云蒲當八月未至於荒其荒者以經時之雨故然邪此范元實之說公詩有云風斷青蒲節霜埋翠竹根乃窮冬事也推此可見矣晨朝降白露遙憶舊青氈王獻卧齊中有偷人入室盜物都盡獻之徐曰偷兒青氈我家舊物可特置之偷人驚走趙云白露降則月令孟秋之候也承八月下言之則八月尤是有露登兖州城樓東郡趨庭日兖州漢之東郡也南樓縱目初趙云公在夔峽賦熱時有云何似兒童嵗風涼出舞雩則小年在兖州矣意者公之父為官於兖而公隨侍乃若鯉趨而過庭耳今此當壯年為布衣時再遊兖縱目初則追兒童時耳其下數句皆縱目事末句又言臨眺則今再臨眺也浮雲連海岱平野入青徐書禹貢曰海岱惟青州又海岱及淮徐州趙云海岱是兩字東海與岱宗也對青徐此言縱目之景物其開廣如此孤嶂秦碑在秦本紀始皇東行郡縣上鄒嶧山與諸生刻石頌德李斯作文荒城魯殿餘王文考魯靈光殿賦序云恭王餘之所立遭漢中微未央建章之殿皆見隳壞而靈光巋然獨存從來多古意臨眺獨躊躇趙云秦碑謂秦山上刻所立石之辭此兩句則想像之而已斷句所以結秦碑魯殿為古意自趨庭日至今為從來矣劉九法曹鄭瑕丘石門宴集趙云瑕丘縣名鄭知縣來而劉宴之也秋水清無底蕭然靜客心趙云上句雖實事而無底字專出列子載海之東有無底之谷沈休文詩題有新安江水至清淺深見底又挨傍而翻用於字為典實師云謝宣城詩江月清無底椽曹乘逸興漢制以曹宦為椽如屋之椽也言有所負荷鞍馬去相尋趙云别作到荒林舊本作去相尋則荒林方成對且二君之宴公在其間所以賦詩無專言劉尋鄭之義此蓋劉為主人也鮑明逺鞍馬光照地能吏逢聯璧華筵直一金潘嶽夏侯湛每同行人以為連璧趙云能吏指二公也直一金字亦挨傍古人云此劔直百金又壺直百金者也班彪符命論飢寒道路所願不過一金王導傳導與朝賢俱制練布端衣於是士人翕然競服練遂踴貴端至一金晚來橫吹好泓下亦龍吟馬融長笛賦近世雙笛從起羌人伐竹竹未及已龍鳴水中不見已截竹吹之聲相似也杜補遺後漢班超飯鼓吹注古今樂録曰橫吹胡樂張騫自西域傳其法於長安唯得摩訶兜勒一曲李延年因之更造新聲二十八解乘興以為武樂後漢以給邊將趙云橫吹好則當似龍吟矣所以感龍吟於泓下以應之也橫吹雖云胡樂縱非笛而别是一物公今只是借字以言橫笛耳暫如臨邑至㟙山湖亭奉懷李員外率爾成興趙云臨邑縣屬齊州㟙玉篇助麥或曰㟙山湖即鵲山湖非也地志云齊州治厯城城縣東門外十步有厯水鵲山湖今公云如臨邑至㟙山湖按本朝王存九城志臨邑去州北百四十里而㟙字之音又鵲不同則所謂㟙山湖又别湖之名野亭逼湖水歇馬髙林間鼉吼風奔浪鼉吼則風起魚跳日映山日暖魚跳躍也當趙云鼉吼在有風而浪起之時魚跳日暖映山之時也暫遊阻詞伯却望懷青關趙云詞伯指李員外矣王充論衡文詞之伯也李應在青關故回望靄靄生雲霧唯應促駕還促駕猶速駕也當趙云此言景物之可愁矣故速駕而返九家集注杜詩卷十七
