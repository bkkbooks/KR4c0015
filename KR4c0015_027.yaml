body:
  text: 九家集注杜詩巻二十七宋郭知達編近體詩去蜀五載客蜀郡一年歸梓州如何闗塞阻轉作瀟湘逰萬事已黄髪殘生隨白鷗毛詩黄髪兒齒安危大臣在何必淚長流漢陸賈曰天下安注意相天下危注意将放船收帆下急水巻幔逐囘灘江市戎戎暗山雲淰淰寒荒村無徑入獨鳥恠人㸔已泊城樓底何曾夜色䦨哭嚴僕射歸櫬趙云嚴公再尹成都乃封鄭國公加檢校吏部尚書永泰元年四月卒贈尚書左僕射素幔遂流水歸舟返舊京舊京故國也隨趙云歸櫬舟行故曰素幔流水盧子諒贈崔温詩北眺沙漠隨南望舊京路老親如一作知宿昔部曲異平生按新史武卒母哭且曰今而後吾知免為官婢矣又云言部曲有異于存日也宋鮑照東武吟将軍既即世部曲亦罕存後漢光武注大将軍營有五部三校尉部下有曲曲下有軍侯一人趙云言嚴公有母在弃之而去其母之健尚如宿昔耳公既死部曲無主宜乎異平生也馮衍荅任武書曰敢不陳露宿昔之意故對平生字則論語久要不忘平生之言風送蛟龍雨見上蛟龍得雲雨注天長驃騎營晉書齊獻王攸遷縹騎将軍時驃騎當罷營兵數十人戀攸恩徳不肯去蛟龍以譬嚴公一哀三峡暮遺後見君情趙云言悲哀之極而江山亦為之動色所以遺傳于後世者見嚴公有恩徳于公之情如此也宴戎州揚使君東樓勝絶驚身老情忘發興竒趙云此篇破頭便對盖言勝雖絶矣而驚見在之身則老也情雖忘矣而發所對之興則竒也禮記云忘身之老也鮑照園中秋㪚詩云臨歌不知調發興誰與歡坐從歌妓密樂任主人為語云不圖為樂之至扵斯也重碧拈一作酟春酒輕紅劈荔枝曺子建七啓蒼梧縹清注縹深碧色蜀都賦旁挺龍目側生荔枝趙云舊本拈春酒作酤字非今就其字誤而言之酤當與論語沽酒市餔之沽同又按詩伐木篇有酒湑我無酒酤我按毛鄭解此兩句不同毛云湑莤音所六切泲之也酤一宿酒也其謂有酒則湏泲莤使清而後飲無酒則雖一宿未清者亦飲乃王之厚意也鄭云酤買也王有酒則泲莤之王無酒則沽買之其意以為族人陳王之恩厚於我曺雖以侈言王之盛意然豈有天子而沽酒乎詩人必不如此窮相此鄭之失也今杜公詩之酤字若用毛萇一宿曰酤言之則不成詩句用鄭元酟買言之二千石設筵必有公帑豈亦沽酒乎舊本作拈當以為正據元禛元日詩云羞看稚子先拈酒白樂天嵗假詩云嵗酒先拈辭不得則拈酒乃唐人語也又杜公又云門外柔桑葉可拈又云試拈秃筆掃驊騮亦拈之意拈與擘皆在主及賓身上言之詩云為此春酒以介睂夀荔枝見于上林賦食荔枝而飲春酒盖煮酒也謂之重碧以酒之色言之也輕紅亦言茘枝之顔色也其後山谷在戎州有詩云試傾一盃重碧色快剥千顆輕紅肌觀此則可見杜公重碧輕紅之義後學又以重碧輕紅為二妾名尤可鄙笑豈不見梁簡文帝梁塵詩云依幃濛重翠帶日聚輕紅輕紅為荔枝膜粉紅也若以名其包色則又惑誤學者輕師云戎州今叙州重碧叙州公庫酒名紅叙州倅園荔子名樓高欲愁思横笛未休吹趙云樓高而愁思欲生何横笛之未肯罷休以增愁也公月夜憶舍弟云况乃未休兵與此句法同渝州候嚴六侍御不到先下峽聞道乘驄發沙邉待至今趙云後漢桓典為侍御史有威名常乘驄馬人號為驄馬御史不知雲雨㪚宋玉高唐賦湫兮如風凄兮如雨風止雨霖雲無處所王粲詩曰風流雲㪚一别如雨雨趙云隋江揔别袁昌詩不言雨㪚更似東西流虚費短長吟古詩有短長吟山帶烏蠻濶嶲州西有烏白蠻江連白帝深公孫述以永安為帝城在䕫州之側船輕一柱過留眼共登臨留眼一作留滯梁劉孝綽江津寄劉之遴經過一柱觀出入三休臺餘見上巻江通一柱觀注聞高常侍亡忠州作鮑云高適也本傳紀廣徳元年後言召為刑部侍郎左㪚騎常侍歸朝不相見蜀使忽傳亡虚厯金華省何殊地下郎江淹上建平王書升降承眀之闕出入金華之殿世説顔曰為地下修文郎趙云班固叙傳鄭寛中張禹入說尚書論語扵金華殿注在未央宫適為左㪚騎常侍而亡故曰虗厯金華省也王隐晉書載蘓韶已死見其弟節韶云顔囘卜商今為地下修文郎韶亦一人也致君丹檻折哭友白雲長趙云折楹言高之諫諍也觀唐史載適遷侍御史擢諫議大夫負氣敢言權近側目致君見首篇注朱雲上書願請尚方斬馬劒㫁倿臣一人上問誰也對曰安昌侯張禹上大怒御史将雲下雲攀殿檻檻折雲呼曰臣得下從龍逢比干逰於天下足矣未知聖朝何如耳禮記曰朋友哭于寝門之外獨歩詩名在秪令故舊傷適有詩名于時又曺子建與楊徳祖書曰僕少好文章迄至于今二十五然今世作者可略而言昔仲宣獨歩于漢南孔璋鷹揚于河朔又南史王筠字元禮沈約謂筠文章之美可謂後来獨歩秪字音支適也宴忠州使君姪宅出守吾家姪出守守土也刺史是也古詩一麾乃出守殊方此日歡文子云殊方偏國自須逰阮舍既咸與叔父藉為竹林之逰咸與藉居道南諸阮居道北北阮富而南阮貧公自比阮藉而目中州為阮咸也不是怕湖灘中州下惡灘也樂助長歌逸一作送杯饒旅思寛一作林饒放思寛昔曾如意舞牽率悵為㸔趙云王戎嘗以如意起舞左氏傳牽率老夫禹廟忠州作禹廟空山裏秋風落日斜荒庭垂橘柚古屋畫龍蛇招魂仰觀刻桶畫龍蛇山趙云書禹貢厥包橘柚錫貢公於東屯茅屋詩有云險風煙僻天寒橘柚垂而両句之勢則盧照隣文翁􅊰堂詩云空梁無鷰雀古壁有丹青也雲氣生虚壁一作嘘青壁江聲走白沙趙云生虚壁當作嘘青壁字為正盖嘘字新且工矣又青壁對白沙亦工早知乗四載按史記河渠書云夏書曰禹治洪水十三年三過家不入門陸行載車水行載舟泥行蹈撬山行即橋橋一作輦書益稷曰予乗四載䟽鑿一作流落控三巴華陽國志曰武王克商封其子宗姫于巴故漢末益州牧劉璋以墊江以上為巴郡江州至臨江為永郡郡朐忍至魚腹為固陵郡巴遂分矣璋復改永寧為巴郡以固陵為巴東徙龐義為巴西太守自為三巴郭璞江賦巴東之峽夏后䟽鑿趙云今按樂史寰宇記於渝州記云閬自二水東南流三曲如巴字是為三巴則非有分其地之定名當俟博聞訂之題忠州龍興寺所居院壁忠州三峽内蜀都賦經三峽之峥嶸注三峽巴東永安縣有髙山相對去可二十丈文左右崖甚高人謂之峽江水過其中為趙云杜公言三峽者以明月峽為首巴峽巫峽之類中東突峽為矣今忠州在渝州之下䕫州之上斯乃杜公所謂三峡内也井邑聚雲根趙云雲根言石也張恊詩雲根臨八極盖取五岳之雲觸石而出則石者雲之根也唐人詩多指雲根為石用之小市常争米孤城早閉門趙云兩句雖實道其事而早閉門字戰國䇿有邉境早閉晚開也空㸔過客淚莫覔主人恩趙云公寓僧寺居而無顧之者故有是句淹泊仍愁虎深居頼獨園金剛經給孤獨園寺趙云言淹泊則滯㽞扵龍興之居也旅夜書懐細草㣲風岸危檣獨夜舟趙云細草春時也荀子㣲風過之王仲宣詩獨夜不能寐星垂平野濶月湧大江流王仲宣大江流日夜分趙云東方璆嘗與盧照隣韻有汹湧大江流公換一一月字㸃鐡成金矣名豈文章著官因老病休飄零何所似天地一沙鷗趙云飄零字公使多矣雪賦從風飄零在人言之取物為譬也謝安内集謂諸子姪曰白雪紛紛何所似别常徵君兒扶猶杖䇿卧病一秋强趙云呉越春秋云太王杖䇿而去邠字書注細木杖曰䇿白髪少新洗寒衣寛揔長趙云白髪以病而少新洗沐也寒衣以病而寛長也曺子建詩云瘦覺衣寛長愁知酒淺淡故人憂見及此别淚相忘趙云故人言常徵君也雖别而俱不能淚所以成相忘也各逐萍流轉來書細作行趙云属其委曲也漢書言細書成成一扎十行十二月一日三首今朝臘月春意動雲安縣前江可憐一聲何處送書雁百丈誰家上水船趙云百丈牽船蔑内地謂之笪音弹未将梅蕊驚愁眼要取楸花媚逺天趙云言眼前寔事盖梅未開而楸有花也其句法可謂新竒矣明光起草人所羡肺病幾時朝日邉明光殿名也漢王商欲借以避暑者起草作制誥也相如病肺多渇遂卧病于茂陵令趙云後漢書郎奏事明光殿下筆為詔誥出語為命日邉言帝都也晋明帝云只聞人自長安来不聞人從日邊來後人遂以日邉為帝都右一寒輕市上山煙碧日滿楼前江霧黄負塩出井此溪女打鼔發船何郡郎新亭舉目風景切茂陵著書消渴長趙云晋王導傳洛京傾覆中州士人避亂江左者十六七每至暇日邀出新亭飲宴周顗中坐而嘆曰風景不殊舉目有江山之異上句以避亂流落所寓如新亭之景物茂陵則公自比于相如之有肺疾也春花不愁不爛熳楚客唯聴棹相将趙云楚客則公自指為楚地之客也聴棹相将則任船所徃何處看花也右二即㸔燕子入山扉豈有黄鸎厯翠㣲短短桃花臨水岸輕輕栁絮㸃人衣趙云方十二月一日作詩而有燕子黄鸎桃花桞絮之言何也此義在末句他日一杯難强進也皆逆道其事爾春來久擬開懐乆老去親知見靣稀他日一杯難强進重嗟筋力故山違趙云于山謂之違家語孔子云違山十里猶聞蟪蛄聲也右三又雪南雪不到地風土記云南方無雪青崖霑一作露未消趙云當作霑為正但雲不濃所以不到地而止着青崖爾顔延年詩藐盻覯青崖衍漾觀緑疇㣲微向日薄脈脈去人遥冬熱鴛鴦病峽深豺虎驕愁邉有江水焉得北之朝趙云末句盖言當愁之際觀江水止是朝東入海安得折而之北我乘此水以歸長安也奉漢中王手札國有乾坤大王今叔父尊王譲皇帝之子代宗之叔父也剖符來蜀道言以漢中之封來蜀作守也前有詩公自注云王時在梓州者乎歸盖取荆門由荆門軍取道而徃也峽險通舟過江長注海門書江漢朝宗於海亦百川注海之義也主人留上客避暑得名園劉松袁紹于河朔三伏之際為避暑之飲前後緘書報分明饌玉恩趙云上句言得漢中王手札饌玉則前漢陳咸奢侈玉食晉王父子鮮衣玉食之義言美食如玉却非洪範惟辟玉食也天雲浮絶壁風竹在華軒趙云觀絶壁之天雲對華軒之風竹言在名園中如此也已覺良宵永何堪駭浪翻趙云上句言時已秋矣秋江浪平故也海賦驚浪雷奔駭水迸集入期朱邸雪朝傍紫㣲垣唐制諸侯各置邸京師故有邸吏朱邸言邸有朱戸蓬趙云以雪時為期而至京也謝元暉詩朱邸方開效心於秋實晉書紫宫垣一曰紫㣲大帝之座天子所居也枚乘文章老河間禮樂存西京雜記枚乘文章敏疾長卿制作淹遲皆盡一時之譽又按漢書景十三王河間獻王徳武帝時來朝獻雅樂又云立博士修禮樂被儒服術年趙云上句公自言也梁孝王時枚乘在諸文士之間最為高故謝靈運雪賦召鄒生延枚叟也次句指漢中王也傳曰河間之功江夏之略可為宗室標的者也悲秋宋玉宅哀江南賦誅茅宋玉之宅宋玉九辨云悲哉秋之為氣也蕭瑟兮草木揺落而變衰趙云宋玉宅在歸州言王今在歸州又如悲秋之宋玉也失路武陵源見上如逢武陵路注淹薄俱崖口東西異石根趙云崖口石根言巴峽之地如此漢中王在下流為東公在䕫為西也夷夷音迷咫尺鬼物傍一作倚黄昏楚俗語言多夷音又蕪城賦木魅山鬼昏見晨趨趙云上句則䕫之南與蠻相接不為不逺而䕫巴有蠻音故公詩屢有夷音蠻語蠻歌之句左傳天威不違顔咫尺言近也今言在䕫于咫尺之間語音不同所以不省而迷也下句一作傍當以倚為正史云妖禽孽孤得夜乃為不祥此倚黄昏之義也犬馬誠為戀狐狸不足論曺子建表不勝犬馬戀主之情張綱傳豺狼當道安問狐狸趙云言其有懐君之意也從容草奏罷宿昔奉清罇趙云此言漢中王草奏既罷當奉飲宴盖在昔日常如此也梁劉苞望夕雨詩曰清罇乆不荐淹留遂侍君贈崔十三評事公輔飄颻西極馬漢郊士歌天馬來自西極來自渥洼池趙云以言崔有天馬之妙足而所從來之逺也渥洼池見沙馬行注颯飁寒一作定山桂低徊風兩枝趙云當作寒山楚辭云桂樹叢生兮山之幽選詩桂枝生自直則桂枝不宜低徊今桂所以低徊者風雨之故也以喻崔評事之美材而用于邉㣲之小官飄音習唐韻云颯飁大風也此四句長扇對我聞龍正直道屈爾何為趙云崔如龍之直而屈在幕府僚屬故公怪而問之詩好是正直且有元戎命悲歌識者知趙云元戎莭度史也以元戎命之而有行役不能無悲歌惟識者知之官聨辭冗長文賦固無取乎冗長辭趙云崔評事于元戎之僚属可冗長矣行路洗歌危當開公正之路之趙云以舟行則免欹危苦也脫劒主人贈季札脫劒挂樹以贈徐君常趙云主人指元戎也解劒贈人亦理之如伍子胥解劒以贈漁父舊注非是去㠶春色隨隂沈鐡鳳闕陸左公石闕銘蒼龍𤣥武之制銅雀鐡鳳之工趙云鐡鳳闕言帝都也教練羽林兒宣帝紀羽林孤兒注天有羽林星林喻若林木之盛羽言羽翼鷙撃之意故以名武官焉百官表取従軍死事者之子養羽林官教以五兵號曰羽林孤兒天子朝侵早雲臺杖數移趙云言天子多難其朝侵早以訓兵練卒故所御非一處而數移雲臺之仗也光武圖二十八将于雲臺分軍應供給百姓日支離支離言不親也黠吏因封已公才或守雌老子知其雄守其雌趙云封厚也盖言貪吏乗之以封植其已亷吏閔之而柔克公正美崔公之才守雌柔之道不乘勢利剥以私于封已則為可尚爾黠吏字出前漢詔書國語叔向曰引党以封已晋王尊謂孔愉有公才而無公望燕王買駿骨燕昭王以千金市駿骨渭老得熊羆見田臘舊非熊又見熊羆載吕望注活國名公在拜壇群冦疑孫楚曰愛民活國高祖築壇拜韓信氷壺動瑶碧鮑照詩清如玉壺氷野水失蛟螭趙云上句以言元戎胷中如氷壺之清下句則蛟龍得雲雨終非池中物也入幕諸彦聚入幕見上句别賦金閨之諸彦渇賢髙選宜騫騰坐可致九萬起于斯趙云方當渇賢而崔君宜應高選必能騫騰如鵬之九萬里矣復進出矛㦸照然開鼎彛趙云言崔君而復于此而出具胸中之矛㦸則昭然銘功於鼎彛也㑹㸔之子貴歎及老夫衰左傳老父耄矣無能為也詩江有沱之子歸豈但江曾決孟子沛然若決江河還思霧一披衛瓘見樂廣曰若披雲霧而上青天一趙云豈時平時與崔相談論如江河之决又思披霧以相見也暗塵生古鏡拂匣照西施趙云公盖自有其有美質而乆無識者此所以美崔君而責望之也舅氏多人物無慚困翮垂趙云舅氏之家多有人材必應如上所言騫騰冨貴之事也今日尚爾行役無慚困苦也崔盖公之表弟長江二首衆水㑹涪萬涪萬峽中二郡名瞿唐争一門瞿唐為三峽之門朝宗人共挹盜賊爾誰尊趙云禹貢江漢朝宗於海水以其朝宗人共挹取若盜賊者敢有犯順之為将欲使誰尊爾乎孤石隐如馬高蘿垂飲猿張華詩象馬誠可驗波神亦露機盖言灔澦如馬瞿唐莫下也歸心異波浪何事即飛翻趙云言水之波飛翻而流去歸心未便得徃何事即效其飛翻乎其二浩浩終不息乃知東極臨一作深于趙云言水之萬折深東至三峽則其來已逺可以知東極将逼臨也衆流歸海意萬國奉君心衆流之所以尊海亦萬國之所以奉君之心也色借瀟湘濶趙云瀟湘在潭州三峽之水下入洞庭與瀟湘相連故云色借聲驅灔澦深一作沈未辭添霧雨趙云江海不讓衆流以為大雖霧雨之細亦可以益其流接上遇一作過衣襟趙云舟中之人接于其上則先經過于衣襟間也此必是㣲雨而作實道其事耳選詩曰露沾衣襟哭台州鄭司戸蘓少監故舊誰憐我平生鄭與蘓存亡不重見喪亂獨前途豪俊何人在文章掃地無羇逰萬里濶凶問一年俱白日中原上清秋大海隅夜臺當北斗泉路著東吳得罪台州去時危弃碩儒移官蓬閣後榖貴沒潜夫王符著潜夫論流慟嗟何及銜寃有是夫道消詩發興心息酒為徒許與才雖薄追隨跡未拘班揚名甚盛嵇阮逸相須㑹取君臣合寧詮品命殊賢良不必展廊廟偶然趨勝决風塵際功安造化鑪從容詢舊學惨淡閟隂符擺落嫌疑乆哀傷志力輸俗依綿谷異客對雪山孤童稚思諸子交期列友于詩友于兄弟情乖清酒送望絶撫墳呼瘧痢飱巴水瘡痍老蜀都飄零迷哭處天地日榛蕪承聞故房相公靈櫬自閬州啓殯歸葬東都有作二首趙云房琯摘漢州刺史召而死于道贈太尉逺聞房太尉舊作太守歸葬陸渾山山在伊洛間昔辛有適伊川見披髮而祭者言此地當夷後為陸渾之戎所有因得名一徳興王後孤魂乆客間同徳以舉王業也伊尹咸有一徳下句言房公摘死乆殯闌州孔明多故事蜀志陳夀與荀朂等定故蜀丞相諸葛孔明故事二十四篇以進安石竟崇班謝安薨時六十六帝三日臨于朝堂賜秘噐朝服贈太傅諡曰文靖及𦵏加殊禮依大司馬柏温故事他日嘉陵涕一作淚仍霑椘水還趙云靈襯自閬州起發則由嘉陵江而下故也右一丹旐飛飛日丹旐銘旌也寡婦賦飛旐翩以啓路初傳發閬州風塵終不解江漢忽同流趙云時吐蕃未息也盖靈櫬所經自江漢而下故曰同流劒動新身匣趙云師本作親身方有義書歸故國楼盡哀知有處為客恐長休趙云公因聞房公靈櫬之歸有感于中而發此言也右二雲安九日鄭十八擕酒陪諸公宴寒花開已盡萄蕋獨盈枝趙云凡及秋之花皆謂之寒花也舊摘人頻異輕香酒暫隨趙云言舊時採菊花之人頻改易上句而不同見公所逢九日之地不一也地偏初衣裌陶潛心逺地自偏秋興賦御裌衣山擁更登危風俗記九日登高以禳災萬國皆戎馬酣歌涙欲垂答鄭十七郎一絶雨後過畦潤花殘步履遲把文驚小陸雲間陸士龍好客見當時將曉二首石城除擊柝趙云撃柝以言驚夜曉則除之鐵鏁欲開関鼓角悲荒塞星河落曙山巴人常小梗謂段子璋反也駭趙云謂之小梗亦不甚稱也史不載舊注非是蜀使動無還趙云吐畨未息所以蜀使無還也垂老孤㠶色飄颻犯白蠻趙云末句白蠻亦以荆地靠溪洞一帶為蠻矣舊作百蠻非右一軍吏囘官燭官燭字見上句舟人自楚歌項籍聞軍中四靣皆楚歌寒沙䝉薄霧落月去清波趙云天曉月落不復有影在水中壮惜身名晚衰慙應接多歸朝日簮笏筋力定如何趙云四句公自言其衰老也歸朝日事簮笏恐筋力之不堪爾右二懷錦水居止二首軍旅西征僻風塵戰伐多趙云永㤗元年僕固懐恩誘吐蕃等冦奉天京師大震帝自将苑中急召郭子儀屯涇陽故云西征猶一作獨聞蜀父老司馬相如有難蜀父老文不忘舜謳歌孟子曰謳歌者不謳歌堯之子而謳歌舜天險終難立劍門天設之險也無徒不可恃易趙云憂吐蕃能犯蜀之險也曰天險不可升柴門豈重過謂思草堂不可再到朝朝巫峽水逺逗錦江波錦江水與巫峽相通也相趙云重懐成都之意水徒通而不能即返焉其二萬里橋西宅百花潭北荘浣花草堂在萬里橋西地有百花潭趙云舊本作橋南非是公詩萬里橋西一草堂百花潭北即滄浪層軒皆靣水宋玉招魂云高堂䆳宇幽檻層軒老樹飽經霜趙云四時纂要冬𤓰飽霜後收之梁吳筠行路難曰洞庭水上一株桐經霜觸浪困嚴風雪嶺吐蕃中山界天白錦城曛日黄曛日晚日也惜哉形勝地囘首一茫茫張孟陽劒閣銘曰形勝之地匪親勿居歎趙云以西山尚有屯戍恐蜀受其禍故惜形勝之地而不忘于懐也子規趙云子規與杜鵑是両種其形聲名不同於杜鵑行古詩注言之詳矣峡裏雲安縣江楼翼瓦齊兩邉山木合終日子規啼子規杜鵑也公有杜鵑行云涪萬無杜鵑雲安有杜鵑此可見矣坡云非親到其處不知此詩之工也眇眇春風見蕭蕭夜色凄一作棲客愁那聴此故作傍人低一云故傍旅人低此四句道盡子規之妙毎于春風眇眇之之際夜色蕭蕭之時客愁聞此能不悲感耶故傍旅人低之句非既有客愁字不應更言旅人也立春春日春盤細生菜忽憶兩京梅發時趙云食生菜立春之事也按齊人月令曰凡立春日食生菜不可過多取迎新之意下句則立春在去年之冬當梅發時也兩京東京西京也盤出高門行白玉菜傳纎手送青絲趙云于公高門也行白玉行玉盤也公吟廢畦詩亦曰悲君白玉盤行則如麗人行水精之盤行素鱗也晉成公綏洛禊賦或振纎手或濯素足此上四句之一段古詩云蘆菔白玉縷生菜青絲盤巫峽寒江那對眼杜陵逺客不勝悲趙云言巫峽傍江地土寒眼前不見此菜宜乎其悲矣此身未知歸定處呼兒覔紙一題詩古詩呼童烹鯉魚漫成江月去人只數尺風燈照夜欲三更趙云嘗聞士大夫云東坡先生有言杜子美江月去人只數尺不若孟浩然江清月自人之不費力此公論不可廢也梁虞騫詩曰月光移數尺沙頭宿鷺聨拳静一作起船尾跳魚撥一作䟦剌鳴撥刺躍而有聲也封薛云按漢書張平子賦控飛狐之撥剌兮嶓塚之狼趙云聨拳相並相續之貌字則沈約郊居賦云雌霓聨拳用對撥剌為稱弓杜補遺云張衡賦撥刺下注云刺音力達反撥剌張聲李白酬贈魚詩亦云雙鰓呀呷鰭鬛張䟦剌銀盤欲飛去一作鱍鯻南楚南楚青春異暄寒早早分趙云公在䕫而言南楚則䕫在戰國為楚地寒而暄生矣無名江上草隨意嶺頭雲正月蜂相見非時鳥共聞趙云易萬物皆相見而公于蜂言之句意兩新杖藜方躍馬不是故離羣趙云躍馬則言官身而在諸人之間則必騎馬今也杖藜而獨徃乃放曠使然不是故為離羣也荘子原憲藜杖應門蔡澤曰吾躍馬食肉四十年亦足矣禮記云離羣索居移居䕫州郭伏枕雲安縣遷居白帝城春知催桞别江與一作已放船清趙云言春知人之離居故催桞之發生以供行人為别也詩家于相别必用桞事盖古有折楊桞之曲多言離别也下句言春江清且平供其泛船耳農事聞人説山光見鳥情禹功饒㫁石且就土㣲平㳂峽皆因開鑿而成故少平土惟䕫州稍平耳左傳劉子歎禹之功江文通雜擬云海濱饒竒石船下䕫州郭宿雨濕不得上岸别王二十判官依沙宿舸船石瀬月娟娟謝靈運有回溪石瀬茂林修竹詩鮑照翫月娟娟似蛾眉風起春燈亂江鳴夜雨懸晨鐘雲外濕勝地石堂煙趙云石堂應是䕫州佳處空望其煙故題中所謂不得上岸也柔櫓輕鷗外含情覺汝賢趙云柔櫓令舟人所謂欵櫓者也言船櫓在輕鷗之外怱怱隨行不得如鷗之㳺漾所以含情覺鷗之勝己也書曰不自滿假惟汝賢入宅三首奔峭背赤甲㫁岸當白塩謝靈運詩孤客傷逝湍行旅苦奔峭赤甲白塩瞿唐峽口二山名云趙云赤甲本呷字按水經云江水東南經赤岬西注是公孫述所造因山據勢周㢠七里一百四十歩東高二百丈西北髙一千丈南連白帝山甚高大不生樹木其石悉赤故名又云江水又東經廣溪峽江云斯乃三峽之首也其間三千里傾巖倚木厥勢殆交北岸山上有神淵淵北有白塩虚髙可千餘丈土人見其高白故名之客居媿遷次春酒漸多添次舍也猶遷居也左傳几師一宿為舍再宿為信過信為次何趙云樂昌公主詩今日遷次花亞欲移竹鳥窺新捲簾衰年不敢問勝槩欲相兼右一亂後居難定春歸客未還趙云言又見春矣以居止言不定而尚未還故鄉有所感發耳水生魚復浦雲暖麝香山魚復白帝舊名杜補遺云後漢郡國志巴郡魚復古之庸地左氏文十年魚人逐楚師是也䕫州圖經麝香山在州東南百二十五里以其出麝香故名半頂梳頭白趙云白髪之所存者僅半頂耳過睂挂杖斑相㸔多使者一一問函闗右二宋玉歸州宅雲通白帝城歸州有宋玉宅今亡矣下句見白帝城樓詩注吾人淹老病旅食豈才名趙云漢宣帝歌白泛濫不止兮愁吾人故對旅食其字則祖魏文帝旅食而館也吾人乃自言也所以淹老病而旅食豈坐才名之故耶峽口風常急江流氣不平趙云以風急之故江流之汹湧如人之氣不平也只應與兒子飄轉任浮生右三赤甲卜居赤甲遷居新兩見巫山楚水春炙背可以獻天子美芹由來知野人嵇康書野人有快炙背而美芹子者欲獻之至尊雖區區區之意亦已疎矣狐趙云列子宋國有田夫自曝予日不知天下有綿纊貉謂其妻曰負日之暄人莫知者以獻吾君将有重賞里之富室告之曰昔人有美戎菽甘枲莖芹萍子者對鄉豪稱之鄉豪取而嘗之蜇于口慘于腹衆哂而怨之其人大慙荆州鄭薛寄詩近蜀客郄岑非我鄰四人者皆公之故舊鄭趙云四人者鄭監者岑参公䕫州咏懐詩題云奉寄監審詩注云鄭在江陵所以寄詩近岑参作嘉州刺史所以謂之蜀客其二人不敢妄考笑接郎中評事飲病從深酌道吾真趙云評事則崔評事也郎中未有所考道吾真則以吾為真率也上白帝城二首江城含變態一上一囘新朝暮雲煙變化態度多端也楚辭思美人篇曰觀南人之變態天欲今朝雨山歸萬古春趙云公思歸字有二義一則歸至之歸如春從沙際歸是也一則歸徃之歸如春歸何去尋是也英雄餘事業白帝城公孫述所築後為劉備屯戍之地改名曰永安號趙云言䧺指言白帝也公孫述自白帝築為此城衰邁乆風塵公自言也取醉他鄉客相逢故國人兵戈猶擁蜀賦歛强輸秦上句謂段子璋之徒未靖也崔趙云言崔旴之亂也永㤗元年閏十月劒南兵馬使旴反殺其将郭英又明年張獻誠及崔旴戰扵梓州敗績斯為兵戈擁蜀也下句謂國用不足多賦歛耳不是煩形勝深慙畏損神趙云張孟陽劒閣銘云地之形勝匪親勿居意則以不是惮煩此地之形勝而難上以兵戈猶在畏懼而損吾之神爾右一白帝空祠廟孤雲自徃來舊注公孫述廟在白帝城江山城宛轉棟宇客徘徊趙云此篇甚明言江山之間其城宛轉棟宇之下客于此徘徊也句法可謂新竒矣勇略今何在當年亦壮哉言述始為王莽導江卒正更始時起兵討宗成王岑之亂破之遂有蜀土僣立為帝為光武所誅業趙云勇略今何在即前篇英雄餘自也後人将酒肉虚殿日塵埃凡舟人往來皆祀之爾孟子必有酒肉谷鳥鳴還過林花落又開多慙病無力騎馬入青苔右二愁强戲為吳體江草日日喚愁生巫峽一作春峡泠泠非世情趙云言水自泠泠之聲也一作春峡非盖豈可言夏峽秋峽乎盤鍋鷺浴底心性郭璞江賦云盤渦谷轉獨樹花發自分明周王褒送葬詩云平原看獨樹十年戎馬暗萬國自安史亂後天下不安者十餘年異域賓客老孤城公本北人而寓南國故云異域渭水秦山得見否人今罷病虎縦横渭水秦山皆関中風物也時云罷弊賊冦充斥而公不能能徃故云得見否詩趙云渭水秦山則言長安也虎縦横言盗賊也王粲云盜賊如射虎雖吐蕃亦盗賊爾罷音疲江雨有懐鄭典設春雨闇闇塞峽中早晚来自楚王宫謂旦為朝雲暮為行雨也趙云椘王宫指言高唐也高唐賦云椘襄王與宋玉逰于雲夢之臺望高唐之觀今言塞滿􅎤中之雨旦暮皆是椘王高唐宫來或以塞為関塞之塞謂白帝城連峽為塞峽義不通亂波紛披已打岸弱雲狼籍不禁風趙云于波言紛披于雲言狼籍此公之新竒者打岸字應是方言如風吹船謂之打頭風之類劉禹錫金陵懐古詩潮打空城寂寞囘淳于髠云杯盤狼籍寵光蕙葉與多碧㸃注桃花舒小紅趙云蓼蕭篇改見君子為龍為光注云龍寵也箋云為寵光言天子恩澤光耀被及已也魏鍾㑹孔雀賦五色㸃注華羽参差天雨之施蕙葉有寵光之義其于桃花才小閒苞有㸃注之状使字不亦新乎谷口子真正憶汝㟁高瀼滑一作濶限西東揚子雲白谷口鄭子真不屈其志為耕巖石之下以比鄭典設也䕫有澗水出山谷間土人名之曰瀼又分左右曰瀼東瀼西公有阻雨不得歸瀼西甘林宫在瀼西鄭必在瀼東矣雨不絶鳴雨既過漸細㣲映空揺颺如絲飛古詩密雨如㪚絲階前短草泥不亂院裏長條風乍稀趙云盖以長條之垂本自稠密因風颺之乍成稀疎舞石旋應将乳子湘川記零陵有石燕雨過則飛如生燕行雲莫自濕仙衣謂高唐神女也注見前詩近趙云此公于䕫峽間所賦两詩而䕫峽去湘潭為又高唐正在其處方使石燕神女事此之謂當體莫字非莫勿之莫盖言莫是自濕仙衣乎乃問之之辭也眼邊江舸怱怱促未得一作待安流逆浪歸崔評事弟許相迎不到應慮老夫見泥雨怯出必愆佳期走筆戲簡趙云楚辭曰與佳期兮夕張謝𤣥暉詩佳期悵何許江閣要賓許馬迎午時起坐自天明浮雲不負青春色細雨何孤白帝城李陵書陵雖孤恩漢亦負徳今多用辜負字俗子相承爾身過花間霑濕好醉于馬上徃來輕虛疑皓首衝泥怯實少銀鞍傍險行晝夢二月饒睡昏昏然不獨夜短晝分眠趙云中春氣候昏令人多睡不獨夜短晝亦分其半以眠爾司馬遷悲士不遇賦昏昏罔覺内生毒庾信蕭索無真氣昏昏有欲心後漢邊韶為弟子所嘲曰懶讀書晝日眠桃花氣暖眼自醉春渚日落夢相牽趙云桃花在暖日中薫灼人自已有醉悶春渚日落而夢已相牽挽不自由矣故鄉門巷荆棘底中原君臣豺虎間上句言盗賊之多閣里殘弊也臺趙云不歸之棘而生荆棘矣如姑蘓上荆棘滿銅駝是也豺虗以言盗賊雖吐蕃亦盗賊爾安得務農息戰闘普天無吏横索錢時多暴賦横歛也傷趙云吏乗軍須之勢至於暴横求索此為可也晝夢詩而後段及此公之用心可見矣熟食日示宗文宗武消渇逰江漢羇栖尚甲兵趙云公自志其病也逰江漢則江水漢水近荆南而合矣詩云滔滔江漢南國之紀甲兵又言吐蕃未息也䕫實椘地近接荆南故云逰江漢幾年逢熟食萬里逼清明秦人呼寒食謂熟食日言其不動煙火辨食食物過節也亦云禁煙節松柏邙山路風花白帝城杜補遺十道志曰邙山在洛陽縣北十里楊佺期洛城記曰邙山古今東洛九原之地也俗以寒食省墳子美先塋在邙而其身留寓白帝于寒食不能展省也故有此句汝曺催我老廻首涙縦横又示两兒令莭成吾老他時見汝心趙云令節指言寒食成吾老明老者之情不堪也言汝軰今日年少未知老者之情他日後長大見汝之心如我今日也浮生㸔物變為恨與年深長葛書難得江州涕不禁趙云長葛江州意是其弟妹所在特未可妄考也團圓思弟姝行坐白頭吟白頭吟盖老而為詩耳其本出于司馬相如將聘茂陵女為妾文君作白頭吟以諷之沈約宋書載古辭白頭吟曰凄凄重凄凄嫁娶不須啼願得一心人白頭不相離其後鮑照軰作白頭吟則譏交道不終矣九家集注杜詩巻二十七
