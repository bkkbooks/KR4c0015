body:
  text: 九家集注杜詩卷三十二宋郭知達編近體詩季秋蘇五弟纓江樓夜宴崔十三評事韋少府姪三首峽險江驚急樓髙月回明一時今夕會萬里故鄉情星落黃姑渚秋辭白帝城老人因酒病堅坐看君傾趙云黃姑渚天河之别名也右一明月生長好浮雲薄漸遮宋玉九辨云何泛濫之浮雲兮猋壅蔽此明月悠悠照邊塞月賦外素質之悠悠悄悄憶京華清動杯中物鮑云陶淵明詩天運茍如此且進杯中物髙隨海上查事見查上覓張騫注不眠瞻白兔劉孝綽月詩攢柯伴玉蟾植叢映金兔百過落烏紗烏紗帽也楚趙云月中有兔其傳尚矣詞天問曰夜光何德死則又育厥利維何而顧免在腹烏紗帽也杜佑通典帽門載矣右二對月那無酒登樓况有江聽歌驚白鬢笑舞拓秋窗樽蟻添相續子建七啓盛以翠樽酌以雕觴浮蟻鼎沸酷烈馨香沙鷗並一雙盡憐君醉倒更覺片一作我心降詩我心則降又趙云選有白髮生鬢公詩云百年雙白鬢張協玄武館賦云春牖左開秋窗右豁樽蟻言酒之浮蟻也末句當以片心為正方有功矣右三送孟十二倉曹赴東京選君行别老親此去苦家貧藻鏡留連客江山憔悴人杜補遺藻鏡猶藻鑒也故子美上韋左相詩又有持衡留藻鑒之句晉太康四年制曰藻鑑銓衡又唐舊史許子儒長夀中為天官侍郎居選部不以藻鏡為意候趙云題送赴東京選故用藻鏡事既是赴選則須等藻鏡之所取非旬日之事故云留連客也江山憔悴人則客遊所厯雖江山之勝亦為憔悴人秋風楚竹冷夜雪鞏梅春朝夕髙堂念應宜綵服新趙云秋風楚竹冷説孟倉曹所起發之地在夔也夜雪鞏梅春言孟倉曹所往之時逢雪于鞏也鞏縣今西京屬縣西京則唐所謂東京也末句又申言其别兒自思之也列女傳曰老萊子孝養二親行年七十嬰娛著五色采衣楚竹冷鞏梅春謂之雙紀格憑孟倉曹將書覓土婁舊莊平居喪亂後不到洛陽岑為厯雲山問無辭荆棘深北風黃葉下南浦白頭吟文君作白頭吟美薛云楚詞余交手兮東行送人兮南浦十載江湖客茫茫遲暮心趙云前四句託孟倉曹往問莊居之荒葺何如後四句則公言其在夔時候與處所也黃葉下變用木葉下白頭吟雖是文君以相如晚年置妾而有此作其後為樂府則言君臣朋友顧遇之不終而公今所用又止以其老年白頭所吟咏耳楚詞云傷美人之遲暮耳聾生年鶡冠子杜補遺後漢輿服志武冠加雙鶡尾在左右謂之鶡冠五官虎賁羽林皆冠之鶡者勇雉也其鬭無巳一死乃止故趙武靈王為冠以表武士是詩所謂鶡冠子者楚人隱居深山中衣敝履穿以鶡為冠莫測其名因服成號著書言道家事馮諼嘗師事之後顯于趙鶡冠子懼其薦巳遂與之絶歎世鹿皮翁趙云前漢書藝文志有稱鶡冠子一篇師古云以鶡鳥羽為冠也列仙傳鹿皮翁者災川人也少為府小吏工巧舉手能成器械岑山上有神泉人不能至小吏白府君請木工斧斤三十人作轉輪懸閣意思朴至數十日梯道四門成上其顛作茅舍留止其旁眼復幾時暗耳從前月聾猿鳴秋淚缺雀噪晚愁空黃落驚山樹呼兒問朔風趙云猿鳴秋淚缺雀噪晚愁空以耳聾之故而幸其不聞也末句但見山木葉黃落而不聞風聲所以呼兒而問宋玉九辨云悲哉秋之為氣也蕭瑟兮草木黃落而變衰曹子建有朔風篇小園由來巫峽水本是楚人家客病留因藥春深滿為花秋庭風落果瀼岸雨頽沙問俗營寒事將詩待物華趙云此篇蓋須水以為用之詩也楚城居高而下取江水最為艱得故以為咏矣客病留因藥則藥須水以洗濯故留水者因藥也春深買為花則花須水以灌沃故買水者為花也後兩句則縱言眼前之秋景矣末句又營人家備冬寒之俗事而不廢吟咏也自瀼西荆扉且移居東屯茅屋四首白鹽危嶠北赤甲古城東平地一川穩髙山四面同趙云首兩句以引下句耳平地一川蓋在白鹽山之北而赤甲城之東故也謝靈運詩序有云石門新營所住四面髙山煙霜凄野日粳稻熟天風趙云周王褒送葬詩云寒近邊雲黑塵昏野日黃公嘗使云野日荒起白也周勃領北軍誅諸吕是日天風大而古詩枯桑知天風也人事傷蓬轉吾將守桂叢劉安招引桂樹叢兮山之幽根趙云曹植雜詩曰轉蓬離本右一東屯復瀼西一種住清溪來往皆茅屋淹留為稻畦市喧宜近利西居近市易巽為近利市三倍林僻此無蹊若訪衰翁語須令賸客迷趙云青溪非名也水色之青而巳謝莊詩曰青溪如委黛公于成都浣花詩亦曰靑溪可見矣馬季長笛賦有云間介無蹊人迹罕到此無蹊此字則指東屯與瀼西也如曹子建云置酒此河陽之比須令賸客迷則承無蹊之下言賸客添迷也右二道北馮都使髙齋見一川子能渠細石吾亦沼清泉枕帶一作席還相似柴荆即有焉趙云渠字沼字此以字之重字為輕字以體為用者也枕帶還相似言枕山帶水也一作枕席淺矣柴荆亦是兩字蓋言荆扉柴扉之義而字則謝靈運初去郡云促裝反柴荆即有焉又言馮都使與巳俱有柴荆以居也斫畬應費日解纜不知年杜補遺楚俗燒榛種田曰畬先以刀芟治林木曰斫畬其刀以木為柄刃向曲謂之畬刀畬音式車反趙云言方移居東屯為農夫之事而從事于斫畬則欲扁舟儘南下之意且輟止矣故解纜未知其幾何時也斫畬兩字是楚人語又農書云按荆楚多畬田先縱火熂爐候經雨下種歷三歲土脈竭不可復樹藝但生草木復熂旁山劉禹錫適連州畬田行云何處好畬田團團漫山腹鑽龜得雨卦上山燒卧木又云下種暖灰中乘陽坼牙蘖蒼蒼一雨後苕穎如雲發白居易子規歌云畬田有粟何不啄燒榛種田也爾雅一歲曰災二歲曰新三歲曰畬易曰不災畬皆音餘災田凡三歲方可復種蓋取畬之義也熂音餼燹火燎草也爐音廬火燒山界也右三牢落西江外參差北戶間久遊巴子宅臥病楚人山幽獨移佳境謝靈運幽獨賴鳴琴顧愷之云漸入佳境清深隔逺關寒空見鴛鷺回首憶朝班趙云吳都賦云開北戶以向日齊南冥于幽都注言日南人開北户向日以就明則以南為幽都亦如中國之見北也公居于夔乃楚地與荆渚吳越相近矣故得言西江外北戶間也公詩又云東望西江永南遊北戶開矣隔逺關則指言白帝城之關末句公嘗為左拾遺通籍而朝故見鴛鷺而憶朝班也右四題柏大兄弟山居屋壁二首叔父朱門貴郭景純朱門何足榮郎君玉樹髙趙云謝道藴云一門叔父則有阿大中郎魏宋以來貴人之子曰郎君叔姪則亦父子故可使郎君朱門字雖是常語祖出東方朔十洲記曰臣故韜迹而赴王庭藏養生而待朱門矣謝安嘗戒約子姪因曰子弟亦何預人事而正欲使其佳玄答曰譬如芝蘭玉樹欲使其生于庭階耳山居精典籍文雅涉風騷江漢終吾老雲林得爾曹趙云書序云秦滅三代典籍選冇云同祖風騷詩云美化行乎江漢之域又云滔滔江漢南國之紀公欲適荆楚而南故云終吾老也哀絃繞白雪未與俗人操杜補遺哀絃琴也記曰哀以立廉廉以立志君子聽琴瑟之聲則思志義之臣又枚乘七發龍門之桐高尺而無枝使班爾斫斬以為琴野繭之絲以為絃孤子之鉤以為隱九寡之珥以為的師堂操張伯牙為之歌此亦天下之至悲也子能強起而聽之乎注的音的鉤珥皆寶也隱的皆琴上飾取孤子寡婦之寶而用之欲其聲多悲哀九寡九度寡也琴録曰琴曲有幽蘭白雪風入松烏夜啼俗人非知音者故未可與之操趙云宋玉曰陽春白雪之曲唱彌髙而和彌寡于哀絃之中所彈者白雪非俗人所能也薛云右按宋玉對楚襄王問曰客有歌郢中者其始下里巴人國中屬而和者數千人其為陽春白雪國中屬而和者數十人而巳又文選鮑照詩蜀琴抽白雪郢曲繞陽春右一野屋流寒水山籬帶薄雲靜應連虎穴喧巳去人羣筆架霑窗雨書籖映隙曛蕭蕭千里馬箇箇五花文趙云末句以駿馬比柏之兄弟矣公嘗曰五花散作雲滿身詩云蕭蕭馬鳴箇箇指言五花文之箇箇非謂馬一匹為一箇也郭隗曰古之人君有以千金使涓人求千里馬者又漢文帝時有獻千里馬者右二暝日下四山隂山庭嵐氣侵謝靈運夕曛嵐氣侵牛羊歸徑險詩羊牛下來北征賦日暗暗其將暮覩牛羊之下來鳥雀聚枝深正枕當星劒收書動玉琴半扉開燭影欲掩見清砧星劒劒上有星文也玉琴以玉為琴也趙云星劒則劒上有七星之象也非是氣衝牛斗之謂江淹去故鄉賦撫玉琴兮何親末句扉欲掩見清砧則欲更掩其半扉之時見巳家之清砧蓋時秋矣茅堂檢校收稻二首香稻三秋末平田百頃間喜無多屋宇幸不礙雲山御夾侵寒氣秋興賦藉莞蒻御夾衣嘗新破旅顔禮天子以嘗新紅鮮終日有玉粒未吾慳趙云御袂侵寒氣言雖御夾衣矣而寒氣猶侵之則山居故也紅鮮似言魚也玉粒則春稻為米其白如玉矣亦不必泥蘇秦米貴于玉事右一稻米炊能白秋葵煮復新誰云滑易飽老藉軟俱勻種幸房州熟苗同伊闕春無勞映渠碗自有色如銀杜補遺魏文車渠碗賦車渠玉屬也多纎理縟文生于西國其俗寶之惟二儀之普育何萬物之殊形料珍怪之上美無茲碗之獨清苞華文之光麗發符彩而揚榮理交錯以連屬似將離而復并又梁陸倕蠡杯銘曰用邁羽杯珍逾梁碗寶同蠡測形均朴滿又廣雅曰車渠石次玉也趙云滑字與滑流匙同養老藉軟俱勻與軟炊香飯緣老翁同義房州熟伊闕春蓋稻名也末句言不必用梁碗盛之此飯其色自如銀矣右二朝二首清旭楚宫南霜空萬嶺含野人時獨往雲木曉相參俊鶻無聲過飢烏下食貪病身終不動搖落任江潭陸士衡戢翼江潭王趙云清旭清朝也江賦云視氛祲于清旭楚宫則楚之宫也霜空言帶霜之空也朝未甚有行人故野人時獨往耳末句蓋公欲南下而未能也易云寂然不動屈原既放于江潭或云蘇東坡謂子美詩外尚有事在故其病身曾不搖蕩而不隨草木之搖落也右一浦帆晨初發郊扉冷未開村疏黃葉墜野靜白鷗來礎潤休全濕雲晴欲半回淮南子云山雲蒸柱礎潤江淹山雲潤柱礎巫山冬可怪昨夜有奔雷浦帆帆音去聲今官韻亦收矣師民曕本疑之乙其字為帆浦非是然夔州詩而云浦帆何也蓋題是朝詩句云浦帆晨初發郊扉冷未開兩句通義言方此晨朝之際想江浦之中其帆起發而郊居之家以冷而未開其扉也顔延年贈王太常詩曰郊扉常晝閉礎者柱下之磔石也礎潤休全濕休者罷也言礎石之潤經夜稍乾而半濕矣雲晴欲半回言朝既晴霽其宿雲半斂而回去也奔雷公兩使矣出三都賦右二晚杖藜尋晚巷炙背近墻暄嵇康書野人冇快炙背而美芹子者欲獻之至尊雖有區區之意亦巳疏矣公又嘗有句云炙背可以見天子人見幽居僻吾知拙養尊朝廷問府主耕稼學山村趙云此句法難解蓋言朝廷以務農重穀之事問府主故亦化而學山村耕稼也然此等句法學者不可效之也舜自耕稼陶漁以至為帝歸翼飛棲定寒燈亦閉門曹子建歸鳥赴喬林翩翩厲羽翼陸士衡願假歸鴻翼翻飛遊江汜趙云棲鳥以枝定為安故詩人每用定字如公今云歸翼飛棲定如白樂天風枝未定鳥難棲如李商隱棲鳥定寒枝然三定優劣必有能辨者原其所出則周庾信云鳥寒栖不定也夜二首白夜月休弦燈花半委眠號山無定鹿落樹有驚蟬暫憶江東鱠張翰憶鱸鱠兼懷雪下船王子猷訪戴安道蠻歌犯星起重覺在天邊趙云當此白夜于月休隱其所見者弦之狀與燈花半委落之際眠卧也重覺在天邊言其逺也右一城郭悲笳暮村墟過翼稀甲兵年數久賦斂夜深歸暗樹依巖落明河繞塞微斗斜人更望月細鵲休飛樂府月明星稀烏鵲南飛深趙云賦斂夜深歸言村落之民入市供官賦斂以夜而後歸也暗樹依巖落言葉也傳曰木落糞本亦遂以言葉矣天漢謂之明河故宋之問有明河篇也繞塞微則夜深矣故末句又有斗斜月細之語鵲休飛者休停其飛也月細而不甚明此鵲飛之所以休也右二東屯月夜抱疾漂萍老防邊舊榖屯春農親異俗歲月在衡門趙云東屯所以得名者防邊而屯戍之地也言抱疾病而如漢漂萍之老在屯積舊榖以防邊之處也古詩云泛泛江萍漂蕩水無根論語曰舊穀既沒禮記王制民生其間者異俗然公所用乃如匡衡云成湯所以化異俗而懷鬼方者蓋公中原人而逺客於夔故稱之為異俗公于俳諧體詩又云異俗吁可怪詩衡門之下青女霜楓重曉霜楓葉丹青女霜神名黃牛峽水喧泥留鬪虎迹月挂客愁村喬木澄稀影輕雲倚細根趙云淮南子曰青女出以降霜盛𢎞之荆州記曰宜都西陵峽中有黃牛山江湍迂回塗經信宿猶望見之行者語曰朝發黃牛暮宿黃牛三日三暮黃牛如故後兩句當秋木葉落故謂之稀影輕雲倚細根則山中有雲故倚喬木之細根也數驚聞雀噪暫睡想猿蹲趙云皆以月明之故也月照樹白則雀驚而噪猿以有照不得久睡故暫而巳日轉東方白風來北斗昏天寒不成寐無夢有歸魂趙云上兩句可謂竒矣東屯北崦盜賊浮生困誅求異俗貧空村惟見鳥落日未一作不逢人登樓賦白日忽其西匿鳥相鳴而舉翼原野閴其無人征夫行而未息步壑風吹面看松露滴身逺山回白首戰地有黃塵趙云人之所以為盜賊者以浮生之困也管子曰衣食足而知榮辱諺云盜賊起于貧窮觀下句則所以招盜之因也公豈不知政哉莊子其生若浮其後鮑照詩浮生旅昭代戰塵謂之黃塵者以其塵起之多茫茫然黃也曹子建云大風隱其四起揚黃塵之冥冥雲龍自一作以瞿唐會江依白帝深終年常起峽每夜必通林收穫辭霜渚分明在夕岑髙齋非一處秀氣豁煩襟趙云公自言其見雲之處句謂初在霜渚中收穫至辭出時乃見雲在岑分明也髙齋非一處則人家皆有髙齋可以登覽謝玄暉有郡內髙齋間坐答吕法曹詩月趙云四更所見之月而有開鏡之句則乃月滿之狀必十五夜也豈九月之望夜乎于一更二更三更為雲遮也塵匣之鏡至四更在樓上忽見之所以有作既在夔州羣山之中故謂之山吐月四更山吐月殘夜水明樓趙云此篇首兩句古今絶唱東坡先生深曉吐字之義故取下句為五韻以賦五詩自一更至五更皆曰山吐月又有句云明月翳復吐月言吐字出費昶省中夜聞搗衣詩云閶闔下重關丹墀吐明月蓋吐露其光之謂殘夜水明樓言夜將盡矣登樓看月其明照于水而水光照樓句法如此不亦竒乎塵匣元開鏡風簾自上鉤古詩纎纎似玉鉤娟娟若娥眉謝玄暉風簾入雙燕趙云上句説月古詩有云破鏡飛上天又梁簡文帝云形同七子鏡則鏡以比月矣塵匣字則取鏡以言之鮑明逺擬古詩有云明鏡塵匣中寶琴生網絲也若全句之勢則又庾信鏡詩云玉匣聊開鏡輕灰暫拭塵也信直用之于鏡而公則以比月為工矣謂之元開則驚喜之詞也下一元字可以見一更二更三更雖有月而雲遮之也下句言樓上之簾已自挂起則可以分明看月也陳蕭詮詩珠簾半上珊瑚鉤也應疑鶴髮蟾亦戀貂裘趙云上句則公自言其老下句言其貧鶴髮老者之狀庾信竹杖賦云余老矣鶴髮雞皮貂裘使蘇季子黑貂裘也斟酌姮娥寡天寒耐九秋見九秋驚雁序注之杜補遺後漢天文志注張昭載靈憲之言曰月隂精宗有慿焉者羿請不死之藥于西王母其妻姮娥竊之以奔月是名蟾蜍又阮嗣宗詠懷詩悅懌若九春李善注云春秋元命苞曰陽氣成于三故一時三月陽氣終于九故三月一時凡九十日宋𠂻曰四時皆象此不獨春也九秋以九十日言之趙云斟酌者想料之也鮑明逺和王丞詩斟酌髙代賢玉臺後集載董思恭王昭君詩斟酌紅顔盡何勞鏡裏看公于舟中出江陵云經過憶鄭驛斟酌旅情孤皆為想料之義以九秋言之則秋之三箇月將盡矣所以知其為九月之望夜尤明李商隱云姮娥却悔偷靈藥碧海蒼天夜夜心亦有誚姮娥寡之意獨坐二首竟日雨冥冥楚詞雲容容兮雨冥冥雙崖洗更清水花寒落岸山鳥暮過庭暖老須燕玉唐寧玉有暖玉鞍又有暖玉杯以為飲器不暖而自熱充飢憶楚萍家語昭昭王渡江有一物大如斗圓而赤取之以問孔子曰此萍實也吾昔過陳聞童謡曰楚王渡江得萍實大如斗赤如日剖而食之甜如蜜胡笳在樓上哀怨不堪聽趙云燕玉以言婦人也古詩云燕趙多佳人美者顔如玉故摘燕玉兩字以對楚萍待燕玉之人而暖則孟子所謂七十非人不暖是也觀題云獨坐則又可見矣舊注引暖玉事于燕玉字何所據乎又暖老之義安在也末句蓋言白帝城樓上有鳴笳矣其聲哀怨所以不堪聽也舊注至引劉琨事為冗右一白狗斜臨北黃牛更在東杜補遺水經注秭歸白狗峽蜀江中流兩面如削絶壁之際隱出白石如狗形狀具足故以名焉又黃牛山在縣四四十五星周回五十里髙三十一里盛𢎞之荆州記曰黃牛山有重嶺疊起其最大髙崖間有石色如人負刀牽牛人黑牛黃其狀分明此崖加之江湍迂回行經信宿猶望見行者歌曰朝發黃牛暮宿黃牛一朝一暮黃牛如故今黃牛峽山下有廟曰洺川王土人云黃牛神也仇池翁有碑載歐陽文忠公事云峽雲常照夜江日會兼風晒藥安垂老應門試小童薛云莊子原憲杖藜而應門晉夏統詣洛市藥會三月上已統時在船中曝所市藥諸貴人車乘來者如雲統並不顧蜀志李密陳情表云內無應門五尺之童煢煢孑立形影相弔亦知行不逮苦恨耳多聾趙云白狗黃牛皆峽名臨北在東則公以所居言之江日會兼風師民瞻本作江月是蓋上句言夜也末句行不逮蓋獨坐則不復有行矣右二雨四首微雨不滑道斷雲疏復行紫崖奔處黑白鳥去邊明秋日新霑影寒江舊落聲柴扉臨野碓半濕搗香粳趙云紫崖奔處黑白鳥去邊明不勞雕刻而雨意自見隂鏗詩有云水隨雲度黑山帶日歸紅今公詩可與之敵也秋日新霑影則以雨之故其日影朦朧為霑灑矣謂之野碓則無庇覆故搗粳至于帶微雨之半濕也右一江雨舊無時天晴忽散絲暮秋霑物冷今日過雲遲上馬回休出看鷗坐不辭髙軒當灔澦潤色靜書帷趙云晉張協雜詩云密雨如散絲右二物色歲將晏天隅人未歸朔風鳴淅淅謝玄暉淅淅就衰林謝惠連淅淅振條風李陵與蘇武詩云風波一失所各在天一隅寒雨下霏霏多病久加飯衰容新授衣時危覺凋喪故舊短書稀趙云詩雨雪霏霏古詩云上言加餐飯詩九月授衣右三楚雨石苔滋京華消息遲山寒青兕呌江晚白鷗飢神女花鈿落宋玉有神女賦按唐志命婦之服飾以寶鈿金花也蛟一作鮫人織杼悲吳都賦泉客潛織而卷綃注泉客鮫人也織輕綃於泉室出以賣之繁憂不自整終日灑如絲趙云宋玉招魂曰君王親發兮憚青兕何遜云可憐雙白鷗朝夕水上遊神女廟在巫山蛟人則江中所有巫山中花即神女之所以為鈿者被雨而落故云江賦鮫人構館于懸流此皆巫楚之事也沈約詩非煙復非雲如絲復如霧中摘兩字也右四戲寄崔評事表姪蘇五表弟韋大少府諸姪隱豹深愁雨潛龍故起雲謝玄暉詩雖無玄豹姿終隱南山霧杜補遺云劉向列女傳陶答妻謂其夫曰妾聞南山有玄豹霧雨七日不下食者何也欲以澤其毛衣而成其文章故藏以除害也易曰潛龍勿用又曰雲從龍因言雲雨故以豹與龍形容之爾泥多仍徑曲心醉阻賢羣趙云列子曰見巫季咸而心醉曲徑而倒用徑曲羣賢而倒用賢羣義自足也忍待江山麗還披鮑謝文髙樓憶疏豁秋興坐氛氲趙云江山麗則春景也公嘗曰遲日江山麗今言忍待則忍以待之也所以傷雨之故矣鮑謝文鮑則鮑照謝則謝靈運豈以比諸公乎坐氛氲言坐秋氣之中也有感五首趙云詩意當是廣德元年史朝義正月巳滅之後吐蕃十月未陷京師之前句有言胡滅則指史朝義也新交戰則指吐蕃也覔張騫則指奉使吐蕃者餘蛇豕則指河北叛將也虎狼盜賊則以指袁朝也不臣朝又以指河北叛將也親賢則指雍王適與郭子儀也將自疑則指僕固懷恩也將帥蒙恩澤兵戈有歲年至今勞聖主何以報皇天白骨新交戰雲臺舊拓邊趙云言新戰之兵方橫白骨將帥必有意于拓邊而功未立其在雲臺畫像議功者則是舊拓邊之功也乘槎斷消息無處覔張騫趙云此言遣使和吐蕃未還所以用張騫乘槎為喻本是本是前漢末事而公多用作張騫使西域尋河源所乘之槎豈承用之熟耶見張華博物志留新添案騫本傳騫以郎應募使月氏為胸奴單于所十餘歲得還騫所至者大宛大月氏大夏康居而所傳閫其旁大國五六具為天子言其地形所有並無乘槎至天河之説博物志又不言張騫而宗凛乃傅會直以為張騫杜公因承用荆楚歲時記所引而趙次公所以屢疑之也右一幽薊餘蛇豕為史思明未平也乾坤尚虎狼盜賊充斥也為趙云左傳曰吳封豕長荐食上國史朝義雖滅而有未臣服服者餘蛇豕指河北叛將尚虎狼則盜賊猶自充斥也按編年通載於前歲寶應元年載台州賊袁朝乘亂據浙東諸侯春不貢藩鎮擅命基兆於此使者日相望董仲舒傳漢家使者冠蓋相望愼勿吞青海見君不見青海頭注無勞問越裳見越裳翡翠無消息注越趙云慎勿吞青海戒以無有事于西羌無勞問裳戒以無有事于東夷大君先息戰歸馬華山陽易曰大君有命書武成歸馬于華山之陽右二洛下舟車入天中貢賦均周禮天官惟王建國注周公營邑于土中使居洛邑治天下謂之地中天地之所合也四時之所交也風雨之所會也隂陽之所和也然則百物阜安乃建王國焉趙云應是史朝義既滅道路亦不阻絶矣故舟車入而貢賦均此指言長安特用洛陽為天地之中為譬也言此以責河朔諸將有不貢者莊子云舟車之所至日聞紅粟腐太倉之粟紅腐而不可食寒待翠華春翠華天子車蓋莫取金湯固賈誼金城湯池萬世帝王之業王元長䇿金湯非粟不守長令宇宙新不過行儉德盜賊本王臣趙云日聞紅粟腐則言其儲蓄之多寒待翠華春翠華之春和氣所及也上林賦曰建翠華之旗蓋天子之旗也莫取金湯固長令宇宙新又以戒之莊子疏云揭天地以趨新負山嶽而舍故宇宙新則一洗乾坤而其命維新矣盜賊則又指袁朝者矣書慎乃儉德詩率土之濵莫非王臣右三丹桂風霜急青梧日夜凋由來強幹地兩都賦強幹弱枝隆上都而觀萬國未有不臣朝趙云首兩句蓋以為譬也丹桂耐風霜之物楚辭云麗桂樹之冬榮是已青梧易凋之物楚辭又云白露下衆草兮奄凋此梧楸是巳彼丹桂而值風霜之急所以青梧日夜凋落落矣引下句若幹之強壯則枝無勝幹之理猶主強則臣自歸服而朝也強幹地則指言長安之尊重也未有不臣朝則如上句諸侯春不貢事今反言以期之也受鉞親賢往分茅列土親賢並建親賢同姓也時代宗為元帥卑宫制詔遙禹卑宫室漢以所降敕命為制詔五趙云去歲寶應元年代宗既即位月以雍王為天下兵馬元帥郭子儀副之此親與賢之往也舊注云時代宗為帥却是肅宗時矣終依古封建封爵建國漢光武紀太常矣議曰古者封建諸侯以藩屏京師豈獨聽簫韶書簫韶九成制趙云蓋勸朝廷非特任元帥副帥而巳終以封建之待夫親賢而為天子者豈獨聽簫韶之樂宴樂而巳意者代宗猶奏霓裳羽衣之曲乎右四胡滅人還亂兵殘將自疑此詩言安史既平而僕固懷恩反側也登壇名絶假髙祖曰大丈夫定諸侯即為真王耳何以假為報主一作執玉爾何遲領郡輒無色之官皆有詞願聞哀痛詔見忽聞哀痛詔注垂拱問瘡痍時縉紳皆重內官而不樂外任故子美有無色有詞之譏也趙云安祿山營州桞城胡史思明寧夷州突厥種皆胡也癸卯廣德元年正月史朝義自縊死自天寶十四載至是凡九年而安史滅矣脟自疑則如僕固懷恩以疑而叛李光弼以疑而沮者矣登壇字髙祖以韓信為大將登壇而拜之非特假節而巳舊注自是假王直王何干登壇時事耶諸將蒙寵如此故責以下句之報主矣末句又以望主上之恤民也漢武帝末年屢發哀痛之詔瘡痍漢書季布傳瘡痍未瘳右五夜絶岸風威動寒房燭影微嶺猿霜外宿江鳥夜深飛獨坐親雄劒鮑明逺云擢雄劒而長嘆烈士傳曰眉間尺者楚人鏌鎁之子楚王夫人嘗於夏納涼而抱鐵柱心有所感遂懷孕後産一鐵楚人命鏌鎁鑄為雙劒一雌一雄鏌鎁乃留雄而以雌進王劒在匣中常有悲鳴王問羣臣對曰劒有雌雄鳴者雌憶其雄也王大怒即收鏌鎁殺之眉間尺乃為父殺楚王哀歌嘆短衣淮南子曰齊桓公郊迎客夜開門寧戚飯牛車下擊牛角而為商歌曰南山粲白石爛短褐禪衣適止骭生不逢堯與舜禪終日飼牛至夜半長夜漫漫何時旦桓公聞之曰異哉歌者非常人也命後車載之短衣字暗用莊子短後之衣也煙塵繞閶闔趙云閶闔者天門也指言帝都白首壯心違逺遊江闊浮髙棟雲長出斷山塵沙連越嶲按唐地理志劒南道蓋古梁州之域蜀郡廣漢犍為越嶲益州牂牱巴郡之地總為蜀土風雨暗荆蠻雁矯銜蘆內淮南子曰雁從風而飛以愛氣力銜蘆而翔以避矰繳張華賦又矯翼而增遂徒銜蘆以避繳終為戮於此世猿啼失木間見六卷哀哀失木狖弊裘蘇季子歷國未知還趙云塵沙連越嶲則吐蕃之兵未息也風雨暗荆蠻則言當日在楚之景詩蠢爾蠻荆則荆州是也淮南子猿狖狖顛蹶而失木末句以蘇秦自比蘇秦往秦書十上而説不行貂裘色弊也歷國乃蘇秦實事其字則仲尼歷聘諸國也從驛次草堂復至東屯茅屋二首峽內歸田客江邊借馬騎非尋戴安道似向習家池趙云張平子作歸田賦其略曰超塵埃以遐遊與世事乎長辭又曰茍縱心於物外安知榮辱之所如蓋以歸在田間為樂之意也舊注引恨賦敬通見抵罷歸田里却是得罪矣承騎馬之下故言非尋戴安道蓋訪戴則乘舟而巳似向習家池則以言騎馬似之事出襄陽記曰峴山南習郁大魚池山簡每醉於此曰此我高陽池也地險風煙僻江淹風煙有鳥路天寒橘柚垂莊子云柤梨橘柚蜀都賦户有橘柚之園公又有云荒庭垂橘柚築場看斂積豳詩九月築場圃一學楚人為家語楚恭王曰楚王失弓楚人得之甫時寓夔也右一短景難髙卧秋興賦何微陽之短晷陶淵明云夏月虛間髙卧北窗之下此反而用之言短景不如夏月可以髙卧非用髙卧南陽髙卧東山之出處衰年強此身山家蒸栗暖野飯射麋新世路知交薄門庭畏客頻牧童斯在眼田父實為鄰趙云強音去聲蒸栗射麋皆是實事而蒸栗字則王逸玉部論黃如蒸栗左傳射左麋麗龜世路門庭兩句通義惟其徒為面交而不心眼所以畏客來之多徒為紛紛也謝靈運詩薜蘿若在傳云與天為鄰右二暫往白帝復還東屯復作歸田去猶殘穫稻功築場憐穴蟻拾穗許村童落杵光輝白除芒子粒紅趙云言自白帝歸田也詩云十月穫稻林類拾穗行歌其意則詩云遺秉滯穗伊寡婦之利也憐穴蟻則見公之不殘許村童則見公之不吝加餐可扶老倉庾慰飄蓬古詩云上言加餐飯扶老者扶吾身之老也舊注引扶老携幼非商君書曰夫飛蓬遇飄風而行千里乘風之勢也曺子建又云風飄蓬飛載離寒暑晨雨小雨晨光內初來葉上聞霧交才灑地風逆旋隨雲暫起柴荆色輕霑鳥獸羣語鳥獸不可與同羣麝香山一半師云麝香山屬夔州奉節縣界亭午未全分天台賦羲和亭午見趙云雨色不久柴荆之中暫起之而巳此其為微雨也按夔州圖經麋香山州東南一百二十五里山出麝香故以名之公於入宅詩曰水生魚復浦雲暖麝香山今則雨氣昏之其一半明而一半未分也梁元帝纂要曰日在午曰亭午也天池天池馬不到天池山上之池嵐壁鳥才通百頃青雲杪曾波白石中楚詞眇視目曽波詩白石磷磷鬱紆騰秀氣蕭瑟浸寒空直對巫山峽一作出兼疑夏禹功趙云道險絶故馬不到而鳥才通也巫山峽三字方對夏禹功舊夲峽作出字非魚龍開闢有菱芡古今同趙云此言其所有之最逺吳主嘗見吕岱説步隲言北欲以沙囊塞江每讀其表輒獨失笑江自開闢以來寧可以囊塞之乎故公詩句嘗曰岸疏開闢水又因孔稚圭詩云草雜今古色巖留冬夏霜故公詩句嘗曰木雜今古樹而今又生出開闢有者魚龍古今同者菱芡也聞道奔雷黑初看浴日紅日出於晹谷浴於咸池飄零神女雨高唐賦斷續楚王風宋玉風賦云楚趙云神女雨楚王風皆是地當體事則池上有此景也欲問支機石見二十九卷查上似張騫如臨獻寶宫趙云上句則比之為天河荆楚嵗時記曰張騫尋河源得一石示東方朔朔曰此是天上織女支機石下句則指之為龍宫沈佺期詩曰河宗來獻寶而公詩嘗曰自從獻寶朝河宗今蓋言獻寶之宫闕也九秋驚雁序萬里狎漁翁更是無人處誅茅任薄躬趙云上兩句公自言其身以引末句雖無人之處可以卜居其誅鉏草茅之勞任責於微薄之躬也反照反照開巫峽塞空半有無已低魚復暗魚復縣名不盡白鹽孤白鹽山名荻岸如秋水松門似畫圖牛羊識童僕既夕應傳呼松門地名趙云按梁元帝纂要曰日落西光反照於東謂之反景開巫峽則巫峽在東故也開則開豁之義荻岸如秋水豈荻花密布如秋水之翻波乎詩日之夕矣牛羊下來向夕畎畝孤城外江村亂水中深山催短景喬木易髙風鶴下雲汀近雞栖草屋同琴書散明燭長夜始堪終趙云畎遂溝洫田水之名也畎畝則畎之畝也黃新添西京雜記始元元年黃鶴下太液池上為歌曰鶴飛兮下建章云云潘嶽寡婦賦雀羣飛而赴楹兮雞登栖而斂翼詩雞栖於塒曉望白帝更聲盡陽臺曉色分髙峰寒上日疊嶺宿霾雲師云一作高峯初上日疊嶺未收雲地坼江帆隱天清木葉聞荆扉對麋鹿應共爾為羣趙云白帝者白帝城也陽臺則宋玉所謂陽臺之下是已地坼言江闊也故江帆隱於其中耳陽臺在下流之左邉帆則出峽所用題云曉望則皆逺望之想其如此也沈休文宿東園詩荆扉新且故史云貔虎為羣也覃山人隱居南極老人自有星見三十三卷甘作老人星注北山移文誰刻銘趙云去人星一名南極在井栁之中乃南方之星今言覃山人本隱此地地蓋自是南極之老人星矣而乃捨所隱以去為可罪也乃用北山移文事譏之齊書孔稚圭字德璋周彥倫隱鍾山後應詔而出德璋作北山移文其文云馳煙驛路勒銘山庭南極老人貼以有星天文志每云有星大如某物北山移文貼以勒銘張載劔閣銘尾曰勒銘山阿徵君已去獨松菊陶潛為徵君也歸去來云松菊猶存此言徵君指覃山人漢韓康桓帝備玄纁之禮以安車聘之康不得已許諾辭安車自乘柴車先發至亭亭長以韓徵君當道方修道橋見康乘柴車幅巾以為田叟也使奪其牛康即釋駕與之有頃使者至奪牛翁乃徵君也哀壑無光留户庭殷仲文詩哀壑叩虛牝趙云明言覃山人也漢魏以來起隱士名之曰徵君獨松菊則松菊徒在而人不在也哀壑無光乃北山移文所謂誘我松竹欺我雲壑之意豫見亂離不得已子知出處必須經趙云以已微諷之也言我所以不仕而流落於外正亂離之故耳而覃山人者何事而出哉故又以能經出處譏之高車駟馬帶傾覆揚雄解嘲云客徒欲朱丹吾轂不知一跌赤吾之族于定國云少高大閭門令容駟馬高蓋車悵望秋天虛翠屏天台賦摶壁立之翠屏絶趙云句則戒之深矣恨之切矣北山移文曰澗户摧無與歸石徑荒涼徒延佇所謂悵望秋水虛翠屏也柏學士茅屋碧山學士焚銀魚北山移文云焚芰製而裂荷衣白馬却走身巖居趙云柏君既為學士矣乃焚銀魚而居於茅屋之下讀書末句又方言及富貴豈唐有别科目而柏君將應之邪次公嘗觀國史補云縉紳雖位極人臣不由進士者終不為美又觀盧氏琑雜記云杜升自拾遺賜緋却應舉及第又拜拾遺時號著緋進士則柏學士者焚銀魚而别讀書其所圖類此矣焚銀魚三字又倣所謂酌醴焚枯魚史有巖居穴處之士古人已用三冬足東方朔三冬文史足用年少今開萬卷餘趙云南史齊陸少玄家有父證書萬卷餘張率盡讀其書北史魏穆士儒其子容少好學求天下書逢即寫録所得萬卷餘也公於仄聲用破字故詩云讀書破萬卷則願乘長風破萬里浪之破今於平聲當用開字則如庾子嵩讀莊子開卷一尺便止曰正與人意合晴雲滿户團傾蓋鄒陽傾蓋如故傾蓋若浮雲秋水浮階溜決渠張景陽階下伏泉通階上水衣生陸士衡豐注溢修霤黃潦侵階除雲隂結不解通衢化為渠子趙云用傾蓋字因以見與柏君初相見也家語曰孔之郯遭程先生於途傾蓋而語終日盡歡秋水浮階溜決渠則正道其事史記荷插如雲決渠如雨富貴必從勤苦得男兒須讀五車書莊子天下篇云惠施多方其書五車大歷二年九月三十日為客無時了悲秋向夕終瘴餘夔子國魚復古夔子國霜薄楚王宫蘭臺宮草敵虛嵐翠花禁冷葉紅年年小搖落不與故園同趙云陸機云吾將老而為客題是九月三十日則秋之可悲者向今夕而終盡也夔州古夔子國按寰宇記巫山縣有楚宫云襄王所逰也草敵虛嵐翠言草色之翠與嵐光相敵也花禁冷葉紅言花之紅與葉俱耐冷也如敵字禁字可謂竒矣末句蓋言楚地暖雖秋秋而草木不甚衰特小小搖落耳此其所以異故園也十月一日有瘴非全歇為冬不亦難左傳晉侯謂里克曰為子君者不亦難乎夜郎溪日暖夜郎西南夷也犍為有夜郎溪白帝峽風寒蒸裹如千室峽俗以蒸裹為節物燋糟一作糖幸一柈薛云右按元微之詩雜蓴多剖鱔和黍半蒸菰此與蒸裹無異柈與盤同又抱朴子曰土柈瓦胾無救朝飢兹辰南國重舊俗自相歡趙云時已十月矣而瘴尚未全歇所以謂冬候之難蒸燋糖皆夔州十月一日之事如此也論語千室之邑一柈按字書乃俗盤字之真者也夔人以十月旦為初冬節以飲食相饋遺云戲作俳諧體遣悶二首枚臯自言為賦乃俳見親如倡東方朔應諧以倡依隱玩世異俗吁可怪斯人難並居禮記廣谷大川異制民生其間異俗家家養烏鬼頓頓食黃魚杜云元稹詩曰病賽烏稱鬼巫占瓦代龜注南人染病競賽烏鬼楚巫列肆悉賣瓦卜夢符之説是衆趙云詩蓋非美之者魯靈光賦吁其可畏烏鬼頗有説舊注云峽俗養烏頭鬼祭之以人則養又當讀為供養之養沈存中云峽人謂鸕鷀為烏鬼薛夢符云楚人信巫以烏為鬼耳杜詩可引元稹詩其説是蓋此在元稹長慶小集所謂注則稹自注也稹與杜公同是唐人聞見如此豈不足證邪或云烏蠻之鬼舊識難為態新知巳暗疏左傳襄二十九年季札聘於鄭見子産如舊識舊唐書隰城尉房玄齡謁世民於軍門世民一見如舊識治生且耕鑿只有不關渠趙云態字即一貴一賤乃見交態之態也難與之為態則其人之薄矣楚詞曰樂莫樂於新相知而至於已暗疏則其人之薄又可知故有末句之激憤也莊子云鑿井而飲耕田而食自給不復與復與薄俗相關也右一西歷青羌坂南留白帝城於菟侵客恨楚人謂虎為於菟粔籹作人情薛補遺曰按宋玉招魂云粔籹蜜餌有􅀈餭些注粔籹以蜜和米煎作之粔音竒舉切籹音女瓦卜傳神語巫俗擊瓦觀其文理分折以定吉凶謂之瓦卜畬田費火耕一作聲史記火耕水耨是非何處定高枕笑浮生頃嵗自秦涉隴從同谷縣出逰蜀留滯於巫山今趙云元稹詩兩句一句是公前篇巫鬼一事一句是篇瓦卜之事豈因巫俗如此而句出於杜公乎畬燒田也舊本作費火聲師民瞻取一作火耕是末句言風俗處處不同孰是孰非烏有定乎但付之一睡而于此自笑其流徙之多也吕后紀酈寄説吕祿曰足下髙枕而王千里此萬世之利也右二刈稻了詠懷稻穫空雲水川平對石門南都賦緣以劒閣阻以石門寒風疏草木旭日散雞豚詩旭日始旦孟子雞豚狗彘野哭初聞戰樵歌稍出村無家問消息作客信乾坤趙云按寰宇記歸州巴東縣有石門山則亦去之逺矣豈眼前所見之石門者邪舊注石門在漢中之西褒中之北豈干夔州事哉瞿塘兩崖三峽傳何處雙崖壯此門入天猶石色穿水忽雲根猱玃鬚髯古蛟龍窟宅尊江賦瑰竒之所窟宅羲和冬一作驂馭近天台賦羲和亭午愁畏日車翻趙云言三峽之中何處有雙崖之壯乎乃壯于此門也非直謂瞿唐便是三峽之處矣兩面壁立而髙插天故云入天猶石色雲根亦以言石傳云五嶽之雲觸石而出故石謂之雲根張孟陽詩曰雲根臨八極雨足散四溟是也其後唐人多使雲根字以名石公詩又曰井邑聚雲根也王維傳維善為石色淮南子注云日乘車駕以六龍羲和為之馭故末句云羲和冬馭近愁畏日車翻以山之髙故曰去之近然冬日景短故畏其車翻去日車翻字李尤歌曰安得猛士翻日車尤之言翻則翻之使回今公言翻則日翻而去也舊本一作驂馭近非栁司馬至此詩言中原用兵民未安定也有使歸三峽相過問兩京兩京雍洛函關猶出將渭水更屯兵設備邯鄲道漢文帝謂慎夫人曰此北走邯鄲道和親邏逤一作些城薛云右按邏逤作邏娑薛仁貴為邏娑道行軍總管秃杜補遺云邏些吐蕃都城名也唐舊史吐蕃本南涼髮之後語訛謂之吐蕃其國都城號為邏些新唐史云吐蕃贊普居跋布川或邏娑川幽燕唯鳥去商洛少人行趙云函關出將渭水屯兵和親與商洛少人皆因吐蕃而然矣其云設備邯鄲道則在趙州又云幽燕唯鳥去則北地猶不通豈以安史雖滅而藩鎮相繼跋扈耶衰謝身何補蕭條病轉嬰劉公幹余嬰沈痼疾霜天到宫闕戀主寸心明孟冬殊俗還多事方冬變所為破柑霜落爪嘗稻雪翻匙巫岫寒都薄烏蠻瘴逺隨烏蠻一作黔溪終然減灘瀨暫喜息蛟螭南都賦憚夔龍兮怖蛟螭趙云在中原時固應接多事矣雖在殊俗却還多事也方冬變所為則破柑嘗稻方是變所為矣寒薄則楚地暖故也故老言施州無瘴黔州有瘴黔州在夔之南則其瘴殆及夔矣悶瘴癘浮三蜀風雲暗百蠻卷簾唯白水隱几亦青山猿捷長難見蜀都賦猿狖騰希而競捷鷗輕故不還無錢從滯客有鏡巧催顔趙云夔州詩而言三蜀之下百蠻之北廣言之也西清詩話曰人之好惡固自不同子美在蜀作悶詩乃云捲簾唯白水隱几亦青山若使余居此應從王逸少語吾當卒以樂死豈復更有悶耶次公以此乃騃男女之語方流落蠻商寂寞之中雖白水青山日日對之亦豈不悶耶雷巫峽中宵動滄江十月雷陸士衡迅雷中宵激驚電光夜舒龍蛇不成蟄易龍蛇之蟄以存身天地劃爭回却碾空山過深蟠絶壁來何須妬雲雨霹靂楚王臺趙云十月雷非其時矣故驚起龍蛇之蟄而變易天地之常也雷之不時若妬神女之為雲雨而霹靂以震之也冬至年年至日長為客忽忽窮愁泥殺人江上形容吾獨老屈原放於江潭形容枯稿天涯風俗自相親杖藜雪後臨丹壑鳴玉朝來散紫宸西征賦飛翠緌拖鳴玉以出入禁門者衆矣心折此時無一寸別賦使人意奪神駭心折骨驚路迷何處是三秦趙云紫宸殿名在東內大明宫心方寸之地故曰寸心今句言一寸可謂巧矣小至天時人事日相催冬至陽生春又來孝經援神契曰冬至陽氣萌刺繡五絃添弱線吹葭六琯動浮灰師云刺繡之工以添線準日晷之長短耳續漢書以葭莩灰實律之端候之氣至則灰飛而琯通六琯六律也師云物理志以十二律候氣先於平地作三重室為三重壁揚子所謂九閉之中也以河內葭灰實其端氣至吹灰也岸容待臘將舒栁山意衝寒欲放梅雲物不殊鄉國異左傳分至啓閉必書雲物教兒且覆掌中杯趙云史記曰刺繡文不如倚市門世説載過江諸人暇日出新亭飲宴周侯中坐而嘆曰風景不殊舉目冇江河之異掌中杯則飲者之掌中也豈以感傷鄉國異之故雖父子之間亦教令且盡飲酒也鮑明逺三日詩云臨流競覆杯又秋夜詩云願君剪衆念且共覆前觴舍弟觀赴藍田取妻子到江陵喜寄三首汝迎妻子達荆州消息真傳解我憂鴻雁影來連峽內古詩弟兄鴻雁序鶺鴒飛急到沙頭詩鶺鴒在原載飛載鳴燒關險路今虛逺杜正謬燒關當作嶢關音堯在峽右漢書言秦兵拒嶢關注在上洛北藍田南武關之西禹鑿寒江正穩流江賦云巴東之峽夏禹疏鑿朱紱即當隨綵鷁青春不假報黃牛趙云險路今虛逺言觀所巳經之地故今虛逺矣公為尚書工部員外郎賜緋魚袋故屢言朱紱綵鷁舟也淮南子曰龍舟鷁首髙誘注曰鷁大鳥也畫其象著船首黃牛者峽名在宜都西陵峽中青春不假報黃牛言不須預報之青春之時船定行而經過也右一馬度一作瘦秦山雪正深北來肌骨苦寒侵他鄉就我生春色故國移居見客心歡劇提攜如意舞一云王戎好作如意舞喜多行作白頭吟巡簷索共梅花笑冷蘂疏枝半不禁趙云弟觀移居來楚乃所以就公一處也春色生之時蓋公自峽往荆卜以春時矣故國人情之所不忍離也以不得已而來兄弟相聚則客心可見矣白頭吟雖是文君有此作其後為樂府則言君臣朋友之不終今公所用但以老而吟詠耳右二庾信羅含俱有宅春來秋去作誰家杜補遺庾信宅即宋玉故宅見送李功曹之荆州詩注余知古渚宫故事羅含字君章為桓王溫别駕於江陵城西三里小洲上立茅屋而居後安成在鎮以其宅借録事劉朗之見一丈夫衣冠甚偉朗之驚問忽然失之朗之後以罪見黜人謂君章有神也短墻若在從殘草喬木如存可假花卜築應同蔣詡徑三輔決録蔣詡舍中竹下惟開三徑羊仲求仲從與之遊為園須似邵平瓜比年病酒開涓滴弟勸兄酬何怨嗟趙云庾信哀江南賦云誅茅宋玉之宅喬木猶存可假花則宅既古矣所餘喬木可種柔蔓之花假于其上蓋如金沙茶䕷之屬乎蕭何傳邵平故秦東陵侯秦破為布衣種瓜長安城東瓜美世俗謂之東陵瓜比年病酒開涓滴則前此江樓夜晏云老人因酒病堅坐看君傾至此方欲開酒矣右三夔州歌十絶句中巴之東巴東山江水開闢流其間白帝髙為三峽鎮三峽瞿唐巫山黃牛夔州險過百牢關杜補遺圖經云百牢關孔明所建故基在今興元西縣兩壁山相對六十里緣江乃入金牛益昌路為入川之隘口此瞿唐兩崖壁立大江中流無路可行非舟莫濟固有間矣三趙云巴本春秋之國其地今閬州按水經載劉璋分巴有中巴有巴西有巴東今綿州曰巴西郡歸州曰巴東郡而夔州則中巴矣吳主嘗見吕岱説步隲言北欲以沙囊塞江每讀其表輒獨失笑此江自開闢以來寧可以囊塞之乎三峽者明月峽巫峽歸鄉峽也忠州詩下峽固有三而白帝城極高山之上故為之鎮右一白帝夔州各異城公孫述自稱白帝故夔有白帝城蜀江楚峽混殊名英雄割據非天意霸王并吞在物情趙云上兩句通義白帝以言公孫述之城夔州以言劉備之城蓋永安宫所在也白帝城在瀼之東夔州城在瀼之西此所以為異城上流而為蜀江下流而為楚峽雖楚蜀之名不同而二人之城皆臨之以公孫述言之其國號成以劉備言之其國號漢二城既臨江與峽則無復分蜀江楚峽之名矣故言混殊名英雄割據非天意則言天豈容其割據乎在物情則人必曰順不順焉王宇去聲范彥龍詩物情棄疵賤阮籍曰時無英雄陸士衡辨亡論故遂割據山川賈誼過秦論云有并吞八荒之心右二羣雄競起向前朝王者無外見今朝公羊傳曰天王出居于鄭王者無外此其言出何不能于母弟也東都賦子徒識函谷之可閉不知王者之無外比訝漁陽結怨恨漁陽祿山舊鎮元聽舜日舊簫韶趙云師民瞻本作聞前朝極是蓋聞者對見之辭也陸機辨亡論云羣雄鋒駭又選有羣妖競逐今參用之聞前朝者乃指言已前之代也王者無外見今朝所以美當日唐朝之時也舊簫韶則比霓裳舞衣之新曲此句又含蓄美中有刺如此右三赤甲白鹽俱刺天南都賦森䔿䔿而刺天閭閻繚繞接山巔楓林橘樹丹青合西京雜記中南山有樹長安謂之丹青樹也趙云楓青而橘丹也復道重樓錦繡懸右四瀼東瀼西一萬家江北江南春冬花背飛鶴子遺瓊蘂相趂鳬雛入蔣芽其草則蔣蒲葭東趙云按酈道元水經注云白帝山傍東瀼溪即以為隍今所謂瀼東瀼西則一東瀼溪而其溪之左右分之曰瀼東瀼西耳李陵贈蘇武别詩曰雙鳬相背飛相逺日已長又劉孝綽詩持此連理樹暫作背飛鴻楚詞云屑瓊蘂以為糧西京賦屑瓊蘂以朝餐指言玉英而陸士衡擬古詩云上山采瓊蘂空谷饒芳蘭則花之白者為瓊蘂矣蔣字韻書在于平聲之下亦通上聲西京雜記曰太液池其鳬雛鶴子布滿充積又木虛海賦鳬雛離褷鶴子淋滲也右五東屯稻畦一百頃北有澗水通青苗晴浴狎鷗分處處孫綽詩物我俱忘懷可以狎鷗鳥雨隨神女下朝朝髙唐賦朝朝暮暮陽臺之下趙云列子海上有人狎鷗者右六蜀麻吳鹽自古通萬斛之舟行若風長年三老長歌裏峽人以船頭把篙相水道者曰長年正梢者曰三老白晝攤錢髙浪中杜補遺梁冀傳能意錢之戲注何承天射數即攤錢也右七憶昔咸陽都市合山水之圖張賣時巫峽曾經寶屛見楚宫猶對碧峯疑趙云咸陽指言長安也楚宫猶對碧峯疑言首畫圖上見楚宫今對碧峰猶疑是舊所見之畫也右八武侯祠堂不可忘中有松柏參天長干戈滿地客愁破雲日如火炎天涼趙云松柏參天長則夔州武侯廟有之也正與古詩古柏行黛色參天二千尺同今詩兼言松柏則又據眼前所見矣古本孟子云泰山之髙參天入雲而曹子建詩荆棘上參天干戈雖滿地而見此松柏可以使客愁破雲日雖如火而見此松柏可以使炎天涼此其所以不可忘也右九閬風元圃與蓬壺中有髙堂天下無南都賦崑崙無以侈閬風不能踰借問夔州壓何處峽門江腹擁城隅趙云葛仙公傳曰崑崙一曰圃一曰積石瑶房一曰閬風臺一曰華蓋一曰天柱皆神仙所居也列子曰渤海之東有大壑焉中有五山一曰岱輿二曰貟嶠三曰方壺四曰瀛洲五曰蓬萊末句稱美夔則直以崑崙之閬風圃海山之蓬萊方壺比之矣右十雨冥冥甲子雨楚辭雷填填兮雨冥冥巳度立春時輕箑煩相向秋興賦于時乃屏輕箑纎絺恐自疑秋興賦釋纎絺注絺葛也趙云兩句憂之之辭也與人日詩云元日到人日未有不隂時其用意同何以言之唐諺云春雨甲子赤地千里言春甲子而雨旱之祥也按資治通鑑大歷二年正月辛亥朔至十三日甲子但不知立春在前相去幾日以無長歷考之也扇可用絺可著則是日雖雨而氣暄固憂其為旱矣煙添才有色風引更如絲張景陽騰雲似湧煙密雨如散絲直覺巫山暮兼催宋玉悲趙云兼催宋玉悲催則不必待秋至而此雨巳可催之也奉送蜀州柏二别駕將中丞命赴江陵起居衛尚書太夫人因示從弟行軍司馬位中丞問俗畫熊頻愛弟傳書綵鷁新漢制刺史車畫熊于軾遷轉五州防禦使起居八座太夫人後漢以六曹尚書并令僕二人謂之八座魏以五曹尚書二僕射一令為八座宋與魏同隋以六尚書左右僕射合為八座唐與同漢文紀注列侯妻稱夫人子復為列侯稱太夫人子不為列侯則否楚宫臘送荆門水白帝雲偷碧海春與報惠連詩不惜謝惠連乃靈運之弟知吾斑鬢總如銀秋興賦斑鬢彪以承辨素髮􅂒以垂領名趙云杜位宅守嵗云守嵗阿咸家則阿咸乃位之小耳非姪也夔州刺史謂中丞者也愛弟傳書綵鷁新一句言蜀州柏二别駕應是中丞之親綵鷁新則新其舟而往也五州防禦使必是中丞者如此蔡伯世以此萹為大歷元年冬之作稱按唐史方鎮年夔州兼峽忠歸萬五州防禦使𨽻荆南節度故其詩曰遷轉五州防禦使今取方鎮年表觀之乃乾元二年以夔峽忠歸萬五州𨽻夔州廣德二年置夔忠涪都防禦使於大歷未嘗有載楚宫臘送荆門水指言荆州而楚宫臘送其水則自夔州而往故也白帝雲偷碧海春却以言時當白帝之春耳東方朔十洲記曰東有碧海惠連以言弟行軍司馬也九家集注杜詩卷三十二
