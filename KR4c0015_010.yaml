body:
  text: 九家集注杜詩卷十宋郭知達編古詩别唐十五誡因寄禮部賈侍郎九載一相逢百年能幾何古詩百年能幾何㑹少别離多復為萬里行送子山之阿白鶴久同林潛魚本同河未知棲集期薛云謝靈運擬鄴中詩末途幸休明樓集逮薄質趙云白鶴潛魚以譬聚散衰老强高歌歌罷兩悽惻燕丹送荆柯入秦别於易水之上高漸離擊缶軻歌髮上衝冠士皆淚垂六龍忽蹉跎杜云淮南子六龍所以駕日車羲和所以御六龍阮嗣宗詩娛樂未終極白日忽蹉跎注蹉跎言遲暮趙云廣雅曰蹉跎失足以言日晚王褒樂府高句麗云不惜黃金散盡只畏白日蹉跎劉孝威反之則白日云蹉跎也相視髮皓白况難駐羲和胡星墜燕地漢將仍橫戈蕭條四海內人少豺虎多少人愼莫投多虎信所過飢有易子食宋子罕夜登楚子反床而告病曰吾國易子而食析骸而㸑獸猶畏虞羅趙云胡星墜燕地言今歲上元二年三月史朝義弒其父思明漢將仍橫戈言朝義襲僞位復為亂而常休明衛伯玉尚衡侯希逸來瑱之屬復與之戰也人少豺虎多以豺虎喻賊盜張夢陽云賊盜如豺虎今詩實言豺虎故有下句焉詩話載蕭條四海內至獸猶畏虞羅劉貢父云此等句真含蓄深逺大不可模仿信矣虞羅虞者之羅橫戈戰國策衛行人燭過免胄橫戈而進子負經濟才天門欎嵯峨飄颻適東周周平王東遷於洛謂之東周稱趙王經濟見上石犀行注天門泰山之記云秦山盤道曲屈而上凡五十餘盤經小天門大天門仰視天門如穴中視天忩又漢官儀泰山東上七十里至天門所以稱欎嵯峨來往若崩波南宮吾故人白馬金盤陀南宮禮部也杜田正謬云天官書南宮朱鳥權衡太薇三光之庭蕃臣將相執法郎位衆星咸在漢建尚書百官府名曰南宮蓋取象也猶唐以中書省為紫薇尚書省為文昌之類後漢鄭𢎞為尚書令前後所陳有補益王政者皆注之南宮以為故事以此考之南官非禮部也若元稹為南宮散郎禮部郎中號南宮舍人蓋南宮猶言南省非止稱禮部歷考禮部之名方起於江左而南宮巳見於漢時益知原注之謬故人言賈侍郎金盤陀馬鞍校具之飾雄筆映千古見賢心靡他念子善師事歲寒守舊柯為吾謝賈公病肺臥江沱趙云詩之死靡他今言賈侍郎心惟存乎見賢而已更無其它也歲寒守舊柯論詩嵗寒然後知松柏之後雕舊柯之義則禮記貫四時而不改柯易葉柟樹為風雨所拔歎倚江柟樹草堂前故老相傳二百年誅茅卜居總為此五月髣佛聞寒蟬趙云召彼彼故老相傳蓋如酈道元水經注秭歸縣城云故老相傳謂之劉備城屈原問漁父寧誅鋤草茅以力耕乎屈原有卜居一篇五月倣佛聞寒蟬言其高也東南飄風動地至老子飄風不終朝江翻石走流雲氣莊子雲氣不待族而雨幹一作斡排雷雨猶力爭師云退之南山詩力雖能排斡雷電怯呵詬根斷泉源豈天意滄波老樹性所愛浦上童童一青蓋野客頻留懼雪霜行人不過聽竽籟莊子地籟西趙云浦上則律詩謂南京浦道舊本作一青蓋師氏瞻作車蓋是蓋先主舍東南有一桑遙望之童童若車蓋懼雪霜言樹之高大而氣象慘肅聽竽籟言其聲之鼓動如之字則宋玉高唐賦纎條悲鳴聲似竽籟舊注引地籟非虎倒龍顚委榛棘淚痕血㸃垂胸臆我有新詩何處吟草堂自此無顔色趙云乃卞和淚盡繼之以血茅屋為秋風所破歌八月秋高風怒號杜田補逸莊子大塊噫氣其名為風是惟無作作則萬竅怒號卷我屋上三重茅茅飛渡江灑一作滿江郊高者掛罥長林梢下者飄轉沉塘坳趙氏瀟字西都賦風毛雨血灑野蔽天之灑一作滿非南村羣童欺我老無力忍能對面為盜賊公然抱茅入竹去唇焦口燥呼不得歸來倚杖自嘆息趙云韓詩外傳乾喉焦唇仰天而嘆曹子建善哉行曰來日大難口燥唇乾故兩出而參用之鮑明逺倚杖牧雞豚俄頃風定雲墨色秋天漠漠向昏黑布衾多年冷似鐡嬌兒惡卧踏裏裂牀頭屋漏無乾處兩腳如麻未斷絶自經喪亂少睡眠長夜沾濕何由徹趙云公前有詩云出門復入門雨腳但依舊一本作兩腳今觀如麻則知以雨腳為正睡眠字出佛書涅經亦有之安得廣厦千萬間大庇天下寒士俱歡顔風雨不動安如山嗚呼何時眼前突兀見此屋吾廬獨破受凍死亦足左傳楚申叔展問還無社曰有麥麯乎有山芎藭乎注二物可以御濕欲使無社逃泥中時子美方為嚴武之所不容詩之作其近於此乎趙云此五句公之用心有一夫不獲若已推而納諸溝中白樂天詩我願布裘長萬丈與君同蓋洛陽城蓋亦有志衣被天下者然近乎戲語豈有萬丈之裘乎若公言千萬間之廣厦則其言信而有徴舊注引左傳楚申叔展事與詩意大不相干入奏行贈西山撿察使竇侍郎竇侍御驥之子鳯之雛杜云桓談新論善相馬者曰薛公得馬惡貌而正走其名驥子師云龎統德公之從子德公謂統為鳯雛晉陸雲幼時吳尚書閔鴻見而竒之曰此兒若非龍駒定是鳯雛北齊裴景鸞景鴻並有逸才河東呼景鸞為驥子年未三十忠義俱骨鯁絶代無唐李吉甫傳君有骨鯁之忠臣骨鯁者剛正之謂蓋肉之有骨而魚之有鯁史云忠臣骨鯁炯如一假清冰出萬壑置在迎風寒露一作露寒之玉壺元注漢有迎風寒露之館儲杜田補遺張平子西京賦既新作於迎風增露寒於胥注魏武帝先作迎風館於甘泉山後加儲胥露寒二館者趙云鮑明逺詩清如玉壺氷露寒舊本作寒露豈傳惑於句律而倒寫耶公槐葉冷淘云萬里露寒殿開冰青玉壺則用字初未嘗誤信傳寫之誤蔗漿歸厨金碗凍洗滌煩熱足以寧君軀晉張協蔗賦銼甘蔗以療渴若漸膠而含蜜杜田補遺前漢禮樂志景星歌曰百末㫖酒布蘭生泰尊柘槳析朝醒注應劭曰蔗漿取甘柘汁以為飲可以解朝酲柘與蔗同趙云蔗漿宋玉招魂濡鱉庖羮有蔗漿杜田引漢禮樂志景星歌雖是而在宋玉招魂之後舊注引晉張協蔗賦又是模稜足以寧君軀言寧君王之軀也蓋以氷清蔗美比竇矣政一作整用踈通合典則戚聨豪貴耽文儒趙云上句言政之踈通與典則符合雖踈通而不放也下句言其與豪貴聨為親戚耽好文儒雖豪貴而不驕也戚字意戚里之家乎兵革未息人未蘇天子亦念西南隅吐蕃憑凌氣頗粗時吐蕃欲取成都為東府竇氏檢察應時須運糧繩橋壯士喜以竹繩為橋斬木火井窮猿呼八州刺史思一戰三城守邊却可圗火井蜀地名有杜田補遺博物志臨卭火井縱橫五尺深十餘丈諸葛丞相往觀之後火益盛以盆著井煮鹽得成後以家火投井中火即滅迄今不復燃應時須言應副時之所須也其檢校之迹則下句運糧繩橋斬木火井是巳八州刺史雖不可轍考而三城則西山三城此行入奏計未小密奉聖㫖恩宜殊繡衣春當霄漢立漢繡衣直指綵服日向庭幃趨老萊綵服以娛親杜云束晳補亡詩春戀庭闈省郎京兆必俯拾江花未落還成都肯訪浣花老翁無一云公來肯訪浣花老為君酣酒滿眼酤與奴白飯馬青芻又云携酒肯訪浣花老為君著衫捋髭鬢歲趙云豈入奏八州欲戰之事乎前年吐蕃陷廓州今雖不動而意專在窺蜀豈八州刺史欲逆戰之乎詳詩意可見繡衣竇君官侍御也故使繡衣漢侍御使繡衣持斧綵服竇君必長安人其親在彼省郎京尹言其所加進之官還成都則入奏之反也西清詩話載唐人弔杜子美云賦出三都上詩須二雅求蓋少陵逺繼周詩法度余嘗以經㫖箋其詩云與奴白飯馬青芻雖不言主人而待奴馬如此則主人可知與詩所謂言刈其楚言秣其馬言刈其蔞言秣其駒同意肯訪浣花老翁無一云公來肯訪浣花老末句又云携酒肯訪浣花老為君著衫捋髭鬢皆不成言語大雨西蜀冬不雪春農尚嗷嗷搜神記萬物焦枯百姓嗷嗷上天回哀眷朱夏雲鬱陶謝靈運詩幽居雲鬱陶執熱乃沸鼎纎絺成緼袍趙云詩誰能執熱劉陶養魚沸鼎秋興賦釋纎絺論語衣敝緼袍風雷颯萬里霈澤施蓬蒿敢辭茅葦漏已喜黍豆高三日無行人二一作大江聲怒號莊子萬竅怒號鬱趙云朱夏則梁元帝纂要夏曰朱明亦曰朱夏陶孟子象謂舜鬱陶思君爾蓋鬱結於陶窰之義故可使於朱夏之雲莊子緼袍無表樂史寰宇記秦李氷穿二江於成都行舟今謂內江外江左思賦帶二江之雙流流惡邑里清趙云流惡左傳有汾澮流其惡言大雨所蕩流出穢惡邑里祖出鶡冠子士之居邑里者孫楚答𢎞農故吏四言皓首老成率彼邑里謝元暉始出尚書省詩邑里向踈蕪矧兹逺江臯荒庭步鸛鶴鶴鳴則雨應隱兒望波濤沉疴聚藥餌頓忘所進勞則知潤物功可以貸不毛諸葛亮五月渡瀘深入不毛進趙云言沈痾之故而聚藥餌今得大雨清凉頓忘供藥餌之勞公病肺疾以雨凉為便易潤萬物者莫潤乎水不毛者地不生物因雨之潤雖不毛之地亦假貸而生陰色靜隴畝勸耕自官曹四鄰出耒耜孟子負耒耜何必吾家操揚旗二年夏六月成都尹鄭公置酒公堂觀騎士試新旗幟趙云後漢孝威帝校獵廣成遂幸函谷關上林苑臣蕃諫曰今有三空豈宜揚旗耀武騁心輿馬之觀乎揚旗字今取為詩名江一作風雨颯長夏府中有餘清謝靈運密林含餘清我公㑹賔客肅肅有異聲初筵閲軍裝羅列照廣庭詩至止肅肅又賔之初筵庭空六一作四馬入駊騀揚旌旗甘泉賦崇王陵之駊騀兮駊音頗騀音我山阜之高低也回回掩飛蓋劉公斡回回自昏亂曹子建飛蓋相追隨熠熠迸流星河東賦掉奔星之流旃校獵賦曵彗星之飛旗來纒一作衛風飈急去擘山嶽傾材歸俯身盡鮑照詩俯身散馬蹄妙取略地平虹霓就掌握舒捲隨人輕高唐賦霓為旌王沉賦曵招搖之修旗婉若虹之垂天選虹旗攝麾而就捲趙云略地字借取漢書攻城略地虹霓以言旗捲舒隨人輕所以結騎士揚舉之妙三州陷犬戎但見西嶺青公來練猛士欲奪天邊城此堂不易升庸蜀日已寧吾徒且加餐休適蠻與荆書庸蜀微盧古詩上言加餐飯王仲宣逺身適荆蠻趙云上兩句言去年十二月吐蕃陷松維保三州在西山之地三州陷則西嶺者其色徒青耳末言得嚴公在蜀不必捨去江雨一作風雨六馬一作四馬來纒一作來衝皆非溪漲當時浣花橋溪水才尺餘白石一作月明可把豔歌行水清石自見水中有行車華陽風俗録浣花亭在州西南有江流至清之所也其淺可涉故中有行車甫宅在焉蔡伯世作常時作趙云明可把水清淺而見之詩云白石鑿鑿一白月非有行車水淺可知秋夏忽泛溢豈惟入吾廬莊子秋水時至百川灌河陶潛吾亦愛吾廬蛟龍亦狼狽况是鱉與魚七發說濤云其旁作而奔起也六駕蛟龍附從太白橫暴之征魚鱉失勢趙云六七月之交水多時漲時止耳泛溢傳所謂泛濫衍溢狼狽本一獸名各半其體相附而行茍失其一無據矣倉皇失措者謂之狼狽兹晨巳半落歸路跬步踈馬嘶未敢動前有深填淤荀子不積跬步無以致千里志趙云跬步弭切與跪同舉一足也前漢溝洫填淤反壤之害顔師古曰壅泥也青青屋東麻散亂床上書不意逺山雨夜來復何如趙云苧麻為布者胡麻為油者苧自生至成皆青胡始生則青成則黃六七月之交而色青者胡麻也我遊都市間晚憩必村墟乃知久行客終日思其居趙云村墟也言萆堂戲贈友二首元年建已月肅宗去上元二年號止稱元年月以斗建辰為名趙云肅宗辛丑上元二年九月壬寅去尊號又去上元號稱元年以十一月為歲首曰建子月至今年建已月乃居常四月也是月庚戌朔甲寅上皇崩則初五日也改元寶應復以正月為首呼稱隔十二日丙寅帝崩則十七日也代宗即位今云元年建已月作詩應在十七日前實歲壬寅四月也郎有焦校書自誇足膂力能騎生馬駒一朝被馬踏脣裂板齒無壯心不肯巳欲得東擒胡趙云書膂力既愆詩老馬反為駒禪老亦云馬駒踏天下人去魏武帝樂府老驥伏櫪志在千里烈士暮年壯心不巳元年建已月官有王司直馬驚折左臂骨折面如墨杜云仿後漢李固傳霍光憂愧發憤悔之折骨國語吳王之黑旗望之如墨趙云折臂莊子化子之左臂以為雞羊祜傳墮馬折臂左傳肉食者無墨舊注穿鑿字駑駘漫染一作深泥何不避雨色勸君休歎恨未必不為福所諷近白居易新豐折臂翁杜田補遺淮南塞上翁馬亡入胡中皆弔之謂曰何知非福居數月馬引胡駿馬歸皆賀之翁曰何知非禍及家富馬良其子好騎墮而折體又弔之曰何居非福居一年胡人大入丁壯戰死者十九其子獨以跛故父子得獲相保觀打魚歌綿州江水之東津魴魚鱍鱍色勝銀詩魴魚頳尾鱍鱍跳躍貌杜田補遺爾雅魴魾也今之鯿魚陸機疏魴魚廣而薄肥甜而少肉細鱗魚之美者詩魴魚甫甫甫者美之至也又曰鱣鮪發發音撥即鱍也義訓曰魚掉尾曰鱍口上下噞喁漁人漾舟沉大網截江一擁數百鱗衆魚常才盡却棄赤鯉騰出如有神陶𢎞景本草鯉最為魚中之主形可愛又能神變乃至飛越山湖所以琴高乘之潛龍無聲老蛟怒回風颯颯吹沙塵饔子左右揮霜刀鱠飛金盤白雪高西征賦饔人縷切鑾刀若飛應刃落爼靃靃私壘反霏霏徐州秃尾不足憶漢陰槎頭逺遁逃秃尾槎頭皆魚名魴魚肥美知第一趙云廣州記魴魚廣而肥甜魚之美者既飽歡娛亦蕭瑟君不見朝來割素鬐咫尺波濤永相失又觀打魚蒼江漁子清晨集設網提綱萬一作取魚急能者操舟疾若風撐突波濤挺義入顔回濟於觸深之泉見操舟者若神杜云莊子津人之操舟若神且曰善游者數能也潘安仁西征賦徒觀其鼓柁回輪灑鈎投網垂餌出入挺扠來往小魚脫漏不可紀半死半生猶戢戢大魚傷損皆垂頭屈强泥沙有時立廣志武陽小魚大如針一斤千頭蜀人以為醬趙云前篇使漁人此漁子變文也疾若風即易撓萬物者莫疾乎風半死半生借使七發之言桐曰其根半死半生垂頭也世說支公好鶴有遺以雙鶴翅長欲飛去支惜之乃鍛其羽鶴軒翥不復能飛乃反顧翅垂頭視之如似懊喪之意東津觀魚已再來主人罷鱠還傾杯日暮蛟龍改窟穴山根鱣鮪隨雲雷杜田補遺郭璞注爾雅鱣大魚似鱏而鼻短頷下體有斜行甲無鱗肉黃江東呼為黃魚埤雅鼻有軟骨俗謂之玉版爾雅鮥􅀈鮪陸機注鮪魚形似鱣而青黑頭小而尖似鐡兜鍪口亦在頷下其甲可磨薑益州人謂之鱣鮪大者為王鮪小者為針鮪一名鮥肉色白今遼東東萊謂之尉魚或謂之仲明者樂浪尉也溺死海中化為此魚張平子賦王鮪岫居山有穴為岫埤雅鮪中春從河西上得過龍門便化為龍否則㸃額而還鮪岫居而能變化故云山根鱣鮪隨雨雷干戈兵革鬪未止一云干戈格鬪尚未巳鳯凰麒麟安在哉吾徒胡為縱此樂暴殄天物聖所哀春秋繁露曰恩及蟲魚則麒麟至孝經援神契曰德至鳥獸則鳯凰翔師云書暴殄天物增添禮記王制無事而不田曰不敬田不以禮曰暴天物革趙云格鬪舊本作干戈兵革鬪未止非是蓋干戈兵同義所謂格鬪是年建卯月河東軍亂殺其節度使鄧景山兵馬使辛雲京自稱節度使河中軍亂殺李國正及其節度使荔非元禮郭子儀為兵馬副元帥屯絳州而七月十六日徐能道反於成都皆其事也越王樓歌綿州州府何磊落顯慶年中越王作太宗子越王貞中宗顯慶中為綿州刺史創此樓磊趙云文選雙鶬落孤城西北起高樓碧瓦朱甍照城郭古詩西北有高樓上與浮雲齊賢趙云作猶在綿州也易神農氏作語作者七人孟子聖之君六七作其間必有名世者作傅咸贈何邵王濟詩序何公既登侍中武子俄而亦作此作字是重字可押住矣樓在城西北實道其事與古詩合元都廟詩碧瓦初寒外法鏡寺詩朱甍半光炯葛洪神仙傳載蔡少霞夢人托書新宮銘有碧瓦鱗差瑶階肪截沈佺期詩紅日照朱甍謝元暉飛甍夾馳道樓下長江百丈清山頭落日半輪明君王舊跡今人賞轉見千秋萬古情趙云李白峩眉山月半輪秋時明皇肅宗皆上仙矣故云千秋萬古情海棕行趙云海棠記載李贊皇云花木以海為名者悉從海上來左綿公館清江濆海棕一株高入雲趙云古樂府高城上入雲龍鱗犀甲相錯落蒼稜白皮十抱文自是衆木亂紛紛海粽焉知身出羣趙云亂紛紛王長元古意况復飛螢夜木葉亂紛紛世說載殷中軍道韓太常曰康伯少自標置居然是出羣器移栽北辰趙本作地不可得時有異域胡僧識姜楚公畫角鷹歌楚公畫鷹鷹戴角師云名畫記江皎上卦人善畫鷹鳥元宗在藩邸皎為尚衣奉御有先識之明元宗及位纍官太常卿封楚國公殺氣森森亦云如到幽朔觀者貪愁掣臂飛畫師不是無心學趙云言如在幽朔見此鷹之殺氣蓋名鷹出於此地孫楚鷹賦有金剛之俊鳥生井陘之巖阻森森一作森如其語不快此鷹寫真在左綿却嗟真骨遂虛傳梁間燕雀休驚怕亦未趙作未必摶空上九天言有其質無其才也耳趙云亦詩人變化形容其畫舊注非嚴氏溪放歌時郭英乂代嚴武鎮蜀粗暴不能容甫故有公卿獨驕之作趙云送嚴武至綿少留繼聞徐知道亂遂便往梓初不見携家之證此詩云東遊西還豈至此方歸成都迎家乎但不知嚴氏溪何地耳苕溪漁隱曰按王元叔注云云豫謂是說無據質之唐書及小說嚴武卒郭英義代之未幾有崔旰之亂甫未嘗為英義幕客何為不見容唐史云武待甫甚善甫嘗醉登武床瞪視曰嚴挺之乃有此兒武雖暴猛外若不為忤中銜之一日欲殺甫集吏於門武將出冠釣於簾三左右白其母奔救得止以此知邊頭公卿仍獨驕之句當為此也天下甲馬未盡消豈免溝壑常漂漂劔南歲月不可度成都在劍嶺之南邊頭公卿仍獨驕費心姑息是一役肥肉大酒徒相要嗚呼古人巳糞土獨覺志士甘漁樵趙云言邊頭公卿仍獨驕縱雖與我如此無補於事也指當時居邊守臣獨驕有跋扈不遵王命之意舊注謂郭英義粗暴是矣又云不能容甫而公有所云則是公私一已而已况英義乃成都尹豈得謂邊頭乎非公詩本意公直言邊之守臣不遵王命豈若崔旰者乎彼其獨驕而於我費心姑息特一役耳何補於事哉所以姑息者酒肉相招要而巳禮記君子之愛人也以德小人之愛人以姑息潘安仁云此一役也而二美具焉韓非子曰厚酒肥肉甘口而病形呂氏春秋肥肉厚酒務以自强命曰明腸之食世說過江諸人每暇日轍相要出新亭藉卉飲食公之心以其獨驕其専在尊主强國乎所以又有糞土漁樵之嘆况我飄轉無定所時甫方避地流徙無所依止終日戚戚忍羈旅秋宿霜溪素月高喜得與子長夜語東遊西還力實倦從此將身更何許知子松根長茯苓遲暮有意來同煮鮑云永泰元年公在成都夏嚴武卒郭英義代為節度苛暴不能容公故公往來東川所謂東遊西還力實倦杜田補遺淮南子云下有茯苓上有菟絲茯苓千歲松脂也菟絲生其上而無根一名女蘿圖經茯苓生枯松下形塊無定似鳥獸人龜形者佳今所在大松處皆有之陶隱居茯苓作丸散者皆先煮之仙經服食為至要通神而致靈和魂而鍊魄明竅而益肌厚腸而開心調榮而理衛能斷穀而不飢上品仙藥也遲趙云蓋傷歲晚矣欲服餌長生之藥楚辭傷美人之暮相從歌贈嚴二别駕時方經崔旰之亂我行入川東十步一回首成都亂罷氣蕭瑟浣花草堂亦何有趙云十步一回首李陵詩五步一倣徨之勢成都亂罷氣蕭瑟言七月徐知道反八月伏誅劍南大亂楚辭秋之為氣也蕭瑟兮草木搖落而變衰傳亦何有焉梓州一作中豪俊大者誰本州從事知名久把臂開樽飲我酒酒酣擊劍蛟龍吼烏帽拂塵青螺粟紫衣將炙緋衣走將以紫綬易緋衣趙云豪俊大者指嚴二烏帽青螺紫衣緋衣供應之人粟則帽之紋也舊注非銅盤燒燭一作炬光吐日夜如何其初促膝增添詩夜如何其夜未央語促膝言膝相近入則促膝密黃昏始扣主人門誰謂俄頃膠在漆古詩以膠投漆中又陳雷膠漆契萬事盡付形骸外趙云莊子索我於形骸之外百年未見歡娛畢神傾意豁真佳士久客多憂今愈疾高視乾坤又何愁一軀交態同悠悠垂老遇君未恨晚似君須向古人求魏志張邈傳後陳登字元龍劉備曰若元龍文武膽志當求之於古耳晉王戎從弟衍字夷甫帝聞其名問戎曰夷甫當世誰比戎曰未見其比當從古人中求之耳短歌行贈王郎司直王郎酒酣拔劍斫地歌莫哀趙云王郎應是公之親其字如謝安謂道藴曰王郎逸少子不惡而道藴曰不意天壤之間乃有王郎酒酣拔劍斫地歌莫哀蓋由史記東方朔酒酣據地歌曰陸沈於俗避世金馬門今云斫地歌依傍酒酣據地歌也後漢劉元緒將議元帝未可舉尊號而張印拔劍擊地曰疑事無功不得有二今云斫地者依傍拔劍擊地也我能拔爾抑塞磊落之竒才趙云磊落竒才而遭抑殿也成公綏天地賦山嶽磊落而羅峙世說載桓溫平蜀置酒李勢殿雄才爽氣音調英發其狀磊落竒才字晉書有竒才科郭璞詩竒才應世出豫章翻風白日動吳都賦木則楓楠豫章鯨波跋浪滄溟開且脫佩劍休徘徊鯨魚之大者吳都賦長鯨吞航數杜田補遺炙轂子載崔豹古今注鯨海魚也大者長十里小者千丈常以五六月生子就岸邊至七八月導其子還大海中鼓浪成雷濆沫成雨水族驚畏逃匿趙云以美木大魚比之跋浪則跋跳而出如跋扈之跋跋馬之跋西得諸侯棹錦水蜀江也欲向何門趿珠履春申君客三千皆躡朱履佩注云兩句一義謂其如豫章之高鯨魚之大不須劍遊諸侯之間子欲西遊諸侯之間棹錦水而漾舟亦將向何門而可乎鄒陽何門而不可曵長裾乎珠履孟嘗君事公意在挽之而南下仲宣樓頭春巳深樓在荆州青眼高歌望吾子阮藉能為青白眼以重輕人眼中之人吾老矣趙云言荆州城樓王粲字仲宣自來荆嘗登樓作賦今直以荆州樓為仲宣樓祖出梁元帝詩朝出屠羊縣夕返仲宣樓蓋以仲宣一世名人故得以名之猶天子之天祿閣可謂之子雲閣也眼中之人直指王郎是我眼中之人而呼之曰眼中之人乎今吾老矣也魏文帝詩回頭四向望眼中無故人陸士龍詩感念梓桑城倣佛眼中人北齊邢子才七夕詩不見眼中人誰堪機上織吾老矣孔子之語短歌行送祁録事歸合州因寄蘇使君前者途中一相見人事經年記君面後生相動一作勸何寂寥趙云寂寥風動也君有長才不貧賤陳平傳張負曰人固有好美如陳平而長貧者乎度趙云嵇康長才廣無所不淹君今起柂春江流趙云柂所以行大舟余亦沙邊具小舟幸為書逹賢府主趙云指言合州蘇使君江花未盡㑹江樓草堂草堂在成都浣花溪揚子琳之亂甫去草堂亂定後歸昔我去草堂蠻夷塞成都今我歸草堂成都適無虞趙云蔡伯世以此詩為今嵗廣德二年甲辰春晚所作蓋前二年寶應元年壬寅四月代宗即位成都尹嚴武入為太子賔客二聖山陵以武為橋道使六月以兵部侍郎為西川節度使未到而七月劍南西川兵馬使徐知道反拒武不能進成都大亂别無蠻夷事豈徐知道引蕃兵來耶下云始聞蕃漢殊又云西卒却倒戈可見矣請陳初亂時反覆乃須臾前漢願少須臾無死大將赴朝廷時崔旰入朝留其弟寬守成都楊子琳等乘間來襲羣小起異圖中宵斬白馬盟㰱氣已粗穀梁齊桓衣裳之㑹十有一未嘗有㰱血之盟蘇秦說趙令㑹天下之將通質刳白馬而盟漢高祖刑白馬盟孫子五霸桓公為盛葵邱之㑹諸侯束牲載書而不㰱血也兩取卭南兵子琳與卭州柏正節同叛北斷劍關隅布衣數十人亦擁專城居楊子琳為瀘州刺史柏正節卭州刺史敷趙云指嚴武入為太子賔客也詩云愠於羣小古羅行四十専城居布衣擁専城專一城以居言其為守也似指徐知道轍遂為守而數十布衣擁扶之公自有本注為即楊子琳柏正節之徒是時二人必白衣而巳後三年乃永泰元年乙已楊子琳柏正節各以牙將同討崔旰之亂自别一事蓋杜公注直云楊子琳柏正節之徒可也而上更有即字作詩在後三年是時二人已為牙將乃著即字明之其言亦擁專城者罪之辭也義在一亦字矣其勢不兩大始聞蕃漢殊子琳在賊帥杜鴻漸表為刺史能趙云左傳物莫兩大西卒却倒戈子琳為寧妻任氏所敗走為王守仙所誅趙云西卒豈西山之卒乃蕃兵乎書前徒倒戈賊臣互相誅焉知肘腋禍自及梟獍徒前漢郊祀志梟鳥名食母破鏡獸名食父黃帝欲絶其類使百吏祠皆用之破鏡如貙而虎眼漢五月五日作梟羮賜百官杜田補遺楞嚴經如土梟等附塊為兒又破獍鳥以毒樹果抱為其子子成父母皆遭其食其類充塞是名衆生十二種類漢志以破獍為獸楞嚴以破獍為鳥未知孰是江統曰冦發心腹害起肘腋疾篤難療瘡大愈遲義士皆痛憤紀綱亂相踰一國實三公左傳僖五年晉士蒍全語云一國三公吾誰適從萬人欲為魚趙云昭元年劉定公嘆禹之功曰微禹吾其魚乎字則光武紀百萬之衆可使為魚以其有沉溺之患今云萬人欲為魚則初無沉溺之意特言其為害如此耳唱和作威福孰肯辨無辜趙云洪範臣無有作福作威眼前列杻械背後吹笙竽談笑行殺戮濺血滿長衢到今用鉞地風雨聞號呼鬼一作人妾與鬼馬色悲充爾娛師云齊宣王好竽必三百人齊吹東郭先生不知竽而濫三百人中以吹竽食祿趙云咏史詩南鄰擊鐘磬北里吹笙竽左傳至於用鉞鬼妾與鬼馬已殺其主矣則妾謂之鬼妾馬謂之鬼馬如丐奴以亡者之妻為鬼妻也一作人妾非是國家法令在此又足驚呼賤子且奔走三年望東吳弧矢易繫辭弧矢之利以威天下暗江海難為遊五湖不忍意舍此時蜀既平甫復舍草堂復來剃榛蕪入門四松在步堞一云步屧萬竹踈趙云後篇四松云别來忽三嵗離立如人長避賊今始歸春草滿空堂蔡伯世以為公自閬携家歸蜀再依嚴武今句奔走三年則其遊梓閬三年也此在今嵗廣德二年則甲辰明矣剃音涕除草之謂周禮有剃氏之官步堞乃步屧如宋袁燦為丹陽尹常步屧白楊郊外間公詩又有步屧尋春風步屧深林晚舊作城堞之堞無義舊犬喜我歸低徊入衣裾鄰舍喜我歸沽酒携胡蘆一云提提壺大官喜我來遣騎問所須城郭喜我來賔客隘村墟此四韻木蘭歌格也其辭爺娘聞女來出郭相扶將阿姊聞妹來當户理紅粧小弟聞姊來磨刀霍霍向猪羊携胡蘆一作提榼壺非古詩用字以快老為貴天下尚未寧健兒勝腐儒黥布傳上對衆折隨何為天下安用腐儒哉飄颻風塵際何地置老夫於時見􅂒贅骨髓幸未枯飲啄愧殘生食薇不敢餘莊子駢拇贅􅂒養生主澤雉十步一啄百步一飲嵇康採薇山阿師云左思詠史詩飲河期滿腹足不敢願餘趙云健兒見上哀王孫詩注贅􅂒則公自傷見剩其身在天地間一飲啄以禽鳥自比食薇不敢餘倣古詩食蕨不願餘四松四松初移時大抵三尺强别來忽三歲離立如人長趙云禮記離坐離立以人譬之㑹看根不拔莫計枝凋傷幽色幸秀發踈柯亦昻藏趙云蜀都賦王褒暐煜而秀發所插小藩籬本亦有隄防趙云藩籬祖出史記賈誼之言曰無籓籬之限張茂先鷦鷯賦長於籓籬之下禮記修利隄防終然振撥損詩終然允臧得愧一作吝千葉黃敢為故林主趙云王仲宣詩飛鳥翔故林黎庶猶未康避賊今始歸春草滿空堂覽物嘆衰謝及兹慰凄凉前詩有入門四松在清風為我起灑面若微霜足以一作為送老資聊待偃蓋張我生無根蒂語吾豈匏爪也哉配爾亦茫茫有情且賦詩事跡可兩忘趙云風言灑則張茂先言穆如灑清風陸機連珠云秋風夕灑足為送老資言可為送老之資助蓋公自言年漸老四松更長所以資助送老之玩矣偃蓋字與松為當體抱璞子天陵偃蓋之松與天齊其久與地等其長故有下句我生無根蒂配爾亦茫茫事迹字史記秦本紀云本原事迹勿矜千載後慘慘蟠窮蒼水檻蒼江多風飈雲雨晝夜飛茅軒駕巨浪焉得不低垂遨子久在外門户無人持高岸尚為谷詩高岸為谷深谷為陵何傷浮柱欹扶顚有勸誡恐貽識者嗤語危而不持顚而不扶則將焉用彼相矣既殊大厦傾可以一木支川林一作臨川視萬里何必欄楹為人生感故物慷慨有餘悲漢高祖過沛置酒沛宮慷慨傷懷泣數行下趙云張平子西京賦跱遊極於浮柱浩重巒以相承注三輔名梁為極作遊梁置浮柱上也可以字如蘇子卿鹿鳴思野草可以喻嘉賔阮嗣宗獨有延年術可以慰我心感故物而悲則如韓詩外傳載孔子出遊少原之野有婦人哭甚哀問之婦人曰向者刈薪亡吾簮是以哀非傷亡簮不忘故也又田子方出見老馬於道喟然有志焉以問於御者曰此何馬也御曰故公家畜也罷而不用故出放之田子方曰少而盡其力老而棄其身仁者不為也束帛而贖之窮士聞之知所歸心舊注引漢祖過沛亦可證慷慨之意破船平生江海心宿昔具扁舟豈惟清溪上日傍柴門遊蒼惶避亂兵緬邈懷舊邱鄰人亦巳非野竹獨修修船舷不重扣江賦咏采菱以扣舷埋沒巳經秋仰看西飛翼下愧東逝流故者或可掘新者亦易求所悲數奔竄白屋難久留趙云江海心謝靈運本自江海人忠義感君子扣舷事晉夏仲育以足扣船歌吳曲仰看西飛翼不愧東逝流則傷不能長往自如若飛鳥之飛水之注也如此則寧不藉船乎今故者亦可加於沙埋之間新者亦可求買惟悲在奔竄不定而不寧居於白屋耳此又反覆曲折詩人之情也公屢以浣花溪為清溪則水色清之溪也謝莊詩清溪如委黛黃花似散金舊邱言浣花舊邱字則鮑明逺復得還舊邱荀子周公待白屋之士營屋趙云詩經之營之謂之營别有所營建我有陰江竹能令朱夏寒陰通積水內高入浮雲端甚疑鬼物憑不顧剪伐殘東偏苦一作若面勢户牖永可安愛惜已六載兹晨去千竿蕭蕭見白日洶洶開奔湍度常匪華麗養拙異考槃草茅雖剃葺衰疾方少寬洗然順所適此足代加餐寂無斤斧響庶遂憩息歡趙云欲竹間起屋之作首四句言竹之茂盛自東偏若面勢而下則言欲起屋矣用愛惜已六載之語推之此今歲永泰元年詩公之草堂云經營上元始斷手寶應年上元元年歲在庚子寶應元年歲在壬寅則有竹已在庚子歲今永泰元年乙已是為六載也與上江村五首之一云迢遞來巴蜀蹉跎又六年同朱夏字梁元帝纂要夏曰朱明亦曰朱夏積水字文字積水成海魏都賦回淵漼積水深雲端字枚乘詩美人在雲端剪伐字詩勿剪勿伐東偏字左傳居我東偏面勢字考工記審曲面勢户牖字老子鑿户牖以為室度堂字考工記室中度以几堂上度以筵考槃字詩之篇名其詩考槃在阿考槃在澗考成也槃樂也言於此養拙而已非若碩人之在阿在澗而後成其樂也除草曰剃周禮有剃氏之官草茅雖剃葺衰病可少寬言雖有剃葺之勞而吾之衰疾乃得寬也加餐字古詩上言加餐飯代加餐則以新屋之成疾寬而順適所致然也寂無斧斤響言屋成而無復用斧斤聲於是乎始有憩息之樂宿青溪驛奉懷張員外十五兄之緒漾舟千山內日入泊荒一作枉渚師云謝靈運五言詩弭棹泊枉渚趙云蜀都賦漾輕舟謝靈運西陵遇風詩漾舟陶嘉月淮南子日入而息選詩通波激枉渚此將至荆南我生本飄飄今復在何許言未有所定止也趙云阮籍詠懷良辰在何許許所也石根青楓林猿鳥聚儔侶言猿鳥猶能聚其儔侶而今不能致於安適則甫之羈困可見矣趙云楚詞江水湛湛兮上有楓楚地多楓公於楚詩每用楓字月明遊子靜畏虎不得語趙云古詩相望一水間脉脉不得語中夜懷友朋乾坤此深阻趙云詩豈不懷歸畏我友朋下句言青溪驛浩蕩前後間佳期付荆楚趙云浩蕩流放之貌祖出楚詞怨靈修之浩蕩又志浩蕩而傷懷又心飛揚兮浩蕩非言水之浩蕩屏迹暮年一作顔甘屏跡幽事供高卧師云陶淵明高卧北忩鳥下竹根行龜開萍葉過年荒酒價乏日併園蔬課獨酌甘泉歌一云獨酌酣且歌歌長擊樽破杜補遺世說王大將軍敦每酒後轍詠魏武樂府曰老驥伏櫪志在千里烈士暮年壯心未巳以如意打唾壺壺口盡缺子美長歌而擊樽破類此趙云暮年作衰顔益下有年荒酒價乏也年荒酒價乏日併園蔬課兩句通義蓋以乏酒價之故則並課園蔬賣之以充沽直獨酌甘泉歌所以承上酒價乏之故且復有屏跡之意一作獨酌酣且歌由是擊樽破則杜田補遺是得作者之意矣贈别賀蘭銛黃雀飽野粟羣飛動荆榛師云李善注劉公幹詩黃雀諭時士也趙云黃雀成羣比時人之蹇淺今君抱何恨寂寥向時人趙云傷賀蘭而問之如下句所云老驥倦驤首驥驥逢伯樂之知驤首長鳴長趙云戰國策汗明見春申君曰夫驥之齒矣服鹽車而上太行漉汗灑地白汗交流中坂遷延負轅不能上伯樂遭之下車攀而哭之解紵衣以羃之驥於是俯而噴仰而鳴聲造於天仰見伯樂之知己今云倦則以無伯樂也蒼鷹愁易馴趙云暗使呂布與慕容垂事愁則以茍於食養而愁也高賢世未識固合嬰飢貧國步初返正初復京師乾坤尚風塵史思明猶鴟張河朔悲歌鬢髮白逺隔湘吳春我戀岷山芋君思千里蓴生離與死别自古鼻酸辛趙云國步反正是廣德元年十二月車駕自陜州還長安而吐番繼陷松維州次年七月僕固懷恩以吐番回紇黨項兵數十萬入冦朝廷大恐十月冦邠州先驅至奉天時郭子儀屯奉天堅壁不戰十一月吐畨乃遁又云是歲嚴武破吐番於當狗城廣德二年公以嚴武再尹成都三月自閬州還成都所云國步初返正言車駕之還長安也又云乾坤尚風塵言吐番等之亂松維也皆不考之語若以為安史之事則在肅宗之至德二載史思明殺安慶緒在此時與前事不相接也下文云我岷下岷山芋千里蒪則此詩豈不是公再還成都乎我戀下芋說在西蜀君思千里蓴說賀蘭赴湘吳岷下芉出貨殖傳卓王孫岷山之下沃野千里下有蹲鴟至死不飢本傳注蹲鴟芋也千里蓴出晉陸機文賦中所云下鹽䜴鼻酸辛高誘云孤子寡婦寒心酸鼻九家集注杜詩卷十
