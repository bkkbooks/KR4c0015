body:
  text: 九家集注杜詩巻三十一宋郭知達編近體詩宗武生日宗武小名驥子䕫州籍中有宗武生日詩盖老杜入蜀而象在鄜州武時尚幼此則已能誦書乃又越數年而作也小子何時見髙秋此日生自從都邑語巳伴老夫名禮自稱曰老夫詩是吾家事人傳世上情熟精文選理新添梁昭明太子集古人文詞詩賦為文選李善甞受文選於曹憲後遂解注文選十六巻休覔綵衣輕凋瘵筵初秩小雅賓之初筵左右秩秩箋云筵席也秩肅敬也海賦為凋為瘵敧斜坐不成流霞分片片涓滴就徐傾趙云王立之詩話云宗武生日詩載在䕫州詩中非也當是家在鄜州時故曰小子何時見自入蜀後未甞别也自從都邑語所謂前年學語時葢老杜與家俱在長安時也巳伴老夫名者老杜既有盛名於時則人皆知其有是子故曰人傳世上情也凋瘵筵初秩則以一生喻一筵㑹也某年月日時巳幾嵗謂之凋瘵之初可也詩箋云秩秩肅敬也然臨時用之與此意不同流霞分片片溳滴就徐傾雖止是言飲酒然用項曼去家三十年止日旁事則其身在行在家在鄜州決矣又有示宗武一首恐非是一時詩也王立之説如此而次公以其説未是此乃公送嚴武至綿已别而少住間遂有徐知道之叛單身如梓則為不見宗武矣前年學語時則才三嵗耳今云熟精文選理則已能誦書自至徳二載至寳應元已六年則宗武九嵗矣宜其能誦詩書也詩云賔之初筵左右秩秩今句云凋瘵筵初秩則以凋瘵才始如筵之初秩豈謂之臨時用之與詩句不同邪東坡詩云今今秩初筵我已迫旅酬亦以初筵比事之始矣都邑字張平子西京賦云都邑游俠趙張之倫故對老夫詩是吾家事則公之祖審言已有詩名公詩甞曰續兒誦文選則熟精文選理者所以責望於宗武也公詩使字多出文選葢亦前作之菁英為不可遺也公又曰遞相祖述復先誰則公之詩法豈不以有據而後用邪綵衣亊列女傳曰老萊子孝養二親行年七十妻兒自娯著五色采衣此雖孝子悦親之事而亦僅同戲侮休覔綵衣輕則公所望其子者在學而巳末句流霞事在抱朴子乃是項曼都自言到天上遇紫府仙人以流霞一盃飲之輒不飢渇以帝前失儀而謫河東號之為斥仙人王立之止云項曼舊注又誤為曼卿故表出之夜一云秋夜客舍露下天髙秋水清江淹别賦露下地而騰文宋玉九辯云泬寥兮天髙而氣清空山獨夜旅魂驚杜云王仲宣七哀詩獨夜不能寐疎燈自照孤㠶宿新月猶懸雙杵鳴南菊再逢人卧病北書不至鴈無情范彦龍寄書雲間鴈為我西北飛步簷一作蟾倚杖看牛斗銀漢遥應接鳯城趙云疎燈自照孤㠶宿新月猶懸雙杵鳴句法葢言疎燈自照之夜正是孤㠶宿新月未沒而猶懸正是江春之杵雙鳴也下一對言南國菊花已再逢矣而人正卧病北地書問不通乃鴈無情傳至也北地以言長安故末句又有鳯城之語步簷舊作步蟾當以步簷為正而字又作櫩檐上林賦云步檐周流李善注曰步檐步廓也謝惠連詩房櫳引傾月步櫩結清風劉孝綽望月詩云微光垂步檐庾信詩步櫩朝未歸互用此也上白帝城白帝城公孫述所築後為劉備屯兵之地改名永安城峻隨天壁趙云天然自立之石壁也樓髙更女墻徐敬業登琅邪城云登陴起遐望注陴女墻增添崔豹古今注女墻城上小墻也亦名睥睨言於墻上睥睨人也江流思夏后禹貢岷山導江東别為沱左傳劉子見河洛而思禹功風至憶襄王宋玉賦楚襄王遊於蘭臺之宫宋玉景差侍有風颯然而至王乃披襟而當之曰快哉此風老去聞悲角人扶報夕陽公孫初恃險躍馬意何長左太沖蜀都賦公孫躍馬而稱帝劉宗下輦而自王師云公孫述恃蜀地險衆附自立為王號成家宿江邊閣暝色延山徑謝靈運林壑斂暝色髙齋次水門薄雲巖際宿孤月浪中翻蘇云何遜入西塞示南府同僚詩云薄雲巖際出初月波中上子美此詩雖因舊而益妍正類獺髓補痕也鸛鶴追飛靜豺狼得食喧不眠憂戰伐無力正乾坤趙云孤月浪中翻自是浪湧而月翻也舊注引舞鶴賦星翻漢回曉月將落與此義不同别崔潩因寄薛據孟雲卿内弟潩赴湖南幕職志士惜妄動知深難固辭如何久磨礪但取不磷淄語不曰堅乎磨而不磷不曰白乎涅而不淄喻君子雖在濁亂不能汙也謝靈運緇磷謝清曠疲薾慙貞堅夙夜聽憂主飛騰急濟時荆州遇薛孟為報欲論詩趙云古詩云志士惜日短志士本惜妄動而受知之深則難固辭此以言潩赴幕職於湖南也左傳磨厲以須葢言如何以久磨礲淬礪便以為利乎所貴尚者取磨不磷涅不緇而巳選云羽爵飛騰魏書安其濟時武侯廟成都記諸葛公廟在先主廟故宅城西復立素像先主廟西院即武侯廟前有雙大柏古峭可愛人云諸葛手植内有裴令公所著碑柳僕射書相國段公古柏文遺廟丹青落空山草木長猶聞辭後主不復卧南陽趙云丹青所以飾廟者也成都先主廟附以武侯祠堂其丹青則存故公於古柏行追言成都先主廟之實則曰窈窕丹青户牖空今此廟中丹青剥落故云陶潛云孟夏草木長辭後主則建興五年率諸軍北駐漢中臨發上表辭行而竟死於軍中今云猶聞則想望其風采猶在也亮家於南陽之鄧縣在襄陽城西二十里號曰隆中今云不復卧南陽傷其巳死也八陣圖武侯推演兵法作八陣圖咸得其要桓温傳初諸葛亮造八陣圖於魚復平沙之上壘石為八行相去二丈温見之謂此常山蛇勢也文武皆莫能識之功葢三分國三分謂呉魏蜀蜀記曰三分我九鼎名成八陣圖江流石不轉杜補遺云劉禹錫嘉話録夔州西市俯臨江沙石下有諸葛亮八陣圖箕張翼舒鵝形鸛勢聚石分布宛然尚存峽水大時三蜀雪消之際澒湧瀑瀁可勝道哉大木十圍枯槎百丈破磑巨石隨波奔流而下則聚石為堆者斷可知也及乎水落川平萬物皆失故態諸葛亮圖小石之堆標聚行列依然如是者僅六七百年迨今不動水趙云功葢三分國指言武侯之功葢覆之也按桑欽經云江又東逕諸葛圖壘南酈道元注曰石磧平曠望兼川陸有亮所造八陣圖東跨故壘皆累細石為之自壘西去聚石八行行間相去二丈因曰八陣既成自今行師庶不覆敗皆圖兵勢行藏之權自後深識者所不能了今夏水漂蕩嵗月消損髙處可二三尺下處磨滅殆盡酈道元之説如此今公詩云江流石不轉則據當時所見者言之自杜公至今又數百年行客云方水落時於石磧就視則茫茫然一磧耳及登髙而望乃隠隠見其行列然則武侯製作不亦近於神異乎習鑿齒曰齊桓一矜其功而叛者九國曹操暫自驕伐而天下三分遺恨失吞呉東坡先生云僕甞夣見人云是杜子美謂僕世人多誤㑹吾八陣圖詩云江流石不轉遺恨失吞吳世人皆以為先主武侯欲與闗羽復仇故恨不能滅呉非也我意本謂吳蜀脣齒之國不當相圖晉之所以能取蜀者以蜀有吞呉之意以此為恨耳此理甚長然子美死僅四百年而猶猶不忘詩區區自列其意者此真書生習氣也奉送韋中丞之晉赴湖南寵渥徵黄漸權宜借㓂頻趙云黄霸冦恂皆以比韋中丞前漢循吏傳黄霸為潁川太守戸口嵗増治為天下第一徵守京兆尹今言天子之寵渥有徵召黄霸之命漸將至矣後漢冦恂傳車駕南征恂從至潁川百姓遮道曰願從陛下復借冦君一年權宜借冦頻則事從權宜而如借㓂恂者頻數言民情之不巳也湖南安背水峽内憶行春後漢鄭𢎞傳太守行春任彦升詩涿令行春返冠葢溢川抵謝夷吾傳行春乗柴車王室仍多故蒼生倚大臣還將徐孺榻處處待髙人陳蕃為徐穉下榻趙云湖南安背水言韋之去峽内憶行春言韋之離此而公有所懷憶也韓信背水而陣大臣指中丞也徐孺子則比韋以陳蕃而待髙人如孺子也謁先主廟成都記曰先主廟府南八里惠陵東七十步齊髙帝夢益州有天子鹵簿詔刺史博覃修立而卑小後至長沙王鍾改更及構四面壇屋置守墓户五百慘澹風雲㑹古詩藹藹風雲㑹佳人一何繁劉植説李軼書以龍虎之姿遭風雲之時時中興二十八將論曰咸能感㑹風雲奮其智勇乗時各有人力侔分社稷志屈偃經綸趙云君臣之遇每以風雲為言也今題是謁先主廟而云惨澹風雲㑹乗時各有人似言言呉魏君臣之相遇亦各有人矣故引下句力侔分社稷言氣力侔等則分社稷而為主分乃三分之分志屈偃經綸則指言劉葛之志不得伸所以偃仆經綸也復漢留長䇿中原仗老臣復漢謂欲興劉氏也老臣孔明也蜀志建安二十五年魏文帝稱尊號改年曰黄初或傳聞漢帝見害先主乃發喪制服譙周等上言曰大王襲先帝軌迹亦興於漢中又大王出自孝景皇帝中山靖王之胄宜即帝位改元章武以諸葛亮為丞相趙云復漢言先主欲興劉氏而稱漢其所留之長䇿則留於後主取中原仗諸葛老臣也過秦論振長䇿而馭宇内老臣在後主言之為前朝之老臣戰國䇿左師觸龍自稱老臣雜耕心未巳歐血事酸辛趙云老臣之下於是言葛亮五丈原之事亮本傳言後主建興十二年春亮悉大衆由斜谷據武功五丈原與司馬宣王對於渭南亮毎患糧不繼使巳志不伸是以分兵屯田為久駐之基耕者雜于渭濱居民之間故曰雜耕心未巳心未巳則未事了而死也公之意以亮未成功而死矣又遭歐血之謗故曰歐血事酸辛阮嗣宗詠懷詩對酒不能言悽愴懷醉辛按元注亮相宣王相持百餘日其年八月亮病卒于軍魏書亮糧盡勢窮憂恚歐血卒臣松之以為亮在渭濱魏人躡迹勝負之形未可測量而云歐血葢因孔明亡而自誇大也夫以孔明之畧豈為仲達歐血乎及至劉琨喪師與晉元帝箋亦云亮軍敗歐血此則引虚記以為言其云入谷而卒縁蜀人入谷發喪故也霸氣西南歇雄圖厯數屯譙周云西南數有黄氣天趙云今葛亮巳死中原莫圖則霸氣所以歇也書曰之厯數在汝躬厯數不在斯為屯矣錦江元過楚劍閣復通秦言拓地至秦楚也趙云錦江劍閣蜀國之地過楚通秦則言其本可以混一而不能焉則所以傷之也舊俗存祠廟空山立一作泣鬼神虗簷交一作扶鳥道枯木半龍鱗趙云此是䕫州先主廟在山中故云虚簷交鳥道鳥道則山中之嶮道也交字一作扶非枯木半龍鱗又是眼前實景謂之枯木非止一物也舊注却引都都諸葛廟前古柏又引習隆尚充等上表後主乞與諸葛亮立廟於沔陽事非徒以諸葛事解先主廟而地理錯亂惑於學者矣又況古柏行亦自是夔州非成都也竹送清溪月苔移玉座春趙云清溪亦是廟前實事玉座指言先主神座也謝𤣥暉銅雀臺詩玉座猶寂寞況乃妾身輕閭閻兒女換歌舞嵗時新趙云此言夔州之人所事先主者如此舊注却引成都記以四月祀十二月祈禱事誤矣絶域歸舟逺荒城繫馬頻如何對揺落況乃久風塵宋玉曰草木揺落而變衰謝𤣥暉辭隨王牋臯壤揺落對之惆悵岐路東西或以鳴唈晉總紀論悠悠風塵之趙云自絶域歸舟逺巳下至寂寞洒衣巾公言其身流落而因先主廟乃即諸葛亮之功以自比而感歎也李陵云出征絶域歸舟指言欲歸長安謝惠連云天際識歸舟言逺則相去之逺今暫留此故於荒城之中頻繫馬而謁此先主廟也揺落秋時也況乃久風塵則嘆其遭兵戈亂離而對之也熟與闗張並功臨耿鄧親趙云此葢弔亮亮于是問其孰與闗張並先主之臣多矣諸葛之外亦稱闗張焉今言諸葛與闗羽張飛之才器孰與並乎言不可並矣徵士傅幹曰劉備寛仁有度能得人死力諸葛達治知變正而有謀而為之相張飛闗羽勇而有義皆萬人之敵而為之將此三人者皆人傑以備之畧三人佐之何為不濟葢當時有三傑之稱然終不可並也功臨耿鄧親則公評品以惟與耿鄧親矣後漢論云冦鄧之髙勲耿賈之鴻烈葢所也以佐光武之中興者應天才不小應一作繼蜀志譙周等上言臣聞聖王先天而天不違後天而奉天時故應際而生與神合契願大王應天順民得士契無鄰遲暮堪帷幄張良運籌帷幄飄零且釣緡詩何彼穠矣其釣何維絲伊伊緡向來憂國淚寂寞洒衣巾謝靈運廬陵王墓下作洒涙眺連崗趙云傳曰得士者昌失士者亡在先主言所謂士者專指諸葛亮而巳舊注不省至引諸葛為股肱法正為謀主闗羽張飛馬超為爪牙許靖糜竺簡雍為賓友不亦贅乎應天一作繼天雖有義而非應應天字乃初起而王者也兩句之義葢公有經綸之心于是因言先主諸葛而思其身之可以作王矣吐蕃尚熾兵戈未息則運籌必有人焉既不得用則亦隠于漁釣而巳故接之以遲暮堪帷幄飄零且釣緡楚詞云傷美人之遲暮末句尤見公之志矣白鹽山卓立羣峯外蟠根積水邊趙云卓立字熟矣其亦起于顔淵云如有所立卓爾虞詡云盤根錯節文子曰積水成海魏都賦曰回淵漼積水深也他皆任厚地爾獨近髙天白牓千家邑清秋萬估一作古船詞人取佳句刻畫竟難傳趙云西京賦云跼髙天而蹐厚地也白牓則言縣額以白為牌耳末句葢言欲以佳句專詠白鹽之狀雖加刻畫終難傳播所以重言于難措辭也晉庾元規語周伯仁曰諸人皆以君方樂周曰樂毅邪元規曰不爾方樂令周曰何乃刻畫無鹽唐突西施灧澦堆巨石一作積水中央蒹葭詩宛在水中央江寒出水長沈牛荅雲雨楚俗祈石而獲雨必沈牛以荅神貺如馬戒舟航坡云三巴録灧澦如象舟船莫上灧澦如馬舟船莫下長年三老常以此候之張華詩云象馬誠可驗波神亦露機永叔以為絶唱有包蓄之法天意存傾覆選云翦焉傾覆神功接混茫莊子繕性古之人在混茫之中與一世而得澹漠焉干戈連解纜行止憶垂堂趙云巨石言積石之巨者世言灧澦如馬為其有戒乃天意之存傾覆也公論詩曰篇終接混茫葢行語用字當皆如此末句用垂堂字因慮傾覆之戒而及之史曰千金之子坐不垂堂而干戈之變解纜之危二者相連可不慎乎瞿塘懷古西南萬壑注勍敵兩崖開地與山根裂江從月窟來削成當白帝蜀魚復縣公孫述更名白帝自後為重鎮空曲隠陽臺䟽鑿功雖美郭景純江賦巴東之峽夏后疏鑿陶鈞力大哉白帝城樓江度寒山閣城髙絶塞樓翠屏宜晚對天台賦搏壁立之翠屏注石屏風如壁立白谷㑹深遊急急能鳴鴈輕輕不下鷗夷陵春色起漸擬放扁舟趙云白谷疑是夔州谷名公于課伐木云終朝飯其腹持斧入白谷又南極詩亦云西江白谷分也莊子主人之鴈其一能鳴其一不能鳴不下鷗字列子海上之人有好鷗鳥者毎旦從鷗鳥遊鷗鳥之至者百往而不止其父曰吾聞鷗鳥從汝游汝取來吾玩之明日之海上鷗鳥舞而不下也夷陵峽州也公葢期春時扁舟往矣寄杜位頃者與位同在故嚴尚書幕寒日經簷短窮猿失木悲晉書窮猿奔林豈暇擇木峽中為客恨江上憶君時天地身何往風塵病敢辭封書兩行淚霑洒裛新詩趙云窮猿失木悲道眼前事因以興也峽中多猿淮南子曰猿狖顛蹶而失木也孟浩然云還將兩行淚遥寄海西頭冬深花葉隨天意江溪共石根早霞隨類影寒水各依一作流痕易下楊朱淚難招楚客魂風濤暮不穏捨棹宿誰門趙云花葉隨天意似言冬深矣其花葉不若春夏之盛亦隨天意而巳江溪共石根則江與溪皆共石根而流也早霞隨類影言其變態不常隨所類之影而呈現也寒水各依痕則舊痕有定所而依之也楊朱泣岐路謂可以南可以北公之流落困于岐路故云爾宋玉哀屈原憂愁山澤魂魄飛散其命將落故作招魂今云難招楚客魂則以屈原自比也末句則公欲南下以嵗暮而未成行此篇有兩字隨字公必不重用然皆不可以俟明識不寐瞿塘夜未黑城内改更籌翳翳月沈霧輝輝星近樓張景陽詩翳翳結繁雲氣衰甘少寐心弱恨知愁一作和愁多壘滿山谷曲禮四郊多壘桃源無處求趙云氣衰則少寐而甘之心既弱矣恨其知愁則恐以愁而尤弱也晉史云吾平生不識愁今始解愁矣此知愁之義舊本作和愁非是時干戈未息故云多壘滿山谷非若桃源之可以避地而問桃源何處則以仙境難造也桃源在武侯縣今之鼎州陶淵明集載此亦公欲南下故及之奉送十七舅下邵桂絶域三冬暮東方朔傳三冬文史足用浮生一病身感深辭舅氏渭陽詩我送舅氏别後見何人縹緲蒼梧帝檀弓舜葬于蒼梧之野謝𤣥暉雲去蒼梧野推遷孟母鄰昏昏阻雲水側望苦傷神張平子四愁詩側身東望涕霑巾蜀都賦望之天迴即之雲昏梧趙云莊子曰其生兮若浮蒼梧桂州也虞舜死于蒼之野蒼梧帝指言虞舜以述十七舅所往之處也字出梁呉均酬鮑畿詩依依望九疑欲謁蒼梧帝何平叔景福殿賦曰侔孟母之擇鄰也今云推遷孟母鄰則孟母指言十七舅之母意者公本與十七舅鄰居今其去則孟母所以與鄰之意推遷而往矣送覃二判官先帝弓劒逺小臣餘此生黄帝葬于橋山南空棺無尸唯劒舄在前漢郊祀志黄帝采首山銅鑄鼎于荆山下鼎既成有龍垂胡髯下迎黄帝帝下騎餘小臣不得上趙云此篇詩意直是送覃判官往長安矣先帝言肅宗也公始以三賦受寵于𤣥宗又事肅宗即今専言肅宗則以下不復謁承明推之而以先帝上昇比黄帝也故云弓劍逺事當如世説曰王子喬墓在金陵戰國時人有盜發之者都無所見唯有一劍停在空中又如異苑曰晉惠帝元康三年武庫火燒孔子履髙祖斬白蛇之劍咸見此劒穿屋飛去莫知所向弓與劒葢皆人君服御之物既以黄帝之弓比先帝之弓則或以仙人王子喬之劒或以漢髙祖之劒比先帝之劍亦自為當體矣故知弓劍應是兩事也前漢郊祀志云上曰黄帝不死有冢何也或對曰黄帝以僊上天羣臣塟其衣冠元無劒字而舊注乃以弓劍并為黄帝事不知何所據邪蹉􅋸病江漢不復謁承明選云鯨魚失流而蹉􅋸前漢嚴助傳君厭承明之廬張晏曰承明之廬在石渠閣外直宿所指曰廬曺子建贈白馬王彪詩曰謁帝承明廬應休璉百一詩問我何功徳三入承明廬趙云公于肅宗為拾遺則甞謁帝矣餞爾白頭日永懷丹鳯城趙云丹鳯城指言長安帝城也秦穆公女弄玉吹簫鳯集其城因號丹鳯城李嶠城詩云獨下仙人鳯羣驚御史烏正用此事而公詩亦屢使然用于長安方為親切則杜公之詩是也近矣世文人作詩作辭便用京師為鳯城亦無謂遲遲戀屈宋渺𣺌卧荆衡屈原宋玉魂斷航舸失天寒沙水清肺肝若稍愈亦上赤霄行七命掛歸翮于赤霄之表楚趙云戀屈宋卧荆衡所以言其在地也屈則屈原宋則宋玉荆則荆渚衡則衡山也魂斷航舸失言望覃二判官之去航黯然作别而魂斷也亦上赤霄行則有意于歸長安而見君矣赤霄字楚詞云載赤霄而凌太清乃字之祖也夜宿西閣曉呈元二十一曹長城暗更籌急樓髙雨雪微稍通綃幕霽逺帶玉繩稀謝𤣥暉玉繩低建建章注玉繩星名門鵲晨光起一作喜檣烏宿處飛杜補遺謝𤣥暉詩金波麗鳷鵲玉繩低建章鳷鵲門名也故曰門鵲檣掛㠶木而烏泊其上故子美公安送李二十九詩又有檣烏相背發之句過南嶽入洞庭詩亦曰莫恠啼痕數危檣逐夜烏也然子美發潭州詩又云檣燕語留人詩不特檣烏而巳故燕子來舟中作斷句云暫語航檣還永去穿花落水益霑巾鳷鵲又觀殿名趙云此篇為義本明特公使字有三可疑而尋繹其義則明矣綃幕字如言天之六幕也禮樂志天門歌云紛紜六幕浮大海綃幕則又言天之色其薄如綃故云綃幕霽若言所縣之綃幕則無義矣故對王繩于天綃幕之霽而帶星玉繩之色稀微乃一體事以言夜深將曉矣故有下句門鵲則門之鵲也如城鵲之類義在起字可以見其為門前之鵲字本莊子曰鵲上髙城之絶而巢于髙樹之顛城壞巢折凌風而起故君子之在世也得時則蟻行失時則鵲起鵲以晨光而起故其義在起字杜田引謝𤣥暉詩金波麗鳷鵲以鳷鵲門名也故曰門鵲大為非是葢鳷鵲本殿名其所從入之門因亦得名鳷鵲門也謝𤣥暉之詩其言月色之所麗豈専指門邪信使杜公用鳷鵲専為門乃是天子宫殿事今夜宿夔州之西閣豈可用天子宫殿事乎又鳷鵲為殿名特屋上作鳷鵲之形而門名又因之而已何至截鳷鵲宇便為門鵲之真者乎檣而係之以烏公屢使矣此烏非真是屋上烏之鳥也特檣竿上刻為烏形以占風耳晉令車駕出入相風在前正是刻烏于竿上名之曰相風晉傅𤣥相風賦云棲神烏于竿首俟祥風之來征是已船之檣竿其上刻烏乃相風之義陳隂鏗廣陵殿送北使詩云亭嘶背櫪馬檣轉向風烏于義尤明故公有云檣相背發危檣逐夜烏而今云檣烏宿處飛杜時可不省乃云檣掛㠶木而烏泊其上假是真烏泊檣上何至背發與夜相逐而于宿處飛乎況公詩又有曰燕子逐檣烏逐檣上之刻烏而飛也寒江流甚細有意待人歸西閣口號呈元二十一山木抱雲稠寒江繞上頭雪崖纔變石風幔不依樓社稷堪流涕賈誼上疏陳政事可為流涕者安危在運籌張良運籌帷幄之中看君話王室感動幾銷憂趙云上頭下頭是方言處所之上下耳非髙下之上也雪崖纔變石言雪下漫崖變其石色為白也風幔不依樓言風吹幔簸蕩而不得著于樓也東方朔銷憂者莫若酒有歎傳蜀官軍自圍普遂壯心久零落魏武帝樂府曰烈士暮年壯心不已白首寄人間天下兵常鬪江東客未還窮猿號雨雪晉書窮猿奔林老馬泣闗山管仲曰老馬之智可用也武徳開元際蒼生豈重攀趙云武徳髙祖年號開元明皇年號所以追念祖宗之盛時也西閣雨望樓雨霑雲幔山寒著氷城逕添沙面出湍減石稜生菊蘂凄疎放松林駐逺情滂沱朱檻濕詩俾滂沱矣萬慮傍簷楹沈休文細烏傍簷飛出趙云雲幔則帶雲之幔以西閣髙故也逕添沙面湍減石稜生可謂竒語矣逕之所以添以水落而沙面出也湍減則石露而其稜自生也簷楹簷邊之柱傍倚簷楹固有所思矣不離西閣二首江柳非時發江花冷色頻地偏應有瘴陶潛詩心逺地自偏臘近巳含春失學從愚子無家任一作住老身轉何恤乎無家不知西閣意肯别定留一作何人趙云疊二江字即謝靈運江南倦厯覽江北曠周旋之勢也末句所謂新語言西閣之意肯令我别乎莫定要留人也一作何人無義右一西閣從人别人今亦故亭江雲飄素練一作葉石壁斷空青杜補遺空青字從古詩人無敢使者惟子美此詩及李太白使之而句法又相類太白詩云林煙横積素山色倒空青滄海先迎日銀河倒列星平生躭勝事吁駭始初經趙云從人别則以成前篇肯别之意人今亦故亭西閣所以任從人别之而去者以人之身亦如一故亭而巳素練一作素葉無義在滄海之先巳迎日矣以見西閣髙而見日之早星河未沒而見日出所以吁嗟駭愕于始初經臨也右二送鮮于萬州遷巴川杜補遺按盧東美撰鮮于氏冠冕頌序曰炅廣徳中為尚書都官郎出守萬州轉巴州皆有理稱三世為郎故冠冕為海内盛族京兆先時傑杜補遺鮮于萬州名炅仲通之子也仲通天寶末為京兆尹弟叔明字晉乾元中亦為京兆尹長安歌曰前尹赫赫具瞻允若後尹熙熙具瞻允斯琳琅照一門杜補遺世説有人詣王太尉遇王安豐大將軍丞相在座别屋見季允平子還語人曰今日之行觸目見琳琅珠玉朝廷偏注意天下安注意相接近與名藩祖帳排舟數疏廣傳説祖道供帳寒江觸石喧看君妙為政他日有殊㤙蜀都賦觸石吐雲云趙云自萬遷巴故接近公羊云太山之雲觸石而出也西閣三度期大昌嚴明府同宿不到趙云唐地理志夔州雲安郡本信州巴東郡管縣四大昌其一也本朝端拱二年以此縣𨽻大寧監問子能來宿今疑索故要趙云索者尋索之索要如要君之要問子自能來此宿矣而不來者葢疑以我尋索故要我也匣琴虛夜夜手板自朝朝薛云桉南史庾道敏善相手板世説王子猷以手板拄頰云西山朝來致有爽氣趙云上句則期之不來遂廢彈琴故虛夜夜下句則言嚴明府自持手板以入官府于朝朝也金吼霜鐘徹花摧蠟炬銷薛云右桉山海經豐山之鐘霜降自鳴豐山今在鄧州南陽縣北三十里又梁劉孝威燭詩浮光燭綺席凝滴汗垂花趙云兩句則以待嚴君至曉也鐘以曉而霜氣侵之故謂之霜鐘古蠟字惟有臘耳今杜公所用即非俗字也早鳬江檻底雙影謾飄颻王喬鳬舄謾趙云句言雖以早來巳為矣鳬影事即後漢王喬為葉令者也曉望白帝城鹽山徐步移班杖看山仰白頭翠深開斷壁紅一作江逺結飛樓日出清江一作寒望暄和散旅愁春城見松雪顔延年詩山明望松雪始擬進歸舟趙云紅逺對翠深方為工又下句巳有清江望矣日出對暄和清江望對散旅愁自是不對而公詩氣渾成葢不拘也古樂府詩春城起風色謝惠連云天際識歸舟而公則以必歸長安為歸舟矣西閣二首巫山小揺落宋玉九辯草木揺落而變衰燕歌行草木揺落露為霜趙云小揺落則七月也楚地暖其揺落也小小而巳碧色是松林百鳥各相命杜補遺周書時訓曰鵙始鳴通卦驗曰鵙伯勞也鳴者相命也薛云右按王粲登樓賦鳥相鳴而舉翼注大戴禮夏小正云鳴也者相命也孤雲無自心陶淵明詠貧士詩云萬旅各有託孤雲獨無依又歸去來辭云雲無心而出岫佛書有自心他心公乃參合用矣層軒俯江壁招魂髙堂䆳宇檻層軒些要路亦髙深選先據要路津以趙云要路亦髙深則雖要衝之路亦在髙深間此可見其皆山行而巳然江壁字對髙深則公詩往往有不拘如此朱紱猶紗帽新詩近王琴趙云朱紱則朝服而紗帽則隠者之巾公官雖省郎而身則閒曠故云朱紱猶紗帽詩與琴俱不廢故云新詩近玉琴也張華荅何劭云良朋新詩江淹去故都賦撫玉琴兮何親功名不早立衰疾謝知音趙云謝靈運詩云衰疾忽在斯哀世無王粲終然學越吟趙云為在西閣故使登樓事魏王粲字仲宣山陽人獻帝西遷粲從至長安以西京擾亂乃之荆州作登樓賦葢懷土之作也故其賦有云鍾儀幽而楚奏莊舄顯而越吟今公自諫以為雖不是王粲而在西閣中有同粲之登樓又身為尚書郎非不顯矣于此懷思故鄉有如舄之吟也史記曰陳軫適楚還秦秦惠王曰子去寡人之楚亦思寡人不陳軫對曰昔越人莊舄仕楚執珪有頃而病楚王曰舄故越之鄙細人也今任楚執珪富貴矣亦思越不中射之士對曰凡人之思故在其病也彼思越則越聲不思越則楚聲使人往聽之猶尚越聲也今臣雖棄逐之楚豈能無秦聲者哉右一懶心似江水日夜向滄洲謝𤣥暉詩既懽懷禄情復叶滄洲趣滄洲乃十洲之處杜補遺東方朔十洲記漢武帝見王母言八方巨海之中有祖洲瀛洲元洲炎洲長洲充洲鳯麟洲聚窟洲流洲生洲也不道含香賤尚書郎含雞舌香以其奏事荅謝欲使氣芬芳杜補遺應劭漢官儀曰始桓帝時侍中刁存年老口臭上出雞舌香與含之頗辛螫疑有過賜毒藥歸舍辭訣家人哀泣不知其故僚友取其藥驗之無不嗤笑後尚書郎含雞舌香始于此也其如鑷白休杜補遺南史鬱林王年五歳戲髙帝傍帝令左右鑷白髪問王我誰耶荅曰太翁帝笑謂左右曰豈有為人作曽祖而拔白髪乎即擲鏡鑷經過凋碧柳蕭索倚朱樓趙云阮籍詩西遊咸陽中趙李相經過舊本作調碧柳或者遂曰調和也言見柳之慣而與之和熟也後之詞人亦有弄柳調花之句大段費力師民瞻本作凋碧柳則通下句一義葢言秋時也況公詩又有曰清秋凋碧柳畢娶何時竟謝靈運謂子尚曰男娶女嫁畢敕斷家事勿復相闗消中得自由趙云雖實事而相如有此疾也豪華看古往服食寄㝠搜選服食求神仙天台賦逺寄㝠搜詩盡人間興兼須入海求趙云豪華一本誤作䝉華而舊注遂云䝉叟著南華經大段非是庾信見遊春人詩云長安有狹斜金穴盛豪華而唐人在公之前則虞世南門有車馬客云財雄重交結戚里擅豪華選詩云服食求神仙古往今來熟矣故對㝠搜末句公方欲南下故有入海之語右二卜居屈原作卜居一首原往太卜鄭詹尹家卜巳宜何所居因述其詞歸羨遼東鶴續搜神記曰遼東華表柱有鶴集其上曰有鳥有鳥丁令威去家千年今始歸城郭如故人民非何不學仙冡纍纍吟同楚執珪趙云歸羨遼東鶴則嘆其不得歸鄉也史記曰莊舄故越之鄙細人也為楚執珪病而尚猶越聲本出無吟字而王粲登樓賦云莊舄顯而越吟也今云吟同楚執珪又以言其懐鄉矣世有名賢詩話載本朝熙寧初張侍郎掞以二府成詩賀王文公公和曰功謝蕭規慙漢第㤙從隗始詫燕臺示陸農師陸曰蕭規曺隨髙帝論功蕭何第一皆摭故實而從隗始初無㤙宇公笑曰子善問也韓退之鬪雞聯句感㤙慙隗始若無據豈當對功字邪次公謂今楚執珪越聲本無吟字而公用王粲賦足之此作詩用字祖法王文公葢自得此刀尺耳未成遊碧海著處覔丹梯謝靈運詩躧步陵丹梯謝𤣥暉詩即此陵丹梯不趙云按十洲記云東有碧海廣狹浩汗與東海等水鹹苦正作碧色著處覔丹梯則常好山遊也雲障寬江北春耕破瀼西趙云雲障以言山聳雲而障蔽寛江北則夔江之北其山稍逺為寬矣夔人有江南江北之稱今葢自赤甲而遷此江北乃瀼西之地瀼者水名音讓桃紅客若至定似昔一作晉人迷趙云句使武陵事見陶淵明集今則公以其所居為桃源也玉腕騮江陵節度衞公馬也聞説荆南馬尚書玉腕騮頓驂飄赤汗漢天馬歌天馬下霑赤汗跼蹐顧長楸詩正月注跼曲也蹐累足也曹子建名都篇走馬長楸間趙云跼蹐兩字而對頓驂豈或頓止或驂駕亦是兩字乎又恐公之不拘也胡虜三年入乾坤一戰收趙云此言馬之功矣天寶十五載安禄山陷京師至徳二載復京師衞公之馬豈正于此時得用乎舉鞭如有問欲伴習池遊趙云襄陽記峴山南習郁大魚池山簡每臨此池飲輒大醉而歸常曰此我髙陽池也城中小兒歌之曰山公去何逺來至髙陽池日夕倒載歸酩酊無所知時時能騎馬倒著白接䍦舉鞭向葛强何如并州兒强葢其愛將也今句所云葢用山簡騎馬以比衞公而身比葛强矣見王監兵馬使説近山有白黑二鷹羅者久取竟未能得王以為毛骨有異它鷹恐臘後春生騫飛避暖勁翮思之甚眇不可見請余賦詩詩二首雲飛玉立盡清秋不惜竒毛恣逺遊在野只教心力破千人何事網羅求趙云如雲之飛如玉之立皆言其白至清秋之盡則序所謂臘後春生騫飛避暖矣故有下句不惜竒毛恣逺遊也在野只教心力破千人何事網羅求兩句通義葢序云羅者竟未能得也言鷹在野虛費千人網羅之心力矣師民瞻本干人何事則俗所謂干他甚事之義却成公不許人求之矣不必泥千人不對在野也一生自獵知無敵百中爭能恥下鞲史滑稽傳注鞲臂捍也東觀記太守桓虞署趙勒為督郵貪令自去虞嘆曰善吏如使良鷹下鞲命中趙云鷹所以用獵也謂其野鷹故云自獵庾信詩野鷹能自獵江鷗􅄙獨漁知無敵則自人言之決知其無敵也今詩句言鷹之百中自與其類爭能而恥下調縱之鞲也亦以野鷹之故耳鵬碍九天須却避兎經三窟莫深憂鵬事見莊子馮諼曰狡兔所以免于死者有三窟今為君一窟矣趙云葢大言之而亦鷹之實事孔氏志曰楚文王少時雅好田獵天下快狗名鷹畢聚焉有人獻一鷹曰非王鷹之儔俄而雲際有一物凝翔飄颻鮮白而不辨其形鷹見之于是竦翮而升矗若飛電須臾物墮如雪血灑如雨良久有一大鳥墮地而死度其兩翅廣數十里喙邊有黄衆莫能知時有博物君子曰此大鵬雛也始飛焉故為鷹所制文王乃厚賞獻者鷹之任正以搦兔莫深憂則言如狡兔者自能免其死何用憂為以喻姦人之幸免歟抑亦張綱所謂豺狼當道安問狐狸之意邪右一黑鷹不省人間有度海疑從北極來趙云北極北方之極也爾雅有四極曰東至于泰逺西至于邠國南至于濮鈆北至于祝粟謂之四極北方肅殺之氣故鷹多生于北如孫楚云生井陘之巖阻是巳舊注春秋之命苞云瑶光為鷹意以瑶光為北斗之名北斗與北極不同同矣又星氣為之而巳豈謂謂之從彼來乎正翮摶風超紫塞立冬幾夜宿陽臺趙云正翮則整翮之謂立冬則月令某日立冬紫塞北方之塞也崔豹古今注曰秦所築長城土色皆紫漢塞亦然故稱紫塞立冬字師民瞻本作𤣥冬字出梁元帝纂要冬曰𤣥冬然以正翮對之别無所出處宋玉朝雲賦陽臺之下言鷹在峽中實道其事虞羅自各虛施巧隋魏彦深鷹賦何虞者之多端運横羅以羈束春鴈同歸必見猜萬里寒空秖一日金眸玉爪不凡材鴈門有紫疆城草皆色紫曰紫塞騫趙云虚施巧則未能得矣次句又序所謂臘後春生飛避暖故云與雁同歸北塞而雁有見猜之理矣又所以成超紫塞之句也右二鷗江浦戲鷗戲無他亦自饒却思翻玉羽隨意㸃春苗雪暗還須浴一作落風生一任飄幾羣滄海上清影日蕭蕭趙云無他言無他憂虞也所以亦自饒縱而浮泛下句又言鷗以浮泛江浦為未饒縱又思明年之春田有新苗翻玉羽而㸃之斯為飛翻之隨意矣下得㸃字不亦竒乎浴于雪中固是鷗中之耐寒風生而飄是一事南越志曰江鷗一名海鷗在漲海中隨潮上下常以三月風至乃還洲嶼頗知風雪若羣飛至岸渡海者以此為候故又有末句滄海之語猿裊裊啼虚一作雲壁蕭蕭掛冷枝艱難人不免隠見爾如知慣習元從衆全生或用竒前林騰毎及父子莫相離趙云宜都山川記峽中猿鳴至清諸山谷傳其響行者歌曰巴東三峽猿鳴悲猿鳴三聲淚霑衣此啼之事也張載論白猨𤣥豹藏于櫺檻何以知其接垂條于千仭此掛之事也又蕭詮詩掛藤疑欲飲艱難人不免兩句似難解豈言道路艱難人所不免而有出有處是為隠見然不知隠見之機若猿則知之也葢猿之便捷常隠茂林之中公又曰猿捷長難見若莊子有見巧之狙則猿之可羅者斯或隠或見猿葢如知之乎若其便捷之慣衆猿皆如此次句言其于便捷之中得以全生如摶矢避弓之事末句又深言其意矣黄魚日見巴東峽荆州記巴東三峽巫峽長黄魚出浪新脂膏兼飼犬韓愈又魚詩飼犬驗今朝魚杜補遺鹽鐵論曰荆山之下以王抵鵲江陵之人以飼犬又王充論衡曰鍾山之下以玉抵鵲彭蠡之濱以魚食犬長大不容身筒桶相沿久風雷肯為神泥沙巻涎沫回首恠龍鱗筒桶捕魚器也餌趙云筒桶㪚布江中以繫觀其沒以為驗而隨其困以取之也風雷肯為神葢不肯為神也若龍者則風雷為之神矣黄魚徒大似龍鱗乃不能起風雷此所以為可恠也白小白小羣分命易曰物以羣分天然二寸魚細微霑水族風俗當園蔬入肆銀花亂傾箱雪片虚生成猶拾卵盡取義何如西京賦攫胎拾卵蚳蝝盡取白趙云取白小生成之物遂猶拾卵而盡取矣葢言小之微細所當宥也麂永與清溪别䝉將玉饌俱無才逐仙隠不敢恨庖厨亂世輕全物微聲及禍樞衣冠兼盜賊饕餮用斯須文十八年傳縉雲氏有不才子天下之民以比三凶謂之饕餮注貪財為饕貪食為餮趙云梁王筠侍晏餞臨川王北伐四言詩曰玉饌駢羅瓊漿泛溢無才逐仙隠則仙家甞乗鹿車或騎鹿也亂世輕全物之物及禍樞似言聖世猶不至于暴殄天物而亂世輕全生之物才聞鹿鳴之微聲則禍隨之矣或曰鹿好其類聞鳴則聚故人學為其鳴以致之柳子厚所謂楚之南有獵者為鹿鳴以感其類伺其至發火而射之是已末句言衣冠之人行如盜賊惟知饕餮而巳故使人多害生物用以充庖止在斯須之間焉然則公之仁心于物又不避忌諱矣雞紀徳名標五史有紀徳之碑韓詩外傳田饒曰夫雞平頭戴冠文也足傅距武也見敵而闘勇也得食相呼義也鳴不失時信也雞有五徳君猶烹而食之其所由來近也初鳴度必三禮文王世子雞初鳴衣服至寢門殊方聽有異晉祖逖與劉琨同寢中夜聞雞鳴蹴琨曰此非惡聲因起舞失次曉無慙詩雞鳴匪雞則鳴蒼蠅之聲後漢應門失守闗雎刺世趙云度必三則史記所謂雞三號也必三字出禮記喪服大傳公在夔為殊方而聽雞鳴有異于中原之它日則以雞多失鳴之次而天既曉矣殊無慙也也此失字乃陳夀國志所謂失旦之雞者矣舊注引詩非是問俗人情似充庖爾輩堪禮充君之庖氣交亭育際巫峽漏司南趙云孔子云入國而問俗禮記何謂人情爾輩字出選葢言以雞充庖者皆風俗人情之常爾又引末句意言雞之所以充庖以其生息之繁葢一氣之所亭育也梁劉孝緯謝給藥啓一物之微遂留亭育方氣所交以亭育萬物之際其在巫峽之地為泄漏其司南之氣則于此雞之多可以充庖而足也晉輿服志有司南車其用之于義理如梁劉勰文心雕龍體性篇有云文之司南用此道也則言文之指迷如司南車焉今公又借字以言氣之司于南方耳所見如此更俟明識然今公此篇巳已上數篇大率皆作惱語以含深意耳别蘇徯赴湖南幕故人有遊子棄擲傍天隅李陵詩遊子暮何之又各在天一涯他日憐才命居然屈壯圖十年猶塌翼陳琳檄忠義之佐垂頭塌翼絶倒為驚呼音琅琊王澄毎聞衞玠言輒歎息絶倒故時人為之語曰衞玠談道平子絶倒趙云他日前日也前日甞憐愛蘇之才命以為必超騰矣而今居然猶壯圖之屈也尹文子曰形之與名居然别矣絶倒義葢氣絶而欲倒也故笑亦謂之絶倒消渇今如此司馬相如常有消渇病提攜媿老夫禮長者與之提攜豈知臺閣舊洗拂鳯凰雛蜀龎統號鳯雛易林鸞者鳯之雛得實翻蒼竹棲枝把翠梧趙云公自言其有消渇之病不能提攜蘇徯為媿也下四句遞相惟其以不能提攜為媿故豈更知其能以以臺閣之舊而先奬拂鳯之雛也公曽為左拾遺是為臺閣舊古有鳯將雛之曲蘇乃公故人之子故目之為鳯凰雛莊子曰鳯凰非梧桐不棲非練實不食謂竹實之白如練也北辰當宇宙南岳據江湖國帶煙塵色兵張虎豹符杜詩傳發兵皆以虎符數論封内事揮發府中趨趙云上句言帝都語曰北辰居其所而衆星共之是巳次句言湖南據者以蘇徯往為幕客故指其地而言是時干戈未息故云國帯煙塵色三字葢如庾信詠懷詩云馬有風塵氣人有闗塞衣也虎符豹符則所以發兵也惟其如此而蘇徯徃為幕客則數論其湖南封内之事于府趨之間發揮之也古樂府陌上桑曰盈盈公府步冉冉府中趨贈汝秦人䇿文十三年傳秦伯使士㑹行繞朝贈之以䇿曰子無謂秦無人吾謀不適用也莫鞭轅下駒灌夫傳上怒内史曰今日廷論局促效轅下駒駒趙云夫䇿所以撾馬贈汝秦人䇿則勸之以必行所以駕轅莫鞭轅下駒則戒之以無妄舉矣月圓孤月當樓滿寒江動夜扉委波金不定前漢樂志云月穆穆以金波照席綺逾依江淹詩綺席生浮埃席趙云委于波中則蕩漾而金色不定照上則與綺繡相依委字與照字皆月身上字月賦云委照而呉業昌此所謂委照委下其照也波金字金波之倒也席綺字綺席之倒也六韜曰紂時婦人以文綺為席未缺空山靜髙懸列宿稀故園松桂一作菊發萬里共清輝古詩千里共明月又清輝溢天門趙云未缺言月之尚圓記云三五而盈三五而缺髙懸言月之著象列宿稀則月明星稀也謝莊月賦隔千里兮共明月沈約望秋月云清輝懸洞房松桂一作松菊非中宵西閣百尋餘西京賦巨獸百尋八尺曰尋中宵步綺䟽天台賦皦曰烱晃于綺䟽陸機振風薄綺疏選賦云照文虹于綺疏注窗也飛星過水白落月動沙虚擇木知幽鳥家語曰鳥能擇木木豈能擇鳥詩鳥鳴嚶嚶出自幽谷趙云動字公屢使如星臨萬戸動寒江動夜扉今云落月動沙虚只一動字為有精神矣潛波想巨魚古詩潛虬思餘波漢書巨魚縱大壑親朋滿天地兵甲少來書白帝樓漠漠虛無裏陸機詩街巷紛漠漠連連睥睨侵見本巻上白帝城詩樓光去日逺峽影入江深臘破思端綺古詩客從逺方來遺我一端綺春歸待一金去年梅柳意還欲攪邊心詩祇攪我心也趙云睥睨城上女墻侵則侵虚無之裏言其髙也韓子云世有百金之馬無一金之鹿也臘破思端綺所以禦寒且為新服春歸待一金所以充費且以為賞故有末句梅柳之興送王十六判官客下荆南盡君今復入舟買薪猶白帝鳴櫓巳一作少沙頭江陵呉船至泊于郭外沙頭衡霍生春早瀟湘共海浮荒林庾信宅為仗主人留趙云頷聯葢言舟未行尚在白帝城下買薪而沙頭猶欠此舟鳴櫓而泊也師民瞻作巳沙頭句及衡霍瀟湘則王判官所經往之地當以郴衡為止乎衡霍以公之時言之則一山而受二名厥後皮日休作霍山賦上之朝廷以正霍之本地乃在夀州故其駢邑曰霍其賦中云自漢之後後乃易我號而歸于衡公今所謂衡霍則當時言衡山猶曰衡霍故對瀟湘瀟湘則湘江也衡霍瀟湘其處自江陵而往則王判官者豈非將往彼而後止乎于衡霍言生春早則送之之日探言之也庾信南陽新野人父肩吾文學獨步江南信仕梁值侯景之亂奔于江陵則于江陵有舊宅焉主人則王所至江陵之處主人也奉送卿二翁統節度鎮軍還江陵火旗還錦纜龍旗九旒以象大火諸侯所建鳥􅒅七旒以象鶉火州里呉甘寧以錦維舟維舟白馬出江城趙云火旗朱旗也還錦纜則軍從舟中歸矣隋煬帝為錦纜龍舟乃天子事而甘寧亦甞為錦纜則富貴家事而巳龎徳好騎白馬號白馬將軍以比卿二翁也嘹唳吟笳發蕭條别浦清寒空巫峽曙落日渭陽明趙云吟笳軍中之所吹也别浦則舟經之處也寒空巫峽曙説夔州公之在也也落日渭陽明説長安所以懐鄉又暗有卿二翁者乃公舅翁之義也師民瞻作渭陽情不必如此留滯嗟衰病何時見息兵嘆其留滯于夔而懐望長安也閣夜嵗暮隂陽催短景謝靈運雪賦嵗將暮時既昬鮑照舞鶴賦嵗崢嶸而催暮又窮隂殺節急景凋年天涯霜雪霽寒宵五更鼓角聲悲壯三峽星河影動搖顔氏家訓問一夜何故五更曰更厯也經也著杜補遺西清詩話云作詩用事要如釋語水中鹽飲水乃知鹽味此説詩家秘宻藏也如子美五更鼓角聲悲壯三峽星河影動揺人徒見陵轢造化之工不知乃用故事也禰衡撾漁陽摻其聲悲壯漢武故事星辰影動揺東方朔謂民勞之應則善用故事如繫風捕影豈有迹耶野哭幾家聞戰伐夫子惡野哭者非其所而哭曰野哭夷歌是一作數處起漁樵蜀都賦曰陪以白狼夷歌成章卧龍躍馬終黄土卧龍謂孔明也郭外有孔明廟躍馬謂公孫述也城有白土帝祠此二人蜀之英雄言不免歸于人事音書一作依依漫寂寥蜀都賦公孫躍馬而稱帝寥趙云英雄皆不免于死人事依依何至漫自寂乎一云人事音塵無義白帝城最髙樓城尖徑仄一作翼旌斾愁獨立縹緲之飛樓海賦神仙縹緲峽坼雲霾龍虎睡江清日抱黿鼉遊扶桑西枝對斷石日出暘谷浴于咸池拂于扶桑山海經云大荒之中暘谷上有扶桑十日所浴九日居下枝一日居上枝皆戴烏弱水東影隨長流薛云淮南子弱水出自窮石注窮石在張掖北其水弱不能勝羽杖藜嘆世者誰子泣血迸空回白頭趙云徑仄舊作徑昃巳誤又作徑翼無義旌斾愁則城上屯戍之旗也縹緲髙逺不明之貌魯靈光殿賦云忽縹緲以響像公所用主此頷聯言峽壁開坼而雲氣霾龍虎之睡江水澄清而日光抱黿鼉之游腹聫則為張大之語以見樓之最髙也扶桑在東故望見其向西之枝且與斷石相對隔也道書言蓬萊隔弱水三十萬里以弱水在東所以言東影非禹貢之弱水此與朱崖著毛髪碧海吹衣裳之格相類莊子云愿憲杖藜應門誰子葢誰氏之子省文也覽鏡呈柏中丞渭水流闗内西都賦帶以洪河涇渭之川終南在日邊詩終南何何有毛萇曰終南國之名山西都賦表以太華終南之山是也膽銷豺虎窟南都賦豺虎肆虐淚入犬羊天起晚堪從事行遲更覺仙鏡中衰謝色萬一故人憐趙云首兩句則懐望長安頷聫兩句則傷逢時之艱腹聫兩句則傷其衰老而下兩句則求憐于柏中丞也渭水終南言長安也晉明帝云只聞人從長安來不聞人從日邊來故凡言帝都者以日邊言之吐蕃以犬羊之資輒犯中原為盜賊窟穴于此所以膽銷其為豺虎之地而恨其不安本國犬羊之天也凡仕有官守者必早起起晚矣可堪從事乎仙者身輕步疾老而行遲矣那更覺為仙乎豈因覽鏡見衰而遂歎其終不能仙矣乎西閣夜恍惚寒空暮逶迤白露昏山虚風落石樓靜月侵門擊柝可憐子無衣何處村時危闗百慮盗賊爾猶存趙云舊本作寒山暮師民瞻本作寒空暮是葢下有山字也老子曰恍兮惚其中有物寒空暮上著恍惚字亦新矣逶迤字多矣如紆餘逶迤也白帝上有屯戍則每夜有擊柝之役列子楊朱篇載公孫朝謂子産曰若欲以辭説亂我之心不亦鄙而可憐哉隋江總南還尋草市宅詩云無人訪語黙何處叙寒温易云一致而百慮瀼西寒望水色含羣動朝光切太虛年侵頻悵望興逺一蕭疎猿掛時相學鷗行烱自如瞿塘春欲至定下瀼西居趙云朝音陟遥切言晨朝之光也陶潛云日入羣動息故對太虚天台賦云太虛寥廓也年侵字陸機豫章行云前路既巳多後塗隨年侵末句公雖有是言而次年之春初猶在西閣其遷居則先在赤甲方移瀼西陪柏中丞觀晏將士二首極樂三軍士誰知百戰場無私齊綺饌久坐宻金章趙云言其安樂而無戰也梁何遜輕薄篇曰象牀沓繡被玉盤傳綺食金章銅印也銅章墨綬縣令之章飾而公今言則指將士之金帶耳鮑明逺詩云開壤襲朱紱左右佩金章此乃言金帶也醉客霑鸚鵡佳人指鳯凰幾時來翠節特地引紅糚趙云上兩句是宴中之事杜田云鸚鵡杯名雕刻海蠡而為之像鸚鵡形昔人以之勸酒并為罰爵且又引南海異物志云鸚鵡螺狀如覆杯形如鳥頭向其腹視之似鸚鵡故以為名又引酉陽雜爼云梁宴魏使酒至鸚鵡杯徐君房飲不盡屬魏肇師曰海蠡蜿蜒尾翅皆張非以為玩亦以為罰今日直不得辭田以為酒杯名是矣既引南海異物志之説則螺自名鸚鵡又却先自云雕刻海螺為之象鸚鵡形自相矛盾大率以其螺為貴其次刻像之耳而田不能斷也佳人指鳯皇則筵上或畫圖或繡帳之上有之而佳人共指而言説也杜田云佳人指鳯皇疑是秦女㺯玉吹簫乗鳯皇飛去事不敢强釋之又非是筵乃柏中丞宴將士使妓耳豈有㺯玉之事耶末句使紅糚字尤可見矣梁簡文帝從軍行曰紅糚來起迎右一繡段裝簷額金花帖鼓腰一夫先舞劍百戲後歌樵趙云上句則樂工之飾下句則工所擊之鼓歌樵則戲為䕫峽樵歌之音也公閣夜詩曰夷歌是處起漁樵是巳舊本作歌樵乃引李廣傳注刁斗曰以銅作鐎然考之韻書音焦温器也三足而有柄别無歌義今校定歌鐎是葢軍中之樂江樹孤城逺雲臺使寂寥漢朝頻選將應拜霍嫖姚趙云謝朓詩雲中辨江樹雲臺使寂寥豈久無使命之來乎且引末句而以霍比中丞也右二漢中王報韋侍御蕭尊師亡秋日蕭韋逝淮王報峽中少年疑柱史多術怪仙公趙云淮王則漢淮南王安其人賢以比漢中王也柱史以言韋侍御老聃為周柱下史而韋以少年為之故疑其不似聃也仙公以言蕭尊師仙公疑有多術以延生而死故怪之也神仙傳有葛仙公不但時人惜祇應吾道窮一哀侵疾病相識自兒童處處鄰家笛飄飄客子蓬趙云左傳序云反袂拭面稱吾道窮也鄰家笛使向秀聞笛事秀思舊賦序于時日薄虞淵寒氷凄然鄰人有吹笛者發聲寥亮追想曩昔遊讌之好感音而嘆作賦也客子蓬則公自自嘆其飄零也强吟懐舊賦巳作白頭翁趙云懷舊賦潘安仁所作以懐楊肇父子葢懐二人也公今所懐王蕭二人可借用矣壺闗三老上書云白頭翁教臣也南極南極青山象西江白谷分古城疎落木荒戍宻寒雲嵗月􅉬常見風飇虎或聞趙云按晉天文志南極在井柳之中正是南方之星故公于夔州詩可用矣西江指蜀江葢楚人以蜀江為西江也近身皆鳥道殊俗自人羣趙云南中八志曰交趾郡治龍編縣自興古鳥道四百里葢以其險絶獸猶無蹊人所莫由特上有飛鳥之道耳而用鳥道字則沈約愍塗賦依雲邊以知國極鳥道以瞻家也莊子以馭人羣睥睨登哀柝蝥弧照夕曛睥睨城上小城也于此可以曕視言白帝城上有屯戍故也舊本矛弧善本作蝥弧是左傳取蝥弧以登乃鄭之旗名也方可對睥睨若作矛弧即是兩物必不以對睥睨之一名矣言照夕曛則旗為照謝靈運詩夕嵐氣氣隂亂離多醉尉愁殺李將軍趙云公以李將軍自比李廣飲還至亭霸陵尉醉呵止廣傳中言霸陵尉醉則已可使醉尉字而杜田又引南史何敬容傳謝郁作書戒之其説亦是但不細看廣傳耳揺落揺落巫山暮寒江東北流煙塵多戰鼔風浪少行舟趙云此大厯二年詩是年九月吐蕃冦雲川又冦邠州郭子儀屯于涇陽又桂州山獠反則為煙塵多戰鼓矣孫子荆書煙塵俱起震天駭地鵝費羲之墨貂餘季子裘長懷報明主卧病復髙秋趙云公以羲之自比羲之性愛鵝山隂道士養好鵝因求市之道士云為冩道徳經當舉羣相贈耳羲之欣然寫畢籠鵝而歸然公不􅄙書于題于義為不切學者頗疑之豈適㑹見鵝而起句或有此事而公紀實耶抑嘆其貧于鵝則必以字換之于衣則止餘弊裘而巳耶戰國䇿蘇秦仕趙趙王資貂裘黄金使説秦書十上而説不行墨貂之裘弊今云貂餘季子裘言貧如蘇子矣季秋江村喬木村墟古疎籬野蔓懸素琴將暇日趙云言將琴往江村當暇日也白首望霜天登爼黄柑重支牀錦石圓支牀出史記龜筴傳逺遊雖寂寞難見此山川九家集注杜詩巻三十一
