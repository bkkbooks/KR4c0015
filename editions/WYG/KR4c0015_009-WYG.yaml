body:
  text: 九家集注杜詩巻九宋郭知達編古詩冬到金華山觀因得故拾遺陳公學堂金華山屬梓州射洪縣唐陳子昻射洪人武后時擢右拾遺少讀書此山涪右衆山内金華紫崔嵬爾雅石載土謂崔嵬陸士衘西山何其峻曽曲鬱崔嵬上有蔚藍天垂􅊍抱瓊臺杜田補遺度人經三十二天三十二帝諸天皆有隐諱隠名第一天黄皇曽天鬱繿玉明繿音藍蔚藍即鬱繿也黄老書中更無説鬱藍處趙云蔚藍則茂蔚之藍天之青色如此杜田亦穿鑿相去之逺葢此乃經中言東方八天首兩句之文上句言天名下句言帝名既以鬱繿玉明為天帝隠諱不應直言隠名為天天而垂光也况鬱差為藍蔚差為藍豈有兩字改易之理也又豈恰是東方第一天帝之天垂光也今詩人言水曰拖藍水則天之青曰蔚藍天於義無義孫綽天台山賦瓊臺中天為縣居今言金華山觀得用神仙之居為言繫舟接絶壁杖䇿窮縈回荘子泛乎若不繫舟又後漢鄧禹聞光武安集河北即杖䇿北渡見之謝靈運詩晨䇿臨絶壁趙云呉越春秋載古公乃杖䇿去邠陸士衡詩杖䇿将逺尋李善注以魯仲連杖䇿而去為主乃在吳越春秋事之後四顧俯層巔趙云謝靈連過始寧墅築觀基曽巔淡然川谷開雪嶺日色死霜鴻有餘哀焚香玉女跪霧裏仙人來趙云雪嶺見上古栢行注時既冬雪濃厚可知日色在其上葢望之如死矣題是到觀故使玉女仙人字曹植逺遊詩靈運載方文神岳儼嵯峨仙人翔其隅玊女戲其阿梁文帝望浮圖上相輪絶句有光中辨金帶霧裏見飛鸞仙人玊女四字連出見宋書樂志歌辭陳公讀書堂石柱仄青苔悲風為我起激烈傷雄材新添荘子齊威公讀書於堂上師云子昻官至右拾遺以父䘮解歸廬塚縣令叚簡貪暴聞其富欲害子昻家人納錢二萬婚簡簿其賂捕送死獄中東川節度使李徳明為立旌徳碑於梓州學堂至今猶存子羙葢傷此也屬趙云唐書子昻梓州射洪人苦節讀書尤善文古詩浩歌正激烈漢書武帝雄材大畧陳拾遺故宅拾遺平昔居大屋尚修椽悠揚荒山日惨淡故國烟位下曷足傷所貴者聖賢舊注引本傳莫非聖賢之先務非是趙云位下曷足傷則子昻官止拾遺而已有才繼騷雅哲匠不比肩公生揚馬後名與日月懸趙云有才繼騷雅哲匠不比肩則江左浮麗之詩至子昻而初變其詩夲乎離騷二雅也殷仲文哲匠感蕭辰選詩長㓜不比肩揚則雄馬則司馬相如皆蜀人故云云在揚馬後以顯其為蜀之能文者名與日月懸使荀子貴名起如日月同逰英俊人多秉輔佐權彦㑹一時此堂豈千年泉到今素壁滑灑翰銀鈎連盛事㑹一時此堂豈千年超一作趙接新書趙彦昭甘州人以權幸進中宗時有巫出入禁掖彦昭以始事之得宰相巫力也英俊人子昻與陸餘慶王無競房融崔㤗盧藏用趙元最厚善趙云上兩句正用引下彦昭郭元振約句直言子昻與陸餘慶人題壁見在耳趙則彦昭郭則元振彦昭夲傳雖云以權幸進然亦必有才智者故以超玉價言之元振則自通泉縣而往先天二年為兵部尚書同中書門下三品定䇿誅竇懐正等二人皆作宰相乗輔佐權也湛方生曰素壁流光索靖書勢曰婉若銀鈎壁上之字見在乃其一時盛事人将愛䕶之此堂豈止千年也與元結中興頌何千萬年之語同元注英俊人非是與詩之下聨意不連屬終古立忠義感遇有遺編傳言子昻死有文集十巻盧藏用為之序盛行于代趙云子昻有感遇詩三十首謁文公上方野寺隠喬木山僧高下居詩南有喬木孟子非謂有喬木之謂也石門日色異絳氣横扶踈江文通絳氣下縈薄注絳氣赤霞氣也窈窕入風磴長蘿分巻舒陶潜既窈窕以尋壑謝靈運側徑既窈窕庭前猛虎卧高僧傳僧惠永感虎來馴遂得文公廬俯視萬家邑煙塵對階除吾師雨花外不下十年餘高僧傳有講經而天雨花者花杜田補遺楞嚴經世尊天雨百寶蓮蓮青黄赤白間錯紛楺梁僧法雲講次天花㪚堕又勝光寺道宗講時天花旋繞講堂飛流户内長者自布金禪龕只晏如趙云佛書給孤獨長者有好園祇陁太子以黄金布之而迎佛居止今云長者自布金則公言布金者是長者不待太子之黄金矣大珠脱玷翳白月當空虛趙云大珠白月皆言文公之清净大珠如五色摩尼珠白月佛書望已前為白月已後為黒月甫也南北人檀弓今丘也東西南北之人也蕪蔓少耘耡乆遭詩酒汚何事忝簪裾王侯與螻蟻同盡隨丘墟願聞第一義迴向心地初金箆刮眼膜價重百車渠無生有汲引兹理儻吹噓趙云第一義如華嚴經有第一義諦法華經更以異方便助顯第一義願聞字則論語願聞子之志回向則華嚴經有十回向心地初押初地字韻倒言之也則地則楞嚴經修地有十地以歡喜為初地以心地字貼之則佛書有心地法門華嚴經梵行品初發心功德品亦詳此義矣金箆刮眼膜則涅經如有目人為治目故造詣良醫是時良醫即以金箆决其眼膜又法苑珠林載後周張元其祖䘮明元憂泣因讀藥師經盲者得視之言遂請僧接儀轉誦至七日夜夣一翁以金箆療具祖目曰三日必差公用此以比佛法之能刮除昏翳也車渠寶名出佛書金銀琉璃車渠馬碯無生字佛云無生法忍汲引字劉向更相汲引不為比周自願聞第一義而下公以稱美文公東坡云子羙詩知名未必稱局促啇山又王侯與螻蟻同盡隨丘墟願聞第一義回向心地初乃知子羙詩外别有事在其深知公矣奉贈射洪李四文大人屋上烏人好烏亦好毛詩瞻烏奚止于誰之屋注富人之屋烏所集也杜田補遺尚書大傳曰武王登夏臺以臨殷民周公旦曰臣聞之愛其人者愛其屋上烏憎其人者憎其儲胥又韓詩外傳武王至於形丘天雨三日不休問太公對曰愛其人及其屋烏惡其人憎其儲胥咸使厥敵靡使有餘一説大同小異故併載也人生意氣豁不在相逢早趙云北史李延年叔傳載信謂其祖李曉之言曰古人相知未必在早南京亂初定所向色枯槁遊子無根株茅齋付秋草東征下月峽挂席窮海島趙云南京成都也肅京至徳二年以蜀郡為南京鳯翔為西京西京為中京公又有云南京輔道所謂亂初定指京前半辛丑嵗四月壬午劍南東川節度兵馬使段子璋反僭稱王建元黄龍五月崔光逺擊斬之此亂初定也茅齋付秋草指言浣花草堂挂席則海賦挂㠶席謝靈運挂席拾海月月峽則榆州有明月峽三峽之始海島海中之山此公欲扁舟南下也萬里須十金妻孥未相保蒼茫風塵際蹭蹬騏驥老志士懐感傷心胸已傾倒趙云此三韻公有所求於李文矣早發射洪縣南途中作將老憂貧窶筋力豈能及征途乃一作復侵星鮑明逺侵星赴早路畢景逐前儔侵趙云論語不知老之将至禮老者不以筋力為禮復星一作乃侵星非葢復字接上兩句之善言既貧老為行人而其行早也得使諸病入一本作疾入鄙人寡道氣在困無獨立俶裝逐徒旅顔延年改服飭徒旅杜田補遺張平子思𤣥賦簡元晨而俶裝注俶始也逹曙一夲作逹曉陵險澁潘正叔世故尚未夷崤函方險澁維縶趙云之摰遲清江轉山急僕夫行不進駑馬苦一作若維縶趙云詩縶之維之汀洲稍踈散風景開怏悒空慰所尚懐終非曩所集衰顔偶一破勝事難屢挹茫然阮籍途更灑楊朱泣文選汀洲采白蘋阮籍甞不由徑路而行途窮則泣楊朱泣多岐趙云其在途也如阮籍之窮途其為泣也如楊朱之泣岐通泉驛南去通泉縣十五里山水作溪行衣自濕亭午氣始㪚天台賦羲和亭午遊氛高蹇冬温蚊蚋在人逺鳬鴨亂登頓生曽隂冮文通日落長沙渚曽隂萬里生欹傾出高岸趙云詩高岸為谷驛樓桞側縣郭輕烟畔一川何綺麗劉公幹綺麗不可㤀盡日窮壯觀趙云史天下之北觀山色逺寂寞江光夕一作日滋漫傷時愧孔父孔子之歎鳯鳥不至子在川上山梁雌雉皆傷時去國同王粲王粲字仲宣山陽人避地荆州復為魏侍中在荆州日嘗思歸因登楼作賦趙云王粲漢獻帝西遷粲從至長安以西京擾亂乃之荆州依劉表其七哀詩云西京亂無象豺虎方搆患復棄中國去逺身適荆蠻此之謂去國我生苦飄零所歴有嗟嘆詩関雎故嗟嘆之過郭代公故宅郭震字元振封代國公豪雋初未遇其跡或脱略江淹賦脱略公卿跌宕文史趙云賈誼山東豪俊並起梁孝王傳豪傑之士從之左太冲詠史詩方其未遇時憂在塡溝壑伐公尉通泉放意何自若元振尉通泉嘗盗鑄及掠賣部口以銄遺賔客及夫登衮冕直氣森噴薄靈運呉都賦噴薄沸騰寂寥長邁磊落見異人豈伊常情度新書武后召與語竒之索文章上寶劍篇遂得擢用後聘吐蕃還䟽言吐蕃大将論欽陵請去四鎮兵卒分十姓地為不便趙云人謂蔡伯喈曰不見異人必得異書定䇿神龍後宫中翕清廓新書明皇之誅太平公主元振獨領軍扈從事定宿中書十四日以功封代公俄頃辨尊親指揮存顧託是日太上皇傳位太子拜元振中書門下三品羣公有慙色𤣥宗之舉事也諸宰相走伏外省蕭至忠竇懐貞等皆從逆節趙云此叙代公平生也公初為尉任俠使氣撥去小如盗鑄掠口所謂豪俊脱畧放意者也先天二年以兵書同三品蕭至忠竇懐貞等附太平公主謀作亂明皇發兵誅殛之睿宗聞變登承天門楼躬率兵誅懐貞等獨公能摠扈帝事定宿中書十四日登衮冕而直氣噴薄遂獨與天定策神龍後清宫中辨尊親存顧問而羣公有慙色也接公助誅太平以功封代國在先天二年登丑歳乃明皇即位之次年是年改元元若神龍則中宗即位改元之號嵗在乙已去先天二年凡八年而公云定䇿神龍學者疑之因論之曰太平擅寵自中宗則禍貼在神龍下下也中宗盡景龍四年庚戌凡六年是年睿宗即位改景雲至延和元年内禪嵗在壬子未登三年是年八月明皇即位改先天太平擅寵自中歴睿至明皇始定今杜公㣲意不欲指中睿之失故追言神龍後以見代公賛翊除患召自神龍來也猶玉華宮乃貞觀二十年太宗作為避暑而公詩曰不知何王殿葢以太宗創業貞覩習治而勞費於營建逸豫於離宫故詩人諱之曰不知何王殿也俄頃辨尊親指揮存顧託則以太平公主初有廢𤣥宗之意及其既誅則君臣之間明皇得尊位父子之間明皇為親傳所以成睿宗顧托之意舊説太上皇傳位太子非是其云磊落見異人以承直氣噴薄之下是専説太平公主主乂雜之以后后召見竒之及聘吐蕃還上疏事此豈可以言其同中書門下三品為登衮冕時邪王室無削弱逈出名臣上丹青照臺閣我行得遺跡一作趾池館皆䟽鑿壯公臨事斷顧步涕横落高詠寶劍篇杜云元振寶劎歌君不見昆吾鐡冶飛炎烟紅光紫氣俱赫然良工鍛鍊凡㡬年鑄作寶劎名龍泉龍泉顔色如霜雪良工嗟咨嘆竒絶流璃玉匣吐蓮花錯鏤金環生明月正逢天下無風塵幸得用逢君子身精光黯黯青蛇色文章片片緑龜鱗非直結交遊俠子亦曽親近英雄人何言中路遭弃捐零落飄淪古獄邉雖復埋沉無所用猶能夜夜氣衝天神交付冥漠杜云選潘安仁作夏作湛誄心神相交唯我與子南史劉訏字彦度阮孝緒博學隠居不交當世訏一造之即願以神交列子曰梦有六候正噩思覺喜懼此六夢者神所交也沈休文和宣城詩神交疲夢寐路逺隔思存注夢有六候皆神所交與謝相去逺但神交而已所謂神交正此意也晉嵇康以高契難斯每思郢質所與神交者唯阮籍也濤遂為竹林之遊預其流者向秀劉伶阮咸王戎魏武帝文曰悼繐帳之冥寞顔延年拜陵廟詩衣冠終冥寞陵樹轉葱青謝恵連祭古塜文以不知其名字逺近假為之號曰冥寞君觀薛稷少保書畫壁少保有古風得之陜郊篇公詩驅車越陜郊北顧臨大河惜哉功名忤但見書畫傳趙云稷字嗣通道衡曽孫厯太子少保當貞觀永徽間虞世南禇遂良以書顓家後莫能繼稷外祖家多藏書虞禇書稷􅀈􅀈精臨倣結體遒麗遂以書名天下畫又絶品及竇懐貞伏誅稷以知其謀賜死萬年縣獄中此叙稷書畫甚明有古風傳稱以辭章自名則詩有古風冝矣其功名事傳云稷言鍾紹京胥史無才望不冝矣中書令又與崔日用數爭帝前非不羙也而以知懐貞之謀以死則功名之誤令杜公於通泉縣見其書畫之傳我遊梓州東遺跡涪江邉畫藏青蓮界書入金牓懸師云恵義寺額薛少保書神趙云青蓮界佛寺也見佛書金牓字取仙事以形容之神異經東方有宫青石為墻髙三仞左右闕高百丈畫以五色門有銀牓以青石碧鏤題曰天地長男之宫西方有宫白石為墻五色黄門有金牓而銀鏤題曰天地少女之宫仰看垂露姿不崩亦不騫漢曺喜工篆𨽻懸雲垂露之變法詩天保不騫不崩騫虧也鬱鬱三大字蛟龍岌相纒趙云稷所書忠普寺碑上三字字方徑三尺許筆法雄勁傍有贔屭纒捧乃龍蛇岌相纒也今在通泉縣慶壽寺聚古堂到寺觀之所有三字之傍有贔屭纒捧詩人道實事為壮觀之句耳又揮西方變發地扶屋椽慘淡壁飛動到今色未塡師云兼畫西方像一壁筆力瀟洒風姿逸發並居神品至趙云所畫西方變相今亡矣而公詩云又揮西方變到今色未填指言當日所見填字即寘字字書云塞也又訓乆今公色未填則色未昏㓕之意未詳所出豈言其色未乆而尚知新耶此行疊壯觀郭薛俱才賢不知百載後誰復來通泉通泉前有郭代公後有薛少保故云郭薛趙云相如云此天下之壯觀也疊言其書與畫郭薛真所為才賢邪通泉縣署屋壁後薛少保畫鶴薛公十一鶴皆冩青田真晉永嘉記青田有雙鶴生子即便去趙云青田晉永嘉郡記有沐溪野去青田九里中有一雙白鶴年年生伏子長大便去常餘父母在耳相傳神所養也冩真者様冩其真形畫色乆欲盡蒼然猶出塵杜田補遺北史劉敞矯矯出塵如雲中白鶴低昻各有意薛公畫鶴低昻皆有意如返啄踈翎唳天警露之類皆随而名之磊落如長人晉嵇紹在稠人中昻昻然若野鶴之鷄羣佳此志氣逺豈惟粉墨新萬里不以力羣遊森㑹神威遲白鳯態非是倉鶊鄰揚雄甘泉賦夢吐白鳯秋胡詩行路正威遲詩七月有鳴倉鶊注倉鶊黄鸝也杜田補遺禽經曰鳯有五東方曰發明南方曰鷦明西方北方曰幽昌中央曰鳯其又曰青鳯謂之鶡赤鳯謂之䳕黄鳯謂之鶠紫鳯謂之鷟白鳯謂之鷫高堂未傾覆幸得慰佳賔曝露墻壁外終嗟風雨頻赤霄有真骨恥飲洿池津冥冥任所徃脱略誰能馴杜云鮑照鶴賦夕飲於瑶池有遺支遁鶴者遁曰爾冲天之物寕為耳目之玩遂放之任所徃趙云楚詞載赤霄而凌太清在禽鳥言之則張華鷦鷯賦序彼鷲鶚鵾鴻孔雀翡翠或凌赤霄之際或託絶垠之外王子年拾遺記周昭王時塗修獻丹鶴欽於溶溪溪之水江淹擬嵇康詩其言靈鳯而曰夕飲玉池津孟子數罟不入洿池揚子鴻飛冥冥弋人何慕焉江文通脱略公卿顔延年詠嵇康詩龍性誰能馴陪王侍御同登東山最高頂晚姚通泉晚携酒泛江姚公羙政誰與儔不减昔時陳太丘世説陳紀字元方年十一候袁紹問曰卿家君在太丘逺近稱之何所履行元方曰老父在太丘强者綏之以徳弱者撫之以仁恣其所安乆而益敬袁公曰孤往為郼令正行此事不知卿家君復何師元方曰周公不師孔子孔子不師周公趙君茍子在朝則羙政不減不虧也晉人語毎云某人何不減某人太丘陳寔也為太丘長穎川四長陳君其一可見太丘羙政邑中上客有柱史多暇日陪驄馬遊老子為柱下史舊説騘馬御史言趙云上客戰國䇿呼六國蘇秦張儀為上客柱史指王侍郎多暇日荀子其為人也多暇日特摘字用耳騘馬事後漢桓典為侍御史嘗乗騘馬京師人畏之語曰行行且止避騘馬御史東山髙頂羅珍羞晉謝安雖貧而東山之志不謝曹子建緩帶傾庻羞趙云東山即題所謂登東山最髙頂非謝安東山羞者韻書致滋味為羞周禮者有膳羞庶脩百珍字周禮有珍用八物故合云珍羞字舊注引曺子建詩却是庶羞矣下顧城郭銷我憂登樓賦聊暇日以銷憂趙云詩以寫我憂清雲白日落欲盡復携羙人登綵舟笛聲憤怨哀中流妙舞逶迤夜未休燈前往往大魚出聼曲低昂如有求漢武秋風辭携佳人兮不能㤀横中流兮揚素波鼓鳴兮發棹歌歡樂極兮哀情多子匏巴鼓瑟㳺魚出聼趙云美人起於詩有羙一人而文士用羙人如四愁云羙人贈我金錯刀三更風起寒浪湧取樂喧呼覺舩重滿空星河􅊍破碎四坐賔客色不動請公臨深莫相違迴舩罷酒上馬歸人生歡㑹豈有極無使霜過霑人衣言樂極則悲來師云謝荘月賦月既没兮露欲晞嵗方晏兮無與歸佳期可以還㣲露霑人衣希趙云此一叚乃晏子戒流連之樂之義其句亦倣謝逸月賦臨深字孔子如臨深淵如履薄氷句法之義如言請公莫違戾臨深之戒所以有下句之嘱霜過一作霜露春日戲題惱郝使君兄使君意氣凌青霄憶昨歡娯常見招趙云意氣淩乃魏劉楨射鳶詩意氣凌神仙之勢凌青霄乃仲長統可以凌霄司馬紹統統言椅桐曰上凌青霄霓張華或淩赤霄之勢北山移文干青霄而直上左太沖詠史馮公豈不值白首不見招細馬時鳴金腰褭佳人屢出董嬌嬈嬌嬈者姫也師云漢武帝鑄金作馬蹄状謂之金腰褭盧照隣詩漢家金腰褭趙云腰褭神馬名漢武帝鑄金為褭蹄麟趾故有金褭蹄而言馬則曰金褭也上言馬下言婦人故公之今詩用對董嬌嬈後漢宋子侯董嬌嬈詩言採桑事也東流江水西飛鷰可惜春光不相見願携王趙兩紅顔再騁肌膚如青練通泉百里近梓州請公一來開我愁趙云上兩句以興見招之後不復見佳人故有下句願有之請意者流水以自比而燕以比佳人乎宋江夏王劉義公詩眷戀江水流又沈約白銅鞮詩漢水回東流古詩願為雙飛鷰公在通泉郝在梓州欲郝自梓州携二妓來通泉耳其東西句法則古東飛伯勞等歌東飛伯勞西飛鷰黄姑織女時相見江淹送友人别詩遥裔發海鴻連翩見簷燕春秋更去來参差不相見舞處重看花滿靣樽前還有錦纒頭唐王元寶冨而無學識嘗㑹賔客明日親友謂曰昨日必多佳論元寶曰但費錦纒頭爾元趙云錦纒頭字唐人以綵賞舞者之稱舊注引唐王寶事止一事耳又如大姨以三百萬為唐帝作纒頭錦之費則又一事矣天邉行趙云詩中與大麥行皆有胡與羌字則賔客元年十二月吐蕃䧟松維保三州等處以後之事此篇云臨大江哭則閬州之江大麥行云大麥乾枯則今嵗廣徳二年三月半間也天邉老人歸未得日暮東臨大江哭隴右河源不種田胡騎羌兵入巴蜀大歴中吐番三道入冦誡其衆曰吾要蜀川為更府連䧟郡邑士庶奔亡山谷日趙云天邉老人公在長安居杜陵而有田在洛陽無不思歸未得也大江指言閬水言閬水乃嘉陵江至此而大矣酈道元注水經每言某山某處臨大江下兩句葢言吐蕃為患今嵗廣徳二年公自梓州再至閬中去年廣徳元年吐蕃七月陷隴右諸州則隴右河源不種田矣十二月陷松維保三州則胡騎羌兵入巴蜀矣謂之胡騎羌兵羌與胡素自交結觀今嵗廣徳二年七月僕固懐恩以吐蕃回紇党項兵入冦吐蕃雖曰羌而有回紇在焉非胡而何巴蜀與巴蜀也樂史寰宇記於閬州青石縣載昔巴蜀争界山為裂自若引䋲分之觀此巴蜀葢相連其陷松維保州必有入巴蜀之事但史不載耳所考證唯資治通鑑云吐蕃陷松維保三州及雲山新築二城西川節度使高適不能救於是劍南西山諸州亦入於吐蕃矣其言入蜀蜀亦何恠哉洪濤滔天風㧞木前飛秃鶖後鴻鵠項王圍漢王大風㧞木趙云上句亦盛言之以比禍亂其語則選有鼓洪濤書浩浩滔天古詩枯桑知天風鶖音秋玉篇水鳥也公於同谷七歌之一言弟在逺方飛東方飛鴐鵞鶖鶬安得送我至汝傍亦因物以起思矣九度附書向洛陽十年骨肉無消息趙云言洛陽隴右陷之故今嵗廣徳二年甲辰逆數十年嵗在乙未天寶十四載十一月禄山反其後禄山子與二史吐蕃更為患是為十年而公田舍在洛陽之偃師宜道路隔絶寄書而骨肉無消息也字則玉臺新詠載近代西曲歌莫作缾落井一去無消息大麥行大麥枯乾小麥黄婦女行泣夫走藏見上送高三十五書記詩注後漢桓帝時童謡曰小麥青青大麥枯誰當穫者婦與姑天夫何在西擊胡東至集璧西趙作北梁洋集璧梁洋皆蜀郡名退趙云圖經集璧地在閬之東梁洋雖在東而近北其一作西字非是問誰腰鐮胡與羌鮑明逺東武吟腰鐮刈葵藿師云又言吐蕃與回紇叢話潘子真云古人造語俯仰紆餘各有態如桓帝時童謡皆合問答之詞公今四句實有所自豈無蜀兵三千人一去千人去部領辛苦江山長安得如鳥有羽翅託身白雲還故鄉苦戰行苦戰身死馬将軍自云伏波之子孫干戈未定失壯士使我歎恨傷精神趙云伏波者將軍之號後漢馬援也干戈未定則吐蕃去冬陷松維保三州用兵豈便息邪晉阮籍詠懐詩容色改平常精䰟自漂淪謝靈運詩異人秘精䰟去年江南討狂賊臨江把臂難再得别時孤雲今不飛時獨看雲淚横臆鮑云謂段子璋戰遂州時公與北人送别江上今其死矣故有感而作遂州在涪江之南故云江南南趙云江南葢言閬州江之南如䕫州社日云今江南老它年謂北童所謂江南亦謂䕫州之南非江南道也言去年則與下篇去秋行之意同臨江把臂則公必與馬别時在須臾江上末句變使李少卿時良時再不至雖别在須臾屏營衢路側執手野踟蹰仰視浮雲馳奄忽互相逾蘇子卿詩俯觀江流仰視浮雲翔翔良友逺離别各在天一方詳味公因馬將軍軍死追悼之去秋行時段子璋反於東川去秋涪江木落時臂槍走馬誰家兒到今不知誰骨處部曲有去皆無歸見部曲異平生句遂州城中漢節在遂州城外巴人稀鮑云上元四年四月劍南節度兵馬使叚子璋反陷緜州遂州刺史嗣虢王巨死之節度李奐奔於成都故詩云遂州城中漢節在葢傷之也戰場寃䰟每夜哭空令野營猛士悲趙云按樂史寰宇記涪江在射洪縣北廣徳二年詩不是言段子璋事何以言之上元二年四月壬午劎南東川節度兵馬使段子璋反僣稱王建元黄龍五月崔光逺擊斬之當年夏時已平矣今云去秋涪江木落時應是公在彼有九日詩之際乃廣徳元年也公眼見其去是以有感而作意者應如廣南市舶使吕太一反逐其節度使張休遂而不殺則有漢節在之理遂州城外巴人稀則所以討叛亂者皆梓閬之兵意者敗續而死亡者多則有巴人稀之實劉越石四言永負寃䰟漢高祖安得猛士兮守四方光禄坂行山行落日下絶壁西望千山萬山一作水赤謝靈運日落山照耀樹枝有鳥亂鳴一作棲時暝色無人獨歸客謝靈運林壑歛暝色馬驚不憂深谷墜草動只怕長弓射白日賦多翻是長弓子弟安得更似開元中一云年鄭榮傳信記開元初上勵精理道十六七月天下大治安西諸國悉平為郡縣行者不囊粮上猶惕厲未已道路即今多擁隔鮑云崔寕傳寳應初蜀亂山賊乗險道路不通與此詩合亂趙云萬山一作萬水非是水豈可合山言赤乎有鳥棲一作亂鳴非蓋亂棲所以呼喚暝色字也言獨歸客則公之妻孥在梓山寺章留後同遊得開字野寺根石壁諸龕徧崔嵬前佛不復辨百身一莓苔天台賦踐莓苔之滑石雖有古殿存世尊亦塵埃如聞龍象泣足令信者哀薛補遺王簡棲頭陀寺碑正法旣没象教陵夷又馬鳴幽讚龍樹虛求經有比丘名龍樹龍象猶佛象也杜正謬維摩經菩薩勢力譬如龍象蹴踏非驢所堪傳燈録逹摩是六衆所師波羅提法中龍象乃鱗毛類中最巨者猶麒麟之於走獸鳯凰之於飛鳥故經稱僧之出類龍象非即佛象也趙云公題僧寺紀僧詩必用佛書中字以為一體今云世尊亦塵埃實道其事或曰下句嵗晏風破肉十二月也十月以吐蕃㓂奉天之故車駕幸陜州十二月甲午雖車駕已至自陜矣而巴蜀僻遠未聞猶以為在外則公令所云者無乃㣲寄意乎其説亦是龍象言僧也杜曰正謬引維摩經傳燈録出處並是然解其義云乃麟毛類中最巨者則其意分為二物鱗類中最巨為龍毛類中最巨為象然維摩經所為龍象蹴踏非驢所堪曰蹴踏則龍無蹴踏之義龍象乃龍之象耳如言龍馬者乎以俟明識使君騎紫馬捧擁從西來樹羽静千里臨江乆徘徊山僧衣藍縷告訴棟梁摧公為顧賔徒咄嗟檀施開吾知多羅樹却倚蓮花臺諸天必歡喜鬼物無嫌猜以兹撫士卒孰曰非周才師云左氏篳路藍縷以啓山林篳路柴車藍縷敝衣醜杜田補遺左氏篳路藍縷方言曰南楚凡人貧衣被弊謂之湏或謂之䄛裂䄛音縷衣壊或謂之藍縷左氏謂篳路藍縷是也佛經曰佛告堅意菩薩何以一念行於六度荅曰是菩薩一切悉捨心無貪者名檀六波羅蜜之一大乗論云檀越者檀施也謂此人行檀能越貧窮海故又云梵語陀那鉢底此言施主今稱檀那者即訛陀為檀去鉢底留那故也方言曰䄛裂湏敗也又䄡䄖其短者謂之䄈以布而無緣敝而紩之謂之襤襤又云禂謂之襤禂敝衣褸謂之襒謂綴結又酉陽雜爼多出摩伽陀國西土用以冩經樹長六尺經冬不凋此樹有三等一多羅婆力又貝多二多梨婆力又貝多羅三部闍婆力又貝多多羅多梨並書其葉部闍一色取其皮書之貝多婆力义皆梵語貝多漢飜為葉婆力义漢飜為樹多羅樹即婆力义貝多之一也設趙云詩崇牙樹羽本言樂而今所謂樹羽則軍旅所之物江淹别集登記南城詩君王澹以思樹羽望楚城而若旗幟之屬矣静千里則章留後境内無戰也衣藍縷杜田引方言其説是石崇咄嗟而辨吾知多羅樹却倚蓮花臺以形容寺旣脩建如此多羅樹見酉陽雜爼如已經所譯之經在涅經有湧身高七多羅樹或云一多羅樹蓮花臺佛所坐之臺其字如涅經猶如鴛鴦處蓮花臺則指水中蓮花所生之苞故佛言蓮花有鬚有臺止借字用耳音盤佛書字也窮子失浄處高人憂禍胎杜田補遺法華經信解品三譬如有人年既㓜稚捨父逃逝馳騁四方年既長大加復因窮父求不得中止一城其大家冨財寶無量窮子庸賃遇到父舍受雇除糞羸瘦顦顇糞土塵坌汙穢不淨其父宣言爾是我子捨吾逃走忽於此間遇㑹得之今我所有一切財物皆是子有窮子歡喜得未曽有蓋喻諸佛子等以三苦故於三死中受諸熱惱迷惑無知樂著小法得遇世尊蠲除諸法戱論之糞獲至涅一日之價得此已心大歡喜以趙云窮子失浄處是華法經中事言窮子之所以窮其失浄處高人之所以高以能憂禍胎楞伽經樂不浄處如飛蠅禍胎雖起於福生有基禍生有胎兩字連出如齊武帝謂臨賀王曰汝包藏禍胎窮子指言藍縷之山僧高人指言章留後章公所以修建僧寺意欲諸僧得其清浄而免梁棟摧壓之禍日晏風破肉荒林寒可迴思量入道苦自哂同嬰孩趙云上句言風凄緊至於破肉况在窮林其寒豈可遂囘乎可囘者言不可囘後句公自謂也老子若嬰兒之謂孩言入道如小童之就學辛苦南池崢嶸巴閬間所向盡山谷安知有蒼池萬頃浸坤軸呀然閬城南枕一作控帯巴江腹芰荷入異縣稉稻共比屋堯比屋可封皇天不無意美利戒止足高田失成熟此物頗豐熟清源多衆魚逺岸冨喬木獨嘆楓香林春時好顔色杜田補遺三巴記閬自二水合流自漢中至始寜城下入涪陵曲通三曲有如巴字曰巴江經峻峽中謂之巴峽唐詩杜宇呼名呌巴江學字流江水連巴字鐘聲出漢川趙云坤軸海賦又似地軸挺抜而爭迴巴江則杜田引三巴記杜説是異縣出古詩他鄉各異縣比屋董仲舒堯舜在上比屋可封美利易乾始能以美利利天下止足祖出老子知足不辱知止不殆晉張景陽詠史逹人知止足遺榮忽如無西成書平秩西成此物左傳載叔向之母言美婦人曰三代之亡皆此物也古詩之言竒樹曰此物何足貴但感别經時芰荷入異縣則池之大如此粳稻共比屋則以灌溉所致也皇天不無意至此物頗豐熟四句以結芰荷入異縣粳稻共比屋也高田則灌溉所不及者言高田不豐而失西成故此粳稻之物為池水所溉者却豐熟焉無它乃皇天之意使人止足之分也池水所溉之田豐熟矣彼水所不及之田雖失西成亦豈不足乎南有漢王祠終朝走巫祝歌舞散靈衣潘安仁寡婦賦仰神宇之寥寥瞻靈衣之披披荒哉舊風俗高堂亦明王䰟魄猶正直不應空陂上縹緲親酒食滛祀自古昔非唯一川瀆趙云十句因實事而戒滛祀公詩蓋有稱於教化矣左傳聰明正直之謂神傳云非所祭而祭名曰滛祀干戈浩茫茫地僻傷極目楚詞極目千里兮傷春心平生江海興遭亂身局促沈休文纓佩空為忝江海事多違古詩蟋蟀傷局促師云臨池動江海之興以詩亂不得徃也趙云傷極目摘用楚辭局促漢景帝局促如轅下駒駐馬問漁舟躊躇慰覊束發閬中前有毒蛇後猛虎溪行盡日無村塢時盗賊縱横政役煩重而民不安居也江風蕭蕭雲拂地山木慘慘天欲雨女病妻憂歸意速秋花錦石誰復數别家三月一得書避地何時免愁苦賢者避地非趙云前有毒蛇後猛虎實道其事非以興託舊注是沈休文云高楊拂地垂女病妻憂歸意速言歸梓州也秋花錦石可玩之物以歸意速故不復數之此冬時歸而言秋花豈前日所聞未謝之花邪公九月自梓徃閬至十二月歸梓葢其去妻孥三箇月故云别家三月一得書閬山歌趙云春正月自梓州挈家再徃閬中三月之半聞嚴武再鎮蜀遂離閬歸成都途中所作之詩閬州城東靈山一作雪山白閬州城北玉臺碧靈山玉臺閬山名松浮欲盡不盡雲江動將崩已一作未崩石那知根無鬼神㑹已覺氣與嵩華敵中原格闘且未歸應結茅齋看青壁兩相敵曰格闘崩趙云未崩石舊本正作已崩石非蓋欲盡不盡將未崩方成語脉已崩矣豈復能動邪况下有已覺氣與嵩華敵也那知根無鬼神㑹已覺氣與嵩華敵兼言靈山與玉臺也中原格闘乃去歳廣德元年吐蕃十月䧟京師邠州㓂奉天武功車駕幸蜀十二月䧟松羅保三州至今歳之春干戈豈息也五岳之名雖參摘兩字而用今以鬼神熟字對嵩華則潘岳晉武帝誄有等夀松華為連文有出處閬水歌嘉陵江山何所似嘉陵江源出散闗而入於閬石黛碧玉相因依正憐日破浪花出更復春從沙際歸巴童盪槳杜補遺槳樴屬方言樴謂之橈或謂之櫂所以隱櫂謂之槳欹側過水雞銜魚來去飛閬中勝事可腸斷閬州城南天下稀閬州城南有山極秀麗謂之錦屏山趙云謝安石内集問諸子曰白雪紛紛何所似阮籍詩寒鳥相因依謝安運諸蒲稗相因依日破浪花出以日出正照水也如云日出破浪花矣謂之破浪花取南史宗慤願乗長風破萬里浪春從沙際歸則何處無春而眼中所見城南之沙際花草明媚為自沙際囘歸際意蓋如費昶雜詞水迹桃花去春随楊柳歸槳所以揺楫之處杜詩可之説是蓋古歌云艇子打兩槳者扶兩楫而來也上云閬中又云閬州舉全部言之曰閬中名山志閬山多仙聖逰集圖經曰閬山四合於郡故曰閬中亦謂之閬内閬州城南則指錦屏山也三絶句前年渝州殺刺史今年開州殺刺史鮑云崔寧傳所書山賊也前年渝州殺刺史謂叚子璋陷綿遂今年開州殺刺史謂徐知道之反有乗亂者開州成都遠不知其故史不書失之羣盗相隨劇虎狼食人更肯留妻子右一二十一家同入蜀唯殘一人出駱谷自說二女齧臂時廻頭却向秦雲哭世説趙飛燕姊弟少貧㣲及飛燕見召與女弟齧臂而别趙云指言當時出駱谷之人正始四年曹爽伐蜀諸軍入駱谷三百餘里不得前牛馬驢驘以運轉死略盡魏志曰少帝甘露三年蜀將姜維出駱谷圍長安即此谷道其後廢塞唐武德七年德開州云唯殘一人出駱谷則自蜀歸秦出駱谷以徃也故後有向秦雲哭之句此其初豈避羌渾之暴來蜀中乎二女齧臂乃紀其實史記呉起與其母訣齧臂而盟今所用蓋飛燕事見伶𤣥所作飛燕外傳右二殿前兵馬雖驍雄縱暴略與羌渾同時神䇿軍恣横聞道殺人漢水上婦女多在官軍中趙云言其縱暴尤甚於羌渾即下兩句是也右三莫相疑行男兒生無所成頭皓白牙齒欲落眞可惜憶獻三賦蓬萊宫自恠一日聲輝赫集賢學士如堵墻觀我落筆中書堂新唐詩甫獻賦帝竒之使待制集賢院命宰相試文章按開元十三年改集仙殿為集賢殿麗正殿書院為集賢殿書院院内五品以上為學士六品以上為直學士禮孔子射於矍相之圃觀者如堵墻趙云天寶九年明皇納處士之議以明年朝獻太清宫朝享太廟有事於南郊公獻三賦以預言其事於是待制於集賢李陵書男兒生無所成名徃時文彩動人主此日飢寒趨路傍天寶末以家避亂鄜州獨陷賊中至德二載竄歸鳯翔謁肅宗授左拾遺詔許至鄜迎家明年收京扈從還長安房琯罷相甫上䟽論琯有才不宜廢免肅宗怒貶琯邠州刺史出甫為華州司功屬關輔饑亂弃官之秦州又居成州同谷自負薪採梠餔不給乃遂入蜀乃上元元年卜居成都浣花里趙云李蕭遠運命論封已飬高勢動人主劉公幹詩行者盈路傍晚將末契託年少當靣輸一作論心背面笑時甫依嚴武幾為武所殺為杜田補遺陸機嘆逝賦託末契於後生余將老而客趙云當靣論心背靣笑孔毅夫集句用對飜手作雲覆手雨亦工論一作輸字雖新而費力寄謝悠悠世上兒不爭好惡莫相疑遭田父泥飲美嚴中丞甫與嚴武世舊故入蜀依之傳言甫結廬浣花里與田畯野老相狎蕩歩屧隨春風村村自花柳田翁逼社日邀我嘗春酒杜田補遺屧音枼蓋履舄也宋袁粲為丹陽尹甞歩屧白楊郊野間道遇士大夫便呼與酣飲魏應璩與從弟君胄書日吟詠花桞之下酒酣誇新尹畜眼未見有迴頭指大男渠是弓弩手籍丁為兵名在飛騎籍飛騎軍名曹子建白馬篇名編壯士籍左傳名在重耳又曰名在諸侯之䇿長畨歳時乆長畨猶長在直言無更代前日放營農辛苦救衰朽差科死則已誓不舉家走今年大作社社祭也以祈農事春祈秋報故歳有春秋二社拾遺能住否呌婦開大瓶盆中為吾取感此氣揚揚須知風化首郡守縣令風化之首語多雖雜亂說尹終在口朝來偶然出自卯將及酉乆客惜人情如何拒鄰叟高聲索果栗欲起時被肘言屢為掣肘指揮過無禮未覺村野醜月出遮我留仍嗔問升斗師云問升斗如汝陽三斗焦遂五斗劉伶五斗解酲李白一斗合自然是已是趙云此篇多使俗語如弓弩手如差科如長畨等字也歩屧字則宋袁粲事大作社變左傳子産大為社也氣揚揚字晏子傳其御者意氣揚揚語多雖雜亂陶淵明飲酒詩父老雜亂言觴酌失行次月出遮我留使漢祖紀三老董公遮説漢王肘字使史記魏威子肘韓康子於車上舊注非是九家集注杜詩巻九
