body:
  text: 九家集注杜詩巻十二宋郭知達編古詩往在趙云此篇六叚鋪叙甚明舊注亂之往在西京日胡來滿彤宫趙云彤宫天子之宫丹謂之彤故丹墀謂之彤墀中宵焚九廟天子九廟今趙云天子七廟王莾増為九廟云九廟以盛者言之雲漢為之紅解瓦飛千里繐帷紛曽空繐帷廟中素帷疚心惜木主一一灰悲風疚心武如有疚木主神主也史記王代紂載木主而行合昏排鐵騎清旭吁玉切散錦幪杜田補遺古樂府紫騮馬曲王鐙繡纒鬃金鞍覆錦幪鞍帕也趙云清旭見上後園山脚注合昏黄昏錦幪一作錦􅐒以幪為正公又嘗曰駑駘怕錦幪若􅐒字驢之别名殊無義也賊臣表逆節相賀以成功是時妃嬪戮連為糞土叢王昭君辭昔為匣中玉今為糞上英師云幸蜀記天寳十五載七月九日禄山令張通儒害霍國公主永王妃侯莫陳氏駙馬楊朏等八十餘人又害皇孫郡縣至諸妃等三十六人當宁䧟玉座玉座帝座時禄山及吐蕃兩䧟京邑天子出奔猶趙云當宁天子當宁而立也謝𤣥暉銅雀臺詩玉座寂寞况乃妾身輕舊注時禄山及吐蕃兩䧟京邑天子出奔則以代宗廣徳元年十月事亂明皇天寳十五載事白間剥畫蟲杜田補遺何平叔景福殿賦皎皎白間離列錢晨光内照流景外烻張詵注白間窻也以白塗之畫為錢文猶言綺疏音瑣之類漫叟詩話亦謂出景福殿賦云余嘗以白簡對黄襄趙云白間之上所畫剥落也不知二聖處𤣥宗肅宗私泣百嵗翁車駕既云還楹角歘穹崇代宗自陕還先修九廟楹角廟楹左傳魯丹楹刻桷故老復涕泗祠宫樹椅桐宏壯不如初已見帝力雄時屡臻喪亂國力凋弊雖未及火焚之前而已見帝力之雄矣漆趙云六句述肅宗至徳二載九月復京師也椅棝梓舊注於楹角歘穹崇下注代宗自陜還先修九廟則又以代宗廣徳元年十二月事亂肅宗至徳二載事前春禮郊廟祀事親聖躬微軀忝近臣景從陪羣公廣徳元年吐蕃䧟京師代宗幸陜是年郭子儀收復帝還京二年春享廟及郊新舊唐史皆不載甫官拾薛云文選東都賦天官景從祲威盛容師云杜為左遺自稱忝近臣於趙云述乾元元年四月辛祔神主于太廟廟甲寅享太廟有事於南郊也但史所載乃四月中事而詩云前春豈前嵗乎登堦捧玉册玉冊冊文峩冕耿一云聆金鍾趙云聆金鍾舊本正作耿師民曕本専取聆金鍾是言聴金奏也峩冕聆金鍾則奉祠者皆具法服也侍祠恧先露掖垣邇濯龍侍祠之官恧暴露猶假濯龍門即宗廟未至全備耳薛云後漢桓帝祠老子於濯龍宫以文罽為壇飾黄金為釦器設華盖之座中杜補遺晉天文志太徵天子之庭五帝之座也南蕃二星間曰端門東曰左執法西曰右執法左執法之東左掖門也右執法之西右掖門也又曰紫宫垣十五星一曰紫微天帝之座也李尋傳曰天官上相上将皆顓面而朝太微宫垣也西坦為上将東垣為上相盖王者之建宫室皆取法於天故有宫垣宫徵垣宫掖左右掖門之名所謂掖垣者如此後漢百官志濯龍監一人本注云濯龍亦國名張平子東京賦曰濯龍芳林九谷人溪薛綜注載洛陽圖經日濯龍池名故歌曰濯龍望如海河橋渡似雷顔延年赭白馬賦處以濯龍之奥注濯龍廐名李善載曹植集曰詔給濯龍廐馬三百匹諸家稱濯龍不同大抵以池得名而置監宫園廐皆因之也趙云恧先露則先在預其事者為榮有合侍祠而不幸所以慙恧史有先朝露以言不幸也天子惟孝孫師云謂代宗五雲起九重韓愈賀慶雲表按沈約宋書慶雲五色者太平之應又據孝經援神契王者徳至山陵則慶雲生鏡奩換粉黛翠羽猶葱曨光列陰皇后崩明帝性孝追慕無已時當謁陵夢先帝太后若平生明旦率百官上后陵帝從席前伏御床視太后鏡奩中物感動悲涕趙云孝孫指肅宗以其祠事先祖故稱孝孫詩言成王曰徂賚孝孫鏡奩換粉黛所以供后廟神御之物翠羽所以飾神御之物者曹子建洛神賦或拾翠羽前者厭羯胡明皇禄山陷長安後來遭犬戎代宗吐蕃䧟長安俎豆腐羶肉罘罳行户郎反角弓文帝紀注顔師古曰罘罳謂連闕曲閣以覆重刻垣墉之處其形罘罳然一日屏也杜田補遺段成式酉陽雜俎正誤曰士林間多呼殿桷䕶雀網為罘罳禮記曰疏屏天子之廟飾鄭注屏謂之樹今罘罳刻之為雲氣蟲獸如今之闕張楫廣雅曰復罳謂之屏劉熈釋名曰罘罳在門外罘設也臣将入請事於此設重思西漢文帝七年未央宫東闕罘罳在外諸矦之象諸之象後果七國舉兵王莾性好時日小􅂾遣使壞園門罘罳曰使民無復思漢也魚豢魏略黄初三年築諸門闕外罘罳成式自筮仕以來凡見縉紳􅂾十人皆謬言罘罳事故辨之趙云羯胡安史犬戎吐蕃又言吐蕃汙瀆宗廟之事蕃人所食腥羶狼籍故腐於爼豆而罘罳之上行挂角弓安得自西極申命空山東盡驅詣闕下士庶塞關中主將曉逆順元元歸始終一朝自罪已萬里車書通鋒鏑供鋤犁征戍聴所從冗官各復業土著還力農君臣節儉足朝野懽呼一作娱同食貨志安民之道士著為本張景陽詩昔在東都時朝野多歡娯趙云曉逆順言曉喻之以順逆歸始終言全終始一節為臣無紀順也罪已之詔車書通則車書軌書同文鋒鏑供鋤犁以兵器為農器史銷鋒鏑征戎聰所從則不復拘留之為征戍聴其所從或為農或為民當擾攘之際有冗濫為官則復其舊業雖土著戸口有失耕種還服田力穡以為農也中興似國初繼體如太宗端拱納諌諍和風日冲融赤墀櫻桃枝隱映銀􅁝籠千春薦陵寝永永埀無窮杜田補遺月令仲夏之月天子嘗黍羞以舍桃先薦寝廟注舎桃櫻桃也漢惠帝常出離宮叔孫通曰古者有春甞果方今櫻桃可獻願陛下出因取櫻桃獻宗廟上許之諸果獻由此興又唐李綽嵗時記四月一日内園進櫻桃寝廟薦訖頒賜各有差不趙云言禍亂之初宗廟焚毁今既修薦則薦獻之禮可闕京都不再火涇渭開愁溶歸號故松柏老去苦飄蓬趙云號音平聲因説朝廷宗廟之下自亦及其先墳之思言欲歸號哭于祖先墳墓之間而苦飄泊不能歸所以自傷也商君曰夫飛蓬遇飄風而千里乗風之勢也庾信燕歌行千里飄蓬無復根雷大旱山岳焦密雲復無雨杜云莊子大旱金石流玉山焦而不熱易小畜密雲不雨南方瘴癘地罹此農事苦封内必舞雩峡中喧撃鼓周禮司巫若國大旱則率巫而舞雩神農求雨書祈而不雨則曝巫曝巫不雨則積薪撃鼓而焚神山真龍竟寂寞土梗空俯僂土梗土龍也葉公好盡龍而真龍入室趙云戰國䇿有桃梗土梗之喻吁嗟公私病税歛缺不補故老仰面啼瘡痍向誰數前漢季布儔瘡痍木瘳言民傷於賦役如被瘡痍暴尫或前聞鞭巫非稽古尫非巫也瘠病之人其面上向俗謂天哀其病恐雨入其鼻故天為之旱所以僖公欲焚之杜田補遺禮記嵗旱穆公君縣子而問然曰天久不雨吾欲暴尫而奚若曰天則不雨而暴人之疾子虐母乃不可歟然則吾欲暴巫而奚若曰天則不雨而望之愚婦人於以求之母乃巳䟽乎趙云檀弓未之前文也稽古出書請先偃甲兵處分聴人主萬邦但各業一物休盡取水旱其數然堯湯免親覩堯九年之水湯七年之卑其數然也趙云言堯之水湯之旱豈免親見乎上天鑠金石羣盜亂豺虎招魂曰十日並出流金鑠石七哀詩盗賊如豺虎趙云鑠金石又用鄒陽衆口鑠金也鑠石魏應璩與岑文瑜書頃者炎日更増甚沙礫銷鑠草木焦巻二者存一端愆陽不猶愈趙云以賊與旱為二也就二者之中言雖愆陽而䍐不猶勝於盗賊乎愆陽左傳則冬無愆陽愆過也乎師云二者皆有傷于和氣也左傳不猶愈昨宵殷其雷風過齊萬弩復吹霾翳㪚虚覺神靈聚氣暍腹胃融汗滋衣裳汚一作腐吾衰尤拙計失望築場圃九月築場圃注春夏為圃秋冬為場殷其雷詩篇名音謁傷熱也莊子暍者反冬乎冷風而武王扇暍是也火楚俗大䍐則焚山撃鼓有合神農書焚山經月火大旱則斯舉趙云大旱書若嵗大旱周禮大旱帥巫而舞雩斯舉論語色斯舉矣舉則舉火之謂言舉行其事也舊俗燒蛟龍驚惶致雷雨爆嵌魑魅泣崩凍嵐隂昈師云昈音乎古反韻書注文彩狀明趙云雷雨作解崩凍嵐隂昈則冰雪其墮下文采明昈於嵐隂之間羅落沸百泓根源皆萬古青林一灰燼雲氣無處所趙云上兩句言百泓之根源皆自萬古而同沸於今日也下言雲氣託於林木青葱之内青秋既灰燼雲氣無所止泊也宋玉高唐賦風止雨霽雲無處所入夜殊赫然新秋照牛女風吹巨焰作河掉勝煙柱勢欲焚崑崙光彌焮洲渚師云焮許靳反灰也起趙云舊本河掉善本作河掉言風吹巨熖高可逺照河水而為之震掉烟直上如柱也晉潘尼火賦芬輪紓轉倐怱横厲震響達乎八溟流光燭乎四裔即其義也承河掉騰烟柱之下勢欲焚崑崙者可之所自出書火炎崑崗皆參合言之焮字左傳火所焮燎腥至燋長蛇聲吼纒猛虎神物已高飛不見石與土爾寧要謗讟慿此近熒侮薄闗長史憂甚昧至精主趙云神物言蛟龍巳高飛不礙石與土古傳人不見風牛不見火龍不見石故也前句舊俗燒蛟龍驚惶致雷雨此俗人無知以旱焚山其事如此豈知神物安可驚恐之邪茍必以為謗讟神物而熒侮之旱之害農至於焚山侮神寧不為人害邪亦宜闗于長吏之憂也豈水卑有數冥冥中有主之者惟此神物其至精之主乎民之無知甚昧厥理則長史所憂在此遠遷誰撲滅書若火燎于原不可嚮邇其猶可撲㓕趙云選爛熳速遷故將恐及環堵趙云老子將恐㓕將恐歇詩將恐將懼儒行儒有環堵之室流汗卧江亭更深氣如縷七月三日亭午已後校熱退晚加小凉穏睡有詩因論壯年樂事戲呈元二十一曹長今兹商用事餘熱亦已末衰年旅炎方趙云公在䕫為楚地故云炎方生意從此活亭午減汗流北人耐鄰䀨晚風爽烏匼筋力蘓摧折薛子美曰馬頭金匼匝所謂烏匼即烏巾也古詩清風爽烏匼趙云梁元帝纂要日在午曰亭午周勃汗流浹背烏匼今亦有匼頂巾之語閉目踰十旬大江不止渴趙云公有疾痟中之病當署則尤甚退藏恨雨師健歩聞旱魃雨師行雨師退藏不用事也杜田補遺神異經南方有人長二三尺祼身而目在頂上走行如風名曰魃所見之國大旱赤地千里一名狢遇得之投青中乃死旱災即消山海經蚩尤作兵犯黄帝令應龍攻於冀州之野蚩尤以風伯從而大風雨帝下天女魃止雨遂殺蚩尤不得復土故所居不而趙云退藏借用易退藏於宻旱魃有健步寔事見上神異經園蔬抱金玉無以供採掇密雲雖聚散徂暑終衰歇前聖慎焚巫魯僖公砍焚巫臧文仲止之武王親救暍武王見暍人王自左擁而右扇之見世紀隂陽相主客時序遞囘斡灑落惟清秋昏霾一空闊蕭蕭紫塞鴈南向欲行列趙云抱金玉言其貴而難得如金玉與詩之言金玉爾音同意易密雲不雨自我西郊密雲或聚而㪚終不為雨也然七月暑既徂矣其餘熱亦哀此造化必然之理故云隂陽相主客與時序遞回幹也然以前聖焚巫武王親救暍間於中何也盖言聖人深知隂陽寒暑之理於旱不欲焚巫扇暍又言聖人不敢變易天地之寒暑但憫憐暍人扇而救之如此方深藏微意以起時序囘斡也謝惠連七夕詩傾河易回斡時釵回斡自有定叙故清秋則昏霾一掃空矣觀紫塞之鴈巳有南向之行列則塞之代暑豈不信乎不必以熱為念􅣐思紅顔日霜露凍階闥胡馬挟彫弓鳴弦不虚發上林賦弦不虚發中必決眥長鈚逐狡兎突羽當滿月師云庾亮賦突羽先馳劉孝摽賦彎弧滿月之勢梁范雲詩長鈚破犬膽短鋌劇雉翮薛云家語子路白羽若月赤羽若日弦杜田補遺廣韻鈚箭也是詩上句云胡馬挟彫弓鳴不虚發則是鈚為箭明矣突羽蓋箭翎鈚音批突趙云此思少年乗寒射獵感歎年老也鈚韻書箭也羽當滿月又以言箭其羽奔突而疾故曰突羽滿月所以言挽弓之滿箭當共挽滿之間也薛夢符引家語非惆悵白頭吟古樂府有此吟疾人相知以新間舊不能至白首蕭條游俠窟杜云郭景純游仙詩京華游俠窟游侠豪傑也前漢有游侠傳其趙云白頭吟祖出卓文君以司馬相如置妾之故以不能至於白首而為此吟而公所用止取白頭吟詠耳舊注引前漢游俠傳非窟字出處矣臨軒望山閣縹緲安可越高人練丹砂未念將朽骨世説丹砂可以駐年薛夢符續注抱朴子臨汜縣廖氏亡夀後移居子孫輙殘折他人居其故宅復夀不知何故疑井水赤乃掘井左右得古人埋丹砂十斛丹汁入井是以飲水得夀又古樂府但使丹砂就能令徳萬年杜田補遺漢隂真君金華大丹訣姹女隠在丹砂中或出真形在老翁子須與我萬年夀復須與我嬰兒容金碧經序曰丹書云服丹砂者乃得長生老者反少烏食成鳯蛇鉺成龍枯木再縁朽骨再肉五金土石並化至寶趙云望山閣望元二十一之閣高人元君元必好道之士此云丹砂後云吾子得神仙也少壯跡頗疎歡樂曾倐忽杖藜風塵際老醜難翦拂翦裁也拂拂拭言老醜難可矜飾趙云此言少壯蹤跡踈散歡樂已過今風塵間既巳老醜縱高人念之亦難於翦拂也莊子原憲杖藜應門風塵言兵亂老醜倒用阮嗣宗詠懷朝為媚少年夕暮成醜老劉孝標絶交論翦拂使其長鳴北史盧思道傳翦拂吹嘘長其光價吾子得神仙本是池中物賤夫美一睡煩促嬰詞筆周瑜蛟龍得雲雨非復池中物張華煩促每有餘苦趙云我非若子之得神仙美一睡而已美一睡而熱之煩促所以嬰累詞筆而作詩也牽牛織女趙云此篇戒女子之防身婦人之守禮盖國風之義牽牛出河西織女處其東牽牛織女皆星名增添焦林天斗記天河之西有星煌煌謂之牽牛天河之東有星微茫曰織女萬古永相望七夕誰見同神光意一作竟難候此事終䝉朧叢話學林新編世傳織女嫁牽牛渡河相㑹按史記晉天文志河鼓星在織女牽牛之間俗因傳㑹為渡河之説媟瀆上象無所根據淮南子云烏鵲填河成橋而渡織女荆楚嵗時記七夕河漢間奕奕有光景以此為候是牛女相過其説恠誕子美今詩意不取世俗説也颯然精靈合何必秋遂通周處風土記七月七日夜洒掃於庭露施几筵設酒脯時果㪚香粉於河鼔織女言此二星神當㑹少年守夜者咸懐私願或云見天漢中奕奕有白氣有光曜五色以此為證便拜而乞願乞冨乞夀乞子唯得乞一不得兼求三年乃言之趙云公之新意矣亭亭新粧立龍駕具曾空杜云謝眺七夕賦回龍駕之容裔亂鳯管之凄鏘謂織女世人亦為爾祈請走兒童稱家隨豐儉白屋逹公宫膳夫翊堂殿鳴玉凄房櫳趙云白屋貧人之屋如周公下白屋之士公宫公侯之家左傳有守於公宫教于公宫溝其公宫之類雖日白屋逹公宫而下句則言公宫之如此曝衣遍天下竹林七賢傳舊俗以七月七日曝衣時南阮富所曝皆錦繡北阮貧乃立長竿標大布犢鼻於庭中日未能免俗北阮阮咸曵月揚微風師云謝荘賦曵雲表之素月蛛絲小人態曲綴𤓰果中荆楚嵗時記七夕婦人結綵縷穿七孔針於中庭以乞巧有喜子網於𤓰上則為得功初筵詩賔之初筵􅀈重露日出甘所終嗟汝未嫁女秉心鬱忡忡防身動如律竭力機杼中雖無舅姑事敢昧織作功明明君臣契咫尺或未容義無棄禮法恩始夫婦恭小大有佳期戒之在至公方圓茍齟齬丈夫多英雄一云勿替大夫雄薛云楚詞九辯圓鑿而方枘兮吾固知其齟齬而難入胡趙云於戒女子防身之下又以君臣比夫婦之義言不觀君臣相契之事分明於咫尺之間臣茍有虧君或不容之矣為人婦者義在無棄禮法而承恩在夫婦恭也盖因織女毎嵗有期為不可亂為人女人婦者當守至公之戒也凡相背戾則圓鑿而方枘矣婦人女子一有齟齬為丈夫者豈能容乎此詩非徒見婦女之義知此則為臣之義得矣丈夫多英雄一作勿簮丈夫雄出孔文舉論盛孝章書孝章寔丈夫之雄也於今詩㫁章無義盖丈夫多英雄以警女子之守節而勿替大夫雄則方且開喻丈夫焉是為無義蔡伯世乃不取丈夫多英雄之句未之思也毒熱寄簡崔評事十六弟大暑一作火運金氣荆揚不知秋五行相生以成四時夏火也秋金也金當代火而畏火故金氣伏而火盛所以熱也七趙云大火一作大暑火運金氣當以大火為正盖言月之候詩七月流火火者大火也月令孟秋之月盛徳在金大火流而運金氣所以為七月七月則當有秋也荆揚楚地是為炎方故獨不知秋不知秋則猶炎燠矣舊注却引三伏之義與下句不貫林下有塌翼陳孔璋檄垂頭塌翼莫所憑恃水中無行舟杜云書罔水行舟句趙云上句鳥以熱而難飛下人以熱而難涉魏文帝善哉行深深川流中有行舟今飜用之千室但掃地閉門人事休老天轉不樂旅次兼百憂蝮虵暮偃塞空牀難暗投趙云掃地閉門皆以熱故易旅卦旅即次又旅焚其次詩逢此百憂占詩空牀難獨守借用明月之壁亱光之璧以暗投人炎宵惡明燭况乃懷舊丘杜云鮑照去郷三十載復得還舊丘開襟仰内弟執熱露白頭束帶負芒刺接居成阻脩趙云内弟題所謂崔十六弟晉人以姑舅兄弟為外兄弟劉禹錫謝崔貟外與任十四兄同過詩何人萬里能相憶同舍仙郎與外兄杜公詩有白水縣崔評事意者其諸舅之子矣而云内弟盖所未曉詩誰能執熱逝不以濯鄒陽白頭如新論語束帶立於朝霍光傳若負芒刺詩道阻且修何當清霜飛㑹子臨江樓載聞大易義諷興詩家流藴藉異時軰檢身非苟求薛云前漢孔稚圭等論曰咸以儒宗居宰相位服儒衣冠傳先王語其藴藉可也趙云書檢身若不及皇皇使臣體信是徳業優楚材擇杞梓杞梓楚之良材漢苑歸驊騮杜田補遺左傳楚令尹子木問聲子曰晉大夫與楚孰賢對曰晉卿不如楚其大夫則賢皆卿材也如杞梓皮革自楚徃也雖楚有材晉寔用之趙云里皇使臣體指崔評事盖必為使也詩皇皇者華君遣使臣杞梓梓驊騮美崔於杞梓言楚材舊注横稜於驊騮言漢苑則漢有天馬之苑皆取字為詩句耳短章逹我心理為一云待識者籌壯遊趙云此篇五十六韻乃八段自往昔十四五至俗物都茫茫十四句是一段叙其為學為性之事自東下姑蘇䑓至欲罷不能忘二十句一句叙其游吳越之事自歸帆拂天姥至獨辭京尹堂六句一段叙其自吴越囘長安赴省舉之事自放蕩齊趙間至忽如攜葛強十句一段叙其既下第而游齊趙之事自快意八九年至賞遊寔賢王四句一段叙其自齊趙囘長安交友之事自曳裾置醴地至引古惜興亡十八句一段叙其獻三大禮賦得官在長安見時政得失之事自河朔風塵起至凋瘵滿膏盲十四句一段叙禄上反明皇幸蜀肅宗即位用兵而官兵敗之事自備貟竊補衮至酸鼻朝未央十二句一段叙其在行在拜拾遺言事之事自小臣議論絶至側佇英俊翔十四句一段叙其以言事而出流落於外今則楚地而樂間曠之事公平生出處詳於此篇史官為傳當時為墓誌後人為集序皆不能考此以書之甚可惜也往昔又云往者十四五出游翰墨場阮籍昔年十四五志尚好書詩鮑明逺十五諷詩書篇翰靡不通與趙云嵗數雖見寔道阮籍詩云此恰好處不放過也東坡五十二嵗詩用孔融之語云五十之年初過二同格謝宣逺賦張子房詩粲粲翰墨場斯文崔魏徒崔鄭州尚魏豫州啓心以我似班揚班固揚雄孔趙云指崔魏為斯文之人字則子天之禾䘮斯文七齡思即荘門口詠鳯凰九齡書大字有作成一囊趙云禮記古者為年齡齒亦齡也七齡九齡字則梁劉勰文心雕龍序志篇曰余生七齡乃夢彩煙若錦則攀而採之揚雄言其子童烏曰九齡而與我𤣥文莊子開口而笑傳延陵有作此言有作則作文章之作性豪業嗜酒嫉惡懷剛腸杜田云嵇叔夜與山巨源書剛腸嫉惡輕肆真言遇事便發此甚不可二也師云孔文舉薦禰衡表嫉悪若讎脱略小時輩結交皆老蒼飲酣視八極俗物都茫茫江淹恨賦脱略公卿跌宕文史戎趙云左傳鄭良霄出奔以嗜酒阮籍謂王俗物巳復来敗人意通往者十四五至此為一段叙其為學為性之事東下姑蘇臺伍被傳淮南王隂有邪謀被諫之曰昔子胥諌吴王吴王不用迺日臣今見麋鹿游姑蘇之臺張晏曰姑蘇吳臺名師古曰呉地記云因山為名西南去國二十五里史吴世家越伐吴敗之姑蘇越絶書闔廬起姑蘇臺三年聚材五家乃成髙見三百里吴都賦造姑蘇之高臺臨四逺而時見已具浮海航船大舟到今有遺恨不得窮扶桑山海經太荒之中暘谷上有扶桑陸機前緩聲歌揔轡扶桑底濯足陽谷波趙云姑蘇臺在今蘇州見越絶書浮海航則孔子道不行乘桴浮于海變使航宇則詩誰謂河廣一葦航之淮南子曰出扶桑海東也十洲記扶桑在碧海中上有天帝宫東王所治樹長数千丈二千圍同根更相依傍故曰扶桑言雖具航而不往故不得窮扶桑王謝風流逺王戎謝安闔廬丘墓荒闔廬吴王公子光也吴越春秋闔廬死𦵏於國西北名日虎丘穿土為川積壌為丘發五都之士十萬人共治千里冢池四周深丈餘銅棺三重積水銀為池池廣六十歩黄金珠玉為鳬鴈之屬扁諸之劔在焉𦵏之三日金精上揚為白虎据其上故號虎丘劍池石壁仄師劍池吴王淬劍之所去姑蘇三十里長洲芰荷香枚乘遺吴王書修治上林雜以離宫積聚玩好圏中禽獸不如長洲之苑服䖍曰吴苑孟康曰以江水洲為苑韋昭曰長洲在東吴吴都賦帶朝夕之湑池佩長洲之茂苑趙云王則諸王謝則諸謝不專指也劉禹錫詩舊来王謝堂前燕飛入尋常百姓家是巳劔池上所謂扁諸之劒在池中也嵯峨閶門北清廟映囘塘陸士衡吴越行吴越自有始請從閶門起閶門何峨峨飛閣跨通波清廟文王之廟甞杜田補遺吴越春秋闔閶内傳闔閶委計於子胥乃使相土水象天法地造築大城六門八以象天八風水門入以法地八忩立閶門者以象天門通閶闔風立虵門者以象地户闔閶欲西破楚楚在西北故立閶門以通天氣因復名之破楚門欲東并越越在東南故立虵門以制敵國吴在辰其位龍也越在已其位虵也故大門上有木虵北向首内示越屬於吴清廟非文王之廟乃呉文皇帝孫和廟也子皓改葬和號明陵又分呉郡丹陽為呉興郡置太守四時奉祠立寝堂號清明廟趙云呉者太伯之國文王太伯之兄子不容有于呉下句方言呉太伯毎趨呉太伯撫事淚浪浪皇覽曰太伯冢在呉縣北梅里聚去城十里呉天伯弟仲雍皆周太王之子王季厯賢而有聖子昌太王欲立季厯以及昌於是太伯仲雍二人犇荆蠻文身㫁髮示不可用避季厯季厯果立是為王季而昌為太子太伯之犇荆楚自號勾呉荆蠻義之從而歸之趙云楚辭淚余襟之浪浪枕戈憶勾踐越王勾踐允常之子既逃㑹稽之恥反國苦身焦思曰汝忘㑹稽之恥耶出則甞膽卧則枕戈渡浙想秦皇秦始皇紀十一月行至雲夢望祀虞舜于九疑山浮江下觀藉柯渡海渚過丹陽至錢塘臨浙江水波惡乃西百二十里從狹中渡上㑹稽祭大禹望於南海立石刻頌秦徳晉灼曰江水至㑹稽山陰為浙江蒸魚聞匕首史刺客傳專諸呉堂邑人呉公子光之欲殺王僚得專諸善待之後具酒請王僚使專諸置匕首魚腹中進之以刺王僚僚死光自立為王是為闔廬除道哂要章前漢朱買臣吴人甞從㑹稽守邸者寄居飯食及拜為太守買臣衣故衣懷印歩歸郡邸值上計時㑹稽吏方群歛不視買臣買臣入室中守邸與共飲食少見其綬視其印㑹稽太守章也守邸驚出語上計掾吏皆醉呼曰妄誕耳守邸曰試來視之其故人素輕買臣者入内視之還走曰實然坐中驚駭白守相推排陳列中庭拜謁買臣徐岀户有頃長安廐吏乗驛馬車來迎買臣遂乗傳去㑹稽聞太守至發民除道縣長吏並送迎入呉界見故妻治道呼令後車載其夫妻到太守舍園中給食之居一月妻自縊死越女天下白鏡湖五月凉杜田補遺梁任昉述異記鏡湖世傳軒轅氏鑄鏡湖邉因得名今軒轅磨鏡石尚存石畔常潔不生蔓草其趙云越女枚乗七發越女侍前齊姫奉後天下白言色至美五月涼言湖間不知有暑氣剡溪藴秀異晉宋間名士多起於此欲罷不能忘趙云欲罷不能忘上四字顔淵之語言愛剡溪之秀異不能捨去剡溪越州之竒天下之勝景故藴蓄秀異之氣舊注誤認説人物之藴秀異非是通東下姑蘓臺此二十句為一段叙吴越之事歸帆拂天姥謝靈運登臨海嶠詩暝投剡中宿明登天姥岑姥莫古反中嵗貢舊鄉新史甫少貧不自振客游呉越齊趙間舉進士不第趙云上句初離越州捨剡溪而行謝靈運詩則天姥正接剡溪矣舊鄉指長安其得貢在此年句則首篇所謂甫昔少年日早充觀國賔氣劘屈賈壘目短曹劉牆賈山傳賛賈山自下劘上孟康曰劘謂剴切之也蘓林曰劘音摩摩勵也屈原賈誼壘喻戰壘賜之墻也及肩故曰短曹子建劉公幹文章也晉趙云以文章有戰勝之事比之戰壘左傳宣十二年許伯曰吾聞致師者御靡旌摩壘而還今用劘字出賈山傳其義一也檣言其所藏之髙下目短之言可窺見曹劉之藴忤下考功第武徳舊令考功郎監試貢舉人貞觀已來乃員外郎專掌貢舉省郎之殊美者至開元中移貢舉於吏部獨辭京尹堂放蕩齊趙間裘馬頗清狂春歌叢臺上叢臺趙云之臺在邯鄲鄒陽云全趙之時武力鼎士袨服叢臺之下者一旦成市不能止幽王之湛患張平子楚架章華於前趙建叢臺於後冬獵青丘旁青丘地名呼鷹皁一作紫櫪林逐獸雲雪岡射飛曽縱鞚鮑照幽并重騎射少年好馳逐獸肥春草短飛鞚越平陸引臂落􅒗鶬引一云跋李廣長臂蘓侯據鞍喜監門胃曹䒩預也巷薛云南史顔好騎馬游里遇知舊輒據鞍索酒得必傾盡欣然自得忽如攜葛強舉鞍問葛強何如并州兒快意八九年西歸到咸陽許與必詞伯賞游實賢王賞一作貴孟子賢王好善而忘勢趙云咸陽秦都名古長安也王充論衡文辭之伯賢王言宗室之賢者後漢沛獻王輔在國謹節始終如一稱為賢王此四句言其自齊趙歸長安事許與兩字一義賞游亦兩字一義一作貴游非曳裾置醴地奏賦入明光𤣥宗朝饗甫獻大禮三賦楚元王敬申生置醴以代酒天子廢食召羣公㑹軒裳脱身無所愛帝竒其村使待詔集賢命宰相試文章擢河西尉不拜痛飲信行藏趙云承賢王之下故云曳裾鄒陽何王寳之門不可曳長裾乎明光漢殿名公天九載冬進三大禮賦待制於集賢委學官試文章再降㤙凙公甞曰集賢學士如堵墻觀我落筆中書堂公召試文章授河西尉辭不行改右率府胄曹掾以不任事為安所謂脱身無所愛故惟痛飲而已行藏雖起論語用之則行舍之則藏兩字潘安仁賦孔随時以行藏黑貂不免弊蘓季不用於秦而黒貂裘弊班鬢兀稱觴秋興賦班鬢彪以承弁閒居賦稱萬夀以獻觴杜曲晩耆舊晚一作挽四郊多白楊坐深鄉黨敬日覺死生忙趙云言杜曲晚年耆舊皆為鬼録故在四郊多墓上之白楊則公在鄉里更為長上故曰坐深而日但覺眼前死者生者之事忙朱門任傾奪赤族迭罹殃任一云務揚子解嘲客徒欲朱舟其轂不知一跌赤吾之族趙云雨句通義言大臣之取祸朱門見上自京赴奉先縣詠懐注一作務非國馬竭粟豆漢有太常輔粟豆官雞輸稲梁時五坊有供奉闘鷄又有闘雞使舉隅見煩費引右惜興亡舉一隅則衆費可知言引古辨今足以知其興亡而可痛惜者也趙云言國家横費稲梁見上同登慈㤙寺塔注孔子舉一隅不以三隅反則不復也既舉東則知西南北如此煩費可以引古驗今知興亡之所在通曳裾置醴地至此十八句叙獻賦得官在長安見時政之事河朔風塵起禄山起河朔岷山行幸長𤣥宗幸蜀兩宫各警蹕萬里遥相望肅宗即位靈武趙云兵興謂之風塵天寳十四載十一月禄山反陷河北諸郡又陷東京十五載六月䧟潼闗京師大駭詔親征遂幸蜀故曰河朔風塵起岷山行幸長七月以皇太子為天下兵馬元帥北収兵至靈武裴冕等奉太子即皇帝位是為肅宗改元至徳尊皇帝曰太上天帝太上在蜀肅宗在靈武所謂兩宫各警蹕萬里遥相望崆峒殺氣黑少海旌旗黄師云崆峒謂靈武少海謂太子旌旗黄謂帝位禹功亦命子涿鹿親戎行以廣平王為天下兵馬元帥王肅宗之子代宗杜田補遺東宮故事天子比大海太子為少海山海經無皋之山南望㓜海郭璞注㓜海少海也淮南子九州之外乃有八寅亦曰寅澤東方曰太清曰少海或謂肅宗太子廣平王為元帥故無少海詳觀詩意恐非是崆峒在西少海在東河朔風塵起氓山行幸長則東西南北皆不寕也禹功亦命子盖啓與有扈戰于甘之野正指太子為元師涿鹿親戎行盖黄帝與蚩尤戰涿鹿即指肅宗親征下趙云上句指肅宗行在之兵下句指廣平王俶為天兵馬元帥之兵盖肅宗初年幸平涼未知所適裴冕杜鴻漸勸之靈武起兵再過平涼至徳二載二月次鳯翔則用崆峒言之閏八月以廣平王俶為天下兵馬元帥則用少海言之崆峒山名樂史寰宇記禹跡之内山名崆峒者三並見上洗兵馬注今此云崆峒殺氣黒則主安定崆峒言之盖涇與原相接唐志涇州安志定郡原州平涼郡元和四年分原州平涼縣名之日行㴘州而於原州平髙縣之下注有崆峒山樂史寰宇記亦然又於涇州保定縣亦載有崆峒一名笄頭山大抵涇原相接渭在其中則崆峒一帶之地故令云崆峒殺氣黒主安定崆峒言之也肅宗自靈武起兵後次於鳯翔皆隴右一道之地矣杜田殊不考上下文之義上句正以承上少海之句盖明皇以天下兵馬元帥命肅宗矣至肅宗又以天下兵馬元帥命廣平王俶此所謂亦命子也亦命子字換傍舜亦以命禹下句又以指言肅宗盖黄帝與蚩尤戰於涿鹿而肅宗親宗兵於鳯翔為親戎行矣翠華擁吴岳翠華天子羽葆螭虎噉豺狼趙云翠華天子之旗上林賦建翠華之萎蕤英兵或作呉岳並朱見或云太白山之名翠華擁之治兵在鳯翔故也螭虎天兵豺狼宼賊𤓰牙一不中胡兵更陸梁房琯敗於陳濤賊既得志則愈陸梁之趙云爪牙言天子大将詩祈父予王𤓰牙祈父大司馬也𤓰牙一不中指房琯陳濤斜之敗又以南車戰敗之事也一不中言如射偶不中耳大軍載草草凋瘵滿膏肓薛云春秋左氏傳秦伯使醫緩視晉侯疾曰在盲之上膏之下攻之不可逹之不及藥不至焉不可為也趙云傷軍須誅求之苦通河朔風塵起至此為一叚叙禄山反明皇幸蜀肅宗即位官兵敗之事也備貟竊補衮譏時相房琯雖敗然亦偹貟趙云公自言充左拾遺而合有所言也舊注譏時相非是憂憤心飛揚上感九廟焚天子九廟下憫萬民瘡斯時伏青蒲前漢史丹傳元帝敬易太子丹聞上獨寢直入卧内伏青蒲上泣諫注以青規地曰青蒲非皇后不得至此廷諍守御牀王陵面折廷諍衛瓘託醉跪帝状前以手撫牀曰此坐可惜君辱敢愛死檀弓中生不敢愛其死赫怒幸無傷詩王赫斯怒聖哲體仁恕宇縣復小康哭廟灰燼中鼻酸朝未央時天子収復京師先素服哭廟而后受朝刺趙云公上䟽論琯有才不宜廢免肅宗怒貶琯邠州史出公為華州司功故其下有伏青蒲守御牀敢爱死與赫怒之句此一叚十二句叙述身在行在拜拾遺之事小臣議論絶老病客殊方鬱鬱苦不展張平子鬱鬱不得志羽翮困低昻秋風動哀壑碧蕙捐微芳陸士衡塘上行江籬生幽渚微芳不足宣四節逝不處繁華難乆鮮淑氣與時殞餘芳隨風捐京趙云議論絶以罷拾遺而出殊方言在夔州字則西賦殊方偏國鬱鬱不得志之皃碧蕙捐微芳言客於秋時一作損非之推避賞從漁父濯滄浪漁夫歌滄浪之水清可以濯我纓賞趙云之推漁父皆以自比介之推從晉文公歸國不及亦不言後避賞入山此公言其甞扈從而今在外也漁父公言其有江海之興榮華敵勲業嵗暮有嚴霜吾觀鴟夷子才格出尋常羣兇逆未定側佇英俊翔范蠡既雪㑹稽之恥以為大名之下不可乆居遂泛舟浮海變姓名號鴟夷子趙云自傷勲業之寡榮華之微然嵗律云暮嚴霜必降傷其遲暮不能勵勲業以取榮華所慕者范蠡扁舟事而已蠡髙舉逺引乃出尋常之才格未句財付之英俊矣通小臣議論絶至此十四句為一叚叙以言事而出流落於外今在楚地而樂閒曠之事也阻雨不得歸瀼西甘林三伏適已過陰陽書夏至後第三庚為初伏第四庚為中伏立秋後初庚為末伏王彪之井賦三伏焦暑元陽重授輕飈不扇瀐雲不覆驕陽化為霖欲歸瀼西宅阻此江浦深壊舟百板圻峻岸復萬尋篙工初一弃恐泥勞寸心佇立東城隅悵望髙飛禽趙云言有船而破壞舟人弃之不用故寸在有恐泥之勞下句則望瀼西阻於渡渉恨無羽翼飛去草堂亂𤣥圃不隔崑崙岑昬渾衣裳外曠絶同層陰園甘長成時三寸如黄金諸侯舊上計厥貢傾千林禹貢淮海維揚州厥包橘䄂錫貢江文通曰落長沙渚曾隂萬里生蜀都賦户有橘䄂之漢武計偕注計者上計簿使也而趙云公意珍重其甘林有岡𤣥圖與崑崙不相隔耳以兩之故衣裳之外氣象昏渾其曠絶之處同曽隂之一色也葛仙翁傳崑崙一名𤣥圃盖崑崙山中有名𤣥圃邦人不足重所迫豪吏侵客居暫封植日夜偶瑶琴昭公二年季氏有佳樹宣子譽之武子日宿敢不封殖此樹也趙云言甘可入貢為至尊之御而邦人反不重若豪吏侵奪想土人不復多種矣近世蜀中宫取荔枝至有荔枝之家伐去不留亦此類也邦人既不重之惟客居尚可封殖瑶琴言如琴瑟之不去身朝夕玩之虚徐五株熊側塞煩胷襟焉得輟兩足杖藜出嶇􅋂條流数翠實師云劉孝議緑李賦緑珠滿條流又翠實纍纍偃息歸碧潯靈運舉目晀嶇􅋂拂拭烏皮几喜聞樵牧音令兒快搔背脱我頭上簮張景陽詩投耒循㟁側時聞樵採音増添郤詵山行喜聞樵語牧唱洗盡五年塵土腸胃欣然驂臨水乆之而去趙云齊謝眺詠烏皮隠几詩蟠本生附枝刻削豈無施取則龍文鼎三跡獻光儀勿言素韋潔白沙尚推移曲躬奉微用聊承終宴疲下句則得歸瀼西聞乎日之音而喜搔背脱巾歸林下之樂如此雨三首峽雲行清曉煙霧相徘徊風吹蒼江樹雨灑石壁来凄凄生餘寒殷殷兼出雷白谷變氣候師曰谷地名朱炎安在哉高鳥濕不下居人門未開楚宮乆已滅幽珮為誰哀侍臣書王夢賊有冠古才冥冥翠龍駕多自巫山䑓楚詞雷填填兮而冥冥髙唐賦虹為挂翠為盖婉若游龍乗雲翔増添韓詩外傳鄭交甫逹江妃二女出于江濵挑之女遂觧珮與之甫悦受珮去数步空懐無珮女亦不見謝𤣥暉朔風吹飛雨蕭條江山来楚襄王夢與神人遇宋王作髙君賦曰旦為朝雲暮為行雨朝朝暮暮陽臺之下趙云此篇主巫山之雨為意故云楚宫乆巳滅幽珮為誰哀幽珮以雨聲如珮此神女珮也髙蟾亦曰丁當王珮三更雨疑出於此侍臣指玉也賦則髙唐神女賦也以載楚王夢事翠龍駕又指神女故以雨歸之神女多之為義非􅂾􅂾之多乃十分之多也龍駕出謝晀七夕賦囘龍駕之容曳青山淡無姿白露誰能􅂾趙云暗用佛書雨露皆有頭􅂾之義片片水上雲蕭蕭沙中雨殊俗状巢居曽臺俯風渚楚地面山背水俗多架木為居以就地勢佳客適萬里沉思情延停趙云此必有所别之人而可當佳客之稱挂帆逺色外驚浪滿吴楚乆隂蛟螭出㓂盗一云冠盖復㡬許趙云四句憂佳客旅興之辭驚浪蛟螭㓂盗皆實言既言冦盗豈復以驚浪比永王蛟螭比賦歛乎况永王璘之叛是至徳二載事此詩以挂帆言之則為荆南以白露言之則時為秋乃大厯三年之秋不亦相逺乎古詩河漢清且淺相去復㡬許空山中宵隂微冷先枕席囘風起清曉萬象凄已碧古詩回風動地起陸士衡迅雷中宵激驚電光夜舒落落出岫雲渾渾倚天石日假何道行天文志日有行黄道有行赤道者時雨乆陰晦不知日之所行何道雨含長江白連檣荆州船江賦舳艫相屬萬里連檣有士荷戈㦸南防草鎮惨霑濕赴逺役羣盗下壁山師云辟山䕫路縣名今屬恭州總戎備強敵水深雲光廓嗚櫓木有適漁艇息一作自悠悠夷歌負樵客畱滯一老翁書時記朝夕趙云此篇盖時荆渚間有㓂盗前篇云㓂盗後㡬許此篇特詳焉南防草鎮慘則㓂盗在草鎮矣水深雲光廓嗚櫓各有適公羡慕之辭漁艇自悠悠夷歌負樵客思其上逺適之而不可得乃思其次也漁舟自如樵客之放為夷歌亦足樂矣而留滯為客者一老翁為可傷姑書時節朝夕而巳又上後園山脚昔我游山東憶戯東岳陽窮秋立日觀師云漢官儀曰㤗山東南名日觀矯首望八一云北荒顔延年日觀臨東冥朱崖著毫髪朱崖海南州碧海海也逺望若毫髮然師云茅君内傳岱山之洞上有丹闗朱崖碧海吹衣裳師云十州記扶桑鎮於碧津漢武内傳曰藥冇碧海琅玕蓐収困用事𤣥冥蔚強梁蓐収秋神𤣥冥冬神言四時相代用事則休者困而王者強梁矣逝水自朝宗鎮石各其方言逝者無所止而止者不易其所也平原獨憔悴農力廢耕桑非闗一作北闗風露凋曾是戍役傷於時國用富足以守邉疆朝廷任猛将逺奪戎虜場於時當時也當𤣥宗富盛之時不能節用自守而委任藩将求功夷狄到今事反覆故老淚萬行龜䝉不復見况乃懐舊鄉龜䝉山去東岳近尚不可見況故鄉乎肺萎屬乆戰骨出熱中膓師云劉琨書肺萎骨出四體不支憂來杖匣劍更上林北岡瘴毒猿鳥落峽乾南日黄秋風亦已起江漢始如湯苦熱行赤阪横西阻火山赫南威身熱頭且痛鳥隨䰟來歸湯泉發雲潭焦煙起石圻登髙欲有徃蕩析川無梁師云劉休𤣥詩河廣川無梁山髙路難越哀彼逺征人去家死路傍不及父祖塋壘纍塚相當魏懐舊賦冢纍纍以接隴華表丁令威歌何不學仙冢纍纍後漢直如弦死路邉雨山雨不作泥江雲薄為霧晴飛半嶺鶴亂平沙村樹明滅洲景微隠見巖資露趙云以見微雨便晴山雨陳張正見經季子廟詩山雨濕苔碑拘悶出門遊矌絶經目趣消中日伏枕卧乆塵及屨豈無平肩輿師云晉王子敬經呉郡聞觀辟疆有名園先不相織乗平肩輿徑入趙云空曠逺絶之處即是經目之景趣平肩輿轎子也莫辨望鄉路兵戈浩未息虵虺反相顧趙云虵虺䕫已在南多有之或云以比盗賊兇徒選尚為虵為虺悠悠邉月破鬱鬱流年度趙云言破除之破一月而去也公有句云二月已破三月來亦此破義針灸阻朋曹針灸所以救療譬良朋友糠籺對童孺時既乏良朋所對者童孺而已糠籺言非寔徳趙云以伏枕之病湏針灸以安養故與朋曹阻隔下言貧食糠籺與童孺相對舊注皆非一命須屈色新知漸成故窮荒益自卑飄泊欲誰訴師云李顒詩冗寮慙屈邑尫羸愁應接俄頃恐違一云危迕浮俗何萬端幽人有髙歩龐公竟獨往龐徳公未甞入州府夫妻相敬如賔劉表不能屈後携妻子入鹿門山不返尚子終罕遇後漢逸民傳尚長字子平隠居不仕肆意游五岳名山不知所終趙云上兩句似言嚴鄭公盖嚴武辟公節度參謀所謂一命也言受人一命當屈色以下之漸成故言其死也言才得新知漸成故没重歎知已之難遭也故繼之以窮荒益自卑飄泊欲誰訴以尫羸不堪應接故愁既倦而不久則才俄頃而已又却有違迕之憂冝起髙歩之念而欲長往矣左太冲詠史詩髙歩追許由龐公尚子盖髙歩之人公誠慕之而罕逄遇也宿留洞庭秋天寒瀟湘素杖䇿可入舟送此齒髮暮漢書宿留瞽言楚詞嫋嫋兮秋風洞庭波兮木葉下趙云宿留音秀溜出漢書如言等候也宿留之義盖有星宿留待之意公詩言候秋時可發舟而往矣洞庭瀟湘所待之處贈李十五丈别趙云自峽人鳥獸居至南入黔陽天言其在䕫流落間得㑹李十五丈而送别之也自汧公制方隅至觀罷念歸旋言李丈往謁汧公而不得俱往耳約其歸也峽人鳥獸居其室附層巔魏都賦巖岡潭淵限蠻隔夷峻危之竅也蠻陬夷落譯導而通者鳥獸之氓也下臨不測江中有萬里船多病紛倚薄少留改嵗年絶域誰慰懐開顔喜名賢孤陋忝未親等級敢比肩人生意頗一作氣合相與襟袂連一日兩遣僕三日一共筵揚論展寸心壮筆過飛泉杜田補遺曹子建作王仲宣誅發言可詠下筆成篇文若春華思若湧泉李廣利㧞刀刺山飛泉湧出飛泉言文瀏湸快利𤣥成美價存韋賢四子少子𤣥成復以明經厯位至丞相故鄒魯諺曰遺子黄金滿不如教子一經子山舊業傳庾信字子山父肩吾為梁太子中庶子掌書記徐陵及信並為抄撰學士信父子東宫出入禁闥文並綺麗世號徐庚體孤趙云倚薄謝靈運拙疾相倚薄絶域李陵奉使絶域陋記孤陋記寡開揚論者揚舉言論不聞八尺軀常愛衆目憐且為苦辛行葢被生事牽北迴白帝棹南入黔陽天汧公制方隅汧李之所封李杜田補遺汧公勉按舊史上元初為梁州刺史山南西道防禦使李十五丈在峽中徃謁之故子羙作此詩為别也逈出諸侯先封内如太古時危獨蕭然清髙金莖露一作掌正直朱絲弦西都賦抗仙掌以承露擢雙立之金莖軼埃􅅽之混濁鮮顥氣之清莫鮑明逺詩清如玉壺氷直如朱絲䋲黨錮傳直如弦死道邉昔在堯四岳今之黄潁川四岳分掌四岳之諸侯黄霸為潁川守有治狀皆美李汧公也于邁恨不同所思無由宣山深水増波解榻秋露懸客游雖云乆主要月再圓晨集風渚亭醉操雲嶠篇丈夫貴知已觀罷念歸旋趙云汧公善琴有名琴日響泉韻磬者舊注意以為李十五丈乃云汧李之所封杜田引舊史如此然以舊史上元初言之則在肅宗時上元元年嵗在庚子今公詩首句云峽人鳥獸居分明是䕫州詩乃丁未大厯二年相去七年矣勉之為山南西道防禦新史不載伹云代宗時進工部尚書封汧國公滑亳節度使令孤彰且死表勉為代勉居鎮且八年假令是代宗初事則乃壬寅寳應元年其居鎮八年乃已酉大厯四年在潭州與今所送李丈五丈時皆不合然則汧公又非李勉乎以俟博聞詩從公于邁陳蕃為周璆徐孺子下榻盖言汧公待李丈如陳蕃之待周徐當秋露懸之時也客游雖云乆主要月再圓言公留李丈必湏兩月也知巳史記士伸於知巳而屈於不知已贈鄭十八賁趙云鄭賁盖雲安知縣句云異味煩縣尹知公入月末到雲安其在忠州禹廟云荒庭垂橘柚乃八月之物此詩云追隨飯葵董亦七八月之物温温士君子前漢律厯志以銅有似士君子之行言不為燥濕寒暑變其節不為風雨暴露改其形令我懐抱盡靈芝冠衆芳安得闕親近趙云詩温温恭人詩人有士君子之行焉舊注引律厯志在後矣盡字韻書在忍切又津忍切皆上聲今作去聲才刃切之呼韻書不載矣懐抱盡字公又云懐抱向人盡豈只是懐抱字如謝靈運詩歡娯冩懐抱而貼以盡字乎雖抱字韻書亦從上聲靈芝比鄭盖靈芝人所喜見者故不可闕於親近之也韓退之若鳯凰芝草賢愚以為羙瑞亦是意矣親近前漢書親之近之遭亂意不歸竄身跡非隠趙云公自言也詩式㣲胡不歸山濤吏非吏隠非隠細人尚姑息吾子色愈謹髙懐見物理識者安肯哂卑飛欲何待㨗徑應未忍杜田補遺張衡應問曰㨗徑邪至我不忍以投歩干進茍容我不忍以歙肩楚辭夫惟㨗徑以窘歩王逸曰徑斜道也曹大家東征賦遵通衢之大道兮求㨗徑欲從誰注惟遵行正直大道不求邪侫㨗徑也又唐盧藏用傳士大夫指嵩少終南為仕塗㨗徑趙云君子之愛人也以徳細人之愛人也以姑息下句言鄭十八甘心於下位不求㨗徑以僥倖也㨗徑字祖出離騷經楚亂今貼以應未忍則張衡應問近是也示我百篇文詩家一標凖羈離交屈宋屈原宋玉牢落值顔閔顔淵閔子騫文趙云示我百篇文下所謂把驚小陸屈宋顔閔比鄭十八交與值自公言之也水陸迷畏一作長途藥餌駐修軫古人日已逺青史字不泯薛云應劭風俗通曰青史善著書青史者人姓名趙云上兩句公自言青史殺青竹簡之史盖猶或黄絹或黄紙所書為之黄巻耳劉峻答劉青陵書青簡尚新江文通俱啓丹册並圖青史薛夢符補遺乃引應劭風俗通云云不知薛何自而得此風俗通之謬與或别有所紀字偶相犯亦不可知不泯詩靡國不泯選盛徳不泯歩蹟詠唐虞追隨飯葵堇數杯資好事異味煩縣尹趙云詠唐虞而飯葵堇非樂道而然邪堇音謹杜田堇葵皆菜之美者古詩蓼蟲避葵堇盖蓼味辛食辛之蟲所以避葵堇或曰詩七月烹葵及菽則葵甘滑之菜可以養老又周原膴膴堇荼如飴堇芹菜堇辛苦而如飴之甘則以周原之膴厚也謂堇與葵皆菜之羙可乎杜公但據古詩葵堇字連出以言所可食之菜耳况古言葵堇葵有言露葵而莖亦有言露堇者矣乗露而美乃秋間之物選嚴冬而思堇以其不可得矣心雖在朝謁力與願矛盾抱病排金門衰容肯為敏敏不敏也如左傳魯人以為敏同蔽趙云矛盾相背之謂葢矛所以刺盾所以也事出韓非子􅄞康曰事與願違今云力與願矛盾即力與願違之義也殿中楊監見示張廟諱草書圖趙云公所與楊監三詩前二詩無時節可考但以舊本與後送别乃九月詩相連斯人已云亡草聖秘難得及茲煩見示滿目一悽惻悲風生微綃潘安仁凱風揚微綃萬里起古色鏘鏘鳴玉動落落群松直連山蟠其間溟漲與筆力有練實先書臨池真盡墨張伯英善草書凡家之帛必先書而後練臨池學書乆池水盡黒人謂草聖俊拔為之主暮年思轉極趙云斯人指言張旭漢張伯英善草書人謂草聖玉動松直山蟠皆以状其草書溟漲與筆力言筆力浩汗若溟渤之漲水乞與之也書練與池墨亦伯英事以比旭也俊㧞為主言其書之所主由其俊拔故也未知張王後誰並百代則嗚呼東呉精蘓州人逸氣感清識張芝草書毎太醉呌呼狂走乃下筆自視以為神楊公拂篋笥舒巻忘寢食趙云張則英王則羲之此轉用張王善書以言張旭矣逸氣感清識則張旭之逸氣感楊監之清識感者感格之感言致得如此也念昔揮毫端不獨觀酒徳張自言始見公主擔夫争道而得書法意觀公孫大娘舞劒噐而得其神俊觀張旭用意不獨在於大醉而已趙云言旭之善飲公詩甞日張旭三杯草聖傳脱㡌露頂王公前揮毫落紙如雲煙故用酒徳字結之劉伶善飲有酒徳頌楊監又出畫鷹十二扇近時馮紹正能畫鷙鳥様師云名畫馮紹正開元中為户部侍郎尤善􅀞鷹鶻雞雉形態嘴𤓰毛彩俱妙明公出此圖無乃傳其狀殊資各獨立清絶心有向疾禁千里馬氣敵萬人將狀其快疾勇次薛云前漢文帝有獻千里馬三國志評曰闗羽張飛萬人之敵師云古詩健馬馳千里殷芸小説諸葛亮才智精鋭内外敏㨗萬人敵也憶昔驪山宫冬移含元仗天寒大羽獵此物神俱王𤣥宗盛時甞以冬十月幸温泉宫時肆獵當時無凡材百中皆用壮時寧王有髙麗赤鷹尤俊異帝獵則置之駕前號快雲兒萬趙云千里馬則驥一日千里也萬人将言可以統将人之材必英雄者矣含元殿名大羽獵字揚子雲有羽獵賦神王字莊子澤雉十歩一啄百歩一飲神雖王不善也百中音去聲戰國䇿蘓厲謂周君曰養由基射百發百中用壮字易大壮九三小人用壮注言用其壮也粉墨形似間識者一惆悵干戈少暇日真骨老崖嶂為君除狡兎㑹是翻韝上送殿中楊監赴蜀見相公趙云相公杜鴻漸送子清秋暮則詩作於大厯元年九月葢鴻漸是年二月壬午授劍南西川節度使平蜀亂明年夏四月請入朝奏事許之既去不復來蜀去水絶還波古詩長江無回波洩雲無定姿陸機賦有輕盈之艶状無實體之真形師云顔延年詩洩雲自飄風人生在世間聚㪚亦暫時離别重相逄偶然豈定期送子清秋暮風物長年悲師云蕭慤詩悽惻長年悲趙云淮南子木葉落長年悲豪俊貴勲業邦家頻出師相公鎮梁益軍事無孑遺趙云詩靡有孑遺觧搨再見今陳蕃禮周璆别置一榻去則懸之來則觧用才復擇誰況子已髙位為郡得固辭難拒供給費慎哀漁奪私干戈未甚息紀網正所持汛舟巨石横師云左傳晉飢秦輸之粟命曰汎舟之後登陸草露滋山門日易夕當念居者思趙云在師間莊子人生世間若白駒之過隙言杜相公待監如陳藩待周徐也用才即是用人才汛舟巨石横登陸草露滋言或舟或陸行役之苦山門日易夕公自言在夔故以山門言之日易夕則一别之後光隂易換居者乃公自言左傳有居者行者之語九家集注杜詩巻十二
