body:
  text: 九家集注杜詩巻二十三宋郭知達編近體詩奉和嚴中丞西城晚眺十韻汲黯匡君切汲黯漢武時以切諫不得久留内遷為東海太守武帝曰古有社稷之臣如汲黯近之矣亷頗出將頻史記亷頗趙之良將頻為趙將兵伐齊功魏直詞才不世雄畧動如神趙云上句以結汲黯之直言下句以結亷頗之雄畧以比嚴真丞丞也致簡移風速史記大公封于齊五月而報政周公曰何疾也夫政不簡不易民不有近平易近民民必歸之也詩美教化移風俗詩清立意新新添文選序云老莊之作管孟之流盖以立意為宗不以能文為本層城臨暇意景絶域望餘春言獨與京畿逺絶陵答蘇武書曰陵先將軍畧盖天地義勇冠三軍徒失貴臣之意勁身絶城之表見文選旗尾蛟龍㑹周禮曰蛟龍為旗文選韋孟諷諫詩四牡龍旗翰注謂封為諸侯故得服黼黻建龍旗樓頭燕雀馴趙云大厦成而燕雀相賀之意出淮南子地平江動蜀天闊樹浮秦趙云此兩句張大城上所望之逺也帝念深分閫軍須逺筭緡趙曰馮唐曰上古王者之遣將也跪而推轂曰閫以内者寡人制之閫以外者將軍制之軍須師旅之費漢武元狩四年初筭緡錢李斐曰緡絲也以貫錢一貫千錢出筭二十師古曰謂有儲積錢者計其緡貫而税之花羅封蛺蝶瑞錦送麒麟趙云言嚴公入貢不㤀朝廷也蛺蝶羅麒麟錦以蜀中當時實事辭第輸高義觀圖憶古人趙云霍出病傳上為治第令親之對曰匈奴未滅無以家為呉越春秋載伍子胥見要離曰呉王聞子高義馬援傳顯宗圖畫建武中名臣烈將子雲臺東平王蒼觀圖言于帝曰何故不晝伏波將軍像帝笑而不言征南多興緒事業闇相􅀈趙云又以杜預比嚴公也晉杜預作征南將軍收滅呉之功平生事業最著如䇿仁右之事議皇太子之服造新歴建河橋造欹噐陳農事皆其事業也興緒興況意緒也嚴中丞枉駕見過自注嚴自東川除西川勅令兩川都節制東趙云按通鑑于廣徳二年春癸夘載劍南西川為一道以黄門侍郎嚴武為節度使元戎小隊出郊坰詩云月篇元十乘以先啟行行爾雅云邑外謂之郊林外謂之坰書王出郊詩在垌之野問栁尋花到野亭川合東西瞻使節見公自注地分南北任流萍流一作孤謂長安有南杜北杜也長趙云此一句公自言矣自蜀望長安則安為北而獨為南也舊注非扁舟不獨如張翰趙云此下四句皆公之自言晉張翰字季鷹本傳别無扁舟之文唯云為齊王冏曹掾因見秋風起思呉中菰菜蓴羮鱸鱠遂命駕歸呉而已既歸閑適必有扁舟之樂也白㡌應兼似管寧師云南史和帝紀百姓皆著下屋白紗㡌趙云魏志管寧青龍中徵命不至居海上常著皂㡌布襦袴杜佑通典帽門載管寜在家常著皂㡌又却是匹帛之帛今言白㡌亦應似之也寂寛一作今日江天雲霧裏何人道有少微星趙云少微星公自謂也隋天文志少微四星在太微西一名處士星晉書隱逸傳謝敷初月犯少微占者以隱士當之俄而敷死江畔獨步尋花七絶句江上被花惱不徹無處告訴只顛狂走覔南隣愛酒伴經旬出飲獨空牀自注云斛斯融吾酒徒遂趙云以出飲之故其家所寢之牀空也古詩云蕩子逰不歸空牀難獨守公用此意右一稠花亂蘂裏江濱趙云裏一作畏無義葢兩岸並有花斯為裏也司空圖云千英萬蕚裏枝經蔡伯世正異裏或作畏乃字缺訛當從裏行步欹危實怕春詩酒尚堪驅使在未須料理白頭人趙云尚可當詩酒之役也李靖尚堪一行晉書桓温謂王徽之曰卿在府日久當須料理子新添王羲之云若䝉驅使闗隴巴蜀皆所不辭太陽好飲常醉或問之曰晚學俗態未除以酒自驅右二江深竹靜兩三家多事紅花映白花趙云江水之深竹色之靜又止兩三家而不喧溷比自足佳足故彼紅花白花相映為多事也此皆公出新句莊子云富則多事或云公江上尋花見江深竹靜處又紅白花相映為愜意多事則多謝之義也故又有下句云報答春光知有處應須美酒送生涯莊子曰吾生也有涯而知也無涯右三東望小城花滿煙梁益記云少城張儀城也所趙云少城府中第二重小城張儀築也薛云左太沖蜀都賦亞以少城接乎其西市㕓所舍百尺高樓更可憐誰能載酒開金綫揚雄好事者多載酒肴從雄游學喚取佳人舞繡筵古詩燕趙云佳人美者顔如玉漢李夫人傳李延年歌曰北方有佳人絶世而獨立陳除陵舞詩曰低鬟向綺席舉袖拂花黄右四黄師答前江水東春光懶困倚微風趙云黄師答紀眼前之實也下句言在春光之中懶困倚風而立也桃花一笑開無主可愛深紅愛一作映淺紅趙云深紅淺紅二種之中愛淺紅則多則公之風韻高矣一作映淺紅于義無取右五黄四娘家花滿蹊千朶萬朶壓枝低趙云東坡云此詩前之美清狂野逸之態故僕喜書之昔者齊魯有大臣史朱其名黄四娘獨何人哉乃託于詩以不朽可使覽者一笑花蹊亦桃李不言下自成蹊中來也留連戯蝶時時舞自在嬌鶯恰恰啼趙云此史王晞謂盧思道曰卿輩亦是留連之一物自在則拂書多有之玉臺後集載上官儀詩云戯蝶流鸞聚窻外江㧾云梅花落處隱嬌鶯恰恰字如王無功之言恰恰言也右六不是愛花即欲死只恐花盡老相催趙云上句意言判一死而酷愛花如韓退之亦有都將命命乞花之句今言不是謂花即是就死只恐花盡所以愛花又恐老之將至爾此皆杜公狂放之新語也繁枝容易紛紛落嫩蘂一作葉商量細細開趙云容易商量與上篇告訴報答喚取留連自在皆使俗字不失為佳右七春水生二絶趙云孫權云春水方生而春水生三字連出則杜預云方春水生難于久住二月六夜春水生門前小灘一作籬渾欲平鸕鷀鸂䳵莫漫喜吾與汝曹俱眼明趙云二禽皆水鳥見水生而喜公語之以與汝曹俱眼明則公可謂與物委蛇而同其波矣右二一夜水高二尺强數日不可更禁當趙云禁當字亦蜀中語南市津頭有船賣無錢即買繫籬傍無錢字見上草堂即事注春夜喜雨趙云宜雨則曰喜雨厭雨則曰苦雨曰愁霖自魏晉而下或賦或詩皆云然曹植張恊謝莊謝惠連鮑照庾信皆有喜雨詩好雨知時節管子曰五政時春雨乃見當春乃一作及發生趙云爾雅曰春為發生隨風潛入夜潤物細無聲言如膏也復趙云范元實所謂聖人生不可改矣野徑雲俱黒江船火獨明曉看紅濕處花重錦官城趙云梁簡文帝賦得入階雨云漬花枝覺重獨人以江山明媚錯雜如繡故多呼錦官城也江頭五詠王筠有才名沈約重之約于郊居作齋閣請筠為草木十詠書之于壁皆直冩之辭不加篇題約曰此詩指物呈形無假題署丁香丁香體柔弱亂結枝猶墊尚書注墊弱也以其體之柔弱而如墊也凡物之下隨皆可云墊矣細葉帶浮毛疎花披素艷深栽小齊後庶近幽人占幽人去兮曉猿驚見北山移文易幽人貞吉晚墮蘭麝中休懐粉身念趙云末句言結實而墮蘭麝中俱以體香相類雖不念粉身可也麗春百草競春花麗春應最勝趙云春華者春之光華也如文選擒藻掞春華師云顧愷知詩麗春絶衆卉少須好顔色多漫枝條䞉紛紛桃李枝處處㧾能移趙云此篇深美麗春故翻以桃李為不足貴阮嗣宗詠懐詩夭夭桃李花灼灼有輝光如何貴此重却怕有人知蔡伯世正異如何貴此重當作種舊作重乃缺文也趙云言珍貴麗春深重恐别人因我而來移取甚于桃李矣梔子漢書曰梔茜薗注梔支子也木草曰支子一名木丹齊謝眺有墻北梔子詩梁簡文帝有詠梔子花詩梔子比衆木人間我未多梔子一名薝蔔花六出天下之至香維摩經云如入薝蔔林中惟臭薝蔔香不臭餘香於身色有用趙云蜀人取其色以染帛與紙故曰色有用與道氣傷和梔性大寒其花可食可傷氣本草紅取風霜實青看雨露柯趙云實經霜則紅雨露潤則柯青無情移得汝貴在映江波趙云謝眺墻北梔子樹詩曰有美當階樹霜露未能移還思照綠水君階無曲池其後梁簡文帝詩曰素華偏可喜的半臨臨池則因謝眺以無曲池為歎而自言其的的然有池之可臨矣公今云無情移汝于它處貴在映江波則又以有江波之可映盖又勝于臨池者乎溪䳵異物志溪䳵水鳥毛有五色食短菰其在溪中無毒氣故使籠寛織須知動損毛看雲莫帳望失水任呼號趙云左太沖詠史詩曰習習籠中鳥舉翮四隅觸今溪䳵以羽毛之好則寛為之籠以防損其毛既以籠養之則看雲帳望失水呼號宜矣六翮曽經剪薛云韓詩外傳曰鴻舉千里特六翮耳背上之毛腹下之毳益一把飛不為加高損一握飛不為加下魏志崔琰傳鳥能逺飛者六翮之力也宗謝惠連溪䳵賦摧羽翮翩翻孤飛卒未高且無鷹集慮留滯莫辭勞趙云䳵在籠不得高飛然免鷹隼之患則雖留滯可莫辭勞倦也此公自況盖退在野居不爭名宦亦自無患矣卒音猝師民瞻正作猝字史新添選謝𤣥暉時常恐鷹隼撃月令云鷹隼早鷙太公自序云留滯周南魏志夏侯𤣥云官無留滯花鴨花鴨無泥滓階前每緩行羽毛知獨立黑白太分明趙云此篇于物則紀實于義則自況無泥滓則比其潔也毎緩行則比其雍容也羽毛獨立則自比其不羣也黒白分明則自比其文采之明著也選云奮迅泥滓老子曰遺物而立于獨諸葛亮謂張温其人于清獨太明善惡太分後漢朱浮傳豈不粲然黑白分明矣不覺羣心妬休牽衆眼驚稻梁霑一作知汝在作意莫先鳴師云羽毛獨黒白白分明則起羣心之妬為衆目之驚但稻梁霑足則無憂先鳴矣此此美自況也趙云稻梁見上注陸龜䝉所謂能言鴨夫鴨之鳴多欲呼食也既有稻梁乃戒之無用先鳴亦飽食緘言以終之處亂之道此公之自警也野望西山白雪三城戍南浦清江萬里橋按新史高適傳上皇還京復分劍南為兩節度百姓弊于調度而西山三城列戍適上疏論之不納萬里橋見上下居注趙云西山在松維州之外維州今之威州是也冬夏有雪號為雪山所以控帶吐蕃之處詩吐蕃方入冦故須防戍矣高適上疏可證三城置戍之始舊本作三年非海内風塵諸弟隔天涯涕淚一身遥公以離亂一身入蜀兄弟遂相隔也唯將遲暮供多病未有涓埃報聖朝跨馬出郊時極目不堪人事日蕭條魏書曰州里蕭條又曹子建詩原野何蕭條又潘安仁西征賦街里蕭條邑居散逸官池春鴈二首自古稻梁多不足至今溪䳵亂為羣趙云韓詩外傳田饒謂魯哀公曰黄鵠止君園地啄君稻梁且休悵望看春水更恐歸飛隔暮雲趙云公前溪䳵篇以自況則取其身文采今春雁詩乃尊雁而鄙溪䳵則又雁之孤孤詩人變化豈有拘礙哉其二春青欲盡急還鄉紫塞寧論尚有霜趙云鴈違寒就温其來也避地北之塞而來至春而歸北寒即北地之寒也崔豹古今注曰秦築長城土色皆紫故云紫塞鮑明逺蕪城賦比走紫塞鴈門謝靈運詩季秋邊朔苦旅鴈違霜雪翅在雲天終不逺力微矰繳絶須防莊子云黄帝得之以登雲天故對矰繳矰音憎戈射矢也繳音灼生絲縷也此見公避患之意西部賦繳根纒鄭𤣥曰結繳于矢謂之矰漢張良傳高祖歌曰鴻鵠高飛一舉千里雖有矰繳尚安所施水檻遣興二首趙云舊本作遣心師民瞻作遣興是葢遣心不可謂之新語謂之生可也去郭軒楹敞無村眺望賖趙云蒼頡篇曰敞高顯也李尤高安館銘云増臺顯敞是巳有林木而後謂之村惟其無才所以眺望逺也澄江平少岸幽樹晚一作絶多花選君謝𤣥暉澄江靜如練細雨魚兒出微風燕子斜城中十萬户此地兩三家陳子昻上書曰十萬户受其福其二蜀天常夜兩江檻已朝時新添黎雅州蜀之西蕃地多雨故名漏天此公所以有常夜兩之句葉潤林塘密衣乾枕席清不堪祗老病何得尚浮名趙云秪字起于詩誠不以富亦秪以異箋云秪之為言適也㨿韻書只是平聲無作入聲者淺把涓涓酒深凴送此生趙云淺深兩字其意工矣屏跡二首用掘存吾道莊子曰夫子固掘于用大矣閑居賦序和長輿謂潘安仁掘于用多孔子曰參乎吾道一以貫之家語吾道非耶幽居近物情顧延年詩側同幽人居郊扉常晝閑桑麻深雨露燕雀半生成陶淵明詩相見無雜言但道桑麻長孟子雨露之所潤非無萌蘖之生馬陳勝傳雀曰雀安知鴻鵠之志村鼓時時急漁舟箇箇輕杖藜從白首趙云莊子原憲杖藜而應門心跡喜雙清師云謝靈運齊中讀書詩昔餘居京華未嘗廢丘壑矧乃歸山川心跡雙寂寞其二晚起家何事無營地轉幽新添禮記内則云孺子早寢晏起又漢書云可以早寢而晏起公意謂屏跡可以晚起也又嵇康與山濤云晝卧喜晚起而當闗呼之不置一不堪也竹光團野色舍影漾江流蔡伯世正異圖當作團山常作舍影趙云東城先生常計此二詩其含漾江流作山影漾江流䟦云此東坡居士詩也或者曰此杜子美屏跡詩居士安得竊之居士曰夫禾黍榖麥起于神農后稷今家有倉廩不予而取輙為盜被盜者為失主若必從其初則農稷之初也今考其考字字皆居士寳錄是則居士詩也子美安得禁吾有哉嗚呼先王之詼諧如此且見深服杜公之善道士實矣然山隱乃一作舍字是盖成都豈有山耶失學從兒懶長貧任婦愁嚴𤣥兒懶失學婦愁長飢漢書陳平傳固有美如陳平而長平者乎百年渾得醉一月不梳頭趙云嵇康絶交書云頭面常一月十五日不洗公蓋用此意也寄題杜二錦江野亭成都尹嚴武作漫向江頭把釣竿懶眠沙草受風湍莫倚善題鸚鵡賦稱衡為黄祖之子射作鸚鵡賦筆不停綴文不加㸃何須不著鵕䴊冠佞幸傳曰孝恵時郎侍中皆冠鵕䴊冠音義曰鵕䴊鳥名也以羽毛飾于冠杜補遺南越志増城縣多鵕䴊山雞也毛色鮮明五采眩曜又淮南子曰鵕䴊雉也孔毅父續世説文嚴武為成都尹與甫有舊待遇甚隆結廬于浣花賦詩訪之甫多不冠故武有此句決趙云杜公之才如禰衡之俊而剛直隱淪不喜仕宦不肯為侍中而冠鵕䴊佞臣之例也故嚴公勸之不必倚恃才如禰衡而鄙鵕䴊而不著也腹中書籍幽時曬郝隆七月七日曬腹于庭中人問之曰我曬腹中書爾肘後醫方靜處看葛洪傳洪自號袍朴子抄金匱藥方一百巻肘後要急方四部興發㑹能馳駿馬趙云此兩句乃是嚴公自云終須重到使君灘趙云使君灘應是浣花相近水經于巴郡枳縣有云楊亮為益州至此而覆懲其波瀾蜀人至今猶名之為使君灘豈名偶同乎奉酬嚴公寄野亭之作拾遺曽奉數行書杜公曽任左拾遺在肅宗至徳二年也是年春宿左省詩云明朝有封事試問夜如何懶性從來水竹居奉引濫騎沙苑馬杜補遺云唐六典補闕拾遺武后垂拱中置二人以掌供奉諷諫注云左右補闕拾遺掌供奉諷諫扈從乘輿子美至徳二年肅宗授左拾遺明年收京扈從還長安故公詩毎言奉引侍祠扈蹕事也趙云拾遺既掌供奉則騎馬以奉引後漢劉聖公傳李松奉引馬驚奔觸北宮鐵柱三馬皆死顔延年赭白馬賦曰弭引婆以奉引沙苑馬言官所破馬也幽棲真釣錦江魚謝安不倦登臨費趙云晉書謝安于東山營墅樓館林竹甚盛毎㩦中外子姓來遊集肴饍饍亦屢費百金此登臨費之義也又安寓居㑹稽與王羲之處出則出則漁戈山水毎徃臨安山中放情于丘壑今言費則以嚴公有載酒移厨之費矣阮籍焉知禮法疎嵇康絶交書阮嗣宗物無傷唯飲酒過差至為禮法之士所繩疾之如讐阮籍則公以自比也枉沐一作今日旌旗出城府草茅無一作荒逕欲教耡趙云屈原卜居賦云寧誅鉏草茅以力耕乎無一作荒非中丞嚴公兩中垂寄見憶一絶奉答二絶一云嚴公雨中見寄一絶奉答兩絶雨映行雲一作宫辱贈詩宋玉賦朝為行雲易雲行雨施趙云山谷云只此兩映兩字冩出一時景物句便雅健余然後時句中當無虛字此范元實之説也行雲或以為行宫師民瞻云明皇嘗幸蜀故稱行宫之名則嚴公兩中必在明皇望日所幸之地尚有行宫之名存在此處寄詩也按通鑑永泰元年𤣥宗之離蜀也以所居行宫為道士觀縱使嚴公詩在此詩寄杜杜公亦安敢尚日之為行宫乎蔡伯世改作行官為送詩使人實無義理若謂之兩映行雲意自足也元戎肯赴野人期六月元戎十乘注夏后氏曰鉤車先正也啇曰寅車先疾也周曰元戎先良也左傳晉文公乞食于野人與之塊此盖借用字一元元戎欲動野人知非是江邊老病雖無力强擬晴天理釣絲其二何日雨晴雲出溪白沙青石光無泥一云先無泥只須伐竹開荒徑古詩誅字開小徑拄杖穿花聴馬嘶趙云聴嚴公之馬嘶此又終前篇肯越野人期之意馬嘶一作烏啼無意思先字去聲讀謝嚴中丞送青城山道士乳酒一缾山缾乳酒下青雲新添酒經空桑穢飲醒以稷麥以成醇醪酒之始也烏酒女䴷胡昆反恬乳九投澄清百品酒之終也氣味濃香幸見分鳴鞭走送憐漁父趙云謝惠連詩鳴更適太阿漁父公自謂也公前篇有理釣絲之句莊子有漁父篇洗盞開嘗對馬軍公自注云軍州謂驅使騎為馬軍趙云以漁父對馬軍字為工矣嚴公仲夏枉駕草堂兼㩦酒饌得寒字一云鄭公枉駕㩦饌訪水亭竹裏行厨洗玉盤花邊立馬簇金鞭薛云按古樂府對酒行金樽清俊滯玉盤亟來親友白馬行白馬黄金鞍蹀􅞃栁城前又輕薄篇象狀沓繡被玉盤傳騎食文選徐敬業詩云鮮車騖華轂汗馬躍金鞍西趙云應邵漢官儀曰封禪壇有白玉盤漢武内傳曰王母以七月七日降帝宫命侍女索桃須臾以玉盤盛桃七枚又占詩曰美人贈我雙玉盤非関使者徵求急自識將軍禮數寛嵇康書云阮藉為禮法之士所繩賴大將軍保持之耳趙云上句遣使者求賢事莊子載顔闔守陋閭苴布之衣而自飯牛魯君之使者至顔闔自對之使者曰此顔闔之家歟閭對曰是也使者至幣顔闔曰恐聴者謬而遣使者罪不若審之是者還反審之復求之則不得矣公詩以嚴公來時自先遣使者通報非是求之急也自識將軍禮藪寛則亷頗傳云不知將軍寛之至此也百年地闢柴門逈五月江深草閣寒趙云百年地闢以久荒蕪之地今才闢而立柴門于此隣里絶鮮所以幽逈也五月非寒之時以革閣臨深江所以寒與因驚四月雨聲寒同看弄漁舟移白日老農何有罄交歡趙云㸔弄漁舟則以言嚴公也嚴白日則終日也老農公自言也字則孔子曰吾不知老農語曰何有于我哉漢曰曰郭解入闗賢豪交歡苕溪漁隠曰待詩之作用字平側世固有定體衆共守之然不若用時變如兵之出體竒變化無窮杜公此篇即七言律詩之變體也韋蘇州詩南望青山滿禁闈曉陪鴛鷺正差池共愛朝來何處雪蓬萊宫裏拂松枝如上嚴公寄題錦江亭詩漫向江頭把釣竿亦是變體唐人如此甚多學者不可不知嚴公㕔宴同詠蜀道畫圖得空字日臨公館靜畫列地圖雄禮記曽子問云公館復私館不復光武投輿地圖指示鄧禹劍閣星橋北松州雪嶺東華陽記李氷造七星橋上應七星劍閣在劍州乃蜀之門户即星橋之北也呉漢伐公孫述光武謂日安軍宜在七星間蓋謂是也趙云七域志于威州云南去雪嶺二百六十里松州即今之威州理故在雪嶺東矣此兩句已盡蜀道地華夷山不斷呉蜀水相通趙云蜀道地理連詔西𦍑錦江直下下經楚通呉此兩句又以終言蜀道地理興與煙霞㑹清罇幸不空趙云謝眺與江水曹詩山中正芳月故人清罇賞孔融曰罇中酒不空奉送嚴公十韻入朝鼎湖瞻望逺象闕憲章新鼎湖黄帝事陸佐公石闕銘象闕之制其來已逺春秋設舊章之教經禮垂布憲之文雅杜補遺風俗通義魯昭公設兩觀于門是謂之闕爾曰觀謂之闕釋名曰闕在兩傍中闕闕然為道也博雅曰象觀闕也周禮懸治象之法于象魏故闕或謂之象闕謂之魏闕南史何㣧曰闕者謂之象魏象者法也魏者當塗而高大也止趙云上句以言肅宗之上昇下句以言代宗之初立承周此兩句更與下憲章新尤為顯然也四海猶多難中原憶舊臣趙云舊臣指嚴公嚴公既自朝廷來獨今憶之而歸斯為中原舊臣矣與時安反側自昔有經綸周禮無敢反側光武云令反側子自安易云君子以經綸感激張天步從容靜塞塵詩天歩艱難三國呉志清天步而歸舊物南圖回羽翮北極捧星辰莊子夫鵬九萬里而圖南入趙云上句言嚴公入朝如鵬之圖南也下句言嚴公奉天子如孔子所謂北辰居其所而衆星拱之也漏鼓還思晝宫鶯罷囀春趙云其得君常思日晝而朝見亦晝日三接之義公到闕日正夏時故公鶯罷囀春也空留玉帳術愁殺錦城人唐藝文志有玉帳經一巻兵書也玉趙云玉帳者大師將軍之帳言嚴公之歸朝而空留帳之術則錦城人愁而思戀之也閣道通丹地江潭隱白蘋趙云天子殿上謂之丹墀一説禁中謂之彤度言丹地也張正見艷歌云執㦸趍丹地豐貂入建章下句公自言其在草堂蓋堂之前臨浣花江近百花潭故謂之江潭爾雅曰苹苹也其大者蘋屈原原湘夫人詞曰登白蘋兮聘望栁惲詩曰汀洲採白蘋隠于白蘋州渚聞言蘋之多也此生那老蜀不死㑹歸秦公若登台輔臨危莫愛身言當殺身以成仁也顛趙云末句之意所謂贈人以言者論語危而不持而不扶則将焉用彼相矣酬别杜二嚴武獨逢堯典日再覩漢官時堯將遜于位讓于虞舜作堯典時代宗初立葢取虞舜作堯典之義未效風霜勁空慙雨露私趙云未效風霜勁正以嚴為御史大夫也御史風霜之任傳雨露之所潤夜鍾清萬户曙漏拂千旗並向斜亭謁俱承别館追斗城憐舊路渦水惜歸期長安故城城南為南斗形北作北斗形故號曰斗城三輔黄鳯書峯樹還相伴江雲更對垂試囘滄海棹更妬敬亭詩祗是書應寄無㤀酒共持但念心事在未肯鬚毛衰最帳巴山裏清猿惱夢思與嚴二歸奉禮别别君誰暖眼將老病纒身出涕同斜日臨風看去塵商歌還入夜巴俗自為隣紀膽傳曰臣聞易失者時不再者年故古之志士義人負鼎走商歌于市誠欲及時效其忠規名傳不朽為隣見上注尚媿微軀在遥聞盛禮新山東羣盜散闕下受降頻諸將歸應盡題書報旅人送嚴侍郎到綿州同登杜使君江樓晏得心字野興每難盡江樓延賞心王子猷訪戴乘輿而來興盡而反工部返其意趙云延展所賞之心也謝靈運云良辰美景賞心樂事歸朝送使節落景惜登臨宋玉悲秋云登山臨水送將歸謝靈運有登臨海嶠詩稍稍煙集渚微微風動襟趙云選有煙渚字風言動襟則宋玉風賦曰披襟而當之也重船依淺瀨輕鳥度曽隂趙云淺瀨出文選王仲宣詩巖阿増重隂檻峻背幽谷窻虚交茂林詩云出自幽谷蘭亭記茂林修竹水花一作光散逺近月彩靜高深趙云左傳量地逺近謝𤣥暉詩瞻望極高深城擁朝來客天横醉後參曹子建云參横斗没言夜深也窮途衰謝意苦調短長吟趙云既籍哭窮途周王褒與周𢎞讓書年事道盡容髪衰謝選有永嘯長吟短歌微吟此㑹共能㡬諸孫賢至今趙云指言杜使君于公為孫行也不勞朱户閉自待白河沈薛云左傳晉文謂舅犯曰所不與舅氏同心者有如白水遂沈壁于河艾趙云朱户謂綿州州治也白河沈言天河之沈隱夜也天河曰銀河其白可知宋之問明河篇曰水精簾外轉逶迤倬彼昭回如練白則名之為白河何疑焉薛注非是新添陳遵每大飲賓客滿堂輒闗門取客車轄投水中雖冇急終不得去末句用此意奉齊驛重送嚴公四韻驛去綿州三十里逺送從此别青山空復情趙云謝𤣥暉銅雀臺詩芳襟染淚迹嬋娟空復情幾時杯重把昨夜月同行列郡謳歌惜三朝出入榮三朝武士明肅代也江村獨歸處寂寞養殘生巴西驛亭觀江漲呈竇使君二首宿雨南江漲波濤亂逺峯孤亭凌噴薄見直氣森噴薄注萬井逼舂容趙云學記曰善待問者如撞鐘叩之小則小鳴叩之大則大鳴待其從容然然盡其聲注云從讀如富父舂戈之舂舂謂擊也以為聲之形容言鐘之為體必待其撃毎一舂為一容然後盡其聲公于江漲言舂容則借字以言水撞撃之狀如古詩有云舂容轉林篁借字以言其行之悠悠如鐘聲一舂一容之未便盡也師云古詩相聚得舂容霄漢愁高鳥泥沙困老龍宿雨以致高鳥之愁泥沙以致老龍之困此言小人在位而君子沈困也天邉同客舍携我豁心胷趙云竇使君亦是客同在驛亭中者故云其二轉驚波作怒即恐岸隨流賴有盃中物還同海上鷗陶淵明詩曰天運茍如如且進盃中物列子云海上人好鷗鳥其父欲取玩之明日鷗鳥舞而不下闗心小剡縣傍眼見揚州王子猷居山隂雪夜訪戴安道安道時在剡縣便乘小舟詣之公欲東遊因觀江漲而若見揚州也為接情人飲朝來減片愁又呈寶使君向晚波微綠連空岸脚青文選春草碧色春水綠波送君南浦傷如之何日兼春有暮愁與醉無醒漂泊猶盃酒踟蹰此驛亭相看萬里别同是一浮萍遣憂亂離知又甚消息苦難真詩云亂離瘼矣奚其適歸言亂離實甚雖開其消息而不真也受諫無今日臨危憶古人記禮天子齋戒受諫紛紛乗白馬攘攘看黄巾後漢靈帝時鉅鹿人張角自稱黄天其部師有三十六萬人皆著黄巾同日反叛王審知乗白馬履行陣望者披靡號白馬將軍師云張湛光武時朝或有惰容湛輒陳諫其失常乗白馬帝毎見湛輒言白馬生且復諫矣隋氏留宫室焚燒何太頻如項羽燒秦宫室三月火不滅之類唐太宗入洛觀觀隋宫殿歎曰逞侈心窮人欲無亾得乎撤端門樓焚乾陽殿早花西京安稳未不見一人來臘月巴江曲山花已自開盈盈當雪杏艷艷待春梅直恐風塵暗誰憂客鬢催巴山巴山遇中使云自陜城來盜賊還奔突乗輿恐未回天寒召伯樹地濶望仙臺詩甘棠美召伯也漢武立望仙臺狼狽風塵裏羣臣安在哉狼狽見上北征補遺漢書主父偃傳云徐樂嚴安與偃俱上書書奏上召見三人謂謂公皆安在何相見之晚也收京復道收京邑兼聞殺犬戎時肅宗尅復京師公聞之故有此詩王洙序公詩云明年收京扈從還長安衣冠却扈從車駕已還宫按肅宗紀云至徳二年十二月丙午上皇天帝至自蜀凡從蜀郡從三品以上予子一子官四品以下與一子出身宫即興慶宫也尅復誠如此扶持在數公時王室再造賴子儀光弼數公詩意言京師尅復實數公扶持之力也莫令回首地慟哭起悲風巴西聞收京送班司馬入京聞道收京廟鳴鸞自陜歸漢書司馬相如傳云鳴玉鸞言京廟既收天子鳴鸞自陜而歸也傾都看黄屋正殿引朱衣漢高祖紀曰紀信乘王車黄屋左纛注謂天子車以黄繒為盖裏又文選范􅁮詩云黄屋非堯心劍外春天逺巴西敕使稀念君經世亂匹馬向王畿周禮職方氏方千里曰王畿送司馬入京羣盜至今日先朝忝從臣歎君能戀主久客羡歸秦公詩又有不死㑹歸秦之句黄閣長司諌丹墀有故人丞相宰輔政事之堂曰黄閣文選劉孝標廣絶交論云彯組雲臺者摩肩趨走丹墀者疊跡前漢班媫妤退處作賦云俯視兮丹墀思君兮履綦向來論社稷為話涕霑巾文選張平子四愁詩云側身北望涕霑巾又潘安仁懐舊賦云歩庭廡以徘徊涕泣流而霑巾花㡳紫蕚扶千蘂黄鬚照萬花忽疑行暮雨何事入朝霞恐是潘安縣堪留衛玠車潘岳為河陽令植桃李花人號曰河陽一縣花衛玠左傳伍中有異乘白羊車所至看者如堵號為壁人深知好顔色莫作委泥沙栁邊只道梅花發那知栁亦新枝枝揔到地葉葉自開春古人為歌詩使枝枝葉葉字尚質而不文也如曹子建艷歌枝枝自相植葉葉各相當至子美是詩用此字遂脱去俗韻真典石成金手也紫燕時翻翼黄鸝不露身漢南應老盡灞上逺愁人城上草滿巴西綠空城白日長趙云按新唐書地理志閬州本龍州巴西郡以避𤣥宗諱致焉風吹花片片春動水茫茫八駿隨天子趙云列子穆王命駕八歳之其其云隨天子則穆王謂之穆天子也羣臣從武皇趙云漢武帝也帝初幸汾陽至洛陽始秦幸郡縣寖尋于泰山矣其所巡幸周萬八千里羣臣之從可知也遥聞出巡守早晚遍遐荒趙云代宗廣徳元年十月吐蕃冦奉天武功丙子車駕幸陜州戊寅吐蕃陷京師末句不敢言天子䝉塵始以巡守㣲言之耳而云遍巡守則以巴閬僻逺雖今歳猶未知車駕去歳便歸長安之實但傳聞或議北上蕭闗或從東巡滄海且又欲徙洛陽也尚書五載一巡守翫月呈漢中王王名瑀讓皇帝之子汝陽王璡之弟也夜深露氣清江月滿江城浮一作㳺客轉危坐歸舟應獨行後漢書云茅容避雨樹下危坐愈恭闗山同一照趙云照字舊一本作㸃非也照字乃出月賦千里共明月之意鳥鵲自多驚古樂府月明星稀鳥鵲南飛遶樹三匝何枝可栖欲得淮王術風吹暈已生淮南子月隨灰而暈缺注云以蘆灰環月缺其一面暈亦隨缺杜田古樂府宋王褒闗山月云天寒光轉白風多暈欲生漢州王大錄事宅作南溪老病客相見下肩輿近髪看烏㡌催蓴煮白魚宅中平岸水身外滿牀書憶爾才名叔含悽意有餘陪王漢州留杜綿州泛房公西湖舊相恩追後春池賞不稀房琯相肅宗以事責官出為漢州刺史湖琯所鑿也趙云按新唐書房琯于乾元元年以宰相貶出為邠州刺史政聲流聞召拜太子賓客遷禮部尚書為晉漢二州刺史恩追後則指言于恩追而未行之間其必數數逰湖此追道其實也闕庭分未到舟楫有光輝趙云言未到天子闕庭且于此逰湖而當承恩命時則舟楫為有光輝矣東京賦云闕庭神麗書高宗云用汝作舟楫豉化蓴絲軟刀鳴鱠縷飛世説王武子前有羊酩問陸雲呉中何以敵此雲曰千里蓴􅃵但未下鹽豉杜補遺本草云蓴生水中中葉以鳬葵採莖堪啖花黄自月至八月莖細如釵股通名絲蓴趙云蓴鱠言湖中所有也使君雙皂葢灘淺正相依趙云雙皂葢言王杜二使君也漢制中二千石二千石皆皂葢朱兩轓出後漢輿服志舟前小鵝兒漢州城西北角官池作州趙云官池即房公湖琯未為漢刺刺史止謂之官池後人以其池經房公修之故名之曰房公湖鵝兒黄似酒對酒愛新鵝引頸嗔船逼無行亂眼多翅開遭宿雨力小困滄波客散曽城暮狐狸奈若何趙云此篇甚明不須强注鵝兒黄似酒葢自公始為之譬也東波詩云小舟浮鴨綠大杓㵼鵝黄乃用此意項羽歌云虞兮虞兮奈若何得房公池鵝房相西亭鵝一羣眠沙泛浦白于雲鳯凰池上應回首為報籠隨王右軍趙云鵝有鳯池之望恐為王右軍籠去此葢公以自興也鳯池事荀朂罷中書令為尚書人賀之乃曰奪我鳯凰池何賀我耶右軍事王羲之性愛鵝見山隂道士有羣鵝為冩道徳經遂籠鵝而歸今公詩意盖以興已之不必望趨華近已甘從高人所愛而隨之以飲啄也九家集注杜詩巻二十三
