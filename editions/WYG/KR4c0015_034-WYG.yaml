body:
  text: 九集集注杜詩巻三十四宋郭知達編近體詩多病執熱奉懐李尚書之芳衰年正苦病侵凌首夏何須氣鬱蒸謝靈運首夏猶清和應壉書曰處凉臺而有鬱蒸之煩大水淼茫炎海接竒峯硉兀火雲昇陶詩夏雲多竒峰淮南子旱雲煙火舉趙云書若渉大水隋盧思道納凉賦云火雲赫而四選賦有云狀滔大以淼茫舊本硉兀注云山崖也硉音落骨切矹音五骨切郭樸江賦云巨石硉矹以前却思霑道暍黄梅雨史記禹扇揭音謁傷暑也沾増添周處風土記夏至前雨名黄梅雨衣服皆敗黦敢望宫恩玉井􅀈後漢書琅瑘有􅀈井厚丈餘魚豢魏畧明帝九龍殿前玉井綺欄趙云暑病日暍思道暍之人以黄梅一雨霑之此武王扇暍之意公之為人可見矣玉井者天子之事也唐制百官賜􅀈而公嘗為左拾遺當預賜冰之利今既逺矣故曰敢望也不是尚書期不顧前漢陳遵傳嗜酒毎飲賔客滿堂輒閉門取客車轄投井中雖有急終不能去時北部刺史奏事過遵值其方飲刺史大窮候遵霑醉時突入見遵母叩頭自白當對尚書有期㑹狀母乃令從閤閤出去應休璉雨滿公琰書曰當此之時仲孺不時同産之服孟公不顧尚書之期山隂野雪興難乗王徽之嘗居山隂夜雪初霽月色清朗四望皓然獨酌酒咏左思招隐詩忽憶戴逵逵時在剡便夜乘小船詣之造門而返日本乗興而來興盡而返而返何必見妥道不趙云題是多病執熱奉懐今尚書而云不是尚書期顧山隂野雪興難乗盖言不是不顧尚書之期但欲比山隂野雪之乗興為難也在執熱中翻使雪使又為竒矣或云此直是打諢之語則亦韓退之矣詩為戯之義水宿遣興奉呈羣公趙云謝靈運次南城詩雖未登雲峯且以歡水宿此詩二十韻分為兩叚毎叚十韻上叚叙其行色下叚則有所求於羣公矣魯鈍仍多病語參也魯聞新添王僧祐傳非救自同髙人直是愛多病耳漢書張良多病趙云張良性多疾非病也逢迎逺復迷耳聾須畫字髪短不勝箆老子云五音令人耳聾左傳髮短而心甚長也澤國雖勤雨杜補遺穀梁傳正月不雨言不雨者勤雨也雨注思雨之勤也夏四月不雨言不雨者閔雨也六月雨者喜雨也炎天竟淺泥小江還積浪弱纜且長隄歸路非關北行舟却向西趙云弱䌫生長隄言且繫之於長隄也歸路非闗北言長之不可得而歸也暮年漂泊恨今夕亂雞啼童稚頻書札曹孟徳云烈士暮年古詩云遺我一書札趙云鄧禹傳曰父老童稚垂髪戴白盤飡詎糝藜右傳盤飡寘璧孔子陳蔡間七日不食藜藿不糝我行何到此物理直難齊莊子有齊物篇髙枕飜星月嚴城疊鼓鞞張景陽比郭非我城入間鞞鼔聲杜云禮記鼓鼙之聲讙風號聞虎豹蕪城賦風嘷雨嘯苦寒詩虎豹夾路啼水宿伴鳬鷖蜀都賦晨鳬旦至候鴈銜蘆雲飛水宿哢吭清渠趙雲嘷與號字異而音同語語虎豹之鞹鳬鷖則詩篇名也異縣驚虚往古樂府他鄉各異縣同人惜解携易出門同人蹉跎長泛鷁展轉屢鳴雞阮藉樂樂未終極白日忽蹉跎詩展轉反側嶷嶷瑚璉器子貢瑚璉器薛云右按世説謝琨問羊孚孚林賦曰泛文鷁瑚璉器桃李蹊皆所之器隂隂桃李蹊李廣傳桃李不言下自成蹊跳趙云相如上林賦曰泛文鷁瑚璉器桃李皆所以言羣公也瑚璉者宗廟之器禮記明堂位云有虞氏之兩敦成夏后氏之四璉殷之六瑚周之八簋是已謝𤣥暉桃李蹊徑桑榆隂道周餘波期救涸僖二十三年傳其波及晉國者君子餘也莊子外篇車轍中有鮒曰吾得斗升水可以活矣費日苦輕齎支策門闌䆳肩輿羽翮低自傷甘賤役誰愍強幽棲趙云書餘波及干流沙救涸則以彼之盈及此之涸耳費日苦輕齎則言為客之次消費時日其所輕齎苦於貿易而罄盡矣支策肩輿則言出謁於人矣巨海能無釣任公子投竿東海浮雲亦有梯勲庸思樹立語黙可端倪贈粟園應指魯肅字子敬家富於財時廬江周瑜為居巢長聞之往求資糧肅時有米二囷各三千斛直指一囷與瑜瑜益竒之乃結僑礼之交登橋柱必題成都託昇僊橋司馬相如初西去題其柱曰不乗赤車駟馬不過此橋後果以傳車至其處橋在望鄉臺東南一里管陽陽縣趙云上四句則公子懐抱所負如此盖不以有求於人而遂屈也於是羣公必有知之者則贈粟囷應指矣觀公粟園四十畆乃委以與人則羣公之指囷在公亦以為受之而無嫌矣丹心老未折薛云又按文選謝𤣥暉詩既秉丹石心寧流素絲涕又古樂府制賜文犀節驛報紫泥書皇恩空已重丹心悵不紓别賦心折骨驚時訪武陵溪武陵溪秦人避亂之處為趙云句又因所經之地去武陵近矣奉賀陽城郡王太夫人恩命賀鄧國太夫人陽城王為伯玉也衛幕銜恩重杜正謬云衛幕乃衛青之幕府也舊注引左氏燕幕非是潘輿送喜頻潘安閑居太夫人乃御板輿升輕軒近覽王畿近周周家國趙云送喜頻則王之母人有恩命之加為送事事之頻矣濟時瞻上將錫號戴慈親富貴將如此尊榮邁等倫趙云王節度江陵是為上將如此字多矣禮云好仁如此傳言難乎等倫也郡衣封上舊國與大名新紫誥鸞迴紙新添䑏右記武都紫水有泥貢之用封壐書故詔誥有紫泥之美王子年拾遺元狩初浮圻國貢蘭金之泥如紫磨色常以此封詔函鬼魅不敢干清朝燕賀人大厦成而燕雀東賀為趙云請封雖仍是陽城郡而夫人之圖國為鄧國是新矣紫誥紫錦之誥鸞回紙則紙上之字有回鸞之勢也清朝則朝旦之朝令戚歌云清朝飯牛至夜半逺傳冬笋味更覺綵衣春趙云又以言郡王亦以髙年尤見尊親之壽孟宗後母好笋令宗冬月求之宗入竹林慟哭笋為之出奕葉班姑史班姑扶風曹世叔妻彪之女名昭字惠姬博學髙才世叔早卒有節行兄固著漢書其八表及天文志未及竟而卒和帝詔昭就東觀藏書閣踵而成之芬芳孟母鄰潘安仁閑居賦此里仁心為美孟母所以三徙義方兼有訓左傳教子以義方詞翰兩如神趙云班姑史則王子太夫人盖能翰墨矣何平叔景福殿賦曰偉孟母之擇鄰尚書云皇祖有訓禮記云至誠如神委曲承顔體鶱飛執主身可鄰忠與孝雙美畫麒麟麒麟閣名也上畫忠臣像郡趙云事母則孝事君則忠其美畫麒麟則非特畫王之像而亦畫夫人之像也麒麟前漢閣名也前漢蘇武傳乃麒麟字今云雙美之畫則又用金日傳母事教誨兩子甚有法度上聞而嘉之病死圖畫於甘泉宫署休屠王閼氏江陵望幸望車駕臨幸也時大駕在蜀雄都元壯麗曹子建壯哉佳麗殊百城漢髙帝見宫室壯麗怒肅何曰非壯麗不足重成望幸歘威神露光殿賦又似乎帝室之威神又云彰聖立之威神甘泉賦配之君之懸圃兮象太一之威神封趙云雄都指言江陵也司馬相如禪文云泰山梁父設壇望幸地利西通蜀天文北照秦趙云孟子曰天時不如地利易曰觀乎天文而漢有天文志西通蜀則江自西而來舟船之所通秦言長安長安在荆渚之北也風煙含越鳥謝𤣥暉詩風煙有鳥路江漢限無良古詩越巢巢南枝舟楫控吴人未枉周王駕顔延年車駕幸京口詩虞風載帝狩夏諺頌王游春方動宸駕望幸傾五州又周御窮轍迹夏載歴山川周王駕謂穆王滿也趙云列子載穆王命駕入駿之乗馳驅千里終期漢武巡漢武行幸雍幸汾隂榮陽還至洛陽瞻望河洛又南巡狩甲兵分聖旨居守付宗臣蕭何漢之宗臣左傳君行則居守也趙云上句言車駕之出禁兵隨衛分則分其半以出留其半於京矣下句言有人為留守也早發雲臺仗恩波起涸鱗哀江南賦猶有雲臺之仗涸鱗見餘波期救涸注荘子車輙中有鮒魚趙云雲臺在後漢之南宫梁丘遲侍宴餞徐州刺史應詔詩曰肅穆恩波被江邊星月二首驟雨清秋夜金波耿玉繩謝𤣥暉金波麗鳷鵲玉繩低建章趙云金波以言月玉繩以言星漢志月穆穆以金波天河元自白江浦向來澄趙云元自向來之字公嘗使矣葢云眉毛元自白淚㸃向來垂又曰鏁石藤梢元自落倚天松骨見來船映物連珠斷史五星如連珠縁空一鏡升古詩破鏡飛上天餘光隠更漏況乃露華凝謝荘詩露華識猿音将趙云末句言更漏之聲隠於星月餘光之中也此則曉故言況乃露華凝也露華凝墜其客况可知矣右一江月辭風纜江星别霧船雞鳴還曙色鷺浴自清州趙云四句言曉見星月當船行之時也纜言風䌫船言霧船則曉之景物也歴歴竟誰種謝惠連詩亭亭映月古詩天上上何所有歴歴種白玉悠悠何處圓沈休文泳月清光信悠悠謝莊月賦云昇清質之悠悠䧏登暉之藹藹客愁殊未已他夕始相鮮趙云四句有感而問星月也他夕始相鮮則併言星與月於於他夕見之若客愁既止則始悦其鮮明矣右二舟月對驛近寺更深不假燭月朗自明船陶潜叩棧親月船之趙云明字與殘夜水明樓法相似金刹青楓外西京雜記以黄金為刹朱樓白水邊杜補遺釋氏要覽釋音无梵言刹瑟至唐言竿今畧言刹即幡柱也趙云青楓外則其刹之髙矣用青楓則南方所有之木朱樓盖驛樓也馮衍顯志賦云伏朱樓而四望城鳥啼眇眇野鷺宿姢姢皓首江湖客鈎簾獨未眠舟中風餐江栁下雨卧驛樓邊鮑照風餐弄松宿雲卧恣天行結䌫排魚網連穡並米船檣船上帆竿也今朝雲細薄昨夜月清圎飄泊南庭老秪應學水仙趙云宋鮑照用風餐對雲卧唐栁明獻用霞餐對雲卧詩曰魚網之設世説王脩齡曰脩齡為飢自當問謝仁祖索食不須陶胡奴米船也南庭老公自謂也南庭者南方之庭猶北地謂之北庭耳遣悶地闊平沙岸舟虗小洞房謝𤣥暉洞房殊未曉使塵來驛道城日避烏檣趙云泊船之處近城日為城所倖不照及檣故云避烏檣此公之巧句也暑雨留蒸濕江風借夕凉行雲星隠見趙云雲合則星隠雲過則星見也疊浪月光芒趙云前浪後浪月光皆照也螢鍳縁帷徹螢光可以照物故曰螢鍳蛛絲罥鬢長哀筝猶凭几鳴笛竟霑裳趙云初聞哀筝猶忍淚凭几聴之而已至聞鳴苖則情不禁矣於是乎淚竟霑裳也魏文帝與吴質書有云髙談悟心也筝順耳倚著如秦贅過逢類楚狂賈誼傳秦人家富子壯則出分象貧子壯則出贅注曰亦猶人身體之有贅非應所有也楚狂接輿氣衝看劒匣仕彦升劒氣凌雲又張華見劒氣衝斗頴脱撫錐囊原君傳曰大賢士之處世也譬如錐之處囊中其未至見毛遂曰使遂蚤得囊中乃頴脱而出非特未見見而已也妖孽闗東臭兵戈隴右瘡時清疑武畧世亂跼文場餘力浮于海語道不行乗桴浮於海端憂問彼蒼月賦端憂多暇詩云彼蒼者天百年從萬事故國耿難忘趙云妖孽两句是吐蕃與盗賊而蓋言當時之清則以武畧為疑而不用及世之亂則文場跼而不展矣兵書有黄石公三畧杜預賛曰元凱文場稱為武庫語語云行有餘力屈原有天問篇從萬事則言百年之黄石公三略杜預而惟有懐鄉不能以也江陵節度陽城郡王新樓成王請嚴侍御判官賦七字句同作樓上炎天氷雪生髙飛燕雀賀新成淮南子大厦成成而燕雀來賀賀碧窻宿霧濛濛濕朱栱浮雲細細輕趙云淮南子曰南方曰炎天髙誘注曰南方五月建午火之中也火性炎上故曰炎天顔延年夏夜詩云炎天方埃鬰當炎天而樓上生冰雪則其髙可知矣䆫含宿霧拱帯浮雲皆言其髙杖鉞褰帷瞻具美賈宗為兾刺史之部升車言刺史當逺視廣聴糾察美惡何有反垂帷裳以自掩寒乎乃命御者褰之投壺散帙有餘情祭遵投壺雅歌謝趙云許靖與曹孟徳書曰曹營丘翼周杖鉞専征靈運酬從弟惠連詩云㪚帙問所自公多暇延參佐江漢風流萬古情庾亮鎮武昌昌之佐吏乗月登月登樓不覺亮至將避亮曰諸君少住老子於此興復不淺陶侃曰亮非獨風流兼有為政之事趙云詩自公退食荀子云其為人也而多暇日則其出入不逺又作此非衛王西北樓成雄楚都逺開山岳散江湖二儀清濁還髙下陽清為天隂濁為地見照略三伏炎蒸定有無趙云古詩云西北有髙樓今樓恰在西北故用之為宜逺開山岳散江湖則樓之所臨者髙所望者逺矣樓在楚故故言山岳言江湖岳則衡岳也二儀清濁還髙下三㑀炎蒸定有無雄健之之語皆樓之髙所見之大而其氣之清也梁元帝纂要曰天地曰二儀禮記曰天髙地下推轂畿年唯鎮静馮唐傳推轂遣將命趙云推云以言衛王奉為將曵居終日盛文儒鄱陽何王之門不可曵長裾白頭授簡焉能賦媿似相如為大夫雪賦授簡於司馬大夫藝文志登髙能賦可為大夫舟中出江陵南浦奉寄鄭少尹審更欲投何處飄然去此都賈誼何必懐此都御趙云周庾信烏夜啼曲曰史府中何處宿故對此都成公綏嘯賦云心滌蕩而無累志離俗而飄然形骸元土木土木形骸舟楫復江湖社稷纒妖氣左太冲兵纒紫㣲干戈送老儒百年同棄物萬國盡窮途趙云老子云常善救物故無棄物萬國盡窮途物多難之世無適而不為窮途也雨洗平沙浄天銜闊岸紆鳴螀隨汎梗别燕起秋菰宋玉燕翩翩其辭歸以趙云上兩句道景雄健其下句尤其矣惟其闊所榮紆周禮冀州之擇藪曰揚紆義蓋取此螿音將蟬也螿得梗而託之故隨汎梗而鳴菰雕胡也燕集如菰叢之間時當秋則别之而起去矣皆言時也棲託難髙卧孔明髙卧南陽髙趙云言其身方有所棲託難于卧以自安也饑寒迫向隅寂寥相喣沬莊子云魚相喣以濕相濡以沬熟若忘忘於江湖浩蕩報恩珠趙云前漢刑法志滿堂飲酒一人向隅而悲泣皆為之不樂寂寥相喣沬則無以相賙給之者故報恩之殊亦浩蕩而無施也報珠傳記所載凡三事三輔决録曰昆明池有魚絶綸而去夢於漢武帝求去鈎帝明見大魚銜索帝取放之日三日池邊得明珠一隻帝曰魚之報也又搜神記曰隋侯行見大蛇傷因救治之其後蛇銜珠以報焉其征盈寸夜光可燭堂故歴世稱隋珠又噲參養母至孝曾有𤣥鶴為戎人所射窮而歸參參収養療治瘡愈而放之後鶴雌雄雙至各銜明月珠報參而報恩珠三字則沈佺期云漢皇靈沼上容有報恩珠公之所用當以魚事為切溟漲鯨波動謝靈運凕張無端倪衡陽鴈影徂蜀都賦云候鴈銜蘆未落南翔冰泮北徂南征問懸榻陳蕃為樂安太守禮郡郡周璆字而不名特為置一榻去則懸之東逝想乗桴語乗桴浮于海趙云東溟漲金波動所以引逝想乗桴衡陽鴈影徂所引南征問懸榻南征南征亦也出楚詞懸榻有兩字陳蕃禮周璆及其禮徐孺子然濫竊商歌聴北山移文竊吹草堂濫中北岳七啓云此甯子商歌之秋也時憂卞泣誅楚人卞和以玉璞三獻不遇楚王遂再刖其足經過憶鄭驛鄭莊置驛斟酌旅情孤趙云琴操曰卞和者楚野民得玉獻懐王王使樂正子占之言石王以為欺謾斬其一足懐王死子平王立和復獻之平王又以為欺斬其一足平王死子立為荆王和復欲獻之恐復見害乃抱其玉而哭晝夜不止涕盡續之矣血荆王遣問之於是和隨使獻玉王使剖之中果有玉乃封為陵陽候卞和不就而去作退怨之歌曰悠悠其水經荆山精氣鬱决谷巖巖中有神寳灼灼明明宂山采玉難為功於何獻之楚先王遇其闇昧信讒言斷截兩足離余身倪仰嗟嘆心摧傷紫之亂朱紛墨同空山㱆欷涕龍鍾天鍳孔明竟以彰沂水滂沛流于汶進寶得刑足離分斷者不續豈不怨斟酌旅情孤言鄭監必測度我旅情之孤也鮑照和王丞詩斟酌高代賢江南逢李龜年自注崔九即殿中監崔滌中書令湜之弟歧王宅裏尋常見崔九堂前幾度聞正是江南好風景落花時節又逢君明皇雜録云上素曉音律時有馬仙期李龜年賀懐智皆洞知律度龜年時承顧遇後流廢江南毎遇良晨勝景常為人歌數闋座上聞之莫不掩泣罷酒趙云南史沈約謂王筠曰不謂疲暮復逢如君官庭夕坐戯簡顔十少府南國調寒杵西江浸日車客愁連蟋蟀亭古帶蒹葭趙云南國楚地也詩滔滔江漢南國之紀杵謂之調庾信夜聴𢷬衣詩云調聲不用琴又書屏風詩曰𢷬衣明月下静夜秋風飄錦石平砧面連房接杵腰急節迎秋韻新聲入手調寒衣須及早將寄霍飄姚日車字則淮南子曰日乗車駕以六龍羲和為馭而李尤云安得猛士飜日車也蟋蟀字見於毛詩七月篇以為歳候此所以客愁連之矣故對蒹葭其字出亦出詩也不邁青絲鞚虚燒夜燭花老翁須地主細細酌流霞趙云鞚馬勒也青絲為之耳古詩所謂青絲絡頭是已吴書孫奐傳黄武五年權攻石陽奐以地主使所部將軍鮮于丹師五千人光斷淮道抱朴子載項曼都言到天上先人以流霞一杯飲之鮑明逺細作對春風公嘗用云細酌老江千秋日荆南述懐三十韻昔承推奬分媿匪挺生材左都蜀都賦揚雄含章而挺生遲暮宫臣沗陸機詩矯迹厠宫臣艱危衮職陪詩衮職有闕臣趙云拾遺通籍於朝斯為宫在肅宗行在拜之則艱危之時也甫杜補遺唐六典注云補闕拾遺武后垂捶中置取山補衮闕名官子美肅宗時為左拾遺故云揚鑣隨日馭折檻出靈臺朱雲折檻顯宗畫二十八將於雲臺趙云上句言其扈從也拾遺補職闕之職皆得扈從日馭言乗輿也下句言其柬爭不合而出也房琯以陳陶斜之敗公上疏論琯不宜廢兎肅宗出甫為華州功曹出雲則離雲臺而出官官也罪戾寛猶活干戈塞未開趙云上句則上初欲誅甫賴張鎬救之而得免也星霜𤣥鳥變古詩秋蟬鳥樹聞𤣥鳥逝安適身世白駒催莊子知北逰人生天地之間若白駒之過隙何自苦如此又鄰生説魏豹豹謝日人生一世間如白駒過隙星趙云𤣥鳥燕也𤣥鳥變則言燕之或來或去為變也霜之中見𤣥鳥變則不一其年矣白駒以譬光隂之超忽如其馳去伏枕因超忽扁舟任往來九鑚巴噀火語鑚鐩改火欒巴噀酒以救蜀火三蟄楚祠雷鮑云山谷簡王觀復曰予美人蜀下峽年月詩中可見其曰九鑚巴噀火三蟄楚祠雷則徃來蜀中凡十二年也趙云兩句止通言九年中事非謂十二年也公乾元二年嵗在巳亥年二月一日自隴右赴劔南十二月未到成都自庚子至今嵗大厯三年之清明嵗在戊申是未為九公前有月詩云二十四囬明次公定為二月望夜詩而續有大厯三年白帝放船出瞿庚峽詩則猶在夔州可見是年清明矣使鑚火字則見其為清明也巴噀火則欒巴所噀之火以形容其在成都及東州及夔州皆為蜀地也公以大厯三年春方離夔州發白帝下峽泊舟江陵秋晚寓公安縣嵗暮發公安至岳州則二年之秋八月元年之秋八月通三年之秋八月在夔在江陵是為雷之三蟄矣雷以二月而奮以八月而蟄謂之楚祠雷則楚人所祠之雷葢楚人好祠察也夔以寒食言之則係之蜀又以祠雷言之則係之楚葢以夔在六國為楚地初不相妨也房不如此觧則九與三之義難考矣所見如此俟博望帝傳應實見杜詩注昭王問不囬僖四年傳齊侯伐楚曰昭王南征而不復寡人是問禪趙云上句以囬言成都之所聞按二成都記杜宇既位於鼈靈遂升之西山不隱時適月杜䳌方鳴民俗思宇因號為杜䳌以誌其隱去之期或曰社䳌即望帝精䰟所化也蛟螭深作横豺虎亂雄猜趙云兩句雖以言水宿山行之所有而因託以興馬葢是時有跋扈之強臣賊盗之巨猾故也素業行已矣浮名安在哉趙云史云家承素業安在哉三字公通此凡七便皆阮籍諫懐云梁王安在哉琴烏曲怨憤庭鶴舞摧頽琴烏曲烏夜啼也典人舞白鶴於市補遺琴曲有長清短清幽蘭白雪風入松烏夜吴兢古樂府解題云烏夜啼宋臨川王王義慶趙也鮑明逺舞賦始連軒以鳯蹌終宛轉轉而龍躍􅀈躅徘徊振迅騰摧趙云其所怨憤寄之琴曲則烏夜啼也而庭鶴為之舞矣秋水漫湘竹湘妃揮涙濺竹竹皆斑隂風過嶺梅大庾嶺多梅人號梅嶺舜趙因句則因所往之地而言其時也張華博物志曰死二妃淚下染竹即斑妃死為湘水神曰曰湘妃竹秋水漫湘竹則預言秋時過湘潭也大庾嶺多梅當隂風時經過於嶺上之梅則公預言其冬時至嶺上也苦揺求食尾司馬子長報任少卿書曰猛虎曰深山百獸震恐及在檻穽之中揺尾而求食積威約之漸也常曝報恩腮三秦記江海集龍門魚登者化龍不登者㸃額曝腮結舌前漢博士結舌而不談又鉗口結舌防讒柄探腸有禍胎枚乗福有基祸有胎趙云既為客矣求食所不得己報恩所不得忌而人結舌探腸則己防患焉齊武帝謂臨賀王曰汝包藏禍胎蒼茫歩兵哭阮籍為歩兵哭窮途展轉仲宣哀王粲流離作七哀詩饑藉家家米愁徵處處杯休為貧士嘆任受衆人咍得喪初難識榮枯劃易該趙云所句所以起論世人之榮枯可以該了也差池分組冕合沓起蒿菜不必伊周地皆登屈宋才以言其榮漢庭和異域晉史折中台覇業尋常體臣忌諱災以言其枯也也差池分組冕合沓起蒿萊不必伊周地皆登屈宋才伊尹周公屈原宋玉綬趙云詩言燕燕于飛差池其羽以飛譬之也而分組冠冕之貴其重沓來則特起於蓬蒿草菜之間耳伊尹周公之所任則宰輔之地今也不必于宰輔所登用者皆如屈原宋玉之才也漢庭和異域前漢匃奴傳賛和親之論發于劉敬晋史拆中台晋中台拆而張華誅覇業尋常體宗臣忌諱災趙云上句以比當時遣使和吐蕃而不即歸者矣次句則又必有以罪誅者晋史則晋之太史以天文為告也非史籍之史中國之于外裔甘心于和親此覇業尋常之體也而大臣充使或留或誅則宗臣以為忌諱矣羣公紛戮力聖慮窅徘徊趙云自此而下論所以致太平之事矣羽獵賦云羣公常伯揚朱墨翟之徒也羣公之戮力至於紛然又煩聖慮之軫及而窅然徘徊則吐蕃之所因如此數見銘鍾鼎季武子作林鍾之銘銘魯功衛孔悝鼎銘真宜法斗魁陏志北斗一至四為魁五至七為杓也聖趙云上句則羣公功成而鍾鼎之可銘下句則慮之號令當法之北斗晋天文志斗杓人君之象號令之主也願聞鋒鏑鑄賈誼過秦論銷鋒鏑鑄以為金人十二莫使棟梁摧衛玠卒謝鯤哭之曰梁棟折不覺哀杜補遺願聞鋒鏑鑄若家語顔回云願鑄劍㦸以為農器是也晋陸玩拜司空謂賔客曰以我為三公是天下無人矣索酒酌柱間地祝曰當今乏才以尔為柱石之臣莫傾人棟梁磐石圭多翦漢文帝封子弟曰磐石之宗成王封康叔翦桐葉為圭凶門轂少推杜補遺李衛公對唐太宗曰古者出師命将齋三日授之以鉞推其轂又曰古者命将授鉞推轂鑿凶門而出趙云轂少推望其息兵而不崇将臣也垂旒資穆穆禮天子穆穆祝網但恢恢成湯祝網老子天網恢恢黈趙云傳曰天子垂旒所以蔽明也纊塞耳所以蔽聰也盖言垂拱無事者如此成湯出見羅者方祝曰從天下者從地出者四方来者皆入吾羅湯曰嘻盡之矣非桀其孰能為此哉乃命觧其三靣而置其一靣下更教之祝曰欲左者左欲右者右欲髙者髙欲下者吾取其犯命諸侯聞之咸曰湯之徳至矣澤及禽獸况于人乎赤雀翻然至黄龍不假媒春秋孔演圖曰鳥化為書孔子奉以告天赤雀集書上化為黄玉後漢黄龍見于譙趙云赤雀黄龍則言祥瑞之至矣遁甲曰赤雀不見則國無賢白雀不䧏則無後嗣注赤雀主銜書陽精也白雀主銜錢隂精也在王者言之則尚書中侯曰赤雀銜丹書入豊長于昌前昌則文王之名也瑞應圖曰黄龍者四龍之王者不漉池而漁則應和氣而逰于池沼在帝王言之則龍魚河圖曰黄龍負圖従河中出付黄帝帝令侍臣寫以示天下又曰黄龍従洛水出詣虞舜鱗甲成字令左右寫文竟龍去其漢文帝時見成紀宣帝時見新豊光武時見于河章帝時四見安帝時見厯城哀帝時見頴川魏時見不一至則如孔氏之鳯鳥不至之至媒則前漢樂歌曰天馬徠龍之媒賢非夢傅野髙宗夢得説于傅巖之野隐類鑿顔坏雄傳或鑿坏以遁荘子魯君聞顔闔賢欲以為相使者往聘因鑿後垣而亡坏壁也自古江湖客冥心若死灰莊子曰心若死灰趙云四句則公自言也哭李尚書之芳漳濵與蒿里逰水竟同年劉公幹詩云竄身清漳濵李延年分送喪歌為二等薤露送王公貴人蒿里送士大夫庶人使挽柩者歌之為挽歌也趙云首兩句言病而即死也逰水之義起于論幹子在川上曰逰者如斯夫而劉公詩有云遊者如流水哀此遂離分欲挂留徐劒見把劔覔徐君句注猶廻憶戴船見應尋戴安道注徐趙云史記曰吳口季札之初使北過徐君好季札劒不敢言季札方為使上國未獻還至徐徐君已死乃觧其寶劒繫徐君冡樹而去語林曰王子猷居山隂大雪夜開室命酌四望皎然因咏招隐詩忽憶戴安道時在剡乗興棹舟經宿方至既造門而返或問之對曰乗興而来興盡而返何必見戴安道耶相知成白首此别間黄泉左傳不及黄泉無相見也風雨嗟何及江湖涕泫然風雨何嗟及矣安趙云成白首字潘仁詩投分寄石友白首同所歸也嗟何及字出詩何嗟及矣涕泫然宇文中子云泫然流涕修文将管輅奉使失張騫趙云王隠晋書載鬼蘇韶見其弟謂曰顔淵卜啇今為地下修文郎有八人韶自言其一也貼之以将管輅則李尚書之有竒才應如魏之管輅也前漢張騫以郎應募使月氐至大夏而竟歸漢拜太中大夫劉孝標辨命論曰臣觀管輅英輅偉珪璋特秀實海内之名傑豈日者卜祝之流乎将管則修文郎有八人将如管輅者亦預之矣或曰将携之而去亦通奉使失張騫李尚書充使而死也史閣行人在周禮大行人小行人詩家秀句傳趙云行人又申言其奉使閣則言其書之史册也客亭鞍馬絶旅櫬網蟲縣沈休文詩云網蟲垂户織復魄昭丘逺登樓賦云西接昭丘昭丘楚昭王之墓歸䰟素滻偏宋玉䰟兮歸来路趙云此言其死于道矣鮑照詩鞍馬光照地儀禮䘮禮有復注復也有司招䰟復䰟也昭丘按荆州圖經在當陽東南七十里復魂昭丘逺則李尚書寄居荆南其櫬歸而復則所以為用素滻長安之水也潘安仁西征賦云南有𤣥覇素滻歸䰟素滻偏則李尚書乃長安人也樵蘇封𦵏地喉舌罷朝天李固云陛下之有尚書猶天之有北斗斗為天之喉舌尚書亦猶陛下之喉舌罷趙云上句則大臣之墓其前後左右禁樵牧也喉舌朝天則已死矣不復以是任而見天子也秋色凋春草王孫若箇邊劉安招隐芳草兮萋萋王孫兮不歸重題涕泗不能收哭君餘白頭兒童相顧盡宇宙此生浮江雨銘旌濕檀弓銘明旌也湖風井逕秋鮑明逺蕪城賦云邉風急兮城上寒井逕滅兮丘隴殘還瞻魏太子賔客减應劉趙云兒童相顧書一作相識盡則言自兒重時與李尚書相識若作相顧盡則言與李尚書之諸子更相顧視一一巳盡而無説矣末句公自注外應劉字應則應瑒字徳璉劉則劉禎字公幹曺丕與吳質書曰徐陳應劉一時俱逝盖皆當丕為太子時相從之客也公公前有寄薛尚書云曽是接應徐亦此四子中之二者獨坐悲愁廻白首倚杖背孤城江歛洲渚出天虛風物清趙云舊本悲愁師民瞻本作悲秋是葢悲愁字雖出楚詞余萎約而悲愁然是兩字惟宋玉之悲秋故對倚杖鮑明逺云倚杖牧雞豚以江之歛故洲渚出謝恵連蕭條洲渚際也故對風物其字熟矣如宋儋亦云秋盡野外草木變衰長郊蕭條風物凄𦂳今於法帖中可見滄溟服一作恨衰謝朱紱負平生仰羡黄昏鳥投林羽翮輕趙云在滄溟之中甘服衰謝此亦乾坤一腐儒之勢也負平生言其無用于時也平生祖出論語久要不㤀平生之言暮歸霜黄碧梧白鶴棲城上撃拆復烏啼客子入門月皎皎誰家𢷬練風凄凄詩風雨凄凄南渡桂水闕舟楫北歸秦一作洛川多鼓鞞年過半百不稱意明日㸔雲還杖藜趙云梧之碧葉為霜所黄也城上白帝城也易重門擊柝烏啼則後漢謡所謂城上烏而樂府有烏夜啼之曲也客子公自謂也選詩客子常畏人古詩明月何皎皎照我羅牀幃秦川多鼓鞞則時吐蕃之兵未息秦川一作洛川非洛未嘗言川也移居公安敬贈衛大郎鈞衛侯不易得余病汝知之雅量㴠高逺清襟照等夷趙云不易得字公嘗用曰神仙之人不易得南史袁憲字徳章㓜聰明好學有雅量袁粲於王儉詩云老夫亦何寄之子照清襟平生感意氣少小愛文辭河海由來合風雲若有期趙云河海由來合所以言意氣之感也書曰北播為九河同為逆河入于海風雲若有期所以言其文辭之必效也形容勞宇宙質朴謝軒墀自古幽人泣流年壯士悲趙云此則公自言也上句以言其憔悴而空老於世下句以言無復入仕於朝廷易幽人正吉項羽目樊噲云壯士水煙通徑草秋露接園葵入邑豺狼鬬傷弓鳥雀飢趙云上兩句述其移居公安之地也選詩云輕風摧徑草史記云公儀休㧞其園葵舊注引陸士衡園葵詩在後矣豺狼鳥雀以比賊盗窮困之民白頭供宴語烏几伴棲遲交態遭輕薄今朝豁所思趙云白頭公自言也供宴語言可以供衛之語烏几烏皮几也伴棲遲則遷於公安惟有烏几為伴耳翟公題門云一貧一富乃知交態古詩五陵輕薄兒今朝豁所思則以美衛鈞也公安送韋二少府匡賛逍遥公後世多賢送爾維舟惜此筵趙云逍遥公杜補遺引北史韋夐字敬逺孝寛之兄志尚夷簡淡於榮利所居之宅枕帶林泉對玩琴書蕭然自適時人號為居士周明帝以詩貽之曰誰能同四隱來參子萬機夐願時朝謁帝大說勑有司日給河東酒一斗號曰逍遥公又引唐史云韋嗣立為中書門下三品嘗於驪山建營别業中宗親往幸焉自製詩序令從官賦詩因封嗣立為逍遥公名其所居為清虛原幽棲谷且云以二史考之子美稱逍遥公乃韋敻非嗣立也故世系表為韋氏九房以夐之後為逍遥公房嗣立之後為小逍遥公房盖以别之也念我常能數字至將詩不必萬人傳時危兵甲黄塵裏日短江湖白髪前趙云頷聨言思念我則寄將我之詩去則不必傳之萬人也腹聨兩句其句法不同上句言當時危之際與韋二皆在兵甲黄塵之裏盖有兵甲則有黄塵此時危之事也黄塵字曹子建感節賦大風隱其四起揚黄塵之冥㝠下句則言髪巳白矣而短景中之江湖在其前蓋指相聚之地也古往今來皆涕淚斷腸分手各風煙趙云斷腸字多矣如謝靈運憶山中詩云楚人心苦絶越客腸今斷鮑照東門行曰野風吹秋木行子心腸斷而别賦云行子腸斷也謝宣逺送王撫軍詩分手東城闉劉𤣥暉八公山詩風煙四時犯霜雨朝夜沐也贈虞十五司馬逺師虞祕監今喜識𤣥孫形象丹青逼家聲器宇存凄凉憐筆勢浩蕩問詞源爽氣金天豁清談玉露繁佇鳴南岳鳯欲化北溟鯤趙云虞秘監者世南也陸雲傳云為浚儀令去官百姓圖畫形象太史公云李陵顔其家聲王獻之云西山朝來致有爽氣此借用於人耳晉書終日清談而巳露繁字韻董仲舒有繁露之書也劉公幹詩鳯皇集南岳徘徊孤竹根故對北溟鯤其字則北溟有魚其名為鯤也交態知浮俗儒流不異門趙云交態字鄭莊傳翟公題門曰一貧一富乃知交態故對儒流其字則儒家者流也史記云同門而異户也過逢連客位日夜倒芳樽沙岸風吹葉雲江月上軒百年嗟已半四坐敢辭喧趙云客位字沈休文云客位紫苔生别賦云月上軒而飛光古詩香爐詩云四座且莫喧願聽歌一言今云敢辭喧豈言敢辭去喧譁而拘拘喑黙此所以終倒芳樽之歡也書籍終相與青山隔故園趙云此暗用蔡邕盡舉其家所有之書以與王粲又南史王筠字元禮沈約見筠文咨嗟而嘆曰昔蔡伯喈見王仲宣稱曰王公之孫吾家書悉當相與僕雖不敏請附斯言今公所云正欲以書籍相與但故園隔在青山之外耳公安縣懷古野曠吕䝉營江深劉備城寒天催日短風浪與雲平灑落君臣契飛騰戰伐名維舟倚前浦長嘯一含情趙云呉將吕䝉營於公安劉備曽為荆州牧故今句及之灑落君臣契則又言先主之與諸葛也飛騰戰伐名則以言吕蒙之為將也含情則亦弔古之意也公安送李二十九弟晉肅入蜀余下沔鄂趙云晉肅乃李賀之父也當時以賀父名晉肅不得令舉進士韓退之有辯在韓集正解柴桑纜仍㸔蜀道行檣烏相背發塞鴈一行鳴趙云上句公將下沔鄂次句送晉肅入蜀檣烏則船檣上刻為烏形取占風之義一往南一往蜀此所以為背發也塞鴈一行鳴則言其别之時也南紀連銅柱西江接錦城憑將百錢卜飄泊問君平趙云南紀字廣天文志云東循嶺徼逹甌閩是謂南紀所以限蠻夷也非是詩云湯湯江漢南國之紀銅柱馬援所建在驩州之東南極角也南紀連銅柱一句又公自言其下沔鄂而儘南往矣自西江而上沂是為接錦城末句因晉肅入蜀故有君平之問宴王使君宅二首漢主追韓信蒼生起謝安吾徒自飄泊世事各艱難趙云首兩句取古二人功名之事言之引下句也逆旅招邀近他鄉意緒寛不才甘朽質髙卧豈泥蟠趙云上兩句言皆在逆旅之中以相招邀可以寛意緒也莊子逆旅者有二妻古樂府他鄉各異縣不才甘朽質所以自處之語髙卧豈泥蟠則所以自謙也左傳有言才子不才子右一汎愛容霜鬢留歡上夜闗一作卜夜閑自吟詩送老相勸酒開顔趙云舊本霜髮師民瞻本作霜鬢是孔子曰汎愛衆而親仁其後遂以泛愛為朋友則殷仲文南州桓公九井作云廣筵散汎愛是已舊本正作卜夜閑卜夜字左傳云臣卜其晝未卜其夜也一作上夜闗蓋以公父諱閑當避閑字也殊不知公有云雙雙戲蝶過閑慢則亦臨文不諱矣然今句當以上夜闗為正盖首兩句便對而夜闗字方對霜鬢也又於留歡為相應蓋如陳遵閉門投轄者矣戎馬今何地鄉園獨舊山江湖墮清月酩酊任扶還趙云老子云戎馬生於郊末句月使墮字竒矣李白亦云更看江月墮清波右二留别公安太易沙門隱居欲就廬山逺麗藻初逢休上人數問舟航留製作長開篋笥擬心神趙云廬山逺謂惠逺大師休上人則詩僧湯惠休也數問舟航留製作言來問公而留公之製作也長開篋笥擬心神言為太易而開篋笥於是心神擬議合與其何篇也沙村白雪仍含凍江縣紅梅已放春先踏鑪峯置蘭若徐飛錫杖出風塵趙云上林賦云其北則含凍裂地涉氷掲河末句公蓋言先往廬山路香鑪峯求置蘭若之地請太易師飛錫而來也孫綽天台山賦應眞飛錫以躡虛秋日荆南送石首薛明府辭滿告别奉寄薛尚書頌徳叙懷斐然之作三十韻趙云石首縣江陵屬縣也以山得名頌徳叙懷四字今世所謂紀徳陳情也南征為客久西候别君初嵗滿歸鳬舄趙云西候屬西之時候乃秋日也鳬舄以言薛明府之為縣令即王喬之乗鳬乃尚方舄事也秋來把鴈書趙云秋來把鴈書應是得其兄尚書之書也鴈書事蘓武荆門留美化唐蕭銑屯軍荆門號荆門軍在夷陵趙云上句指言其自石首替也江陵府在唐管縣八而石首其一也荆門於唐亦是江陵府縣名今石首替罷而謂之荆門留美化其取江陵府古謂之荆州也姜被就離居續漢書姜肱兄弟三人皆以孝行著名肱年長與三弟共被卧親友如此域趙云下句則言兄弟相見也詩云美化行乎江漢之書云用蕩析離居也聞道和親入見肯慮白登圍注使趙云此言薛尚書之充也垂名報國餘趙云唐之於吐蕃初妻以金城公主而叛服不常至永泰大厯間再遣使者來聘於是戸部尚書薛景仙往報新書所載如此則薛尚書者乃薛景仙乎連枝不日並八座幾時除見起居八座太夫人注景帝紀注凡言除者除故官就新官之趙云言尚書之與薛石首不日相並連枝則如木連理枝也往者胡星孛胡星旄頭也孛星光芒短其光四出蓬蓬孛孛然趙云上句指言安祿山也天文志旄頭胡星也凡星之妖所躔曰孛恭惟漢網踈漢刑法志禁網踈濶寛趙云下句指言明皇之大也風塵相澒洞洞簫賦風洪洞而不絶澒洞相連貎推趙云凡兵之地謂之風塵如隋顔之古意詩云歌舞未終曲風塵闇天地澒洞字出淮南子曰未耳天地之時鴻濛澒洞莫知其門而文選止使洪洞字其音亦從去聲天地一丘墟王粲詩崤函復丘墟郭趙云一丘墟則人民寡而城荒矣殿瓦鴛鴦坼鄴都銅雀臺皆鴛鴦瓦庾信賦昔為一雙瓦飛入魏王宫趙云鴛鴦瓦事魏志文帝問周宣曰吾夣殿屋兩瓦墜地化為鴛鴦何也宣對曰後宫當有暴死者帝曰吾詐卿耳宣曰夫夣者意耳茍以形言便占吉㓙言未卒黄門令奏宫人相殺宫簾翡翠虛西京雜記有翡翠簾鉤陳摧徼道西都賦周以鉤陳之位衛以嚴更之署又云周廬千列徼道綺錯趙云鉤陳星名主天子後營摧徼道則鉤陳之營摧頽於徼道中也槍纍失儲胥長楊賦木擁槍纍以為儲胥注槍纍作木槍相櫐為柵也儲胥注武帝先作迎風館於甘泉山後加露寒儲胥二館趙云木槍相櫐為柵擁禽獸使不得出此文選張銑所注其在揚雄本傳師古云言有儲畜以待所須也公詩句直用揚雄賦而已蓋言槍櫐之壞所以於儲胥為失也舊注却是言甘泉宫中事不知上四句以言京師之䧟而宫殿之毁也文物陪廵狩親賢病桔椐公時呵䝟貐䝟貐摩牙而食人虎杜云爾雅䝟貐類貙牙食人集趙云廵狩指言肅宗之在鳯翔也文物陪則言衣冠於此也鴟鴞之詩曰予手拮据註云拮据撠挶也言為巢之至苦其手病也親與賢皆病則勞於討賊之事也䝟貐惡獸首唱却鯨魚見上京觀且僵尸注云趙云鯨魚大魚勢愜宗蕭相蕭何也趙云蕭相而自注云郭令公漢書云蕭何園之宗臣也勢愜言討賊之勢愜順也材非一范睢史記載范睢逃魏齊之辱入秦為相終復魏齊之讎聽趙云自注云諸名將蓋秦拜范睢為客卿謀兵事卒其謀使五大夫綰伐魏伐韓大破趙於長平此皆范睢之謀有益於秦者故以比諸名將屍填太行道血走浚儀渠太行山在河北浚儀渠汴河也儀趙云太行在幽燕浚在梁滏口師仍㑹趙云滏水光黄之間函闗憤已攄趙云函闗則函谷闗是已於是復京師矣下四句是也紫微臨大角隋天文志紫㣲大帝之座也又大角一星在攝提間天王座也又名天楝趙云言肅宗還長安也紫㣲臨大角則帝星臨王座也皇極正乗輿皇極乗輿天子輦屬正趙云洪範曰建用皇極史曰乗興返皇極正乗輿則大中之道復正也賞從頻峩冕殊私再直廬僖二十四年傳晉侯賞從亡者趙云公嘗曰峩冕耿金鍾今對直廬則直宿殿廬也豈惟髙衛霍曽是接應徐衛青霍去病賔趙云衛霍漢之大將曽是接應徐此薛公又加太子客之職故耶徐陳應劉蓋皆曹丕為太子時所從之人也觀後篇哭李尚書而云還瞻魏太子賔客咸應劉公自注云李公厯禮部尚書薨于太子賔客可見矣䧏集翻翔鳯賈誼賦鳯凰翔于千仞兮覽徳輝而下之趙云於降集之間如翔鳯之飜言言兄弟之翶翔也追攀絶衆狙莊子云朝三暮四衆狙皆怒怒趙云相與追攀而絶衆姦之喜故以徂譬焉侍臣雙宋玉宋玉楚襄王大夫也戰䇿两穰苴穰苴有司馬兵法趙云蓋當時亦必有妬熱者矣宋玉楚襄王大夫有文章今以侍臣言之則文才如雙宋玉穰苴善用兵有司馬兵法今以戰䇿言之則武略如两穰苴乃所以美薛之兄弟也鑒澈勞縣鏡荒蕪巳荷耡嚮來披述作自注石首處見公新文一巻重此憶吹噓白髪甘凋喪青雲亦巻舒趙云上句言䝉尚書之鑒照澄澈如鏡之懸此樂廣謂之水鑑之意淮南萬畢術云髙懸大鏡坐見四鄰陶淵明詩帶月荷鋤歸荒蕪已荷鋤言昔從事於朝墨今則以荒蕪而乃從事於耕種矣青雲卷舒言青雲之志昔舒而今卷也經綸功不朽跋涉體何如自注公頃奉使和蕃已見上應訝耽湖橘潭州有橘洲常餐占野蔬十年嬰藥餌見上藥餌扶吾隨所之注萬里狎樵漁趙云經綸功不朽則又以言薛尚書易曰君子以經綸詩云大夫跋涉應訝耽湖橘常餐占野蔬两句則又言薛公之相念也揚子淹投閣見子雲識字終投閣注鄒生惜曳裾鄒陽書何王之門不可曵長裾乎趙云揚子鄒生公以自况也曵長裾則不欲干謁諸侯也但驚飛熠燿東山詩熠燿宵行注熠燿燐也燐螢火也不記改蟾蜍張景陽下車如昨日蟾蜍四五圓易趙云飛熠燿改蟾蜍皆以記時之變也煙雨封巫峽江淮畧孟諸孟諸九澤名云淮趙云煙雨封巫峽則追言其舊居江畧孟諸則指前途之追言其舊居江淮畧孟諸注今在梁園睢陽縣東北此郭璞之言而今日則南京也湯池雖險固金城湯池遼海尚闐淤努力輸肝膽休煩獨起予語起予者商也趙云湯池普言眼前州郡選云實有險固遼海尚闐淤則時幽燕猶有不順命者矣前漢溝洫志云填淤反壤之害顔師古曰填淤謂壅泥也上又有填閼字師古云閼讀與於同音於據切而公今押平聲義同耳末句所以􅈭之也呉越春秋越人之歌曰行行各努力莊子云肝膽楚越九家集注杜詩卷三十四
