body:
  text: 九家集注杜詩巻六宋郭知達編古詩别贊上人此詩将離秦州而别之也百順日東流客去亦不息謝玄暉大江流日夜客心悲未央我生苦漂蕩何時有終極趙云曹子建詩想思無終極贊公釋門老放逐來上國還為世塵嬰頗帶憔悴色陸士衡牽世嬰時網又世網嬰我身楊枝晨在手豆子兩一作雨巳熟杜㭪遺佛經云手把青楊枝徧洒甘露水又僧祗律楊枝齒木也食畢持之嚼一頭碎用剔牙齒中滯食毗柰耶云嚼楊枝有五利一除風二除熱三令口滋味四消食五明目又灌頂經云昔維耶黎民遭疫禪提奉佛教持呪往避之疫人皆愈其禪提所嚼嚙木擲地成林林下有泉後民復有疾取泉水折楊桞洒拂病者無不痊愈把楊枝洒甘露事出於此趙云以見贊當春方為寺主之時來秦州而巳見豆熟之際矣本草豆九月採齊民要術曰九月中候近地葉黄者速刈之則豆熟在九月公以十月未離秦州而此先别之也一説謂豆子眼中黒睛也言無邪視是身如浮雲語曰於我如浮雲浮杜補遺維摩經是身如響屬諸因縁是身如雲須臾變滅是身如電念念不住安可限南北新添魏文帝臨江歎曰此天所以限南北也安趙云以言時序雖飄忽於道人體上春雖在長秋時在秦州為無南無北也異縣逢舊友初欣冩胷臆古樂府他鄉異縣趙云詩我心冩兮而謝靈運擬曹植詩云歡娯冩懐抱天長闗塞寒歳墓饑凍逼一云天長闗塞逺歳暮飢寒迫相趙云一作天寒闗塞逺嵗暮飢凍逼非蓋寒與凍字侵也次公以為别留長在十月而句云歳暮飢寒逼蓋言其所以徃同谷之情将為歳暮之計以捄飢寒也野風吹征衣欲别向照黒鮑明逺野風吹秋木行子心膓㫁謝靈運詩朝游窮照黒馬嘶思故櫪歸鳥盡歛翼嘶一作鳴王正長朔風動秋草邊馬有歸心陶潛曰入羣動息歸鳥趨林鳴古來聚散地宿昔長荆棘姑蘇臺荆棘霜露霑人衣相看俱衰年出處各努力趙云呉越春秋載越人送其子弟作離别相去之辭曰行行各努力萬丈潭同谷縣作鳯趙云按地志一名凰潭青溪合冥寞神物有顯晦趙云青溪所以合而冥寞蓋以神物所藏有顯晦也謝荘詩青溪如委黛黄沙似舒金神物指言龍也有顯有晦許慎所謂能幽能明者也晉劉琬賦曰大哉龍之為徳變化屈神隱則黄泉出則升雲今兼言其有顯有晦以引下文述其蟠隱必藉深潭也龍依積水蟠窟壓萬丈内孫興公天台賦臨萬丈之絶冥張陽流澗萬餘丈趙云文子曰積水成海而魏都賦曰因淵漼積水荀子積水成淵蛟龍生焉跼歩凌垠堮音噩西京賦靈囿之中前後無有垠堮淮南子出於無垠堮之門側身下煙靄前臨洪濤寛却立倉石大山危一徑盡岸絶兩壁對削成根虛無顔延年踐華因削成趙云西山經云大華之山削成而四方倒影垂澹􅀈一作濧天台賦序或倒影於重冥薛云前漢郊祀谷永曰世有仙人服食不終之藥遥興輕舉陟遐倒景覽觀縣圃浮海蓬萊耕耘五徳朝種暮穫與山石無極注如淳曰在日月之上反從下照故其景倒景杜補遺孫綽天台賦倒景注言此山以臨深海山倒在水中謝靈運應詔詩云張組眺倒景列筵一歸潮注山臨水而影倒沈休文游沈道士館詩一舉凌倒景無事適華嵩注倒景在日月之上日月反從下照故其景倒谷永同上薛注又司馬相如大人賦貫列缺之倒景兮渉豊隆之滂澳注服䖍曰列缺天門也陵陽予明經曰列缺氣去地一千四百里倒景氣去地四千里其景皆倒在下詳註家所言即倒景有二説倒景垂澹瀩與天台賦應詔詩倒景同義非谷永相如所言倒景也黒如灣澴底清見光烱碎孤雲到來深飛鳥不在外髙羅成帷幄陸士衡宻葉成翠幄天台賦踐莓苔之滑石摶壁立之翠屏䕃樛木之長蘿援葛藩之飛莖寒未壘一作疊旌斾逺川曲通流嵌竇潛洩瀬造幽無人境發興自我輩天台賦卒踐無人之境輩趙云晉人多云此正在我告歸遺恨多将老斯游最閉藏脩鱗蟄出人巨石礙何事炎天過快意風雨㑹兩一作雲閉趙云似譏龍不以時為澤矣蓋言其徒藏之深以礙巨石而艱於出入炎天須雨而不雨炎天既過何用與風雨㑹乎如此則成秋霖矣廣雅云南方曰炎天魏文帝芙蓉池詩遨遊快心意周禮風雨之所㑹一本作雲雨㑹字則應徳連詩欲因雲雨㑹濯翼陵髙梯兩當縣呉十侍御江上宅寒城朝煙澹山谷落葉赤謝𤣥暉寒城一凝眺平楚正蒼然靈運曉霜楓葉丹夕照嵐氣隂隂風千里來吹汝江上宅謝𤣥暉朔風吹飛雨蕭條江上來趙云詳味詩意呉侍御遷謫之因為辨論良民不是姦細以此忤權貴而得罪耳首四句以秦地之時候景物言其宅在兩當縣之江上所以為之感激也兩當枕嘉陵江上傳云呉侍御宅今其子孫尚居之未去也鵾雞號枉渚日色傍阡陌王嶶詩窈靄瀟湘空歘吸鵾雞悲謝靈運弭棹薄枉渚指景待樂闋九歌朝騁鶩兮江臯夕弭節兮北渚楚辭朝發枉渚暮宿辰陽七發鶚鵠晨號乎其上鵾雞哀鳴翔乎其下杜補遺相如賦云藺𤣥鶴亂鵾雞張楫曰鵾雞似鶴黄白色張無盡武陵圖經紏繆云余閲四方圖經何其舛訛之多也以武陵善徳山一事觀之餘可知矣武陵之東有二山一曰枉山二曰踴出山呉均來地居注云元嘉七年五月天水武陵枉山䧟為枉渚隋開皇中刺史樊子重以枉山嘗為善巻所居名其地為善徳山悅其名而遺其實也唐貞元中揔印禪師居踴出山鑿井啖泥刳木庵開山建寺裴公美易王名為古徳山院為古徳禪阮宣鑒嗣之而徳山之名遂著劉禹錫集善巻壇在枉山上又曰枉渚在郭東周朴詩曰先生遺集武陵西且善巻之有壇壇非堯舜時所有地枉山䧟而壇在山上枉渚在東而謂之在西斯則訛之又訛矣太平御覽載江南諸水云湘州記曰枉山在郡東十七里有枉水焉山西溪口有小灣謂之枉渚山有楚祠焉謹按兩當縣今隷鳯州乃古雍州之地而子美是詩云鵾雞號枉渚者蓋渚之斜曲而不直者皆謂之枉渚非武陵及湘潭之枉渚也故陸雲荅張士然詩曰通波激枉渚悲風薄邱榛注枉曲也亦以斜曲為義趙云以楚地之時候景物言之鵾雞正實道其事楚地有之楚辭曰鵾雞嘲哳乃是事祖借問持斧翁㡬年長沙客武帝末暴勝之為直指使者衣繡衣持斧翁指言呉侍御也長沙即潭州賈誼所謫之地謂當隂風之來空吹汝兩當之宅方鵾雞之號而其身在長沙皆所以哀之也哀哀失木􅎜矯矯避弓翮􅎜羊就反西都賦猿􅎜失木淮南子從風而飛以云愛氣力銜蘆而翔以避矰繳終為戮於此世趙以呉之失所也亦如故鄉樂未敢思宿音飛鳥過故鄉猶躑躅昔在鳯翔都共通金閨籍謝𤣥暉既通金閨籍拾趙云金閨金馬門也共通者公為左遺與呉共通籍也天子猶䝉塵見三巻北征詩注東郊暗長㦸書秦誓東郊不開晁錯曰兩陣相近平地淺草可前可後此長㦸之地也又曰勁弩長㦸射疏及逺以見其無微之不入有堅之必破也巳兵家忌間諜此輩常接跡李牧為鴈門謹烽火多為間諜臺中領舉劾君必慎剖析舉善劾有罪御史職也衛玠問樂廣夢思之成病廣命駕為剖析之王湛與王濟因共談易剖析入㣲不忍殺無辜所以分黒白書與其殺不辜寧失不經曹子建蒼蠅間白黒䜛巧令親疎上官權許與失意見遷斥謝靈運遭物悼遷斥趙云言執許與之權也權許與則其不許呉之所論矣任延傳善事上官臣不敢奉詔仲尼甘旅人王弼仲尼旅人則國可知矣向子識損益左傳鄭人鑄刑書叔向貽子産書三辟之興皆叔世也杜正謬後漢向長字子平潛隱於家讀易至損益卦喟然嘆曰吾巳知富不如貧貴不如賤但未知死何如生耳朝廷非不知閉口休嘆息予時忝諍臣公時為拾遺也丹陛實咫尺左傳天威不違顔咫尺相看受狼狽見三巻北征注至死難塞責趙云公為拾遺以見吳之出而不能言也行邁心多違出門無與適詩行邁靡靡沈休文江海事多違趙云詩中心有違於公負明義惆悵頭更白袁陽源詩義分明於霜之趙云落句公恨深矣發秦州乾元二年自秦州赴同谷縣紀行十二首我衰更嬾拙生事不自謀無食問樂土無衣思南州詩適彼樂土雪賦裸壊垂繒注不衣國也謝靈運南州實炎徳桂樹陵寒山趙云言其行止無定也莊子云吾無粮我無食因無食故問樂土而徃就也楚辭云嘉南州之炎徳南州氣暖因無衣故思南州藉其暖不須衣也漢源十月交天氣如凉秋鮑云漢源屬同谷郡大㮣美同谷風土多暄利於貧士非九月十月之交去秦也詩十月之交草木未黄落況聞山水幽栗亭名更嘉下有良田疇趙云漢源栗亭蓋同谷地今成州也按九域志二縣曰同谷曰栗亭也地在秦之南界首去秦一百九十五里月令草木黄落充膓多薯蕷永和初有採藥衡者道迷糧盡過息巖下見一老翁四五年少對執書告之以飢與之食物如薯蕷後不復飢杜補遺陶隱居云薯蕷處處有之掘取食之以充糧圖經云湖閩中出一種根如芋而皮紫色煎煑食之俱羙彼土人呼曰藷音殊山海經云景山北望少澤多藷藇音與與薯蕷同郭璞云根似芋可食江南人呼藷為儲語有輕重爾其實一種南北之産不同故其形類差别崖蜜亦易求杜補遺本草載石蜜陶隱居云即崖蜜也髙山巖石間作之又木蜜呼為食密懸樹枝作之張華博物志云逺方山郡幽僻處出蜜所著巉巖石壁非攀縁所及唯於山頂籃轝自懸掛下遂得採取僧覺範冷齋夜話載東波撖攬詩云待得微甘回齒頰還輸崖蜜十分甜乃云崖蜜事谷子曰照夜清螢也百花醴蜜也崖蜜櫻桃也名趙云鬼谷子之書揣摩押闔談説之書耳豈曽論及物哉今其書在世間可考也而洪覺範敢爾眩惑學者今因此及之蜜竹復冬笋清池可方舟西都賦鏡清流又方舟並鶩俛仰極樂注方並也並趙云謝靈運登石門最髙頂詩蜜竹使徑迷方舟兩舩爾雅大夫方舟雖傷旅寓逺庶遂平生游此邦俯要衝實恐人事稠應接非本性登臨未消憂趙云漢書李􅝂曰凉州天下要衝王子敬過越州見潭壑澄澈清流冩注乃云山川之美使人應接不暇宋玉登山臨水送將歸王粲登樓賦云登兹樓以四望聊暇日以銷憂谿谷無異石塞田始微收豈復慰老夫惘然難乆留趙云以景趣言之則谿谷無異石以地利言之則塞田始微收皆不足以慰我懐抱而當去也日色隱孤戍烏啼滿城頭趙云何遜詩曰團團日隱洲鳥蹄見第一巻哀王孫注中宵驅車去飲馬寒塘流古詩飲馬長城窟磊落星月髙蒼茫雲霧浮趙云古詩兩頭織織新月生磊磊落落向􅍼星庾信詩寂寞歳隂窮蒼茫雲霓同大哉乾坤内吾道長悠悠易曰大哉乾元詩曰悠悠蒼天赤谷趙云此篇才離秦州所歴之處也天寒霜雪繁正月繁霜至趙云孔子云天寒既霜露既降游子有所之李陵游子暮何之豈但嵗月暮重來未有期古詩涼涼嵗云暮又嵗月忽巳晚沈林文飛光忽我逼豈止嵗月暮古詩㑹面安可期蘇武相見未有期趙云意言既徃同谷豈止廹此嵗暮而不再返秦州過此以往重來無期也晨發赤谷亭險難方自兹任彦昇晨發富春渚又云湍險方自兹亂石無改轍我車巳載脂曹子建中塗絶無軌改轍登髙岡泉水載脂載轄還車言邁以趙云言塗雖值亂石業巳欲前矣不亂石之故而改轍焉山深苦多風落日童稚飢魏文帝苦哉行谿谷多風霜露沾衣苦寒行行行日巳逺人馬同時飢悄然村墟逈煙火何由追曹子建中野何蕭條千里無人煙趙云王仲宣詩四望無煙火貧病轉零落一云飄零曹子建零落歸山邱謝靈運萬事俱零落故鄉不可思又鬱鬱多愁思綿綿望故鄉文帝苦哉行還望古鄉鬱何壘壘常恐死道路永為髙人嗤語寜死於道路乎古詩但為後世嗤之趙云文武為賊所敗自投髙岸遇突騎王豐下馬援光武謂耿弇曰㡬為虜嗤又􅂋宗詔有過稱虛譽尚書皆宜抑而不省示不為謟子嗤也鉄堂峽趙云此篇特紀行旅之卒苦又逢時之多艱耳山風吹游子縹緲乗險絶文選賦云神仙縹緲硤形藏堂隍壁色立積鐡徑摩穹蒼蟠魏文帝蕭條摩蒼天常道彦詩深谷下無底髙巖暨穹蒼趙云徑之屈蟠而摩天以言其髙爾雅曰穹蒼天也古歌黄鵠摩天極髙飛石與厚地裂趙云張平子東京賦豈徙跼髙天蹐厚地而巳哉脩纎無限竹嵌空太始雪限一作垠坱北無垠趙云太始雪言其古也易有太始威遲哀壑底徒旅慘不恱殷仲文哀壑叩虛無謝靈運徒旅苦奔峭顔延年改服飾徒旅首路跼險艱又隱閔徒御悲威遲良馬煩趙云詩云周道倭遲毛萇注歴逺水寒長冰横我馬骨正折謝靈運石横水分流詩我馬瘏矣荀子折筋絶骨古詩鳥雀飢禁死羊馬骨欲折後漢李固傳霍光憂愧發憤悔之折骨生涯抵弧矢盜賊殊未㓕飄蓬踰三年迴首肝肺熱趙云抵者逢抵之抵抵弧矢則遭用兵之時飄蓬事啇君書曰夫飛蓬遇風而行千里乗風之勢也故云詩云轉蓬離本根飄飄乘長風而曹子建詩亦曰轉蓬離本根飄飄随長風晉司馬彪詩又曰秋蓬獨何幸飄飄随風轉若飄蓬兩字則曹子建又云風飄蓬飛載離寒暑也踰三年則自至徳二載嵗在丁酉至乾元二年歳在巳亥為三年矣公後於發同谷縣自注云乾元二年十二月一日自隴赴劒南也莊子吾生也有涯鹽并蜀都賦家有鹽泉之井鹵中草木白青者官鹽煙地舄鹵者生鹽注杜補遺禹貢曰海濵廣斥許慎說文云鹵鹹地也東方謂之斥西方謂之鹵又漢宣帝紀帝常困於蓮勺鹵中注如淳曰蓮勺縣有鹽池縱廣十餘里其鄉人名鹵中師古曰今在櫟陽縣東官作既有程煑鹽煙在川程限也前漢呉王東煑海為鹽舉趙云陳琳詩云官作自有程築諧杵聲汲井嵗榾榾莊子天地篇子貢見漢隂文人方将為圃畦鑿隧而入井抱甕而出灌榾然用力甚多而見功寡出車日連連駢拇篇又奚連連如膠漆纒紏連結也趙云詩執訊連連自公㪷三百轉致斛六千轉致言貿易也㪷三百斛六千言其利相倍什君子慎止足小人苦喧闐趙云老子知足不辱知止不殆而合用止足兩字則張景陽詠史詩達人知止足也我何良歎嗟物理固自然一云亦固然老子道法自然寒硤寒硤雲門皆秦地名行邁日悄悄山谷勢多端詩行邁靡靡又憂心悄悄漢武帝紀吏道雜而多端雲門轉絶岸積阻霾天寒爾雅釋天風而雨土為霾趙云海賦絶岸萬文寒峽不可度我實一作貧衣裳單趙云庾信梅詩真梅着衣單况當仲冬交泝㳂増波瀾野人尋煙語行子傍水餐此生免荷殳未未辭路難候人詩荷戈與殳法鏡寺自危適他州勉强終勞苦神傷山行深愁破崖寺古嬋姢碧鮮浄吳都賦檀樂嬋姢玉潤碧鮮謂竹逢趙云神雖傷於山行之深而愁之破散以崖邊古寺也碧鮮言竹也竹謂之嬋娟故孟郊有三嬋娟詩曰竹嬋娟月嬋娟人嬋娟也蕭檅寒􅀢聚潘安秋興賦庭樹槭以洒落謝靈運初篁苞緑籜盧子音諒槭槭芳葉零蘂蘂紛華落射雉賦陳柯槭以改舊槭所隔及回回山根水冉冉松上雨山一作石劉公幹囘囘自昬亂趙云楚辭老冉冉以將至王褒九懐之蓄英曰上乗雲兮囘囘洩雲䝉清晨魏都賦窮岫泄雲日月恒翳顔延年泄雲巳漫漫乆雨亦淒淒來趙云曹子建詩雲散迷城邑清晨復還初日翳復吐陶潛景翳翳以將入宋玉賦白日初翳曹子建微隂翳陽景曹顔逺宻雲翳陽景趙云翳與吐相對之辭嵇叔夜雜花詩云光燈吐輝華朱甍半光烱戸牖粲可數趙云沈佺期云紅日照朱甍儒行蓬户甕牖拄䇿忘前期出蘿巳亭午天台賦羲和亭午曰趙云廣雅云日在午亭午冥冥子規呌微徑不復取子規一名杜宇蜀人以為望帝䰟趙云蜀記曰昔人有姓杜名宇王蜀號曰望帝杜宇死俗説云化為子䂓蜀人聞子規鳴以為望帝之䰟也莊子至道之精杳杳冥冥屈原渉江云深林杳以冥冥分青陽峽塞外苦厭山南行道彌惡岡巒相經亘雲水氣參錯盧子諒岡巒挺茂樹謝靈運詩遡流觸驚急臨折阻參錯嵗趙云沈佺期哭蘇崔二公詩有云親朋雲水擁生死時傳林逈硤角來天窄一作穿壁靣削磎西五里石奮怒向我落仰看日車側俯恐坤軸弱後漢李尤九曲歌安得力士翻日車趙云淮南子注云日乗車駕以六龍坤軸即地軸也地下有三千六百軸兩句言落石之聲勢以其聲震天而日車為之側其勢可以壓地而坤軸為之弱也魑魅嘯有風天台賦始經魑魅之塗鮑明逺蕪城賦木魅山鬼野䑕城狐風嘷雨嘯昬見晨趨不趙云公凡言山之幽處多使魑魅左傳云入山不逢若魑魅魍魎莫能逢旃霜霰浩漠漠昨憶踰隴坂四愁詩欲往從之隴坂長趙云若見陽峽之髙乃思往昔所見以譬之也隴坂漢書天水郡注有大坂名曰隴坂秦州記曰隴坂九曲不知髙㡬里髙秋視呉岳杜補遺周禮雍州其鎮曰嶽山注呉嶽也漢書地理志曰呉山在汧縣西國語謂之西呉秦都咸陽以為西岳東笑蓮花卑北知崆峒薄華山有蓮花峯崆峒見上北征注超然侔壯觀景福殿雖咸池之壯觀夫何足以比倣之趙云言青陽峽山超特而起可侔呉岳壯之觀老子宴處超然壯觀字司馬相如曰此天下之莊觀也舊注在後矣巳謂殷寥廓天台賦太虛寥廓而無闗曹子建太谷何寥廓當趙云殷乃殷其雷之殷雖言聲而與隱義同學者所留意焉突兀猶趂人及兹嘆冥寞嘆一作欲逺趙云言行去青陽峽山之將謂其巳隱空虛寥廓之間而見矣却突兀而趂人也謂至其趂人之際歎神造之冥寞不可測也龍門鎮細泉兼輕氷沮洳棧道濕魏汾沮洳潤濕之處故為沮洳漢髙紀王燒絶棧道師古曰棧即閣也今謂之閣道不辭辛苦行廹此短景急舞鶴賦急景凋年石門雲雪隘古鎮峯巒集旌竿暮慘澹風水白刃澁胡馬屯成臯成臯滎陽之間胡馬回紇也回趙云成臯鞏洛之地意言安史之兵耳舊以為紇非也是時乾元二年之冬回紇未反不可妄引也陸士衡從軍詩胡馬如雲屯防虞此何及言巳後時矣嗟爾逺戍人山寒夜中泣士衡苦哉逺征人拊心悲如何石龕熊羆咆我東虎豹號我西魏武帝苦寒行熊羆對我蹲虎豹夾路啼我後鬼長嘯我前狨又啼山鬼嘯見上注東坡云揚大年云狨之形似䑕而大尾長作金色生川峽深山中人以藥矢射殺之取其尾為卧褥鞍被坐毡之用狨甚愛惜其尾殷中毒即囓㫁其尾以擲之惡其為身害也蓋輕㨗善縁木猨犺之類熊趙云此四句蓋道山行所逢雖依傍魏文帝古塞行羆對我蹲虎豹夾路啼而四我乃云之新格蓋劉琨扶風止曰鹿游我前猴戱我側兩句而巳天寒昏無日山逺道路迷登髙賦白日西其將匿天慘慘而無色恨賦白日西匿岱雲寡色驅車石龕下冬冬見虹霓月令孟冬之月虹藏不見也趙云仲冬見虹霓恠所見伐竹者誰子悲謌上一作抱雲梯為官采美箭五嵗供梁齊趙云墨子曰公輸班為雲梯取宋而郭景純游仙詩云靈谿可潛盤安事登雲梯爾雅東南之美者有㑹稽之竹箭也梁齊梁謂汴州齊謂今之山東皆安史之兵所在也故采箭以供官用矣苦云直􅀢盡無一作應以充提携仲冬之月日短至則伐木取竹注堅成之極時奈何漁陽騎䬃䬃驚蒸黎禄山之亂皆漁陽之士兵趙云漁陽騎指言安慶緒之也積草嶺連峯積長隂白日遞隱見颼颼林響交慘慘石狀變山分積草嶺路異明水縣旅泊吾道窮仲尼曰吾道窮矣王弼曰仲尼旅人趙云孔子云吾道其非耶衰年嵗時倦卜居尚百里休駕投諸彦江淹金閨之諸彦有趙云屈原有卜居篇謝靈運擬鄴中詩序云二三諸彦舊注在後矣邑有佳主人情如巳㑹靣㑹面見一巻贈衛八處士詩註來書語絶妙逺客驚深眷食蕨不願餘茅茨眼中見謝靈運想見山阿人薜蘿若在眼陸士龍髣髴眼中人足趙云左太冲詠史詩飲河期滿腹貴不願餘魏文帝詩曰眼中無故人泥功山朝行青泥上暮在青泥中泥濘非一時版築勞人功不畏道途永乃將汩没同趙云公言及同版築之汩没於泥中也白馬為鐡驪馬色青曰驪小兒成老翁哀猿一作猱透却墜死鹿力所窮趙云詩野有死麕故用之鹿之所以死以力窮於泥中走困也寄語北來人後來莫怱怱鳯凰臺山峻不至髙頂此詩思見太平之君子也趙云此篇因山名鳯凰臺乃思鳯有雛在上恐有飢渇而起意思有以飲食之庶見其為瑞於世也亭亭鳯凰臺謝惠連亭亭映江月西京賦干雲霧以上逹狀亭亭以迢迢劉公幹亭亭山上松北對西康州西伯今寂寞鳯聲亦悠悠西北謂文王也西伯時鳯鳴于岐陽石一作山峻路絶蹤石林氣髙浮安得萬丈梯為君上上頭恐有無母雛飢寒曰啾啾我能剖心出書剖賢人之心飲啄慰孤愁心以當竹實烱然忘外求血以當醴泉豈徒比清流趙云荘子曰鳯非竹實不食非醴泉不飲雛在髙山之上而二物未可得故公欲以心當竹實以心中之血比醴泉炯然忘外求公自言其剖心之實止為鳯乃嘉瑞憫其雛之飢而飼之别無所圖也所重王者瑞敢辭微命休薛云春秋元命包周成王時大治鳯凰來舞於庭成王乃援琴而歌鳯凰翔兮於紫庭余何徳兮以感靈瑞應圖曰鳯凰王者之嘉瑞趙云據春秋元命包曰鳯凰游文王之都故武王受鳯書之紀今公據古而言耳薛却引成王時事非是左傳序麟鳯五靈王者之嘉瑞坐看綵翮長舉意八極周趙云鳯凰羽具五采故謂之綵翮八極周使王褒聖主得賢臣頌云周流八極萬里一息雖言馬而借用之耳自天銜瑞圖一云䜟圖飛下十二樓十洲記崑崙山有十二玉樓室杜補遺春秋元命包黄帝􅀈元扈洛水之上元扈石也與大司馬容光等臨觀鳯凰圖置帝前帝再拜受圖前漢郊祀志皇帝時為五城十二樓以俟神人於執期名曰延平應劭注曰崑崙𤣥圃五城十二樓仙人之所居又集仙録曰王母所居王樓十二瑞華之闕光碧之堂趙云十二樓自天銜圖故以十二樓宇終之圖以奉至尊鳯以垂洪猷薛云山海經鳯首文曰徳翼文曰禮背文曰義膺文曰仁膓文曰信薛趙云鳯凰之來所以垂世之大猷言其不妄下集也夢符引不相干矣再光中興業一洗蒼生憂深𠂻正為此羣盜何淹留乾元中寓居同谷縣作七首有客有客字字美白頭亂一作短髪垂過耳嵗拾橡栗隨狙公以其寓居故自稱有客按新史言甫居同谷拾橡以自給兒女有至餓殍者趙云潘安仁云素髪颯以垂領謝靈運云星星白髪垂莊子云古者獸多民少皆巢居以避之盡拾橡栗暮棲樹上故命曰有巢氏薛云按列子宋有狙公愛狙而飬之誑之曰與若芧朝三而暮四足也衆狙皆起而怒俄而日與若芧朝四而暮三足乎衆狙皆伏而喜注芧三稜相如傳蔣芧青薠栗也後漢李恂食橡以自資列子夏食菱芰冬食橡栗天寒日暮山谷裏中原無書歸不得手脚凍皴皮肉死嗚呼一歌兮歌已哀悲風為我從天一作東來劉越石井風歌云浮雲為我結飛鳥為我旋右一長鑱長鑱白木柄我生託子以為命黄精一作獨無苗山雪盛黄魯直云黄精當作黄獨往時儒者不觧黄獨故作黄精以芧考之黄獨是也本草赭魁注肉白皮黄也漢人蒸食之山東人呼為土芋江西人呼卵草杜正謬黄精當作黄獨同歸當作空歸謹按神農本赭魁陶隠居云狀如小芋子肉白皮黄梁漢人名為黄獨蒸食之子美寓居成州之同谷其地正與梁漢接境方艱食餔糒不給乃以長鑱斸黄獨而食之然是時雪盛無苖了無所得遂爾空歸故至于男呻女吟也鑱鋤銜切又士緘切廣韻曰呉人云犂䥫又云土具短衣數挽不掩脛寗戚叩角歌曰短布單衣不及骭此時與子空一作同歸來男呻女吟四壁静相如家徒四壁立嗚呼二歌兮歌始放里閭為我色惆悵首章天哀其窮次章人亦哀其窮矣杜補遺列子曰昔韓娥東之齊鬻歌假食逆旅人辱之因曼聲哀哭一里老㓜悲愁相對三日不食老杜放歌而里閭惆悵意頗類此為趙云人哀其窮正如李陵天地為陵震怒壯士陵飲血之勢右二有弟有弟在逺方一作各一方有趙云南史梁文帝謂虞茘曰我方弟在逺方此情甚切公正使此矣三人各痩何人强後漢趙孝弟禮為賊所得將食之孝自縛詣賊曰禮痩不如孝肥賊感其意俱舍之一趙云江子之説子美有四弟此謂三弟者穎豐觀也弟占隨子美第十三巻有詩云久客應吾道相隨獨爾來其説是生别展轉不相見樂府他鄉各異縣展轉不相見胡塵暗天道路長詩道阻且長且趙云古詩道路阻長也東飛鴐鵝後􅒗鶬揚雄傳豈鴐鵞之能捷􅒗鶬惡禽也鶬九頭詩有􅒗在梁杜補遺廣韻曰鴐鴈屬方言鴈自闗而東謂􅕯鵞􅕯音加與鴐同東楚之外謂之鵞或謂之鶬鵞爾雅釋鳥云鶬糜鴰郭璞云今呼鶬鴟盖鴟類也􅒗秃􅒗也埤雅云狀如鶴而大長頸赤目其毛辟水毒好啗蛇北史明帝朝獲秃鵝於宫内遂養之翟光曰此即詩所謂有􅒗在梁觧云秃鵝貪戀之鳥野澤所育不應入於殿庭臣聞野物入舍古人以為不善是以張華惡鵀賈誼忌鷫鵜鶘魏黄初蹔集而去文帝猶以為戒况􅀢􅀢之禽必資魚肉菽麥稻粱之養豈可留意於醜形惡聲哉衛侯好鶴曹伯愛鴈身死國滅可為寒心以是觀之􅒗乃惡禽也故子美艱難行役處每言之如前飛秃􅒗後鴻鵠之類是也自趙云因山谷中所有禽鳥而言之鴐鵞鴈也方言以闗而東呼之云然鶬爾雅謂之麋鴰注盖鴟類公言眼前雖有此等物安得乘之以見其弟乎杜田引是非安得送我置汝􅅖嗚呼三歌兮歌三發汝歸何處收兄骨收一作取僖三十二年殽有二陵必死是間余收爾骨非特已窮而已而兄弟之親亦莫知其存亡右三有妹有妹在鍾離趙云鍾離濠州也公後有詩曰近聞韋氏妹迎在漢鍾離蓋其失已殁而夫之兄迎在鍾離也良人早殁諸孤癡長淮浪髙蛟龍怒十年不見來何時一作遲扁舟欲徃箭滿眼杳杳南國多旌旗趙云濠州今屬淮南西路故以長淮言之浪高蛟龍怒詩人狀其路之險艱也自荆渚以徃皆謂之南國詩云文王之道被于南國又云滔滔江漢南國之紀是巳資治通鑑載乾元二年八月乙巳襄州將康楚兀張嘉延據州作亂刺史王政奔荆楚九月稱南楚霸王九月甲午張嘉延襲破荆州荆南節度使杜鴻漸棄城走澧朗郢峽歸等州官吏聞之爭潛竄山谷按通鑑目録是年八月甲午朔則此九月當是甲子朔其下又載戊辰事則甲子乃初一日而戊辰乃初五日又豈誤甲子為甲午邪今七歌有曰枯樹有曰木葉黄落則秋時之作乃聞此荆南之亂矣嗚呼四歌兮歌四奏林猿為我啼清晝猿非有情者而亦為之啼則窮可知矣知杜補遺蔡氏西清詩話云林猿古本作竹林後人不乃易為林猿今本皆因之嘗有自同谷來籠一禽大如雀色正青善鳴問其名曰此竹林鳥也少陵凡於詩目必紀其處以明風俗方物貽後人豈可妄意易之耶此説蔡氏得於傳聞未足為信蓋猿多夜啼今啼清晝自有意義趙云同谷無深林自是無猿當以西清為是右四四山多風溪水急寒雨䬃䬃枯樹濕一作樹枝濕黄蒿古城雲不開白狐跳梁黄狐立趙云管子曰狐應隂陽之變六月而一見蓋難見之物公以在窮谷而每見之此為所恠歎矣我生胡為在窮谷中夜起坐萬感集趙云陸士衡古詩有中夜起歎息謝靈運詩千念集日夜萬感盈朝昬嗚呼五歌兮歌正長魂招不來歸故郷招魂曰魂兮歸來反故居右五南有龍兮在山湫古木巃嵸枝相樛龍盧紅力董切嵸子紅子孔切劉安招隱士桂樹叢兮山之幽偃蹇連巻兮枝相繚山氣巃嵸兮石嵳峩趙云本出上林賦崇山矗矗巃嵸崔嵬巃音力孔切嵸音揔木葉黄落龍正蟄漢武帝秋風辭草木黄落鴈南飛蝮虵芳福切東來水上游招䰟曰蝮虵蓁蓁我行恠此安敢出㧞劒欲斬且復休嗚呼六歌兮歌思遲一云怨遲遲溪壑為我迴春姿鄒衍被䜛仰天而泣五月為之降霜則士之怨憤足以感通於造物而然矣東坡云六歌一篇為明皇作也明皇以至徳二年至自蜀居興慶宮謂之南内明年改元乾元時持盈公主往來宫中李輔國常陰候其隙間之故上元二年帝遷西内右六男兒生不成名身已老三一作十年飢走荒山道趙云李少卿荅蘇武書曰男兒生以不成名死則葬蠻夷中也自丁酉至徳二載至巳亥乾元二年為三年也長安卿相多少年富貴應須致身早古詩致身青雲上山中儒生舊相識但話宿昔傷懷抱趙云宿昔者往日之謂也曹植詩曰歡娯冩懷抱嗚呼七歌兮悄終曲仰視皇天白日速江文通青春速天機素秋馳白日傷時不我留也也趙云未句又變新意以終七歌之義蓋此一日之歌自一歌至七歌歌聲既窮而日晚暮矣前人每言白日西匿白日蹉跑白日晚者多矣右七發同谷縣乾元二年十二月一日自隴右赴劒南紀行賢有不黔突聖有不暖席文子曰墨子無黔突孔子無暖席趙云淮南子修務訓篇曰孔子無黔突墨子無暖席而班孟堅答賓戯曰孔席不暖墨突不黔二書雖孔突墨席墨突孔席之異文而意皆聖賢之不安逸者耳今公詩云賢有不黔突聖有不暖席則主用荅賓戯蓋墨子賢而孔子聖故也舊注引文子曰墨子無黔突孔子不暖席謬撰辭語差排作文子所云且文子周平王時人也豈却稱孔墨事乎況我飢愚人焉能尚安宅聖賢尚不免此吾豈能安宅乎孟子曰仁人之安宅也趙云易云上以厚下安宅詩云其䆒安宅也始來兹山中休駕喜一作嘉地僻奈何廹物累一歲四行役趙云詩父曰嗟予子行役蓋嘗考是年歲在巳亥春三月公回自東都有新安吏潼闗吏新婚别垂老别無家别詩又按唐史是月八日壬申九節度之師潰於相州公夏在華州有夏日歎夏夜歎時秋七月公棄官徃居秦州有寄賈至嚴武詩畧曰舊好腸堪㫁新愁眼欲穿此一秋賦詩至多冬則以十月赴同谷縣有紀行十二首七歌萬丈潭詩今十二月一日又自隴右赴劒南此為一歳之中自東都而趨華而居秦而秦而赴同谷自同谷而赴劒南為四度行役也忡忡去絶境杳杳更逺適停驂龍潭雲迴首白崖石一作虎崖臨岐别數子握手淚再滴江淹樽酒送征人握手淚如霰交情無舊深趙云公於同谷寓居未乆蓋多新交而惜别之情則如故舊之深逺窮老多慘戚平生嬾拙意偶值棲遁跡謝靈運既枉隱淪客亦棲肥遁賢郭景純京華游俠客山林隱遁栖去住與願違趙云嵇康云事與願違仰慙林間翮陶潛遲遲出林翮木皮嶺首路栗亭西尚想鳯凰村季冬携童一作㓜稚辛苦赴蜀門南登木皮嶺艱險不易論汗流被我體祁寒為之暄喻蜀檄流汗相屬書冬祈寒趙云漢書周勃汗流浹背逺岫爭輔佐謝𤣥暉䆫中列逺岫千巖自崩奔雪賦瞻山則千巖俱白謝靈運洲島驟回合圻岸屢崩奔趙云事輔佐言輔佐木皮嶺以見木皮嶺之高也顧愷之云千巖競秀萬壑爭流始知五嶽外别有他山尊趙云亦據其最髙而實道以形容之别無他譏意惟五嶽言尊字則後漢張昶華山碑云山莫尊於嶽澤莫盛於瀆也詩他山之石仰干一作看塞天趙作大明俯入裂厚坤趙云仰千俯入指山而言也若作仰看則看字在人言之又句法凡弱矣塞大明言其髙而蔽塞日之明也記曰大明生於東易曰順而麗乎大明舊注本作塞天明誤矣惟厚坤所以對大明厚坤以易坤厚載物而言之再聞虎豹鬭屢跼風水昏劉安招隱士虎豹闘兮熊罷咆上有廢閣道棧道也摧折如短一云㫁轅下有冬青林今之楩柟也鮑云木名經冬不彫今所在多有之石上走長根西崖特秀發煥若靈芝繁潤聚金碧氣蜀都賦金馬騁先而絶影碧鷄條忽而曜儀清無沙土㾗憶觀崑崙圖一作墟目撃𤣥圃存𤣥圃閬風在崑崙中見淮南子又庾肩吾有從皇太子出𤣥圃詩趙云蓋以崑崙之𤣥圃比木皮嶺也水經曰崑崙其高萬一千里葛仙翁傳曰崑崙一曰𤣥圃一曰閬風此可見取髙以為言矣孔子見温伯雪子目擊而道存對此欲何適黙傷垂老魂陶潛胡為皇皇兮欲何之白沙渡畏途隨長江渡口下絶岸莊子畏途者十殺一人則父子兄弟相戒釋文云險阻道可畏懼也千趙云海賦絶岸丈差池上舟楫杳窕入雲渡陸士衡遺響入雲漢於趙云差池緩進之兒起詩燕燕于飛差池其羽天寒荒野外日暮中流半趙云孔子云天寒既至主父偃云日暮途逺鮑照還都道中云茫然荒野中舉目皆凜素鶡冠子云中流失舡一壺千金我馬向北嘶古詩胡馬嘶北風北趙云言身雖南行而馬尚懷同谷向嘶鳴蓋道實事以形容離同谷之不得已山猿飲相喚水清石礧礧沙白灘漫漫九歌石磊磊兮葛蔓蔓沈休文歸海水漫漫海趙云庾信詩云昏昏如坐霧漫漫如行逈然沈愁辛多病一疏散逈一作翛髙壁抵嶔崟一作岑洪濤越凌亂曹植芝舟越洪濤濤趙云文選云南山鬱嶔崟西都賦云起洪而揚波詩惠連云清波越凌亂臨風獨回首攬轡復三歎王夷甫慨然攬轡古詩一彈再三歎曹子建欲還絶無蹊攬轡正踟蹰趙云范滂登車攬轡左傳置食三歎禮記一唱三歎水㑹渡一云水迴渡山行有常程中夜尚未安微月没已乆崖傾路何難謝靈運崖傾光難留嶼趙云邱希範云崖傾難傍大江動我前洶若溟渤寛謝𤣥暉大江流日夜謝靈運江漲無端倪鮑明逺穿池𩔖溟渤篙師暗理楫歌笑輕波瀾謝靈運理棹遇還期遵渚驚幽烱薛云左太冲呉都賦篙工檝師選自閩禺習御長風狎翫靈胥霜濃木石滑風急一作烈手足寒入舟已千憂陟巘仍萬盤謝靈運入舟陽已微詩陟則在巘髙趙云盤字又倣陸士衡詩仰陟山盤迴眺一作出積水一作石外始知衆星乾逺游令人瘦衰疾慙加餐古詩思君令人老又努力加飡飯謝靈運哀疾當在斯曹子建沈憂令人老又吾得行逺游逺游欲何之趙云屈原有逺游賦飛仙閣土一作出門山行窄微徑縁秋毫一云徑㣲上秋毫孟子明足以察秋毫之末棧雲䦨干峻梯石結構牢見登厯下員外新亭注萬壑欹疎林一作竹積隂帶奔濤趙云顧愷之云萬壑爭流寒日外淡泊長風中怒號莊子風作則萬竅怒號歇鞍在地厎始覺所厯髙往來雜卧止人馬同疲勞趙云句法使苦衆行人馬同時飢浮生有定分飢飽豈可逃歎息謂妻子我何隨汝曹馬援傳吾欲使汝曹聞人過失如聞父母之名五盤五盤雖云險山色佳有餘陶淵明山氣日夕佳仰凌棧道細俯映江木疎漢祖入漢中燒絶棧道地僻無網罟水清至一作反多魚云水至清則無魚公據所見而反用之也班超云水清無大魚好鳥不妄飛野人半巢居禮運夏則居櫓巢王康琚昔聞太平時亦有巢居子新添搜神記巢居知風喜見淳朴俗坦然心神舒新添莊子澆淳散朴有趙云孔安國云坦然明白也左太冲云前寒泉井聊可瑩心神東郊尚格鬭巨猾何時除費誓東郊不開東京賦巨猾間舋趙云指言東京之東郊安史之兵所在公詩前篇屢云矣格闘字出前漢見上注故鄉有弟妹流落隨邱墟曹子建零落隨山邱妹趙云前篇所謂有弟在逺方有在鍾離也成都萬事好豈若歸吾廬古詩客行雖云樂不如早旋歸李白錦城雖云樂不如早還家陶潛吾亦愛吾廬龍門閣清江下龍門絶壁無尺土長風駕髙一作白浪郭景純忝舟浮海底髙浪駕蓬萊謝靈運云晨䇿尋絶壁長風見首篇注趙云言風駕起之浩浩自太古古詩浩浩隂陽移如趙云浩浩水貌音上聲其在水言之醴泉涌而浩浩書浩浩滔天危途中縈盤一云縈盤道仰望垂線縷滑石欹誰鑿謝靈運苔滑誰能歩浮梁裊相拄西京賦峙游極於浮柱陸左公形聳飛棟勢起浮柱目眩隕雜花頭風吹過兩一云過飛雨魏祖讀陳琳檄草頭風自愈生趙云滑石欹浮浮梁之裊皆難行之地故目生眩頭風矣史心亂目眩目之昬眩如見雜花之隕頭或生風如過雨之吹皆言其地險絶而然也目花之義如佛書云空本無華病者妄執吹雨之義如宋齊邱化書有云觀回瀾者頭目自旋或謂正是目或生眩以見雜花之隕頭或生風以因過雨之吹非由地險絶而然審如此則何用承滑石浮梁之下言之而下句𦂳云百年不敢料一墜那得取乎百年不敢料一墜那得取潘安仁人生天地間百年孰能要飽聞一作知經瞿塘足見度大庾瞿塘峽名大庾嶺名而趙云以龍門閣之險峻推言比之也瞿塘峽在巫山之下大庾嶺在䖍州之所也終身厯艱險恐懼從此數易君子以恐懼脩省石櫃閣季冬日已長山晚半天赤蜀道多早花江間饒竒石江淹詩深山多靈草海濱饒竒石石櫃曾波上臨虚蕩髙壁薛云按郭璞江賦迅蜼臨虛以騁巧孤玃登危而雍容招魂娭光眇視目曽波些清暉回羣鷗暝色帶逺客謝靈運山水含清暉又云林壑歛暝色羇栖負幽意感歎向絶跡信甘孱懦嬰不獨凍餒迫優游謝康樂放浪陶彭澤晉謝𤣥暉也陶潛彭澤令以杜正謬𤣥封康樂公是靈運襲其封日與何長瑜等文章賞㑹共為山澤之游詩家稱謝康樂乃靈運非𤣥也以南史考之謝密傳云謝渾為韻語奬勸靈運等日康樂誕通度實有名家韻王籍傳云籍為詩慕謝靈運至其合也殆無愧色時人咸謂康樂之有籍如仲尼之有邱明武陵昭王煜傳云煜與諸王共作短句詩學謝靈運體髙帝曰康樂放蕩作體不辨有首尾安仁士衡深可宗尚簡文與湘東王書云時有効謝康樂裴鴻臚文者抑亦惑焉何者謝客吐言天材出於自然時有不拘是其糟粕亦謂靈運也因是詩注以康樂為謝𤣥故詳辨云吾衰未自由謝爾性有適指康樂與彭澤桔柏渡文州嘉陵二江合流處也東下入渝合通荆門青冥寒江渡駕竹為長橋青冥見首篇注竿濕煙漠漠一云竹竿濕漠漠江永一作水風蕭蕭謝𤣥暉生煙紛漠漠荆軻云風蕭蕭兮易水寒連笮動嫋娜征衣颯飄颻連竹索而為梁謂之笮前漢邛笮之君急流鴇鷁散絶岸黿鼉驕西都賦鶬鴰鷁鶂後趙云郭璞上林賦注曰似鴈無趾也詩鴇羽西轅自兹異東遊不可要髙通荆門路闊㑹滄海潮孤光隠顧盻游子悵寂寥無以洗心胷前登但山椒趙云言我西徃於蜀自此分異而水則東逝而通荆門㑹滄海為不可要挽也馬杜補遺謝惠連詩悲猿響山椒漢武帝李夫人賦息山椒廣雅曰土髙四墮曰山椒廣韻曰山頂也謝莊月賦菊散芳於山椒謝靈運稅鑾登山椒劒門趙云此篇歎地險而惡負固者也不主在徳不在險之義言之何則保有山河闢為一國曰古諸侯則有在徳不在險之義若四海一家統制乎天子則為劔門者特方面之有險處耳正所惡乎負固也張孟陽劒閣銘其所用呉起之言特以引公孫之㓕劉氏之降懲其負固者耳與魏文侯自恃山河之意大不同也世有東溪先生者解杜詩十六篇毎篇為小序而後注解自以為啟杜公之闗鍵而傳于世於此篇小序云劔門勸務徳之恃險也此正惑於吴起之言以為説矣大為非是蓋使守蜀者雖專務乎徳遂能保劔門之險可自為一國乎特以此篇歎地險而惡負固耳惟天有設險劍門一作閣天下壯北有劒門天設之險升趙云易云天險不可也地險山川邱陵也王公設險以守其國以易出處言之則不可升係之天山川邱陵係之地設險係之人令公詩句則參取易中字語以言劔門乃天遁之險也詩句雄壯常如此不必泥其鬭犯也東溪於上句注云險出於自然也於下句注云地險莫能擬也此泥於易而反成不明連山抱西南石角皆北向劔山上石皆北向如拜伏狀門趙云先言地形雖險而趨中原自然之勢觀劔之山雖抱西南而石角北向則有靣内之義豈欲使之僻為一區哉東溪於連山抱西南注云包括異域也於石角皆北嚮云朝上國而不背之也其下句近之而上句所云是何等語乎兩崖崇墉倚刻畫城郭狀蜀都賦金城石郭兼匝中區既麗且崇實號成都固趙云兩崖崇墉倚而下正言其是形勢之地遂使負者恃為險絶欲擅有其珍産之意崇墉言髙崇之垣墉非毛詩崇墉蓋毛詩乃崇國之墉此崇墉即是詩其崇如墉張恊𤣥武館賦云崇墉四匝豐厦詭字多矣如周伯仁云刻畫無鹽譎刻畫一夫怒臨闗一作門百萬未可傍傍一作仰張孟陽劔閣銘一人荷㦸萬夫赼趄趙云此言恃為險絶也其義起於蜀都賦曰一人守隘萬夫莫向故李白蜀道難亦云一夫當闗萬夫莫開然公用於五言則第三字為腰字最為難下非怒字不足以盡之盖其雖險一夫可守而非怒則猶不能為也莊子螳蜋怒其臂以當車轍夫以車轍之隆而䖝臂之怒欲以當之則臨闗以當百萬之師者非以一夫之怒乎此下得怒字好矣珠玉走中原岷峨氣悽愴青城峩眉二山也是趙云岷山在成都之西青城山也峩山在成都之西南峩眉山是也珠玉才走中原而岷峨有惜之之意至於悽愴此重言形勢之地自然為一區而擅其珍産也珠玉之於中原必着走字者按地鏡圗曰玉之千歳者行游諸國後漢孟嘗傳合浦郡不産穀實而海出珠實與交趾比境常通商販貨糴粮食先時宰守多貪穢詭人採求不知紀極珠遂漸徙於交趾郡界嘗為太守革易前弊去珠復還此珠之所謂走也珠玉走中原託言珠玉之自走而向中原其意又有避就之義蓋若石勢皆北向未嘗不面内也其着走字不亦切乎三皇五帝前雞犬莫相放莫一云各自蜀至秦方與中國通又趙云雞與犬相放不收言其混同通達無彼北之間豈分疆界為限隔哉後王尚柔逺職貢道已喪書柔逺能邇伐趙云惟後王函容不加誅故使守者得以跋扈而廢職貢也彼跋扈者自不可制公姑託以後王尚柔逺而不敢斥言王者削弱而不能制之矣至今英雄人髙視見霸王趙云惟其不能制而不修職貢遂使英雄者見霸王特在髙視之閒可以為之於是并吞或割據極力為之而不少讓今一作令并吞與割據極力不相讓趙云此指言劉備及李特於晉元康中隨流人至劔門箕踞四顧太息曰劉禪有如此地而靣縛於人乎遂宻收合七千餘人進攻成都殺刺史趙廞自稱益州牧改元建初謂之并吞與割據是兩件事并吞則欲兼乎鄰壤其字出賈誼過秦論有并吞八荒之心割據則專有乎一方字出陸士衡辨亡論云故遂割據山川跨制荆呉吾將罪真宰意欲鏟疊嶂海賦鏟臨崖之阜陸趙云莊子若有真宰存焉任彦升云疊嶂易成響恐此復偶然臨風黙惆悵成都自前漢公孫述後漢劉備晉李雄王建孟知祥之屬皆因中原多事恃險割據也趙云未四句則公忠憤之辭矣鹿頭山鹿頭何亭亭是日慰飢渇趙云西都賦之言宫室曰狀迢迢以亭亭陸士衡詩願保金石軀慰妾常飢渇連山西南㫁俯見千里豁自秦入蜀山嶺重複極為險阻及下鹿頭闗東望成都沃野千里葱鬱之氣乃若煙霧靄然游子出京華劔門不可越京華一云咸京薛云按文選張孟陽劔閣銘曰惟蜀之門作固作鎮是曰劔閣壁立萬仭酈元水經注小劔戍北去大劍三十里連山絶險飛閣相連故謂之劔閣及兹阻險盡始喜原野闊殊方昔三分霸氣曽間發天下今一家雲端失雙闕隋書今天下一家華闕雙邈重門洞開又飛升躡雲端又薛云按神異經曰東南有石井其方百丈上有二石闕俠東南面上有蹲熊有榜著闕題曰地户又古樂府仙人篇閶闔正嵯峨雙闕萬丈餘又孫興公游天台賦雙闕雲竦以夾路君趙云先聖本紀許由欲觀帝意曰帝坐華堂面雙闗之榮願亦得矣失雙闕則以天下既一家也失字鮑照詩霧失交河城之失悠然想揚馬繼起名硉兀左太冲作蜀都賦江漢炳靈世載其英鬱若相如皭若君平王褒暐煜而秀發揚雄含章而挺生揚揚雄馬馬相如趙云以二人文章之祖故思之耳有文令人傷何處埋爾骨紆餘脂膏地慘澹豪俠窟蜀都賦外負銅梁於宕渠内函要害以膏腴迃趙云上林賦曰紆餘透邐而陸士衡曰山澤紛餘脂膏事東觀漢記孔奮字伯魚為姑臧長時天下亂河西獨安姑臧長居數月輒致資産奮在姑臧四年財物不増唯老母妻子但菜食或謂奮曰置脂膏中亦不能自潤成都富饒之地故公指為脂膏也仗鉞非老臣宣風豈專達趙云許靖傳昔營邱翼周狄鉞專征專達言宣天子之風而非專自巳之所為也周禮曰大事則從其長小事則專達冀公僕射裴冕柱石姿論道邦國活趙云前漢辛慶忌任國柱石曰延年謂霍光曰將軍為國注石書三公論道周禮坐而論道師云上句言杖鉞方面非耆舊以宣風行化豈能專達皆美裴也斯人亦何幸公鎮踰歳月趙云言裴公為尹尚有歳月之期此斯人之所以幸也以見杜公初來成都非為嚴武而來成都府趙云樂史家宇記載成都縣漢舊縣以周文王從梁山止歧山一年成邑三年成都因名之又云蜀王據有巴蜀之地本治廣都樊郷徙居成都秦惠王遣張儀司馬錯定蜀因築成都而縣之翳翳桑榆日照我征衣裳歸去來景翳翳以將入東觀記收之桑榆江淹曽是迫桑榆桑趙云桑榆記日也淮南子曰西垂景在於樹端謂之榆光武云失之東隅收之桑榆翳翳則晚日之狀阮嗣宗詠懐詩曰灼灼西隤日餘光照我衣我行山川異忽在天一方趙云古詩各在天一方詩我行其野晉書風景不殊舉目有山河之異但逢新人民未卜見故鄉曹子建不見舊耆老但覩新少年山川阻逺别後㑹日月長大江東流去一作從東來游子去日長謝𤣥暉大江流日夜短歌行去日苦長巳趙云大江指言岷江從東來而日去不亦猶游子之日去未有巳期曽城填華屋季冬樹木蒼西都賦闐城溢郭旁流百㕓曹子建生存華屋處西都賦靈草冬榮神木叢生東京賦脩竹冬青蜀都賦寒卉冬馥髙唐𤣥木冬榮趙云曽城層起之城淮南子崑崙山上有曽城九重華屋字史記平原君傳㰱血於華屋之下前於發同谷縣題下公自注云乾元二年十二月一日隴右赴劔南紀行而今詩云季冬樹木蒼則至城都乃是月也元枯中胡資政守蜀作草堂詩文碑引先生至成都月日不可考蓋不詳此也喧然名都㑹吹簫間笙篁曹子建名都多妖女京洛出少年詩吹笙皷篁薛云前漢志勃碣之間一都㑹也信美無與適側身望川梁王仲宣登樓賦雖信美而非吾土兮曽何足以少留四愁詩側身西望涕沾裳鳥雀夜各歸中原杳茫茫趙云觀衆舄識巢而夜歸乃思其中原故鄉之地而不得返也初月出不髙衆星尚爭光自古有羇旅我何苦哀傷鮑明逺古來共如此非君獨撫膺長門賦衆雞鳴而愁予兮起視月之精光觀衆星之行列兮卑􅄧出於東方九辨云仰明月而大息歩列星而極明樹杜補遺是詩子美寓意深矣淮南子云日西垂景在端謂之槡榆也詩曰桑榆之景理無逺照今也日薄桑榆而其光翳翳止足照我衣裳則不能逺照矣以喻明皇播越傳位肅宗以太上皇居西内則不能照臨天下也將旦隂伏月明星稀今也衆星與初月爭光蓋以初月之出不髙不能中天而兼照故也以喻肅宗即位未久禄山雖巳殄滅而史思明之徒尚在也蓋肅宗即位於天寳之丁酉而子美乾元庚子至成都以其時考之故知其寓意如此趙云謂杜公方以鳥雀夜歸而歎不得返中原之次却説及肅宗甚無謂也觀末句所云止自感歎而巳九家集注杜詩巻六
