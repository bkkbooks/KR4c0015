body:
  text: 九家集注杜詩卷二十五宋郭知達編近體詩送梓州李使君之任公自注故陳拾遺射洪人也篇未有云洙曰拾遺陳子昻常為縣令假簡收繫憂憤死獄中射共梓州之屬縣也籍甚黃丞相能名自𨽻川近看除刺史還喜得吾賢五馬何時到雙魚會早傳老思笻竹杖冬要錦衾眠不作臨岐恨唯聽舉最先火雲揮汗日山驛醒心泉遇害陳公殞于今蜀道憐君行射洪縣為我一潸然洙曰漢黃霸為穎川太守治為天下第一後代丙吉為丞相趙曰漢官儀太守五馬蓋天子六馬而諸侯五馬也古樂府客從逺方來遺我雙鯉魚呼兒烹鯉魚中有尺素書笻竹與錦皆蜀中我出公從李使君求此二物也洙曰京房傳舉最當遷徙以課最被舉王閬州筵奉酬十一舅惜别之作萬壑樹聲滿千崖秋氣高浮舟出郡郭别酒寄江濤良會不復久此生何太勞窮愁但有骨羣盜尚如毛吾舅惜分手使君寒贈袍沙頭暮黃鶴失似亦哀號後山詩話杜牧云南山與秋色氣勢兩相高最為絶而子美才用一句云千崖秋氣高語益工鶴曰時吐蕃黨項與僕固懷恩之亂方殷故有羣盜尚如毛之句閬州奉送二十四舅使自京赴任青城鶴曰青城縣屬蜀州聞道王喬寫名因太史傳如何碧雞使把詔紫微天秦嶺愁馬涪江醉泛船青城漫汚雜吾舅意淒然洙曰漢王喬為葉令每朔望自縣詣臺朝明帝怪其來數令太史伺望之言其臨至有雙鳬飛來於是舉羅張之得一隻寫焉定功曰漢書方士言益州有金馬碧雞可祭祀致也宣帝使王褒往祀焉鄭曰秦嶺在秦州之東放船送客蒼溪縣山寒雨不開直愁騎馬滑故作泛舟回青惜峯巒過黃知橘柚來江流大自在坐穩興悠哉鮑曰唐志蒼溪縣屬閬州葛常之曰五言律詩於對聨中十字作一意詩家謂之十字格如老杜放船詩云直愁騎馬滑故作泛舟回對兩詩云不愁巴道路恐失漢旌旗江月詩云天邊長作客老去一沾巾是也鮑曰青惜峯巒過黃知橘柚來舟行湍移景物如畫雖速而不言速也吳子良荆溪林下偶談錢起云山來指樵火峯去惜花林不若子美青惜峯巒過黃知橘柚來奉待嚴大夫鶴曰按唐紀上元二年建丑月以嚴武為成都君今公待其至詩云不知旌節隔年回乃次年正月也又按舊史武出為錦州刺史劒南東川節度使兼御史中丞上皇誥以劒南兩川合為一拜武成都尹兼御史大夫充劒南節度此當在乾元二年裴冕為尹之前蓋上皇以上元元年七月移居西內已不復預國事矣武嘗三鎮蜀在乾元裴冕之前為一是年為二廣德二年表公為參謀時為三也寶應元年成都作殊方又喜故人來重鎮還須濟世才常怪偏禆終日待不知旌節隔年回欲辭巴徼啼鶯合逺下荆門去蠲催身老時危思會面一生襟袍向誰開洙曰偏裨謂諸將校也希曰偏碑字見漢書馮奉世傳趙曰淮南子注蠲大鳥也畫其象著船首以禦水患夢弼曰公聞嚴武至欲辭蜀之巴峽下楚之荆門以迓之也奉寄高常侍鶴曰高適為西川節度禦吐蕃師出無功亡松維等州以嚴武代還用為刑部侍郎左散騎常侍汶上相逢年頗多飛騰無那故人何總戎楚蜀應全未方駕曹劉不啻過今日朝廷須汲黯中原將帥憶廉頗天涯春色催遲暮别淚遙添錦水波洙曰地理志汶水出泰山菜蕪蜀亦有汶川出西山趙云高適先除淮南節度後為西川節度故言總戎楚蜀修可曰方駕並駕也與方舟之方同廣絶交論遒文麗藻方駕曹公言曹劉乃曹植劉楨也洙曰不啻猶過多也家語何翅惠哉漢書汲黯在朝淮南寢謀言黯之材足以折衝千里也史記廉頗趙之良將也漢文帝嘗嘆曰吾獨不得廉頗李牧為將豈憂胸奴哉奉寄章十待御公自注時初罷梓州刺史東川留後將赴朝廷鶴曰按唐史是年嚴再鎮蜀因小忿召梓州刺史章彛殺之公是詩卻言其罷梓州將赴朝廷豈非將行時為武所殺又按彛去年夏方守梓未應得代當是其時欲入奏也淮海惟揚一俟人金章紫綬照青春指麾能事回天地訓練強兵動鬼神湘西不得歸關羽此人所諱者河內猶宜借冦恂朝觀從容問幽側勿云江漢有垂綸來曰章彛揚州人趙曰指麾所能之事雖天地亦可回誇大言之歐公曰時假子璋反章討平之故云洙曰蜀將關羽字雲長先生收江南諸郡拜羽為襄陽太守蕩冦將軍駐江北先主西定益州拜羽督荆州事後漢冦恂字子翼光武收河內拜恂為太守俊移頴川又移汝南太守頴川盜賦羣起內駕南征恂從至頴川盜賊悉降百姓遮道曰願從陛下復借冦君一年乃留恂黃曰美章彛善守東川恐如關羽冦恂不得去也希曰文選沈約恩幸論明揚幽側惟才是與朝曰江漢垂綸公自言也將赴荆南寄别李劒州弟鶴曰公仕蜀連往來梓閬間將欲出峽遊荆楚後竟不果使君高義驅今古寥落三年坐劒州但見文翁能化俗焉知李廣未封侯路經灧澦雙蓬鬢天入滄浪一釣舟語特悽愴戎馬相逢更何日春風回首仲宣樓洙曰前漢循吏傳文翁為為蜀郡太守仁愛好教化見蜀地僻陋有蠻夷風乃選郡縣小吏開敏有材者遣詣京師受業博士數嵗皆成就還歸文翁又修起學宫於成都市中招下縣子弟以為學宫弟子繇是大化文翁終於蜀吏民為立祠堂嵗時祭祀不絶至今巴蜀好文雅文翁之化也李廣傳廣弟子蔡俱為俱為郎蔡積功武帝封為樂安侯廣不得爵邑官不過九卿為之軍士及士卒或取封侯廣嘗與望氣王朔言之朔曰將軍自念豈嘗有恨者乎廣曰吾為隴西守羌嘗反吾誘降者八百餘人詐而同日殺之至今恨獨此事朔曰禍莫於殺已降此乃將軍之所以不得侯者也趙曰灧澦堆在巫峽之口滄浪則漁父所歌滄浪之水在楚地公時欲南下也洙曰魏王粲字仲宣以西京擾亂乃之荆州依劉表嘗登城樓作賦故云仲宣樓奉寄别馬巴州公自注時甫除京兆功曹在東川鶴曰按公傳云公流落劒南結廬成都西郭召補京兆功曹參軍不至會嚴武節度劒南東西川往依焉又按唐紀云上元二年建丑月以嚴為成都尹尹以是知公之除功曹在是年冬也時草堂方成道路多梗而嚴武又來是以不赴也勳業終歸馬伏波功曹非復漢蕭何扁舟繫纜沙邊久南國浮雲水上多獨把魚竿終逺去難隨鳥翼一相過知君未愛春湖色興在驪駒白玉珂謂不能就別知必為我來也春湖豈所居或巴州景物也少洙曰馬伏波謂馬巴州也蕭何公自謂也後漢馬援有大志以功名自許封伏波將軍修可曰劉貞父詩話云杜詩功曹非復漢蕭何按曹參嘗為功曹非蕭何也王定國云高祖紀何為主吏孟康注曰吾蕭何守會稽父之言誤矣二説皆非按吳志虞翻為孫䇿功曹䇿曰孤有征討事未得還府鄉復以功曹為吾蕭何守會稽耳洙曰前漢王式傳注驪駒逸詩篇名也見大戴禮客欲去歌之其辭云驪駒在門僕夫具存驪駒在路僕夫整駕珂者馬勒飾也泛江方舟不用楫極目總無波長日容杯酒深江淨綺羅亂離還奏樂飄泊且聽歌故國流清渭如今花正多趙云方舟並船也字出爾雅觀曰曰深紅淨綺羅言江花色淨如綺羅也夢弼曰未句公思長安之景物也陪王使君晦日泛江就黃家亭子二首鶴曰王使君謂閬州守也唐以正月晦日為令節山豁何時斷江平不肯流稍知花改岸始驗鳥隨舟結束多紅粉歡娛恨白頭非君愛人客晦日更添愁有徑金沙軟無人碧草芳野畦連蛺蝶江檻俯鴛鴦日晚煙花亂風生錦繡香不須吹急管衰老昜悲傷南征春岸桃花水雲帆楓樹林偷生長避地適逺更霑襟老病南征日君恩北望心百年歌自苦未見有知音此等不忍再讀久客羈旅知交態淹留見俗情衰顔聊自哂小吏最相輕去國哀王粲傷時哭賈生狐狸何足道豺虎正縱橫洙曰漢書翟公書其門曰一貧一富乃知交態漢末西京擾亂王粲去而依劉表於荆州賈誼文帝時上政事疏云可為痛哭者一張綱傳豺狼當路安問狐狸春逺肅肅花絮晚菲菲紅素輕日長唯鳥雀春逺獨柴荆語近而去數有關中亂何曽劒外清故鄉歸不得地入亞夫營鶴曰按史是年雖蕃雖退而二月黨項羌冦京兆之富平縣故云數有關中亂趙曰亞夫營在長安公之故鄉也漢文帝時周亞夫軍細栁以備胡暮寒霧隱平郊樹風含廣岸波沉沉春色靜慘慘暮寒多戍鼓猶長擊林鶯遂不歌忽思高宴會朱袖拂雲和洙曰周禮大司樂奏雲和之琴瑟注雲和地名以其産良材而中為琴瑟也愁坐高齋常見野愁坐更臨門十月山寒重孤城水氣昏葭萌氏種逈左簷犬戎屯終日憂奔走歸期未敢論鮑曰葭萌屬利州見唐志在簷當作武簷見成都記雙燕禹稱曰此詩子美托物比已意鶴曰公有意於出峽旅食驚雙燕銜泥入此堂應同避燥濕自喻且復過炎涼養子風塵際來時道路長今秋天地在吾亦離殊方夢符曰左傳子罕曰吾儕小人皆有闔廬以避燥濕寒暑百舌十朋曰百舌者反舌能反覆其舌隨百鳥之音春囀夏止百舌來何處重重秪報春知音兼衆語整翮豈多身花密藏難見枝高聽轉新過時如發口君側有讒人山谷曰余讀周書月令云反舌有聲佞人在側乃解老杜百舌詩過時如發口君測有讒人冇句鮑曰按周書月令乃周公時訓也云芒種之日螳蜋生又五日賜始鳴又五日反舌無聲是謂隂息反舌有聲佞人在側地隅江漢山重阻風雲地一隅年年非故物處處是窮途喪亂秦公子悲涼楚大夫平生心已折行路日荒蕪洙曰謝靈運擬魏公子鄴中詩序王粲家本秦州貴公子孫遭亂流寓自傷情多楚大夫屈源宋玉也遊子趙云公時欲南下而尚在巴蜀故是篇有留滯之嘆巴蜀愁難語吳門興杳然九江春草外三峽暮帆前猒就成都卜休為吏部眠蓬萊如可到衰白問羣仙趙云九江三峽正是南下之所厯也洙曰史記嚴君平避世貰卜於成都市中晉書畢卓為吏部郎比舍郎釀熱卓因醉夜至其甕問盜飲之為掌酒者所縛明亘視之乃畢吏部也趙曰公意也厭住成都言休為酒而眠更留滯於此非止南下遊吳而已蓬萊仙山可比到則亦往矣歸夢道路時通塞江山日寂寥偷生惟一老伐叛已三朝紀事有情孰不愛雨急青楓暮雲深黑水遙夢歸歸未得不用楚辭招趙曰楚地多楓此言南下之景黑水在鄂杜之間去長安為近江亭王閬州筵餞蕭遂州離亭非舊國春色是他鄉老畏歌聲短愁從舞曲長二天開寵餞五馬爛生光川路風煙接俱宜下鳳凰洙曰後漢蘇章遷兾州刺史故人為清河太守章行部案其姦賦乃請太守設酒肴陳平生之好太守喜曰人皆有一天我獨有二天師曰閬與遂皆屬蜀道故云川路風煙接昔蕭史跨鳳而去王喬乘雙鳬飛來皆神仙人故風俱宜下鳳凰以美二公不凡也洙曰賈誼賦鳳凰翔于千仞兮覽德輝而下之漢黃霸為穎川太守是時鳳凰神爵數集郡國頴川尤多此以美二公為郡之治效也絶句二首遲日江山麗春風花草香泥融飛燕子沙暖睡鴛鴦富貴氣象江碧鳥逾白山青花欲然今春看又過何日是歸年滕王亭子公自注亭在雲臺觀內王曽典此州夢弼曰滕王元嬰高祖之子也調露年間任閬州刺史在閬州有亭洪州有又有碧落碑君王臺榭枕巴山萬丈丹梯尚可攀春日鶯啼修竹裏仙家犬吠白雲間以亭在觀內故有下句清江碧石傷心麗嫩蘂濃花滿目班人到于今歌出牧來遊此地不知還寂置春山路君王不復行古牆猶竹色虛閣自松聲鳥雀荒村暮雲霞過客情尚思歌吹入千騎把霓旌葉夢得詩話老杜滕王亭子詩云粉牆猶竹色虛閣自松聲若不用猶與自兩字則餘八字凡亭子皆可用不必滕王也此皆工妙至到人力不可及玉臺觀二首公自注滕王造趙曰觀在高處其中有臺號曰有臺也中天積翠玉臺遙上帝高居綘節朝遂有馮夷來擊鼓始知嬴女善吹簫雖是江境語有神􅖿因以觀內有滕王亭子故有鼓簫之句江光隱見黿鼉窘石勢參差烏鵲橋更有紅顔生羽翰翰作去聲今人以為訝未必敢用也便應黃髮老漁樵洙曰列子周穆王築臺號中天之臺漢禮樂志遊閭闔觀玉臺注上帝之所居修可曰顔延年詩攢素既森靄翠亦䓤菁注松柏重布曰積翠洙曰曹曹植洛神賦馮夷鳴鼓女媧清歌馮夷乃何伯列仙傳蕭史教秦女弄玉吹簫作鳯凰鳴嬴秦姓也淮南子鳥散填河成橋而渡織女浩劫因王造平臺訪古遊綵雲簫史駐文字魯恭留又極典重宫闕通羣帝乾坤到十洲水心觀宇人傳有笙鶴時過北山頭趙云道書惟有元始浩之家梁孝王有平臺又以魯恭比滕王也以詩意推之滕王必有文書遺迹在焉洙曰道書中有十洲記皆言神仙境土列仙傳周靈王太子晉好吹笙作鳳鳴嘗乘白鶴駐緱氏山頭渡江春江不可渡二月已風濤舟楫欹斜疾魚龍偃卧高渚花張素錦汀草亂青袍戲問垂綸客悠悠見汝曹喜雨南國旱無雨今朝江出雲入空才漠漠灑逈已紛紛巢燕高飛盡林花潤色分晚來聲不絶應得夜深聞趙曰南國指荆楚也安石曰記云天降時雨山川出雲故可言江出雲也送韋郎司直歸成都竄身來蜀地甫以避難奔走入蜀故言竄身劉公幹贈五官詩余因沈痼疾竄身清漳濵同病得韋郎韋亦避難者故言同病吳越春秋子胥曰子不聞河上歌乎同病相憐同憂相救天下兵戈滿江邊嵗月長别筵花欲暮春日鬢俱蒼一作春鬢色俱蒼為問南溪竹竹一作笋南溪即浣花溪之南也抽稍合過牆公自注余草堂在城都西郭浣花里將赴城都草堂途中有作先寄嚴鄭公五首此詩廣德二年春作嚴武先鎮蜀甫依之武入朝蜀亂甫遂去之梓閣公聞武再鎮蜀故欲復歸草堂也得歸茅屋赴城都真為文翁再剖符真一作直昔文翁為蜀郡太守故以比嚴武也説文符信也漢制以竹長六寸分而相合文帝二年初與郡守為銅虎符竹使符音義曰銅虎符第一至第五發兵遣使至郡合符符合乃聽受之竹使符以竹長五寸鐫刻篆書亦第一至第五符者左留京師以與之之東觀記岸賔士議二千石賔上皆以選出刻符典千里也但使閭閻還揖讓比甫喜復歸得與鄰里相受也敢論松竹久荒蕪此甫不敢以私已之園林久廢不治為念也魚知丙穴由來美由舊作猶後漢郡國志漢中郡汚陽縣西有丙冗酈道元水經丙冗出嘉魚常以二月出十月入水泉懸注魚木冗下還入水冗口向丙故曰丙冗寰宇記興州順政縣東南七千里有大丙山小丙山其崖北有冗方員二丈餘其冗有水澘流士人相傳名丙冗周地圖云其冗向丙因以為名沮水經冗間而遇或謂之大丙水每春三月上旬有魚長八九寸或二三日連綿縱冗出相傳名嘉魚也假成式酉陽雜爼丙冗魚食乳水食之甚溫神農本草亦云嘉魚味甘食之令肥健悅澤此乳冗中小魚常食乳水水所以益人也酒憶郫筒不同沽郫賔彌切一作笙甫思嚴武先待我之厚醉我以郫筒之酒而甫不須沽也成都記郫縣因水得名居人以筒釀酒蜀王佐宇所都華風俗録郫人刳竹之大者傾春釀於筒閉以藕絲苞以焦葉信宿香達於竹外然後斷之以戲俗號郫筒夢弼謂此説非也郫筒乃酒器也郫出大竹土人截以盛酒故號郫筒故故商隱詩云錦石為棊子郫當作酒也五馬舊曽諳小徑甫謂武昔嘗過余之草堂也餘見前注幾回書札待潛夫潛夫甫自比也處處青江帶白蘋爾雅釋草萍之大者曰蘋故園猶得見殘春故園指成都草堂也園或作國雪山斥候無兵馬謂西山之亂靖也錦里逢迎有主人謂嚴武再鎮成都也戰國策田光造燕太子跪而逢迎却行為道休怪兒童延俗客不教鵝鴨惱比鄰比頻脂切近也甫於武有故舊之好而能如此則甫之厚德與夫慎重可見矣習池未覺風流盡況復荆州賞更新武每訪草堂酣飲賦詠故甫自比之習池荆州則以比武之來宴賞復無窮也按晉山簡鎮襄陽諸習氏者荆士豪族有佳園地簡每出戲多於池上輒辭而歸名之曰髙陽池竹寒一作青沙一作水碧浣花溪菱刺藤梢咫尺迷菱一作橘言有留堂之久宜其荒蕪也過客徑須愁出入居人不自解東西解佳買切曉也以蓬蒿之僻也書籖藥裏封蛛網籖千廉切驗也野店山橋送馬啼言橋與店空送馬啼於道中往來而已蓋甫不在草堂故也肯藉荒亭春草色先判一飲醉如泥判普宫切後漢周澤傳澤為太常清潔循行盡敬宗廟常卧病齋宫其妻關問所苦澤怒以妻干犯齋禁遂收言獄時人為之語曰生世不諧作太常妻一嵗三百六十日三百五十九日齋一日不齊醉如泥余按禆官小説南海有蟲無骨名曰泥在水中則活失水則醉如一塊泥然常苦沙崩損藥欄也從江檻落風湍新松恨不高千尺新松甫指手植四松也按集有四松寺云霜骨不甚長史也惡竹應須斬萬竿甫歸故林竹之惡者斫之護其新美者按集有詩曰今晨去千竿又曰步堞萬竹疏是也生里祗馮黃閣老甫言生計皆仰于嚴武也國史補兩省相呼為閣老衰顔欲赴紫金丹丹陽抱陽山人大藥證煉粉為鉛化汞為塵自然伏火去鉛取丹更入華池還源反色再入神室更養火六十日成紫金火丹若人服食化腸為筋變髓凝骨自然不死三年奔走空皮骨信有人間行路難古詩有行路難篇錦官城西生事微或作里王荆公作錦公宫生事城西微甫言薄有常座也烏皮几在還思歸謂以烏皮為几也謝眺詠烏皮隱几詩蟠木疲生附枝雕刻豈無施曲躬奉微用耶承終宴昔去為憂亂兵入今來已恐鄰人非恐經亂離而人物變易也側身天地更懷古回首風塵甘息機甫言厭奔走也共説總戎雲鳥陳總戎謂嚴武為元師也太公六韜曰既以被山而處必為雲鳥之陳隂備備又曰以車騎分為為雲鳥之陳所謂鳥雲者鳥散而雲飛變化無窮者也不妨遊子芰荷衣遊子甫自謂也甫欲參軍謀不妨吾逸態而衣芰荷之衣也屈原離騷篇製芰荷以為衣集芙蓉以為裳别房太尉墓閬州太守召房琯字次律河南人常與嚴武等交結貶邠州刺史上元元年為漢州刺史寶應二年拜刑部尚書在路遇疾廣德六年卒於閬州僧舍年六十七也按唐書上皇入蜀琯建議請分諸王鎮天下其後賀蘭進明以此讒之肅宗琯坐是卒廢不專以陳陶敗之也司空圖房太尉漢中詩曰物望傾心久渠破膽頻注謂祿山初見分鎮詔書拊膺嘆曰吾不得天下矣圖博學多聞嘗謂朝廷且修史其言必有自來今唐書不載此語惜哉不為一白之也他鄉復行役駐馬别孤墳近淚無乾土言淚多而濕之也低空有斷雲對碁陪謝傅甫自言昔嘗對房太尉圍碁如陪謝安石也晉謝安字安石薨贈太傅初符堅入冦諸將退敗堅以于淮肥加安征討大都督姪謝玄入問計安指受將帥各當其任玄等既破堅有驛書至安方對客圍碁看書既競使攝於床上了無喜色碁如故把劒覔徐君把劒甫以季札自比將欲挂之於房太尉之基出劉向新序延陵季子西聘晉帶寶劒以過徐君徐君觀劒不言而色欲之季子有上國之使而未獻也其心許之致使於晉反則徐君已死於使以劒帶徐君墓樹而去唯見林花落鶯啼送客聞自閬州領妻子郤赴蜀山行三首鶴曰公出峽之計未遂聞嚴武再鎮成都遂歸草堂汩汩避羣盜悠悠經十年不成向南國復作遊西川物役水虛照魂傷山寂然我生無倚著盡室畏途邊趙云物投水虛照言身為物所役水亦徒相照不得優遊觀賞之也洙曰漢書地注著謂安土也趙曰左傳盡室以行莊子夫畏途者十殺一人則父子兄弟相成也長林偃風色回復意猶迷衫裛翠微潤馬銜青草嘶棧縣斜避石橋斷卻尋溪宛轉語何日兵戈盡飄飄愧老妻洙曰棧謂蜀中閣道也行色遞隱見人煙時有無得高下之趣僕夫穿竹語稚子入雲呼轉石驚魑魅抨弓落狖鼯真供一笑樂似欲慰窮途洙曰莊子車馬有行色趙曰抨披耕切訓彈也洙曰狖猿屬鼯鼠也山館南國晝多霧北風天正寒蘇曰張茂先北風凜冽天色正寒遊子不歸吾心如割雖有尺書吾不能達路危行木杪身逺宿雲端洙曰鮑明逺詩雲端楚山見林表吳岫微山鬼吹燈滅厨人夜語闌趙曰楚詞有山鬼篇此山館乃楚地矣晉傅玄詩厨人進藿茹有酒不盈杯雞鳴問前館世亂敢求安贈王二十四侍御契四十韻往往雖相見飄飄愧此身不關輕紱冕倉頡篇紱綬也説文大夫以上冠也俱是避風塵甫以左拾遺出為華州功曹而遂自罷官若輕紱冕者風塵之警不得不避亂也一别星橋夜華陽地志李水守蜀造橋七上應斗魁七星三移斗柄春以志時也斗杓隨時而指於昏指東則為春矣三移則三年矣春秋運斗樞曰北斗七星第一名天樞第二至第四為魁第五至第七為杓杓即柄也敗亡非赤壁言潼關之敗兩京遂陷其禍酷烈殆非赤壁之比也阮元瑜為曹公作書與孫權曰昔赤壁之役遭罹陵疫氛燒船自還以避惡地非周瑜水軍所能控抑也江之守物盡穀殫無所復據徙民還師又非周瑜所能敗也奔走為黃巾為于偽切黃巾以喻祿山也後漢皇甫嵩傳巨鹿張角十餘年間衆徒十餘萬遂置三十六方方猶將軍號也靈帝中平元年一時俱起皆著黃巾為標幟時人謂之黃巾蜀鄧焉傳涼州逆賊數千人自號黃巾又鄭玄傳會黃巾冦青部避地徐州子去何瀟灑豫指王侍御也余藏異隱淪甫因奔走避寇遂成隱淪非本志也餘詳見前注書成無過鴈言欲寄書而乏使也蘇武傳昭帝即位胸奴與漢和親漢使復至胸奴常惠請其守者與俱得夜見漢使具自陳通教使者謂單于言天子射上林中得鴈足有係帛書言某等在某澤中故范彥龍詩寄書雲中鴈為我西北飛衣故有懸鶉公自敘其貧也荀子子夏貧衣如懸鶉恐懼行裝數數色角反伶俜臨疾頻伶郎丁切俜普丁切失所貌曉鶯工逬淚秋月解傷神春鶯秋月人所賞玩而鶯所工者在於迸人之淚月所解者在於傷人之神則以亂離疾病之所感也會面嗟黧黑李斯傳禹鑿龍門股無肢脛無毛手足時胝面目黧黑含悽話苦辛謝靈運廬陵墓下詩含悽訖廣州古詩坎坷長辛苦是也接輿還入楚言甫自蜀適荆衡故以接輿為比也接輿楚人論語楚狂接輿是也王粲不歸秦自喻不得歸長安之故鄉故又以王粲為比也謝靈運擬魏公鄴公詩序云王粲本秦川貴公子孫遭亂流寓自傷情多詩曰整裝辭秦川秣馬赴楚壤錦里殘丹竈言去錦城之久空殘煉藥之壚矣花溪得釣綸言浣溪之人得我前曰所遺之釣綸矣消中祇自惜消中甫自謂有消渴之病也晚起索誰親索蘇各切謂流索居而無骨肉之親也或謂求索求索之索亦通也伏柱聞周史柱史比王公之為侍御也劉向列仙傳李耳字伯陽陳人也生於殷時為周柱下史好㨾精氣轉為守藏史王康琚詩老聃伏柱史乘槎伏漢臣乘槎豈非美王侍御嘗使吐蕃乎餘見槎上似張騫注內鴛鴻不易狎龍虎未宜馴言王侍御不可得而親近如鴛鴻龍虎之莫能狎馴也古樂府莫狎鴛鴻侶曹植曰嗟龍虎之未馴客即挂冠至交非傾蓋新時王御守守漢州甫自秦亭棄拾遺而來今一見之有如舊相識也晉葛洪挂冠不仕孔叢子孔子與程子相遇於途傾而而語鄒陽傳白頭如新傾蓋如故由來意氣合直使性情真浪迹同生死無心恥賤貧言共遭亂離而為心友真可以託死生而不以甫之貧賤為恥辱者也偶然存蔗芋幸各對松筠粗飯依他日窮愁怪此辰女長裁褐穩長如字男大卷書勻兩聯通義言粗糲之飯依如他日所以窮愁者在乎女長男大則婚嫁之事來相迫矣漰口江如練漰普崩切又普冰切此已下言王侍御之所居也樂史寰宇記李冰擁江作漰曰漰堰在𨗳江縣又云漰口在彭州或云漰口岷江所經謝玄暉詩澄江靜如練蠶崖雪似銀王洙云蠶崖關在西山黃庭堅云蠶崖在茂州帶雪山魯書云蠶崖在松州名園當翠巘巘魚蹇切野棹沒青蘋屢喜王侯宅王侯宅統言王侍御與嚴鄭公也時邀江海人甫自謂常為嚴鄭公王侍御顧遇也追隨不覺晚款曲動彌旬但使芝蘭秀甫期與王侍御心德之芬芳有如芝蘭之秀也易曰同心之言其臭如蘭是也或謂晉謝玄答叔父安曰子弟譬如芝蘭玉樹欲使其生於庭階耳何煩棟宇鄰甫草堂在成都浣花里王侍御所居在𨗳江縣故有是句陶潛答鮑參軍四言詩歡心孔洽棟字惟鄰山陽無俗物言王侍御之門下無俗客也向秀與稽康為竹林之逰經康所居之山陽作思舊賦云濟黃河以泛舟弓經山陽之舊居阮籍謂王戎曰俗物以復來敗人意鄭驛正留賓又以鄭莊比王侍御之禮賢也史記鄭莊為太子舍人嘗置驛馬於長安諸郊請謝賓客夜以繼日出入並鞍馬鮑照鞍鞍馬光照地光輝參席珍儒行儒有席上珍以待聘重遊先主廟先主廟今在南門外更厯少城闉少城張儀所築也石鏡通幽魄蜀王葬其妃徇以石鏡琴臺隱絳唇琴臺乃司馬相如彈琴之所餘並見前注送終惟糞土結愛獨荆榛此兩聯又寓意鄭公之死朋舊凋喪喪今幸寓王侍御禮待之隆可以駐足也置酒高林下觀碁積水濱此聯以下甫自敘其依王侍御也或者又謂此以結下句初以石鏡送終今墓中之人已糞土矣以琴結夫婦之好今則徒生荆棘矣既往之事為可弔則置酒觀碁以遣懷耳區區甘纍趼趼古興切足瘡也莊子百舍重趼而不息稍稍息勞筋網聚粘圓鯽絲繁煮細蓴蓴音純水菜也此聯又言歸浣花草堂之樂也餘見前注長歌敲栁癭癭於郢切謂鐏也瘤也曹植詩我有栁癭瓢是也小睡憑藤輪藤輪謂車也鮑照詩花蔓引藤輪是也農月須知課田家敢忘勤忘無放切浮生難去食良會惜清晨列國兵戈暗今王德教淳要聞除猰㺄猰烏八切㺄勇主切猰㺄獸名喻盜賊也爾雅釋獸猰㺄類貙虎爪食人飛走郭璞注貙大如狗文如貍淮南子本經注猰㺄為害堯使羿殺之萬民皆喜休作畫麒麟但以除猰㺄為心不必志於畫形麒麟閣上也餘見今代麒麟閣注洗眼看輕薄輕薄言交道之不終者甫蓋有激而云耳虛懷任屈伸莫令膠漆地萬古重雷陳甫望王侍御者至甚矣後漢陳重與雷義為友時人語曰膠漆自謂堅不如雷與陳九家集注杜詩卷二十五
