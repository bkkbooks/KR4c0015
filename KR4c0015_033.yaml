body:
  text: 九家集注杜詩卷三十三宋郭知達編近體詩太嵗日趙云元日謂之太嵗日蓋當年太嵗之始日也楚岸行將老巫山坐復春巫山屬夔州楚置巫山郡秦昭三十年伐楚取黔中丕郡是也漢為巫郡今縣北有巫山即楚詞所謂巫山之陽髙丘之阻病多猶是客謀拙竟何人顔延年存沒竟何人􅀈介在明淑閶闔開黃道丘希範侍宴樂逰苑詰且開闔閶馳道開鳯吹離騷吾令帝閽開關矣倚閭闔而望豫曹植閶闔天衢通前漢遊閶闔觀坐臺天門開恢蕩蕩大人賦排閶闔而入帝居楊州戮閶闔開矣涼風奶庾肩吾閶闔九門通衣冠拜紫宸唐韓率為中丞常有所陳必于紫宸殿對百僚而請未嘗詣便殿下柏玉中書郎詩曰躍鱗龍鳯池揮翰紫宸裏榮光懸日月中候曰榮光出河休氣四塞榮光即五色也易係曰懸象著明莫大乎日月南史王摛傳齊永明八年大忽黃色照地王融上金天頌贊曰是非金天所謂光榮武帝大悅前漢翼奉奏封事曰天地設位懸日月布星辰賜與出金銀蜀先主傳取蜀城中金銀錢分賜將士趙云陸機吾將老而為客竟何人而下言朝見賀正矣闔閶上帝門也天子門亦為之閶闔黃道日所行之道而天子之道布黃土于上亦謂之黃道衣冠指言百官紫宸止殿名榮光懸日月則瞻天顔故也周禮以待賜豫與與豫同子虗賦云鍚碧金銀愁寂鴛行斷選鴛鷺之行參差虎穴鄰班超曰不入虎穴不得虎子劉安招隱士憭兮慓虎豹穴吳吕蒙因不探虎穴安得虎子西江元下蜀北斗故臨秦散地逾髙枕王弼曰投戈戈散地涯脫要津天邉梅桞樹相見幾回新趙云公嘗為左拾遺通籍朝見今流落于外故云鴛行斷虎穴鄰則言其在夔州乃與虎穴之相近也公由蜀而欲往荆渚今尚在夔故曰西江元卜蜀則可以乘舟而往矣北斗故臨泰則可以往而不能故自嘆也長安謂北斗城一説又有南斗城蓋以像南斗北斗之形一説長安上直北斗蓋廣雅云北斗樞為雍州今公所用句意蓋上直北斗者也散地指言居夔州是間散之地也逾髙枕則恣意迿越而髙枕言且就北一睡耳脫津則則不在鴛鴛之列也天邉又指夔州公在夔亦三年矣故云幾回新元日示宗武汝啼吾手戰吾笑汝身長處處逢正月迢迢滯逺方飄零還柏酒庾信正旦蒙土賚詩正旦辟惡酒惡酒新年長命林柏葉趙銘至椒花逐頌來兩庾肩吾嵗盡詩云卿用柏葉酒且水幸盤集注崔實四民月令令曰元日進椒柏酒椒是玉衡星精服之令人身輕能走柏是仙樂進酒次次年少者為先先衰病止黎牀管寧家貧坐黎牀欲穿為學不倦趙云上兩句在元日于父子言之可為當體而有情矣手戰則老病也身長則長大也啼笑之事豈非換年而激父子之感乎訓喻青襟子鄭國風青青子矜毛該青領也學子之所服箋云父母在衣純以青也名慙白首即前漢鴻唐以孝著為金中左太沖詠史詩曰馮公豈不諱白招不見招賦詩猶落筆吳質箋曰置酒樂飲賦詩稱觴獻夀更稱觴潘安仁稱萬夀以獻觴不見江東弟髙歌淚數行公自注第五弟豐漂泊江左近無消息趙云青襟子指言宗武詩曰青青子襟蓋童子之服也白首郎公自謂也馮唐老而為郎顔駟亦老而為郎張平子賦云蔚厖眉而郎潛是也逺懷舍弟頴觀等陽翟空知處陽翟屬頴川郡夏禹所受封地荆南近得書積年仍逺别多難不安居江漢春風起氷霜昨夜除雲天猶錯莫花蕚尚蕭疏對酒都疑夢吟詩正憶渠舊時元日會鄉黨羡吾廬陶潛詩吾亦愛吾廬若趙云荆南則觀新所選居也雲天猶錯莫言鴻鴈之飛而失遂花蕚尚蕭疏若言棠棣之花不相並皆以興兄弟之離隔也江漢二水在荆南而會續得觀書迎就當陽居止正月中旬定出三峽自汝到荆府書來數喚吾頌椒添風詠周庾信正旦詩椒花逐頌來禁火卜歡娛荆楚嵗時記去東節一百五日即有疾風甚雨謂之寒食禁火三日琴操晉文公與介子綏俱遁文公復國子綏無所得作龍蛇之歌而隱文公求之不得乃焚山子綏抱木而死文公哀之令人三月五日不得舉火又周舉移書及魏武明罰令陸翽鄴中記並云寒食斷火起于子推琴操所云子綏即子推也又云五月五日與今有異皆因流俗所傳據左傳史記並無介子推被火焚之事案周禮司烜氏仲春以木鐸修火禁于國中注云為季春將出火也今寒食節氣是春之末三月之極然則禁火蓋周之舊制也舟楫因人動形骸用杖扶天旋夔子峽魚復古夔子峽也春近嶽陽湖嶽陽湖在巴陵歡趙云晉劉臻妻元日獻椒花頌禁火卜娛則于寒食必相聚矣發日排南喜傷神散北吁飛鳴還接翅詩棠棣鶺鴒在原又小宛題彼鶺鴒載飛載鳴行序密銜蘆春秋繁露鴈有行列傳云兄弟之齒鴈行淮南子曰鴈從風而飛以愛氣力銜蘆而飛以避繒繳俗薄江山好時危草木蘇馮唐雖晚達終覬在皇都趙云上句言起發之日安排往南而喜次句則神情所傷者北望長安而不得歸也何遜詩云昏鴉接翅飛序以鴈言之也古詩兄弟鴻堆行銜蘆又以言防患難也馮唐公以自比其白首為郎將别巫峽贈南鄉兄瀼西果園四十畝趙云舊本作南鄉兄唯師民瞻本作南卿或南宅南位之卿也苔竹素所好萍蓬無定居木玄虛海賦萍流而蓬轉逺遊長兒子幾地别林廬論語父母在不逺遊列子言穆王肆意逺遊命駕八駿之乘雜蘂紅相對他時錦不如具舟將出峽巡圃念攜鋤正月喧鶯未兹辰放鷁初司馬相如賦浮文蠲揚桂枻注蠲水鳥畫其象于舟首以厭水神淮南曰曰龍舟蠲首天子之乘也雪籬梅可折風榭栁微舒託贈鄉一作卿家有因歌野興疏殘生逗江漢何處狎樵漁趙云果園四十畝而公直舉以贈人此一段美事而古今未嘗揚揄杜公之氣義良可嘆也卿家字公于馬詩云卿家舊賜公有之蓋亦取晉書云卿家自有卿家法之語末句殘生逗江漢則又將透過江漢而去矣送大理封主簿五郎親事不合却赴通州主簿前閬州賢子余與主簿平章鄭氏女子埀欲納采鄭氏伯父京書至女子已許他族親事遂停禁臠去東牀晉謝混孝武帝為晉陵公主求壻謂王珣曰主壻但如劉真長王子敬便足珣對曰謝混雖不及真長不減子敬未幾帝崩袁山松欲以女妻之珣曰卿莫近禁臠初元帝始鎮建鄴公私窘罄每得一豚以為珍膳項下一臠尤美輒以薦帝羣臣未嘗敢食于時呼為禁臠故珣因為戲王羲之傳太尉郤鑒使門生求女壻于王導導令就東廂遍觀子弟門生歸謂鑒曰王氏諸少並佳然聞信至咸自矜持惟一人在東牀坦腹食獨若不聞鑒曰正此佳壻邪訪之乃羲之遂以其女妻之趨庭赴北堂語鯉趨而過庭鄘詩伯兮焉得諼草言樹之背注背北堂也疏背者向背之義婦人所常處者堂也士昏禮云婦洗在北堂注房半之趙云北堂則母堂也風波空逺涉琴瑟幾自注音洎虛張詩常棣妻子好合如鼓瑟琴董仲舒琴瑟不調必解而更張之渥水出騏驥漢武元鼎四年馬生渥窪水中崑山生鳯凰東京賦舞丹穴之鳯凰古趙云葛仙公傳曰崑崙一名積石瑶房夲莊子載老子曰吾聞南方有鳥其名為鳯所居積石千里則崑山可以言生鳯凰矣舊注却是丹冗也矣家誠款款中道許蒼蒼頗為秦晉匹襄二十七年傳趙孟曰晉楚齊秦匹也又秦晉匹也何以卑我從來王謝郎晉江左以王謝為胄族嘗通婚青春動才調白首缺輝光玉潤終孤立晉樂廣人謂之水境女壻衛玠時號玉人故時語曰婦翁氷清女壻玉潤珠光得暗藏漢鄒陽云明月之珠以暗投人于道衆莫不按劒相盻餘寒折花卉恨别滿江鄉趙云禁臠去東床言親事不合也趨庭赴北堂言往通州也珠明得暗藏又以紀封君之美而不投合也末句則所以記别也人日兩篇前五後七董勛問俗禮曰正月一日為雞二日為狗三日為豬四日為羊五日為牛六日為馬七日為人則正旦畫雞于門七日鏤人户上良以此也元日到人日未有不陰時趙云西清詩話云都人劉克窮該典籍嘗與客論云元日至人日未有不陰時人知其一不知其二四百年惟子美與克會耳起就架上取書示客曰此東方朔占書也嵗後八日一日為雞二日為犬三日為豕四日為羊五日為牛六日為馬七日為人八日為穀其日晴主所生之物育陰則災少陵意謂天寶罹亂四方雲擾幅裂人物嵗嵗俱災此春秋書王正月意耶深得古人用心次公謂嵗八日之名董勛問俗禮之書所云載初學記其專指東方朔占書雖亦是矣必謂天寶罹亂嵗嵗俱災則非蓋公作此詩在今嵗大厯三年自天寶十四載祿山之亂抵此凡十三次見春矣豈有嵗嵗正月不晴八日者乎氷雪鶯難至春寒花較遲趙云鶯以氷雪而未至花以春寒而開遲此所以成上兩句之言陰也未有不陰時止言見今所之嵗自一日至七日無一日而不陰爾雲隨白水落風振紫山悲趙云白水蓋水之白色如晉文公云所不與舅氏同心有如白水紫山則公前篇云紫崖奔處黑也莊子云風振海而不能驚也蓬鬢稀疏久無勞比素絲趙云以其稀疏則欲比素絲而不得所以重自傷也右一此日此時人共得一談一笑俗相看樽前柏葉休隨酒見元日示宗武注勝裏金花巧耐寒人日造花勝相遺起于晉代見賈充李夫人曲云像瑞圖金勝之形又像西王母戴勝也嵗時記人日以七種菜為羹剪綵為花勝以相遺或縷金薄為人勝以像瑞圖之形休趙云休隨酒則元日過矣故止柏葉之隨酒也佩劒衝星聊暫拔晉輿服志漢自天子至百官無不佩劒其後唯朝帶斂匣琴流水自須彈早春重引江湖興直道無憂行路難趙云拔佩劒彈匣琴則所以寄其愁也晉書斗牛之間有紫氣雷煥日寶劒之精上徹于天流水則伯牙志在流水而鍾子期曰湯湯哉者也引江湖興則將出峽而往也行路難古曲名言以直道行之無地而不可往故行路為不足憂也已右二江梅梅蘂臘前破梅花年後多絶知春意好最奈客愁何雪樹元同色江風亦自波故園不可見巫岫鬱嵯峨陸機樂府雲山鬱嵯峨潘安仁崇岡鬱嵯峨陸士衡崇山鬱嵯峨趙云江梅者江邊之梅也如在嶺則曰嶺梅在山則曰山梅在野則曰野梅官中所種則曰官梅而後之學者凡見梅便謂之江梅誤矣雪樹則雪中之樹木也庭草趙云隋焬帝善屬文而不欲人出其右為燕歌行羣臣皆以為莫及王胄獨不下帝因以被害帝誦其佳句曰庭草無人隨意緑能復道耶故公取庭草以名題楚草經寒碧庭春入眼濃舊低收葉舉新掩卷牙重步履冝輕過開筵得屢供看花隨節序不敢強為容趙云舊低收葉舉言舊低俯而收斂之葉以春而舉也新掩卷牙重言新掩蔽而韜卷之牙以春而重也句可謂新奇矣開筵得屢供古人以芳草為樂故公詩又曰開筵上日當芳草也然不若春花之尤佳故有末句看花則隨節序而樂之不敢于芳草強為容以為好也大厯三年春白帝城放船出瞿唐峽久居夔府將適江陵漂泊有詩凡四十韻老向巴人裏傳莊十八年巴人伐楚今辭楚塞隅入舟翻不樂解纜獨長吁江文通詩奉義至江漢始知楚塞長謝靈運解纜乃流潮又入舟陽已微趙云巴人則劉璋分三巴以夔為中巴地也不樂長吁則有萍梗流離之傷矣窄轉深啼狖虛隨亂俗鳬石苔凌几杖空翠撲肌膚疊壁排霜劒奔泉濺水珠查冥藤上下濃淡樹榮枯趙云上句則舟轉于峽中之窄處其聞啼狖愈在深處矣次句則舟虛隨泛浴之鳬謂之亂浴則非五一二鳬耳疊壁成霜劒指言鳬山也神女峯娟妙昭君宅有無曲留明怨惜一作别夢盡失歡娛趙云神女峯巫山十二峯中之一言娟妙則以神女之故矣宅有無蓋年嵗久逺不知何在也樂府有昭君怨石季倫所賦明君辭是也夢則楚襄王之夢神女賦曰寐而夢之寤不自識罔兮不樂悵爾失志則失歡娛之謂也擺闔盤渦沸郭璞江賦盤渦谷轉欹斜激浪輸賈誼水激則悍南都賦川瀆則箭馳風疾長輸逺逝風雷纒地脈江賦流風蒸雷海賦驚浪雷奔冰雪曜天衢易何天之衢亨趙云言風雷起於其間冰雪言波浪之色地脈字出蒙恬傳用天衢字則龍躍天衢飛翼天衢坐見天衢也鹿角真走險文十七年傳鄭子家曰小國之事大國也德則其人也不德則其鹿也鋌而走險急何能擇狼頭如跋胡詩狼跋其胡載疐其尾注跋躐也近則躐其胡退則跋其尾一本公自注云鹿角狼頭二灘名惡灘寧變色髙卧負微軀書史全傾撓裝囊半壓濡生涯臨臬兀困于臲卼死地脫斯須趙云語曰變色而作髙卧則事有不測為負微軀矣又似言於髙卧有妨斯乃微軀之負也記云禮不可斯須去聲韓信云置之死地不有平川決焉知衆壑趨乾坤霾漲海雨露洗春蕪鷗鳥牽絲揚驪龍濯錦紆趙云川決一作快決字是蓋孟子云沛然若決河河也乾坤霾漲海則水之渺茫濶逺矣雨露洗春蕪以紀其時鷗鳥牽絲揚羽如絲也驪龍濯錦紆言龍體如錦也驪龍取莊子之語濯錦則成都之江落霞沈緑綺謝玄暉晚望詩餘霞散成綺張景陽詩佳人贈我緑綺琴取此兩字貼之耳殘月壞金樞木玄虛海賦大明鑣轡於金樞之冗注大明月也金樞西方月沒之處冗窟也樞趙云言殘月狀如戶之脫壞也泥笋苞初荻沙茸出小蒲謝靈運詩新蒲含紫茸初篁苞緑籜鴈兒爭水馬燕子逐檣烏薛云本草水馬生水中善行如馬亦謂之海馬之杜補遺水馬蝦類也人趙云船檣上刻為烏形取烏識風燕如逐之此詩著句之巧也絶島容煙霧環洲納曉晡謝靈運詩側徑既窈窕環洲亦玲瓏趙云曉䀯早晚也前聞辨陶牧轉眄拂宜都杜補遺王粲登樓賦北彌陶牧西接昭丘注陶鄉名郊外曰牧備趙云宜都峽州也劉改夷陵為宜都縣郭南幾好路入松滋縣津亭北望孤勞心依憩息朗詠劃昭蘇趙云北望則又懷長安矣禮記蟄蟲昭蘇劃字開豁之意鮑照詩有怯與君劃期公詩又云劃見公子靣也意遣樂還笑衰迷賢與愚飄蕭將素髮秋興賦素髮颯以垂領汩沒聽洪爐王粲傳鼓洪爐以燎毛髮趙云人情厯艱險則悲憂逢平曠則笑樂當是時雖身之老志之衰矣豈復論賢愚哉聽于造物而已禪伯云洪罏上一點雪丘壑曽忘返謝靈運詩昔余遊京華未嘗廢丘壑山林之土往而不能返文章敢自誣此生遭聖代誰分哭窮途顔延年詩途窮能無慟卧疾淹為客蒙恩早厠儒廷爭酬造化王陵靣折廷爭朴直乞去聲江湖趙云次句則公以文自任也阮籍每行至路窮處輒慟哭而返公以其尚可遇合所以言今者卧疾雖淹留于為客而往日蒙恩得厠儒列也廷爭酬造化則又言其為左拾遺時嘗論房琯不宜廢免是謂廷爭以酬君王顧遇之恩朴直乞江湖則肅宗怒貶琯邠州刺史出甫為華州司功屬關輔飢亂棄官之秦州又在同谷遂入蜀今在夔且欲之楚而南是為乞之以江湖矣從人求取曰乞入聲人惠遺之曰乞去聲灔澦險相迫滄浪深可逾浮名尋已已懶計却區區趙云既有江湖之行經過灔澦其險相迫而下矣次句滄浪之水見禹貢漁父歌則在楚地矣舟儒南下故彼雖深而可逾也喜近天皇寺先披古畫圖薛云按渚宮故事云張僧繇避侯景之亂來奔湘東王繹承制拜古將軍僧繇善畫嘗于天皇寺柏堂圖佛像夜有奇光發自屋壁又于堂內圖孔子十哲像湘東記室鮑潤嶽謂曰釋門之內寫素王之容雖神異無方豈可夷夏同貫僧繇笑曰吾誠偶然安知不利于後間者莫曉其意及後滅三教荆楚祠宇莫不毁撤惟天皇寺有宣尼聖像遂為國庠時人嘆其先覺則公所謂古畫圖者應經帝子渚謝玄暉瀟湘帝子遊江淹王徵君詩北渚有帝子蕩漾不可期帝子謂堯女詞同泣舜蒼梧禮舜葬蒼梧之野謝玄暉雲去蒼梧野俄趙云楚詞云帝子降兮北渚帝子謂堯女皇女英也朝士兼戎服君王按湛盧吳越春秋越王允常使歐冶子作名劒五秦客薛燭善相劒楚王取湛盧示之曰善哉銜金鐵之英吐銀錫之精奇氣託靈服此劒可以折衝伐敵人君有逆謀則去之它國允常乃以湛盧獻吳吳公子光弒吳王僚湛盧去如楚趙云夫虞舜不得而見之于是感時世衰亂武士得勢而儒道不行也鮑明逺詩天子按劒怒公詩意以代宗欲自討吐蕃耳旄頭初俶擾漢官儀曰舊選羽林為旄頭被髮先驅晉天文志昴為旄頭胡星也言胡始亂也鶉首麗泥塗晉志自東井十六度至栁八度為鶉首秦之分野屬雍州趙云祿山之叛在天寶十四載書俶擾天紀鶉首麗泥塗此言廣德元年長安陷也左傳使吾子辱在泥塗甲卒身雖貴書生道固殊出塵皆野鶴晉嵇紹若野鶴之在雞羣厯塊匪轅駒王褒云過都越國蹶如厯塊也趙云言遭喪亂則甲卒雖貴矣而書生之道自殊彼書生者其出塵則如野鶴其厯塊則非轅駒伊吕終難降韓彭不易呼趙云伊尹吕望此書生之善用兵者終難降則不肯降志于甲卒之徒也或曰降則天之降才維嶽降神既已死矣終難降生也韓信彭越皆以武夫負氣跋扈難制所以不易呼呼蓋折簡可呼之呼五雲髙太甲六月曠摶扶莊子摶扶搖而上者九萬里去以六月息回首黎元病爭權將帥誅山林託疲薾未必免崎嶇莊子齊物篇薾然疲役而不知其所歸可不哀邪文趙云上兩句難解然以意逆志承上句之下則言人不來武人得勢此賢者之所以隱也京房易飛侯曰視四方常有大雲五色具其下賢人隱高太甲則言雲髙于六甲之上但太甲字未見明出摶者摶聚其風也扶搖者風名也今云摶扶則無義然起于沈佺期移禁司刑詩云散材仍葺厦弱羽遽摶扶而公又取用也言賢材之不得用但回首觀黎元之病而已彼所謂將帥者則爭權而不免于誅皆所以傷之也未句則公之自傷尤深矣謝靈運詩云疲薾慙貞堅巫山縣汾州唐使君十八弟宴别兼諸公攜酒樂相送率題小詩留于屋壁卧病巴東久今年強作歸故人猶逺謫兹日倍多違接宴身兼杖聽歌淚滿衣諸公不相棄勇别借光輝趙云謝玄暉有在郡卧病詩巴東郡今雖是歸州而實夔州一帶也古歌云巴東三峽巫峽長郭璞江賦云巴東之峽夏后疏鑿今年強作歸則公之南下必出陸歸長安也故人猶逺謫指言汾州唐使君矣春夜峽州田侍御長史津亭留宴得筵字北斗三更席西江萬里船杖藜登水榭揮翰宿春天白髮煩多酒明星惜此筵始知雲雨峽忽盡下牢邊趙云西江指蜀江之盡處荆渚是也明星惜此筵言夜將盡而曉則明星行暗矣於是筵終為可惜也髙堂賦云巫山之陽髙丘之阻旦為朝雲暮為行雨此所以謂之雲雨峽峽至下牢而盡則實録也泊松滋江亭紗帽隨鷗鳥扁舟繫此亭江湖深更白松竹逺還一作微青一柱全應近高唐莫再經今宵南極外甘作老人星前志狼星北地有六星曰南極老人老人星在弧南趙云一柱觀名渚宫故事宋臨川王義慶代江夏王鎮江陵于羅公洲上立觀甚大而唯一柱老人星晉天文志曰老人一星常以秋分之旦見于丙春分之夕沒于丁公將盡楚而往故云南極外也徐堅初學記載蘇味道在廣州聞崔馬二御史並拜臺郎作詩尾句云逺從南極外遙仰列星文行次古城店泛江作不揆鄙拙奉呈江陵幕府諸公老年常道路遲日復上川白屋花開裏王莽傳延士下及白屋師古曰白屋謂庶人以白茅覆屋也沈約開花已匝樹孤城麥秀邊宋世家箕子朝周過故殷墟城毁壞生禾黍乃作麥秀之詩濟江元自闊下水不勞牽風蝶勤依漿春鷗懶避船王門高德業鄒陽曰何王之門不可曳長裾俊人乎陸韓卿王門所以貴自古多幕府盛材賢蔡雍薦邊讓于何進曰伏惟幕府初開博選清英行色兼多病莊子云孔子説栁盜跖而歸遇色栁下季曰今者車馬有行蒼茫泛愛前語泛愛衆城趙云公次古蓋春時也馬沂督固守孤城濟江元自闊濟者濟涉之濟至江陵則江闊矣元者本來如此之謂漿所以隱擢者風蝶勤依漿則蝶有欲泊漿上之理王門指言江陵知府乃宗室之王也泛愛言朋友也乘雨入行軍六弟宅曙角凌雲罷春城帶雨長水花分塹弱巢燕得泥忙令弟雄軍佐凡才汚省郎萍漂忍流涕衰颯近中堂趙云凡材汚省郎公為尚書工部員外郎之署而自謙之辭也李尋云汙玉堂宴胡侍御書堂李尚書之芳鄭祕監審同集歸字韻江湖春欲暮牆宇日猶微暗暗書籍滿輕輕花絮微翰林名有素墨客興無違揚雄作長楊賦藉翰林以為主人子墨為客卿以諷今夜文星動吾儕醉不歸漢荀陳德星聚左傳云吾儕小人趙云翰林墨客併言李尚書鄭祕監胡侍御也詩云不醉無歸則醉無猶歸也今云醉不歸則又新語矣書堂飲既夜復邀李尚書下馬月下賦絶句湖水林風相與清殘樽下馬復同傾久拚野鶴如雙鬢遮莫鄰雞下五更趙典傳云大儀鶴髮注白髮顔氏家訓或問一夜五更何所訓答曰漢魏以來謂為甲夜乙夜丙夜丁夜戊夜更經也至四更而已矣趙云庾信竹杖賦云今子老矣鶴髮雞皮蓬頭厯齒野鶴字出嵇紹傳庾肩吾冬曉時鄰雞聲已傳愁人竟不眠遮莫則唐人語遮莫鼕鼕鼓須傾灔灔杯唐人詩也上已日徐司録林園宴集鬢毛埀領白潘安仁秋興賦班鬢彪以承辨素髮颯以埀領花蘂亞枝紅欹倒衰年廢招尋令節同薄衣臨積水吹靣受和風有喜留攀桂劉安招隱士云攀援桂枝聊淹留無勞問轉蓬曹植詩轉蓬離本根袁陽源乃知古時人所以悲轉蓬東趙云文子曰積水成海而魏都賦曰回淵漼積水深都賦云習習和風轉蓬則以喻飄零而攀桂事非在南地則不可用蓋南方多桂故也奉送蘇州李二十五長史丈之任星折台衡地中台星折張華見誅曽為人所憐前漢五行志成帝時歌謡曰故為人所羡今為人所憐貴趙云星折台衡地則李二十五丈父必是台輔人而有此事惜乎無所考公侯終必復左傳公侯之子孫必復其始經術竟相傳韋賢少子玄成復以明經厯位至丞相食德見從事克家何妙年易食舊德或從王事蒙九二子克家曹植表曰終軍以妙年使越潘嶽楊仲武誄子以妙年之秀趙云下句言其自妙年已充家矣一毛生鳯穴南史謝鳯子超宗有文辭作殷淑儀誄帝大嗟賞謂謝莊曰超宗殊有鳯毛梁鍾嶸詩品曰何晏孫楚張翰潘尼詩並得蛇龍片甲鳯凰一毛三尺獻龍泉漢高祖提三尺取天下師問曰三尺劍也越絶書楚王何謂龍泉對曰龍泉狀如登高山臨深淵晉鄭聞此劍求之不得後漢肅宗賜諸尚書劍特以寶劍自為名以尚書韓稜淵深有謀故得楚龍泉項趙云兩句所以此二十五丈也曹子建云舜重瞳子羽亦重瞳子是駑得驥一毛又如云九牛亡一毛山海經云丹冗之山有鳥名鳯凰赤璧浮春暮周瑜敗曹操於鳥林赤璧姑蘇落海邊越絶書曰闔廬起姑蘇臺三年聚材五年乃成高見三百里客間頭最白惆悵此離筵趙云上句則李文船所經之地赤璧在黃州即吳將周瑜敗曹公子此也次旬則李文往任蘇州矣有姑蘇臺故州以得名落海邊則東北去海一百八十里矣暮春江陵送馬大卿公恩命追赴闕下自古求忠孝名家信有之後漢韋彪議曰求忠臣必于孝子之門注孝經緯之文也晉卞壺拒蘇峻戰死三子見父沒相隨赴賊同時見害徵士翟湯聞之歎曰臣死于君子死于父忠孝之道萃于一門孝趙云大卿之父子必有忠事迹惜無所孝也吾賢富才術此道未磷緇論詔磨而不磷涅而不緇謝趙云吾賢指言馬大卿也未磷緇言道之不消亡也靈運云磷緇清清曠疲薾慙貞堅玉府標孤映北山移文高霞孤映霜蹄去不疑趙云穆天子傳羣玉之府莊子云馬蹄可以踐霜雪徹揚音韻徹文選神氣激揚又音聲悽以激揚籍甚衆多推陸賈遊漢庭名聲籍甚注言狼籍甚也梁彥升云客遊梁朝則聲華籍甚潘安應同調謝靈運詩誰謂古今殊異代可同調晉陽秋曰潘陸之徒有文質而宗師不異孫吳亦異時孫武吳起而趙云潘則潘嶽陸則陸機梁張纘别離賦云在百代奚殊雖千年而同調言馬大卿之文孫吳亦異時言特異時而已又相同也言馬大卿之武北辰徵事業南紀赴恩私詩滔滔江漢南國之紀卿月升金掌洪範卿士惟月注卿士各有所掌如月之有别上官儀詩班籍始燕歸金掌露初晞王春度玉墀春秋之文王次春北趙云北宸天子所居曰紫宸而坐也南紀者南方之地聰明卿曰以指言馬大卿也升金掌則以譬其近于顯要金掌者金銅仙人捧露盤之掌也王春度玉墀則言馬大卿春時在天子之玉墀也薰風行應律舜歌南風之薰兮禮八風從律湛露即歌詩詩湛露天子燕諸侯有趙云既于玉墀度過春矣方夏之初即殊恩之命也天意髙難問人情老易悲樽前江漢闊後會且深期趙云天意髙難問學者疑其送行紀贈之詩不應有此句蓋公自嘆其身之老而起此句也後會字孔叢子載子髙遊趙其徒曰未知後會何期屈原有天問暮春陪李尚書李中丞過鄭監湖亭泛舟得過字海內文章伯湖邊意緒多玉樽移晚興古歌辭曰上金殿酌玉樽桂楫帶酣歌春日繁魚鳥江天足芰荷鄭莊賓客地衰白逺來過鄭莊字當時置驛馬長安諸郊請謝賓客夜以繼日趙云文章伯言文章之宗伯也起于王充論衡有云文詞之伯其後唐文藝傳云文章三變而王楊為之伯則併言李尚書李中丞鄭祕監矣曹子建仙人篇曰玉樽盈桂酒梁元帝烏栖曲曰沙棠作船桂為楫湖是鄭監之湖故用鄭莊比之夏日揚長寧宅送崔侍御常正字入京得深字醉酒揚雄宅揚雄有宅一區雄家素貧嗜酒人希至門時有好事者載酒看從逰學升堂子賤琴宓子賤治單父彈琴不下堂而自治不堪埀老鬢還對欲分襟天地西江逺星辰北斗深烏臺俯麟閣御史府中列柏樹常有野鳥棲宿其上麟閣正字所居陳子昻為鄰臺正字長夏白頭吟趙云以飲于揚長寧宅故用揚雄宅事長寧者縣名以揚君為長寧宰故用子賤琴事天地西江逺言江陵送别之處星辰北斗深言長安漢朱博為御史大夫其府中列柏樹常有野烏數十栖宿其上晨去暮來號曰朝夕烏故御史謂之烏臺漢西京未央宫中有麟閣亦藏祕書即揚雄校書之處其後改祕書為麟臺月此也今所謂鳥臺指言崔待御所謂麟閣指言常正字二人者同往故得言鳥臺麟閣之相俯矣長夏白頭吟則言二公之間暇而為此吟耳若以為公自言則語詠不接也和江陵宋大少府暮春雨後同諸公及舍弟宴書齋渥窪汗血種漢武元鼎四年秋馬生渥窪水中作天馬之歌歌曰太一況天馬下霑朱汗沫流赭注大宛馬汗血言汗從前肩髀出如血天上麒麟兒徐陵年數嵗家人㩦見寶志上人志以手摩頂曰天上石麒麟也也趙云二句普美相會諸公才士得神秀孫綽賦天台山嶽之神秀書齋聞爾為陸機文賦序云觀才士之所作棣華晴雨好常棣之華宴兄弟之詩綵服暮春宜老萊子斑衣朋酒日歡會豳七月朋酒斯饗注兩樽曰朋老夫今始知趙云兩句公之真率欲預後會矣然公之意若言朋會之酒而已宇文朝尚書之甥崔彧司業之孫尚書之子重泛鄭監審前湖趙云尚書指言李之芳不著姓尊之也郊扉俗逺長幽寂野水春來更接連趙云顔延年贈王太常詩曰郊扉常晝閉錦席淹留還出浦葛巾欹側未回船樽當霞綺輕初散棹拂荷珠碎却圓趙云謝玄暉餘霞散成綺梁元帝登江州百花亭詩荷珠漾水銀不但習池歸酩酊君看鄭谷去寅緣鄭子真耕于谷山趙云習池事襄陽記不但習池歸酩酊則所以引下句鄭谷也今是鄭監之湖故用鄭谷字比之酩酊字晉書作茗艼寅緣字未見韓退之亦云青壁無路難寅緣夏夜李尚書筵送宇文石首赴縣聮句一首趙云公與李尚書之芳崔司業孫彧送石首知縣宇文朝之作李崔之句亦可預公之社矣愛客尚書重之官宅相賢子美也宇文石首李尚書之外甥故使宅相晉魏舒少孤為外家寧氏所養寧氏起宅相宅者云當出貴甥舒曰當為外氏成此宅相後為公酒香傾坐側帆影駐江邊之芳字趙云題言李尚書筵而句下標之芳則李尚書固是李之芳矣公于後篇又有多病執熱奉懷李尚書而小注之芳兩字尤審矣帆影駐江邊亦自佳句翟表郎官瑞鳬看令宰仙彧里崔司業之孫也漢顯宗曰郎官出宰百蕭廣濟孝子傳蕭芝至孝除尚書郎有雉數十飛鳴車前雨稀雲葉斷夜久燭花偏子美蓋趙云公此兩句新奇矣斷者以言葉之斷落也偏者以言燭銷而花偏也數語欹紗帽高文擲彩箋之芳趙云紗帽大率如今之頭金也興饒行處樂離惜醉中眠彧句趙云公等蓋亦語熱而白道之矣然而不惡也故可預杜公之社單父長多暇河陽實少年子美趙云公之句使縣宰事二單父則宓子賤為單父宰彈琴不下堂而治此所以為長多暇河陽則藩安仁為河陽宰本傳云嶽少以才頴見稱早辟司空太尉府栖遲十年出為河陽令此所以為實少年客居逢自屈為别幾悽然之芳為趙云爾雅曰男子謂姊妹之子出公羊云蓋舅出者是也九家集注杜詩卷三十三
