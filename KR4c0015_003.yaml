body:
  text: 九家集注杜詩卷三宋郭知達編古詩述懷此以下自賊中竄歸鳳翔作舊注晋籍嘗作詠懷詩八十餘篇為世所重去年潼關破妻子膈絶久天寶十五年安䘵山僣號賊犯潼關哥舒翰軍敗退為其帳下執之降賊關門不守上乃謀幸蜀今夏草木長脫身得西走陶淵明詩孟夏草木長按新唐書天子幸蜀甫走避三川肅宗立自鄜川羸服奔行在為賊所得至德元年亡走謁帝鳯翔趙云此萹敘事甚明去年潼關破天寶十五載六月為賊將崔乾祜所破也先是公於五月挈家避地鄜州有髙齊詩及三代觀漲塞蘆子詩即自鄜州挺身附朝庭而逢潼關之敗遂陷賊中既而是月肅宗即位靈武治兵鳯翔公于至德二載夏四月自賊中亡走鳳翔所謂今夏脫身走是也以草木長推之則為四月蓋陶潛詩云孟長草木長是也公既至鳳翔上謁則拜右拾遺焉新書謂甫以天寶十五載七月中避寇寄家三川肅宗立自鄜羸服欲奔行在為賊所得非也麻鞋見天子衣䄂露兩肘朝廷慜生還親故傷老醜涕淚授拾遺流離主恩厚言奔走流離迫于窘困至于麻鞋以見天子露兩肘言衣不完莊子言原憲捉襟而肘見按新書言甫至德二年亡走鳯翔上謁授右遺拾而舊史以為甫謁帝彭原郡至德肅宗年號也趙云王琪云子美之詩詞有近質者如麻鞋見天子垢膩腳不襪之句所謂轉石于千仞之山勢也學者尤效之而過甚逺大者難窺乎琪之說如此麻鞋見天子亦紀實事且見其奔走流離迫于窮困而然耳而王睿作炙軗子有云夏商以草為屩左氏曰非屨也至周以麻為之謂之麻鞋貴賤通著晋永嘉以絲為之宫中嬪妃皆箸之則麻鞋二字亦有所本而後言也柴門雖得去未忍即開口趙云後有詔許至鄜州迎家不不欲遽遭天顔矣寄書問三川不知家在否三川在鄜州按本傳甫寄家三川艱寠彌年孺弱至餓死者比聞同罹禍殺戮到雞狗趙云詩又言去憑逺客寄來為附家書至殺戮到雞狗蓋使曹操征陶謙雖雞狗盡殺也山中有茅屋誰復依户牖摧頺蒼松根地冷骨未朽幾人全性命盡室豈相偶趙云茅屋摧頺于松傍以地冷之故茅雖朽而屋骨未朽他人少有全性命者而吾之室家豈保其相偶聚乎左傳盡室以行嶔崟猛虎場鬱結回我首陸禨飢食猛虎窟也趙云以虎譬賊之暴自寄一封書今已十月後反畏消息來寸心亦何有漢運多中興生平老耽酒凡王室中否而中興謂之中興如周之宣王漢之光武唐之中興是齊桓好酒魏曹植賦曰若耽于觴酌流情縱佚先王所禁君子好失霍光傳昌邑夜飲湛湎於酒師古曰湛讀曰沈又讀曰耽沔荒迷酒也沈思歡㑹處恐作窮獨叟文選有云事出于沈思逼仄行贈畢曜西京賦駢羅逼仄一云傯傯行萹中字亦傯傯逼仄何逼仄我居巷南子巷北可恨鄰里間十日不一見顔色江淹古别離詩願一見顔色不異瓊樹枝後趙云逼仄言巷之隘陋也西京賦駢羅逼仄漢東平王肅宗賜之詔曰數見顔色情重昔時自從官馬送還官行路難行澀如棘古樂府有行路難我貧無乘非無足昔者相遇今不得實不是愛微軀一云慵相訪又非關足無力徒步反愁官長怒此心炯炯君應識周禮正長乃官之長也潘安仁寡婦賦日炯炯而不寢曉來急雨春風顛睡美不聞鐘鼓傳東家駒驢許借我泥滑不敢騎朝天趙云七諌云駕蹇驢而無䇿兮又何路之能極已令請急㑹通籍一云已令把牒還請假阮籍騎驢到郡元帝紀通籍注籍者為二尺竹牒記名字物色懸之宫門省禁相應乃得入也武后時太學生請急后亦省視之不趙云請急請急假也舊注引太學生請急自相干也男兒性命絶可憐焉能終日心一作神拳拳中庸回之為人也得一善則拳拳服膺弗失之矣注拳拳奉持之貌也憶君誦詩神凛然辛夷始花亦已落况我與子非壯年杜補遺本草云陳藏器曰此花江南地暖正月開花北地寒二月開花初發如筆北人呼為木筆花又蜀本圖經云正月二月花似著毛小桃色白而帶紫花落而無于夏抄復著花如小筆此詩云辛夷始花亦已落蓋中春時也趙云言時花之間落所以顯人之易老街頭酒價常苦貴方外酒徒稀醉眠趙云晋書外方司馬欲漢書髙陽酒徒陶潛曰我醉眠也速宜相就飲一斗恰有三百青銅錢宋鮑照行路難且願得志數相就牀頭恆冇沽酒錢功名竹帛非我事存亡貴賤委皇天世訧阮籍謂王戎曰偶得一斗美酒當與君共飲趙云真宗問近臣唐酒價衆莫能對丁晋公獨曰每㪷三百上問何以知丁引此詩以對蓋銅錢蓋銅錢純銅純銅之可貴者時人語張鷟曰有如青銅錢萬選萬中北征後漢班彪更始時避地凉州發長安作北征賦鮑云至德二年公自賊竄歸鳯翔謁帝授左拾遺時公家在鄜州所在冦賊多彌年艱窘孺弱至餓死者有墨制許自省視八月之吉公始北征徒步至三川迎妻子故冇是詩東坡嘗云北征詩識君臣之大體忠義之氣與秋月爭髙可貴也亦趙云班彪自長安避地凉州作北征賦公因所往之方同故借二字為題耳墨制則行正倉猝之間所用也此詩凡七十韻間之士夫言孫莘老嘗謂老杜北征勝韓退之南山詩王平甫以為南山勝北征終不能相服時山谷尚少乃曰若論工巧則北征不及南山若書一代之事以與國風雅頌相為表裏則比征不可無而南山雖不作無害也二公之論遂定又嘗觀宋景文和賈侍中覽北征篇詩有云莫肯念亂小雅怨自然流涕袁安愁則公賦詩之心可見矣皇帝二載秋閏八月初吉杜子將北征蒼茫問家室趙云皇帝肅宗至德二載公自鳯翔歸鄜州此之謂北征也蒼茫荒寂之貌詩小雅二月初吉維時遭艱虞朝野少暇日顧慙恩私被詔許歸蓬蓽時房琯得罪甫上言琯罪細不宜免帝怒詔三司推問甫謝因稱琯宰相子少自樹立有大臣體帝不省録詔放甫歸鄜省家趙云此篇公往鄜州省家之詩以公之詩參唐歷考之公詩前篇曰今夏草木長脫身得西走乃至德二載四月也麻篇公往鄜州省家之詩遺則繼此便有除命也房琯罷相在是年五月丁已則甫論琯不宜免正在此五月也按甫傳帝詔詔三司推問宰相張鎬曰甫若抵罪絶言者路帝乃解然自是不甚省録時所在冦奪甫家寓鄜彌年艱窶孺弱至餓死因許甫往省視則公今詩所謂顧慚恩私被詔許歸蓬蓽是也公之救琯在此年之五月時也而王原叔作集記乃云至德二載竄歸鳯翔肅宗明年論房琯不宜罷相出為孳州功曹所謂明年乃乾元元年也其比甫本傳差謬如此故因是詩辨之拜一作奉辭詣闕下一云閣門沐惕久未出雖乏諫諍姿恐君有遺失言諌免琯不趙君甫既得往而忍輕去其君尚恐君又有過舉而當諫諍之君誠中興主經緯固密勿東胡反未已臣甫憤所切東胡祿山也憤其亂也言趙云中興主指言肅宗也密勿詩雖大臣之事而公今所云則以肅宗之於經緯固自慎密也東胡指言安慶緒也舊注云東胡祿山也大誤蓋至德二載正月乙卯安慶緒已弒其父祿山而襲僞位矣揮涕戀行在天子行幸所在曰行在道途猶恍惚言心憂也乾坤含瘡痍憂虞何時畢靡靡踰阡陌人煙眇蕭瑟靡靡猶遲遲也詩行邁靡靡蕭瑟言人皆避亂無安居者謝惠連西陵遇風詩靡靡即長路古樂府君子行云越陌度阡魏文帝樂府秋風蕭瑟天氣凉所遇多被傷呻吟更流血回首鳯翔縣旌旗晚明滅時肅宗在鳳翔前登寒山重屢得飲馬窟古樂府有飲馬長城窟行邠郊入地底涇水中蕩潏邠州古豳國昔公劉據豳其地開元十三年改豳州為邠州周禮雍州川曰涇渭猛虎立我前蒼崖吼時裂菊垂今秋花石戴一作帶古車轍趙云陵谷遷變石上仍有車轍也青雲動髙興幽事亦可悅山果多瑣細羅生雜橡栗或紅如丹砂或黑于㸃漆雨露之所濡甘苦齊結實言山中草木皆遂其生而人不遑寧止冠趙云或紅如丹砂或黑如㸃漆倣王逸言玉赤如雞黑如純漆之勢也雨露之所濡倣莊子日月之所照霜露之所墜之勢也緬思桃源內益歎身世拙桃源秦俗避亂之所源師云桃源在鼎州內有三洞上曰上源夫人中曰王夫人下曰桃源夫人晋時漁者常往焉趙云桃源在鼎州陶潛有記有詩今因見果實而思之也坡陀望鄜畤谷巖互出沒鄜畤漢武郊祀之所春秋時白狄之地互遞互隱見也趙云正望其家之所在也杜正謬前漢郊祀志秦文公夢黃蛇自天而下屬地其口止于鄜衍文公問史教曰此上帝之徵君祠之于是作鄜畤用三牲郊祀白帝焉以此考之鄜畤乃文公作非漢武也我行已水濵我僕猶木末木末言猶逺也不趙云詩我行其野我僕痛矣左傳云昭王南征復君其問諸水濵張載叙行賦轉木末於北岑鴟鳥一作梟鳴黃桑野鼠拱亂穴夜深經戰一作中場寒月照白骨潼關百萬師往者散何卒遂令半秦民殘害為異物翰以兵二十萬守潼關及其敗也火拔歸仁曰公以二十萬一日覆敗持是安歸遂執以降賊也杜補遺魏文帝與吳質書云元瑜長逝化為異物吳質與太子箋亦云陳阮徐生而今各逝已為異物趙云言民一半為鬼也况我墮胡塵墮一作隨及歸盡華髮甫先陷賊而亡歸趙云其存者於離亂之久見其盡老也經年至茅屋妻子衣百結董先生衣百結慟哭松聲回悲泉共幽咽平生所驕兒顔色勝白雪見耶背面啼垢膩腳不襪趙云見耶背面啼使耶字乃出木蘭詩不聞耶娘喚女聲句中之字垢膩腳不襪王琪以為轉石于千仞山之勢沈佺期被彈詩云窮囚多垢膩左傳褚師襪而登牀前兩小女補綻才過膝海圖折波濤舊繡移曲折天吳及紫鳳天吳水神也杜補遺木𤣥虛海賦天吳乍見而倣佛山海經云朝陽之谷有神曰天吳是為水伯虎身人面八手八足八尾青黃色山海經云丹穴山有鸑鷟鳯之屬也如鳯五色而多紫趙云天吳海圖所盡之物紫鳯所繡之物也顛倒在短一作䄈褐杜正謬當作䄈音竪蓋傳寫之誤也張衡應間曰士有解䄈褐而襲揚子方言曰關西謂䄡䄖短者為䄈褐前漢貢禹䄈褐不完師古曰䄈謂童竪所著之𥜗褐毛布也趙云短褐字長短之短自出班彪云貧者衣短褐又淮南子載寧戚飯牛歌曰短褐單衣適止骭故公前篇用對長纓杜田泥為䄈褐之字非矣戰國䇿墨子見楚王曰今有人於此舍其錦繡鄰有短褐而欲竊之老夫情懷惡嘔吐卧數日一作數日卧嘔泄那無一作能囊中帛救汝寒凛冽粉黛亦解苞衾禱稍羅列瘦妻靣復光癡女頭自櫛學母無不為曉籹隨手抹移時施朱鉛狼藉畫眉濶宋玉登徒子好色賦臣東家之子著粉則太白施朱則太赤趙女剽竊舊人文章而竄首易尾者亦云畫眉濶諺語云宮中好廣眉四方多半額生還對童稚似欲忘飢渴問事競挽鬚誰能即嗔喝翻思在賊愁甘受雜亂聒漢趙云後鄧禹傳父老童稚垂髮戴白滿其車下如元魏成淹曰羔裘𤣥冠不以弔此童稚所知也隋煬帝言薛道衡云輕我童雅桓伊撫箏詠曹子建詩謝安挽其須曰使君于此不凡新歸即慰意生理焉能說至尊尚䝉塵幾日休練卒僖二十四年臧丈仲對曰天子䝉塵在外敢不奔問官守爰趙云宋書徐傳練卒嚴城仰看天色改旁覺妖氣一作氛豁隂風西北來慘淡隨回鶻一作胡紇唐書回鶻列傳云回紇其先胸奴也元魏時號髙車部或曰敕勒訛為藏勒臣于突厥至隋韋紇復叛去自稱回紇回鶻言勇鷙猶鶻然趙云世說載一道人曰風霜固所不論乃先集其慘憺郊邑正自飄瞥林岫便已皓然隋回紇舊正作回鶻當以回紇為正蓋當杜公時未有回鶻之稱至德宗朝而後來請易回鶻言捷鷙猶鶻然凡讀書本末不可不考其王願助順其俗喜馳突送兵五千人時回紇以兵五千助順驅馬一萬匹此輩少為貴四方服勇决所用皆鷹騰破敵如一作如箭疾聖心頗虛佇時議氣欲奪回紇在隋曰韋純其人驍彊初無首長逐水草轉徒善騎射喜盜鈔時趙云言主上雖虛心以待其破賊然議恐畢竟為害所以氣欲奪也伊洛指掌收西京不足拔官軍請罙入蓄鋭伺俱發趙云此正時議以為國家自有恢復中原之理官軍罙入自足破賊不必請用回紇兵也此舉開清徐旋轉略恆碣昊天積霜露正氣有肅殺禍轉亡胡嵗勢成擒胡月隋長孫晟傳曰臣夜望磧北有赤氣長百餘里如雨下垂按兵書名灑血欲滅胸奴宜在今日胡命其能久史思明傳優相謂曰其能久乎皇綱未宜絶趙云但推天數當然與李白胡無人曲所謂太白入月敵可摧旄頭滅履胡之腸涉胡血懸胡青天上埋胡紫塞旁胡無人漢道昌同意蜀志諸葛孔明食少事煩其能久乎憶昨狼狽初事與古先别杜補遺酉陽雜爼云狼狽是兩物前足絶短每行常駕兩狼失則不能動故世言乖者為狼狽姦臣競葅醢祿山之反亦國忠媒蝎之照布傳漢誅梁王彭越盛其醧以遍賜諸侯同惡隨蕩析不聞夏殷衰中自誅褒妲褒似妲己也此言誅楊貴妃也禹鮑云魏泰曰唐人誅馬嵬之事尚矣世所稱者劉錫曰官軍誅佞幸天子捨夭姬白樂天云六軍不發無奈何宛轉蛾眉馬前死此乃歌詠祿山而明皇不得已誅貴妃也豈特不曉文體蓋亦失事君之禮老杜則不然北征詩曰憶昔狼狽初事與古先别姦臣競醢爼同惡隨蕩柝不夏殷衰中自誅褒妲乃明皇鑒夏商之敗悔天悔禍賜妃子死官軍何與焉周漢獲再興宣光果明哲趙云蓋謂古先亦有衰亂而今日與之殊别焉其殊别者何也姦臣如楊國忠既誅其黨又失勢而蕩析矣此與古先别之一也夏殷亦衰矣而褒妲不誅上皇乃能割恩捨愛而詄貴妃此與古先别之二也惟其如此故能如周之再興而有宣王如漢之再興而有光武以言肅宗之能中興也褒姒坦己褒姒成周而用於夏殷句之下此乃公命意痛快因成小誤耳桓桓陳將軍陳將軍𤣥禮也首謀誅貴妃國忠者詩桓桓武王書尚桓桓仗鉞奮忠烈微爾人盡非于今國猶活見二卷實欲邦國活注鉞趙云東城先生詩活有曰北征詩云桓桓陳將軍仗奮忠烈此謂陳元禮也元禮佐𤣥宗平內難又從幸蜀首建誅國忠之䇿舊注雖知為陳元禮妄添注云首謀誅國忠貴妃者按唐書陳元禮傳宿衛宮禁故公謂之曰陳將軍安祿山反謀誅楊國忠間下不克至馬嵬卒誅之又按楊貴妃傳西幸至馬嵬陳元禮等以天下大計誅國忠已死軍不解帝乃使問故曰禍本尚在帝不得已與妃訣引而去縊路祠下則陳將軍特建誅國忠之䇿而已非前建誅貴妃也桓桓陳將軍之句蓋訪盧子諒之言劉琨曰桓桓撫軍之勢也微爾人盡非蓋取微管仲吾其被髮左祍之意言微陳將軍則人至于變易而非矣此又依傍城郭是人民非之語凄凄大同殿寂寞白獸闥都人望翠華佳氣向金闕大同白獸皆禁中宫殿名也司馬相如曰建翠華之旗薛云神異經東北大荒中有金闕髙百丈上有明月珠徑三大光照千里中有金階西北入兩闕中名天門趙云按大同殿在南內興慶宫中勤政殿之北曰大同門其內大同殿此明皇帝所游之地白獸闥考之唐志無此名惟漢未央宫中有白虎門白虎殿豈公借用以為比師大意勸車駕歸長安也是年九月癸卯復京師十月癸亥遣韋見素迎上皇于蜀郡丁卯車駕入長安則公詩不徒言矣園陵固有神掃灑數不缺煌煌太宗業樹立甚宏逹趙云言車駕當歸奉陵寢之掃除也蓋髙祖獻陵在三原太宗昭陵在藍田髙宗乾陵在奉天中宗定陵在富平睿宗橋陵在奉先揮灑數不缺數言禮數也既掃灑原陵當思祖宗創業如太宗貞觀之盛豈復有播遷之事哉樹立建立之謂也昔㑹稽王道子傳言置官亦所多所樹立陸士衡作漢髙祖功臣頌云曲逆宏逹雖止是功臣事而注云宏大也逹通也德業之宏大通逹亦可言君矣得舍弟消息風吹紫荆樹色與春庭暮花落辭故枝風回反無處周景式孝子傳曰古有兄弟出欲分異出門見三荆同株枝業連隂歎曰木猶欣聚况我而殊哉又田真兄弟欲分其夜庭前三荆便枯兄弟歎之却合樹還榮茂公趙云此言初别之時當暮春也古兄弟中事有此故因荆以興焉骨肉恩書重漂泊難相遇猶有淚成河經天復東注世說人問顧長樂哭桓宣武之狀如何曰鼻如廣莫風眼如懸河决聲如振雷破山淚如傾河注海趙云顧凱之云淚如河注海也徒步歸行贈李特進自鳯翔赴鄜州經邠州作趙云李特進嗣業也緣公孫𢎞云自徒步至宰相有此兩字故倚為題明公壯年值時危經濟實藉英雄姿天下英雄惟操與使君趙云晋石苞遷司馬景帝中護軍而宣帝聞苞好色薄行以責帝帝答曰雖細行不足而有經國才略貞亷之士未必能經濟世務國之社稷今若是武定禍亂非公誰趙云魏賀拔軌稱宇文泰曰宇文公文足經國武能定亂鳳翔千官且飽飯衣馬不復能輕肥言公私窘迫且飽而已未能輕肥新添論乘肥馬衣輕裘與朋友共敝之而無憾趙云歎諸公之不如意也乘肥衣輕昔日太平時事以值時危而不復然矣青袍朝士久困者白頭拾遺徒步歸甫歌上于鳳翔受左拾遺歎新添史云白頭如新傾蓋如故趙云重其身之困也人生交契無老少論交何必先同調一作論心謝靈運云誰謂古今殊異代可耳調公趙云交契無老少則與李年嵗必不等也妻子山中哭向天須公櫪上追風驃梁邵陵王啓連驃絶景沃若追風杜拾遺崔豹古今注秦始皇七馬一曰追風廣運云馬黃白色曰驃音毗召切西京雜記文帝九馬四曰逸驃舊唐史太宗十驥六曰麗驃趙云此借馬詩或日遂欲求之也言妻子在鄜州之山中哭望公之歸而今徒步為遲故須公櫪上之馬矣玉華宫趙云宫在坊州宜君縣玉華九成皆公歸鄜之所歷也溪回松風長蒼鼠竄古瓦趙云七發云絶迹兮臨回溪而潘安仁金谷集作有云回溪縈曲阻今倒用之耳不知何王殿遺構絶壁下趙云謝靈運登髙詩最髙頂詩晨䇿尋絶壁此宫在防州宜君縣貞觀二十年太宗所造也初貞觀十三年州廢縣亦省其後以宜君宫復置縣𨽻雍州次年宫成又常赦宜君給復縣人之自玉辜宫苑中遷者後于髙宗永微二年廢之為寺而今詩有云不知何王殿遺構絶壁下何也此蓋詩人之深意也太宗厭禁內煩熱營太和終南之山改曰翠微建宫於終南其後未幾復興玉華之役自二月乙亥遊幸至十一月癸丑而復返太宗創業之主身觀習治之世人費財於營建廢時逸豫于離宫故詩人諱之曰不知何王殿也按徐賢妃傳妃嘗言翠微玉華等宫雖因山藉水無築架之苦而工力和僦不得無煩有道之君以逸逸人無道之君以樂樂身則公之微心可見矣隂房鬼火青壞道哀湍㵼淮南子人血為燐許慎云兵死之血為鬼火燐者鬼火之名書說築傅巖之野注傳氏之巖在虞虢之界通道所經有澗水壞道常使胥靡刑人等護此道天籟真笙竽秋色正瀟灑一作秋氣莊子齊物論子綦曰汝聞地籟而未知天籟子游曰地籟則衆竅是己人籟則比竹是己敢問天籟子綦曰夫吹萬不同而使其自己也杜補遺吳都賦鳴條暢律飛音響亮蓋象琴筑并奏笙竽俱唱李善注曰律謂籟也殷仲文九并詩所謂爽籟驚幽律哀壑扣虗牝是己趙云言游幸之後景物愁絶然也反而言之則遊幸之時其盛可知矣美人為黃土况仍粉黛假當時侍金輿故物獨石馬潘嶽美人居重泉列子粉白黛緑趙云有隨輦而死葬者矣惟公相去之近能知之憂來藉草坐浩歌淚盈把冉冉征途間誰是長年者天台賦藉萋萋之纎草又嗟人生之短期孰長年之能執九成宫武僖元年廢麟遊郡置鄜州有九成宫云隋仁夀宫隋文帝崩于此趙云按樂史寰宇記載在鳳翔府麟游𨽻又按此宫本隋之仁夀宫在鳯翔府麟游縣西五里義寧元年廢唐貞觀五年後置更名九成𨽻之鄜州其宫周垣千八百步麟游于隋曽為郡唐初改曰鄜州按地理志麟游縣其去鳳翔府東北一百一十里麟游郡置鄜州謂改則可謂之廢則不可鄜字應是麟字諸本誤刋耳恐惑學者故為詳之蒼山八百里崖斷如杵臼曾宫慿風逈一作回岌嶪古囊口宋玉風賦夫風生于地起于青蘋之末侵淫溪谷盛怒于土囊之口西京賦狀嵬峩以岌嶪趙云此與玉華宫詩語異而㫖同言乘輿涉逺而冒險易臼杵之利立神扶棟梁鑿翠開户牖魯靈光神靈扶其棟宇其陽産靈芝其隂宿牛斗西都賦其陽則崇山隱天幽林穹谷其隂則冠以九嵕陪以甘泉天台賦蔭牛宿以曜舉趙云其陽其隂字使西都賦雖兩句而盡乎敷陳之勢矣産靈芝以言瑞物所生如漢廟柱生芝宿牛斗以言其髙如登慈恩寺塔有云七星當北户河漢聲西流紛披長松倒揭􅠣怪石走趙云洞簫賦若凱風紛披魯靈光殿賦飛陛揭􅠣緣雲上征哀猿啼一聲客淚迸林藪宜都山川記曰峽中猿鳴至清諸山谷傳其響泠泠不絶音者歌三聲淚霑衣為趙云宫處乎深山之中虞世南所謂冠山抗殿絶壁池者今以其稍不御而岑寂則有愁絶之思矣古歌云猿鳴三聲淚沾裳荒哉隋煬帝製此今頺朽楊素為隋文帝營仁壽宮素規構鴻侈文帝怒曰素為聚怨天下素懼封倫曰毋恐后至當自免既而果然向使國不亡焉為巨唐有齊景公遊牛山北臨其國曰若何去此而死乎晏子曰使賢人若常守則太公有之吾君安得此位而為流涕是不仁也齊侯飲酒樂曰若何晏子曰昔爽鳩氏始居此季萴逢伯陵蒲姑氏太公因之若古無死則爽鳩之樂非君所願得也傳曰不有廢也君何以興雖無新增修尚置官居守巡非瑶水遙跡是雕牆後王元長曲水序夏后兩龍載驅璿臺之上穆王八駿如舞瑶水之隂王母與晏于瑶臺之上也五子之歌峻宇雕墻注雕飾畫也趙云上言因隋以鑒唐也下復申言以針之其去長安則亦逺矣特比周穆王之瑶池為不逺也故言巡非瑶水逺然峻宇雕墻五子之所戒以為未或不亡者而乃可襲其迹之後乎此指言唐襲隋後也玉華宫唐所創建不敢指斥故云不知何王殿今九成宫隋所建當以之為戒故云荒哉惰煬帝我來屬時危仰望嗟歎久天王守太白駐馬更搔首趙兖國傳曰今天白髙深入者勝天王天子也守太白待時而進也白趙云守者狩春秋天王守于河陽榖梁用此字也太山名守之為義正言肅宗在鳯翔也舊注引誤以狩為守以太白山為太白星矣詩靜女篇愛而不見搔首踟蹰羌村三首趙云蔡興宗云至德一載嵗在丁酉秋閏三月奉詔至麟迎家過九成宫徒步行玉華宫北征及此羌村豈在鄜州乃公寄家之地耶當得鄜州圖經考之崢嶸赤雲西日腳下平地楚詞云載赤雲而陵太清西都賦云巖峻崒金石峥嶸注曰崢嶸髙秀也赤趙云此喜言日暮之狀易通卦驗之言雲有曰赤如繒則赤雲亦實道所見耳楚詞云載赤霄而凌太清舊注便改作雲字以附㑹其說矣柴門鳥雀噪歸客一云客子千里至妻孥怪我至驚走還拭淚范彥龍云有客欵柴門詩樂爾妻孥陸賈曰乾鵲噪而行人至世亂遭飄蕩生理偶然遂鄰人滿牆頭感歎亦歔欷歔欷感泣也夜䦨更秉燭相對如夢寐漁隱叢話載冷齊夜話云夜䦨更秉燭相對如夢寐更相秉燭照之恐尚是夢也當作更若使側聲字讀則失其意甚矣又按小說載有人夢主帝所見扇有書字視之則題云夜深更秉燭相對如夢寐初不記憶其為杜詩也覺而悟之乃知杜詩乃在天上人所誦詠矣又劉貢父嘗言詩人諷誦古人詩句在心樍久或不記往往多自為己有不可例以為竊詩如老杜羌村云夜䦨更秉燭相對如夢寐而梅聖俞夜賦云官燭翦更明相看應是夢昭明所選古詩盡短苦夜長何不秉燭游其二晚嵗更偷生還家少歡趣嬌兒不離膝畏我復却去憶昔好追凉趙云晋安王薄晚逐凉詩曰向夕紛喧屏追凉風觀中故繞池邊樹蕭蕭北風徑撫拘煎百慮江淹詩伏枕懷百慮賴知禾黍一作黍秫收已覺糟床注趙云一作黍秝收極是蓋黍與秫所以造酒方與下句相應東坡洋川南園詩有云桑疇雨過羅紈膩飰隴風來餅餌香亦是賴知黍秫收已覺糟床注之意蓋詩人推物理想其事如此如今足斟酌且用慰遲暮薛云離騷經惟草木之零落兮恐佳人之遲暮其三羣雞正一作忽亂呌客至雞鬭爭詩雞鳴驅雞上樹木始聞扣柴荆父老四五人問我久逺行手中各有擕傾榼濁復清徐邈曰酒清者為聖人濁者謂為人酒頌挈榼提壺苦辭酒味薄黍地無人耕兵革既未息兒童盡東征請為父老歌漢祖宴父老歌大風艱難愧深情新添書厥子乃不知稼穡之艱難歌罷仰天歎四座淚縱橫趙云此詩一篇之中賔主既具問答了然故善論詩者以比陶潜詩清晨聞扣門倒裳往自開問子為誰與田父有好懷壺漿逺見候疑我與時乖繿縷茅簷下未足為髙栖一世皆尚同願君汩其泥深感父老言稟氣寡所諧紆轡誠可學違已詎非述且共歡此飲吾駕不可回新安吏王深夫云乾元二年郭子儀等九節度之師圍安慶緒于鄴時不立元帥以中官魚朝恩為觀軍容宣慰使師遂潰于城下諸節度各還本鎮子儀保河南詔留守束都此詩蓋哀出兵之役夫古者有遺將推轂分閫之命今棄師于敵也虐至于無告如詩之所憾其君臣豈不刺哉然子儀猶寬度得衆故卒美焉客行新安道新安地名喧呼聞㸃兵古木蘭詩昨夜見軍帖可汗大㸃兵借問新安吏縣小更無丁府帖一作符昨夜一作日下次選中男行中男絶短小何以守王城肥男有母送瘦男獨伶俜潘安仁寡婦賦少伶俜而偏孤注單孑之貌行趙云此篇㸃集新安之人以戍東都之詩也古猛虎曰少年惶且怖伶俜到他鄉舊注引在後白水暮東流青山猶一作聞哭聲木蘭詩不聞耶娘哭子聲但聞黃河流水鳴濺濺莫使自眼枯收汝淚縱橫眼枯却見骨天地終無情我軍取相州日夕望其平豈意賊難料歸軍星散營時九節度圍相州而師潰也月趙云主德二載九月癸卯復京師十壬子復東京明年改元乾元安慶緒賊復振以相州為成安府九月詔郭子儀率李光弼等九節度兵凡二十萬討慶緒於相州遂圍之明年之三月慶緒求救于史思明王師不利南潰諸節度引還子儀以朔方軍保河南詔留守東都今公師所謂蓋言相州之敗九節度兵各引還也就糧近故壘練卒依舊京掘濠不到水牧馬役亦輕此言子儀保守河陽留守東都趙云子儀留守而所㸃集之丁戌於此也宋書徐爰有云練卒嚴城况乃王師順撫養甚分明送行勿泣血僕射如父兄趙云子儀事上誠御下恕寬厚得人故公有父兄之稱潼關吏王深父云安祿山反哥舒翰以潼關擊賊翰敗祿山遂陷長山其後收復長安頗增設餘險此詩蓋刺非其人則舉關以棄之得其人雖舊險亦足恃孟子所謂地利不如人和也士卒何草草築城長安道大城鐵不如小城萬丈餘薛云潤州圖經城號兊城吳孫權所城杜牧潤州詩城髙鐵瓮橫强弩又世說曰若湯池鐵城無可攻之勢趙云世有號西清詩話者云杜詩如小城萬丈餘大城鐵不如則小城難為髙大城難為堅故也得互相並急此亦可笑小城睥睨也大城欲堅如鐵者此世說所謂若湯池鐵城無可攻之勢而潤州城號鐵甕城之義也若睥睨豈有萬丈之髙乎蓋言其長短耳借聞潼關吏修關還備胡一作築城要我下馬行為我指山隅連雲列戰格飛鳥不能踰胡來但自守豈復憂西都丈人視要處賈誼過秦論良將徑弩守要美之處窄狹容單車艱難奮長㦸千古用一夫李左車云井陘之道車不得方軌騎不得成列胸奴贊厲長㦸徑弩之械劒閣銘一人荷㦸萬夫趑趄蜀都一夫守隘萬夫莫向趙云此篇大意以再修潼關當以哥舒翰戒嚴其所守而已託諸關吏之言則公意以關吏猶能知守之為利廟謨神斷乃不能然哉丈人則託潼關吏呼公之語也言清視要害之處才能容車耳豈不足用乎用一夫亦李白所謂一夫當關萬夫莫開之意何至用百萬以戰而赴之死乎皆所以記關吏之言而傷之也哀哉桃林戰百萬化為魚武成放牛桃林之野注桃林在華山東陸士衡眷言懷桑梓無乃化為魚光武紀决水灌之百萬之衆可使為魚翰趙云易則利戰險則易守持重守險古之良法哥舒逼於君命輕去潼關而戰故敗桃林正言翰進戰之所蓋潼關於唐在華州之華隂桃林於唐乃陜州之靈寶按哥舒翰傳帝使使者督戰翰窘不知所出六月引師而東慟哭出關次靈寶西原與賊將崔乾祐戰由關門七十里道險隘其南薄山阻河既為賊所勝是時軍自相鬪又棄甲而奔陷河死者十一二故有為魚之喻請屬防關將慎勿學哥舒哥舒翰守潼關與賊交戰敗而歸降于賊祿山僞署翰司空諸將光弼等皆為書罪翰不死節為為安祿山所殺石壕吏王深父云驅民之丁壯盡置死地而猶急其老弱雖秦為閭左之戍不甚也嗚呼其時急矣哉暮投石壕石壕地名村有吏夜促人老翁踰墻走老婦出門看吏呼一何怒婦啼一何苦聽婦前致詞趙云應璩老詩有上叟前致辭下叟前致辭又陌上桑云羅敷前致辭三男鄴城戍江淹飛蓋游鄴城王粲歌舞入鄴城魏都也之趙云前年相州役矣一男附書至一作到二男新戰死存者且偷生李陵曰陵豈偷生之士死者長已矣室中更無人惟有乳下孫孫有母未去出入無完裙一作孫母未便出見吏無完裙老嫗力未衰文頴曰幽州及漢中皆謂嫗為媪請從吏夜歸應急河陽役猶得備晨炊史晨炊蓐食夜久語聲絶如聞泣幽咽天明登前途獨與老翁别新婚别王深父云先王之新有婚者期不役政出于刑名則一切便宜而已此詩所必盡其常分而不忘禮義余以是録之兔絲附蓬麻引蔓故不長古詩與君為新婚兔絲附女蘿詩頗者辨與女蘿施于松柏蔦寄生也女蘿兔絲松蘿也陸機疏云兔絲蔓連草也生黃赤如今合藥兔絲子是也本草莬絲在木曰松蘿唐趙云兔絲當附松柏而乃附蓬麻為不得其所矣詩國風有葛生之篇曰葛生䝉楚蘞蔓于野葛生蒙楚蘞蔓于域意以葛與蘞皆蔓生之物施于松柏纍于樛木則得其託矣嫁女與征夫不如棄路傍趙云詩曰侁侁征夫古樂府云觀者滿路傍結髮為妻子蘇子美詩結髮為夫妻恩愛不相疑子趙云結髮始成人也謂男子二十女十五取笄冠為義也席不暖君床孔席不暇暖暮昏晨告别無乃太匆忙君行雖不逺守邊赴一作戍河陽河陽東都也初趙云河陽孟州之縣東都今西京也郭子儀保河陽而被詔留守東都未幾子儀召還賊思明復陷東京於是有河陽之戰舊注河陽東都也大誤妾身未分明何以拜姑嫜薛云前漢廣川王去為幸姬陶望卿作歌曰背尊章嫖以忽顔師古曰尊章猶言舅姑趙云曹子建雜詩云妾身守空閨江淹文古别離云妾身長别離陳琳飲馬長城窟云云善事新姑嫜猶時念我故夫子父母養我時日夜令我藏生女有所歸雞狗一作犬亦得將趙云將字乃百兩將之將蓋多而或百兩微而雞犬皆嫁特所擕物也君今往死地沉痛迫中腸鮑照生軀陷死地謝靈運眷言懷君子沉痛迫中腸韓信置之死地而後生魏文帝詩斷絶我中腸誓欲隨君去形勢反蒼黃北山移文蒼黃反覆勿為新婚念努力事戎行古詩努力加飱飯蘇武詩努力愛春華李陵努力崇明德樂府少壯不努力趙云褚朔鴈門太守歌曰結束事戎車詩元戎十乘以先啓行婦人在軍中兵氣恐不揚薛云李陵與單于戰陵曰士氣少衰而鼓不起者軍中豈有女子乎始軍出時關東羣盜妻徙邊者隨軍為卒妻婦女匿車中搜得陵皆劒斬之吁嗟貧家女久致一作致此羅繻裳羅𥜗不復施淳于髠曰羅繻襟解對君洗紅粧古詩娥娥紅粉粧仰視百鳥飛大小必雙翔人事一作生多錯忤與君永相望趙云宋玉風賦回穴錯忤注云雜錯交互也不施羅繻而洗紅粧言君子行役不反如詩云自伯之東首如飛篷豈無膏沭誰適為容之義也垂老别王深父云軍興之際至於老者亦介胄則又盛于閭左之戍矣四郊一方方未寧靜禮四郊多壘卿大夫之辱也垂老不得安子孫陳亡盡焉用身獨完投杖出門去同行為辛酸幸有牙齒存所悲骨髓乾男兒既介胄長揖别上官左思詩長揖歸田廬酈食其長揖髙祖老妻卧路啼嵗暮衣裳單孰知是死别且復傷其寒此去必不歸還聞勸加餐古詩努力加飱食古辭云上言加飱飯土門壁甚苦杏園度亦難史思明傳光武弼出土門收常山郡郭子儀以朔月蕃漢二萬人自土門而至常山軍威遂振思趙云雖是作此詩時土門杏園設備以待史思明時明已殺安慶緒自立為帝矣與大寶十五載潼關既潰之後思明為安祿山攻土門陷常山時事皆相逺勢異鄴城下縱死時猶寬人生有離合豈擇衰盛一作老端憶昔少壯日遲回竟長歎鮑照臨路獨遲回萬國豈征戍一云東征烽火被岡巒蜀都賦岡巒糾紛盧諶詩岡巒挺茂樹鮑照綘火入咸陽積尸草木腥晋天文志太陵中一星曰積尸明則死人如山流血川原丹楊子川谷流人之血原野厭人之肉何鄉為樂土詩適彼樂土安敢尚盤桓易屯卦初九盤桓利居頁弃絶蓬室居塌然摧肺肝曹植詩哀哉傷肺肝又顧念蓬室士王仲宣喟然傷心肝列子曰北宫子死其蓬室若廣厦之䕃無家别王深父云先王子惠困窮茍推其所不忍達之于其所忍則天下無敗亂之兆矣此詩何作采寂莫天寶後天寶明皇年號也園廬但蒿萊喪亂園廬殘破也我里百一伯萬餘家世亂各東西存者無消息死者為一作委塵泥賤子因陳敗歸來尋舊一作故溪久行見空巷日瘦氣慘悽但聞狐與狸竪毛怒我啼苦寒行熊羆對我蹲虎豹夾路啼言田里荒蕪人跡罕少惟狐狸爾四鄰何所有一二老寡妻四鄰所居之鄰近也人多死于征役所居者惟寡婦耳孟子老而無夫曰寡宿鳥戀本枝安一作敢辭且窮棲人情之戀故鄉如宿鳥之戀本枝也雖窮棲且安敢辭言人情之安土也唐太宗謂太原父老曰飛鳥過故鄉猶躑躅况朕少小所游之鄉里乎王正長人情舊鄉客鳥思棲故林顔延年刻意藉窮棲方春猶荷鋤淘潛雖有荷鋤倦日暮還灌畦縣吏知我至召令習鼓鼙張景陽人間鞞鼓聲雖從本州役盧諶詩昔謂鄉曲譽謬充本州役內顧無所擕近行止一身逺去從轉迷家鄉既蕩盡謝靈運家鄉皆掃盡逺近理亦齊永痛長病母五年委溝溪生我不得力終身兩酸嘶人生無家别何以為蒸黎傷不得養父母夏日歎夏日出東北陵天經中街中街黃道之所經也漢書昴畢為天街趙云天文書蓋以春分秋分日出卯入酉而夏至則出寅入戍冬至則出辰入申以夏至之出寅寅東北之地也中街意言停午也朱光出厚地鬱蒸何由開晋天地志夏至極起而天運近東北斗去人逺日去人近南天氣至故蒸爇也應璩嘗曰處凉臺而有鬱蒸之煩張孟陽朱光馳北陸浮景忽西沈翰曰朱光日也陸士衡功臣知朱光照屋楚詞杲杲朱光上倉久無雷何以號令申易傳當雷不雷陽德弱也郎顗傳雷者號令其德生養號令始廢當生而殺則雷反作其時無嵗趙云言軍令之不時也雨降不濡物良田起黃埃兩以潤之易濡滋也也趙云言彼相之無澤飛鳥苦熱死池魚涸其泥鮑照苦熱行身熱頭且痛鳥難歸去來又曰晨禽不敢飛墮魂尚流冗舉目惟蒿萊至今大河北化作虎與豺言大河之北民皆餓飢相吞如虎也浩蕩想幽薊幽州薊門祿山境也王師安在哉對食亦能飱趙云蔡琰詩曰飢當食兮不能餐其餘我心殊未諧眇然貞觀初難與數子偕君子以為傷今思古之詩夏夜歎永日不可暮劉公幹永日行游戲江淹别賦夏簟清兮晝不暮葛生夏之日冬之夜言冬夜夏日盡夜之長時也炎蒸毒我腸我一作中言熱自自起故毒我腸也安得萬里風飄飄吹我裳趙云陸士衡前緩聲歌云長風萬里舉芳池出華月傅𤣥詩清風何飄飄微月出西方劉休𤣥芳草有華月池趙云江文通擬劉楨詩華月照芳茂林延疏光謝靈運詩林含餘清潘安仁茅屋茂林下竹趙云王羲之蘭亭記有茂林修仲夏苦夜短開軒納微凉謝靈運不怨秋夕長常苦夏夜短虛明見纎毫羽蟲亦飛揚陶潛凉風起將夕夜景湛虛明詩焨耀宵行羽蟲也山谷嘗宿招提月夜見薨薨而游者曰老杜所謂云云信不虛語詩雞鳴云月出之光蟲飛薨薨家語羽蟲三百六十衷情無巨細自適固其常念彼荷戈士詩彼候人兮荷戈與殳窮年守邊疆何由一洗濯執熱互相望言荷戈之士久苦于炎熱但想望而已未能一洗濯也新添詩誰能執熱誓不以濯竟夕擊刁斗喧聲遲萬方李廣傳程不識正部曲行伍營陳擊刁斗至明孟康曰刁斗以銅作鐎受一斗晝炊飯行擊持行名曰刁斗西域傳斥堠土百餘人分夜擊刁斗自守師古曰夜有五更故分擊而持之也青紫雖被體不如早還鄉李白蜀道難云錦城雖云樂不如早還鄉夏侯勝取青紫如俯拾地芥也北城悲笳發鸛鶴號且翔詩鸛鳴于嘻况復煩促倦激烈思時康張茂先詩煩促每有餘蘇子卿詩長歌正激烈留花門鮑云按唐志甘州有留花門山堡東北千里至回鶻御帳是年八月廣平王為元帥以朔方吐蕃回紇諸兵討賊公逆知其害故言麥倒桑折卒曰花門既須留原野轉蕭瑟言其為農桑害也也趙云花門即回紇之别名北門一作方天驕子飽肉氣勇决前漢胸奴傳單于遣使遺漢書曰南有大漢北有强胡胡者天之驕子也又胸奴居北邊君王以下咸食畜肉衣其皮趙云其先胸奴也故公詩皆使丐奴事髙秋馬肥健前漢胸奴傳秋馬肥大㑹蹄林課校人畜計趙充國曰秋髙肥變必起矣李廣以臨平北平盛秋師古曰盛秋馬肥健恐勇為冦也挾矢射漢月詩云既挾我矢四子講德論胸奴業在攻伐事在獵射兒能騎羊走箭飛鏃侯應曰北邊隂山單于依阻其中治作弓矢來去為冦自古以為患贊曰書戒蠻夷猾夏詩云戎狄是膺春秋有道守在四夷久矣夷狄之為患也嚴尤曰丐奴為害所從來久矣講德論曰詩人所歌自古患之詩人厭薄伐周懿王時王室遂衰戎狄交侵詩人疾而歌之曰靡室靡家玁狁之故宣王興師命將征伐詩人美之曰薄伐玁狁至于太原言逐出之修德使其來羈靡固不絶語逺人不服修文德以來之贊曰其慕義貢獻則接之以禮讓羈縻不絶使曲在彼蓋聖王制御蠻夷之常道也揚雄書曰然尚羈縻之計不顓制也應劭漢官儀曰馬白羈牛曰縻言四夷如牛馬之受羈縻也胡為傾國至出入暗金闕中原有驅除隱忍受此物王莽贊曰聖人之驅除云爾蘇林曰王莽為光武驅除也驅逐蠲除以待聖人也公主歌黃鵠西域傳烏孫使使獻馬願得尚漢公主昆弟天子問羣臣計皆曰必先納女然後遣女烏孫以馬千匹聘漢元封中遣江東王建女細君為公主以妻焉賜乘輿服御物為備官屬侍御數百人送甚盛烏孫昆莫以為左夫人胸奴亦遣女妻昆莫以為右夫人公主至其國自治宫室居嵗時再與昆莫會置酒高會以幣帛賜王左右貴人昆莫言老言語不通公主悲愁自為作歌曰吾家嫁我兮天一方逺託異國兮烏孫王穹廬為室兮旃為墻以肉為食兮酪為漿居常土思兮心內傷願為黃鵠衣歸故鄉天子聞而憐之趙云乾元元年肅宗以幼女寧國公主嫁回紇可汗故公云君王指白日詩大車謂豫不信有如皎日皎白也我言之信有如皎然之白日指白日以為信誓盟約連營屯左輔百里見積雪三輔故事馮輔也翊左也左輔馮翊也長㦸鳥休飛哀笳曉幽咽田家最恐懼麥倒桑枝折講德論秋收則奔狐馳兔獲刈則顛倒殪仆驚邉枕士屢犯芻蕘哥舒翰傳吐蕃每至麥熟時即率部衆至積石軍獲取呼為吐蕃麥沙苑臨清渭沙苑馮翊郡界泉香草豐潔渡河不用船千騎常撇烈一云滅沒籍趙云此指回紇留左輔之為害也左輔漢之馮翊郡今之同州在長安之東北故謂之左輔沙苑之地正在馮翊郡界按回紇傳葉護言願留在沙苑臣歸料馬以收苑陽訖除殘盜故公詩言及左輔與沙苑也以長㦸之多故鳥休罷其飛胡人吹笳故其聲幽咽於曉時殘害麥與桑故田夫懼之沙苑之句則留馬而飲齕于此也舊注引哥舒翰傳知是吐蕃事矣不干今詩句事千騎常撇烈則所留之馬如此胡塵踰太行太行山名古詩馳驅太行道也雜種抵京室花門既須留原野轉蕭瑟丘希範書姬漢舊邦無取雜種王深父留花門序云肅宗之復兩京藉回紇之師助焉雖幸成功而朝野更被其毒語曰人無逺慮必有近憂以天子之尊推誠仗順集中國之智力滅一狂賊豈有不足哉不忍須㬰之遲顧引勍虜入于腹心之地卒成危禍其後陸贄賀吐蕃抽軍不助討朱泚亦云塞蘆子王深父序云徹其西備而爭利于東非所以固國者也五城何迢迢沈存中云延州今有五城說者謂舊有東西二城夾河對立髙萬典郡始展南北東三關乃知天寶中有五城謂髙始展非也四鮑云南志延州延昌縣北有蘆子關又夏州注長慶年節度使李祐築鳥延宥州臨塞隂河陶子與塞蘆子蓋五城名也迢迢隔河水邊兵盡東征文六年知秦之不復東征城內空荆杞阮嗣宗詩堂上生荆把思明割懷衛史思明雜種胡人也天寶十四載隨安祿山反河陽懷衛盡陷于賊秀巖西未已髙秀巖哥舒翰麾下將也後為思明僞河東節度使降肅宗回略大荒來山海經曰大荒之中有山名曰大荒之山日月所入是謂大荒之野崤函蓋虛爾項藉贊秦孝公據殽函之同師古崤謂崤山今陜縣東二崤是也函谷今桃林縣南洪溜澗是也虛言其無偹禦爾延州秦北户關防猶可倚焉得一萬匹疾驅塞蘆子岐有薛大夫旁制山賊起岐一作頃近聞昆戎徒為退三百里蘆關振兩寇深意實在此誰能叫帝閽胡行速如鬼時官軍止知東討收復河洛而不知蘆子之可塞公懼有乘隙而起者故有此作瓊杜補遺張衡思𤣥賦曰叫帝閽使闢扉兮覿天皇于宫閽主門者揚雄甘泉賦曰選巫咸使叫帝閽彭衙行趙云春秋文二年晉侯及秦師戰于彭衙杜預云馮翊郃陽縣西北有彭衙城拾郃陽于唐屬同州即馮翊郡也今此詩乃寄彭衙知縣孫公者耳憶昔避賊初北走經險艱夜深彭衙道月照白水山趙云郃陽縣與白水縣正相接皆屬同州也盡室久徒步逢人多厚顔書五子之歌顔厚有忸泥詩云顔之厚矣羞愧之情見于面貌如面皮厚然故以顔厚為色愧云趙云左傳盡室以行參差谷鳥行一作鳴不見遊子還癡女飢隨我啼畏虎狼聞懷中掩其口反側聲愈嗔小兒彊解事故索苦李餐時賊方收録衣冠汚以僞命而避難者方銷晦聲跡故託言女啼而畏虎狼閒也虎狼喻盜賊矣一旬半雷雨泥濘相牽攀既無禦雨一云禦濕備徑滑衣又寒有時經一作最契闊竟日數里間野果充餱糧擊鼓死生契闊契濶勤苦也公劉乃褁餱糧卑枝成屋椽早行石上水暮宿天邊煙少留同家窪欲出蘆子關故人有孫宰髙義薄曽雲陸士衡文髙義薄雲天同家窪蘆子關皆地名也故人故舊之人髙義言其恩義髙逺皆說孫宰宰也旅客已曛黑曛黑薄暮也謝靈運詩夜聽極星闌朝遊窮曛黑張燈啓重門暖湯濯我足剪紙招我魂宋王為屈原招魂從此出妻孥相視涕闌干言淚之墮也趙云談藪載王元景謝劉綽曰卿勿怪我别别後當瀾干闌干者淚連續不斷之貌凡物之不斷皆可云闌干如言北斗橫闌干則光之斷也也苜蓿長闌干則柔而不斷衆雛爛漫睡喚起霑盤飱晋公子重耳過曹曹大夫僖負羈饋盤飱置璧焉公子受飱忘璧趙云爛漫言睡之熟也莊子云性命爛熳注雖云分散逺貌然亦熟爛之意故靈光殿賦云流離爛漫而盧同詩亦云鶯花爛漫君不來皆言其多而熟也誓將與夫子永結為弟昆遂空所坐堂安居奉我歡誰肯艱難際豁逹露心肝别來嵗月周胡羯仍構患何當有翅翎飛去墮爾前趙云當是指言安慶緒蓋慶緒于正月弒其父而襲僞位也義鶻感鳥獸猶見義而動也之趙云此篇紀實事以垂鑒誡意也隂崖有蒼鷹養子黑柏巔白蛇登其巢吞噬恣朝餐趙云長笛賦惟籦籠之竒生兮于終南之隂崖楚詞屑瓊蘂以朝餐雄飛逺求食雌者鳴辛酸力彊不可制黃口無半存趙云家語孔子見羅者所得雀皆黃口也孔子曰黃口盡得大雀獨不得何也羅者對曰黃口從大雀者不得大雀從黃口者得孔子顧謂諸弟子曰君子慎所從其父從西歸一作來翻身入長煙須臾領健鶻痛憤寄所宣斗上捩孤影噭哮來九天趙云郭璞游仙詩云升降隨長煙兵書出於九天之上修鱗脫逺枝巨顙折老拳杜補遺石勒與李楊鄰居爭漚麻池嵗相毆擊及貴乃使人召陽與酣謔引陽臂笑曰孤往日猒卿老拳卿亦飽孤毒手昔劉夢得嘗讀杜詩疑老拳無據及讀石勒傳乃艱服之髙空得蹭蹬蹭蹬字見首篇注短草辭蜿蜓折尾能一掉江賦揚耆掉尾左傳尾大不掉飽腸皆已穿生雖滅衆雛死亦垂千年趙云言蛇之滅鷹雛蛇之死于義鶻可謂鑒戒於千年之後也亦王仲宣誄史云生為百夫雄死為壯士規之勢也物情有反復快意貴目前兹實鷙鳥最急難心炯然孔融云鷙鳥纍百裳棣兄弟急難功成失所往用捨何其賢近今潏水湄此事樵夫傳飄蕭覺素髮潘安仁班鬢彪以丞辨素髮颯以垂領凛欲一作洌衝儒冠盧子諒詩怒髮上衝冠人生許與分只在顧盻間聊為義鶻行用激壯士肝畫鶻行髙堂見生一作老鶻颯爽動秋骨初驚無拘攣曹褒傳羣寮拘攣猶拘束也潘安西征賦陋吾生之拘攣何得立突兀乃知畫師妙功括造化窟趙云李賀云二十八宿羅心胸筆補天化天無功蓋出于此寫此神俊姿支道林云憐其神俊充君眼中物烏鵲滿樛枝詩南有樛木釋文云木下曲曰樛樛下垂也趙云謝𤣥暉敬亭詩樛枝聳復低軒然恐其出側腦看青霄寧為衆禽沒趙云言甘青雲而軒舉寧甘為衆禽之滅沒乎此與傅𤣥長歌行曰蒼鷹厲爪翼耻與燕雀爭長翮如刀劍人寰可超越舞鶴賦歸人寰之喧卑乾坤空峥嶸粉墨且蕭瑟鮑明逺嵗崢嶸而催暮又金石崢嶸深髙之貌也但趙云乾坤空自髙大而粉墨之物不能真超越之含蕭瑟之意緬思一作想雲沙際自有煙霧質吾今意何傷一步獨紆鬱舞鶴賦烟交霧凝若無毛質陸士衡紆鬱遊子情趙云劉希夷邊城夢還詩雲沙撲地起夫既有真質自能超越則吾亦不必傷也紆鬱結悶之貌真質公自况也世有西清詩話者有云王介甫歐楊永叔梅聖俞與一時聞人坐上分題賦虎圖介甫先成衆服其敏妙永叔乃袖手或以問余余曰此題杜甫畫鶻行耳問者謂然大抵前輩多模取古人意以紓急解紛此其一也西清之說如此然觀介甫古詩與此自不同蓋此篇雖詠畫鶻而終于真鶻以自况九家集注杜詩卷三
