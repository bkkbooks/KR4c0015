body:
  text: 九家集汪杜詩卷七宋郭知達編古詩石笋行集注杜光庭石笋記云成都子城西曰興義門金容坊有通衢幾百五十步有石二株挺然聳峭髙丈餘圍八九尺耆舊傳云其名有六曰石笋曰蜀妃闕曰沈犀石曰魚鳬仙壇曰西海之眼曰五丁石門皆非圖經云石笋街乃前秦寺之遺址殿宇樓臺盛以金寶飾之為一代之勝槩後遭兵火而廢或遇夏秋霖雨里人猶拾珠玉異物前蜀丞相諸葛亮命掘之俯觀方驗測隱其象有篆字曰蠶叢氏啓國誓蜀之碑以二石柱橫埋連接鐡貫其中厯代故不可毁復鐫五字濁歜燭觸蠲時人莫能曉察惟孔明默悟斯㫖令左右瘞之後蜀主李雄召丞相范賢詰其所自再掘而詳之賢議曰然厥字五其理各有所主亥子嵗濁字可記主其水災寅卯嵗歜字可記主其饑饉己午嵗燭字可記主其火災申酉嵗觸字可記主其兵革辰戌丑未嵗蠲字可記主稼穡充益民物富瞻悉以年事推之應驗符響又云蜀之城壘方隅不正以景測之石笋于南北為定無所偏邪今按石笋在西門外僅百五十步二株雙蹲一南一北石笋長一丈六尺圍極于九尺五寸南笋長一丈三尺圍極于一丈二尺南笋蓋公孫述時折故長不逮北笋趙云此篇作于上元元年是年李輔國日離間二宫擅㩲之迹甚彰故因賦石笋而指譏李輔國也君不見益州城西門陌上石笋雙髙蹲成都記石笋各折為五六假相續以立人云五丁擔亦曰蜀王妃墓表公孫述時此石折故治中從事任文公嘆曰西州智士死吾其當之嵗中果卒古來一作老相傳是海眼苔蘚食盡波濤痕成都記距石笋二三尺每夏月大雨往往陷作土穴泓水湛然以竹測之深不可及以繩繫石而投其下愈投而愈無窮凡三五日忽然不見嘉祐春牛車碾地忽陷亦測而不能逹父老云見此多矣此亦甚異者故有海眼之說云趙云按唐劉崇逺作金華子書載海眼一事云北海郡國發得五銖錢取之不盡得一石記云此是海眼華陽風俗記曰蜀人曰我州之西有石笋焉天地之植以鎮海眼動則洪濤大濫雨多往往得瑟瑟此事恍惚難明論成都記石笋及林亭沙石之地雨過必有小珠或青黃如栗者亦有細孔可以貫絲輕薛云瑟瑟碧珠也杜陽雜編有瑟瑟幕其色如瑟瑟明虛薄無與為比杜補遺酉陽雜爼蜀石笋䘖夏中大雨往往得雜色小珠俗謂之地當海眼莫知其故蜀僧惠嶷曰前史說蜀少城飾以金璧珠翠桓溫怒其太侈焚之合在此地今拾得小珠時有孔者得非是乎餘同薛恐是昔時卿相墓立石為表今仍存揚雄蜀王本紀云成都丈夫化為女子顔色美絶蓋山精也蜀王納以為妃無幾物故乃發卒之武都擔土葬于成都郭中號曰武擔以石作鏡一枚表其墓華陽國志曰王哀念之遣五丁之武都擔土為妃作冢蓋地數畝髙七丈立石俗今名為石笋趙云公亦又以意逆之不敢專指為何人墓耳武擔土葬如上所載又嘗觀録異記所載乾寧二年蜀州刺史節度參謀李師恭治第于成都錦浦里北門第西興李氷祠鄰距宅之北地形漸髙岡西南與祠相接于其堂北鑿地五六尺得大冢磚甓甚固于磚外得金錢數十枚各重十八銖不知誰氏墓也其地北百許步有石笋知石笋即此之闕矣録異記如此如此則公所謂恐是承古老相傳云惜哉俗態好䝉蔽莊子蔽䝉之民亦如小臣媚至尊趙云此正以専指李輔國一內臣耳連結張妃肅宗信任之呼為阿父乾元元年張妃為皇后而輔國之權尤熾人爭附之公于祭房相國文云太子即位揖讓倉卒小臣用權尊貴倐忽正以言李輔國則今詩云如小臣媚至尊者石笋以一堆石而䝉蔽于人人或䝉指為海眼或指為表墓說終不明此可惡而俗態好其蔽如輔國之蔽肅宗而人信好之也政化錯忤失大體趙云言肅宗信之也坐看傾危受厚恩時林甫國忠傾危王室故子美此詩有所謂耳趙云言輔國之寵幸也舊注引李林甫楊國忠蓋公乾元二年離同谷來蜀作此詩時李與楊已死矣又二公皆為相豈可謂之小臣耶嗟爾石笋擅虛名後來未識猶駿奔詩駿奔走在廟趙云言人之爭附輔國也安得壯士擲天外使人不疑見本根梁沈約詩云安得壯士駐奔曦華陽風俗録云蜀人曰我州之西有石笋焉天植之以鎮海眼動則江濤大濫四方之人有來觀者則竒而怪之贊皇公曰夫笋之為狀也亭亭揭峭髙然若削圭芒天成神矣今小大相壘至八九節束以鐡鼓出于人力又何神乎遂命抽出鐡鼓伺事變怪則寂然而神怪不作元趙云言要使天下知其一內臣耳也公作是詩在上元年之夏七月輔國果離間二宫矯詔遷上皇于西內矣公之逺見不亦明乎漢髙祖安得猛士兮守四方宋玉長劍耿介倚天外石犀行成都記石犀在李太守廟內君不見秦時蜀太守刻石立作三犀牛華陽國志秦孝文王以李氷為蜀守氷作石犀五頭以壓氷精穿石犀溪于江南命曰犀牛里後轉為耕牛二頭一在府市橋門今所謂石牛門一在淵中又自前堰上分穿羊摩江灌口西于玉女房下自涉郵作三人立水中與江神要水竭不至足盛不沒肩時青衣出象山下伏行地中㑹江南安觸山脅溷崖水遁漂疾破害舟船厯代患之氷發卒鑿平崖通正水道或曰氷鑿崖時水神怒氷乃操刃入水中與神門迄今䝉福成都記亦云石犀五今云三犀牛未詳趙云此篇因石犀而指譏廟堂無經濟之人也自古雖有厭勝法天生江水向一云須東流襄陽白銅鞮歌漢水向東流又莫愁歌河中之水向東流胸奴傳上以厭勝所在師古注漢髙紀云蕭何初立未央宫以厭勝之術理亦宜然以趙云本朝樂史寰宇記載志云在市北乃李氷所立厭水怪故公直以為厭勝耳蓋言厭勝者將欲使水東流邪則水自然東流矣何用石犀為厭勝也列子曰地不滿東南故百川水潦歸焉此江水東流謂之天生之義也蜀人矜誇一千載泛濫不近張儀樓按圖經秦張儀築少城在大市西又周地圗云張儀築城屢壞不能立忽有一龜周旋正依龜行巡築遂得立今有龜化橋成都記云張儀樓在子城南又曰張儀樓髙一百尺初築此城雖曰附龜蓋以順江山之勢正即為斜矣乃作此樓而定南北焉趙云又言厭勝者詭怪之事為不足憑故水終有時而為害焉隄防者正道故終藉人力以為隄防也張儀樓事按圖經秦張儀築少城在城西少之為言小也有樓焉故號張儀樓南史始興王與蔡仲能登張儀樓啇略言往行可見有是樓之證矣本朝樂史寰宇記云張儀樓宣明門樓也然今宣明門之名亦不可考矣今年灌口損户口此事或恐為神羞後漢書户口減如毛米書武成以濟兆民無作神羞左傳茍捷有功無作神羞終藉隄防出衆力髙擁木石當清秋先王作法皆正道詭怪何得參人謀莊子恢詭譎怪又諔絶詭幻怪易人謀鬼謀嗟爾三犀不經濟缺訛只與長川逝語子在川上曰逝者如斯無趙云此公之寓意于三犀指譏廟堂經濟之人甚明夫無經濟之用終亦缺訛隨長川而漂逝矣乾元二年乃吕諲李峴李揆第五琦同平章事五月李峴言毛若虛希中人㫖用刑亂法帝怒李揆不敢爭出峴為蜀州刺史七月吕諲以從中人馬尚書之請為人求官罷九月第五琦鑄重規錢非是十月貶為惠州刺史公詩之作正在次年五月六月之間詣公之失皆已著見惟李揆未露至次年揆懼吕諲復用乃遣吏搆其過失諲密訴諸朝帝怒貶揆為袁州長史然則公豈不明見其非經濟者乎經濟字見上注但見元氣常調和自免洪濤恣雕瘵曺子建詩泛舟趙洪濤宰趙云此公有經濟之量知水土之平特在乎得人蓋相以燮理隂陽為事則調元氣之謂也洪濤字祖雖出而京賦鼓洪濤而揚波而晋木華海賦云帝媯巨害之世天網浡潏為雕為瘵洪濤瀾汗萬里無際專用木華海賦之意言水之廣大為天網紀而洪水橫流乃為雕傷瘵病于民矣莊子有隂陽調和武后常問陳子昂調元氣以何道選有禀元氣于靈和安得壯士提天綱再平水土犀奔茫前漢李尋傳五行以水為本其精𤣥武婺女天地所紀終始所生水為凖平王道公正修明則百川理絡脈通偏黨失綱則涌溢為敗陳蕃傳志清天綱舜典咨禹汝平水土趙云梁沈約云安得壯士駐奔曦陳蕃傳雖有志清天綱而杜公所用則取海賦以求為天綱杜鵑行華陽風俗録鳥有杜鵑者其大如鵲而羽鳴聲哀而吻有血土人云春至則鳴聞其初聲者有别離之苦人皆惡聞之惟田家候其鳴則興農事趙云按蜀記曰昔人有姓杜名宇號曰望帝宇死俗說云化為子規規鳥名也一名鵑蜀人聞子規鳥皆曰望帝也遂于鵑字上加以杜姓謂之杜鵑又直名之為杜宇以次公考之此鳥乃暮春之時農夫以為耕候曰規曰鵑其義取圓春之事也王介甫亦于宇說言之矣然有二種其一褐色四川中亦有而內地多有之名曰子規仿像其聲之四云不如歸去其一色黑似鳥而小兩吻赤如血而其聲二內地亦有而蜀中多有之名曰杜鵑仿像其聲之二云杜宇夫所謂鵑之名自古有之漢書謂之曰鵑歐陽率更載臨海異物志曰題鴂一名田鵑春三月鳴晝夜不止音聲自呼俗言取梅子塗其口兩邊皆赤至麥子熟鵑乃止率更據志以為塗口而後赤蓋信所傳聞耳蜀人既傳杜宇化為鵑而加杜姓稱為杜鵑又曰杜宇然其聲未必是呼杜宇也蓋望帝之前則聲云布穀則催耕之鳥而巳杜公于長安𤣥都壇詩云子規夜啼山竹裂於雲安詩云兩邊山木合終日子規啼則指不如歸去四聲者而言之今有杜鵑行其後又有杜鵑詩則指杜宇之二聲者言之惟其指杜宇之二聲者言之故詩皆言帝王之事君不見昔日蜀天子化作杜鵑似老鳥成都記曰杜宇亦曰杜主自天而降稱望帝好稼穡教人務農治郫城亦曰望帝至今蜀人將農者必先祀杜主時荆州人鱉靈死其尸泝流而上至汶山下復生見望帝望帝因以為相號曰開明會巫山壅江人遭洪水開明為鑿通流有大功望帝因以其位禪焉後望帝死其魂化為鳥名曰杜鵑亦曰子規又云子規深春乃有聲低且怨與北之思歸樂都不同也洛京東西多此鳥人以為子規者誠妄矣又云字禪位于開明升西山隱焉時適三月子規鳥鳴故蜀人悲子規鳥寄巢生子不自啄羣鳥至今與哺雛雖同君臣有舊禮骨月滿眼身羈孤業工竄伏深樹裏四月五月偏號呼其聲哀痛口流血所訴何事常區區爾惟一作豈摧殘始發憤羞帶羽翮傷形愚蒼天變化誰料得萬事反覆何所無萬事反覆何所無豈憶當殿羣臣趨趙云鮑昭行路難云中有一鳥名杜鵑言是古時蜀帝魂聲音哀苦鳴不息羽毛憔悴似人髠飛走樹間逐蟲蟻豈憶往日天子尊念此死生變化非常理心中惻愴不能言今公所謂哀痛流血又有摧殘之語及末句憶羣臣趨且云萬事反覆蓋出于此也戲作花卿歌髙適傳梓州副使假子章反以兵攻東川節度李􅎢率州兵與西川節度使崔光逺攻子璋斬之西川牙將花驚定者恃勇誅子璋大掠蜀天子怒成都猛將有花卿學語小兒知姓名薛云左太冲蜀都賦金城石郭兼通中區既麗且崇實號成都齊柏康隨武帝起兵恣行暴害江南之人畏之以其名怖小兒禰衡大兒孔文舉小兒楊德祖用如快鶻風火生薛云按南史曹景宗謂所親曰我昔在鄉里騎快馬如龍與年少輩數十騎拓弓弦作礕礰聲放箭如餓鴟呌平澤中逐􅀢數肋射之渴飲其血飢食其胃甜如甘露漿覺耳後生風鼻尖出火此樂使人忘死不知老之將至見賊唯多身始輕漢光武見大敵則勇綿州副使著柘黃綿州副使殺子璋也著柘黃僭乘輿服色也趙云髙適傳云梓州副使段子璋反而公今詩云綿州副使著柘黃則梓州字誤傳為綿州乎著柘黃天子之服也柘黃字或云當是赭黃本朝詩曰戴了宫花賦了詩不容重見赭黃衣赭赤也赤與黃二色之合為赭黃皆不敗輒改併俟博聞我卿婦除即日平子璋髑髏血模糊手提擲還崔大夫子璋即段子璋也崔大夫崔光逺也可杜補遺古今詩話云杜少時有病瘧者少陵曰吾詩療之夜闌更秉燭相對如夢寐其人誦之瘧猶是也少陵曰更誦吾詩云蓋子璋髑髏血模糊一聨誦之果愈詩感鬼神蓋不誣也李侯重有此節度趙云重乃重叠之重蓋段子璋既攻東川則李奐必失節度矣以花卿斬之則李候復保有節度焉人道我卿絶世一作代無既稱絶世無天子何不喚取守京都譏其奪掠也魯直云子美作花卿歌雄壯激昻讀之想見其人也楊明叔為余言花卿家在丹稜東館鎮至今有英氣血食其鄉見封為忠應公詩話苕溪漁隱曰細考此歌想花卿當時在蜀雖有一時平賊之功然驕恣不法人甚苦之子美不欲顯言末句含蓄蓋可知矣贈蜀僧閭邱師兄太常博士圴之孫大師銅梁秀左思蜀都賦外負銅梁于巖渠內函要害于膏腴杜補遺太平御覽載張孟陽蜀都賦注云銅梁山名也按其山有桃枝竹東西連亘二十餘里山嶺之上平整逺望諸山此獨秀也山在合州界銅梁縣籍籍名家孫袁陽源白馬篇籍籍關外來車從傾國鄽嗚呼先博士炳靈精氣奔左太冲蜀都賦近則江漢炳靈世載其英鬱若相如皭若君平惟昔武皇后臨軒御乾坤多士盡儒冠墨客藹雲屯楊子雲長楊賦藉翰林以為主人子墨為客卿以諷陸士衡胡馬如雲屯當時上紫殿不獨卿相尊謝𤣥暉直中書省紫殿肅隂隂世傳閭邱筆峻極逾崑崙禹本紀言崑崙髙二千五百里日月所相避隱為光明也詩峻極于天鳳藏丹霄暮一作穴龍去白水潭東京賦我世祖忿之乃龍飛白水鳯翔參墟青雲雪嶺東西都賦琳珉青熒新添蜀有雪山碑碣舊製存杜補遺東蜀牛頭山下有閭邱均撰瑞聖寺磨崖碑嚴政書寺今改為天寧羅漢禪院斯文散都邑髙價越璵璠均以文名當時四方碑碣多出其手璠璵玉器也晚看作者意妙絶與誰論陸韓卿賦有云歌能妙絶吾祖詩冠古同年䝉主恩豫章采日月嵗久空深根豫章良材也小子思疏濶豈能達詞門窮愁一揮淚愁一作秋陸士衡揮淚歎流離又揮淚廣川隂相遇即諸昆我住錦官城成都記錦城以江山明麗錯雜如錦兄居祗樹園金剛經佛在舍衛國祇樹給孤獨園祗杜補遺楞嚴經云祗桓精舍注云祗桓林樹名具云陀桓或云逝多此云戰勝即太子名林主是彼故云勝林精舍建立有二因緣須達長者施園祗陀太子施樹故金剛經云祗樹給孤獨園地近慰旅愁往來當丘樊天涯歇滯雨粳稻卧不翻漂然薄游倦始與道旅一作侣敦景晏步修廊而無車馬喧陶淵明結廬在人境而無車馬喧夜闌接軟語落月如金盆法華經又以軟語一云言詞柔軟所杜補遺維摩經云菩薩成佛時命不中天大富梵行言誠諦常以軟語眷屬不離善和諍訟言必饒益不疾不恚漠漠世界黑一作空驅驅爭奪繁唯有摩尼珠可照濁水源言性照圓明如摩尼珠然雖照濁水而不為濁水所汚也如語云涅而不緇杜補遺圓覺經譬如清淨摩尼寶珠映于五色隨方各現諸愚癡者見彼摩尼實有五色圓覺净性現于身心隨類各應亦復如是觀無量夀佛經云諸天童子摩尼以為纓絡光照百餘里猶如和合百億日月不可具名室志云馮翊嚴生家漢南峴山得一珠如彈丸色黑胡人曰此西國清水珠也若至濁水冷然洞徹矣以三十萬易之而去泛溪落景下髙堂進舟泛回溪謝靈運對嶺臨回溪暮趙云廣雅云日將落曰薄又日西落光反照于東謂之反景故公今云落景也回溪字祖出枚乘七發云依絶區兮臨回溪誰謂築居小謝靈運躡險築幽居未盡喬木西詩南有喬木以趙云言不必大屋綿亘盡喬木之地逺郊信荒僻秋色有餘悽練練峰上雪纎纎雲表霓趙云峰上雪應是逺言西山之上峰雪承秋色之後而言雪則西山謂之雪山四時皆雪也雪云練練以言其白江淹麗色賦云色練練而欲奪又梁吳均贈周承詩練諫波中白皆取此義纎纎字則古詩有兩頭纎纎之名童戲左右岸一云兒童戲左右謝靈運海鷗戲春岸罟弋畢提携趙云言兩岸皆有兒童嬉戲至盡携網罟畢弋以取魚鳥莊子曰畢弋者多鳥亂于上網罟者多魚亂于下網罟者取魚之器畢弋者取鳥之器今所謂罟弋言網罟畢弋所謂畢提携却是畢盡之畢也翻倒荷芰亂指揮徑路迷謝靈運連巖覺路塞密竹使徑迷來人忘新行去子惑故溪趙云其為嬉戲至翻倒芰荷而亂互相指揮無所適從故于徑路翻成迷惑也陸韓卿詩荷芰始參差得魚已割鱗採藕不洗泥人情逐鮮美物賤事巳一作亦暌趙云得魚則便割其鱗而殺之採藕則不及洗泥而食之皆兒童之戲也雖是兒童之戲而于人情以鮮美為貴于物以非新為賤物既可賤事亦暌離矣此龍陽君以得魚棄前魚為恩奪而泣者也公因目前實事起意以雖小兒猶知好新而厭故也吾村靄暝姿異舍雞亦棲蕭條欲何適出處庶可齊沈休文蕭條何所欲不趙云以既無所適遂可以處必出也衣上見新月霜中登故畦濁醪自初一作新熟東城多鼓鼙趙云蓋言濁酒幸自初熟可以供飲宜安郊村之興况東城多鼓鼙乎濁醪字公屢使本出魏都賦清酤如濟濁醪如河東城東州之城也是年四月東川節度兵馬使段子璋反五月西川節度使崔光逺使牙將花驚定擊斬之驚定乘勝大掠東蜀至天子聞之而怒則雖七月兵應未定故云題壁上韋偃畫馬歌鮑云朱景玄畫斷云韋偃伯父工龍馬父鑾工山水松石偃又工仙僧老松異石人知其善畫馬不知其松石更工韋侯别我有所適知我憐君一作渠畫無敵戲拈秃筆掃驊騮歘見麒麟出東壁顔延年白馬賦歘聳躍以鴻驚驊騮良馬也麒麟瑞獸也餘見上天育驃騎歌注一匹齕草一匹嘶坐看千里當霜蹄時危安得真致此與人同生亦同死莊子馬蹄可以踐霜雪齕草飲水吕布嘗御良馬號曰赤兔能馳城飛塹馳突燕軍一日或至三四斬首而出趙云乃所向無空闊真堪託死生之意其事則世說曰劉備之初奔劉表表左右欲因㑹取備備覺如厠便出所乘馬的顱走墮襄陽城檀溪水中備急謂的顱曰今日厄何不努力的顱一踴三丈得過又如劉牢之為慕容垂所逼馬跳五丈澗而脫戲題畫山水圖歌王宰畫丹青絶倫十日畫一水五日畫一石能事不受相促迫主宰始肻留真跡壯哉崑崙方壺一云文圖列子湯問夏革曰渤海之東不知幾萬億里有大壑焉實惟無底之谷其下底名曰歸墟八宏九野之水天漢之流莫不注之而無減焉注世傳天河與大海通其中有五山一曰岱輿二曰員嶠三曰方壺四曰瀛州五曰蓬萊又周穆王宿于崑崙之河汾水之陽山海經云崑崙山有五色水與趙云此圖應畫江山之藝闊逺故直以為崑崙方壺山之圖形容之挂君髙堂之素壁巴陵洞庭日本東巴陵嶽陽也洞庭在其左海東有日本國赤岸水與銀河通赤岸地名江杜補遺南兖州記曰瓜步山東五里有赤岸山南臨江中羅君章云赤岸若朝霞即此也濤水自海入江衝激六七百里至北岸側其藝始衰郭景純江賦云鼓洪濤于赤岸餘巴陵洞庭事見第四寄薛三郎中青草洞庭湖補遺趙云又狀其水之闊遠文選枚乘七發云凌赤岸矣後學者見㕁昻作岐邠涇寧四州人馬坊碑有云我有唐之新造國也于赤岸澤僅得牝牡三千匹遂感赤岸所在殊不知此隴右間亦有赤岸矣巴陵之洞庭曰本國之東真州之赤岸通銀河之水此皆收其逺也中有雲氣隨飛龍莊子姑射山有神人乘雲氣御飛龍而遊乎四海之外舟人漁子入浦溆山水盡亞一作帶洪濤風江賦舟子涉人又􅀢人漁子海賦舟人漁子徂南極東七發陵赤岸篲扶桑飛趙云楚辭入溆浦而倒用之則何遜咏白鷗詩云孤出浦溆獨宿下滄洲莊子有山木篇西京賦起洪濤而揚波尤工逺勢古莫比咫尺應須論一作千萬里薛云按南史竟陵王子良孫賁字文炳能書善畫于扇上圖山水咫尺之間便覺萬里為遙矜慎不傳自娛而已焉得并州快剪刀剪取吳松半江水趙云言吳地之松江也苕溪漁隱曰豫讀益州畫記云王宰大厯中家于蜀州能畫山水意出象外老杜與宰同時此歌又居成都作其許與必不安題李尊師松樹障子歌老夫清晨梳白頭趙云禮記云大夫得謝自稱曰老夫左傳云牽率老夫曹子建云雲散還城邑清晨復來還鄒陽云白頭如新又前人有白頭翁之語𤣥都道士來相訪握髮呼兒延入戶周公一沐三握髮魚趙云古詩呼兒烹鯉手提新畫青松障障子松林靜杳冥趙云楚辭曰杳冥兮晝晦憑軒忽若無丹青隂崖却承霜雪一作露幹馬季長長笛賦生于終南之隂崖南都賦幽谷嶜岑夏含霜雪趙云登樓賦憑軒檻以遙望而江淹擬張綽云憑軒咏堯老孔子曰霜雪既降吾以是知松柏之茂也偃蓋反走虬龍形老夫平生好竒古趙云抱朴子云天陵偃蓋之松故北齊魏收詩云古松圖偃蓋新柏寫烟岑隋煬帝古松詩云獨留麈尾影猶橫偃蓋隂反走虬龍形言松身之反走如之也若抱朴子云松樹反中有聚脂狀如龍形乃言松脂之形則柏之古身亦可狀為虬龍矣對此興與精靈聚巳知仙客意相親更覺良工心獨苦東坡詩話云故人董傳善論詩余嘗云子美詩不免有凡語已知仙客意相親更覺良工心獨苦此豈非凡語耶傳笑曰此句殆為君發凡人用意深處人罕能識此所以為獨苦豈獨畫哉言杜補遺古今詩話云管子曰事無終始無事多業此學者貴能成就也唐人為詩皆量巳力以致功常積精思數十年然後各自名家今人不然未有小得已髙視前人自以為無敵然知音之難萬事悉然杜工部詩云更覺良工心獨苦用意之妙有舉世莫之知者此其所以為獨苦歟苦趙云古詩云晨風懷苦心陸士衡猛虎行云志士多心豫章行云曽是懷苦心則公蓋用此也松下文人巾屨同偶坐似一作自是商山翁悵望一作惆悵聊歌紫芝曲時危慘淡來悲風啇山翁紫芝曲並見上喜晴及洗兵馬注古柏行傷有其才而不得其用也柏趙云此詩凡三段自孔明廟前有老至月出寒通雪山白八句指言今䕫州孔明廟之柏自憶昨路繞錦亭東至正直元因造化功八句追言成都先主廟之柏自大厦雖傾要梁棟至古來材大難為用八句總言兩處之柏起意以嗟大材之人且自况其身孔明廟前有老柏廟在成都先主廟西隅而趙云孔明為蜀相成都則先主廟武侯祠堂附焉䕫州則先主廟武侯廟各别今咏柏専是孔明廟而已豈非䕫州柏乎公詩集中其在䕫也屢有孔明廟詩于䕫州十絶云武侯祠堂不可忘中有松柏參天長以絶句證之則此乃䕫州之詩明矣柯如青銅根如石趙云任昉述異曰虞氏縣有盧君冢􅀈傍柏二株徑如銅石也黃貢獻之云在費多得家見述異志一本正有其柯如青銅其根知鐡石之文則公必使青銅尤為有據霜皮溜兩四十圍黛色參天二千尺曹子建荆棘上參天新添緗素雜記云沈存中筆談云四十圍乃是徑七尺無乃太細長乎豫謂存中性機警尤善章算術獨于此為誤何也古制以圍三徑一四十圍即百二十尺圍有百二十尺即徑四十尺矣安得云七尺也若以人兩手大指相合為一圍則是一小尺即徑一丈三尺三寸又安得云七尺也武侯廟柏當從古制為定則徑四十尺其長二千尺宜矣遁齊間覽云沈不知子美之意但言其色而已猶言其翠色蒼然仰視髙逺有至于二千尺而幾于參天也若如此求疵則二千尺固未足以參天而詩人謂峻極于天者更為妄語范蜀公云武侯廟柏才十丈而杜云二千尺以謂詩人好大其事學林新編云按子美漳關吏詩曰大城鐡不如小城萬丈餘豈有萬丈城耶姑言其髙四十圍二千尺者亦姑言其髙且大也詩人之言當如此而存中乃拘以尺寸較之則過矣趙云庾肩吾過建昌故臺詩曰圖雲初溜雨畫水即生苔鮑照與其妹書言所厯之處曰半山以下純為黛色其四十圍二千尺又用柏事以形容今柏之長大也四十圍則隋均州圖經云南陽武當南門且有杜柏樹大四十圍梁蕭欣為郡伐之二千尺則巴郡有柏樹大可十圍髙二千尺餘此並載樂史太平寰宇記中公夔州絶句有云武侯祠堂不可忘中有松柏參天長則夔州廟中之柏當公賦詩時目見其髙大故今又有參天二千尺之句前輩既不知此是夔州而又不見樂史所載柏事乃為紛紛之說君臣已與時際㑹蜀先主孤之有孔明如魚之有水也逹趙云楊子云堯舜禹君臣也而並孟辭先主表云際㑹之間請命乞身樹木猶為人愛惜左傳思其人猶愛其樹况用其道而不惜其人乎劉歆曰思其人猶愛其樹况宗其道而毁其廟乎趙云佛書有云樹木神三國志注載魏書言太祖屯兵堤南樹木幽深吕布疑其有伏前既已言柏之大髙矣便可接氣接巫峽寒通雪山皆為形容之句而却插此兩句何也曰此公詩之妙處也蓋柏雖有四十圍之大二千尺之長者而後人如蕭欣輒代之不能久有惟此柏以君臣際會之休故人愛惜以至于今也惟其如此然後致氣接寒通之逺焉雲來氣接巫峽長月出寒通雪山白宜都山川記曰巴東三峽巫峽長詩眼云形似之意蓋出于詩人之賦蕭蕭馬鳴悠悠斾旌是也激昻之語蓋出于詩人之興周餘黎民靡有孑遺是也古人形似之語如鏡取形燈取影也故老杜所題詩往往親到其處益知其工激昻之言孟子所謂不以文害辭辭害意初不可形迹考然如此乃見一時之意余游武侯廟然後知古柏詩所謂柯如青銅根如石信然决不可改此乃形似之語霜皮溜雨四十圍黛色參天二千尺雲來氣接巫峽長月出寒通雪山白此激昻之語不如此則不見柏之大也文章固多端警䇿往往在此兩體耳趙云巫峽主雲來言之高唐賦曰妾居巫山之陽髙立之岨朝為行雲暮為行雨巫峽在䕫之下至峽之雲來而柏之氣與接雪山主月出言之雪山謂之西山記云月出于西雪山在䕫之西雪山之月出而柏之寒與通皆言其髙大也東方朔别傳曰凡占長史東耕當視天有黃雲來覆車五穀大熟梁吳均詠雪詩有云白雪蒼梧來過拂章華臺于雲亦使來字矣詩云月出皎兮盛𢎞之荆州記載古歌曰巴東三峽巫峽長猿鳴三聲泪霑裳又陳隂鑑渡青草湖詩曰穴去茅山近江連巫峽長䕫州雖不望見雪山大槩在蜀西之一帶西域記雪山積雪不消冬夏望之皆白故云雪山白此言䕫州之柏尤明亦所以引下段言成都之柏在雪山之下而此柏寒通雪山矣憶昨路繞錦亭東先主武侯同閟宫詩閟宫有恤成趙云此乃追言都先主廟之柏杜公近方離成都而來夔故止可言憶昨也士夫誤誦此詩句之熟以為憶昨路繞錦城東又生疑惑乃謂先主廟在成都南門外而子美云錦城東為不可曉此不自知其誤誦之熟也嚴武有寄題杜二錦江野亭詩此豈所謂錦亭乎或是當時先主廟西又有錦亭雖不見所載而以意逆志為然公自西郊草堂繞所謂錦亭而往乃為東矣同閟宫蓋又紀實也今廟中塑先主武侯之像崔巍枝幹郊原古窈窕丹青户牖空趙云郊原古則先主廟柏在平地而古也下句感物弔古言窈窕深邃所施丹青之户牖徒存而無人也謝靈運詩云窈窕承明內言宫殿之深邃矣張良廟教云可改構棟宇而修丹青老子云鑿户牖以為室落落盤居雖得地冥冥孤髙多烈風趙云杜篤首陽山賦曰長松落落卉木䝉䝉梁沈約髙松賦云鬱彼髙松栖根得地冥冥孤髙則言柏之髙而望之冥冥如揚子云鴻飛冥冥尚書烈風雷雨弗迷而在柏用之則七發之言桐樹云冬則烈風之所激扶持自是神明力正直元因造化功薛云孫興公天台賦嗟台嶽之所異挺實神明之所扶持乃趙云列子曰穆王見偃師嘆曰人之巧與造化同功前漢有云造化之功大厦如傾要梁棟大厦將顛萬牛回首邱山重趙云大厦以比國家如傾以言多難梁棟以柏喻人材庾子嵩目和嶠森森如千丈松施之大厦有棟梁之用也後漢馮衍說辭曰明帝復興而大將軍為之梁棟不露文章世巳驚未辭剪伐誰能送甘棠勿剪勿伐采趙云柏木有文具在其中故云不露文章人巳訝其髙大下句蓋自况其不憚麋軀損身以應器使然誰能送致之乎苦心豈免容螻蟻香葉終經宿鸞鳳趙云柏實與葉其味苦故柏心亦苦心雖苦矣而不免螻蟻之所穿以况小人之見凌也下句豈非公自况其終接鴛鸞之侣乎謝承後漢書曰方儲遭母憂種松柏鸞棲其上志士幽人莫怨嗟古來材大難為用莊子吾有大樹人謂之樗其大本擁腫而不中繩墨立之塗匠者不顧今子之言大而無用衆所同去也趙云王充論衡效力篇云或伐薪于山輕小之木合能束之至于大木十圍以上引之不能動推之不能移則委之于山林收所求之小木而巳由斯以論知能之大者其猶十圍以上木也人力不能舉薦其猶薪者不能推引也孔子周流無所留止非聖才不能道大難行人不能用也故夫孔子山中巨木之類也論衡之語如此公所謂材大難為用豈不出于此乎戲為雙松圖歌韋偃畫天下幾人畫古松翠宏已老韋偃少畢宏亦畫工也絶筆長風起纎末仲尼作春秋絶筆于獲麟長笛賦其應清風也纎末奮蕱滿堂動色嗟神妙趙云滿堂如滿堂為之不樂左傳使者色動而言肆兩株慘裂苔蘚皮屈鐵交錯回髙枝白摧朽骨龍虎死墨入太隂雷雨垂松根胡僧憩寂寞龎眉皓首無住著偏袒右肩露雙腳金剛經偏袒右肩右膝著地四趙云因畫胡僧而紀咏之故用佛書字為張良傳載皓之龎眉皓首衣冠甚偉楞嚴經云名無住行名無著行公摘其字而合用之也然唐有中興間氣集載鄭賢詩云髙僧無住著何日出東林賢興公同時人莫知孰先用也葉裏松子僧前落韋侯韋侯數相見我有一匹好東一作素絹重之不減錦繡段四愁詩美人贈我錦繡段趙云不減者不虧也本出左傳不為末減其後晋人多言某人不減某人已令拂拭先凌亂謝惠連清波時凌亂生趙云梁吳均行路難曰未央採女棄鳴箎爭見拂拭光儀謝晀和劉繪詩頳紫共彬駮雲錦相凌亂請公放筆為直幹喜雨春旱天地昏日色赤如血前漢河平元年日出赤如血趙云日赤色如血公極言旱日之可畏舊注引前漢河平元年日色赤如血河平者成帝年號也成帝本紀及漢天文志並無之乃晋光熙元年五月壬辰癸巳日光四散流如血流照地皆赤甲午又如之占曰君道失明又永嘉五年三月庚申日散光如血下流所照皆赤舊注模稜妄引年號有誤後學故為詳出之也農事都已休兵戍况騷屑巴人困軍須慟哭厚土熱左傳皇天厚土實聞此言趙云按本朝樂史寰宇記載閬州閬中郡春秋之巴國也有渝水為前漢髙祖紀所謂巴渝之舞是已公詩每有巴字皆多閬州詩矣厚土經傳只使后土至厚地字方使厚薄之厚今公厚土蓋因有厚地故用厚坤又用厚土耳舊注便改左傳作皇天厚土實聞此言非是滄江夜來雨真宰真宰見第三卷注罪一雪穀根小蘇息沴氣終不滅趙云沴氣隂陽錯謬之氣也沴音戾莊子曰隂陽之氣有沴何由見寧嵗解我憂思結國語自子之行晋無寧嵗鮑明逺寧嵗猶七奔峥嶸羣山雲交會未斷絶趙云交㑹字周禮隂陽之所交風雨之所㑹而合成安得鞭雷公滂沱洗吳越時聞浙右多盜賊出獵賦霹靂列缺吐火施鞭又鞭洛水之宓妃南都賦鞭魍魎于趙云滂沱言大雨也詩云月離畢俾滂沱矣太子張舍人遺織成褥段客從西北來遺我翠織成古詩客從逺方來遺我一端綺趙云織成者綵物之名後漢輿服志云織成者多開緘風濤涌中有掉尾鯨江賦揚鬐掉尾又介鯨乘濤以出入海賦其魚則橫海之鯨偃尾髙濤巨鱗插雲趙云顔延年詩春江壯風濤逶迤羅水族瑣細不足名皆言織紋也客云充君褥承君終宴榮空堂魑魅走髙枕形神清趙云曹子建詩公子敬愛客終宴不知疲公言其可以為褥而為褥之用有三一則可承終盡之宴二則設之于髙堂而魑魅見其上海獸怪狀必驚而走三則寢于其上可以除魔去魘神魂自清也于一句五字中意各存矣領客珍重意顧我非公卿留之懼不祥左傳服之不衷身之災也施之混柴荆服飾定尊卑大哉萬古程書車服以庸今我一賤老裋褐更無營禹貢裋褐不完師古曰裋者謂僮堅所著布長襦也褐毛布也裋音竪褐趙云簡册所載有短褐有裋褐公每對屬處則用短蓋短窄之褐也裋褐取童竪之褐為義今單句云裋褐更無營則用短褐亦可大率貧者之服耳煌煌珠宫物寢處禍所嬰書云臣有作福作威玉食害于而家凶于而國趙云珠宫指言龍宫也楚辭云貝闕兮珠宫蓋言以此褥而寢處非卑賤者所宜懼嬰于禍又以成不祥之義也說文云嬰繞也如曹子建四言云咨我小子凶頑是嬰歎息當路子干戈尚縱橫掌握有權柄衣馬自肥輕語乘肥馬衣輕裘干趙云今當用兵之時其當路得藝之人乘此戈擾攘操握權柄自然乘肥馬衣輕裘非我所預也孟子曰夫子當路于齊淮南子置鑒燧掌握之中李鼎死岐陽實以驕貴盈趙云李鼎于史無傳惟見姓名于舊史崔光逺傳上元元年以李鼎伐光逺為鳳翔節度使又新唐書載于上元二年二月云奴刺党項羌寇寶雞焚大散關寇鳳州鳳翔尹李鼎敗之此李鼎之可見者史有恃寵驕盈來瑱賜自盡氣豪直阻兵上元三年肅宗追瑱入京裴茂稱瑱屈强難制宜早除之寶應二年貶瑱播州縣尉翌日賜死左傳阻兵安忍皆聞黃金多坐見悔吝生蘇季子位髙多金也老子曰多藏則厚亡易云吉凶悔吝生乎動奈何田舍翁受此厚貺情漢祖起田舍翁錦鯨卷還客始覺心和平振我粗席塵愧客茹藜羮王子淵頌羮藜含糗者不足論太牢之滋味趙云莊子云藜羮不糝舊注所引在後又字倒矣丈人山青城山記云此山為五嶽之長故云丈人有丈人觀自為青城客不唾青城地為愛丈人山丹梯近幽意趙云唾地者有所惡而唾也元魏爾朱榮手毁匿名書唾地曰云云是也不唾其地所以敬之也陳徐陵作玉臺新詠載劉勳妻王維詩云千里不唾井况乃昔所奉丹梯上山之路也謝𤣥暉敬亭山詩要欲追竒趣即此陵丹梯靈運躔步陵丹梯丈人祠西佳氣濃陶潜山氣日夕佳後漢氣佳哉郁郁葱䓤緣雲擬住最髙峰靈光殿賦緣雲上征掃除白髮黃精在君看他時氷雪容世說黃精久服反老為少嘗趙云按本草黃精味甘平補益輕身延年不飢讀逸史載虞鄉永樂縣連接其中道者往往而過有吕生者居二邑間自為童况時斸黃精煮服之十年行若飄風母逼令餐飯諸妹置猪脂于酒中強飲之乃逼于口鼻噓吸之際一物自口中落長二寸餘衆共視之乃一黃金人子吕生乃仆卧不起移時方起先是吕生雖年近六十鬢髮如漆及是皓首觀此則黃精有掃除白髮之功矣漢書掃除煩寄莊子姑射神人肌膚若氷雪百憂集行趙云詩我生之後逢此百憂而王筠行路難云百憂俱集斷人腸故取為題憶年十五心尚孩年一作昔魯昭公十五而猶有童心者子若嬰兒之未孩聖人皆孩之趙云孩者可提之童也十五乃志學之時心未免于孩故云尚孩押孩字韻陶淵明命子曰言云日居月諸漸免于孩健如黃犢走復來庭前八月梨棗熟一日上樹能千回即令倐忽已五十坐卧只多少行立強將笑語供主人悲見生涯百憂集趙云公生于壬子先天元卒至此則五十嵗也主人蓋卜居詩所謂主人為卜林塘幽之主人豈地主者乎學者多妄指以為府尹非也入門依舊四壁空相如家居徒四壁立老妻覩我顔色同癡兒未知父子禮呌怒索飯啼門東集注班超幼年每索飯稍遲即呌怒父曰此子異日當為萬户侯投簡成華兩縣諸子南明皇幸蜀號成都為京故成華得稱赤縣赤縣官曹擁材傑十州記神州赤縣軟裘快馬當氷雪長安苦寒誰獨悲杜陵野老骨欲折趙云京畿倚郭謂之赤縣史記鄒衍所謂神州赤縣成都當此時號為南京故公詩指兩縣得謂之赤縣梁簡文帝與蕭臨川書八區內侍厭直御史之廬几棘外府且息官曹之務沈約懷舊吏部信才傑蔡伯世云此成都詩不應言長安其夜字之訛故誤作安耳况卒章之意明甚其說非長此公雖在成都而逺念長安之寒下句南山青門則言長安之地矣杜陵屬京兆後漢李固傳霍光憂愧發憤悔之折骨南山豆苗早荒穢楊惲傳詩曰田彼南山蕪穢不治種一頃豆落而為箕青門瓜地新凍裂史記邵平種瓜于長安城東漢書霸城門所謂青門也即長安城東門名鄊里兒童項領成詩節彼南山四牡項領小趙云按陶淵明所謂鄊里人故公又云鄉里小兒狐白裘項領成言其長成而得意也後漢吕强陳政事書有云羣邪有領朝廷故舊禮數絶左傳名位不同禮亦異數任彥升哭范僕射詩平生里數絶自然棄擲與時異况乃疏頑臨事拙飢卧動即向一旬敝衣何啻聨百結劉公幹彌曠十餘旬食趙云重言其貧也說苑言子思居于衛二旬九之義貧士傳董先生衣百結君不見空牆日色晚此老無聲淚垂血趙云卞和獻玉而遭刖則哭于空山淚盡繼之以血徐卿二子歌趙云二子字雖是實道其事而論語見其二子焉君不見徐卿二子生絶竒感應吉夢相追隨詩吉夢維何維熊維羆乃生男子相趙云曹子建詩飛蓋追隨孔子釋氏親抱送盡是天上麒麟兒徐陵年數嵗家人携見寶志上人志以手摩頂曰天上石麒麟也大兒九齡色清徹秋水為神玉為骨小兒五嵗氣食牛滿堂賓客皆回頭楊子吾家之童烏九齡而與我𤣥文大兒見四卷劉少府詩尸子虎豹之駒雖未成文已有食牛之氣謝希逸月賦滿堂變容回皇如失父趙云世說孔文舉有二子大者十嵗小者五嵗晝日眠小者牀頭盜酒飲之大兒謂曰何以不拜答曰偷何行禮此載年小而善言語也管輅别傳言何晏尚書神明清徹見世說注陳遵傳王莾傳皆有賓客滿堂云云也舊注引月賦滿堂變容不相干矣吾知徐卿百不憂積善衮衮生公侯易積善之家衮衮見上醉時歌注丈夫生兒有如此二雛者名位豈肻卑微休趙云左傳名位不同王充論衡自紀篇位雖卑微行茍離俗必興之友病柏有柏生崇岡童童狀車一作青蓋琴賦托峻嶽之崇岡魏文帝西北有浮雲亭亭如車蓋丈杜補遺云蜀志先主舍東南角籬上有桑樹生髙五餘遙望見童童如小車蓋往來者皆怪此樹非凡先主少時與諸小兒戲諸樹下戲言吾必當乘此羽葆蓋車又齊書太祖宅在進武南有桑樹狀如車蓋上年數嵗游于其下從兄敬宗謂曰此樹為汝生也偃蹙龍虎姿主當風雲㑹神仙傳麒麟客有龍虎之姿雲趙云魏吳季重答魏太子箋臣幸得下愚之材值風之㑹晋陸機塘上行言江蘺曰彼䝉風雲㑹移居華池邊史有感遇風雲依乘風雲神明依正直故老多再拜趙云傳聰明正直之謂神今言柏樹正直而神明反依之也詩召彼故老豈知千年根中路顔色壞出非不得地蟠據亦髙大梁沈約髙松賦云鬱彼髙松栖根得地元魏奚斤之言赫連昌曰未有盤據之資易君子以積小成大嵗寒忽無憑日夜柯葉改嵗寒然後知松柏之後雕禮器如松柏之有心貫四時不改柯易葉趙云古詩日夜黃日夜疏言其不覺如此之義丹鳳領九雛哀鳴翔其外建康實録鳳將九雛再見于豐城衆鳥從之洞簫賦孤雌寡鵠娛優乎其下春禽羣嬉翺翔乎其顛琴賦翔鸞集其顛杜補遺按吳兢樂府古題要解云鳳將雛漢世曲名晋應璩百一詩云言是鳳將雛又北齊陽松玠談藪云東海何承天除著作年巳邁諸佐郎並少年荀伯玉呼為妳母承天云卿當言鳳凰將九子妳母何言耶亦將雛之義趙云古歌詞隴西行曰鳳凰鳴啾啾一母將九雛南都賦鸞鸑鵷雛翔其上鴟梟志意滿養子穿一作窟穴內詩有鴟梟篇客從何鄊來佇立久吁怪趙云上句倣古詩客從逺方來也李善注文選吁疑怪之辭此摘用矣靜求元精一作無根理浩蕩難倚賴趙云後漢郎顗傳元精所生王之佐臣而晋阮籍咏懷詩曰天地絪緼元精代序九家集注杜詩卷七
